<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCP Apps Host Test Harness</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; padding: 20px; }
    h1 { font-size: 1.4rem; margin-bottom: 16px; }
    .controls { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    button { padding: 8px 16px; border: 1px solid #ccc; border-radius: 6px; background: white; cursor: pointer; font-size: 13px; }
    button:hover { background: #e8e8e8; }
    button.primary { background: #3b82f6; color: white; border-color: #3b82f6; }
    button.primary:hover { background: #2563eb; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .log-panel { background: #1e1e1e; color: #d4d4d4; padding: 12px; border-radius: 8px; font-family: 'Menlo', monospace; font-size: 12px; max-height: 300px; overflow-y: auto; margin-bottom: 16px; white-space: pre-wrap; word-break: break-all; }
    .log-panel .info { color: #4fc1ff; }
    .log-panel .send { color: #dcdcaa; }
    .log-panel .recv { color: #6a9955; }
    .log-panel .error { color: #f44747; }
    .log-panel .warn { color: #ce9178; }
    .iframe-container { border: 2px solid #ccc; border-radius: 8px; overflow: hidden; background: white; width: 100%; max-width: 800px; }
    .iframe-container iframe { width: 100%; height: 600px; border: none; }
    label { font-size: 13px; display: flex; align-items: center; gap: 4px; }
    select, input { font-size: 13px; padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px; }
    .status { font-size: 13px; padding: 4px 8px; border-radius: 4px; display: inline-block; }
    .status.connected { background: #dcfce7; color: #166534; }
    .status.disconnected { background: #fee2e2; color: #991b1b; }
    .status.pending { background: #fef9c3; color: #854d0e; }
  </style>
</head>
<body>
  <h1>MCP Apps Host Test Harness</h1>

  <div class="controls">
    <label>
      Server:
      <select id="server-url">
        <option value="http://localhost:3001/mcp">localhost:3001</option>
        <option value="https://mcp.quizhp.com/mcp">mcp.quizhp.com (Worker)</option>
      </select>
    </label>
    <button id="btn-run" class="primary" onclick="runFullFlow()">Run Full Flow</button>
    <button id="btn-init" onclick="doInitialize()">1. Initialize</button>
    <button id="btn-resource" onclick="doResourceRead()">2. Read Resource</button>
    <button id="btn-render" onclick="doRenderIframe()">3. Render Iframe</button>
    <button id="btn-tool" onclick="doToolCall()">4. Call Tool</button>
    <button id="btn-clear" onclick="clearLog()">Clear Log</button>
    <span id="status" class="status disconnected">Not started</span>
  </div>

  <div id="log" class="log-panel"></div>

  <div class="iframe-container">
    <iframe id="app-iframe" sandbox="allow-scripts allow-same-origin allow-forms" title="MCP App"></iframe>
  </div>

  <script>
    // ── State ──
    const state = {
      serverCapabilities: null,
      widgetHtml: null,
      toolResult: null,
      iframeReady: false,
      appInitialized: false,
      rpcId: 0,
    };

    const PROTOCOL_VERSION = '2026-01-26';

    // ── Logging ──
    const logEl = document.getElementById('log');
    function log(cls, msg) {
      const line = document.createElement('div');
      line.className = cls;
      const ts = new Date().toISOString().split('T')[1].split('.')[0];
      line.textContent = `[${ts}] ${msg}`;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }
    function clearLog() {
      logEl.innerHTML = '';
    }

    function setStatus(text, cls) {
      const el = document.getElementById('status');
      el.textContent = text;
      el.className = 'status ' + cls;
    }

    // ── MCP HTTP Client ──
    function getServerUrl() {
      return document.getElementById('server-url').value;
    }

    async function mcpRequest(method, params = {}) {
      const id = ++state.rpcId;
      const body = { jsonrpc: '2.0', id, method, params };
      log('send', `→ ${method} (id=${id}): ${JSON.stringify(params).slice(0, 200)}`);

      const resp = await fetch(getServerUrl(), {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'application/json, text/event-stream',
        },
        body: JSON.stringify(body),
      });

      const contentType = resp.headers.get('content-type') || '';
      let result;

      if (contentType.includes('text/event-stream')) {
        // Parse SSE response
        const text = await resp.text();
        log('info', `SSE response (${text.length} chars)`);
        const lines = text.split('\n');
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            try {
              result = JSON.parse(line.slice(6));
              break;
            } catch (e) {}
          }
        }
        if (!result) {
          throw new Error('No valid JSON-RPC response in SSE stream');
        }
      } else {
        // Parse JSON response
        result = await resp.json();
      }

      if (result.error) {
        log('error', `← ERROR ${method}: ${JSON.stringify(result.error)}`);
        throw new Error(result.error.message);
      }

      const preview = JSON.stringify(result.result).slice(0, 300);
      log('recv', `← ${method} (id=${result.id}): ${preview}...`);
      return result.result;
    }

    // ── MCP Protocol Steps ──

    async function doInitialize() {
      setStatus('Initializing...', 'pending');
      try {
        const result = await mcpRequest('initialize', {
          protocolVersion: '2025-11-05',
          capabilities: {
            extensions: {
              'io.modelcontextprotocol/ui': {
                mimeTypes: ['text/html;profile=mcp-app'],
              },
            },
          },
          clientInfo: { name: 'TestHarness', version: '1.0.0' },
        });
        state.serverCapabilities = result.capabilities;
        log('info', `Server: ${result.serverInfo.name} v${result.serverInfo.version}, protocol: ${result.protocolVersion}`);
        log('info', `Capabilities: ${JSON.stringify(result.capabilities)}`);

        // Send initialized notification (no id = notification)
        const notifBody = { jsonrpc: '2.0', method: 'notifications/initialized', params: {} };
        log('send', `→ notifications/initialized (notification)`);
        await fetch(getServerUrl(), {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json, text/event-stream',
          },
          body: JSON.stringify(notifBody),
        });

        setStatus('Initialized', 'connected');
      } catch (e) {
        log('error', `Initialize failed: ${e.message}`);
        setStatus('Error', 'disconnected');
        throw e;
      }
    }

    async function doResourceRead() {
      setStatus('Reading resource...', 'pending');
      try {
        const result = await mcpRequest('resources/read', {
          uri: 'ui://quizhp/quiz-app.html',
        });

        const content = result.contents[0];
        log('info', `Resource URI: ${content.uri}`);
        log('info', `MIME type: ${content.mimeType}`);
        log('info', `HTML length: ${(content.text || '').length} chars`);

        if (content._meta?.ui) {
          log('info', `Resource _meta.ui: ${JSON.stringify(content._meta.ui)}`);
        }

        state.widgetHtml = content.text;
        setStatus('Resource loaded', 'connected');
      } catch (e) {
        log('error', `Resource read failed: ${e.message}`);
        setStatus('Error', 'disconnected');
        throw e;
      }
    }

    async function doRenderIframe() {
      if (!state.widgetHtml) {
        log('error', 'No widget HTML loaded yet');
        return;
      }

      setStatus('Rendering iframe...', 'pending');

      // Set up postMessage listener BEFORE loading the iframe
      setupPostMessageHandler();

      const iframe = document.getElementById('app-iframe');

      // Write HTML directly into iframe using srcdoc
      // This simulates what Claude web does when it receives the HTML
      iframe.srcdoc = state.widgetHtml;

      log('info', `Iframe srcdoc set (${state.widgetHtml.length} chars)`);
      setStatus('Iframe rendered', 'connected');
    }

    function setupPostMessageHandler() {
      // Remove any existing listener
      if (window._mcpMessageHandler) {
        window.removeEventListener('message', window._mcpMessageHandler);
      }

      window._mcpMessageHandler = function(event) {
        const data = event.data;

        // Skip non-JSON-RPC messages
        if (!data || data.jsonrpc !== '2.0') return;

        const method = data.method;
        const id = data.id;

        log('recv', `← [postMessage] ${method || 'response'} id=${id}: ${JSON.stringify(data).slice(0, 300)}`);

        // Handle ui/initialize request from the app
        if (method === 'ui/initialize') {
          log('info', `App requesting initialize. AppInfo: ${JSON.stringify(data.params?.appInfo)}`);
          log('info', `App capabilities: ${JSON.stringify(data.params?.appCapabilities)}`);
          log('info', `App protocol version: ${data.params?.protocolVersion}`);

          // Respond with host context (what Claude web would send)
          const response = {
            jsonrpc: '2.0',
            id: id,
            result: {
              protocolVersion: PROTOCOL_VERSION,
              hostInfo: { name: 'TestHarness', version: '1.0.0' },
              hostCapabilities: {
                openLinks: {},
                serverTools: {},
                serverResources: {},
                logging: {},
                updateModelContext: { text: {} },
              },
              hostContext: {
                theme: 'light',
                platform: 'web',
                displayMode: 'inline',
                availableDisplayModes: ['inline', 'fullscreen'],
                containerDimensions: { maxHeight: 6000, maxWidth: 800 },
              },
            },
          };

          const iframe = document.getElementById('app-iframe');
          log('send', `→ [postMessage] ui/initialize response: ${JSON.stringify(response).slice(0, 300)}`);
          iframe.contentWindow.postMessage(response, '*');
          return;
        }

        // Handle ui/notifications/initialized
        if (method === 'ui/notifications/initialized') {
          state.appInitialized = true;
          log('info', '✓ App initialized! Ready to receive tool data.');
          setStatus('App initialized', 'connected');

          // If we already have tool result, send it now
          if (state.toolResult) {
            sendToolDataToIframe();
          }
          return;
        }

        // Handle ui/notifications/size-changed
        if (method === 'ui/notifications/size-changed') {
          log('info', `App size changed: ${JSON.stringify(data.params)}`);
          // Optionally resize iframe
          const iframe = document.getElementById('app-iframe');
          if (data.params?.height) {
            iframe.style.height = Math.min(data.params.height, 800) + 'px';
          }
          return;
        }

        // Handle ui/update-model-context (score reporting)
        if (method === 'ui/update-model-context') {
          log('info', `Model context update: ${JSON.stringify(data.params).slice(0, 300)}`);
          // Respond with empty result
          const iframe = document.getElementById('app-iframe');
          iframe.contentWindow.postMessage({ jsonrpc: '2.0', id: id, result: {} }, '*');
          return;
        }

        // Handle ui/request-display-mode
        if (method === 'ui/request-display-mode') {
          log('info', `Display mode request: ${JSON.stringify(data.params)}`);
          const iframe = document.getElementById('app-iframe');
          iframe.contentWindow.postMessage({
            jsonrpc: '2.0',
            id: id,
            result: { mode: data.params?.mode || 'inline' },
          }, '*');
          return;
        }

        // Handle ui/open-link
        if (method === 'ui/open-link') {
          log('info', `Open link: ${data.params?.url}`);
          const iframe = document.getElementById('app-iframe');
          iframe.contentWindow.postMessage({ jsonrpc: '2.0', id: id, result: {} }, '*');
          return;
        }

        // Handle ping
        if (method === 'ping') {
          const iframe = document.getElementById('app-iframe');
          iframe.contentWindow.postMessage({ jsonrpc: '2.0', id: id, result: {} }, '*');
          return;
        }

        // Log any unhandled messages
        if (method) {
          log('warn', `Unhandled method: ${method}`);
        }
      };

      window.addEventListener('message', window._mcpMessageHandler);
      log('info', 'PostMessage handler installed');
    }

    async function doToolCall() {
      setStatus('Calling play-quiz...', 'pending');

      const questions = [
        {
          question_type: 'mcq',
          question: 'What is the capital of France?',
          choices: [
            { text: 'London', is_correct: false, explanation: 'London is the capital of the United Kingdom.' },
            { text: 'Paris', is_correct: true, explanation: 'Paris is indeed the capital of France.' },
            { text: 'Berlin', is_correct: false, explanation: 'Berlin is the capital of Germany.' },
            { text: 'Madrid', is_correct: false, explanation: 'Madrid is the capital of Spain.' },
          ],
        },
        {
          question_type: 'mcq',
          question: 'Which planet is closest to the Sun?',
          choices: [
            { text: 'Venus', is_correct: false, explanation: 'Venus is the second planet from the Sun.' },
            { text: 'Earth', is_correct: false, explanation: 'Earth is the third planet from the Sun.' },
            { text: 'Mercury', is_correct: true, explanation: 'Mercury is the closest planet to the Sun.' },
            { text: 'Mars', is_correct: false, explanation: 'Mars is the fourth planet from the Sun.' },
          ],
        },
        {
          question_type: 'true_false',
          question: 'Water boils at 100 degrees Celsius at sea level.',
          choices: [
            { text: 'True', is_correct: true, explanation: 'Yes, water boils at 100°C (212°F) at sea level.' },
            { text: 'False', is_correct: false, explanation: 'This is actually true. Water boils at 100°C at sea level.' },
          ],
        },
      ];

      try {
        const result = await mcpRequest('tools/call', {
          name: 'play-quiz',
          arguments: { questions, title: 'Test Quiz' },
        });

        log('info', `Tool result content: ${JSON.stringify(result.content).slice(0, 200)}`);

        if (result.structuredContent) {
          const sc = result.structuredContent;
          log('info', `Structured content keys: ${Object.keys(sc).join(', ')}`);
          log('info', `Questions count: ${sc.questions?.length}`);
          log('info', `Templates count: ${sc.templates?.length}`);
          if (sc.templates?.length > 0) {
            log('info', `First template: ${sc.templates[0].name} (${sc.templates[0].code?.length} chars)`);
          }
        }

        state.toolResult = result;
        setStatus('Tool called', 'connected');

        // If app is already initialized, send tool data
        if (state.appInitialized) {
          sendToolDataToIframe();
        }
      } catch (e) {
        log('error', `Tool call failed: ${e.message}`);
        setStatus('Error', 'disconnected');
        throw e;
      }
    }

    function sendToolDataToIframe() {
      const iframe = document.getElementById('app-iframe');
      if (!iframe.contentWindow) {
        log('error', 'Iframe contentWindow not available');
        return;
      }

      // Send tool input (arguments that were passed to the tool)
      const toolInput = {
        jsonrpc: '2.0',
        method: 'ui/notifications/tool-input',
        params: {
          arguments: {
            questions: state.toolResult.structuredContent?.questions || [],
            title: state.toolResult.structuredContent?.title,
          },
        },
      };
      log('send', `→ [postMessage] tool-input: ${JSON.stringify(toolInput).slice(0, 200)}`);
      iframe.contentWindow.postMessage(toolInput, '*');

      // Send tool result (the full CallToolResult)
      const toolResultMsg = {
        jsonrpc: '2.0',
        method: 'ui/notifications/tool-result',
        params: state.toolResult,
      };
      log('send', `→ [postMessage] tool-result: keys=${Object.keys(state.toolResult).join(',')}, sc_keys=${Object.keys(state.toolResult.structuredContent || {}).join(',')}`);
      iframe.contentWindow.postMessage(toolResultMsg, '*');

      setStatus('Data sent to iframe', 'connected');
    }

    // ── Full Flow ──
    async function runFullFlow() {
      try {
        clearLog();
        log('info', `Starting full flow against ${getServerUrl()}`);

        await doInitialize();
        await doResourceRead();
        await doRenderIframe();

        // Give iframe time to load and initialize
        log('info', 'Waiting for iframe to load...');
        setTimeout(async () => {
          await doToolCall();
        }, 2000);
      } catch (e) {
        log('error', `Flow failed: ${e.message}`);
      }
    }
  </script>
</body>
</html>
