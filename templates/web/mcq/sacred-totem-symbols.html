<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Template</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC'
  };

  // === SOUND ENGINE ===
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playSound(type) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'click') {
      osc.frequency.setValueAtTime(600, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.05);
      gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
      osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
      osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
      osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    } else if (type === 'glow') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(400, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
      osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    }
  }

  // === GAME STATE ===
  let totems = [];
  let jungleParticles = [];
  let glowParticles = [];
  let hoveredTotem = -1;
  let selectedTotem = -1;
  let selectionTime = 0;
  let gameTime = 0;
  let entranceProgress = 0;

  // Ancient symbol sets for each totem
  const SYMBOLS = [
    // Eye of knowledge
    function(ctx, cx, cy, s, glow) {
      ctx.strokeStyle = glow;
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.ellipse(cx, cy, s * 0.45, s * 0.25, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(cx, cy, s * 0.12, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();
      // Rays
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(a) * s * 0.3, cy + Math.sin(a) * s * 0.3);
        ctx.lineTo(cx + Math.cos(a) * s * 0.5, cy + Math.sin(a) * s * 0.5);
        ctx.stroke();
      }
    },
    // Spiral of time
    function(ctx, cx, cy, s, glow) {
      ctx.strokeStyle = glow;
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      for (let t = 0; t < Math.PI * 6; t += 0.1) {
        const r = (t / (Math.PI * 6)) * s * 0.45;
        const x = cx + Math.cos(t) * r;
        const y = cy + Math.sin(t) * r;
        if (t === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
      // Dot at center
      ctx.beginPath();
      ctx.arc(cx, cy, 3, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();
    },
    // Triangle of power
    function(ctx, cx, cy, s, glow) {
      ctx.strokeStyle = glow;
      ctx.lineWidth = 2.5;
      // Outer triangle
      ctx.beginPath();
      for (let i = 0; i < 3; i++) {
        const a = (i / 3) * Math.PI * 2 - Math.PI / 2;
        const x = cx + Math.cos(a) * s * 0.45;
        const y = cy + Math.sin(a) * s * 0.45;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.stroke();
      // Inner triangle
      ctx.beginPath();
      for (let i = 0; i < 3; i++) {
        const a = (i / 3) * Math.PI * 2 + Math.PI / 2;
        const x = cx + Math.cos(a) * s * 0.22;
        const y = cy + Math.sin(a) * s * 0.22;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.fillStyle = glow;
      ctx.fill();
    },
    // Moon crescent
    function(ctx, cx, cy, s, glow) {
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(cx, cy, s * 0.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#2A3A2E'; // Cut out for crescent
      ctx.beginPath();
      ctx.arc(cx + s * 0.18, cy - s * 0.08, s * 0.32, 0, Math.PI * 2);
      ctx.fill();
      // Stars
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(cx + s * 0.3, cy - s * 0.25, 2.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx + s * 0.35, cy + s * 0.1, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  ];

  // Glow colors for each totem
  const GLOW_COLORS = ['#4ECDC4', '#E87A3E', '#F5A742', '#6BBF59'];
  const GLOW_COLORS_DIM = ['rgba(78,205,196,0.3)', 'rgba(232,122,62,0.3)', 'rgba(245,167,66,0.3)', 'rgba(107,191,89,0.3)'];
  const GLOW_COLORS_BRIGHT = ['rgba(78,205,196,0.8)', 'rgba(232,122,62,0.8)', 'rgba(245,167,66,0.8)', 'rgba(107,191,89,0.8)'];

  function wrapText(text, maxWidth, font) {
    ctx.font = font;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    for (const word of words) {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    }
    if (currentLine) lines.push(currentLine);
    return lines;
  }

  function initGame() {
    gameTime = 0;
    entranceProgress = 0;
    hoveredTotem = -1;
    selectedTotem = -1;
    selectionTime = 0;
    glowParticles = [];

    // 4 totems in a row, each is a tall stone pillar
    const totemW = 140;
    const totemH = 280;
    const gap = 16;
    const totalW = totemW * 4 + gap * 3;
    const startX = (W - totalW) / 2;
    const startY = 85;

    totems = QUESTION.choices.map((choice, i) => ({
      x: startX + i * (totemW + gap),
      y: startY,
      w: totemW,
      h: totemH,
      choice: choice,
      index: i,
      glowIntensity: 0,
      scale: 0,
      alpha: 0,
      shakeX: 0,
      pulseScale: 1,
      selected: false,
      isCorrect: false,
      isWrong: false
    }));

    // Jungle floating particles (fireflies)
    jungleParticles = [];
    for (let i = 0; i < 25; i++) {
      jungleParticles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 20,
        vy: (Math.random() - 0.5) * 15,
        size: Math.random() * 3 + 1,
        alpha: Math.random() * 0.5 + 0.2,
        color: GLOW_COLORS[Math.floor(Math.random() * GLOW_COLORS.length)],
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Entrance animation
    if (entranceProgress < 1) {
      entranceProgress = Math.min(1, entranceProgress + dt * 1.5);
      totems.forEach((t, i) => {
        const staggerT = Math.max(0, Math.min(1, (entranceProgress - i * 0.12) / 0.5));
        // Spring easing
        const spring = 1 + Math.sin(staggerT * Math.PI * 2) * 0.2 * (1 - staggerT);
        t.scale = staggerT * spring;
        t.alpha = staggerT;
      });
    }

    // Selection animation
    if (selectedTotem >= 0) {
      selectionTime += dt;
      const sel = totems[selectedTotem];

      if (selectionTime < 0.6) {
        // Glow brightens
        sel.glowIntensity = Math.min(1, sel.glowIntensity + dt * 4);
        sel.pulseScale = 1 + Math.sin(selectionTime * Math.PI * 4) * 0.03;
      } else if (selectionTime >= 0.6) {
        // End game
        const choice = sel.choice;
        if (choice.is_correct) {
          sel.isCorrect = true;
          playSound('correct');
        } else {
          sel.isWrong = true;
          playSound('wrong');
        }
        engine.end(choice.is_correct, choice.explanation);
      }
    }

    // Ambient totem glow pulsing
    totems.forEach((t, i) => {
      if (selectedTotem < 0) {
        t.glowIntensity = 0.3 + Math.sin(gameTime * 1.5 + i * 1.2) * 0.15;
      }
    });

    // Hover glow boost
    if (hoveredTotem >= 0 && selectedTotem < 0) {
      totems[hoveredTotem].glowIntensity = 0.7 + Math.sin(gameTime * 3) * 0.1;
    }

    // Update fireflies
    jungleParticles.forEach(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vx += (Math.random() - 0.5) * 30 * dt;
      p.vy += (Math.random() - 0.5) * 30 * dt;
      p.vx *= 0.98;
      p.vy *= 0.98;
      p.alpha = 0.3 + Math.sin(gameTime * 2 + p.phase) * 0.25;
      if (p.x < -10) p.x = W + 10;
      if (p.x > W + 10) p.x = -10;
      if (p.y < -10) p.y = H + 10;
      if (p.y > H + 10) p.y = -10;
    });

    // Update glow particles
    glowParticles = glowParticles.filter(p => {
      p.y += p.vy * dt;
      p.x += p.vx * dt;
      p.alpha -= dt * 1.5;
      p.size *= 0.98;
      return p.alpha > 0;
    });

    // Spawn glow particles from hovered/selected totem
    const activeTotem = selectedTotem >= 0 ? selectedTotem : hoveredTotem;
    if (activeTotem >= 0 && Math.random() < (selectedTotem >= 0 ? 0.8 : 0.3)) {
      const t = totems[activeTotem];
      glowParticles.push({
        x: t.x + t.w / 2 + (Math.random() - 0.5) * 40,
        y: t.y + t.h * 0.35 + (Math.random() - 0.5) * 30,
        vx: (Math.random() - 0.5) * 30,
        vy: -Math.random() * 40 - 10,
        size: Math.random() * 4 + 2,
        alpha: 0.8,
        color: GLOW_COLORS[activeTotem]
      });
    }
  }

  function drawGame() {
    // Jungle background gradient
    const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
    bgGrad.addColorStop(0, '#1A2E1A');
    bgGrad.addColorStop(0.4, '#1F3520');
    bgGrad.addColorStop(1, '#0F1F12');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    // Ground with moss
    const groundGrad = ctx.createLinearGradient(0, H - 120, 0, H);
    groundGrad.addColorStop(0, 'rgba(30, 60, 30, 0)');
    groundGrad.addColorStop(0.3, 'rgba(25, 55, 25, 0.6)');
    groundGrad.addColorStop(1, '#0D1A0E');
    ctx.fillStyle = groundGrad;
    ctx.fillRect(0, H - 120, W, 120);

    // Jungle vines on sides
    ctx.strokeStyle = 'rgba(40, 80, 40, 0.4)';
    ctx.lineWidth = 3;
    for (let i = 0; i < 6; i++) {
      ctx.beginPath();
      const sx = i < 3 ? 10 + i * 25 : W - 10 - (i - 3) * 25;
      ctx.moveTo(sx, 0);
      for (let y = 0; y < H; y += 20) {
        ctx.lineTo(sx + Math.sin(y * 0.03 + i) * 15, y);
      }
      ctx.stroke();
    }

    // Draw fireflies behind totems
    jungleParticles.forEach(p => {
      ctx.globalAlpha = p.alpha * 0.6;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
      // Glow effect
      const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 4);
      grd.addColorStop(0, p.color);
      grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    });

    // Draw totems
    totems.forEach((t, i) => {
      if (t.alpha <= 0) return;

      ctx.save();
      ctx.globalAlpha = t.alpha;

      // Position with entrance animation
      const centerX = t.x + t.w / 2;
      const centerY = t.y + t.h / 2;
      ctx.translate(centerX, centerY);
      ctx.scale(t.scale * t.pulseScale, t.scale * t.pulseScale);
      ctx.translate(-centerX, -centerY);

      // Shake for wrong
      const shakeOff = t.isWrong ? Math.sin(gameTime * 40) * 6 * Math.max(0, 1 - (gameTime - selectionTime) * 3) : 0;

      // Totem shadow
      ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
      ctx.beginPath();
      ctx.roundRect(t.x + 4 + shakeOff, t.y + 4, t.w, t.h, 8);
      ctx.fill();

      // Totem stone body
      const stoneGrad = ctx.createLinearGradient(t.x + shakeOff, t.y, t.x + t.w + shakeOff, t.y + t.h);
      stoneGrad.addColorStop(0, '#4A5A4A');
      stoneGrad.addColorStop(0.3, '#5A6A5A');
      stoneGrad.addColorStop(0.7, '#3A4A3A');
      stoneGrad.addColorStop(1, '#2A3A2E');
      ctx.fillStyle = stoneGrad;
      ctx.beginPath();
      ctx.roundRect(t.x + shakeOff, t.y, t.w, t.h, 8);
      ctx.fill();

      // Stone texture lines
      ctx.strokeStyle = 'rgba(0, 0, 0, 0.15)';
      ctx.lineWidth = 1;
      for (let j = 0; j < 5; j++) {
        const ly = t.y + 30 + j * 55;
        ctx.beginPath();
        ctx.moveTo(t.x + 8 + shakeOff, ly);
        ctx.lineTo(t.x + t.w - 8 + shakeOff, ly + (Math.random() - 0.5) * 4);
        ctx.stroke();
      }

      // Glowing symbol area
      const symbolCX = t.x + t.w / 2 + shakeOff;
      const symbolCY = t.y + t.h * 0.3;
      const symbolSize = 50;

      // Symbol glow halo
      const glowAlpha = t.glowIntensity;
      const haloGrad = ctx.createRadialGradient(symbolCX, symbolCY, 0, symbolCX, symbolCY, symbolSize * 1.5);
      haloGrad.addColorStop(0, `rgba(${hexToRgb(GLOW_COLORS[i])}, ${glowAlpha * 0.5})`);
      haloGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = haloGrad;
      ctx.beginPath();
      ctx.arc(symbolCX, symbolCY, symbolSize * 1.5, 0, Math.PI * 2);
      ctx.fill();

      // Draw the symbol
      const symbolColor = interpolateColor(GLOW_COLORS_DIM[i], GLOW_COLORS_BRIGHT[i], t.glowIntensity);
      SYMBOLS[i](ctx, symbolCX, symbolCY, symbolSize, symbolColor);

      // Selected highlight border
      if (t.selected || hoveredTotem === i) {
        ctx.strokeStyle = GLOW_COLORS[i];
        ctx.lineWidth = hoveredTotem === i ? 2.5 : 3;
        ctx.globalAlpha = t.alpha * (t.selected ? 0.9 : 0.5);
        ctx.beginPath();
        ctx.roundRect(t.x + shakeOff, t.y, t.w, t.h, 8);
        ctx.stroke();
        ctx.globalAlpha = t.alpha;
      }

      // Correct/wrong highlight
      if (t.isCorrect) {
        ctx.strokeStyle = COLORS.success;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.roundRect(t.x + shakeOff, t.y, t.w, t.h, 8);
        ctx.stroke();
      } else if (t.isWrong) {
        ctx.strokeStyle = COLORS.error;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.roundRect(t.x + shakeOff, t.y, t.w, t.h, 8);
        ctx.stroke();
      }

      // Answer text area at bottom of totem
      const textAreaY = t.y + t.h * 0.55;
      const textAreaH = t.h * 0.42;
      const textPadding = 10;
      const maxTextW = t.w - textPadding * 2;

      // Text background
      ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
      ctx.beginPath();
      ctx.roundRect(t.x + 5 + shakeOff, textAreaY, t.w - 10, textAreaH, 6);
      ctx.fill();

      // Answer text - wrapped
      const font = "400 16px 'Nunito', sans-serif";
      const lines = wrapText(t.choice.text, maxTextW, font);
      ctx.font = font;
      ctx.fillStyle = '#E0E8E0';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      const lineHeight = 19;
      const totalTextH = lines.length * lineHeight;
      const textStartY = textAreaY + (textAreaH - totalTextH) / 2;
      lines.forEach((line, li) => {
        ctx.fillText(line, symbolCX, textStartY + li * lineHeight);
      });

      // Choice letter badge
      const letter = String.fromCharCode(65 + i);
      ctx.fillStyle = GLOW_COLORS[i];
      ctx.beginPath();
      ctx.arc(t.x + t.w / 2 + shakeOff, t.y + t.h - 18, 14, 0, Math.PI * 2);
      ctx.fill();
      ctx.font = "700 14px 'Nunito Sans', sans-serif";
      ctx.fillStyle = '#FFFFFF';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(letter, t.x + t.w / 2 + shakeOff, t.y + t.h - 17);

      ctx.restore();
    });

    // Draw glow particles on top
    glowParticles.forEach(p => {
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    });

    // Fog at bottom
    const fogGrad = ctx.createLinearGradient(0, H - 60, 0, H);
    fogGrad.addColorStop(0, 'rgba(20, 40, 20, 0)');
    fogGrad.addColorStop(1, 'rgba(20, 40, 20, 0.5)');
    ctx.fillStyle = fogGrad;
    ctx.fillRect(0, H - 60, W, 60);
  }

  // Utility: hex to rgb string
  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `${r},${g},${b}`;
  }

  // Utility: interpolate between two rgba color strings
  function interpolateColor(c1, c2, t) {
    // Extract rgba from "rgba(r,g,b,a)" strings
    const parse = (c) => c.match(/[\d.]+/g).map(Number);
    const [r1, g1, b1, a1] = parse(c1);
    const [r2, g2, b2, a2] = parse(c2);
    const r = Math.round(r1 + (r2 - r1) * t);
    const g = Math.round(g1 + (g2 - g1) * t);
    const b = Math.round(b1 + (b2 - b1) * t);
    const a = a1 + (a2 - a1) * t;
    return `rgba(${r},${g},${b},${a.toFixed(2)})`;
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;
    if (selectedTotem >= 0) return;

    // Number keys 1-4 to select totem
    if (e.code >= 'Digit1' && e.code <= 'Digit4') {
      const idx = parseInt(e.code.charAt(5)) - 1;
      if (idx >= 0 && idx < totems.length) {
        selectTotem(idx);
      }
    }
  }

  function selectTotem(idx) {
    if (selectedTotem >= 0) return;
    selectedTotem = idx;
    selectionTime = 0;
    totems[idx].selected = true;
    totems[idx].glowIntensity = 0.8;
    playSound('glow');
  }

  // Mouse interaction
  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'playing' || selectedTotem >= 0) {
      canvas.style.cursor = 'default';
      return;
    }
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    hoveredTotem = -1;
    for (let i = 0; i < totems.length; i++) {
      const t = totems[i];
      if (x >= t.x && x <= t.x + t.w && y >= t.y && y <= t.y + t.h) {
        hoveredTotem = i;
        break;
      }
    }
    canvas.style.cursor = hoveredTotem >= 0 ? 'pointer' : 'default';
  });

  canvas.addEventListener('click', (e) => {
    if (gameState !== 'playing' || selectedTotem >= 0) return;
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    for (let i = 0; i < totems.length; i++) {
      const t = totems[i];
      if (x >= t.x && x <= t.x + t.w && y >= t.y && y <= t.y + t.h) {
        playSound('click');
        selectTotem(i);
        break;
      }
    }
  });

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
