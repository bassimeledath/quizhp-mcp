<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alchemical Panels</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    cyanLight: '#E8F9F8',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC',
    peach: '#FFB89D'
  };

  // === ALCHEMICAL SYMBOLS ===
  const ALCHEMICAL_SYMBOLS = [
    { name: 'Fire', symbol: '🜂', color: '#E87A3E', glowColor: 'rgba(232,122,62,0.4)' },
    { name: 'Water', symbol: '🜄', color: '#4ECDC4', glowColor: 'rgba(78,205,196,0.4)' },
    { name: 'Earth', symbol: '🜃', color: '#6BBF59', glowColor: 'rgba(107,191,89,0.4)' },
    { name: 'Air', symbol: '🜁', color: '#F5A742', glowColor: 'rgba(245,167,66,0.4)' }
  ];

  // === GAME STATE ===
  let selectedIndex = 0;
  let panels = [];
  let gameTime = 0;
  let activatingPanel = -1;
  let activationTimer = 0;
  let answered = false;
  let particles = [];
  let panelEntrance = [];

  // Audio context for sound effects
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playSound(type) {
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);

      if (type === 'select') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(440, ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(660, ctx.currentTime + 0.08);
        gain.gain.setValueAtTime(0.15, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.15);
      } else if (type === 'activate') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(784, ctx.currentTime + 0.15);
        osc.frequency.linearRampToValueAtTime(1047, ctx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.2, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.4);
      } else if (type === 'correct') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, ctx.currentTime);
        osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
        osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.2, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.5);
      } else if (type === 'wrong') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(200, ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(120, ctx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.12, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.4);
      }
    } catch(e) {}
  }

  // === PANEL LAYOUT ===
  const PANEL_W = 320;
  const PANEL_H = 100;
  const PANEL_GAP = 16;
  const PANELS_START_X = (W - PANEL_W * 2 - PANEL_GAP) / 2;
  const PANELS_START_Y = 40;

  function initGame() {
    selectedIndex = 0;
    activatingPanel = -1;
    activationTimer = 0;
    answered = false;
    gameTime = 0;
    particles = [];

    panels = QUESTION.choices.map((choice, i) => {
      const col = i % 2;
      const row = Math.floor(i / 2);
      const alchemy = ALCHEMICAL_SYMBOLS[i];
      return {
        x: PANELS_START_X + col * (PANEL_W + PANEL_GAP),
        y: PANELS_START_Y + row * (PANEL_H + PANEL_GAP + 20),
        w: PANEL_W,
        h: PANEL_H,
        choice: choice,
        alchemy: alchemy,
        glowIntensity: 0,
        shakeX: 0,
        scaleAnim: 0,
        entranceProgress: 0,
        entranceDelay: i * 80
      };
    });

    // Start entrance animation
    panelEntrance = panels.map(() => ({ started: false, progress: 0 }));
  }

  // === WORD WRAP HELPER ===
  function wrapText(text, maxWidth, font) {
    ctx.font = font;
    const words = text.split(' ');
    const lines = [];
    let currentLine = words[0];

    for (let i = 1; i < words.length; i++) {
      const testLine = currentLine + ' ' + words[i];
      if (ctx.measureText(testLine).width <= maxWidth) {
        currentLine = testLine;
      } else {
        lines.push(currentLine);
        currentLine = words[i];
      }
    }
    lines.push(currentLine);
    return lines;
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Entrance animations
    panels.forEach((panel, i) => {
      const pe = panelEntrance[i];
      const delayS = panel.entranceDelay / 1000;
      if (gameTime >= delayS && !pe.started) {
        pe.started = true;
      }
      if (pe.started && pe.progress < 1) {
        pe.progress = Math.min(1, pe.progress + dt * 3.5);
        // Spring easing
        const t = pe.progress;
        panel.entranceProgress = t < 1
          ? t * (1 + Math.sin(t * Math.PI * 2) * 0.15 * (1 - t))
          : 1;
      }
    });

    // Panel glow animation (ambient breathing)
    panels.forEach((panel, i) => {
      if (i === selectedIndex) {
        panel.glowIntensity += (1 - panel.glowIntensity) * dt * 6;
      } else {
        panel.glowIntensity += (0.2 - panel.glowIntensity) * dt * 4;
      }
    });

    // Activation animation
    if (activatingPanel >= 0) {
      activationTimer += dt;
      const panel = panels[activatingPanel];

      // Scale pulse
      panel.scaleAnim = Math.sin(activationTimer * 12) * 0.03 * Math.max(0, 1 - activationTimer * 2);

      if (activationTimer > 0.4 && !answered) {
        answered = true;
        const choice = panel.choice;
        if (choice.is_correct) {
          playSound('correct');
          // Spawn celebration particles
          for (let j = 0; j < 25; j++) {
            particles.push({
              x: panel.x + panel.w / 2,
              y: panel.y + panel.h / 2,
              vx: (Math.random() - 0.5) * 350,
              vy: -Math.random() * 250 - 80,
              color: [COLORS.orange, COLORS.amber, COLORS.cyan, COLORS.success][Math.floor(Math.random() * 4)],
              size: 3 + Math.random() * 5,
              rotation: Math.random() * Math.PI * 2,
              rotationSpeed: (Math.random() - 0.5) * 8,
              alpha: 1
            });
          }
        } else {
          playSound('wrong');
          // Shake animation
          panel.shakeX = 10;
        }
        setTimeout(() => {
          engine.end(choice.is_correct, choice.explanation);
        }, 350);
      }
    }

    // Shake decay
    panels.forEach(panel => {
      if (Math.abs(panel.shakeX) > 0.1) {
        panel.shakeX *= -0.8;
        panel.shakeX *= 0.9;
      } else {
        panel.shakeX = 0;
      }
    });

    // Update particles
    particles.forEach(p => {
      p.vy += 500 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.alpha -= dt * 1.2;
    });
    particles = particles.filter(p => p.alpha > 0 && p.y < H + 20);
  }

  function drawGame() {
    // Background - dark arcane research station
    ctx.fillStyle = '#1C1C1A';
    ctx.fillRect(0, 0, W, H);

    // Arcane background pattern - subtle grid lines
    ctx.strokeStyle = 'rgba(78,205,196,0.04)';
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 40) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, H);
      ctx.stroke();
    }
    for (let y = 0; y < H; y += 40) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }

    // Subtle arcane circle in center background
    ctx.save();
    ctx.globalAlpha = 0.06;
    ctx.strokeStyle = COLORS.amber;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(W / 2, H / 2 + 30, 220, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(W / 2, H / 2 + 30, 190, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();

    // Draw panels
    panels.forEach((panel, i) => {
      const pe = panelEntrance[i];
      if (pe.progress <= 0) return;

      const entranceScale = panel.entranceProgress || pe.progress;
      const isSelected = i === selectedIndex;
      const isActivating = i === activatingPanel;

      ctx.save();

      // Apply entrance + activation scale
      const totalScale = entranceScale * (1 + panel.scaleAnim);
      const cx = panel.x + panel.w / 2 + panel.shakeX;
      const cy = panel.y + panel.h / 2;
      ctx.translate(cx, cy);
      ctx.scale(totalScale, totalScale);
      ctx.translate(-cx, -cy);

      const px = panel.x + panel.shakeX;
      const py = panel.y;

      // Glow effect behind panel
      if (panel.glowIntensity > 0.1) {
        const glowGrad = ctx.createRadialGradient(
          px + panel.w / 2, py + panel.h / 2, panel.w * 0.2,
          px + panel.w / 2, py + panel.h / 2, panel.w * 0.7
        );
        glowGrad.addColorStop(0, panel.alchemy.glowColor.replace('0.4', String(0.3 * panel.glowIntensity)));
        glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = glowGrad;
        ctx.fillRect(px - 30, py - 30, panel.w + 60, panel.h + 60);
      }

      // Panel body
      const panelGrad = ctx.createLinearGradient(px, py, px, py + panel.h);
      if (isActivating && answered) {
        if (panel.choice.is_correct) {
          panelGrad.addColorStop(0, '#2a3d2a');
          panelGrad.addColorStop(1, '#1a2d1a');
        } else {
          panelGrad.addColorStop(0, '#3d2a2a');
          panelGrad.addColorStop(1, '#2d1a1a');
        }
      } else {
        panelGrad.addColorStop(0, '#2A2A27');
        panelGrad.addColorStop(1, '#222220');
      }

      ctx.fillStyle = panelGrad;
      ctx.beginPath();
      ctx.roundRect(px, py, panel.w, panel.h, 12);
      ctx.fill();

      // Panel border
      ctx.strokeStyle = isSelected
        ? panel.alchemy.color
        : (isActivating ? (panel.choice.is_correct ? COLORS.success : COLORS.error) : '#424240');
      ctx.lineWidth = isSelected ? 2.5 : 1.5;
      ctx.beginPath();
      ctx.roundRect(px, py, panel.w, panel.h, 12);
      ctx.stroke();

      // Alchemical symbol on left side
      const symbolX = px + 40;
      const symbolY = py + panel.h / 2;

      // Symbol circle background
      ctx.fillStyle = isSelected
        ? panel.alchemy.color + '30'
        : 'rgba(255,255,255,0.05)';
      ctx.beginPath();
      ctx.arc(symbolX, symbolY, 26, 0, Math.PI * 2);
      ctx.fill();

      // Symbol border
      ctx.strokeStyle = isSelected ? panel.alchemy.color : '#5A5A56';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(symbolX, symbolY, 26, 0, Math.PI * 2);
      ctx.stroke();

      // Draw alchemical symbol
      ctx.font = "24px serif";
      ctx.fillStyle = isSelected ? panel.alchemy.color : '#8C8C84';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(panel.alchemy.symbol, symbolX, symbolY);

      // Answer text
      const textX = px + 80;
      const textMaxW = panel.w - 96;
      const ansFont = "400 16px 'Nunito', sans-serif";
      const textColor = isSelected ? '#F5F5F0' : '#C2C2B8';

      const lines = wrapText(panel.choice.text, textMaxW, ansFont);
      ctx.font = ansFont;
      ctx.fillStyle = textColor;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';

      const lineH = 20;
      const totalTextH = lines.length * lineH;
      const textStartY = py + (panel.h - totalTextH) / 2 + lineH / 2;

      lines.forEach((line, li) => {
        ctx.fillText(line, textX, textStartY + li * lineH);
      });

      // Selection indicator (small diamond on left)
      if (isSelected && !isActivating) {
        const indX = px - 12;
        const indY = py + panel.h / 2;
        const pulseSize = 5 + Math.sin(gameTime * 4) * 1.5;
        ctx.save();
        ctx.translate(indX, indY);
        ctx.rotate(Math.PI / 4);
        ctx.fillStyle = panel.alchemy.color;
        ctx.fillRect(-pulseSize, -pulseSize, pulseSize * 2, pulseSize * 2);
        ctx.restore();
      }

      ctx.restore();
    });

    // Draw particles
    particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;
    if (activatingPanel >= 0) return; // Already activating

    if (e.code === 'ArrowUp' || e.code === 'KeyW') {
      e.preventDefault();
      const newIdx = selectedIndex - 2;
      if (newIdx >= 0) {
        selectedIndex = newIdx;
        playSound('select');
      }
    } else if (e.code === 'ArrowDown' || e.code === 'KeyS') {
      e.preventDefault();
      const newIdx = selectedIndex + 2;
      if (newIdx < panels.length) {
        selectedIndex = newIdx;
        playSound('select');
      }
    } else if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
      e.preventDefault();
      if (selectedIndex % 2 === 1) {
        selectedIndex -= 1;
        playSound('select');
      }
    } else if (e.code === 'ArrowRight' || e.code === 'KeyD') {
      e.preventDefault();
      if (selectedIndex % 2 === 0 && selectedIndex + 1 < panels.length) {
        selectedIndex += 1;
        playSound('select');
      }
    } else if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      activatingPanel = selectedIndex;
      activationTimer = 0;
      playSound('activate');
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
