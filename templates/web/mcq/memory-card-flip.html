<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Card Flip</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1C1C1A;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #FAFAF7;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = "bold 18px 'Nunito Sans', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = "bold 36px 'Nunito Sans', sans-serif";
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // Colors
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC',
    cardBack: '#4ECDC4',
    cardBackDark: '#3DBDB5'
  };

  // Game state
  let cards = [];
  let flippedCards = [];
  let lockedCards = [];
  let selectedAnswer = null;
  let gameTime = 0;
  let particles = [];
  let entranceAnimTime = 0;
  let shakeCard = null;
  let shakeTime = 0;

  // Card dimensions
  const CARD_W = 155;
  const CARD_H = 115;
  const GAP = 16;
  const COLS = 4;
  const ROWS = 2;

  // Audio context for sound effects
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'flip') {
      osc.frequency.value = 440;
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialDecayTo && gain.gain.exponentialDecayTo(0.01, audioCtx.currentTime + 0.1);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'correct') {
      osc.frequency.value = 523;
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      osc.start();
      setTimeout(() => {
        osc.frequency.value = 659;
      }, 100);
      setTimeout(() => {
        osc.frequency.value = 784;
      }, 200);
      osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.value = 200;
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    } else if (type === 'click') {
      osc.frequency.value = 600;
      gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.05);
    }
  }

  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function initGame() {
    cards = [];
    flippedCards = [];
    lockedCards = [];
    selectedAnswer = null;
    gameTime = 0;
    particles = [];
    entranceAnimTime = 0;
    shakeCard = null;
    shakeTime = 0;

    // Calculate grid position
    const gridW = COLS * CARD_W + (COLS - 1) * GAP;
    const gridH = ROWS * CARD_H + (ROWS - 1) * GAP;
    const startX = (W - gridW) / 2;
    const startY = (H - gridH) / 2;

    // Create 8 cards: 4 with answers, 4 decoys
    const cardTypes = [];

    // Add answer cards (A, B, C, D)
    QUESTION.choices.forEach((choice, i) => {
      cardTypes.push({
        type: 'answer',
        choiceIndex: i,
        choice: choice,
        label: String.fromCharCode(65 + i)
      });
    });

    // Add 4 decoy cards (question marks)
    for (let i = 0; i < 4; i++) {
      cardTypes.push({
        type: 'decoy',
        label: '?'
      });
    }

    // Shuffle positions
    shuffleArray(cardTypes);

    // Create card objects
    for (let row = 0; row < ROWS; row++) {
      for (let col = 0; col < COLS; col++) {
        const idx = row * COLS + col;
        const cardType = cardTypes[idx];
        cards.push({
          x: startX + col * (CARD_W + GAP),
          y: startY + row * (CARD_H + GAP),
          w: CARD_W,
          h: CARD_H,
          flipped: false,
          flipProgress: 0,
          ...cardType,
          scale: 0,
          alpha: 0,
          entranceDelay: idx * 60
        });
      }
    }
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt * 1000;
    entranceAnimTime += dt;

    // Update entrance animations
    cards.forEach(card => {
      if (gameTime > card.entranceDelay) {
        const t = Math.min((gameTime - card.entranceDelay) / 350, 1);
        const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
        card.scale = t * spring;
        card.alpha = t;
        if (t >= 1) {
          card.scale = 1;
          card.alpha = 1;
        }
      }
    });

    // Update flip animations
    cards.forEach(card => {
      if (card.flipped && card.flipProgress < 1) {
        card.flipProgress = Math.min(card.flipProgress + dt * 4, 1);
      } else if (!card.flipped && card.flipProgress > 0) {
        card.flipProgress = Math.max(card.flipProgress - dt * 4, 0);
      }
    });

    // Update shake animation
    if (shakeCard && shakeTime > 0) {
      shakeTime -= dt;
      if (shakeTime <= 0) {
        shakeCard = null;
      }
    }

    // Update particles
    particles = particles.filter(p => {
      p.vy += 600 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.alpha -= dt * 0.8;
      return p.alpha > 0 && p.y < H + 50;
    });
  }

  function spawnConfetti(x, y) {
    const colors = [COLORS.orange, COLORS.amber, COLORS.cyan, COLORS.success];
    for (let i = 0; i < 25; i++) {
      particles.push({
        x, y,
        vx: (Math.random() - 0.5) * 350,
        vy: -Math.random() * 250 - 80,
        color: colors[Math.floor(Math.random() * colors.length)],
        size: Math.random() * 7 + 3,
        rotation: Math.random() * Math.PI * 2,
        rotationSpeed: (Math.random() - 0.5) * 8,
        alpha: 1
      });
    }
  }

  function drawCard(card) {
    const flip = card.flipProgress;
    const scaleX = Math.abs(Math.cos(flip * Math.PI));

    // Calculate shake offset
    let shakeOffset = 0;
    if (card === shakeCard && shakeTime > 0) {
      const decay = shakeTime / 0.4;
      shakeOffset = Math.sin(shakeTime * 25 * Math.PI) * 8 * decay;
    }

    ctx.save();
    ctx.globalAlpha = card.alpha;
    ctx.translate(card.x + card.w / 2 + shakeOffset, card.y + card.h / 2);
    ctx.scale(card.scale * scaleX, card.scale);

    const isShowingFront = flip > 0.5;

    if (isShowingFront) {
      // Front of card (answer or decoy)
      ctx.fillStyle = COLORS.bgSurface;
      ctx.beginPath();
      ctx.roundRect(-card.w / 2, -card.h / 2, card.w, card.h, 12);
      ctx.fill();

      // Border
      ctx.strokeStyle = card.type === 'answer' ? COLORS.cyan : COLORS.borderSubtle;
      ctx.lineWidth = 2;
      ctx.stroke();

      // Content
      if (card.type === 'answer') {
        // Draw answer label (A, B, C, D)
        ctx.fillStyle = COLORS.orange;
        ctx.font = "700 22px 'Belanosima', sans-serif";
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(card.label, 0, -30);

        // Draw answer text with wrapping
        ctx.fillStyle = COLORS.textPrimary;
        ctx.font = "400 16px 'Nunito', sans-serif";
        const text = card.choice.text;
        const maxWidth = card.w - 16;
        const words = text.split(' ');
        let line = '';
        let lines = [];

        for (let word of words) {
          const testLine = line + (line ? ' ' : '') + word;
          if (ctx.measureText(testLine).width > maxWidth && line) {
            lines.push(line);
            line = word;
          } else {
            line = testLine;
          }
        }
        lines.push(line);

        // Show up to 5 lines for full 60-char text
        const displayLines = lines.slice(0, 5);
        const lineHeight = 15;
        const startY = 2;

        displayLines.forEach((l, i) => {
          ctx.fillText(l, 0, startY + i * lineHeight);
        });
      } else {
        // Decoy card - question mark
        ctx.fillStyle = COLORS.textSecondary;
        ctx.font = "700 40px 'Belanosima', sans-serif";
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('?', 0, 0);
      }
    } else {
      // Back of card (face-down)
      // Card gradient background
      const grad = ctx.createLinearGradient(-card.w / 2, -card.h / 2, card.w / 2, card.h / 2);
      grad.addColorStop(0, COLORS.cardBack);
      grad.addColorStop(1, COLORS.cardBackDark);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(-card.w / 2, -card.h / 2, card.w, card.h, 12);
      ctx.fill();

      // Pattern on back
      ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
      for (let i = -2; i <= 2; i++) {
        for (let j = -1; j <= 1; j++) {
          ctx.beginPath();
          ctx.arc(i * 25, j * 25, 4, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // Center icon
      ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
      ctx.font = "700 28px 'Belanosima', sans-serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('Q', 0, 0);
    }

    ctx.restore();
  }

  function drawGame() {
    // Clear canvas
    ctx.fillStyle = COLORS.bgPrimary;
    ctx.fillRect(0, 0, W, H);

    // Draw cards
    cards.forEach(card => drawCard(card));

    // Draw particles
    particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Draw selection prompt if cards are flipped
    const flippedAnswerCards = cards.filter(c => c.flipped && c.type === 'answer');
    if (flippedAnswerCards.length > 0 && !selectedAnswer) {
      ctx.fillStyle = COLORS.textSecondary;
      ctx.font = "500 16px 'Nunito Sans', sans-serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('Click a flipped answer card to select it', W / 2, H - 40);
    }
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;
    // Keyboard not used in this game
  }

  // Mouse handling
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'playing') return;

    initAudio();
    const { x, y } = screenToLogical(e.clientX, e.clientY);

    // Find clicked card
    for (const card of cards) {
      if (x >= card.x && x <= card.x + card.w &&
          y >= card.y && y <= card.y + card.h &&
          card.alpha > 0.5) {

        if (!card.flipped) {
          // Flip the card
          if (flippedCards.length < 2 && !lockedCards.includes(card)) {
            card.flipped = true;
            flippedCards.push(card);
            playSound('flip');

            // If two cards are flipped
            if (flippedCards.length === 2) {
              setTimeout(() => {
                // Check if both are decoys - flip them back
                const bothDecoys = flippedCards.every(c => c.type === 'decoy');
                if (bothDecoys) {
                  flippedCards.forEach(c => c.flipped = false);
                }
                flippedCards = [];
              }, 1200);
            }
          }
        } else if (card.type === 'answer') {
          // Select this answer
          selectedAnswer = card;
          playSound('click');

          if (card.choice.is_correct) {
            playSound('correct');
            spawnConfetti(card.x + card.w / 2, card.y + card.h / 2);
            setTimeout(() => {
              engine.end(true, card.choice.explanation);
            }, 500);
          } else {
            playSound('wrong');
            shakeCard = card;
            shakeTime = 0.4;
            setTimeout(() => {
              engine.end(false, card.choice.explanation);
            }, 500);
          }
        }
        break;
      }
    }
  });

  // Hover effect
  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'playing') return;
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    let hovering = false;

    for (const card of cards) {
      if (x >= card.x && x <= card.x + card.w &&
          y >= card.y && y <= card.y + card.h &&
          card.alpha > 0.5) {
        hovering = true;
        break;
      }
    }

    canvas.style.cursor = hovering ? 'pointer' : 'default';
  });

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
