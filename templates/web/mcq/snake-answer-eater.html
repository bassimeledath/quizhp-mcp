<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Answer Eater</title>
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    :root {
      --orange-primary: #E87A3E;
      --orange-hover: #D66B31;
      --amber-primary: #F5A742;
      --cyan-primary: #4ECDC4;
      --success: #6BBF59;
      --error: #E85D4A;
      --bg-primary: #1C1C1A;
      --bg-surface: #2A2A27;
      --text-primary: #F5F5F0;
      --text-secondary: #C2C2B8;
      --border-subtle: #424240;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1C1C1A;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #2A2A27;
      border-radius: 12px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  Snake Answer Eater - Navigate snake to eat the correct answer             ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // Reduced motion preference
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // Grid configuration
  const GRID_SIZE = 30;
  const COLS = 24;  // 720 / 30 = 24
  const ROWS = 18;  // 540 / 30 = 18

  // Answer box dimensions (in grid cells)
  const BOX_WIDTH = 6;
  const BOX_HEIGHT = 3;

  // Game state
  let snake = [];
  let direction = { x: 0, y: 0 };
  let moving = false;
  let moveTimer = 0;
  const MOVE_INTERVAL = 0.12;
  let moveCount = 0;
  let answerBoxes = [];
  let gameTime = 0;

  // Visual effects state
  let snakeTrail = [];
  let eatParticles = [];
  let screenShake = { x: 0, y: 0, intensity: 0 };
  let gridPulse = 0;
  let collisionBox = null;

  // Smooth snake animation (interpolation)
  let snakeVisual = [];

  // QuizHP Theme colors
  const COLORS = {
    bg: '#1C1C1A',
    bgSurface: '#2A2A27',
    grid: '#363633',
    gridGlow: '#424240',
    panel: '#363633',
    panelHover: '#424240',
    border: '#4ECDC4',
    borderSubtle: '#5A5A56',
    snakeHead: '#6BBF59',
    snakeHeadGlow: 'rgba(107, 191, 89, 0.4)',
    snakeBody: '#E87A3E',
    snakeBodyGlow: 'rgba(232, 122, 62, 0.3)',
    snakeTail: '#D66B31',
    text: '#F5F5F0',
    textSecondary: '#C2C2B8',
    success: '#6BBF59',
    error: '#E85D4A',
    cyan: '#4ECDC4',
    amber: '#F5A742'
  };

  // Audio context for sound effects
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }

  function playSound(type) {
    if (!audioCtx || prefersReducedMotion) return;
    try {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      if (type === 'move') {
        osc.frequency.setValueAtTime(150 + Math.random() * 50, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.05);
      } else if (type === 'correct') {
        osc.frequency.setValueAtTime(523, audioCtx.currentTime);
        osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
        osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.4);
      } else if (type === 'wrong') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.25);
      } else if (type === 'turn') {
        osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.03);
      }
    } catch (e) { /* Audio not available */ }
  }

  function spawnEatParticles(x, y, isCorrect) {
    if (prefersReducedMotion) return;
    const colors = isCorrect
      ? [COLORS.success, COLORS.cyan, COLORS.amber, '#FFFFFF']
      : [COLORS.error, '#D04A3A', '#B83A2A'];
    const count = isCorrect ? 40 : 20;

    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i) / count + Math.random() * 0.3;
      const speed = isCorrect ? 150 + Math.random() * 200 : 100 + Math.random() * 100;
      eatParticles.push({
        x: x,
        y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - (isCorrect ? 100 : 50),
        size: 3 + Math.random() * 5,
        color: colors[Math.floor(Math.random() * colors.length)],
        alpha: 1,
        gravity: 400,
        rotation: Math.random() * Math.PI * 2,
        rotationSpeed: (Math.random() - 0.5) * 10
      });
    }
  }

  function triggerScreenShake(intensity) {
    if (prefersReducedMotion) return;
    screenShake.intensity = intensity;
  }

  function initGame() {
    // Initialize snake in center
    const centerX = Math.floor(COLS / 2);
    const centerY = Math.floor(ROWS / 2);

    snake = [
      { x: centerX, y: centerY },
      { x: centerX - 1, y: centerY },
      { x: centerX - 2, y: centerY }
    ];

    // Initialize visual positions
    snakeVisual = snake.map(s => ({ x: s.x, y: s.y }));

    direction = { x: 0, y: 0 };
    moving = false;
    moveTimer = 0;
    moveCount = 0;
    gameTime = 0;
    snakeTrail = [];
    eatParticles = [];
    screenShake = { x: 0, y: 0, intensity: 0 };
    gridPulse = 0;
    collisionBox = null;

    // Create answer boxes at corners
    createAnswerBoxes();
  }

  function createAnswerBoxes() {
    answerBoxes = [];

    // Position answer boxes at four corners with margin
    const positions = [
      { x: 1, y: 1 },                         // Top-left
      { x: COLS - BOX_WIDTH - 1, y: 1 },      // Top-right
      { x: 1, y: ROWS - BOX_HEIGHT - 1 },     // Bottom-left
      { x: COLS - BOX_WIDTH - 1, y: ROWS - BOX_HEIGHT - 1 } // Bottom-right
    ];

    const choices = QUESTION.choices || [];

    for (let i = 0; i < Math.min(4, choices.length); i++) {
      answerBoxes.push({
        x: positions[i].x,
        y: positions[i].y,
        width: BOX_WIDTH,
        height: BOX_HEIGHT,
        text: choices[i].text,
        choiceIndex: i,
        pulsePhase: Math.random() * Math.PI * 2,
        scale: 1,
        glowIntensity: 0
      });
    }
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Update screen shake
    if (screenShake.intensity > 0) {
      screenShake.x = (Math.random() - 0.5) * screenShake.intensity * 2;
      screenShake.y = (Math.random() - 0.5) * screenShake.intensity * 2;
      screenShake.intensity *= 0.85;
      if (screenShake.intensity < 0.5) {
        screenShake.intensity = 0;
        screenShake.x = 0;
        screenShake.y = 0;
      }
    }

    // Update particles
    eatParticles = eatParticles.filter(p => {
      p.vy += p.gravity * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.alpha -= dt * 1.5;
      p.vx *= 0.98;
      return p.alpha > 0 && p.y < H + 50;
    });

    // Update trail
    snakeTrail = snakeTrail.filter(t => {
      t.alpha -= dt * 3;
      return t.alpha > 0;
    });

    // Update answer box animations
    for (const box of answerBoxes) {
      box.pulsePhase += dt * 2;

      // Check proximity to snake head for glow effect
      if (snake.length > 0) {
        const head = snake[0];
        const boxCenterX = box.x + box.width / 2;
        const boxCenterY = box.y + box.height / 2;
        const dist = Math.sqrt(Math.pow(head.x - boxCenterX, 2) + Math.pow(head.y - boxCenterY, 2));
        const targetGlow = dist < 5 ? 1 - dist / 5 : 0;
        box.glowIntensity += (targetGlow - box.glowIntensity) * dt * 5;
      }
    }

    // Only move if snake has started moving
    if (!moving) return;

    // Accumulate time
    moveTimer += dt;

    // Update smooth visual positions - lerp toward actual snake positions
    const lerpSpeed = 18; // How fast visuals catch up to actual positions
    for (let i = 0; i < snake.length; i++) {
      if (!snakeVisual[i]) continue;

      const target = snake[i];
      const visual = snakeVisual[i];

      // Smoothly interpolate visual position toward actual position
      visual.x += (target.x - visual.x) * Math.min(1, dt * lerpSpeed);
      visual.y += (target.y - visual.y) * Math.min(1, dt * lerpSpeed);
    }

    // Move snake at regular intervals
    if (moveTimer >= MOVE_INTERVAL) {
      moveTimer = 0;
      moveSnake();
    }
  }

  function moveSnake() {
    const head = snake[0];

    // Add trail at current head position
    if (!prefersReducedMotion) {
      snakeTrail.push({
        x: head.x,
        y: head.y,
        alpha: 0.6
      });
    }

    // Calculate new head position
    const newHead = {
      x: head.x + direction.x,
      y: head.y + direction.y
    };

    // Check wall collision
    if (newHead.x < 0 || newHead.x >= COLS || newHead.y < 0 || newHead.y >= ROWS) {
      playSound('wrong');
      triggerScreenShake(15);
      setTimeout(() => {
        engine.end(false, 'Hit the wall!');
      }, 200);
      return;
    }

    // Check self collision
    for (const segment of snake) {
      if (segment.x === newHead.x && segment.y === newHead.y) {
        playSound('wrong');
        triggerScreenShake(15);
        setTimeout(() => {
          engine.end(false, 'Hit yourself!');
        }, 200);
        return;
      }
    }

    // Check answer box collision
    for (const box of answerBoxes) {
      if (newHead.x >= box.x && newHead.x < box.x + box.width &&
          newHead.y >= box.y && newHead.y < box.y + box.height) {
        const choice = QUESTION.choices[box.choiceIndex];
        const isCorrect = choice.is_correct;
        const explanation = choice.explanation || '';

        collisionBox = box;
        const particleX = (box.x + box.width / 2) * GRID_SIZE;
        const particleY = (box.y + box.height / 2) * GRID_SIZE;
        spawnEatParticles(particleX, particleY, isCorrect);

        if (isCorrect) {
          playSound('correct');
          gridPulse = 1;
        } else {
          playSound('wrong');
          triggerScreenShake(20);
        }

        setTimeout(() => {
          engine.end(isCorrect, explanation);
        }, isCorrect ? 400 : 300);
        return;
      }
    }

    // Play move sound
    playSound('move');

    // Move snake
    snake.unshift(newHead);
    snakeVisual.unshift({ x: head.x, y: head.y }); // Start from previous head position

    // Grow snake every 5 moves, otherwise remove tail
    moveCount++;
    if (moveCount % 5 !== 0) {
      snake.pop();
      snakeVisual.pop();
    }
  }

  function drawGame() {
    // Apply screen shake
    ctx.save();
    ctx.translate(screenShake.x, screenShake.y);

    // Clear canvas
    ctx.fillStyle = COLORS.bg;
    ctx.fillRect(-20, -20, W + 40, H + 40);

    // Draw grid with subtle glow
    drawGrid();

    // Draw trail
    drawTrail();

    // Draw answer boxes
    for (const box of answerBoxes) {
      drawAnswerBox(box);
    }

    // Draw snake
    drawSnake();

    // Draw particles
    drawParticles();

    // Draw instruction if not moving
    if (!moving) {
      drawInstruction();
    }

    ctx.restore();
  }

  function drawGrid() {
    // Subtle grid pulse on correct answer
    const pulseAlpha = gridPulse * 0.3;
    if (gridPulse > 0) {
      gridPulse *= 0.95;
    }

    ctx.strokeStyle = COLORS.grid;
    ctx.lineWidth = 1;

    for (let x = 0; x <= COLS; x++) {
      ctx.beginPath();
      ctx.moveTo(x * GRID_SIZE, 0);
      ctx.lineTo(x * GRID_SIZE, ROWS * GRID_SIZE);
      ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
      ctx.beginPath();
      ctx.moveTo(0, y * GRID_SIZE);
      ctx.lineTo(COLS * GRID_SIZE, y * GRID_SIZE);
      ctx.stroke();
    }

    // Grid glow effect around snake head
    if (snake.length > 0 && moving) {
      const head = snakeVisual[0] || snake[0];
      const glowX = head.x * GRID_SIZE + GRID_SIZE / 2;
      const glowY = head.y * GRID_SIZE + GRID_SIZE / 2;

      const gradient = ctx.createRadialGradient(glowX, glowY, 0, glowX, glowY, GRID_SIZE * 3);
      gradient.addColorStop(0, 'rgba(107, 191, 89, 0.15)');
      gradient.addColorStop(1, 'rgba(107, 191, 89, 0)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, W, H);
    }

    // Global pulse on success
    if (pulseAlpha > 0.01) {
      ctx.fillStyle = `rgba(107, 191, 89, ${pulseAlpha})`;
      ctx.fillRect(0, 0, W, H);
    }
  }

  function drawTrail() {
    for (const t of snakeTrail) {
      ctx.fillStyle = `rgba(232, 122, 62, ${t.alpha * 0.3})`;
      ctx.beginPath();
      ctx.roundRect(
        t.x * GRID_SIZE + 6,
        t.y * GRID_SIZE + 6,
        GRID_SIZE - 12,
        GRID_SIZE - 12,
        4
      );
      ctx.fill();
    }
  }

  function drawAnswerBox(box) {
    const boxX = box.x * GRID_SIZE;
    const boxY = box.y * GRID_SIZE;
    const boxW = box.width * GRID_SIZE;
    const boxH = box.height * GRID_SIZE;

    // Pulse animation
    const pulse = Math.sin(box.pulsePhase) * 0.02 + 1;
    const glowSize = box.glowIntensity * 10;

    ctx.save();

    // Center transform for pulse
    const centerX = boxX + boxW / 2;
    const centerY = boxY + boxH / 2;
    ctx.translate(centerX, centerY);
    ctx.scale(pulse, pulse);
    ctx.translate(-centerX, -centerY);

    // Glow effect when snake is nearby
    if (box.glowIntensity > 0.01) {
      ctx.shadowColor = COLORS.cyan;
      ctx.shadowBlur = 15 * box.glowIntensity;
    }

    // Box background
    ctx.fillStyle = box.glowIntensity > 0.1 ? COLORS.panelHover : COLORS.panel;
    ctx.beginPath();
    ctx.roundRect(boxX + 2, boxY + 2, boxW - 4, boxH - 4, 8);
    ctx.fill();

    // Box border with glow
    const borderColor = box.glowIntensity > 0.1 ? COLORS.cyan : COLORS.borderSubtle;
    ctx.strokeStyle = borderColor;
    ctx.lineWidth = 2 + box.glowIntensity;
    ctx.stroke();

    ctx.shadowBlur = 0;

    // Draw wrapped text
    drawWrappedText(box.text, boxX + 10, boxY + 10, boxW - 20, boxH - 20);

    ctx.restore();
  }

  function drawSnake() {
    // Draw body segments first (back to front)
    for (let i = snake.length - 1; i >= 0; i--) {
      const visual = snakeVisual[i] || snake[i];
      const segment = snake[i];
      const isHead = i === 0;
      const isTail = i === snake.length - 1;

      const x = visual.x * GRID_SIZE;
      const y = visual.y * GRID_SIZE;

      // Segment glow
      if (!prefersReducedMotion && moving) {
        ctx.shadowColor = isHead ? COLORS.snakeHeadGlow : COLORS.snakeBodyGlow;
        ctx.shadowBlur = isHead ? 15 : 8;
      }

      // Gradient for body
      let segmentColor;
      if (isHead) {
        segmentColor = COLORS.snakeHead;
      } else if (isTail) {
        segmentColor = COLORS.snakeTail;
      } else {
        // Gradient from head color to tail color
        const t = i / (snake.length - 1);
        segmentColor = COLORS.snakeBody;
      }

      ctx.fillStyle = segmentColor;
      ctx.beginPath();
      ctx.roundRect(
        x + 3,
        y + 3,
        GRID_SIZE - 6,
        GRID_SIZE - 6,
        isHead ? 6 : 4
      );
      ctx.fill();

      ctx.shadowBlur = 0;

      // Draw eyes on head
      if (isHead) {
        drawSnakeHead(x, y);
      }
    }
  }

  function drawSnakeHead(x, y) {
    const cx = x + GRID_SIZE / 2;
    const cy = y + GRID_SIZE / 2;

    // Eye positions based on direction
    let leftEyeX, leftEyeY, rightEyeX, rightEyeY;
    const eyeOffset = 6;
    const eyeForward = 4;

    if (direction.x === 1) { // Right
      leftEyeX = cx + eyeForward; leftEyeY = cy - eyeOffset;
      rightEyeX = cx + eyeForward; rightEyeY = cy + eyeOffset;
    } else if (direction.x === -1) { // Left
      leftEyeX = cx - eyeForward; leftEyeY = cy - eyeOffset;
      rightEyeX = cx - eyeForward; rightEyeY = cy + eyeOffset;
    } else if (direction.y === 1) { // Down
      leftEyeX = cx - eyeOffset; leftEyeY = cy + eyeForward;
      rightEyeX = cx + eyeOffset; rightEyeY = cy + eyeForward;
    } else if (direction.y === -1) { // Up
      leftEyeX = cx - eyeOffset; leftEyeY = cy - eyeForward;
      rightEyeX = cx + eyeOffset; rightEyeY = cy - eyeForward;
    } else { // Not moving - eyes forward (right default)
      leftEyeX = cx + eyeForward; leftEyeY = cy - eyeOffset;
      rightEyeX = cx + eyeForward; rightEyeY = cy + eyeOffset;
    }

    // Draw eyes
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath();
    ctx.arc(leftEyeX, leftEyeY, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(rightEyeX, rightEyeY, 4, 0, Math.PI * 2);
    ctx.fill();

    // Pupils
    ctx.fillStyle = '#1C1C1A';
    const pupilOffset = 1.5;
    ctx.beginPath();
    ctx.arc(leftEyeX + direction.x * pupilOffset, leftEyeY + direction.y * pupilOffset, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(rightEyeX + direction.x * pupilOffset, rightEyeY + direction.y * pupilOffset, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawParticles() {
    for (const p of eatParticles) {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  function drawInstruction() {
    // Subtle breathing animation
    const breathe = Math.sin(gameTime * 2) * 0.02 + 1;

    ctx.save();
    ctx.translate(W / 2, H / 2 + 80);
    ctx.scale(breathe, breathe);
    ctx.translate(-W / 2, -(H / 2 + 80));

    ctx.fillStyle = COLORS.textSecondary;
    ctx.font = "500 16px 'Nunito Sans', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Press arrow keys to start', W / 2, H / 2 + 80);

    ctx.restore();
  }

  function drawWrappedText(text, x, y, maxWidth, maxHeight) {
    if (!text) return;

    ctx.fillStyle = COLORS.text;
    ctx.font = "400 14px 'Nunito', sans-serif";
    ctx.textBaseline = 'top';
    ctx.textAlign = 'left';

    const lineHeight = 18;
    const words = text.split(' ');
    let line = '';
    const lines = [];

    // Calculate lines
    for (const word of words) {
      const testLine = line ? line + ' ' + word : word;
      const metrics = ctx.measureText(testLine);
      if (metrics.width > maxWidth && line) {
        lines.push(line);
        line = word;
      } else {
        line = testLine;
      }
    }
    if (line) lines.push(line);

    // Draw centered vertically within the box
    const totalTextHeight = lines.length * lineHeight;
    const startY = y + (maxHeight - totalTextHeight) / 2;

    for (let i = 0; i < lines.length; i++) {
      const lineY = startY + i * lineHeight;
      if (lineY + lineHeight <= y + maxHeight) {
        ctx.fillText(lines[i], x, lineY);
      }
    }
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;

    let newDir = null;

    // Prevent reversing direction
    if (e.code === 'ArrowUp' && direction.y === 0) {
      newDir = { x: 0, y: -1 };
    } else if (e.code === 'ArrowDown' && direction.y === 0) {
      newDir = { x: 0, y: 1 };
    } else if (e.code === 'ArrowLeft' && direction.x === 0) {
      newDir = { x: -1, y: 0 };
    } else if (e.code === 'ArrowRight' && direction.x === 0) {
      newDir = { x: 1, y: 0 };
    }

    if (newDir) {
      initAudio();
      if (moving && (newDir.x !== direction.x || newDir.y !== direction.y)) {
        playSound('turn');
      }
      direction = newDir;
      moving = true;
      e.preventDefault();
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });


  // Cursor change handler for end screen buttons
  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'ended') {
      canvas.style.cursor = 'default';
      return;
    }
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    if (gameResult) {
      if (pointInRect(x, y, restartButton) || pointInRect(x, y, nextButton)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    } else {
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    }
    canvas.style.cursor = 'default';
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
