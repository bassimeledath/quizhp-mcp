<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ancient Temple Runes</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgPrimary: '#1C1C1A',
    bgSurface: '#2A2A27',
    surfaceSecondary: '#363633',
    borderSubtle: '#424240',
    borderStrong: '#5A5A56',
    textPrimary: '#F5F5F0',
    textSecondary: '#C2C2B8',
    textTertiary: '#8C8C84',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    peach: '#FFB89D'
  };

  // === RUNE DRAWING ===
  // Draw rune symbols procedurally to avoid font dependency
  function drawRuneSymbol(cx, cy, index, color, glowAmount) {
    ctx.save();
    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.shadowColor = color;
    ctx.shadowBlur = 10 + glowAmount * 15;

    const s = 12; // scale factor

    if (index === 0) {
      // Fehu-like: vertical line with two branches top-right
      ctx.beginPath();
      ctx.moveTo(cx, cy + s);
      ctx.lineTo(cx, cy - s);
      ctx.moveTo(cx, cy - s);
      ctx.lineTo(cx + s * 0.8, cy - s * 0.3);
      ctx.moveTo(cx, cy - s * 0.3);
      ctx.lineTo(cx + s * 0.8, cy + s * 0.3);
      ctx.stroke();
    } else if (index === 1) {
      // Uruz-like: arch shape
      ctx.beginPath();
      ctx.moveTo(cx - s * 0.6, cy + s);
      ctx.lineTo(cx - s * 0.6, cy - s * 0.5);
      ctx.quadraticCurveTo(cx, cy - s * 1.2, cx + s * 0.6, cy - s * 0.5);
      ctx.lineTo(cx + s * 0.6, cy + s);
      ctx.stroke();
    } else if (index === 2) {
      // Thurisaz-like: vertical with a thorn
      ctx.beginPath();
      ctx.moveTo(cx, cy + s);
      ctx.lineTo(cx, cy - s);
      ctx.moveTo(cx, cy - s * 0.2);
      ctx.lineTo(cx + s * 0.8, cy);
      ctx.lineTo(cx, cy + s * 0.4);
      ctx.stroke();
    } else {
      // Ansuz-like: vertical with two diagonal branches
      ctx.beginPath();
      ctx.moveTo(cx, cy + s);
      ctx.lineTo(cx, cy - s);
      ctx.moveTo(cx, cy - s * 0.5);
      ctx.lineTo(cx + s * 0.7, cy - s);
      ctx.moveTo(cx, cy + s * 0.1);
      ctx.lineTo(cx + s * 0.7, cy - s * 0.4);
      ctx.stroke();
    }

    ctx.restore();
  }

  // === AUDIO ===
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playSound(type) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'click') {
      osc.frequency.value = 600;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'correct') {
      osc.frequency.value = 523;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.5);
      // Second note
      const osc2 = audioCtx.createOscillator();
      const gain2 = audioCtx.createGain();
      osc2.connect(gain2);
      gain2.connect(audioCtx.destination);
      osc2.frequency.value = 659;
      osc2.type = 'sine';
      gain2.gain.setValueAtTime(0.2, audioCtx.currentTime + 0.15);
      gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
      osc2.start(audioCtx.currentTime + 0.15);
      osc2.stop(audioCtx.currentTime + 0.6);
    } else if (type === 'wrong') {
      osc.frequency.value = 200;
      osc.type = 'sawtooth';
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'hover') {
      osc.frequency.value = 440;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.06);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.06);
    }
  }

  // === GAME STATE ===
  let runes = [];
  let altarParticles = [];
  let ambientParticles = [];
  let hoveredRune = -1;
  let selectedRune = -1;
  let selectionTime = 0;
  let gameTime = 0;
  let entranceProgress = 0;
  let mossVines = [];

  // Word-wrap text helper
  function wrapText(text, maxWidth, font) {
    ctx.font = font;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';

    for (let i = 0; i < words.length; i++) {
      const testLine = currentLine ? currentLine + ' ' + words[i] : words[i];
      if (ctx.measureText(testLine).width > maxWidth && currentLine) {
        lines.push(currentLine);
        currentLine = words[i];
      } else {
        currentLine = testLine;
      }
    }
    if (currentLine) lines.push(currentLine);
    return lines;
  }

  function initGame() {
    runes = [];
    altarParticles = [];
    ambientParticles = [];
    hoveredRune = -1;
    selectedRune = -1;
    selectionTime = 0;
    gameTime = 0;
    entranceProgress = 0;

    // Create moss vine decorations
    mossVines = [];
    for (let i = 0; i < 12; i++) {
      mossVines.push({
        x: Math.random() * W,
        y: Math.random() * 80,
        length: 30 + Math.random() * 60,
        sway: Math.random() * Math.PI * 2,
        speed: 0.5 + Math.random() * 1.0
      });
    }

    // Layout: 2 rows of 2 rune stones, centered, with text below each
    const runeW = 320;
    const runeH = 100;
    const gapX = 24;
    const gapY = 20;
    const gridW = runeW * 2 + gapX;
    const gridH = runeH * 2 + gapY;
    const startX = (W - gridW) / 2;
    const startY = (H - gridH) / 2 + 30;

    const positions = [
      { x: startX, y: startY },
      { x: startX + runeW + gapX, y: startY },
      { x: startX, y: startY + runeH + gapY },
      { x: startX + runeW + gapX, y: startY + runeH + gapY }
    ];

    QUESTION.choices.forEach((choice, i) => {
      const pos = positions[i];
      runes.push({
        x: pos.x,
        y: pos.y,
        w: runeW,
        h: runeH,
        choice: choice,
        index: i,
        runeIndex: i,
        glowIntensity: 0,
        glowPhase: Math.random() * Math.PI * 2,
        scale: 0,
        alpha: 0,
        shakeX: 0,
        pulseScale: 1,
        rotation: 0
      });
    });

    // Seed ambient particles
    for (let i = 0; i < 20; i++) {
      ambientParticles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 15,
        vy: -Math.random() * 20 - 5,
        size: 1 + Math.random() * 3,
        alpha: Math.random() * 0.5,
        color: Math.random() > 0.5 ? COLORS.cyan : COLORS.amber,
        life: Math.random()
      });
    }
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Entrance animation
    if (entranceProgress < 1) {
      entranceProgress = Math.min(1, entranceProgress + dt * 1.8);
      runes.forEach((rune, i) => {
        const delay = i * 0.12;
        const t = Math.max(0, Math.min(1, (entranceProgress - delay) / 0.4));
        // Spring easing
        const spring = t < 1 ? 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t) : 1;
        rune.scale = t * spring;
        rune.alpha = t;
      });
    }

    // Glow pulsing on runes
    runes.forEach((rune, i) => {
      rune.glowPhase += dt * (1.5 + i * 0.3);
      rune.glowIntensity = 0.3 + Math.sin(rune.glowPhase) * 0.2;

      if (hoveredRune === i) {
        rune.glowIntensity = 0.7 + Math.sin(rune.glowPhase * 2) * 0.15;
      }
    });

    // Selection animation
    if (selectedRune >= 0) {
      selectionTime += dt;
      const rune = runes[selectedRune];

      if (rune.choice.is_correct) {
        // Pulse up celebration
        rune.pulseScale = 1 + Math.sin(selectionTime * 8) * 0.05 * Math.max(0, 1 - selectionTime);
      } else {
        // Shake for wrong
        const decay = Math.max(0, 1 - selectionTime * 2.5);
        rune.shakeX = Math.sin(selectionTime * 30) * 8 * decay;
      }

      if (selectionTime > 0.6) {
        const choice = rune.choice;
        if (choice.is_correct) {
          playSound('correct');
        } else {
          playSound('wrong');
        }
        engine.end(choice.is_correct, choice.explanation);
      }
    }

    // Update ambient particles
    ambientParticles.forEach(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt * 0.3;
      p.alpha = Math.max(0, p.life * 0.5);
      if (p.life <= 0 || p.y < -10) {
        p.x = Math.random() * W;
        p.y = H + 10;
        p.life = 0.8 + Math.random() * 0.5;
        p.alpha = 0;
      }
    });

    // Update altar particles
    altarParticles = altarParticles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += p.gravity * dt;
      p.alpha -= dt * 1.5;
      p.rotation += p.rotationSpeed * dt;
      return p.alpha > 0;
    });
  }

  function drawGame() {
    // Dark temple background
    ctx.fillStyle = '#0D0D12';
    ctx.fillRect(0, 0, W, H);

    // Stone wall texture pattern
    const gradient = ctx.createLinearGradient(0, 0, 0, H);
    gradient.addColorStop(0, '#1A1A20');
    gradient.addColorStop(0.3, '#151518');
    gradient.addColorStop(0.7, '#121215');
    gradient.addColorStop(1, '#0D0D12');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, W, H);

    // Stone block pattern (subtle)
    ctx.strokeStyle = 'rgba(60, 60, 70, 0.15)';
    ctx.lineWidth = 1;
    for (let row = 0; row < 12; row++) {
      const y = row * 48;
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
      const offset = (row % 2) * 60;
      for (let col = 0; col < 8; col++) {
        const x = offset + col * 100;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x, y + 48);
        ctx.stroke();
      }
    }

    // Moss hanging from top
    mossVines.forEach(vine => {
      const sway = Math.sin(gameTime * vine.speed + vine.sway) * 5;
      ctx.strokeStyle = 'rgba(60, 120, 60, 0.3)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(vine.x, 0);
      ctx.quadraticCurveTo(vine.x + sway, vine.length * 0.5, vine.x + sway * 0.5, vine.length);
      ctx.stroke();

      // Small leaves
      for (let j = 0; j < 3; j++) {
        const t = (j + 1) / 4;
        const lx = vine.x + sway * t;
        const ly = vine.length * t;
        ctx.fillStyle = `rgba(50, ${100 + j * 20}, 50, 0.4)`;
        ctx.beginPath();
        ctx.ellipse(lx, ly, 4, 2, Math.sin(gameTime + j) * 0.3, 0, Math.PI * 2);
        ctx.fill();
      }
    });

    // Central altar glow
    const altarGlow = ctx.createRadialGradient(W / 2, H / 2 + 30, 0, W / 2, H / 2 + 30, 300);
    altarGlow.addColorStop(0, `rgba(232, 122, 62, ${0.06 + Math.sin(gameTime * 1.5) * 0.02})`);
    altarGlow.addColorStop(0.5, 'rgba(232, 122, 62, 0.02)');
    altarGlow.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.fillStyle = altarGlow;
    ctx.fillRect(0, 0, W, H);

    // Title text
    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = "700 28px 'Belanosima', sans-serif";
    ctx.fillStyle = COLORS.amber;
    ctx.shadowColor = COLORS.amber;
    ctx.shadowBlur = 15;
    ctx.fillText('Choose a Rune', W / 2, 38);
    ctx.shadowBlur = 0;
    ctx.restore();

    // Draw ambient particles
    ambientParticles.forEach(p => {
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Draw rune stones
    runes.forEach((rune, i) => {
      if (rune.alpha <= 0) return;

      ctx.save();
      ctx.globalAlpha = rune.alpha;

      const cx = rune.x + rune.w / 2;
      const cy = rune.y + rune.h / 2;

      // Apply scale and shake
      ctx.translate(cx + rune.shakeX, cy);
      ctx.scale(rune.scale * rune.pulseScale, rune.scale * rune.pulseScale);
      ctx.translate(-cx, -cy);

      // Glow behind the stone
      const glowColor = selectedRune === i
        ? (rune.choice.is_correct ? COLORS.success : COLORS.error)
        : (hoveredRune === i ? COLORS.cyan : COLORS.amber);

      const glowRadius = rune.glowIntensity * 25;
      ctx.shadowColor = glowColor;
      ctx.shadowBlur = glowRadius;

      // Stone background
      let stoneBg = COLORS.bgSurface;
      let borderColor = COLORS.borderSubtle;

      if (selectedRune === i) {
        stoneBg = rune.choice.is_correct ? '#1A3318' : '#331A1A';
        borderColor = rune.choice.is_correct ? COLORS.success : COLORS.error;
      } else if (hoveredRune === i) {
        stoneBg = '#2A3333';
        borderColor = COLORS.cyan;
      }

      // Draw stone slab
      ctx.fillStyle = stoneBg;
      ctx.beginPath();
      ctx.roundRect(rune.x, rune.y, rune.w, rune.h, 12);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Stone border
      ctx.strokeStyle = borderColor;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.roundRect(rune.x, rune.y, rune.w, rune.h, 12);
      ctx.stroke();

      // Rune symbol on the left (procedurally drawn)
      const symbolX = rune.x + 30;
      const symbolY = rune.y + rune.h / 2;
      drawRuneSymbol(symbolX, symbolY, rune.runeIndex, glowColor, rune.glowIntensity);

      // Answer text - wrapped
      const textX = rune.x + 58;
      const textMaxW = rune.w - 72;
      const answerFont = "400 16px 'Nunito', sans-serif";
      const lines = wrapText(rune.choice.text, textMaxW, answerFont);

      ctx.font = answerFont;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = COLORS.textPrimary;

      const lineHeight = 20;
      const totalTextH = lines.length * lineHeight;
      const textStartY = rune.y + (rune.h - totalTextH) / 2 + lineHeight / 2;

      lines.forEach((line, li) => {
        ctx.fillText(line, textX, textStartY + li * lineHeight);
      });

      // Decorative corner runes (small)
      ctx.font = "400 14px 'Belanosima', sans-serif";
      ctx.fillStyle = `rgba(${hoveredRune === i ? '78, 205, 196' : '245, 167, 66'}, ${0.2 + rune.glowIntensity * 0.3})`;
      ctx.textAlign = 'center';
      ctx.fillText('◆', rune.x + 12, rune.y + 12);
      ctx.fillText('◆', rune.x + rune.w - 12, rune.y + 12);
      ctx.fillText('◆', rune.x + 12, rune.y + rune.h - 12);
      ctx.fillText('◆', rune.x + rune.w - 12, rune.y + rune.h - 12);

      ctx.restore();
    });

    // Draw altar particles (selection effect)
    altarParticles.forEach(p => {
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
      ctx.restore();
    });
    ctx.globalAlpha = 1;

    // Bottom decorative stone edge
    const bottomGrad = ctx.createLinearGradient(0, H - 50, 0, H);
    bottomGrad.addColorStop(0, 'rgba(13, 13, 18, 0)');
    bottomGrad.addColorStop(1, 'rgba(30, 30, 25, 0.5)');
    ctx.fillStyle = bottomGrad;
    ctx.fillRect(0, H - 50, W, 50);
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;

    if (e.type === 'mousemove') {
      const { x, y } = screenToLogical(e.clientX, e.clientY);
      const prevHovered = hoveredRune;
      hoveredRune = -1;
      runes.forEach((rune, i) => {
        if (selectedRune >= 0) return;
        if (x >= rune.x && x <= rune.x + rune.w && y >= rune.y && y <= rune.y + rune.h) {
          hoveredRune = i;
        }
      });
      if (hoveredRune !== prevHovered && hoveredRune >= 0) {
        playSound('hover');
      }
      canvas.style.cursor = hoveredRune >= 0 ? 'pointer' : 'default';
    }

    if (e.type === 'click') {
      if (selectedRune >= 0) return;
      const { x, y } = screenToLogical(e.clientX, e.clientY);
      runes.forEach((rune, i) => {
        if (x >= rune.x && x <= rune.x + rune.w && y >= rune.y && y <= rune.y + rune.h) {
          selectedRune = i;
          selectionTime = 0;
          playSound('click');

          // Spawn rune absorption particles
          const cx = rune.x + rune.w / 2;
          const cy = rune.y + rune.h / 2;
          const pColor = rune.choice.is_correct ? COLORS.success : COLORS.error;
          for (let j = 0; j < 25; j++) {
            altarParticles.push({
              x: cx + (Math.random() - 0.5) * rune.w * 0.8,
              y: cy + (Math.random() - 0.5) * rune.h * 0.8,
              vx: (Math.random() - 0.5) * 200,
              vy: -Math.random() * 150 - 50,
              size: 3 + Math.random() * 5,
              color: Math.random() > 0.3 ? pColor : COLORS.amber,
              alpha: 0.9,
              rotation: Math.random() * Math.PI * 2,
              rotationSpeed: (Math.random() - 0.5) * 8,
              gravity: 100
            });
          }
        }
      });
    }
  }

  // Register mouse move and click on canvas
  canvas.addEventListener('mousemove', handleInput);
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'playing') return;
    handleInput(e);
  });

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
