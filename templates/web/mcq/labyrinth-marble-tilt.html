<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Labyrinth Marble Tilt</title>
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === GAME STATE ===
  let marble = { x: 0, y: 0, vx: 0, vy: 0, radius: 12 };
  let tilt = { x: 0, y: 0 };
  let keys = { up: false, down: false, left: false, right: false };
  let holes = [];
  let walls = [];
  let entranceAnim = 0;
  let selectedHole = null;
  let selectionTime = 0;

  // Physics constants
  const GRAVITY = 400;
  const FRICTION = 0.98;
  const TILT_SPEED = 3;
  const TILT_MAX = 0.15;
  const BOARD_MARGIN = 60;
  const BOARD_X = BOARD_MARGIN;
  const BOARD_Y = BOARD_MARGIN;
  const BOARD_W = W - BOARD_MARGIN * 2;
  const BOARD_H = H - BOARD_MARGIN * 2;

  // Audio context for sounds
  let audioCtx = null;

  function playSound(type) {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialDecayTo && gain.gain.exponentialDecayTo(0.01, audioCtx.currentTime + 0.4);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    } else if (type === 'roll') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(80 + Math.random() * 40, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.05);
    }
  }

  function wrapText(text, maxWidth, font) {
    ctx.font = font;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';

    for (const word of words) {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    }
    if (currentLine) lines.push(currentLine);
    return lines;
  }

  function initGame() {
    // Reset marble at center
    marble = {
      x: W / 2,
      y: H / 2,
      vx: 0,
      vy: 0,
      radius: 12
    };
    tilt = { x: 0, y: 0 };
    keys = { up: false, down: false, left: false, right: false };
    entranceAnim = 0;
    selectedHole = null;
    selectionTime = 0;

    // Create answer holes at four edges
    const holeRadius = 28;
    const labelPadding = 8;

    holes = [
      // Top hole (Answer A)
      { x: W / 2, y: BOARD_Y + 50, radius: holeRadius, choice: QUESTION.choices[0], label: 'A', labelPos: 'below' },
      // Right hole (Answer B)
      { x: BOARD_X + BOARD_W - 50, y: H / 2, radius: holeRadius, choice: QUESTION.choices[1], label: 'B', labelPos: 'left' },
      // Bottom hole (Answer C)
      { x: W / 2, y: BOARD_Y + BOARD_H - 50, radius: holeRadius, choice: QUESTION.choices[2], label: 'C', labelPos: 'above' },
      // Left hole (Answer D)
      { x: BOARD_X + 50, y: H / 2, radius: holeRadius, choice: QUESTION.choices[3], label: 'D', labelPos: 'right' }
    ];

    // Create maze walls
    walls = [
      // Outer walls with gaps for holes
      // Top wall (gap in center)
      { x1: BOARD_X, y1: BOARD_Y, x2: W / 2 - 50, y2: BOARD_Y },
      { x1: W / 2 + 50, y1: BOARD_Y, x2: BOARD_X + BOARD_W, y2: BOARD_Y },
      // Bottom wall (gap in center)
      { x1: BOARD_X, y1: BOARD_Y + BOARD_H, x2: W / 2 - 50, y2: BOARD_Y + BOARD_H },
      { x1: W / 2 + 50, y1: BOARD_Y + BOARD_H, x2: BOARD_X + BOARD_W, y2: BOARD_Y + BOARD_H },
      // Left wall (gap in center)
      { x1: BOARD_X, y1: BOARD_Y, x2: BOARD_X, y2: H / 2 - 50 },
      { x1: BOARD_X, y1: H / 2 + 50, x2: BOARD_X, y2: BOARD_Y + BOARD_H },
      // Right wall (gap in center)
      { x1: BOARD_X + BOARD_W, y1: BOARD_Y, x2: BOARD_X + BOARD_W, y2: H / 2 - 50 },
      { x1: BOARD_X + BOARD_W, y1: H / 2 + 50, x2: BOARD_X + BOARD_W, y2: BOARD_Y + BOARD_H },

      // Inner maze walls
      { x1: BOARD_X + 100, y1: BOARD_Y + 80, x2: BOARD_X + 100, y2: BOARD_Y + 180 },
      { x1: BOARD_X + 100, y1: BOARD_Y + 80, x2: BOARD_X + 220, y2: BOARD_Y + 80 },

      { x1: BOARD_X + BOARD_W - 100, y1: BOARD_Y + 80, x2: BOARD_X + BOARD_W - 100, y2: BOARD_Y + 180 },
      { x1: BOARD_X + BOARD_W - 220, y1: BOARD_Y + 80, x2: BOARD_X + BOARD_W - 100, y2: BOARD_Y + 80 },

      { x1: BOARD_X + 100, y1: BOARD_Y + BOARD_H - 80, x2: BOARD_X + 100, y2: BOARD_Y + BOARD_H - 180 },
      { x1: BOARD_X + 100, y1: BOARD_Y + BOARD_H - 80, x2: BOARD_X + 220, y2: BOARD_Y + BOARD_H - 80 },

      { x1: BOARD_X + BOARD_W - 100, y1: BOARD_Y + BOARD_H - 80, x2: BOARD_X + BOARD_W - 100, y2: BOARD_Y + BOARD_H - 180 },
      { x1: BOARD_X + BOARD_W - 220, y1: BOARD_Y + BOARD_H - 80, x2: BOARD_X + BOARD_W - 100, y2: BOARD_Y + BOARD_H - 80 },

      // Central cross obstacles
      { x1: W / 2 - 80, y1: H / 2 - 40, x2: W / 2 - 40, y2: H / 2 - 40 },
      { x1: W / 2 + 40, y1: H / 2 - 40, x2: W / 2 + 80, y2: H / 2 - 40 },
      { x1: W / 2 - 80, y1: H / 2 + 40, x2: W / 2 - 40, y2: H / 2 + 40 },
      { x1: W / 2 + 40, y1: H / 2 + 40, x2: W / 2 + 80, y2: H / 2 + 40 },
    ];
  }

  function distToSegment(px, py, x1, y1, x2, y2) {
    const dx = x2 - x1;
    const dy = y2 - y1;
    const lenSq = dx * dx + dy * dy;
    if (lenSq === 0) return Math.hypot(px - x1, py - y1);

    let t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
    t = Math.max(0, Math.min(1, t));

    const closestX = x1 + t * dx;
    const closestY = y1 + t * dy;
    return Math.hypot(px - closestX, py - closestY);
  }

  function reflectOffWall(wall) {
    const dx = wall.x2 - wall.x1;
    const dy = wall.y2 - wall.y1;
    const len = Math.hypot(dx, dy);
    const nx = -dy / len;
    const ny = dx / len;

    const dot = marble.vx * nx + marble.vy * ny;
    marble.vx -= 2 * dot * nx * 0.6;
    marble.vy -= 2 * dot * ny * 0.6;

    // Push marble away from wall
    const dist = distToSegment(marble.x, marble.y, wall.x1, wall.y1, wall.x2, wall.y2);
    if (dist < marble.radius) {
      const push = marble.radius - dist + 1;
      marble.x += nx * push;
      marble.y += ny * push;
    }
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    entranceAnim = Math.min(1, entranceAnim + dt * 2);

    // Handle selection animation
    if (selectedHole) {
      selectionTime += dt;
      // Animate marble falling into hole
      const fallDuration = 0.5;
      if (selectionTime < fallDuration) {
        const t = selectionTime / fallDuration;
        marble.x += (selectedHole.x - marble.x) * 0.2;
        marble.y += (selectedHole.y - marble.y) * 0.2;
        marble.radius = 12 * (1 - t * 0.8);
      } else {
        // End game
        const choice = selectedHole.choice;
        if (choice.is_correct) {
          playSound('correct');
        } else {
          playSound('wrong');
        }
        engine.end(choice.is_correct, choice.explanation);
      }
      return;
    }

    // Update tilt based on keys
    if (keys.up) tilt.y = Math.max(-TILT_MAX, tilt.y - TILT_SPEED * dt);
    else if (keys.down) tilt.y = Math.min(TILT_MAX, tilt.y + TILT_SPEED * dt);
    else tilt.y *= 0.9;

    if (keys.left) tilt.x = Math.max(-TILT_MAX, tilt.x - TILT_SPEED * dt);
    else if (keys.right) tilt.x = Math.min(TILT_MAX, tilt.x + TILT_SPEED * dt);
    else tilt.x *= 0.9;

    // Apply gravity based on tilt
    marble.vx += tilt.x * GRAVITY * dt;
    marble.vy += tilt.y * GRAVITY * dt;

    // Apply friction
    marble.vx *= FRICTION;
    marble.vy *= FRICTION;

    // Rolling sound when moving
    if (Math.abs(marble.vx) > 50 || Math.abs(marble.vy) > 50) {
      if (Math.random() < 0.1) playSound('roll');
    }

    // Update position
    marble.x += marble.vx * dt;
    marble.y += marble.vy * dt;

    // Wall collisions
    for (const wall of walls) {
      const dist = distToSegment(marble.x, marble.y, wall.x1, wall.y1, wall.x2, wall.y2);
      if (dist < marble.radius + 4) {
        reflectOffWall(wall);
      }
    }

    // Check hole collisions
    for (const hole of holes) {
      const dist = Math.hypot(marble.x - hole.x, marble.y - hole.y);
      if (dist < hole.radius - marble.radius * 0.5) {
        selectedHole = hole;
        selectionTime = 0;
        return;
      }
    }
  }

  function drawGame() {
    // Background
    ctx.fillStyle = '#FAFAF7';
    ctx.fillRect(0, 0, W, H);

    const animScale = 0.8 + entranceAnim * 0.2;
    ctx.save();
    ctx.translate(W / 2, H / 2);
    ctx.scale(animScale, animScale);
    ctx.translate(-W / 2, -H / 2);

    // Draw wooden board with perspective tilt
    ctx.save();
    ctx.translate(W / 2, H / 2);

    // Wood texture background
    const gradient = ctx.createLinearGradient(-BOARD_W / 2, -BOARD_H / 2, BOARD_W / 2, BOARD_H / 2);
    gradient.addColorStop(0, '#C4A574');
    gradient.addColorStop(0.3, '#D4B584');
    gradient.addColorStop(0.5, '#C9AA74');
    gradient.addColorStop(0.7, '#D4B584');
    gradient.addColorStop(1, '#B99A64');

    // Board shadow
    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
    ctx.beginPath();
    ctx.roundRect(-BOARD_W / 2 + 8 + tilt.x * 30, -BOARD_H / 2 + 8 + tilt.y * 30, BOARD_W, BOARD_H, 8);
    ctx.fill();

    // Board
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.roundRect(-BOARD_W / 2, -BOARD_H / 2, BOARD_W, BOARD_H, 8);
    ctx.fill();

    // Board rim
    ctx.strokeStyle = '#8B7355';
    ctx.lineWidth = 6;
    ctx.stroke();

    ctx.restore();

    // Draw holes (as dark pits)
    for (const hole of holes) {
      // Hole shadow
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath();
      ctx.arc(hole.x, hole.y, hole.radius + 2, 0, Math.PI * 2);
      ctx.fill();

      // Hole
      const holeGrad = ctx.createRadialGradient(hole.x - 5, hole.y - 5, 0, hole.x, hole.y, hole.radius);
      holeGrad.addColorStop(0, '#333');
      holeGrad.addColorStop(1, '#111');
      ctx.fillStyle = holeGrad;
      ctx.beginPath();
      ctx.arc(hole.x, hole.y, hole.radius, 0, Math.PI * 2);
      ctx.fill();

      // Hole rim
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Label letter inside hole
      ctx.fillStyle = '#E87A3E';
      ctx.font = 'bold 20px Belanosima, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(hole.label, hole.x, hole.y);
    }

    // Draw walls
    ctx.strokeStyle = '#5D4E37';
    ctx.lineWidth = 8;
    ctx.lineCap = 'round';
    for (const wall of walls) {
      ctx.beginPath();
      ctx.moveTo(wall.x1, wall.y1);
      ctx.lineTo(wall.x2, wall.y2);
      ctx.stroke();
    }

    // Draw wall highlights
    ctx.strokeStyle = '#8B7355';
    ctx.lineWidth = 3;
    for (const wall of walls) {
      ctx.beginPath();
      ctx.moveTo(wall.x1, wall.y1 - 2);
      ctx.lineTo(wall.x2, wall.y2 - 2);
      ctx.stroke();
    }

    // Draw marble with metallic effect
    if (marble.radius > 0) {
      // Marble shadow
      ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
      ctx.beginPath();
      ctx.ellipse(marble.x + 4, marble.y + 4, marble.radius, marble.radius * 0.6, 0, 0, Math.PI * 2);
      ctx.fill();

      // Marble body
      const marbleGrad = ctx.createRadialGradient(
        marble.x - marble.radius * 0.3, marble.y - marble.radius * 0.3, 0,
        marble.x, marble.y, marble.radius
      );
      marbleGrad.addColorStop(0, '#E8E8E8');
      marbleGrad.addColorStop(0.3, '#B8B8B8');
      marbleGrad.addColorStop(0.7, '#888888');
      marbleGrad.addColorStop(1, '#666666');

      ctx.fillStyle = marbleGrad;
      ctx.beginPath();
      ctx.arc(marble.x, marble.y, marble.radius, 0, Math.PI * 2);
      ctx.fill();

      // Marble highlight
      ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
      ctx.beginPath();
      ctx.arc(marble.x - marble.radius * 0.3, marble.y - marble.radius * 0.3, marble.radius * 0.3, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();

    // Draw answer labels near the holes (inside the board area)
    ctx.textBaseline = 'middle';

    const labelBgColor = '#2B2B28';
    const labelTextColor = '#FAFAF7';
    const labelPadX = 8;
    const labelPadY = 4;
    const labelMaxWidth = 140;
    const lineHeight = 15;

    for (let i = 0; i < holes.length; i++) {
      const hole = holes[i];
      const choice = hole.choice;
      const lines = wrapText(choice.text, labelMaxWidth, '14px Nunito, sans-serif');
      const boxH = lines.length * lineHeight + labelPadY * 2;
      const boxW = labelMaxWidth + labelPadX * 2;

      let labelX, labelY;
      // Position labels near holes but within canvas bounds
      if (hole.labelPos === 'below') {
        // Answer A (top hole) - label above the hole, inside canvas
        labelX = hole.x;
        labelY = Math.max(boxH / 2 + 5, hole.y - 70);
      } else if (hole.labelPos === 'above') {
        // Answer C (bottom hole) - label below the hole, inside canvas
        labelX = hole.x;
        labelY = Math.min(H - boxH / 2 - 5, hole.y + 70);
      } else if (hole.labelPos === 'left') {
        // Answer B (right hole) - label to the left of hole
        labelX = Math.min(W - boxW / 2 - 5, hole.x + 70);
        labelY = hole.y;
      } else {
        // Answer D (left hole) - label to the right of hole
        labelX = Math.max(boxW / 2 + 5, hole.x - 70);
        labelY = hole.y;
      }

      // Clamp positions to canvas bounds
      labelX = Math.max(boxW / 2 + 2, Math.min(W - boxW / 2 - 2, labelX));
      labelY = Math.max(boxH / 2 + 2, Math.min(H - boxH / 2 - 2, labelY));

      // Draw label background with slight transparency
      ctx.fillStyle = 'rgba(43, 43, 40, 0.95)';
      ctx.beginPath();
      ctx.roundRect(labelX - boxW / 2, labelY - boxH / 2, boxW, boxH, 6);
      ctx.fill();

      // Draw label letter badge
      ctx.fillStyle = '#E87A3E';
      ctx.beginPath();
      ctx.arc(labelX - boxW / 2 + 12, labelY - boxH / 2 + 12, 9, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#FAFAF7';
      ctx.font = 'bold 11px Belanosima, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(hole.label, labelX - boxW / 2 + 12, labelY - boxH / 2 + 12);

      // Draw wrapped text
      ctx.fillStyle = labelTextColor;
      ctx.font = '14px Nunito, sans-serif';
      ctx.textAlign = 'left';
      const textStartY = labelY - (lines.length - 1) * lineHeight / 2;
      for (let j = 0; j < lines.length; j++) {
        ctx.fillText(lines[j], labelX - boxW / 2 + 26, textStartY + j * lineHeight);
      }
    }

    // Draw tilt indicator
    const indicatorX = 50;
    const indicatorY = H - 50;
    const indicatorSize = 30;

    ctx.fillStyle = 'rgba(43, 43, 40, 0.8)';
    ctx.beginPath();
    ctx.arc(indicatorX, indicatorY, indicatorSize, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = '#E87A3E';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Tilt dot
    ctx.fillStyle = '#4ECDC4';
    ctx.beginPath();
    ctx.arc(
      indicatorX + tilt.x * indicatorSize * 5,
      indicatorY + tilt.y * indicatorSize * 5,
      6, 0, Math.PI * 2
    );
    ctx.fill();
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;

    const isDown = e.type === 'keydown';

    switch (e.code) {
      case 'ArrowUp':
      case 'KeyW':
        keys.up = isDown;
        e.preventDefault();
        break;
      case 'ArrowDown':
      case 'KeyS':
        keys.down = isDown;
        e.preventDefault();
        break;
      case 'ArrowLeft':
      case 'KeyA':
        keys.left = isDown;
        e.preventDefault();
        break;
      case 'ArrowRight':
      case 'KeyD':
        keys.right = isDown;
        e.preventDefault();
        break;
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Handle key release
    handleInput(e);
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
