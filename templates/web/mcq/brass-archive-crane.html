<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brass Archive Crane</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1C1C1A;
      font-family: 'Nunito', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #2A2A27;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLOR PALETTE ===
  const COLORS = {
    bgDark: '#1C1C1A',
    bgSurface: '#2A2A27',
    brass: '#B8860B',
    brassLight: '#DAA520',
    brassDark: '#8B6914',
    brassHighlight: '#FFD700',
    woodDark: '#4A3728',
    woodMed: '#6B4423',
    woodLight: '#8B5A2B',
    drawerFace: '#3D3D3A',
    drawerLabel: '#F5F5F0',
    textPrimary: '#F5F5F0',
    textSecondary: '#C2C2B8',
    orange: '#E87A3E',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    gearDark: '#363633',
    gearMed: '#4A4A45',
    gearLight: '#5A5A56'
  };

  // === AUDIO CONTEXT ===
  let audioCtx = null;
  function getAudioContext() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playSound(type) {
    const ctx = getAudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);

    if (type === 'move') {
      osc.frequency.value = 220;
      osc.type = 'square';
      gain.gain.setValueAtTime(0.05, ctx.currentTime);
      gain.gain.exponentialDecayTo && gain.gain.exponentialDecayTo(0.01, ctx.currentTime + 0.05);
      osc.start();
      osc.stop(ctx.currentTime + 0.05);
    } else if (type === 'drop') {
      osc.frequency.value = 150;
      osc.type = 'sawtooth';
      gain.gain.setValueAtTime(0.1, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
      osc.start();
      osc.stop(ctx.currentTime + 0.3);
    } else if (type === 'correct') {
      osc.frequency.value = 523;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.4);
      osc.start();
      setTimeout(() => {
        const osc2 = ctx.createOscillator();
        const gain2 = ctx.createGain();
        osc2.connect(gain2);
        gain2.connect(ctx.destination);
        osc2.frequency.value = 659;
        osc2.type = 'sine';
        gain2.gain.setValueAtTime(0.15, ctx.currentTime);
        gain2.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
        osc2.start();
        osc2.stop(ctx.currentTime + 0.3);
      }, 100);
      osc.stop(ctx.currentTime + 0.4);
    } else if (type === 'wrong') {
      osc.frequency.value = 180;
      osc.type = 'sawtooth';
      gain.gain.setValueAtTime(0.12, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.4);
      osc.start();
      osc.stop(ctx.currentTime + 0.4);
    }
  }

  // === GAME STATE ===
  let claw = { x: 0, targetIndex: 0, y: 100, state: 'idle', dropProgress: 0, grabProgress: 0 };
  let drawers = [];
  let gears = [];
  let selectedDrawer = null;
  let cogParticles = [];
  let entranceProgress = 0;
  let shakeAmount = 0;
  let shakeTime = 0;

  // Drawer layout
  const DRAWER_W = 140;
  const DRAWER_H = 100;
  const DRAWER_GAP = 20;
  const DRAWERS_START_X = (W - (4 * DRAWER_W + 3 * DRAWER_GAP)) / 2;
  const DRAWERS_Y = 340;
  const RAIL_Y = 80;
  const CLAW_REST_Y = 100;

  function initGame() {
    // Initialize claw
    claw = {
      x: DRAWERS_START_X + DRAWER_W / 2,
      targetIndex: 0,
      y: CLAW_REST_Y,
      state: 'idle',
      dropProgress: 0,
      grabProgress: 0
    };

    // Initialize drawers
    drawers = QUESTION.choices.map((choice, i) => ({
      x: DRAWERS_START_X + i * (DRAWER_W + DRAWER_GAP),
      y: DRAWERS_Y,
      w: DRAWER_W,
      h: DRAWER_H,
      choice: choice,
      index: i,
      opened: false,
      openProgress: 0,
      scale: 0,
      alpha: 0,
      highlighted: false
    }));

    // Initialize gears for ceiling
    gears = [];
    for (let i = 0; i < 8; i++) {
      gears.push({
        x: 50 + i * 90 + (Math.random() - 0.5) * 20,
        y: 30 + (Math.random() - 0.5) * 15,
        radius: 15 + Math.random() * 20,
        teeth: Math.floor(8 + Math.random() * 8),
        rotation: Math.random() * Math.PI * 2,
        speed: (0.3 + Math.random() * 0.5) * (i % 2 === 0 ? 1 : -1)
      });
    }

    selectedDrawer = null;
    cogParticles = [];
    entranceProgress = 0;
    shakeAmount = 0;
    shakeTime = 0;
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    // Entrance animation
    if (entranceProgress < 1) {
      entranceProgress += dt * 2;
      drawers.forEach((d, i) => {
        const delay = i * 0.1;
        const t = Math.max(0, Math.min(1, (entranceProgress - delay) / 0.3));
        const spring = 1 + Math.sin(t * Math.PI * 2) * 0.15 * (1 - t);
        d.scale = t * spring;
        d.alpha = t;
      });
    }

    // Update gears
    gears.forEach(g => {
      g.rotation += g.speed * dt;
    });

    // Update claw position
    const targetX = DRAWERS_START_X + claw.targetIndex * (DRAWER_W + DRAWER_GAP) + DRAWER_W / 2;
    const clawSpeed = 400;
    const dx = targetX - claw.x;
    if (Math.abs(dx) > 2) {
      claw.x += Math.sign(dx) * Math.min(clawSpeed * dt, Math.abs(dx));
    } else {
      claw.x = targetX;
    }

    // Highlight drawer under claw
    drawers.forEach((d, i) => {
      d.highlighted = (i === claw.targetIndex && claw.state === 'idle');
    });

    // Claw drop/grab animation
    if (claw.state === 'dropping') {
      claw.dropProgress += dt * 3;
      claw.y = CLAW_REST_Y + claw.dropProgress * (DRAWERS_Y - CLAW_REST_Y - 30);
      if (claw.dropProgress >= 1) {
        claw.state = 'grabbing';
        claw.grabProgress = 0;
      }
    } else if (claw.state === 'grabbing') {
      claw.grabProgress += dt * 4;
      if (claw.grabProgress >= 1) {
        claw.state = 'pulling';
        const drawer = drawers[claw.targetIndex];
        selectedDrawer = drawer;
        drawer.opened = true;
      }
    } else if (claw.state === 'pulling') {
      const drawer = selectedDrawer;
      drawer.openProgress += dt * 3;
      claw.y = CLAW_REST_Y + (1 - drawer.openProgress * 0.5) * (DRAWERS_Y - CLAW_REST_Y - 30);

      if (drawer.openProgress >= 1) {
        drawer.openProgress = 1;
        claw.state = 'done';

        // Check answer
        if (drawer.choice.is_correct) {
          playSound('correct');
          engine.end(true, drawer.choice.explanation);
        } else {
          playSound('wrong');
          // Jam animation - spray cog teeth
          shakeAmount = 15;
          shakeTime = 0;
          for (let i = 0; i < 20; i++) {
            cogParticles.push({
              x: claw.x,
              y: claw.y,
              vx: (Math.random() - 0.5) * 300,
              vy: Math.random() * 200 + 50,
              rotation: Math.random() * Math.PI * 2,
              rotationSpeed: (Math.random() - 0.5) * 15,
              size: 4 + Math.random() * 8,
              teeth: Math.floor(3 + Math.random() * 4)
            });
          }
          setTimeout(() => {
            engine.end(false, drawer.choice.explanation);
          }, 500);
        }
      }
    }

    // Update shake
    if (shakeAmount > 0) {
      shakeTime += dt * 30;
      shakeAmount *= 0.95;
      if (shakeAmount < 0.5) shakeAmount = 0;
    }

    // Update cog particles
    cogParticles.forEach(p => {
      p.vy += 500 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
    });
    cogParticles = cogParticles.filter(p => p.y < H + 50);
  }

  function drawGear(x, y, radius, teeth, rotation, color) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rotation);

    // Main gear body
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(0, 0, radius * 0.7, 0, Math.PI * 2);
    ctx.fill();

    // Teeth
    for (let i = 0; i < teeth; i++) {
      const angle = (i / teeth) * Math.PI * 2;
      ctx.save();
      ctx.rotate(angle);
      ctx.fillRect(-radius * 0.15, -radius, radius * 0.3, radius * 0.35);
      ctx.restore();
    }

    // Center hole
    ctx.fillStyle = COLORS.bgDark;
    ctx.beginPath();
    ctx.arc(0, 0, radius * 0.2, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawClaw(x, y, grabProgress) {
    ctx.save();
    ctx.translate(x, y);

    // Claw arm
    ctx.fillStyle = COLORS.brass;
    ctx.fillRect(-8, -60, 16, 60);

    // Claw head
    ctx.fillStyle = COLORS.brassLight;
    ctx.beginPath();
    ctx.arc(0, 0, 20, 0, Math.PI * 2);
    ctx.fill();

    // Decorative ring
    ctx.strokeStyle = COLORS.brassDark;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 0, 15, 0, Math.PI * 2);
    ctx.stroke();

    // Claw fingers
    const fingerAngle = 0.4 + grabProgress * 0.4;
    ctx.fillStyle = COLORS.brass;

    // Left finger
    ctx.save();
    ctx.rotate(-fingerAngle);
    ctx.fillRect(-4, 15, 8, 30);
    ctx.restore();

    // Right finger
    ctx.save();
    ctx.rotate(fingerAngle);
    ctx.fillRect(-4, 15, 8, 30);
    ctx.restore();

    ctx.restore();
  }

  function wrapText(text, maxWidth) {
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';

    ctx.font = "400 14px 'Nunito', sans-serif";

    for (const word of words) {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      const metrics = ctx.measureText(testLine);

      if (metrics.width > maxWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    }
    if (currentLine) lines.push(currentLine);

    return lines;
  }

  function drawDrawer(drawer) {
    const { x, y, w, h, choice, index, opened, openProgress, scale, alpha, highlighted } = drawer;

    if (alpha <= 0) return;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(x + w / 2, y + h / 2);
    ctx.scale(scale, scale);
    ctx.translate(-(x + w / 2), -(y + h / 2));

    // Drawer slot (dark recess)
    ctx.fillStyle = COLORS.bgDark;
    ctx.beginPath();
    ctx.roundRect(x - 5, y - 5, w + 10, h + 10, 4);
    ctx.fill();

    // Drawer body (slides out)
    const slideOut = openProgress * 60;

    // Inner contents (visible when opened)
    if (openProgress > 0) {
      ctx.fillStyle = '#2B2B28';
      ctx.fillRect(x + 3, y + 3, w - 6, h - 6);
    }

    // Drawer face
    const faceY = y - slideOut;
    ctx.fillStyle = highlighted ? COLORS.cyan : COLORS.drawerFace;
    ctx.beginPath();
    ctx.roundRect(x, faceY, w, h, 6);
    ctx.fill();

    // Brass trim
    ctx.strokeStyle = highlighted ? COLORS.brassHighlight : COLORS.brass;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(x + 3, faceY + 3, w - 6, h - 6, 4);
    ctx.stroke();

    // Drawer handle
    ctx.fillStyle = COLORS.brassLight;
    ctx.beginPath();
    ctx.roundRect(x + w / 2 - 20, faceY + 15, 40, 12, 6);
    ctx.fill();
    ctx.fillStyle = COLORS.brassDark;
    ctx.beginPath();
    ctx.roundRect(x + w / 2 - 15, faceY + 18, 30, 6, 3);
    ctx.fill();

    // Label plate
    ctx.fillStyle = COLORS.woodDark;
    ctx.beginPath();
    ctx.roundRect(x + 10, faceY + 35, w - 20, h - 45, 4);
    ctx.fill();

    // Label letter
    const labels = ['A', 'B', 'C', 'D'];
    ctx.fillStyle = COLORS.brassLight;
    ctx.font = "700 24px 'Belanosima', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(labels[index], x + w / 2, faceY + h / 2 + 10);

    // Answer text inside opened drawer
    if (openProgress > 0.3) {
      ctx.globalAlpha = alpha * Math.min(1, (openProgress - 0.3) / 0.4);
      ctx.fillStyle = COLORS.textPrimary;
      ctx.font = "400 14px 'Nunito', sans-serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';

      const lines = wrapText(choice.text, w - 16);
      const lineHeight = 16;
      const textStartY = y + 10;

      lines.forEach((line, i) => {
        if (i < 5) { // Max 5 lines
          ctx.fillText(line, x + w / 2, textStartY + i * lineHeight);
        }
      });
    }

    ctx.restore();
  }

  function drawGame() {
    ctx.save();

    // Apply shake
    if (shakeAmount > 0) {
      ctx.translate(
        Math.sin(shakeTime) * shakeAmount,
        Math.cos(shakeTime * 1.3) * shakeAmount * 0.5
      );
    }

    // Background - vaulted ceiling
    const gradient = ctx.createLinearGradient(0, 0, 0, H);
    gradient.addColorStop(0, COLORS.bgDark);
    gradient.addColorStop(0.3, COLORS.bgSurface);
    gradient.addColorStop(1, '#363633');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, W, H);

    // Vault arch pattern
    ctx.strokeStyle = COLORS.gearDark;
    ctx.lineWidth = 2;
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      ctx.arc(W / 2, -50 + i * 30, 400 - i * 60, 0.1 * Math.PI, 0.9 * Math.PI);
      ctx.stroke();
    }

    // Draw gears on ceiling
    gears.forEach((g, i) => {
      const color = i % 3 === 0 ? COLORS.gearDark : i % 3 === 1 ? COLORS.gearMed : COLORS.gearLight;
      drawGear(g.x, g.y, g.radius, g.teeth, g.rotation, color);
    });

    // Rail
    ctx.fillStyle = COLORS.brassDark;
    ctx.fillRect(30, RAIL_Y - 5, W - 60, 10);
    ctx.fillStyle = COLORS.brass;
    ctx.fillRect(30, RAIL_Y - 3, W - 60, 6);

    // Rail supports
    for (let i = 0; i < 5; i++) {
      const sx = 80 + i * 150;
      ctx.fillStyle = COLORS.brassDark;
      ctx.fillRect(sx - 5, RAIL_Y + 5, 10, 20);
    }

    // Cable from rail to claw
    ctx.strokeStyle = COLORS.brassDark;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(claw.x, RAIL_Y + 5);
    ctx.lineTo(claw.x, claw.y - 60);
    ctx.stroke();

    // Claw carriage on rail
    ctx.fillStyle = COLORS.brassLight;
    ctx.beginPath();
    ctx.roundRect(claw.x - 25, RAIL_Y - 15, 50, 25, 6);
    ctx.fill();
    ctx.fillStyle = COLORS.brassDark;
    ctx.beginPath();
    ctx.arc(claw.x - 15, RAIL_Y - 3, 8, 0, Math.PI * 2);
    ctx.arc(claw.x + 15, RAIL_Y - 3, 8, 0, Math.PI * 2);
    ctx.fill();

    // Draw claw
    drawClaw(claw.x, claw.y, claw.grabProgress);

    // Cabinet frame
    ctx.fillStyle = COLORS.woodDark;
    ctx.fillRect(DRAWERS_START_X - 30, DRAWERS_Y - 30, 4 * DRAWER_W + 3 * DRAWER_GAP + 60, DRAWER_H + 80);
    ctx.fillStyle = COLORS.woodMed;
    ctx.fillRect(DRAWERS_START_X - 20, DRAWERS_Y - 20, 4 * DRAWER_W + 3 * DRAWER_GAP + 40, DRAWER_H + 60);

    // Cabinet top decoration
    ctx.fillStyle = COLORS.brass;
    ctx.fillRect(DRAWERS_START_X - 25, DRAWERS_Y - 35, 4 * DRAWER_W + 3 * DRAWER_GAP + 50, 8);

    // Draw drawers
    drawers.forEach(drawer => drawDrawer(drawer));

    // Draw cog particles
    cogParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      drawGear(0, 0, p.size, p.teeth, 0, COLORS.brass);
      ctx.restore();
    });

    ctx.restore();
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;
    if (claw.state !== 'idle') return;

    let moved = false;

    if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
      if (claw.targetIndex > 0) {
        claw.targetIndex--;
        moved = true;
      }
    } else if (e.code === 'ArrowRight' || e.code === 'KeyD') {
      if (claw.targetIndex < 3) {
        claw.targetIndex++;
        moved = true;
      }
    } else if (e.code === 'Space' || e.code === 'Enter') {
      claw.state = 'dropping';
      claw.dropProgress = 0;
      playSound('drop');
      e.preventDefault();
    }

    if (moved) {
      playSound('move');
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
