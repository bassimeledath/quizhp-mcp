<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frame Fixer</title>
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  FRAME FIXER - Museum-themed quiz game                                       ║
  ║  Click on the tilted painting with the correct answer to straighten it       ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
      cursor: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><text y="24" font-size="24">🔧</text></svg>') 16 16, pointer;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = "bold 18px 'Nunito Sans', system-ui, sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Reset cursor to default on end screen
      canvas.style.cursor = 'default';

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = "bold 36px 'Nunito Sans', system-ui, sans-serif";
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  Museum-themed Frame Fixer game                                            ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === AUDIO SYSTEM ===
  let audioCtx = null;
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }

  function playClickSound() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.1);
  }

  function playCorrectSound() {
    if (!audioCtx) return;
    const notes = [523.25, 659.25, 783.99]; // C5, E5, G5 chord
    notes.forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.08);
      gain.gain.setValueAtTime(0, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + i * 0.08 + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.08 + 0.4);
      osc.start(audioCtx.currentTime + i * 0.08);
      osc.stop(audioCtx.currentTime + i * 0.08 + 0.4);
    });
  }

  function playWrongSound() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, audioCtx.currentTime);
    osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.3);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.3);
  }

  // Colors
  const COLORS = {
    museumWall: '#9d8b73',
    floorLine: '#7a6b5a',
    outerFrame: '#5a4a3a',
    innerFrame: '#8b7355',
    canvas: '#FAFAF7',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    hoverGlow: '#4ECDC4',
    correctGlow: '#6BBF59',
    wrongGlow: '#E85D4A'
  };

  // Painting positions (center points)
  const PAINTING_POSITIONS = [
    { x: 180, y: 135 },  // Top-left
    { x: 540, y: 135 },  // Top-right
    { x: 180, y: 405 },  // Bottom-left
    { x: 540, y: 405 }   // Bottom-right
  ];

  const PAINTING_WIDTH = 240;
  const PAINTING_HEIGHT = 160;
  const OUTER_FRAME = 10;
  const INNER_FRAME = 6;

  // Game state
  let paintings = [];
  let selectedPainting = null;
  let animatingPainting = null;
  let animationComplete = false;
  let hoveredPainting = -1;
  let gameTime = 0;
  let gameParticles = [];

  /** Generate a random tilt angle between 8-15 degrees, positive or negative */
  function randomTilt() {
    const angle = (8 + Math.random() * 7) * (Math.PI / 180);
    return Math.random() < 0.5 ? angle : -angle;
  }

  /** Word wrap text to fit within a given width */
  function wrapText(text, maxWidth, fontSize) {
    ctx.font = `500 ${fontSize}px 'Nunito', sans-serif`;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';

    for (const word of words) {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      const metrics = ctx.measureText(testLine);
      if (metrics.width > maxWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    }
    if (currentLine) {
      lines.push(currentLine);
    }
    return lines;
  }

  /** Spawn sparkle particles at position */
  function spawnSparkles(x, y, isCorrect, count = 20) {
    const colors = isCorrect
      ? ['#FFD700', '#F5A742', '#6BBF59', '#4ECDC4']
      : ['#E85D4A', '#FF6B6B', '#D04A3A'];

    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 100 + Math.random() * 150;
      gameParticles.push({
        x: x,
        y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 50,
        size: 3 + Math.random() * 4,
        color: colors[Math.floor(Math.random() * colors.length)],
        alpha: 1,
        rotation: Math.random() * Math.PI * 2,
        rotationSpeed: (Math.random() - 0.5) * 8,
        type: isCorrect ? 'sparkle' : 'x'
      });
    }
  }

  function initGame() {
    // Restore wrench cursor when game restarts
    canvas.style.cursor = "url('data:image/svg+xml,<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"32\" height=\"32\"><text y=\"24\" font-size=\"24\">🔧</text></svg>') 16 16, pointer";

    paintings = QUESTION.choices.map((choice, i) => ({
      x: PAINTING_POSITIONS[i].x,
      y: PAINTING_POSITIONS[i].y,
      width: PAINTING_WIDTH,
      height: PAINTING_HEIGHT,
      angle: randomTilt(),
      targetAngle: null,
      text: choice.text,
      isCorrect: choice.is_correct,
      explanation: choice.explanation,
      selected: false,
      // Entrance animation state
      entranceProgress: prefersReducedMotion ? 1 : 0,
      entranceDelay: prefersReducedMotion ? 0 : i * 0.12,
      entranceStarted: false,
      // Hover state
      hoverScale: 1,
      hoverLift: 0,
      glowAlpha: 0
    }));
    selectedPainting = null;
    animatingPainting = null;
    animationComplete = false;
    hoveredPainting = -1;
    gameTime = 0;
    gameParticles = [];
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Update entrance animations
    paintings.forEach((p, i) => {
      if (!p.entranceStarted && gameTime >= p.entranceDelay) {
        p.entranceStarted = true;
      }
      if (p.entranceStarted && p.entranceProgress < 1) {
        p.entranceProgress = Math.min(1, p.entranceProgress + dt * 3);
      }
    });

    // Update hover effects
    paintings.forEach((p, i) => {
      const isHovered = i === hoveredPainting && animatingPainting === null;
      const targetScale = isHovered ? 1.03 : 1;
      const targetLift = isHovered ? -3 : 0;
      const targetGlow = isHovered ? 0.5 : 0;

      p.hoverScale += (targetScale - p.hoverScale) * dt * 10;
      p.hoverLift += (targetLift - p.hoverLift) * dt * 10;
      p.glowAlpha += (targetGlow - p.glowAlpha) * dt * 10;
    });

    // Update particles
    gameParticles = gameParticles.filter(p => {
      p.vy += 300 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.alpha -= dt * 1.5;
      return p.alpha > 0;
    });

    // Handle straightening animation
    if (animatingPainting !== null) {
      const p = paintings[animatingPainting];
      if (p.targetAngle !== null) {
        const diff = p.targetAngle - p.angle;
        if (Math.abs(diff) < 0.005) {
          p.angle = p.targetAngle;
          if (!animationComplete) {
            animationComplete = true;
            // Spawn feedback particles
            spawnSparkles(p.x, p.y, p.isCorrect, 25);
            // Play sound
            if (p.isCorrect) {
              playCorrectSound();
            } else {
              playWrongSound();
            }
            // End game after animation completes
            setTimeout(() => {
              engine.end(p.isCorrect, p.explanation);
            }, 300);
          }
        } else {
          p.angle += diff * dt * 6;
        }
      }
    }
  }

  /** Draw a single painting with ornate frame */
  function drawPainting(p, index) {
    // Calculate entrance animation values
    const entranceT = p.entranceProgress;
    const bounce = 1 + Math.sin(entranceT * Math.PI) * 0.15 * (1 - entranceT);
    const entranceScale = entranceT * bounce;
    const entranceAlpha = entranceT;

    if (entranceScale <= 0) return;

    ctx.save();
    ctx.globalAlpha = entranceAlpha;
    ctx.translate(p.x, p.y + p.hoverLift);
    ctx.rotate(p.angle);
    ctx.scale(entranceScale * p.hoverScale, entranceScale * p.hoverScale);

    const halfW = p.width / 2;
    const halfH = p.height / 2;

    // Hover glow effect
    if (p.glowAlpha > 0.01) {
      ctx.save();
      ctx.shadowColor = COLORS.hoverGlow;
      ctx.shadowBlur = 25;
      ctx.globalAlpha = p.glowAlpha;
      ctx.fillStyle = COLORS.hoverGlow;
      ctx.fillRect(-halfW - OUTER_FRAME - 5, -halfH - OUTER_FRAME - 5,
                   p.width + OUTER_FRAME * 2 + 10, p.height + OUTER_FRAME * 2 + 10);
      ctx.restore();
      ctx.globalAlpha = entranceAlpha;
    }

    // Shadow
    ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
    ctx.shadowBlur = 15 + p.hoverLift * -2;
    ctx.shadowOffsetX = 5;
    ctx.shadowOffsetY = 5 - p.hoverLift;

    // Outer frame (dark wood)
    ctx.fillStyle = COLORS.outerFrame;
    ctx.fillRect(-halfW - OUTER_FRAME, -halfH - OUTER_FRAME,
                 p.width + OUTER_FRAME * 2, p.height + OUTER_FRAME * 2);

    // Reset shadow for inner elements
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 0;

    // Inner frame (medium wood)
    ctx.fillStyle = COLORS.innerFrame;
    ctx.fillRect(-halfW - INNER_FRAME, -halfH - INNER_FRAME,
                 p.width + INNER_FRAME * 2, p.height + INNER_FRAME * 2);

    // Canvas (painting surface)
    ctx.fillStyle = COLORS.canvas;
    ctx.fillRect(-halfW, -halfH, p.width, p.height);

    // Draw answer text (word-wrapped, centered)
    const padding = 16;
    const maxTextWidth = p.width - padding * 2;
    const fontSize = 14;
    const lines = wrapText(p.text, maxTextWidth, fontSize);
    const lineHeight = fontSize * 1.4;
    const totalTextHeight = lines.length * lineHeight;
    const startY = -totalTextHeight / 2 + lineHeight / 2;

    ctx.fillStyle = COLORS.textPrimary;
    ctx.font = `500 ${fontSize}px 'Nunito', sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    lines.forEach((line, i) => {
      ctx.fillText(line, 0, startY + i * lineHeight);
    });

    // Draw decorative corner flourishes
    drawCornerFlourish(-halfW + 8, -halfH + 8, 0);
    drawCornerFlourish(halfW - 8, -halfH + 8, Math.PI / 2);
    drawCornerFlourish(halfW - 8, halfH - 8, Math.PI);
    drawCornerFlourish(-halfW + 8, halfH - 8, -Math.PI / 2);

    ctx.restore();
  }

  /** Draw decorative corner flourish */
  function drawCornerFlourish(x, y, rotation) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rotation);
    ctx.strokeStyle = COLORS.textSecondary;
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.3;

    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(12, 0);
    ctx.moveTo(0, 0);
    ctx.lineTo(0, 12);
    ctx.stroke();

    ctx.globalAlpha = 1;
    ctx.restore();
  }

  /** Draw feedback particles */
  function drawParticles() {
    gameParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);

      if (p.type === 'sparkle') {
        // Draw star shape
        ctx.fillStyle = p.color;
        ctx.beginPath();
        for (let i = 0; i < 4; i++) {
          const angle = (i * Math.PI / 2);
          const x1 = Math.cos(angle) * p.size;
          const y1 = Math.sin(angle) * p.size;
          if (i === 0) ctx.moveTo(x1, y1);
          else ctx.lineTo(x1, y1);
          const x2 = Math.cos(angle + Math.PI / 4) * p.size * 0.4;
          const y2 = Math.sin(angle + Math.PI / 4) * p.size * 0.4;
          ctx.lineTo(x2, y2);
        }
        ctx.closePath();
        ctx.fill();
      } else {
        // Draw X shape for wrong
        ctx.strokeStyle = p.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-p.size, -p.size);
        ctx.lineTo(p.size, p.size);
        ctx.moveTo(p.size, -p.size);
        ctx.lineTo(-p.size, p.size);
        ctx.stroke();
      }

      ctx.restore();
    });
  }

  function drawGame() {
    // Museum wall background
    ctx.fillStyle = COLORS.museumWall;
    ctx.fillRect(0, 0, W, H);

    // Subtle wall texture (gradient)
    const wallGradient = ctx.createLinearGradient(0, 0, 0, H);
    wallGradient.addColorStop(0, 'rgba(0, 0, 0, 0.05)');
    wallGradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.03)');
    wallGradient.addColorStop(1, 'rgba(0, 0, 0, 0.1)');
    ctx.fillStyle = wallGradient;
    ctx.fillRect(0, 0, W, H);

    // Floor line
    ctx.strokeStyle = COLORS.floorLine;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0, 520);
    ctx.lineTo(W, 520);
    ctx.stroke();

    // Floor area
    ctx.fillStyle = '#6b5d4d';
    ctx.fillRect(0, 520, W, H - 520);

    // Draw all paintings
    paintings.forEach((p, i) => drawPainting(p, i));

    // Draw particles on top
    drawParticles();
  }

  /** Check if a point is inside a rotated rectangle */
  function pointInRotatedRect(px, py, rect) {
    // Translate point to rect's local coordinate system
    const dx = px - rect.x;
    const dy = py - (rect.y + rect.hoverLift);

    // Rotate point by negative angle to align with rect
    const cos = Math.cos(-rect.angle);
    const sin = Math.sin(-rect.angle);
    const localX = dx * cos - dy * sin;
    const localY = dx * sin + dy * cos;

    // Check if within bounds (including frame)
    const halfW = (rect.width / 2 + OUTER_FRAME) * rect.hoverScale;
    const halfH = (rect.height / 2 + OUTER_FRAME) * rect.hoverScale;

    return localX >= -halfW && localX <= halfW &&
           localY >= -halfH && localY <= halfH;
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;
    // Keyboard not used in this game
  }

  // Mouse move handler for hover effects
  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'playing') return;
    if (animatingPainting !== null) return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    let found = -1;
    for (let i = 0; i < paintings.length; i++) {
      if (paintings[i].entranceProgress >= 1 && pointInRotatedRect(x, y, paintings[i])) {
        found = i;
        break;
      }
    }
    hoveredPainting = found;
  });

  canvas.addEventListener('mouseleave', () => {
    hoveredPainting = -1;
  });

  // Mouse click handler for selecting paintings
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'playing') return;
    if (animatingPainting !== null) return; // Already animating

    // Initialize audio on first click
    initAudio();

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    // Check which painting was clicked
    for (let i = 0; i < paintings.length; i++) {
      if (paintings[i].entranceProgress >= 1 && pointInRotatedRect(x, y, paintings[i])) {
        // Play click sound
        playClickSound();
        // Start straightening animation
        paintings[i].selected = true;
        paintings[i].targetAngle = 0;
        animatingPainting = i;
        hoveredPainting = -1;
        break;
      }
    }
  });

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });


  // Cursor change handler for end screen buttons
  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'ended') {
      canvas.style.cursor = 'default';
      return;
    }
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    if (gameResult) {
      if (pointInRect(x, y, restartButton) || pointInRect(x, y, nextButton)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    } else {
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    }
    canvas.style.cursor = 'default';
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
