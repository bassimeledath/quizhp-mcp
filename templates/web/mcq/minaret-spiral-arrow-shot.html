<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minaret Spiral Arrow Shot</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC'
  };

  // === SOUND ENGINE ===
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playSound(type) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;

    if (type === 'shoot') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(220, now);
      osc.frequency.exponentialRampToValueAtTime(880, now + 0.15);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
      osc.start(now);
      osc.stop(now + 0.25);
    } else if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, now);
      osc.frequency.setValueAtTime(659, now + 0.1);
      osc.frequency.setValueAtTime(784, now + 0.2);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      osc.start(now);
      osc.stop(now + 0.4);
    } else if (type === 'wrong') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.exponentialRampToValueAtTime(100, now + 0.3);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
      osc.start(now);
      osc.stop(now + 0.35);
    } else if (type === 'aim') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(440, now);
      gain.gain.setValueAtTime(0.05, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
      osc.start(now);
      osc.stop(now + 0.05);
    }
  }

  // === GAME STATE ===
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  let arrow = {};
  let banners = [];
  let stars = [];
  let minarets = [];
  let aimAngle = 0;
  let arrowFlying = false;
  let arrowTrail = [];
  let selectedBanner = -1;
  let animTime = 0;
  let entranceProgress = 0;
  let fireParticles = [];
  let ashParticles = [];
  let glowParticles = [];
  let resultShown = false;
  let resultTimer = 0;
  let bannerShake = [0, 0, 0, 0];
  let bannerScales = [1, 1, 1, 1];

  // Minaret positions
  const MINARET_X = [115, 285, 455, 620];
  const BANNER_Y = [140, 200, 160, 220];
  const BANNER_W = 150;
  const BANNER_H = 115;

  function initGame() {
    arrow = {
      x: 360,
      y: 490,
      vx: 0,
      vy: 0,
      active: false,
      glow: 0
    };
    aimAngle = -Math.PI / 2;
    arrowFlying = false;
    arrowTrail = [];
    selectedBanner = -1;
    animTime = 0;
    entranceProgress = 0;
    fireParticles = [];
    ashParticles = [];
    glowParticles = [];
    resultShown = false;
    resultTimer = 0;
    bannerShake = [0, 0, 0, 0];
    bannerScales = [1, 1, 1, 1];

    // Create banners with answer text
    banners = QUESTION.choices.map((choice, i) => ({
      x: MINARET_X[i] - BANNER_W / 2,
      y: BANNER_Y[i],
      w: BANNER_W,
      h: BANNER_H,
      choice: choice,
      alpha: 1,
      burning: false,
      burnProgress: 0,
      hit: false,
      correct: false,
      scale: 0,
      entryDelay: i * 80
    }));

    // Generate background stars
    stars = [];
    for (let i = 0; i < 60; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H * 0.6,
        size: Math.random() * 2 + 0.5,
        twinkle: Math.random() * Math.PI * 2,
        speed: 0.5 + Math.random() * 2
      });
    }

    // Generate minaret data
    minarets = MINARET_X.map((x, i) => ({
      x: x,
      baseY: H,
      topY: BANNER_Y[i] - 60,
      width: 40 + Math.random() * 10,
      spiralOffset: Math.random() * Math.PI * 2,
      levels: 4 + Math.floor(Math.random() * 3)
    }));
  }

  function wrapText(ctx, text, maxWidth) {
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';

    for (const word of words) {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      const metrics = ctx.measureText(testLine);
      if (metrics.width > maxWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    }
    if (currentLine) lines.push(currentLine);
    return lines;
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    animTime += dt;

    // Entrance animation
    if (entranceProgress < 1) {
      entranceProgress = Math.min(1, entranceProgress + dt * 1.5);
      banners.forEach((b, i) => {
        const t = Math.max(0, Math.min(1, (entranceProgress * 1000 - b.entryDelay) / 350));
        if (!prefersReducedMotion) {
          const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
          b.scale = t * spring;
        } else {
          b.scale = t;
        }
      });
    }

    // Arrow glow pulse
    arrow.glow = (Math.sin(animTime * 4) + 1) / 2;

    // Update glowing particles around arrow (when not flying)
    if (!arrowFlying && !resultShown) {
      if (Math.random() < 0.3) {
        glowParticles.push({
          x: arrow.x + (Math.random() - 0.5) * 20,
          y: arrow.y + (Math.random() - 0.5) * 10,
          vx: (Math.random() - 0.5) * 30,
          vy: -Math.random() * 40 - 10,
          alpha: 0.8,
          size: 1 + Math.random() * 3,
          color: Math.random() > 0.5 ? COLORS.orange : COLORS.amber
        });
      }
    }

    // Update glow particles
    glowParticles = glowParticles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.alpha -= dt * 1.5;
      return p.alpha > 0;
    });

    // Arrow flight
    if (arrowFlying && arrow.active) {
      arrow.x += arrow.vx * dt;
      arrow.y += arrow.vy * dt;
      arrow.vy += 120 * dt; // light gravity

      // Trail
      arrowTrail.push({ x: arrow.x, y: arrow.y, alpha: 1 });

      // Check banner collisions
      for (let i = 0; i < banners.length; i++) {
        const b = banners[i];
        if (b.burning || b.hit) continue;
        if (arrow.x > b.x && arrow.x < b.x + b.w &&
            arrow.y > b.y && arrow.y < b.y + b.h) {
          // Hit this banner
          selectedBanner = i;
          arrow.active = false;
          b.hit = true;

          if (b.choice.is_correct) {
            b.correct = true;
            playSound('correct');
            bannerScales[i] = 1.15;
          } else {
            b.burning = true;
            playSound('wrong');
            bannerShake[i] = 1;
          }
          resultShown = true;
          resultTimer = 0;
          break;
        }
      }

      // Off screen check
      if (arrow.x < -20 || arrow.x > W + 20 || arrow.y < -20 || arrow.y > H + 20) {
        arrow.active = false;
        arrowFlying = false;
        // Reset arrow position
        arrow.x = 360;
        arrow.y = 490;
      }
    }

    // Update arrow trail
    arrowTrail = arrowTrail.filter(t => {
      t.alpha -= dt * 3;
      return t.alpha > 0;
    });

    // Update banner burning animation
    banners.forEach((b, i) => {
      if (b.burning) {
        b.burnProgress = Math.min(1, b.burnProgress + dt * 1.2);

        // Spawn fire particles
        if (b.burnProgress < 0.8) {
          for (let j = 0; j < 3; j++) {
            fireParticles.push({
              x: b.x + Math.random() * b.w,
              y: b.y + b.h * (1 - b.burnProgress) + Math.random() * 20,
              vx: (Math.random() - 0.5) * 40,
              vy: -Math.random() * 80 - 20,
              alpha: 1,
              size: 3 + Math.random() * 5,
              color: Math.random() > 0.4 ? '#FF6B35' : '#FFD700'
            });
          }
        }

        // Spawn ash particles
        if (b.burnProgress > 0.3 && Math.random() < 0.4) {
          ashParticles.push({
            x: b.x + Math.random() * b.w,
            y: b.y + Math.random() * b.h,
            vx: (Math.random() - 0.5) * 20,
            vy: Math.random() * 15 + 5,
            alpha: 0.7,
            size: 1 + Math.random() * 3,
            rotation: Math.random() * Math.PI * 2,
            rotSpeed: (Math.random() - 0.5) * 3
          });
        }
      }

      // Banner shake decay
      if (bannerShake[i] > 0) {
        bannerShake[i] = Math.max(0, bannerShake[i] - dt * 3);
      }

      // Correct banner scale decay
      if (b.correct && bannerScales[i] > 1) {
        bannerScales[i] = Math.max(1, bannerScales[i] - dt * 0.5);
      }
    });

    // Update fire particles
    fireParticles = fireParticles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.alpha -= dt * 2;
      p.size *= 0.98;
      return p.alpha > 0;
    });

    // Update ash particles
    ashParticles = ashParticles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotSpeed * dt;
      p.alpha -= dt * 0.5;
      return p.alpha > 0 && p.y < H + 20;
    });

    // Result delay then call engine.end
    if (resultShown) {
      resultTimer += dt;
      if (resultTimer > 1.2 && selectedBanner >= 0) {
        const choice = banners[selectedBanner].choice;
        engine.end(choice.is_correct, choice.explanation);
      }
    }
  }

  function drawGame() {
    // === SKY GRADIENT (purple dusk) ===
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, '#1a0a2e');
    skyGrad.addColorStop(0.3, '#2d1b4e');
    skyGrad.addColorStop(0.6, '#5c3d7a');
    skyGrad.addColorStop(0.85, '#b06848');
    skyGrad.addColorStop(1, '#d4845a');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    // === STARS ===
    stars.forEach(s => {
      const twinkle = 0.4 + 0.6 * Math.abs(Math.sin(animTime * s.speed + s.twinkle));
      ctx.globalAlpha = twinkle;
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // === MINARETS (sandstone towers) ===
    minarets.forEach((m, i) => {
      const halfW = m.width / 2;

      // Tower body - sandstone gradient
      const towerGrad = ctx.createLinearGradient(m.x - halfW, 0, m.x + halfW, 0);
      towerGrad.addColorStop(0, '#c9a96e');
      towerGrad.addColorStop(0.3, '#e8d5a8');
      towerGrad.addColorStop(0.7, '#dfc48e');
      towerGrad.addColorStop(1, '#b89558');

      ctx.fillStyle = towerGrad;
      ctx.beginPath();
      ctx.moveTo(m.x - halfW, m.baseY);
      ctx.lineTo(m.x - halfW * 0.7, m.topY);
      ctx.lineTo(m.x + halfW * 0.7, m.topY);
      ctx.lineTo(m.x + halfW, m.baseY);
      ctx.closePath();
      ctx.fill();

      // Spiral lines
      ctx.strokeStyle = 'rgba(139, 108, 58, 0.3)';
      ctx.lineWidth = 1;
      const towerH = m.baseY - m.topY;
      for (let l = 0; l < m.levels; l++) {
        const ly = m.topY + (towerH / m.levels) * l;
        const wAtY = halfW * 0.7 + (halfW * 0.3) * ((ly - m.topY) / towerH);
        ctx.beginPath();
        ctx.moveTo(m.x - wAtY, ly);
        ctx.lineTo(m.x + wAtY, ly);
        ctx.stroke();

        // Spiral decoration
        const spiralX = m.x + Math.sin(l * 1.2 + m.spiralOffset + animTime * 0.2) * wAtY * 0.5;
        ctx.fillStyle = 'rgba(139, 108, 58, 0.2)';
        ctx.beginPath();
        ctx.arc(spiralX, ly + towerH / m.levels / 2, 3, 0, Math.PI * 2);
        ctx.fill();
      }

      // Tower cap (dome)
      ctx.fillStyle = '#dfc48e';
      ctx.beginPath();
      ctx.arc(m.x, m.topY, halfW * 0.7, Math.PI, 0);
      ctx.fill();

      // Crescent on top
      ctx.fillStyle = COLORS.amber;
      ctx.beginPath();
      ctx.arc(m.x, m.topY - halfW * 0.7 - 8, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#2d1b4e';
      ctx.beginPath();
      ctx.arc(m.x + 3, m.topY - halfW * 0.7 - 8, 5, 0, Math.PI * 2);
      ctx.fill();

      // Balcony
      const balcY = BANNER_Y[i] + BANNER_H + 5;
      ctx.fillStyle = '#b89558';
      ctx.beginPath();
      ctx.roundRect(m.x - halfW - 8, balcY, halfW * 2 + 16, 8, 3);
      ctx.fill();
    });

    // === SILK BANNERS WITH ANSWER TEXT ===
    banners.forEach((b, i) => {
      if (b.scale <= 0) return;

      ctx.save();
      const cx = b.x + b.w / 2;
      const cy = b.y + b.h / 2;
      const shakeOffset = bannerShake[i] > 0 ?
        Math.sin(animTime * 40) * 8 * bannerShake[i] : 0;

      ctx.translate(cx + shakeOffset, cy);
      ctx.scale(b.scale * bannerScales[i], b.scale * bannerScales[i]);
      ctx.translate(-cx, -cy);

      if (b.burning && b.burnProgress > 0) {
        // Partially burned banner
        const remainH = b.h * (1 - b.burnProgress);
        if (remainH > 2) {
          ctx.globalAlpha = 1 - b.burnProgress * 0.5;

          // Banner fabric
          const bannerGrad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + remainH);
          bannerGrad.addColorStop(0, '#8B2500');
          bannerGrad.addColorStop(1, '#CD3700');
          ctx.fillStyle = bannerGrad;
          ctx.beginPath();
          ctx.roundRect(b.x, b.y, b.w, remainH, 4);
          ctx.fill();

          // Burning edge glow
          ctx.strokeStyle = '#FF6B35';
          ctx.lineWidth = 2;
          ctx.shadowColor = '#FF6B35';
          ctx.shadowBlur = 10;
          ctx.beginPath();
          ctx.moveTo(b.x, b.y + remainH);
          ctx.lineTo(b.x + b.w, b.y + remainH);
          ctx.stroke();
          ctx.shadowBlur = 0;

          ctx.globalAlpha = 1;
        }
      } else if (!b.burning) {
        // Normal banner
        const isHighlighted = !arrowFlying && !resultShown && isAimingAt(i);

        // Banner rope
        ctx.strokeStyle = '#8B7355';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(cx, b.y - 5);
        ctx.lineTo(cx, b.y);
        ctx.stroke();

        // Banner fabric
        let bgColor = isHighlighted ? '#E8F9F8' : '#FFFFFF';
        if (b.correct) bgColor = '#E8F8E5';

        ctx.fillStyle = bgColor;
        ctx.beginPath();
        ctx.roundRect(b.x, b.y, b.w, b.h, 8);
        ctx.fill();

        // Border
        let borderColor = isHighlighted ? COLORS.cyan : COLORS.borderSubtle;
        if (b.correct) borderColor = COLORS.success;

        ctx.strokeStyle = borderColor;
        ctx.lineWidth = isHighlighted ? 2.5 : 1.5;
        ctx.beginPath();
        ctx.roundRect(b.x, b.y, b.w, b.h, 8);
        ctx.stroke();

        // Highlighted glow
        if (isHighlighted) {
          ctx.shadowColor = COLORS.cyan;
          ctx.shadowBlur = 12;
          ctx.strokeStyle = COLORS.cyan;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.roundRect(b.x, b.y, b.w, b.h, 8);
          ctx.stroke();
          ctx.shadowBlur = 0;
        }

        // Correct glow
        if (b.correct) {
          ctx.shadowColor = COLORS.success;
          ctx.shadowBlur = 15;
          ctx.strokeStyle = COLORS.success;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.roundRect(b.x, b.y, b.w, b.h, 8);
          ctx.stroke();
          ctx.shadowBlur = 0;
        }

        // Banner tassels
        ctx.fillStyle = isHighlighted ? COLORS.cyan : COLORS.orange;
        // Left tassel
        ctx.beginPath();
        ctx.moveTo(b.x, b.y + b.h);
        ctx.lineTo(b.x + 8, b.y + b.h);
        ctx.lineTo(b.x + 4, b.y + b.h + 12);
        ctx.closePath();
        ctx.fill();
        // Right tassel
        ctx.beginPath();
        ctx.moveTo(b.x + b.w - 8, b.y + b.h);
        ctx.lineTo(b.x + b.w, b.y + b.h);
        ctx.lineTo(b.x + b.w - 4, b.y + b.h + 12);
        ctx.closePath();
        ctx.fill();

        // Answer text
        ctx.font = "400 16px 'Nunito', sans-serif";
        ctx.fillStyle = COLORS.textPrimary;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';

        const textMaxW = b.w - 14;
        const lines = wrapText(ctx, b.choice.text, textMaxW);
        const lineH = 18;
        const totalTextH = lines.length * lineH;
        const textStartY = b.y + (b.h - totalTextH) / 2;

        lines.forEach((line, li) => {
          ctx.fillText(line, cx, textStartY + li * lineH);
        });

        // Choice label (A, B, C, D)
        const labels = ['A', 'B', 'C', 'D'];
        ctx.font = "700 14px 'Nunito Sans', sans-serif";
        ctx.fillStyle = '#FFFFFF';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        const labelColor = isHighlighted ? COLORS.cyan : COLORS.orange;
        ctx.fillStyle = labelColor;
        ctx.beginPath();
        ctx.arc(b.x + 14, b.y + 14, 10, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#FFFFFF';
        ctx.fillText(labels[i], b.x + 14, b.y + 14);
      }

      ctx.restore();
    });

    // === FIRE PARTICLES ===
    fireParticles.forEach(p => {
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // === ASH PARTICLES ===
    ashParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = '#555555';
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // === GLOW PARTICLES ===
    glowParticles.forEach(p => {
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // === ARROW TRAIL ===
    arrowTrail.forEach(t => {
      ctx.globalAlpha = t.alpha * 0.6;
      ctx.fillStyle = COLORS.amber;
      ctx.beginPath();
      ctx.arc(t.x, t.y, 2 + t.alpha * 3, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // === ARROW OR AIM LINE ===
    if (!arrowFlying && !resultShown) {
      // Draw aim direction line
      const aimLen = 80;
      const aimEndX = arrow.x + Math.cos(aimAngle) * aimLen;
      const aimEndY = arrow.y + Math.sin(aimAngle) * aimLen;

      // Dotted aim line
      ctx.setLineDash([4, 6]);
      ctx.strokeStyle = 'rgba(248, 167, 66, 0.5)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(arrow.x, arrow.y);
      ctx.lineTo(aimEndX, aimEndY);
      ctx.stroke();
      ctx.setLineDash([]);

      // Extended trajectory dots
      const speed = 500;
      const vx = Math.cos(aimAngle) * speed;
      const vy = Math.sin(aimAngle) * speed;
      for (let t = 0.05; t < 0.6; t += 0.04) {
        const px = arrow.x + vx * t;
        const py = arrow.y + vy * t + 60 * t * t;
        if (px < 0 || px > W || py < 0 || py > H) break;
        ctx.globalAlpha = 0.3 * (1 - t / 0.6);
        ctx.fillStyle = COLORS.amber;
        ctx.beginPath();
        ctx.arc(px, py, 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    // Draw arrow
    if (!resultShown || (arrowFlying && arrow.active)) {
      drawArrow(arrow.x, arrow.y, arrowFlying ?
        Math.atan2(arrow.vy, arrow.vx) : aimAngle);
    }

    // === GROUND ===
    const groundGrad = ctx.createLinearGradient(0, H - 60, 0, H);
    groundGrad.addColorStop(0, '#8B7355');
    groundGrad.addColorStop(1, '#6B5335');
    ctx.fillStyle = groundGrad;
    ctx.beginPath();
    ctx.roundRect(0, H - 50, W, 50, [0, 0, 0, 0]);
    ctx.fill();

    // Ground texture dots
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    for (let gx = 0; gx < W; gx += 12) {
      const gy = H - 45 + Math.sin(gx * 0.1) * 3;
      ctx.beginPath();
      ctx.arc(gx, gy, 1, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawArrow(x, y, angle) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);

    // Arrow glow
    const glowAmount = 8 + arrow.glow * 6;
    ctx.shadowColor = COLORS.orange;
    ctx.shadowBlur = glowAmount;

    // Arrow shaft
    ctx.strokeStyle = COLORS.amber;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-20, 0);
    ctx.lineTo(12, 0);
    ctx.stroke();

    // Arrow head
    ctx.fillStyle = COLORS.orange;
    ctx.beginPath();
    ctx.moveTo(20, 0);
    ctx.lineTo(10, -6);
    ctx.lineTo(10, 6);
    ctx.closePath();
    ctx.fill();

    // Fletching
    ctx.fillStyle = 'rgba(232, 122, 62, 0.6)';
    ctx.beginPath();
    ctx.moveTo(-20, 0);
    ctx.lineTo(-16, -5);
    ctx.lineTo(-12, 0);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-20, 0);
    ctx.lineTo(-16, 5);
    ctx.lineTo(-12, 0);
    ctx.closePath();
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.restore();
  }

  function isAimingAt(bannerIndex) {
    // Check if aim trajectory would hit a given banner
    const speed = 500;
    const vx = Math.cos(aimAngle) * speed;
    const vy = Math.sin(aimAngle) * speed;
    const b = banners[bannerIndex];

    for (let t = 0; t < 1.2; t += 0.01) {
      const px = arrow.x + vx * t;
      const py = arrow.y + vy * t + 60 * t * t;
      if (px > b.x && px < b.x + b.w && py > b.y && py < b.y + b.h) {
        return true;
      }
    }
    return false;
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;
    if (resultShown) return;

    const AIM_SPEED = 1.8;

    if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
      aimAngle -= AIM_SPEED * 0.03;
      playSound('aim');
      e.preventDefault();
    } else if (e.code === 'ArrowRight' || e.code === 'KeyD') {
      aimAngle += AIM_SPEED * 0.03;
      playSound('aim');
      e.preventDefault();
    } else if (e.code === 'ArrowUp' || e.code === 'KeyW') {
      aimAngle -= AIM_SPEED * 0.03;
      playSound('aim');
      e.preventDefault();
    } else if (e.code === 'ArrowDown' || e.code === 'KeyS') {
      aimAngle += AIM_SPEED * 0.03;
      playSound('aim');
      e.preventDefault();
    } else if ((e.code === 'Space' || e.code === 'Enter') && !arrowFlying) {
      // Shoot arrow
      arrowFlying = true;
      arrow.active = true;
      const speed = 500;
      arrow.vx = Math.cos(aimAngle) * speed;
      arrow.vy = Math.sin(aimAngle) * speed;
      arrowTrail = [];
      playSound('shoot');
      e.preventDefault();
    }

    // Clamp aim angle (only upward arcs)
    aimAngle = Math.max(-Math.PI * 0.85, Math.min(-Math.PI * 0.15, aimAngle));
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
