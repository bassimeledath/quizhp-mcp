<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Template</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC'
  };

  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // === AUDIO ===
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playSound(type) {
    if (prefersReducedMotion) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;

    if (type === 'dock') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(440, now);
      osc.frequency.exponentialRampToValueAtTime(660, now + 0.08);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
      osc.start(now);
      osc.stop(now + 0.15);
    } else if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, now);
      osc.frequency.setValueAtTime(659, now + 0.1);
      osc.frequency.setValueAtTime(784, now + 0.2);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
      osc.start(now);
      osc.stop(now + 0.4);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(300, now);
      osc.frequency.exponentialRampToValueAtTime(100, now + 0.4);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
      osc.start(now);
      osc.stop(now + 0.4);
    } else if (type === 'thrust') {
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(120, now);
      osc.frequency.exponentialRampToValueAtTime(180, now + 0.05);
      gain.gain.setValueAtTime(0.06, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
      osc.start(now);
      osc.stop(now + 0.08);
    }
  }

  // === GAME STATE ===
  let drone = {};
  let balloons = [];
  let clouds = [];
  let moistureDroplets = [];
  let keys = {};
  let dockingTarget = null;
  let dockingTimer = 0;
  const DOCK_TIME = 0.4;
  let gameTime = 0;
  let shakeTimer = 0;
  let shakeIntensity = 0;
  let tumbleState = null; // { balloon, timer, drone }
  let gameParticles = [];
  let entranceTimer = 0;
  let thrustCooldown = 0;

  // Balloon colors for visual distinction
  const BALLOON_COLORS = ['#E85D4A', '#4ECDC4', '#F5A742', '#6BBF59'];
  const BALLOON_ACCENTS = ['#C44A3A', '#3AADA5', '#D68E30', '#52A644'];

  function wrapText(ctx, text, maxWidth) {
    const words = text.split(' ');
    const lines = [];
    let currentLine = words[0];
    for (let i = 1; i < words.length; i++) {
      const testLine = currentLine + ' ' + words[i];
      if (ctx.measureText(testLine).width <= maxWidth) {
        currentLine = testLine;
      } else {
        lines.push(currentLine);
        currentLine = words[i];
      }
    }
    lines.push(currentLine);
    return lines;
  }

  function initGame() {
    gameTime = 0;
    entranceTimer = 0;
    shakeTimer = 0;
    shakeIntensity = 0;
    tumbleState = null;
    gameParticles = [];
    dockingTarget = null;
    dockingTimer = 0;
    thrustCooldown = 0;
    keys = {};

    // Drone starts at center between balloon rows
    drone = {
      x: W / 2,
      y: H / 2 + 10,
      vx: 0,
      vy: 0,
      scale: 1,
      rotation: 0,
      propellerAngle: 0
    };

    // Create 4 balloons in 2 rows spread across sky
    const balloonPositions = [
      { x: 180, y: 60 },
      { x: 540, y: 50 },
      { x: 180, y: 280 },
      { x: 540, y: 270 }
    ];

    balloons = QUESTION.choices.map((choice, i) => ({
      x: balloonPositions[i].x,
      y: balloonPositions[i].y,
      baseY: balloonPositions[i].y,
      color: BALLOON_COLORS[i],
      accent: BALLOON_ACCENTS[i],
      choice: choice,
      index: i,
      bobPhase: Math.random() * Math.PI * 2,
      scale: 0,
      alpha: 0,
      highlight: false,
      docked: false,
      flashTimer: 0,
      flashColor: null
    }));

    // Generate clouds
    clouds = [];
    for (let i = 0; i < 8; i++) {
      clouds.push({
        x: Math.random() * (W + 200) - 100,
        y: H - 60 + Math.random() * 80,
        w: 80 + Math.random() * 120,
        speed: 10 + Math.random() * 15,
        alpha: 0.4 + Math.random() * 0.3
      });
    }

    // Generate moisture droplets
    moistureDroplets = [];
    for (let i = 0; i < 40; i++) {
      moistureDroplets.push({
        x: Math.random() * W,
        y: Math.random() * H * 0.7,
        size: 1 + Math.random() * 2,
        alpha: 0.2 + Math.random() * 0.4,
        drift: Math.random() * 0.3 + 0.1,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  const DRONE_SPEED = 240;
  const DRONE_FRICTION = 3.5;
  const DOCK_DISTANCE = 65;

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;
    entranceTimer += dt;
    thrustCooldown = Math.max(0, thrustCooldown - dt);

    // Entrance animation for balloons
    if (!prefersReducedMotion) {
      balloons.forEach((b, i) => {
        const delay = i * 0.15;
        const t = Math.max(0, Math.min(1, (entranceTimer - delay) / 0.5));
        const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
        b.scale = t * spring;
        b.alpha = t;
        if (t >= 1) { b.scale = 1; b.alpha = 1; }
      });
    } else {
      balloons.forEach(b => { b.scale = 1; b.alpha = 1; });
    }

    // Handle tumble animation
    if (tumbleState) {
      tumbleState.timer += dt;
      drone.y += 180 * dt;
      drone.rotation += 8 * dt;
      drone.x += Math.sin(tumbleState.timer * 5) * 40 * dt;

      if (tumbleState.timer > 1.2) {
        playSound('wrong');
        const choice = tumbleState.balloon.choice;
        engine.end(choice.is_correct, choice.explanation);
        tumbleState = null;
      }
      return;
    }

    // Drone movement with keys
    let ax = 0, ay = 0;
    if (keys['ArrowLeft'] || keys['KeyA']) ax -= 1;
    if (keys['ArrowRight'] || keys['KeyD']) ax += 1;
    if (keys['ArrowUp'] || keys['KeyW']) ay -= 1;
    if (keys['ArrowDown'] || keys['KeyS']) ay += 1;

    // Thrust particles
    if ((ax !== 0 || ay !== 0) && thrustCooldown <= 0) {
      thrustCooldown = 0.06;
      gameParticles.push({
        x: drone.x - ax * 8,
        y: drone.y - ay * 8,
        vx: -ax * 60 + (Math.random() - 0.5) * 40,
        vy: -ay * 60 + (Math.random() - 0.5) * 40,
        life: 0.4,
        maxLife: 0.4,
        size: 3 + Math.random() * 3,
        color: COLORS.orange
      });
    }

    drone.vx += ax * DRONE_SPEED * 3 * dt;
    drone.vy += ay * DRONE_SPEED * 3 * dt;

    // Apply friction
    drone.vx *= Math.max(0, 1 - DRONE_FRICTION * dt);
    drone.vy *= Math.max(0, 1 - DRONE_FRICTION * dt);

    // Clamp speed
    const speed = Math.sqrt(drone.vx * drone.vx + drone.vy * drone.vy);
    if (speed > DRONE_SPEED) {
      drone.vx = (drone.vx / speed) * DRONE_SPEED;
      drone.vy = (drone.vy / speed) * DRONE_SPEED;
    }

    drone.x += drone.vx * dt;
    drone.y += drone.vy * dt;

    // Bounds
    drone.x = Math.max(20, Math.min(W - 20, drone.x));
    drone.y = Math.max(20, Math.min(H - 20, drone.y));

    // Propeller animation
    drone.propellerAngle += 20 * dt;

    // Balloon bobbing
    balloons.forEach(b => {
      b.bobPhase += 1.2 * dt;
      b.y = b.baseY + Math.sin(b.bobPhase) * 6;

      // Flash timer
      if (b.flashTimer > 0) {
        b.flashTimer -= dt;
      }
    });

    // Check proximity to balloons for highlighting
    let closest = null;
    let closestDist = Infinity;
    balloons.forEach(b => {
      const dx = drone.x - b.x;
      const dy = drone.y - b.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < DOCK_DISTANCE && dist < closestDist) {
        closest = b;
        closestDist = dist;
      }
      b.highlight = false;
    });

    if (closest) {
      closest.highlight = true;
      dockingTarget = closest;
    } else {
      dockingTarget = null;
      dockingTimer = 0;
    }

    // Docking progress
    if (dockingTarget && (keys['Space'] || keys['Enter'])) {
      dockingTimer += dt;
      if (dockingTimer >= DOCK_TIME) {
        const b = dockingTarget;
        playSound('dock');

        if (b.choice.is_correct) {
          // Success: green flash then end
          b.flashColor = COLORS.success;
          b.flashTimer = 0.5;

          // Correct confetti particles
          for (let i = 0; i < 20; i++) {
            gameParticles.push({
              x: b.x,
              y: b.y,
              vx: (Math.random() - 0.5) * 300,
              vy: (Math.random() - 0.5) * 300 - 100,
              life: 0.8,
              maxLife: 0.8,
              size: 4 + Math.random() * 5,
              color: [COLORS.orange, COLORS.amber, COLORS.cyan, COLORS.success][Math.floor(Math.random() * 4)]
            });
          }

          setTimeout(() => {
            playSound('correct');
            engine.end(true, b.choice.explanation);
          }, 300);
        } else {
          // Wrong: freeze and tumble
          b.flashColor = COLORS.error;
          b.flashTimer = 0.5;
          shakeTimer = 0.3;
          shakeIntensity = 6;

          tumbleState = {
            balloon: b,
            timer: 0
          };
        }

        dockingTimer = 0;
        dockingTarget = null;
      }
    } else if (!keys['Space'] && !keys['Enter']) {
      dockingTimer = Math.max(0, dockingTimer - dt * 2);
    }

    // Update particles
    gameParticles.forEach(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 200 * dt;
      p.life -= dt;
    });
    gameParticles = gameParticles.filter(p => p.life > 0);

    // Update clouds
    clouds.forEach(c => {
      c.x += c.speed * dt;
      if (c.x > W + c.w) c.x = -c.w;
    });

    // Update moisture droplets
    moistureDroplets.forEach(d => {
      d.phase += d.drift * dt;
      d.x += Math.sin(d.phase * 3) * 0.3;
      d.y += d.drift * 8 * dt;
      if (d.y > H * 0.8) {
        d.y = -5;
        d.x = Math.random() * W;
      }
    });

    // Shake decay
    if (shakeTimer > 0) {
      shakeTimer -= dt;
    }
  }

  function drawGame() {
    // Sky gradient background
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, '#3B82C8');
    skyGrad.addColorStop(0.4, '#5BA3E0');
    skyGrad.addColorStop(0.7, '#8CC5F0');
    skyGrad.addColorStop(1, '#C8E2F8');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    // Shake effect
    if (shakeTimer > 0) {
      const s = shakeIntensity * (shakeTimer / 0.3);
      ctx.save();
      ctx.translate(Math.sin(shakeTimer * 60) * s, Math.cos(shakeTimer * 45) * s * 0.5);
    }

    // Draw moisture droplets
    moistureDroplets.forEach(d => {
      ctx.fillStyle = `rgba(255, 255, 255, ${d.alpha * 0.5})`;
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
      ctx.fill();
    });

    // Draw clouds at bottom
    clouds.forEach(c => {
      ctx.fillStyle = `rgba(255, 255, 255, ${c.alpha})`;
      ctx.beginPath();
      ctx.ellipse(c.x, c.y, c.w * 0.5, 20, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(c.x - c.w * 0.2, c.y - 8, c.w * 0.3, 16, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(c.x + c.w * 0.2, c.y - 5, c.w * 0.25, 14, 0, 0, Math.PI * 2);
      ctx.fill();
    });

    // Draw balloons
    balloons.forEach((b, i) => {
      if (b.alpha <= 0) return;
      ctx.save();
      ctx.globalAlpha = b.alpha;
      ctx.translate(b.x, b.y);
      ctx.scale(b.scale, b.scale);

      // Balloon envelope
      const balloonRadius = 32;

      // Glow if highlighted
      if (b.highlight) {
        ctx.shadowColor = COLORS.cyan;
        ctx.shadowBlur = 18;
      }

      // Flash effect
      let fillColor = b.color;
      if (b.flashTimer > 0 && b.flashColor) {
        fillColor = b.flashColor;
      }

      // Main balloon body
      ctx.fillStyle = fillColor;
      ctx.beginPath();
      ctx.ellipse(0, -20, balloonRadius, balloonRadius * 1.3, 0, 0, Math.PI * 2);
      ctx.fill();

      // Balloon highlight
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.beginPath();
      ctx.ellipse(-8, -32, 10, 14, -0.3, 0, Math.PI * 2);
      ctx.fill();

      // Balloon knot
      ctx.fillStyle = b.accent;
      ctx.beginPath();
      ctx.moveTo(-4, 20);
      ctx.lineTo(4, 20);
      ctx.lineTo(0, 26);
      ctx.closePath();
      ctx.fill();

      // String to canister
      ctx.strokeStyle = b.accent;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(0, 26);
      ctx.quadraticCurveTo(2, 38, 0, 48);
      ctx.stroke();

      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;

      // Scientific canister - sized to fit 60-char text
      const canW = 260;
      const canH = 72;
      const canX = -canW / 2;
      const canY = 48;

      // Canister body
      ctx.fillStyle = '#FFFFFF';
      ctx.strokeStyle = b.highlight ? COLORS.cyan : COLORS.borderSubtle;
      ctx.lineWidth = b.highlight ? 2.5 : 1.5;
      ctx.beginPath();
      ctx.roundRect(canX, canY, canW, canH, 8);
      ctx.fill();
      ctx.stroke();

      // Canister side accent stripe
      ctx.fillStyle = fillColor;
      ctx.beginPath();
      ctx.roundRect(canX, canY, 6, canH, [8, 0, 0, 8]);
      ctx.fill();

      // Label letter
      ctx.fillStyle = b.color;
      ctx.font = "700 14px 'Nunito Sans', sans-serif";
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(String.fromCharCode(65 + i), canX + 12, canY + 4);

      // Answer text on canister
      ctx.fillStyle = COLORS.textPrimary;
      ctx.font = "400 14px 'Nunito', sans-serif";
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';

      const textMaxW = canW - 24;
      const lines = wrapText(ctx, b.choice.text, textMaxW);
      const lineHeight = 16;
      const totalTextH = lines.length * lineHeight;
      const textStartY = canY + (canH - totalTextH) / 2;

      lines.forEach((line, li) => {
        ctx.fillText(line, canX + 12, textStartY + li * lineHeight);
      });

      // Docking progress indicator
      if (b === dockingTarget && dockingTimer > 0) {
        const progress = dockingTimer / DOCK_TIME;
        ctx.strokeStyle = COLORS.orange;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(0, -20, balloonRadius + 8, -Math.PI / 2, -Math.PI / 2 + progress * Math.PI * 2);
        ctx.stroke();
      }

      ctx.restore();
    });

    // Draw game particles
    gameParticles.forEach(p => {
      const alpha = p.life / p.maxLife;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Draw drone
    ctx.save();
    ctx.translate(drone.x, drone.y);
    ctx.rotate(drone.rotation);
    ctx.scale(drone.scale, drone.scale);

    // Drone body
    ctx.fillStyle = COLORS.textPrimary;
    ctx.beginPath();
    ctx.roundRect(-14, -6, 28, 16, 4);
    ctx.fill();

    // Drone arms
    ctx.strokeStyle = COLORS.textPrimary;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-14, 0);
    ctx.lineTo(-26, -8);
    ctx.moveTo(14, 0);
    ctx.lineTo(26, -8);
    ctx.stroke();

    // Propellers (spinning)
    const propAngle = drone.propellerAngle;
    ctx.strokeStyle = COLORS.orange;
    ctx.lineWidth = 2;

    // Left propeller
    ctx.save();
    ctx.translate(-26, -8);
    ctx.rotate(propAngle);
    ctx.beginPath();
    ctx.moveTo(-10, 0);
    ctx.lineTo(10, 0);
    ctx.stroke();
    ctx.restore();

    // Right propeller
    ctx.save();
    ctx.translate(26, -8);
    ctx.rotate(-propAngle);
    ctx.beginPath();
    ctx.moveTo(-10, 0);
    ctx.lineTo(10, 0);
    ctx.stroke();
    ctx.restore();

    // Camera/sensor underneath
    ctx.fillStyle = COLORS.cyan;
    ctx.beginPath();
    ctx.arc(0, 12, 4, 0, Math.PI * 2);
    ctx.fill();

    // LED indicator
    const ledBlink = Math.sin(gameTime * 6) > 0;
    ctx.fillStyle = ledBlink ? '#6BBF59' : '#3A7A2E';
    ctx.beginPath();
    ctx.arc(0, -4, 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();

    // Draw docking hint if near balloon
    if (dockingTarget && !tumbleState) {
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.font = "600 16px 'Nunito Sans', sans-serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      const hintY = Math.min(drone.y + 35, H - 20);
      const pulse = 0.8 + Math.sin(gameTime * 4) * 0.2;
      ctx.globalAlpha = pulse;
      ctx.fillText('Hold SPACE to dock', drone.x, hintY);
      ctx.globalAlpha = 1;
    }

    // Restore shake
    if (shakeTimer > 0) {
      ctx.restore();
    }
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;

    if (e.type === 'keydown') {
      keys[e.code] = true;
      // Resume audio context on first keypress
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    } else if (e.type === 'keyup') {
      keys[e.code] = false;
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
    handleInput(e);
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
