<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vampire Striker</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1C1C1A;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #2A2A27;
      border-radius: 12px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === QUIZHP COLOR PALETTE ===
  const COLORS = {
    bgPrimary: '#1C1C1A',
    bgSurface: '#2A2A27',
    bgSurfaceSecondary: '#363633',
    textPrimary: '#F5F5F0',
    textSecondary: '#C2C2B8',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    cyanHover: '#45B8B0',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#424240',
    borderStrong: '#5A5A56'
  };

  // === REDUCED MOTION CHECK ===
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // === WEB AUDIO API FOR SOUND EFFECTS ===
  let audioCtx = null;
  function getAudioContext() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
  }

  function playSound(type) {
    if (prefersReducedMotion) return;
    try {
      const ctx = getAudioContext();
      if (ctx.state === 'suspended') ctx.resume();

      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);

      if (type === 'whoosh') {
        // Descending whoosh for pitchfork strike
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(800, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.15, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
        osc.start();
        osc.stop(ctx.currentTime + 0.15);
      } else if (type === 'impact') {
        // Thud impact
        osc.type = 'sine';
        osc.frequency.setValueAtTime(150, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(50, ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.4, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
        osc.start();
        osc.stop(ctx.currentTime + 0.15);
      } else if (type === 'correct') {
        // Victory fanfare
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, ctx.currentTime);
        osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
        osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
        osc.start();
        osc.stop(ctx.currentTime + 0.4);
      } else if (type === 'wrong') {
        // Sympathetic buzz
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(180, ctx.currentTime);
        osc.frequency.setValueAtTime(140, ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.15, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
        osc.start();
        osc.stop(ctx.currentTime + 0.25);
      } else if (type === 'click') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, ctx.currentTime);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.05);
        osc.start();
        osc.stop(ctx.currentTime + 0.05);
      } else if (type === 'anticipation') {
        // Rising anticipation sound
        osc.type = 'sine';
        osc.frequency.setValueAtTime(300, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(500, ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
        osc.start();
        osc.stop(ctx.currentTime + 0.1);
      }
    } catch (e) {
      // Audio not available
    }
  }

  // === GAME STATE ===
  let vampire = { x: 0, y: 0, scale: 1, rotation: 0 };
  let pitchfork = { down: false, y: 0, animSpeed: 900, anticipating: false, anticipateTime: 0 };
  let boxes = [];
  let strikeButton = { x: 0, y: 0, w: 0, h: 0, hover: false, scale: 1, pulseTime: 0 };
  let answered = false;
  let hitBox = null;
  let impactTime = 0;
  let impactParticles = [];
  let screenShake = { x: 0, y: 0, intensity: 0 };
  let glowPulse = 0;
  let entranceProgress = 0;
  let gameTime = 0;

  // Box dimensions and scroll
  const BOX_HEIGHT = 90;
  const BOX_WIDTH = 500;
  const BOX_SPACING = 60;
  const BOX_Y = 260;
  const SCROLL_SPEED = 80;

  // Helper function for wrapping text
  function wrapText(text, maxWidth, fontSize) {
    ctx.font = `600 ${fontSize}px 'Nunito', sans-serif`;
    const words = text.split(' ');
    const lines = [];
    let line = '';

    for (let i = 0; i < words.length; i++) {
      const testLine = line + words[i] + ' ';
      const metrics = ctx.measureText(testLine);

      if (metrics.width > maxWidth && i > 0) {
        lines.push(line.trim());
        line = words[i] + ' ';
      } else {
        line = testLine;
      }
    }
    if (line.trim()) lines.push(line.trim());
    return lines;
  }

  // Spawn impact particles
  function spawnImpactParticles(x, y, isCorrect) {
    const colors = isCorrect
      ? [COLORS.success, COLORS.amber, COLORS.cyan, COLORS.orange]
      : [COLORS.error, '#AA4444', '#884444'];

    for (let i = 0; i < (isCorrect ? 25 : 12); i++) {
      const angle = (Math.PI * 2 / (isCorrect ? 25 : 12)) * i + Math.random() * 0.3;
      const speed = isCorrect ? 150 + Math.random() * 200 : 80 + Math.random() * 120;
      impactParticles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - (isCorrect ? 100 : 50),
        color: colors[Math.floor(Math.random() * colors.length)],
        size: isCorrect ? 4 + Math.random() * 6 : 3 + Math.random() * 4,
        alpha: 1,
        gravity: 400,
        rotation: Math.random() * Math.PI * 2,
        rotationSpeed: (Math.random() - 0.5) * 8
      });
    }
  }

  // Update particles
  function updateParticles(dt) {
    impactParticles = impactParticles.filter(p => {
      p.vy += p.gravity * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.alpha -= dt * 1.5;
      p.rotation += p.rotationSpeed * dt;
      return p.alpha > 0 && p.y < H + 50;
    });
  }

  // Draw particles
  function drawParticles() {
    impactParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });
    ctx.globalAlpha = 1;
  }

  // Screen shake update
  function updateScreenShake(dt) {
    if (screenShake.intensity > 0) {
      screenShake.x = (Math.random() - 0.5) * screenShake.intensity * 2;
      screenShake.y = (Math.random() - 0.5) * screenShake.intensity * 2;
      screenShake.intensity *= 0.9;
      if (screenShake.intensity < 0.5) {
        screenShake.intensity = 0;
        screenShake.x = 0;
        screenShake.y = 0;
      }
    }
  }

  // Trigger screen shake
  function triggerScreenShake(intensity) {
    if (!prefersReducedMotion) {
      screenShake.intensity = intensity;
    }
  }

  function initGame() {
    // Vampire position (top center)
    vampire = { x: W / 2, y: 90, scale: 1, rotation: 0 };

    // Pitchfork state
    pitchfork = { down: false, y: 0, animSpeed: 900, anticipating: false, anticipateTime: 0 };

    // Strike button
    strikeButton = { x: W / 2 - 100, y: 460, w: 200, h: 50, hover: false, scale: 1, pulseTime: 0 };

    // Reset state
    answered = false;
    hitBox = null;
    impactTime = 0;
    impactParticles = [];
    screenShake = { x: 0, y: 0, intensity: 0 };
    glowPulse = 0;
    entranceProgress = 0;
    gameTime = 0;

    // Initialize answer boxes - start off-screen right
    boxes = [];
    let currentX = W + 50;

    QUESTION.choices.forEach((choice, i) => {
      boxes.push({
        x: currentX,
        width: BOX_WIDTH,
        text: choice.text,
        choiceIndex: i,
        is_correct: choice.is_correct,
        explanation: choice.explanation,
        scale: 1,
        glow: 0,
        hit: false
      });
      currentX += BOX_WIDTH + BOX_SPACING;
    });
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;
    glowPulse += dt * 3;

    // Entrance animation
    if (entranceProgress < 1) {
      entranceProgress = Math.min(entranceProgress + dt * 2, 1);
    }

    // Button pulse animation
    strikeButton.pulseTime += dt * 4;

    if (answered) {
      impactTime += dt;
      updateParticles(dt);
      updateScreenShake(dt);

      // Animate hit box
      if (hitBox) {
        if (hitBox.is_correct) {
          hitBox.scale = 1 + Math.sin(impactTime * 8) * 0.05 * Math.max(0, 1 - impactTime);
        } else {
          // Shake animation for wrong answer
          const shakeDecay = Math.max(0, 1 - impactTime * 2);
          hitBox.x = hitBox.originalX + Math.sin(impactTime * 40) * 8 * shakeDecay;
        }
      }
      return;
    }

    // Scroll boxes left to right
    for (let box of boxes) {
      box.x -= SCROLL_SPEED * dt;

      // Wrap around when box goes off left edge
      if (box.x + box.width < 0) {
        // Find rightmost box position
        let maxX = -Infinity;
        for (let b of boxes) {
          if (b !== box) {
            maxX = Math.max(maxX, b.x + b.width);
          }
        }
        box.x = maxX + BOX_SPACING;
      }

      // Update box glow for boxes under target line
      const pitchforkX = vampire.x;
      if (pitchforkX >= box.x && pitchforkX <= box.x + box.width) {
        box.glow = Math.min(box.glow + dt * 5, 1);
      } else {
        box.glow = Math.max(box.glow - dt * 3, 0);
      }
    }

    // Anticipation phase before strike
    if (pitchfork.anticipating) {
      pitchfork.anticipateTime += dt;
      vampire.y = 90 - Math.sin(pitchfork.anticipateTime * 20) * 3;

      if (pitchfork.anticipateTime >= 0.1) {
        pitchfork.anticipating = false;
        pitchfork.down = true;
        pitchfork.y = 0;
        playSound('whoosh');
      }
      return;
    }

    // Animate pitchfork striking
    if (pitchfork.down) {
      pitchfork.y += pitchfork.animSpeed * dt;

      // Check collision with boxes
      const pitchforkTipY = vampire.y + 30 + pitchfork.y;
      const pitchforkX = vampire.x;

      if (pitchforkTipY >= BOX_Y && !answered) {
        // Check which box is hit
        for (let box of boxes) {
          if (pitchforkX >= box.x && pitchforkX <= box.x + box.width) {
            // Hit this box!
            answered = true;
            hitBox = box;
            hitBox.hit = true;
            hitBox.originalX = box.x;

            playSound('impact');
            triggerScreenShake(box.is_correct ? 8 : 15);
            spawnImpactParticles(pitchforkX, BOX_Y + BOX_HEIGHT / 2, box.is_correct);

            setTimeout(() => {
              playSound(box.is_correct ? 'correct' : 'wrong');
            }, 150);

            // Delay end slightly to show impact effects
            setTimeout(() => {
              engine.end(box.is_correct, box.explanation);
            }, box.is_correct ? 400 : 500);
            break;
          }
        }

        // If pitchfork missed all boxes, reset it
        if (!answered && pitchforkTipY > BOX_Y + BOX_HEIGHT + 20) {
          pitchfork.down = false;
          pitchfork.y = 0;
        }
      }
    }
  }

  function drawGame() {
    // Apply screen shake
    ctx.save();
    ctx.translate(screenShake.x, screenShake.y);

    // Clear canvas with dark theme
    ctx.fillStyle = COLORS.bgPrimary;
    ctx.fillRect(-10, -10, W + 20, H + 20);

    // Draw subtle gradient background
    const gradient = ctx.createLinearGradient(0, 0, 0, H);
    gradient.addColorStop(0, COLORS.bgPrimary);
    gradient.addColorStop(1, COLORS.bgSurface);
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, W, H);

    // Draw target line indicator with glow
    const targetGlow = 0.3 + Math.sin(glowPulse) * 0.1;
    ctx.strokeStyle = `rgba(78, 205, 196, ${targetGlow})`;
    ctx.lineWidth = 3;
    ctx.setLineDash([15, 10]);
    ctx.beginPath();
    ctx.moveTo(vampire.x, vampire.y + 50);
    ctx.lineTo(vampire.x, BOX_Y - 10);
    ctx.stroke();
    ctx.setLineDash([]);

    // Draw target crosshair at bottom of line
    ctx.strokeStyle = COLORS.cyan;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(vampire.x, BOX_Y - 10, 8 + Math.sin(glowPulse) * 2, 0, Math.PI * 2);
    ctx.stroke();

    // Draw answer boxes scrolling across screen
    for (let box of boxes) {
      ctx.save();

      const boxCenterX = box.x + box.width / 2;
      const boxCenterY = BOX_Y + BOX_HEIGHT / 2;

      // Apply scale transform
      ctx.translate(boxCenterX, boxCenterY);
      ctx.scale(box.scale, box.scale);
      ctx.translate(-boxCenterX, -boxCenterY);

      // Determine box colors based on state
      let bgColor = COLORS.bgSurfaceSecondary;
      let borderColor = COLORS.borderSubtle;

      if (box.hit) {
        bgColor = box.is_correct ? COLORS.success : COLORS.error;
        borderColor = box.is_correct ? '#5AAF4A' : '#D04A3A';
      }

      // Draw glow effect for boxes under target
      if (box.glow > 0 && !box.hit) {
        ctx.shadowColor = COLORS.cyan;
        ctx.shadowBlur = 20 * box.glow;
      }

      // Box background
      ctx.fillStyle = bgColor;
      ctx.beginPath();
      ctx.roundRect(Math.floor(box.x), BOX_Y, box.width, BOX_HEIGHT, 12);
      ctx.fill();

      ctx.shadowBlur = 0;

      // Box border
      ctx.strokeStyle = box.glow > 0 && !box.hit ? COLORS.cyan : borderColor;
      ctx.lineWidth = box.glow > 0 ? 3 : 2;
      ctx.beginPath();
      ctx.roundRect(Math.floor(box.x), BOX_Y, box.width, BOX_HEIGHT, 12);
      ctx.stroke();

      // Box text (wrapped to fit) with proper font size
      const fontSize = 16;
      const lineHeight = fontSize * 1.4;
      const lines = wrapText(box.text, box.width - 40, fontSize);

      ctx.font = `600 ${fontSize}px 'Nunito', sans-serif`;
      ctx.fillStyle = COLORS.textPrimary;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';

      // Center text vertically in box
      const totalTextHeight = lines.length * lineHeight;
      let startY = BOX_Y + (BOX_HEIGHT - totalTextHeight) / 2;

      for (let i = 0; i < lines.length; i++) {
        ctx.fillText(lines[i], box.x + 20, startY + i * lineHeight);
      }

      ctx.restore();
    }

    // Draw vampire character at top with entrance animation
    const vampireScale = prefersReducedMotion ? 1 : Math.min(1, entranceProgress * 1.5);
    ctx.save();
    ctx.translate(vampire.x, vampire.y);
    ctx.scale(vampireScale * vampire.scale, vampireScale * vampire.scale);
    ctx.rotate(vampire.rotation);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🧛', 0, 0);
    ctx.restore();

    // Draw pitchfork with metal gradient
    const pitchforkColor = '#8B4513';
    const prongColor = '#A0522D';
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    if (pitchfork.down || pitchfork.anticipating) {
      // Pitchfork striking down
      const strikeY = pitchfork.anticipating ? -10 : pitchfork.y;

      // Handle
      ctx.strokeStyle = pitchforkColor;
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(vampire.x, vampire.y + 30);
      ctx.lineTo(vampire.x, vampire.y + 30 + strikeY);
      ctx.stroke();

      // Pitchfork prongs (trident style) with metallic look
      const tipY = vampire.y + 30 + strikeY;
      ctx.strokeStyle = prongColor;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(vampire.x - 15, tipY - 10);
      ctx.lineTo(vampire.x - 15, tipY + 15);
      ctx.moveTo(vampire.x, tipY - 15);
      ctx.lineTo(vampire.x, tipY + 20);
      ctx.moveTo(vampire.x + 15, tipY - 10);
      ctx.lineTo(vampire.x + 15, tipY + 15);
      ctx.stroke();

      // Motion blur effect when striking fast
      if (pitchfork.down && pitchfork.y > 50) {
        ctx.strokeStyle = `rgba(139, 69, 19, 0.3)`;
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.moveTo(vampire.x, vampire.y + 30);
        ctx.lineTo(vampire.x, tipY - 30);
        ctx.stroke();
      }
    } else {
      // Pitchfork held up (ready position) with bobbing
      const bobOffset = prefersReducedMotion ? 0 : Math.sin(gameTime * 2) * 2;

      ctx.strokeStyle = pitchforkColor;
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(vampire.x, vampire.y + 30);
      ctx.lineTo(vampire.x, vampire.y - 40 + bobOffset);
      ctx.stroke();

      // Prongs at top
      const tipY = vampire.y - 40 + bobOffset;
      ctx.strokeStyle = prongColor;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(vampire.x - 15, tipY + 10);
      ctx.lineTo(vampire.x - 15, tipY - 15);
      ctx.moveTo(vampire.x, tipY + 15);
      ctx.lineTo(vampire.x, tipY - 20);
      ctx.moveTo(vampire.x + 15, tipY + 10);
      ctx.lineTo(vampire.x + 15, tipY - 15);
      ctx.stroke();

      // Gleam on prongs
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(vampire.x, tipY + 10);
      ctx.lineTo(vampire.x, tipY - 15);
      ctx.stroke();
    }

    // Draw particles
    drawParticles();

    // Draw strike button at bottom with hover and pulse effects
    const buttonScale = strikeButton.hover ? 1.05 : 1;
    const buttonPulse = 1 + Math.sin(strikeButton.pulseTime) * 0.02;
    const finalScale = buttonScale * buttonPulse * strikeButton.scale;

    ctx.save();
    const btnCenterX = strikeButton.x + strikeButton.w / 2;
    const btnCenterY = strikeButton.y + strikeButton.h / 2;
    ctx.translate(btnCenterX, btnCenterY);
    ctx.scale(finalScale, finalScale);
    ctx.translate(-btnCenterX, -btnCenterY);

    // Button shadow
    if (strikeButton.hover) {
      ctx.shadowColor = COLORS.orange;
      ctx.shadowBlur = 20;
    }

    // Button gradient
    const btnGradient = ctx.createLinearGradient(
      strikeButton.x, strikeButton.y,
      strikeButton.x, strikeButton.y + strikeButton.h
    );
    btnGradient.addColorStop(0, strikeButton.hover ? COLORS.orange : COLORS.error);
    btnGradient.addColorStop(1, strikeButton.hover ? COLORS.orangeHover : '#C54E3D');

    ctx.fillStyle = btnGradient;
    ctx.beginPath();
    ctx.roundRect(strikeButton.x, strikeButton.y, strikeButton.w, strikeButton.h, 12);
    ctx.fill();

    ctx.shadowBlur = 0;

    // Button border
    ctx.strokeStyle = strikeButton.hover ? COLORS.orangeHover : '#B84C3E';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(strikeButton.x, strikeButton.y, strikeButton.w, strikeButton.h, 12);
    ctx.stroke();

    // Button text
    ctx.font = "bold 24px 'Nunito Sans', sans-serif";
    ctx.fillStyle = COLORS.textPrimary;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('STRIKE!', btnCenterX, btnCenterY);

    ctx.restore();

    // Draw instruction text
    ctx.font = "500 14px 'Nunito Sans', sans-serif";
    ctx.fillStyle = COLORS.textSecondary;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Press SPACE or click STRIKE to attack!', W / 2, H - 25);

    ctx.restore(); // Restore from screen shake
  }

  function strike() {
    if (!pitchfork.down && !pitchfork.anticipating && !answered) {
      playSound('anticipation');
      playSound('click');
      pitchfork.anticipating = true;
      pitchfork.anticipateTime = 0;
    }
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;

    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      strike();
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for game and end screen buttons
  canvas.addEventListener('click', (e) => {
    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameState === 'ended') {
      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
        if (pointInRect(x, y, centeredRestart)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
      return;
    }

    // Game is playing - check strike button
    if (pointInRect(x, y, strikeButton)) {
      strike();
    }
  });

  // Mouse move handler for button hover
  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'playing') return;
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    strikeButton.hover = pointInRect(x, y, strikeButton);
  });


  // Cursor change handler for end screen buttons
  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'ended') {
      canvas.style.cursor = 'default';
      return;
    }
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    if (gameResult) {
      if (pointInRect(x, y, restartButton) || pointInRect(x, y, nextButton)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    } else {
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    }
    canvas.style.cursor = 'default';
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
