<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shimmering Crystal Fragments</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC'
  };

  // Crystal color themes - each crystal has a unique color palette
  const CRYSTAL_THEMES = [
    { core: '#E87A3E', glow: '#F5A742', mid: '#FFB89D', light: '#FFF4ED', label: 'A' },
    { core: '#4ECDC4', glow: '#45B8B0', mid: '#8FE8E0', light: '#E8F9F8', label: 'B' },
    { core: '#9B6BF5', glow: '#B48AF7', mid: '#C9A8FA', light: '#F0E8FF', label: 'C' },
    { core: '#6BBF59', glow: '#8DD47E', mid: '#A8E49A', light: '#E8F8E5', label: 'D' }
  ];

  // === GAME STATE ===
  let crystals = [];
  let hoveredCrystal = -1;
  let selectedCrystal = -1;
  let gameTime = 0;
  let ambientParticles = [];
  let selectionParticles = [];
  let mouseX = 0, mouseY = 0;
  let entranceProgress = 0;
  let selectionAnimTime = 0;
  let selectionAnimating = false;

  // Audio context
  let audioCtx = null;

  function getAudioContext() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
  }

  function playSound(type) {
    try {
      const ctx = getAudioContext();
      if (ctx.state === 'suspended') ctx.resume();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);

      if (type === 'hover') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.08);
        gain.gain.setValueAtTime(0.06, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.1);
      } else if (type === 'select') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(500, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.12, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.3);
        // Harmonic
        const osc2 = ctx.createOscillator();
        const gain2 = ctx.createGain();
        osc2.connect(gain2);
        gain2.connect(ctx.destination);
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(750, ctx.currentTime);
        osc2.frequency.exponentialRampToValueAtTime(1800, ctx.currentTime + 0.2);
        gain2.gain.setValueAtTime(0.06, ctx.currentTime);
        gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
        osc2.start(ctx.currentTime);
        osc2.stop(ctx.currentTime + 0.25);
      } else if (type === 'correct') {
        const notes = [523, 659, 784, 1047];
        notes.forEach((freq, i) => {
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.connect(g);
          g.connect(ctx.destination);
          o.type = 'sine';
          o.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.1);
          g.gain.setValueAtTime(0.1, ctx.currentTime + i * 0.1);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.1 + 0.3);
          o.start(ctx.currentTime + i * 0.1);
          o.stop(ctx.currentTime + i * 0.1 + 0.3);
        });
      } else if (type === 'wrong') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(300, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.08, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.35);
      }
    } catch (e) {}
  }

  // Word-wrap text onto multiple lines
  function wrapText(text, maxWidth, font) {
    ctx.font = font;
    const words = text.split(' ');
    const lines = [];
    let currentLine = words[0];

    for (let i = 1; i < words.length; i++) {
      const testLine = currentLine + ' ' + words[i];
      if (ctx.measureText(testLine).width <= maxWidth) {
        currentLine = testLine;
      } else {
        lines.push(currentLine);
        currentLine = words[i];
      }
    }
    lines.push(currentLine);
    return lines;
  }

  function initGame() {
    gameTime = 0;
    hoveredCrystal = -1;
    selectedCrystal = -1;
    entranceProgress = 0;
    selectionAnimTime = 0;
    selectionAnimating = false;
    ambientParticles = [];
    selectionParticles = [];

    // Crystal positions: 2x2 grid layout in the upper portion, text below each
    const gridCenterX = W / 2;
    const gridCenterY = 170;
    const spacingX = 260;
    const spacingY = 210;

    crystals = QUESTION.choices.map((choice, i) => {
      const col = i % 2;
      const row = Math.floor(i / 2);
      const cx = gridCenterX + (col - 0.5) * spacingX;
      const cy = gridCenterY + row * spacingY;

      return {
        x: cx,
        y: cy,
        baseX: cx,
        baseY: cy,
        radius: 50,
        theme: CRYSTAL_THEMES[i],
        choice: choice,
        index: i,
        hoverGlow: 0,
        scale: 0,
        alpha: 0,
        bobPhase: Math.random() * Math.PI * 2,
        rotation: 0,
        shakeX: 0,
        pulseScale: 1
      };
    });

    // Seed ambient particles
    for (let i = 0; i < 30; i++) {
      ambientParticles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 15,
        vy: -Math.random() * 20 - 5,
        size: Math.random() * 3 + 1,
        alpha: Math.random() * 0.4 + 0.1,
        color: CRYSTAL_THEMES[Math.floor(Math.random() * 4)].glow,
        life: Math.random()
      });
    }
  }

  function spawnSelectionParticles(crystal) {
    const colors = ['#E87A3E', '#F5A742', '#4ECDC4', '#6BBF59'];
    for (let i = 0; i < 40; i++) {
      const angle = (Math.PI * 2 * i) / 40 + Math.random() * 0.3;
      const speed = 80 + Math.random() * 200;
      selectionParticles.push({
        x: crystal.x,
        y: crystal.y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        size: Math.random() * 6 + 3,
        alpha: 1,
        color: colors[Math.floor(Math.random() * colors.length)],
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 8
      });
    }
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Entrance animation (staggered bounce-in)
    if (entranceProgress < 1) {
      entranceProgress = Math.min(entranceProgress + dt * 2.5, 1);
    }

    crystals.forEach((crystal, i) => {
      // Staggered entrance
      const staggerDelay = i * 0.12;
      const localProgress = Math.max(0, Math.min(1, (entranceProgress - staggerDelay) / (1 - staggerDelay * 0.5)));
      if (localProgress < 1) {
        const t = localProgress;
        const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
        crystal.scale = t * spring;
        crystal.alpha = t;
      } else {
        crystal.scale = 1;
        crystal.alpha = 1;
      }

      // Floating bob effect
      crystal.bobPhase += dt * 1.2;
      crystal.y = crystal.baseY + Math.sin(crystal.bobPhase) * 6;

      // Hover glow
      if (i === hoveredCrystal && selectedCrystal === -1) {
        crystal.hoverGlow = Math.min(crystal.hoverGlow + dt * 5, 1);
      } else {
        crystal.hoverGlow = Math.max(crystal.hoverGlow - dt * 3, 0);
      }

      // Selection animation
      if (selectionAnimating && selectedCrystal === i) {
        selectionAnimTime += dt;
        if (selectionAnimTime < 0.5) {
          crystal.pulseScale = 1 + Math.sin(selectionAnimTime * Math.PI * 4) * 0.15 * (1 - selectionAnimTime * 2);
        }
        if (selectionAnimTime >= 0.6) {
          selectionAnimating = false;
          const choice = crystal.choice;
          if (choice.is_correct) {
            playSound('correct');
          } else {
            playSound('wrong');
          }
          engine.end(choice.is_correct, choice.explanation);
        }
      }

      // Shake for wrong-looking (non-selected crystals dim after selection)
      if (selectedCrystal !== -1 && selectedCrystal !== i) {
        crystal.alpha = Math.max(crystal.alpha - dt * 2, 0.3);
      }
    });

    // Update ambient particles
    ambientParticles.forEach(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt * 0.15;
      if (p.life <= 0 || p.y < -10) {
        p.x = Math.random() * W;
        p.y = H + 10;
        p.life = 1;
        p.alpha = Math.random() * 0.4 + 0.1;
      }
    });

    // Update selection particles
    selectionParticles.forEach(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 120 * dt;
      p.rotation += p.rotSpeed * dt;
      p.alpha -= dt * 1.5;
    });
    selectionParticles = selectionParticles.filter(p => p.alpha > 0);
  }

  function drawCavern() {
    // Dark cavern background with gradient
    const bgGrad = ctx.createRadialGradient(W / 2, H / 2, 50, W / 2, H / 2, 420);
    bgGrad.addColorStop(0, '#1e1e3a');
    bgGrad.addColorStop(0.5, '#141428');
    bgGrad.addColorStop(1, '#0a0a18');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    // Subtle stalactite shapes at top
    ctx.fillStyle = '#0d0d20';
    for (let i = 0; i < 8; i++) {
      const sx = i * 100 + 30;
      const sh = 20 + Math.sin(i * 1.7) * 15;
      ctx.beginPath();
      ctx.moveTo(sx - 15, 0);
      ctx.lineTo(sx, sh);
      ctx.lineTo(sx + 15, 0);
      ctx.fill();
    }

    // Floor rock texture
    ctx.fillStyle = '#0d0d20';
    ctx.beginPath();
    ctx.moveTo(0, H - 20);
    for (let x = 0; x <= W; x += 40) {
      ctx.lineTo(x, H - 20 + Math.sin(x * 0.05) * 8);
    }
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.fill();
  }

  function drawCrystal(crystal) {
    const { x, y, radius, theme, hoverGlow, alpha, rotation } = crystal;
    const sc = crystal.scale * crystal.pulseScale;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(x + crystal.shakeX, y);
    ctx.scale(sc, sc);

    // Outer glow (ambient + hover amplified)
    const glowRadius = radius * (1.6 + hoverGlow * 1.0);
    const glowGrad = ctx.createRadialGradient(0, 0, radius * 0.3, 0, 0, glowRadius);
    glowGrad.addColorStop(0, theme.glow + '60');
    glowGrad.addColorStop(0.4, theme.core + (hoverGlow > 0.5 ? '40' : '20'));
    glowGrad.addColorStop(1, theme.core + '00');
    ctx.fillStyle = glowGrad;
    ctx.beginPath();
    ctx.arc(0, 0, glowRadius, 0, Math.PI * 2);
    ctx.fill();

    // Crystal body - irregular polygon shape
    const facets = 7;
    const innerR = radius * 0.6;
    const outerR = radius;
    ctx.beginPath();
    for (let i = 0; i < facets; i++) {
      const angle = (Math.PI * 2 * i) / facets - Math.PI / 2 + Math.sin(gameTime + i) * 0.05;
      const r = (i % 2 === 0) ? outerR : innerR;
      const px = Math.cos(angle) * r;
      const py = Math.sin(angle) * r;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();

    // Crystal fill with internal gradient
    const crystalGrad = ctx.createRadialGradient(-radius * 0.2, -radius * 0.2, 0, 0, 0, outerR);
    crystalGrad.addColorStop(0, theme.light);
    crystalGrad.addColorStop(0.3, theme.mid);
    crystalGrad.addColorStop(0.7, theme.core);
    crystalGrad.addColorStop(1, theme.core + 'CC');
    ctx.fillStyle = crystalGrad;
    ctx.fill();

    // Crystal edge glow
    ctx.strokeStyle = theme.glow + (hoverGlow > 0.3 ? 'FF' : '88');
    ctx.lineWidth = 2 + hoverGlow * 2;
    ctx.stroke();

    // Internal light refraction lines
    ctx.strokeStyle = theme.light + '66';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-radius * 0.3, -radius * 0.4);
    ctx.lineTo(radius * 0.1, radius * 0.2);
    ctx.moveTo(radius * 0.2, -radius * 0.3);
    ctx.lineTo(-radius * 0.1, radius * 0.3);
    ctx.stroke();

    // Bright highlight spot
    const hlGrad = ctx.createRadialGradient(-radius * 0.2, -radius * 0.25, 0, -radius * 0.2, -radius * 0.25, radius * 0.35);
    hlGrad.addColorStop(0, 'rgba(255,255,255,0.7)');
    hlGrad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = hlGrad;
    ctx.beginPath();
    ctx.arc(-radius * 0.2, -radius * 0.25, radius * 0.35, 0, Math.PI * 2);
    ctx.fill();

    // Hover ring pulse
    if (hoverGlow > 0) {
      ctx.strokeStyle = theme.glow + Math.floor(hoverGlow * 150).toString(16).padStart(2, '0');
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.arc(0, 0, radius + 10 + Math.sin(gameTime * 4) * 3, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    ctx.restore();
  }

  function drawCrystalLabel(crystal) {
    const { x, y, radius, theme, choice, alpha, scale: sc } = crystal;
    if (alpha < 0.1) return;

    ctx.save();
    ctx.globalAlpha = alpha;

    // Answer text below crystal - word-wrapped
    const textY = y + radius * sc + 18;
    const maxWidth = 180;
    const font = "400 14px 'Nunito', sans-serif";
    const lines = wrapText(choice.text, maxWidth, font);

    ctx.font = font;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';

    // Background for readability
    const lineHeight = 18;
    const totalHeight = lines.length * lineHeight + 8;
    const bgWidth = maxWidth + 12;

    ctx.fillStyle = 'rgba(10, 10, 24, 0.75)';
    ctx.beginPath();
    ctx.roundRect(x - bgWidth / 2, textY - 4, bgWidth, totalHeight, 8);
    ctx.fill();

    // Text
    ctx.fillStyle = '#F5F5F0';
    lines.forEach((line, idx) => {
      ctx.fillText(line, x, textY + idx * lineHeight);
    });

    ctx.restore();
  }

  function drawAmbientParticles() {
    ambientParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha * p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
  }

  function drawSelectionParticles() {
    selectionParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });
  }

  function drawGame() {
    drawCavern();
    drawAmbientParticles();

    // Draw crystals and their labels
    crystals.forEach(crystal => {
      drawCrystal(crystal);
    });
    crystals.forEach(crystal => {
      drawCrystalLabel(crystal);
    });

    drawSelectionParticles();
  }

  // Check if point is inside crystal (circular hitbox)
  function getCrystalAtPoint(px, py) {
    for (let i = crystals.length - 1; i >= 0; i--) {
      const c = crystals[i];
      const dist = Math.sqrt((px - c.x) ** 2 + (py - c.y) ** 2);
      if (dist <= c.radius * c.scale + 10) {
        return i;
      }
    }
    return -1;
  }

  // Mouse move handler for hover effects
  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'playing' || selectedCrystal !== -1) return;
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    mouseX = x;
    mouseY = y;
    const newHover = getCrystalAtPoint(x, y);
    if (newHover !== hoveredCrystal) {
      if (newHover !== -1) playSound('hover');
      hoveredCrystal = newHover;
    }
  });

  // Click handler for crystal selection
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'playing' || selectedCrystal !== -1) return;
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    const clickedIdx = getCrystalAtPoint(x, y);
    if (clickedIdx !== -1) {
      selectedCrystal = clickedIdx;
      selectionAnimating = true;
      selectionAnimTime = 0;
      playSound('select');
      spawnSelectionParticles(crystals[clickedIdx]);
    }
  });

  function handleInput(e) {
    if (gameState !== 'playing') return;
    // Keyboard shortcuts: 1-4 to select crystals
    if (selectedCrystal === -1) {
      const key = parseInt(e.key);
      if (key >= 1 && key <= 4) {
        const idx = key - 1;
        if (idx < crystals.length) {
          selectedCrystal = idx;
          selectionAnimating = true;
          selectionAnimTime = 0;
          playSound('select');
          spawnSelectionParticles(crystals[idx]);
        }
      }
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
