<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Template</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === GAME STATE ===
  const COLORS = {
    bgPrimary: '#1C1C1A',
    bgSurface: '#2A2A27',
    bgSurfaceSecondary: '#363633',
    borderSubtle: '#424240',
    borderStrong: '#5A5A56',
    textPrimary: '#F5F5F0',
    textSecondary: '#C2C2B8',
    textTertiary: '#8C8C84',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    peach: '#FFB89D'
  };

  // Scroll layout
  const SCROLL_W = 460;
  const SCROLL_H = 80;
  const SCROLL_GAP = 12;
  const SCROLL_START_X = (W - SCROLL_W) / 2;
  const SCROLL_START_Y = 100;

  let scrolls = [];
  let hoveredScroll = -1;
  let selectedScroll = -1;
  let gameTime = 0;

  // Dust mote particles for ambience
  let dustMotes = [];

  // Animation state
  let entranceProgress = 0;
  let selectionFlashTime = 0;
  let shakeOffset = { x: 0, y: 0 };
  let shakeTime = 0;

  // Sound effects via Web Audio
  let audioCtx = null;

  function getAudioCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
  }

  function playClickSound() {
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.05);
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.1);
    } catch (e) {}
  }

  function playCorrectSound() {
    try {
      const ctx = getAudioCtx();
      const notes = [523, 659, 784];
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.1);
        gain.gain.setValueAtTime(0.12, ctx.currentTime + i * 0.1);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.1 + 0.3);
        osc.start(ctx.currentTime + i * 0.1);
        osc.stop(ctx.currentTime + i * 0.1 + 0.3);
      });
    } catch (e) {}
  }

  function playWrongSound() {
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.1, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.3);
    } catch (e) {}
  }

  // Text wrapping helper for scrolls
  function wrapText(text, maxWidth, font) {
    ctx.font = font;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';

    for (const word of words) {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    }
    if (currentLine) lines.push(currentLine);
    return lines;
  }

  function initGame() {
    gameTime = 0;
    entranceProgress = 0;
    selectedScroll = -1;
    hoveredScroll = -1;
    selectionFlashTime = 0;
    shakeOffset = { x: 0, y: 0 };
    shakeTime = 0;

    scrolls = QUESTION.choices.map((choice, i) => ({
      x: SCROLL_START_X,
      y: SCROLL_START_Y + i * (SCROLL_H + SCROLL_GAP),
      w: SCROLL_W,
      h: SCROLL_H,
      choice: choice,
      index: i,
      scale: 0,
      alpha: 0,
      offsetY: 0,
      glowIntensity: 0
    }));

    // Initialize dust motes
    dustMotes = [];
    for (let i = 0; i < 25; i++) {
      dustMotes.push({
        x: Math.random() * W,
        y: Math.random() * H,
        size: Math.random() * 2.5 + 0.5,
        speed: Math.random() * 15 + 5,
        alpha: Math.random() * 0.4 + 0.1,
        drift: Math.random() * Math.PI * 2
      });
    }
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Entrance animation (staggered bounceIn)
    if (entranceProgress < 1) {
      entranceProgress = Math.min(entranceProgress + dt * 2.5, 1);
    }

    scrolls.forEach((scroll, i) => {
      const staggerDelay = i * 0.12;
      const localT = Math.max(0, Math.min(1, (entranceProgress * (1 + 0.12 * 3) - staggerDelay)));

      if (localT > 0) {
        const spring = 1 + Math.sin(localT * Math.PI * 2) * 0.15 * (1 - localT);
        scroll.scale = localT * spring;
        scroll.alpha = Math.min(localT * 1.5, 1);
      }

      // Hover lift effect
      if (hoveredScroll === i && selectedScroll === -1) {
        scroll.offsetY = Math.max(scroll.offsetY - dt * 30, -3);
        scroll.glowIntensity = Math.min(scroll.glowIntensity + dt * 5, 1);
      } else {
        scroll.offsetY = Math.min(scroll.offsetY + dt * 30, 0);
        scroll.glowIntensity = Math.max(scroll.glowIntensity - dt * 5, 0);
      }
    });

    // Dust motes
    dustMotes.forEach(mote => {
      mote.y -= mote.speed * dt;
      mote.x += Math.sin(gameTime + mote.drift) * 8 * dt;
      mote.alpha = 0.1 + Math.sin(gameTime * 0.5 + mote.drift) * 0.15;
      if (mote.y < -5) {
        mote.y = H + 5;
        mote.x = Math.random() * W;
      }
    });

    // Selection flash / shake animation
    if (selectedScroll !== -1) {
      selectionFlashTime += dt;

      // Shake for wrong answer
      if (shakeTime > 0) {
        shakeTime -= dt;
        const decay = shakeTime / 0.4;
        shakeOffset.x = Math.sin(shakeTime * Math.PI * 25) * 6 * decay;
      } else {
        shakeOffset.x = 0;
      }

      // End game after brief delay
      if (selectionFlashTime > 0.6) {
        const choice = scrolls[selectedScroll].choice;
        if (choice.is_correct) {
          playCorrectSound();
        } else {
          playWrongSound();
        }
        engine.end(choice.is_correct, choice.explanation);
      }
    }
  }

  function drawGame() {
    // Dark library background
    ctx.fillStyle = '#12100E';
    ctx.fillRect(0, 0, W, H);

    // Subtle radial glow from center (candlelight)
    const grad = ctx.createRadialGradient(W / 2, H / 2, 50, W / 2, H / 2, 400);
    grad.addColorStop(0, 'rgba(232, 122, 62, 0.08)');
    grad.addColorStop(0.5, 'rgba(245, 167, 66, 0.03)');
    grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Flickering candle glow
    const flicker = 0.04 + Math.sin(gameTime * 8) * 0.015 + Math.sin(gameTime * 13) * 0.01;
    const candleGrad = ctx.createRadialGradient(W / 2, 40, 5, W / 2, 40, 300);
    candleGrad.addColorStop(0, `rgba(245, 167, 66, ${flicker * 3})`);
    candleGrad.addColorStop(0.5, `rgba(232, 122, 62, ${flicker})`);
    candleGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.fillStyle = candleGrad;
    ctx.fillRect(0, 0, W, H);

    // Dust motes
    dustMotes.forEach(mote => {
      ctx.beginPath();
      ctx.arc(mote.x, mote.y, mote.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(245, 167, 66, ${mote.alpha})`;
      ctx.fill();
    });

    // Title - "Choose a Scroll"
    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = "700 32px 'Belanosima', sans-serif";
    ctx.fillStyle = COLORS.amber;
    ctx.shadowColor = 'rgba(245, 167, 66, 0.4)';
    ctx.shadowBlur = 15;
    ctx.fillText('Choose a Scroll', W / 2, 55);
    ctx.shadowBlur = 0;
    ctx.restore();

    // Draw scrolls
    ctx.save();
    ctx.translate(shakeOffset.x, shakeOffset.y);

    scrolls.forEach((scroll, i) => {
      if (scroll.alpha <= 0) return;

      ctx.save();
      ctx.globalAlpha = scroll.alpha;

      const cx = scroll.x + scroll.w / 2;
      const cy = scroll.y + scroll.h / 2 + scroll.offsetY;

      ctx.translate(cx, cy);
      ctx.scale(scroll.scale, scroll.scale);
      ctx.translate(-cx, -cy);

      const sy = scroll.y + scroll.offsetY;

      // Selection highlight
      if (selectedScroll === i) {
        const flashAlpha = Math.sin(selectionFlashTime * 12) * 0.3 + 0.3;
        const isCorrect = scroll.choice.is_correct;
        const highlightColor = isCorrect ? COLORS.success : COLORS.error;

        // Glow
        ctx.shadowColor = highlightColor;
        ctx.shadowBlur = 20;
        ctx.fillStyle = highlightColor;
        ctx.beginPath();
        ctx.roundRect(scroll.x - 3, sy - 3, scroll.w + 6, scroll.h + 6, 10);
        ctx.fill();
        ctx.shadowBlur = 0;
      }

      // Scroll parchment body
      const scrollGrad = ctx.createLinearGradient(scroll.x, sy, scroll.x, sy + scroll.h);
      if (selectedScroll === i) {
        const isCorrect = scroll.choice.is_correct;
        if (isCorrect) {
          scrollGrad.addColorStop(0, '#2A3A28');
          scrollGrad.addColorStop(0.5, '#1E2E1C');
          scrollGrad.addColorStop(1, '#2A3A28');
        } else {
          scrollGrad.addColorStop(0, '#3A2828');
          scrollGrad.addColorStop(0.5, '#2E1C1C');
          scrollGrad.addColorStop(1, '#3A2828');
        }
      } else if (hoveredScroll === i) {
        scrollGrad.addColorStop(0, '#3A3428');
        scrollGrad.addColorStop(0.5, '#2E2A1E');
        scrollGrad.addColorStop(1, '#3A3428');
      } else {
        scrollGrad.addColorStop(0, '#2E2A22');
        scrollGrad.addColorStop(0.5, '#252018');
        scrollGrad.addColorStop(1, '#2E2A22');
      }

      ctx.fillStyle = scrollGrad;
      ctx.beginPath();
      ctx.roundRect(scroll.x, sy, scroll.w, scroll.h, 8);
      ctx.fill();

      // Scroll border
      ctx.strokeStyle = hoveredScroll === i ? COLORS.amber : '#4A4438';
      ctx.lineWidth = hoveredScroll === i ? 2 : 1;
      ctx.beginPath();
      ctx.roundRect(scroll.x, sy, scroll.w, scroll.h, 8);
      ctx.stroke();

      // Scroll roll ends (decorative)
      const rollH = 10;
      const rollY1 = sy - 2;
      const rollY2 = sy + scroll.h - rollH + 2;

      // Top roll
      const topRollGrad = ctx.createLinearGradient(scroll.x, rollY1, scroll.x, rollY1 + rollH);
      topRollGrad.addColorStop(0, '#5A4A38');
      topRollGrad.addColorStop(0.5, '#7A6A55');
      topRollGrad.addColorStop(1, '#4A3A28');
      ctx.fillStyle = topRollGrad;
      ctx.beginPath();
      ctx.roundRect(scroll.x + 8, rollY1, scroll.w - 16, rollH, 4);
      ctx.fill();

      // Bottom roll
      const botRollGrad = ctx.createLinearGradient(scroll.x, rollY2, scroll.x, rollY2 + rollH);
      botRollGrad.addColorStop(0, '#5A4A38');
      botRollGrad.addColorStop(0.5, '#7A6A55');
      botRollGrad.addColorStop(1, '#4A3A28');
      ctx.fillStyle = botRollGrad;
      ctx.beginPath();
      ctx.roundRect(scroll.x + 8, rollY2, scroll.w - 16, rollH, 4);
      ctx.fill();

      // Scroll letter label (A, B, C, D)
      const labels = ['A', 'B', 'C', 'D'];
      ctx.font = "700 22px 'Belanosima', sans-serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = COLORS.amber;
      ctx.fillText(labels[i], scroll.x + 28, sy + scroll.h / 2);

      // Divider line
      ctx.strokeStyle = '#4A4438';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(scroll.x + 50, sy + 14);
      ctx.lineTo(scroll.x + 50, sy + scroll.h - 14);
      ctx.stroke();

      // Answer text (wrapped)
      const textFont = "400 16px 'Nunito', sans-serif";
      const textMaxW = scroll.w - 75;
      const lines = wrapText(scroll.choice.text, textMaxW, textFont);
      ctx.font = textFont;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';

      const lineHeight = 20;
      const totalTextH = lines.length * lineHeight;
      const textStartY = sy + (scroll.h - totalTextH) / 2 + lineHeight / 2;

      lines.forEach((line, li) => {
        if (selectedScroll === i) {
          ctx.fillStyle = scroll.choice.is_correct ? '#90E87A' : '#F8A89D';
        } else if (hoveredScroll === i) {
          ctx.fillStyle = '#F5E6D0';
        } else {
          ctx.fillStyle = COLORS.textSecondary;
        }
        ctx.fillText(line, scroll.x + 62, textStartY + li * lineHeight);
      });

      // Hover glow effect
      if (scroll.glowIntensity > 0 && selectedScroll === -1) {
        ctx.globalAlpha = scroll.glowIntensity * 0.1;
        ctx.fillStyle = COLORS.amber;
        ctx.beginPath();
        ctx.roundRect(scroll.x, sy, scroll.w, scroll.h, 8);
        ctx.fill();
        ctx.globalAlpha = scroll.alpha;
      }

      ctx.restore();
    });

    ctx.restore();

    // Decorative corner rune symbols
    ctx.save();
    ctx.font = "400 18px 'Belanosima', sans-serif";
    ctx.fillStyle = 'rgba(245, 167, 66, 0.15)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('\u2726', 30, 30);
    ctx.fillText('\u2726', W - 30, 30);
    ctx.fillText('\u2726', 30, H - 30);
    ctx.fillText('\u2726', W - 30, H - 30);
    ctx.restore();

    // Subtle vignette
    const vignette = ctx.createRadialGradient(W / 2, H / 2, 200, W / 2, H / 2, 420);
    vignette.addColorStop(0, 'rgba(0, 0, 0, 0)');
    vignette.addColorStop(1, 'rgba(0, 0, 0, 0.3)');
    ctx.fillStyle = vignette;
    ctx.fillRect(0, 0, W, H);
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;

    if (e.type === 'mousemove') {
      const { x, y } = screenToLogical(e.clientX, e.clientY);
      hoveredScroll = -1;
      if (selectedScroll !== -1) return;
      scrolls.forEach((scroll, i) => {
        const sy = scroll.y + scroll.offsetY;
        if (x >= scroll.x && x <= scroll.x + scroll.w &&
            y >= sy && y <= sy + scroll.h) {
          hoveredScroll = i;
        }
      });
      canvas.style.cursor = hoveredScroll !== -1 ? 'pointer' : 'default';
    }

    if (e.type === 'click') {
      if (selectedScroll !== -1) return;
      const { x, y } = screenToLogical(e.clientX, e.clientY);
      scrolls.forEach((scroll, i) => {
        const sy = scroll.y + scroll.offsetY;
        if (x >= scroll.x && x <= scroll.x + scroll.w &&
            y >= sy && y <= sy + scroll.h) {
          selectedScroll = i;
          selectionFlashTime = 0;
          playClickSound();

          if (!scroll.choice.is_correct) {
            shakeTime = 0.4;
          }
        }
      });
    }
  }

  // Register mouse events for hover + click
  canvas.addEventListener('mousemove', (e) => {
    if (gameState === 'playing') handleInput(e);
  });

  canvas.addEventListener('click', (e) => {
    if (gameState === 'playing') handleInput(e);
  });

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
