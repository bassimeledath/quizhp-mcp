<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Template</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC',
    // Mainframe-specific
    mainframeBg: '#1C1C1A',
    mainframeSurface: '#2A2A27',
    mainframeDark: '#151513',
    tubeGlow: '#E87A3E',
    tubeOff: '#3A3A36',
    tubeGlass: '#4A4A44',
    terminalGreen: '#4ECDC4',
    scanline: 'rgba(0,0,0,0.15)'
  };

  // === AUDIO ===
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;

  function getAudioCtx() {
    if (!audioCtx) audioCtx = new AudioCtx();
    return audioCtx;
  }

  function playClickSound() {
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'square';
      osc.frequency.setValueAtTime(220, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(110, ctx.currentTime + 0.08);
      gain.gain.setValueAtTime(0.12, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.1);
    } catch(e) {}
  }

  function playCorrectSound() {
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(440, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.3);
    } catch(e) {}
  }

  function playWrongSound() {
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.12, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.35);
    } catch(e) {}
  }

  function playTubeHum() {
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(60, ctx.currentTime);
      gain.gain.setValueAtTime(0.05, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.2);
    } catch(e) {}
  }

  // === GAME STATE ===
  let tubes = [];
  let terminals = [];
  let selectedIndex = -1;
  let answered = false;
  let animTime = 0;
  let entranceProgress = 0;
  let feedbackTimer = 0;
  let feedbackType = ''; // 'correct' or 'wrong'
  let shakeOffset = 0;
  let pulseScale = 1;
  let gameParticles = [];
  let scanlineOffset = 0;
  let tubeGlowPhases = [0, 0, 0, 0];
  let hoveredIndex = -1;

  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function initGame() {
    tubes = [];
    terminals = [];
    selectedIndex = -1;
    answered = false;
    animTime = 0;
    entranceProgress = 0;
    feedbackTimer = 0;
    feedbackType = '';
    shakeOffset = 0;
    pulseScale = 1;
    gameParticles = [];
    scanlineOffset = 0;
    hoveredIndex = -1;
    tubeGlowPhases = [Math.random() * Math.PI * 2, Math.random() * Math.PI * 2, Math.random() * Math.PI * 2, Math.random() * Math.PI * 2];

    // Layout: 4 vacuum tubes across the top, 4 terminal panels below
    const tubeSpacing = 150;
    const tubeStartX = (W - tubeSpacing * 3) / 2;
    const tubeY = 100;
    const termStartY = 240;
    const termW = 460;
    const termH = 56;
    const termGap = 12;
    const termX = (W - termW) / 2;

    for (let i = 0; i < 4; i++) {
      tubes.push({
        x: tubeStartX + i * tubeSpacing,
        y: tubeY,
        radius: 28,
        glowIntensity: 0.3,
        active: false,
        scale: 0,
        alpha: 0
      });

      terminals.push({
        x: termX,
        y: termStartY + i * (termH + termGap),
        w: termW,
        h: termH,
        choiceIndex: i,
        scale: 0,
        alpha: 0,
        hovered: false
      });
    }
  }

  function wrapText(text, maxWidth, font) {
    ctx.font = font;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';

    for (const word of words) {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    }
    if (currentLine) lines.push(currentLine);
    return lines;
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    animTime += dt;
    scanlineOffset = (scanlineOffset + dt * 30) % 4;

    // Entrance animation
    if (!prefersReducedMotion && entranceProgress < 1) {
      entranceProgress = Math.min(1, entranceProgress + dt * 2.5);
      for (let i = 0; i < 4; i++) {
        const delay = i * 0.12;
        const t = Math.max(0, Math.min(1, (entranceProgress - delay) / 0.4));
        const spring = t < 1 ? 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t) : 1;
        tubes[i].scale = t * spring;
        tubes[i].alpha = t;
        terminals[i].scale = t * spring;
        terminals[i].alpha = t;
      }
    } else if (prefersReducedMotion && entranceProgress < 1) {
      entranceProgress = 1;
      for (let i = 0; i < 4; i++) {
        tubes[i].scale = 1;
        tubes[i].alpha = 1;
        terminals[i].scale = 1;
        terminals[i].alpha = 1;
      }
    }

    // Update tube glow phases (ambient animation)
    for (let i = 0; i < 4; i++) {
      tubeGlowPhases[i] += dt * (1.5 + i * 0.3);
      if (tubes[i].active) {
        tubes[i].glowIntensity = Math.min(1, tubes[i].glowIntensity + dt * 8);
      } else {
        tubes[i].glowIntensity = 0.3 + Math.sin(tubeGlowPhases[i]) * 0.1;
      }
    }

    // Feedback animation
    if (feedbackTimer > 0) {
      feedbackTimer -= dt;
      if (feedbackType === 'wrong') {
        shakeOffset = Math.sin(feedbackTimer * 40) * 6 * Math.min(1, feedbackTimer / 0.3);
      } else if (feedbackType === 'correct') {
        pulseScale = 1 + Math.sin(feedbackTimer * 12) * 0.05 * Math.min(1, feedbackTimer / 0.3);
      }
      if (feedbackTimer <= 0) {
        feedbackTimer = 0;
        shakeOffset = 0;
        pulseScale = 1;
        if (answered) {
          const choice = QUESTION.choices[selectedIndex];
          if (feedbackType === 'correct') playCorrectSound();
          else playWrongSound();
          engine.end(choice.is_correct, choice.explanation);
        }
      }
    }

    // Update particles
    gameParticles = gameParticles.filter(p => {
      p.vy += 300 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.alpha -= dt * 1.5;
      p.rotation += p.rotationSpeed * dt;
      return p.alpha > 0;
    });
  }

  function drawGame() {
    // Dark mainframe background
    ctx.fillStyle = COLORS.mainframeBg;
    ctx.fillRect(0, 0, W, H);

    // Subtle grid pattern
    ctx.strokeStyle = 'rgba(74, 74, 68, 0.15)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x < W; x += 20) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, H);
      ctx.stroke();
    }
    for (let y = 0; y < H; y += 20) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }

    // Mainframe casing - top panel
    ctx.fillStyle = COLORS.mainframeSurface;
    ctx.beginPath();
    ctx.roundRect(30, 20, W - 60, 190, 12);
    ctx.fill();
    ctx.strokeStyle = '#4A4A44';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(30, 20, W - 60, 190, 12);
    ctx.stroke();

    // Decorative rivets on mainframe panel
    const rivetColor = '#5A5A54';
    const rivetPositions = [[50, 35], [W - 50, 35], [50, 195], [W - 50, 195]];
    for (const [rx, ry] of rivetPositions) {
      ctx.fillStyle = rivetColor;
      ctx.beginPath();
      ctx.arc(rx, ry, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#6A6A64';
      ctx.beginPath();
      ctx.arc(rx - 1, ry - 1, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Draw vacuum tubes
    for (let i = 0; i < 4; i++) {
      const tube = tubes[i];
      if (tube.alpha <= 0) continue;

      ctx.save();
      ctx.globalAlpha = tube.alpha;
      ctx.translate(tube.x, tube.y);
      ctx.scale(tube.scale, tube.scale);

      // Tube base (metal socket)
      ctx.fillStyle = '#3A3A36';
      ctx.beginPath();
      ctx.roundRect(-22, 20, 44, 16, 4);
      ctx.fill();
      ctx.fillStyle = '#4A4A44';
      ctx.beginPath();
      ctx.roundRect(-20, 22, 40, 12, 3);
      ctx.fill();

      // Connection wires from tube to terminal
      ctx.strokeStyle = tube.active ? COLORS.tubeGlow : '#4A4A44';
      ctx.lineWidth = tube.active ? 2 : 1;
      ctx.globalAlpha = tube.alpha * (tube.active ? 0.8 : 0.3);
      ctx.setLineDash(tube.active ? [] : [4, 4]);
      ctx.beginPath();
      const termY = terminals[i].y + terminals[i].h / 2;
      ctx.moveTo(0, 36);
      ctx.lineTo(0, 60);
      ctx.lineTo(tube.x > W / 2 ? -20 : 20, 80);
      ctx.lineTo(0, termY - tube.y);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = tube.alpha;

      // Tube glass envelope (outer)
      const glowAmount = tube.glowIntensity;
      if (tube.active) {
        // Bright glow behind tube
        const gradient = ctx.createRadialGradient(0, 0, 5, 0, 0, 50);
        gradient.addColorStop(0, `rgba(232, 122, 62, ${0.4 * glowAmount})`);
        gradient.addColorStop(0.5, `rgba(245, 167, 66, ${0.2 * glowAmount})`);
        gradient.addColorStop(1, 'rgba(232, 122, 62, 0)');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(0, 0, 50, 0, Math.PI * 2);
        ctx.fill();
      }

      // Glass tube body
      ctx.fillStyle = tube.active
        ? `rgba(232, 122, 62, ${0.15 + glowAmount * 0.2})`
        : 'rgba(74, 74, 68, 0.3)';
      ctx.beginPath();
      ctx.ellipse(0, 0, tube.radius, tube.radius * 1.3, 0, 0, Math.PI * 2);
      ctx.fill();

      // Glass reflection highlight
      ctx.strokeStyle = `rgba(255, 255, 255, ${0.15 + glowAmount * 0.1})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(-8, -10, tube.radius * 0.6, -0.8, 0.8);
      ctx.stroke();

      // Inner filament
      ctx.strokeStyle = tube.active
        ? `rgba(232, 122, 62, ${0.6 + glowAmount * 0.4})`
        : 'rgba(100, 100, 90, 0.4)';
      ctx.lineWidth = tube.active ? 2.5 : 1.5;
      ctx.beginPath();
      ctx.moveTo(-6, 12);
      ctx.lineTo(-3, -8);
      ctx.lineTo(0, 4);
      ctx.lineTo(3, -10);
      ctx.lineTo(6, 10);
      ctx.stroke();

      // Inner glow when active
      if (tube.active) {
        ctx.fillStyle = `rgba(245, 167, 66, ${0.3 * glowAmount})`;
        ctx.beginPath();
        ctx.ellipse(0, 0, 10, 14, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // Number label below tube
      ctx.fillStyle = tube.active ? COLORS.orange : '#8C8C84';
      ctx.font = "700 20px 'Belanosima', sans-serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String(i + 1), 0, 50);

      ctx.restore();
    }

    // Draw terminal panels with answer text
    for (let i = 0; i < 4; i++) {
      const term = terminals[i];
      if (term.alpha <= 0) continue;
      const choice = QUESTION.choices[i];

      ctx.save();
      const shk = (selectedIndex === i && feedbackType === 'wrong') ? shakeOffset : 0;
      const ps = (selectedIndex === i && feedbackType === 'correct') ? pulseScale : 1;
      ctx.globalAlpha = term.alpha;
      ctx.translate(term.x + term.w / 2 + shk, term.y + term.h / 2);
      ctx.scale(term.scale * ps, term.scale * ps);
      ctx.translate(-(term.w / 2), -(term.h / 2));

      // Terminal background
      let bgColor = COLORS.mainframeSurface;
      let borderColor = '#4A4A44';
      if (selectedIndex === i && answered) {
        if (feedbackType === 'correct') {
          bgColor = 'rgba(107, 191, 89, 0.15)';
          borderColor = COLORS.success;
        } else {
          bgColor = 'rgba(232, 93, 74, 0.15)';
          borderColor = COLORS.error;
        }
      } else if (hoveredIndex === i || (selectedIndex === i && !answered)) {
        bgColor = '#363633';
        borderColor = COLORS.cyan;
      }

      ctx.fillStyle = bgColor;
      ctx.beginPath();
      ctx.roundRect(0, 0, term.w, term.h, 8);
      ctx.fill();
      ctx.strokeStyle = borderColor;
      ctx.lineWidth = selectedIndex === i ? 2.5 : 1.5;
      ctx.beginPath();
      ctx.roundRect(0, 0, term.w, term.h, 8);
      ctx.stroke();

      // Number indicator on left
      const numBoxW = 36;
      ctx.fillStyle = selectedIndex === i && tubes[i].active ? COLORS.orange : '#4A4A44';
      ctx.beginPath();
      ctx.roundRect(6, 6, numBoxW, term.h - 12, 6);
      ctx.fill();

      ctx.fillStyle = selectedIndex === i && tubes[i].active ? '#FFFFFF' : '#C2C2B8';
      ctx.font = "700 18px 'Nunito Sans', sans-serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String(i + 1), 6 + numBoxW / 2, term.h / 2);

      // Answer text - word wrap within available width
      const textX = 52;
      const availW = term.w - textX - 12;
      const answerFont = "400 16px 'Nunito', sans-serif";
      ctx.fillStyle = '#F5F5F0';
      ctx.textAlign = 'left';

      const lines = wrapText(choice.text, availW, answerFont);
      ctx.font = answerFont;
      const lineHeight = 20;
      const totalTextH = lines.length * lineHeight;
      const startTextY = term.h / 2 - totalTextH / 2 + lineHeight / 2;

      for (let l = 0; l < lines.length; l++) {
        ctx.fillText(lines[l], textX, startTextY + l * lineHeight);
      }

      ctx.restore();
    }

    // Draw particles
    for (const p of gameParticles) {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    }

    // Scanline effect
    ctx.fillStyle = COLORS.scanline;
    for (let y = scanlineOffset; y < H; y += 4) {
      ctx.fillRect(0, y, W, 1);
    }
  }

  function spawnTubeParticles(tubeIndex) {
    const tube = tubes[tubeIndex];
    const colors = [COLORS.orange, COLORS.amber, COLORS.cyan, COLORS.success];
    for (let i = 0; i < 15; i++) {
      gameParticles.push({
        x: tube.x,
        y: tube.y,
        vx: (Math.random() - 0.5) * 200,
        vy: -Math.random() * 150 - 50,
        color: colors[Math.floor(Math.random() * colors.length)],
        size: 3 + Math.random() * 5,
        rotation: Math.random() * Math.PI * 2,
        rotationSpeed: (Math.random() - 0.5) * 8,
        alpha: 1
      });
    }
  }

  function selectAnswer(index) {
    if (answered || gameState !== 'playing') return;
    if (index < 0 || index >= QUESTION.choices.length) return;

    playClickSound();
    playTubeHum();

    selectedIndex = index;
    answered = true;

    // Activate the corresponding tube
    for (let i = 0; i < 4; i++) tubes[i].active = false;
    tubes[index].active = true;

    const choice = QUESTION.choices[index];
    feedbackType = choice.is_correct ? 'correct' : 'wrong';
    feedbackTimer = prefersReducedMotion ? 0.01 : 0.6;

    if (!prefersReducedMotion) {
      spawnTubeParticles(index);
    }
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;

    if (e.key === '1' || e.code === 'Digit1' || e.code === 'Numpad1') {
      selectAnswer(0);
    } else if (e.key === '2' || e.code === 'Digit2' || e.code === 'Numpad2') {
      selectAnswer(1);
    } else if (e.key === '3' || e.code === 'Digit3' || e.code === 'Numpad3') {
      selectAnswer(2);
    } else if (e.key === '4' || e.code === 'Digit4' || e.code === 'Numpad4') {
      selectAnswer(3);
    }
  }

  // Also handle mouse clicks on terminal panels
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'playing' || answered) return;
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    for (let i = 0; i < terminals.length; i++) {
      const t = terminals[i];
      if (x >= t.x && x <= t.x + t.w && y >= t.y && y <= t.y + t.h) {
        selectAnswer(i);
        return;
      }
    }
  });

  // Handle mouse hover for visual feedback
  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'playing' || answered) return;
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    hoveredIndex = -1;
    for (let i = 0; i < terminals.length; i++) {
      const t = terminals[i];
      if (x >= t.x && x <= t.x + t.w && y >= t.y && y <= t.y + t.h) {
        hoveredIndex = i;
        break;
      }
    }
  });

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
