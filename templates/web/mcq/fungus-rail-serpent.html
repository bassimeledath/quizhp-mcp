<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fungus Rail Serpent</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === GAME STATE ===
  let serpent = [];  // Array of {x, y} positions (segments)
  let serpentDir = { x: 1, y: 0 };  // Current direction
  let pendingDir = { x: 1, y: 0 };  // Next direction
  let answerPods = [];  // Cargo pods with answers
  let mushrooms = [];   // Background mushroom columns
  let sporeLanterns = []; // Floating spore particles
  let tracks = [];  // Track segments connecting pods
  let gameTime = 0;
  let moveTimer = 0;
  let lungeTimer = 0;
  let isLunging = false;
  let selectedAnswer = null;
  let sporeExplosions = [];  // Spore burst effects
  let entranceAnim = 0;  // For bounce-in animation

  // Audio context for sounds
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialDecayTo && gain.gain.exponentialDecayTo(0.01, audioCtx.currentTime + 0.4);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    } else if (type === 'click') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(440, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.05);
    }
  }

  // Grid-based movement
  const GRID_SIZE = 36;
  const MOVE_SPEED = 0.12;  // Seconds between moves
  const LUNGE_DURATION = 0.15;  // Faster lunge

  function initGame() {
    initAudio();
    gameTime = 0;
    moveTimer = 0;
    lungeTimer = 0;
    isLunging = false;
    selectedAnswer = null;
    entranceAnim = 0;
    sporeExplosions = [];

    // Initialize serpent at far left side, facing right
    serpent = [];
    const startX = 2;  // Start further left
    const startY = 7;
    for (let i = 0; i < 4; i++) {  // Shorter serpent
      serpent.push({ x: startX - i, y: startY });
    }
    serpentDir = { x: 1, y: 0 };
    pendingDir = { x: 1, y: 0 };

    // Create mushroom background columns
    mushrooms = [];
    for (let i = 0; i < 8; i++) {
      mushrooms.push({
        x: 60 + Math.random() * 600,
        y: 50 + Math.random() * 440,
        height: 80 + Math.random() * 120,
        capRadius: 25 + Math.random() * 25,
        hue: 180 + Math.random() * 60,  // Cyan to teal
        pulseOffset: Math.random() * Math.PI * 2,
        glow: 0.3 + Math.random() * 0.4
      });
    }

    // Create floating spore lanterns
    sporeLanterns = [];
    for (let i = 0; i < 30; i++) {
      sporeLanterns.push({
        x: Math.random() * W,
        y: Math.random() * H,
        size: 2 + Math.random() * 4,
        speed: 10 + Math.random() * 20,
        wobble: Math.random() * Math.PI * 2,
        hue: Math.random() < 0.5 ? 35 : 170  // Amber or cyan
      });
    }

    // Position answer pods vertically on the right side (stacked layout for 60-char text)
    answerPods = QUESTION.choices.map((choice, i) => {
      return {
        x: 15,  // Grid position (right side)
        y: 2 + i * 3,  // Vertically stacked with spacing
        choice: choice,
        index: i,
        collected: false,
        shake: 0,
        scale: 0,  // For entrance animation
        glowPhase: Math.random() * Math.PI * 2
      };
    });

    // Create tracks connecting pods
    tracks = [];
    // Main horizontal track
    for (let x = 0; x < 20; x++) {
      tracks.push({ x: x, y: 7 });
    }
    // Branch tracks to each pod
    answerPods.forEach(pod => {
      // Vertical track from main line to pod
      for (let y = Math.min(pod.y, 7); y <= Math.max(pod.y, 7); y++) {
        tracks.push({ x: pod.x, y: y });
      }
    });
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;
    entranceAnim = Math.min(1, entranceAnim + dt * 2);

    // Update entrance animation for pods
    answerPods.forEach((pod, i) => {
      const delay = i * 0.1;
      const t = Math.max(0, entranceAnim - delay);
      pod.scale = Math.min(1, t * 3);
      if (pod.scale > 0 && pod.scale < 1) {
        pod.scale = easeOutBack(pod.scale);
      }
    });

    // Update spore lanterns
    sporeLanterns.forEach(spore => {
      spore.y -= spore.speed * dt;
      spore.wobble += dt * 2;
      spore.x += Math.sin(spore.wobble) * 10 * dt;
      if (spore.y < -10) {
        spore.y = H + 10;
        spore.x = Math.random() * W;
      }
    });

    // Update spore explosions
    sporeExplosions = sporeExplosions.filter(exp => {
      exp.time += dt;
      exp.particles.forEach(p => {
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 50 * dt;  // Gentle gravity
        p.life -= dt;
      });
      exp.particles = exp.particles.filter(p => p.life > 0);
      return exp.particles.length > 0;
    });

    // Handle lunging
    if (isLunging) {
      lungeTimer += dt;
      if (lungeTimer >= LUNGE_DURATION) {
        isLunging = false;
        lungeTimer = 0;
        moveTimer = 0;  // Allow immediate next move
      }
      return;  // Don't process normal movement while lunging
    }

    // Auto-move serpent
    moveTimer += dt;
    if (moveTimer >= MOVE_SPEED) {
      moveTimer = 0;
      moveSerpent();
    }

    // Update pod shake animations
    answerPods.forEach(pod => {
      if (pod.shake > 0) {
        pod.shake -= dt * 5;
      }
    });
  }

  function easeOutBack(t) {
    const c1 = 1.70158;
    const c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  }

  function moveSerpent() {
    // Apply pending direction
    serpentDir = { ...pendingDir };

    // Calculate new head position
    const head = serpent[0];
    const newHead = {
      x: head.x + serpentDir.x,
      y: head.y + serpentDir.y
    };

    // Wrap around screen
    if (newHead.x < 0) newHead.x = 19;
    if (newHead.x > 19) newHead.x = 0;
    if (newHead.y < 0) newHead.y = 14;
    if (newHead.y > 14) newHead.y = 0;

    // Add new head
    serpent.unshift(newHead);

    // Remove tail (unless we just collected something)
    serpent.pop();

    // Check collision with answer pods
    checkPodCollision();
  }

  function lunge() {
    if (isLunging || selectedAnswer !== null) return;
    playSound('click');

    isLunging = true;
    lungeTimer = 0;

    // Move serpent forward by one grid cell instantly
    const head = serpent[0];
    const newHead = {
      x: head.x + serpentDir.x,
      y: head.y + serpentDir.y
    };

    // Wrap around
    if (newHead.x < 0) newHead.x = 19;
    if (newHead.x > 19) newHead.x = 0;
    if (newHead.y < 0) newHead.y = 14;
    if (newHead.y > 14) newHead.y = 0;

    serpent.unshift(newHead);
    serpent.pop();

    checkPodCollision();
  }

  function checkPodCollision() {
    const head = serpent[0];
    const headPx = head.x * GRID_SIZE + GRID_SIZE / 2;
    const headPy = head.y * GRID_SIZE + GRID_SIZE / 2;

    answerPods.forEach((pod, i) => {
      if (pod.collected) return;

      // Pod positions (matching draw function)
      const podPx = 470;
      const podPy = 35 + i * 130;
      const podWidth = 500;
      const podHeight = 48;

      // Check if serpent head is within pod bounds (tight collision)
      if (headPx >= podPx - podWidth/2 &&
          headPx <= podPx + podWidth/2 &&
          headPy >= podPy - podHeight/2 &&
          headPy <= podPy + podHeight/2) {
        selectAnswer(pod);
      }
    });
  }

  function selectAnswer(pod) {
    if (selectedAnswer !== null) return;

    selectedAnswer = pod;
    pod.collected = true;

    if (pod.choice.is_correct) {
      playSound('correct');
      // Grow serpent for correct answer
      const tail = serpent[serpent.length - 1];
      serpent.push({ ...tail });
      serpent.push({ ...tail });
    } else {
      playSound('wrong');
      // Create spore explosion
      createSporeExplosion(pod.x * GRID_SIZE, pod.y * GRID_SIZE);
      pod.shake = 1;
    }

    // End game after short delay
    setTimeout(() => {
      engine.end(pod.choice.is_correct, pod.choice.explanation);
    }, 500);
  }

  function createSporeExplosion(x, y) {
    const particles = [];
    for (let i = 0; i < 20; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 50 + Math.random() * 100;
      particles.push({
        x: x,
        y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        size: 3 + Math.random() * 5,
        life: 0.5 + Math.random() * 0.5,
        hue: 40 + Math.random() * 20  // Pale mushroom colors
      });
    }
    sporeExplosions.push({ time: 0, particles });
  }

  function drawGame() {
    // Dark cavern background with paper texture feel
    const gradient = ctx.createLinearGradient(0, 0, 0, H);
    gradient.addColorStop(0, '#1a1512');  // Umber dark
    gradient.addColorStop(0.5, '#2a2218');
    gradient.addColorStop(1, '#1a1815');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, W, H);

    // Draw background mushroom columns (bioluminescent)
    mushrooms.forEach(m => {
      const pulse = Math.sin(gameTime * 2 + m.pulseOffset) * 0.2 + 0.8;

      // Stem
      ctx.fillStyle = `hsla(${m.hue - 20}, 30%, 25%, 0.8)`;
      ctx.beginPath();
      ctx.moveTo(m.x - 8, m.y);
      ctx.lineTo(m.x - 12, m.y - m.height);
      ctx.lineTo(m.x + 12, m.y - m.height);
      ctx.lineTo(m.x + 8, m.y);
      ctx.closePath();
      ctx.fill();

      // Cap with glow
      const glowSize = m.capRadius * (1 + pulse * 0.1);
      const capGrad = ctx.createRadialGradient(
        m.x, m.y - m.height, 0,
        m.x, m.y - m.height, glowSize * 1.5
      );
      capGrad.addColorStop(0, `hsla(${m.hue}, 70%, 60%, ${m.glow * pulse})`);
      capGrad.addColorStop(0.5, `hsla(${m.hue}, 60%, 40%, ${m.glow * pulse * 0.5})`);
      capGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = capGrad;
      ctx.beginPath();
      ctx.ellipse(m.x, m.y - m.height, glowSize * 1.5, glowSize, 0, 0, Math.PI * 2);
      ctx.fill();

      // Cap surface
      ctx.fillStyle = `hsla(${m.hue}, 50%, 45%, 0.9)`;
      ctx.beginPath();
      ctx.ellipse(m.x, m.y - m.height, m.capRadius, m.capRadius * 0.5, 0, 0, Math.PI * 2);
      ctx.fill();

      // Cap spots
      ctx.fillStyle = `hsla(${m.hue}, 40%, 70%, 0.6)`;
      for (let i = 0; i < 3; i++) {
        const spotX = m.x + (Math.sin(i * 2.1) * m.capRadius * 0.5);
        const spotY = m.y - m.height + (Math.cos(i * 2.1) * m.capRadius * 0.2);
        ctx.beginPath();
        ctx.arc(spotX, spotY, 3, 0, Math.PI * 2);
        ctx.fill();
      }
    });

    // Draw spore lanterns (floating particles)
    sporeLanterns.forEach(spore => {
      const alpha = 0.4 + Math.sin(gameTime * 3 + spore.wobble) * 0.3;
      ctx.fillStyle = `hsla(${spore.hue}, 80%, 70%, ${alpha})`;
      ctx.beginPath();
      ctx.arc(spore.x, spore.y, spore.size, 0, Math.PI * 2);
      ctx.fill();

      // Glow
      const glow = ctx.createRadialGradient(
        spore.x, spore.y, 0,
        spore.x, spore.y, spore.size * 3
      );
      glow.addColorStop(0, `hsla(${spore.hue}, 80%, 70%, ${alpha * 0.3})`);
      glow.addColorStop(1, 'transparent');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(spore.x, spore.y, spore.size * 3, 0, Math.PI * 2);
      ctx.fill();
    });

    // Draw tracks (wet rails)
    ctx.strokeStyle = '#4a3f35';
    ctx.lineWidth = 3;
    tracks.forEach(track => {
      const tx = track.x * GRID_SIZE + GRID_SIZE / 2;
      const ty = track.y * GRID_SIZE + GRID_SIZE / 2;

      // Rail sleepers
      ctx.fillStyle = '#3a322a';
      ctx.fillRect(tx - 12, ty - 2, 24, 4);

      // Wet shine on rails
      ctx.fillStyle = `rgba(78, 205, 196, ${0.1 + Math.sin(gameTime * 2 + track.x * 0.5) * 0.05})`;
      ctx.fillRect(tx - 12, ty - 1, 24, 2);
    });

    // Draw spore explosions
    sporeExplosions.forEach(exp => {
      exp.particles.forEach(p => {
        ctx.fillStyle = `hsla(${p.hue}, 40%, 80%, ${p.life})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fill();
      });
    });

    // Draw answer pods (glowing cargo containers) - full width for 60-char text
    answerPods.forEach((pod, i) => {
      if (pod.collected && !pod.choice.is_correct) return;  // Hide wrong collected pods

      // Fixed position on right side for vertical stack layout
      const px = 470;  // Center of pod area
      const py = 35 + i * 130;  // Vertically stacked with good spacing
      const podWidth = 500;  // Wide enough for 60-char text at 14px
      const podHeight = 48;

      // Apply entrance animation scale
      ctx.save();
      ctx.translate(px, py);
      ctx.scale(pod.scale, pod.scale);

      // Apply shake for wrong answer
      if (pod.shake > 0) {
        ctx.translate(Math.sin(pod.shake * 30) * 5, 0);
      }

      // Glow effect
      const glowPulse = Math.sin(gameTime * 3 + pod.glowPhase) * 0.3 + 0.7;
      const podGlow = ctx.createRadialGradient(0, 0, 0, 0, 0, podWidth * 0.4);
      podGlow.addColorStop(0, `rgba(78, 205, 196, ${0.2 * glowPulse})`);
      podGlow.addColorStop(1, 'transparent');
      ctx.fillStyle = podGlow;
      ctx.beginPath();
      ctx.ellipse(0, 0, podWidth * 0.4, podHeight * 1.5, 0, 0, Math.PI * 2);
      ctx.fill();

      // Pod body (paper-cut style cargo container)
      ctx.fillStyle = pod.collected ? '#6BBF59' : '#3d3530';
      ctx.beginPath();
      ctx.roundRect(-podWidth/2, -podHeight/2, podWidth, podHeight, 8);
      ctx.fill();

      // Pod border glow
      ctx.strokeStyle = pod.collected ? '#6BBF59' : `rgba(78, 205, 196, ${0.5 + glowPulse * 0.3})`;
      ctx.lineWidth = 2;
      ctx.stroke();

      // Metal cap tag with letter
      const labels = ['A', 'B', 'C', 'D'];
      ctx.fillStyle = '#E87A3E';
      ctx.beginPath();
      ctx.arc(-podWidth/2 + 20, 0, 14, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#FAFAF7';
      ctx.font = "bold 16px 'Belanosima', sans-serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(labels[i], -podWidth/2 + 20, 0);

      // Answer text - single line, fits 60 chars
      ctx.fillStyle = '#FAFAF7';
      ctx.font = "14px 'Nunito', sans-serif";
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText(pod.choice.text, -podWidth/2 + 44, 0);

      ctx.restore();
    });

    // Draw serpent (rail-serpent train)
    serpent.forEach((seg, i) => {
      const sx = seg.x * GRID_SIZE + GRID_SIZE / 2;
      const sy = seg.y * GRID_SIZE + GRID_SIZE / 2;

      // Calculate direction for segment orientation
      let angle = 0;
      if (i === 0) {
        angle = Math.atan2(serpentDir.y, serpentDir.x);
      } else {
        const prev = serpent[i - 1];
        angle = Math.atan2(seg.y - prev.y, seg.x - prev.x);
      }

      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate(angle);

      // Lunge animation for head
      if (i === 0 && isLunging) {
        const lungeProgress = lungeTimer / LUNGE_DURATION;
        ctx.translate(Math.sin(lungeProgress * Math.PI) * 8, 0);
      }

      if (i === 0) {
        // Head - engine car
        ctx.fillStyle = '#F5A742';  // Amber
        ctx.beginPath();
        ctx.roundRect(-18, -12, 36, 24, 6);
        ctx.fill();

        // Engine details
        ctx.fillStyle = '#E87A3E';
        ctx.beginPath();
        ctx.roundRect(8, -8, 8, 16, 3);
        ctx.fill();

        // Eyes (bioluminescent)
        ctx.fillStyle = '#4ECDC4';
        ctx.beginPath();
        ctx.arc(12, -5, 4, 0, Math.PI * 2);
        ctx.arc(12, 5, 4, 0, Math.PI * 2);
        ctx.fill();

        // Glow around head
        const headGlow = ctx.createRadialGradient(0, 0, 5, 0, 0, 30);
        headGlow.addColorStop(0, 'rgba(245, 167, 66, 0.3)');
        headGlow.addColorStop(1, 'transparent');
        ctx.fillStyle = headGlow;
        ctx.beginPath();
        ctx.arc(0, 0, 30, 0, Math.PI * 2);
        ctx.fill();
      } else {
        // Body segments - cargo cars
        const segHue = 25 + (i % 3) * 10;
        ctx.fillStyle = `hsl(${segHue}, 60%, 45%)`;
        ctx.beginPath();
        ctx.roundRect(-14, -10, 28, 20, 4);
        ctx.fill();

        // Connection points
        ctx.fillStyle = '#3d3530';
        ctx.beginPath();
        ctx.arc(-14, 0, 3, 0, Math.PI * 2);
        ctx.arc(14, 0, 3, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    });
  }

  // Helper to wrap text within a width
  function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
    const words = text.split(' ');
    let line = '';
    let lineY = y;

    for (let n = 0; n < words.length; n++) {
      const testLine = line + words[n] + ' ';
      const metrics = ctx.measureText(testLine);
      if (metrics.width > maxWidth && n > 0) {
        ctx.fillText(line.trim(), x, lineY);
        line = words[n] + ' ';
        lineY += lineHeight;
      } else {
        line = testLine;
      }
    }
    ctx.fillText(line.trim(), x, lineY);
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;

    // Direction controls (Arrow keys or WASD)
    if (e.code === 'ArrowUp' || e.code === 'KeyW') {
      if (serpentDir.y !== 1) pendingDir = { x: 0, y: -1 };
    } else if (e.code === 'ArrowDown' || e.code === 'KeyS') {
      if (serpentDir.y !== -1) pendingDir = { x: 0, y: 1 };
    } else if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
      if (serpentDir.x !== 1) pendingDir = { x: -1, y: 0 };
    } else if (e.code === 'ArrowRight' || e.code === 'KeyD') {
      if (serpentDir.x !== -1) pendingDir = { x: 1, y: 0 };
    }

    // Lunge (Spacebar or Enter)
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      lunge();
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
