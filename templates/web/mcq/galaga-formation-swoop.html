<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaga Formation Swoop</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === GAME STATE ===
  let player = null;
  let bullets = [];
  let bossAliens = [];
  let minions = [];
  let particles = [];
  let stars = [];
  let gameTime = 0;
  let swoopTimer = 0;
  let selectedAnswer = null;

  // Audio context for sounds
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'shoot') {
      osc.frequency.setValueAtTime(600, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'hit') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(150, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.2);
    } else if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    }
  }

  function initGame() {
    initAudio();

    // Player ship at bottom center
    player = {
      x: W / 2,
      y: H - 50,
      width: 40,
      height: 30,
      speed: 300,
      vx: 0,
      shootCooldown: 0
    };

    bullets = [];
    particles = [];
    gameTime = 0;
    swoopTimer = 2;
    selectedAnswer = null;

    // Initialize stars
    stars = [];
    for (let i = 0; i < 100; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        size: Math.random() * 2 + 0.5,
        speed: Math.random() * 30 + 20
      });
    }

    // Create boss aliens from answer choices - 2x2 grid layout
    bossAliens = QUESTION.choices.map((choice, i) => {
      const col = i % 2;
      const row = Math.floor(i / 2);
      const xPos = 200 + col * 320;
      const yPos = 80 + row * 180;
      return {
        x: xPos,
        y: yPos,
        baseX: xPos,
        baseY: yPos,
        width: 50,
        height: 40,
        choice: choice,
        index: i,
        state: 'formation', // 'formation' | 'swooping' | 'returning' | 'destroyed'
        swoopPath: null,
        swoopT: 0,
        health: 3,
        hitFlash: 0,
        entranceDelay: i * 0.15,
        scale: 0,
        wobble: Math.random() * Math.PI * 2
      };
    });

    // Create minion aliens - scattered around the boss aliens
    minions = [];
    const minionPositions = [
      // Around top-left boss
      {x: 120, y: 60}, {x: 280, y: 60}, {x: 120, y: 100}, {x: 280, y: 100},
      // Around top-right boss
      {x: 440, y: 60}, {x: 600, y: 60}, {x: 440, y: 100}, {x: 600, y: 100},
      // Around bottom-left boss
      {x: 120, y: 240}, {x: 280, y: 240}, {x: 120, y: 280}, {x: 280, y: 280},
      // Around bottom-right boss
      {x: 440, y: 240}, {x: 600, y: 240}, {x: 440, y: 280}, {x: 600, y: 280}
    ];
    minionPositions.forEach(pos => {
      minions.push({
        x: pos.x,
        y: pos.y,
        baseX: pos.x,
        baseY: pos.y,
        width: 25,
        height: 20,
        wobble: Math.random() * Math.PI * 2
      });
    });
  }

  function createExplosion(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 / count) * i + Math.random() * 0.3;
      const speed = 100 + Math.random() * 150;
      particles.push({
        x: x,
        y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        size: 3 + Math.random() * 4,
        color: color,
        life: 1.0
      });
    }
  }

  function generateSwoopPath(alien) {
    // Generate bezier curve swoop path
    const startX = alien.x;
    const startY = alien.y;
    const playerX = player.x;

    // Control points for dramatic swoop
    const cp1x = startX + (Math.random() - 0.5) * 200;
    const cp1y = startY + 100;
    const cp2x = playerX + (Math.random() - 0.5) * 100;
    const cp2y = H - 150;
    const endX = alien.baseX;
    const endY = alien.baseY;

    return { startX, startY, cp1x, cp1y, cp2x, cp2y, endX, endY };
  }

  function bezierPoint(t, p0, p1, p2, p3) {
    const u = 1 - t;
    return u*u*u*p0 + 3*u*u*t*p1 + 3*u*t*t*p2 + t*t*t*p3;
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Update stars
    stars.forEach(star => {
      star.y += star.speed * dt;
      if (star.y > H) {
        star.y = 0;
        star.x = Math.random() * W;
      }
    });

    // Player movement
    player.x += player.vx * dt;
    player.x = Math.max(player.width / 2, Math.min(W - player.width / 2, player.x));
    player.shootCooldown -= dt;

    // Update bullets
    bullets = bullets.filter(bullet => {
      bullet.y -= bullet.speed * dt;
      return bullet.y > -10;
    });

    // Update particles
    particles = particles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 100 * dt;
      p.life -= dt * 2;
      return p.life > 0;
    });

    // Update boss aliens
    swoopTimer -= dt;

    bossAliens.forEach(alien => {
      if (alien.state === 'destroyed') return;

      // Entrance animation
      if (alien.entranceDelay > 0) {
        alien.entranceDelay -= dt;
        alien.scale = Math.max(0, 1 - alien.entranceDelay / 0.15);
      } else {
        alien.scale = Math.min(1, alien.scale + dt * 5);
      }

      alien.hitFlash = Math.max(0, alien.hitFlash - dt * 5);
      alien.wobble += dt * 3;

      if (alien.state === 'formation') {
        // Wobble in formation
        alien.x = alien.baseX + Math.sin(alien.wobble) * 5;
        alien.y = alien.baseY + Math.cos(alien.wobble * 0.7) * 3;

        // Start swoop
        if (swoopTimer <= 0) {
          const formationAliens = bossAliens.filter(a => a.state === 'formation');
          if (formationAliens.length > 0) {
            const swooper = formationAliens[Math.floor(Math.random() * formationAliens.length)];
            swooper.state = 'swooping';
            swooper.swoopPath = generateSwoopPath(swooper);
            swooper.swoopT = 0;
            swoopTimer = 1.5 + Math.random() * 1;
          }
        }
      } else if (alien.state === 'swooping') {
        alien.swoopT += dt * 0.6;
        const path = alien.swoopPath;
        alien.x = bezierPoint(alien.swoopT, path.startX, path.cp1x, path.cp2x, path.endX);
        alien.y = bezierPoint(alien.swoopT, path.startY, path.cp1y, path.cp2y, path.endY);

        if (alien.swoopT >= 1) {
          alien.state = 'formation';
          alien.x = alien.baseX;
          alien.y = alien.baseY;
        }
      }

      // Check bullet collisions
      bullets.forEach((bullet, bi) => {
        if (alien.state === 'destroyed') return;
        const dx = bullet.x - alien.x;
        const dy = bullet.y - alien.y;
        if (Math.abs(dx) < alien.width / 2 + 5 && Math.abs(dy) < alien.height / 2 + 5) {
          bullets.splice(bi, 1);
          alien.health--;
          alien.hitFlash = 1;
          playSound('hit');
          createExplosion(bullet.x, bullet.y, '#F5A742', 5);

          if (alien.health <= 0) {
            alien.state = 'destroyed';
            selectedAnswer = alien.choice;
            createExplosion(alien.x, alien.y, alien.choice.is_correct ? '#6BBF59' : '#E85D4A', 20);

            if (alien.choice.is_correct) {
              playSound('correct');
            } else {
              playSound('wrong');
            }

            setTimeout(() => {
              engine.end(alien.choice.is_correct, alien.choice.explanation);
            }, 500);
          }
        }
      });
    });

    // Update minions wobble
    minions.forEach(minion => {
      minion.wobble += dt * 2;
      minion.x = minion.baseX + Math.sin(minion.wobble + gameTime) * 3;
      minion.y = minion.baseY + Math.cos(minion.wobble * 0.8 + gameTime) * 2;
    });
  }

  function drawShip(x, y, width, height) {
    ctx.save();
    ctx.translate(x, y);

    // Ship body
    ctx.fillStyle = '#4ECDC4';
    ctx.beginPath();
    ctx.moveTo(0, -height / 2);
    ctx.lineTo(-width / 2, height / 2);
    ctx.lineTo(-width / 4, height / 3);
    ctx.lineTo(width / 4, height / 3);
    ctx.lineTo(width / 2, height / 2);
    ctx.closePath();
    ctx.fill();

    // Cockpit
    ctx.fillStyle = '#E87A3E';
    ctx.beginPath();
    ctx.ellipse(0, 0, width / 6, height / 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Engine glow
    ctx.fillStyle = '#F5A742';
    ctx.beginPath();
    ctx.ellipse(0, height / 2, width / 6, height / 8, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawBossAlien(alien) {
    if (alien.state === 'destroyed') return;

    ctx.save();
    ctx.translate(alien.x, alien.y);
    ctx.scale(alien.scale, alien.scale);

    const flashColor = alien.hitFlash > 0 ? '#FFFFFF' : null;

    // Boss body
    ctx.fillStyle = flashColor || '#E87A3E';
    ctx.beginPath();
    ctx.ellipse(0, 0, alien.width / 2, alien.height / 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // Wings
    ctx.fillStyle = flashColor || '#F5A742';
    ctx.beginPath();
    ctx.ellipse(-alien.width / 2.5, 0, alien.width / 4, alien.height / 3, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(alien.width / 2.5, 0, alien.width / 4, alien.height / 3, 0.3, 0, Math.PI * 2);
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#FAFAF7';
    ctx.beginPath();
    ctx.ellipse(-10, -5, 8, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(10, -5, 8, 6, 0, 0, Math.PI * 2);
    ctx.fill();

    // Pupils
    ctx.fillStyle = '#2B2B28';
    ctx.beginPath();
    ctx.arc(-8, -4, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(12, -4, 3, 0, Math.PI * 2);
    ctx.fill();

    // Health bar
    const barWidth = 40;
    const barHeight = 4;
    ctx.fillStyle = '#2B2B28';
    ctx.fillRect(-barWidth / 2, alien.height / 2 + 5, barWidth, barHeight);
    ctx.fillStyle = alien.health === 3 ? '#6BBF59' : alien.health === 2 ? '#F5A742' : '#E85D4A';
    ctx.fillRect(-barWidth / 2, alien.height / 2 + 5, barWidth * (alien.health / 3), barHeight);

    ctx.restore();

    // Draw answer label below alien
    drawAnswerLabel(alien);
  }

  function wrapText(text, maxWidth) {
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';

    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      ctx.font = '14px Nunito, sans-serif';
      const metrics = ctx.measureText(testLine);
      if (metrics.width > maxWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    return lines;
  }

  function drawAnswerLabel(alien) {
    const labelWidth = 300;
    const labelX = alien.baseX;  // Always use base position, not current position
    const labelY = alien.baseY + 55;

    // Wrap text
    const lines = wrapText(alien.choice.text, labelWidth - 20);
    const lineHeight = 16;
    const labelHeight = Math.max(44, lines.length * lineHeight + 16);

    // Label background
    ctx.fillStyle = 'rgba(250, 250, 247, 0.95)';
    ctx.beginPath();
    ctx.roundRect(labelX - labelWidth / 2, labelY - labelHeight / 2, labelWidth, labelHeight, 6);
    ctx.fill();

    // Border
    ctx.strokeStyle = '#E87A3E';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Letter indicator
    const letters = ['A', 'B', 'C', 'D'];
    ctx.fillStyle = '#E87A3E';
    ctx.font = 'bold 14px Belanosima, sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(letters[alien.index] + '.', labelX - labelWidth / 2 + 6, labelY - labelHeight / 2 + 6);

    // Answer text
    ctx.fillStyle = '#2B2B28';
    ctx.font = '14px Nunito, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    const startY = labelY - ((lines.length - 1) * lineHeight) / 2;
    lines.forEach((line, i) => {
      ctx.fillText(line, labelX, startY + i * lineHeight);
    });
  }

  function drawMinion(minion) {
    ctx.save();
    ctx.translate(minion.x, minion.y);

    // Body
    ctx.fillStyle = '#4ECDC4';
    ctx.beginPath();
    ctx.ellipse(0, 0, minion.width / 2, minion.height / 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // Antennae
    ctx.strokeStyle = '#4ECDC4';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-5, -minion.height / 2);
    ctx.lineTo(-8, -minion.height / 2 - 8);
    ctx.moveTo(5, -minion.height / 2);
    ctx.lineTo(8, -minion.height / 2 - 8);
    ctx.stroke();

    // Eyes
    ctx.fillStyle = '#FAFAF7';
    ctx.beginPath();
    ctx.arc(-4, -2, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(4, -2, 4, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#2B2B28';
    ctx.beginPath();
    ctx.arc(-3, -1, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(5, -1, 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawGame() {
    // Clear canvas with space background
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, W, H);

    // Draw stars
    ctx.fillStyle = '#FAFAF7';
    stars.forEach(star => {
      ctx.globalAlpha = 0.3 + Math.sin(gameTime * 2 + star.x) * 0.2;
      ctx.beginPath();
      ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Draw minions
    minions.forEach(drawMinion);

    // Draw boss aliens
    bossAliens.forEach(drawBossAlien);

    // Draw bullets
    ctx.fillStyle = '#F5A742';
    bullets.forEach(bullet => {
      ctx.beginPath();
      ctx.ellipse(bullet.x, bullet.y, 3, 8, 0, 0, Math.PI * 2);
      ctx.fill();

      // Bullet trail
      ctx.fillStyle = 'rgba(245, 167, 66, 0.5)';
      ctx.beginPath();
      ctx.ellipse(bullet.x, bullet.y + 10, 2, 6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#F5A742';
    });

    // Draw particles
    particles.forEach(p => {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Draw player ship
    drawShip(player.x, player.y, player.width, player.height);
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;

    initAudio();

    if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
      player.vx = -player.speed;
    } else if (e.code === 'ArrowRight' || e.code === 'KeyD') {
      player.vx = player.speed;
    } else if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
      if (player.shootCooldown <= 0) {
        bullets.push({
          x: player.x,
          y: player.y - player.height / 2,
          speed: 500
        });
        player.shootCooldown = 0.15;
        playSound('shoot');
      }
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Stop movement on key release
    if (e.code === 'ArrowLeft' || e.code === 'KeyA' ||
        e.code === 'ArrowRight' || e.code === 'KeyD') {
      player.vx = 0;
    }
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
