<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Molten Wax Seal Press</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC'
  };

  // Parchment colors
  const PARCHMENT = '#F5E6C8';
  const PARCHMENT_DARK = '#D4B896';
  const PARCHMENT_SHADOW = '#C4A878';
  const WAX_RED = '#8B1A1A';
  const WAX_RED_LIGHT = '#C43030';
  const WAX_RED_GLOW = '#FF4444';
  const WAX_GOLD = '#D4A020';

  // === GAME STATE ===
  let seals = [];
  let waxDrips = [];
  let gameTime = 0;
  let hoveredSeal = -1;
  let selectedSeal = -1;
  let selectionTime = 0;
  let sealParticles = [];
  let entranceProgress = [];

  // Sound system
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playSound(type) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'click') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(220, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.15);
    } else if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.3);
    }
  }

  // Seal design patterns (4 unique symbols)
  const SEAL_DESIGNS = [
    // Shield with cross
    function(ctx, cx, cy, r) {
      ctx.beginPath();
      ctx.moveTo(cx, cy - r * 0.6);
      ctx.lineTo(cx + r * 0.5, cy - r * 0.3);
      ctx.lineTo(cx + r * 0.5, cy + r * 0.2);
      ctx.lineTo(cx, cy + r * 0.6);
      ctx.lineTo(cx - r * 0.5, cy + r * 0.2);
      ctx.lineTo(cx - r * 0.5, cy - r * 0.3);
      ctx.closePath();
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx, cy - r * 0.4);
      ctx.lineTo(cx, cy + r * 0.4);
      ctx.moveTo(cx - r * 0.3, cy);
      ctx.lineTo(cx + r * 0.3, cy);
      ctx.stroke();
    },
    // Crown
    function(ctx, cx, cy, r) {
      ctx.beginPath();
      ctx.moveTo(cx - r * 0.5, cy + r * 0.3);
      ctx.lineTo(cx - r * 0.5, cy - r * 0.1);
      ctx.lineTo(cx - r * 0.25, cy + r * 0.1);
      ctx.lineTo(cx, cy - r * 0.5);
      ctx.lineTo(cx + r * 0.25, cy + r * 0.1);
      ctx.lineTo(cx + r * 0.5, cy - r * 0.1);
      ctx.lineTo(cx + r * 0.5, cy + r * 0.3);
      ctx.closePath();
      ctx.stroke();
      // Jewels
      for (let i = -1; i <= 1; i++) {
        ctx.beginPath();
        ctx.arc(cx + i * r * 0.25, cy - r * 0.15 + Math.abs(i) * r * 0.15, r * 0.06, 0, Math.PI * 2);
        ctx.fill();
      }
    },
    // Star
    function(ctx, cx, cy, r) {
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const outerAngle = (i * 72 - 90) * Math.PI / 180;
        const innerAngle = ((i * 72 + 36) - 90) * Math.PI / 180;
        const ox = cx + Math.cos(outerAngle) * r * 0.5;
        const oy = cy + Math.sin(outerAngle) * r * 0.5;
        const ix = cx + Math.cos(innerAngle) * r * 0.22;
        const iy = cy + Math.sin(innerAngle) * r * 0.22;
        if (i === 0) ctx.moveTo(ox, oy);
        else ctx.lineTo(ox, oy);
        ctx.lineTo(ix, iy);
      }
      ctx.closePath();
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(cx, cy, r * 0.08, 0, Math.PI * 2);
      ctx.fill();
    },
    // Fleur-de-lis (simplified)
    function(ctx, cx, cy, r) {
      // Center petal
      ctx.beginPath();
      ctx.moveTo(cx, cy - r * 0.5);
      ctx.quadraticCurveTo(cx + r * 0.15, cy - r * 0.2, cx + r * 0.05, cy + r * 0.1);
      ctx.lineTo(cx - r * 0.05, cy + r * 0.1);
      ctx.quadraticCurveTo(cx - r * 0.15, cy - r * 0.2, cx, cy - r * 0.5);
      ctx.stroke();
      // Left petal
      ctx.beginPath();
      ctx.moveTo(cx - r * 0.1, cy);
      ctx.quadraticCurveTo(cx - r * 0.5, cy - r * 0.4, cx - r * 0.4, cy + r * 0.1);
      ctx.quadraticCurveTo(cx - r * 0.25, cy + r * 0.05, cx - r * 0.1, cy + r * 0.15);
      ctx.stroke();
      // Right petal
      ctx.beginPath();
      ctx.moveTo(cx + r * 0.1, cy);
      ctx.quadraticCurveTo(cx + r * 0.5, cy - r * 0.4, cx + r * 0.4, cy + r * 0.1);
      ctx.quadraticCurveTo(cx + r * 0.25, cy + r * 0.05, cx + r * 0.1, cy + r * 0.15);
      ctx.stroke();
      // Base
      ctx.beginPath();
      ctx.moveTo(cx - r * 0.2, cy + r * 0.2);
      ctx.lineTo(cx + r * 0.2, cy + r * 0.2);
      ctx.moveTo(cx, cy + r * 0.1);
      ctx.lineTo(cx, cy + r * 0.4);
      ctx.stroke();
    }
  ];

  // Word wrapping helper
  function wrapText(text, maxWidth, font) {
    ctx.font = font;
    const words = text.split(' ');
    const lines = [];
    let currentLine = words[0];

    for (let i = 1; i < words.length; i++) {
      const testLine = currentLine + ' ' + words[i];
      if (ctx.measureText(testLine).width <= maxWidth) {
        currentLine = testLine;
      } else {
        lines.push(currentLine);
        currentLine = words[i];
      }
    }
    lines.push(currentLine);
    return lines;
  }

  function initGame() {
    gameTime = 0;
    hoveredSeal = -1;
    selectedSeal = -1;
    selectionTime = 0;
    sealParticles = [];
    waxDrips = [];

    // 2x2 grid layout for seals — spread across canvas
    const sealRadius = 60;
    const colSpacing = 340; // horizontal distance between seal centers
    const rowSpacing = 230; // vertical distance between seal centers
    const centerX = W / 2;
    const topRowY = 115;

    const positions = [
      { x: centerX - colSpacing / 2, y: topRowY },
      { x: centerX + colSpacing / 2, y: topRowY },
      { x: centerX - colSpacing / 2, y: topRowY + rowSpacing },
      { x: centerX + colSpacing / 2, y: topRowY + rowSpacing }
    ];

    // Create seals
    seals = QUESTION.choices.map((choice, i) => ({
      x: positions[i].x,
      y: positions[i].y,
      radius: sealRadius,
      choice: choice,
      index: i,
      scale: 0,
      alpha: 0,
      glowIntensity: 0,
      shakeX: 0,
      pulsePhase: Math.random() * Math.PI * 2,
      textY: positions[i].y + sealRadius + 18
    }));

    // Entrance stagger
    entranceProgress = seals.map(() => ({ t: 0, started: false }));

    // Initialize wax drips (one per seal)
    seals.forEach((seal, i) => {
      waxDrips.push({
        x: seal.x,
        startY: -20,
        y: -20,
        targetY: seal.y,
        speed: 180 + Math.random() * 60,
        arrived: false,
        sealIndex: i,
        delay: i * 0.35,
        size: 8 + Math.random() * 4,
        trail: []
      });
    });
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;
    gameTime += dt;

    // Update wax drips
    waxDrips.forEach(drip => {
      if (gameTime < drip.delay) return;
      if (!drip.arrived) {
        drip.y += drip.speed * dt;
        // Add trail particles
        if (Math.random() < 0.3) {
          drip.trail.push({
            x: drip.x + (Math.random() - 0.5) * 6,
            y: drip.y,
            size: 2 + Math.random() * 3,
            alpha: 0.8,
            vy: 20
          });
        }
        if (drip.y >= drip.targetY) {
          drip.y = drip.targetY;
          drip.arrived = true;
          // Start entrance animation for seal
          entranceProgress[drip.sealIndex].started = true;
        }
      }
      // Update trail
      drip.trail.forEach(t => {
        t.y += t.vy * dt;
        t.alpha -= dt * 2;
      });
      drip.trail = drip.trail.filter(t => t.alpha > 0);
    });

    // Update entrance animations
    entranceProgress.forEach((ep, i) => {
      if (ep.started && ep.t < 1) {
        ep.t = Math.min(1, ep.t + dt * 3);
        const t = ep.t;
        // Spring easing
        const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
        seals[i].scale = t * spring;
        seals[i].alpha = Math.min(1, t * 1.5);
      }
    });

    // Update seal glow
    seals.forEach((seal, i) => {
      seal.pulsePhase += dt * 2;
      if (hoveredSeal === i) {
        seal.glowIntensity = Math.min(1, seal.glowIntensity + dt * 5);
      } else {
        seal.glowIntensity = Math.max(0, seal.glowIntensity - dt * 3);
      }
    });

    // Selection animation
    if (selectedSeal >= 0) {
      selectionTime += dt;
      const seal = seals[selectedSeal];

      // Pulse scale on selection
      if (selectionTime < 0.3) {
        seal.scale = 1 + Math.sin(selectionTime * Math.PI / 0.3) * 0.15;
      }

      // Shake wrong answers
      if (selectionTime > 0.15 && selectionTime < 0.6) {
        seals.forEach((s, i) => {
          if (i !== selectedSeal) {
            const shakeT = (selectionTime - 0.15) / 0.45;
            s.shakeX = Math.sin(shakeT * Math.PI * 8) * 4 * (1 - shakeT);
          }
        });
      }

      if (selectionTime >= 0.7) {
        const choice = seal.choice;
        if (choice.is_correct) {
          playSound('correct');
        } else {
          playSound('wrong');
        }
        engine.end(choice.is_correct, choice.explanation);
      }
    }

    // Update particles
    sealParticles.forEach(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 120 * dt;
      p.alpha -= dt * 1.5;
      p.rotation += p.rotSpeed * dt;
    });
    sealParticles = sealParticles.filter(p => p.alpha > 0);
  }

  function drawGame() {
    // Parchment background
    ctx.fillStyle = PARCHMENT;
    ctx.fillRect(0, 0, W, H);

    // Parchment texture (subtle grain)
    ctx.globalAlpha = 0.08;
    for (let i = 0; i < 60; i++) {
      const px = Math.sin(i * 37.7) * W * 0.5 + W * 0.5;
      const py = Math.cos(i * 23.3) * H * 0.5 + H * 0.5;
      ctx.fillStyle = '#8B7355';
      ctx.fillRect(px, py, Math.random() * 30 + 5, 1);
    }
    ctx.globalAlpha = 1;

    // Edge darkening (aged parchment effect)
    const edgeGrad = ctx.createRadialGradient(W / 2, H / 2, 200, W / 2, H / 2, 420);
    edgeGrad.addColorStop(0, 'rgba(0,0,0,0)');
    edgeGrad.addColorStop(1, 'rgba(139,115,85,0.15)');
    ctx.fillStyle = edgeGrad;
    ctx.fillRect(0, 0, W, H);

    // Draw wax drip trails
    waxDrips.forEach(drip => {
      if (gameTime < drip.delay) return;
      // Trail particles
      drip.trail.forEach(t => {
        ctx.globalAlpha = t.alpha * 0.6;
        ctx.fillStyle = WAX_RED_LIGHT;
        ctx.beginPath();
        ctx.arc(t.x, t.y, t.size, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;

      // Main drip blob
      if (!drip.arrived) {
        ctx.fillStyle = WAX_RED_LIGHT;
        ctx.beginPath();
        ctx.arc(drip.x, drip.y, drip.size, 0, Math.PI * 2);
        ctx.fill();

        // Drip highlight
        ctx.fillStyle = 'rgba(255,150,100,0.4)';
        ctx.beginPath();
        ctx.arc(drip.x - 2, drip.y - 2, drip.size * 0.4, 0, Math.PI * 2);
        ctx.fill();
      }
    });

    // Draw seals
    seals.forEach((seal, i) => {
      if (seal.alpha <= 0) return;

      ctx.save();
      ctx.globalAlpha = seal.alpha;
      ctx.translate(seal.x + seal.shakeX, seal.y);
      ctx.scale(seal.scale, seal.scale);

      // Glow effect
      const baseGlow = 0.3 + Math.sin(seal.pulsePhase) * 0.1;
      const glowAmount = baseGlow + seal.glowIntensity * 0.5;

      if (glowAmount > 0) {
        const glowGrad = ctx.createRadialGradient(0, 0, seal.radius * 0.5, 0, 0, seal.radius * 1.4);
        glowGrad.addColorStop(0, `rgba(232, 122, 62, ${glowAmount * 0.3})`);
        glowGrad.addColorStop(0.5, `rgba(245, 167, 66, ${glowAmount * 0.15})`);
        glowGrad.addColorStop(1, 'rgba(245, 167, 66, 0)');
        ctx.fillStyle = glowGrad;
        ctx.beginPath();
        ctx.arc(0, 0, seal.radius * 1.4, 0, Math.PI * 2);
        ctx.fill();
      }

      // Wax base (main circle)
      const waxGrad = ctx.createRadialGradient(-8, -8, 0, 0, 0, seal.radius);
      waxGrad.addColorStop(0, '#C43030');
      waxGrad.addColorStop(0.5, WAX_RED);
      waxGrad.addColorStop(1, '#6B1010');
      ctx.fillStyle = waxGrad;
      ctx.beginPath();
      ctx.arc(0, 0, seal.radius, 0, Math.PI * 2);
      ctx.fill();

      // Wax edge (irregular border)
      ctx.strokeStyle = '#5A0E0E';
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let a = 0; a < Math.PI * 2; a += 0.1) {
        const wobble = Math.sin(a * 5 + i) * 2 + Math.sin(a * 8 + i * 2) * 1;
        const r = seal.radius + wobble;
        const px = Math.cos(a) * r;
        const py = Math.sin(a) * r;
        if (a === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.stroke();

      // Inner ring
      ctx.strokeStyle = 'rgba(212, 160, 32, 0.5)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(0, 0, seal.radius * 0.75, 0, Math.PI * 2);
      ctx.stroke();

      // Seal design (embossed look)
      ctx.strokeStyle = WAX_GOLD;
      ctx.fillStyle = WAX_GOLD;
      ctx.lineWidth = 2;
      SEAL_DESIGNS[i](ctx, 0, 0, seal.radius);

      // Selection highlight
      if (selectedSeal === i) {
        const isCorrect = seal.choice.is_correct;
        ctx.strokeStyle = isCorrect ? COLORS.success : COLORS.error;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(0, 0, seal.radius + 4, 0, Math.PI * 2);
        ctx.stroke();
      }

      // Wax highlight (3D effect)
      ctx.globalAlpha = seal.alpha * 0.25;
      const hlGrad = ctx.createRadialGradient(-15, -15, 0, 0, 0, seal.radius);
      hlGrad.addColorStop(0, 'rgba(255,200,200,0.6)');
      hlGrad.addColorStop(0.5, 'rgba(255,200,200,0)');
      ctx.fillStyle = hlGrad;
      ctx.beginPath();
      ctx.arc(0, 0, seal.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = seal.alpha;

      ctx.restore();

      // Answer text below seal
      if (seal.alpha > 0.5) {
        ctx.globalAlpha = Math.min(1, (seal.alpha - 0.5) * 2);
        const textFont = "400 16px 'Nunito', sans-serif";
        const maxTextWidth = 320;
        const lines = wrapText(seal.choice.text, maxTextWidth, textFont);
        ctx.font = textFont;
        ctx.fillStyle = COLORS.textPrimary;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';

        const lineHeight = 20;
        const textStartY = seal.y + seal.radius + 10;
        lines.forEach((line, li) => {
          ctx.fillText(line, seal.x + seal.shakeX, textStartY + li * lineHeight);
        });
        ctx.globalAlpha = 1;
      }
    });

    // Draw particles
    sealParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
      ctx.restore();
    });
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;
    // Keyboard not used for this game
  }

  // Mouse move for hover detection
  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'playing' || selectedSeal >= 0) return;
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    hoveredSeal = -1;
    seals.forEach((seal, i) => {
      if (seal.alpha < 0.5) return;
      const dx = x - seal.x;
      const dy = y - seal.y;
      if (Math.sqrt(dx * dx + dy * dy) <= seal.radius * seal.scale) {
        hoveredSeal = i;
      }
    });
    canvas.style.cursor = hoveredSeal >= 0 ? 'pointer' : 'default';
  });

  // Click handler for seal selection
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'playing' || selectedSeal >= 0) return;
    const { x, y } = screenToLogical(e.clientX, e.clientY);

    seals.forEach((seal, i) => {
      if (seal.alpha < 0.5) return;
      const dx = x - seal.x;
      const dy = y - seal.y;
      if (Math.sqrt(dx * dx + dy * dy) <= seal.radius * seal.scale) {
        selectedSeal = i;
        selectionTime = 0;
        playSound('click');

        // Spawn wax splatter particles
        const colors = [COLORS.orange, COLORS.amber, WAX_RED_LIGHT, WAX_GOLD];
        for (let j = 0; j < 15; j++) {
          sealParticles.push({
            x: seal.x,
            y: seal.y,
            vx: (Math.random() - 0.5) * 200,
            vy: (Math.random() - 0.5) * 200 - 50,
            size: 3 + Math.random() * 5,
            color: colors[Math.floor(Math.random() * colors.length)],
            alpha: 1,
            rotation: Math.random() * Math.PI * 2,
            rotSpeed: (Math.random() - 0.5) * 8
          });
        }
      }
    });
  });

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
