<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Template</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #0a0a0f;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = "bold 18px 'Nunito Sans', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = "bold 36px 'Nunito Sans', sans-serif";
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgDark: '#0a0808',
    cellarWall: '#1a1510',
    cellarFloor: '#12100c',
    candleBody: '#d4c090',
    candleWick: '#2B2B28',
    wickFlame: '#F5A742',
    wickFlameInner: '#FFE8B0',
    scrollBase: '#c4a86a',
    scrollText: '#2B2B28',
    lightBeam: '#F5A742',
    lightCore: '#FFE8B0',
    hookColor: '#5A5A54',
    orange: '#E87A3E',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    amber: '#F5A742',
    textPrimary: '#F5F5F0',
    textSecondary: '#C2C2B8',
    highlight: '#FFE8B0'
  };

  // === AUDIO CONTEXT ===
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playSound(type) {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);

      if (type === 'move') {
        osc.type = 'sine';
        osc.frequency.value = 220;
        gain.gain.setValueAtTime(0.03, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.05);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.05);
      } else if (type === 'reveal') {
        osc.type = 'sine';
        osc.frequency.value = 440;
        osc.frequency.exponentialRampToValueAtTime(660, ac.currentTime + 0.15);
        gain.gain.setValueAtTime(0.08, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.2);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.2);
      } else if (type === 'select') {
        osc.type = 'triangle';
        osc.frequency.value = 330;
        osc.frequency.exponentialRampToValueAtTime(550, ac.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.15);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.15);
      } else if (type === 'correct') {
        osc.type = 'sine';
        osc.frequency.value = 523;
        gain.gain.setValueAtTime(0.12, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.4);
        const osc2 = ac.createOscillator();
        const gain2 = ac.createGain();
        osc2.connect(gain2);
        gain2.connect(ac.destination);
        osc2.type = 'sine';
        osc2.frequency.value = 659;
        gain2.gain.setValueAtTime(0.12, ac.currentTime + 0.15);
        gain2.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.5);
        osc2.start(ac.currentTime + 0.15);
        osc2.stop(ac.currentTime + 0.5);
      } else if (type === 'wrong') {
        osc.type = 'sawtooth';
        osc.frequency.value = 180;
        osc.frequency.exponentialRampToValueAtTime(80, ac.currentTime + 0.4);
        gain.gain.setValueAtTime(0.08, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.5);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.5);
      } else if (type === 'sizzle') {
        // Wick sputter sound
        const bufferSize = ac.sampleRate * 0.5;
        const buffer = ac.createBuffer(1, bufferSize, ac.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
        }
        const noise = ac.createBufferSource();
        noise.buffer = buffer;
        const noiseGain = ac.createGain();
        noiseGain.gain.setValueAtTime(0.1, ac.currentTime);
        noiseGain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
        noise.connect(noiseGain);
        noiseGain.connect(ac.destination);
        noise.start(ac.currentTime);
      }
    } catch (e) { /* audio not available */ }
  }

  // === GAME STATE ===
  const LAMP_SPEED = 280;
  const LIGHT_RADIUS = 110;

  let lamp = { x: W / 2, y: H / 2 };
  let keysDown = {};
  let candles = [];
  let selectedCandle = -1;
  let gameTime = 0;
  let entranceProgress = 0;
  let flickerOffset = 0;
  let answerRevealed = [false, false, false, false];
  let answerConfirmed = false;
  let darknessAlpha = 0;
  let sputterAnim = { active: false, time: 0, duration: 1.2, candleIdx: -1 };
  let dustParticles = [];
  let glowParticles = [];

  // Candle positions in a 2x2-like layout for readability
  const CANDLE_POSITIONS = [
    { x: 150, y: 160 },
    { x: 530, y: 160 },
    { x: 150, y: 390 },
    { x: 530, y: 390 }
  ];

  // Scroll dimensions for text display
  const SCROLL_W = 260;
  const SCROLL_H = 78;

  function wrapText(text, maxWidth, font) {
    ctx.font = font;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    for (let i = 0; i < words.length; i++) {
      const testLine = currentLine ? currentLine + ' ' + words[i] : words[i];
      if (ctx.measureText(testLine).width > maxWidth && currentLine) {
        lines.push(currentLine);
        currentLine = words[i];
      } else {
        currentLine = testLine;
      }
    }
    if (currentLine) lines.push(currentLine);
    return lines;
  }

  function initGame() {
    lamp = { x: W / 2, y: H / 2 };
    keysDown = {};
    selectedCandle = -1;
    gameTime = 0;
    entranceProgress = 0;
    answerRevealed = [false, false, false, false];
    answerConfirmed = false;
    darknessAlpha = 0;
    sputterAnim = { active: false, time: 0, duration: 1.2, candleIdx: -1 };
    dustParticles = [];
    glowParticles = [];

    candles = QUESTION.choices.map((choice, i) => ({
      x: CANDLE_POSITIONS[i].x,
      y: CANDLE_POSITIONS[i].y,
      choice: choice,
      index: i,
      illumination: 0,
      wobble: Math.random() * Math.PI * 2,
      scale: 0,
      alpha: 0,
      scrollReveal: 0
    }));

    // Spawn initial dust particles
    for (let i = 0; i < 20; i++) {
      dustParticles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 8,
        vy: -Math.random() * 5 - 2,
        size: Math.random() * 2 + 0.5,
        alpha: Math.random() * 0.3,
        life: Math.random()
      });
    }
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Entrance animation
    if (entranceProgress < 1) {
      entranceProgress = Math.min(1, entranceProgress + dt * 1.5);
      candles.forEach((c, i) => {
        const delay = i * 0.12;
        const t = Math.max(0, Math.min(1, (entranceProgress - delay) / 0.5));
        const spring = t < 1 ? t * (1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t)) : 1;
        c.scale = spring;
        c.alpha = t;
      });
    }

    // Sputter animation (wrong answer)
    if (sputterAnim.active) {
      sputterAnim.time += dt;
      const t = sputterAnim.time / sputterAnim.duration;
      darknessAlpha = Math.min(1, t * 1.5);
      if (t >= 1) {
        sputterAnim.active = false;
        const choice = candles[sputterAnim.candleIdx].choice;
        playSound('wrong');
        engine.end(false, choice.explanation);
      }
      return;
    }

    // Move lamp with keys
    let dx = 0, dy = 0;
    if (keysDown['ArrowLeft'] || keysDown['KeyA']) dx -= 1;
    if (keysDown['ArrowRight'] || keysDown['KeyD']) dx += 1;
    if (keysDown['ArrowUp'] || keysDown['KeyW']) dy -= 1;
    if (keysDown['ArrowDown'] || keysDown['KeyS']) dy += 1;

    if (dx !== 0 || dy !== 0) {
      const len = Math.sqrt(dx * dx + dy * dy);
      lamp.x += (dx / len) * LAMP_SPEED * dt;
      lamp.y += (dy / len) * LAMP_SPEED * dt;
      lamp.x = Math.max(30, Math.min(W - 30, lamp.x));
      lamp.y = Math.max(30, Math.min(H - 30, lamp.y));
    }

    // Flicker
    flickerOffset = Math.sin(gameTime * 12) * 3 + Math.sin(gameTime * 7.3) * 2;

    // Update candle illumination and scroll reveal
    let closestIdx = -1;
    let closestDist = Infinity;
    candles.forEach((c, i) => {
      const dist = Math.sqrt((lamp.x - c.x) ** 2 + (lamp.y - c.y) ** 2);
      if (dist < LIGHT_RADIUS + 40) {
        c.illumination = Math.min(1, c.illumination + dt * 3);
        if (!answerRevealed[i] && c.illumination > 0.5) {
          answerRevealed[i] = true;
          playSound('reveal');
        }
      } else {
        c.illumination = Math.max(0, c.illumination - dt * 2);
      }

      // Scroll reveal follows illumination
      if (c.illumination > 0.3) {
        c.scrollReveal = Math.min(1, c.scrollReveal + dt * 4);
      } else {
        c.scrollReveal = Math.max(0, c.scrollReveal - dt * 2);
      }

      c.wobble += dt * 2;

      if (dist < closestDist && dist < LIGHT_RADIUS + 40) {
        closestDist = dist;
        closestIdx = i;
      }
    });

    selectedCandle = closestIdx;

    // Update dust particles
    dustParticles.forEach(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt * 0.2;
      if (p.life <= 0 || p.y < -10 || p.x < -10 || p.x > W + 10) {
        p.x = Math.random() * W;
        p.y = H + 5;
        p.life = 1;
        p.alpha = Math.random() * 0.3;
      }
    });

    // Spawn glow particles near lamp
    if (Math.random() < dt * 8) {
      glowParticles.push({
        x: lamp.x + (Math.random() - 0.5) * 20,
        y: lamp.y + (Math.random() - 0.5) * 20,
        vx: (Math.random() - 0.5) * 30,
        vy: -Math.random() * 40 - 10,
        size: Math.random() * 3 + 1,
        alpha: 0.6,
        life: 1
      });
    }
    glowParticles.forEach(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt * 2;
      p.alpha = p.life * 0.5;
    });
    glowParticles = glowParticles.filter(p => p.life > 0);
  }

  function drawGame() {
    // Fill with very dark background
    ctx.fillStyle = COLORS.bgDark;
    ctx.fillRect(0, 0, W, H);

    // Draw cellar texture (subtle stone/brick pattern)
    drawCellarBackground();

    // Draw hooks and rope lines
    drawHooksAndRopes();

    // Draw candles (behind light)
    candles.forEach((c, i) => drawCandle(c, i));

    // Draw light beam / flashlight effect
    drawLightBeam();

    // Draw candles in light (scrolls and text on top of light)
    candles.forEach((c, i) => drawCandleOverlay(c, i));

    // Draw dust particles
    drawDustParticles();

    // Draw glow particles
    drawGlowParticles();

    // Draw selection indicator
    if (selectedCandle >= 0 && !answerConfirmed) {
      drawSelectionIndicator(candles[selectedCandle]);
    }

    // Draw darkness overlay for sputter animation
    if (sputterAnim.active) {
      ctx.fillStyle = `rgba(0, 0, 0, ${darknessAlpha})`;
      ctx.fillRect(0, 0, W, H);
    }
  }

  function drawCellarBackground() {
    // Subtle vertical planks / stone texture
    ctx.globalAlpha = 0.08;
    for (let x = 0; x < W; x += 60) {
      ctx.fillStyle = x % 120 === 0 ? '#2a2218' : '#1e1a12';
      ctx.fillRect(x, 0, 58, H);
    }
    // Horizontal mortar lines
    for (let y = 0; y < H; y += 45) {
      ctx.fillStyle = '#1a1510';
      ctx.fillRect(0, y, W, 2);
    }
    ctx.globalAlpha = 1;

    // Floor gradient at bottom
    const floorGrad = ctx.createLinearGradient(0, H - 80, 0, H);
    floorGrad.addColorStop(0, 'transparent');
    floorGrad.addColorStop(1, 'rgba(18, 16, 12, 0.5)');
    ctx.fillStyle = floorGrad;
    ctx.fillRect(0, H - 80, W, 80);
  }

  function drawHooksAndRopes() {
    ctx.globalAlpha = 0.3;
    // Horizontal rope at top
    ctx.strokeStyle = '#5A5A54';
    ctx.lineWidth = 2;

    // Top row rope
    ctx.beginPath();
    ctx.moveTo(60, 90);
    ctx.quadraticCurveTo(W / 2, 80, W - 60, 90);
    ctx.stroke();

    // Bottom row rope
    ctx.beginPath();
    ctx.moveTo(60, 320);
    ctx.quadraticCurveTo(W / 2, 310, W - 60, 320);
    ctx.stroke();

    // Hooks
    candles.forEach(c => {
      const hookY = c.y - 50;
      ctx.beginPath();
      ctx.arc(c.x, hookY, 5, Math.PI, 0);
      ctx.strokeStyle = COLORS.hookColor;
      ctx.lineWidth = 2;
      ctx.stroke();
      // String from hook to candle
      ctx.beginPath();
      ctx.moveTo(c.x, hookY);
      ctx.lineTo(c.x, c.y - 30);
      ctx.strokeStyle = '#8C8C84';
      ctx.lineWidth = 1;
      ctx.stroke();
    });
    ctx.globalAlpha = 1;
  }

  function drawCandle(candle, idx) {
    const c = candle;
    if (c.alpha <= 0) return;

    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.scale(c.scale, c.scale);
    ctx.globalAlpha = c.alpha * 0.4; // Dim in darkness

    // Candle body (tapered)
    const candleW = 16;
    const candleH = 50;
    ctx.fillStyle = COLORS.candleBody;
    ctx.beginPath();
    ctx.moveTo(-candleW / 2, 0);
    ctx.lineTo(-candleW / 2 + 2, -candleH);
    ctx.lineTo(candleW / 2 - 2, -candleH);
    ctx.lineTo(candleW / 2, 0);
    ctx.closePath();
    ctx.fill();

    // Wax drip details
    ctx.fillStyle = '#c4b080';
    ctx.beginPath();
    ctx.ellipse(-4, -10, 3, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(3, -20, 2, 4, 0.3, 0, Math.PI * 2);
    ctx.fill();

    // Wick
    ctx.strokeStyle = COLORS.candleWick;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, -candleH);
    ctx.lineTo(0, -candleH - 8);
    ctx.stroke();

    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function drawCandleOverlay(candle, idx) {
    const c = candle;
    if (c.alpha <= 0) return;

    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.scale(c.scale, c.scale);

    // When illuminated, draw the candle brighter
    if (c.illumination > 0) {
      ctx.globalAlpha = c.alpha * (0.4 + c.illumination * 0.6);

      // Candle body (tapered) - brighter
      const candleW = 16;
      const candleH = 50;
      ctx.fillStyle = COLORS.candleBody;
      ctx.beginPath();
      ctx.moveTo(-candleW / 2, 0);
      ctx.lineTo(-candleW / 2 + 2, -candleH);
      ctx.lineTo(candleW / 2 - 2, -candleH);
      ctx.lineTo(candleW / 2, 0);
      ctx.closePath();
      ctx.fill();

      // Wax drip details
      ctx.fillStyle = '#c4b080';
      ctx.beginPath();
      ctx.ellipse(-4, -10, 3, 6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(3, -20, 2, 4, 0.3, 0, Math.PI * 2);
      ctx.fill();

      // Wick
      ctx.strokeStyle = COLORS.candleWick;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(0, -candleH);
      ctx.lineTo(0, -candleH - 8);
      ctx.stroke();

      // Small flame when illuminated
      if (c.illumination > 0.5) {
        const flameFlicker = Math.sin(gameTime * 10 + idx * 2) * 2;
        ctx.fillStyle = COLORS.wickFlame;
        ctx.beginPath();
        ctx.ellipse(flameFlicker * 0.3, -candleH - 14, 4, 8 + flameFlicker, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = COLORS.wickFlameInner;
        ctx.beginPath();
        ctx.ellipse(flameFlicker * 0.2, -candleH - 12, 2, 5, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Draw scroll with answer text
    if (c.scrollReveal > 0) {
      ctx.globalAlpha = c.scrollReveal;
      const scrollX = -SCROLL_W / 2;
      const scrollY = 15;

      // Scroll background
      ctx.fillStyle = COLORS.scrollBase;
      ctx.beginPath();
      ctx.roundRect(scrollX, scrollY, SCROLL_W, SCROLL_H, 6);
      ctx.fill();

      // Scroll edge curls
      ctx.fillStyle = '#b09858';
      ctx.beginPath();
      ctx.ellipse(scrollX, scrollY + SCROLL_H / 2, 6, SCROLL_H / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(scrollX + SCROLL_W, scrollY + SCROLL_H / 2, 6, SCROLL_H / 2, 0, 0, Math.PI * 2);
      ctx.fill();

      // Inner parchment
      ctx.fillStyle = '#e8d8b0';
      ctx.beginPath();
      ctx.roundRect(scrollX + 6, scrollY + 3, SCROLL_W - 12, SCROLL_H - 6, 3);
      ctx.fill();

      // Answer text (word-wrapped)
      ctx.fillStyle = COLORS.scrollText;
      const font = "500 16px 'Nunito', sans-serif";
      const lines = wrapText(c.choice.text, SCROLL_W - 24, font);
      ctx.font = font;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      const lineHeight = 19;
      const totalTextH = lines.length * lineHeight;
      const textStartY = scrollY + SCROLL_H / 2 - totalTextH / 2 + lineHeight / 2;

      lines.forEach((line, li) => {
        ctx.fillText(line, 0, textStartY + li * lineHeight);
      });

      // Choice letter badge
      const letters = ['A', 'B', 'C', 'D'];
      ctx.fillStyle = COLORS.orange;
      ctx.beginPath();
      ctx.arc(scrollX + 16, scrollY - 4, 11, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#FFFFFF';
      ctx.font = "bold 14px 'Nunito Sans', sans-serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(letters[idx], scrollX + 16, scrollY - 4);
    }

    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function drawLightBeam() {
    // Create radial gradient centered on lamp position
    const effectiveRadius = LIGHT_RADIUS + flickerOffset;
    const grad = ctx.createRadialGradient(
      lamp.x, lamp.y, 0,
      lamp.x, lamp.y, effectiveRadius * 2.5
    );
    grad.addColorStop(0, 'rgba(255, 232, 176, 0.25)');
    grad.addColorStop(0.2, 'rgba(245, 167, 66, 0.15)');
    grad.addColorStop(0.5, 'rgba(245, 167, 66, 0.05)');
    grad.addColorStop(1, 'rgba(0, 0, 0, 0)');

    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Bright core
    const coreGrad = ctx.createRadialGradient(
      lamp.x, lamp.y, 0,
      lamp.x, lamp.y, 30
    );
    coreGrad.addColorStop(0, 'rgba(255, 240, 200, 0.6)');
    coreGrad.addColorStop(1, 'rgba(255, 232, 176, 0)');
    ctx.fillStyle = coreGrad;
    ctx.fillRect(lamp.x - 40, lamp.y - 40, 80, 80);

    // Lamp flame icon at cursor
    const flameFlicker = Math.sin(gameTime * 15) * 1.5;
    ctx.fillStyle = COLORS.wickFlame;
    ctx.beginPath();
    ctx.ellipse(lamp.x + flameFlicker * 0.5, lamp.y - 4, 5, 10 + flameFlicker, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = COLORS.wickFlameInner;
    ctx.beginPath();
    ctx.ellipse(lamp.x + flameFlicker * 0.3, lamp.y - 2, 2.5, 6, 0, 0, Math.PI * 2);
    ctx.fill();

    // Vignette overlay (darkness around edges)
    const vignetteGrad = ctx.createRadialGradient(
      lamp.x, lamp.y, effectiveRadius * 0.6,
      lamp.x, lamp.y, Math.max(W, H)
    );
    vignetteGrad.addColorStop(0, 'rgba(0, 0, 0, 0)');
    vignetteGrad.addColorStop(0.3, 'rgba(0, 0, 0, 0.4)');
    vignetteGrad.addColorStop(0.6, 'rgba(0, 0, 0, 0.75)');
    vignetteGrad.addColorStop(1, 'rgba(0, 0, 0, 0.92)');
    ctx.fillStyle = vignetteGrad;
    ctx.fillRect(0, 0, W, H);
  }

  function drawDustParticles() {
    dustParticles.forEach(p => {
      const distToLamp = Math.sqrt((p.x - lamp.x) ** 2 + (p.y - lamp.y) ** 2);
      const inLight = Math.max(0, 1 - distToLamp / (LIGHT_RADIUS * 2));
      if (inLight > 0) {
        ctx.globalAlpha = p.alpha * inLight * p.life;
        ctx.fillStyle = COLORS.highlight;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
    });
    ctx.globalAlpha = 1;
  }

  function drawGlowParticles() {
    glowParticles.forEach(p => {
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = COLORS.amber;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  function drawSelectionIndicator(candle) {
    const pulse = Math.sin(gameTime * 4) * 0.3 + 0.7;
    ctx.save();
    ctx.translate(candle.x, candle.y);
    ctx.strokeStyle = `rgba(78, 205, 196, ${pulse})`;
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.roundRect(-SCROLL_W / 2 - 8, 7, SCROLL_W + 16, SCROLL_H + 16, 10);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;
    if (sputterAnim.active) return;

    const code = e.code;

    if (code === 'ArrowLeft' || code === 'ArrowRight' || code === 'ArrowUp' || code === 'ArrowDown' ||
        code === 'KeyA' || code === 'KeyD' || code === 'KeyW' || code === 'KeyS') {
      keysDown[code] = true;
      e.preventDefault();
    }

    // Confirm selection with space or enter
    if ((code === 'Space' || code === 'Enter') && selectedCandle >= 0) {
      e.preventDefault();
      if (answerConfirmed) return;
      answerConfirmed = true;

      const choice = candles[selectedCandle].choice;
      playSound('select');

      if (choice.is_correct) {
        playSound('correct');
        engine.end(true, choice.explanation);
      } else {
        // Wick sputters out - darkness falls
        playSound('sizzle');
        sputterAnim.active = true;
        sputterAnim.time = 0;
        sputterAnim.candleIdx = selectedCandle;
        answerConfirmed = false; // Allow re-play on restart
      }
    }
  }

  // Track key releases
  document.addEventListener('keyup', (e) => {
    keysDown[e.code] = false;
  });

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
