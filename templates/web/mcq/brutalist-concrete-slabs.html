<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Template</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    surfaceSecondary: '#F5F5F0',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    textTertiary: '#8C8C84',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC',
    concrete: '#8C8C84',
    concreteDark: '#6B6B64',
    concreteLight: '#B0B0A8',
    concreteSurface: '#A0A098',
  };

  // === AUDIO ===
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new AudioCtx();
    return audioCtx;
  }

  function playClickSound() {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'square';
    osc.frequency.setValueAtTime(120, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(60, ctx.currentTime + 0.08);
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.12);
  }

  function playCorrectSound() {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(440, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.3);
  }

  function playWrongSound() {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.3);
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.35);
  }

  function playRiseSound(delay) {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(60 + delay * 80, ctx.currentTime + delay * 0.15);
    osc.frequency.exponentialRampToValueAtTime(100 + delay * 60, ctx.currentTime + delay * 0.15 + 0.15);
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.08, ctx.currentTime + delay * 0.15);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay * 0.15 + 0.3);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + delay * 0.15 + 0.3);
  }

  // === GAME STATE ===
  let slabs = [];
  let hoveredSlab = -1;
  let selectedSlab = -1;
  let gameTime = 0;
  let gameParticles = [];
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // Slab layout: vertical stack, full width for 60-char text
  const SLAB_W = 520;
  const SLAB_H = 90;
  const SLAB_GAP = 16;
  const TOTAL_H = SLAB_H * 4 + SLAB_GAP * 3;
  const START_X = (W - SLAB_W) / 2;
  const START_Y = (H - TOTAL_H) / 2 + 20;

  function wrapText(text, maxWidth, font) {
    ctx.font = font;
    const words = text.split(' ');
    const lines = [];
    let currentLine = words[0];
    for (let i = 1; i < words.length; i++) {
      const testLine = currentLine + ' ' + words[i];
      if (ctx.measureText(testLine).width <= maxWidth) {
        currentLine = testLine;
      } else {
        lines.push(currentLine);
        currentLine = words[i];
      }
    }
    lines.push(currentLine);
    return lines;
  }

  function initGame() {
    gameTime = 0;
    hoveredSlab = -1;
    selectedSlab = -1;
    gameParticles = [];

    slabs = QUESTION.choices.map((choice, i) => ({
      choice,
      index: i,
      x: START_X,
      y: START_Y + i * (SLAB_H + SLAB_GAP),
      w: SLAB_W,
      h: SLAB_H,
      // Rise animation: start below canvas
      riseOffset: H + 100,
      riseTarget: 0,
      riseDelay: i * 0.15,
      riseStarted: false,
      riseDone: false,
      // Interaction
      hoverScale: 1,
      shakeX: 0,
      pulseScale: 1,
      alpha: 1,
      // Feedback state
      feedbackState: 'none', // 'none' | 'correct' | 'wrong'
    }));

    // Play rise sounds
    if (!prefersReducedMotion) {
      slabs.forEach((s, i) => playRiseSound(i));
    }
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;
    gameTime += dt;

    // Update slab rise animations
    slabs.forEach((slab) => {
      if (gameTime >= slab.riseDelay && !slab.riseDone) {
        slab.riseStarted = true;
        // Spring-like ease out
        const riseSpeed = 8;
        slab.riseOffset += (slab.riseTarget - slab.riseOffset) * riseSpeed * dt;
        if (Math.abs(slab.riseOffset - slab.riseTarget) < 0.5) {
          slab.riseOffset = slab.riseTarget;
          slab.riseDone = true;
        }
      }

      // Hover scale animation
      const targetScale = (slab.index === hoveredSlab && selectedSlab === -1) ? 1.02 : 1;
      slab.hoverScale += (targetScale - slab.hoverScale) * 10 * dt;

      // Shake animation decay
      slab.shakeX *= Math.pow(0.05, dt);
      if (Math.abs(slab.shakeX) < 0.1) slab.shakeX = 0;

      // Pulse scale decay
      if (slab.pulseScale !== 1) {
        slab.pulseScale += (1 - slab.pulseScale) * 6 * dt;
        if (Math.abs(slab.pulseScale - 1) < 0.005) slab.pulseScale = 1;
      }
    });

    // Update particles
    gameParticles = gameParticles.filter(p => {
      p.vy += 500 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.alpha -= dt * 0.8;
      return p.alpha > 0 && p.y < H + 50;
    });
  }

  function drawConcreteSlab(slab) {
    const sx = slab.x + slab.shakeX;
    const sy = slab.y + slab.riseOffset;
    const sw = slab.w;
    const sh = slab.h;

    ctx.save();

    // Apply hover/pulse scale from center
    const cx = sx + sw / 2;
    const cy = sy + sh / 2;
    const s = slab.hoverScale * slab.pulseScale;
    ctx.translate(cx, cy);
    ctx.scale(s, s);
    ctx.translate(-cx, -cy);

    // Shadow
    ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
    ctx.shadowBlur = slab.index === hoveredSlab && selectedSlab === -1 ? 16 : 8;
    ctx.shadowOffsetY = slab.index === hoveredSlab && selectedSlab === -1 ? 6 : 3;

    // Main concrete body
    let baseColor;
    if (slab.feedbackState === 'correct') {
      baseColor = COLORS.success;
    } else if (slab.feedbackState === 'wrong') {
      baseColor = COLORS.error;
    } else if (slab.index === hoveredSlab && selectedSlab === -1) {
      baseColor = '#969690';
    } else {
      baseColor = COLORS.concrete;
    }

    ctx.fillStyle = baseColor;
    ctx.beginPath();
    ctx.roundRect(sx, sy, sw, sh, 4);
    ctx.fill();

    // Reset shadow
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;

    // Concrete texture: subtle horizontal lines
    ctx.strokeStyle = 'rgba(0,0,0,0.06)';
    ctx.lineWidth = 1;
    for (let ly = sy + 8; ly < sy + sh - 4; ly += 6) {
      ctx.beginPath();
      ctx.moveTo(sx + 4, ly);
      ctx.lineTo(sx + sw - 4, ly);
      ctx.stroke();
    }

    // Form lines (brutalist joint marks)
    ctx.strokeStyle = 'rgba(0,0,0,0.12)';
    ctx.lineWidth = 2;
    // Top edge
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(sx + sw, sy);
    ctx.stroke();
    // Bottom edge
    ctx.beginPath();
    ctx.moveTo(sx, sy + sh);
    ctx.lineTo(sx + sw, sy + sh);
    ctx.stroke();

    // Engraved label letter (A, B, C, D)
    const labels = ['A', 'B', 'C', 'D'];
    ctx.font = "700 28px 'Belanosima', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // Engraved shadow (lighter below, darker above for inset look)
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillText(labels[slab.index], sx + 36, sy + sh / 2 + 1.5);
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillText(labels[slab.index], sx + 36, sy + sh / 2 - 0.5);
    // Main label
    if (slab.feedbackState !== 'none') {
      ctx.fillStyle = '#FFFFFF';
    } else {
      ctx.fillStyle = COLORS.textPrimary;
    }
    ctx.fillText(labels[slab.index], sx + 36, sy + sh / 2);

    // Separator line
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(sx + 60, sy + 12);
    ctx.lineTo(sx + 60, sy + sh - 12);
    ctx.stroke();

    // Answer text (engraved) - wrapped
    const textFont = "500 16px 'Nunito', sans-serif";
    const maxTextWidth = sw - 90;
    const lines = wrapText(slab.choice.text, maxTextWidth, textFont);
    const lineHeight = 20;
    const textStartY = sy + sh / 2 - ((lines.length - 1) * lineHeight) / 2;

    ctx.font = textFont;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';

    lines.forEach((line, li) => {
      const ly = textStartY + li * lineHeight;
      // Engraved effect
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.fillText(line, sx + 74, ly + 1);
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.fillText(line, sx + 74, ly - 0.5);
      // Main text
      if (slab.feedbackState !== 'none') {
        ctx.fillStyle = '#FFFFFF';
      } else {
        ctx.fillStyle = COLORS.textPrimary;
      }
      ctx.fillText(line, sx + 74, ly);
    });

    // Hover glow effect
    if (slab.index === hoveredSlab && selectedSlab === -1) {
      ctx.strokeStyle = COLORS.cyan;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.roundRect(sx - 1, sy - 1, sw + 2, sh + 2, 5);
      ctx.stroke();
    }

    ctx.restore();
  }

  function drawGame() {
    // Clear with warm background
    ctx.fillStyle = COLORS.bgPrimary;
    ctx.fillRect(0, 0, W, H);

    // Subtle grid pattern (brutalist)
    ctx.strokeStyle = 'rgba(0,0,0,0.03)';
    ctx.lineWidth = 1;
    for (let gx = 0; gx < W; gx += 40) {
      ctx.beginPath();
      ctx.moveTo(gx, 0);
      ctx.lineTo(gx, H);
      ctx.stroke();
    }
    for (let gy = 0; gy < H; gy += 40) {
      ctx.beginPath();
      ctx.moveTo(0, gy);
      ctx.lineTo(W, gy);
      ctx.stroke();
    }

    // Draw slabs
    slabs.forEach(slab => drawConcreteSlab(slab));

    // Draw particles
    gameParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });
    ctx.globalAlpha = 1;
  }

  function spawnGameConfetti(x, y) {
    const colors = [COLORS.orange, COLORS.amber, COLORS.cyan, COLORS.success];
    for (let i = 0; i < 25; i++) {
      gameParticles.push({
        x, y,
        vx: (Math.random() - 0.5) * 400,
        vy: -Math.random() * 300 - 50,
        color: colors[Math.floor(Math.random() * colors.length)],
        size: Math.random() * 8 + 4,
        rotation: Math.random() * Math.PI * 2,
        rotationSpeed: (Math.random() - 0.5) * 10,
        alpha: 1,
      });
    }
  }

  function selectSlab(index) {
    if (selectedSlab !== -1) return;
    selectedSlab = index;
    const slab = slabs[index];
    const isCorrect = slab.choice.is_correct;

    playClickSound();

    // Set feedback state
    slab.feedbackState = isCorrect ? 'correct' : 'wrong';

    if (isCorrect) {
      slab.pulseScale = 1.06;
      spawnGameConfetti(slab.x + slab.w / 2, slab.y + slab.h / 2);
      setTimeout(() => playCorrectSound(), 100);
    } else {
      // Shake animation
      slab.shakeX = 12;
      setTimeout(() => playWrongSound(), 50);
    }

    // End game after brief delay for feedback
    setTimeout(() => {
      engine.end(isCorrect, slab.choice.explanation);
    }, isCorrect ? 600 : 500);
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;
    if (selectedSlab !== -1) return;

    // Number keys 1-4
    const keyMap = { 'Digit1': 0, 'Digit2': 1, 'Digit3': 2, 'Digit4': 3 };
    if (keyMap[e.code] !== undefined) {
      const idx = keyMap[e.code];
      if (slabs[idx] && slabs[idx].riseDone) {
        selectSlab(idx);
      }
    }
  }

  // Mouse handlers for hover and click
  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'playing' || selectedSlab !== -1) return;
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    hoveredSlab = -1;
    slabs.forEach((slab) => {
      const sy = slab.y + slab.riseOffset;
      if (slab.riseDone && x >= slab.x && x <= slab.x + slab.w && y >= sy && y <= sy + slab.h) {
        hoveredSlab = slab.index;
      }
    });
    canvas.style.cursor = hoveredSlab >= 0 ? 'pointer' : 'default';
  });

  canvas.addEventListener('click', (e) => {
    if (gameState !== 'playing' || selectedSlab !== -1) return;
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    slabs.forEach((slab) => {
      const sy = slab.y + slab.riseOffset;
      if (slab.riseDone && x >= slab.x && x <= slab.x + slab.w && y >= sy && y <= sy + slab.h) {
        selectSlab(slab.index);
      }
    });
  });

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
