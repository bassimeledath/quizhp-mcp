<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alchemist Vial Rotary Stop</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC'
  };

  const VIAL_COLORS = ['#7B3FA0', '#E87A3E', '#4ECDC4', '#6BBF59'];
  const VIAL_GLOW = ['#9B5FC0', '#F5A742', '#6EE8DF', '#8BD979'];
  const VIAL_LIQUID = ['#5A1F80', '#C85A1E', '#2EA09A', '#4B9F39'];

  // === GAME STATE ===
  let dialAngle = 0;
  let dialSpeed = 0;
  let dialStopping = false;
  let dialStopped = false;
  let selectedVial = -1;
  let vials = [];
  let candles = [];
  let bubbles = [];
  let smokeParticles = [];
  let gameParticles = [];
  let greenFlames = [];
  let parchments = [];
  let gameTime = 0;
  let entranceProgress = 0;
  let feedbackTimer = 0;
  let feedbackType = ''; // 'correct' or 'wrong'
  let shakeAmount = 0;

  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // Audio context for sounds
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playSound(type) {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);

      if (type === 'tick') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, ac.currentTime);
        osc.frequency.exponentialRampToValueAtTime(400, ac.currentTime + 0.05);
        gain.gain.setValueAtTime(0.06, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.05);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.05);
      } else if (type === 'stop') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(600, ac.currentTime);
        osc.frequency.exponentialRampToValueAtTime(300, ac.currentTime + 0.2);
        gain.gain.setValueAtTime(0.15, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.2);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.2);
      } else if (type === 'correct') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, ac.currentTime);
        osc.frequency.setValueAtTime(659, ac.currentTime + 0.1);
        osc.frequency.setValueAtTime(784, ac.currentTime + 0.2);
        gain.gain.setValueAtTime(0.15, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.4);
      } else if (type === 'wrong') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, ac.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, ac.currentTime + 0.3);
        gain.gain.setValueAtTime(0.1, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.3);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.3);
      } else if (type === 'bubble') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(300 + Math.random() * 400, ac.currentTime);
        osc.frequency.exponentialRampToValueAtTime(600 + Math.random() * 200, ac.currentTime + 0.08);
        gain.gain.setValueAtTime(0.03, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.08);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.08);
      }
    } catch (e) {}
  }

  // Center of the dial
  const DIAL_CX = 360;
  const DIAL_CY = 220;
  const DIAL_RADIUS = 95;

  // Vial positions (arranged in a circle around the dial)
  const VIAL_POSITIONS = [
    { angle: -Math.PI / 2, label: 'A' },   // Top (12 o'clock)
    { angle: 0, label: 'B' },               // Right (3 o'clock)
    { angle: Math.PI / 2, label: 'C' },     // Bottom (6 o'clock)
    { angle: Math.PI, label: 'D' }           // Left (9 o'clock)
  ];

  function initGame() {
    dialAngle = 0;
    dialSpeed = Math.PI * 2.5; // Starting speed
    dialStopping = false;
    dialStopped = false;
    selectedVial = -1;
    gameTime = 0;
    entranceProgress = 0;
    feedbackTimer = 0;
    feedbackType = '';
    shakeAmount = 0;
    smokeParticles = [];
    gameParticles = [];
    bubbles = [];

    // Create vials
    vials = QUESTION.choices.map((choice, i) => {
      const pos = VIAL_POSITIONS[i];
      const dist = DIAL_RADIUS + 75;
      return {
        x: DIAL_CX + Math.cos(pos.angle) * dist,
        y: DIAL_CY + Math.sin(pos.angle) * dist,
        color: VIAL_COLORS[i],
        glow: VIAL_GLOW[i],
        liquid: VIAL_LIQUID[i],
        choice: choice,
        index: i,
        scale: 0,
        alpha: 0,
        bubbleTimer: Math.random() * 2,
        shakeX: 0
      };
    });

    // Create candles
    candles = [
      { x: 60, y: 520, h: 35, flicker: 0 },
      { x: 670, y: 510, h: 30, flicker: Math.random() * Math.PI * 2 },
      { x: 40, y: 100, h: 30, flicker: Math.random() * Math.PI }
    ];

    // Green flames
    greenFlames = [
      { x: 580, y: 80, size: 20, phase: 0 },
      { x: 150, y: 60, size: 15, phase: Math.PI }
    ];

    // Parchments
    parchments = [
      { x: 30, y: 480, w: 70, h: 45, rot: -0.1 },
      { x: 620, y: 490, w: 65, h: 42, rot: 0.15 }
    ];

    // Entrance animation
    if (!prefersReducedMotion) {
      vials.forEach((v, i) => {
        setTimeout(() => {
          const start = performance.now();
          const dur = 350;
          const anim = (now) => {
            const t = Math.min((now - start) / dur, 1);
            const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
            v.scale = t * spring;
            v.alpha = t;
            if (t < 1) requestAnimationFrame(anim);
            else { v.scale = 1; v.alpha = 1; }
          };
          requestAnimationFrame(anim);
        }, i * 80);
      });
    } else {
      vials.forEach(v => { v.scale = 1; v.alpha = 1; });
    }
  }

  // Determine which vial the dial points at
  function getPointedVial(angle) {
    // Normalize angle to [0, 2PI)
    let a = ((angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
    // Each vial covers a 90-degree arc
    // Top = -PI/2 => normalized = 3PI/2 (270 deg)
    // Right = 0 => normalized = 0 (0 deg)
    // Bottom = PI/2 => normalized = PI/2 (90 deg)
    // Left = PI => normalized = PI (180 deg)
    // Sectors: Right = [315..45), Bottom = [45..135), Left = [135..225), Top = [225..315)
    const deg = (a * 180 / Math.PI);
    if (deg >= 315 || deg < 45) return 1;   // Right (B)
    if (deg >= 45 && deg < 135) return 2;   // Bottom (C)
    if (deg >= 135 && deg < 225) return 3;  // Left (D)
    return 0; // Top (A)
  }

  let lastTickVial = -1;

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;
    entranceProgress = Math.min(1, gameTime / 0.5);

    // Update dial rotation
    if (!dialStopped) {
      if (dialStopping) {
        dialSpeed *= Math.pow(0.3, dt); // Decelerate
        if (dialSpeed < 0.05) {
          dialStopped = true;
          dialSpeed = 0;
          // Determine selected vial
          selectedVial = getPointedVial(dialAngle);
          const choice = vials[selectedVial].choice;
          playSound('stop');

          // Brief feedback delay
          feedbackType = choice.is_correct ? 'correct' : 'wrong';
          feedbackTimer = 0.6;
        }
      }
      dialAngle += dialSpeed * dt;

      // Tick sound when crossing vial boundaries
      const currentVial = getPointedVial(dialAngle);
      if (currentVial !== lastTickVial && !dialStopping) {
        playSound('tick');
        lastTickVial = currentVial;
      }
    }

    // Feedback timer (after dial stops)
    if (feedbackTimer > 0) {
      feedbackTimer -= dt;
      if (feedbackType === 'wrong') {
        shakeAmount = Math.sin(feedbackTimer * 30) * 6 * (feedbackTimer / 0.6);
      }
      if (feedbackType === 'correct') {
        // Spawn celebration particles
        if (Math.random() < dt * 30) {
          const v = vials[selectedVial];
          gameParticles.push({
            x: v.x, y: v.y,
            vx: (Math.random() - 0.5) * 200,
            vy: -Math.random() * 150 - 50,
            color: ['#E87A3E', '#F5A742', '#4ECDC4', '#6BBF59'][Math.floor(Math.random() * 4)],
            size: 3 + Math.random() * 4,
            life: 1,
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 8
          });
        }
      }
      if (feedbackTimer <= 0) {
        const choice = vials[selectedVial].choice;
        if (feedbackType === 'correct') {
          playSound('correct');
        } else {
          playSound('wrong');
          // Spawn smoke for wrong answer
          for (let i = 0; i < 20; i++) {
            const v = vials[selectedVial];
            smokeParticles.push({
              x: v.x + (Math.random() - 0.5) * 30,
              y: v.y - 10,
              vx: (Math.random() - 0.5) * 60,
              vy: -Math.random() * 40 - 20,
              size: 10 + Math.random() * 20,
              alpha: 0.7,
              life: 1
            });
          }
        }
        engine.end(choice.is_correct, choice.explanation);
      }
    }

    // Bubbles in vials
    vials.forEach((v, i) => {
      v.bubbleTimer -= dt;
      if (v.bubbleTimer <= 0) {
        v.bubbleTimer = 0.3 + Math.random() * 1.5;
        bubbles.push({
          x: v.x + (Math.random() - 0.5) * 16,
          y: v.y + 15,
          vx: (Math.random() - 0.5) * 10,
          vy: -20 - Math.random() * 20,
          size: 2 + Math.random() * 3,
          color: v.glow,
          alpha: 0.7,
          life: 1
        });
      }
    });

    // Update bubbles
    bubbles = bubbles.filter(b => {
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      b.life -= dt * 0.8;
      b.alpha = b.life * 0.7;
      return b.life > 0;
    });

    // Update smoke
    smokeParticles = smokeParticles.filter(s => {
      s.x += s.vx * dt;
      s.y += s.vy * dt;
      s.size += dt * 15;
      s.life -= dt * 0.5;
      s.alpha = s.life * 0.6;
      return s.life > 0;
    });

    // Update celebration particles
    gameParticles = gameParticles.filter(p => {
      p.vy += 300 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.life -= dt;
      return p.life > 0;
    });

    // Candle flicker
    candles.forEach(c => {
      c.flicker += dt * (3 + Math.random() * 2);
    });

    // Green flame phase
    greenFlames.forEach(f => {
      f.phase += dt * 4;
    });
  }

  function wrapText(ctx, text, maxWidth) {
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    for (const word of words) {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    }
    if (currentLine) lines.push(currentLine);
    return lines;
  }

  function drawGame() {
    // Dark alchemist lab background
    ctx.fillStyle = '#1C1A1F';
    ctx.fillRect(0, 0, W, H);

    // Wooden table surface at the bottom
    const tableGrad = ctx.createLinearGradient(0, 460, 0, H);
    tableGrad.addColorStop(0, '#3D2B1F');
    tableGrad.addColorStop(0.3, '#4A3628');
    tableGrad.addColorStop(1, '#2E1F14');
    ctx.fillStyle = tableGrad;
    ctx.fillRect(0, 470, W, H - 470);

    // Table edge highlight
    ctx.strokeStyle = '#5A4030';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, 470);
    ctx.lineTo(W, 470);
    ctx.stroke();

    // Stone wall texture (subtle)
    ctx.fillStyle = 'rgba(60, 55, 65, 0.3)';
    for (let i = 0; i < 8; i++) {
      for (let j = 0; j < 5; j++) {
        const bx = i * 95 + (j % 2) * 45;
        const by = j * 85;
        ctx.fillRect(bx, by, 88, 78);
      }
    }

    // Draw parchments on table
    parchments.forEach(p => {
      ctx.save();
      ctx.translate(p.x + p.w / 2, p.y + p.h / 2);
      ctx.rotate(p.rot);
      ctx.fillStyle = '#D4B896';
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.fillStyle = '#C4A886';
      ctx.fillRect(-p.w / 2 + 3, -p.h / 2 + 3, p.w - 6, p.h - 6);
      // "text" lines
      ctx.fillStyle = '#8B7355';
      for (let l = 0; l < 3; l++) {
        ctx.fillRect(-p.w / 2 + 8, -p.h / 2 + 10 + l * 12, p.w * 0.6 + Math.random() * 10, 2);
      }
      ctx.restore();
    });

    // Draw candles
    candles.forEach(c => {
      // Candle body
      ctx.fillStyle = '#E8D5B5';
      ctx.fillRect(c.x - 6, c.y - c.h, 12, c.h);
      // Wick
      ctx.fillStyle = '#2B2B28';
      ctx.fillRect(c.x - 1, c.y - c.h - 6, 2, 6);
      // Flame
      const flickerSize = Math.sin(c.flicker) * 3;
      const flameH = 12 + flickerSize;
      ctx.fillStyle = '#FFB040';
      ctx.beginPath();
      ctx.ellipse(c.x, c.y - c.h - 8 - flameH / 2, 5, flameH / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#FFDD80';
      ctx.beginPath();
      ctx.ellipse(c.x, c.y - c.h - 8 - flameH / 3, 3, flameH / 3, 0, 0, Math.PI * 2);
      ctx.fill();
      // Glow
      const glowGrad = ctx.createRadialGradient(c.x, c.y - c.h - 10, 0, c.x, c.y - c.h - 10, 40);
      glowGrad.addColorStop(0, 'rgba(255, 176, 64, 0.15)');
      glowGrad.addColorStop(1, 'rgba(255, 176, 64, 0)');
      ctx.fillStyle = glowGrad;
      ctx.fillRect(c.x - 40, c.y - c.h - 50, 80, 80);
    });

    // Draw green flames
    greenFlames.forEach(f => {
      const sz = f.size + Math.sin(f.phase) * 5;
      ctx.fillStyle = '#40E060';
      ctx.beginPath();
      ctx.ellipse(f.x, f.y, sz * 0.6, sz, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#80FF90';
      ctx.beginPath();
      ctx.ellipse(f.x, f.y, sz * 0.3, sz * 0.6, 0, 0, Math.PI * 2);
      ctx.fill();
      // Green glow
      const gGrad = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, sz * 2.5);
      gGrad.addColorStop(0, 'rgba(64, 224, 96, 0.12)');
      gGrad.addColorStop(1, 'rgba(64, 224, 96, 0)');
      ctx.fillStyle = gGrad;
      ctx.fillRect(f.x - sz * 3, f.y - sz * 3, sz * 6, sz * 6);
    });

    // Draw the brass dial mechanism (center)
    // Outer ring
    const dialGrad = ctx.createRadialGradient(DIAL_CX, DIAL_CY, DIAL_RADIUS - 15, DIAL_CX, DIAL_CY, DIAL_RADIUS + 5);
    dialGrad.addColorStop(0, '#B8860B');
    dialGrad.addColorStop(0.5, '#DAA520');
    dialGrad.addColorStop(1, '#8B6914');
    ctx.fillStyle = dialGrad;
    ctx.beginPath();
    ctx.arc(DIAL_CX, DIAL_CY, DIAL_RADIUS, 0, Math.PI * 2);
    ctx.fill();

    // Inner dark circle
    ctx.fillStyle = '#1C1A1F';
    ctx.beginPath();
    ctx.arc(DIAL_CX, DIAL_CY, DIAL_RADIUS - 12, 0, Math.PI * 2);
    ctx.fill();

    // Sector markings on the dial
    for (let i = 0; i < 4; i++) {
      const a = VIAL_POSITIONS[i].angle;
      ctx.strokeStyle = 'rgba(218, 165, 32, 0.4)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(DIAL_CX + Math.cos(a + Math.PI / 4) * 30, DIAL_CY + Math.sin(a + Math.PI / 4) * 30);
      ctx.lineTo(DIAL_CX + Math.cos(a + Math.PI / 4) * (DIAL_RADIUS - 14), DIAL_CY + Math.sin(a + Math.PI / 4) * (DIAL_RADIUS - 14));
      ctx.stroke();

      // Small dot at each vial direction
      ctx.fillStyle = VIAL_COLORS[i];
      ctx.beginPath();
      ctx.arc(DIAL_CX + Math.cos(a) * (DIAL_RADIUS - 20), DIAL_CY + Math.sin(a) * (DIAL_RADIUS - 20), 5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Center hub
    const hubGrad = ctx.createRadialGradient(DIAL_CX, DIAL_CY, 0, DIAL_CX, DIAL_CY, 15);
    hubGrad.addColorStop(0, '#DAA520');
    hubGrad.addColorStop(1, '#8B6914');
    ctx.fillStyle = hubGrad;
    ctx.beginPath();
    ctx.arc(DIAL_CX, DIAL_CY, 15, 0, Math.PI * 2);
    ctx.fill();

    // The rotating pointer/needle
    ctx.save();
    ctx.translate(DIAL_CX, DIAL_CY);
    ctx.rotate(dialAngle);
    // Needle shape
    ctx.fillStyle = '#DAA520';
    ctx.beginPath();
    ctx.moveTo(0, -6);
    ctx.lineTo(DIAL_RADIUS - 18, -2);
    ctx.lineTo(DIAL_RADIUS - 14, 0);
    ctx.lineTo(DIAL_RADIUS - 18, 2);
    ctx.lineTo(0, 6);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#B8860B';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Needle tip (arrowhead)
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.moveTo(DIAL_RADIUS - 18, -5);
    ctx.lineTo(DIAL_RADIUS - 5, 0);
    ctx.lineTo(DIAL_RADIUS - 18, 5);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // Highlight the currently pointed vial
    if (!dialStopped) {
      const pointedIdx = getPointedVial(dialAngle);
      if (pointedIdx >= 0 && pointedIdx < vials.length) {
        const pv = vials[pointedIdx];
        ctx.save();
        ctx.globalAlpha = 0.2 + Math.sin(gameTime * 6) * 0.1;
        const hlGrad = ctx.createRadialGradient(pv.x, pv.y, 0, pv.x, pv.y, 50);
        hlGrad.addColorStop(0, pv.glow);
        hlGrad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = hlGrad;
        ctx.fillRect(pv.x - 50, pv.y - 50, 100, 100);
        ctx.restore();
      }
    }

    // Draw vials with answer labels
    vials.forEach((v, i) => {
      ctx.save();
      const sx = feedbackTimer > 0 && selectedVial === i && feedbackType === 'wrong' ? shakeAmount : 0;
      ctx.translate(v.x + sx, v.y);
      ctx.scale(v.scale || 1, v.scale || 1);
      ctx.globalAlpha = v.alpha !== undefined ? v.alpha : 1;

      // Vial glow
      const vGlow = ctx.createRadialGradient(0, 0, 10, 0, 0, 45);
      vGlow.addColorStop(0, v.glow + '40');
      vGlow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = vGlow;
      ctx.fillRect(-45, -45, 90, 90);

      // Glass vial shape (flask/alembic)
      // Neck
      ctx.fillStyle = 'rgba(200, 220, 240, 0.15)';
      ctx.fillRect(-5, -35, 10, 15);
      // Body
      ctx.beginPath();
      ctx.moveTo(-5, -20);
      ctx.quadraticCurveTo(-22, -5, -22, 10);
      ctx.quadraticCurveTo(-22, 28, 0, 30);
      ctx.quadraticCurveTo(22, 28, 22, 10);
      ctx.quadraticCurveTo(22, -5, 5, -20);
      ctx.closePath();
      ctx.fillStyle = 'rgba(200, 220, 240, 0.12)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(200, 220, 240, 0.3)';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Liquid inside
      ctx.beginPath();
      ctx.moveTo(-18, 5);
      ctx.quadraticCurveTo(-20, 26, 0, 28);
      ctx.quadraticCurveTo(20, 26, 18, 5);
      ctx.closePath();
      ctx.fillStyle = v.color + 'CC';
      ctx.fill();

      // Liquid surface shimmer
      ctx.strokeStyle = v.glow + '60';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-17, 5 + Math.sin(gameTime * 3 + i) * 2);
      ctx.quadraticCurveTo(0, 3 + Math.sin(gameTime * 3 + i + 1) * 2, 17, 5 + Math.sin(gameTime * 3 + i + 2) * 2);
      ctx.stroke();

      // Cork/stopper
      ctx.fillStyle = '#8B6C4A';
      ctx.fillRect(-6, -38, 12, 5);

      // Selection indicator (for stopped dial)
      if (selectedVial === i && dialStopped) {
        ctx.strokeStyle = feedbackType === 'correct' ? COLORS.success : COLORS.error;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(0, 0, 40, 0, Math.PI * 2);
        ctx.stroke();
      }

      ctx.restore();
    });

    // Draw bubbles
    bubbles.forEach(b => {
      ctx.save();
      ctx.globalAlpha = b.alpha;
      ctx.fillStyle = b.color;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });

    // Draw smoke
    smokeParticles.forEach(s => {
      ctx.save();
      ctx.globalAlpha = s.alpha;
      ctx.fillStyle = '#8A8A88';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });

    // Draw celebration particles
    gameParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Draw answer text labels for each vial
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    vials.forEach((v, i) => {
      ctx.save();
      ctx.globalAlpha = v.alpha !== undefined ? v.alpha : 1;

      // Position the label box - all labels below their vials
      let labelX = v.x;
      let labelY = v.y + 42;
      let maxW = 220;

      // Clamp labels to stay within canvas bounds
      // Left edge clamp
      if (labelX - maxW / 2 < 5) {
        labelX = 5 + maxW / 2;
      }
      // Right edge clamp
      if (labelX + maxW / 2 > W - 5) {
        labelX = W - 5 - maxW / 2;
      }

      // Label background
      ctx.font = "400 16px 'Nunito', sans-serif";
      const lines = wrapText(ctx, v.choice.text, maxW - 16);
      const lineH = 19;
      const boxH = lines.length * lineH + 12;
      const boxW = maxW;

      ctx.fillStyle = 'rgba(28, 26, 31, 0.85)';
      ctx.beginPath();
      ctx.roundRect(labelX - boxW / 2, labelY, boxW, boxH, 8);
      ctx.fill();
      ctx.strokeStyle = v.color + '80';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(labelX - boxW / 2, labelY, boxW, boxH, 8);
      ctx.stroke();

      // Letter badge
      const letters = ['A', 'B', 'C', 'D'];
      ctx.fillStyle = v.color;
      ctx.font = "700 14px 'Nunito Sans', sans-serif";
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(letters[i] + '.', labelX - boxW / 2 + 8, labelY + 6);

      // Answer text
      ctx.fillStyle = '#F5F5F0';
      ctx.font = "400 16px 'Nunito', sans-serif";
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      lines.forEach((line, li) => {
        ctx.fillText(line, labelX - boxW / 2 + 28, labelY + 6 + li * lineH);
      });

      ctx.restore();
    });

    // Ambient glow at center of dial
    const ambGrad = ctx.createRadialGradient(DIAL_CX, DIAL_CY, 0, DIAL_CX, DIAL_CY, DIAL_RADIUS + 20);
    ambGrad.addColorStop(0, 'rgba(218, 165, 32, 0.05)');
    ambGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.fillStyle = ambGrad;
    ctx.beginPath();
    ctx.arc(DIAL_CX, DIAL_CY, DIAL_RADIUS + 20, 0, Math.PI * 2);
    ctx.fill();
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;

    if ((e.code === 'Space' || e.code === 'Enter') && !dialStopping && !dialStopped) {
      e.preventDefault();
      dialStopping = true;
      playSound('stop');
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
