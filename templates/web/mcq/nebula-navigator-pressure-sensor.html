<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Template</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgDeep: '#0D0B2E',
    nebulaDark: '#1A0F3C',
    nebulaIndigo: '#2E1065',
    nebulaMagenta: '#6B1D5E',
    nebulaGlow: '#9333EA',
    portalCyan: '#4ECDC4',
    portalOrange: '#E87A3E',
    portalAmber: '#F5A742',
    probeBody: '#C2C2B8',
    probeGlow: '#4ECDC4',
    thrusterFlame: '#E87A3E',
    electricWhite: '#F5F5F0',
    electricBlue: '#7DD3FC',
    textPrimary: '#F5F5F0',
    textSecondary: '#C2C2B8',
    success: '#6BBF59',
    error: '#E85D4A',
    orange: '#E87A3E',
    amber: '#F5A742',
    cyan: '#4ECDC4',
  };

  // === SOUND ===
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new AudioCtx();
    return audioCtx;
  }

  function playSound(type) {
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      const now = ctx.currentTime;

      if (type === 'thruster') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(80, now);
        osc.frequency.exponentialRampToValueAtTime(40, now + 0.15);
        gain.gain.setValueAtTime(0.06, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        osc.start(now);
        osc.stop(now + 0.15);
      } else if (type === 'correct') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, now);
        osc.frequency.setValueAtTime(659, now + 0.1);
        osc.frequency.setValueAtTime(784, now + 0.2);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        osc.start(now);
        osc.stop(now + 0.4);
      } else if (type === 'wrong') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.exponentialRampToValueAtTime(80, now + 0.3);
        gain.gain.setValueAtTime(0.12, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        osc.start(now);
        osc.stop(now + 0.3);
      } else if (type === 'enter') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(440, now);
        osc.frequency.exponentialRampToValueAtTime(660, now + 0.12);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
        osc.start(now);
        osc.stop(now + 0.12);
      }
    } catch(e) {}
  }

  // === GAME STATE ===
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  let probe = {};
  let portals = [];
  let stars = [];
  let gasClouds = [];
  let lightningBolts = [];
  let thrusterParticles = [];
  let gameParticles = [];
  let ventParticles = [];
  let keys = {};
  let gameTime = 0;
  let selectedPortal = null;
  let selectionTimer = 0;
  let portalEntrance = { active: false, timer: 0, portal: null };

  // Portal layout: 4 portals spread across the canvas
  const PORTAL_POSITIONS = [
    { x: 130, y: 110 },
    { x: 590, y: 110 },
    { x: 130, y: 400 },
    { x: 590, y: 400 },
  ];

  const PROBE_SPEED = 200;
  const PORTAL_RADIUS = 65;

  function initGame() {
    gameTime = 0;
    selectedPortal = null;
    selectionTimer = 0;
    portalEntrance = { active: false, timer: 0, portal: null };
    keys = {};
    thrusterParticles = [];
    gameParticles = [];
    ventParticles = [];
    lightningBolts = [];

    probe = {
      x: W / 2,
      y: H / 2,
      vx: 0,
      vy: 0,
      angle: -Math.PI / 2,
      thrusting: false,
      scale: 0,
      alpha: 0,
      shakeX: 0,
    };

    portals = QUESTION.choices.map((choice, i) => ({
      x: PORTAL_POSITIONS[i].x,
      y: PORTAL_POSITIONS[i].y,
      choice: choice,
      index: i,
      radius: PORTAL_RADIUS,
      pulsePhase: Math.random() * Math.PI * 2,
      scale: 0,
      alpha: 0,
      glowIntensity: 0.5,
      highlighted: false,
    }));

    // Stars background
    stars = [];
    for (let i = 0; i < 120; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        size: Math.random() * 2 + 0.5,
        twinklePhase: Math.random() * Math.PI * 2,
        twinkleSpeed: 1 + Math.random() * 3,
      });
    }

    // Gas clouds
    gasClouds = [];
    for (let i = 0; i < 8; i++) {
      gasClouds.push({
        x: Math.random() * W,
        y: Math.random() * H,
        radius: 60 + Math.random() * 100,
        color: Math.random() > 0.5 ? COLORS.nebulaIndigo : COLORS.nebulaMagenta,
        opacity: 0.15 + Math.random() * 0.15,
        driftX: (Math.random() - 0.5) * 8,
        driftY: (Math.random() - 0.5) * 8,
        phase: Math.random() * Math.PI * 2,
      });
    }

    // Entrance animations
    if (!prefersReducedMotion) {
      portals.forEach((p, i) => {
        const delay = i * 80;
        setTimeout(() => animateBounceIn(p, 350), delay);
      });
      setTimeout(() => animateBounceIn(probe, 400), 350);
    } else {
      portals.forEach(p => { p.scale = 1; p.alpha = 1; });
      probe.scale = 1;
      probe.alpha = 1;
    }
  }

  function animateBounceIn(obj, duration) {
    const start = performance.now();
    const anim = (now) => {
      const t = Math.min((now - start) / duration, 1);
      const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
      obj.scale = t * spring;
      obj.alpha = t;
      if (t < 1) requestAnimationFrame(anim);
      else { obj.scale = 1; obj.alpha = 1; }
    };
    requestAnimationFrame(anim);
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;
    gameTime += dt;

    // Portal entrance animation
    if (portalEntrance.active) {
      portalEntrance.timer += dt;
      const p = portalEntrance.portal;
      // Move probe toward portal center
      const dx = p.x - probe.x;
      const dy = p.y - probe.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 2) {
        probe.x += (dx / dist) * 300 * dt;
        probe.y += (dy / dist) * 300 * dt;
      }
      probe.scale = Math.max(0, 1 - portalEntrance.timer * 2);

      if (portalEntrance.timer > 0.5) {
        const choice = p.choice;
        if (choice.is_correct) {
          playSound('correct');
          // Spawn celebration particles
          for (let i = 0; i < 20; i++) {
            gameParticles.push({
              x: p.x, y: p.y,
              vx: (Math.random() - 0.5) * 300,
              vy: (Math.random() - 0.5) * 300,
              size: 3 + Math.random() * 5,
              color: [COLORS.orange, COLORS.amber, COLORS.cyan, COLORS.success][Math.floor(Math.random() * 4)],
              life: 1,
              decay: 0.8 + Math.random() * 0.5,
              rotation: Math.random() * Math.PI * 2,
              rotSpeed: (Math.random() - 0.5) * 8,
            });
          }
        } else {
          playSound('wrong');
          // Vent white gas from probe
          for (let i = 0; i < 30; i++) {
            ventParticles.push({
              x: p.x, y: p.y,
              vx: (Math.random() - 0.5) * 200,
              vy: (Math.random() - 0.5) * 200,
              size: 4 + Math.random() * 8,
              life: 1,
              decay: 0.6 + Math.random() * 0.4,
            });
          }
          // Shake the portal
          p.shakeTimer = 0.4;
        }
        engine.end(choice.is_correct, choice.explanation);
        portalEntrance.active = false;
      }
      return;
    }

    // Probe movement
    let ax = 0, ay = 0;
    if (keys['ArrowLeft'] || keys['KeyA']) ax -= 1;
    if (keys['ArrowRight'] || keys['KeyD']) ax += 1;
    if (keys['ArrowUp'] || keys['KeyW']) ay -= 1;
    if (keys['ArrowDown'] || keys['KeyS']) ay += 1;

    if (ax !== 0 || ay !== 0) {
      const len = Math.sqrt(ax * ax + ay * ay);
      ax /= len;
      ay /= len;
      probe.angle = Math.atan2(ay, ax);
    }

    probe.x += ax * PROBE_SPEED * dt;
    probe.y += ay * PROBE_SPEED * dt;

    // Clamp probe to canvas
    probe.x = Math.max(20, Math.min(W - 20, probe.x));
    probe.y = Math.max(20, Math.min(H - 20, probe.y));

    probe.thrusting = (ax !== 0 || ay !== 0);

    // Thruster particles
    if (probe.thrusting && !prefersReducedMotion) {
      const backAngle = probe.angle + Math.PI;
      for (let i = 0; i < 2; i++) {
        thrusterParticles.push({
          x: probe.x + Math.cos(backAngle) * 12,
          y: probe.y + Math.sin(backAngle) * 12,
          vx: Math.cos(backAngle + (Math.random() - 0.5) * 0.8) * (80 + Math.random() * 60),
          vy: Math.sin(backAngle + (Math.random() - 0.5) * 0.8) * (80 + Math.random() * 60),
          size: 2 + Math.random() * 3,
          life: 1,
          decay: 2 + Math.random(),
        });
      }
    }

    // Update thruster particles
    thrusterParticles.forEach(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= p.decay * dt;
    });
    thrusterParticles = thrusterParticles.filter(p => p.life > 0);

    // Update game particles
    gameParticles.forEach(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 200 * dt;
      p.life -= p.decay * dt;
      p.rotation += p.rotSpeed * dt;
    });
    gameParticles = gameParticles.filter(p => p.life > 0);

    // Update vent particles
    ventParticles.forEach(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= p.decay * dt;
      p.size += 6 * dt;
    });
    ventParticles = ventParticles.filter(p => p.life > 0);

    // Gas cloud drift
    gasClouds.forEach(c => {
      c.x += c.driftX * dt;
      c.y += c.driftY * dt;
      c.phase += dt * 0.5;
      if (c.x < -c.radius) c.x = W + c.radius;
      if (c.x > W + c.radius) c.x = -c.radius;
      if (c.y < -c.radius) c.y = H + c.radius;
      if (c.y > H + c.radius) c.y = -c.radius;
    });

    // Lightning bolts - spawn randomly
    if (Math.random() < dt * 1.5 && !prefersReducedMotion) {
      spawnLightning();
    }
    lightningBolts.forEach(l => { l.life -= dt * 3; });
    lightningBolts = lightningBolts.filter(l => l.life > 0);

    // Check portal highlighting
    portals.forEach(p => {
      const dx = probe.x - p.x;
      const dy = probe.y - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const wasHighlighted = p.highlighted;
      p.highlighted = dist < p.radius + 25;
      if (p.highlighted && !wasHighlighted) {
        p.glowIntensity = 1;
      }
    });

    // Portal shake timers
    portals.forEach(p => {
      if (p.shakeTimer && p.shakeTimer > 0) {
        p.shakeTimer -= dt;
      }
    });

    // Spacebar / Enter to engage thruster toward highlighted portal
    if (selectionTimer > 0) {
      selectionTimer -= dt;
    }
  }

  function spawnLightning() {
    const x1 = Math.random() * W;
    const y1 = Math.random() * H * 0.3;
    const segments = [];
    let cx = x1, cy = y1;
    const numSegments = 4 + Math.floor(Math.random() * 4);
    for (let i = 0; i < numSegments; i++) {
      const nx = cx + (Math.random() - 0.5) * 60;
      const ny = cy + 20 + Math.random() * 30;
      segments.push({ x1: cx, y1: cy, x2: nx, y2: ny });
      cx = nx;
      cy = ny;
    }
    lightningBolts.push({ segments, life: 1 });
  }

  function drawGame() {
    // Deep space background
    ctx.fillStyle = COLORS.bgDeep;
    ctx.fillRect(0, 0, W, H);

    // Nebula gradient overlay
    const nebulaGrad = ctx.createRadialGradient(W * 0.3, H * 0.4, 50, W * 0.3, H * 0.4, 400);
    nebulaGrad.addColorStop(0, 'rgba(46, 16, 101, 0.4)');
    nebulaGrad.addColorStop(0.5, 'rgba(107, 29, 94, 0.2)');
    nebulaGrad.addColorStop(1, 'rgba(13, 11, 46, 0)');
    ctx.fillStyle = nebulaGrad;
    ctx.fillRect(0, 0, W, H);

    const nebulaGrad2 = ctx.createRadialGradient(W * 0.7, H * 0.6, 30, W * 0.7, H * 0.6, 350);
    nebulaGrad2.addColorStop(0, 'rgba(107, 29, 94, 0.35)');
    nebulaGrad2.addColorStop(0.5, 'rgba(46, 16, 101, 0.15)');
    nebulaGrad2.addColorStop(1, 'rgba(13, 11, 46, 0)');
    ctx.fillStyle = nebulaGrad2;
    ctx.fillRect(0, 0, W, H);

    // Stars
    stars.forEach(s => {
      const twinkle = 0.4 + 0.6 * Math.sin(gameTime * s.twinkleSpeed + s.twinklePhase) * 0.5 + 0.5;
      ctx.globalAlpha = twinkle;
      ctx.fillStyle = COLORS.electricWhite;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Gas clouds
    gasClouds.forEach(c => {
      const breathe = 1 + Math.sin(c.phase) * 0.1;
      const grad = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, c.radius * breathe);
      grad.addColorStop(0, c.color + '40');
      grad.addColorStop(0.6, c.color + '18');
      grad.addColorStop(1, c.color + '00');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(c.x, c.y, c.radius * breathe, 0, Math.PI * 2);
      ctx.fill();
    });

    // Lightning bolts
    lightningBolts.forEach(l => {
      ctx.globalAlpha = l.life;
      ctx.strokeStyle = COLORS.electricBlue;
      ctx.lineWidth = 2;
      ctx.shadowColor = COLORS.electricBlue;
      ctx.shadowBlur = 10;
      l.segments.forEach(seg => {
        ctx.beginPath();
        ctx.moveTo(seg.x1, seg.y1);
        ctx.lineTo(seg.x2, seg.y2);
        ctx.stroke();
      });
      ctx.shadowBlur = 0;
    });
    ctx.globalAlpha = 1;

    // Portals
    portals.forEach(p => {
      if (p.alpha <= 0) return;
      ctx.save();

      const shakeOff = (p.shakeTimer && p.shakeTimer > 0) ?
        Math.sin(p.shakeTimer * Math.PI * 20) * 6 * p.shakeTimer : 0;

      ctx.translate(p.x + shakeOff, p.y);
      ctx.scale(p.scale, p.scale);
      ctx.globalAlpha = p.alpha;

      const pulse = 1 + Math.sin(gameTime * 2 + p.pulsePhase) * 0.08;
      const r = p.radius * pulse;

      // Outer glow
      const glowSize = p.highlighted ? 1.5 : 1.2;
      const glowGrad = ctx.createRadialGradient(0, 0, r * 0.5, 0, 0, r * glowSize);
      const portalColors = [COLORS.portalCyan, COLORS.portalOrange, COLORS.portalAmber, COLORS.nebulaGlow];
      const baseColor = portalColors[p.index % 4];
      glowGrad.addColorStop(0, baseColor + '60');
      glowGrad.addColorStop(0.7, baseColor + '20');
      glowGrad.addColorStop(1, baseColor + '00');
      ctx.fillStyle = glowGrad;
      ctx.beginPath();
      ctx.arc(0, 0, r * glowSize, 0, Math.PI * 2);
      ctx.fill();

      // Portal ring
      ctx.strokeStyle = p.highlighted ? COLORS.electricWhite : baseColor;
      ctx.lineWidth = p.highlighted ? 3 : 2;
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.stroke();

      // Inner swirl
      ctx.strokeStyle = baseColor + '80';
      ctx.lineWidth = 1;
      for (let i = 0; i < 3; i++) {
        const swirlAngle = gameTime * 1.5 + (i * Math.PI * 2 / 3);
        const sr = r * 0.6;
        ctx.beginPath();
        ctx.arc(
          Math.cos(swirlAngle) * sr * 0.3,
          Math.sin(swirlAngle) * sr * 0.3,
          sr * 0.4, 0, Math.PI * 2
        );
        ctx.stroke();
      }

      // Holographic answer text
      drawPortalText(p, r);

      ctx.restore();
    });

    // Thruster particles
    thrusterParticles.forEach(p => {
      ctx.globalAlpha = p.life * 0.7;
      const t = 1 - p.life;
      const r = Math.floor(232 + t * 20);
      const g = Math.floor(122 - t * 80);
      const b = Math.floor(62 - t * 30);
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Game particles (celebration)
    gameParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });
    ctx.globalAlpha = 1;

    // Vent particles (white gas on wrong answer)
    ventParticles.forEach(p => {
      ctx.globalAlpha = Math.max(0, p.life * 0.6);
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Draw probe
    if (probe.alpha > 0 && probe.scale > 0) {
      drawProbe();
    }
  }

  function drawPortalText(portal, r) {
    const text = portal.choice.text;
    const maxWidth = r * 1.7;
    const fontSize = 14;

    ctx.font = `500 ${fontSize}px 'Nunito', sans-serif`;
    ctx.fillStyle = COLORS.textPrimary;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';

    // Word wrap text
    const lines = wrapText(text, maxWidth, ctx);
    const lineHeight = fontSize * 1.4;
    const totalHeight = lines.length * lineHeight;
    const startY = -totalHeight / 2;

    // Semi-transparent background for readability
    const bgPad = 6;
    ctx.fillStyle = 'rgba(13, 11, 46, 0.75)';
    ctx.beginPath();
    ctx.roundRect(-maxWidth / 2 - bgPad, startY - bgPad, maxWidth + bgPad * 2, totalHeight + bgPad * 2, 6);
    ctx.fill();

    // Holographic text tint
    const holoShift = Math.sin(gameTime * 3 + portal.index) * 0.3;
    ctx.fillStyle = portal.highlighted ?
      COLORS.electricWhite :
      `rgba(245, 245, 240, ${0.85 + holoShift * 0.15})`;
    ctx.font = `500 ${fontSize}px 'Nunito', sans-serif`;

    lines.forEach((line, i) => {
      ctx.fillText(line, 0, startY + i * lineHeight);
    });
  }

  function wrapText(text, maxWidth, context) {
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';

    for (const word of words) {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      const metrics = context.measureText(testLine);
      if (metrics.width > maxWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    }
    if (currentLine) lines.push(currentLine);
    return lines;
  }

  function drawProbe() {
    ctx.save();
    ctx.translate(probe.x + (probe.shakeX || 0), probe.y);
    ctx.scale(probe.scale, probe.scale);
    ctx.globalAlpha = probe.alpha;
    ctx.rotate(probe.angle + Math.PI / 2);

    // Probe body - pointed shape
    ctx.fillStyle = COLORS.probeBody;
    ctx.beginPath();
    ctx.moveTo(0, -14);
    ctx.lineTo(-8, 8);
    ctx.lineTo(0, 4);
    ctx.lineTo(8, 8);
    ctx.closePath();
    ctx.fill();

    // Probe accent line
    ctx.strokeStyle = COLORS.probeGlow;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, -12);
    ctx.lineTo(0, 2);
    ctx.stroke();

    // Glow aura
    const glowGrad = ctx.createRadialGradient(0, 0, 5, 0, 0, 22);
    glowGrad.addColorStop(0, COLORS.probeGlow + '30');
    glowGrad.addColorStop(1, COLORS.probeGlow + '00');
    ctx.fillStyle = glowGrad;
    ctx.beginPath();
    ctx.arc(0, 0, 22, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;
    if (portalEntrance.active) return;

    if (e.type === 'keydown') {
      keys[e.code] = true;

      // Spacebar or Enter to engage thruster toward nearest portal
      if (e.code === 'Space' || e.code === 'Enter') {
        e.preventDefault();
        if (selectionTimer > 0) return;

        // Find highlighted (nearby) portal
        let nearestPortal = null;
        let nearestDist = Infinity;
        portals.forEach(p => {
          const dx = probe.x - p.x;
          const dy = probe.y - p.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < p.radius + 25 && dist < nearestDist) {
            nearestDist = dist;
            nearestPortal = p;
          }
        });

        if (nearestPortal) {
          playSound('enter');
          selectedPortal = nearestPortal;
          portalEntrance = { active: true, timer: 0, portal: nearestPortal };
          selectionTimer = 0.5;
        }
      }
    } else if (e.type === 'keyup') {
      keys[e.code] = false;
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
    if (e.type === 'keyup') {
      keys[e.code] = false;
    }
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
