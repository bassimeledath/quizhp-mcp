<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Template</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgPrimary: '#0B0B1A',
    bgDeep: '#060614',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    textPrimary: '#F5F5F0',
    textSecondary: '#C2C2B8',
    peach: '#FFB89D',
  };

  const COMET_COLORS = [COLORS.cyan, COLORS.orange, COLORS.amber, COLORS.peach];

  // === SOUND ENGINE ===
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playSound(type) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'collect') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(520, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.2);
    } else if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.3);
    } else if (type === 'thrust') {
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(80, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(120, audioCtx.currentTime + 0.05);
      gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.08);
    }
  }

  // === GAME STATE ===
  let ship = {};
  let comets = [];
  let stars = [];
  let gameParticles = [];
  let thrustParticles = [];
  let keysDown = {};
  let entranceTimer = 0;
  let selectedComet = null;
  let selectionTimer = 0;
  let shakeAmount = 0;

  const SHIP_SPEED = 280;
  const SHIP_FRICTION = 0.92;
  const COMET_SPEED_BASE = 60;
  const COMET_LABEL_W = 460;
  const COMET_LABEL_H = 44;

  function initGame() {
    ship = {
      x: W / 2,
      y: H / 2,
      vx: 0,
      vy: 0,
      angle: -Math.PI / 2,
      scale: 0,
      alpha: 0,
    };

    comets = QUESTION.choices.map((choice, i) => {
      // Place comets in four quadrants for good spread
      const side = i; // 0=top, 1=right, 2=bottom, 3=left
      let x, y, vx, vy;
      const quadrantW = W / 2;
      const quadrantH = H / 2;
      if (side === 0) {
        // Top-left quadrant, coming from top
        x = 80 + Math.random() * (quadrantW - 100);
        y = -50;
        vx = 15 + Math.random() * 20;
        vy = COMET_SPEED_BASE + Math.random() * 20;
      } else if (side === 1) {
        // Top-right, coming from right
        x = W + 50;
        y = 60 + Math.random() * (quadrantH - 80);
        vx = -(COMET_SPEED_BASE + Math.random() * 20);
        vy = 15 + Math.random() * 20;
      } else if (side === 2) {
        // Bottom-right, coming from bottom
        x = quadrantW + 80 + Math.random() * (quadrantW - 100);
        y = H + 50;
        vx = -(15 + Math.random() * 20);
        vy = -(COMET_SPEED_BASE + Math.random() * 20);
      } else {
        // Bottom-left, coming from left
        x = -50;
        y = quadrantH + 60 + Math.random() * (quadrantH - 80);
        vx = COMET_SPEED_BASE + Math.random() * 20;
        vy = -(15 + Math.random() * 20);
      }

      return {
        x, y, vx, vy,
        choice,
        index: i,
        radius: 22,
        tailAngle: Math.atan2(-vy, -vx),
        scale: 0,
        alpha: 0,
        entranceDelay: i * 0.12,
        glowPhase: Math.random() * Math.PI * 2,
        collected: false,
        pulseScale: 1,
        shakeX: 0,
      };
    });

    // Starfield
    stars = [];
    for (let i = 0; i < 120; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        size: Math.random() * 2 + 0.5,
        brightness: Math.random() * 0.6 + 0.4,
        twinkleSpeed: Math.random() * 3 + 1,
        twinklePhase: Math.random() * Math.PI * 2,
      });
    }

    gameParticles = [];
    thrustParticles = [];
    keysDown = {};
    entranceTimer = 0;
    selectedComet = null;
    selectionTimer = 0;
    shakeAmount = 0;
  }

  function wrapText(ctx, text, maxWidth) {
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';

    for (const word of words) {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      const metrics = ctx.measureText(testLine);
      if (metrics.width > maxWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    }
    if (currentLine) lines.push(currentLine);
    return lines;
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    entranceTimer += dt;

    // Ship entrance animation
    if (ship.scale < 1) {
      const t = Math.min(entranceTimer / 0.4, 1);
      const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
      ship.scale = t * spring;
      ship.alpha = t;
    }

    // Handle selection animation
    if (selectedComet !== null) {
      selectionTimer += dt;
      if (selectionTimer > 0.6) {
        const comet = comets[selectedComet];
        const choice = comet.choice;
        if (choice.is_correct) {
          playSound('correct');
        } else {
          playSound('wrong');
        }
        engine.end(choice.is_correct, choice.explanation);
        return;
      }
      // Animate the selected comet
      const comet = comets[selectedComet];
      if (comet.choice.is_correct) {
        comet.pulseScale = 1 + Math.sin(selectionTimer * 12) * 0.15;
        // Spawn celebration particles
        if (Math.random() < 0.5) {
          const colors = [COLORS.orange, COLORS.amber, COLORS.cyan, COLORS.success];
          gameParticles.push({
            x: comet.x + (Math.random() - 0.5) * 40,
            y: comet.y + (Math.random() - 0.5) * 30,
            vx: (Math.random() - 0.5) * 200,
            vy: (Math.random() - 0.5) * 200,
            size: 3 + Math.random() * 4,
            color: colors[Math.floor(Math.random() * colors.length)],
            alpha: 1,
            rotation: Math.random() * Math.PI * 2,
            rotSpeed: (Math.random() - 0.5) * 8,
          });
        }
      } else {
        shakeAmount = Math.sin(selectionTimer * 30) * 6 * (1 - selectionTimer / 0.6);
        comet.shakeX = shakeAmount;
      }

      // Update particles
      gameParticles.forEach(p => {
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 200 * dt;
        p.alpha -= dt * 1.5;
        p.rotation += p.rotSpeed * dt;
      });
      gameParticles = gameParticles.filter(p => p.alpha > 0);
      return;
    }

    // Ship movement
    let ax = 0, ay = 0;
    if (keysDown['ArrowLeft'] || keysDown['KeyA']) ax -= 1;
    if (keysDown['ArrowRight'] || keysDown['KeyD']) ax += 1;
    if (keysDown['ArrowUp'] || keysDown['KeyW']) ay -= 1;
    if (keysDown['ArrowDown'] || keysDown['KeyS']) ay += 1;

    // Normalize diagonal
    if (ax !== 0 && ay !== 0) {
      const mag = Math.sqrt(ax * ax + ay * ay);
      ax /= mag;
      ay /= mag;
    }

    ship.vx += ax * SHIP_SPEED * dt * 8;
    ship.vy += ay * SHIP_SPEED * dt * 8;

    // Friction
    ship.vx *= Math.pow(SHIP_FRICTION, dt * 60);
    ship.vy *= Math.pow(SHIP_FRICTION, dt * 60);

    // Update position
    ship.x += ship.vx * dt;
    ship.y += ship.vy * dt;

    // Clamp to canvas
    ship.x = Math.max(20, Math.min(W - 20, ship.x));
    ship.y = Math.max(20, Math.min(H - 20, ship.y));

    // Update ship angle towards movement
    if (Math.abs(ship.vx) > 5 || Math.abs(ship.vy) > 5) {
      const targetAngle = Math.atan2(ship.vy, ship.vx);
      let diff = targetAngle - ship.angle;
      while (diff > Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      ship.angle += diff * 8 * dt;
    }

    // Thrust particles
    if (ax !== 0 || ay !== 0) {
      thrustParticles.push({
        x: ship.x - Math.cos(ship.angle) * 14,
        y: ship.y - Math.sin(ship.angle) * 14,
        vx: -Math.cos(ship.angle) * (80 + Math.random() * 60) + (Math.random() - 0.5) * 40,
        vy: -Math.sin(ship.angle) * (80 + Math.random() * 60) + (Math.random() - 0.5) * 40,
        size: 2 + Math.random() * 3,
        alpha: 0.8,
        color: Math.random() > 0.5 ? COLORS.orange : COLORS.amber,
      });
    }

    // Update thrust particles
    thrustParticles.forEach(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.alpha -= dt * 3;
      p.size *= 0.98;
    });
    thrustParticles = thrustParticles.filter(p => p.alpha > 0);

    // Update comets
    comets.forEach(comet => {
      if (comet.collected) return;

      // Entrance animation
      const entT = Math.max(0, Math.min(1, (entranceTimer - comet.entranceDelay) / 0.35));
      if (entT < 1) {
        const spring = 1 + Math.sin(entT * Math.PI * 2) * 0.2 * (1 - entT);
        comet.scale = entT * spring;
        comet.alpha = entT;
      } else {
        comet.scale = 1;
        comet.alpha = 1;
      }

      comet.x += comet.vx * dt;
      comet.y += comet.vy * dt;
      comet.glowPhase += dt * 2;

      // Wrap around screen edges with padding
      const pad = 80;
      if (comet.x < -pad) comet.x = W + pad;
      if (comet.x > W + pad) comet.x = -pad;
      if (comet.y < -pad) comet.y = H + pad;
      if (comet.y > H + pad) comet.y = -pad;

      // Collision with ship
      const dx = ship.x - comet.x;
      const dy = ship.y - comet.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < comet.radius + 16 && comet.alpha >= 0.9) {
        comet.collected = true;
        selectedComet = comet.index;
        selectionTimer = 0;
        playSound('collect');
      }
    });

    // Update game particles
    gameParticles.forEach(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 200 * dt;
      p.alpha -= dt * 1.5;
      p.rotation += p.rotSpeed * dt;
    });
    gameParticles = gameParticles.filter(p => p.alpha > 0);
  }

  function drawGame() {
    // Clear with deep space background
    ctx.fillStyle = COLORS.bgDeep;
    ctx.fillRect(0, 0, W, H);

    // Draw subtle nebula gradient
    const nebGrad = ctx.createRadialGradient(W * 0.3, H * 0.4, 0, W * 0.3, H * 0.4, 300);
    nebGrad.addColorStop(0, 'rgba(78, 205, 196, 0.04)');
    nebGrad.addColorStop(1, 'rgba(6, 6, 20, 0)');
    ctx.fillStyle = nebGrad;
    ctx.fillRect(0, 0, W, H);

    const nebGrad2 = ctx.createRadialGradient(W * 0.75, H * 0.6, 0, W * 0.75, H * 0.6, 250);
    nebGrad2.addColorStop(0, 'rgba(232, 122, 62, 0.03)');
    nebGrad2.addColorStop(1, 'rgba(6, 6, 20, 0)');
    ctx.fillStyle = nebGrad2;
    ctx.fillRect(0, 0, W, H);

    // Draw stars
    const now = performance.now() / 1000;
    stars.forEach(s => {
      const twinkle = 0.5 + 0.5 * Math.sin(now * s.twinkleSpeed + s.twinklePhase);
      const alpha = s.brightness * twinkle;
      ctx.fillStyle = `rgba(245, 245, 240, ${alpha})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
      ctx.fill();
    });

    // Draw thrust particles
    thrustParticles.forEach(p => {
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Draw comets
    comets.forEach(comet => {
      if (comet.alpha <= 0) return;

      ctx.save();
      ctx.globalAlpha = comet.alpha;
      ctx.translate(comet.x + comet.shakeX, comet.y);
      ctx.scale(comet.scale * comet.pulseScale, comet.scale * comet.pulseScale);

      // Comet tail
      const tailLen = 60;
      const tailAngle = Math.atan2(-comet.vy, -comet.vx);
      const tailGrad = ctx.createLinearGradient(0, 0, Math.cos(tailAngle) * tailLen, Math.sin(tailAngle) * tailLen);

      const cometColors = COMET_COLORS;
      const cColor = cometColors[comet.index % cometColors.length];
      tailGrad.addColorStop(0, cColor);
      tailGrad.addColorStop(1, 'rgba(6, 6, 20, 0)');

      ctx.strokeStyle = tailGrad;
      ctx.lineWidth = 8;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(Math.cos(tailAngle) * tailLen, Math.sin(tailAngle) * tailLen);
      ctx.stroke();

      // Secondary thin tail
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(Math.cos(tailAngle + 0.2) * tailLen * 0.7, Math.sin(tailAngle + 0.2) * tailLen * 0.7);
      ctx.stroke();

      // Comet glow
      const glowSize = comet.radius + 8 + Math.sin(comet.glowPhase) * 4;
      const glowGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, glowSize);
      glowGrad.addColorStop(0, cColor + '60');
      glowGrad.addColorStop(0.6, cColor + '20');
      glowGrad.addColorStop(1, cColor + '00');
      ctx.fillStyle = glowGrad;
      ctx.beginPath();
      ctx.arc(0, 0, glowSize, 0, Math.PI * 2);
      ctx.fill();

      // Comet core
      const coreGrad = ctx.createRadialGradient(-3, -3, 0, 0, 0, comet.radius);
      coreGrad.addColorStop(0, '#FFFFFF');
      coreGrad.addColorStop(0.4, cColor);
      coreGrad.addColorStop(1, cColor + '80');
      ctx.fillStyle = coreGrad;
      ctx.beginPath();
      ctx.arc(0, 0, comet.radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();

      // Draw answer text label below comet
      if (comet.alpha >= 0.5) {
        ctx.save();
        ctx.globalAlpha = comet.alpha;

        // Label background
        ctx.font = "400 14px 'Nunito', sans-serif";
        const lines = wrapText(ctx, comet.choice.text, COMET_LABEL_W);
        const lineHeight = 18;
        const labelH = lines.length * lineHeight + 12;
        const labelW = COMET_LABEL_W + 20;

        // Clamp label position to stay within canvas
        let labelX = comet.x + comet.shakeX;
        labelX = Math.max(labelW / 2 + 4, Math.min(W - labelW / 2 - 4, labelX));
        let labelY = comet.y + comet.radius + 14;
        // If label would go off bottom, show above comet
        if (labelY + labelH > H - 4) {
          labelY = comet.y - comet.radius - labelH - 8;
        }

        ctx.fillStyle = 'rgba(11, 11, 26, 0.85)';
        ctx.beginPath();
        ctx.roundRect(labelX - labelW / 2, labelY - 6, labelW, labelH, 8);
        ctx.fill();

        // Label border
        ctx.strokeStyle = COMET_COLORS[comet.index % COMET_COLORS.length] + '60';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect(labelX - labelW / 2, labelY - 6, labelW, labelH, 8);
        ctx.stroke();

        // Text
        ctx.fillStyle = COLORS.textPrimary;
        ctx.font = "400 14px 'Nunito', sans-serif";
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        lines.forEach((line, li) => {
          ctx.fillText(line, labelX, labelY + li * lineHeight + 2);
        });

        ctx.restore();
      }
    });

    // Draw game particles
    gameParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Draw ship
    if (ship.alpha > 0) {
      ctx.save();
      ctx.globalAlpha = ship.alpha;
      ctx.translate(ship.x, ship.y);
      ctx.scale(ship.scale, ship.scale);
      ctx.rotate(ship.angle);

      // Ship body
      ctx.fillStyle = COLORS.textPrimary;
      ctx.beginPath();
      ctx.moveTo(16, 0);
      ctx.lineTo(-10, -10);
      ctx.lineTo(-6, 0);
      ctx.lineTo(-10, 10);
      ctx.closePath();
      ctx.fill();

      // Ship accent
      ctx.fillStyle = COLORS.cyan;
      ctx.beginPath();
      ctx.moveTo(16, 0);
      ctx.lineTo(6, -4);
      ctx.lineTo(6, 4);
      ctx.closePath();
      ctx.fill();

      // Cockpit glow
      ctx.fillStyle = COLORS.orange;
      ctx.beginPath();
      ctx.arc(4, 0, 3, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;

    if (e.type === 'keydown') {
      if (!keysDown[e.code] && (e.code.startsWith('Arrow') || ['KeyW', 'KeyA', 'KeyS', 'KeyD'].includes(e.code))) {
        playSound('thrust');
      }
      keysDown[e.code] = true;
    }
  }

  // Track key releases for held-key movement
  document.addEventListener('keyup', (e) => {
    keysDown[e.code] = false;
  });

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
