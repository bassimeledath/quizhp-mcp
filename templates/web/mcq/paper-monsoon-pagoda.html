<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paper Monsoon Pagoda</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC'
  };

  // === GAME STATE ===
  let tile = { x: W / 2, y: 60, targetSlot: 0, dropping: false, dropSpeed: 0 };
  let slots = [];
  let rainDrops = [];
  let streamers = [];
  let pagodaLayers = [];
  let cranes = [];
  let wrongParticles = [];
  let entranceTime = 0;
  let selectedChoice = null;
  let wrongShake = 0;
  let correctPulse = 0;

  // Audio context for sounds
  let audioCtx = null;

  function playSound(type) {
    if (!audioCtx) {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      } catch (e) { return; }
    }

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'correct') {
      osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialDecayTo && gain.gain.exponentialDecayTo(0.01, audioCtx.currentTime + 0.4);
      gain.gain.setValueAtTime(0.01, audioCtx.currentTime + 0.4);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'wrong') {
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.setValueAtTime(150, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.01, audioCtx.currentTime + 0.2);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.2);
    } else if (type === 'click') {
      osc.frequency.setValueAtTime(800, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.01, audioCtx.currentTime + 0.05);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.05);
    }
  }

  function initGame() {
    entranceTime = 0;
    selectedChoice = null;
    wrongShake = 0;
    correctPulse = 0;

    // Initialize tile
    tile = { x: W / 2, y: 70, targetSlot: 0, dropping: false, dropSpeed: 0 };

    // Create 4 slots at bottom for answers (vertical stack layout for text)
    const slotW = 500;
    const slotH = 54;
    const startX = (W - slotW) / 2;
    const startY = 280;
    const gap = 12;

    slots = QUESTION.choices.map((choice, i) => ({
      x: startX,
      y: startY + i * (slotH + gap),
      w: slotW,
      h: slotH,
      choice: choice,
      index: i,
      scale: 0,
      alpha: 0,
      hovered: false
    }));

    // Initialize rain
    rainDrops = [];
    for (let i = 0; i < 80; i++) {
      rainDrops.push({
        x: Math.random() * W,
        y: Math.random() * H,
        speed: 200 + Math.random() * 150,
        length: 10 + Math.random() * 20,
        alpha: 0.2 + Math.random() * 0.3
      });
    }

    // Initialize streamers (kite strings)
    streamers = [];
    for (let i = 0; i < 4; i++) {
      streamers.push({
        x: 100 + i * 150,
        points: Array(8).fill(0).map((_, j) => ({ x: 0, y: j * 20, vx: 0 })),
        color: [COLORS.orange, COLORS.amber, COLORS.cyan, '#FFB89D'][i]
      });
    }

    // Initialize pagoda base layers
    pagodaLayers = [
      { y: 520, w: 200, h: 20 },
      { y: 495, w: 180, h: 25 },
      { y: 465, w: 160, h: 30 }
    ];

    // Initialize decorative cranes
    cranes = [];
    wrongParticles = [];
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    entranceTime += dt;

    // Entrance animation for slots
    slots.forEach((slot, i) => {
      const delay = i * 0.08;
      const t = Math.max(0, Math.min(1, (entranceTime - delay) / 0.35));
      const spring = 1 + Math.sin(t * Math.PI * 2) * 0.15 * (1 - t);
      slot.scale = t * spring;
      slot.alpha = t;
    });

    // Update rain
    rainDrops.forEach(drop => {
      drop.y += drop.speed * dt;
      drop.x += Math.sin(drop.y * 0.01) * 20 * dt; // Wind sway
      if (drop.y > H) {
        drop.y = -drop.length;
        drop.x = Math.random() * W;
      }
    });

    // Update streamers (windy physics)
    const windStrength = 50 + Math.sin(entranceTime * 2) * 30;
    streamers.forEach(streamer => {
      streamer.points.forEach((p, j) => {
        if (j === 0) return;
        const wind = windStrength * Math.sin(entranceTime * 3 + j * 0.5);
        p.vx += wind * dt;
        p.vx *= 0.95;
        p.x += p.vx * dt;
        p.x = Math.max(-30, Math.min(30, p.x));
      });
    });

    // Update wrong animation particles
    wrongParticles = wrongParticles.filter(p => {
      p.vy += 400 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.alpha -= dt * 0.8;
      return p.alpha > 0 && p.y < H + 50;
    });

    // Update shake/pulse effects
    if (wrongShake > 0) wrongShake -= dt * 5;
    if (correctPulse > 0) correctPulse -= dt * 3;

    // Handle tile dropping
    if (tile.dropping) {
      tile.dropSpeed += 1500 * dt;
      tile.y += tile.dropSpeed * dt;

      const targetSlot = slots[tile.targetSlot];
      if (tile.y >= targetSlot.y - 10) {
        tile.dropping = false;
        const choice = targetSlot.choice;
        selectedChoice = tile.targetSlot;

        if (choice.is_correct) {
          playSound('correct');
          correctPulse = 1;
          setTimeout(() => {
            engine.end(true, choice.explanation);
          }, 400);
        } else {
          playSound('wrong');
          wrongShake = 1;
          // Spawn cranes and confetti particles
          for (let i = 0; i < 15; i++) {
            wrongParticles.push({
              x: targetSlot.x + targetSlot.w / 2,
              y: targetSlot.y,
              vx: (Math.random() - 0.5) * 300,
              vy: -Math.random() * 200 - 50,
              size: 6 + Math.random() * 8,
              color: [COLORS.error, COLORS.amber, '#FFB89D'][Math.floor(Math.random() * 3)],
              rotation: Math.random() * Math.PI * 2,
              rotationSpeed: (Math.random() - 0.5) * 8,
              alpha: 1,
              isCrane: i < 3
            });
          }
          setTimeout(() => {
            engine.end(false, choice.explanation);
          }, 500);
        }
      }
    } else {
      // Gentle float animation for tile
      tile.y = 70 + Math.sin(entranceTime * 2) * 5;
    }
  }

  function wrapText(text, maxWidth, font) {
    ctx.font = font;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';

    for (const word of words) {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width <= maxWidth) {
        currentLine = testLine;
      } else {
        if (currentLine) lines.push(currentLine);
        currentLine = word;
      }
    }
    if (currentLine) lines.push(currentLine);
    return lines;
  }

  function drawGame() {
    // Background - paper texture gradient
    const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
    bgGrad.addColorStop(0, '#3D5A80');  // Rainy sky blue
    bgGrad.addColorStop(0.4, '#5C7A99');
    bgGrad.addColorStop(1, '#2B3A4D');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    // Draw distant paper mountains (cutout layers)
    drawPaperMountains();

    // Draw rain
    ctx.strokeStyle = 'rgba(200, 220, 255, 0.4)';
    ctx.lineWidth = 1;
    rainDrops.forEach(drop => {
      ctx.globalAlpha = drop.alpha;
      ctx.beginPath();
      ctx.moveTo(drop.x, drop.y);
      ctx.lineTo(drop.x - 2, drop.y + drop.length);
      ctx.stroke();
    });
    ctx.globalAlpha = 1;

    // Draw streamers
    streamers.forEach((streamer, si) => {
      ctx.strokeStyle = streamer.color;
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.beginPath();
      const baseX = 120 + si * 140;
      ctx.moveTo(baseX, 20);
      streamer.points.forEach((p, j) => {
        ctx.lineTo(baseX + p.x, 20 + p.y);
      });
      ctx.stroke();
    });

    // Draw pagoda base
    drawPagoda();

    // Draw answer slots
    const shakeOffset = wrongShake > 0 ? Math.sin(wrongShake * 30) * 5 : 0;

    slots.forEach((slot, i) => {
      if (slot.alpha <= 0) return;

      ctx.save();
      ctx.globalAlpha = slot.alpha;

      const cx = slot.x + slot.w / 2;
      const cy = slot.y + slot.h / 2;
      ctx.translate(cx + shakeOffset, cy);
      ctx.scale(slot.scale, slot.scale);
      ctx.translate(-cx, -cy);

      // Determine slot style
      let bgColor = COLORS.bgSurface;
      let borderColor = COLORS.borderSubtle;
      let textColor = COLORS.textPrimary;

      if (selectedChoice === i) {
        if (slot.choice.is_correct) {
          bgColor = '#E8F8E5';
          borderColor = COLORS.success;
          const pulse = correctPulse > 0 ? 1 + Math.sin(correctPulse * 20) * 0.03 : 1;
          ctx.save();
          ctx.translate(cx, cy);
          ctx.scale(pulse, pulse);
          ctx.translate(-cx, -cy);
        } else {
          bgColor = '#FDECEB';
          borderColor = COLORS.error;
        }
      } else if (slot.hovered) {
        bgColor = '#E8F9F8';
        borderColor = COLORS.cyan;
      }

      // Draw slot background (paper tile effect)
      ctx.fillStyle = bgColor;
      ctx.strokeStyle = borderColor;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.roundRect(slot.x, slot.y, slot.w, slot.h, 8);
      ctx.fill();
      ctx.stroke();

      // Paper fold effect
      ctx.fillStyle = 'rgba(0,0,0,0.03)';
      ctx.beginPath();
      ctx.moveTo(slot.x + slot.w - 20, slot.y);
      ctx.lineTo(slot.x + slot.w, slot.y);
      ctx.lineTo(slot.x + slot.w, slot.y + 20);
      ctx.closePath();
      ctx.fill();

      // Draw answer text with wrapping
      ctx.fillStyle = textColor;
      ctx.font = "400 16px 'Nunito', sans-serif";
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';

      const textMaxWidth = slot.w - 40;
      const lines = wrapText(slot.choice.text, textMaxWidth, ctx.font);
      const lineHeight = 18;
      const totalTextHeight = lines.length * lineHeight;
      const textStartY = slot.y + (slot.h - totalTextHeight) / 2 + lineHeight / 2;

      lines.forEach((line, li) => {
        ctx.fillText(line, slot.x + 20, textStartY + li * lineHeight);
      });

      if (selectedChoice === i && slot.choice.is_correct) {
        ctx.restore();
      }

      ctx.restore();
    });

    // Draw hanging tile (above slots)
    if (!tile.dropping || tile.y < 270) {
      drawHangingTile();
    }

    // Draw wrong particles (cranes and confetti)
    wrongParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);

      if (p.isCrane) {
        // Simple origami crane shape
        ctx.fillStyle = COLORS.bgSurface;
        ctx.strokeStyle = COLORS.borderStrong;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, -10);
        ctx.lineTo(12, 5);
        ctx.lineTo(0, 0);
        ctx.lineTo(-12, 5);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
      } else {
        // Confetti piece
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      }

      ctx.restore();
    });
  }

  function drawPaperMountains() {
    // Back layer
    ctx.fillStyle = 'rgba(45, 65, 85, 0.6)';
    ctx.beginPath();
    ctx.moveTo(0, 180);
    ctx.lineTo(100, 120);
    ctx.lineTo(200, 160);
    ctx.lineTo(350, 90);
    ctx.lineTo(500, 140);
    ctx.lineTo(650, 100);
    ctx.lineTo(720, 150);
    ctx.lineTo(720, 250);
    ctx.lineTo(0, 250);
    ctx.closePath();
    ctx.fill();

    // Mid layer (temple silhouettes)
    ctx.fillStyle = 'rgba(55, 75, 95, 0.7)';
    ctx.beginPath();
    ctx.moveTo(0, 220);
    ctx.lineTo(80, 180);
    ctx.lineTo(100, 185);
    ctx.lineTo(120, 160);
    ctx.lineTo(140, 185);
    ctx.lineTo(160, 180);
    ctx.lineTo(250, 210);
    ctx.lineTo(400, 170);
    ctx.lineTo(420, 175);
    ctx.lineTo(440, 150);
    ctx.lineTo(460, 175);
    ctx.lineTo(480, 170);
    ctx.lineTo(600, 200);
    ctx.lineTo(720, 190);
    ctx.lineTo(720, 280);
    ctx.lineTo(0, 280);
    ctx.closePath();
    ctx.fill();
  }

  function drawPagoda() {
    const baseX = W / 2;

    // Draw pagoda tiers
    pagodaLayers.forEach((layer, i) => {
      const x = baseX - layer.w / 2;

      // Roof section
      ctx.fillStyle = '#8B4513';
      ctx.beginPath();
      ctx.moveTo(x - 15, layer.y);
      ctx.lineTo(x + layer.w / 2, layer.y - 15);
      ctx.lineTo(x + layer.w + 15, layer.y);
      ctx.closePath();
      ctx.fill();

      // Paper texture on roof
      ctx.fillStyle = COLORS.amber;
      ctx.globalAlpha = 0.3;
      ctx.beginPath();
      ctx.moveTo(x - 10, layer.y);
      ctx.lineTo(x + layer.w / 2, layer.y - 12);
      ctx.lineTo(x + layer.w + 10, layer.y);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;

      // Body section
      ctx.fillStyle = '#D4A574';
      ctx.fillRect(x + 10, layer.y, layer.w - 20, layer.h);

      // Paper fold lines
      ctx.strokeStyle = 'rgba(0,0,0,0.1)';
      ctx.lineWidth = 1;
      for (let j = 1; j < 4; j++) {
        const lx = x + 10 + (layer.w - 20) * j / 4;
        ctx.beginPath();
        ctx.moveTo(lx, layer.y);
        ctx.lineTo(lx, layer.y + layer.h);
        ctx.stroke();
      }
    });
  }

  function drawHangingTile() {
    const targetSlot = slots[tile.targetSlot];
    if (!targetSlot) return;

    const tileW = 160;
    const tileH = 40;
    const tileX = tile.x - tileW / 2;
    const tileY = tile.y;

    // Draw kite string
    ctx.strokeStyle = COLORS.textSecondary;
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(tile.x, 0);
    ctx.lineTo(tile.x, tileY);
    ctx.stroke();
    ctx.setLineDash([]);

    // Draw tile with paper effect
    const entranceScale = Math.min(1, entranceTime / 0.3);
    ctx.save();
    ctx.translate(tile.x, tileY + tileH / 2);
    ctx.scale(entranceScale, entranceScale);
    ctx.translate(-tile.x, -(tileY + tileH / 2));

    // Tile shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.roundRect(tileX + 3, tileY + 3, tileW, tileH, 6);
    ctx.fill();

    // Tile body
    ctx.fillStyle = COLORS.orange;
    ctx.beginPath();
    ctx.roundRect(tileX, tileY, tileW, tileH, 6);
    ctx.fill();

    // Paper fold corner
    ctx.fillStyle = COLORS.orangeHover;
    ctx.beginPath();
    ctx.moveTo(tileX + tileW - 15, tileY);
    ctx.lineTo(tileX + tileW, tileY);
    ctx.lineTo(tileX + tileW, tileY + 15);
    ctx.closePath();
    ctx.fill();

    // Slot indicator number
    ctx.fillStyle = '#FFFFFF';
    ctx.font = "700 20px 'Belanosima', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Slot ' + (tile.targetSlot + 1), tile.x, tileY + tileH / 2);

    ctx.restore();

    // Highlight target slot
    if (!tile.dropping && targetSlot.alpha > 0.5) {
      ctx.strokeStyle = COLORS.orange;
      ctx.lineWidth = 3;
      ctx.setLineDash([8, 4]);
      ctx.beginPath();
      ctx.roundRect(targetSlot.x - 2, targetSlot.y - 2, targetSlot.w + 4, targetSlot.h + 4, 10);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;
    if (tile.dropping) return;

    if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
      playSound('click');
      tile.targetSlot = Math.max(0, tile.targetSlot - 1);
    } else if (e.code === 'ArrowRight' || e.code === 'KeyD') {
      playSound('click');
      tile.targetSlot = Math.min(3, tile.targetSlot + 1);
    } else if (e.code === 'ArrowUp' || e.code === 'KeyW') {
      playSound('click');
      tile.targetSlot = Math.max(0, tile.targetSlot - 1);
    } else if (e.code === 'ArrowDown' || e.code === 'KeyS') {
      playSound('click');
      tile.targetSlot = Math.min(3, tile.targetSlot + 1);
    } else if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      playSound('click');
      tile.dropping = true;
      tile.dropSpeed = 50;
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
