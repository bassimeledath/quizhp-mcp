<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Template</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  +==============================================================================+
  |  GAME FACTORY TEMPLATE                                                        |
  |  This template enforces critical invariants. Follow the section markers.      |
  +==============================================================================+
  -->
  <style>
    /* =============================================================================
       BASE STYLES - Can be extended, not removed
       ============================================================================= */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- =============================================================================
       CANVAS - Sized dynamically to fill available space
       ============================================================================= -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // +============================================================================+
  // |  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    |
  // |  Platform replaces this at runtime. Use these exact 60-char answers.       |
  // +============================================================================+
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // +============================================================================+
  // |  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    |
  // |  Standard engine interface and end screen. This is sacred.                 |
  // +============================================================================+
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720x540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720x540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720x540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // +============================================================================+
  // |  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     |
  // |  This is where your game logic goes. See requirements below.               |
  // +============================================================================+

  // === COLORS ===
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    bgSecondary: '#F5F5F0',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC',
    peach: '#FFB89D',
    orangeLight: '#FFF4ED',
    cyanLight: '#E8F9F8',
  };

  // === SOUND SYSTEM ===
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playSound(type) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'switch') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(440, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(660, audioCtx.currentTime + 0.08);
      gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.15);
    } else if (type === 'chug') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(80, audioCtx.currentTime);
      osc.frequency.setValueAtTime(100, audioCtx.currentTime + 0.05);
      gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(300, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.3);
    } else if (type === 'whistle') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(800, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.5);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.5);
    }
  }

  // === GAME STATE ===
  let train = {};
  let tracks = [];
  let selectedTrack = 0;
  let junctionX = 0;
  let answered = false;
  let answerParticles = [];
  let gameTime = 0;
  let entranceProgress = 0;
  let smokeParticles = [];
  let switchIndicator = { scale: 1, targetScale: 1 };
  let chugTimer = 0;

  // Track layout constants
  const TRACK_START_X = 40;
  const JUNCTION_X = 260;
  const TRACK_END_X = 680;
  const MAIN_TRACK_Y = 270;
  const BRANCH_SPREAD = 110;
  const ANSWER_BOX_W = 380;
  const ANSWER_BOX_H = 68;

  function getBranchY(index) {
    // 4 tracks spread evenly: indices 0-3 map to top-bottom
    const topY = MAIN_TRACK_Y - 1.5 * BRANCH_SPREAD;
    return topY + index * BRANCH_SPREAD;
  }

  function wrapText(context, text, maxWidth) {
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';

    for (let i = 0; i < words.length; i++) {
      const testLine = currentLine ? currentLine + ' ' + words[i] : words[i];
      const metrics = context.measureText(testLine);
      if (metrics.width > maxWidth && currentLine) {
        lines.push(currentLine);
        currentLine = words[i];
      } else {
        currentLine = testLine;
      }
    }
    lines.push(currentLine);
    return lines;
  }

  function initGame() {
    train = {
      x: TRACK_START_X,
      y: MAIN_TRACK_Y,
      speed: 120,
      width: 50,
      height: 28,
      reachedJunction: false,
      onBranch: false,
      branchProgress: 0,
    };

    selectedTrack = 0;
    answered = false;
    answerParticles = [];
    gameTime = 0;
    entranceProgress = 0;
    smokeParticles = [];
    chugTimer = 0;
    switchIndicator = { scale: 1, targetScale: 1 };

    tracks = QUESTION.choices.map((choice, i) => ({
      index: i,
      choice: choice,
      endY: getBranchY(i),
      alpha: 0,
      scale: 0,
      hovered: i === 0,
      shakeX: 0,
      pulseScale: 1,
    }));
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Entrance animation for answer boxes
    if (entranceProgress < 1) {
      entranceProgress = Math.min(1, entranceProgress + dt * 2.5);
      tracks.forEach((t, i) => {
        const delay = i * 0.1;
        const progress = Math.max(0, Math.min(1, (entranceProgress - delay) / 0.6));
        const spring = 1 + Math.sin(progress * Math.PI * 2) * 0.15 * (1 - progress);
        t.scale = progress * spring;
        t.alpha = progress;
      });
    }

    // Chug sound timer
    chugTimer += dt;
    if (chugTimer > 0.25 && !train.onBranch && !answered) {
      chugTimer = 0;
      if (gameTime > 0.3) playSound('chug');
    }

    // Move train along main track toward junction
    if (!train.reachedJunction && !train.onBranch) {
      train.x += train.speed * dt;
      if (train.x >= JUNCTION_X - 20) {
        train.reachedJunction = true;
        train.x = JUNCTION_X - 20;
        playSound('whistle');
      }
    }

    // When on branch, animate train moving to selected answer
    if (train.onBranch && !answered) {
      train.branchProgress += dt * 2.2;
      const targetY = getBranchY(selectedTrack);
      const t = Math.min(1, train.branchProgress);
      const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
      train.x = JUNCTION_X - 20 + (TRACK_END_X - ANSWER_BOX_W - 10 - (JUNCTION_X - 20)) * ease;
      train.y = MAIN_TRACK_Y + (targetY - MAIN_TRACK_Y) * ease;

      if (t >= 1) {
        answered = true;
        const choice = tracks[selectedTrack].choice;
        if (choice.is_correct) {
          playSound('correct');
          tracks[selectedTrack].pulseScale = 1.08;
          spawnAnswerParticles(train.x + train.width, train.y);
        } else {
          playSound('wrong');
          tracks[selectedTrack].shakeX = 8;
        }
        setTimeout(() => {
          engine.end(choice.is_correct, choice.explanation);
        }, 600);
      }
    }

    // Update switch indicator bounce
    switchIndicator.scale += (switchIndicator.targetScale - switchIndicator.scale) * dt * 12;

    // Smoke particles from train
    if (!answered && gameTime > 0.2) {
      if (Math.random() < dt * 12) {
        smokeParticles.push({
          x: train.x + train.width * 0.7,
          y: train.y - train.height / 2 - 4,
          vx: (Math.random() - 0.5) * 15 - 10,
          vy: -Math.random() * 30 - 15,
          size: 3 + Math.random() * 5,
          alpha: 0.4 + Math.random() * 0.2,
          life: 0,
        });
      }
    }
    smokeParticles = smokeParticles.filter(p => {
      p.life += dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.alpha -= dt * 0.6;
      p.size += dt * 8;
      return p.alpha > 0;
    });

    // Update answer particles
    answerParticles = answerParticles.filter(p => {
      p.vy += 400 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.alpha -= dt * 1.2;
      return p.alpha > 0;
    });

    // Update shake on wrong answer
    tracks.forEach(t => {
      if (t.shakeX > 0.1) {
        t.shakeX *= 0.88;
      } else {
        t.shakeX = 0;
      }
      if (t.pulseScale > 1.001) {
        t.pulseScale += (1 - t.pulseScale) * dt * 5;
      }
    });

    // Update hovered state
    tracks.forEach((t, i) => {
      t.hovered = (i === selectedTrack && train.reachedJunction && !train.onBranch);
    });
  }

  function spawnAnswerParticles(x, y) {
    const colors = [COLORS.orange, COLORS.amber, COLORS.cyan, COLORS.success];
    for (let i = 0; i < 20; i++) {
      answerParticles.push({
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 300,
        vy: -Math.random() * 200 - 50,
        size: 3 + Math.random() * 5,
        color: colors[Math.floor(Math.random() * colors.length)],
        rotation: Math.random() * Math.PI * 2,
        rotationSpeed: (Math.random() - 0.5) * 8,
        alpha: 1,
      });
    }
  }

  function drawTrack(fromX, fromY, toX, toY, isSelected, trackIndex) {
    // Track bed (ties)
    const dist = Math.sqrt((toX - fromX) ** 2 + (toY - fromY) ** 2);
    const numTies = Math.floor(dist / 18);
    ctx.strokeStyle = '#8B7355';
    ctx.lineWidth = 2;
    for (let i = 0; i < numTies; i++) {
      const t = i / numTies;
      const tx = fromX + (toX - fromX) * t;
      const ty = fromY + (toY - fromY) * t;
      const angle = Math.atan2(toY - fromY, toX - fromX) + Math.PI / 2;
      ctx.beginPath();
      ctx.moveTo(tx + Math.cos(angle) * 6, ty + Math.sin(angle) * 6);
      ctx.lineTo(tx - Math.cos(angle) * 6, ty - Math.sin(angle) * 6);
      ctx.stroke();
    }

    // Rails
    const railOffset = 4;
    const angle = Math.atan2(toY - fromY, toX - fromX) + Math.PI / 2;
    ctx.strokeStyle = isSelected ? COLORS.cyan : '#A0A090';
    ctx.lineWidth = isSelected ? 3 : 2;

    // Top rail
    ctx.beginPath();
    ctx.moveTo(fromX + Math.cos(angle) * railOffset, fromY + Math.sin(angle) * railOffset);
    ctx.lineTo(toX + Math.cos(angle) * railOffset, toY + Math.sin(angle) * railOffset);
    ctx.stroke();

    // Bottom rail
    ctx.beginPath();
    ctx.moveTo(fromX - Math.cos(angle) * railOffset, fromY - Math.sin(angle) * railOffset);
    ctx.lineTo(toX - Math.cos(angle) * railOffset, toY - Math.sin(angle) * railOffset);
    ctx.stroke();
  }

  function drawTrain(x, y, w, h) {
    ctx.save();
    ctx.translate(x, y);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.roundRect(-w / 2 + 2, -h / 2 + 4, w, h, 4);
    ctx.fill();

    // Train body
    const grad = ctx.createLinearGradient(0, -h / 2, 0, h / 2);
    grad.addColorStop(0, COLORS.orange);
    grad.addColorStop(1, COLORS.orangeHover);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(-w / 2, -h / 2, w, h, 5);
    ctx.fill();

    // Cabin window
    ctx.fillStyle = COLORS.cyanLight;
    ctx.beginPath();
    ctx.roundRect(-w / 2 + 6, -h / 2 + 4, 14, h - 8, 2);
    ctx.fill();

    // Smokebox (front circle)
    ctx.fillStyle = COLORS.textPrimary;
    ctx.beginPath();
    ctx.arc(w / 2 - 4, 0, 7, 0, Math.PI * 2);
    ctx.fill();

    // Chimney
    ctx.fillStyle = '#5A5A54';
    ctx.fillRect(w / 2 - 14, -h / 2 - 8, 8, 10);
    ctx.fillStyle = COLORS.textPrimary;
    ctx.fillRect(w / 2 - 16, -h / 2 - 10, 12, 4);

    // Wheels
    const wheelR = 5;
    ctx.fillStyle = '#5A5A54';
    ctx.beginPath();
    ctx.arc(-w / 2 + 10, h / 2, wheelR, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(0, h / 2, wheelR, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(w / 2 - 10, h / 2, wheelR, 0, Math.PI * 2);
    ctx.fill();

    // Wheel detail
    ctx.strokeStyle = COLORS.amber;
    ctx.lineWidth = 1.5;
    [[-w / 2 + 10, h / 2], [0, h / 2], [w / 2 - 10, h / 2]].forEach(([wx, wy]) => {
      ctx.beginPath();
      ctx.arc(wx, wy, wheelR - 1.5, 0, Math.PI * 2);
      ctx.stroke();
    });

    ctx.restore();
  }

  function drawAnswerBox(track, x, y, w, h) {
    const choice = track.choice;
    const isHovered = track.hovered;
    const shakeOffset = track.shakeX * Math.sin(gameTime * 40);
    const pScale = track.pulseScale;

    ctx.save();
    ctx.translate(x + w / 2 + shakeOffset, y + h / 2);
    ctx.scale(track.scale * pScale, track.scale * pScale);
    ctx.globalAlpha = track.alpha;

    // Background
    ctx.fillStyle = isHovered ? COLORS.cyanLight : COLORS.bgSurface;
    ctx.strokeStyle = isHovered ? COLORS.cyan : COLORS.borderSubtle;
    ctx.lineWidth = isHovered ? 2.5 : 1.5;
    ctx.beginPath();
    ctx.roundRect(-w / 2, -h / 2, w, h, 10);
    ctx.fill();
    ctx.stroke();

    // Track label letter
    const labels = ['A', 'B', 'C', 'D'];
    ctx.fillStyle = isHovered ? COLORS.cyan : COLORS.textSecondary;
    ctx.font = "700 16px 'Nunito Sans', sans-serif";
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(labels[track.index], -w / 2 + 12, -h / 2 + 8);

    // Answer text (wrapped)
    ctx.fillStyle = COLORS.textPrimary;
    ctx.font = "400 16px 'Nunito', sans-serif";
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    const textMaxW = w - 44;
    const lines = wrapText(ctx, choice.text, textMaxW);
    const lineHeight = 19;
    const textStartY = -h / 2 + 8 + (lines.length === 1 ? 14 : 4);
    lines.forEach((line, li) => {
      if (li < 3) {
        ctx.fillText(line, -w / 2 + 30, textStartY + li * lineHeight);
      }
    });

    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function drawJunctionIndicator() {
    if (!train.reachedJunction || train.onBranch) return;

    const arrowX = JUNCTION_X + 10;
    const arrowY = getBranchY(selectedTrack);

    ctx.save();
    ctx.translate(arrowX, arrowY);
    ctx.scale(switchIndicator.scale, switchIndicator.scale);

    // Arrow pointing right
    ctx.fillStyle = COLORS.amber;
    ctx.beginPath();
    ctx.moveTo(-8, -8);
    ctx.lineTo(6, 0);
    ctx.lineTo(-8, 8);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  function drawGame() {
    // Sky background
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, '#D4EAFC');
    skyGrad.addColorStop(0.6, '#EDF5FB');
    skyGrad.addColorStop(1, '#C5D9A4');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    // Ground strip
    ctx.fillStyle = '#A8C680';
    ctx.fillRect(0, H - 60, W, 60);
    ctx.fillStyle = '#8FB35A';
    ctx.fillRect(0, H - 62, W, 4);

    // Background hills
    ctx.fillStyle = '#B8D490';
    ctx.beginPath();
    ctx.moveTo(0, H - 60);
    ctx.quadraticCurveTo(180, H - 130, 360, H - 60);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(300, H - 60);
    ctx.quadraticCurveTo(520, H - 110, 720, H - 60);
    ctx.fill();

    // Clouds
    const drawCloud = (cx, cy, s) => {
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.beginPath();
      ctx.arc(cx, cy, 15 * s, 0, Math.PI * 2);
      ctx.arc(cx + 14 * s, cy - 6 * s, 12 * s, 0, Math.PI * 2);
      ctx.arc(cx + 28 * s, cy, 14 * s, 0, Math.PI * 2);
      ctx.arc(cx + 14 * s, cy + 4 * s, 10 * s, 0, Math.PI * 2);
      ctx.fill();
    };
    drawCloud(100 + Math.sin(gameTime * 0.2) * 5, 50, 1.2);
    drawCloud(400 + Math.sin(gameTime * 0.15 + 1) * 4, 35, 1);
    drawCloud(600 + Math.sin(gameTime * 0.18 + 2) * 3, 55, 0.8);

    // Main track (horizontal)
    drawTrack(TRACK_START_X, MAIN_TRACK_Y, JUNCTION_X, MAIN_TRACK_Y, false, -1);

    // Branch tracks
    tracks.forEach((track, i) => {
      const endY = track.endY;
      const isSelected = (i === selectedTrack && train.reachedJunction && !train.onBranch);
      drawTrack(JUNCTION_X, MAIN_TRACK_Y, TRACK_END_X - ANSWER_BOX_W + 10, endY, isSelected, i);
    });

    // Junction circle
    ctx.fillStyle = COLORS.amber;
    ctx.beginPath();
    ctx.arc(JUNCTION_X, MAIN_TRACK_Y, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = COLORS.orangeHover;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Junction indicator arrow
    drawJunctionIndicator();

    // Answer boxes
    tracks.forEach((track) => {
      const boxX = TRACK_END_X - ANSWER_BOX_W + 10;
      const boxY = track.endY - ANSWER_BOX_H / 2;
      drawAnswerBox(track, boxX, boxY, ANSWER_BOX_W, ANSWER_BOX_H);
    });

    // Smoke particles
    smokeParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = '#D4D4CC';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });

    // Draw train
    drawTrain(train.x + train.width / 2, train.y, train.width, train.height);

    // Answer particles
    answerParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Selected track indicator text (top area)
    if (train.reachedJunction && !train.onBranch) {
      const labels = ['A', 'B', 'C', 'D'];
      ctx.save();
      ctx.font = "600 18px 'Nunito Sans', sans-serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = COLORS.orange;
      ctx.fillText('Track ' + labels[selectedTrack], JUNCTION_X, 22);
      ctx.restore();
    }
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;
    if (!train.reachedJunction || train.onBranch) return;

    if (e.code === 'ArrowUp') {
      e.preventDefault();
      selectedTrack = Math.max(0, selectedTrack - 1);
      switchIndicator.targetScale = 1.3;
      setTimeout(() => { switchIndicator.targetScale = 1; }, 150);
      playSound('switch');
    } else if (e.code === 'ArrowDown') {
      e.preventDefault();
      selectedTrack = Math.min(3, selectedTrack + 1);
      switchIndicator.targetScale = 1.3;
      setTimeout(() => { switchIndicator.targetScale = 1; }, 150);
      playSound('switch');
    } else if (e.code === 'Enter' || e.code === 'Space' || e.code === 'ArrowRight') {
      e.preventDefault();
      train.onBranch = true;
      train.branchProgress = 0;
      playSound('whistle');
    }
  }

  // +============================================================================+
  // |  SECTION 4: GAME LOOP - DO NOT MODIFY                                      |
  // |  Standard loop with responsive scaling and DPR support.                    |
  // +============================================================================+
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
