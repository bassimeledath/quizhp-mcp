<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Millionaire Final Question</title>
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  Who Wants to be a Millionaire - Final Question                            ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // Game state variables
  let time = 0;
  let hovered = -1;
  let selected = -1;
  let lockInTime = 0;
  const lockInDuration = 1.5;
  let flashAlpha = 0;
  let pulsePhase = 0;
  let spotlightAngle = 0;
  let buttons = [];
  const moneyLadder = [
    { amount: '$100', completed: true },
    { amount: '$200', completed: true },
    { amount: '$300', completed: true },
    { amount: '$500', completed: true },
    { amount: '$1,000', completed: true },
    { amount: '$2,000', completed: true },
    { amount: '$4,000', completed: true },
    { amount: '$8,000', completed: true },
    { amount: '$16,000', completed: true },
    { amount: '$32,000', completed: true },
    { amount: '$64,000', completed: true },
    { amount: '$125,000', completed: true },
    { amount: '$250,000', completed: true },
    { amount: '$500,000', completed: true },
    { amount: '$1,000,001', completed: false }
  ];

  // ═══════════════════════════════════════════════════════════════════════════
  // SOUND SYSTEM (QuizHP Styleguide compliant - opt-in, Web Audio synthesizer)
  // ═══════════════════════════════════════════════════════════════════════════
  let audioCtx = null;
  let masterGain = null;
  let soundEnabled = false;

  function initSound() {
    if (audioCtx) return;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.connect(audioCtx.destination);
      masterGain.gain.value = 0.5;
      soundEnabled = true;
    } catch (e) { console.warn('Web Audio not supported'); }
  }

  function createTone(freq, gain, attack, decay, type = 'sine', detune = 0) {
    if (!audioCtx || !soundEnabled) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    osc.type = type;
    osc.frequency.value = freq;
    osc.detune.value = detune;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(gain, now + attack / 1000);
    g.gain.linearRampToValueAtTime(0, now + (attack + decay) / 1000);
    osc.connect(g);
    g.connect(masterGain);
    osc.start(now);
    osc.stop(now + (attack + decay + 50) / 1000);
  }

  function createSlidingTone(startFreq, endFreq, slideTime, gain, decay) {
    if (!audioCtx || !soundEnabled) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(startFreq, now);
    osc.frequency.exponentialRampToValueAtTime(endFreq, now + slideTime / 1000);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(gain, now + 0.01);
    g.gain.linearRampToValueAtTime(0, now + decay / 1000);
    osc.connect(g);
    g.connect(masterGain);
    osc.start(now);
    osc.stop(now + (decay + 50) / 1000);
  }

  const SFX = {
    hover() {
      createSlidingTone(660, 880, 60, 0.2, 80);
    },
    click() {
      createTone(440, 0.3, 5, 100);
      createTone(443, 0.12, 5, 100, 'triangle', 5);
    },
    lockIn() {
      // Dramatic rising tension sound
      createSlidingTone(200, 400, 300, 0.25, 400);
      setTimeout(() => createTone(500, 0.15, 10, 200), 200);
      setTimeout(() => createTone(600, 0.15, 10, 200), 400);
    },
    suspense() {
      // Heartbeat-like tension pulse
      createTone(80, 0.3, 10, 150, 'sine');
      setTimeout(() => createTone(80, 0.25, 10, 100, 'sine'), 180);
    },
    correct() {
      // Cheerful rising ding + victory arpeggio
      createSlidingTone(880, 1046, 80, 0.35, 150);
      setTimeout(() => createTone(1568, 0.15, 2, 80), 50);
      // Victory C-E-G arpeggio
      setTimeout(() => createTone(523, 0.3, 5, 150), 150);
      setTimeout(() => createTone(659, 0.3, 5, 150), 230);
      setTimeout(() => createTone(784, 0.35, 5, 200), 310);
      // Extra sparkle for million dollar win
      setTimeout(() => createTone(1046, 0.25, 5, 250), 400);
      setTimeout(() => createTone(1318, 0.2, 5, 200), 500);
    },
    incorrect() {
      // Gentle bonk - not punishing
      createSlidingTone(220, 196, 100, 0.25, 200);
      createTone(220, 0.05, 15, 150, 'square');
    },
    millionWin() {
      // Grand fanfare for winning the million!
      setTimeout(() => createTone(523, 0.35, 5, 200), 0);
      setTimeout(() => createTone(659, 0.35, 5, 200), 100);
      setTimeout(() => createTone(784, 0.35, 5, 200), 200);
      setTimeout(() => createTone(1046, 0.4, 5, 400), 350);
      // Sparkle cascade
      for (let i = 0; i < 8; i++) {
        setTimeout(() => {
          createTone(1500 + Math.random() * 1000, 0.12, 2, 80);
        }, 500 + i * 60);
      }
    }
  };

  function initGame() {
    time = 0;
    hovered = -1;
    selected = -1;
    lockInTime = 0;
    flashAlpha = 0;
    pulsePhase = 0;
    spotlightAngle = 0;
    buttons = [];

    // Create button layout (2x2 grid, shifted left to make room for ladder)
    const buttonW = 260;
    const buttonH = 90;
    const spacing = 16;
    const startX = 40;
    const startY = 160;

    const labels = ['A', 'B', 'C', 'D'];
    for (let i = 0; i < 4; i++) {
      const row = Math.floor(i / 2);
      const col = i % 2;
      buttons.push({
        x: startX + col * (buttonW + spacing),
        y: startY + row * (buttonH + spacing),
        w: buttonW,
        h: buttonH,
        label: labels[i],
        text: QUESTION.choices[i]?.text || ''
      });
    }
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    time += dt;
    pulsePhase += dt * 2;
    spotlightAngle += dt * 0.3;

    // Handle lock-in animation
    if (selected >= 0) {
      const prevLockInTime = lockInTime;
      lockInTime += dt;

      // Flash effect
      if (lockInTime < 0.5) {
        flashAlpha = Math.sin(lockInTime * Math.PI * 6) * 0.5 + 0.5;
      } else {
        flashAlpha = 0;
      }

      // Play suspense heartbeat sounds during lock-in
      const suspenseIntervals = [0.5, 0.9, 1.2];
      for (const t of suspenseIntervals) {
        if (prevLockInTime < t && lockInTime >= t) {
          SFX.suspense();
        }
      }

      // End game after lock-in
      if (lockInTime >= lockInDuration) {
        const choice = QUESTION.choices[selected];
        if (choice) {
          // Play result sound before ending
          if (choice.is_correct) {
            SFX.correct();
            setTimeout(() => SFX.millionWin(), 300);
          } else {
            SFX.incorrect();
          }
          engine.end(choice.is_correct, choice.explanation);
        }
      }
    }
  }

  // Word wrap helper function
  function wrapText(ctx, text, maxWidth) {
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';

    for (let i = 0; i < words.length; i++) {
      const testLine = currentLine + (currentLine ? ' ' : '') + words[i];
      const metrics = ctx.measureText(testLine);
      if (metrics.width > maxWidth && currentLine) {
        lines.push(currentLine);
        currentLine = words[i];
      } else {
        currentLine = testLine;
      }
    }
    if (currentLine) {
      lines.push(currentLine);
    }
    return lines;
  }

  function drawGame() {
    // Dark blue gradient background
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#0a0e27');
    grad.addColorStop(0.5, '#1a1f3a');
    grad.addColorStop(1, '#0a0e27');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Spotlight rays (rotating golden beams)
    ctx.save();
    ctx.globalAlpha = 0.1;
    ctx.translate(W / 2, H / 2);
    ctx.rotate(spotlightAngle);
    for (let i = 0; i < 8; i++) {
      ctx.rotate(Math.PI / 4);
      const rayGrad = ctx.createLinearGradient(0, 0, 0, -300);
      rayGrad.addColorStop(0, '#ffd700');
      rayGrad.addColorStop(1, 'rgba(255, 215, 0, 0)');
      ctx.fillStyle = rayGrad;
      ctx.fillRect(-30, -300, 60, 300);
    }
    ctx.restore();

    // Pulsating ambient lights (corners)
    const pulse = Math.sin(pulsePhase) * 0.3 + 0.5;
    ctx.globalAlpha = pulse * 0.15;

    // Top corners
    const cornerGrad1 = ctx.createRadialGradient(0, 0, 0, 0, 0, 200);
    cornerGrad1.addColorStop(0, '#ffd700');
    cornerGrad1.addColorStop(1, 'rgba(255, 215, 0, 0)');
    ctx.fillStyle = cornerGrad1;
    ctx.fillRect(0, 0, 200, 200);

    ctx.save();
    ctx.translate(W, 0);
    ctx.scale(-1, 1);
    ctx.fillStyle = cornerGrad1;
    ctx.fillRect(0, 0, 200, 200);
    ctx.restore();

    ctx.globalAlpha = 1;

    // $1,000,000 text at top
    ctx.font = 'bold 42px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';

    // Golden glow
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 20;
    ctx.fillStyle = '#ffd700';
    ctx.fillText('$1,000,001', W / 2 - 60, 30);
    ctx.shadowBlur = 0;

    // Subtitle
    ctx.font = '16px system-ui, sans-serif';
    ctx.fillStyle = '#8899bb';
    ctx.fillText('FINAL QUESTION', W / 2 - 60, 80);

    // Draw money ladder on the right
    const ladderX = W - 130;
    const ladderStartY = 100;
    const ladderItemHeight = 26;

    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';

    for (let i = moneyLadder.length - 1; i >= 0; i--) {
      const item = moneyLadder[i];
      const y = ladderStartY + (moneyLadder.length - 1 - i) * ladderItemHeight;
      const isCurrent = !item.completed;

      if (isCurrent) {
        // Current question - golden highlight with glow
        const glowPulse = Math.sin(pulsePhase) * 0.3 + 0.7;
        ctx.shadowColor = '#ffd700';
        ctx.shadowBlur = 15 * glowPulse;

        // Background box
        ctx.fillStyle = 'rgba(255, 215, 0, 0.2)';
        ctx.fillRect(ladderX - 115, y - 11, 120, 22);
        ctx.strokeStyle = '#ffd700';
        ctx.lineWidth = 2;
        ctx.strokeRect(ladderX - 115, y - 11, 120, 22);

        ctx.font = 'bold 14px system-ui, sans-serif';
        ctx.fillStyle = '#ffd700';
        ctx.fillText(item.amount, ladderX - 5, y);
        ctx.shadowBlur = 0;
      } else {
        // Completed questions - muted with checkmark
        ctx.font = '12px system-ui, sans-serif';
        ctx.fillStyle = '#6a7a9a';
        ctx.fillText(item.amount, ladderX - 5, y);
      }
    }

    ctx.shadowBlur = 0;

    // Draw answer buttons
    for (let i = 0; i < buttons.length; i++) {
      const b = buttons[i];
      const isHovered = hovered === i;
      const isSelected = selected === i;

      ctx.save();

      // Button glow/pulse effect
      if (isSelected) {
        const selectPulse = Math.sin(lockInTime * Math.PI * 4) * 0.5 + 0.5;
        ctx.shadowColor = '#ffd700';
        ctx.shadowBlur = 30 + selectPulse * 20;
      } else if (isHovered) {
        ctx.shadowColor = '#ffd700';
        ctx.shadowBlur = 15;
      }

      // Button background
      const buttonGrad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
      if (isSelected) {
        buttonGrad.addColorStop(0, '#ffd700');
        buttonGrad.addColorStop(1, '#ffaa00');
      } else if (isHovered) {
        buttonGrad.addColorStop(0, '#2a3a6a');
        buttonGrad.addColorStop(1, '#1a2a4a');
      } else {
        buttonGrad.addColorStop(0, '#1a2a4a');
        buttonGrad.addColorStop(1, '#0a1a2a');
      }
      ctx.fillStyle = buttonGrad;

      // Draw rounded rectangle
      ctx.beginPath();
      ctx.roundRect(b.x, b.y, b.w, b.h, 8);
      ctx.fill();

      // Button border
      ctx.strokeStyle = isSelected ? '#ffd700' : (isHovered ? '#4a5a8a' : '#2a3a5a');
      ctx.lineWidth = isSelected ? 4 : 2;
      ctx.stroke();

      ctx.shadowBlur = 0;

      // Letter label (A/B/C/D)
      ctx.font = 'bold 20px system-ui, sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillStyle = isSelected ? '#0a0e27' : '#ffd700';
      ctx.fillText(b.label + ':', b.x + 12, b.y + 12);

      // Answer text (wrapped) - using 14px font for 60-char text
      ctx.font = '14px system-ui, sans-serif';
      ctx.fillStyle = isSelected ? '#0a0e27' : '#ffffff';
      const textX = b.x + 45;
      const textY = b.y + 14;
      const maxTextWidth = b.w - 55;
      const lineHeight = 18;

      // Word wrap the text
      const lines = wrapText(ctx, b.text, maxTextWidth);
      for (let j = 0; j < lines.length; j++) {
        ctx.fillText(lines[j], textX, textY + j * lineHeight);
      }

      ctx.restore();
    }

    // Flash overlay during lock-in
    if (flashAlpha > 0) {
      ctx.globalAlpha = flashAlpha * 0.4;
      ctx.fillStyle = '#ffd700';
      ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = 1;
    }
  }

  function handleInput(e) {
    // Initialize sound on first key press
    initSound();

    if (gameState !== 'playing') return;
    if (selected >= 0) return;

    // Number keys 1-4 for selection
    const key = e.key;
    if (key >= '1' && key <= '4') {
      const index = parseInt(key) - 1;
      if (index < buttons.length) {
        selected = index;
        lockInTime = 0;
        // Play click and dramatic lock-in sounds
        SFX.click();
        setTimeout(() => SFX.lockIn(), 100);
      }
    }
  }

  // Mouse handlers for hover and click
  let lastHovered = -1;
  let lastHoverSoundTime = 0;
  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'playing' || selected >= 0) return;
    const { x: mx, y: my } = screenToLogical(e.clientX, e.clientY);

    hovered = -1;
    for (let i = 0; i < buttons.length; i++) {
      const b = buttons[i];
      if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
        hovered = i;
        break;
      }
    }

    // Play hover sound when hovering a new button (debounced)
    if (hovered !== -1 && hovered !== lastHovered) {
      const now = Date.now();
      if (now - lastHoverSoundTime > 100) {
        SFX.hover();
        lastHoverSoundTime = now;
      }
    }
    lastHovered = hovered;
  });

  canvas.addEventListener('click', (e) => {
    // Initialize sound on first click (browser autoplay policy)
    initSound();

    if (gameState !== 'playing' || selected >= 0) return;
    const { x: mx, y: my } = screenToLogical(e.clientX, e.clientY);

    for (let i = 0; i < buttons.length; i++) {
      const b = buttons[i];
      if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
        selected = i;
        lockInTime = 0;
        // Play click and dramatic lock-in sounds
        SFX.click();
        setTimeout(() => SFX.lockIn(), 100);
        break;
      }
    }
  });

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        SFX.click();
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        SFX.click();
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        SFX.click();
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });


  // Cursor change handler for end screen buttons
  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'ended') {
      canvas.style.cursor = 'default';
      return;
    }
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    if (gameResult) {
      if (pointInRect(x, y, restartButton) || pointInRect(x, y, nextButton)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    } else {
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    }
    canvas.style.cursor = 'default';
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
