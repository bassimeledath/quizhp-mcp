<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lantern Koi Scoop</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1C1C1A;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === QUIZHP COLORS ===
  const COLORS = {
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    textPrimary: '#F5F5F0',
    textSecondary: '#C2C2B8',
    bgDark: '#1C1C1A',
    surface: '#2A2A27'
  };

  // === AUDIO SYSTEM ===
  const AudioSystem = {
    ctx: null,
    init() {
      if (!this.ctx) {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      }
    },
    play(type) {
      if (!this.ctx) return;
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.connect(gain);
      gain.connect(this.ctx.destination);

      if (type === 'swing') {
        osc.frequency.setValueAtTime(220, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(180, this.ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.1);
      } else if (type === 'correct') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, this.ctx.currentTime);
        osc.frequency.setValueAtTime(659, this.ctx.currentTime + 0.1);
        osc.frequency.setValueAtTime(784, this.ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.4);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.4);
      } else if (type === 'wrong') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.3);
      } else if (type === 'splash') {
        const noise = this.ctx.createBufferSource();
        const buffer = this.ctx.createBuffer(1, this.ctx.sampleRate * 0.15, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < data.length; i++) {
          data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (data.length * 0.3));
        }
        noise.buffer = buffer;
        const filter = this.ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 800;
        noise.connect(filter);
        filter.connect(gain);
        gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
        noise.start();
      }
    }
  };

  // === GAME STATE ===
  let net = { x: W / 2, y: H - 80, swinging: false, swingTime: 0 };
  let koiLanterns = [];
  let emberPetals = [];
  let ripples = [];
  let lanternLights = [];
  let mooringPosts = [];
  let time = 0;
  let selectedKoi = null;
  let keys = {};
  let entranceAnimTime = 0;
  let shakeOffset = { x: 0, y: 0 };
  let celebrationScale = 1;

  // Constants
  const NET_SPEED = 280;
  const SWING_DURATION = 0.35;
  const NET_REACH = 60;
  const ENTRANCE_DURATION = 0.5;
  const STAGGER_DELAY = 0.12;

  function initGame() {
    net = { x: W / 2, y: H - 80, swinging: false, swingTime: 0 };
    koiLanterns = [];
    emberPetals = [];
    ripples = [];
    selectedKoi = null;
    time = 0;
    keys = {};
    entranceAnimTime = 0;
    shakeOffset = { x: 0, y: 0 };
    celebrationScale = 1;

    // Create mooring posts along the canal
    mooringPosts = [
      { x: 80, y: H - 60 },
      { x: 200, y: H - 55 },
      { x: 520, y: H - 55 },
      { x: 640, y: H - 60 }
    ];

    // Create swaying lantern lights above
    lanternLights = [];
    for (let i = 0; i < 8; i++) {
      lanternLights.push({
        x: 50 + i * 90,
        y: 40 + Math.random() * 20,
        phase: Math.random() * Math.PI * 2,
        size: 12 + Math.random() * 8
      });
    }

    // Create the four koi lanterns for each answer choice
    // 2x2 grid layout with controlled movement
    const positions = [
      { x: 170, y: 140 },  // Top-left (A)
      { x: 170, y: 300 },  // Bottom-left (B)
      { x: 550, y: 140 },  // Top-right (C)
      { x: 550, y: 300 }   // Bottom-right (D)
    ];
    QUESTION.choices.forEach((choice, i) => {
      const baseX = positions[i].x;
      const baseY = positions[i].y;
      koiLanterns.push({
        choice: choice,
        index: i,
        x: baseX,
        y: baseY,
        baseX: baseX,
        baseY: baseY,
        phase: i * Math.PI / 2,
        speed: 0.5 + Math.random() * 0.2,
        loopRadiusX: 60 + Math.random() * 20, // Smaller movement radius
        loopRadiusY: 25 + Math.random() * 10,
        glow: 0.5 + Math.random() * 0.5,
        bobPhase: Math.random() * Math.PI * 2,
        torn: false,
        tearTime: 0,
        entranceDelay: i * STAGGER_DELAY,
        scale: 0,
        alpha: 0
      });
    });
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    time += dt;
    entranceAnimTime += dt;

    // Handle net movement
    if (keys['ArrowLeft'] || keys['KeyA']) {
      net.x -= NET_SPEED * dt;
    }
    if (keys['ArrowRight'] || keys['KeyD']) {
      net.x += NET_SPEED * dt;
    }
    if (keys['ArrowUp'] || keys['KeyW']) {
      net.y -= NET_SPEED * dt;
    }
    if (keys['ArrowDown'] || keys['KeyS']) {
      net.y += NET_SPEED * dt;
    }

    // Clamp net position
    net.x = Math.max(40, Math.min(W - 40, net.x));
    net.y = Math.max(100, Math.min(H - 40, net.y));

    // Update swing
    if (net.swinging) {
      net.swingTime += dt;
      if (net.swingTime >= SWING_DURATION) {
        net.swinging = false;
        net.swingTime = 0;
      }
    }

    // Update shake animation (for wrong answers)
    if (shakeOffset.x !== 0 || shakeOffset.y !== 0) {
      shakeOffset.x *= 0.85;
      shakeOffset.y *= 0.85;
      if (Math.abs(shakeOffset.x) < 0.5) shakeOffset.x = 0;
      if (Math.abs(shakeOffset.y) < 0.5) shakeOffset.y = 0;
    }

    // Update celebration scale
    if (celebrationScale !== 1) {
      celebrationScale += (1 - celebrationScale) * 0.1;
      if (Math.abs(celebrationScale - 1) < 0.01) celebrationScale = 1;
    }

    // Update koi lanterns - they swim in figure-8 loops
    koiLanterns.forEach(koi => {
      // Entrance animation with stagger
      const entranceProgress = Math.max(0, Math.min(1, (entranceAnimTime - koi.entranceDelay) / ENTRANCE_DURATION));
      if (entranceProgress < 1) {
        // Spring easing for bounce-in
        const spring = 1 + Math.sin(entranceProgress * Math.PI * 2) * 0.2 * (1 - entranceProgress);
        koi.scale = entranceProgress * spring;
        koi.alpha = entranceProgress;
      } else {
        koi.scale = 1;
        koi.alpha = 1;
      }

      if (!koi.torn) {
        koi.phase += koi.speed * dt;
        koi.x = koi.baseX + Math.sin(koi.phase) * koi.loopRadiusX;
        koi.y = koi.baseY + Math.sin(koi.phase * 2) * koi.loopRadiusY;
        koi.glow = 0.5 + Math.sin(time * 2 + koi.bobPhase) * 0.3;
      } else {
        koi.tearTime += dt;
      }
    });

    // Check for scoop collision during swing
    if (net.swinging && net.swingTime > 0.1 && net.swingTime < 0.25 && !selectedKoi) {
      koiLanterns.forEach(koi => {
        if (koi.torn || koi.scale < 0.9) return; // Don't allow catching during entrance
        const dx = koi.x - net.x;
        const dy = koi.y - net.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < NET_REACH) {
          selectedKoi = koi;
          if (koi.choice.is_correct) {
            // Correct answer - glow brightly and celebrate
            koi.glow = 1.5;
            celebrationScale = 1.3;
            AudioSystem.play('correct');
            setTimeout(() => {
              engine.end(true, koi.choice.explanation);
            }, 400);
          } else {
            // Wrong answer - tear the lantern skin
            koi.torn = true;
            shakeOffset.x = (Math.random() - 0.5) * 16;
            shakeOffset.y = (Math.random() - 0.5) * 8;
            AudioSystem.play('wrong');
            // Spawn ember petals
            for (let i = 0; i < 15; i++) {
              emberPetals.push({
                x: koi.x,
                y: koi.y,
                vx: (Math.random() - 0.5) * 80,
                vy: Math.random() * 40 + 20,
                life: 1,
                size: 3 + Math.random() * 4,
                rotation: Math.random() * Math.PI * 2,
                color: [COLORS.orange, COLORS.amber, COLORS.error][Math.floor(Math.random() * 3)]
              });
            }
            setTimeout(() => {
              engine.end(false, koi.choice.explanation);
            }, 800);
          }
        }
      });
    }

    // Update ember petals
    emberPetals.forEach(petal => {
      petal.x += petal.vx * dt;
      petal.y += petal.vy * dt;
      petal.vy += 30 * dt;
      petal.life -= dt * 0.5;
      petal.rotation += dt * 2;

      // Create ripples when petals hit water level
      if (petal.y > H - 100 && petal.life > 0.3) {
        ripples.push({
          x: petal.x,
          y: H - 90,
          radius: 2,
          maxRadius: 20 + Math.random() * 15,
          alpha: 0.6
        });
        petal.life = 0;
        AudioSystem.play('splash');
      }
    });
    emberPetals = emberPetals.filter(p => p.life > 0);

    // Update ripples
    ripples.forEach(r => {
      r.radius += 40 * dt;
      r.alpha -= dt * 0.8;
    });
    ripples = ripples.filter(r => r.alpha > 0);
  }

  function drawGame() {
    ctx.save();
    ctx.translate(shakeOffset.x, shakeOffset.y);

    // Night sky gradient
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, '#0a0a1a');
    skyGrad.addColorStop(0.4, '#1a1a3e');
    skyGrad.addColorStop(1, '#2a2a4e');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(-10, -10, W + 20, H + 20);

    // Moon
    ctx.save();
    ctx.shadowColor = '#fff8e0';
    ctx.shadowBlur = 40;
    ctx.fillStyle = '#fffbe8';
    ctx.beginPath();
    ctx.arc(620, 60, 30, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Stars
    ctx.fillStyle = '#ffffff';
    for (let i = 0; i < 30; i++) {
      const sx = (i * 137 + 50) % W;
      const sy = (i * 97 + 20) % 150;
      const twinkle = 0.3 + Math.sin(time * 2 + i) * 0.3;
      ctx.globalAlpha = twinkle;
      ctx.beginPath();
      ctx.arc(sx, sy, 1 + (i % 2), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Bridge arches in background
    drawBridgeArches();

    // Swaying ink-wash lanterns above
    lanternLights.forEach(lantern => {
      const sway = Math.sin(time * 1.5 + lantern.phase) * 8;
      const lx = lantern.x + sway;
      const ly = lantern.y;

      // Lantern cord
      ctx.strokeStyle = '#4a4a5a';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(lantern.x, 0);
      ctx.lineTo(lx, ly - lantern.size);
      ctx.stroke();

      // Lantern glow
      ctx.save();
      ctx.shadowColor = '#ffcc66';
      ctx.shadowBlur = 20;
      const grad = ctx.createRadialGradient(lx, ly, 0, lx, ly, lantern.size);
      grad.addColorStop(0, 'rgba(255, 200, 100, 0.9)');
      grad.addColorStop(0.5, 'rgba(255, 150, 80, 0.6)');
      grad.addColorStop(1, 'rgba(255, 100, 50, 0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.ellipse(lx, ly, lantern.size, lantern.size * 1.3, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      // Lantern body (ink-wash style)
      ctx.fillStyle = '#ffeecc';
      ctx.strokeStyle = '#8b4513';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.ellipse(lx, ly, lantern.size * 0.7, lantern.size * 0.9, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    });

    // Canal water
    const waterGrad = ctx.createLinearGradient(0, H - 120, 0, H);
    waterGrad.addColorStop(0, '#1a3a4a');
    waterGrad.addColorStop(0.5, '#0a2a3a');
    waterGrad.addColorStop(1, '#051520');
    ctx.fillStyle = waterGrad;
    ctx.fillRect(0, H - 120, W, 120);

    // Water reflection ripples
    ctx.strokeStyle = 'rgba(100, 150, 180, 0.2)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 5; i++) {
      const ry = H - 100 + i * 20;
      ctx.beginPath();
      ctx.moveTo(0, ry);
      for (let x = 0; x < W; x += 20) {
        ctx.lineTo(x, ry + Math.sin(time * 0.8 + x * 0.02 + i) * 3);
      }
      ctx.stroke();
    }

    // Ghostly ripples from ember petals
    ripples.forEach(r => {
      ctx.strokeStyle = `rgba(180, 220, 255, ${r.alpha})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
      ctx.stroke();
    });

    // Mooring posts
    mooringPosts.forEach(post => {
      ctx.fillStyle = '#3a2a1a';
      ctx.fillRect(post.x - 6, post.y - 40, 12, 60);
      // Rope coil
      ctx.strokeStyle = '#6a5a4a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(post.x, post.y - 25, 8, 0, Math.PI * 1.5);
      ctx.stroke();
    });

    // Draw koi lanterns
    koiLanterns.forEach(koi => {
      drawKoiLantern(koi);
    });

    // Draw ember petals
    emberPetals.forEach(petal => {
      ctx.save();
      ctx.translate(petal.x, petal.y);
      ctx.rotate(petal.rotation);
      ctx.globalAlpha = petal.life;
      ctx.fillStyle = petal.color || COLORS.amber;
      ctx.beginPath();
      ctx.ellipse(0, 0, petal.size, petal.size * 0.6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });

    // Draw net
    drawNet();

    ctx.restore(); // Restore from shake offset
  }

  function drawBridgeArches() {
    ctx.fillStyle = '#2a2a3e';
    ctx.strokeStyle = '#3a3a5e';
    ctx.lineWidth = 3;

    // Left arch
    ctx.beginPath();
    ctx.arc(0, H - 80, 120, -Math.PI * 0.5, 0);
    ctx.lineTo(120, H);
    ctx.lineTo(0, H);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Right arch
    ctx.beginPath();
    ctx.arc(W, H - 80, 120, -Math.PI, -Math.PI * 0.5);
    ctx.lineTo(W, H);
    ctx.lineTo(W - 120, H);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Center bridge
    ctx.beginPath();
    ctx.arc(W / 2, H - 60, 150, -Math.PI, 0);
    ctx.lineTo(W / 2 + 150, H);
    ctx.lineTo(W / 2 - 150, H);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }

  function drawKoiLantern(koi) {
    if (koi.alpha <= 0) return;

    ctx.save();
    ctx.translate(koi.x, koi.y);

    // Apply entrance scale and celebration scale
    const totalScale = koi.scale * (selectedKoi === koi && koi.choice.is_correct ? celebrationScale : 1);
    ctx.scale(totalScale, totalScale);
    ctx.globalAlpha = koi.alpha;

    // Determine facing direction based on movement
    const facingRight = Math.cos(koi.phase) > 0;
    if (!facingRight) ctx.scale(-1, 1);

    // Glow effect
    if (!koi.torn) {
      ctx.shadowColor = `rgba(255, 180, 100, ${koi.glow})`;
      ctx.shadowBlur = 25;
    }

    // Koi body (lantern paper)
    const bodyGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, 35);
    if (koi.torn) {
      bodyGrad.addColorStop(0, 'rgba(100, 80, 60, 0.5)');
      bodyGrad.addColorStop(1, 'rgba(60, 50, 40, 0.3)');
    } else {
      bodyGrad.addColorStop(0, '#fff5e0');
      bodyGrad.addColorStop(0.7, '#ffe0b0');
      bodyGrad.addColorStop(1, '#ffc080');
    }
    ctx.fillStyle = bodyGrad;

    // Koi shape
    ctx.beginPath();
    ctx.ellipse(0, 0, 40, 20, 0, 0, Math.PI * 2);
    ctx.fill();

    // Tail fin
    ctx.beginPath();
    ctx.moveTo(-35, 0);
    ctx.quadraticCurveTo(-55, -15, -50, -25);
    ctx.quadraticCurveTo(-40, -5, -35, 0);
    ctx.quadraticCurveTo(-40, 5, -50, 25);
    ctx.quadraticCurveTo(-55, 15, -35, 0);
    ctx.fillStyle = koi.torn ? 'rgba(200, 100, 60, 0.3)' : '#ff9060';
    ctx.fill();

    // Top fin
    ctx.beginPath();
    ctx.moveTo(-5, -18);
    ctx.quadraticCurveTo(5, -30, 15, -18);
    ctx.fill();

    // Eye
    ctx.fillStyle = '#1a1a2a';
    ctx.beginPath();
    ctx.arc(25, -5, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(26, -6, 1.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.shadowBlur = 0;

    // Answer seal on flank
    if (!koi.torn) {
      ctx.fillStyle = COLORS.orangeHover;
      ctx.beginPath();
      ctx.arc(0, 3, 12, 0, Math.PI * 2);
      ctx.fill();

      // Answer letter
      ctx.fillStyle = '#fff';
      ctx.font = "bold 14px 'Belanosima', sans-serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const letter = ['A', 'B', 'C', 'D'][koi.index];
      ctx.fillText(letter, 0, 4);
    }

    ctx.restore();

    // Answer text below koi (tooltip style)
    if (!koi.torn) {
      const textY = koi.y + 35;
      // Keep text boxes within canvas bounds
      const isRightSide = koi.baseX > W / 2;
      const textWidth = 300;
      let textX = koi.x;

      // Clamp text panel position
      if (isRightSide) {
        textX = Math.min(textX, W - textWidth / 2 - 10);
      } else {
        textX = Math.max(textX, textWidth / 2 + 10);
      }

      // Background panel for text
      ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
      const textHeight = 48;
      ctx.beginPath();
      ctx.roundRect(textX - textWidth / 2, textY - 5, textWidth, textHeight, 8);
      ctx.fill();

      // Border with QuizHP color
      ctx.strokeStyle = `${COLORS.amber}80`;
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Answer text - wrap to fit
      ctx.fillStyle = COLORS.textPrimary;
      ctx.font = "400 14px 'Nunito', sans-serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';

      const words = koi.choice.text.split(' ');
      let lines = [];
      let currentLine = '';
      const maxWidth = textWidth - 16;

      words.forEach(word => {
        const testLine = currentLine + (currentLine ? ' ' : '') + word;
        const metrics = ctx.measureText(testLine);
        if (metrics.width > maxWidth && currentLine) {
          lines.push(currentLine);
          currentLine = word;
        } else {
          currentLine = testLine;
        }
      });
      if (currentLine) lines.push(currentLine);

      // Draw lines (max 3 lines)
      lines.slice(0, 3).forEach((line, i) => {
        ctx.fillText(line, textX, textY + 4 + i * 15);
      });
    }
  }

  function drawNet() {
    ctx.save();
    ctx.translate(net.x, net.y);

    // Swing animation
    let angle = 0;
    if (net.swinging) {
      const progress = net.swingTime / SWING_DURATION;
      angle = Math.sin(progress * Math.PI) * 0.8;
    }
    ctx.rotate(angle);

    // Handle
    ctx.strokeStyle = '#6a4a2a';
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, 20);
    ctx.lineTo(0, 60);
    ctx.stroke();

    // Net hoop
    ctx.strokeStyle = '#8a6a4a';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.ellipse(0, 0, 30, 15, 0, 0, Math.PI * 2);
    ctx.stroke();

    // Net mesh
    ctx.strokeStyle = 'rgba(200, 180, 160, 0.6)';
    ctx.lineWidth = 1;
    // Vertical lines
    for (let i = -2; i <= 2; i++) {
      ctx.beginPath();
      ctx.moveTo(i * 10, -12);
      ctx.quadraticCurveTo(i * 8, 10, i * 6, 25);
      ctx.stroke();
    }
    // Horizontal curves
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.ellipse(0, -5 + i * 10, 25 - i * 5, 8, 0, 0, Math.PI);
      ctx.stroke();
    }

    ctx.restore();
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;

    // Initialize audio on first interaction
    AudioSystem.init();

    if (e.type === 'keydown') {
      keys[e.code] = true;

      // Swing net with spacebar or enter
      if ((e.code === 'Space' || e.code === 'Enter') && !net.swinging) {
        net.swinging = true;
        net.swingTime = 0;
        AudioSystem.play('swing');
      }
    } else if (e.type === 'keyup') {
      keys[e.code] = false;
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
    handleInput(e);
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
