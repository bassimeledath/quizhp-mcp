<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Win95 File Drop</title>
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  Windows 95 Desktop File Drop Game                                         ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // Check reduced motion preference
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ═══════════════════════════════════════════════════════════════════════════
  // AUDIO SYSTEM - Retro Windows 95 style sounds
  // ═══════════════════════════════════════════════════════════════════════════
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }

  function playSound(type) {
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'pickup') {
      // Retro click/pickup - short square wave blip
      osc.type = 'square';
      osc.frequency.setValueAtTime(800, audioCtx.currentTime);
      osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.03);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.08);
    } else if (type === 'hover') {
      // Subtle hover tick
      osc.type = 'square';
      osc.frequency.setValueAtTime(400, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.03);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.03);
    } else if (type === 'drop') {
      // Satisfying Windows-style drop sound - ascending arpeggio
      const osc2 = audioCtx.createOscillator();
      const gain2 = audioCtx.createGain();
      osc2.connect(gain2);
      gain2.connect(audioCtx.destination);
      osc.type = 'square';
      osc2.type = 'square';
      osc.frequency.setValueAtTime(400, audioCtx.currentTime);
      osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.05);
      osc2.frequency.setValueAtTime(800, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
      gain2.gain.setValueAtTime(0.01, audioCtx.currentTime);
      gain2.gain.setValueAtTime(0.12, audioCtx.currentTime + 0.1);
      gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
      osc.start();
      osc2.start();
      osc.stop(audioCtx.currentTime + 0.15);
      osc2.stop(audioCtx.currentTime + 0.25);
    } else if (type === 'correct') {
      // Windows tada-like sound
      osc.type = 'square';
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'wrong') {
      // Windows error-like sound
      osc.type = 'square';
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.setValueAtTime(150, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.25);
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // PARTICLE SYSTEM - Pixelated Win95 style particles
  // ═══════════════════════════════════════════════════════════════════════════
  let particles = [];

  function spawnPixelConfetti(x, y) {
    if (prefersReducedMotion) return;
    // Win95 colors - teal, yellow, gray, white
    const colors = ['#008080', '#ffff00', '#c0c0c0', '#ffffff', '#000080', '#800000'];
    for (let i = 0; i < 25; i++) {
      particles.push({
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 300,
        vy: -Math.random() * 250 - 50,
        size: Math.floor(Math.random() * 3 + 2) * 2, // Pixelated sizes: 4, 6, 8
        color: colors[Math.floor(Math.random() * colors.length)],
        gravity: 400,
        life: 1,
        type: 'confetti'
      });
    }
  }

  function spawnDustParticles(x, y) {
    if (prefersReducedMotion) return;
    // Small dust particles when dragging
    for (let i = 0; i < 2; i++) {
      particles.push({
        x: x + (Math.random() - 0.5) * 40,
        y: y + (Math.random() - 0.5) * 40,
        vx: (Math.random() - 0.5) * 30,
        vy: Math.random() * 20 + 10,
        size: 2,
        color: '#c0c0c0',
        gravity: 20,
        life: 1,
        type: 'dust'
      });
    }
  }

  function spawnDropSparkles(x, y) {
    if (prefersReducedMotion) return;
    // Pixelated sparkles when dropping into folder
    const sparkleColors = ['#ffff00', '#ffffff', '#ffeb3b'];
    for (let i = 0; i < 12; i++) {
      const angle = (i / 12) * Math.PI * 2;
      particles.push({
        x: x,
        y: y,
        vx: Math.cos(angle) * 100,
        vy: Math.sin(angle) * 100,
        size: 4,
        color: sparkleColors[Math.floor(Math.random() * sparkleColors.length)],
        gravity: 0,
        life: 1,
        type: 'sparkle'
      });
    }
  }

  function updateParticles(dt) {
    particles = particles.filter(p => {
      p.vy += p.gravity * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt * (p.type === 'dust' ? 2 : p.type === 'sparkle' ? 3 : 1.2);
      return p.life > 0 && p.y < H + 50;
    });
  }

  function drawParticles() {
    particles.forEach(p => {
      ctx.globalAlpha = Math.min(p.life, 1);
      ctx.fillStyle = p.color;
      // Pixelated square particles for retro feel
      ctx.fillRect(Math.floor(p.x), Math.floor(p.y), p.size, p.size);
    });
    ctx.globalAlpha = 1;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // ANIMATION SYSTEM - Chunky Win95 style animations
  // ═══════════════════════════════════════════════════════════════════════════
  let animations = [];

  function animateFileEntrance(file, delay) {
    if (prefersReducedMotion) {
      file.scale = 1;
      file.offsetY = 0;
      file.alpha = 1;
      return;
    }
    file.scale = 0;
    file.offsetY = -30;
    file.alpha = 0;

    setTimeout(() => {
      const start = performance.now();
      const duration = 300;
      const animate = (now) => {
        const t = Math.min((now - start) / duration, 1);
        // Chunky step animation (like old Windows)
        const steps = 5;
        const steppedT = Math.floor(t * steps) / steps;
        file.scale = steppedT;
        file.offsetY = -30 * (1 - steppedT);
        file.alpha = steppedT;
        if (t < 1) requestAnimationFrame(animate);
        else { file.scale = 1; file.offsetY = 0; file.alpha = 1; }
      };
      requestAnimationFrame(animate);
    }, delay);
  }

  function animateFolderOpen() {
    if (prefersReducedMotion) return;
    folderOpenAmount = 0;
    const start = performance.now();
    const animate = (now) => {
      const t = Math.min((now - start) / 200, 1);
      folderOpenAmount = t;
      if (t < 1) requestAnimationFrame(animate);
    };
    requestAnimationFrame(animate);
  }

  function animateFolderClose() {
    if (prefersReducedMotion) return;
    const startAmount = folderOpenAmount;
    const start = performance.now();
    const animate = (now) => {
      const t = Math.min((now - start) / 150, 1);
      folderOpenAmount = startAmount * (1 - t);
      if (t < 1) requestAnimationFrame(animate);
    };
    requestAnimationFrame(animate);
  }

  function animateDropIntoFolder(file, callback) {
    if (prefersReducedMotion) {
      callback();
      return;
    }
    const startX = file.x;
    const startY = file.y;
    const startScale = file.scale || 1;
    const targetX = dropZone.x + dropZone.w / 2 - file.w / 2;
    const targetY = dropZone.y + 20;
    const start = performance.now();
    const duration = 250;

    const animate = (now) => {
      const t = Math.min((now - start) / duration, 1);
      // Ease out
      const eased = 1 - Math.pow(1 - t, 2);
      file.x = startX + (targetX - startX) * eased;
      file.y = startY + (targetY - startY) * eased;
      file.scale = startScale * (1 - eased * 0.7);
      file.alpha = 1 - eased * 0.5;

      if (t < 1) {
        requestAnimationFrame(animate);
      } else {
        spawnDropSparkles(dropZone.x + dropZone.w / 2, dropZone.y + 40);
        playSound('drop');
        setTimeout(callback, 150);
      }
    };
    requestAnimationFrame(animate);
  }

  function animateShake(file) {
    if (prefersReducedMotion) return;
    const originalX = file.x;
    const start = performance.now();
    const duration = 400;

    const animate = (now) => {
      const t = Math.min((now - start) / duration, 1);
      const decay = 1 - t;
      // Chunky pixel-aligned shake
      file.x = originalX + Math.floor(Math.sin(t * Math.PI * 8) * 10 * decay);
      if (t < 1) requestAnimationFrame(animate);
      else file.x = originalX;
    };
    requestAnimationFrame(animate);
  }

  // Game state
  let files = [];
  let dropZone = { x: 260, y: 420, w: 200, h: 100 };
  let dragging = null;
  let dragOffsetX = 0;
  let dragOffsetY = 0;
  let mouseX = 0;
  let mouseY = 0;
  let hoveringDropZone = false;
  let dragStartX = 0;
  let dragStartY = 0;
  let hasMoved = false;
  let hoveredFile = null;
  let folderOpenAmount = 0;
  let lastHoverState = false;
  let dustTimer = 0;
  let submittedFile = null;

  function initGame() {
    files = [];
    dragging = null;
    hoveringDropZone = false;
    hasMoved = false;
    hoveredFile = null;
    folderOpenAmount = 0;
    particles = [];
    submittedFile = null;

    // File positions - 2x2 grid layout for better text display
    const positions = [
      { x: 40, y: 40 },    // Top-left
      { x: 380, y: 40 },   // Top-right
      { x: 40, y: 220 },   // Bottom-left
      { x: 380, y: 220 }   // Bottom-right
    ];

    // Create file objects from choices
    QUESTION.choices.forEach((choice, i) => {
      const file = {
        x: positions[i].x,
        y: positions[i].y,
        w: 300,
        h: 160,
        text: choice.text,
        is_correct: choice.is_correct,
        explanation: choice.explanation,
        index: i,
        scale: 1,
        offsetY: 0,
        alpha: 1
      };
      files.push(file);
      animateFileEntrance(file, i * 80);
    });
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    // Update particles
    updateParticles(dt);

    // Update dragging file position
    if (dragging) {
      dragging.x = mouseX - dragOffsetX;
      dragging.y = mouseY - dragOffsetY;

      // Check if the file has moved from its starting position
      const dx = Math.abs(dragging.x - dragStartX);
      const dy = Math.abs(dragging.y - dragStartY);
      if (dx > 5 || dy > 5) {
        hasMoved = true;
      }

      // Spawn dust particles while dragging
      dustTimer += dt;
      if (dustTimer > 0.05 && hasMoved) {
        spawnDustParticles(dragging.x + dragging.w / 2, dragging.y + dragging.h);
        dustTimer = 0;
      }

      // Check if hovering over drop zone
      const dz = dropZone;
      const wasHovering = hoveringDropZone;
      hoveringDropZone = mouseX >= dz.x && mouseX <= dz.x + dz.w &&
                         mouseY >= dz.y && mouseY <= dz.y + dz.h;

      // Folder open/close animation
      if (hoveringDropZone && !wasHovering) {
        animateFolderOpen();
        playSound('hover');
      } else if (!hoveringDropZone && wasHovering) {
        animateFolderClose();
      }
    }

    // Track hovered file (when not dragging)
    if (!dragging) {
      let newHovered = null;
      for (let i = files.length - 1; i >= 0; i--) {
        const f = files[i];
        if (mouseX >= f.x && mouseX <= f.x + f.w && mouseY >= f.y && mouseY <= f.y + f.h) {
          newHovered = f;
          break;
        }
      }
      if (newHovered !== hoveredFile) {
        if (newHovered && !hoveredFile) {
          playSound('hover');
        }
        hoveredFile = newHovered;
      }
    }
  }

  function drawGame() {
    // Windows 95 teal desktop background
    ctx.fillStyle = '#008080';
    ctx.fillRect(0, 0, W, H);

    // Draw drop zone folder
    drawDropZone();

    // Draw non-dragging files first
    files.forEach(f => {
      if (f !== dragging && f !== submittedFile) {
        drawFile(f, f.alpha || 1, f === hoveredFile && !dragging);
      }
    });

    // Draw submitted file (animating into folder)
    if (submittedFile) {
      drawFile(submittedFile, submittedFile.alpha || 1, false);
    }

    // Draw dragging file on top with transparency
    if (dragging) {
      drawFile(dragging, 0.8, false);
    }

    // Draw particles on top
    drawParticles();
  }

  function drawDropZone() {
    const dz = dropZone;
    const folderColor = hoveringDropZone ? '#ffeb3b' : '#ffd54f';

    // Highlight background when hovering (with pulsing effect)
    if (hoveringDropZone || folderOpenAmount > 0) {
      const pulse = hoveringDropZone ? 1 + Math.sin(performance.now() / 150) * 0.1 : 1;
      ctx.fillStyle = `rgba(76, 175, 80, ${0.3 * (folderOpenAmount || 0.3)})`;
      ctx.fillRect(dz.x - 5 * pulse, dz.y - 5 * pulse, (dz.w + 10) * pulse, (dz.h + 10) * pulse);
      ctx.strokeStyle = '#4caf50';
      ctx.lineWidth = 4;
      ctx.setLineDash([8, 4]);
      ctx.strokeRect(dz.x - 5, dz.y - 5, dz.w + 10, dz.h + 10);
      ctx.setLineDash([]);
    }

    // Folder icon - centered in drop zone
    const folderX = dz.x + (dz.w - 140) / 2;
    const folderY = dz.y + 10;

    // Folder shadow (subtle depth)
    ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
    ctx.fillRect(folderX + 4, folderY + 14, 140, 50);

    // Folder body
    ctx.fillStyle = folderColor;
    ctx.fillRect(folderX, folderY + 10, 140, 50);

    // Folder tab
    ctx.fillStyle = '#ffb300';
    ctx.fillRect(folderX, folderY, 50, 15);

    // Folder "open" lid effect when hovering
    if (folderOpenAmount > 0) {
      const lidOpen = folderOpenAmount * 15;
      ctx.fillStyle = '#ffe082';
      ctx.beginPath();
      ctx.moveTo(folderX, folderY + 10);
      ctx.lineTo(folderX + 140, folderY + 10);
      ctx.lineTo(folderX + 140 - 10, folderY + 10 - lidOpen);
      ctx.lineTo(folderX + 10, folderY + 10 - lidOpen);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#2d2419';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Inner folder darkness
      ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
      ctx.fillRect(folderX + 5, folderY + 15, 130, 40);
    }

    // Folder outlines
    ctx.strokeStyle = '#2d2419';
    ctx.lineWidth = 2;
    ctx.strokeRect(folderX, folderY + 10, 140, 50);
    ctx.strokeRect(folderX, folderY, 50, 15);

    // Drop zone label with shadow
    ctx.font = 'bold 16px "Courier New", Courier, monospace';
    ctx.fillStyle = '#000000';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText('Drop Answer Here', dz.x + dz.w / 2 + 1, dz.y + 76);
    ctx.fillStyle = '#ffffff';
    ctx.fillText('Drop Answer Here', dz.x + dz.w / 2, dz.y + 75);
  }

  function drawFile(f, alpha, isHovered) {
    const isDragging = (f === dragging);
    const scale = f.scale || 1;
    const offsetY = f.offsetY || 0;

    ctx.save();
    ctx.globalAlpha = alpha * (f.alpha || 1);

    // Apply scale transform from center
    const centerX = f.x + f.w / 2;
    const centerY = f.y + f.h / 2 + offsetY;
    ctx.translate(centerX, centerY);
    ctx.scale(scale, scale);
    ctx.translate(-centerX, -centerY);

    // Center the icon horizontally within the file's width
    const iconWidth = 60;
    const iconX = f.x + (f.w - iconWidth) / 2;
    const drawY = f.y + offsetY;

    // Hover effect - subtle lift and glow
    if (isHovered && !isDragging) {
      // Win95 style selection box (dotted)
      ctx.strokeStyle = '#000080';
      ctx.lineWidth = 1;
      ctx.setLineDash([2, 2]);
      ctx.strokeRect(f.x - 3, drawY - 3, f.w + 6, f.h + 6);
      ctx.setLineDash([]);
    }

    // Highlight background when dragging
    if (isDragging) {
      ctx.fillStyle = 'rgba(33, 150, 243, 0.2)';
      ctx.fillRect(f.x - 5, drawY - 5, f.w + 10, f.h + 10);
      ctx.strokeStyle = '#2196f3';
      ctx.lineWidth = 3;
      ctx.strokeRect(f.x - 5, drawY - 5, f.w + 10, f.h + 10);
    }

    // File icon shadow
    ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
    ctx.fillRect(iconX + 3, drawY + 3, iconWidth, 70);

    // File icon background (white paper)
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(iconX, drawY, iconWidth, 70);

    // File folded corner
    ctx.fillStyle = '#e0e0e0';
    ctx.beginPath();
    ctx.moveTo(iconX + iconWidth, drawY);
    ctx.lineTo(iconX + iconWidth, drawY + 15);
    ctx.lineTo(iconX + iconWidth - 15, drawY);
    ctx.closePath();
    ctx.fill();

    // File icon outline
    ctx.strokeStyle = '#2d2419';
    ctx.lineWidth = 2;
    ctx.strokeRect(iconX, drawY, iconWidth, 70);

    // File icon decoration lines (simulating text)
    ctx.strokeStyle = '#2196f3';
    ctx.lineWidth = 1;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.moveTo(iconX + 10, drawY + 20 + i * 12);
      ctx.lineTo(iconX + iconWidth - 10, drawY + 20 + i * 12);
      ctx.stroke();
    }

    ctx.globalAlpha = 1;

    // File label with word wrapping - using 14px font for readability
    ctx.font = '14px "Courier New", Courier, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';

    // Word wrap the text
    const maxWidth = f.w - 20;
    const words = f.text.split(' ');
    const lines = [];
    let currentLine = '';

    for (const word of words) {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      const metrics = ctx.measureText(testLine);
      if (metrics.width > maxWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    }
    if (currentLine) lines.push(currentLine);

    // Draw text lines below the icon
    const lineHeight = 18;
    const startY = drawY + 78;

    // If dragging or hovered, draw highlight behind text
    if ((isDragging || isHovered) && lines.length > 0) {
      ctx.fillStyle = isDragging ? '#2196f3' : '#000080';
      const highlightHeight = lines.length * lineHeight + 6;
      ctx.fillRect(f.x + 5, startY - 4, f.w - 10, highlightHeight);
    }

    // Text shadow
    ctx.fillStyle = '#000000';
    lines.forEach((line, i) => {
      ctx.fillText(line, f.x + f.w / 2 + 1, startY + i * lineHeight + 1);
    });
    ctx.fillStyle = '#ffffff';
    lines.forEach((line, i) => {
      ctx.fillText(line, f.x + f.w / 2, startY + i * lineHeight);
    });

    ctx.restore();
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;
    // Keyboard input not used - mouse only game
  }

  // Mouse event handlers
  function onMouseDown(e) {
    if (gameState !== 'playing') return;

    // Initialize audio on first interaction
    initAudio();

    const { x, y } = screenToLogical(e.clientX, e.clientY);
    mouseX = x;
    mouseY = y;

    // Check if clicking on a file (reverse order to get topmost)
    for (let i = files.length - 1; i >= 0; i--) {
      const f = files[i];
      if (x >= f.x && x <= f.x + f.w && y >= f.y && y <= f.y + f.h) {
        dragging = f;
        dragOffsetX = x - f.x;
        dragOffsetY = y - f.y;
        dragStartX = f.x;
        dragStartY = f.y;
        hasMoved = false;
        playSound('pickup');
        break;
      }
    }
  }

  function onMouseMove(e) {
    if (gameState !== 'playing') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);
    mouseX = x;
    mouseY = y;
  }

  function onMouseUp(e) {
    if (gameState !== 'playing') return;
    if (!dragging) return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);
    const droppedFile = dragging;

    // Check if dropped on drop zone AND the file was actually dragged
    const dz = dropZone;
    if (hasMoved && x >= dz.x && x <= dz.x + dz.w && y >= dz.y && y <= dz.y + dz.h) {
      // Animate drop into folder then end game
      submittedFile = droppedFile;
      dragging = null;
      hoveringDropZone = false;

      animateDropIntoFolder(droppedFile, () => {
        if (droppedFile.is_correct) {
          playSound('correct');
          spawnPixelConfetti(dz.x + dz.w / 2, dz.y + 40);
        } else {
          playSound('wrong');
          animateShake(droppedFile);
        }
        setTimeout(() => {
          engine.end(droppedFile.is_correct, droppedFile.explanation);
        }, droppedFile.is_correct ? 400 : 300);
      });
    } else if (!hasMoved) {
      // If the file wasn't moved, return it to its starting position
      droppedFile.x = dragStartX;
      droppedFile.y = dragStartY;
      dragging = null;
      hoveringDropZone = false;
    } else {
      dragging = null;
      hoveringDropZone = false;
      animateFolderClose();
    }
  }

  // Register mouse events
  canvas.addEventListener('mousedown', onMouseDown);
  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('mouseup', onMouseUp);

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });


  // Cursor change handler for end screen buttons
  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'ended') {
      canvas.style.cursor = 'default';
      return;
    }
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    if (gameResult) {
      if (pointInRect(x, y, restartButton) || pointInRect(x, y, nextButton)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    } else {
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    }
    canvas.style.cursor = 'default';
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
