<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steam Engine Gauge</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  +==============================================================================+
  |  GAME FACTORY TEMPLATE                                                        |
  |  This template enforces critical invariants. Follow the section markers.      |
  +==============================================================================+
  -->
  <style>
    /* BASE STYLES - Can be extended, not removed */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <script>
  // +========================================================================+
  // |  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                |
  // |  Platform replaces this at runtime. Use these exact 60-char answers.   |
  // +========================================================================+
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // +========================================================================+
  // |  SECTION 2: ENGINE CORE - DO NOT MODIFY                                |
  // |  Standard engine interface and end screen. This is sacred.             |
  // +========================================================================+
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720x540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720x540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720x540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // +========================================================================+
  // |  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                 |
  // |  This is where your game logic goes. See requirements below.           |
  // +========================================================================+

  // === GAME STATE ===
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    bgSurfaceSecondary: '#F5F5F0',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    textTertiary: '#8C8C84',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC',
    brass: '#C4A147',
    brassLight: '#D4B65C',
    brassDark: '#8B7335',
    brassHighlight: '#E8D48B',
    steelDark: '#3A3A3A',
    steelMid: '#5C5C5C',
    steelLight: '#8A8A8A',
    panelDark: '#2B2520',
    panelMid: '#3D3530',
    panelLight: '#4F4540',
    rivetColor: '#6B5B4F',
    steamWhite: 'rgba(255, 255, 255, 0.6)',
  };

  let gauges = [];
  let steamParticles = [];
  let selectedGauge = -1;
  let selectionTime = 0;
  let animTime = 0;
  let entranceProgress = 0;
  let hoveredGauge = -1;
  let answerLocked = false;

  // Audio context for sound effects
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playSound(type) {
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);

      if (type === 'click') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.15, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.1);
      } else if (type === 'steam') {
        // White noise-like hiss using oscillator
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(2000, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.5);
        gain.gain.setValueAtTime(0.08, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.5);
      } else if (type === 'correct') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, ctx.currentTime);
        osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
        osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.2, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.4);
      } else if (type === 'wrong') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(200, ctx.currentTime);
        osc.frequency.setValueAtTime(150, ctx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.15, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.3);
      }
    } catch (e) { /* ignore audio errors */ }
  }

  // Word-wrap helper for answer text
  function wrapText(text, maxWidth, font) {
    ctx.font = font;
    const words = text.split(' ');
    const lines = [];
    let currentLine = words[0] || '';

    for (let i = 1; i < words.length; i++) {
      const testLine = currentLine + ' ' + words[i];
      if (ctx.measureText(testLine).width <= maxWidth) {
        currentLine = testLine;
      } else {
        lines.push(currentLine);
        currentLine = words[i];
      }
    }
    lines.push(currentLine);
    return lines;
  }

  function initGame() {
    // Reset state
    selectedGauge = -1;
    selectionTime = 0;
    animTime = 0;
    entranceProgress = 0;
    hoveredGauge = -1;
    answerLocked = false;
    steamParticles = [];

    // 4 gauges arranged across the panel
    const gaugeRadius = 62;
    const gaugeSpacing = 160;
    const startX = (W - (gaugeSpacing * 3)) / 2;
    const gaugeY = 160;

    gauges = QUESTION.choices.map((choice, i) => ({
      x: startX + i * gaugeSpacing,
      y: gaugeY,
      radius: gaugeRadius,
      pressure: 0,         // 0 to 1 - current needle position
      targetPressure: 0,   // where needle is going
      needleAngle: -135,   // degrees, -135 = min, +135 = max
      choice: choice,
      index: i,
      scale: 0,
      alpha: 0,
      shakeX: 0,
      glowIntensity: 0,
    }));
  }

  function spawnSteam(x, y) {
    for (let i = 0; i < 8; i++) {
      steamParticles.push({
        x: x + (Math.random() - 0.5) * 20,
        y: y,
        vx: (Math.random() - 0.5) * 40,
        vy: -Math.random() * 80 - 30,
        size: 4 + Math.random() * 8,
        alpha: 0.5 + Math.random() * 0.3,
        life: 1,
      });
    }
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    animTime += dt;

    // Entrance animation
    if (entranceProgress < 1) {
      entranceProgress = Math.min(1, entranceProgress + dt * 2);
      gauges.forEach((g, i) => {
        const delay = i * 0.12;
        const t = Math.max(0, Math.min(1, (entranceProgress - delay) / 0.4));
        // Spring easing
        const spring = t < 1 ? t * (1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t)) : 1;
        g.scale = spring;
        g.alpha = t;
      });
    }

    // Update gauge pressures smoothly
    gauges.forEach((g, i) => {
      const diff = g.targetPressure - g.pressure;
      g.pressure += diff * dt * 4;

      // Needle angle: -135 (min) to +135 (max), mapped from pressure 0..1
      g.needleAngle = -135 + g.pressure * 270;

      // Glow pulsation for selected
      if (selectedGauge === i) {
        g.glowIntensity = 0.5 + Math.sin(animTime * 6) * 0.3;
      } else if (hoveredGauge === i) {
        g.glowIntensity = 0.3;
      } else {
        g.glowIntensity *= 0.9;
      }

      // Shake for wrong answer
      g.shakeX *= 0.9;

      // Steam particles when pressure is rising
      if (g.targetPressure > 0.5 && g.pressure < g.targetPressure - 0.05) {
        if (Math.random() < 0.3) {
          spawnSteam(g.x, g.y + g.radius + 10);
        }
      }
    });

    // Update steam particles
    steamParticles.forEach(p => {
      p.vy -= 60 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.size += dt * 12;
      p.life -= dt * 1.5;
      p.alpha = p.life * 0.4;
    });
    steamParticles = steamParticles.filter(p => p.life > 0);

    // Handle selection timing
    if (selectedGauge >= 0 && !answerLocked) {
      selectionTime += dt;
      if (selectionTime > 0.8) {
        answerLocked = true;
        const choice = gauges[selectedGauge].choice;
        if (choice.is_correct) {
          playSound('correct');
        } else {
          playSound('wrong');
          gauges[selectedGauge].shakeX = 10;
        }
        setTimeout(() => {
          engine.end(choice.is_correct, choice.explanation);
        }, 600);
      }
    }
  }

  function drawGame() {
    // Background - dark industrial panel
    ctx.fillStyle = COLORS.panelDark;
    ctx.fillRect(0, 0, W, H);

    // Panel texture - riveted steel plate
    drawPanelBackground();

    // Steam particles (behind gauges)
    drawSteamParticles();

    // Draw gauges
    gauges.forEach((g, i) => {
      ctx.save();
      ctx.translate(g.x + g.shakeX, g.y);
      ctx.scale(g.scale, g.scale);
      ctx.globalAlpha = g.alpha;

      drawGauge(g, i);

      ctx.globalAlpha = 1;
      ctx.restore();
    });

    // Draw answer text below gauges
    drawAnswerLabels();
  }

  function drawPanelBackground() {
    // Steel plate gradient
    const gradient = ctx.createLinearGradient(0, 0, 0, H);
    gradient.addColorStop(0, '#352F2A');
    gradient.addColorStop(0.3, '#3D3530');
    gradient.addColorStop(0.7, '#332D28');
    gradient.addColorStop(1, '#2A2420');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, W, H);

    // Horizontal plate lines
    ctx.strokeStyle = 'rgba(80, 70, 60, 0.4)';
    ctx.lineWidth = 1;
    for (let y = 0; y < H; y += 60) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }

    // Rivets along edges
    const rivetPositions = [];
    for (let x = 30; x < W; x += 80) {
      rivetPositions.push({ x, y: 20 });
      rivetPositions.push({ x, y: H - 20 });
    }
    for (let y = 60; y < H - 20; y += 80) {
      rivetPositions.push({ x: 20, y });
      rivetPositions.push({ x: W - 20, y });
    }

    rivetPositions.forEach(r => {
      // Rivet shadow
      ctx.beginPath();
      ctx.arc(r.x, r.y + 1, 5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
      ctx.fill();
      // Rivet body
      ctx.beginPath();
      ctx.arc(r.x, r.y, 5, 0, Math.PI * 2);
      const rivGrad = ctx.createRadialGradient(r.x - 1, r.y - 1, 0, r.x, r.y, 5);
      rivGrad.addColorStop(0, '#7B6B5F');
      rivGrad.addColorStop(1, '#5A4A3E');
      ctx.fillStyle = rivGrad;
      ctx.fill();
      // Rivet highlight
      ctx.beginPath();
      ctx.arc(r.x - 1, r.y - 1, 2, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(200, 180, 150, 0.3)';
      ctx.fill();
    });

    // Brass nameplate at top center
    const plateW = 320, plateH = 36;
    const plateX = (W - plateW) / 2, plateY = 30;

    ctx.save();
    // Plate shadow
    ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
    ctx.beginPath();
    ctx.roundRect(plateX + 2, plateY + 2, plateW, plateH, 4);
    ctx.fill();
    // Plate body
    const plateGrad = ctx.createLinearGradient(plateX, plateY, plateX, plateY + plateH);
    plateGrad.addColorStop(0, COLORS.brassHighlight);
    plateGrad.addColorStop(0.3, COLORS.brassLight);
    plateGrad.addColorStop(0.7, COLORS.brass);
    plateGrad.addColorStop(1, COLORS.brassDark);
    ctx.fillStyle = plateGrad;
    ctx.beginPath();
    ctx.roundRect(plateX, plateY, plateW, plateH, 4);
    ctx.fill();
    // Plate border
    ctx.strokeStyle = COLORS.brassDark;
    ctx.lineWidth = 1;
    ctx.stroke();
    // Engraved text
    ctx.font = "600 16px 'Nunito Sans', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#5A4A20';
    ctx.fillText('STEAM PRESSURE CONTROL', plateX + plateW / 2, plateY + plateH / 2 + 1);
    ctx.fillStyle = '#F0E8C0';
    ctx.fillText('STEAM PRESSURE CONTROL', plateX + plateW / 2, plateY + plateH / 2);
    ctx.restore();
  }

  function drawGauge(g, index) {
    const r = g.radius;

    // Glow effect for hovered/selected gauge
    if (g.glowIntensity > 0.05) {
      ctx.save();
      ctx.shadowColor = selectedGauge === index ? COLORS.orange : COLORS.cyan;
      ctx.shadowBlur = 20 * g.glowIntensity;
      ctx.beginPath();
      ctx.arc(0, 0, r + 4, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,0,0,0)';
      ctx.fill();
      ctx.restore();
    }

    // Gauge outer bezel (brass ring)
    const bezelGrad = ctx.createRadialGradient(-r * 0.2, -r * 0.2, 0, 0, 0, r + 10);
    bezelGrad.addColorStop(0, COLORS.brassHighlight);
    bezelGrad.addColorStop(0.4, COLORS.brassLight);
    bezelGrad.addColorStop(0.7, COLORS.brass);
    bezelGrad.addColorStop(1, COLORS.brassDark);
    ctx.beginPath();
    ctx.arc(0, 0, r + 8, 0, Math.PI * 2);
    ctx.fillStyle = bezelGrad;
    ctx.fill();

    // Inner dark circle (gauge face)
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    const faceGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, r);
    faceGrad.addColorStop(0, '#F8F4EC');
    faceGrad.addColorStop(0.85, '#EDE8DB');
    faceGrad.addColorStop(1, '#D8D0C0');
    ctx.fillStyle = faceGrad;
    ctx.fill();

    // Gauge markings
    ctx.save();
    for (let i = 0; i <= 10; i++) {
      const angle = (-135 + i * 27) * Math.PI / 180;
      const isMajor = i % 5 === 0 || i === 10;
      const innerR = r - (isMajor ? 16 : 10);
      const outerR = r - 4;

      ctx.beginPath();
      ctx.moveTo(Math.cos(angle) * innerR, Math.sin(angle) * innerR);
      ctx.lineTo(Math.cos(angle) * outerR, Math.sin(angle) * outerR);
      ctx.strokeStyle = i >= 8 ? COLORS.error : COLORS.textPrimary;
      ctx.lineWidth = isMajor ? 2.5 : 1.2;
      ctx.stroke();
    }
    ctx.restore();

    // Danger zone arc (red zone at high pressure)
    ctx.beginPath();
    const dangerStart = (-135 + 216) * Math.PI / 180; // 80% mark
    const dangerEnd = 135 * Math.PI / 180;
    ctx.arc(0, 0, r - 22, dangerStart, dangerEnd);
    ctx.strokeStyle = 'rgba(232, 93, 74, 0.3)';
    ctx.lineWidth = 8;
    ctx.stroke();

    // Number label for this gauge (1-4)
    ctx.font = "700 22px 'Belanosima', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = COLORS.brassDark;
    ctx.fillText((index + 1).toString(), 0, r * 0.42);

    // Needle
    ctx.save();
    const needleAngle = g.needleAngle * Math.PI / 180;
    ctx.rotate(needleAngle);

    // Needle shadow
    ctx.save();
    ctx.translate(1, 2);
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.moveTo(-3, 0);
    ctx.lineTo(0, -(r - 14));
    ctx.lineTo(3, 0);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // Needle body
    ctx.fillStyle = COLORS.error;
    ctx.beginPath();
    ctx.moveTo(-3, 6);
    ctx.lineTo(0, -(r - 14));
    ctx.lineTo(3, 6);
    ctx.closePath();
    ctx.fill();

    ctx.restore();

    // Center cap (brass knob)
    ctx.beginPath();
    ctx.arc(0, 0, 7, 0, Math.PI * 2);
    const capGrad = ctx.createRadialGradient(-2, -2, 0, 0, 0, 7);
    capGrad.addColorStop(0, COLORS.brassHighlight);
    capGrad.addColorStop(1, COLORS.brassDark);
    ctx.fillStyle = capGrad;
    ctx.fill();

    // Glass reflection
    ctx.beginPath();
    ctx.arc(-r * 0.2, -r * 0.25, r * 0.35, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
    ctx.fill();

    // Outer glass border
    ctx.beginPath();
    ctx.arc(0, 0, r + 2, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(0, 0, 0, 0.2)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  function drawAnswerLabels() {
    const gaugeSpacing = 160;
    const startX = (W - (gaugeSpacing * 3)) / 2;
    const labelY = 265;
    const labelWidth = 148;
    const labelFont = "400 16px 'Nunito', sans-serif";

    gauges.forEach((g, i) => {
      const x = startX + i * gaugeSpacing;

      // Answer card background
      const cardX = x - labelWidth / 2;
      const cardY = labelY;
      const cardW = labelWidth;

      // Wrap text to calculate card height
      const lines = wrapText(g.choice.text, cardW - 16, labelFont);
      const lineHeight = 19;
      const cardH = lines.length * lineHeight + 20;

      // Card shadow
      ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
      ctx.beginPath();
      ctx.roundRect(cardX + 2, cardY + 2, cardW, cardH, 8);
      ctx.fill();

      // Card background
      let cardBg = 'rgba(250, 250, 247, 0.92)';
      let borderColor = COLORS.borderSubtle;

      if (selectedGauge === i && answerLocked) {
        cardBg = g.choice.is_correct ? 'rgba(107, 191, 89, 0.2)' : 'rgba(232, 93, 74, 0.2)';
        borderColor = g.choice.is_correct ? COLORS.success : COLORS.error;
      } else if (hoveredGauge === i || selectedGauge === i) {
        cardBg = 'rgba(232, 249, 248, 0.95)';
        borderColor = COLORS.cyan;
      }

      ctx.fillStyle = cardBg;
      ctx.beginPath();
      ctx.roundRect(cardX, cardY, cardW, cardH, 8);
      ctx.fill();
      ctx.strokeStyle = borderColor;
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Answer text
      ctx.font = labelFont;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillStyle = COLORS.textPrimary;

      lines.forEach((line, li) => {
        ctx.fillText(line, x, cardY + 10 + li * lineHeight);
      });
    });
  }

  function drawSteamParticles() {
    steamParticles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(220, 215, 200, ${p.alpha})`;
      ctx.fill();
    });
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;
    if (answerLocked) return;

    const key = e.key;
    const num = parseInt(key);

    if (num >= 1 && num <= 4) {
      e.preventDefault();
      playSound('click');

      // If pressing same key, ignore
      if (selectedGauge === num - 1) return;

      // Reset previous gauge
      if (selectedGauge >= 0) {
        gauges[selectedGauge].targetPressure = 0;
      }

      // Select new gauge
      selectedGauge = num - 1;
      selectionTime = 0;
      gauges[selectedGauge].targetPressure = 1;

      // Play steam sound
      playSound('steam');

      // Spawn extra steam
      const g = gauges[selectedGauge];
      for (let j = 0; j < 5; j++) {
        spawnSteam(g.x, g.y + g.radius + 10);
      }
    }
  }

  // +========================================================================+
  // |  SECTION 4: GAME LOOP - DO NOT MODIFY                                  |
  // |  Standard loop with responsive scaling and DPR support.                |
  // +========================================================================+
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
