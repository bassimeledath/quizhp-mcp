<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phase Transition</title>
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === GAME STATE ===
  let mouseX = W / 2;
  let mouseY = H / 2;
  let temperature = 0.5; // 0-1 normalized
  let pressure = 0.5; // 0-1 normalized
  let gameTime = 0;
  let selectedMarker = -1;
  let hoveredMarker = -1;
  let markerRevealProgress = [0, 0, 0, 0];
  let clickCooldown = 0;

  // Phase diagram boundaries (in normalized coords)
  // Triple point at (0.2, 0.2), critical point at (0.7, 0.7)
  const triplePoint = { t: 0.2, p: 0.2 };
  const criticalPoint = { t: 0.7, p: 0.7 };

  // Answer markers - each in a different phase region
  let markers = [];

  // Audio context for sounds
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'reveal') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(440, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.2);
    } else if (type === 'click') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(220, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.05);
    } else if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    }
  }

  // Determine phase from normalized temp/pressure
  function getPhase(t, p) {
    // Below triple point pressure - sublimation line divides solid and gas
    if (p < triplePoint.p) {
      if (t < triplePoint.t) return 'solid';
      return 'gas';
    }
    // Above critical point - supercritical fluid
    if (t > criticalPoint.t && p > criticalPoint.p) {
      return 'supercritical';
    }
    // Solid region: low temperature, high pressure
    // Melting curve from triple point going up-left
    const meltingT = triplePoint.t - (p - triplePoint.p) * 0.15;
    if (t < meltingT) return 'solid';
    // Gas region: high temperature, low pressure
    // Vaporization curve from triple point to critical point
    const vaporP = triplePoint.p + (t - triplePoint.t) / (criticalPoint.t - triplePoint.t) * (criticalPoint.p - triplePoint.p);
    if (t < criticalPoint.t && p < vaporP) return 'gas';
    if (t >= criticalPoint.t && p < criticalPoint.p) return 'gas';
    // Otherwise liquid
    return 'liquid';
  }

  function initGame() {
    gameTime = 0;
    selectedMarker = -1;
    markerRevealProgress = [0, 0, 0, 0];
    clickCooldown = 0;

    // Place markers in different phases
    // Marker 0: Solid (low T, high P)
    // Marker 1: Liquid (mid T, high P)
    // Marker 2: Gas (high T, low P)
    // Marker 3: Supercritical (high T, high P)
    markers = [
      { t: 0.12, p: 0.65, phase: 'solid', revealed: false, pulsePhase: 0 },
      { t: 0.45, p: 0.55, phase: 'liquid', revealed: false, pulsePhase: Math.PI * 0.5 },
      { t: 0.55, p: 0.15, phase: 'gas', revealed: false, pulsePhase: Math.PI },
      { t: 0.85, p: 0.85, phase: 'supercritical', revealed: false, pulsePhase: Math.PI * 1.5 }
    ];
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;
    if (clickCooldown > 0) clickCooldown -= dt;

    // Update marker pulse phases
    markers.forEach(m => {
      m.pulsePhase += dt * 3;
    });

    // Check if cursor is near each marker
    for (let i = 0; i < markers.length; i++) {
      const m = markers[i];
      const dist = Math.sqrt((temperature - m.t) ** 2 + (pressure - m.p) ** 2);

      if (dist < 0.08) {
        // Close enough - start revealing
        if (markerRevealProgress[i] < 1) {
          markerRevealProgress[i] = Math.min(1, markerRevealProgress[i] + dt * 2);
          if (markerRevealProgress[i] >= 1 && !m.revealed) {
            m.revealed = true;
            playSound('reveal');
          }
        }
      } else if (!m.revealed) {
        // Only hide if not yet fully revealed — once revealed, stay revealed
        markerRevealProgress[i] = Math.max(0, markerRevealProgress[i] - dt * 0.5);
      }
    }
  }

  function drawGame() {
    // Background
    ctx.fillStyle = '#FAFAF7';
    ctx.fillRect(0, 0, W, H);

    const diagramX = 40;
    const diagramY = 30;
    const diagramW = 440;
    const diagramH = 380;

    // Draw phase diagram
    drawPhaseDiagram(diagramX, diagramY, diagramW, diagramH);

    // Draw cursor position indicator
    const cursorX = diagramX + temperature * diagramW;
    const cursorY = diagramY + (1 - pressure) * diagramH;

    // Crosshair
    ctx.strokeStyle = '#E87A3E';
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 5]);
    ctx.beginPath();
    ctx.moveTo(cursorX, diagramY);
    ctx.lineTo(cursorX, diagramY + diagramH);
    ctx.moveTo(diagramX, cursorY);
    ctx.lineTo(diagramX + diagramW, cursorY);
    ctx.stroke();
    ctx.setLineDash([]);

    // Cursor circle
    ctx.fillStyle = '#E87A3E';
    ctx.beginPath();
    ctx.arc(cursorX, cursorY, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#FFFFFF';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Draw markers
    drawMarkers(diagramX, diagramY, diagramW, diagramH);

    // Draw answer choices panel
    drawAnswerPanel();

    // Draw current conditions
    drawConditions(diagramX, diagramY + diagramH + 20);
  }

  function drawPhaseDiagram(x, y, w, h) {
    // Draw phase regions with gradients
    ctx.save();
    ctx.beginPath();
    ctx.rect(x, y, w, h);
    ctx.clip();

    // Sample points to color the diagram
    const resolution = 8;
    for (let i = 0; i < w; i += resolution) {
      for (let j = 0; j < h; j += resolution) {
        const t = i / w;
        const p = 1 - j / h;
        const phase = getPhase(t, p);

        let color;
        switch (phase) {
          case 'solid': color = 'rgba(78, 205, 196, 0.3)'; break; // Cyan
          case 'liquid': color = 'rgba(107, 191, 89, 0.3)'; break; // Green
          case 'gas': color = 'rgba(245, 167, 66, 0.3)'; break; // Amber
          case 'supercritical': color = 'rgba(232, 122, 62, 0.3)'; break; // Orange
        }
        ctx.fillStyle = color;
        ctx.fillRect(x + i, y + j, resolution, resolution);
      }
    }

    ctx.restore();

    // Draw phase boundaries
    ctx.strokeStyle = '#2B2B28';
    ctx.lineWidth = 2;

    // Triple point
    const tpX = x + triplePoint.t * w;
    const tpY = y + (1 - triplePoint.p) * h;

    // Critical point
    const cpX = x + criticalPoint.t * w;
    const cpY = y + (1 - criticalPoint.p) * h;

    // Sublimation line (solid-gas below triple point)
    ctx.beginPath();
    ctx.moveTo(x, y + h);
    ctx.lineTo(tpX, tpY);
    ctx.stroke();

    // Melting curve (solid-liquid)
    ctx.beginPath();
    ctx.moveTo(tpX, tpY);
    const meltEndT = triplePoint.t - 0.15;
    ctx.lineTo(x + meltEndT * w, y);
    ctx.stroke();

    // Vaporization curve (liquid-gas)
    ctx.beginPath();
    ctx.moveTo(tpX, tpY);
    ctx.quadraticCurveTo(
      x + (triplePoint.t + criticalPoint.t) / 2 * w,
      y + (1 - (triplePoint.p + criticalPoint.p) / 2) * h - 20,
      cpX, cpY
    );
    ctx.stroke();

    // Mark triple point
    ctx.fillStyle = '#2B2B28';
    ctx.beginPath();
    ctx.arc(tpX, tpY, 5, 0, Math.PI * 2);
    ctx.fill();

    // Mark critical point
    ctx.fillStyle = '#E85D4A';
    ctx.beginPath();
    ctx.arc(cpX, cpY, 5, 0, Math.PI * 2);
    ctx.fill();

    // Phase labels
    ctx.font = '600 16px Nunito Sans';
    ctx.fillStyle = '#2B2B28';
    ctx.textAlign = 'center';
    ctx.fillText('SOLID', x + 60, y + 80);
    ctx.fillText('LIQUID', x + 200, y + 120);
    ctx.fillText('GAS', x + 280, y + 320);
    ctx.fillText('SUPER-', x + 380, y + 60);
    ctx.fillText('CRITICAL', x + 380, y + 80);

    // Axis labels
    ctx.font = '600 14px Nunito Sans';
    ctx.fillStyle = '#2B2B28';
    ctx.textAlign = 'center';
    ctx.fillText('Temperature →', x + w / 2, y + h + 35);

    ctx.save();
    ctx.translate(x - 25, y + h / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText('Pressure →', 0, 0);
    ctx.restore();

    // Border
    ctx.strokeStyle = '#2B2B28';
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, w, h);
  }

  function drawMarkers(diagramX, diagramY, diagramW, diagramH) {
    const letters = ['A', 'B', 'C', 'D'];

    for (let i = 0; i < markers.length; i++) {
      const m = markers[i];
      const mx = diagramX + m.t * diagramW;
      const my = diagramY + (1 - m.p) * diagramH;
      const progress = markerRevealProgress[i];

      if (progress > 0) {
        const isHovered = hoveredMarker === i;
        const isSelected = selectedMarker === i;
        const pulse = 1 + Math.sin(m.pulsePhase) * 0.1;
        const radius = (isHovered || isSelected ? 22 : 18) * progress * pulse;
        const alpha = progress;

        // Glow effect (stronger when hovered or selected)
        const glowRadius = (isHovered || isSelected) ? radius * 3 : radius * 2;
        const glowAlpha = (isHovered || isSelected) ? 0.7 : 0.5;
        const glowColor = isSelected ? '78, 205, 196' : '232, 122, 62';
        const gradient = ctx.createRadialGradient(mx, my, 0, mx, my, glowRadius);
        gradient.addColorStop(0, `rgba(${glowColor}, ${glowAlpha * alpha})`);
        gradient.addColorStop(1, `rgba(${glowColor}, 0)`);
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(mx, my, glowRadius, 0, Math.PI * 2);
        ctx.fill();

        // Marker circle
        ctx.fillStyle = (isHovered || isSelected) ? `rgba(78, 205, 196, ${alpha})` : `rgba(232, 122, 62, ${alpha})`;
        ctx.beginPath();
        ctx.arc(mx, my, radius, 0, Math.PI * 2);
        ctx.fill();

        // Border (highlight on hover or selected)
        ctx.strokeStyle = (isHovered || isSelected) ? `rgba(78, 205, 196, ${alpha})` : `rgba(255, 255, 255, ${alpha})`;
        ctx.lineWidth = (isHovered || isSelected) ? 4 : 3;
        ctx.stroke();

        // Letter
        ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
        ctx.font = `bold ${16 * progress}px Belanosima`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(letters[i], mx, my);
      } else {
        // Hidden marker hint (very faint)
        ctx.fillStyle = 'rgba(232, 122, 62, 0.15)';
        ctx.beginPath();
        ctx.arc(mx, my, 6, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  function drawAnswerPanel() {
    const panelX = 500;
    const panelY = 30;
    const panelW = 200;
    const buttonH = 80;
    const gap = 8;

    ctx.font = '600 16px Nunito Sans';
    ctx.fillStyle = '#2B2B28';
    ctx.textAlign = 'left';
    ctx.fillText('Find marker, then click:', panelX, panelY);

    for (let i = 0; i < QUESTION.choices.length; i++) {
      const choice = QUESTION.choices[i];
      const by = panelY + 20 + i * (buttonH + gap);
      const revealed = markers[i].revealed;
      const isSelected = selectedMarker === i;
      const progress = markerRevealProgress[i];

      // Button background with entrance animation
      const bounceScale = Math.min(1, gameTime * 2 - i * 0.1);
      const bScale = bounceScale > 0 ? 1 + Math.sin(bounceScale * Math.PI) * 0.05 : 0;

      if (bScale > 0) {
        ctx.save();
        ctx.translate(panelX + panelW / 2, by + buttonH / 2);
        ctx.scale(bScale, bScale);
        ctx.translate(-(panelX + panelW / 2), -(by + buttonH / 2));

        // Background - cyan for selected, orange for revealed, grey for hidden
        const bgColor = isSelected ? '#4ECDC4' : (revealed ? '#E87A3E' : '#E0E0DD');
        ctx.fillStyle = bgColor;
        ctx.beginPath();
        ctx.roundRect(panelX, by, panelW, buttonH, 8);
        ctx.fill();

        // Border glow if selected or revealed
        if (isSelected) {
          ctx.strokeStyle = 'rgba(78, 205, 196, 0.9)';
          ctx.lineWidth = 4;
          ctx.stroke();
        } else if (progress > 0.5) {
          ctx.strokeStyle = `rgba(232, 122, 62, ${(progress - 0.5) * 2})`;
          ctx.lineWidth = 3;
          ctx.stroke();
        }

        // Letter badge
        const letters = ['A', 'B', 'C', 'D'];
        ctx.fillStyle = (revealed || isSelected) ? '#FFFFFF' : '#2B2B28';
        ctx.font = 'bold 18px Belanosima';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(letters[i], panelX + 20, by + 20);

        // Answer text with word wrap
        ctx.fillStyle = (revealed || isSelected) ? '#FFFFFF' : '#666663';
        ctx.font = '14px Nunito';
        ctx.textAlign = 'left';
        wrapText(choice.text, panelX + 10, by + 38, panelW - 20, 16);

        ctx.restore();
      }
    }

    // Confirm button (appears when a marker is selected)
    if (selectedMarker >= 0) {
      const confirmBtnY = panelY + 20 + 4 * (buttonH + gap) + 4;
      const confirmBtnH = 36;
      const pulse = 1 + Math.sin(gameTime * 5) * 0.03;

      ctx.save();
      ctx.translate(panelX + panelW / 2, confirmBtnY + confirmBtnH / 2);
      ctx.scale(pulse, pulse);
      ctx.translate(-(panelX + panelW / 2), -(confirmBtnY + confirmBtnH / 2));

      ctx.fillStyle = '#6BBF59';
      ctx.beginPath();
      ctx.roundRect(panelX, confirmBtnY, panelW, confirmBtnH, 8);
      ctx.fill();

      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 16px Nunito Sans';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const letters = ['A', 'B', 'C', 'D'];
      ctx.fillText('Confirm ' + letters[selectedMarker], panelX + panelW / 2, confirmBtnY + confirmBtnH / 2);

      ctx.restore();
    }
  }

  function wrapText(text, x, y, maxWidth, lineHeight) {
    const words = text.split(' ');
    let line = '';
    let testLine = '';
    let lineCount = 0;

    for (let n = 0; n < words.length; n++) {
      testLine = line + words[n] + ' ';
      const metrics = ctx.measureText(testLine);
      if (metrics.width > maxWidth && n > 0) {
        ctx.fillText(line.trim(), x, y + lineCount * lineHeight);
        line = words[n] + ' ';
        lineCount++;
        if (lineCount >= 3) {
          // Max 3 lines, add remaining text
          line = line.trim();
          break;
        }
      } else {
        line = testLine;
      }
    }
    ctx.fillText(line.trim(), x, y + lineCount * lineHeight);
  }

  function drawConditions(x, y) {
    const phase = getPhase(temperature, pressure);
    const phaseColors = {
      'solid': '#4ECDC4',
      'liquid': '#6BBF59',
      'gas': '#F5A742',
      'supercritical': '#E87A3E'
    };

    ctx.font = '600 16px Nunito Sans';
    ctx.fillStyle = '#2B2B28';
    ctx.textAlign = 'left';

    const tempK = Math.round(100 + temperature * 500);
    const pressAtm = (0.1 + pressure * 100).toFixed(1);

    ctx.fillText(`T: ${tempK}K   P: ${pressAtm} atm`, x, y);

    ctx.fillStyle = phaseColors[phase];
    ctx.fillText(`Phase: ${phase.charAt(0).toUpperCase() + phase.slice(1)}`, x + 220, y);
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;

    // Space or Enter: confirm the currently selected marker, or select closest if none selected
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      initAudio();

      if (selectedMarker >= 0) {
        // Confirm the selected answer
        confirmAnswer();
      } else {
        // Select the closest revealed marker to the cursor
        let bestIdx = -1;
        let bestDist = Infinity;
        for (let i = 0; i < markers.length; i++) {
          if (!markers[i].revealed) continue;
          const dist = Math.sqrt((temperature - markers[i].t) ** 2 + (pressure - markers[i].p) ** 2);
          if (dist < 0.1 && dist < bestDist) {
            bestDist = dist;
            bestIdx = i;
          }
        }
        if (bestIdx >= 0) {
          selectAnswer(bestIdx);
        }
      }
    }
  }

  // Mouse move handler
  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'playing') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    // Map to diagram coordinates
    const diagramX = 40;
    const diagramY = 30;
    const diagramW = 440;
    const diagramH = 380;

    // Clamp to diagram bounds
    temperature = Math.max(0, Math.min(1, (x - diagramX) / diagramW));
    pressure = Math.max(0, Math.min(1, 1 - (y - diagramY) / diagramH));

    mouseX = x;
    mouseY = y;

    // Check hover on revealed markers for visual feedback
    hoveredMarker = -1;
    for (let i = 0; i < markers.length; i++) {
      if (!markers[i].revealed) continue;
      const mx = diagramX + markers[i].t * diagramW;
      const my = diagramY + (1 - markers[i].p) * diagramH;
      const dist = Math.sqrt((x - mx) ** 2 + (y - my) ** 2);
      if (dist < 25) {
        hoveredMarker = i;
        break;
      }
    }
  });

  // Helper to toggle selection or confirm an answer by index
  function selectAnswer(i) {
    if (!markers[i].revealed) return;
    initAudio();
    playSound('click');

    if (selectedMarker === i) {
      // Already selected — unselect (toggle off)
      selectedMarker = -1;
    } else {
      // Select this marker
      selectedMarker = i;
    }
  }

  // Confirm the currently selected answer
  function confirmAnswer() {
    if (selectedMarker < 0) return;
    initAudio();
    const choice = QUESTION.choices[selectedMarker];
    playSound(choice.is_correct ? 'correct' : 'wrong');
    engine.end(choice.is_correct, choice.explanation);
  }

  // Click handler for selecting/toggling answers
  canvas.addEventListener('click', (e) => {
    initAudio();

    if (gameState !== 'playing') return;
    if (clickCooldown > 0) return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    const panelX = 500;
    const panelY = 30;
    const panelW = 200;
    const buttonH = 80;
    const gap = 8;

    // Check Confirm button first
    if (selectedMarker >= 0) {
      const confirmBtnY = panelY + 20 + 4 * (buttonH + gap) + 4;
      const confirmBtnH = 36;
      if (x >= panelX && x <= panelX + panelW &&
          y >= confirmBtnY && y <= confirmBtnY + confirmBtnH) {
        confirmAnswer();
        clickCooldown = 0.3;
        return;
      }
    }

    // Check if clicking on a revealed marker in the diagram (toggle select/deselect)
    const diagramX = 40;
    const diagramY = 30;
    const diagramW = 440;
    const diagramH = 380;

    for (let i = 0; i < markers.length; i++) {
      if (!markers[i].revealed) continue;
      const mx = diagramX + markers[i].t * diagramW;
      const my = diagramY + (1 - markers[i].p) * diagramH;
      const dist = Math.sqrt((x - mx) ** 2 + (y - my) ** 2);
      if (dist < 25) {
        selectAnswer(i);
        clickCooldown = 0.2;
        return;
      }
    }

    // Check if clicking on answer panel buttons (toggle select/deselect)
    for (let i = 0; i < QUESTION.choices.length; i++) {
      const by = panelY + 20 + i * (buttonH + gap);

      if (x >= panelX && x <= panelX + panelW &&
          y >= by && y <= by + buttonH) {
        selectAnswer(i);
        clickCooldown = 0.2;
        return;
      }
    }
  });

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
