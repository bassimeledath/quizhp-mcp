<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Station Hatchways</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgPrimary: '#0B0E1A',
    wallPanel: '#1A1F35',
    wallPanelLight: '#242B48',
    hatchFrame: '#3A4060',
    hatchSurface: '#2A3050',
    hatchHighlight: '#4A5278',
    hatchGlow: '#4ECDC4',
    hatchGlowCorrect: '#6BBF59',
    hatchGlowWrong: '#E85D4A',
    textPrimary: '#F5F5F0',
    textSecondary: '#C2C2B8',
    textDim: '#8C8C84',
    orange: '#E87A3E',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    rivetColor: '#555B78',
    rivetHighlight: '#6A7098'
  };

  // === SOUND ENGINE ===
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;

  function getAudioCtx() {
    if (!audioCtx) audioCtx = new AudioCtx();
    return audioCtx;
  }

  function playClickSound() {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(900, ac.currentTime + 0.05);
      gain.gain.setValueAtTime(0.15, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.1);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.1);
    } catch(e) {}
  }

  function playCorrectSound() {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, ac.currentTime);
      osc.frequency.setValueAtTime(659, ac.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, ac.currentTime + 0.2);
      gain.gain.setValueAtTime(0.2, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.4);
    } catch(e) {}
  }

  function playWrongSound() {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(300, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(150, ac.currentTime + 0.3);
      gain.gain.setValueAtTime(0.15, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.35);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.35);
    } catch(e) {}
  }

  function playHatchOpenSound() {
    try {
      const ac = getAudioCtx();
      // Pneumatic hiss
      const bufferSize = ac.sampleRate * 0.2;
      const buffer = ac.createBuffer(1, bufferSize, ac.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.3));
      }
      const noise = ac.createBufferSource();
      noise.buffer = buffer;
      const filter = ac.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 3000;
      filter.Q.value = 2;
      const gain = ac.createGain();
      gain.gain.setValueAtTime(0.08, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.2);
      noise.connect(filter);
      filter.connect(gain);
      gain.connect(ac.destination);
      noise.start(ac.currentTime);
      // Clunk
      const osc = ac.createOscillator();
      const oscGain = ac.createGain();
      osc.connect(oscGain);
      oscGain.connect(ac.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(120, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(60, ac.currentTime + 0.1);
      oscGain.gain.setValueAtTime(0.12, ac.currentTime);
      oscGain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.15);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.15);
    } catch(e) {}
  }

  // === GAME STATE ===
  let hatches = [];
  let hoveredHatch = -1;
  let selectedHatch = -1;
  let gameTime = 0;
  let answered = false;
  let answerAnimTime = 0;
  let stars = [];
  let particlesArr = [];

  // Entrance animation state
  let entranceProgress = [];

  // Hatch open animation
  let hatchOpenProgress = 0; // 0 to 1

  const HATCH_W = 320;
  const HATCH_H = 100;
  const HATCH_GAP = 12;
  const HATCH_START_X = (W - HATCH_W) / 2;
  const HATCH_START_Y = 48;

  function wrapText(text, maxWidth, font) {
    ctx.save();
    ctx.font = font;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    for (let i = 0; i < words.length; i++) {
      const testLine = currentLine ? currentLine + ' ' + words[i] : words[i];
      if (ctx.measureText(testLine).width > maxWidth && currentLine) {
        lines.push(currentLine);
        currentLine = words[i];
      } else {
        currentLine = testLine;
      }
    }
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines;
  }

  function initGame() {
    hatches = [];
    hoveredHatch = -1;
    selectedHatch = -1;
    gameTime = 0;
    answered = false;
    answerAnimTime = 0;
    hatchOpenProgress = 0;
    particlesArr = [];
    entranceProgress = [];

    // Create 4 hatches in vertical stack
    for (let i = 0; i < QUESTION.choices.length; i++) {
      const y = HATCH_START_Y + i * (HATCH_H + HATCH_GAP);
      hatches.push({
        x: HATCH_START_X,
        y: y,
        w: HATCH_W,
        h: HATCH_H,
        choice: QUESTION.choices[i],
        index: i,
        glowIntensity: 0,
        scale: 1,
        offsetX: 0,
        alpha: 1
      });
      entranceProgress.push({ progress: 0, started: false });
    }

    // Starfield background
    stars = [];
    for (let i = 0; i < 60; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        size: Math.random() * 2 + 0.5,
        twinkleSpeed: Math.random() * 3 + 1,
        twinkleOffset: Math.random() * Math.PI * 2
      });
    }
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;
    gameTime += dt;

    // Entrance animation - stagger each hatch
    for (let i = 0; i < entranceProgress.length; i++) {
      const delay = i * 0.1;
      if (gameTime >= delay && !entranceProgress[i].started) {
        entranceProgress[i].started = true;
      }
      if (entranceProgress[i].started && entranceProgress[i].progress < 1) {
        entranceProgress[i].progress = Math.min(1, entranceProgress[i].progress + dt * 3.5);
      }
    }

    // Hatch hover glow animation
    for (let i = 0; i < hatches.length; i++) {
      const h = hatches[i];
      const targetGlow = (i === hoveredHatch && !answered) ? 1 : 0;
      h.glowIntensity += (targetGlow - h.glowIntensity) * dt * 8;
    }

    // Answer animation
    if (answered) {
      answerAnimTime += dt;
      hatchOpenProgress = Math.min(1, hatchOpenProgress + dt * 3);

      // Shake wrong answer
      if (selectedHatch >= 0 && !hatches[selectedHatch].choice.is_correct) {
        const decay = Math.max(0, 1 - answerAnimTime * 2.5);
        hatches[selectedHatch].offsetX = Math.sin(answerAnimTime * 40) * 8 * decay;
      }

      // Scale pulse correct answer
      if (selectedHatch >= 0 && hatches[selectedHatch].choice.is_correct) {
        const pulse = 1 + Math.sin(answerAnimTime * 8) * 0.03 * Math.max(0, 1 - answerAnimTime);
        hatches[selectedHatch].scale = pulse;
      }

      // Update particles
      particlesArr = particlesArr.filter(p => {
        p.vy += 500 * dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.rotation += p.rotSpeed * dt;
        p.alpha -= dt * 1.2;
        return p.alpha > 0;
      });

      // End game after animation
      if (answerAnimTime > 0.8 && selectedHatch >= 0) {
        const choice = hatches[selectedHatch].choice;
        engine.end(choice.is_correct, choice.explanation);
      }
    }
  }

  function drawGame() {
    // Space background - deep dark
    ctx.fillStyle = COLORS.bgPrimary;
    ctx.fillRect(0, 0, W, H);

    // Draw stars
    for (const star of stars) {
      const twinkle = 0.4 + 0.6 * Math.abs(Math.sin(gameTime * star.twinkleSpeed + star.twinkleOffset));
      ctx.globalAlpha = twinkle * 0.7;
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Draw metallic wall panel behind hatches
    const panelX = HATCH_START_X - 40;
    const panelY = HATCH_START_Y - 30;
    const panelW = HATCH_W + 80;
    const panelH = (HATCH_H + HATCH_GAP) * 4 - HATCH_GAP + 60;

    // Panel gradient
    const panelGrad = ctx.createLinearGradient(panelX, panelY, panelX + panelW, panelY + panelH);
    panelGrad.addColorStop(0, COLORS.wallPanel);
    panelGrad.addColorStop(0.5, COLORS.wallPanelLight);
    panelGrad.addColorStop(1, COLORS.wallPanel);
    ctx.fillStyle = panelGrad;
    ctx.beginPath();
    ctx.roundRect(panelX, panelY, panelW, panelH, 8);
    ctx.fill();

    // Panel border lines
    ctx.strokeStyle = '#3A4060';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(panelX, panelY, panelW, panelH, 8);
    ctx.stroke();

    // Panel rivets
    const rivetPositions = [
      [panelX + 14, panelY + 14], [panelX + panelW - 14, panelY + 14],
      [panelX + 14, panelY + panelH - 14], [panelX + panelW - 14, panelY + panelH - 14],
      [panelX + 14, panelY + panelH / 2], [panelX + panelW - 14, panelY + panelH / 2]
    ];
    for (const [rx, ry] of rivetPositions) {
      ctx.beginPath();
      ctx.arc(rx, ry, 4, 0, Math.PI * 2);
      ctx.fillStyle = COLORS.rivetColor;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(rx - 1, ry - 1, 1.5, 0, Math.PI * 2);
      ctx.fillStyle = COLORS.rivetHighlight;
      ctx.fill();
    }

    // Horizontal panel seam lines
    for (let i = 1; i < 4; i++) {
      const seamY = HATCH_START_Y + i * (HATCH_H + HATCH_GAP) - HATCH_GAP / 2;
      ctx.strokeStyle = '#2A3050';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(panelX + 8, seamY);
      ctx.lineTo(panelX + panelW - 8, seamY);
      ctx.stroke();
    }

    // Draw hatches
    for (let i = 0; i < hatches.length; i++) {
      const h = hatches[i];
      const ep = entranceProgress[i] ? entranceProgress[i].progress : 1;

      // Spring easing for entrance
      const springEase = ep < 1
        ? ep * (1 + Math.sin(ep * Math.PI * 2) * 0.15 * (1 - ep))
        : 1;

      ctx.save();

      // Entrance: scale from center
      const cx = h.x + h.w / 2;
      const cy = h.y + h.h / 2;
      ctx.translate(cx + h.offsetX, cy);
      ctx.scale(h.scale * springEase, h.scale * springEase);
      ctx.translate(-cx, -cy);

      ctx.globalAlpha = springEase;

      const isHovered = i === hoveredHatch && !answered;
      const isSelected = i === selectedHatch;
      const isCorrectSelected = isSelected && h.choice.is_correct && answered;
      const isWrongSelected = isSelected && !h.choice.is_correct && answered;

      // Glow effect behind hatch
      if (h.glowIntensity > 0.01 || isCorrectSelected || isWrongSelected) {
        let glowColor;
        if (isCorrectSelected) glowColor = COLORS.hatchGlowCorrect;
        else if (isWrongSelected) glowColor = COLORS.hatchGlowWrong;
        else glowColor = COLORS.hatchGlow;

        const intensity = isSelected ? 0.6 : h.glowIntensity * 0.4;
        ctx.shadowColor = glowColor;
        ctx.shadowBlur = 20 + h.glowIntensity * 15;
        ctx.fillStyle = glowColor;
        ctx.globalAlpha = intensity * springEase;
        ctx.beginPath();
        ctx.roundRect(h.x - 3, h.y - 3, h.w + 6, h.h + 6, 14);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.globalAlpha = springEase;
      }

      // Hatch body
      let hatchBodyColor;
      if (isCorrectSelected) {
        hatchBodyColor = '#1A3A1A';
      } else if (isWrongSelected) {
        hatchBodyColor = '#3A1A1A';
      } else {
        const grad = ctx.createLinearGradient(h.x, h.y, h.x, h.y + h.h);
        grad.addColorStop(0, isHovered ? '#3A4268' : COLORS.hatchSurface);
        grad.addColorStop(1, isHovered ? '#2E3558' : '#222840');
        hatchBodyColor = grad;
      }

      ctx.fillStyle = hatchBodyColor;
      ctx.beginPath();
      ctx.roundRect(h.x, h.y, h.w, h.h, 12);
      ctx.fill();

      // Hatch border
      let borderColor;
      if (isCorrectSelected) borderColor = COLORS.hatchGlowCorrect;
      else if (isWrongSelected) borderColor = COLORS.hatchGlowWrong;
      else if (isHovered) borderColor = COLORS.cyan;
      else borderColor = COLORS.hatchFrame;

      ctx.strokeStyle = borderColor;
      ctx.lineWidth = isSelected ? 3 : 2;
      ctx.beginPath();
      ctx.roundRect(h.x, h.y, h.w, h.h, 12);
      ctx.stroke();

      // Inner highlight line (top edge metallic sheen)
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(h.x + 14, h.y + 2);
      ctx.lineTo(h.x + h.w - 14, h.y + 2);
      ctx.stroke();

      // Hatch number badge (left side)
      const badgeR = 16;
      const badgeX = h.x + 28;
      const badgeY = h.y + h.h / 2;

      // Badge circle
      let badgeFill;
      if (isCorrectSelected) badgeFill = COLORS.hatchGlowCorrect;
      else if (isWrongSelected) badgeFill = COLORS.hatchGlowWrong;
      else if (isHovered) badgeFill = COLORS.cyan;
      else badgeFill = COLORS.orange;

      ctx.beginPath();
      ctx.arc(badgeX, badgeY, badgeR, 0, Math.PI * 2);
      ctx.fillStyle = badgeFill;
      ctx.fill();

      // Badge number
      ctx.font = "700 18px 'Belanosima', sans-serif";
      ctx.fillStyle = '#FFFFFF';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String(i + 1), badgeX, badgeY);

      // Answer text (right of badge)
      const textX = h.x + 58;
      const textMaxW = h.w - 72;
      const textFont = "400 16px 'Nunito', sans-serif";
      const lines = wrapText(h.choice.text, textMaxW, textFont);

      ctx.font = textFont;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';

      let textColor;
      if (isCorrectSelected) textColor = '#A0F0A0';
      else if (isWrongSelected) textColor = '#F0A0A0';
      else if (isHovered) textColor = '#FFFFFF';
      else textColor = COLORS.textSecondary;

      ctx.fillStyle = textColor;

      const lineHeight = 20;
      const totalTextH = lines.length * lineHeight;
      const textStartY = h.y + (h.h - totalTextH) / 2 + lineHeight / 2;

      for (let l = 0; l < lines.length; l++) {
        ctx.fillText(lines[l], textX, textStartY + l * lineHeight);
      }

      // Hatch opening animation (selected hatch shows a reveal line)
      if (isSelected && answered && hatchOpenProgress > 0) {
        const openWidth = hatchOpenProgress * 4;
        ctx.strokeStyle = isCorrectSelected ? COLORS.hatchGlowCorrect : COLORS.hatchGlowWrong;
        ctx.lineWidth = openWidth;
        ctx.globalAlpha = hatchOpenProgress * springEase;
        ctx.beginPath();
        ctx.moveTo(h.x + 12, h.y + 2);
        ctx.lineTo(h.x + h.w - 12, h.y + 2);
        ctx.stroke();
        ctx.globalAlpha = springEase;
      }

      // Decorative corner brackets
      const bracketLen = 10;
      const bracketOff = 6;
      ctx.strokeStyle = isHovered ? 'rgba(78, 205, 196, 0.5)' : 'rgba(255, 255, 255, 0.1)';
      ctx.lineWidth = 1.5;
      // Top-left
      ctx.beginPath();
      ctx.moveTo(h.x + bracketOff, h.y + bracketOff + bracketLen);
      ctx.lineTo(h.x + bracketOff, h.y + bracketOff);
      ctx.lineTo(h.x + bracketOff + bracketLen, h.y + bracketOff);
      ctx.stroke();
      // Top-right
      ctx.beginPath();
      ctx.moveTo(h.x + h.w - bracketOff - bracketLen, h.y + bracketOff);
      ctx.lineTo(h.x + h.w - bracketOff, h.y + bracketOff);
      ctx.lineTo(h.x + h.w - bracketOff, h.y + bracketOff + bracketLen);
      ctx.stroke();
      // Bottom-left
      ctx.beginPath();
      ctx.moveTo(h.x + bracketOff, h.y + h.h - bracketOff - bracketLen);
      ctx.lineTo(h.x + bracketOff, h.y + h.h - bracketOff);
      ctx.lineTo(h.x + bracketOff + bracketLen, h.y + h.h - bracketOff);
      ctx.stroke();
      // Bottom-right
      ctx.beginPath();
      ctx.moveTo(h.x + h.w - bracketOff - bracketLen, h.y + h.h - bracketOff);
      ctx.lineTo(h.x + h.w - bracketOff, h.y + h.h - bracketOff);
      ctx.lineTo(h.x + h.w - bracketOff, h.y + h.h - bracketOff - bracketLen);
      ctx.stroke();

      ctx.restore();
    }

    // Draw particles
    for (const p of particlesArr) {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    }

    // Ambient light strips on panel edges
    const ambientPulse = 0.3 + 0.15 * Math.sin(gameTime * 1.5);
    ctx.globalAlpha = ambientPulse;
    ctx.strokeStyle = COLORS.cyan;
    ctx.lineWidth = 1;
    // Left strip
    ctx.beginPath();
    ctx.moveTo(panelX + 3, panelY + 30);
    ctx.lineTo(panelX + 3, panelY + panelH - 30);
    ctx.stroke();
    // Right strip
    ctx.beginPath();
    ctx.moveTo(panelX + panelW - 3, panelY + 30);
    ctx.lineTo(panelX + panelW - 3, panelY + panelH - 30);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;
    // Keyboard: 1-4 to select hatch
    if (!answered) {
      const num = parseInt(e.key);
      if (num >= 1 && num <= hatches.length) {
        selectHatch(num - 1);
      }
    }
  }

  // Mouse move for hover detection
  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'playing' || answered) return;
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    hoveredHatch = -1;
    for (let i = 0; i < hatches.length; i++) {
      const h = hatches[i];
      if (x >= h.x && x <= h.x + h.w && y >= h.y && y <= h.y + h.h) {
        hoveredHatch = i;
        break;
      }
    }
  });

  // Click to select hatch
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'playing' || answered) return;
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    for (let i = 0; i < hatches.length; i++) {
      const h = hatches[i];
      if (x >= h.x && x <= h.x + h.w && y >= h.y && y <= h.y + h.h) {
        selectHatch(i);
        break;
      }
    }
  });

  function selectHatch(index) {
    if (answered || index < 0 || index >= hatches.length) return;
    selectedHatch = index;
    answered = true;
    answerAnimTime = 0;
    hatchOpenProgress = 0;

    playHatchOpenSound();

    const choice = hatches[index].choice;
    if (choice.is_correct) {
      setTimeout(playCorrectSound, 150);
      // Spawn confetti particles
      const h = hatches[index];
      const cx = h.x + h.w / 2;
      const cy = h.y + h.h / 2;
      const confettiColors = [COLORS.orange, COLORS.amber, COLORS.cyan, COLORS.hatchGlowCorrect];
      for (let i = 0; i < 25; i++) {
        particlesArr.push({
          x: cx,
          y: cy,
          vx: (Math.random() - 0.5) * 350,
          vy: -Math.random() * 250 - 80,
          size: 4 + Math.random() * 6,
          color: confettiColors[Math.floor(Math.random() * confettiColors.length)],
          rotation: Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() - 0.5) * 8,
          alpha: 1
        });
      }
    } else {
      setTimeout(playWrongSound, 150);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
