<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Template</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC'
  };

  // === AUDIO ===
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playClickSound() {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.08);
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.1);
  }

  function playCorrectSound() {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(523, audioCtx.currentTime);
    osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
    osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.4);
  }

  function playWrongSound() {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
    gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.35);
  }

  function playTuneSound(freq) {
    // Static/tuning sound effect
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const noise = audioCtx.createOscillator();
    const noiseGain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    noise.connect(noiseGain);
    noiseGain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
    noise.type = 'sawtooth';
    noise.frequency.setValueAtTime(freq * 0.5, audioCtx.currentTime);
    noiseGain.gain.setValueAtTime(0.03, audioCtx.currentTime);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.15);
    noise.start(audioCtx.currentTime);
    noise.stop(audioCtx.currentTime + 0.1);
  }

  // === GAME STATE ===
  let dials = [];
  let hoveredDial = -1;
  let selectedDial = -1;
  let mousePos = { x: 0, y: 0 };
  let gameTime = 0;
  let entranceProgress = 0;
  let selectionAnim = 0;
  let staticParticles = [];
  let glowParticles = [];

  // Frequencies for each dial
  const FREQUENCIES = ['88.3', '95.7', '102.1', '107.9'];
  const DIAL_GLOW_COLORS = [COLORS.orange, COLORS.cyan, COLORS.amber, COLORS.success];

  function wrapText(text, maxWidth, font) {
    ctx.save();
    ctx.font = font;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    for (let i = 0; i < words.length; i++) {
      const testLine = currentLine ? currentLine + ' ' + words[i] : words[i];
      if (ctx.measureText(testLine).width > maxWidth && currentLine) {
        lines.push(currentLine);
        currentLine = words[i];
      } else {
        currentLine = testLine;
      }
    }
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines;
  }

  function initGame() {
    gameTime = 0;
    entranceProgress = 0;
    hoveredDial = -1;
    selectedDial = -1;
    selectionAnim = 0;
    staticParticles = [];
    glowParticles = [];

    // Position 4 dials in a horizontal row across the radio face
    const dialRadius = 52;
    const gridCenterY = 300;
    const colWidth = 160;
    const totalW = colWidth * 4;  // 640
    const startX = (W - totalW) / 2 + colWidth / 2; // center first in its column

    dials = QUESTION.choices.map((choice, i) => {
      return {
        x: startX + i * colWidth,
        y: gridCenterY,
        radius: dialRadius,
        angle: -Math.PI * 0.75 + Math.random() * Math.PI * 0.5,
        targetAngle: -Math.PI * 0.25,
        choice: choice,
        index: i,
        freq: FREQUENCIES[i],
        glowColor: DIAL_GLOW_COLORS[i],
        glowIntensity: 0.3,
        scale: 0,
        alpha: 0,
        offsetY: 30,
        shakeX: 0
      };
    });

    // Stagger entrance animations
    dials.forEach((dial, i) => {
      const delay = i * 80;
      const startTime = performance.now() + delay;
      const duration = 400;
      const animate = () => {
        const elapsed = performance.now() - startTime;
        if (elapsed < 0) { requestAnimationFrame(animate); return; }
        const t = Math.min(elapsed / duration, 1);
        const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
        dial.scale = t * spring;
        dial.alpha = Math.min(t * 1.5, 1);
        dial.offsetY = 30 * (1 - t);
        if (t < 1) requestAnimationFrame(animate);
        else { dial.scale = 1; dial.alpha = 1; dial.offsetY = 0; }
      };
      requestAnimationFrame(animate);
    });

    // Generate some ambient static particles
    for (let i = 0; i < 20; i++) {
      staticParticles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        size: Math.random() * 2 + 1,
        speed: Math.random() * 30 + 10,
        alpha: Math.random() * 0.3
      });
    }
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Update dial glow based on hover
    dials.forEach((dial, i) => {
      const isHovered = i === hoveredDial;
      const targetGlow = isHovered ? 1.0 : (0.3 + Math.sin(gameTime * 2 + i * 1.5) * 0.15);
      dial.glowIntensity += (targetGlow - dial.glowIntensity) * dt * 8;

      // Subtle dial needle wobble
      if (isHovered) {
        dial.angle += (dial.targetAngle - dial.angle) * dt * 5;
      } else {
        dial.angle += Math.sin(gameTime * 1.5 + i * 2) * 0.003;
      }
    });

    // Selection animation
    if (selectedDial >= 0) {
      selectionAnim += dt;
      const dial = dials[selectedDial];

      if (selectionAnim < 0.4) {
        // Tuning animation - needle spins
        dial.angle += dt * 12;
      } else if (selectionAnim >= 0.4 && selectionAnim < 0.4 + dt * 2) {
        // End game after tuning
        const choice = dial.choice;
        if (choice.is_correct) {
          playCorrectSound();
        } else {
          playWrongSound();
          // Shake the dial
          const shakeStart = performance.now();
          const shakeAnimate = () => {
            const elapsed = (performance.now() - shakeStart) / 1000;
            if (elapsed < 0.4) {
              dial.shakeX = Math.sin(elapsed * Math.PI * 10) * 8 * (1 - elapsed / 0.4);
              requestAnimationFrame(shakeAnimate);
            } else {
              dial.shakeX = 0;
            }
          };
          requestAnimationFrame(shakeAnimate);
        }
        engine.end(choice.is_correct, choice.explanation);
      }
    }

    // Update static particles
    staticParticles.forEach(p => {
      p.y -= p.speed * dt;
      p.alpha = Math.sin(gameTime * 3 + p.x) * 0.15 + 0.15;
      if (p.y < 0) {
        p.y = H;
        p.x = Math.random() * W;
      }
    });

    // Spawn glow particles near hovered dial
    if (hoveredDial >= 0 && Math.random() < dt * 15) {
      const dial = dials[hoveredDial];
      const angle = Math.random() * Math.PI * 2;
      const dist = dial.radius + Math.random() * 15;
      glowParticles.push({
        x: dial.x + Math.cos(angle) * dist,
        y: dial.y + dial.offsetY + Math.sin(angle) * dist,
        vx: (Math.random() - 0.5) * 20,
        vy: -Math.random() * 30 - 10,
        size: Math.random() * 3 + 1,
        alpha: 0.8,
        color: dial.glowColor,
        life: 0
      });
    }

    // Update glow particles
    glowParticles = glowParticles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life += dt;
      p.alpha -= dt * 1.5;
      return p.alpha > 0;
    });
  }

  function drawGame() {
    // === RADIO BODY BACKGROUND ===
    // Warm dark wood background
    ctx.fillStyle = '#2A1810';
    ctx.fillRect(0, 0, W, H);

    // Wood grain texture (subtle lines)
    ctx.strokeStyle = 'rgba(60, 30, 15, 0.4)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 30; i++) {
      const y = i * 18 + Math.sin(i * 0.3) * 5;
      ctx.beginPath();
      ctx.moveTo(0, y);
      for (let x = 0; x < W; x += 20) {
        ctx.lineTo(x, y + Math.sin(x * 0.01 + i) * 3);
      }
      ctx.stroke();
    }

    // Radio face panel (darker inset)
    const panelX = 40, panelY = 50, panelW = W - 80, panelH = H - 70;
    ctx.fillStyle = '#1C1208';
    ctx.beginPath();
    ctx.roundRect(panelX, panelY, panelW, panelH, 16);
    ctx.fill();

    // Panel border - brass trim
    ctx.strokeStyle = '#8B7355';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.roundRect(panelX, panelY, panelW, panelH, 16);
    ctx.stroke();

    // Inner brass trim
    ctx.strokeStyle = 'rgba(180, 140, 80, 0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(panelX + 6, panelY + 6, panelW - 12, panelH - 12, 12);
    ctx.stroke();

    // === RADIO BRAND TEXT ===
    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = "700 28px 'Belanosima', sans-serif";
    ctx.fillStyle = '#8B7355';
    ctx.fillText('QUIZHP RADIOLA', W / 2, 85);
    ctx.font = "400 14px 'Nunito', sans-serif";
    ctx.fillStyle = '#6B5B45';
    ctx.fillText('FREQUENCY SELECTOR', W / 2, 110);
    ctx.restore();

    // === SPEAKER GRILLE (top decorative area) ===
    const grilleY = 125;
    const grilleH = 50;
    ctx.fillStyle = 'rgba(40, 25, 10, 0.6)';
    ctx.beginPath();
    ctx.roundRect(panelX + 30, grilleY, panelW - 60, grilleH, 8);
    ctx.fill();

    // Grille lines
    ctx.strokeStyle = 'rgba(120, 95, 60, 0.3)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 25; i++) {
      const x = panelX + 40 + i * (panelW - 80) / 24;
      ctx.beginPath();
      ctx.moveTo(x, grilleY + 5);
      ctx.lineTo(x, grilleY + grilleH - 5);
      ctx.stroke();
    }

    // === FREQUENCY BAND DISPLAY ===
    const bandY = 185;
    const bandH = 25;
    const bandX = panelX + 60;
    const bandW = panelW - 120;

    // Band background
    ctx.fillStyle = '#0D0A05';
    ctx.beginPath();
    ctx.roundRect(bandX, bandY, bandW, bandH, 4);
    ctx.fill();

    // Frequency markings
    ctx.font = "400 14px 'Nunito', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#8B7355';
    for (let f = 88; f <= 108; f += 2) {
      const ratio = (f - 88) / 20;
      const x = bandX + 10 + ratio * (bandW - 20);
      ctx.fillText(f.toString(), x, bandY + bandH / 2);

      // Tick marks
      ctx.strokeStyle = 'rgba(120, 95, 60, 0.4)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x, bandY + 2);
      ctx.lineTo(x, bandY + 6);
      ctx.stroke();
    }

    // Animated tuning indicator on band
    const tuneX = bandX + 10 + (Math.sin(gameTime * 0.7) * 0.5 + 0.5) * (bandW - 20);
    ctx.fillStyle = COLORS.orange;
    ctx.beginPath();
    ctx.moveTo(tuneX - 3, bandY + bandH - 2);
    ctx.lineTo(tuneX + 3, bandY + bandH - 2);
    ctx.lineTo(tuneX, bandY + bandH - 8);
    ctx.fill();

    // === DRAW STATIC PARTICLES ===
    staticParticles.forEach(p => {
      ctx.fillStyle = `rgba(180, 150, 100, ${p.alpha})`;
      ctx.fillRect(p.x, p.y, p.size, p.size);
    });

    // === DRAW GLOW PARTICLES ===
    glowParticles.forEach(p => {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.alpha;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // === DRAW DIALS ===
    dials.forEach((dial, i) => {
      if (dial.alpha <= 0) return;

      ctx.save();
      ctx.globalAlpha = dial.alpha;
      ctx.translate(dial.x + dial.shakeX, dial.y + dial.offsetY);
      ctx.scale(dial.scale, dial.scale);

      const isHovered = i === hoveredDial;
      const isSelected = i === selectedDial;
      const r = dial.radius;

      // Outer glow
      const glowRadius = r + 15;
      const glow = ctx.createRadialGradient(0, 0, r - 5, 0, 0, glowRadius);
      glow.addColorStop(0, dial.glowColor + Math.floor(dial.glowIntensity * 60).toString(16).padStart(2, '0'));
      glow.addColorStop(1, 'transparent');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(0, 0, glowRadius, 0, Math.PI * 2);
      ctx.fill();

      // Dial base (metallic ring)
      const ringGrad = ctx.createRadialGradient(-5, -5, 0, 0, 0, r);
      ringGrad.addColorStop(0, '#C0A070');
      ringGrad.addColorStop(0.7, '#8B7355');
      ringGrad.addColorStop(1, '#5A4530');
      ctx.fillStyle = ringGrad;
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fill();

      // Dial face (dark center)
      const faceR = r - 10;
      const faceGrad = ctx.createRadialGradient(-3, -3, 0, 0, 0, faceR);
      faceGrad.addColorStop(0, '#1A1408');
      faceGrad.addColorStop(1, '#0D0A05');
      ctx.fillStyle = faceGrad;
      ctx.beginPath();
      ctx.arc(0, 0, faceR, 0, Math.PI * 2);
      ctx.fill();

      // Frequency marks on dial face
      ctx.strokeStyle = 'rgba(140, 115, 85, 0.5)';
      ctx.lineWidth = 1;
      for (let m = 0; m < 12; m++) {
        const a = (m / 12) * Math.PI * 2 - Math.PI / 2;
        const inner = faceR - 12;
        const outer = faceR - 4;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a) * inner, Math.sin(a) * inner);
        ctx.lineTo(Math.cos(a) * outer, Math.sin(a) * outer);
        ctx.stroke();
      }

      // Frequency number in center of dial
      ctx.font = "700 22px 'Belanosima', sans-serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = dial.glowColor;
      ctx.globalAlpha = dial.alpha * (0.5 + dial.glowIntensity * 0.5);
      ctx.fillText(dial.freq, 0, -8);
      ctx.globalAlpha = dial.alpha;

      // FM label
      ctx.font = "400 14px 'Nunito', sans-serif";
      ctx.fillStyle = 'rgba(140, 115, 85, 0.7)';
      ctx.fillText('FM', 0, 12);

      // Dial needle
      ctx.save();
      ctx.rotate(dial.angle);
      ctx.strokeStyle = isSelected ? COLORS.amber : (isHovered ? dial.glowColor : '#C0A070');
      ctx.lineWidth = isHovered ? 3 : 2;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(0, -(faceR - 15));
      ctx.stroke();

      // Needle tip
      ctx.fillStyle = isSelected ? COLORS.amber : (isHovered ? dial.glowColor : '#E0C090');
      ctx.beginPath();
      ctx.arc(0, -(faceR - 15), 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      // Center knob
      const knobGrad = ctx.createRadialGradient(-2, -2, 0, 0, 0, 8);
      knobGrad.addColorStop(0, '#D0B080');
      knobGrad.addColorStop(1, '#8B7355');
      ctx.fillStyle = knobGrad;
      ctx.beginPath();
      ctx.arc(0, 0, 8, 0, Math.PI * 2);
      ctx.fill();

      // Hover ring
      if (isHovered && !isSelected) {
        ctx.strokeStyle = dial.glowColor;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, r + 3, 0, Math.PI * 2);
        ctx.stroke();
      }

      ctx.restore();

      // Answer text below dial
      ctx.save();
      const textY = dial.y + dial.offsetY + r + 18;
      const textMaxW = 148;
      const textFont = "500 14px 'Nunito', sans-serif";

      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';

      const lines = wrapText(dial.choice.text, textMaxW, textFont);
      ctx.font = textFont;

      lines.forEach((line, li) => {
        const ly = textY + li * 17;
        // Text shadow for readability
        ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
        ctx.fillText(line, dial.x + dial.shakeX + 1, ly + 1);
        // Main text
        ctx.fillStyle = isHovered ? dial.glowColor : '#C0B090';
        ctx.globalAlpha = dial.alpha;
        ctx.fillText(line, dial.x + dial.shakeX, ly);
      });

      ctx.globalAlpha = 1;
      ctx.restore();
    });

    // === DECORATIVE SCREWS ===
    const screwPositions = [
      { x: panelX + 18, y: panelY + 18 },
      { x: panelX + panelW - 18, y: panelY + 18 },
      { x: panelX + 18, y: panelY + panelH - 18 },
      { x: panelX + panelW - 18, y: panelY + panelH - 18 }
    ];
    screwPositions.forEach(sp => {
      const sg = ctx.createRadialGradient(sp.x - 1, sp.y - 1, 0, sp.x, sp.y, 5);
      sg.addColorStop(0, '#A08060');
      sg.addColorStop(1, '#5A4530');
      ctx.fillStyle = sg;
      ctx.beginPath();
      ctx.arc(sp.x, sp.y, 5, 0, Math.PI * 2);
      ctx.fill();
      // Screw slot
      ctx.strokeStyle = '#3A2A18';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(sp.x - 3, sp.y);
      ctx.lineTo(sp.x + 3, sp.y);
      ctx.stroke();
    });
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;

    if (e.type === 'mousemove') {
      const { x, y } = screenToLogical(e.clientX, e.clientY);
      mousePos = { x, y };

      // Check hover state
      const prevHovered = hoveredDial;
      hoveredDial = -1;
      dials.forEach((dial, i) => {
        const dx = x - (dial.x + dial.shakeX);
        const dy = y - (dial.y + dial.offsetY);
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < dial.radius + 5) {
          hoveredDial = i;
        }
      });
      if (hoveredDial !== prevHovered && hoveredDial >= 0) {
        playTuneSound(200 + hoveredDial * 100);
      }
      canvas.style.cursor = hoveredDial >= 0 ? 'pointer' : 'default';
    }

    if (e.type === 'click' && selectedDial < 0) {
      const { x, y } = screenToLogical(e.clientX, e.clientY);

      dials.forEach((dial, i) => {
        const dx = x - (dial.x + dial.shakeX);
        const dy = y - (dial.y + dial.offsetY);
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < dial.radius + 5) {
          selectedDial = i;
          selectionAnim = 0;
          playClickSound();

          // Pop animation on selected dial
          const startScale = dial.scale;
          const popStart = performance.now();
          const popAnimate = () => {
            const t = Math.min((performance.now() - popStart) / 200, 1);
            dial.scale = startScale + 0.15 * Math.sin(t * Math.PI) * (1 - t);
            if (t < 1) requestAnimationFrame(popAnimate);
            else dial.scale = 1;
          };
          requestAnimationFrame(popAnimate);
        }
      });
    }
  }

  // Register mouse events
  canvas.addEventListener('mousemove', handleInput);
  canvas.addEventListener('click', handleInput);

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
