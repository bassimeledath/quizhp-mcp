<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bioluminescent Cavern Fungi Slash</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #0a0a12;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgPrimary: '#0a0a12',
    cavernWall: '#0f0e1a',
    orange: '#E87A3E',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    textPrimary: '#F5F5F0',
    textSecondary: '#C2C2B8',
  };

  // Bioluminescent mushroom glow colors
  const GLOW_COLORS = [
    { main: '#00ffaa', dim: '#005533', glow: 'rgba(0,255,170,0.3)' },
    { main: '#ff44cc', dim: '#661155', glow: 'rgba(255,68,204,0.3)' },
    { main: '#44aaff', dim: '#113366', glow: 'rgba(68,170,255,0.3)' },
    { main: '#ffcc00', dim: '#665500', glow: 'rgba(255,204,0,0.3)' },
  ];

  // === SOUND ENGINE ===
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new AudioCtx();
    return audioCtx;
  }

  function playSlashSound() {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(800, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(200, ac.currentTime + 0.15);
      gain.gain.setValueAtTime(0.15, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.15);
      osc.connect(gain).connect(ac.destination);
      osc.start(); osc.stop(ac.currentTime + 0.15);
    } catch(e) {}
  }

  function playCorrectSound() {
    try {
      const ac = getAudioCtx();
      [523, 659, 784].forEach((f, i) => {
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.type = 'sine';
        osc.frequency.value = f;
        gain.gain.setValueAtTime(0, ac.currentTime + i * 0.1);
        gain.gain.linearRampToValueAtTime(0.12, ac.currentTime + i * 0.1 + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + i * 0.1 + 0.3);
        osc.connect(gain).connect(ac.destination);
        osc.start(ac.currentTime + i * 0.1);
        osc.stop(ac.currentTime + i * 0.1 + 0.3);
      });
    } catch(e) {}
  }

  function playWrongSound() {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(200, ac.currentTime);
      osc.frequency.linearRampToValueAtTime(100, ac.currentTime + 0.3);
      gain.gain.setValueAtTime(0.1, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.3);
      osc.connect(gain).connect(ac.destination);
      osc.start(); osc.stop(ac.currentTime + 0.3);
    } catch(e) {}
  }

  // === GAME STATE ===
  let blade = { x: 360, y: 270, targetX: 360, targetY: 270, trail: [] };
  let mushrooms = [];
  let spores = [];
  let slashEffects = [];
  let sootClouds = [];
  let gameParticles = [];
  let cavernStalactites = [];
  let gameTime = 0;
  let answered = false;
  let entranceTimer = 0;

  // Keys currently held
  const keys = {};

  const BLADE_SPEED = 320;
  const MUSHROOM_RISE_SPEED = 40;
  const MUSHROOM_WIDTH = 460;
  const MUSHROOM_HEIGHT = 70;
  const MUSHROOM_CAP_RADIUS = 38;

  function wrapText(ctx, text, maxWidth) {
    const words = text.split(' ');
    const lines = [];
    let currentLine = words[0];
    for (let i = 1; i < words.length; i++) {
      const testLine = currentLine + ' ' + words[i];
      if (ctx.measureText(testLine).width <= maxWidth) {
        currentLine = testLine;
      } else {
        lines.push(currentLine);
        currentLine = words[i];
      }
    }
    lines.push(currentLine);
    return lines;
  }

  function initGame() {
    blade = { x: 360, y: 100, targetX: 360, targetY: 100, trail: [] };
    mushrooms = [];
    spores = [];
    slashEffects = [];
    sootClouds = [];
    gameParticles = [];
    gameTime = 0;
    answered = false;
    entranceTimer = 0;

    // Create stalactites
    cavernStalactites = [];
    for (let i = 0; i < 12; i++) {
      cavernStalactites.push({
        x: Math.random() * W,
        length: 20 + Math.random() * 60,
        width: 4 + Math.random() * 10
      });
    }

    // Create mushrooms from choices - stacked vertically, rising from bottom
    const startY = H + 60;
    const spacing = (H - 80) / 4;
    QUESTION.choices.forEach((choice, i) => {
      mushrooms.push({
        choice: choice,
        index: i,
        x: W / 2,
        y: startY + i * 120,
        targetY: 120 + i * (MUSHROOM_HEIGHT + 24),
        width: MUSHROOM_WIDTH,
        height: MUSHROOM_HEIGHT,
        color: GLOW_COLORS[i % GLOW_COLORS.length],
        glowPulse: Math.random() * Math.PI * 2,
        wobble: 0,
        wobbleSpeed: 0,
        scale: 0,
        alpha: 0,
        slashed: false,
        shakeX: 0,
        shakeTimer: 0,
        arrived: false,
        arrivalTime: 0,
      });
    });

    // Create ambient spores
    for (let i = 0; i < 30; i++) {
      spores.push({
        x: Math.random() * W,
        y: Math.random() * H,
        size: 1 + Math.random() * 3,
        speed: 10 + Math.random() * 25,
        drift: (Math.random() - 0.5) * 15,
        alpha: 0.2 + Math.random() * 0.5,
        color: GLOW_COLORS[Math.floor(Math.random() * GLOW_COLORS.length)].main,
        pulse: Math.random() * Math.PI * 2
      });
    }
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;
    gameTime += dt;
    entranceTimer += dt;

    // Move blade based on held keys
    let dx = 0, dy = 0;
    if (keys['ArrowLeft'] || keys['KeyA']) dx -= 1;
    if (keys['ArrowRight'] || keys['KeyD']) dx += 1;
    if (keys['ArrowUp'] || keys['KeyW']) dy -= 1;
    if (keys['ArrowDown'] || keys['KeyS']) dy += 1;

    // Normalize diagonal
    if (dx !== 0 && dy !== 0) {
      dx *= 0.707;
      dy *= 0.707;
    }

    blade.x += dx * BLADE_SPEED * dt;
    blade.y += dy * BLADE_SPEED * dt;

    // Clamp blade to canvas
    blade.x = Math.max(20, Math.min(W - 20, blade.x));
    blade.y = Math.max(20, Math.min(H - 20, blade.y));

    // Update blade trail
    blade.trail.unshift({ x: blade.x, y: blade.y, age: 0 });
    blade.trail = blade.trail.filter(t => {
      t.age += dt;
      return t.age < 0.3;
    });
    if (blade.trail.length > 15) blade.trail.length = 15;

    // Update mushrooms - entrance animation
    mushrooms.forEach((m, i) => {
      const delay = i * 0.15;
      const t = Math.max(0, entranceTimer - delay);

      if (t > 0 && !m.arrived) {
        // Spring rise animation
        const progress = Math.min(t / 0.6, 1);
        const spring = 1 + Math.sin(progress * Math.PI * 2) * 0.15 * (1 - progress);
        m.y = m.y + (m.targetY - m.y) * Math.min(dt * 5, 1);
        m.scale = progress * spring;
        m.alpha = Math.min(progress * 2, 1);

        if (Math.abs(m.y - m.targetY) < 1) {
          m.y = m.targetY;
          m.arrived = true;
          m.arrivalTime = gameTime;
        }
      }

      // Glow pulse
      m.glowPulse += dt * 2;

      // Shake decay
      if (m.shakeTimer > 0) {
        m.shakeTimer -= dt;
        m.shakeX = Math.sin(m.shakeTimer * 40) * 6 * (m.shakeTimer / 0.4);
      } else {
        m.shakeX = 0;
      }

      // Gentle wobble when arrived
      if (m.arrived && !m.slashed) {
        m.wobble = Math.sin(gameTime * 1.5 + i * 1.2) * 2;
      }
    });

    // Update spores
    spores.forEach(s => {
      s.y -= s.speed * dt;
      s.x += s.drift * dt;
      s.pulse += dt * 2;
      if (s.y < -10) {
        s.y = H + 10;
        s.x = Math.random() * W;
      }
      if (s.x < -10) s.x = W + 10;
      if (s.x > W + 10) s.x = -10;
    });

    // Update slash effects
    slashEffects = slashEffects.filter(e => {
      e.timer += dt;
      return e.timer < 0.5;
    });

    // Update soot clouds
    sootClouds = sootClouds.filter(c => {
      c.timer += dt;
      c.radius += dt * 120;
      c.alpha = Math.max(0, 1 - c.timer / c.duration);
      return c.timer < c.duration;
    });

    // Update particles
    gameParticles = gameParticles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 200 * dt;
      p.alpha -= dt * 1.5;
      p.rotation += p.rotationSpeed * dt;
      return p.alpha > 0;
    });
  }

  function trySlash() {
    if (gameState !== 'playing' || answered) return;

    playSlashSound();

    // Add slash visual effect
    slashEffects.push({
      x: blade.x, y: blade.y, timer: 0, angle: Math.random() * Math.PI
    });

    // Check collision with mushrooms
    for (const m of mushrooms) {
      if (m.slashed || !m.arrived) continue;

      const mx = m.x + m.shakeX;
      const my = m.y + m.wobble;
      const halfW = m.width / 2;
      const halfH = m.height / 2;

      if (blade.x >= mx - halfW && blade.x <= mx + halfW &&
          blade.y >= my - halfH && blade.y <= my + halfH) {
        m.slashed = true;
        answered = true;

        // Spawn particles from mushroom
        for (let i = 0; i < 20; i++) {
          gameParticles.push({
            x: blade.x,
            y: blade.y,
            vx: (Math.random() - 0.5) * 300,
            vy: (Math.random() - 0.5) * 300 - 100,
            size: 3 + Math.random() * 5,
            color: m.color.main,
            alpha: 1,
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 8
          });
        }

        if (m.choice.is_correct) {
          playCorrectSound();
          // Celebration particles
          for (let i = 0; i < 30; i++) {
            gameParticles.push({
              x: m.x,
              y: m.y,
              vx: (Math.random() - 0.5) * 400,
              vy: -Math.random() * 300 - 50,
              size: 4 + Math.random() * 6,
              color: [COLORS.orange, COLORS.amber, COLORS.cyan, COLORS.success][Math.floor(Math.random() * 4)],
              alpha: 1,
              rotation: Math.random() * Math.PI * 2,
              rotationSpeed: (Math.random() - 0.5) * 10
            });
          }
          setTimeout(() => engine.end(true, m.choice.explanation), 600);
        } else {
          playWrongSound();
          // Soot cloud
          sootClouds.push({
            x: blade.x, y: blade.y,
            radius: 30,
            alpha: 1,
            duration: 1.5,
            timer: 0
          });
          // Shake other mushrooms
          mushrooms.forEach(om => {
            if (!om.slashed) {
              om.shakeTimer = 0.4;
            }
          });
          setTimeout(() => engine.end(false, m.choice.explanation), 800);
        }
        break;
      }
    }
  }

  function drawGame() {
    // Cavern background - deep black with subtle gradient
    const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
    bgGrad.addColorStop(0, '#050510');
    bgGrad.addColorStop(0.5, '#0a0a1a');
    bgGrad.addColorStop(1, '#08081a');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    // Cavern walls - dark rocky edges
    ctx.fillStyle = '#0d0d18';
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(40, 0);
    for (let y = 0; y < H; y += 30) {
      ctx.lineTo(15 + Math.sin(y * 0.05) * 12, y);
    }
    ctx.lineTo(0, H);
    ctx.closePath();
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(W, 0);
    ctx.lineTo(W - 40, 0);
    for (let y = 0; y < H; y += 30) {
      ctx.lineTo(W - 15 - Math.sin(y * 0.05 + 1) * 12, y);
    }
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fill();

    // Stalactites from ceiling
    cavernStalactites.forEach(s => {
      ctx.fillStyle = '#12121f';
      ctx.beginPath();
      ctx.moveTo(s.x - s.width / 2, 0);
      ctx.lineTo(s.x + s.width / 2, 0);
      ctx.lineTo(s.x, s.length);
      ctx.closePath();
      ctx.fill();
    });

    // Draw ambient spores
    spores.forEach(s => {
      const pulseAlpha = s.alpha * (0.6 + 0.4 * Math.sin(s.pulse));
      // Glow
      ctx.globalAlpha = pulseAlpha * 0.3;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * 3, 0, Math.PI * 2);
      ctx.fillStyle = s.color;
      ctx.fill();
      // Core
      ctx.globalAlpha = pulseAlpha;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
      ctx.fillStyle = s.color;
      ctx.fill();
      ctx.globalAlpha = 1;
    });

    // Draw mushrooms
    mushrooms.forEach((m, i) => {
      if (m.alpha <= 0) return;

      ctx.save();
      const mx = m.x + m.shakeX;
      const my = m.y + m.wobble;
      ctx.translate(mx, my);
      ctx.scale(m.scale, m.scale);
      ctx.globalAlpha = m.alpha;

      const halfW = m.width / 2;
      const halfH = m.height / 2;
      const glowIntensity = 0.5 + 0.3 * Math.sin(m.glowPulse);

      if (m.slashed) {
        // Slashed - fading out
        ctx.globalAlpha = Math.max(0, m.alpha - gameTime * 0.5);
      }

      // Mushroom glow aura
      const glowGrad = ctx.createRadialGradient(0, 0, halfH, 0, 0, halfW + 30);
      glowGrad.addColorStop(0, m.color.glow);
      glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = glowGrad;
      ctx.fillRect(-halfW - 30, -halfH - 30, m.width + 60, m.height + 60);

      // Mushroom stem
      ctx.fillStyle = m.color.dim;
      ctx.beginPath();
      ctx.roundRect(-20, -5, 40, halfH + 10, 4);
      ctx.fill();

      // Mushroom cap - large rounded shape
      const capGrad = ctx.createLinearGradient(0, -halfH, 0, 10);
      capGrad.addColorStop(0, m.color.main);
      capGrad.addColorStop(1, m.color.dim);
      ctx.fillStyle = capGrad;
      ctx.beginPath();
      ctx.roundRect(-halfW, -halfH, m.width, m.height, 16);
      ctx.fill();

      // Cap highlight
      ctx.fillStyle = `rgba(255,255,255,${0.08 + glowIntensity * 0.06})`;
      ctx.beginPath();
      ctx.roundRect(-halfW + 8, -halfH + 4, m.width - 16, m.height * 0.4, 12);
      ctx.fill();

      // Cap border glow
      ctx.strokeStyle = m.color.main;
      ctx.lineWidth = 2;
      ctx.globalAlpha = m.alpha * glowIntensity;
      ctx.beginPath();
      ctx.roundRect(-halfW, -halfH, m.width, m.height, 16);
      ctx.stroke();
      ctx.globalAlpha = m.alpha;

      // Answer text - bioluminescent ink
      ctx.fillStyle = COLORS.textPrimary;
      ctx.font = "500 16px 'Nunito', sans-serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      const textMaxWidth = m.width - 40;
      const lines = wrapText(ctx, m.choice.text, textMaxWidth);
      const lineHeight = 19;
      const totalTextHeight = lines.length * lineHeight;
      const textStartY = -totalTextHeight / 2 + lineHeight / 2;

      lines.forEach((line, li) => {
        ctx.fillText(line, 0, textStartY + li * lineHeight);
      });

      // Choice letter indicator
      const letters = ['A', 'B', 'C', 'D'];
      ctx.fillStyle = m.color.main;
      ctx.font = "700 16px 'Nunito Sans', sans-serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.beginPath();
      ctx.arc(-halfW + 22, 0, 14, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fill();
      ctx.fillStyle = m.color.main;
      ctx.fillText(letters[i], -halfW + 22, 0);

      ctx.restore();
    });

    // Draw soot clouds
    sootClouds.forEach(c => {
      const grad = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, c.radius);
      grad.addColorStop(0, `rgba(20,20,20,${c.alpha * 0.9})`);
      grad.addColorStop(0.6, `rgba(30,25,20,${c.alpha * 0.6})`);
      grad.addColorStop(1, `rgba(40,30,25,0)`);
      ctx.fillStyle = grad;
      ctx.fillRect(c.x - c.radius, c.y - c.radius, c.radius * 2, c.radius * 2);
    });

    // Draw slash effects
    slashEffects.forEach(e => {
      const progress = e.timer / 0.5;
      const alpha = 1 - progress;
      const size = 30 + progress * 40;

      ctx.save();
      ctx.translate(e.x, e.y);
      ctx.rotate(e.angle);
      ctx.strokeStyle = `rgba(200,220,255,${alpha})`;
      ctx.lineWidth = 3 - progress * 2;
      ctx.beginPath();
      ctx.moveTo(-size, 0);
      ctx.lineTo(size, 0);
      ctx.stroke();

      // Cross slash
      ctx.rotate(Math.PI / 3);
      ctx.beginPath();
      ctx.moveTo(-size * 0.7, 0);
      ctx.lineTo(size * 0.7, 0);
      ctx.stroke();
      ctx.restore();
    });

    // Draw game particles
    gameParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
      ctx.restore();
    });

    // Draw blade (obsidian blade cursor)
    drawBlade();
  }

  function drawBlade() {
    // Trail
    blade.trail.forEach((t, i) => {
      const alpha = (1 - t.age / 0.3) * 0.4;
      ctx.beginPath();
      ctx.arc(t.x, t.y, 3 - i * 0.15, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(78,205,196,${alpha})`;
      ctx.fill();
    });

    // Blade glow
    const glow = ctx.createRadialGradient(blade.x, blade.y, 0, blade.x, blade.y, 30);
    glow.addColorStop(0, 'rgba(78,205,196,0.25)');
    glow.addColorStop(1, 'rgba(78,205,196,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(blade.x - 30, blade.y - 30, 60, 60);

    // Obsidian blade shape
    ctx.save();
    ctx.translate(blade.x, blade.y);

    // Blade body - diamond/dagger shape
    const bladeGrad = ctx.createLinearGradient(-6, -18, 6, 18);
    bladeGrad.addColorStop(0, '#2a2a3a');
    bladeGrad.addColorStop(0.3, '#4a4a5a');
    bladeGrad.addColorStop(0.5, '#6a6a7a');
    bladeGrad.addColorStop(0.7, '#4a4a5a');
    bladeGrad.addColorStop(1, '#2a2a3a');

    ctx.fillStyle = bladeGrad;
    ctx.beginPath();
    ctx.moveTo(0, -20);   // Tip
    ctx.lineTo(8, -4);    // Right shoulder
    ctx.lineTo(5, 10);    // Right base
    ctx.lineTo(0, 14);    // Bottom
    ctx.lineTo(-5, 10);   // Left base
    ctx.lineTo(-8, -4);   // Left shoulder
    ctx.closePath();
    ctx.fill();

    // Blade edge glow
    ctx.strokeStyle = COLORS.cyan;
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = 0.6 + Math.sin(gameTime * 4) * 0.2;
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Blade crossguard
    ctx.fillStyle = '#3a3a4a';
    ctx.fillRect(-10, -2, 20, 4);

    // Handle
    ctx.fillStyle = '#1a1a2a';
    ctx.fillRect(-3, 2, 6, 12);

    ctx.restore();
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;

    if (e.type === 'keydown') {
      keys[e.code] = true;

      // Slash on spacebar or enter
      if (e.code === 'Space' || e.code === 'Enter') {
        e.preventDefault();
        trySlash();
      }
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    keys[e.code] = false;
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
