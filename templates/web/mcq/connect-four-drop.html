<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect Four Drop</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito', sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // QuizHP Color Palette
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    orangeLight: '#FFF4ED',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    cyanLight: '#E8F9F8',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC',
    boardBlue: '#1E4B8E',
    boardDark: '#0D2B4E',
    cellHighlight: '#E8F4FF'
  };

  // Sound effects using Web Audio API
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playSound(type) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'drop') {
      osc.frequency.setValueAtTime(300, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.15);
    } else if (type === 'land') {
      osc.frequency.setValueAtTime(150, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'select') {
      osc.frequency.setValueAtTime(440, audioCtx.currentTime);
      osc.frequency.setValueAtTime(550, audioCtx.currentTime + 0.05);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'correct') {
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    }
  }

  // Connect Four Drop Game
  // Board dimensions - sized to fit within 720x540 canvas with answer labels below
  const COLS = 7;
  const ROWS = 6;
  const CELL_SIZE = 50;
  const BOARD_X = (W - COLS * CELL_SIZE) / 2;
  const BOARD_Y = 65;

  // Highlighted columns (the 4 answer columns)
  const ANSWER_COLS = [1, 2, 4, 5]; // 0-indexed columns for 4 answers

  // Game state
  let board = [];
  let currentColumn = 0; // Which answer column is selected (0-3 index into ANSWER_COLS)
  let disc = null; // The falling disc
  let answers = [];
  let selectedAnswer = null;

  // Animation state
  let entranceTime = 0;
  let gameParticles = [];
  let selectorBounce = 0;
  let columnHoverTime = 0;

  function initGame() {
    // Initialize empty board
    board = [];
    for (let r = 0; r < ROWS; r++) {
      board[r] = [];
      for (let c = 0; c < COLS; c++) {
        board[r][c] = null;
      }
    }

    // Map answers to highlighted columns
    answers = QUESTION.choices.map((choice, i) => ({
      choice: choice,
      col: ANSWER_COLS[i],
      label: String.fromCharCode(65 + i), // A, B, C, D
      scale: 0,
      alpha: 0
    }));

    currentColumn = 0;
    disc = null;
    selectedAnswer = null;
    entranceTime = 0;
    gameParticles = [];
    selectorBounce = 0;
    columnHoverTime = 0;
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    // Entrance animation
    entranceTime += dt;
    answers.forEach((answer, i) => {
      const delay = i * 0.08;
      const t = Math.max(0, Math.min(1, (entranceTime - delay) / 0.35));
      const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
      answer.scale = t * spring;
      answer.alpha = t;
    });

    // Selector bounce animation
    selectorBounce += dt * 4;
    columnHoverTime += dt;

    // Update game particles
    gameParticles = gameParticles.filter(p => {
      p.vy += 600 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.alpha -= dt * 2;
      return p.alpha > 0 && p.y < H + 50;
    });

    // Update falling disc
    if (disc) {
      disc.y += disc.vy * dt;
      disc.vy += 1800 * dt; // Gravity

      // Find where disc should land
      const col = disc.col;
      let landingRow = ROWS - 1;
      for (let r = 0; r < ROWS; r++) {
        if (board[r][col] !== null) {
          landingRow = r - 1;
          break;
        }
      }

      const landingY = BOARD_Y + landingRow * CELL_SIZE + CELL_SIZE / 2;

      if (disc.y >= landingY) {
        disc.y = landingY;
        // Place disc on board
        if (landingRow >= 0) {
          board[landingRow][col] = disc.color;
        }

        // Play land sound and spawn particles
        playSound('land');
        spawnLandingParticles(disc.x, disc.y);

        // Trigger answer selection
        if (selectedAnswer !== null) {
          const choice = answers[selectedAnswer].choice;
          setTimeout(() => {
            if (choice.is_correct) {
              playSound('correct');
            } else {
              playSound('wrong');
            }
            engine.end(choice.is_correct, choice.explanation);
          }, 200);
        }
        disc = null;
      }
    }
  }

  function spawnLandingParticles(x, y) {
    const colors = [COLORS.orange, COLORS.amber, COLORS.cyan];
    for (let i = 0; i < 12; i++) {
      gameParticles.push({
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 200,
        vy: -Math.random() * 150 - 50,
        size: Math.random() * 6 + 3,
        color: colors[Math.floor(Math.random() * colors.length)],
        rotation: Math.random() * Math.PI * 2,
        rotationSpeed: (Math.random() - 0.5) * 8,
        alpha: 1
      });
    }
  }

  function drawGame() {
    // Background
    ctx.fillStyle = COLORS.bgPrimary;
    ctx.fillRect(0, 0, W, H);

    // Draw board frame with shadow
    ctx.shadowColor = 'rgba(0, 0, 0, 0.2)';
    ctx.shadowBlur = 15;
    ctx.shadowOffsetY = 5;
    ctx.fillStyle = COLORS.boardBlue;
    ctx.beginPath();
    ctx.roundRect(BOARD_X - 12, BOARD_Y - 12, COLS * CELL_SIZE + 24, ROWS * CELL_SIZE + 24, 16);
    ctx.fill();
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;

    // Draw cells
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const x = BOARD_X + c * CELL_SIZE + CELL_SIZE / 2;
        const y = BOARD_Y + r * CELL_SIZE + CELL_SIZE / 2;
        const isAnswerCol = ANSWER_COLS.includes(c);
        const answerIndex = ANSWER_COLS.indexOf(c);
        const isSelected = answerIndex === currentColumn && !disc;

        // Cell hole
        ctx.beginPath();
        ctx.arc(x, y, CELL_SIZE / 2 - 5, 0, Math.PI * 2);

        if (board[r][c]) {
          // Filled with disc
          ctx.fillStyle = board[r][c];
          ctx.fill();
          // Disc highlight
          ctx.beginPath();
          ctx.arc(x - 8, y - 8, CELL_SIZE / 4 - 4, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
          ctx.fill();
        } else if (isAnswerCol) {
          // Highlighted answer column with glow when selected
          if (isSelected) {
            ctx.fillStyle = COLORS.cyanLight;
          } else {
            ctx.fillStyle = COLORS.cellHighlight;
          }
          ctx.fill();
        } else {
          // Regular empty cell
          ctx.fillStyle = COLORS.boardDark;
          ctx.fill();
        }

        // Cell inner shadow for depth
        ctx.beginPath();
        ctx.arc(x, y, CELL_SIZE / 2 - 5, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
        ctx.lineWidth = 3;
        ctx.stroke();
      }
    }

    // Draw column highlights and labels at top
    for (let i = 0; i < answers.length; i++) {
      const answer = answers[i];
      const col = answer.col;
      const x = BOARD_X + col * CELL_SIZE + CELL_SIZE / 2;
      const isSelected = i === currentColumn && !disc;

      // Apply entrance animation scale for selector
      ctx.save();
      ctx.translate(x, BOARD_Y - 15);
      ctx.scale(answer.scale, answer.scale);
      ctx.globalAlpha = answer.alpha;

      // Highlight indicator above selected column (animated triangle pointing down)
      if (isSelected) {
        const bounce = Math.sin(selectorBounce) * 3;
        ctx.fillStyle = COLORS.orange;
        ctx.beginPath();
        ctx.moveTo(0, 8 + bounce);
        ctx.lineTo(-10, -5 + bounce);
        ctx.lineTo(10, -5 + bounce);
        ctx.closePath();
        ctx.fill();
      }

      ctx.restore();

      // Column label (A, B, C, D) above the board
      ctx.save();
      ctx.globalAlpha = answer.alpha;
      ctx.fillStyle = isSelected ? COLORS.orange : COLORS.textPrimary;
      ctx.font = "bold 20px 'Nunito Sans', sans-serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(answer.label, x, BOARD_Y - 35);
      ctx.restore();
    }

    // Draw falling disc with shadow
    if (disc) {
      ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
      ctx.shadowBlur = 10;
      ctx.shadowOffsetY = 4;
      ctx.beginPath();
      ctx.arc(disc.x, disc.y, CELL_SIZE / 2 - 5, 0, Math.PI * 2);
      ctx.fillStyle = disc.color;
      ctx.fill();
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
      ctx.shadowOffsetY = 0;

      // Disc highlight
      ctx.beginPath();
      ctx.arc(disc.x - 8, disc.y - 8, CELL_SIZE / 4 - 4, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
      ctx.fill();
    }

    // Draw game particles
    gameParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Draw answer labels below board in 2x2 grid layout
    const answerAreaY = BOARD_Y + ROWS * CELL_SIZE + 20;
    const labelWidth = 340;
    const labelHeight = 50;
    const labelGap = 12;

    // 2x2 grid positions
    const gridStartX = (W - labelWidth * 2 - labelGap) / 2;
    const gridStartY = answerAreaY;

    const labelPositions = [
      { x: gridStartX, y: gridStartY },                                    // A - top left
      { x: gridStartX + labelWidth + labelGap, y: gridStartY },            // B - top right
      { x: gridStartX, y: gridStartY + labelHeight + labelGap },           // C - bottom left
      { x: gridStartX + labelWidth + labelGap, y: gridStartY + labelHeight + labelGap } // D - bottom right
    ];

    for (let i = 0; i < answers.length; i++) {
      const answer = answers[i];
      const pos = labelPositions[i];
      const isSelected = i === currentColumn && !disc;

      // Apply entrance animation
      ctx.save();
      ctx.translate(pos.x + labelWidth / 2, pos.y + labelHeight / 2);
      ctx.scale(answer.scale, answer.scale);
      ctx.globalAlpha = answer.alpha;
      ctx.translate(-(pos.x + labelWidth / 2), -(pos.y + labelHeight / 2));

      // Answer box with shadow
      if (isSelected) {
        ctx.shadowColor = 'rgba(232, 122, 62, 0.3)';
        ctx.shadowBlur = 10;
        ctx.shadowOffsetY = 3;
      }

      ctx.fillStyle = isSelected ? COLORS.orangeLight : COLORS.bgSurface;
      ctx.strokeStyle = isSelected ? COLORS.orange : COLORS.borderSubtle;
      ctx.lineWidth = isSelected ? 3 : 2;
      ctx.beginPath();
      ctx.roundRect(pos.x, pos.y, labelWidth, labelHeight, 8);
      ctx.fill();
      ctx.stroke();

      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
      ctx.shadowOffsetY = 0;

      // Draw label (A, B, C, D) on left side
      ctx.fillStyle = isSelected ? COLORS.orange : COLORS.textSecondary;
      ctx.font = "600 16px 'Nunito Sans', sans-serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(answer.label, pos.x + 20, pos.y + labelHeight / 2);

      // Answer text (wrap if needed)
      ctx.fillStyle = COLORS.textPrimary;
      ctx.font = "400 14px 'Nunito', sans-serif";
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';

      const text = answer.choice.text;
      const textAreaWidth = labelWidth - 50;
      const textStartX = pos.x + 38;
      const words = text.split(' ');
      let lines = [];
      let currentLine = '';

      for (const word of words) {
        const testLine = currentLine ? currentLine + ' ' + word : word;
        const metrics = ctx.measureText(testLine);
        if (metrics.width > textAreaWidth) {
          if (currentLine) lines.push(currentLine);
          currentLine = word;
        } else {
          currentLine = testLine;
        }
      }
      if (currentLine) lines.push(currentLine);

      // Draw lines
      const lineHeight = 15;
      const textStartY = pos.y + (labelHeight - lines.length * lineHeight) / 2;
      for (let j = 0; j < lines.length; j++) {
        ctx.fillText(lines[j], textStartX, textStartY + j * lineHeight);
      }

      ctx.restore();
    }
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;
    if (disc) return; // Can't change while disc is falling

    if (e.code === 'ArrowLeft') {
      currentColumn = (currentColumn - 1 + 4) % 4;
      playSound('select');
      columnHoverTime = 0;
    } else if (e.code === 'ArrowRight') {
      currentColumn = (currentColumn + 1) % 4;
      playSound('select');
      columnHoverTime = 0;
    } else if (e.code === 'Space' || e.code === 'Enter') {
      // Drop disc
      const col = ANSWER_COLS[currentColumn];
      const x = BOARD_X + col * CELL_SIZE + CELL_SIZE / 2;

      disc = {
        x: x,
        y: BOARD_Y - 40,
        col: col,
        vy: 0,
        color: COLORS.orange
      };
      selectedAnswer = currentColumn;
      playSound('drop');
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
