<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mastermind Code Peg</title>
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // Colors for Mastermind pegs (matching QuizHP palette)
  const PEG_COLORS = ['#E87A3E', '#4ECDC4', '#F5A742', '#6BBF59'];
  const BOARD_COLOR = '#5D4E37';
  const HOLE_COLOR = '#3D3225';
  const FEEDBACK_BLACK = '#2B2B28';
  const FEEDBACK_WHITE = '#FAFAF7';

  // Game state
  let board = {
    x: 40,
    y: 30,
    width: 280,
    height: 480,
    rows: 8,
    cols: 4
  };

  let pegTray = {
    x: 360,
    y: 30,
    width: 320,
    height: 480
  };

  let previousGuesses = [];
  let currentRow = 0;
  let hoveredPeg = -1;
  let animTime = 0;
  let pegAnimations = [];
  let selectedPegAnim = null;

  // Audio context for sounds
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  function playClickSound() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = 440;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialDecayTo && gain.gain.exponentialDecayTo(0.01, audioCtx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.1);
  }

  function playCorrectSound() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
    osc.frequency.setValueAtTime(523, audioCtx.currentTime);
    osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
    osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.4);
  }

  function playWrongSound() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'square';
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    osc.frequency.setValueAtTime(200, audioCtx.currentTime);
    osc.frequency.setValueAtTime(150, audioCtx.currentTime + 0.15);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.3);
  }

  function initGame() {
    // Generate fake previous guesses with feedback pegs
    previousGuesses = [];
    const correctIndex = QUESTION.choices.findIndex(c => c.is_correct);

    // Create 3-5 previous rows with random guesses and feedback
    const numPreviousRows = 3 + Math.floor(Math.random() * 3);

    for (let i = 0; i < numPreviousRows; i++) {
      const guess = [];
      for (let j = 0; j < 4; j++) {
        guess.push(Math.floor(Math.random() * 4));
      }

      // Generate feedback pegs - more correct as we progress
      const blackPegs = Math.min(Math.floor(Math.random() * 2) + Math.floor(i / 2), 3);
      const whitePegs = Math.min(Math.floor(Math.random() * 2), 4 - blackPegs);

      previousGuesses.push({
        pegs: guess,
        feedback: { black: blackPegs, white: whitePegs }
      });
    }

    currentRow = previousGuesses.length;
    hoveredPeg = -1;
    animTime = 0;
    pegAnimations = QUESTION.choices.map((_, i) => ({
      scale: 0,
      targetScale: 1,
      delay: i * 0.1
    }));
    selectedPegAnim = null;
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    animTime += dt;

    // Animate peg entrance
    pegAnimations.forEach((anim, i) => {
      const elapsed = animTime - anim.delay;
      if (elapsed > 0 && anim.scale < anim.targetScale) {
        anim.scale = Math.min(anim.targetScale, anim.scale + dt * 4);
      }
    });

    // Update selected peg animation
    if (selectedPegAnim) {
      selectedPegAnim.progress += dt * 3;
      if (selectedPegAnim.progress >= 1) {
        // Animation complete - select answer
        const choice = QUESTION.choices[selectedPegAnim.pegIndex];
        if (choice.is_correct) {
          playCorrectSound();
        } else {
          playWrongSound();
        }
        engine.end(choice.is_correct, choice.explanation);
        selectedPegAnim = null;
      }
    }
  }

  function drawGame() {
    // Clear canvas with background
    ctx.fillStyle = '#FAFAF7';
    ctx.fillRect(0, 0, W, H);

    // Draw main board
    drawBoard();

    // Draw peg tray (answer area)
    drawPegTray();

    // Draw animating peg if selecting
    if (selectedPegAnim && selectedPegAnim.progress < 1) {
      const t = selectedPegAnim.progress;
      const easeOut = 1 - Math.pow(1 - t, 3);
      const x = selectedPegAnim.startX + (selectedPegAnim.endX - selectedPegAnim.startX) * easeOut;
      const y = selectedPegAnim.startY + (selectedPegAnim.endY - selectedPegAnim.startY) * easeOut;
      const pegScale = 1 + Math.sin(t * Math.PI) * 0.2;

      drawPeg(x, y, 18 * pegScale, PEG_COLORS[selectedPegAnim.pegIndex]);
    }
  }

  function drawBoard() {
    // Board background with rounded corners
    ctx.fillStyle = BOARD_COLOR;
    ctx.beginPath();
    ctx.roundRect(board.x, board.y, board.width, board.height, 12);
    ctx.fill();

    // Draw shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.roundRect(board.x + 4, board.y + 4, board.width, board.height, 12);
    ctx.fill();

    // Redraw board on top
    ctx.fillStyle = BOARD_COLOR;
    ctx.beginPath();
    ctx.roundRect(board.x, board.y, board.width, board.height, 12);
    ctx.fill();

    const rowHeight = 50;
    const pegRadius = 16;
    const startY = board.y + 30;
    const pegSpacing = 50;
    const pegStartX = board.x + 50;

    // Draw all rows
    for (let row = 0; row < board.rows; row++) {
      const rowY = startY + row * rowHeight;
      const isCurrentRow = row === currentRow;
      const isPastRow = row < currentRow;

      // Row highlight for current row
      if (isCurrentRow) {
        ctx.fillStyle = 'rgba(232, 122, 62, 0.2)';
        ctx.beginPath();
        ctx.roundRect(board.x + 10, rowY - 20, board.width - 20, 42, 8);
        ctx.fill();
      }

      // Draw peg holes/pegs
      for (let col = 0; col < 4; col++) {
        const pegX = pegStartX + col * pegSpacing;

        if (isPastRow && previousGuesses[row]) {
          // Draw filled peg from past guess
          const colorIndex = previousGuesses[row].pegs[col];
          drawPeg(pegX, rowY, pegRadius, PEG_COLORS[colorIndex]);
        } else {
          // Draw empty hole
          ctx.fillStyle = HOLE_COLOR;
          ctx.beginPath();
          ctx.arc(pegX, rowY, pegRadius, 0, Math.PI * 2);
          ctx.fill();

          // Inner shadow for hole
          ctx.fillStyle = 'rgba(0,0,0,0.3)';
          ctx.beginPath();
          ctx.arc(pegX - 2, rowY - 2, pegRadius - 4, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // Draw feedback pegs for past rows
      if (isPastRow && previousGuesses[row]) {
        const feedback = previousGuesses[row].feedback;
        const feedbackX = board.x + board.width - 35;
        const feedbackY = rowY;

        drawFeedbackPegs(feedbackX, feedbackY, feedback.black, feedback.white);
      }

      // Draw empty feedback area for current/future rows
      if (!isPastRow) {
        const feedbackX = board.x + board.width - 35;
        const feedbackY = rowY;
        drawEmptyFeedback(feedbackX, feedbackY);
      }
    }
  }

  function drawPeg(x, y, radius, color) {
    // Peg shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.arc(x + 2, y + 2, radius, 0, Math.PI * 2);
    ctx.fill();

    // Main peg
    const gradient = ctx.createRadialGradient(x - radius/3, y - radius/3, 0, x, y, radius);
    gradient.addColorStop(0, lightenColor(color, 40));
    gradient.addColorStop(0.5, color);
    gradient.addColorStop(1, darkenColor(color, 30));

    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.fill();

    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.arc(x - radius/3, y - radius/3, radius/3, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawFeedbackPegs(x, y, blackCount, whiteCount) {
    const positions = [
      { dx: -7, dy: -7 },
      { dx: 7, dy: -7 },
      { dx: -7, dy: 7 },
      { dx: 7, dy: 7 }
    ];

    let pegIndex = 0;

    // Draw black pegs (correct position)
    for (let i = 0; i < blackCount && pegIndex < 4; i++, pegIndex++) {
      const pos = positions[pegIndex];
      ctx.fillStyle = FEEDBACK_BLACK;
      ctx.beginPath();
      ctx.arc(x + pos.dx, y + pos.dy, 5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Draw white pegs (correct color, wrong position)
    for (let i = 0; i < whiteCount && pegIndex < 4; i++, pegIndex++) {
      const pos = positions[pegIndex];
      ctx.fillStyle = FEEDBACK_WHITE;
      ctx.beginPath();
      ctx.arc(x + pos.dx, y + pos.dy, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Draw empty holes for remaining
    for (; pegIndex < 4; pegIndex++) {
      const pos = positions[pegIndex];
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.beginPath();
      ctx.arc(x + pos.dx, y + pos.dy, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawEmptyFeedback(x, y) {
    const positions = [
      { dx: -7, dy: -7 },
      { dx: 7, dy: -7 },
      { dx: -7, dy: 7 },
      { dx: 7, dy: 7 }
    ];

    positions.forEach(pos => {
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.beginPath();
      ctx.arc(x + pos.dx, y + pos.dy, 4, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  function drawPegTray() {
    // Tray background
    ctx.fillStyle = '#E8E4DD';
    ctx.beginPath();
    ctx.roundRect(pegTray.x, pegTray.y, pegTray.width, pegTray.height, 12);
    ctx.fill();

    // Border
    ctx.strokeStyle = '#D0C9BE';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Title
    ctx.fillStyle = '#2B2B28';
    ctx.font = "bold 20px 'Belanosima', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText('Select Your Answer', pegTray.x + pegTray.width / 2, pegTray.y + 15);

    // Draw each answer peg with text
    const pegSize = 30;
    const startY = pegTray.y + 60;
    const rowHeight = 100;

    QUESTION.choices.forEach((choice, i) => {
      const anim = pegAnimations[i];
      const scale = anim ? anim.scale : 1;
      const y = startY + i * rowHeight;
      const pegX = pegTray.x + 50;
      const textX = pegTray.x + 90;

      // Hover effect
      const isHovered = hoveredPeg === i && !selectedPegAnim;
      const hoverScale = isHovered ? 1.15 : 1;
      const finalScale = scale * hoverScale;

      // Draw peg
      if (scale > 0 && !(selectedPegAnim && selectedPegAnim.pegIndex === i)) {
        drawPeg(pegX, y + 15, pegSize * finalScale * 0.5, PEG_COLORS[i]);

        // Pulse ring on hover
        if (isHovered) {
          ctx.strokeStyle = PEG_COLORS[i];
          ctx.lineWidth = 2;
          ctx.globalAlpha = 0.5 + Math.sin(animTime * 6) * 0.3;
          ctx.beginPath();
          ctx.arc(pegX, y + 15, pegSize * 0.7, 0, Math.PI * 2);
          ctx.stroke();
          ctx.globalAlpha = 1;
        }
      }

      // Draw answer text - wrap to fit
      ctx.fillStyle = '#2B2B28';
      ctx.font = "500 14px 'Nunito', sans-serif";
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';

      const maxWidth = pegTray.width - 100;
      wrapText(choice.text, textX, y, maxWidth, 18);
    });
  }

  function wrapText(text, x, y, maxWidth, lineHeight) {
    const words = text.split(' ');
    let line = '';
    let currentY = y;

    for (let n = 0; n < words.length; n++) {
      const testLine = line + words[n] + ' ';
      const metrics = ctx.measureText(testLine);

      if (metrics.width > maxWidth && n > 0) {
        ctx.fillText(line.trim(), x, currentY);
        line = words[n] + ' ';
        currentY += lineHeight;
      } else {
        line = testLine;
      }
    }
    ctx.fillText(line.trim(), x, currentY);
  }

  function lightenColor(hex, percent) {
    const num = parseInt(hex.slice(1), 16);
    const amt = Math.round(2.55 * percent);
    const R = Math.min(255, (num >> 16) + amt);
    const G = Math.min(255, ((num >> 8) & 0x00FF) + amt);
    const B = Math.min(255, (num & 0x0000FF) + amt);
    return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
  }

  function darkenColor(hex, percent) {
    const num = parseInt(hex.slice(1), 16);
    const amt = Math.round(2.55 * percent);
    const R = Math.max(0, (num >> 16) - amt);
    const G = Math.max(0, ((num >> 8) & 0x00FF) - amt);
    const B = Math.max(0, (num & 0x0000FF) - amt);
    return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
  }

  function getPegBounds(index) {
    const startY = pegTray.y + 60;
    const rowHeight = 100;
    const y = startY + index * rowHeight;
    const pegX = pegTray.x + 50;

    return {
      x: pegTray.x + 10,
      y: y - 15,
      width: pegTray.width - 20,
      height: 80
    };
  }

  function getTargetSlotPosition() {
    const rowHeight = 50;
    const startY = board.y + 30;
    const pegStartX = board.x + 50;
    const rowY = startY + currentRow * rowHeight;

    // Target first empty slot
    return { x: pegStartX, y: rowY };
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;
  }

  // Mouse/click handling
  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'playing' || selectedPegAnim) return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    hoveredPeg = -1;
    for (let i = 0; i < QUESTION.choices.length; i++) {
      const bounds = getPegBounds(i);
      if (x >= bounds.x && x <= bounds.x + bounds.width &&
          y >= bounds.y && y <= bounds.y + bounds.height) {
        hoveredPeg = i;
        break;
      }
    }

    canvas.style.cursor = hoveredPeg >= 0 ? 'pointer' : 'default';
  });

  canvas.addEventListener('click', (e) => {
    if (gameState !== 'playing' || selectedPegAnim) return;

    initAudio();

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    for (let i = 0; i < QUESTION.choices.length; i++) {
      const bounds = getPegBounds(i);
      if (x >= bounds.x && x <= bounds.x + bounds.width &&
          y >= bounds.y && y <= bounds.y + bounds.height) {

        playClickSound();

        // Start animation of peg moving to board
        const startY = pegTray.y + 60 + i * 100 + 15;
        const startX = pegTray.x + 50;
        const target = getTargetSlotPosition();

        selectedPegAnim = {
          pegIndex: i,
          startX: startX,
          startY: startY,
          endX: target.x,
          endY: target.y,
          progress: 0
        };

        break;
      }
    }
  });

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
