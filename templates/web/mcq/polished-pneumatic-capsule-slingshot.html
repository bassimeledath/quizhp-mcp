<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pneumatic Capsule Slingshot</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    bgSecondary: '#F5F5F0',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC',
    copper: '#B87333',
    copperDark: '#8B5A2B',
    copperLight: '#D4955A',
    steam: 'rgba(200, 200, 190, 0.3)',
    soot: 'rgba(80, 80, 75, 0.6)',
    facilityBg: '#2A2A27',
    facilityWall: '#363633',
    pipeInner: '#1C1C1A',
  };

  // === SOUND ENGINE ===
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new AudioCtx();
    return audioCtx;
  }

  function playSound(type) {
    try {
      const ctx = getAudioCtx();
      const now = ctx.currentTime;

      if (type === 'fire') {
        // Pneumatic whoosh
        const noise = ctx.createBufferSource();
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.3, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) {
          data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.08));
        }
        noise.buffer = buf;
        const filter = ctx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.setValueAtTime(2000, now);
        filter.frequency.exponentialRampToValueAtTime(500, now + 0.3);
        filter.Q.value = 2;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
        noise.connect(filter).connect(gain).connect(ctx.destination);
        noise.start(now);
        noise.stop(now + 0.3);
      } else if (type === 'correct') {
        // Ascending chime
        [523, 659, 784].forEach((freq, i) => {
          const osc = ctx.createOscillator();
          osc.type = 'sine';
          osc.frequency.value = freq;
          const gain = ctx.createGain();
          gain.gain.setValueAtTime(0, now + i * 0.1);
          gain.gain.linearRampToValueAtTime(0.15, now + i * 0.1 + 0.05);
          gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.3);
          osc.connect(gain).connect(ctx.destination);
          osc.start(now + i * 0.1);
          osc.stop(now + i * 0.1 + 0.3);
        });
      } else if (type === 'wrong') {
        // Exhaust burst
        const noise = ctx.createBufferSource();
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.5, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) {
          data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.15));
        }
        noise.buffer = buf;
        const filter = ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 400;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.25, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
        noise.connect(filter).connect(gain).connect(ctx.destination);
        noise.start(now);
        noise.stop(now + 0.5);
      } else if (type === 'click') {
        const osc = ctx.createOscillator();
        osc.type = 'triangle';
        osc.frequency.value = 800;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
        osc.connect(gain).connect(ctx.destination);
        osc.start(now);
        osc.stop(now + 0.05);
      }
    } catch(e) {}
  }

  // === GAME STATE ===
  let launcher = { x: 360, y: 480, angle: -Math.PI / 2, width: 40, height: 60 };
  let capsule = null; // { x, y, vx, vy, active, trail: [] }
  let valves = []; // { x, y, w, h, choiceIndex, label, pipePoints[], hit, entranceAnim, alpha, scale }
  let pipes = []; // Segments connecting launcher to valves
  let steamParticles = [];
  let sootParticles = [];
  let gameParticles = []; // confetti for correct
  let entranceTime = 0;
  let shakeOffset = { x: 0, y: 0 };
  let shakeDecay = 0;
  let answerSelected = false;
  let selectedValveIdx = -1;
  let feedbackTimer = 0;
  let feedbackDuration = 0.8;

  // Pipe network points
  const TRUNK_TOP = { x: 360, y: 400 };
  const TRUNK_BOTTOM = { x: 360, y: 460 };
  const SPLIT_LEFT = { x: 180, y: 300 };
  const SPLIT_RIGHT = { x: 540, y: 300 };

  // Valve positions (branching pipe ends) - arranged in arc across top
  const VALVE_POSITIONS = [
    { x: 92, y: 20 },
    { x: 270, y: 15 },
    { x: 450, y: 15 },
    { x: 628, y: 20 },
  ];

  const VALVE_W = 160;
  const VALVE_H = 100;
  const PIPE_WIDTH = 16;

  // Word wrap helper for answer text
  function wrapText(text, maxWidth, font) {
    ctx.font = font;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    for (const word of words) {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    }
    if (currentLine) lines.push(currentLine);
    return lines;
  }

  function initGame() {
    launcher = { x: 360, y: 480, angle: -Math.PI / 2, width: 40, height: 60 };
    capsule = null;
    answerSelected = false;
    selectedValveIdx = -1;
    feedbackTimer = 0;
    shakeOffset = { x: 0, y: 0 };
    shakeDecay = 0;
    steamParticles = [];
    sootParticles = [];
    gameParticles = [];
    entranceTime = 0;

    // Create valve targets
    valves = QUESTION.choices.map((choice, i) => {
      const pos = VALVE_POSITIONS[i];
      return {
        x: pos.x - VALVE_W / 2,
        y: pos.y,
        w: VALVE_W,
        h: VALVE_H,
        choiceIndex: i,
        label: choice.text,
        hit: false,
        entranceAnim: 0,
        alpha: 0,
        scale: 0,
        hovered: false,
      };
    });

    // Generate pipe network
    pipes = [];
    // Main trunk from launcher up to split point
    pipes.push({ points: [{ x: 360, y: 460 }, { x: 360, y: 350 }], color: COLORS.copper });
    // Branch left
    pipes.push({ points: [{ x: 360, y: 350 }, { x: 180, y: 240 }], color: COLORS.copper });
    // Branch right
    pipes.push({ points: [{ x: 360, y: 350 }, { x: 540, y: 240 }], color: COLORS.copper });
    // Sub-branches to valves
    pipes.push({ points: [{ x: 180, y: 240 }, { x: VALVE_POSITIONS[0].x, y: VALVE_POSITIONS[0].y + VALVE_H }], color: COLORS.copper });
    pipes.push({ points: [{ x: 180, y: 240 }, { x: VALVE_POSITIONS[1].x, y: VALVE_POSITIONS[1].y + VALVE_H }], color: COLORS.copper });
    pipes.push({ points: [{ x: 540, y: 240 }, { x: VALVE_POSITIONS[2].x, y: VALVE_POSITIONS[2].y + VALVE_H }], color: COLORS.copper });
    pipes.push({ points: [{ x: 540, y: 240 }, { x: VALVE_POSITIONS[3].x, y: VALVE_POSITIONS[3].y + VALVE_H }], color: COLORS.copper });

    // Spawn ambient steam
    for (let i = 0; i < 8; i++) {
      spawnSteam(Math.random() * W, 300 + Math.random() * 200);
    }
  }

  function spawnSteam(x, y) {
    for (let i = 0; i < 3; i++) {
      steamParticles.push({
        x: x + (Math.random() - 0.5) * 20,
        y: y + (Math.random() - 0.5) * 10,
        vx: (Math.random() - 0.5) * 30,
        vy: -20 - Math.random() * 30,
        size: 8 + Math.random() * 16,
        alpha: 0.15 + Math.random() * 0.15,
        life: 1.5 + Math.random() * 2,
        maxLife: 1.5 + Math.random() * 2,
      });
    }
  }

  function spawnSoot(x, y) {
    for (let i = 0; i < 25; i++) {
      sootParticles.push({
        x: x + (Math.random() - 0.5) * 30,
        y: y + (Math.random() - 0.5) * 20,
        vx: (Math.random() - 0.5) * 200,
        vy: Math.random() * 100 + 50,
        size: 6 + Math.random() * 14,
        alpha: 0.5 + Math.random() * 0.3,
        life: 1.0 + Math.random() * 1.0,
        maxLife: 1.0 + Math.random() * 1.0,
      });
    }
  }

  function spawnCelebrationParticles(x, y) {
    const colors = [COLORS.orange, COLORS.amber, COLORS.cyan, COLORS.success];
    for (let i = 0; i < 30; i++) {
      gameParticles.push({
        x, y,
        vx: (Math.random() - 0.5) * 400,
        vy: -Math.random() * 300 - 100,
        size: 4 + Math.random() * 8,
        color: colors[Math.floor(Math.random() * colors.length)],
        rotation: Math.random() * Math.PI * 2,
        rotationSpeed: (Math.random() - 0.5) * 10,
        gravity: 500,
        alpha: 1,
      });
    }
  }

  // Aim angle limits
  const MIN_ANGLE = -Math.PI * 0.85;
  const MAX_ANGLE = -Math.PI * 0.15;
  const AIM_SPEED = 2.2;
  let keysDown = {};

  function getTargetValveIndex() {
    // Map angle range to valve indices (left-most angle = valve 0, right-most = valve 3)
    const normalizedAngle = (launcher.angle - MIN_ANGLE) / (MAX_ANGLE - MIN_ANGLE);
    const idx = Math.round(normalizedAngle * 3);
    return Math.max(0, Math.min(3, idx));
  }

  function buildPathToValve(valveIdx) {
    // Build waypoints through the pipe network to the target valve
    const vPos = VALVE_POSITIONS[valveIdx];
    const launchPt = { x: 360, y: 460 };
    const splitMain = { x: 360, y: 350 };
    const isLeft = valveIdx < 2;
    const splitBranch = isLeft ? { x: 180, y: 240 } : { x: 540, y: 240 };
    const endPt = { x: vPos.x, y: vPos.y + VALVE_H / 2 };
    return [launchPt, splitMain, splitBranch, endPt];
  }

  function fireCapsule() {
    if (capsule || answerSelected) return;
    const targetIdx = getTargetValveIndex();
    const path = buildPathToValve(targetIdx);
    capsule = {
      x: path[0].x,
      y: path[0].y,
      path: path,
      pathIndex: 0,
      progress: 0, // 0-1 along current segment
      speed: 700,
      active: true,
      trail: [],
      radius: 10,
      targetValve: targetIdx,
    };
    playSound('fire');
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    entranceTime += dt;

    // Entrance animations for valves
    valves.forEach((v, i) => {
      const delay = i * 0.12;
      const t = Math.max(0, Math.min(1, (entranceTime - delay) / 0.4));
      // Spring easing
      const spring = t < 1 ? 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t) : 1;
      v.scale = t * spring;
      v.alpha = t;
    });

    // Handle aiming with keys
    if (keysDown['ArrowLeft'] || keysDown['KeyA']) {
      launcher.angle -= AIM_SPEED * dt;
    }
    if (keysDown['ArrowRight'] || keysDown['KeyD']) {
      launcher.angle += AIM_SPEED * dt;
    }
    launcher.angle = Math.max(MIN_ANGLE, Math.min(MAX_ANGLE, launcher.angle));

    // Update capsule along pipe path
    if (capsule && capsule.active) {
      const p0 = capsule.path[capsule.pathIndex];
      const p1 = capsule.path[capsule.pathIndex + 1];
      const segDx = p1.x - p0.x;
      const segDy = p1.y - p0.y;
      const segLen = Math.sqrt(segDx * segDx + segDy * segDy);

      capsule.progress += (capsule.speed * dt) / segLen;

      if (capsule.progress >= 1) {
        capsule.pathIndex++;
        capsule.progress = 0;

        // Reached end of path?
        if (capsule.pathIndex >= capsule.path.length - 1) {
          // Arrived at target valve
          const i = capsule.targetValve;
          const v = valves[i];
          const cx = v.x + v.w / 2;
          const cy = v.y + v.h / 2;
          capsule.x = cx;
          capsule.y = cy;
          capsule.active = false;
          answerSelected = true;
          selectedValveIdx = i;
          v.hit = true;
          feedbackTimer = 0;

          const choice = QUESTION.choices[i];
          if (choice.is_correct) {
            playSound('correct');
            spawnCelebrationParticles(cx, cy);
          } else {
            playSound('wrong');
            spawnSoot(cx, cy);
            shakeDecay = 0.5;
          }
        }
      }

      if (capsule && capsule.active) {
        const cp0 = capsule.path[capsule.pathIndex];
        const cp1 = capsule.path[capsule.pathIndex + 1];
        capsule.x = cp0.x + (cp1.x - cp0.x) * capsule.progress;
        capsule.y = cp0.y + (cp1.y - cp0.y) * capsule.progress;
      }

      // Trail
      if (capsule) {
        capsule.trail.push({ x: capsule.x, y: capsule.y, alpha: 1 });
        if (capsule.trail.length > 20) capsule.trail.shift();
        capsule.trail.forEach(t => t.alpha -= dt * 3);
      }
    }

    // Answer feedback timer
    if (answerSelected) {
      feedbackTimer += dt;
      if (feedbackTimer >= feedbackDuration) {
        const choice = QUESTION.choices[selectedValveIdx];
        engine.end(choice.is_correct, choice.explanation);
      }
    }

    // Shake
    if (shakeDecay > 0) {
      shakeDecay -= dt * 2;
      const intensity = shakeDecay * 8;
      shakeOffset.x = (Math.random() - 0.5) * intensity;
      shakeOffset.y = (Math.random() - 0.5) * intensity;
    } else {
      shakeOffset.x = 0;
      shakeOffset.y = 0;
    }

    // Update steam
    steamParticles.forEach(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      p.alpha = Math.max(0, (p.life / p.maxLife) * 0.2);
    });
    steamParticles = steamParticles.filter(p => p.life > 0);

    // Replenish ambient steam
    if (steamParticles.length < 15 && Math.random() < dt * 3) {
      spawnSteam(100 + Math.random() * 520, 320 + Math.random() * 160);
    }

    // Update soot
    sootParticles.forEach(p => {
      p.vy += 100 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      p.alpha = Math.max(0, (p.life / p.maxLife) * 0.6);
    });
    sootParticles = sootParticles.filter(p => p.life > 0);

    // Update celebration particles
    gameParticles.forEach(p => {
      p.vy += p.gravity * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.alpha -= dt * 0.8;
    });
    gameParticles = gameParticles.filter(p => p.alpha > 0 && p.y < H + 50);
  }

  function drawGame() {
    ctx.save();
    ctx.translate(shakeOffset.x, shakeOffset.y);

    // Background - facility wall
    ctx.fillStyle = COLORS.facilityBg;
    ctx.fillRect(0, 0, W, H);

    // Wall panels
    drawFacilityBackground();

    // Draw pipes
    drawPipes();

    // Draw steam (behind valves)
    drawSteamParticles();

    // Draw valves with answer text
    drawValves();

    // Draw capsule trail and capsule
    drawCapsuleTrail();
    drawCapsule();

    // Draw launcher
    drawLauncher();

    // Draw soot particles (on top)
    drawSootParticles();

    // Draw celebration particles
    drawCelebrationParticles();

    // Draw aim indicator
    drawAimIndicator();

    ctx.restore();
  }

  function drawFacilityBackground() {
    // Metal wall panels
    for (let x = 0; x < W; x += 120) {
      for (let y = 0; y < H; y += 90) {
        ctx.strokeStyle = COLORS.facilityWall;
        ctx.lineWidth = 1;
        ctx.strokeRect(x + 2, y + 2, 116, 86);

        // Rivet dots at corners
        ctx.fillStyle = '#424240';
        const r = 2;
        ctx.beginPath(); ctx.arc(x + 8, y + 8, r, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(x + 112, y + 8, r, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(x + 8, y + 82, r, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(x + 112, y + 82, r, 0, Math.PI * 2); ctx.fill();
      }
    }

    // Floor grate area
    ctx.fillStyle = '#222220';
    ctx.fillRect(0, 490, W, 50);
    for (let x = 0; x < W; x += 16) {
      ctx.strokeStyle = '#333330';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x, 490);
      ctx.lineTo(x, 540);
      ctx.stroke();
    }
  }

  function drawPipes() {
    pipes.forEach(pipe => {
      const p0 = pipe.points[0];
      const p1 = pipe.points[1];

      // Pipe outer (copper)
      ctx.strokeStyle = COLORS.copper;
      ctx.lineWidth = PIPE_WIDTH;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(p0.x, p0.y);
      ctx.lineTo(p1.x, p1.y);
      ctx.stroke();

      // Pipe highlight
      ctx.strokeStyle = COLORS.copperLight;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(p0.x - 3, p0.y);
      ctx.lineTo(p1.x - 3, p1.y);
      ctx.stroke();

      // Pipe inner dark line
      ctx.strokeStyle = COLORS.copperDark;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(p0.x + 4, p0.y);
      ctx.lineTo(p1.x + 4, p1.y);
      ctx.stroke();
    });

    // Junction rings at pipe split points
    [{ x: 360, y: 350 }, { x: 180, y: 240 }, { x: 540, y: 240 }].forEach(pt => {
      ctx.fillStyle = COLORS.copperDark;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, PIPE_WIDTH / 2 + 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = COLORS.copper;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, PIPE_WIDTH / 2 + 1, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  function drawValves() {
    valves.forEach((v, i) => {
      if (v.alpha <= 0) return;

      ctx.save();
      ctx.globalAlpha = v.alpha;

      const cx = v.x + v.w / 2;
      const cy = v.y + v.h / 2;
      ctx.translate(cx, cy);
      ctx.scale(v.scale, v.scale);
      ctx.translate(-cx, -cy);

      // Valve connection ring at top of pipe
      ctx.fillStyle = COLORS.copperDark;
      ctx.beginPath();
      ctx.arc(cx, v.y + v.h + 4, PIPE_WIDTH / 2 + 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = COLORS.copper;
      ctx.beginPath();
      ctx.arc(cx, v.y + v.h + 4, PIPE_WIDTH / 2 + 2, 0, Math.PI * 2);
      ctx.fill();

      // Valve body
      let bgColor = COLORS.bgSurface;
      let borderColor = COLORS.borderSubtle;
      if (v.hit && selectedValveIdx === i) {
        const choice = QUESTION.choices[i];
        if (choice.is_correct) {
          bgColor = '#E8F8E5';
          borderColor = COLORS.success;
        } else {
          bgColor = '#FDECEB';
          borderColor = COLORS.error;
        }
      } else if (v.hovered) {
        bgColor = '#E8F9F8';
        borderColor = COLORS.cyan;
      }

      // Valve shape - rounded rectangle with metallic border
      ctx.fillStyle = bgColor;
      ctx.strokeStyle = borderColor;
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.roundRect(v.x, v.y, v.w, v.h, 10);
      ctx.fill();
      ctx.stroke();

      // Valve label letter (A, B, C, D)
      const letters = ['A', 'B', 'C', 'D'];
      ctx.fillStyle = COLORS.orange;
      ctx.font = "700 16px 'Nunito Sans', sans-serif";
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(letters[i], v.x + 8, v.y + 6);

      // Answer text - wrapped
      const textFont = "400 16px 'Nunito', sans-serif";
      const maxTextW = v.w - 16;
      const lines = wrapText(v.label, maxTextW, textFont);
      ctx.fillStyle = COLORS.textPrimary;
      ctx.font = textFont;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      const lineHeight = 18;
      const totalTextH = lines.length * lineHeight;
      const startY = v.y + 24 + Math.max(0, (v.h - 24 - totalTextH) / 2);
      lines.forEach((line, li) => {
        ctx.fillText(line, cx, startY + li * lineHeight);
      });

      ctx.restore();
    });
  }

  function drawLauncher() {
    const lx = launcher.x;
    const ly = launcher.y;

    ctx.save();
    ctx.translate(lx, ly);

    // Base platform
    ctx.fillStyle = COLORS.copperDark;
    ctx.beginPath();
    ctx.roundRect(-35, -8, 70, 24, 6);
    ctx.fill();
    ctx.fillStyle = COLORS.copper;
    ctx.beginPath();
    ctx.roundRect(-32, -5, 64, 18, 4);
    ctx.fill();

    // Rotating barrel
    ctx.rotate(launcher.angle + Math.PI / 2);

    // Barrel body
    const grad = ctx.createLinearGradient(-12, 0, 12, 0);
    grad.addColorStop(0, COLORS.copperDark);
    grad.addColorStop(0.3, COLORS.copperLight);
    grad.addColorStop(0.7, COLORS.copper);
    grad.addColorStop(1, COLORS.copperDark);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(-12, -55, 24, 55, 4);
    ctx.fill();

    // Barrel opening
    ctx.fillStyle = COLORS.pipeInner;
    ctx.beginPath();
    ctx.ellipse(0, -55, 8, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Pressure gauge on side
    ctx.fillStyle = '#444';
    ctx.beginPath();
    ctx.arc(16, -20, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = COLORS.amber;
    ctx.beginPath();
    ctx.arc(16, -20, 5, 0, Math.PI * 2);
    ctx.fill();
    // Gauge needle
    ctx.strokeStyle = COLORS.error;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(16, -20);
    const needleAngle = -Math.PI * 0.3 + Math.sin(entranceTime * 3) * 0.3;
    ctx.lineTo(16 + Math.cos(needleAngle) * 4, -20 + Math.sin(needleAngle) * 4);
    ctx.stroke();

    ctx.restore();
  }

  function drawAimIndicator() {
    if (capsule || answerSelected) return;

    const targetIdx = getTargetValveIndex();
    const path = buildPathToValve(targetIdx);

    // Draw dotted path through pipes to target
    ctx.save();
    ctx.setLineDash([6, 8]);
    ctx.strokeStyle = 'rgba(78, 205, 196, 0.45)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(path[0].x, path[0].y);
    for (let i = 1; i < path.length; i++) {
      ctx.lineTo(path[i].x, path[i].y);
    }
    ctx.stroke();
    ctx.setLineDash([]);

    // Highlight target valve with glow
    const v = valves[targetIdx];
    if (v && v.alpha > 0) {
      ctx.strokeStyle = 'rgba(78, 205, 196, 0.6)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.roundRect(v.x - 3, v.y - 3, v.w + 6, v.h + 6, 13);
      ctx.stroke();
    }

    ctx.restore();
  }

  function drawCapsule() {
    if (!capsule) return;

    ctx.save();
    const cx = capsule.x;
    const cy = capsule.y;

    // Derive angle from path direction
    let angle = 0;
    if (capsule.active && capsule.pathIndex < capsule.path.length - 1) {
      const p0 = capsule.path[capsule.pathIndex];
      const p1 = capsule.path[capsule.pathIndex + 1];
      angle = Math.atan2(p1.y - p0.y, p1.x - p0.x);
    }
    ctx.translate(cx, cy);
    ctx.rotate(angle);

    // Capsule shape
    const capGrad = ctx.createLinearGradient(0, -6, 0, 6);
    capGrad.addColorStop(0, '#A0673C');
    capGrad.addColorStop(0.5, '#8B5A2B');
    capGrad.addColorStop(1, '#6B4423');
    ctx.fillStyle = capGrad;
    ctx.beginPath();
    ctx.ellipse(0, 0, capsule.radius, 6, 0, 0, Math.PI * 2);
    ctx.fill();

    // Leather stitching
    ctx.strokeStyle = '#C4955A';
    ctx.lineWidth = 0.8;
    ctx.setLineDash([2, 2]);
    ctx.beginPath();
    ctx.ellipse(0, 0, capsule.radius - 2, 4, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);

    // Metal cap at front
    ctx.fillStyle = COLORS.copper;
    ctx.beginPath();
    ctx.ellipse(capsule.radius - 2, 0, 3, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawCapsuleTrail() {
    if (!capsule) return;
    capsule.trail.forEach((pt, i) => {
      if (pt.alpha <= 0) return;
      ctx.fillStyle = `rgba(232, 122, 62, ${pt.alpha * 0.3})`;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, 3 + (i / capsule.trail.length) * 4, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  function drawSteamParticles() {
    steamParticles.forEach(p => {
      if (p.alpha <= 0) return;
      ctx.fillStyle = `rgba(200, 200, 190, ${p.alpha})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  function drawSootParticles() {
    sootParticles.forEach(p => {
      if (p.alpha <= 0) return;
      ctx.fillStyle = `rgba(80, 80, 75, ${p.alpha})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  function drawCelebrationParticles() {
    gameParticles.forEach(p => {
      if (p.alpha <= 0) return;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.globalAlpha = 1;
      ctx.restore();
    });
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;

    if (e.type === 'keydown') {
      keysDown[e.code] = true;

      if (e.code === 'Space' || e.code === 'Enter') {
        e.preventDefault();
        fireCapsule();
      }
    }
    if (e.type === 'keyup') {
      keysDown[e.code] = false;
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
    handleInput(e);
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
