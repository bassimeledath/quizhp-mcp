<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arch Keystone Place</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1C1C1A;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #FAFAF7;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC',
    stone: '#8B7355',
    stoneDark: '#6B5344',
    stoneLight: '#A89070',
    sky: '#87CEEB'
  };

  // === AUDIO ===
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playSound(type) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'click') {
      osc.frequency.value = 440;
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialDecayTo && gain.gain.exponentialDecayTo(0.01, audioCtx.currentTime + 0.1);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'place') {
      osc.frequency.value = 220;
      osc.type = 'triangle';
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.2);
    } else if (type === 'correct') {
      osc.frequency.value = 523;
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      osc.start();
      setTimeout(() => {
        osc.frequency.value = 659;
      }, 100);
      setTimeout(() => {
        osc.frequency.value = 784;
      }, 200);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
      osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'wrong') {
      osc.frequency.value = 200;
      osc.type = 'sawtooth';
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    }
  }

  // === GAME STATE ===
  let archBlocks = [];      // The pre-placed arch blocks
  let keystoneSlots = [];   // The 4 possible keystone positions
  let keystone = null;      // The draggable keystone
  let dragging = null;      // Currently dragged block
  let dragOffset = { x: 0, y: 0 };
  let hoverSlot = -1;       // Which slot is being hovered
  let gamePhase = 'placing'; // 'placing' | 'selected'
  let selectedSlot = -1;
  let animTime = 0;
  let entranceProgress = 0;
  let particles = [];
  let shakeAmount = 0;
  let pulseScale = 1;

  // Arch geometry constants
  const ARCH_CENTER_X = W / 2;
  const ARCH_BASE_Y = 400;
  const ARCH_RADIUS = 160;
  const GROUND_Y = 440;

  function initGame() {
    archBlocks = [];
    keystoneSlots = [];
    keystone = null;
    dragging = null;
    hoverSlot = -1;
    gamePhase = 'placing';
    selectedSlot = -1;
    animTime = 0;
    entranceProgress = 0;
    particles = [];
    shakeAmount = 0;
    pulseScale = 1;

    // Create the arch blocks (voussoirs) - 5 on each side
    const numBlocksPerSide = 5;
    const angleStep = Math.PI / (numBlocksPerSide * 2 + 2); // Leave gap for keystone

    // Left side blocks
    for (let i = 0; i < numBlocksPerSide; i++) {
      const angle = Math.PI - (i + 1) * angleStep;
      archBlocks.push({
        x: ARCH_CENTER_X + Math.cos(angle) * ARCH_RADIUS,
        y: ARCH_BASE_Y - Math.sin(angle) * ARCH_RADIUS,
        angle: angle - Math.PI / 2,
        width: 50,
        height: 30,
        placed: true,
        side: 'left',
        index: i,
        entranceDelay: i * 0.08,
        scale: 0,
        alpha: 0
      });
    }

    // Right side blocks
    for (let i = 0; i < numBlocksPerSide; i++) {
      const angle = (i + 1) * angleStep;
      archBlocks.push({
        x: ARCH_CENTER_X + Math.cos(angle) * ARCH_RADIUS,
        y: ARCH_BASE_Y - Math.sin(angle) * ARCH_RADIUS,
        angle: angle - Math.PI / 2,
        width: 50,
        height: 30,
        placed: true,
        side: 'right',
        index: i,
        entranceDelay: i * 0.08 + 0.5,
        scale: 0,
        alpha: 0
      });
    }

    // Create 4 keystone slots at the top of the arch (where answers go)
    // Slots are positioned around the top center of the arch
    const slotAngles = [
      Math.PI / 2 + 0.25,  // Slightly left of center
      Math.PI / 2 + 0.08,  // Just left of center
      Math.PI / 2 - 0.08,  // Just right of center
      Math.PI / 2 - 0.25   // Slightly right of center
    ];

    QUESTION.choices.forEach((choice, i) => {
      const angle = slotAngles[i];
      keystoneSlots.push({
        x: ARCH_CENTER_X + Math.cos(angle) * (ARCH_RADIUS - 15),
        y: ARCH_BASE_Y - Math.sin(angle) * (ARCH_RADIUS - 15),
        angle: angle - Math.PI / 2,
        width: 55,
        height: 35,
        choice: choice,
        index: i,
        hovered: false,
        scale: 1,
        entranceDelay: 1.0 + i * 0.1
      });
    });

    // Create the keystone to drag — staging area between arch pillars
    keystone = {
      x: W / 2,
      y: 420,
      angle: 0,
      width: 60,
      height: 38,
      scale: 0,
      alpha: 0,
      entranceDelay: 0.8
    };
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    animTime += dt;
    entranceProgress += dt;

    // Update entrance animations
    archBlocks.forEach(block => {
      if (entranceProgress > block.entranceDelay) {
        const t = Math.min((entranceProgress - block.entranceDelay) / 0.35, 1);
        const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
        block.scale = t * spring;
        block.alpha = t;
        if (t >= 1) { block.scale = 1; block.alpha = 1; }
      }
    });

    keystoneSlots.forEach(slot => {
      if (entranceProgress > slot.entranceDelay) {
        const t = Math.min((entranceProgress - slot.entranceDelay) / 0.3, 1);
        slot.scale = 0.3 + t * 0.7;
      }
    });

    if (keystone && entranceProgress > keystone.entranceDelay) {
      const t = Math.min((entranceProgress - keystone.entranceDelay) / 0.4, 1);
      const spring = 1 + Math.sin(t * Math.PI * 2) * 0.15 * (1 - t);
      keystone.scale = t * spring;
      keystone.alpha = t;
      if (t >= 1) { keystone.scale = 1; keystone.alpha = 1; }
    }

    // Update particles
    particles = particles.filter(p => {
      p.vy += 400 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.alpha -= dt * 1.5;
      return p.alpha > 0;
    });

    // Decay shake
    shakeAmount *= 0.9;

    // Pulse animation
    pulseScale = 1 + Math.sin(animTime * 4) * 0.02;

    // Check if keystone is over a slot while dragging
    if (dragging === keystone) {
      hoverSlot = -1;
      const kx = keystone.x;
      const ky = keystone.y;

      keystoneSlots.forEach((slot, i) => {
        const dx = kx - slot.x;
        const dy = ky - slot.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 40) {
          hoverSlot = i;
          slot.hovered = true;
        } else {
          slot.hovered = false;
        }
      });
    }
  }

  function drawWedgeBlock(x, y, angle, width, height, color, borderColor, alpha = 1, scl = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.scale(scl, scl);

    // Wedge shape (trapezoidal)
    const topWidth = width * 0.7;
    ctx.beginPath();
    ctx.moveTo(-topWidth / 2, -height / 2);
    ctx.lineTo(topWidth / 2, -height / 2);
    ctx.lineTo(width / 2, height / 2);
    ctx.lineTo(-width / 2, height / 2);
    ctx.closePath();

    // Fill
    ctx.fillStyle = color;
    ctx.fill();

    // Border
    ctx.strokeStyle = borderColor;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Stone texture lines
    ctx.strokeStyle = borderColor;
    ctx.lineWidth = 1;
    ctx.globalAlpha = alpha * 0.3;
    ctx.beginPath();
    ctx.moveTo(-width * 0.3, -height * 0.2);
    ctx.lineTo(width * 0.2, -height * 0.1);
    ctx.moveTo(-width * 0.2, height * 0.2);
    ctx.lineTo(width * 0.3, height * 0.15);
    ctx.stroke();

    ctx.restore();
  }

  function drawKeystoneSlot(slot, isHovered) {
    ctx.save();
    ctx.translate(slot.x, slot.y);
    ctx.rotate(slot.angle);
    ctx.scale(slot.scale, slot.scale);

    const width = slot.width;
    const height = slot.height;
    const topWidth = width * 0.7;

    // Slot outline (dashed)
    ctx.beginPath();
    ctx.moveTo(-topWidth / 2, -height / 2);
    ctx.lineTo(topWidth / 2, -height / 2);
    ctx.lineTo(width / 2, height / 2);
    ctx.lineTo(-width / 2, height / 2);
    ctx.closePath();

    if (isHovered) {
      ctx.fillStyle = 'rgba(78, 205, 196, 0.3)';
      ctx.fill();
      ctx.strokeStyle = COLORS.cyan;
      ctx.lineWidth = 3;
    } else {
      ctx.fillStyle = 'rgba(139, 115, 85, 0.15)';
      ctx.fill();
      ctx.strokeStyle = COLORS.borderStrong;
      ctx.lineWidth = 2;
      ctx.setLineDash([5, 5]);
    }
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.restore();

    // Draw slot label (A, B, C, D)
    const labels = ['A', 'B', 'C', 'D'];
    ctx.save();
    ctx.font = "600 16px 'Nunito Sans', sans-serif";
    ctx.fillStyle = isHovered ? COLORS.cyan : COLORS.textSecondary;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Position label below the slot
    const labelY = slot.y + 35;
    ctx.fillText(labels[slot.index], slot.x, labelY);
    ctx.restore();
  }

  function wrapText(text, maxWidth, fontSize) {
    ctx.font = `400 ${fontSize}px 'Nunito', sans-serif`;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';

    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      const metrics = ctx.measureText(testLine);
      if (metrics.width > maxWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    return lines;
  }

  function drawGame() {
    // Apply shake
    ctx.save();
    if (shakeAmount > 0.5) {
      ctx.translate(
        (Math.random() - 0.5) * shakeAmount,
        (Math.random() - 0.5) * shakeAmount
      );
    }

    // Sky gradient background
    const skyGradient = ctx.createLinearGradient(0, 0, 0, H);
    skyGradient.addColorStop(0, '#87CEEB');
    skyGradient.addColorStop(0.6, '#E0F0FF');
    skyGradient.addColorStop(1, COLORS.bgPrimary);
    ctx.fillStyle = skyGradient;
    ctx.fillRect(0, 0, W, H);

    // Ground
    ctx.fillStyle = '#8B7355';
    ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

    // Ground texture
    ctx.fillStyle = '#6B5344';
    for (let i = 0; i < 20; i++) {
      const gx = (i * 40 + animTime * 0) % W;
      ctx.fillRect(gx, GROUND_Y + 5, 25, 3);
    }

    // Draw pillars
    const pillarWidth = 60;
    const pillarHeight = 180;

    // Left pillar
    ctx.fillStyle = COLORS.stone;
    ctx.fillRect(ARCH_CENTER_X - ARCH_RADIUS - pillarWidth / 2, ARCH_BASE_Y, pillarWidth, pillarHeight);
    ctx.strokeStyle = COLORS.stoneDark;
    ctx.lineWidth = 2;
    ctx.strokeRect(ARCH_CENTER_X - ARCH_RADIUS - pillarWidth / 2, ARCH_BASE_Y, pillarWidth, pillarHeight);

    // Right pillar
    ctx.fillRect(ARCH_CENTER_X + ARCH_RADIUS - pillarWidth / 2, ARCH_BASE_Y, pillarWidth, pillarHeight);
    ctx.strokeRect(ARCH_CENTER_X + ARCH_RADIUS - pillarWidth / 2, ARCH_BASE_Y, pillarWidth, pillarHeight);

    // Draw arch blocks
    archBlocks.forEach(block => {
      if (block.scale > 0) {
        drawWedgeBlock(
          block.x, block.y, block.angle,
          block.width, block.height,
          COLORS.stone, COLORS.stoneDark,
          block.alpha, block.scale
        );
      }
    });

    // Draw keystone slots
    keystoneSlots.forEach((slot, i) => {
      drawKeystoneSlot(slot, hoverSlot === i);
    });

    // Draw particles
    particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Draw keystone with glow
    if (keystone && keystone.scale > 0) {
      const kScale = dragging === keystone ? keystone.scale * 1.1 : keystone.scale * pulseScale;

      // Golden glow behind keystone
      if (!dragging) {
        const glowPulse = 0.3 + Math.sin(animTime * 3) * 0.15;
        const glow = ctx.createRadialGradient(keystone.x, keystone.y, 0, keystone.x, keystone.y, 50);
        glow.addColorStop(0, `rgba(245, 167, 66, ${glowPulse * keystone.alpha})`);
        glow.addColorStop(1, 'rgba(245, 167, 66, 0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(keystone.x, keystone.y, 50, 0, Math.PI * 2);
        ctx.fill();
      }

      drawWedgeBlock(
        keystone.x, keystone.y, keystone.angle,
        keystone.width, keystone.height,
        COLORS.amber, COLORS.orangeHover,
        keystone.alpha, kScale
      );

      // Keystone label and drag hint
      if (!dragging) {
        ctx.save();
        ctx.globalAlpha = keystone.alpha;
        ctx.font = "700 16px 'Nunito Sans', sans-serif";
        ctx.fillStyle = COLORS.orangeHover;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('KEYSTONE', keystone.x, keystone.y + 35);
        ctx.font = "500 12px 'Nunito', sans-serif";
        ctx.fillStyle = COLORS.textSecondary;
        ctx.fillText('Drag to a slot above', keystone.x, keystone.y + 52);
        ctx.restore();
      }
    }

    ctx.restore(); // End shake transform

    // Draw answer boxes at the bottom
    const boxWidth = 165;
    const boxHeight = 80;
    const boxGap = 6;
    const startX = (W - (boxWidth * 4 + boxGap * 3)) / 2;
    const boxY = H - boxHeight - 10;

    QUESTION.choices.forEach((choice, i) => {
      const bx = startX + i * (boxWidth + boxGap);
      const isHovered = hoverSlot === i;

      // Box background
      ctx.fillStyle = isHovered ? '#E8F9F8' : COLORS.bgSurface;
      ctx.beginPath();
      ctx.roundRect(bx, boxY, boxWidth, boxHeight, 8);
      ctx.fill();

      // Border
      ctx.strokeStyle = isHovered ? COLORS.cyan : COLORS.borderSubtle;
      ctx.lineWidth = isHovered ? 2 : 1;
      ctx.stroke();

      // Letter label
      const labels = ['A', 'B', 'C', 'D'];
      ctx.font = "700 16px 'Nunito Sans', sans-serif";
      ctx.fillStyle = isHovered ? COLORS.cyan : COLORS.orange;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(labels[i], bx + 8, boxY + 6);

      // Answer text (wrapped)
      const lines = wrapText(choice.text, boxWidth - 16, 14);
      ctx.font = "400 14px 'Nunito', sans-serif";
      ctx.fillStyle = COLORS.textPrimary;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';

      const lineHeight = 15;
      const maxLines = 4;
      const displayLines = lines.slice(0, maxLines);
      displayLines.forEach((line, li) => {
        ctx.fillText(line, bx + 8, boxY + 22 + li * lineHeight);
      });
    });
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;
    // Keyboard not used - mouse/drag only
  }

  // Mouse handling for drag
  canvas.addEventListener('mousedown', (e) => {
    if (gameState !== 'playing' || gamePhase !== 'placing') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    // Check if clicking on keystone
    if (keystone && keystone.scale >= 1) {
      const dx = x - keystone.x;
      const dy = y - keystone.y;
      if (Math.abs(dx) < keystone.width / 2 + 10 && Math.abs(dy) < keystone.height / 2 + 10) {
        dragging = keystone;
        dragOffset.x = dx;
        dragOffset.y = dy;
        playSound('click');
      }
    }
  });

  canvas.addEventListener('mousemove', (e) => {
    if (!dragging) return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);
    dragging.x = x - dragOffset.x;
    dragging.y = y - dragOffset.y;
  });

  canvas.addEventListener('mouseup', (e) => {
    if (!dragging) return;

    // Check if dropped on a slot
    if (hoverSlot >= 0) {
      const slot = keystoneSlots[hoverSlot];
      const choice = slot.choice;

      // Snap keystone to slot
      keystone.x = slot.x;
      keystone.y = slot.y;
      keystone.angle = slot.angle;

      playSound('place');
      gamePhase = 'selected';
      selectedSlot = hoverSlot;

      // Spawn particles
      for (let i = 0; i < 20; i++) {
        particles.push({
          x: slot.x,
          y: slot.y,
          vx: (Math.random() - 0.5) * 200,
          vy: -Math.random() * 150 - 50,
          size: 4 + Math.random() * 4,
          color: [COLORS.orange, COLORS.amber, COLORS.cyan][Math.floor(Math.random() * 3)],
          rotation: Math.random() * Math.PI * 2,
          rotationSpeed: (Math.random() - 0.5) * 8,
          alpha: 1
        });
      }

      // End game after brief delay
      setTimeout(() => {
        if (choice.is_correct) {
          playSound('correct');
        } else {
          playSound('wrong');
          shakeAmount = 15;
        }
        engine.end(choice.is_correct, choice.explanation);
      }, 500);
    } else {
      // Return keystone to staging area
      keystone.x = W / 2;
      keystone.y = 420;
      keystone.angle = 0;
    }

    dragging = null;
    hoverSlot = -1;
    keystoneSlots.forEach(s => s.hovered = false);
  });

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
