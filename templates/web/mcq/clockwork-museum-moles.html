<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clockwork Museum Moles</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === GAME STATE ===
  let pedestals = [];
  let selectedIndex = 0;
  let automata = [];
  let ravens = [];
  let gears = [];
  let skyLightGlow = 0;
  let gameTime = 0;
  let whackAnimation = null;
  let shakeAnimation = null;
  let celebrationParticles = [];

  // Sound effects using Web Audio
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playSound(type) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'correct') {
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialDecayTo && gain.gain.exponentialDecayTo(0.01, audioCtx.currentTime + 0.4);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'wrong') {
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.3);
    } else if (type === 'click') {
      osc.frequency.setValueAtTime(800, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.05);
    } else if (type === 'move') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(440, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.03);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.03);
    }
  }

  // Wrap text into multiple lines
  function wrapText(text, maxWidth) {
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';

    ctx.font = '14px Nunito, sans-serif';

    for (const word of words) {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      const metrics = ctx.measureText(testLine);

      if (metrics.width > maxWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    }
    if (currentLine) {
      lines.push(currentLine);
    }
    return lines;
  }

  function initGame() {
    gameTime = 0;
    whackAnimation = null;
    shakeAnimation = null;
    ravens = [];
    celebrationParticles = [];

    // Create 4 pedestals in a row
    const pedestalWidth = 160;
    const pedestalHeight = 140;
    const startX = 40;
    const pedestalY = 340;
    const spacing = 170;

    pedestals = QUESTION.choices.map((choice, i) => ({
      x: startX + i * spacing,
      y: pedestalY,
      width: pedestalWidth,
      height: pedestalHeight,
      choice: choice,
      popUp: 0,
      targetPopUp: 1,
      placard: {
        rotation: 0,
        rotationSpeed: 0.5 + Math.random() * 0.5
      },
      entranceDelay: i * 0.15,
      entranceProgress: 0
    }));

    selectedIndex = 0;

    // Create marching automata in background
    automata = [];
    for (let i = 0; i < 5; i++) {
      automata.push({
        x: -50 + i * 200,
        y: 180 + Math.random() * 40,
        speed: 20 + Math.random() * 15,
        legPhase: Math.random() * Math.PI * 2,
        armPhase: Math.random() * Math.PI * 2,
        scale: 0.6 + Math.random() * 0.3
      });
    }

    // Create decorative gears
    gears = [];
    for (let i = 0; i < 8; i++) {
      gears.push({
        x: Math.random() * W,
        y: 20 + Math.random() * 100,
        radius: 15 + Math.random() * 25,
        teeth: 8 + Math.floor(Math.random() * 6),
        rotation: Math.random() * Math.PI * 2,
        speed: (Math.random() - 0.5) * 2
      });
    }
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;
    skyLightGlow = 0.5 + Math.sin(gameTime * 0.5) * 0.2;

    // Update pedestal pop-up animations with bounce
    pedestals.forEach((p, i) => {
      if (gameTime > p.entranceDelay) {
        p.entranceProgress = Math.min(1, p.entranceProgress + dt * 3);
        // Bounce easing
        const t = p.entranceProgress;
        const bounce = t < 0.5
          ? 4 * t * t * t
          : 1 - Math.pow(-2 * t + 2, 3) / 2;
        p.popUp = bounce * p.targetPopUp;
      }

      // Placard rotation
      p.placard.rotation += p.placard.rotationSpeed * dt;
    });

    // Update automata marching
    automata.forEach(a => {
      a.x += a.speed * dt;
      if (a.x > W + 50) a.x = -50;
      a.legPhase += dt * 5;
      a.armPhase += dt * 4;
    });

    // Update gears
    gears.forEach(g => {
      g.rotation += g.speed * dt;
    });

    // Update ravens
    ravens = ravens.filter(r => {
      r.x += r.vx * dt;
      r.y += r.vy * dt;
      r.vy += 20 * dt;
      r.rotation += r.rotationSpeed * dt;
      r.life -= dt;
      r.wingPhase += dt * 15;
      return r.life > 0;
    });

    // Update whack animation
    if (whackAnimation) {
      whackAnimation.progress += dt * 4;
      if (whackAnimation.progress >= 1) {
        whackAnimation = null;
      }
    }

    // Update shake animation
    if (shakeAnimation) {
      shakeAnimation.progress += dt * 8;
      if (shakeAnimation.progress >= 1) {
        shakeAnimation = null;
      }
    }

    // Update celebration particles
    celebrationParticles = celebrationParticles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 200 * dt;
      p.rotation += p.rotationSpeed * dt;
      p.life -= dt;
      return p.life > 0;
    });
  }

  function drawGame() {
    // Draw museum background - velvet walls with amber glow
    const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
    bgGrad.addColorStop(0, '#2B1B17');
    bgGrad.addColorStop(0.3, '#3D2317');
    bgGrad.addColorStop(1, '#1A1210');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    // Amber skylights
    const skyY = 30;
    for (let i = 0; i < 3; i++) {
      const skyX = 120 + i * 240;
      ctx.save();
      ctx.globalAlpha = 0.3 + skyLightGlow * 0.4;
      const lightGrad = ctx.createRadialGradient(skyX, skyY, 0, skyX, skyY, 150);
      lightGrad.addColorStop(0, '#F5A742');
      lightGrad.addColorStop(0.5, 'rgba(245, 167, 66, 0.3)');
      lightGrad.addColorStop(1, 'rgba(245, 167, 66, 0)');
      ctx.fillStyle = lightGrad;
      ctx.fillRect(skyX - 150, 0, 300, 250);
      ctx.restore();

      // Skylight frame
      ctx.fillStyle = '#8B7355';
      ctx.fillRect(skyX - 60, 0, 120, 15);
      ctx.fillStyle = '#A08060';
      ctx.fillRect(skyX - 55, 0, 110, 10);
    }

    // Draw decorative gears
    gears.forEach(g => {
      ctx.save();
      ctx.translate(g.x, g.y);
      ctx.rotate(g.rotation);
      ctx.fillStyle = '#8B6914';
      ctx.globalAlpha = 0.4;

      // Gear body
      ctx.beginPath();
      ctx.arc(0, 0, g.radius * 0.7, 0, Math.PI * 2);
      ctx.fill();

      // Gear teeth
      for (let t = 0; t < g.teeth; t++) {
        const angle = (t / g.teeth) * Math.PI * 2;
        ctx.save();
        ctx.rotate(angle);
        ctx.fillRect(-4, g.radius * 0.6, 8, g.radius * 0.4);
        ctx.restore();
      }

      // Center hole
      ctx.fillStyle = '#1A1210';
      ctx.beginPath();
      ctx.arc(0, 0, g.radius * 0.2, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    });

    // Draw marching automata in background
    automata.forEach(a => {
      ctx.save();
      ctx.translate(a.x, a.y);
      ctx.scale(a.scale, a.scale);
      ctx.globalAlpha = 0.6;

      // Body - brass colored
      ctx.fillStyle = '#B8860B';
      ctx.fillRect(-15, -40, 30, 50);

      // Head
      ctx.fillStyle = '#CD853F';
      ctx.beginPath();
      ctx.arc(0, -55, 18, 0, Math.PI * 2);
      ctx.fill();

      // Eyes
      ctx.fillStyle = '#4ECDC4';
      ctx.beginPath();
      ctx.arc(-6, -58, 4, 0, Math.PI * 2);
      ctx.arc(6, -58, 4, 0, Math.PI * 2);
      ctx.fill();

      // Legs - marching
      const legSwing = Math.sin(a.legPhase) * 20;
      ctx.fillStyle = '#8B7355';
      ctx.save();
      ctx.translate(-8, 10);
      ctx.rotate(legSwing * Math.PI / 180);
      ctx.fillRect(-4, 0, 8, 35);
      ctx.restore();
      ctx.save();
      ctx.translate(8, 10);
      ctx.rotate(-legSwing * Math.PI / 180);
      ctx.fillRect(-4, 0, 8, 35);
      ctx.restore();

      // Arms - swinging
      const armSwing = Math.sin(a.armPhase) * 30;
      ctx.fillStyle = '#B8860B';
      ctx.save();
      ctx.translate(-18, -30);
      ctx.rotate(armSwing * Math.PI / 180);
      ctx.fillRect(-3, 0, 6, 30);
      ctx.restore();
      ctx.save();
      ctx.translate(18, -30);
      ctx.rotate(-armSwing * Math.PI / 180);
      ctx.fillRect(-3, 0, 6, 30);
      ctx.restore();

      ctx.restore();
    });

    // Draw floor
    ctx.fillStyle = '#2B2B28';
    ctx.fillRect(0, 490, W, 60);

    // Floor pattern - checkerboard
    for (let i = 0; i < 12; i++) {
      for (let j = 0; j < 2; j++) {
        if ((i + j) % 2 === 0) {
          ctx.fillStyle = 'rgba(139, 115, 85, 0.3)';
          ctx.fillRect(i * 60, 490 + j * 30, 60, 30);
        }
      }
    }

    // Draw pedestals with answer choices
    pedestals.forEach((p, i) => {
      const isSelected = i === selectedIndex;
      const shakeOffset = shakeAnimation && shakeAnimation.index === i
        ? Math.sin(shakeAnimation.progress * Math.PI * 8) * 8 * (1 - shakeAnimation.progress)
        : 0;
      const whackOffset = whackAnimation && whackAnimation.index === i
        ? Math.sin(whackAnimation.progress * Math.PI) * 20
        : 0;

      ctx.save();
      ctx.translate(p.x + p.width / 2 + shakeOffset, p.y + p.height);

      // Pedestal base
      const baseGrad = ctx.createLinearGradient(-p.width / 2, 0, p.width / 2, 0);
      baseGrad.addColorStop(0, '#4A3728');
      baseGrad.addColorStop(0.5, '#6B4E37');
      baseGrad.addColorStop(1, '#4A3728');
      ctx.fillStyle = baseGrad;

      // Main pedestal body
      ctx.beginPath();
      ctx.moveTo(-p.width / 2, 0);
      ctx.lineTo(-p.width / 2 + 10, -80);
      ctx.lineTo(p.width / 2 - 10, -80);
      ctx.lineTo(p.width / 2, 0);
      ctx.closePath();
      ctx.fill();

      // Pedestal top
      ctx.fillStyle = '#5D4332';
      ctx.fillRect(-p.width / 2 + 5, -85, p.width - 10, 10);

      // Brass trim
      ctx.fillStyle = '#B8860B';
      ctx.fillRect(-p.width / 2, -5, p.width, 8);
      ctx.fillRect(-p.width / 2 + 3, -88, p.width - 6, 5);

      // Hidden hatch - mannequin rising from it
      const hatchY = -85 - p.popUp * 100 - whackOffset;

      // Draw mannequin body
      ctx.save();
      ctx.translate(0, hatchY);

      // Mannequin torso
      const mannequinGrad = ctx.createLinearGradient(-25, 0, 25, 0);
      mannequinGrad.addColorStop(0, '#8B7355');
      mannequinGrad.addColorStop(0.5, '#A08060');
      mannequinGrad.addColorStop(1, '#8B7355');
      ctx.fillStyle = mannequinGrad;
      ctx.beginPath();
      ctx.ellipse(0, -10, 30, 40, 0, 0, Math.PI * 2);
      ctx.fill();

      // Mannequin head
      ctx.fillStyle = '#C4A77D';
      ctx.beginPath();
      ctx.arc(0, -60, 22, 0, Math.PI * 2);
      ctx.fill();

      // Clockwork details on head
      ctx.strokeStyle = '#8B6914';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, -60, 18, 0, Math.PI * 2);
      ctx.stroke();

      // Eyes (glowing cyan for clockwork)
      ctx.fillStyle = '#4ECDC4';
      ctx.beginPath();
      ctx.arc(-7, -63, 4, 0, Math.PI * 2);
      ctx.arc(7, -63, 4, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();

      // Spinning curator placard
      const placardY = hatchY - 90;
      ctx.save();
      ctx.translate(0, placardY);

      // Placard with slight rotation wobble
      const wobble = Math.sin(p.placard.rotation) * 0.05;
      ctx.rotate(wobble);

      // Placard background - ornate frame
      const placardWidth = 150;
      const placardHeight = 70;

      // Selection glow
      if (isSelected) {
        ctx.shadowColor = '#E87A3E';
        ctx.shadowBlur = 20;
      }

      // Frame
      ctx.fillStyle = isSelected ? '#E87A3E' : '#B8860B';
      ctx.beginPath();
      ctx.roundRect(-placardWidth / 2 - 5, -placardHeight / 2 - 5, placardWidth + 10, placardHeight + 10, 8);
      ctx.fill();

      // Inner placard
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#FAFAF7';
      ctx.beginPath();
      ctx.roundRect(-placardWidth / 2, -placardHeight / 2, placardWidth, placardHeight, 5);
      ctx.fill();

      // Answer text with wrapping
      ctx.fillStyle = '#2B2B28';
      ctx.font = '14px Nunito, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      const lines = wrapText(p.choice.text, placardWidth - 16);
      const lineHeight = 16;
      const startY = -((lines.length - 1) * lineHeight) / 2;

      lines.forEach((line, idx) => {
        ctx.fillText(line, 0, startY + idx * lineHeight);
      });

      // Answer letter indicator
      ctx.fillStyle = isSelected ? '#E87A3E' : '#B8860B';
      ctx.font = 'bold 14px Nunito Sans, sans-serif';
      ctx.fillText(['A', 'B', 'C', 'D'][i], -placardWidth / 2 + 12, -placardHeight / 2 + 12);

      ctx.restore();

      // Selection indicator - glowing arrow above
      if (isSelected) {
        ctx.save();
        ctx.translate(0, placardY - 55);

        // Pulsing glow
        const pulse = 0.8 + Math.sin(gameTime * 4) * 0.2;
        ctx.globalAlpha = pulse;
        ctx.fillStyle = '#E87A3E';
        ctx.beginPath();
        ctx.moveTo(0, 15);
        ctx.lineTo(-12, 0);
        ctx.lineTo(12, 0);
        ctx.closePath();
        ctx.fill();

        ctx.restore();
      }

      ctx.restore();
    });

    // Draw ravens (after wrong answer)
    ravens.forEach(r => {
      ctx.save();
      ctx.translate(r.x, r.y);
      ctx.rotate(r.rotation);
      ctx.globalAlpha = r.life / 2;

      // Raven body - paper style
      ctx.fillStyle = '#2B2B28';
      ctx.beginPath();
      ctx.ellipse(0, 0, 15, 8, 0, 0, Math.PI * 2);
      ctx.fill();

      // Wings flapping
      const wingY = Math.sin(r.wingPhase) * 10;
      ctx.beginPath();
      ctx.moveTo(-5, 0);
      ctx.quadraticCurveTo(-20, wingY - 15, -30, wingY);
      ctx.quadraticCurveTo(-20, wingY + 5, -5, 0);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(5, 0);
      ctx.quadraticCurveTo(20, wingY - 15, 30, wingY);
      ctx.quadraticCurveTo(20, wingY + 5, 5, 0);
      ctx.fill();

      // Head
      ctx.beginPath();
      ctx.arc(12, -2, 6, 0, Math.PI * 2);
      ctx.fill();

      // Beak
      ctx.beginPath();
      ctx.moveTo(18, -2);
      ctx.lineTo(25, 0);
      ctx.lineTo(18, 2);
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    });

    // Draw celebration particles
    celebrationParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Velvet curtain borders
    const curtainGrad = ctx.createLinearGradient(0, 0, 40, 0);
    curtainGrad.addColorStop(0, '#4A1527');
    curtainGrad.addColorStop(1, 'rgba(74, 21, 39, 0)');
    ctx.fillStyle = curtainGrad;
    ctx.fillRect(0, 0, 40, H);

    const curtainGrad2 = ctx.createLinearGradient(W, 0, W - 40, 0);
    curtainGrad2.addColorStop(0, '#4A1527');
    curtainGrad2.addColorStop(1, 'rgba(74, 21, 39, 0)');
    ctx.fillStyle = curtainGrad2;
    ctx.fillRect(W - 40, 0, 40, H);
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;

    // Movement with arrow keys or WASD
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
      selectedIndex = Math.max(0, selectedIndex - 1);
      playSound('move');
    } else if (e.code === 'ArrowRight' || e.code === 'KeyD') {
      selectedIndex = Math.min(pedestals.length - 1, selectedIndex + 1);
      playSound('move');
    }

    // Whack with space or enter
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      const pedestal = pedestals[selectedIndex];
      whackAnimation = { index: selectedIndex, progress: 0 };
      playSound('click');

      if (pedestal.choice.is_correct) {
        // Correct answer - celebration
        playSound('correct');

        // Spawn celebration particles
        for (let i = 0; i < 30; i++) {
          celebrationParticles.push({
            x: pedestal.x + pedestal.width / 2,
            y: pedestal.y - 100,
            vx: (Math.random() - 0.5) * 300,
            vy: -Math.random() * 200 - 50,
            size: 6 + Math.random() * 8,
            color: ['#E87A3E', '#F5A742', '#4ECDC4', '#6BBF59'][Math.floor(Math.random() * 4)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10,
            life: 1.5
          });
        }

        setTimeout(() => {
          engine.end(true, pedestal.choice.explanation);
        }, 400);
      } else {
        // Wrong answer - release paper ravens
        playSound('wrong');
        shakeAnimation = { index: selectedIndex, progress: 0 };

        // Spawn ravens
        for (let i = 0; i < 8; i++) {
          ravens.push({
            x: pedestal.x + pedestal.width / 2,
            y: pedestal.y - 120,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 150 - 50,
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 5,
            wingPhase: Math.random() * Math.PI * 2,
            life: 2
          });
        }

        setTimeout(() => {
          engine.end(false, pedestal.choice.explanation);
        }, 600);
      }
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
