<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coffee Bean Sacks</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC',
    peach: '#FFB89D',
  };

  // === GAME STATE ===
  let selectedIndex = 0;
  let sacks = [];
  let entranceTime = 0;
  let selectionAnim = { scale: 1, time: 0 };
  let feedbackState = null; // null | { type: 'correct'|'wrong', time: 0, index: number }
  let gameParticles = [];
  let cartBob = 0;

  // Audio context for sounds
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playClickSound() {
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 600;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.1, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.08);
    } catch (e) {}
  }

  function playCorrectSound() {
    try {
      const ctx = getAudioCtx();
      [523, 659, 784].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.12, ctx.currentTime + i * 0.1);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.1 + 0.3);
        osc.start(ctx.currentTime + i * 0.1);
        osc.stop(ctx.currentTime + i * 0.1 + 0.3);
      });
    } catch (e) {}
  }

  function playWrongSound() {
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 200;
      osc.type = 'sawtooth';
      gain.gain.setValueAtTime(0.1, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.4);
    } catch (e) {}
  }

  // Word-wrap helper for canvas text
  function wrapText(text, maxWidth, font) {
    ctx.font = font;
    const words = text.split(' ');
    const lines = [];
    let currentLine = words[0];
    for (let i = 1; i < words.length; i++) {
      const testLine = currentLine + ' ' + words[i];
      if (ctx.measureText(testLine).width <= maxWidth) {
        currentLine = testLine;
      } else {
        lines.push(currentLine);
        currentLine = words[i];
      }
    }
    lines.push(currentLine);
    return lines;
  }

  function initGame() {
    selectedIndex = 0;
    entranceTime = 0;
    feedbackState = null;
    gameParticles = [];
    cartBob = 0;
    selectionAnim = { scale: 1, time: 0 };

    // Create sack data - 4 sacks positioned on a cart
    const sackW = 140;
    const sackH = 120;
    const gap = 16;
    const totalW = sackW * 4 + gap * 3;
    const startX = (W - totalW) / 2;
    const baseY = 230;

    sacks = QUESTION.choices.map((choice, i) => ({
      x: startX + i * (sackW + gap),
      y: baseY,
      w: sackW,
      h: sackH,
      choice: choice,
      index: i,
      entranceDelay: i * 80,
      scale: 0,
      alpha: 0,
      offsetY: 0, // for bounce animation
      shakeX: 0,  // for wrong answer shake
    }));
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    entranceTime += dt * 1000;
    cartBob = Math.sin(entranceTime / 1000 * 1.2) * 2;

    // Entrance animation for sacks
    sacks.forEach(sack => {
      const elapsed = entranceTime - sack.entranceDelay;
      if (elapsed > 0) {
        const t = Math.min(elapsed / 350, 1);
        const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
        sack.scale = t * spring;
        sack.alpha = Math.min(t * 1.5, 1);
      }
    });

    // Selection bounce
    selectionAnim.time += dt;
    sacks.forEach((sack, i) => {
      if (i === selectedIndex) {
        sack.offsetY = Math.sin(selectionAnim.time * 4) * 4 - 8;
      } else {
        sack.offsetY *= 0.9;
      }
    });

    // Feedback animation
    if (feedbackState) {
      feedbackState.time += dt;
      const sack = sacks[feedbackState.index];
      if (feedbackState.type === 'wrong') {
        const decay = Math.max(0, 1 - feedbackState.time / 0.4);
        sack.shakeX = Math.sin(feedbackState.time * Math.PI * 20) * 8 * decay;
        if (feedbackState.time > 0.5) {
          feedbackState = null;
          sack.shakeX = 0;
        }
      } else if (feedbackState.type === 'correct') {
        if (feedbackState.time > 0.15) {
          const choice = sack.choice;
          engine.end(true, choice.explanation);
        }
      }
    }

    // Update particles
    gameParticles = gameParticles.filter(p => {
      p.vy += 500 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.alpha -= dt * 1.2;
      return p.alpha > 0 && p.y < H + 50;
    });
  }

  function drawGame() {
    // Background - warm coffee shop feel
    ctx.fillStyle = '#F5EDE3';
    ctx.fillRect(0, 0, W, H);

    // Wooden wall background
    const wallGrad = ctx.createLinearGradient(0, 0, 0, 200);
    wallGrad.addColorStop(0, '#D4A76A');
    wallGrad.addColorStop(0.5, '#C49A60');
    wallGrad.addColorStop(1, '#B8905A');
    ctx.fillStyle = wallGrad;
    ctx.fillRect(0, 0, W, 200);

    // Wood grain lines on wall
    ctx.strokeStyle = 'rgba(139, 90, 43, 0.15)';
    ctx.lineWidth = 1;
    for (let y = 10; y < 200; y += 25) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      for (let x = 0; x < W; x += 20) {
        ctx.lineTo(x, y + Math.sin(x * 0.02 + y) * 3);
      }
      ctx.stroke();
    }

    // Floor
    const floorGrad = ctx.createLinearGradient(0, 380, 0, H);
    floorGrad.addColorStop(0, '#A0764A');
    floorGrad.addColorStop(1, '#8B6540');
    ctx.fillStyle = floorGrad;
    ctx.fillRect(0, 380, W, H - 380);

    // Floor boards
    ctx.strokeStyle = 'rgba(100, 60, 30, 0.2)';
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 80) {
      ctx.beginPath();
      ctx.moveTo(x, 380);
      ctx.lineTo(x, H);
      ctx.stroke();
    }

    // Draw the wooden cart
    drawCart();

    // Draw sacks on cart
    sacks.forEach((sack, i) => {
      if (sack.alpha <= 0) return;
      drawSack(sack, i === selectedIndex);
    });

    // Draw answer labels below the cart
    drawAnswerLabels();

    // Draw particles
    gameParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });
  }

  function drawCart() {
    const cartX = 60;
    const cartY = 340 + cartBob;
    const cartW = 600;
    const cartH = 40;

    // Cart shadow
    ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
    ctx.beginPath();
    ctx.ellipse(cartX + cartW / 2, cartY + cartH + 25, cartW / 2 - 10, 12, 0, 0, Math.PI * 2);
    ctx.fill();

    // Cart bed (wooden planks)
    const bedGrad = ctx.createLinearGradient(cartX, cartY, cartX, cartY + cartH);
    bedGrad.addColorStop(0, '#A0764A');
    bedGrad.addColorStop(0.5, '#8B6540');
    bedGrad.addColorStop(1, '#7A5735');
    ctx.fillStyle = bedGrad;
    ctx.beginPath();
    ctx.roundRect(cartX, cartY, cartW, cartH, 4);
    ctx.fill();

    // Plank lines
    ctx.strokeStyle = 'rgba(60, 35, 15, 0.3)';
    ctx.lineWidth = 1;
    for (let x = cartX + 40; x < cartX + cartW; x += 50) {
      ctx.beginPath();
      ctx.moveTo(x, cartY + 2);
      ctx.lineTo(x, cartY + cartH - 2);
      ctx.stroke();
    }

    // Cart border top
    ctx.strokeStyle = '#6B4226';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(cartX, cartY, cartW, cartH, 4);
    ctx.stroke();

    // Cart sides (raised edges)
    ctx.fillStyle = '#7A5735';
    ctx.fillRect(cartX, cartY - 6, 8, 6);
    ctx.fillRect(cartX + cartW - 8, cartY - 6, 8, 6);

    // Wheels
    const wheelRadius = 18;
    const wheelY = cartY + cartH + 10;
    [cartX + 60, cartX + cartW - 60].forEach(wx => {
      // Outer wheel
      ctx.beginPath();
      ctx.arc(wx, wheelY, wheelRadius, 0, Math.PI * 2);
      ctx.fillStyle = '#5C3D1E';
      ctx.fill();
      ctx.strokeStyle = '#4A2E14';
      ctx.lineWidth = 3;
      ctx.stroke();

      // Inner hub
      ctx.beginPath();
      ctx.arc(wx, wheelY, 6, 0, Math.PI * 2);
      ctx.fillStyle = '#8B6540';
      ctx.fill();

      // Spokes
      ctx.strokeStyle = '#7A5735';
      ctx.lineWidth = 2;
      for (let a = 0; a < Math.PI * 2; a += Math.PI / 3) {
        ctx.beginPath();
        ctx.moveTo(wx + Math.cos(a) * 6, wheelY + Math.sin(a) * 6);
        ctx.lineTo(wx + Math.cos(a) * (wheelRadius - 3), wheelY + Math.sin(a) * (wheelRadius - 3));
        ctx.stroke();
      }
    });
  }

  function drawSack(sack, isSelected) {
    ctx.save();
    const cx = sack.x + sack.w / 2;
    const cy = sack.y + sack.h / 2 + sack.offsetY + cartBob;

    ctx.globalAlpha = sack.alpha;
    ctx.translate(cx + sack.shakeX, cy);
    ctx.scale(sack.scale, sack.scale);

    const sw = sack.w;
    const sh = sack.h;

    // Sack shadow
    if (isSelected) {
      ctx.shadowColor = COLORS.orange;
      ctx.shadowBlur = 20;
    }

    // Sack body - burlap color
    const sackColors = ['#C8A96E', '#B89B5E', '#D4B87A', '#BFA264'];
    const sackColor = sackColors[sack.index];
    const sackGrad = ctx.createLinearGradient(-sw / 2, -sh / 2, sw / 2, sh / 2);
    sackGrad.addColorStop(0, sackColor);
    sackGrad.addColorStop(0.5, adjustBrightness(sackColor, -15));
    sackGrad.addColorStop(1, adjustBrightness(sackColor, -30));

    // Draw sack shape (rounded trapezoid - wider at bottom)
    ctx.beginPath();
    ctx.moveTo(-sw * 0.35, -sh / 2 + 15); // top left
    ctx.quadraticCurveTo(-sw * 0.3, -sh / 2, 0, -sh / 2 + 5); // top curve left
    ctx.quadraticCurveTo(sw * 0.3, -sh / 2, sw * 0.35, -sh / 2 + 15); // top curve right
    ctx.lineTo(sw * 0.45, sh / 2 - 10); // right side
    ctx.quadraticCurveTo(sw * 0.45, sh / 2, sw * 0.35, sh / 2); // bottom right curve
    ctx.lineTo(-sw * 0.35, sh / 2); // bottom
    ctx.quadraticCurveTo(-sw * 0.45, sh / 2, -sw * 0.45, sh / 2 - 10); // bottom left curve
    ctx.closePath();

    ctx.fillStyle = sackGrad;
    ctx.fill();

    // Burlap texture (crosshatch)
    ctx.strokeStyle = 'rgba(100, 70, 30, 0.12)';
    ctx.lineWidth = 0.5;
    for (let ly = -sh / 2 + 20; ly < sh / 2 - 5; ly += 8) {
      ctx.beginPath();
      ctx.moveTo(-sw * 0.4, ly);
      ctx.lineTo(sw * 0.4, ly);
      ctx.stroke();
    }
    for (let lx = -sw * 0.35; lx < sw * 0.4; lx += 8) {
      ctx.beginPath();
      ctx.moveTo(lx, -sh / 2 + 20);
      ctx.lineTo(lx, sh / 2 - 5);
      ctx.stroke();
    }

    // Sack border
    ctx.shadowBlur = 0;
    ctx.strokeStyle = isSelected ? COLORS.orange : 'rgba(100, 70, 30, 0.4)';
    ctx.lineWidth = isSelected ? 3 : 1.5;
    ctx.beginPath();
    ctx.moveTo(-sw * 0.35, -sh / 2 + 15);
    ctx.quadraticCurveTo(-sw * 0.3, -sh / 2, 0, -sh / 2 + 5);
    ctx.quadraticCurveTo(sw * 0.3, -sh / 2, sw * 0.35, -sh / 2 + 15);
    ctx.lineTo(sw * 0.45, sh / 2 - 10);
    ctx.quadraticCurveTo(sw * 0.45, sh / 2, sw * 0.35, sh / 2);
    ctx.lineTo(-sw * 0.35, sh / 2);
    ctx.quadraticCurveTo(-sw * 0.45, sh / 2, -sw * 0.45, sh / 2 - 10);
    ctx.closePath();
    ctx.stroke();

    // Tied top
    ctx.fillStyle = adjustBrightness(sackColor, -20);
    ctx.beginPath();
    ctx.ellipse(0, -sh / 2 + 12, 18, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(100, 70, 30, 0.5)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // String tie
    ctx.strokeStyle = '#8B6540';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-6, -sh / 2 + 8);
    ctx.quadraticCurveTo(0, -sh / 2 - 2, 6, -sh / 2 + 8);
    ctx.stroke();

    // Coffee bean icon on sack
    drawCoffeeBean(0, 5, 14, sack.index);

    // Letter label (A, B, C, D)
    const labels = ['A', 'B', 'C', 'D'];
    ctx.font = "700 22px 'Belanosima', sans-serif";
    ctx.fillStyle = 'rgba(80, 50, 20, 0.8)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(labels[sack.index], 0, -20);

    // Selection indicator - glowing ring
    if (isSelected) {
      ctx.strokeStyle = COLORS.orange;
      ctx.lineWidth = 3;
      ctx.setLineDash([6, 4]);
      ctx.beginPath();
      ctx.moveTo(-sw * 0.38, -sh / 2 + 15);
      ctx.quadraticCurveTo(-sw * 0.33, -sh / 2 - 3, 0, -sh / 2 + 2);
      ctx.quadraticCurveTo(sw * 0.33, -sh / 2 - 3, sw * 0.38, -sh / 2 + 15);
      ctx.lineTo(sw * 0.48, sh / 2 - 10);
      ctx.quadraticCurveTo(sw * 0.48, sh / 2 + 3, sw * 0.38, sh / 2 + 3);
      ctx.lineTo(-sw * 0.38, sh / 2 + 3);
      ctx.quadraticCurveTo(-sw * 0.48, sh / 2 + 3, -sw * 0.48, sh / 2 - 10);
      ctx.closePath();
      ctx.stroke();
      ctx.setLineDash([]);
    }

    ctx.restore();
  }

  function drawCoffeeBean(x, y, size, variant) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate([0.2, -0.15, 0.1, -0.2][variant]);

    // Bean shape - two halves
    ctx.fillStyle = '#5C3D1E';
    ctx.beginPath();
    ctx.ellipse(0, 0, size * 0.6, size, 0, 0, Math.PI * 2);
    ctx.fill();

    // Center line
    ctx.strokeStyle = '#3A2510';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, -size * 0.8);
    ctx.quadraticCurveTo(size * 0.15, 0, 0, size * 0.8);
    ctx.stroke();

    ctx.restore();
  }

  function drawAnswerLabels() {
    const labelY = 420;
    const labelH = 100;
    const labelW = 155;
    const gap = 8;
    const totalW = labelW * 4 + gap * 3;
    const startX = (W - totalW) / 2;
    const labels = ['A', 'B', 'C', 'D'];

    sacks.forEach((sack, i) => {
      const x = startX + i * (labelW + gap);
      const isSelected = i === selectedIndex;

      ctx.save();
      ctx.globalAlpha = sack.alpha;

      // Label card background
      ctx.fillStyle = isSelected ? '#FFF4ED' : COLORS.bgSurface;
      ctx.strokeStyle = isSelected ? COLORS.orange : COLORS.borderSubtle;
      ctx.lineWidth = isSelected ? 2.5 : 1.5;
      ctx.beginPath();
      ctx.roundRect(x, labelY, labelW, labelH, 10);
      ctx.fill();
      ctx.stroke();

      // Label header
      ctx.font = "700 14px 'Nunito Sans', sans-serif";
      ctx.fillStyle = isSelected ? COLORS.orange : COLORS.textSecondary;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(labels[i], x + labelW / 2, labelY + 6);

      // Answer text - wrapped
      const answerFont = "400 14px 'Nunito', sans-serif";
      const lines = wrapText(sack.choice.text, labelW - 16, answerFont);
      ctx.font = answerFont;
      ctx.fillStyle = COLORS.textPrimary;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';

      const lineHeight = 17;
      const textStartY = labelY + 24;
      const maxLines = Math.min(lines.length, 4);
      for (let l = 0; l < maxLines; l++) {
        ctx.fillText(lines[l], x + labelW / 2, textStartY + l * lineHeight);
      }

      ctx.restore();
    });
  }

  function adjustBrightness(hex, amount) {
    const r = Math.max(0, Math.min(255, parseInt(hex.slice(1, 3), 16) + amount));
    const g = Math.max(0, Math.min(255, parseInt(hex.slice(3, 5), 16) + amount));
    const b = Math.max(0, Math.min(255, parseInt(hex.slice(5, 7), 16) + amount));
    return `rgb(${r},${g},${b})`;
  }

  function spawnParticles(x, y) {
    const colors = [COLORS.orange, COLORS.amber, COLORS.cyan, COLORS.success];
    for (let i = 0; i < 25; i++) {
      gameParticles.push({
        x, y,
        vx: (Math.random() - 0.5) * 350,
        vy: -Math.random() * 250 - 80,
        color: colors[Math.floor(Math.random() * colors.length)],
        size: Math.random() * 7 + 3,
        rotation: Math.random() * Math.PI * 2,
        rotationSpeed: (Math.random() - 0.5) * 8,
        alpha: 1
      });
    }
  }

  function selectAnswer() {
    if (feedbackState) return;
    const sack = sacks[selectedIndex];
    const choice = sack.choice;

    if (choice.is_correct) {
      playCorrectSound();
      feedbackState = { type: 'correct', time: 0, index: selectedIndex };
      spawnParticles(sack.x + sack.w / 2, sack.y + sack.h / 2);
    } else {
      playWrongSound();
      feedbackState = { type: 'wrong', time: 0, index: selectedIndex };
      setTimeout(() => {
        engine.end(false, choice.explanation);
      }, 500);
    }
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;
    if (feedbackState) return;

    if (e.code === 'ArrowLeft') {
      e.preventDefault();
      selectedIndex = (selectedIndex - 1 + 4) % 4;
      playClickSound();
      selectionAnim.time = 0;
    } else if (e.code === 'ArrowRight') {
      e.preventDefault();
      selectedIndex = (selectedIndex + 1) % 4;
      playClickSound();
      selectionAnim.time = 0;
    } else if (e.code === 'Space') {
      e.preventDefault();
      selectAnswer();
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
