<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golf Striker</title>
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "Evaporation, condensation, precipitation, and collection", is_correct: true, explanation: "Why A is correct" },
      { text: "Photosynthesis, respiration, and decomposition of matter", is_correct: false, explanation: "Why B is wrong" },
      { text: "Erosion, weathering, transportation, and deposition", is_correct: false, explanation: "Why C is wrong" },
      { text: "Melting, freezing, sublimation, and deposition of ice", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    grass: '#5a8f5a',
    grassDark: '#4a7f4a',
    gridLine: 'rgba(74, 127, 74, 0.5)',
    answerBg: '#e8e0d0',
    answerBorder: '#6b5b4f',
    answerText: '#3d3428',
    ball: '#f5f5f5',
    ballShadow: 'rgba(0, 0, 0, 0.3)',
    arrow: '#8b4513',
    arrowHead: '#a0522d'
  };

  // === SOUND EFFECTS ===
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;

    if (type === 'hit') {
      // Golf club hit sound
      osc.type = 'sine';
      osc.frequency.setValueAtTime(800, now);
      osc.frequency.exponentialRampToValueAtTime(200, now + 0.1);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
      osc.start(now);
      osc.stop(now + 0.15);
    } else if (type === 'roll') {
      // Ball rolling sound
      osc.type = 'sine';
      osc.frequency.setValueAtTime(150, now);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
      osc.start(now);
      osc.stop(now + 0.3);
    } else if (type === 'correct') {
      // Success sound
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, now);
      osc.frequency.setValueAtTime(659, now + 0.1);
      osc.frequency.setValueAtTime(784, now + 0.2);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
      osc.start(now);
      osc.stop(now + 0.4);
    } else if (type === 'wrong') {
      // Error sound
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.exponentialRampToValueAtTime(100, now + 0.3);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
      osc.start(now);
      osc.stop(now + 0.3);
    } else if (type === 'aim') {
      // Aim adjustment tick
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, now);
      gain.gain.setValueAtTime(0.05, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
      osc.start(now);
      osc.stop(now + 0.05);
    }
  }

  // === GAME STATE ===
  let ball = { x: 0, y: 0, vx: 0, vy: 0, moving: false };
  let aimAngle = 0; // Radians, 0 = right
  let power = 0;
  const MIN_POWER = 100;
  const MAX_POWER = 500;
  const POWER_CHARGE_RATE = 400; // Power per second while holding
  const FRICTION = 0.98;
  const MIN_SPEED = 5;

  // Mouse state
  let mouseX = W / 2;
  let mouseY = 0;
  let isCharging = false;
  let chargeStartTime = 0;

  let answers = [];
  let entranceTime = 0;
  let trailParticles = [];
  let hitParticles = [];

  // Answer box dimensions
  const BOX_WIDTH = 160;
  const BOX_HEIGHT = 100;
  const BOX_MARGIN = 25;

  function wrapText(text, maxWidth) {
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';

    ctx.font = "600 14px 'Nunito Sans', sans-serif";

    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      const metrics = ctx.measureText(testLine);
      if (metrics.width > maxWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    return lines;
  }

  function initGame() {
    // Reset ball to center
    ball = {
      x: W / 2,
      y: H / 2,
      vx: 0,
      vy: 0,
      moving: false
    };

    // Reset aim and power
    aimAngle = -Math.PI / 4; // Point toward top-right by default
    power = 0;
    isCharging = false;
    chargeStartTime = 0;

    // Reset particles
    trailParticles = [];
    hitParticles = [];
    entranceTime = 0;

    // Create answer boxes in corners
    answers = [
      // Top-left
      {
        x: BOX_MARGIN,
        y: BOX_MARGIN,
        w: BOX_WIDTH,
        h: BOX_HEIGHT,
        choice: QUESTION.choices[0],
        entranceDelay: 0,
        scale: 0,
        hit: false
      },
      // Top-right
      {
        x: W - BOX_WIDTH - BOX_MARGIN,
        y: BOX_MARGIN,
        w: BOX_WIDTH,
        h: BOX_HEIGHT,
        choice: QUESTION.choices[1],
        entranceDelay: 0.1,
        scale: 0,
        hit: false
      },
      // Bottom-left
      {
        x: BOX_MARGIN,
        y: H - BOX_HEIGHT - BOX_MARGIN,
        w: BOX_WIDTH,
        h: BOX_HEIGHT,
        choice: QUESTION.choices[2],
        entranceDelay: 0.2,
        scale: 0,
        hit: false
      },
      // Bottom-right
      {
        x: W - BOX_WIDTH - BOX_MARGIN,
        y: H - BOX_HEIGHT - BOX_MARGIN,
        w: BOX_WIDTH,
        h: BOX_HEIGHT,
        choice: QUESTION.choices[3],
        entranceDelay: 0.3,
        scale: 0,
        hit: false
      }
    ];
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    entranceTime += dt;

    // Animate answer entrance
    answers.forEach(ans => {
      const t = Math.max(0, entranceTime - ans.entranceDelay);
      const progress = Math.min(1, t / 0.4);
      // Elastic ease out
      const elastic = progress === 1 ? 1 :
        Math.pow(2, -10 * progress) * Math.sin((progress * 10 - 0.75) * (2 * Math.PI) / 3) + 1;
      ans.scale = elastic;
    });

    // Update aim angle to point toward mouse (only when not moving)
    if (!ball.moving) {
      const dx = mouseX - ball.x;
      const dy = mouseY - ball.y;
      aimAngle = Math.atan2(dy, dx);

      // Update power while charging
      if (isCharging) {
        power = Math.min(MAX_POWER, power + POWER_CHARGE_RATE * dt);
      }
    }

    // Update ball physics
    if (ball.moving) {
      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;

      // Apply friction
      ball.vx *= Math.pow(FRICTION, dt * 60);
      ball.vy *= Math.pow(FRICTION, dt * 60);

      // Create trail particles
      if (Math.random() < 0.3) {
        trailParticles.push({
          x: ball.x,
          y: ball.y,
          size: 3 + Math.random() * 2,
          life: 1,
          alpha: 0.3
        });
      }

      // Check collision with answer boxes
      answers.forEach(ans => {
        if (ans.hit) return;

        // Box center
        const boxCenterX = ans.x + ans.w / 2;
        const boxCenterY = ans.y + ans.h / 2;

        // Check if ball is inside box
        if (ball.x > ans.x && ball.x < ans.x + ans.w &&
            ball.y > ans.y && ball.y < ans.y + ans.h) {

          ans.hit = true;
          ball.moving = false;
          ball.vx = 0;
          ball.vy = 0;

          // Create hit particles
          for (let i = 0; i < 20; i++) {
            const angle = (i / 20) * Math.PI * 2;
            hitParticles.push({
              x: ball.x,
              y: ball.y,
              vx: Math.cos(angle) * (100 + Math.random() * 100),
              vy: Math.sin(angle) * (100 + Math.random() * 100),
              size: 4 + Math.random() * 4,
              color: ans.choice.is_correct ? '#4ADE80' : '#F87171',
              life: 1
            });
          }

          // Play sound and end
          playSound(ans.choice.is_correct ? 'correct' : 'wrong');

          setTimeout(() => {
            engine.end(ans.choice.is_correct, ans.choice.explanation);
          }, 300);
        }
      });

      // Bounce off walls
      if (ball.x < 10) { ball.x = 10; ball.vx = -ball.vx * 0.7; }
      if (ball.x > W - 10) { ball.x = W - 10; ball.vx = -ball.vx * 0.7; }
      if (ball.y < 10) { ball.y = 10; ball.vy = -ball.vy * 0.7; }
      if (ball.y > H - 10) { ball.y = H - 10; ball.vy = -ball.vy * 0.7; }

      // Stop if too slow
      const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
      if (speed < MIN_SPEED) {
        ball.moving = false;
        ball.vx = 0;
        ball.vy = 0;
      }
    }

    // Update trail particles
    trailParticles = trailParticles.filter(p => {
      p.life -= dt * 3;
      p.alpha = p.life * 0.3;
      return p.life > 0;
    });

    // Update hit particles
    hitParticles = hitParticles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vx *= 0.95;
      p.vy *= 0.95;
      p.life -= dt * 2;
      return p.life > 0;
    });
  }

  function drawGame() {
    // Draw grass background
    ctx.fillStyle = COLORS.grass;
    ctx.fillRect(0, 0, W, H);

    // Draw grid lines
    ctx.strokeStyle = COLORS.gridLine;
    ctx.lineWidth = 1;
    const gridSize = 40;

    for (let x = gridSize; x < W; x += gridSize) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, H);
      ctx.stroke();
    }
    for (let y = gridSize; y < H; y += gridSize) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }

    // Draw trail particles
    trailParticles.forEach(p => {
      ctx.fillStyle = `rgba(200, 200, 200, ${p.alpha})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    });

    // Draw answer boxes
    answers.forEach(ans => {
      if (ans.scale <= 0) return;

      ctx.save();
      ctx.translate(ans.x + ans.w / 2, ans.y + ans.h / 2);
      ctx.scale(ans.scale, ans.scale);
      ctx.translate(-(ans.x + ans.w / 2), -(ans.y + ans.h / 2));

      // Box shadow
      ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
      ctx.beginPath();
      ctx.roundRect(ans.x + 3, ans.y + 3, ans.w, ans.h, 4);
      ctx.fill();

      // Box background
      ctx.fillStyle = ans.hit ? (ans.choice.is_correct ? '#c8f7c5' : '#ffc9c9') : COLORS.answerBg;
      ctx.beginPath();
      ctx.roundRect(ans.x, ans.y, ans.w, ans.h, 4);
      ctx.fill();

      // Box border
      ctx.strokeStyle = COLORS.answerBorder;
      ctx.lineWidth = 2;
      ctx.stroke();

      // Inner border highlight
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(ans.x + 3, ans.y + 3, ans.w - 6, ans.h - 6, 2);
      ctx.stroke();

      // Text
      ctx.fillStyle = COLORS.answerText;
      ctx.font = "600 14px 'Nunito Sans', sans-serif";
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';

      const lines = wrapText(ans.choice.text, ans.w - 20);
      const lineHeight = 18;
      const textStartY = ans.y + 12;

      lines.forEach((line, i) => {
        ctx.fillText(line, ans.x + 10, textStartY + i * lineHeight);
      });

      ctx.restore();
    });

    // Draw hit particles
    hitParticles.forEach(p => {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.life;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Draw ball shadow
    ctx.fillStyle = COLORS.ballShadow;
    ctx.beginPath();
    ctx.ellipse(ball.x + 3, ball.y + 3, 10, 8, 0, 0, Math.PI * 2);
    ctx.fill();

    // Draw ball
    const ballGradient = ctx.createRadialGradient(ball.x - 3, ball.y - 3, 0, ball.x, ball.y, 10);
    ballGradient.addColorStop(0, '#ffffff');
    ballGradient.addColorStop(0.5, '#f0f0f0');
    ballGradient.addColorStop(1, '#d0d0d0');
    ctx.fillStyle = ballGradient;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, 10, 0, Math.PI * 2);
    ctx.fill();

    // Ball outline
    ctx.strokeStyle = 'rgba(0, 0, 0, 0.2)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Draw aim arrow (only when not moving)
    if (!ball.moving) {
      // Arrow length scales with power when charging, otherwise fixed
      const baseLength = 40;
      const arrowLength = isCharging ? baseLength + (power / MAX_POWER) * 50 : baseLength;
      const arrowEndX = ball.x + Math.cos(aimAngle) * arrowLength;
      const arrowEndY = ball.y + Math.sin(aimAngle) * arrowLength;

      // Arrow shaft
      ctx.strokeStyle = isCharging ? '#c0392b' : COLORS.arrow;
      ctx.lineWidth = isCharging ? 5 : 4;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(ball.x + Math.cos(aimAngle) * 12, ball.y + Math.sin(aimAngle) * 12);
      ctx.lineTo(arrowEndX, arrowEndY);
      ctx.stroke();

      // Arrow head
      const headSize = isCharging ? 14 : 12;
      const headAngle = Math.PI / 6;
      ctx.fillStyle = isCharging ? '#e74c3c' : COLORS.arrowHead;
      ctx.beginPath();
      ctx.moveTo(arrowEndX, arrowEndY);
      ctx.lineTo(
        arrowEndX - Math.cos(aimAngle - headAngle) * headSize,
        arrowEndY - Math.sin(aimAngle - headAngle) * headSize
      );
      ctx.lineTo(
        arrowEndX - Math.cos(aimAngle + headAngle) * headSize,
        arrowEndY - Math.sin(aimAngle + headAngle) * headSize
      );
      ctx.closePath();
      ctx.fill();

      // Power indicator (only show when charging)
      if (isCharging && power > 0) {
        const barWidth = 60;
        const barHeight = 8;
        const barX = ball.x - barWidth / 2;
        const barY = ball.y + 30;

        // Background
        ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
        ctx.beginPath();
        ctx.roundRect(barX, barY, barWidth, barHeight, 4);
        ctx.fill();

        // Fill
        const powerRatio = power / MAX_POWER;
        const powerColor = powerRatio < 0.5 ?
          `rgb(${Math.floor(100 + 155 * powerRatio * 2)}, 200, 100)` :
          `rgb(255, ${Math.floor(200 - (powerRatio - 0.5) * 300)}, 80)`;
        ctx.fillStyle = powerColor;
        ctx.beginPath();
        ctx.roundRect(barX + 2, barY + 2, (barWidth - 4) * powerRatio, barHeight - 4, 2);
        ctx.fill();

        // Border
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect(barX, barY, barWidth, barHeight, 4);
        ctx.stroke();
      }
    }
  }

  function handleInput(e) {
    // Keyboard input not used for gameplay - mouse controls only
    // R to restart is handled in the keydown listener below
  }

  // Mouse/touch event handlers for aiming and charging
  function handleMouseMove(clientX, clientY) {
    const pos = screenToLogical(clientX, clientY);
    mouseX = pos.x;
    mouseY = pos.y;
  }

  function handleMouseDown(clientX, clientY) {
    if (gameState !== 'playing') return;
    if (ball.moving) return;

    initAudio();

    const pos = screenToLogical(clientX, clientY);
    mouseX = pos.x;
    mouseY = pos.y;

    // Start charging
    isCharging = true;
    power = 0;
    chargeStartTime = performance.now();
  }

  function handleMouseUp() {
    if (gameState !== 'playing') return;
    if (!isCharging) return;

    isCharging = false;

    // Only shoot if we have enough power
    if (power >= MIN_POWER) {
      // Hit the ball
      ball.vx = Math.cos(aimAngle) * power;
      ball.vy = Math.sin(aimAngle) * power;
      ball.moving = true;
      playSound('hit');
    } else {
      // Not enough power - reset
      power = 0;
    }
  }

  // Mouse events
  canvas.addEventListener('mousemove', (e) => handleMouseMove(e.clientX, e.clientY));
  canvas.addEventListener('mousedown', (e) => {
    if (e.button === 0) handleMouseDown(e.clientX, e.clientY);
  });
  canvas.addEventListener('mouseup', (e) => {
    if (e.button === 0) handleMouseUp();
  });
  canvas.addEventListener('mouseleave', handleMouseUp);

  // Touch events
  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    handleMouseMove(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: false });
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    handleMouseDown(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: false });
  canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    handleMouseUp();
  });
  canvas.addEventListener('touchcancel', handleMouseUp);

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });


  // Cursor change handler for end screen buttons
  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'ended') {
      canvas.style.cursor = 'default';
      return;
    }
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    if (gameResult) {
      if (pointInRect(x, y, restartButton) || pointInRect(x, y, nextButton)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    } else {
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    }
    canvas.style.cursor = 'default';
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
