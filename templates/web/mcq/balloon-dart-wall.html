<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Balloon Dart Wall</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
      cursor: crosshair;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = "bold 18px 'Nunito Sans', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = "bold 36px 'Nunito Sans', sans-serif";
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS (QuizHP palette) ===
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC',
    cork: '#C4956A',
    corkDark: '#A67B4E'
  };

  // Balloon colors for decoration
  const BALLOON_COLORS = ['#E87A3E', '#F5A742', '#4ECDC4', '#6BBF59', '#E85D4A', '#FF6B8A', '#9B59B6'];

  // === GAME STATE ===
  let crosshair = { x: W / 2, y: H / 2 };
  let dart = null;
  let answerBalloons = [];
  let decorBalloons = [];
  let popParticles = [];
  let entranceTime = 0;
  let hoveredBalloon = null;

  // Audio context for sounds
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'throw') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(400, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'pop') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(600, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.08);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.08);
    } else if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    }
  }

  // Wrap text helper for balloons
  function wrapText(text, maxWidth) {
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';

    ctx.font = "500 14px 'Nunito', sans-serif";

    for (const word of words) {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      const metrics = ctx.measureText(testLine);

      if (metrics.width > maxWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    }
    if (currentLine) {
      lines.push(currentLine);
    }
    return lines;
  }

  function initGame() {
    crosshair = { x: W / 2, y: H - 80 };
    dart = null;
    popParticles = [];
    entranceTime = 0;
    hoveredBalloon = null;

    // Create answer balloons at fixed positions
    const positions = [
      { x: 150, y: 140 },
      { x: 550, y: 120 },
      { x: 120, y: 340 },
      { x: 580, y: 360 }
    ];

    answerBalloons = QUESTION.choices.map((choice, i) => ({
      x: positions[i].x,
      y: positions[i].y,
      radius: 70,
      color: BALLOON_COLORS[i % BALLOON_COLORS.length],
      choice: choice,
      popped: false,
      scale: 0,
      wobble: Math.random() * Math.PI * 2,
      entranceDelay: i * 0.1
    }));

    // Create decorative balloons
    decorBalloons = [];
    for (let i = 0; i < 12; i++) {
      let x, y, valid;
      let attempts = 0;
      do {
        x = 80 + Math.random() * (W - 160);
        y = 80 + Math.random() * (H - 200);
        valid = true;
        // Check distance from answer balloons
        for (const ab of answerBalloons) {
          const dist = Math.hypot(x - ab.x, y - ab.y);
          if (dist < 120) valid = false;
        }
        attempts++;
      } while (!valid && attempts < 20);

      if (valid) {
        decorBalloons.push({
          x: x,
          y: y,
          radius: 25 + Math.random() * 20,
          color: BALLOON_COLORS[Math.floor(Math.random() * BALLOON_COLORS.length)],
          popped: false,
          wobble: Math.random() * Math.PI * 2
        });
      }
    }
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    entranceTime += dt;

    // Update entrance animations for answer balloons
    for (const balloon of answerBalloons) {
      const t = Math.max(0, entranceTime - balloon.entranceDelay);
      if (t > 0 && balloon.scale < 1) {
        balloon.scale = Math.min(1, t / 0.4);
        // Spring bounce
        if (balloon.scale >= 1) {
          balloon.scale = 1 + Math.sin((t - 0.4) * Math.PI * 4) * 0.1 * Math.exp(-(t - 0.4) * 5);
        }
      }
      // Wobble animation
      balloon.wobble += dt * 2;
    }

    // Update dart physics
    if (dart) {
      dart.x += dart.vx * dt;
      dart.y += dart.vy * dt;
      dart.vy += 200 * dt; // gravity

      // Update dart rotation to follow trajectory
      dart.angle = Math.atan2(dart.vy, dart.vx);

      // Check collision with answer balloons
      for (const balloon of answerBalloons) {
        if (balloon.popped) continue;
        const dist = Math.hypot(dart.x - balloon.x, dart.y - balloon.y);
        if (dist < balloon.radius * balloon.scale) {
          balloon.popped = true;
          dart = null;
          spawnPopParticles(balloon.x, balloon.y, balloon.color);
          playSound('pop');

          // Delay ending to show pop animation
          setTimeout(() => {
            if (balloon.choice.is_correct) {
              playSound('correct');
            } else {
              playSound('wrong');
            }
            engine.end(balloon.choice.is_correct, balloon.choice.explanation);
          }, 300);
          return;
        }
      }

      // Check collision with decorative balloons
      for (const balloon of decorBalloons) {
        if (balloon.popped) continue;
        const dist = Math.hypot(dart.x - balloon.x, dart.y - balloon.y);
        if (dist < balloon.radius) {
          balloon.popped = true;
          spawnPopParticles(balloon.x, balloon.y, balloon.color);
          playSound('pop');
          // Dart continues through decor balloons
        }
      }

      // Remove dart if off screen
      if (dart.x < -50 || dart.x > W + 50 || dart.y > H + 50 || dart.y < -100) {
        dart = null;
      }
    }

    // Update pop particles
    popParticles = popParticles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 400 * dt;
      p.life -= dt;
      p.rotation += p.rotationSpeed * dt;
      return p.life > 0;
    });
  }

  function spawnPopParticles(x, y, color) {
    for (let i = 0; i < 15; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 100 + Math.random() * 200;
      popParticles.push({
        x: x,
        y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 100,
        size: 4 + Math.random() * 8,
        color: color,
        life: 0.5 + Math.random() * 0.5,
        rotation: Math.random() * Math.PI * 2,
        rotationSpeed: (Math.random() - 0.5) * 10
      });
    }
  }

  function drawCorkWall() {
    // Cork background
    ctx.fillStyle = COLORS.cork;
    ctx.fillRect(0, 0, W, H);

    // Cork texture - dots pattern
    ctx.fillStyle = COLORS.corkDark;
    for (let x = 0; x < W; x += 20) {
      for (let y = 0; y < H; y += 20) {
        if (Math.random() > 0.5) {
          ctx.beginPath();
          ctx.arc(x + Math.random() * 10, y + Math.random() * 10, 1 + Math.random() * 2, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    // Darker border frame
    ctx.strokeStyle = '#8B5A2B';
    ctx.lineWidth = 8;
    ctx.strokeRect(4, 4, W - 8, H - 8);
  }

  function drawBalloon(balloon, isAnswer) {
    if (balloon.popped) return;

    const sc = isAnswer ? balloon.scale : 1;
    if (sc <= 0) return;

    const wobbleX = Math.sin(balloon.wobble) * 3;
    const wobbleY = Math.cos(balloon.wobble * 0.7) * 2;

    ctx.save();
    ctx.translate(balloon.x + wobbleX, balloon.y + wobbleY);
    ctx.scale(sc, sc);

    const r = balloon.radius;

    // Balloon body
    ctx.beginPath();
    ctx.ellipse(0, 0, r * 0.9, r, 0, 0, Math.PI * 2);
    ctx.fillStyle = balloon.color;
    ctx.fill();

    // Balloon highlight
    ctx.beginPath();
    ctx.ellipse(-r * 0.3, -r * 0.4, r * 0.25, r * 0.35, -0.4, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
    ctx.fill();

    // Balloon knot
    ctx.beginPath();
    ctx.moveTo(-8, r);
    ctx.lineTo(8, r);
    ctx.lineTo(0, r + 15);
    ctx.closePath();
    ctx.fillStyle = balloon.color;
    ctx.fill();

    // String
    ctx.beginPath();
    ctx.moveTo(0, r + 15);
    ctx.quadraticCurveTo(10, r + 35, 0, r + 50);
    ctx.strokeStyle = '#5A5A54';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Pin
    ctx.beginPath();
    ctx.arc(0, -r + 10, 6, 0, Math.PI * 2);
    ctx.fillStyle = '#C0C0C0';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(0, -r + 10, 3, 0, Math.PI * 2);
    ctx.fillStyle = COLORS.orange;
    ctx.fill();

    // Draw answer text if this is an answer balloon
    if (isAnswer) {
      const lines = wrapText(balloon.choice.text, r * 1.6);
      const lineHeight = 16;
      const totalHeight = lines.length * lineHeight;
      const startY = -totalHeight / 2 + lineHeight / 2;

      ctx.font = "500 14px 'Nunito', sans-serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = COLORS.textPrimary;

      lines.forEach((line, i) => {
        ctx.fillText(line, 0, startY + i * lineHeight);
      });
    }

    ctx.restore();

    // Hover effect for answer balloons
    if (isAnswer && balloon === hoveredBalloon && !dart) {
      ctx.save();
      ctx.translate(balloon.x + wobbleX, balloon.y + wobbleY);
      ctx.beginPath();
      ctx.ellipse(0, 0, r * 0.95 * sc, r * 1.05 * sc, 0, 0, Math.PI * 2);
      ctx.strokeStyle = COLORS.cyan;
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.restore();
    }
  }

  function drawDart() {
    if (!dart) return;

    ctx.save();
    ctx.translate(dart.x, dart.y);
    ctx.rotate(dart.angle);

    // Dart body
    ctx.fillStyle = '#8B4513';
    ctx.beginPath();
    ctx.moveTo(-20, 0);
    ctx.lineTo(15, -4);
    ctx.lineTo(20, 0);
    ctx.lineTo(15, 4);
    ctx.closePath();
    ctx.fill();

    // Dart tip
    ctx.fillStyle = '#C0C0C0';
    ctx.beginPath();
    ctx.moveTo(20, 0);
    ctx.lineTo(30, 0);
    ctx.lineTo(20, -3);
    ctx.moveTo(20, 0);
    ctx.lineTo(20, 3);
    ctx.closePath();
    ctx.fill();

    // Dart flights
    ctx.fillStyle = COLORS.orange;
    ctx.beginPath();
    ctx.moveTo(-20, 0);
    ctx.lineTo(-30, -12);
    ctx.lineTo(-25, 0);
    ctx.closePath();
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(-20, 0);
    ctx.lineTo(-30, 12);
    ctx.lineTo(-25, 0);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  function drawCrosshair() {
    if (dart) return;

    ctx.save();
    ctx.translate(crosshair.x, crosshair.y);

    // Outer circle
    ctx.beginPath();
    ctx.arc(0, 0, 20, 0, Math.PI * 2);
    ctx.strokeStyle = COLORS.orange;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Cross lines
    ctx.beginPath();
    ctx.moveTo(-25, 0);
    ctx.lineTo(-10, 0);
    ctx.moveTo(10, 0);
    ctx.lineTo(25, 0);
    ctx.moveTo(0, -25);
    ctx.lineTo(0, -10);
    ctx.moveTo(0, 10);
    ctx.lineTo(0, 25);
    ctx.stroke();

    // Center dot
    ctx.beginPath();
    ctx.arc(0, 0, 3, 0, Math.PI * 2);
    ctx.fillStyle = COLORS.orange;
    ctx.fill();

    ctx.restore();
  }

  function drawPopParticles() {
    for (const p of popParticles) {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;

      // Draw irregular balloon fragments
      ctx.beginPath();
      ctx.ellipse(0, 0, p.size, p.size * 0.6, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  function drawGame() {
    // Draw cork wall background
    drawCorkWall();

    // Draw decorative balloons
    for (const balloon of decorBalloons) {
      drawBalloon(balloon, false);
    }

    // Draw answer balloons
    for (const balloon of answerBalloons) {
      drawBalloon(balloon, true);
    }

    // Draw pop particles
    drawPopParticles();

    // Draw dart
    drawDart();

    // Draw crosshair
    drawCrosshair();
  }

  function throwDart() {
    if (dart) return;

    initAudio();
    playSound('throw');

    // Calculate direction toward crosshair from bottom center
    const startX = W / 2;
    const startY = H + 30;
    const dx = crosshair.x - startX;
    const dy = crosshair.y - startY;
    const dist = Math.hypot(dx, dy);
    const speed = 600;

    dart = {
      x: startX,
      y: startY,
      vx: (dx / dist) * speed,
      vy: (dy / dist) * speed,
      angle: Math.atan2(dy, dx)
    };
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;

    // Space or Enter to throw
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      throwDart();
    }
  }

  // Mouse move handler for crosshair
  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'playing' || dart) return;
    const pos = screenToLogical(e.clientX, e.clientY);
    crosshair.x = pos.x;
    crosshair.y = pos.y;

    // Check hover on answer balloons
    hoveredBalloon = null;
    for (const balloon of answerBalloons) {
      if (balloon.popped) continue;
      const dist = Math.hypot(pos.x - balloon.x, pos.y - balloon.y);
      if (dist < balloon.radius * balloon.scale) {
        hoveredBalloon = balloon;
        break;
      }
    }
  });

  // Click handler for throwing dart
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'playing') return;
    if (dart) return;

    const pos = screenToLogical(e.clientX, e.clientY);
    crosshair.x = pos.x;
    crosshair.y = pos.y;
    throwDart();
  });

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
