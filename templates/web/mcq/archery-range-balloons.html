<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Template</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  +==================================================================================+
  |  GAME FACTORY TEMPLATE                                                            |
  |  This template enforces critical invariants. Follow the section markers.          |
  +==================================================================================+
  -->
  <style>
    /* ===============================================================================
       BASE STYLES - Can be extended, not removed
       =============================================================================== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
      cursor: crosshair;
    }
  </style>
</head>
<body>
  <!-- ===============================================================================
       CANVAS - Sized dynamically to fill available space
       =============================================================================== -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // +================================================================================+
  // |  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                         |
  // |  Platform replaces this at runtime. Use these exact 60-char answers.            |
  // +================================================================================+
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // +================================================================================+
  // |  SECTION 2: ENGINE CORE - DO NOT MODIFY                                         |
  // |  Standard engine interface and end screen. This is sacred.                      |
  // +================================================================================+
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720x540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720x540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720x540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // +================================================================================+
  // |  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                          |
  // |  This is where your game logic goes. See requirements below.                    |
  // +================================================================================+

  // === COLORS ===
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC',
    peach: '#FFB89D'
  };

  const BALLOON_COLORS = ['#E85D4A', '#4ECDC4', '#F5A742', '#6BBF59'];
  const BALLOON_LABEL_COLORS = ['#FFFFFF', '#FFFFFF', '#2B2B28', '#FFFFFF'];

  // === AUDIO ===
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playSound(type) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;

    if (type === 'draw') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(180, now);
      osc.frequency.linearRampToValueAtTime(120, now + 0.15);
      gain.gain.setValueAtTime(0.08, now);
      gain.gain.linearRampToValueAtTime(0, now + 0.15);
      osc.start(now);
      osc.stop(now + 0.15);
    } else if (type === 'release') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.linearRampToValueAtTime(600, now + 0.08);
      gain.gain.setValueAtTime(0.12, now);
      gain.gain.linearRampToValueAtTime(0, now + 0.2);
      osc.start(now);
      osc.stop(now + 0.2);
    } else if (type === 'pop') {
      // Balloon pop
      const noise = audioCtx.createBufferSource();
      const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.02));
      noise.buffer = buffer;
      const noiseGain = audioCtx.createGain();
      noiseGain.gain.setValueAtTime(0.3, now);
      noiseGain.gain.linearRampToValueAtTime(0, now + 0.1);
      noise.connect(noiseGain);
      noiseGain.connect(audioCtx.destination);
      noise.start(now);
    } else if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, now);
      osc.frequency.setValueAtTime(659, now + 0.1);
      osc.frequency.setValueAtTime(784, now + 0.2);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.linearRampToValueAtTime(0, now + 0.4);
      osc.start(now);
      osc.stop(now + 0.4);
    } else if (type === 'wrong') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.linearRampToValueAtTime(100, now + 0.3);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.linearRampToValueAtTime(0, now + 0.3);
      osc.start(now);
      osc.stop(now + 0.3);
    }
  }

  // === GAME STATE ===
  let bow = { x: 80, y: 360, angle: -Math.PI / 4, drawLength: 0, maxDraw: 80 };
  let arrow = null; // { x, y, vx, vy, active }
  let balloons = [];
  let isDragging = false;
  let dragStartY = 0;
  let gameTime = 0;
  let particles = [];
  let popAnimation = null; // { x, y, time, color }
  let selectedBalloon = -1;
  let answerLocked = false;

  // Text wrapping
  const ANSWER_PANEL_W = 480;
  const ANSWER_PANEL_X = 230;
  const ANSWER_LINE_H = 15;

  function wrapText(text, maxWidth, font) {
    ctx.font = font;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    for (const word of words) {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxWidth) {
        if (currentLine) lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    }
    if (currentLine) lines.push(currentLine);
    return lines;
  }

  function initGame() {
    gameTime = 0;
    bow = { x: 80, y: 360, angle: -Math.PI / 4, drawLength: 0, maxDraw: 80 };
    arrow = null;
    isDragging = false;
    answerLocked = false;
    selectedBalloon = -1;
    popAnimation = null;
    particles = [];

    // Position balloons at varying heights across the range
    const balloonPositions = [
      { x: 260, baseY: 100 },
      { x: 380, baseY: 160 },
      { x: 500, baseY: 80 },
      { x: 620, baseY: 140 }
    ];

    balloons = QUESTION.choices.map((choice, i) => ({
      x: balloonPositions[i].x,
      y: balloonPositions[i].baseY,
      baseY: balloonPositions[i].baseY,
      radius: 32,
      color: BALLOON_COLORS[i],
      labelColor: BALLOON_LABEL_COLORS[i],
      choice: choice,
      index: i,
      alive: true,
      scale: 0,
      alpha: 0,
      bobOffset: Math.random() * Math.PI * 2,
      entranceDelay: i * 80
    }));

    // Trigger entrance animation
    balloons.forEach((b, i) => {
      setTimeout(() => {
        const startTime = performance.now();
        const duration = 350;
        const animate = () => {
          const t = Math.min((performance.now() - startTime) / duration, 1);
          const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
          b.scale = t * spring;
          b.alpha = t;
          if (t < 1) requestAnimationFrame(animate);
          else { b.scale = 1; b.alpha = 1; }
        };
        requestAnimationFrame(animate);
      }, i * 80);
    });
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Bob balloons
    balloons.forEach(b => {
      if (b.alive) {
        b.y = b.baseY + Math.sin(gameTime * 1.5 + b.bobOffset) * 8;
      }
    });

    // Update arrow flight
    if (arrow && arrow.active) {
      arrow.x += arrow.vx * dt;
      arrow.y += arrow.vy * dt;
      arrow.vy += 120 * dt; // gravity

      // Check collision with balloons
      for (const b of balloons) {
        if (!b.alive) continue;
        const dx = arrow.x - b.x;
        const dy = arrow.y - b.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < b.radius + 6) {
          // Hit!
          b.alive = false;
          arrow.active = false;
          selectedBalloon = b.index;
          answerLocked = true;
          playSound('pop');

          // Pop particles
          for (let i = 0; i < 12; i++) {
            particles.push({
              x: b.x,
              y: b.y,
              vx: (Math.random() - 0.5) * 300,
              vy: (Math.random() - 0.5) * 300 - 100,
              color: b.color,
              size: 3 + Math.random() * 5,
              life: 1,
              decay: 1.5 + Math.random()
            });
          }

          popAnimation = { x: b.x, y: b.y, time: 0, color: b.color };

          // Delay end call for animation
          setTimeout(() => {
            if (b.choice.is_correct) {
              playSound('correct');
            } else {
              playSound('wrong');
            }
            engine.end(b.choice.is_correct, b.choice.explanation);
          }, 600);

          break;
        }
      }

      // Arrow out of bounds
      if (arrow.x > W + 20 || arrow.y > H + 20 || arrow.x < -20 || arrow.y < -50) {
        arrow.active = false;
        // Reset bow to allow re-fire
        setTimeout(() => {
          if (gameState === 'playing' && !answerLocked) {
            arrow = null;
          }
        }, 300);
      }
    }

    // Update particles
    particles.forEach(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 400 * dt;
      p.life -= p.decay * dt;
    });
    particles = particles.filter(p => p.life > 0);

    // Update pop animation
    if (popAnimation) {
      popAnimation.time += dt;
      if (popAnimation.time > 0.5) popAnimation = null;
    }
  }

  function drawGame() {
    // Sky gradient
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, '#87CEEB');
    skyGrad.addColorStop(0.6, '#B8E4F0');
    skyGrad.addColorStop(1, '#D4EDDA');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    // Clouds
    drawCloud(150, 40, 0.7);
    drawCloud(450, 70, 0.5);
    drawCloud(600, 25, 0.6);

    // Ground
    const groundGrad = ctx.createLinearGradient(0, H - 100, 0, H);
    groundGrad.addColorStop(0, '#7CB342');
    groundGrad.addColorStop(1, '#558B2F');
    ctx.fillStyle = groundGrad;
    ctx.fillRect(0, H - 100, W, 100);

    // Ground line
    ctx.strokeStyle = '#4E7C2A';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, H - 100);
    ctx.lineTo(W, H - 100);
    ctx.stroke();

    // Archery range posts
    drawRangePost(230, H - 100);
    drawRangePost(650, H - 100);

    // Range rope between posts
    ctx.strokeStyle = '#8D6E63';
    ctx.lineWidth = 2;
    ctx.setLineDash([8, 4]);
    ctx.beginPath();
    ctx.moveTo(230, H - 140);
    ctx.lineTo(650, H - 140);
    ctx.stroke();
    ctx.setLineDash([]);

    // Draw balloon strings first (behind balloons)
    balloons.forEach(b => {
      if (!b.alive || b.alpha < 0.1) return;
      ctx.save();
      ctx.globalAlpha = b.alpha;
      ctx.strokeStyle = '#8C8C84';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(b.x, b.y + b.radius * b.scale);
      // Wavy string
      const stringLen = 50;
      for (let i = 0; i <= 10; i++) {
        const t = i / 10;
        const sx = b.x + Math.sin(t * Math.PI * 3 + gameTime * 2 + b.bobOffset) * 4;
        const sy = b.y + b.radius * b.scale + t * stringLen;
        ctx.lineTo(sx, sy);
      }
      ctx.stroke();
      ctx.restore();
    });

    // Draw balloons
    balloons.forEach((b, i) => {
      if (!b.alive || b.alpha < 0.1) return;
      drawBalloon(b);
    });

    // Draw pop animation
    if (popAnimation) {
      const t = popAnimation.time / 0.5;
      ctx.save();
      ctx.globalAlpha = 1 - t;
      ctx.strokeStyle = popAnimation.color;
      ctx.lineWidth = 3 * (1 - t);
      ctx.beginPath();
      ctx.arc(popAnimation.x, popAnimation.y, 30 + t * 40, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    // Draw particles
    particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });

    // Draw bow
    drawBow();

    // Draw arrow (in flight or nocked)
    if (arrow && arrow.active) {
      drawArrow(arrow.x, arrow.y, Math.atan2(arrow.vy, arrow.vx));
    } else if (isDragging || (!arrow && !answerLocked)) {
      // Draw nocked arrow on bow
      const nockX = bow.x + Math.cos(bow.angle) * (-bow.drawLength);
      const nockY = bow.y + Math.sin(bow.angle) * (-bow.drawLength);
      drawArrow(nockX, nockY, bow.angle);
    }

    // Draw answer labels panel at bottom
    drawAnswerPanel();
  }

  function drawCloud(cx, cy, s) {
    ctx.save();
    ctx.globalAlpha = 0.6;
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath();
    ctx.arc(cx, cy, 20 * s, 0, Math.PI * 2);
    ctx.arc(cx + 20 * s, cy - 8 * s, 16 * s, 0, Math.PI * 2);
    ctx.arc(cx + 40 * s, cy, 20 * s, 0, Math.PI * 2);
    ctx.arc(cx + 18 * s, cy + 6 * s, 14 * s, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawRangePost(x, groundY) {
    ctx.fillStyle = '#6D4C41';
    ctx.fillRect(x - 4, groundY - 60, 8, 60);
    ctx.fillStyle = '#8D6E63';
    ctx.fillRect(x - 6, groundY - 62, 12, 6);
  }

  function drawBalloon(b) {
    ctx.save();
    ctx.globalAlpha = b.alpha;
    ctx.translate(b.x, b.y);
    ctx.scale(b.scale, b.scale);

    // Balloon body (oval)
    const grad = ctx.createRadialGradient(-6, -8, 4, 0, 0, b.radius);
    grad.addColorStop(0, lightenColor(b.color, 40));
    grad.addColorStop(0.7, b.color);
    grad.addColorStop(1, darkenColor(b.color, 30));
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0, 0, b.radius * 0.85, b.radius, 0, 0, Math.PI * 2);
    ctx.fill();

    // Balloon highlight
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.ellipse(-8, -10, 6, 10, -0.4, 0, Math.PI * 2);
    ctx.fill();

    // Balloon tie
    ctx.fillStyle = darkenColor(b.color, 40);
    ctx.beginPath();
    ctx.moveTo(-4, b.radius - 2);
    ctx.lineTo(4, b.radius - 2);
    ctx.lineTo(0, b.radius + 6);
    ctx.closePath();
    ctx.fill();

    // Letter label
    const letter = String.fromCharCode(65 + b.index);
    ctx.font = "700 22px 'Belanosima', sans-serif";
    ctx.fillStyle = b.labelColor;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(letter, 0, -2);

    ctx.restore();
  }

  function drawBow() {
    ctx.save();
    ctx.translate(bow.x, bow.y);

    // Bow body (curved wooden limb)
    const bowLen = 90;
    const curve = 25 + bow.drawLength * 0.15;

    ctx.strokeStyle = '#6D4C41';
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, -bowLen / 2);
    ctx.quadraticCurveTo(curve, 0, 0, bowLen / 2);
    ctx.stroke();

    // Wood grain overlay
    ctx.strokeStyle = '#8D6E63';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(1, -bowLen / 2 + 5);
    ctx.quadraticCurveTo(curve - 3, 0, 1, bowLen / 2 - 5);
    ctx.stroke();

    // Bowstring
    const stringPullX = -bow.drawLength;
    ctx.strokeStyle = '#D4D4CC';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, -bowLen / 2);
    ctx.lineTo(stringPullX, 0);
    ctx.lineTo(0, bowLen / 2);
    ctx.stroke();

    // Draw power indicator when drawing
    if (isDragging && bow.drawLength > 5) {
      const power = bow.drawLength / bow.maxDraw;
      const indicatorColor = power < 0.5 ? COLORS.amber : (power < 0.8 ? COLORS.orange : COLORS.error);
      ctx.fillStyle = indicatorColor;
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      ctx.arc(stringPullX - 15, 0, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    ctx.restore();
  }

  function drawArrow(x, y, angle) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);

    const len = 50;

    // Arrow shaft
    ctx.strokeStyle = '#8D6E63';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(-len / 2, 0);
    ctx.lineTo(len / 2, 0);
    ctx.stroke();

    // Arrowhead
    ctx.fillStyle = '#5A5A54';
    ctx.beginPath();
    ctx.moveTo(len / 2 + 8, 0);
    ctx.lineTo(len / 2 - 4, -5);
    ctx.lineTo(len / 2 - 4, 5);
    ctx.closePath();
    ctx.fill();

    // Fletching
    ctx.fillStyle = COLORS.error;
    ctx.beginPath();
    ctx.moveTo(-len / 2, 0);
    ctx.lineTo(-len / 2 + 10, -4);
    ctx.lineTo(-len / 2 + 8, 0);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = COLORS.orange;
    ctx.beginPath();
    ctx.moveTo(-len / 2, 0);
    ctx.lineTo(-len / 2 + 10, 4);
    ctx.lineTo(-len / 2 + 8, 0);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  function drawAnswerPanel() {
    // Answer panel background at bottom
    const panelY = H - 100;
    const panelH = 100;

    ctx.fillStyle = 'rgba(250, 250, 247, 0.92)';
    ctx.beginPath();
    ctx.roundRect(ANSWER_PANEL_X - 10, panelY, ANSWER_PANEL_W + 20, panelH, 12);
    ctx.fill();

    ctx.strokeStyle = COLORS.borderSubtle;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.roundRect(ANSWER_PANEL_X - 10, panelY, ANSWER_PANEL_W + 20, panelH, 12);
    ctx.stroke();

    // Draw answer labels in a 2x2 grid inside the panel
    const gridW = ANSWER_PANEL_W / 2 - 6;
    const gridH = 40;
    const gap = 5;
    const startX = ANSWER_PANEL_X;
    const startY = panelY + 10;

    QUESTION.choices.forEach((choice, i) => {
      const col = i % 2;
      const row = Math.floor(i / 2);
      const bx = startX + col * (gridW + gap * 2);
      const by = startY + row * (gridH + gap);

      const isHit = selectedBalloon === i;
      let bgColor = COLORS.bgSurface;
      let borderColor = COLORS.borderSubtle;

      if (isHit) {
        bgColor = choice.is_correct ? '#E8F8E5' : '#FDECEB';
        borderColor = choice.is_correct ? COLORS.success : COLORS.error;
      }

      // Answer box
      ctx.fillStyle = bgColor;
      ctx.beginPath();
      ctx.roundRect(bx, by, gridW, gridH, 8);
      ctx.fill();

      ctx.strokeStyle = borderColor;
      ctx.lineWidth = isHit ? 2 : 1;
      ctx.beginPath();
      ctx.roundRect(bx, by, gridW, gridH, 8);
      ctx.stroke();

      // Letter badge
      ctx.fillStyle = BALLOON_COLORS[i];
      ctx.beginPath();
      ctx.arc(bx + 16, by + gridH / 2, 10, 0, Math.PI * 2);
      ctx.fill();

      ctx.font = "700 12px 'Belanosima', sans-serif";
      ctx.fillStyle = BALLOON_LABEL_COLORS[i];
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String.fromCharCode(65 + i), bx + 16, by + gridH / 2);

      // Answer text (wrapped)
      ctx.font = "400 14px 'Nunito', sans-serif";
      ctx.fillStyle = COLORS.textPrimary;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      const textMaxW = gridW - 38;
      const lines = wrapText(choice.text, textMaxW, "400 14px 'Nunito', sans-serif");
      const textStartY = by + (gridH - lines.length * ANSWER_LINE_H) / 2;
      lines.forEach((line, li) => {
        ctx.fillText(line, bx + 32, textStartY + li * ANSWER_LINE_H);
      });
    });
  }

  function lightenColor(hex, amount) {
    const num = parseInt(hex.slice(1), 16);
    const r = Math.min(255, (num >> 16) + amount);
    const g = Math.min(255, ((num >> 8) & 0xff) + amount);
    const b = Math.min(255, (num & 0xff) + amount);
    return `rgb(${r},${g},${b})`;
  }

  function darkenColor(hex, amount) {
    const num = parseInt(hex.slice(1), 16);
    const r = Math.max(0, (num >> 16) - amount);
    const g = Math.max(0, ((num >> 8) & 0xff) - amount);
    const b = Math.max(0, (num & 0xff) - amount);
    return `rgb(${r},${g},${b})`;
  }

  // === MOUSE INPUT ===
  canvas.addEventListener('mousedown', (e) => {
    if (gameState !== 'playing' || answerLocked) return;
    if (arrow && arrow.active) return; // Arrow already in flight

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    // Check if clicking near the bow area
    if (x < 200 && y > 200 && y < 500) {
      isDragging = true;
      dragStartY = y;
      bow.drawLength = 0;
      arrow = null;
      if (audioCtx.state === 'suspended') audioCtx.resume();
      playSound('draw');
    }
  });

  canvas.addEventListener('mousemove', (e) => {
    if (!isDragging || gameState !== 'playing') return;
    const { x, y } = screenToLogical(e.clientX, e.clientY);

    // Calculate draw length based on horizontal distance pulled back
    const pullDist = Math.max(0, bow.x + 40 - x);
    bow.drawLength = Math.min(pullDist, bow.maxDraw);

    // Aim angle based on mouse position
    const dx = x - bow.x;
    const dy = y - bow.y;
    bow.angle = Math.atan2(dy, dx);
    // Clamp angle to reasonable range
    bow.angle = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 6, bow.angle));
  });

  canvas.addEventListener('mouseup', (e) => {
    if (!isDragging || gameState !== 'playing') return;
    isDragging = false;

    if (bow.drawLength > 10) {
      // Fire arrow
      const power = (bow.drawLength / bow.maxDraw) * 700 + 200;
      arrow = {
        x: bow.x + Math.cos(bow.angle) * 10,
        y: bow.y + Math.sin(bow.angle) * 10,
        vx: Math.cos(bow.angle) * power,
        vy: Math.sin(bow.angle) * power,
        active: true
      };
      playSound('release');
    }

    bow.drawLength = 0;
  });

  function handleInput(e) {
    if (gameState !== 'playing') return;
    // Keyboard not needed - mouse-driven game
  }

  // +================================================================================+
  // |  SECTION 4: GAME LOOP - DO NOT MODIFY                                           |
  // |  Standard loop with responsive scaling and DPR support.                         |
  // +================================================================================+
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
