<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Locksmith Tumbler Pin Toss</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = "bold 18px 'Nunito Sans', system-ui, sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = "bold 36px 'Nunito Sans', system-ui, sans-serif";
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    bgSecondary: '#F5F5F0',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC',
    brass: '#C4A35A',
    brassLight: '#D4B96A',
    brassDark: '#A08840',
    iron: '#6B6B70',
    ironDark: '#4A4A50',
    ironLight: '#8A8A90',
    steel: '#888890',
    lockBg: '#3A3530',
    lockMid: '#4A4540',
    lockLight: '#5A5550'
  };

  // === GAME STATE ===
  let player = {};
  let tumblers = [];
  let ball = {};
  let springs = [];
  let gears = [];
  let sparkParticles = [];
  let gameParticles = [];
  let entranceTimer = 0;
  let selectedTumbler = -1;
  let ballLaunched = false;
  let ballLanding = false;
  let lockJammed = false;
  let lockJamTimer = 0;
  let ironBarY = -60;
  let boltUnlocked = false;
  let boltSlideX = 0;
  let answerTime = 0;
  let shakeAmount = 0;
  let shakeDecay = 0;
  let hoverTumbler = -1;

  // Audio context
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playSound(type) {
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);

      if (type === 'launch') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(300, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.15, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.2);
      } else if (type === 'correct') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, ctx.currentTime);
        osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
        osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.2, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.4);
      } else if (type === 'wrong') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.15, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.4);
      } else if (type === 'click') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(600, ctx.currentTime);
        gain.gain.setValueAtTime(0.08, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.05);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.05);
      } else if (type === 'metal') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(1200, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.12, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.2);
      }
    } catch (e) {}
  }

  // Word wrap for answer text
  function wrapText(text, maxWidth, font) {
    ctx.font = font;
    const words = text.split(' ');
    const lines = [];
    let currentLine = words[0];
    for (let i = 1; i < words.length; i++) {
      const testLine = currentLine + ' ' + words[i];
      if (ctx.measureText(testLine).width <= maxWidth) {
        currentLine = testLine;
      } else {
        lines.push(currentLine);
        currentLine = words[i];
      }
    }
    lines.push(currentLine);
    return lines;
  }

  function initGame() {
    entranceTimer = 0;
    selectedTumbler = -1;
    ballLaunched = false;
    ballLanding = false;
    lockJammed = false;
    lockJamTimer = 0;
    ironBarY = -60;
    boltUnlocked = false;
    boltSlideX = 0;
    answerTime = 0;
    shakeAmount = 0;
    shakeDecay = 0;
    hoverTumbler = -1;
    sparkParticles = [];
    gameParticles = [];

    // Player key-pick at bottom
    player = {
      x: W / 2,
      y: H - 55,
      width: 24,
      height: 40,
      speed: 350,
      vx: 0,
      scale: 0,
      alpha: 0
    };

    // Ball (metal sphere)
    ball = {
      x: player.x,
      y: player.y - 20,
      radius: 8,
      vx: 0,
      vy: 0,
      active: false,
      scale: 0,
      alpha: 0
    };

    // 4 tumblers positioned across the top area
    const tumblerW = 155;
    const tumblerH = 120;
    const tumblerGap = 12;
    const totalW = tumblerW * 4 + tumblerGap * 3;
    const startX = (W - totalW) / 2;
    const tumblerY = 20;

    tumblers = QUESTION.choices.map((choice, i) => ({
      x: startX + i * (tumblerW + tumblerGap),
      y: tumblerY,
      w: tumblerW,
      h: tumblerH,
      holeX: startX + i * (tumblerW + tumblerGap) + tumblerW / 2,
      holeY: tumblerY + 20,
      holeRadius: 14,
      choice: choice,
      index: i,
      hit: false,
      scale: 0,
      alpha: 0,
      shakeX: 0,
      glowAlpha: 0,
      pinHeight: 50 + Math.random() * 20
    }));

    // Springs decoration
    springs = [];
    for (let i = 0; i < 6; i++) {
      springs.push({
        x: 40 + Math.random() * (W - 80),
        y: 160 + Math.random() * 180,
        coils: 4 + Math.floor(Math.random() * 3),
        length: 30 + Math.random() * 30,
        width: 8 + Math.random() * 6,
        compression: 0,
        phase: Math.random() * Math.PI * 2
      });
    }

    // Gears decoration
    gears = [];
    for (let i = 0; i < 4; i++) {
      gears.push({
        x: 50 + Math.random() * (W - 100),
        y: 180 + Math.random() * 160,
        radius: 15 + Math.random() * 20,
        teeth: 6 + Math.floor(Math.random() * 6),
        rotation: Math.random() * Math.PI * 2,
        speed: (Math.random() - 0.5) * 1.5,
        alpha: 0.15 + Math.random() * 0.15
      });
    }
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    entranceTimer += dt;
    answerTime += dt;

    // Entrance animations
    const playerDelay = 0.3;
    const ballDelay = 0.4;
    if (entranceTimer > playerDelay && player.scale < 1) {
      player.scale = Math.min(1, player.scale + dt * 4);
      player.alpha = Math.min(1, player.alpha + dt * 4);
    }
    if (entranceTimer > ballDelay && ball.scale < 1) {
      ball.scale = Math.min(1, ball.scale + dt * 4);
      ball.alpha = Math.min(1, ball.alpha + dt * 4);
    }
    tumblers.forEach((t, i) => {
      const delay = i * 0.1;
      if (entranceTimer > delay && t.scale < 1) {
        const progress = Math.min(1, (entranceTimer - delay) * 3);
        const spring = 1 + Math.sin(progress * Math.PI * 2) * 0.15 * (1 - progress);
        t.scale = progress * spring;
        t.alpha = Math.min(1, progress * 1.5);
      }
    });

    // Player movement
    player.x += player.vx * dt;
    player.x = Math.max(20, Math.min(W - 20, player.x));

    // Ball follows player when not launched
    if (!ball.active) {
      ball.x = player.x;
      ball.y = player.y - 25;
    }

    // Ball physics
    if (ball.active) {
      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;

      // Check tumbler collisions
      for (let t of tumblers) {
        if (t.hit) continue;
        const dx = ball.x - t.holeX;
        const dy = ball.y - t.holeY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < t.holeRadius + ball.radius) {
          t.hit = true;
          ball.active = false;
          ballLanding = true;
          ball.x = t.holeX;
          ball.y = t.holeY;
          selectedTumbler = t.index;

          playSound('metal');

          if (t.choice.is_correct) {
            // Correct: unlock bolt
            boltUnlocked = true;
            t.glowAlpha = 1;
            playSound('correct');

            // Spawn celebration particles
            for (let p = 0; p < 20; p++) {
              gameParticles.push({
                x: t.holeX,
                y: t.holeY,
                vx: (Math.random() - 0.5) * 200,
                vy: (Math.random() - 0.5) * 200,
                size: 3 + Math.random() * 4,
                color: [COLORS.success, COLORS.cyan, COLORS.amber][Math.floor(Math.random() * 3)],
                life: 1,
                decay: 0.8 + Math.random() * 0.5
              });
            }

            setTimeout(() => {
              engine.end(true, t.choice.explanation);
            }, 800);
          } else {
            // Wrong: jam lock, sparks
            lockJammed = true;
            lockJamTimer = 0;
            shakeAmount = 12;
            shakeDecay = 8;
            t.glowAlpha = 1;
            playSound('wrong');

            // Spawn spark particles
            for (let p = 0; p < 30; p++) {
              sparkParticles.push({
                x: t.holeX,
                y: t.holeY + 30,
                vx: (Math.random() - 0.5) * 400,
                vy: (Math.random() - 0.5) * 300 - 50,
                size: 2 + Math.random() * 3,
                color: [COLORS.orange, COLORS.amber, '#FFFFFF', COLORS.error][Math.floor(Math.random() * 4)],
                life: 1,
                decay: 1.5 + Math.random() * 1
              });
            }

            setTimeout(() => {
              engine.end(false, t.choice.explanation);
            }, 1000);
          }
          break;
        }
      }

      // Ball out of bounds
      if (ball.y < -20 || ball.x < -20 || ball.x > W + 20) {
        ball.active = false;
        ball.x = player.x;
        ball.y = player.y - 25;
        ballLaunched = false;
      }
    }

    // Iron bar animation (jam)
    if (lockJammed) {
      lockJamTimer += dt;
      ironBarY = Math.min(H / 2 - 10, ironBarY + dt * 600);
    }

    // Bolt slide animation (unlock)
    if (boltUnlocked) {
      boltSlideX = Math.min(60, boltSlideX + dt * 120);
    }

    // Shake decay
    if (shakeAmount > 0) {
      shakeAmount = Math.max(0, shakeAmount - shakeDecay * dt);
    }

    // Tumbler shake on wrong
    tumblers.forEach(t => {
      if (t.hit && !t.choice.is_correct) {
        t.shakeX = Math.sin(answerTime * 40) * shakeAmount;
      }
      // Glow decay
      if (t.glowAlpha > 0 && !t.choice.is_correct) {
        t.glowAlpha = Math.max(0, t.glowAlpha - dt * 1.5);
      }
    });

    // Particle updates
    sparkParticles = sparkParticles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 400 * dt;
      p.life -= p.decay * dt;
      return p.life > 0;
    });

    gameParticles = gameParticles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= p.decay * dt;
      return p.life > 0;
    });

    // Gear rotation
    gears.forEach(g => {
      g.rotation += g.speed * dt;
    });

    // Spring animation
    springs.forEach(s => {
      s.compression = Math.sin(answerTime * 2 + s.phase) * 0.1;
    });
  }

  function drawGame() {
    const sx = shakeAmount > 0 ? (Math.random() - 0.5) * shakeAmount : 0;
    const sy = shakeAmount > 0 ? (Math.random() - 0.5) * shakeAmount : 0;

    ctx.save();
    ctx.translate(sx, sy);

    // Background: lock interior
    const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
    bgGrad.addColorStop(0, '#2A2520');
    bgGrad.addColorStop(0.5, COLORS.lockBg);
    bgGrad.addColorStop(1, '#302B25');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    // Lock housing border lines
    ctx.strokeStyle = COLORS.brassDark;
    ctx.lineWidth = 3;
    ctx.strokeRect(8, 8, W - 16, H - 16);
    ctx.strokeStyle = COLORS.brass + '40';
    ctx.lineWidth = 1;
    ctx.strokeRect(14, 14, W - 28, H - 28);

    // Draw background gears
    gears.forEach(g => {
      ctx.save();
      ctx.translate(g.x, g.y);
      ctx.rotate(g.rotation);
      ctx.globalAlpha = g.alpha;

      ctx.beginPath();
      for (let i = 0; i < g.teeth; i++) {
        const angle = (i / g.teeth) * Math.PI * 2;
        const innerR = g.radius * 0.7;
        const outerR = g.radius;
        const toothWidth = Math.PI / g.teeth * 0.6;

        ctx.lineTo(Math.cos(angle - toothWidth) * innerR, Math.sin(angle - toothWidth) * innerR);
        ctx.lineTo(Math.cos(angle - toothWidth * 0.5) * outerR, Math.sin(angle - toothWidth * 0.5) * outerR);
        ctx.lineTo(Math.cos(angle + toothWidth * 0.5) * outerR, Math.sin(angle + toothWidth * 0.5) * outerR);
        ctx.lineTo(Math.cos(angle + toothWidth) * innerR, Math.sin(angle + toothWidth) * innerR);
      }
      ctx.closePath();
      ctx.fillStyle = COLORS.ironDark;
      ctx.fill();
      ctx.strokeStyle = COLORS.iron;
      ctx.lineWidth = 1;
      ctx.stroke();

      // Center hole
      ctx.beginPath();
      ctx.arc(0, 0, g.radius * 0.25, 0, Math.PI * 2);
      ctx.fillStyle = COLORS.lockBg;
      ctx.fill();

      ctx.globalAlpha = 1;
      ctx.restore();
    });

    // Draw springs
    springs.forEach(s => {
      ctx.save();
      ctx.globalAlpha = 0.3;
      const compLen = s.length * (1 - s.compression);
      ctx.strokeStyle = COLORS.steel;
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i = 0; i <= s.coils * 2; i++) {
        const t = i / (s.coils * 2);
        const px = s.x + (i % 2 === 0 ? -s.width / 2 : s.width / 2);
        const py = s.y + t * compLen;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.restore();
    });

    // Draw bolt mechanism (center)
    const boltY = H / 2 + 30;
    const boltW = 120;
    const boltH = 20;
    const boltX = W / 2 - boltW / 2 + boltSlideX;

    // Bolt housing
    ctx.fillStyle = COLORS.ironDark;
    ctx.beginPath();
    ctx.roundRect(W / 2 - 70, boltY - 15, 140, 30, 4);
    ctx.fill();

    // Bolt itself
    const boltGrad = ctx.createLinearGradient(boltX, boltY - boltH / 2, boltX, boltY + boltH / 2);
    boltGrad.addColorStop(0, COLORS.ironLight);
    boltGrad.addColorStop(0.5, COLORS.iron);
    boltGrad.addColorStop(1, COLORS.ironDark);
    ctx.fillStyle = boltGrad;
    ctx.beginPath();
    ctx.roundRect(boltX, boltY - boltH / 2, boltW, boltH, 3);
    ctx.fill();
    ctx.strokeStyle = COLORS.steel;
    ctx.lineWidth = 1;
    ctx.stroke();

    // Bolt notch
    ctx.fillStyle = COLORS.lockBg;
    ctx.fillRect(boltX + 30, boltY - 4, 20, 8);

    // Draw tumblers
    tumblers.forEach((t, i) => {
      if (t.alpha <= 0) return;

      ctx.save();
      ctx.globalAlpha = t.alpha;
      ctx.translate(t.x + t.w / 2 + t.shakeX, t.y + t.h / 2);
      ctx.scale(t.scale, t.scale);
      ctx.translate(-(t.x + t.w / 2), -(t.y + t.h / 2));

      // Tumbler body (brass)
      const tGrad = ctx.createLinearGradient(t.x, t.y, t.x, t.y + t.h);
      tGrad.addColorStop(0, COLORS.brassLight);
      tGrad.addColorStop(0.5, COLORS.brass);
      tGrad.addColorStop(1, COLORS.brassDark);
      ctx.fillStyle = tGrad;
      ctx.beginPath();
      ctx.roundRect(t.x, t.y, t.w, t.h, 8);
      ctx.fill();

      // Tumbler border
      ctx.strokeStyle = COLORS.brassDark;
      ctx.lineWidth = 2;
      ctx.stroke();

      // Inner bevel
      ctx.strokeStyle = COLORS.brassLight + '60';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(t.x + 3, t.y + 3, t.w - 6, t.h - 6, 6);
      ctx.stroke();

      // Pin hole (circular)
      ctx.beginPath();
      ctx.arc(t.holeX, t.holeY, t.holeRadius, 0, Math.PI * 2);
      const holeGrad = ctx.createRadialGradient(t.holeX, t.holeY, 0, t.holeX, t.holeY, t.holeRadius);
      holeGrad.addColorStop(0, '#1A1510');
      holeGrad.addColorStop(0.8, '#2A2520');
      holeGrad.addColorStop(1, COLORS.brassDark);
      ctx.fillStyle = holeGrad;
      ctx.fill();
      ctx.strokeStyle = COLORS.brassDark;
      ctx.lineWidth = 2;
      ctx.stroke();

      // Glow when hit
      if (t.glowAlpha > 0) {
        ctx.globalAlpha = t.glowAlpha * 0.5;
        ctx.beginPath();
        ctx.arc(t.holeX, t.holeY, t.holeRadius + 8, 0, Math.PI * 2);
        ctx.fillStyle = t.choice.is_correct ? COLORS.success : COLORS.error;
        ctx.fill();
        ctx.globalAlpha = t.alpha;
      }

      // Draw ball in hole if this tumbler was hit
      if (t.hit && selectedTumbler === i) {
        ctx.beginPath();
        ctx.arc(t.holeX, t.holeY, ball.radius, 0, Math.PI * 2);
        const ballGrad = ctx.createRadialGradient(
          t.holeX - 2, t.holeY - 2, 1,
          t.holeX, t.holeY, ball.radius
        );
        ballGrad.addColorStop(0, '#E0E0E0');
        ballGrad.addColorStop(0.6, '#A0A0A0');
        ballGrad.addColorStop(1, '#707070');
        ctx.fillStyle = ballGrad;
        ctx.fill();
      }

      // Pin underneath tumbler
      const pinX = t.x + t.w / 2;
      const pinTop = t.y + t.h;
      const pinGrad = ctx.createLinearGradient(pinX - 5, pinTop, pinX + 5, pinTop);
      pinGrad.addColorStop(0, COLORS.brassLight);
      pinGrad.addColorStop(0.5, COLORS.brass);
      pinGrad.addColorStop(1, COLORS.brassDark);
      ctx.fillStyle = pinGrad;
      ctx.fillRect(pinX - 5, pinTop, 10, t.pinHeight);

      // Pin spring below
      ctx.strokeStyle = COLORS.steel;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      const springTop = pinTop + t.pinHeight;
      for (let c = 0; c <= 6; c++) {
        const st = c / 6;
        const spx = pinX + (c % 2 === 0 ? -6 : 6);
        const spy = springTop + st * 25;
        if (c === 0) ctx.moveTo(spx, spy);
        else ctx.lineTo(spx, spy);
      }
      ctx.stroke();

      // Answer text on tumbler face
      const textFont = "500 14px 'Nunito', sans-serif";
      const maxTextW = t.w - 16;
      const lines = wrapText(t.choice.text, maxTextW, textFont);
      ctx.font = textFont;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = COLORS.lockBg;

      const lineHeight = 16;
      const textStartY = t.y + 42 + (t.h - 42 - lines.length * lineHeight) / 2 + lineHeight / 2;
      lines.forEach((line, li) => {
        ctx.fillText(line, t.x + t.w / 2, textStartY + li * lineHeight);
      });

      // Letter label (A, B, C, D)
      ctx.font = "700 16px 'Nunito Sans', sans-serif";
      ctx.fillStyle = COLORS.lockBg;
      ctx.textAlign = 'left';
      ctx.fillText(String.fromCharCode(65 + i), t.x + 8, t.y + 14);

      ctx.globalAlpha = 1;
      ctx.restore();
    });

    // Iron bar (slams down on wrong)
    if (lockJammed && ironBarY > -50) {
      const barGrad = ctx.createLinearGradient(0, ironBarY, 0, ironBarY + 20);
      barGrad.addColorStop(0, COLORS.ironLight);
      barGrad.addColorStop(0.5, COLORS.iron);
      barGrad.addColorStop(1, COLORS.ironDark);
      ctx.fillStyle = barGrad;
      ctx.beginPath();
      ctx.roundRect(30, ironBarY, W - 60, 20, 4);
      ctx.fill();
      ctx.strokeStyle = COLORS.steel;
      ctx.lineWidth = 1;
      ctx.stroke();

      // Rivets on iron bar
      for (let r = 0; r < 5; r++) {
        const rx = 60 + r * (W - 120) / 4;
        ctx.beginPath();
        ctx.arc(rx, ironBarY + 10, 4, 0, Math.PI * 2);
        ctx.fillStyle = COLORS.ironDark;
        ctx.fill();
        ctx.strokeStyle = COLORS.steel;
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }

    // Spark particles
    sparkParticles.forEach(p => {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Celebration particles
    gameParticles.forEach(p => {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Draw ball (when not in a tumbler hole and not launched into a hole)
    if (!ballLanding && ball.alpha > 0) {
      ctx.save();
      ctx.globalAlpha = ball.alpha;
      ctx.translate(ball.x, ball.y);
      ctx.scale(ball.scale, ball.scale);

      ctx.beginPath();
      ctx.arc(0, 0, ball.radius, 0, Math.PI * 2);
      const ballGrad = ctx.createRadialGradient(-2, -2, 1, 0, 0, ball.radius);
      ballGrad.addColorStop(0, '#E8E8E8');
      ballGrad.addColorStop(0.4, '#B0B0B0');
      ballGrad.addColorStop(1, '#686868');
      ctx.fillStyle = ballGrad;
      ctx.fill();
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 1;
      ctx.stroke();

      ctx.restore();
    }

    // Draw player key-pick
    if (player.alpha > 0) {
      ctx.save();
      ctx.globalAlpha = player.alpha;
      ctx.translate(player.x, player.y);
      ctx.scale(player.scale, player.scale);

      // Pick handle
      const handleGrad = ctx.createLinearGradient(-8, -20, 8, -20);
      handleGrad.addColorStop(0, COLORS.brassLight);
      handleGrad.addColorStop(0.5, COLORS.brass);
      handleGrad.addColorStop(1, COLORS.brassDark);
      ctx.fillStyle = handleGrad;
      ctx.beginPath();
      ctx.roundRect(-8, -20, 16, 36, 3);
      ctx.fill();
      ctx.strokeStyle = COLORS.brassDark;
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Pick tip (pointed)
      ctx.beginPath();
      ctx.moveTo(-3, -20);
      ctx.lineTo(0, -32);
      ctx.lineTo(3, -20);
      ctx.closePath();
      ctx.fillStyle = COLORS.brass;
      ctx.fill();
      ctx.strokeStyle = COLORS.brassDark;
      ctx.lineWidth = 1;
      ctx.stroke();

      // Handle grip lines
      ctx.strokeStyle = COLORS.brassDark + '80';
      ctx.lineWidth = 1;
      for (let g = 0; g < 3; g++) {
        ctx.beginPath();
        ctx.moveTo(-5, -5 + g * 6);
        ctx.lineTo(5, -5 + g * 6);
        ctx.stroke();
      }

      // Aim indicator triangle
      if (!ball.active && !ballLanding) {
        ctx.fillStyle = COLORS.cyan + '80';
        ctx.beginPath();
        ctx.moveTo(0, -45);
        ctx.lineTo(-5, -38);
        ctx.lineTo(5, -38);
        ctx.closePath();
        ctx.fill();
      }

      ctx.restore();
    }

    // Highlight bar showing which tumbler player is aiming at
    if (!ball.active && !ballLanding && player.alpha > 0) {
      const aimX = player.x;
      tumblers.forEach((t, i) => {
        if (aimX >= t.x && aimX <= t.x + t.w) {
          hoverTumbler = i;
          ctx.save();
          ctx.globalAlpha = 0.15;
          ctx.fillStyle = COLORS.cyan;
          ctx.fillRect(t.x, t.y + t.h, t.w, H - t.y - t.h);
          ctx.globalAlpha = 1;

          // Dotted guide line
          ctx.setLineDash([4, 8]);
          ctx.strokeStyle = COLORS.cyan + '60';
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(aimX, player.y - 35);
          ctx.lineTo(aimX, t.y + t.h);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.restore();
        }
      });
    }

    // Status text area at bottom
    if (!ballLanding) {
      ctx.font = "500 16px 'Nunito Sans', sans-serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = COLORS.brass + 'B0';
      const statusText = ball.active ? 'Ball launched...' : 'Aim and fire!';
      ctx.fillText(statusText, W / 2, H - 15);
    }

    ctx.restore();
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;

    if (e.code === 'ArrowLeft') {
      player.vx = -player.speed;
      e.preventDefault();
    } else if (e.code === 'ArrowRight') {
      player.vx = player.speed;
      e.preventDefault();
    } else if ((e.code === 'ArrowUp' || e.code === 'Space') && !ball.active && !ballLanding) {
      // Launch ball
      ball.active = true;
      ball.x = player.x;
      ball.y = player.y - 30;
      ball.vx = 0;
      ball.vy = -500;
      ballLaunched = true;
      playSound('launch');
      e.preventDefault();
    }
  }

  // Handle key up for smooth movement
  document.addEventListener('keyup', (e) => {
    if (gameState !== 'playing') return;
    if (e.code === 'ArrowLeft' && player.vx < 0) player.vx = 0;
    if (e.code === 'ArrowRight' && player.vx > 0) player.vx = 0;
  });

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
