<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fossil Freight Snag</title>
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === GAME CONSTANTS ===
  const LANE_COUNT = 4;
  const LANE_HEIGHT = 90;
  const LANE_START_Y = 100;
  const CONVEYOR_SPEED = 80;
  const PLAYER_MOVE_SPEED = 300;
  const CRATE_WIDTH = 520;
  const CRATE_HEIGHT = 70;

  // Colors
  const COLORS = {
    canyon: '#C44536',
    canyonDark: '#8B2E22',
    sand: '#E8D5B7',
    sandDark: '#D4BC93',
    wood: '#8B5A2B',
    woodDark: '#6B4423',
    lantern: '#F5A742',
    sky: '#E87A3E',
    skyGradientTop: '#2B2B28',
    skyGradientBottom: '#C44536',
    text: '#2B2B28',
    crateBase: '#D4A574',
    crateDark: '#A67C52',
    straps: '#5C4033',
    player: '#4ECDC4',
    playerDark: '#3BA89F',
    conveyor: '#4A4A4A',
    conveyorRoller: '#6A6A6A'
  };

  // === GAME STATE ===
  let player = { lane: 0, targetLane: 0, y: 0, grabbing: false, grabCooldown: 0 };
  let crates = [];
  let dustParticles = [];
  let boneParticles = [];
  let lanterns = [];
  let gameTime = 0;
  let selectedChoice = null;
  let shakeTimer = 0;
  let shakeIntensity = 0;

  // Audio context for sounds
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'grab') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(220, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.15);
    } else if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    } else if (type === 'move') {
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(300, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.05);
      gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.05);
    }
  }

  function initGame() {
    player = { lane: 1, targetLane: 1, y: 0, grabbing: false, grabCooldown: 0 };
    crates = [];
    dustParticles = [];
    boneParticles = [];
    gameTime = 0;
    selectedChoice = null;
    shakeTimer = 0;
    shakeIntensity = 0;

    // Create lanterns
    lanterns = [
      { x: 50, y: 80, flicker: Math.random() * Math.PI * 2 },
      { x: 670, y: 80, flicker: Math.random() * Math.PI * 2 },
      { x: 50, y: 350, flicker: Math.random() * Math.PI * 2 },
      { x: 670, y: 350, flicker: Math.random() * Math.PI * 2 }
    ];

    // Create crates for each answer choice
    QUESTION.choices.forEach((choice, i) => {
      crates.push({
        lane: i,
        x: -CRATE_WIDTH - (i * 180) - 100,
        choice: choice,
        index: i,
        grabbed: false,
        opening: false,
        openProgress: 0,
        bounceOffset: 0,
        bouncePhase: Math.random() * Math.PI * 2
      });
    });

    // Calculate player Y position
    player.y = LANE_START_Y + player.lane * LANE_HEIGHT + LANE_HEIGHT / 2;
  }

  function spawnDustBurst(x, y) {
    for (let i = 0; i < 20; i++) {
      dustParticles.push({
        x: x + (Math.random() - 0.5) * 60,
        y: y + (Math.random() - 0.5) * 30,
        vx: (Math.random() - 0.5) * 150,
        vy: -Math.random() * 100 - 50,
        size: 3 + Math.random() * 8,
        alpha: 0.8,
        life: 1
      });
    }
  }

  function spawnBones(x, y) {
    const boneTypes = ['vertebra', 'rib', 'small'];
    for (let i = 0; i < 8; i++) {
      boneParticles.push({
        x: x + (Math.random() - 0.5) * 80,
        y: y,
        vx: (Math.random() - 0.5) * 200,
        vy: -Math.random() * 200 - 100,
        rotation: Math.random() * Math.PI * 2,
        rotationSpeed: (Math.random() - 0.5) * 10,
        type: boneTypes[Math.floor(Math.random() * boneTypes.length)],
        size: 8 + Math.random() * 12
      });
    }
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Update shake
    if (shakeTimer > 0) {
      shakeTimer -= dt;
    }

    // Smoothly move player between lanes
    const targetY = LANE_START_Y + player.targetLane * LANE_HEIGHT + LANE_HEIGHT / 2;
    const diff = targetY - player.y;
    if (Math.abs(diff) > 1) {
      player.y += diff * 8 * dt;
    } else {
      player.y = targetY;
      player.lane = player.targetLane;
    }

    // Update grab cooldown
    if (player.grabCooldown > 0) {
      player.grabCooldown -= dt;
    }

    // Update crates
    crates.forEach(crate => {
      if (!crate.grabbed) {
        crate.x += CONVEYOR_SPEED * dt;
        crate.bouncePhase += dt * 8;
        crate.bounceOffset = Math.sin(crate.bouncePhase) * 2;
      }

      if (crate.opening) {
        crate.openProgress += dt * 3;
        if (crate.openProgress >= 1) {
          // Trigger wrong answer
          shakeTimer = 0.3;
          shakeIntensity = 8;
          playSound('wrong');
          setTimeout(() => {
            engine.end(crate.choice.is_correct, crate.choice.explanation);
          }, 500);
        }
      }

      // Reset crate if it goes off screen
      if (crate.x > W + 100 && !crate.grabbed && !crate.opening) {
        crate.x = -CRATE_WIDTH - Math.random() * 200;
      }
    });

    // Update dust particles
    dustParticles.forEach(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 100 * dt;
      p.alpha -= dt * 0.8;
      p.life -= dt;
    });
    dustParticles = dustParticles.filter(p => p.life > 0);

    // Update bone particles
    boneParticles.forEach(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 400 * dt;
      p.rotation += p.rotationSpeed * dt;

      // Bounce off conveyor
      const laneY = LANE_START_Y + Math.floor((p.y - LANE_START_Y) / LANE_HEIGHT) * LANE_HEIGHT + LANE_HEIGHT;
      if (p.y > laneY - 10 && p.vy > 0) {
        p.vy *= -0.5;
        p.vx *= 0.8;
      }
    });
    boneParticles = boneParticles.filter(p => p.y < H + 50);

    // Update lantern flicker
    lanterns.forEach(l => {
      l.flicker += dt * 5;
    });

    // Handle grab action
    if (player.grabbing && player.grabCooldown <= 0) {
      player.grabCooldown = 0.5;

      // Check for crate in player's lane
      const playerLane = player.targetLane;
      const grabX = 580; // Player grab position

      crates.forEach(crate => {
        if (crate.lane === playerLane && !crate.grabbed && !crate.opening) {
          const crateRight = crate.x + CRATE_WIDTH;
          const crateLeft = crate.x;

          if (crateRight > grabX - 80 && crateLeft < grabX + 80) {
            crate.grabbed = true;
            playSound('grab');

            if (crate.choice.is_correct) {
              // Correct answer!
              playSound('correct');
              engine.end(true, crate.choice.explanation);
            } else {
              // Wrong answer - open crate and spill bones
              crate.opening = true;
              spawnDustBurst(crate.x + CRATE_WIDTH / 2, crate.lane * LANE_HEIGHT + LANE_START_Y + LANE_HEIGHT / 2);
              spawnBones(crate.x + CRATE_WIDTH / 2, crate.lane * LANE_HEIGHT + LANE_START_Y + LANE_HEIGHT / 2);
            }
          }
        }
      });

      player.grabbing = false;
    }
  }

  function drawGame() {
    // Apply screen shake
    ctx.save();
    if (shakeTimer > 0) {
      const shake = shakeIntensity * (shakeTimer / 0.3);
      ctx.translate(
        (Math.random() - 0.5) * shake,
        (Math.random() - 0.5) * shake
      );
    }

    // Draw sunset sky gradient
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, COLORS.skyGradientTop);
    skyGrad.addColorStop(0.4, COLORS.sky);
    skyGrad.addColorStop(1, COLORS.canyon);
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    // Draw distant canyon silhouettes
    ctx.fillStyle = COLORS.canyonDark;
    ctx.beginPath();
    ctx.moveTo(0, 120);
    ctx.lineTo(80, 60);
    ctx.lineTo(150, 100);
    ctx.lineTo(200, 40);
    ctx.lineTo(280, 90);
    ctx.lineTo(350, 50);
    ctx.lineTo(450, 95);
    ctx.lineTo(520, 45);
    ctx.lineTo(600, 85);
    ctx.lineTo(680, 55);
    ctx.lineTo(720, 80);
    ctx.lineTo(720, 120);
    ctx.closePath();
    ctx.fill();

    // Draw lantern glow
    lanterns.forEach(l => {
      const flickerIntensity = 0.7 + Math.sin(l.flicker) * 0.3;
      const gradient = ctx.createRadialGradient(l.x, l.y, 0, l.x, l.y, 60 * flickerIntensity);
      gradient.addColorStop(0, `rgba(245, 167, 66, ${0.4 * flickerIntensity})`);
      gradient.addColorStop(1, 'rgba(245, 167, 66, 0)');
      ctx.fillStyle = gradient;
      ctx.fillRect(l.x - 80, l.y - 80, 160, 160);
    });

    // Draw conveyor belts
    for (let i = 0; i < LANE_COUNT; i++) {
      const laneY = LANE_START_Y + i * LANE_HEIGHT;

      // Belt base
      ctx.fillStyle = COLORS.conveyor;
      ctx.fillRect(0, laneY, W, LANE_HEIGHT - 10);

      // Rollers
      const rollerSpacing = 40;
      const rollerOffset = (gameTime * CONVEYOR_SPEED) % rollerSpacing;
      ctx.fillStyle = COLORS.conveyorRoller;
      for (let x = -rollerSpacing + rollerOffset; x < W + rollerSpacing; x += rollerSpacing) {
        ctx.beginPath();
        ctx.arc(x, laneY + LANE_HEIGHT / 2 - 5, 8, 0, Math.PI * 2);
        ctx.fill();
      }

      // Belt edges
      ctx.fillStyle = COLORS.woodDark;
      ctx.fillRect(0, laneY - 5, W, 8);
      ctx.fillRect(0, laneY + LANE_HEIGHT - 12, W, 8);
    }

    // Draw crates
    crates.forEach(crate => {
      if (crate.x < -CRATE_WIDTH - 50 || crate.x > W + 50) return;

      const crateY = LANE_START_Y + crate.lane * LANE_HEIGHT + 8 + crate.bounceOffset;
      const crateH = CRATE_HEIGHT;

      ctx.save();

      if (crate.opening) {
        // Crate opening animation
        const openAngle = crate.openProgress * 0.5;
        ctx.translate(crate.x + CRATE_WIDTH / 2, crateY + crateH / 2);
        ctx.rotate(openAngle * 0.1);
        ctx.translate(-(crate.x + CRATE_WIDTH / 2), -(crateY + crateH / 2));
      }

      // Crate body
      ctx.fillStyle = COLORS.crateBase;
      ctx.fillRect(crate.x, crateY, CRATE_WIDTH, crateH);

      // Crate wood grain lines
      ctx.strokeStyle = COLORS.crateDark;
      ctx.lineWidth = 1;
      for (let line = 0; line < 4; line++) {
        ctx.beginPath();
        ctx.moveTo(crate.x, crateY + 15 + line * 15);
        ctx.lineTo(crate.x + CRATE_WIDTH, crateY + 15 + line * 15);
        ctx.stroke();
      }

      // Crate straps
      ctx.fillStyle = COLORS.straps;
      ctx.fillRect(crate.x + 20, crateY, 12, crateH);
      ctx.fillRect(crate.x + CRATE_WIDTH - 32, crateY, 12, crateH);

      // Crate label background
      const labelX = crate.x + 50;
      const labelY = crateY + 8;
      const labelW = CRATE_WIDTH - 100;
      const labelH = crateH - 16;

      ctx.fillStyle = COLORS.sand;
      ctx.fillRect(labelX, labelY, labelW, labelH);
      ctx.strokeStyle = COLORS.sandDark;
      ctx.lineWidth = 2;
      ctx.strokeRect(labelX, labelY, labelW, labelH);

      // Answer text - wrapped
      ctx.fillStyle = COLORS.text;
      ctx.font = '600 16px Nunito';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';

      const text = crate.choice.text;
      const maxTextWidth = labelW - 20;
      const words = text.split(' ');
      let lines = [];
      let currentLine = '';

      words.forEach(word => {
        const testLine = currentLine ? currentLine + ' ' + word : word;
        const metrics = ctx.measureText(testLine);
        if (metrics.width > maxTextWidth && currentLine) {
          lines.push(currentLine);
          currentLine = word;
        } else {
          currentLine = testLine;
        }
      });
      if (currentLine) lines.push(currentLine);

      const lineHeight = 18;
      const totalTextHeight = lines.length * lineHeight;
      const textStartY = labelY + (labelH - totalTextHeight) / 2 + lineHeight / 2;

      lines.forEach((line, idx) => {
        ctx.fillText(line, labelX + 10, textStartY + idx * lineHeight);
      });

      // Excavation tag
      const tagLabels = ['A', 'B', 'C', 'D'];
      ctx.fillStyle = COLORS.sky;
      ctx.beginPath();
      ctx.roundRect(crate.x + CRATE_WIDTH - 50, crateY - 5, 30, 25, 4);
      ctx.fill();
      ctx.fillStyle = '#FAFAF7';
      ctx.font = 'bold 16px Belanosima';
      ctx.textAlign = 'center';
      ctx.fillText(tagLabels[crate.index], crate.x + CRATE_WIDTH - 35, crateY + 8);

      ctx.restore();
    });

    // Draw bone particles
    ctx.fillStyle = '#F5F0E6';
    boneParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);

      if (p.type === 'vertebra') {
        ctx.beginPath();
        ctx.ellipse(0, 0, p.size, p.size * 0.6, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(0, -p.size * 0.3, p.size * 0.3, p.size * 0.4, 0, 0, Math.PI * 2);
        ctx.fill();
      } else if (p.type === 'rib') {
        ctx.beginPath();
        ctx.arc(0, 0, p.size, 0, Math.PI, false);
        ctx.lineWidth = 4;
        ctx.strokeStyle = '#F5F0E6';
        ctx.stroke();
      } else {
        ctx.fillRect(-p.size / 2, -3, p.size, 6);
      }
      ctx.restore();
    });

    // Draw dust particles
    dustParticles.forEach(p => {
      ctx.fillStyle = `rgba(232, 213, 183, ${p.alpha})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    });

    // Draw player (paleontologist hand/grabber)
    const playerX = 580;
    const playerY = player.y;

    // Arm shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(playerX - 8, playerY - 35, 70, 20);

    // Arm
    ctx.fillStyle = COLORS.sandDark;
    ctx.fillRect(playerX - 5, playerY - 40, 75, 25);

    // Glove/hand
    ctx.fillStyle = COLORS.player;
    ctx.beginPath();
    ctx.roundRect(playerX - 30, playerY - 50, 50, 45, 8);
    ctx.fill();

    // Glove details
    ctx.fillStyle = COLORS.playerDark;
    ctx.fillRect(playerX - 25, playerY - 35, 40, 3);
    ctx.fillRect(playerX - 25, playerY - 20, 40, 3);

    // Grab indicator
    if (player.grabCooldown > 0) {
      ctx.fillStyle = COLORS.lantern;
      ctx.globalAlpha = player.grabCooldown;
      ctx.beginPath();
      ctx.arc(playerX - 5, playerY - 27, 35, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Lane indicator
    ctx.fillStyle = COLORS.player;
    ctx.globalAlpha = 0.3;
    ctx.fillRect(0, LANE_START_Y + player.targetLane * LANE_HEIGHT, W, LANE_HEIGHT - 10);
    ctx.globalAlpha = 1;

    // Draw lanterns (foreground)
    lanterns.forEach(l => {
      const flickerIntensity = 0.8 + Math.sin(l.flicker) * 0.2;

      // Lantern body
      ctx.fillStyle = COLORS.wood;
      ctx.fillRect(l.x - 8, l.y - 15, 16, 30);

      // Lantern glass
      ctx.fillStyle = `rgba(245, 167, 66, ${flickerIntensity})`;
      ctx.fillRect(l.x - 5, l.y - 10, 10, 20);

      // Lantern top
      ctx.fillStyle = COLORS.woodDark;
      ctx.beginPath();
      ctx.moveTo(l.x - 10, l.y - 15);
      ctx.lineTo(l.x + 10, l.y - 15);
      ctx.lineTo(l.x + 6, l.y - 22);
      ctx.lineTo(l.x - 6, l.y - 22);
      ctx.closePath();
      ctx.fill();
    });

    ctx.restore();
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;

    initAudio();

    // Lane switching with arrow keys or WASD
    if (e.code === 'ArrowUp' || e.code === 'KeyW') {
      if (player.targetLane > 0) {
        player.targetLane--;
        playSound('move');
      }
    } else if (e.code === 'ArrowDown' || e.code === 'KeyS') {
      if (player.targetLane < LANE_COUNT - 1) {
        player.targetLane++;
        playSound('move');
      }
    }

    // Grab with spacebar or enter
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      player.grabbing = true;
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
