<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phoenix Tide Balloons</title>
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a0a12;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #0d1520;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = "bold 18px 'Nunito Sans', system-ui, sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = "bold 36px 'Belanosima', system-ui, sans-serif";
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === GAME STATE ===
  let pin = { x: 0, y: 0, targetIndex: 0 };
  let balloons = [];
  let rocks = [];
  let tideLevel = 0;
  let bioLights = [];
  let phoenixChicks = [];
  let phoenixBurst = null;
  let gameTime = 0;
  let selectedChoice = null;

  // Audio context for sounds
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'pop') {
      osc.frequency.setValueAtTime(600, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.15);
    } else if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    } else if (type === 'move') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(300, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.05);
    }
  }

  function initGame() {
    gameTime = 0;
    selectedChoice = null;
    phoenixBurst = null;

    // Create tide pools with balloons (answer choices) - horizontal layout
    const poolWidth = 160;
    const startX = 40;
    const poolY = 380;

    balloons = QUESTION.choices.map((choice, i) => ({
      x: startX + i * (poolWidth + 10) + poolWidth / 2,
      y: poolY,
      baseY: poolY,
      choice: choice,
      index: i,
      floatOffset: Math.random() * Math.PI * 2,
      scale: 0,
      targetScale: 1,
      popped: false,
      popTime: 0,
      width: poolWidth - 20,
      height: 120
    }));

    // Pin cursor starts at first balloon
    pin = {
      x: balloons[0].x,
      y: balloons[0].y - 80,
      targetIndex: 0
    };

    // Create black rocks along the shore
    rocks = [];
    for (let i = 0; i < 12; i++) {
      rocks.push({
        x: 20 + i * 60 + Math.random() * 30,
        y: 480 + Math.random() * 40,
        size: 15 + Math.random() * 25,
        drowned: false
      });
    }

    // Create bioluminescent lights
    bioLights = [];
    for (let i = 0; i < 40; i++) {
      bioLights.push({
        x: Math.random() * W,
        y: 400 + Math.random() * 140,
        radius: 2 + Math.random() * 4,
        phase: Math.random() * Math.PI * 2,
        color: Math.random() > 0.5 ? '#4ECDC4' : '#6BBF59',
        speed: 0.5 + Math.random() * 1.5
      });
    }

    // Create phoenix chicks in watercolor wash
    phoenixChicks = [];
    for (let i = 0; i < 5; i++) {
      phoenixChicks.push({
        x: 100 + Math.random() * 520,
        y: 60 + Math.random() * 100,
        phase: Math.random() * Math.PI * 2,
        size: 8 + Math.random() * 12
      });
    }
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Animate balloon entrance
    balloons.forEach((b, i) => {
      if (!b.popped) {
        b.scale += (b.targetScale - b.scale) * dt * 3;
        b.y = b.baseY + Math.sin(gameTime * 1.5 + b.floatOffset) * 8;
      }
    });

    // Update pin position smoothly
    const target = balloons[pin.targetIndex];
    pin.x += (target.x - pin.x) * dt * 12;
    pin.y = target.y - 80 + Math.sin(gameTime * 3) * 3;

    // Update bioluminescent lights
    bioLights.forEach(light => {
      light.phase += dt * light.speed;
    });

    // Update phoenix chicks
    phoenixChicks.forEach(chick => {
      chick.phase += dt * 2;
    });

    // Handle phoenix burst animation
    if (phoenixBurst) {
      phoenixBurst.time += dt;
      phoenixBurst.y -= dt * 100;
      phoenixBurst.wingAngle = Math.sin(phoenixBurst.time * 15) * 0.5;

      // Raise tide after phoenix flies up
      if (phoenixBurst.time > 1 && tideLevel < 60) {
        tideLevel += dt * 30;
      }

      // End game after animation
      if (phoenixBurst.time > 2) {
        playSound('wrong');
        engine.end(selectedChoice.is_correct, selectedChoice.explanation);
      }
    }

    // Drown rocks based on tide level
    rocks.forEach(rock => {
      if (rock.y > 540 - tideLevel) {
        rock.drowned = true;
      }
    });
  }

  function drawGame() {
    // Dark moonless sky gradient
    const skyGrad = ctx.createLinearGradient(0, 0, 0, 300);
    skyGrad.addColorStop(0, '#0a0a12');
    skyGrad.addColorStop(1, '#121824');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, 300);

    // Watercolor wash haze for phoenix chicks
    ctx.save();
    ctx.globalAlpha = 0.3;
    const hazeGrad = ctx.createRadialGradient(W/2, 100, 50, W/2, 100, 350);
    hazeGrad.addColorStop(0, '#E87A3E');
    hazeGrad.addColorStop(0.5, '#F5A742');
    hazeGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = hazeGrad;
    ctx.fillRect(0, 0, W, 250);
    ctx.restore();

    // Draw phoenix chicks (ash-feather style)
    phoenixChicks.forEach(chick => {
      ctx.save();
      ctx.translate(chick.x, chick.y + Math.sin(chick.phase) * 5);
      ctx.globalAlpha = 0.5 + Math.sin(chick.phase * 0.5) * 0.2;

      // Body glow
      const chickGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, chick.size * 2);
      chickGrad.addColorStop(0, '#F5A742');
      chickGrad.addColorStop(0.5, '#E87A3E');
      chickGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = chickGrad;
      ctx.beginPath();
      ctx.arc(0, 0, chick.size * 2, 0, Math.PI * 2);
      ctx.fill();

      // Ash feathers
      ctx.fillStyle = '#2B2B28';
      ctx.globalAlpha = 0.6;
      for (let f = 0; f < 5; f++) {
        const angle = (f / 5) * Math.PI * 2 + chick.phase * 0.3;
        ctx.beginPath();
        ctx.ellipse(
          Math.cos(angle) * chick.size * 0.8,
          Math.sin(angle) * chick.size * 0.5,
          3, 6, angle, 0, Math.PI * 2
        );
        ctx.fill();
      }
      ctx.restore();
    });

    // Shore and tidal pools
    const shoreGrad = ctx.createLinearGradient(0, 300, 0, H);
    shoreGrad.addColorStop(0, '#1a1a2e');
    shoreGrad.addColorStop(0.3, '#16213e');
    shoreGrad.addColorStop(1, '#0f3460');
    ctx.fillStyle = shoreGrad;
    ctx.fillRect(0, 300, W, H - 300);

    // Tidal water with bioluminescence
    const waterY = H - 60 - tideLevel;
    const waterGrad = ctx.createLinearGradient(0, waterY, 0, H);
    waterGrad.addColorStop(0, 'rgba(78, 205, 196, 0.3)');
    waterGrad.addColorStop(0.5, 'rgba(78, 205, 196, 0.5)');
    waterGrad.addColorStop(1, 'rgba(15, 52, 96, 0.8)');
    ctx.fillStyle = waterGrad;
    ctx.beginPath();
    ctx.moveTo(0, waterY);
    // Wavy water surface
    for (let x = 0; x <= W; x += 20) {
      ctx.lineTo(x, waterY + Math.sin(x * 0.02 + gameTime * 2) * 5);
    }
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.closePath();
    ctx.fill();

    // Bioluminescent lights
    bioLights.forEach(light => {
      if (light.y > waterY) {
        ctx.save();
        ctx.globalAlpha = 0.4 + Math.sin(light.phase) * 0.3;
        const lightGrad = ctx.createRadialGradient(light.x, light.y, 0, light.x, light.y, light.radius * 3);
        lightGrad.addColorStop(0, light.color);
        lightGrad.addColorStop(1, 'transparent');
        ctx.fillStyle = lightGrad;
        ctx.beginPath();
        ctx.arc(light.x, light.y, light.radius * 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    });

    // Draw black rocks
    rocks.forEach(rock => {
      if (!rock.drowned) {
        ctx.save();
        ctx.fillStyle = '#1a1a1a';
        ctx.beginPath();
        ctx.moveTo(rock.x, rock.y);
        ctx.lineTo(rock.x - rock.size * 0.7, rock.y + rock.size * 0.5);
        ctx.lineTo(rock.x - rock.size * 0.3, rock.y + rock.size);
        ctx.lineTo(rock.x + rock.size * 0.4, rock.y + rock.size);
        ctx.lineTo(rock.x + rock.size * 0.6, rock.y + rock.size * 0.4);
        ctx.closePath();
        ctx.fill();

        // Rock highlight
        ctx.fillStyle = '#2a2a2a';
        ctx.beginPath();
        ctx.arc(rock.x, rock.y + rock.size * 0.3, rock.size * 0.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    });

    // Draw tide pool areas behind balloons
    balloons.forEach((balloon, i) => {
      // Tide pool base
      ctx.save();
      const poolGrad = ctx.createRadialGradient(balloon.x, balloon.baseY + 50, 10, balloon.x, balloon.baseY + 50, 80);
      poolGrad.addColorStop(0, 'rgba(78, 205, 196, 0.4)');
      poolGrad.addColorStop(0.7, 'rgba(78, 205, 196, 0.2)');
      poolGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = poolGrad;
      ctx.beginPath();
      ctx.ellipse(balloon.x, balloon.baseY + 50, 75, 40, 0, 0, Math.PI * 2);
      ctx.fill();

      // Driftwood stake
      ctx.fillStyle = '#4a3728';
      ctx.fillRect(balloon.x - 3, balloon.baseY + 20, 6, 60);
      ctx.fillStyle = '#3a2a1a';
      ctx.fillRect(balloon.x - 2, balloon.baseY + 25, 2, 50);
      ctx.restore();
    });

    // Draw ember-balloons (answer choices)
    balloons.forEach((balloon, i) => {
      if (balloon.popped) return;

      ctx.save();
      ctx.translate(balloon.x, balloon.y);
      ctx.scale(balloon.scale, balloon.scale);

      // Selected highlight
      if (i === pin.targetIndex) {
        ctx.strokeStyle = '#F5A742';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.ellipse(0, -20, balloon.width / 2 + 10, 70, 0, 0, Math.PI * 2);
        ctx.stroke();
      }

      // Balloon glow (ember effect)
      const glowGrad = ctx.createRadialGradient(0, -20, 10, 0, -20, 60);
      glowGrad.addColorStop(0, 'rgba(232, 122, 62, 0.6)');
      glowGrad.addColorStop(0.5, 'rgba(245, 167, 66, 0.3)');
      glowGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = glowGrad;
      ctx.beginPath();
      ctx.ellipse(0, -20, 70, 70, 0, 0, Math.PI * 2);
      ctx.fill();

      // Translucent ember-balloon membrane
      const balloonGrad = ctx.createRadialGradient(-15, -40, 5, 0, -20, 50);
      balloonGrad.addColorStop(0, 'rgba(255, 220, 180, 0.7)');
      balloonGrad.addColorStop(0.3, 'rgba(232, 122, 62, 0.5)');
      balloonGrad.addColorStop(0.7, 'rgba(200, 80, 40, 0.4)');
      balloonGrad.addColorStop(1, 'rgba(150, 50, 30, 0.3)');
      ctx.fillStyle = balloonGrad;
      ctx.beginPath();
      ctx.ellipse(0, -20, balloon.width / 2 - 5, 55, 0, 0, Math.PI * 2);
      ctx.fill();

      // Balloon outline
      ctx.strokeStyle = 'rgba(245, 167, 66, 0.6)';
      ctx.lineWidth = 2;
      ctx.stroke();

      // String to driftwood
      ctx.strokeStyle = 'rgba(200, 150, 100, 0.6)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, 35);
      ctx.quadraticCurveTo(5, 50, 0, 80);
      ctx.stroke();

      // Text label on balloon membrane
      ctx.fillStyle = '#FAFAF7';
      ctx.font = "bold 14px 'Nunito', sans-serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // Wrap text to fit balloon
      const maxWidth = balloon.width - 20;
      const words = balloon.choice.text.split(' ');
      let lines = [];
      let currentLine = '';

      words.forEach(word => {
        const testLine = currentLine ? currentLine + ' ' + word : word;
        const metrics = ctx.measureText(testLine);
        if (metrics.width > maxWidth && currentLine) {
          lines.push(currentLine);
          currentLine = word;
        } else {
          currentLine = testLine;
        }
      });
      if (currentLine) lines.push(currentLine);

      // Draw wrapped text
      const lineHeight = 16;
      const startY = -20 - (lines.length - 1) * lineHeight / 2;
      lines.forEach((line, lineIndex) => {
        ctx.fillText(line, 0, startY + lineIndex * lineHeight);
      });

      ctx.restore();
    });

    // Draw pin cursor
    ctx.save();
    ctx.translate(pin.x, pin.y);

    // Pin head (glowing)
    const pinGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, 15);
    pinGrad.addColorStop(0, '#F5A742');
    pinGrad.addColorStop(0.5, '#E87A3E');
    pinGrad.addColorStop(1, '#c44e2b');
    ctx.fillStyle = pinGrad;
    ctx.beginPath();
    ctx.arc(0, 0, 12, 0, Math.PI * 2);
    ctx.fill();

    // Pin spike
    ctx.fillStyle = '#aaa';
    ctx.beginPath();
    ctx.moveTo(-4, 10);
    ctx.lineTo(4, 10);
    ctx.lineTo(0, 35);
    ctx.closePath();
    ctx.fill();

    // Pin shine
    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
    ctx.beginPath();
    ctx.arc(-4, -4, 4, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();

    // Draw phoenix burst if active
    if (phoenixBurst) {
      ctx.save();
      ctx.translate(phoenixBurst.x, phoenixBurst.y);
      ctx.scale(phoenixBurst.scale, phoenixBurst.scale);

      // Phoenix body glow
      const phoenixGlow = ctx.createRadialGradient(0, 0, 0, 0, 0, 100);
      phoenixGlow.addColorStop(0, 'rgba(232, 122, 62, 0.9)');
      phoenixGlow.addColorStop(0.5, 'rgba(245, 167, 66, 0.5)');
      phoenixGlow.addColorStop(1, 'transparent');
      ctx.fillStyle = phoenixGlow;
      ctx.beginPath();
      ctx.arc(0, 0, 100, 0, Math.PI * 2);
      ctx.fill();

      // Phoenix body
      ctx.fillStyle = '#E87A3E';
      ctx.beginPath();
      ctx.ellipse(0, 0, 30, 20, 0, 0, Math.PI * 2);
      ctx.fill();

      // Phoenix head
      ctx.beginPath();
      ctx.arc(25, -10, 12, 0, Math.PI * 2);
      ctx.fill();

      // Beak
      ctx.fillStyle = '#F5A742';
      ctx.beginPath();
      ctx.moveTo(35, -10);
      ctx.lineTo(45, -8);
      ctx.lineTo(35, -6);
      ctx.closePath();
      ctx.fill();

      // Wings (beating)
      ctx.fillStyle = '#E85D4A';
      ctx.save();
      ctx.rotate(phoenixBurst.wingAngle);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(-60, -40, -80, 10);
      ctx.quadraticCurveTo(-50, 0, 0, 0);
      ctx.fill();
      ctx.restore();

      ctx.save();
      ctx.rotate(-phoenixBurst.wingAngle);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(-60, 40, -80, -10);
      ctx.quadraticCurveTo(-50, 0, 0, 0);
      ctx.fill();
      ctx.restore();

      // Tail feathers
      ctx.fillStyle = '#F5A742';
      for (let t = 0; t < 5; t++) {
        ctx.save();
        ctx.rotate((t - 2) * 0.2);
        ctx.beginPath();
        ctx.moveTo(-25, 0);
        ctx.quadraticCurveTo(-50, (t - 2) * 8, -70, (t - 2) * 15);
        ctx.quadraticCurveTo(-45, (t - 2) * 6, -25, 0);
        ctx.fill();
        ctx.restore();
      }

      // Fire particles from wings
      for (let p = 0; p < 8; p++) {
        const px = -40 + Math.random() * 30;
        const py = -20 + Math.random() * 40;
        ctx.fillStyle = Math.random() > 0.5 ? '#F5A742' : '#E87A3E';
        ctx.globalAlpha = 0.3 + Math.random() * 0.5;
        ctx.beginPath();
        ctx.arc(px, py, 3 + Math.random() * 5, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;
    if (phoenixBurst) return; // Disable input during phoenix animation

    initAudio();

    const key = e.code;

    // Movement: Arrow keys or WASD
    if (key === 'ArrowLeft' || key === 'KeyA') {
      if (pin.targetIndex > 0) {
        pin.targetIndex--;
        playSound('move');
      }
    } else if (key === 'ArrowRight' || key === 'KeyD') {
      if (pin.targetIndex < balloons.length - 1) {
        pin.targetIndex++;
        playSound('move');
      }
    }

    // Pop balloon: Space or Enter
    if (key === 'Space' || key === 'Enter') {
      e.preventDefault();
      const balloon = balloons[pin.targetIndex];
      if (!balloon.popped) {
        balloon.popped = true;
        selectedChoice = balloon.choice;
        playSound('pop');

        if (selectedChoice.is_correct) {
          playSound('correct');
          engine.end(true, selectedChoice.explanation);
        } else {
          // Wrong answer: spawn phoenix burst
          phoenixBurst = {
            x: balloon.x,
            y: balloon.y,
            scale: 1,
            time: 0,
            wingAngle: 0
          };
        }
      }
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
