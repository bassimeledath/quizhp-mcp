<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frogger Lane Cross</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === GAME CONSTANTS ===
  const LANE_HEIGHT = 45;
  const FROG_SIZE = 32;
  const HOP_DISTANCE = LANE_HEIGHT;
  const HOP_TIME = 0.15;
  const LILY_PAD_Y = 15;
  const LILY_PAD_HEIGHT = 80;

  // Colors (QuizHP palette)
  const COLORS = {
    grass: '#6BBF59',
    road: '#3D3D3D',
    roadLine: '#F5A742',
    water: '#4ECDC4',
    log: '#8B5A2B',
    car1: '#E85D4A',
    car2: '#E87A3E',
    car3: '#2B2B28',
    frog: '#6BBF59',
    frogEye: '#2B2B28',
    lilyPad: '#4A8F3C',
    lilyPadHighlight: '#6BBF59',
    text: '#2B2B28',
    textLight: '#FAFAF7',
    safeZone: '#5A9F4A'
  };

  // === GAME STATE ===
  let frog = {};
  let lanes = [];
  let lilyPads = [];
  let gameTime = 0;
  let deathAnimation = null;
  let splashParticles = [];
  let entranceAnimTime = 0;

  // Audio context for sound effects
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'hop') {
      osc.frequency.setValueAtTime(400, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'splash') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    } else if (type === 'hit') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(150, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.2);
    } else if (type === 'success') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.4);
    }
  }

  function initGame() {
    initAudio();
    gameTime = 0;
    entranceAnimTime = 0;
    deathAnimation = null;
    splashParticles = [];

    // Initialize frog at bottom center
    frog = {
      x: W / 2,
      y: H - 30,
      targetX: W / 2,
      targetY: H - 30,
      hopProgress: 1,
      direction: 0, // 0=up, 1=right, 2=down, 3=left
      onLog: null,
      alive: true
    };

    // Create lily pads for answers at the top
    lilyPads = QUESTION.choices.map((choice, i) => ({
      x: 90 + i * 180,
      y: LILY_PAD_Y + LILY_PAD_HEIGHT / 2,
      width: 160,
      height: LILY_PAD_HEIGHT,
      choice: choice,
      index: i,
      bounceOffset: Math.random() * Math.PI * 2
    }));

    // Create lanes (from bottom to top)
    lanes = [];
    const startY = H - 60;

    // Safe zone at bottom (grass)
    lanes.push({ type: 'safe', y: startY, height: LANE_HEIGHT });

    // Road lanes (3 lanes)
    for (let i = 0; i < 3; i++) {
      const y = startY - (i + 1) * LANE_HEIGHT;
      const speed = (80 + i * 30) * (i % 2 === 0 ? 1 : -1);
      const vehicles = [];
      const spacing = 180 + Math.random() * 60;
      for (let j = 0; j < 5; j++) {
        vehicles.push({
          x: j * spacing + Math.random() * 40,
          width: 50 + Math.random() * 30,
          color: [COLORS.car1, COLORS.car2, COLORS.car3][Math.floor(Math.random() * 3)]
        });
      }
      lanes.push({ type: 'road', y, height: LANE_HEIGHT, speed, vehicles });
    }

    // Middle safe zone
    lanes.push({ type: 'safe', y: startY - 4 * LANE_HEIGHT, height: LANE_HEIGHT });

    // Water lanes with logs (3 lanes)
    for (let i = 0; i < 3; i++) {
      const y = startY - (5 + i) * LANE_HEIGHT;
      const speed = (60 + i * 25) * (i % 2 === 0 ? -1 : 1);
      const logs = [];
      const spacing = 200 + Math.random() * 80;
      for (let j = 0; j < 4; j++) {
        logs.push({
          x: j * spacing + Math.random() * 50,
          width: 100 + Math.random() * 50
        });
      }
      lanes.push({ type: 'water', y, height: LANE_HEIGHT, speed, logs });
    }

    // Top safe zone before lily pads
    lanes.push({ type: 'safe', y: startY - 8 * LANE_HEIGHT, height: LANE_HEIGHT });
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;
    entranceAnimTime += dt;

    // Update splash particles
    splashParticles = splashParticles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 300 * dt;
      p.life -= dt;
      return p.life > 0;
    });

    // Handle death animation
    if (deathAnimation) {
      deathAnimation.time += dt;
      if (deathAnimation.time > 1) {
        // Reset frog position
        frog.x = W / 2;
        frog.y = H - 30;
        frog.targetX = W / 2;
        frog.targetY = H - 30;
        frog.hopProgress = 1;
        frog.onLog = null;
        frog.alive = true;
        deathAnimation = null;
      }
      return;
    }

    // Update frog hop animation
    if (frog.hopProgress < 1) {
      frog.hopProgress += dt / HOP_TIME;
      if (frog.hopProgress >= 1) {
        frog.hopProgress = 1;
        frog.x = frog.targetX;
        frog.y = frog.targetY;
      } else {
        const t = frog.hopProgress;
        const prevX = frog.x - (frog.targetX - frog.x) * t / (1 - t);
        const prevY = frog.y - (frog.targetY - frog.y) * t / (1 - t);
        frog.x = prevX + (frog.targetX - prevX) * t;
        frog.y = prevY + (frog.targetY - prevY) * t;
      }
    }

    // Update lane objects
    for (const lane of lanes) {
      if (lane.type === 'road') {
        for (const v of lane.vehicles) {
          v.x += lane.speed * dt;
          if (lane.speed > 0 && v.x > W + v.width) v.x = -v.width;
          if (lane.speed < 0 && v.x < -v.width) v.x = W + v.width;
        }
      } else if (lane.type === 'water') {
        for (const log of lane.logs) {
          log.x += lane.speed * dt;
          if (lane.speed > 0 && log.x > W + log.width) log.x = -log.width;
          if (lane.speed < 0 && log.x < -log.width) log.x = W + log.width;
        }
      }
    }

    // Check if frog is on a log and move with it
    if (frog.hopProgress >= 1) {
      const frogLane = lanes.find(l => l.type === 'water' &&
        frog.y >= l.y && frog.y < l.y + l.height);

      if (frogLane) {
        let onLog = false;
        for (const log of frogLane.logs) {
          if (frog.x >= log.x && frog.x <= log.x + log.width) {
            onLog = true;
            frog.x += frogLane.speed * dt;
            frog.targetX = frog.x;
            break;
          }
        }
        if (!onLog) {
          // Frog fell in water!
          killFrog('splash');
          return;
        }
      }

      // Check for car collision
      const roadLane = lanes.find(l => l.type === 'road' &&
        frog.y >= l.y && frog.y < l.y + l.height);

      if (roadLane) {
        for (const v of roadLane.vehicles) {
          if (frog.x >= v.x - FROG_SIZE/2 && frog.x <= v.x + v.width + FROG_SIZE/2) {
            killFrog('hit');
            return;
          }
        }
      }

      // Check if frog reached lily pad area
      if (frog.y < LILY_PAD_Y + LILY_PAD_HEIGHT) {
        for (const pad of lilyPads) {
          if (frog.x >= pad.x - pad.width/2 && frog.x <= pad.x + pad.width/2 &&
              frog.y >= pad.y - pad.height/2 && frog.y <= pad.y + pad.height/2) {
            playSound('success');
            engine.end(pad.choice.is_correct, pad.choice.explanation);
            return;
          }
        }
        // Missed all lily pads - in the water between them
        if (frog.y < LILY_PAD_Y + 20) {
          killFrog('splash');
        }
      }

      // Keep frog in bounds horizontally
      if (frog.x < FROG_SIZE/2) {
        frog.x = FROG_SIZE/2;
        frog.targetX = frog.x;
      }
      if (frog.x > W - FROG_SIZE/2) {
        frog.x = W - FROG_SIZE/2;
        frog.targetX = frog.x;
      }
    }
  }

  function killFrog(type) {
    frog.alive = false;
    deathAnimation = { type, time: 0, x: frog.x, y: frog.y };

    if (type === 'splash') {
      playSound('splash');
      // Create splash particles
      for (let i = 0; i < 15; i++) {
        const angle = (Math.PI * 2 / 15) * i;
        splashParticles.push({
          x: frog.x,
          y: frog.y,
          vx: Math.cos(angle) * (100 + Math.random() * 50),
          vy: Math.sin(angle) * (100 + Math.random() * 50) - 100,
          life: 0.5 + Math.random() * 0.3
        });
      }
    } else {
      playSound('hit');
    }
  }

  function hopFrog(dx, dy) {
    if (frog.hopProgress < 1 || !frog.alive || deathAnimation) return;

    initAudio();
    playSound('hop');

    frog.targetX = frog.x + dx;
    frog.targetY = frog.y + dy;
    frog.hopProgress = 0;

    // Set direction for drawing
    if (dy < 0) frog.direction = 0;
    else if (dx > 0) frog.direction = 1;
    else if (dy > 0) frog.direction = 2;
    else if (dx < 0) frog.direction = 3;

    // Clamp target position
    frog.targetX = Math.max(FROG_SIZE/2, Math.min(W - FROG_SIZE/2, frog.targetX));
    frog.targetY = Math.max(LILY_PAD_Y, Math.min(H - 20, frog.targetY));
  }

  function drawGame() {
    // Clear canvas with background
    ctx.fillStyle = COLORS.water;
    ctx.fillRect(0, 0, W, H);

    // Draw lanes from bottom to top
    for (const lane of lanes) {
      if (lane.type === 'safe') {
        ctx.fillStyle = COLORS.grass;
        ctx.fillRect(0, lane.y, W, lane.height);
        // Grass texture lines
        ctx.strokeStyle = COLORS.safeZone;
        ctx.lineWidth = 1;
        for (let i = 0; i < W; i += 15) {
          ctx.beginPath();
          ctx.moveTo(i, lane.y + lane.height);
          ctx.lineTo(i + 5, lane.y + lane.height - 8);
          ctx.stroke();
        }
      } else if (lane.type === 'road') {
        // Road background
        ctx.fillStyle = COLORS.road;
        ctx.fillRect(0, lane.y, W, lane.height);
        // Road line
        ctx.strokeStyle = COLORS.roadLine;
        ctx.lineWidth = 2;
        ctx.setLineDash([20, 15]);
        ctx.beginPath();
        ctx.moveTo(0, lane.y + lane.height / 2);
        ctx.lineTo(W, lane.y + lane.height / 2);
        ctx.stroke();
        ctx.setLineDash([]);

        // Draw vehicles
        for (const v of lane.vehicles) {
          drawVehicle(v.x, lane.y + lane.height / 2, v.width, v.color, lane.speed > 0);
        }
      } else if (lane.type === 'water') {
        // Water is already the background
        // Draw water ripples
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 1;
        for (let i = 0; i < 8; i++) {
          const offset = (gameTime * 30 + i * 90) % W;
          ctx.beginPath();
          ctx.moveTo(offset - 20, lane.y + 10 + (i % 3) * 12);
          ctx.quadraticCurveTo(offset, lane.y + 5 + (i % 3) * 12, offset + 20, lane.y + 10 + (i % 3) * 12);
          ctx.stroke();
        }

        // Draw logs
        for (const log of lane.logs) {
          drawLog(log.x, lane.y + lane.height / 2, log.width);
        }
      }
    }

    // Draw lily pads at top
    for (const pad of lilyPads) {
      const bounce = Math.sin(gameTime * 2 + pad.bounceOffset) * 2;
      const enterScale = Math.min(1, entranceAnimTime * 2 - pad.index * 0.1);

      if (enterScale > 0) {
        ctx.save();
        ctx.translate(pad.x, pad.y + bounce);
        ctx.scale(enterScale, enterScale);

        // Lily pad shape
        ctx.fillStyle = COLORS.lilyPad;
        ctx.beginPath();
        ctx.ellipse(0, 0, pad.width / 2, pad.height / 2.5, 0, 0, Math.PI * 2);
        ctx.fill();

        // Highlight
        ctx.fillStyle = COLORS.lilyPadHighlight;
        ctx.beginPath();
        ctx.ellipse(-10, -5, pad.width / 4, pad.height / 5, 0, 0, Math.PI * 2);
        ctx.fill();

        // Notch in lily pad
        ctx.fillStyle = COLORS.water;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(pad.width / 2 - 10, -8);
        ctx.lineTo(pad.width / 2 - 10, 8);
        ctx.closePath();
        ctx.fill();

        // Answer text - wrap text to fit
        ctx.fillStyle = COLORS.textLight;
        ctx.font = '600 14px Nunito, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        const maxWidth = pad.width - 20;
        const words = pad.choice.text.split(' ');
        const lines = [];
        let currentLine = '';

        for (const word of words) {
          const testLine = currentLine ? currentLine + ' ' + word : word;
          const metrics = ctx.measureText(testLine);
          if (metrics.width > maxWidth && currentLine) {
            lines.push(currentLine);
            currentLine = word;
          } else {
            currentLine = testLine;
          }
        }
        if (currentLine) lines.push(currentLine);

        const lineHeight = 16;
        const startY = -((lines.length - 1) * lineHeight) / 2;

        // Draw shadow for better readability
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        lines.forEach((line, i) => {
          ctx.fillText(line, 1, startY + i * lineHeight + 1);
        });

        ctx.fillStyle = COLORS.textLight;
        lines.forEach((line, i) => {
          ctx.fillText(line, 0, startY + i * lineHeight);
        });

        ctx.restore();
      }
    }

    // Draw splash particles
    ctx.fillStyle = COLORS.water;
    for (const p of splashParticles) {
      ctx.globalAlpha = p.life * 2;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Draw frog
    if (frog.alive && !deathAnimation) {
      const hopHeight = Math.sin(frog.hopProgress * Math.PI) * 10;
      drawFrog(frog.x, frog.y - hopHeight, frog.direction);
    }

    // Draw death animation
    if (deathAnimation) {
      const t = deathAnimation.time;
      if (deathAnimation.type === 'splash') {
        // Sinking animation
        ctx.globalAlpha = 1 - t;
        drawFrog(deathAnimation.x, deathAnimation.y + t * 30, 0);
        ctx.globalAlpha = 1;
      } else {
        // Hit animation - spin and flatten
        ctx.save();
        ctx.translate(deathAnimation.x, deathAnimation.y);
        ctx.rotate(t * 10);
        ctx.scale(1, 1 - t * 0.8);
        drawFrog(0, 0, 0, true);
        ctx.restore();
      }
    }
  }

  function drawFrog(x, y, direction, isLocal = false) {
    ctx.save();
    if (!isLocal) ctx.translate(x, y);
    ctx.rotate(direction * Math.PI / 2);

    // Body
    ctx.fillStyle = COLORS.frog;
    ctx.beginPath();
    ctx.ellipse(0, 0, FROG_SIZE / 2, FROG_SIZE / 2.5, 0, 0, Math.PI * 2);
    ctx.fill();

    // Back legs
    ctx.fillStyle = COLORS.frog;
    ctx.beginPath();
    ctx.ellipse(-10, 12, 6, 10, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(10, 12, 6, 10, 0.3, 0, Math.PI * 2);
    ctx.fill();

    // Front legs
    ctx.beginPath();
    ctx.ellipse(-10, -8, 5, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(10, -8, 5, 6, 0, 0, Math.PI * 2);
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath();
    ctx.arc(-6, -5, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(6, -5, 5, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = COLORS.frogEye;
    ctx.beginPath();
    ctx.arc(-6, -5, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(6, -5, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawVehicle(x, y, width, color, facingRight) {
    ctx.save();
    ctx.translate(x + width / 2, y);
    if (!facingRight) ctx.scale(-1, 1);

    // Car body
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(-width / 2, -15, width, 30, 5);
    ctx.fill();

    // Cabin
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.roundRect(-width / 4, -12, width / 2, 12, 3);
    ctx.fill();

    // Wheels
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.arc(-width / 3, 12, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(width / 3, 12, 6, 0, Math.PI * 2);
    ctx.fill();

    // Headlights
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(width / 2 - 5, -5, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(width / 2 - 5, 5, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawLog(x, y, width) {
    // Log body
    ctx.fillStyle = COLORS.log;
    ctx.beginPath();
    ctx.roundRect(x, y - 12, width, 24, 8);
    ctx.fill();

    // Wood grain lines
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 2;
    for (let i = 0; i < width - 20; i += 25) {
      ctx.beginPath();
      ctx.moveTo(x + 10 + i, y - 8);
      ctx.lineTo(x + 15 + i, y + 8);
      ctx.stroke();
    }

    // Ends
    ctx.fillStyle = '#6B4423';
    ctx.beginPath();
    ctx.ellipse(x + 5, y, 5, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + width - 5, y, 5, 10, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;

    switch(e.code) {
      case 'ArrowUp':
      case 'KeyW':
        e.preventDefault();
        hopFrog(0, -HOP_DISTANCE);
        break;
      case 'ArrowDown':
      case 'KeyS':
        e.preventDefault();
        hopFrog(0, HOP_DISTANCE);
        break;
      case 'ArrowLeft':
      case 'KeyA':
        e.preventDefault();
        hopFrog(-HOP_DISTANCE, 0);
        break;
      case 'ArrowRight':
      case 'KeyD':
        e.preventDefault();
        hopFrog(HOP_DISTANCE, 0);
        break;
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
