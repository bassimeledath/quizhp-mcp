<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ocean Answer Fisher</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1C1C1A;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #2A2A27;
      border-radius: 12px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  Ocean Answer Fisher - Catch the correct answer with your fishing hook!    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // QuizHP Color palette
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC'
  };

  // Reduced motion preference
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // Game constants
  const WATER_Y = 80;
  const HOOK_RADIUS = 8;
  const HOOK_SPEED = 400;
  const BOX_WIDTH = 450;
  const BOX_HEIGHT = 55;
  const DEPTHS = [150, 240, 330, 420];
  const SPEEDS = [60, 70, 80, 90];
  const START_X = [-500, -550, -600, -650]; // Start off-screen for entrance animation

  // Game state
  let hook = { x: W / 2, y: 50, targetY: 50, glowIntensity: 0 };
  let mouseX = W / 2;
  let isLowering = false;
  let waveOffset = 0;
  let boxes = [];
  let bubbles = [];
  let splashParticles = [];
  let hookWasAboveWater = true;
  let gameTime = 0;
  let nearestBoxDistance = Infinity;
  let caughtBox = null;
  let catchAnimTime = 0;
  let hookAttachOffset = { x: 0, y: 0 }; // Offset from caught box center to hook

  // ═══════════════════════════════════════════════════════════════════════════
  // AUDIO SYSTEM - Web Audio API
  // ═══════════════════════════════════════════════════════════════════════════
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }

  function playSound(type) {
    if (!audioCtx || prefersReducedMotion) return;

    try {
      if (type === 'splash') {
        // Water splash - noise burst with low pass filter
        const bufferSize = audioCtx.sampleRate * 0.3;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.1));
        }
        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;

        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(800, audioCtx.currentTime);
        filter.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.2);

        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);

        noise.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);
        noise.start();
        noise.stop(audioCtx.currentTime + 0.3);
      } else if (type === 'bubble') {
        // Subtle bubble pop
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600 + Math.random() * 400, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.08);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.08);
      } else if (type === 'catch') {
        // Satisfying catch sound - two-tone ascending
        const osc1 = audioCtx.createOscillator();
        const osc2 = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc1.type = 'sine';
        osc2.type = 'triangle';

        osc1.frequency.setValueAtTime(400, audioCtx.currentTime);
        osc1.frequency.setValueAtTime(600, audioCtx.currentTime + 0.1);
        osc2.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc2.frequency.setValueAtTime(1000, audioCtx.currentTime + 0.1);

        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);

        osc1.connect(gain);
        osc2.connect(gain);
        gain.connect(audioCtx.destination);

        osc1.start();
        osc2.start();
        osc1.stop(audioCtx.currentTime + 0.25);
        osc2.stop(audioCtx.currentTime + 0.25);
      }
    } catch (e) {
      // Audio failed silently
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // PARTICLE SYSTEMS
  // ═══════════════════════════════════════════════════════════════════════════

  function spawnBubble() {
    if (prefersReducedMotion) return;
    bubbles.push({
      x: Math.random() * W,
      y: H + 10,
      size: 3 + Math.random() * 6,
      speed: 30 + Math.random() * 40,
      wobblePhase: Math.random() * Math.PI * 2,
      wobbleSpeed: 2 + Math.random() * 2,
      alpha: 0.3 + Math.random() * 0.4
    });
  }

  function spawnSplash(x, y) {
    if (prefersReducedMotion) return;
    for (let i = 0; i < 12; i++) {
      const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 0.8;
      const speed = 100 + Math.random() * 150;
      splashParticles.push({
        x: x,
        y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        size: 2 + Math.random() * 4,
        alpha: 0.8,
        gravity: 400
      });
    }
  }

  function updateBubbles(dt) {
    bubbles = bubbles.filter(b => {
      b.y -= b.speed * dt;
      b.x += Math.sin(gameTime * b.wobbleSpeed + b.wobblePhase) * 20 * dt;
      return b.y > WATER_Y - 20;
    });

    // Spawn new bubbles occasionally
    if (Math.random() < dt * 2) {
      spawnBubble();
    }
  }

  function updateSplash(dt) {
    splashParticles = splashParticles.filter(p => {
      p.vy += p.gravity * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.alpha -= dt * 2;
      return p.alpha > 0 && p.y < H;
    });
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // ANIMATION HELPERS
  // ═══════════════════════════════════════════════════════════════════════════

  function swimInAnimation(box, targetX, delay) {
    if (prefersReducedMotion) {
      box.x = targetX;
      box.entranceComplete = true;
      return;
    }

    box.entranceComplete = false;
    const startX = box.x;
    const duration = 800;
    const startTime = performance.now() + delay;

    function animate(now) {
      if (gameState !== 'playing') return;
      const elapsed = now - startTime;
      if (elapsed < 0) {
        requestAnimationFrame(animate);
        return;
      }
      const t = Math.min(elapsed / duration, 1);
      // Ease out cubic
      const eased = 1 - Math.pow(1 - t, 3);
      box.x = startX + (targetX - startX) * eased;

      if (t < 1) {
        requestAnimationFrame(animate);
      } else {
        box.entranceComplete = true;
      }
    }
    requestAnimationFrame(animate);
  }

  function initGame() {
    initAudio();

    // Reset hook
    hook = { x: W / 2, y: 50, targetY: 50, glowIntensity: 0 };
    mouseX = W / 2;
    isLowering = false;
    waveOffset = 0;
    hookWasAboveWater = true;
    gameTime = 0;
    nearestBoxDistance = Infinity;
    caughtBox = null;
    catchAnimTime = 0;
    hookAttachOffset = { x: 0, y: 0 };

    // Reset particles
    bubbles = [];
    splashParticles = [];

    // Spawn initial bubbles
    for (let i = 0; i < 8; i++) {
      spawnBubble();
      bubbles[bubbles.length - 1].y = WATER_Y + Math.random() * (H - WATER_Y);
    }

    // Create answer boxes from question choices
    const targetPositions = [50, 130, 210, 290];
    boxes = QUESTION.choices.map((choice, i) => {
      const box = {
        x: START_X[i % START_X.length],
        y: DEPTHS[i % DEPTHS.length],
        baseY: DEPTHS[i % DEPTHS.length],
        width: BOX_WIDTH,
        height: BOX_HEIGHT,
        text: choice.text,
        is_correct: choice.is_correct,
        explanation: choice.explanation,
        speed: SPEEDS[i % SPEEDS.length],
        direction: 1,
        bobPhase: Math.random() * Math.PI * 2,
        scale: 1,
        entranceComplete: false
      };

      // Trigger swim-in animation with stagger
      swimInAnimation(box, targetPositions[i % targetPositions.length], i * 150);

      return box;
    });

    // Set up mouse event handlers
    canvas.onmousemove = (e) => {
      const pos = screenToLogical(e.clientX, e.clientY);
      mouseX = pos.x;
    };

    canvas.onmousedown = () => {
      if (gameState === 'playing') {
        initAudio();
        isLowering = true;
      }
    };

    canvas.onmouseup = () => {
      isLowering = false;
    };

    canvas.onmouseleave = () => {
      isLowering = false;
    };
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Animate waves
    waveOffset += dt * 40;
    if (waveOffset > 360) waveOffset -= 360;

    // Update particles
    updateBubbles(dt);
    updateSplash(dt);

    // If we've caught a box, hook stays attached to it
    if (caughtBox) {
      // Hook follows the caught box
      hook.x = caughtBox.x + caughtBox.width / 2 + hookAttachOffset.x;
      hook.y = caughtBox.y + caughtBox.height / 2 + hookAttachOffset.y;
    } else {
      // Hook follows mouse horizontally
      hook.x = mouseX;

      // Clamp hook X to canvas bounds
      hook.x = Math.max(HOOK_RADIUS, Math.min(W - HOOK_RADIUS, hook.x));

      // Update hook vertical position
      hook.targetY = isLowering ? H - 30 : 50;

      // Track previous position for splash detection
      const prevY = hook.y;

      // Smooth hook movement
      if (Math.abs(hook.y - hook.targetY) > 2) {
        if (hook.y < hook.targetY) {
          hook.y = Math.min(hook.y + HOOK_SPEED * dt, hook.targetY);
        } else {
          hook.y = Math.max(hook.y - HOOK_SPEED * dt, hook.targetY);
        }
      }

      // Detect water entry for splash
      if (hookWasAboveWater && hook.y > WATER_Y && prevY <= WATER_Y) {
        spawnSplash(hook.x, WATER_Y);
        playSound('splash');
        hookWasAboveWater = false;
      } else if (hook.y <= WATER_Y) {
        hookWasAboveWater = true;
      }
    }

    // Find nearest box for glow effect
    nearestBoxDistance = Infinity;

    // Update answer boxes
    for (const box of boxes) {
      // Don't move the caught box
      if (box === caughtBox) {
        // Caught box stays frozen (no horizontal movement, no bobbing)
        continue;
      }

      // Only move after entrance animation completes
      if (box.entranceComplete) {
        // Move horizontally
        box.x += box.speed * dt * box.direction;

        // Bounce off edges
        if (box.x + box.width > W) {
          box.x = W - box.width;
          box.direction = -1;
        } else if (box.x < 0) {
          box.x = 0;
          box.direction = 1;
        }
      }

      // Bobbing animation
      if (!prefersReducedMotion) {
        box.bobPhase += dt * 1.5;
        box.y = box.baseY + Math.sin(box.bobPhase) * 4;
      }

      // Calculate distance to hook for glow effect
      if (hook.y > WATER_Y) {
        const boxCenterX = box.x + box.width / 2;
        const boxCenterY = box.y + box.height / 2;
        const dist = Math.sqrt(Math.pow(hook.x - boxCenterX, 2) + Math.pow(hook.y - boxCenterY, 2));
        if (dist < nearestBoxDistance) {
          nearestBoxDistance = dist;
        }
      }

      // Check collision with hook (only when hook is in water and hasn't caught anything yet)
      if (!caughtBox && isLowering && hook.y > WATER_Y && box.entranceComplete) {
        const hookLeft = hook.x - HOOK_RADIUS;
        const hookRight = hook.x + HOOK_RADIUS;
        const hookTop = hook.y - HOOK_RADIUS;
        const hookBottom = hook.y + HOOK_RADIUS;

        const boxLeft = box.x;
        const boxRight = box.x + box.width;
        const boxTop = box.y;
        const boxBottom = box.y + box.height;

        // Rectangle collision
        if (hookRight > boxLeft && hookLeft < boxRight &&
            hookBottom > boxTop && hookTop < boxBottom) {
          playSound('catch');
          caughtBox = box;
          catchAnimTime = 0;

          // Store hook position relative to box center so it stays attached
          const boxCenterX = box.x + box.width / 2;
          const boxCenterY = box.y + box.height / 2;
          hookAttachOffset.x = hook.x - boxCenterX;
          hookAttachOffset.y = hook.y - boxCenterY;

          // Delay end slightly to show catch feedback
          setTimeout(() => {
            engine.end(box.is_correct, box.explanation);
          }, 300);
          return;
        }
      }
    }

    // Update hook glow based on proximity
    const glowThreshold = 80;
    if (nearestBoxDistance < glowThreshold && hook.y > WATER_Y) {
      hook.glowIntensity = Math.min(1, hook.glowIntensity + dt * 5);
    } else {
      hook.glowIntensity = Math.max(0, hook.glowIntensity - dt * 3);
    }

    // Update catch animation
    if (caughtBox) {
      catchAnimTime += dt;
      caughtBox.scale = 1 + Math.sin(catchAnimTime * Math.PI * 4) * 0.1 * (1 - Math.min(catchAnimTime / 0.3, 1));
    }
  }

  function drawGame() {
    // Draw sky with warm gradient
    const skyGradient = ctx.createLinearGradient(0, 0, 0, WATER_Y);
    skyGradient.addColorStop(0, '#E8F9F8');
    skyGradient.addColorStop(1, '#D4E6F1');
    ctx.fillStyle = skyGradient;
    ctx.fillRect(0, 0, W, WATER_Y);

    // Draw ocean with gradient using QuizHP cyan tones
    const oceanGradient = ctx.createLinearGradient(0, WATER_Y, 0, H);
    oceanGradient.addColorStop(0, '#5DADE2');
    oceanGradient.addColorStop(0.5, '#3498DB');
    oceanGradient.addColorStop(1, '#1A5276');
    ctx.fillStyle = oceanGradient;
    ctx.fillRect(0, WATER_Y, W, H - WATER_Y);

    // Draw bubbles behind boxes
    for (const b of bubbles) {
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 255, 255, ${b.alpha * 0.5})`;
      ctx.fill();
      ctx.strokeStyle = `rgba(255, 255, 255, ${b.alpha})`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Draw animated waves at water surface
    ctx.strokeStyle = COLORS.cyan;
    ctx.lineWidth = 3;
    ctx.beginPath();
    for (let x = 0; x < W; x += 10) {
      const y = WATER_Y + Math.sin((x + waveOffset) * 0.05) * 6;
      if (x === 0) {
        ctx.moveTo(x, y);
      } else {
        ctx.lineTo(x, y);
      }
    }
    ctx.stroke();

    // Draw secondary wave
    ctx.strokeStyle = 'rgba(78, 205, 196, 0.5)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let x = 0; x < W; x += 10) {
      const y = WATER_Y + 3 + Math.sin((x + waveOffset * 1.3 + 50) * 0.05) * 4;
      if (x === 0) {
        ctx.moveTo(x, y);
      } else {
        ctx.lineTo(x, y);
      }
    }
    ctx.stroke();

    // Draw answer boxes
    for (const box of boxes) {
      ctx.save();

      // Apply scale transform for catch animation
      if (box.scale !== 1) {
        const centerX = box.x + box.width / 2;
        const centerY = box.y + box.height / 2;
        ctx.translate(centerX, centerY);
        ctx.scale(box.scale, box.scale);
        ctx.translate(-centerX, -centerY);
      }

      // Box shadow
      ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
      ctx.beginPath();
      ctx.roundRect(box.x + 3, box.y + 3, box.width, box.height, 12);
      ctx.fill();

      // Box background - use success/error color if caught
      if (caughtBox === box) {
        ctx.fillStyle = box.is_correct ? '#E8F8E5' : '#FDECEB';
      } else {
        ctx.fillStyle = COLORS.bgSurface;
      }
      ctx.beginPath();
      ctx.roundRect(box.x, box.y, box.width, box.height, 12);
      ctx.fill();

      // Box border
      if (caughtBox === box) {
        ctx.strokeStyle = box.is_correct ? COLORS.success : COLORS.error;
        ctx.lineWidth = 3;
      } else {
        ctx.strokeStyle = COLORS.borderSubtle;
        ctx.lineWidth = 2;
      }
      ctx.beginPath();
      ctx.roundRect(box.x, box.y, box.width, box.height, 12);
      ctx.stroke();

      // Draw wrapped text
      drawWrappedText(box.text, box.x + box.width / 2, box.y, box.width - 20, box.height);

      ctx.restore();
    }

    // Draw splash particles
    for (const p of splashParticles) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
      ctx.fill();
    }

    // Draw fishing line
    ctx.strokeStyle = COLORS.textPrimary;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(hook.x, 0);
    ctx.lineTo(hook.x, hook.y);
    ctx.stroke();

    // Draw hook glow when near answer
    if (hook.glowIntensity > 0 && !prefersReducedMotion) {
      const glowRadius = HOOK_RADIUS + 8 + Math.sin(gameTime * 6) * 3;
      const gradient = ctx.createRadialGradient(
        hook.x, hook.y, HOOK_RADIUS,
        hook.x, hook.y, glowRadius + 10
      );
      gradient.addColorStop(0, `rgba(245, 167, 66, ${hook.glowIntensity * 0.6})`);
      gradient.addColorStop(0.5, `rgba(232, 122, 62, ${hook.glowIntensity * 0.3})`);
      gradient.addColorStop(1, 'rgba(232, 122, 62, 0)');

      ctx.beginPath();
      ctx.arc(hook.x, hook.y, glowRadius + 10, 0, Math.PI * 2);
      ctx.fillStyle = gradient;
      ctx.fill();
    }

    // Draw hook body
    ctx.fillStyle = COLORS.orange;
    ctx.beginPath();
    ctx.arc(hook.x, hook.y, HOOK_RADIUS, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = COLORS.orangeHover;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Draw hook point
    ctx.beginPath();
    ctx.moveTo(hook.x + HOOK_RADIUS, hook.y);
    ctx.lineTo(hook.x + HOOK_RADIUS + 6, hook.y + 8);
    ctx.lineTo(hook.x + HOOK_RADIUS + 2, hook.y + 4);
    ctx.strokeStyle = COLORS.orangeHover;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  function drawWrappedText(text, centerX, boxY, maxWidth, boxHeight) {
    const fontSize = 14;
    const lineHeight = fontSize * 1.35;

    ctx.font = `500 ${fontSize}px 'Nunito', sans-serif`;
    ctx.fillStyle = COLORS.textPrimary;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Word wrap
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';

    for (const word of words) {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      const metrics = ctx.measureText(testLine);
      if (metrics.width > maxWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    }
    if (currentLine) lines.push(currentLine);

    // Calculate vertical centering
    const totalTextHeight = lines.length * lineHeight;
    const startY = boxY + (boxHeight - totalTextHeight) / 2 + lineHeight / 2;

    // Draw each line
    for (let i = 0; i < lines.length; i++) {
      ctx.fillText(lines[i], centerX, startY + i * lineHeight);
    }
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;
    // Keyboard input not used in this game (mouse-controlled)
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });


  // Cursor change handler for end screen buttons
  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'ended') {
      canvas.style.cursor = 'default';
      return;
    }
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    if (gameResult) {
      if (pointInRect(x, y, restartButton) || pointInRect(x, y, nextButton)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    } else {
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    }
    canvas.style.cursor = 'default';
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
