<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brain Surge</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  =====================================================================
    GAME FACTORY TEMPLATE
    This template enforces critical invariants. Follow the section markers.
  =====================================================================
  -->
  <style>
    /* === BASE STYLES - Can be extended, not removed === */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <script>
  // =====================================================================
  //   SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT
  //   Platform replaces this at runtime. Use these exact 60-char answers.
  // =====================================================================
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // =====================================================================
  //   SECTION 2: ENGINE CORE - DO NOT MODIFY
  //   Standard engine interface and end screen. This is sacred.
  // =====================================================================
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = "bold 18px 'Nunito Sans', system-ui, sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720x540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720x540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720x540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = "bold 36px 'Nunito Sans', system-ui, sans-serif";
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // =====================================================================
  //   SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS
  // =====================================================================

  // === REDUCED MOTION CHECK ===
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // === WEB AUDIO API SOUND ENGINE ===
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playSound(type) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const now = audioCtx.currentTime;

    if (type === 'hover') {
      // Subtle electric tick
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(1200, now);
      osc.frequency.exponentialRampToValueAtTime(800, now + 0.03);
      gain.gain.setValueAtTime(0.06, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
      osc.start(now);
      osc.stop(now + 0.04);
    } else if (type === 'select') {
      // Electric zap on selection
      const osc = audioCtx.createOscillator();
      const osc2 = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const gain2 = audioCtx.createGain();
      osc.connect(gain);
      osc2.connect(gain2);
      gain.connect(audioCtx.destination);
      gain2.connect(audioCtx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.exponentialRampToValueAtTime(1500, now + 0.08);
      osc.frequency.exponentialRampToValueAtTime(400, now + 0.15);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
      osc.start(now);
      osc.stop(now + 0.18);
      // Crackle layer
      osc2.type = 'square';
      osc2.frequency.setValueAtTime(80, now);
      osc2.frequency.exponentialRampToValueAtTime(300, now + 0.1);
      gain2.gain.setValueAtTime(0.05, now);
      gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
      osc2.start(now);
      osc2.stop(now + 0.12);
    } else if (type === 'travel') {
      // Electric hum that increases in pitch (called periodically)
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      const pitch = 200 + sparkTravel * 600;
      osc.frequency.setValueAtTime(pitch, now);
      osc.frequency.linearRampToValueAtTime(pitch + 80, now + 0.08);
      gain.gain.setValueAtTime(0.08, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      osc.start(now);
      osc.stop(now + 0.1);
    } else if (type === 'correct') {
      // Satisfying electric charge surge
      const osc = audioCtx.createOscillator();
      const osc2 = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const gain2 = audioCtx.createGain();
      osc.connect(gain);
      osc2.connect(gain2);
      gain.connect(audioCtx.destination);
      gain2.connect(audioCtx.destination);
      // Rising tone
      osc.type = 'sine';
      osc.frequency.setValueAtTime(330, now);
      osc.frequency.exponentialRampToValueAtTime(660, now + 0.15);
      osc.frequency.exponentialRampToValueAtTime(880, now + 0.3);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.linearRampToValueAtTime(0.25, now + 0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
      osc.start(now);
      osc.stop(now + 0.5);
      // Harmonic shimmer
      osc2.type = 'triangle';
      osc2.frequency.setValueAtTime(660, now + 0.1);
      osc2.frequency.exponentialRampToValueAtTime(1320, now + 0.35);
      gain2.gain.setValueAtTime(0.0, now);
      gain2.gain.linearRampToValueAtTime(0.12, now + 0.15);
      gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
      osc2.start(now);
      osc2.stop(now + 0.45);
    } else if (type === 'wrong') {
      // Short circuit buzz/crackle
      const osc = audioCtx.createOscillator();
      const osc2 = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const gain2 = audioCtx.createGain();
      osc.connect(gain);
      osc2.connect(gain2);
      gain.connect(audioCtx.destination);
      gain2.connect(audioCtx.destination);
      // Low buzzing
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(120, now);
      osc.frequency.linearRampToValueAtTime(60, now + 0.3);
      gain.gain.setValueAtTime(0.18, now);
      gain.gain.linearRampToValueAtTime(0.12, now + 0.1);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
      osc.start(now);
      osc.stop(now + 0.35);
      // Crackling noise layer
      osc2.type = 'square';
      osc2.frequency.setValueAtTime(50, now);
      osc2.frequency.linearRampToValueAtTime(30, now + 0.25);
      gain2.gain.setValueAtTime(0.08, now);
      gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      osc2.start(now);
      osc2.stop(now + 0.3);
    }
  }

  // Spark travel sound timer
  let lastTravelSoundTime = 0;

  // === GAME STATE ===
  const COLORS = {
    bg: '#1C1C1A',
    surface: '#2A2A27',
    wire: '#4ECDC4',
    wireGlow: '#7EEEE6',
    spark: '#F5A742',
    sparkBright: '#FFD700',
    orange: '#E87A3E',
    text: '#F5F5F0',
    textSecondary: '#C2C2B8',
    textTertiary: '#8C8C84',
    borderSubtle: '#424240',
    success: '#6BBF59',
    error: '#E85D4A',
    batteryFill: '#4ECDC4',
    batteryGlow: '#7EEEE6'
  };

  // Answer wire layout
  const WIRE_START_X = 20;
  const WIRE_END_X = 570;
  const ANSWER_BOX_X = 20;
  const ANSWER_BOX_W = 500;
  const ANSWER_BOX_H = 70;
  const ANSWER_GAP = 16;
  const FIRST_ANSWER_Y = 115;

  // Battery dimensions
  const BATTERY = {
    x: 600, y: 100, w: 90, h: 340,
    capW: 40, capH: 20,
    segments: 5, segGap: 6, segPad: 8
  };

  // Timer
  const TIMER_DURATION = 12; // seconds
  let timer = TIMER_DURATION;

  // Answers
  let answers = [];
  let hoveredAnswer = -1;
  let previousHovered = -1;
  let selectedAnswer = -1;
  let sparkTravel = 0; // 0 to 1 animation progress
  let sparkActive = false;
  let answered = false;

  // Background electric particles
  let bgParticles = [];

  // Wire pulse animation
  let wirePulseTime = 0;

  // Entrance animation state
  let entranceProgress = []; // per-answer entrance animation progress (0 to 1)
  let entranceStartTime = 0;
  let entranceActive = true;

  // Hover lift animation state
  let hoverLift = [0, 0, 0, 0]; // per-answer hover lift offset (0 to target)
  let hoverGlow = [0, 0, 0, 0]; // per-answer glow intensity

  // Spark trail particles
  let sparkTrailParticles = [];

  // Short circuit particles (wrong answer effect)
  let shortCircuitParticles = [];
  let shortCircuitActive = false;
  let shortCircuitTime = 0;

  // Battery charge glow (correct answer effect)
  let batteryGlowIntensity = 0;
  let batteryGlowActive = false;
  let batteryGlowTime = 0;
  let batteryChargeSegments = 0;

  // End delay state for visual feedback before engine.end
  let endDelayActive = false;
  let endDelayTimer = 0;
  let endDelayChoice = null;

  function initGame() {
    timer = TIMER_DURATION;
    hoveredAnswer = -1;
    previousHovered = -1;
    selectedAnswer = -1;
    sparkTravel = 0;
    sparkActive = false;
    answered = false;
    wirePulseTime = 0;
    lastTravelSoundTime = 0;

    // Reset entrance animation
    entranceActive = !prefersReducedMotion;
    entranceStartTime = performance.now();
    entranceProgress = [0, 0, 0, 0];

    // Reset hover states
    hoverLift = [0, 0, 0, 0];
    hoverGlow = [0, 0, 0, 0];

    // Reset particles
    sparkTrailParticles = [];
    shortCircuitParticles = [];
    shortCircuitActive = false;
    shortCircuitTime = 0;

    // Reset battery glow
    batteryGlowIntensity = 0;
    batteryGlowActive = false;
    batteryGlowTime = 0;
    batteryChargeSegments = 0;

    // Reset end delay
    endDelayActive = false;
    endDelayTimer = 0;
    endDelayChoice = null;

    // Create answer objects
    answers = QUESTION.choices.map((choice, i) => ({
      x: ANSWER_BOX_X,
      y: FIRST_ANSWER_Y + i * (ANSWER_BOX_H + ANSWER_GAP),
      w: ANSWER_BOX_W,
      h: ANSWER_BOX_H,
      choice: choice,
      index: i,
      wireY: FIRST_ANSWER_Y + i * (ANSWER_BOX_H + ANSWER_GAP) + ANSWER_BOX_H / 2
    }));

    // Background floating particles (enhanced - more particles, varied behavior)
    bgParticles = [];
    for (let i = 0; i < 45; i++) {
      bgParticles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 25,
        vy: (Math.random() - 0.5) * 25,
        size: 0.5 + Math.random() * 3,
        alpha: 0.05 + Math.random() * 0.3,
        pulseSpeed: 1 + Math.random() * 3,
        pulseOffset: Math.random() * Math.PI * 2,
        // Some particles are "arc" particles that leave faint trails
        isArc: Math.random() < 0.15,
        trail: []
      });
    }
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    wirePulseTime += dt;

    // Update entrance animation
    if (entranceActive) {
      const elapsed = performance.now() - entranceStartTime;
      let allDone = true;
      for (let i = 0; i < entranceProgress.length; i++) {
        const staggerDelay = i * 100; // 100ms stagger
        const t = Math.max(0, Math.min(1, (elapsed - staggerDelay) / 400));
        // Spring easing: overshoot then settle
        if (t < 1) {
          const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
          entranceProgress[i] = t * spring;
          allDone = false;
        } else {
          entranceProgress[i] = 1;
        }
      }
      if (allDone) entranceActive = false;
    }

    // Update hover lift animations (smooth interpolation)
    for (let i = 0; i < answers.length; i++) {
      const targetLift = (hoveredAnswer === i && !answered) ? 3 : 0;
      const targetGlow = (hoveredAnswer === i && !answered) ? 1 : 0;
      hoverLift[i] += (targetLift - hoverLift[i]) * Math.min(1, dt * 12);
      hoverGlow[i] += (targetGlow - hoverGlow[i]) * Math.min(1, dt * 10);
    }

    // Update timer
    if (!answered) {
      timer = Math.max(0, timer - dt);
    }

    // Update background particles
    bgParticles.forEach(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      if (p.x < 0 || p.x > W) p.vx *= -1;
      if (p.y < 0 || p.y > H) p.vy *= -1;
      p.alpha = 0.05 + Math.sin(wirePulseTime * p.pulseSpeed + p.pulseOffset) * 0.2;
      if (p.alpha < 0) p.alpha = 0;

      // Arc trail
      if (p.isArc) {
        p.trail.push({ x: p.x, y: p.y, alpha: 0.4 });
        if (p.trail.length > 8) p.trail.shift();
        p.trail.forEach(tp => { tp.alpha -= dt * 2; });
        p.trail = p.trail.filter(tp => tp.alpha > 0);
      }
    });

    // Spark travel animation
    if (sparkActive) {
      sparkTravel += dt * 2.5; // Travel speed

      // Play travel sound periodically
      if (wirePulseTime - lastTravelSoundTime > 0.12) {
        playSound('travel');
        lastTravelSoundTime = wirePulseTime;
      }

      // Spawn spark trail particles
      if (!prefersReducedMotion) {
        const ans = answers[selectedAnswer];
        const wireY = ans.wireY;
        const startX = ans.x + ans.w;
        const endX = BATTERY.x;
        const endY = BATTERY.y + BATTERY.h / 2;
        const cpX1 = startX + 30;
        const cpX2 = endX - 30;
        const sx = bezierPoint(startX, cpX1, cpX2, endX, sparkTravel);
        const sy = bezierPoint(wireY, wireY, endY, endY, sparkTravel);

        for (let i = 0; i < 3; i++) {
          sparkTrailParticles.push({
            x: sx + (Math.random() - 0.5) * 6,
            y: sy + (Math.random() - 0.5) * 6,
            vx: (Math.random() - 0.5) * 80,
            vy: (Math.random() - 0.5) * 80 - 20,
            size: 1 + Math.random() * 3,
            alpha: 0.7 + Math.random() * 0.3,
            life: 0.3 + Math.random() * 0.3,
            color: Math.random() < 0.5 ? COLORS.spark : COLORS.sparkBright
          });
        }
      }

      if (sparkTravel >= 1) {
        sparkTravel = 1;
        sparkActive = false;

        // Determine correct or wrong, then show feedback before engine.end
        const choice = answers[selectedAnswer].choice;
        endDelayChoice = choice;
        endDelayActive = true;
        endDelayTimer = 0;

        if (choice.is_correct) {
          playSound('correct');
          batteryGlowActive = true;
          batteryGlowTime = 0;
          batteryChargeSegments = 0;
        } else {
          playSound('wrong');
          shortCircuitActive = true;
          shortCircuitTime = 0;
          // Spawn short circuit sparks at battery connection point
          const endY = BATTERY.y + BATTERY.h / 2;
          for (let i = 0; i < 20; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 50 + Math.random() * 200;
            shortCircuitParticles.push({
              x: BATTERY.x,
              y: endY,
              vx: Math.cos(angle) * speed,
              vy: Math.sin(angle) * speed,
              size: 1 + Math.random() * 3,
              alpha: 0.8 + Math.random() * 0.2,
              life: 0.3 + Math.random() * 0.4,
              color: Math.random() < 0.4 ? COLORS.error : (Math.random() < 0.5 ? COLORS.spark : '#FFFFFF')
            });
          }
        }
      }
    }

    // Update spark trail particles
    sparkTrailParticles.forEach(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      p.alpha = Math.max(0, p.life * 2);
      p.size *= 0.97;
    });
    sparkTrailParticles = sparkTrailParticles.filter(p => p.life > 0);

    // Update short circuit effect
    if (shortCircuitActive) {
      shortCircuitTime += dt;
      shortCircuitParticles.forEach(p => {
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 100 * dt; // slight gravity
        p.life -= dt;
        p.alpha = Math.max(0, p.life * 2);
      });
      shortCircuitParticles = shortCircuitParticles.filter(p => p.life > 0);
      if (shortCircuitTime > 0.5) shortCircuitActive = false;
    }

    // Update battery glow effect
    if (batteryGlowActive) {
      batteryGlowTime += dt;
      // Pulse intensity
      batteryGlowIntensity = Math.sin(batteryGlowTime * Math.PI * 4) * 0.5 + 0.5;
      // Fill segments progressively
      batteryChargeSegments = Math.min(BATTERY.segments, Math.floor(batteryGlowTime * 10));
      if (batteryGlowTime > 0.5) {
        batteryGlowActive = false;
        batteryChargeSegments = BATTERY.segments;
        batteryGlowIntensity = 0.6;
      }
    }

    // End delay: show visual feedback before calling engine.end
    if (endDelayActive) {
      endDelayTimer += dt;
      if (endDelayTimer >= 0.45) {
        endDelayActive = false;
        engine.end(endDelayChoice.is_correct, endDelayChoice.explanation);
      }
    }
  }

  function drawGame() {
    // Background
    ctx.fillStyle = COLORS.bg;
    ctx.fillRect(0, 0, W, H);

    // Draw background particles (enhanced)
    bgParticles.forEach(p => {
      // Draw arc trails first
      if (p.isArc && p.trail.length > 1) {
        ctx.strokeStyle = `rgba(78, 205, 196, 0.12)`;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(p.trail[0].x, p.trail[0].y);
        for (let i = 1; i < p.trail.length; i++) {
          ctx.lineTo(p.trail[i].x, p.trail[i].y);
        }
        ctx.stroke();
      }

      const alpha = Math.max(0, p.alpha);
      ctx.fillStyle = `rgba(78, 205, 196, ${alpha})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();

      // Add a subtle glow ring on larger particles
      if (p.size > 2) {
        ctx.strokeStyle = `rgba(78, 205, 196, ${alpha * 0.3})`;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size + 3, 0, Math.PI * 2);
        ctx.stroke();
      }
    });

    // Draw subtle grid lines
    ctx.strokeStyle = 'rgba(78, 205, 196, 0.04)';
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 40) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, H);
      ctx.stroke();
    }
    for (let y = 0; y < H; y += 40) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }

    // Draw timer bar at top
    drawTimer();

    // Draw battery
    drawBattery();

    // Draw wires from answer boxes to battery
    drawWires();

    // Draw answer boxes
    drawAnswers();

    // Draw spark if active
    if (sparkActive && selectedAnswer >= 0) {
      drawSpark();
    }

    // Draw spark trail particles
    sparkTrailParticles.forEach(p => {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.alpha;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Draw short circuit particles
    if (shortCircuitParticles.length > 0) {
      shortCircuitParticles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.alpha;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;

      // Flash effect on screen edges during short circuit
      if (shortCircuitTime < 0.15) {
        const flashAlpha = (1 - shortCircuitTime / 0.15) * 0.12;
        ctx.fillStyle = `rgba(232, 93, 74, ${flashAlpha})`;
        ctx.fillRect(0, 0, W, H);
      }
    }
  }

  function drawTimer() {
    const barX = 20;
    const barY = 20;
    const barW = 550;
    const barH = 12;
    const progress = timer / TIMER_DURATION;

    // Bar background
    ctx.fillStyle = COLORS.surface;
    ctx.beginPath();
    ctx.roundRect(barX, barY, barW, barH, 6);
    ctx.fill();

    // Bar fill
    const fillColor = progress > 0.3 ? COLORS.wire : (progress > 0.15 ? COLORS.spark : COLORS.error);
    const grad = ctx.createLinearGradient(barX, 0, barX + barW * progress, 0);
    grad.addColorStop(0, fillColor);
    grad.addColorStop(1, fillColor + 'CC');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(barX, barY, barW * progress, barH, 6);
    ctx.fill();

    // Glow effect on bar
    if (progress > 0) {
      ctx.shadowColor = fillColor;
      ctx.shadowBlur = 8;
      ctx.fillStyle = fillColor;
      ctx.beginPath();
      ctx.roundRect(barX, barY, barW * progress, barH, 6);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    // Timer icon (lightning bolt)
    ctx.fillStyle = COLORS.spark;
    ctx.font = "600 16px 'Nunito Sans', sans-serif";
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText('\u26A1 ' + Math.ceil(timer) + 's', barX + barW + 12, barY + barH / 2);
  }

  function drawBattery() {
    const b = BATTERY;

    // Battery outer glow (when charging)
    if (batteryGlowIntensity > 0 && batteryGlowActive) {
      ctx.shadowColor = COLORS.success;
      ctx.shadowBlur = 30 * batteryGlowIntensity;
      ctx.fillStyle = `rgba(107, 191, 89, ${batteryGlowIntensity * 0.15})`;
      ctx.beginPath();
      ctx.roundRect(b.x - 8, b.y - 8, b.w + 16, b.h + 16, 14);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
    // Steady glow after charge
    if (batteryChargeSegments >= BATTERY.segments && !batteryGlowActive) {
      ctx.shadowColor = COLORS.success;
      ctx.shadowBlur = 18;
      ctx.fillStyle = `rgba(107, 191, 89, 0.08)`;
      ctx.beginPath();
      ctx.roundRect(b.x - 6, b.y - 6, b.w + 12, b.h + 12, 12);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    // Battery cap (positive terminal)
    ctx.fillStyle = batteryChargeSegments > 0 ? COLORS.success : COLORS.borderSubtle;
    ctx.beginPath();
    ctx.roundRect(b.x + (b.w - b.capW) / 2, b.y - b.capH + 4, b.capW, b.capH, [6, 6, 0, 0]);
    ctx.fill();

    // Battery body outline
    ctx.strokeStyle = batteryChargeSegments > 0 ? COLORS.success : COLORS.borderSubtle;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.roundRect(b.x, b.y, b.w, b.h, 8);
    ctx.stroke();

    // Battery body fill (dark)
    ctx.fillStyle = COLORS.surface;
    ctx.beginPath();
    ctx.roundRect(b.x + 2, b.y + 2, b.w - 4, b.h - 4, 6);
    ctx.fill();

    // Battery segments
    const segInnerX = b.x + b.segPad;
    const segInnerW = b.w - b.segPad * 2;
    const totalSegH = b.h - b.segPad * 2;
    const segH = (totalSegH - (b.segments - 1) * b.segGap) / b.segments;

    for (let i = 0; i < b.segments; i++) {
      const segY = b.y + b.segPad + (b.segments - 1 - i) * (segH + b.segGap);
      const isFilled = i < batteryChargeSegments;

      if (isFilled) {
        // Filled segment with glow
        const segGrad = ctx.createLinearGradient(segInnerX, segY, segInnerX + segInnerW, segY);
        segGrad.addColorStop(0, COLORS.success);
        segGrad.addColorStop(1, COLORS.wire);
        ctx.fillStyle = segGrad;
        ctx.beginPath();
        ctx.roundRect(segInnerX, segY, segInnerW, segH, 4);
        ctx.fill();

        // Inner glow
        if (batteryGlowActive) {
          ctx.fillStyle = `rgba(107, 191, 89, ${batteryGlowIntensity * 0.3})`;
          ctx.beginPath();
          ctx.roundRect(segInnerX, segY, segInnerW, segH, 4);
          ctx.fill();
        }
      } else {
        // Empty segment outline
        ctx.strokeStyle = COLORS.borderSubtle;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect(segInnerX, segY, segInnerW, segH, 4);
        ctx.stroke();
      }
    }

    // Short circuit flash on battery (wrong answer)
    if (shortCircuitActive && shortCircuitTime < 0.2) {
      const flash = (1 - shortCircuitTime / 0.2);
      ctx.fillStyle = `rgba(232, 93, 74, ${flash * 0.3})`;
      ctx.beginPath();
      ctx.roundRect(b.x + 2, b.y + 2, b.w - 4, b.h - 4, 6);
      ctx.fill();
    }

    // Battery label
    ctx.fillStyle = batteryChargeSegments > 0 ? COLORS.success : COLORS.textTertiary;
    ctx.font = "500 12px 'Nunito Sans', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(batteryChargeSegments >= BATTERY.segments ? 'CHARGED' : 'CHARGE', b.x + b.w / 2, b.y + b.h + 10);
  }

  function drawWires() {
    answers.forEach((ans, i) => {
      const wireY = ans.wireY;
      const startX = ans.x + ans.w;
      const endX = BATTERY.x;
      const endY = BATTERY.y + BATTERY.h / 2;

      // Control points for a curved wire
      const cpX1 = startX + 30;
      const cpX2 = endX - 30;

      const isSelected = selectedAnswer === i;
      const isHovered = hoveredAnswer === i && !answered;

      // Wire glow
      if (isSelected && sparkActive) {
        ctx.strokeStyle = COLORS.wireGlow;
        ctx.lineWidth = 6;
        ctx.shadowColor = COLORS.wireGlow;
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.moveTo(startX, wireY);
        ctx.bezierCurveTo(cpX1, wireY, cpX2, endY, endX, endY);
        ctx.stroke();
        ctx.shadowBlur = 0;
      }

      // Hovered wire glow (subtle)
      if (isHovered && !isSelected) {
        ctx.strokeStyle = `rgba(126, 238, 230, 0.15)`;
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(startX, wireY);
        ctx.bezierCurveTo(cpX1, wireY, cpX2, endY, endX, endY);
        ctx.stroke();
      }

      // Wire line
      ctx.strokeStyle = isSelected ? COLORS.wire : (isHovered ? COLORS.wireGlow : COLORS.borderSubtle);
      ctx.lineWidth = isSelected ? 3 : 2;
      ctx.beginPath();
      ctx.moveTo(startX, wireY);
      ctx.bezierCurveTo(cpX1, wireY, cpX2, endY, endX, endY);
      ctx.stroke();

      // Pulsing dots along wire (enhanced - more dots, varied sizes)
      if (!answered || isSelected) {
        const dotCount = isHovered || isSelected ? 6 : 4;
        for (let d = 0; d < dotCount; d++) {
          const speed = isHovered || isSelected ? 0.5 : 0.3;
          const t = ((wirePulseTime * speed + d / dotCount) % 1);
          const px = bezierPoint(startX, cpX1, cpX2, endX, t);
          const py = bezierPoint(wireY, wireY, endY, endY, t);
          const dotAlpha = isHovered || isSelected ? 0.8 : 0.25;
          const dotSize = isHovered || isSelected ? 2.5 + Math.sin(wirePulseTime * 4 + d) * 0.5 : 1.5;
          ctx.fillStyle = `rgba(78, 205, 196, ${dotAlpha})`;
          ctx.beginPath();
          ctx.arc(px, py, dotSize, 0, Math.PI * 2);
          ctx.fill();

          // Glow around dots when hovered/selected
          if ((isHovered || isSelected) && dotSize > 2) {
            ctx.fillStyle = `rgba(78, 205, 196, ${dotAlpha * 0.2})`;
            ctx.beginPath();
            ctx.arc(px, py, dotSize + 3, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }

      // Connection node at answer box end
      const nodeGlow = hoverGlow[i] || 0;
      ctx.fillStyle = isSelected ? COLORS.wire : (isHovered ? COLORS.wireGlow : COLORS.borderSubtle);
      ctx.beginPath();
      ctx.arc(startX, wireY, 4 + nodeGlow, 0, Math.PI * 2);
      ctx.fill();

      // Node glow ring when hovered
      if (nodeGlow > 0.1) {
        ctx.strokeStyle = `rgba(126, 238, 230, ${nodeGlow * 0.4})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(startX, wireY, 7 + nodeGlow * 2, 0, Math.PI * 2);
        ctx.stroke();
      }
    });
  }

  function drawSpark() {
    const ans = answers[selectedAnswer];
    const wireY = ans.wireY;
    const startX = ans.x + ans.w;
    const endX = BATTERY.x;
    const endY = BATTERY.y + BATTERY.h / 2;
    const cpX1 = startX + 30;
    const cpX2 = endX - 30;

    const t = sparkTravel;
    const sx = bezierPoint(startX, cpX1, cpX2, endX, t);
    const sy = bezierPoint(wireY, wireY, endY, endY, t);

    // Spark glow (enhanced - larger, more intense)
    ctx.shadowColor = COLORS.sparkBright;
    ctx.shadowBlur = 35;
    ctx.fillStyle = COLORS.sparkBright;
    ctx.beginPath();
    ctx.arc(sx, sy, 10, 0, Math.PI * 2);
    ctx.fill();

    // Spark core
    ctx.shadowBlur = 15;
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath();
    ctx.arc(sx, sy, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Spark trail (enhanced with more depth)
    for (let i = 1; i <= 8; i++) {
      const tt = Math.max(0, t - i * 0.02);
      const tx = bezierPoint(startX, cpX1, cpX2, endX, tt);
      const ty = bezierPoint(wireY, wireY, endY, endY, tt);
      const alpha = (1 - i / 9) * 0.7;
      ctx.fillStyle = `rgba(245, 167, 66, ${alpha})`;
      ctx.beginPath();
      ctx.arc(tx, ty, 7 - i * 0.7, 0, Math.PI * 2);
      ctx.fill();
    }

    // Random mini-sparks around main spark (enhanced)
    for (let i = 0; i < 5; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = 8 + Math.random() * 16;
      const mx = sx + Math.cos(angle) * dist;
      const my = sy + Math.sin(angle) * dist;
      ctx.strokeStyle = `rgba(255, 215, 0, ${0.3 + Math.random() * 0.5})`;
      ctx.lineWidth = 1 + Math.random();
      ctx.beginPath();
      ctx.moveTo(sx + Math.cos(angle) * 6, sy + Math.sin(angle) * 6);
      // Jagged lightning mini-bolt
      const midX = (sx + Math.cos(angle) * 6 + mx) / 2 + (Math.random() - 0.5) * 6;
      const midY = (sy + Math.sin(angle) * 6 + my) / 2 + (Math.random() - 0.5) * 6;
      ctx.lineTo(midX, midY);
      ctx.lineTo(mx, my);
      ctx.stroke();
    }
  }

  function drawAnswers() {
    answers.forEach((ans, i) => {
      const isHovered = hoveredAnswer === i && !answered;
      const isSelected = selectedAnswer === i;

      // Entrance animation: scale and alpha
      const entrance = entranceActive ? entranceProgress[i] : 1;
      const lift = hoverLift[i] || 0;
      const glow = hoverGlow[i] || 0;

      ctx.save();

      // Apply entrance animation (scale from center)
      if (entrance < 1) {
        const cx = ans.x + ans.w / 2;
        const cy = ans.y + ans.h / 2;
        ctx.translate(cx, cy);
        ctx.scale(entrance, entrance);
        ctx.translate(-cx, -cy);
        ctx.globalAlpha = Math.min(1, entrance * 1.5);
      }

      // Apply hover lift
      const drawY = ans.y - lift;

      // Hover glow shadow
      if (glow > 0.05) {
        ctx.shadowColor = COLORS.wireGlow;
        ctx.shadowBlur = 12 * glow;
        ctx.shadowOffsetY = 2;
      }

      // Answer box background
      ctx.fillStyle = isSelected ? 'rgba(78, 205, 196, 0.15)' : (isHovered ? 'rgba(78, 205, 196, 0.08)' : COLORS.surface);
      ctx.beginPath();
      ctx.roundRect(ans.x, drawY, ans.w, ans.h, 12);
      ctx.fill();

      ctx.shadowBlur = 0;
      ctx.shadowOffsetY = 0;

      // Answer box border
      ctx.strokeStyle = isSelected ? COLORS.wire : (isHovered ? COLORS.wireGlow : COLORS.borderSubtle);
      ctx.lineWidth = isSelected ? 2.5 : 1.5;
      ctx.beginPath();
      ctx.roundRect(ans.x, drawY, ans.w, ans.h, 12);
      ctx.stroke();

      // Number badge
      const badgeX = ans.x + 20;
      const badgeY = drawY + ans.h / 2;
      const badgeR = 14;

      ctx.fillStyle = isSelected ? COLORS.wire : (isHovered ? COLORS.wireGlow : COLORS.borderSubtle);
      ctx.beginPath();
      ctx.arc(badgeX, badgeY, badgeR, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = isSelected || isHovered ? COLORS.bg : COLORS.text;
      ctx.font = "700 14px 'Nunito Sans', sans-serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String(i + 1), badgeX, badgeY);

      // Answer text - wrap if needed
      const textX = ans.x + 46;
      const maxTextW = ans.w - 62;
      ctx.fillStyle = isSelected ? COLORS.text : (isHovered ? COLORS.text : COLORS.textSecondary);
      ctx.font = "400 14px 'Nunito', sans-serif";
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';

      // Word-wrap text
      const lines = wrapText(ans.choice.text, maxTextW);
      const lineHeight = 18;
      const totalTextH = lines.length * lineHeight;
      const startTextY = drawY + (ans.h - totalTextH) / 2 + lineHeight / 2;

      lines.forEach((line, li) => {
        ctx.fillText(line, textX, startTextY + li * lineHeight);
      });

      ctx.restore();
    });
  }

  // Utility: wrap text into lines
  function wrapText(text, maxWidth) {
    const words = text.split(' ');
    const lines = [];
    let currentLine = words[0];

    for (let i = 1; i < words.length; i++) {
      const testLine = currentLine + ' ' + words[i];
      const metrics = ctx.measureText(testLine);
      if (metrics.width <= maxWidth) {
        currentLine = testLine;
      } else {
        lines.push(currentLine);
        currentLine = words[i];
      }
    }
    lines.push(currentLine);
    return lines;
  }

  // Utility: cubic bezier point
  function bezierPoint(p0, p1, p2, p3, t) {
    const u = 1 - t;
    return u * u * u * p0 + 3 * u * u * t * p1 + 3 * u * t * t * p2 + t * t * t * p3;
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;
    if (answered) return;

    // Number keys 1-4 to select answer
    const keyMap = { 'Digit1': 0, 'Digit2': 1, 'Digit3': 2, 'Digit4': 3 };
    if (e.code in keyMap) {
      selectAnswer(keyMap[e.code]);
    }
  }

  function selectAnswer(index) {
    if (answered || index < 0 || index >= answers.length) return;
    answered = true;
    selectedAnswer = index;
    sparkActive = true;
    sparkTravel = 0;
    playSound('select');
  }

  // Mouse/click handling for answers
  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'playing' || answered) {
      hoveredAnswer = -1;
      canvas.style.cursor = 'default';
      return;
    }

    const { x, y } = screenToLogical(e.clientX, e.clientY);
    hoveredAnswer = -1;
    canvas.style.cursor = 'default';

    for (let i = 0; i < answers.length; i++) {
      const a = answers[i];
      if (x >= a.x && x <= a.x + a.w && y >= a.y && y <= a.y + a.h) {
        hoveredAnswer = i;
        canvas.style.cursor = 'pointer';
        break;
      }
    }

    // Play hover sound when entering a new answer box
    if (hoveredAnswer !== previousHovered && hoveredAnswer >= 0) {
      playSound('hover');
    }
    previousHovered = hoveredAnswer;
  });

  canvas.addEventListener('click', (e) => {
    if (gameState !== 'playing' || answered) return;

    // Resume audio context on user gesture
    if (audioCtx.state === 'suspended') audioCtx.resume();

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    for (let i = 0; i < answers.length; i++) {
      const a = answers[i];
      if (x >= a.x && x <= a.x + a.w && y >= a.y && y <= a.y + a.h) {
        selectAnswer(i);
        break;
      }
    }
  });

  // =====================================================================
  //   SECTION 4: GAME LOOP - DO NOT MODIFY
  //   Standard loop with responsive scaling and DPR support.
  // =====================================================================
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
