<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Balance Beam</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1C1C1A;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #2A2A27;
      border-radius: 12px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "true_false",
    prompt: "Sample true/false question",
    choices: [
      { text: "True", is_correct: true, explanation: "This statement is true" },
      { text: "False", is_correct: false, explanation: "This statement is not false" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  Balance Beam - True/False game with physics-based ball rolling            ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // Reduced motion preference
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // Theme colors (QuizHP styleguide)
  const theme = {
    bg: '#2A2A27',
    panel: '#F5F5F0',
    ink: '#2B2B28',
    muted: '#5A5A54',
    accent: '#E87A3E',
    good: '#6BBF59',
    bad: '#E85D4A',
    border: '#D4D4CC',
    amber: '#F5A742',
    cyan: '#4ECDC4'
  };

  // Game state
  let state = null;
  let trueChoice = null;
  let falseChoice = null;
  let trueText = 'True';
  let falseText = 'False';
  let answerChosen = false;  // Prevent multiple answer selections

  // Input state
  let keysPressed = {};

  // Polish state
  let dustParticles = [];
  let splashParticles = [];
  let ballTrail = [];
  let screenShake = { x: 0, y: 0, intensity: 0 };
  let bucketGlow = { left: 0, right: 0 };
  let lastTiltDir = 0;
  let entranceAnim = { scale: 0, alpha: 0, startTime: 0 };

  // ═══════════════════════════════════════════════════════════════════════════
  // AUDIO SYSTEM
  // ═══════════════════════════════════════════════════════════════════════════
  let audioCtx = null;
  let rollOscillator = null;
  let rollGain = null;

  function initAudio() {
    if (audioCtx) return;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) {
      console.warn('Web Audio not supported');
    }
  }

  function resumeAudio() {
    if (audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }

  function playSound(type, options = {}) {
    if (!audioCtx || prefersReducedMotion) return;
    resumeAudio();

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    const now = audioCtx.currentTime;

    if (type === 'correct') {
      // Ascending cheerful ding
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, now);
      osc.frequency.setValueAtTime(659, now + 0.1);
      osc.frequency.setValueAtTime(784, now + 0.2);
      gain.gain.setValueAtTime(0.25, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
      osc.start(now);
      osc.stop(now + 0.4);
    } else if (type === 'wrong') {
      // Sympathetic buzz
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.setValueAtTime(150, now + 0.1);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
      osc.start(now);
      osc.stop(now + 0.25);
    } else if (type === 'land') {
      // Bucket landing thump
      osc.type = 'sine';
      osc.frequency.setValueAtTime(120, now);
      osc.frequency.exponentialRampToValueAtTime(60, now + 0.15);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
      osc.start(now);
      osc.stop(now + 0.15);
    } else if (type === 'tilt') {
      // Beam creak
      osc.type = 'sawtooth';
      const freq = 80 + (options.dir || 0) * 20;
      osc.frequency.setValueAtTime(freq, now);
      osc.frequency.linearRampToValueAtTime(freq + 10, now + 0.05);
      gain.gain.setValueAtTime(0.05, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      osc.start(now);
      osc.stop(now + 0.08);
    }
  }

  function updateRollSound(velocity) {
    if (!audioCtx || prefersReducedMotion) return;
    resumeAudio();

    const absVel = Math.abs(velocity);
    const targetVolume = Math.min(absVel / 300, 0.08);

    if (absVel > 10 && !rollOscillator) {
      // Start roll sound
      rollOscillator = audioCtx.createOscillator();
      rollGain = audioCtx.createGain();
      rollOscillator.type = 'triangle';
      rollOscillator.connect(rollGain);
      rollGain.connect(audioCtx.destination);
      rollGain.gain.setValueAtTime(0, audioCtx.currentTime);
      rollOscillator.start();
    }

    if (rollOscillator && rollGain) {
      // Update roll sound based on velocity
      const freq = 60 + absVel * 0.3;
      rollOscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
      rollGain.gain.linearRampToValueAtTime(targetVolume, audioCtx.currentTime + 0.05);

      // Stop if too slow
      if (absVel < 5) {
        rollGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
        setTimeout(() => {
          if (rollOscillator) {
            rollOscillator.stop();
            rollOscillator = null;
            rollGain = null;
          }
        }, 150);
      }
    }
  }

  function stopRollSound() {
    if (rollOscillator) {
      try {
        rollOscillator.stop();
      } catch (e) {}
      rollOscillator = null;
      rollGain = null;
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // PARTICLE SYSTEMS
  // ═══════════════════════════════════════════════════════════════════════════
  function spawnDustParticle(x, y, velocity) {
    if (prefersReducedMotion || Math.random() > 0.3) return;

    dustParticles.push({
      x, y,
      vx: (Math.random() - 0.5) * 30 + velocity * 0.1,
      vy: -Math.random() * 40 - 10,
      size: Math.random() * 3 + 1,
      alpha: 0.6,
      color: theme.panel,
      life: 0.4 + Math.random() * 0.3
    });
  }

  function spawnSplashParticles(x, y, color) {
    if (prefersReducedMotion) return;

    const colors = [color, theme.amber, theme.cyan, '#FFFFFF'];
    for (let i = 0; i < 20; i++) {
      const angle = (Math.PI * 2 * i / 20) + Math.random() * 0.3;
      const speed = 100 + Math.random() * 150;
      splashParticles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 100,
        size: Math.random() * 6 + 3,
        alpha: 1,
        color: colors[Math.floor(Math.random() * colors.length)],
        gravity: 400,
        rotation: Math.random() * Math.PI * 2,
        rotationSpeed: (Math.random() - 0.5) * 8
      });
    }
  }

  function updateParticles(dt) {
    // Update dust
    dustParticles = dustParticles.filter(p => {
      p.vy += 50 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.alpha -= dt * 2;
      p.life -= dt;
      return p.life > 0 && p.alpha > 0;
    });

    // Update splash
    splashParticles = splashParticles.filter(p => {
      p.vy += p.gravity * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.alpha -= dt * 1.5;
      return p.alpha > 0 && p.y < H + 50;
    });
  }

  function drawParticles() {
    // Draw dust
    dustParticles.forEach(p => {
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    });

    // Draw splash
    splashParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    ctx.globalAlpha = 1;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // VISUAL EFFECTS
  // ═══════════════════════════════════════════════════════════════════════════
  function updateBallTrail(x, y) {
    if (prefersReducedMotion) return;

    ballTrail.push({ x, y, alpha: 0.5, size: state.ball.r });

    // Keep trail short
    if (ballTrail.length > 8) {
      ballTrail.shift();
    }

    // Fade trail
    ballTrail.forEach((t, i) => {
      t.alpha = (i / ballTrail.length) * 0.3;
      t.size = state.ball.r * (i / ballTrail.length) * 0.8;
    });
  }

  function drawBallTrail() {
    if (prefersReducedMotion) return;

    ballTrail.forEach(t => {
      ctx.globalAlpha = t.alpha;
      ctx.fillStyle = theme.ink;
      ctx.beginPath();
      ctx.arc(t.x, t.y, t.size, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  function triggerScreenShake(intensity) {
    if (prefersReducedMotion) return;
    screenShake.intensity = intensity;
  }

  function updateScreenShake(dt) {
    if (screenShake.intensity > 0) {
      screenShake.x = (Math.random() - 0.5) * screenShake.intensity * 2;
      screenShake.y = (Math.random() - 0.5) * screenShake.intensity * 2;
      screenShake.intensity *= 0.9;
      if (screenShake.intensity < 0.5) {
        screenShake.intensity = 0;
        screenShake.x = 0;
        screenShake.y = 0;
      }
    }
  }

  function updateBucketGlow(dt) {
    if (!state || !state.ball) return;

    const b = state.ball;
    const leftBucket = state.buckets.left;
    const rightBucket = state.buckets.right;

    // Calculate distance to each bucket
    const leftDist = Math.hypot(
      b.px - (leftBucket.x + leftBucket.w / 2),
      b.py - leftBucket.y
    );
    const rightDist = Math.hypot(
      b.px - (rightBucket.x + rightBucket.w / 2),
      b.py - rightBucket.y
    );

    // Glow when ball is near
    const glowThreshold = 150;
    bucketGlow.left = Math.max(0, 1 - leftDist / glowThreshold);
    bucketGlow.right = Math.max(0, 1 - rightDist / glowThreshold);
  }

  function updateEntranceAnimation(dt) {
    if (entranceAnim.scale >= 1) return;

    const elapsed = (performance.now() - entranceAnim.startTime) / 1000;
    const duration = 0.5;
    const t = Math.min(elapsed / duration, 1);

    // Spring easing
    const spring = 1 + Math.sin(t * Math.PI * 2) * 0.15 * (1 - t);
    entranceAnim.scale = t * spring;
    entranceAnim.alpha = t;

    if (t >= 1) {
      entranceAnim.scale = 1;
      entranceAnim.alpha = 1;
    }
  }

  function initGame() {
    const cx = W / 2;
    const cy = Math.floor(H * 0.45);

    // Find True/False choices (case-insensitive)
    const choices = QUESTION.choices || [];
    const cmap = {};
    choices.forEach((c, i) => {
      const key = String(c.text || '').trim().toLowerCase();
      cmap[key] = { i, c };
    });

    trueChoice = cmap['true'] || cmap['t'] || null;
    falseChoice = cmap['false'] || cmap['f'] || null;
    trueText = trueChoice ? trueChoice.c.text : 'True';
    falseText = falseChoice ? falseChoice.c.text : 'False';

    // Randomize which side shows "True"
    const trueOnLeft = Math.random() < 0.5;

    // Buckets
    const buckets = {
      left: { x: 40, y: H - 110, w: 140, h: 90 },
      right: { x: W - 180, y: H - 110, w: 140, h: 90 }
    };

    // Physics state - EXACT values from original
    state = {
      cx, cy,
      beamLen: 420,
      theta: 0,           // radians
      thetaVel: 0,
      tiltDir: 0,         // -1, 0, +1 (input)
      tiltAccel: 1.9,     // angular accel factor (EXACT from original)
      gAlong: 900,        // gravity component along beam (px/s^2) (EXACT)
      drag: 2.2,          // velocity drag along beam (EXACT)
      trueOnLeft,
      buckets,
      ball: {
        r: 10,
        onBeam: true,
        s: 0,             // distance along beam from pivot (px)
        v: 0,             // speed along beam (px/s)
        px: cx,
        py: cy,
        vx: 0,
        vy: 0
      }
    };

    keysPressed = {};
    answerChosen = false;

    // Reset polish state
    dustParticles = [];
    splashParticles = [];
    ballTrail = [];
    screenShake = { x: 0, y: 0, intensity: 0 };
    bucketGlow = { left: 0, right: 0 };
    lastTiltDir = 0;
    entranceAnim = { scale: 0, alpha: 0, startTime: performance.now() };

    // Initialize audio on first interaction
    initAudio();
    stopRollSound();
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;
    if (!state) return;

    // Update polish effects
    updateParticles(dt);
    updateScreenShake(dt);
    updateBucketGlow(dt);
    updateEntranceAnimation(dt);

    // Update tilt direction from keys
    if (keysPressed['ArrowLeft']) {
      state.tiltDir = -1;
    } else if (keysPressed['ArrowRight']) {
      state.tiltDir = 1;
    } else {
      state.tiltDir = 0;
    }

    // Play tilt sound when direction changes
    if (state.tiltDir !== 0 && state.tiltDir !== lastTiltDir) {
      playSound('tilt', { dir: state.tiltDir });
    }
    lastTiltDir = state.tiltDir;

    // --- Seesaw angular motion (EXACT from original) ---
    state.thetaVel += state.tiltDir * state.tiltAccel;
    // Angular damping (scaled by dt)
    state.thetaVel *= (1 - Math.min(0.12 * dt, 0.12));
    state.theta += state.thetaVel * dt;
    // Clamp angle to +/-~24 degrees (EXACT from original)
    const maxAng = 0.42;
    if (state.theta > maxAng) { state.theta = maxAng; state.thetaVel *= 0.4; }
    if (state.theta < -maxAng) { state.theta = -maxAng; state.thetaVel *= 0.4; }

    const b = state.ball;

    if (b.onBeam) {
      // Accel along beam: g*sin(theta) - drag*v (EXACT from original)
      const a = state.gAlong * Math.sin(state.theta) - state.drag * b.v;
      b.v += a * dt;
      b.s += b.v * dt;

      // World position from beam coordinates
      b.px = state.cx + b.s * Math.cos(state.theta);
      b.py = state.cy + b.s * Math.sin(state.theta);

      // Update ball trail
      updateBallTrail(b.px, b.py);

      // Rolling sound based on velocity
      updateRollSound(b.v);

      // Spawn dust particles when rolling
      if (Math.abs(b.v) > 50) {
        spawnDustParticle(b.px, b.py + b.r, b.v);
      }

      // End caps -> start falling
      const limit = state.beamLen * 0.5 - b.r;
      if (b.s < -limit || b.s > limit) {
        b.s = Math.sign(b.s) * limit;
        b.px = state.cx + b.s * Math.cos(state.theta);
        b.py = state.cy + b.s * Math.sin(state.theta);
        b.onBeam = false;
        // Launch with current along-beam velocity components
        b.vx = b.v * Math.cos(state.theta);
        b.vy = b.v * Math.sin(state.theta);

        // Stop roll sound when leaving beam
        stopRollSound();
      }
    } else {
      // Falling (EXACT gravity from original: 1200)
      b.vy += 1200 * dt;
      b.px += b.vx * dt;
      b.py += b.vy * dt;

      // Update ball trail while falling
      updateBallTrail(b.px, b.py);

      // Bucket checks
      const inRect = (r, x, y, rad) =>
        x > r.x + rad && x < r.x + r.w - rad && y > r.y + rad && y < r.y + r.h - rad;

      if (inRect(state.buckets.left, b.px, b.py, b.r)) {
        // Trigger landing effects
        const bucketColor = state.trueOnLeft ? theme.good : theme.bad;
        spawnSplashParticles(b.px, b.py, bucketColor);
        triggerScreenShake(8);
        playSound('land');

        chooseTF(state.trueOnLeft); // left bucket selection
        return;
      }
      if (inRect(state.buckets.right, b.px, b.py, b.r)) {
        // Trigger landing effects
        const bucketColor = state.trueOnLeft ? theme.bad : theme.good;
        spawnSplashParticles(b.px, b.py, bucketColor);
        triggerScreenShake(8);
        playSound('land');

        chooseTF(!state.trueOnLeft); // right bucket selection
        return;
      }

      // Safety: if it falls off-screen, resolve by side
      if (b.py > H + 50) {
        const pickTrue = (b.px < W * 0.5) ? state.trueOnLeft : !state.trueOnLeft;
        chooseTF(pickTrue);
      }
    }
  }

  function chooseTF(pickTrue) {
    // Prevent multiple answer selections (race condition fix)
    if (answerChosen) return;
    answerChosen = true;

    let idx = -1, ch = null;

    if (pickTrue && trueChoice) {
      idx = trueChoice.i;
      ch = trueChoice.c;
    } else if (!pickTrue && falseChoice) {
      idx = falseChoice.i;
      ch = falseChoice.c;
    } else {
      // Fallback by label text match
      const arr = QUESTION.choices || [];
      const target = pickTrue ? 'true' : 'false';
      const i = arr.findIndex(c => String(c.text || '').trim().toLowerCase() === target);
      if (i >= 0) { idx = i; ch = arr[i]; }
    }

    if (ch) {
      const ok = !!ch.is_correct;
      const expl = ch.explanation || '';

      // Play result sound
      playSound(ok ? 'correct' : 'wrong');

      if (typeof idx === 'number' && window.__report) window.__report(idx, ok, expl);

      // Delay end slightly to show celebration/effects
      setTimeout(() => {
        engine.end(ok, expl);
      }, 300);
    } else {
      // If no TF choices provided, resolve trivially as correct
      playSound('correct');
      setTimeout(() => {
        engine.end(true);
      }, 300);
    }
  }

  function drawGame() {
    // Apply screen shake
    ctx.save();
    ctx.translate(screenShake.x, screenShake.y);

    // Clear canvas
    ctx.fillStyle = theme.bg;
    ctx.fillRect(-10, -10, W + 20, H + 20);

    if (!state) {
      ctx.restore();
      return;
    }

    // Apply entrance animation
    const animScale = prefersReducedMotion ? 1 : entranceAnim.scale;
    const animAlpha = prefersReducedMotion ? 1 : entranceAnim.alpha;
    ctx.globalAlpha = animAlpha;

    // Draw buckets with glow effect
    drawBucket(state.buckets.left, state.trueOnLeft ? theme.good : theme.bad, bucketGlow.left);
    drawBucket(state.buckets.right, state.trueOnLeft ? theme.bad : theme.good, bucketGlow.right);

    // Bucket labels
    ctx.fillStyle = theme.ink;
    ctx.font = "600 18px 'Nunito Sans', system-ui, sans-serif";
    const leftLabel = state.trueOnLeft ? trueText : falseText;
    const rightLabel = state.trueOnLeft ? falseText : trueText;
    centerTextInRect(leftLabel, state.buckets.left);
    centerTextInRect(rightLabel, state.buckets.right);

    // Draw beam with entrance animation
    ctx.save();
    ctx.translate(state.cx, state.cy);
    ctx.scale(animScale, animScale);
    ctx.translate(-state.cx, -state.cy);

    // Support base
    ctx.strokeStyle = theme.border;
    ctx.lineWidth = 2;
    const baseY = state.cy + 54;
    ctx.beginPath();
    ctx.moveTo(state.cx - 40, baseY);
    ctx.lineTo(state.cx + 40, baseY);
    ctx.stroke();

    // Pivot triangle
    ctx.fillStyle = theme.panel;
    ctx.beginPath();
    ctx.moveTo(state.cx, state.cy + 28);
    ctx.lineTo(state.cx - 28, baseY);
    ctx.lineTo(state.cx + 28, baseY);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = theme.border;
    ctx.stroke();

    // Seesaw beam
    ctx.save();
    ctx.translate(state.cx, state.cy);
    ctx.rotate(state.theta);
    ctx.fillStyle = theme.panel;
    ctx.strokeStyle = theme.border;
    ctx.lineWidth = 3;
    const L = state.beamLen, thickness = 10;

    // Beam shadow
    ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
    ctx.fillRect(-L / 2 + 3, -thickness / 2 + 3, L, thickness);

    // Main beam
    ctx.fillStyle = theme.panel;
    ctx.fillRect(-L / 2, -thickness / 2, L, thickness);
    ctx.strokeRect(-L / 2, -thickness / 2, L, thickness);
    // End caps
    ctx.fillRect(-L / 2 - 6, -thickness / 2, 6, thickness);
    ctx.fillRect(L / 2, -thickness / 2, 6, thickness);
    ctx.restore();

    // Pivot knob
    ctx.fillStyle = theme.accent;
    drawCircle(state.cx, state.cy, 6);
    // Knob highlight
    ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
    drawCircle(state.cx - 2, state.cy - 2, 2);

    ctx.restore(); // End entrance animation transform

    // Draw ball trail (before ball)
    drawBallTrail();

    // Ball
    const b = state.ball;

    // Ball shadow
    ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
    ctx.beginPath();
    ctx.ellipse(Math.round(b.px) + 3, Math.round(b.py) + 3, b.r, b.r * 0.6, 0, 0, Math.PI * 2);
    ctx.fill();

    // Main ball
    ctx.fillStyle = theme.ink;
    drawCircle(Math.round(b.px), Math.round(b.py), b.r);

    // Ball highlight
    ctx.fillStyle = 'rgba(255, 255, 255, 0.25)';
    drawCircle(Math.round(b.px) - 3, Math.round(b.py) - 3, 4);

    ctx.strokeStyle = theme.border;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(Math.round(b.px), Math.round(b.py), b.r, 0, Math.PI * 2);
    ctx.stroke();

    // Draw particles on top
    drawParticles();

    ctx.globalAlpha = 1;
    ctx.restore(); // End screen shake
  }

  function drawCircle(x, y, r) {
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawBucket(rect, tint, glow = 0) {
    // Glow effect when ball is near
    if (glow > 0 && !prefersReducedMotion) {
      ctx.save();
      ctx.shadowColor = tint;
      ctx.shadowBlur = 20 * glow;
      ctx.fillStyle = tint;
      ctx.globalAlpha = glow * 0.3;
      ctx.fillRect(rect.x - 8, rect.y - 20, rect.w + 16, rect.h + 20);
      ctx.restore();
    }

    // Bucket shadow
    ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
    ctx.fillRect(rect.x + 4, rect.y + 4, rect.w, rect.h);

    // Body
    ctx.fillStyle = theme.panel;
    ctx.fillRect(rect.x, rect.y, rect.w, rect.h);

    // Inner shadow for depth
    const gradient = ctx.createLinearGradient(rect.x, rect.y, rect.x, rect.y + rect.h);
    gradient.addColorStop(0, 'rgba(0, 0, 0, 0.1)');
    gradient.addColorStop(0.3, 'rgba(0, 0, 0, 0)');
    gradient.addColorStop(1, 'rgba(0, 0, 0, 0.05)');
    ctx.fillStyle = gradient;
    ctx.fillRect(rect.x, rect.y, rect.w, rect.h);

    // Lip
    ctx.fillStyle = tint;
    ctx.fillRect(rect.x - 4, rect.y - 14, rect.w + 8, 14);

    // Lip highlight
    ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
    ctx.fillRect(rect.x - 4, rect.y - 14, rect.w + 8, 4);

    // Border
    ctx.strokeStyle = theme.border;
    ctx.lineWidth = 2;
    ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);
  }

  function centerTextInRect(text, rect) {
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, rect.x + rect.w / 2, rect.y + rect.h / 2);
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;

    // Initialize audio on first interaction
    initAudio();
    resumeAudio();

    if (e.type === 'keydown') {
      keysPressed[e.code] = true;
    } else if (e.type === 'keyup') {
      keysPressed[e.code] = false;
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    handleInput(e);
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });


  // Cursor change handler for end screen buttons
  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'ended') {
      canvas.style.cursor = 'default';
      return;
    }
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    if (gameResult) {
      if (pointInRect(x, y, restartButton) || pointInRect(x, y, nextButton)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    } else {
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    }
    canvas.style.cursor = 'default';
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
