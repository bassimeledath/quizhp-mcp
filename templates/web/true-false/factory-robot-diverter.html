<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Factory Robot Diverter</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  +==============================================================================+
  |  GAME FACTORY TEMPLATE                                                        |
  |  This template enforces critical invariants. Follow the section markers.      |
  +==============================================================================+
  -->
  <style>
    /* =========================================================================
       BASE STYLES - Can be extended, not removed
       ========================================================================= */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- =========================================================================
       CANVAS - Sized dynamically to fill available space
       ========================================================================= -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // +========================================================================+
  // |  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                 |
  // |  Platform replaces this at runtime. Use these exact 60-char answers.   |
  // +========================================================================+
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // +========================================================================+
  // |  SECTION 2: ENGINE CORE - DO NOT MODIFY                                |
  // |  Standard engine interface and end screen. This is sacred.             |
  // +========================================================================+
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720x540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720x540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720x540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // +========================================================================+
  // |  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                  |
  // |  This is where your game logic goes. See requirements below.           |
  // +========================================================================+

  // === COLORS ===
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    surfaceSecondary: '#F5F5F0',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    textTertiary: '#8C8C84',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    cyanHover: '#45B8B0',
    cyanLight: '#E8F9F8',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC',
  };

  // === SOUND EFFECTS ===
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playSound(type) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'click') {
      osc.frequency.value = 600;
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.08);
    } else if (type === 'correct') {
      osc.frequency.value = 523;
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.4);
      const osc2 = audioCtx.createOscillator();
      const gain2 = audioCtx.createGain();
      osc2.connect(gain2);
      gain2.connect(audioCtx.destination);
      osc2.frequency.value = 659;
      gain2.gain.setValueAtTime(0.2, audioCtx.currentTime + 0.12);
      gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
      osc2.start(audioCtx.currentTime + 0.12);
      osc2.stop(audioCtx.currentTime + 0.5);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.value = 200;
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.3);
    } else if (type === 'divert') {
      osc.type = 'triangle';
      osc.frequency.value = 440;
      osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.15);
    }
  }

  // === GAME STATE ===
  let robot = {};
  let diverter = {};
  let pathLeft = {};
  let pathRight = {};
  let answerZones = [];
  let conveyorSegments = [];
  let gameTime = 0;
  let diverterDirection = 0; // -1 = left, 0 = center, 1 = right
  let robotDiverted = false;
  let answerSelected = false;
  let selectionFlash = 0;
  let selectedZone = -1;
  let gameParticles = [];
  let entranceAnim = 0;

  // Conveyor belt animation
  let conveyorOffset = 0;

  // Track layout constants
  const TRACK_Y_START = 50;
  const JUNCTION_Y = 240;
  const TRACK_Y_END = 400;
  const TRACK_X_CENTER = W / 2;
  const TRACK_WIDTH = 50;
  const PATH_SPREAD = 180;

  function initGame() {
    gameTime = 0;
    entranceAnim = 0;
    conveyorOffset = 0;
    diverterDirection = 0;
    robotDiverted = false;
    answerSelected = false;
    selectionFlash = 0;
    selectedZone = -1;
    gameParticles = [];

    // Robot starts at top of conveyor
    robot = {
      x: TRACK_X_CENTER,
      y: TRACK_Y_START - 30,
      w: 36,
      h: 30,
      speed: 100,
      targetX: TRACK_X_CENTER,
      scale: 1,
      rotation: 0,
      eyeBlink: 0,
      wheelAngle: 0,
    };

    // Diverter at junction
    diverter = {
      x: TRACK_X_CENTER,
      y: JUNCTION_Y,
      angle: 0, // -PI/4 for left, PI/4 for right
      targetAngle: 0,
      glowIntensity: 0,
    };

    // Answer zones at end of paths
    const choice0 = QUESTION.choices[0];
    const choice1 = QUESTION.choices[1];

    answerZones = [
      {
        x: TRACK_X_CENTER - PATH_SPREAD,
        y: TRACK_Y_END + 60,
        w: 290,
        h: 80,
        choice: choice0,
        label: choice0.text,
        alpha: 0,
        scale: 0,
        highlighted: false,
      },
      {
        x: TRACK_X_CENTER + PATH_SPREAD,
        y: TRACK_Y_END + 60,
        w: 290,
        h: 80,
        choice: choice1,
        label: choice1.text,
        alpha: 0,
        scale: 0,
        highlighted: false,
      },
    ];
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;
    entranceAnim = Math.min(entranceAnim + dt * 3, 1);
    conveyorOffset = (conveyorOffset + dt * 60) % 20;

    // Animate answer zone entrance
    answerZones.forEach((zone, i) => {
      const delay = 0.2 + i * 0.15;
      const t = Math.max(0, Math.min(1, (gameTime - delay) * 3));
      const spring = 1 + Math.sin(t * Math.PI * 2) * 0.15 * (1 - t);
      zone.scale = t * spring;
      zone.alpha = t;
    });

    // Blink robot eyes
    robot.eyeBlink += dt;
    if (robot.eyeBlink > 3) robot.eyeBlink = 0;

    // Animate diverter
    if (diverterDirection === -1) {
      diverter.targetAngle = -Math.PI / 4;
    } else if (diverterDirection === 1) {
      diverter.targetAngle = Math.PI / 4;
    } else {
      diverter.targetAngle = 0;
    }
    diverter.angle += (diverter.targetAngle - diverter.angle) * Math.min(1, dt * 12);
    diverter.glowIntensity = diverterDirection !== 0 ? Math.min(1, diverter.glowIntensity + dt * 5) : Math.max(0, diverter.glowIntensity - dt * 3);

    // Highlight answer zones based on diverter direction
    answerZones[0].highlighted = diverterDirection === -1;
    answerZones[1].highlighted = diverterDirection === 1;

    // Move robot along conveyor
    if (!robotDiverted && !answerSelected) {
      robot.y += robot.speed * dt;
      robot.wheelAngle += dt * 8;

      // Robot reaches junction
      if (robot.y >= JUNCTION_Y - 20 && diverterDirection !== 0) {
        robotDiverted = true;
        playSound('divert');
      }

      // If robot reaches junction without a direction, slow it and loop
      if (robot.y >= JUNCTION_Y - 30 && diverterDirection === 0) {
        robot.y = JUNCTION_Y - 30;
      }
    }

    // Diverted robot follows path
    if (robotDiverted && !answerSelected) {
      robot.y += robot.speed * 1.5 * dt;
      robot.wheelAngle += dt * 10;

      const zoneY = TRACK_Y_END + 60;
      const progress = (robot.y - JUNCTION_Y) / (zoneY - JUNCTION_Y);
      const targetX = diverterDirection === -1
        ? TRACK_X_CENTER - PATH_SPREAD * Math.min(1, progress * 1.1)
        : TRACK_X_CENTER + PATH_SPREAD * Math.min(1, progress * 1.1);
      robot.x += (targetX - robot.x) * Math.min(1, dt * 6);

      // Robot reaches answer zone
      if (robot.y >= zoneY - 20) {
        answerSelected = true;
        const zoneIndex = diverterDirection === -1 ? 0 : 1;
        selectedZone = zoneIndex;
        const choice = answerZones[zoneIndex].choice;

        if (choice.is_correct) {
          playSound('correct');
          spawnCelebrationParticles(robot.x, robot.y);
        } else {
          playSound('wrong');
        }

        setTimeout(() => {
          engine.end(choice.is_correct, choice.explanation);
        }, 600);
      }
    }

    // Selection flash animation
    if (answerSelected) {
      selectionFlash += dt;
      if (selectedZone >= 0) {
        const zone = answerZones[selectedZone];
        const choice = zone.choice;
        robot.scale = 1 + Math.sin(selectionFlash * 8) * 0.08 * Math.max(0, 1 - selectionFlash * 2);
        if (!choice.is_correct) {
          robot.rotation = Math.sin(selectionFlash * 25) * 0.1 * Math.max(0, 1 - selectionFlash * 2.5);
        }
      }
    }

    // Update particles
    gameParticles = gameParticles.filter(p => {
      p.vy += 400 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.alpha -= dt * 1.5;
      return p.alpha > 0;
    });
  }

  function spawnCelebrationParticles(x, y) {
    const colors = [COLORS.orange, COLORS.amber, COLORS.cyan, COLORS.success];
    for (let i = 0; i < 25; i++) {
      gameParticles.push({
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 300,
        vy: -Math.random() * 250 - 50,
        size: 3 + Math.random() * 5,
        color: colors[Math.floor(Math.random() * colors.length)],
        rotation: Math.random() * Math.PI * 2,
        rotationSpeed: (Math.random() - 0.5) * 8,
        alpha: 1,
      });
    }
  }

  function wrapText(ctx, text, maxWidth) {
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';

    for (const word of words) {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      const metrics = ctx.measureText(testLine);
      if (metrics.width > maxWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    }
    if (currentLine) lines.push(currentLine);
    return lines;
  }

  function drawGame() {
    // Background - factory floor
    ctx.fillStyle = COLORS.bgPrimary;
    ctx.fillRect(0, 0, W, H);

    // Factory floor pattern (subtle grid)
    ctx.strokeStyle = COLORS.borderSubtle;
    ctx.lineWidth = 0.5;
    for (let gx = 0; gx < W; gx += 40) {
      ctx.beginPath();
      ctx.moveTo(gx, 0);
      ctx.lineTo(gx, H);
      ctx.stroke();
    }
    for (let gy = 0; gy < H; gy += 40) {
      ctx.beginPath();
      ctx.moveTo(0, gy);
      ctx.lineTo(W, gy);
      ctx.stroke();
    }

    // Draw conveyor belt (main track)
    drawConveyor(TRACK_X_CENTER, TRACK_Y_START, TRACK_X_CENTER, JUNCTION_Y);

    // Draw diverging paths
    drawDivergingPath(-1); // left
    drawDivergingPath(1);  // right

    // Draw answer zones
    answerZones.forEach((zone, i) => {
      drawAnswerZone(zone, i);
    });

    // Draw diverter mechanism
    drawDiverter();

    // Draw robot
    drawRobot();

    // Draw particles
    gameParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
      ctx.restore();
    });
  }

  function drawConveyor(x1, y1, x2, y2) {
    // Conveyor belt background
    ctx.fillStyle = '#D4D4CC';
    ctx.beginPath();
    ctx.roundRect(x1 - TRACK_WIDTH / 2, y1, TRACK_WIDTH, y2 - y1, 4);
    ctx.fill();

    // Side rails
    ctx.fillStyle = COLORS.textSecondary;
    ctx.fillRect(x1 - TRACK_WIDTH / 2 - 4, y1, 4, y2 - y1);
    ctx.fillRect(x1 + TRACK_WIDTH / 2, y1, 4, y2 - y1);

    // Animated conveyor lines
    ctx.strokeStyle = COLORS.textTertiary;
    ctx.lineWidth = 2;
    for (let cy = y1 + (conveyorOffset % 20); cy < y2; cy += 20) {
      ctx.beginPath();
      ctx.moveTo(x1 - TRACK_WIDTH / 2 + 4, cy);
      ctx.lineTo(x1 + TRACK_WIDTH / 2 - 4, cy);
      ctx.stroke();
    }
  }

  function drawDivergingPath(direction) {
    const startX = TRACK_X_CENTER;
    const endX = TRACK_X_CENTER + direction * PATH_SPREAD;
    const pathEndY = TRACK_Y_END + 40;

    ctx.save();
    ctx.lineWidth = TRACK_WIDTH;
    ctx.strokeStyle = '#D4D4CC';
    ctx.lineCap = 'round';

    // Curved path from junction to answer zone
    ctx.beginPath();
    ctx.moveTo(startX, JUNCTION_Y);
    ctx.quadraticCurveTo(
      startX + direction * PATH_SPREAD * 0.4,
      JUNCTION_Y + (pathEndY - JUNCTION_Y) * 0.45,
      endX,
      pathEndY
    );
    ctx.stroke();

    // Side rail lines
    ctx.lineWidth = 4;
    ctx.strokeStyle = COLORS.textSecondary;

    // Outer rail
    ctx.beginPath();
    ctx.moveTo(startX - TRACK_WIDTH / 2 * (direction === -1 ? 1 : -1) + (direction === -1 ? -2 : 2), JUNCTION_Y);
    ctx.quadraticCurveTo(
      startX + direction * PATH_SPREAD * 0.4 - TRACK_WIDTH / 2 * (direction === -1 ? 1 : -1) + (direction === -1 ? -2 : 2),
      JUNCTION_Y + (pathEndY - JUNCTION_Y) * 0.45,
      endX - TRACK_WIDTH / 2 * (direction === -1 ? 1 : -1) + (direction === -1 ? -2 : 2),
      pathEndY
    );
    ctx.stroke();

    ctx.restore();

    // Animated conveyor marks on diverging paths
    ctx.strokeStyle = COLORS.textTertiary;
    ctx.lineWidth = 2;
    const steps = 8;
    for (let s = 0; s < steps; s++) {
      const t = (s / steps + (conveyorOffset / 20) * (1 / steps)) % 1;
      const px = startX + (endX - startX) * t * t;
      const py = JUNCTION_Y + (pathEndY - JUNCTION_Y) * t;
      ctx.beginPath();
      ctx.arc(px, py, 2, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  function drawDiverter() {
    const dx = diverter.x;
    const dy = diverter.y;

    // Glow effect when activated
    if (diverter.glowIntensity > 0) {
      const glowColor = diverterDirection === -1 ? COLORS.cyan : COLORS.orange;
      ctx.save();
      ctx.globalAlpha = diverter.glowIntensity * 0.3;
      ctx.fillStyle = glowColor;
      ctx.beginPath();
      ctx.arc(dx, dy, 35, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // Base circle
    ctx.fillStyle = COLORS.textSecondary;
    ctx.beginPath();
    ctx.arc(dx, dy, 18, 0, Math.PI * 2);
    ctx.fill();

    // Inner circle
    ctx.fillStyle = diverterDirection !== 0 ? (diverterDirection === -1 ? COLORS.cyan : COLORS.orange) : COLORS.borderStrong;
    ctx.beginPath();
    ctx.arc(dx, dy, 13, 0, Math.PI * 2);
    ctx.fill();

    // Diverter arm
    ctx.save();
    ctx.translate(dx, dy);
    ctx.rotate(diverter.angle);
    ctx.fillStyle = COLORS.textPrimary;
    ctx.beginPath();
    ctx.roundRect(-5, -30, 10, 30, 3);
    ctx.fill();

    // Arrow tip
    ctx.fillStyle = diverterDirection !== 0 ? (diverterDirection === -1 ? COLORS.cyan : COLORS.orange) : COLORS.textSecondary;
    ctx.beginPath();
    ctx.moveTo(0, -36);
    ctx.lineTo(-10, -24);
    ctx.lineTo(10, -24);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // Direction indicators (left/right arrows near diverter)
    const arrowAlpha = 0.3 + Math.sin(gameTime * 4) * 0.15;

    // Left indicator
    ctx.save();
    ctx.globalAlpha = diverterDirection === -1 ? 1 : arrowAlpha;
    ctx.fillStyle = COLORS.cyan;
    ctx.font = "600 18px 'Nunito Sans', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('\u25C0', dx - 50, dy);
    ctx.restore();

    // Right indicator
    ctx.save();
    ctx.globalAlpha = diverterDirection === 1 ? 1 : arrowAlpha;
    ctx.fillStyle = COLORS.orange;
    ctx.font = "600 18px 'Nunito Sans', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('\u25B6', dx + 50, dy);
    ctx.restore();
  }

  function drawRobot() {
    const rx = robot.x;
    const ry = robot.y;

    ctx.save();
    ctx.translate(rx, ry);
    ctx.scale(robot.scale, robot.scale);
    ctx.rotate(robot.rotation);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.beginPath();
    ctx.ellipse(2, robot.h / 2 + 4, robot.w / 2 + 2, 6, 0, 0, Math.PI * 2);
    ctx.fill();

    // Wheels
    ctx.fillStyle = COLORS.textSecondary;
    const wheelSize = 7;
    // Left wheel
    ctx.save();
    ctx.translate(-robot.w / 2 + 4, robot.h / 2 - 2);
    ctx.rotate(robot.wheelAngle);
    ctx.beginPath();
    ctx.arc(0, 0, wheelSize, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = COLORS.textTertiary;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-wheelSize, 0);
    ctx.lineTo(wheelSize, 0);
    ctx.moveTo(0, -wheelSize);
    ctx.lineTo(0, wheelSize);
    ctx.stroke();
    ctx.restore();

    // Right wheel
    ctx.save();
    ctx.translate(robot.w / 2 - 4, robot.h / 2 - 2);
    ctx.rotate(robot.wheelAngle);
    ctx.beginPath();
    ctx.arc(0, 0, wheelSize, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = COLORS.textTertiary;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-wheelSize, 0);
    ctx.lineTo(wheelSize, 0);
    ctx.moveTo(0, -wheelSize);
    ctx.lineTo(0, wheelSize);
    ctx.stroke();
    ctx.restore();

    // Body
    ctx.fillStyle = COLORS.amber;
    ctx.beginPath();
    ctx.roundRect(-robot.w / 2, -robot.h / 2, robot.w, robot.h, 8);
    ctx.fill();

    // Body stripe
    ctx.fillStyle = COLORS.orange;
    ctx.fillRect(-robot.w / 2 + 4, -2, robot.w - 8, 6);

    // Head
    ctx.fillStyle = COLORS.textPrimary;
    ctx.beginPath();
    ctx.roundRect(-12, -robot.h / 2 - 14, 24, 16, 6);
    ctx.fill();

    // Eyes
    const blinking = robot.eyeBlink > 2.8 && robot.eyeBlink < 2.95;
    ctx.fillStyle = COLORS.cyan;
    if (blinking) {
      ctx.fillRect(-7, -robot.h / 2 - 8, 5, 2);
      ctx.fillRect(2, -robot.h / 2 - 8, 5, 2);
    } else {
      ctx.beginPath();
      ctx.arc(-4, -robot.h / 2 - 7, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(4, -robot.h / 2 - 7, 3, 0, Math.PI * 2);
      ctx.fill();
    }

    // Antenna
    ctx.strokeStyle = COLORS.textTertiary;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, -robot.h / 2 - 14);
    ctx.lineTo(0, -robot.h / 2 - 22);
    ctx.stroke();

    // Antenna tip (blinks)
    ctx.fillStyle = Math.sin(gameTime * 6) > 0 ? COLORS.error : COLORS.orange;
    ctx.beginPath();
    ctx.arc(0, -robot.h / 2 - 23, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawAnswerZone(zone, index) {
    if (zone.alpha <= 0) return;

    ctx.save();
    ctx.globalAlpha = zone.alpha;

    const zx = zone.x - zone.w / 2;
    const zy = zone.y - zone.h / 2;

    // Scale animation
    ctx.translate(zone.x, zone.y);
    ctx.scale(zone.scale, zone.scale);
    ctx.translate(-zone.x, -zone.y);

    // Determine colors
    let bgColor = COLORS.bgSurface;
    let borderColor = COLORS.borderSubtle;
    let textColor = COLORS.textPrimary;

    if (answerSelected && selectedZone === index) {
      const choice = zone.choice;
      if (choice.is_correct) {
        bgColor = '#E8F8E5';
        borderColor = COLORS.success;
      } else {
        bgColor = '#FDECEB';
        borderColor = COLORS.error;
      }
    } else if (zone.highlighted) {
      bgColor = index === 0 ? COLORS.cyanLight : '#FFF4ED';
      borderColor = index === 0 ? COLORS.cyan : COLORS.orange;
    }

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    ctx.beginPath();
    ctx.roundRect(zx + 2, zy + 3, zone.w, zone.h, 12);
    ctx.fill();

    // Background
    ctx.fillStyle = bgColor;
    ctx.beginPath();
    ctx.roundRect(zx, zy, zone.w, zone.h, 12);
    ctx.fill();

    // Border
    ctx.strokeStyle = borderColor;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.roundRect(zx, zy, zone.w, zone.h, 12);
    ctx.stroke();

    // Direction label
    ctx.fillStyle = index === 0 ? COLORS.cyan : COLORS.orange;
    ctx.font = "700 14px 'Nunito Sans', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(index === 0 ? '\u25C0 LEFT' : 'RIGHT \u25B6', zone.x, zy + 6);

    // Answer text (wrapped)
    ctx.fillStyle = textColor;
    ctx.font = "500 16px 'Nunito', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';

    const lines = wrapText(ctx, zone.label, zone.w - 24);
    const lineHeight = 19;
    const totalTextHeight = lines.length * lineHeight;
    const textStartY = zy + 22 + (zone.h - 22 - totalTextHeight) / 2;
    lines.forEach((line, li) => {
      ctx.fillText(line, zone.x, textStartY + li * lineHeight);
    });

    ctx.restore();
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;
    if (answerSelected || robotDiverted) return;

    if (e.code === 'ArrowLeft') {
      e.preventDefault();
      if (diverterDirection !== -1) {
        diverterDirection = -1;
        playSound('click');
      }
    } else if (e.code === 'ArrowRight') {
      e.preventDefault();
      if (diverterDirection !== 1) {
        diverterDirection = 1;
        playSound('click');
      }
    }
  }

  // +========================================================================+
  // |  SECTION 4: GAME LOOP - DO NOT MODIFY                                  |
  // |  Standard loop with responsive scaling and DPR support.                |
  // +========================================================================+
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
