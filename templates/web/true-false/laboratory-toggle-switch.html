<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Template</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "true_false",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    bgSurfaceSecondary: '#F5F5F0',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    textTertiary: '#8C8C84',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC',
    panelDark: '#1C1C1A',
    panelMid: '#2A2A27',
    panelLight: '#363633',
    panelBorder: '#424240'
  };

  // === GAME STATE ===
  let switches = [];
  let hoverIndex = -1;
  let selectedIndex = -1;
  let gameTime = 0;
  let answered = false;
  let answerAnimTime = 0;
  let gameParticles = [];
  let sparkParticles = [];

  // Audio context for sounds
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playClickSound() {
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'square';
      osc.frequency.setValueAtTime(800, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.08);
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.12);
    } catch(e) {}
  }

  function playCorrectSound() {
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, ctx.currentTime);
      osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.2, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.4);
    } catch(e) {}
  }

  function playWrongSound() {
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(300, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.35);
    } catch(e) {}
  }

  // Switch dimensions and positions
  const SWITCH_W = 260;
  const SWITCH_H = 300;
  const SWITCH_GAP = 60;
  const PANEL_Y = 80;
  const TEXT_AREA_Y = 420;
  const TEXT_AREA_H = 100;

  function wrapText(ctx, text, maxWidth) {
    const words = text.split(' ');
    const lines = [];
    let currentLine = words[0];
    for (let i = 1; i < words.length; i++) {
      const testLine = currentLine + ' ' + words[i];
      if (ctx.measureText(testLine).width <= maxWidth) {
        currentLine = testLine;
      } else {
        lines.push(currentLine);
        currentLine = words[i];
      }
    }
    lines.push(currentLine);
    return lines;
  }

  function initGame() {
    gameTime = 0;
    hoverIndex = -1;
    selectedIndex = -1;
    answered = false;
    answerAnimTime = 0;
    gameParticles = [];
    sparkParticles = [];

    const totalW = SWITCH_W * 2 + SWITCH_GAP;
    const startX = (W - totalW) / 2;

    switches = QUESTION.choices.map((choice, i) => ({
      x: startX + i * (SWITCH_W + SWITCH_GAP),
      y: PANEL_Y,
      w: SWITCH_W,
      h: SWITCH_H,
      choice: choice,
      isOn: false,
      toggleAnim: 0,
      entranceAnim: 0,
      entranceDelay: i * 0.12,
      scale: 0,
      alpha: 0,
      shakeX: 0,
      glowIntensity: 0,
      hoverScale: 1
    }));
  }

  function spawnSparks(x, y, count) {
    for (let i = 0; i < count; i++) {
      sparkParticles.push({
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 300,
        vy: -Math.random() * 200 - 50,
        size: 2 + Math.random() * 3,
        color: [COLORS.orange, COLORS.amber, COLORS.cyan, '#FFFFFF'][Math.floor(Math.random() * 4)],
        alpha: 1,
        life: 0.4 + Math.random() * 0.4
      });
    }
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;
    gameTime += dt;

    // Entrance animations
    switches.forEach(sw => {
      const elapsed = gameTime - sw.entranceDelay;
      if (elapsed > 0 && sw.scale < 1) {
        const t = Math.min(elapsed / 0.35, 1);
        const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
        sw.scale = t * spring;
        sw.alpha = Math.min(t * 2, 1);
      }
      if (sw.scale >= 0.99 && sw.alpha < 1) {
        sw.scale = 1;
        sw.alpha = 1;
      }
    });

    // Hover animations
    switches.forEach((sw, i) => {
      const target = (hoverIndex === i && !answered) ? 1.03 : 1;
      sw.hoverScale += (target - sw.hoverScale) * dt * 12;
    });

    // Toggle animation
    switches.forEach(sw => {
      const target = sw.isOn ? 1 : 0;
      sw.toggleAnim += (target - sw.toggleAnim) * dt * 10;
    });

    // Glow animation for active switch
    switches.forEach(sw => {
      const target = sw.isOn ? 1 : 0;
      sw.glowIntensity += (target - sw.glowIntensity) * dt * 8;
    });

    // Shake animation
    switches.forEach(sw => {
      if (sw.shakeX !== 0) {
        sw.shakeX *= 0.85;
        if (Math.abs(sw.shakeX) < 0.5) sw.shakeX = 0;
      }
    });

    // Update spark particles
    sparkParticles = sparkParticles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 400 * dt;
      p.alpha -= dt / p.life;
      return p.alpha > 0;
    });

    // Answer delay
    if (answered) {
      answerAnimTime += dt;
      if (answerAnimTime > 0.6) {
        const choice = switches[selectedIndex].choice;
        if (choice.is_correct) {
          playCorrectSound();
        } else {
          playWrongSound();
        }
        engine.end(choice.is_correct, choice.explanation);
      }
    }
  }

  function drawPanel() {
    // Main panel background - dark metallic look
    ctx.fillStyle = COLORS.panelDark;
    ctx.beginPath();
    ctx.roundRect(30, 20, W - 60, H - 40, 16);
    ctx.fill();

    // Panel border
    ctx.strokeStyle = COLORS.panelBorder;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(30, 20, W - 60, H - 40, 16);
    ctx.stroke();

    // Inner panel area
    ctx.fillStyle = COLORS.panelMid;
    ctx.beginPath();
    ctx.roundRect(50, 40, W - 100, H - 80, 12);
    ctx.fill();

    // Top accent line
    const grad = ctx.createLinearGradient(50, 40, W - 50, 40);
    grad.addColorStop(0, 'transparent');
    grad.addColorStop(0.3, COLORS.cyan + '60');
    grad.addColorStop(0.5, COLORS.cyan + 'A0');
    grad.addColorStop(0.7, COLORS.cyan + '60');
    grad.addColorStop(1, 'transparent');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(80, 42);
    ctx.lineTo(W - 80, 42);
    ctx.stroke();

    // Small indicator dots along top
    for (let i = 0; i < 8; i++) {
      const dotX = 120 + i * (W - 240) / 7;
      const pulse = Math.sin(gameTime * 2 + i * 0.5) * 0.3 + 0.7;
      ctx.fillStyle = COLORS.cyan;
      ctx.globalAlpha = pulse * 0.6;
      ctx.beginPath();
      ctx.arc(dotX, 58, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // "LABORATORY CONTROL SYSTEM" label at top
    ctx.font = "600 14px 'Nunito Sans', sans-serif";
    ctx.fillStyle = COLORS.textTertiary;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.letterSpacing = '3px';
    ctx.fillText('LABORATORY CONTROL SYSTEM', W / 2, 58);
    ctx.letterSpacing = '0px';
  }

  function drawSwitch(sw, index) {
    if (sw.alpha <= 0) return;

    ctx.save();
    const cx = sw.x + sw.w / 2;
    const cy = sw.y + sw.h / 2;
    ctx.translate(cx, cy);
    ctx.scale(sw.scale * sw.hoverScale, sw.scale * sw.hoverScale);
    ctx.translate(-cx + sw.shakeX, -cy);
    ctx.globalAlpha = sw.alpha;

    // Switch housing - darker recessed area
    const housingPad = 10;
    ctx.fillStyle = '#141412';
    ctx.beginPath();
    ctx.roundRect(sw.x - housingPad, sw.y - housingPad, sw.w + housingPad * 2, sw.h + housingPad * 2, 16);
    ctx.fill();

    // Glow effect when on
    if (sw.glowIntensity > 0.01) {
      const glowColor = sw.isOn ? (sw.choice.is_correct !== undefined ? COLORS.orange : COLORS.cyan) : COLORS.cyan;
      ctx.shadowColor = glowColor;
      ctx.shadowBlur = 20 * sw.glowIntensity;
      ctx.fillStyle = 'rgba(0,0,0,0)';
      ctx.beginPath();
      ctx.roundRect(sw.x - housingPad, sw.y - housingPad, sw.w + housingPad * 2, sw.h + housingPad * 2, 16);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    // Switch plate background
    ctx.fillStyle = COLORS.panelLight;
    ctx.beginPath();
    ctx.roundRect(sw.x, sw.y, sw.w, sw.h, 12);
    ctx.fill();

    // Switch slot - vertical track
    const slotX = cx - 30;
    const slotY = sw.y + 40;
    const slotW = 60;
    const slotH = 160;

    // Slot background
    ctx.fillStyle = '#0A0A09';
    ctx.beginPath();
    ctx.roundRect(slotX, slotY, slotW, slotH, 30);
    ctx.fill();

    // Status indicators on sides
    // ON indicator (top)
    const onAlpha = sw.toggleAnim;
    ctx.fillStyle = COLORS.success;
    ctx.globalAlpha = sw.alpha * (0.2 + onAlpha * 0.8);
    ctx.beginPath();
    ctx.arc(sw.x + 30, slotY + 30, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = sw.alpha;

    // OFF indicator (bottom)
    const offAlpha = 1 - sw.toggleAnim;
    ctx.fillStyle = COLORS.error;
    ctx.globalAlpha = sw.alpha * (0.2 + offAlpha * 0.8);
    ctx.beginPath();
    ctx.arc(sw.x + 30, slotY + slotH - 30, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = sw.alpha;

    // ON/OFF labels
    ctx.font = "700 14px 'Nunito Sans', sans-serif";
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = COLORS.success;
    ctx.globalAlpha = sw.alpha * (0.3 + onAlpha * 0.7);
    ctx.fillText('ON', sw.x + sw.w - 20, slotY + 30);
    ctx.globalAlpha = sw.alpha;

    ctx.fillStyle = COLORS.error;
    ctx.globalAlpha = sw.alpha * (0.3 + offAlpha * 0.7);
    ctx.fillText('OFF', sw.x + sw.w - 20, slotY + slotH - 30);
    ctx.globalAlpha = sw.alpha;

    // Toggle handle
    const handleY = slotY + 15 + (1 - sw.toggleAnim) * (slotH - 70);
    const handleH = 40;

    // Handle shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.roundRect(slotX + 6, handleY + 4, slotW - 12, handleH, 20);
    ctx.fill();

    // Handle body - metallic gradient
    const handleGrad = ctx.createLinearGradient(slotX, handleY, slotX, handleY + handleH);
    handleGrad.addColorStop(0, '#D0D0C8');
    handleGrad.addColorStop(0.3, '#F5F5F0');
    handleGrad.addColorStop(0.7, '#E0E0D8');
    handleGrad.addColorStop(1, '#B0B0A8');
    ctx.fillStyle = handleGrad;
    ctx.beginPath();
    ctx.roundRect(slotX + 5, handleY, slotW - 10, handleH, 20);
    ctx.fill();

    // Handle grip lines
    ctx.strokeStyle = '#A0A098';
    ctx.lineWidth = 1;
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath();
      ctx.moveTo(cx - 10, handleY + handleH / 2 + i * 6);
      ctx.lineTo(cx + 10, handleY + handleH / 2 + i * 6);
      ctx.stroke();
    }

    // Label plate below switch
    const labelY = sw.y + sw.h - 50;
    ctx.fillStyle = '#1A1A18';
    ctx.beginPath();
    ctx.roundRect(sw.x + 20, labelY, sw.w - 40, 36, 6);
    ctx.fill();

    // Label text (True/False)
    ctx.font = "700 18px 'Belanosima', sans-serif";
    ctx.fillStyle = sw.isOn ? COLORS.orange : '#8C8C84';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(index === 0 ? 'TRUE' : 'FALSE', cx, labelY + 18);

    ctx.restore();
  }

  function drawAnswerText() {
    // Text area below switches
    switches.forEach((sw, i) => {
      if (sw.alpha <= 0) return;
      ctx.save();
      ctx.globalAlpha = sw.alpha;

      const cx = sw.x + sw.w / 2;
      const textY = TEXT_AREA_Y;

      // Text background plate
      ctx.fillStyle = COLORS.panelLight + '80';
      ctx.beginPath();
      ctx.roundRect(sw.x - 10, textY, sw.w + 20, TEXT_AREA_H, 8);
      ctx.fill();

      // Answer text - wrapped
      ctx.font = "400 16px 'Nunito', sans-serif";
      ctx.fillStyle = '#C2C2B8';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';

      const lines = wrapText(ctx, sw.choice.text, sw.w + 10);
      const lineHeight = 22;
      const totalTextH = lines.length * lineHeight;
      const textStartY = textY + (TEXT_AREA_H - totalTextH) / 2;

      lines.forEach((line, j) => {
        ctx.fillText(line, cx, textStartY + j * lineHeight);
      });

      ctx.restore();
    });
  }

  function drawSparks() {
    sparkParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
  }

  function drawGame() {
    // Clear canvas - dark lab background
    ctx.fillStyle = '#0E0E0D';
    ctx.fillRect(0, 0, W, H);

    // Draw panel
    drawPanel();

    // Draw switches
    switches.forEach((sw, i) => drawSwitch(sw, i));

    // Draw answer text
    drawAnswerText();

    // Draw sparks
    drawSparks();
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;

    // Handle click on canvas
    if (e.type === 'click') {
      const { x, y } = screenToLogical(e.clientX, e.clientY);

      switches.forEach((sw, i) => {
        if (answered) return;

        // Check click on switch area including text
        const inSwitch = x >= sw.x - 10 && x <= sw.x + sw.w + 10 &&
                         y >= sw.y - 10 && y <= sw.y + sw.h + 10;
        const inText = x >= sw.x - 10 && x <= sw.x + sw.w + 10 &&
                       y >= TEXT_AREA_Y && y <= TEXT_AREA_Y + TEXT_AREA_H;

        if (inSwitch || inText) {
          playClickSound();
          sw.isOn = true;
          selectedIndex = i;
          answered = true;
          answerAnimTime = 0;

          // Turn off the other switch
          switches.forEach((other, j) => {
            if (j !== i) other.isOn = false;
          });

          // Spawn sparks from the switch
          const cx = sw.x + sw.w / 2;
          spawnSparks(cx, sw.y + 120, 15);

          // If wrong, shake after a moment
          if (!sw.choice.is_correct) {
            setTimeout(() => {
              sw.shakeX = 12;
            }, 200);
          }
        }
      });
    }

    // Handle mouse move for hover effect
    if (e.type === 'mousemove') {
      const { x, y } = screenToLogical(e.clientX, e.clientY);
      hoverIndex = -1;

      switches.forEach((sw, i) => {
        const inSwitch = x >= sw.x - 10 && x <= sw.x + sw.w + 10 &&
                         y >= sw.y - 10 && y <= sw.y + sw.h + 10;
        const inText = x >= sw.x - 10 && x <= sw.x + sw.w + 10 &&
                       y >= TEXT_AREA_Y && y <= TEXT_AREA_Y + TEXT_AREA_H;
        if (inSwitch || inText) {
          hoverIndex = i;
        }
      });

      canvas.style.cursor = hoverIndex >= 0 && !answered ? 'pointer' : 'default';
    }
  }

  // Attach mouse event listeners
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'playing') return;
    handleInput(e);
  });
  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'playing') return;
    handleInput(e);
  });

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
