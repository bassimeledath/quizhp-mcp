<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rocket Launch Commander</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1C1C1A;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #1C1C1A;
      border-radius: 12px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "true_false",
    prompt: "The Earth is the third planet from the Sun.",
    choices: [
      { text: "True", is_correct: true, explanation: "Earth orbits third after Mercury and Venus." },
      { text: "False", is_correct: false, explanation: "Actually, Earth is the third planet." }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  Rocket Launch Commander - True/False game                                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // QuizHP color palette
  const COLORS = {
    bgPrimary: '#1C1C1A',
    bgSurface: '#2A2A27',
    textPrimary: '#F5F5F0',
    textSecondary: '#C2C2B8',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#424240'
  };

  // Reduced motion preference
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // Audio context for sound effects
  let audioCtx = null;
  function getAudioContext() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
  }

  function playSound(type, pitch) {
    if (prefersReducedMotion) return;
    try {
      const ctx = getAudioContext();
      if (ctx.state === 'suspended') ctx.resume();

      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);

      if (type === 'click') {
        osc.frequency.setValueAtTime(800, ctx.currentTime);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.05);
        osc.start();
        osc.stop(ctx.currentTime + 0.05);
      } else if (type === 'beep') {
        osc.frequency.setValueAtTime(pitch || 880, ctx.currentTime);
        gain.gain.setValueAtTime(0.15, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
        osc.start();
        osc.stop(ctx.currentTime + 0.1);
      } else if (type === 'launch') {
        // Rising tone for launch
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(80, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.5);
        gain.gain.setValueAtTime(0.2, ctx.currentTime);
        gain.gain.setValueAtTime(0.25, ctx.currentTime + 0.3);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1.5);
        osc.start();
        osc.stop(ctx.currentTime + 1.5);
      } else if (type === 'explosion') {
        // Noise-like explosion
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
        osc.start();
        osc.stop(ctx.currentTime + 0.5);
      } else if (type === 'success') {
        osc.frequency.setValueAtTime(523, ctx.currentTime);
        osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
        osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.2, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
        osc.start();
        osc.stop(ctx.currentTime + 0.4);
      }
    } catch (e) {
      // Audio not supported
    }
  }

  // Game state
  let rocket = {
    x: W / 2,
    y: 180,
    width: 50,
    height: 100,
    sway: 0,
    vibration: 0
  };

  let buttons = [];
  let particles = [];
  let smokeParticles = [];
  let stars = [];
  let animating = false;
  let animationType = null; // 'countdown' | 'launch' | 'explode'
  let animationTime = 0;
  let hoveredButton = null;
  let pendingResult = null;
  let gameTime = 0;
  let screenShake = { x: 0, y: 0, intensity: 0 };
  let countdownNumber = 3;
  let buttonEntrance = 0;

  // Generate stars once
  function generateStars() {
    stars = [];
    for (let i = 0; i < 80; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * (H - 150),
        size: Math.random() * 2 + 0.5,
        twinkleSpeed: Math.random() * 3 + 1,
        twinkleOffset: Math.random() * Math.PI * 2,
        brightness: Math.random() * 0.5 + 0.5
      });
    }
  }

  function initGame() {
    // Reset rocket position
    rocket = {
      x: W / 2,
      y: 180,
      width: 50,
      height: 100,
      sway: 0,
      vibration: 0
    };

    // Reset state
    particles = [];
    smokeParticles = [];
    animating = false;
    animationType = null;
    animationTime = 0;
    hoveredButton = null;
    pendingResult = null;
    gameTime = 0;
    screenShake = { x: 0, y: 0, intensity: 0 };
    countdownNumber = 3;
    buttonEntrance = 0;

    // Generate stars if not done
    if (stars.length === 0) generateStars();

    // Create buttons from choices
    const choices = QUESTION.choices || [];
    const buttonWidth = 140;
    const buttonHeight = 60;
    const buttonY = 420;
    const spacing = 60;

    buttons = [];
    choices.forEach((choice, i) => {
      buttons.push({
        x: W / 2 - buttonWidth - spacing / 2 + (i * (buttonWidth + spacing)),
        y: buttonY,
        width: buttonWidth,
        height: buttonHeight,
        text: choice.text,
        choiceIndex: i,
        isCorrect: choice.is_correct,
        explanation: choice.explanation,
        color: choice.text === 'True' ? COLORS.success : COLORS.error,
        scale: 0,
        glowIntensity: 0
      });
    });
  }

  // Spawn exhaust flame particles with color gradient
  function spawnExhaustParticle(x, y, intensity = 1) {
    const colors = ['#FFFFFF', '#FFF4ED', COLORS.amber, COLORS.orange, COLORS.orangeHover];
    particles.push({
      x: x + (Math.random() - 0.5) * 15 * intensity,
      y: y,
      vx: (Math.random() - 0.5) * 60 * intensity,
      vy: Math.random() * 120 + 80,
      life: 1.0,
      maxLife: 1.0,
      size: Math.random() * 8 + 4,
      color: colors[Math.floor(Math.random() * colors.length)],
      type: 'flame'
    });
  }

  // Spawn smoke particles
  function spawnSmokeParticle(x, y, vx = 0, vy = 0) {
    smokeParticles.push({
      x: x + (Math.random() - 0.5) * 30,
      y: y,
      vx: vx + (Math.random() - 0.5) * 40,
      vy: vy + Math.random() * 20 - 10,
      life: 1.0,
      maxLife: 1.0,
      size: Math.random() * 15 + 10,
      rotation: Math.random() * Math.PI * 2
    });
  }

  // Spawn explosion debris
  function spawnDebris(x, y) {
    const debrisColors = [COLORS.orange, COLORS.amber, COLORS.error, '#F5F5F0', '#5A5A56'];
    for (let i = 0; i < 60; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 300 + 100;
      particles.push({
        x: x + (Math.random() - 0.5) * 30,
        y: y + (Math.random() - 0.5) * 40,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 50,
        life: 1.0,
        maxLife: 1.0,
        size: Math.random() * 10 + 3,
        color: debrisColors[Math.floor(Math.random() * debrisColors.length)],
        type: 'debris',
        rotation: Math.random() * Math.PI * 2,
        rotationSpeed: (Math.random() - 0.5) * 15,
        gravity: 400
      });
    }
    // Fire burst
    for (let i = 0; i < 30; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 150 + 50;
      particles.push({
        x: x,
        y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 0.8,
        maxLife: 0.8,
        size: Math.random() * 20 + 10,
        color: Math.random() > 0.5 ? COLORS.amber : COLORS.orange,
        type: 'fire'
      });
    }
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Button entrance animation
    if (buttonEntrance < 1 && !prefersReducedMotion) {
      buttonEntrance += dt * 3;
      buttons.forEach((btn, i) => {
        const t = Math.max(0, Math.min(1, (buttonEntrance - i * 0.1) * 2));
        const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
        btn.scale = t * spring;
      });
    } else {
      buttons.forEach(btn => btn.scale = 1);
    }

    // Button glow animation
    buttons.forEach((btn, i) => {
      if (hoveredButton === i) {
        btn.glowIntensity = Math.min(1, btn.glowIntensity + dt * 5);
      } else {
        btn.glowIntensity = Math.max(0, btn.glowIntensity - dt * 3);
      }
    });

    // Rocket idle animation (subtle sway and vibration)
    if (!animating && !prefersReducedMotion) {
      rocket.sway = Math.sin(gameTime * 1.5) * 2;
      rocket.vibration = (Math.random() - 0.5) * 0.5;
    }

    // Screen shake decay
    if (screenShake.intensity > 0) {
      screenShake.intensity *= 0.9;
      screenShake.x = (Math.random() - 0.5) * screenShake.intensity * 20;
      screenShake.y = (Math.random() - 0.5) * screenShake.intensity * 20;
      if (screenShake.intensity < 0.01) {
        screenShake.intensity = 0;
        screenShake.x = 0;
        screenShake.y = 0;
      }
    }

    if (animating) {
      animationTime += dt;

      // Countdown phase
      if (animationType === 'countdown') {
        const newCount = 3 - Math.floor(animationTime);
        if (newCount !== countdownNumber && newCount >= 0) {
          countdownNumber = newCount;
          // Pitch increases as countdown progresses: 3=660Hz, 2=880Hz, 1=1100Hz
          const beepPitch = 660 + (3 - countdownNumber) * 220;
          playSound('beep', beepPitch);
        }

        // Add pre-launch smoke
        if (animationTime > 0.5 && Math.random() < 0.3) {
          spawnSmokeParticle(rocket.x - 40, 285, -30, -20);
          spawnSmokeParticle(rocket.x + 40, 285, 30, -20);
        }

        // Rocket vibration during countdown
        rocket.vibration = (Math.random() - 0.5) * (animationTime * 2);

        if (animationTime >= 3) {
          animationType = 'launch';
          animationTime = 0;
          playSound('launch');
          screenShake.intensity = 0.5;
        }
      }

      // Launch phase
      if (animationType === 'launch') {
        const launchSpeed = 1200 + animationTime * 800;
        rocket.y -= launchSpeed * dt;

        // Intense vibration during launch
        rocket.vibration = (Math.random() - 0.5) * 3;

        // Spawn continuous exhaust particles
        if (animationTime < 0.25) {
          for (let i = 0; i < 4; i++) {
            spawnExhaustParticle(rocket.x, rocket.y + rocket.height);
          }
          // Spawn smoke at launch pad
          if (Math.random() < 0.4) {
            spawnSmokeParticle(rocket.x, 285, (Math.random() - 0.5) * 60, -30);
          }
        }

        // Screen shake during liftoff
        if (animationTime < 0.5) {
          screenShake.intensity = 0.6;
        }
      }

      // Explosion phase
      if (animationType === 'explode') {
        if (animationTime < 0.1) {
          screenShake.intensity = 1.0;
        }
      }

      // Update flame/debris particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        if (p.gravity) {
          p.vy += p.gravity * dt;
        }
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        if (p.rotationSpeed) {
          p.rotation += p.rotationSpeed * dt;
        }
        p.life -= dt * (p.type === 'fire' ? 3 : 1.5);

        if (p.life <= 0) {
          particles.splice(i, 1);
        }
      }

      // Update smoke particles
      for (let i = smokeParticles.length - 1; i >= 0; i--) {
        const p = smokeParticles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.size += dt * 20;
        p.life -= dt * 0.8;
        p.rotation += dt * 0.5;

        if (p.life <= 0) {
          smokeParticles.splice(i, 1);
        }
      }

      // Check if animation complete
      if (pendingResult !== null) {
        if (pendingResult.isCorrect) {
          // For correct answers, only end after launch phase has run for 0.25s
          if (animationType === 'launch' && animationTime >= 0.25) {
            playSound('success');
            engine.end(pendingResult.isCorrect, pendingResult.explanation);
          }
        } else {
          // For wrong answers, end after 2s of explosion
          if (animationTime >= 2.0) {
            engine.end(pendingResult.isCorrect, pendingResult.explanation);
          }
        }
      }
    }
  }

  function drawGame() {
    // Apply screen shake
    ctx.save();
    ctx.translate(screenShake.x, screenShake.y);

    // Clear canvas with background gradient
    const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
    bgGrad.addColorStop(0, '#0a0a12');
    bgGrad.addColorStop(0.7, '#1C1C1A');
    bgGrad.addColorStop(1, '#2A2A27');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(-20, -20, W + 40, H + 40);

    // Draw twinkling stars
    stars.forEach(star => {
      const twinkle = prefersReducedMotion ? star.brightness :
        star.brightness * (0.6 + 0.4 * Math.sin(gameTime * star.twinkleSpeed + star.twinkleOffset));
      ctx.globalAlpha = twinkle;
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Draw smoke particles (behind everything)
    for (const p of smokeParticles) {
      ctx.globalAlpha = p.life * 0.3;
      ctx.fillStyle = '#8C8C84';
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.beginPath();
      ctx.arc(0, 0, p.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    ctx.globalAlpha = 1;

    // Draw launch pad with details
    // Support structure
    ctx.fillStyle = '#424240';
    ctx.fillRect(rocket.x - 70, 260, 10, 40);
    ctx.fillRect(rocket.x + 60, 260, 10, 40);
    // Cross beams
    ctx.fillRect(rocket.x - 70, 270, 140, 6);
    // Main platform
    const padGrad = ctx.createLinearGradient(0, 280, 0, 300);
    padGrad.addColorStop(0, '#5A5A56');
    padGrad.addColorStop(1, '#363633');
    ctx.fillStyle = padGrad;
    ctx.fillRect(rocket.x - 65, 280, 130, 20);
    // Platform highlight
    ctx.fillStyle = '#6a6a66';
    ctx.fillRect(rocket.x - 65, 280, 130, 3);

    // Draw rocket (only if not launched off screen and not exploded)
    if (rocket.y < H && animationType !== 'explode') {
      const rX = rocket.x + rocket.sway + rocket.vibration;
      const rY = rocket.y;
      const rW = rocket.width;
      const rH = rocket.height;

      // Engine glow when launching or countdown
      if (animationType === 'launch' || (animationType === 'countdown' && animationTime > 2)) {
        const glowIntensity = animationType === 'launch' ? 1 : (animationTime - 2);
        ctx.save();
        const glowGrad = ctx.createRadialGradient(rX, rY + rH + 10, 0, rX, rY + rH + 10, 60 * glowIntensity);
        glowGrad.addColorStop(0, `rgba(255, 255, 255, ${0.8 * glowIntensity})`);
        glowGrad.addColorStop(0.2, `rgba(245, 167, 66, ${0.6 * glowIntensity})`);
        glowGrad.addColorStop(0.5, `rgba(232, 122, 62, ${0.3 * glowIntensity})`);
        glowGrad.addColorStop(1, 'rgba(232, 122, 62, 0)');
        ctx.fillStyle = glowGrad;
        ctx.beginPath();
        ctx.arc(rX, rY + rH + 10, 60 * glowIntensity, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      // Rocket body with gradient
      const bodyGrad = ctx.createLinearGradient(rX - rW/2, 0, rX + rW/2, 0);
      bodyGrad.addColorStop(0, '#C2C2B8');
      bodyGrad.addColorStop(0.3, '#F5F5F0');
      bodyGrad.addColorStop(0.7, '#F5F5F0');
      bodyGrad.addColorStop(1, '#C2C2B8');
      ctx.fillStyle = bodyGrad;
      ctx.fillRect(rX - rW / 2, rY + 20, rW, rH - 40);

      // Rocket stripe
      ctx.fillStyle = COLORS.cyan;
      ctx.fillRect(rX - rW / 2, rY + 45, rW, 8);

      // Rocket nose cone
      ctx.fillStyle = COLORS.orange;
      ctx.beginPath();
      ctx.moveTo(rX, rY);
      ctx.lineTo(rX - rW / 2, rY + 22);
      ctx.lineTo(rX + rW / 2, rY + 22);
      ctx.closePath();
      ctx.fill();

      // Nose cone highlight
      ctx.fillStyle = COLORS.amber;
      ctx.beginPath();
      ctx.moveTo(rX, rY + 3);
      ctx.lineTo(rX - rW / 4, rY + 18);
      ctx.lineTo(rX + rW / 8, rY + 18);
      ctx.closePath();
      ctx.fill();

      // Rocket fins
      ctx.fillStyle = COLORS.orange;
      ctx.beginPath();
      ctx.moveTo(rX - rW / 2, rY + rH - 25);
      ctx.lineTo(rX - rW / 2 - 18, rY + rH);
      ctx.lineTo(rX - rW / 2, rY + rH);
      ctx.closePath();
      ctx.fill();

      ctx.beginPath();
      ctx.moveTo(rX + rW / 2, rY + rH - 25);
      ctx.lineTo(rX + rW / 2 + 18, rY + rH);
      ctx.lineTo(rX + rW / 2, rY + rH);
      ctx.closePath();
      ctx.fill();

      // Center fin
      ctx.fillStyle = COLORS.orangeHover;
      ctx.beginPath();
      ctx.moveTo(rX, rY + rH - 15);
      ctx.lineTo(rX - 8, rY + rH);
      ctx.lineTo(rX + 8, rY + rH);
      ctx.closePath();
      ctx.fill();

      // Rocket window with glow
      ctx.fillStyle = COLORS.cyan;
      ctx.beginPath();
      ctx.arc(rX, rY + 35, 10, 0, Math.PI * 2);
      ctx.fill();
      // Window highlight
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      ctx.arc(rX - 3, rY + 32, 4, 0, Math.PI * 2);
      ctx.fill();
      // Window outline
      ctx.strokeStyle = '#2A2A27';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(rX, rY + 35, 10, 0, Math.PI * 2);
      ctx.stroke();

      // Engine nozzle
      ctx.fillStyle = '#424240';
      ctx.beginPath();
      ctx.moveTo(rX - 12, rY + rH - 20);
      ctx.lineTo(rX - 15, rY + rH);
      ctx.lineTo(rX + 15, rY + rH);
      ctx.lineTo(rX + 12, rY + rH - 20);
      ctx.closePath();
      ctx.fill();
    }

    // Draw fire particles (explosion)
    for (const p of particles) {
      if (p.type === 'fire') {
        ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
        const fireGrad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
        fireGrad.addColorStop(0, '#FFFFFF');
        fireGrad.addColorStop(0.3, p.color);
        fireGrad.addColorStop(1, 'rgba(232, 93, 74, 0)');
        ctx.fillStyle = fireGrad;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Draw flame particles
    for (const p of particles) {
      if (p.type === 'flame') {
        ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * (0.5 + p.life * 0.5), 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Draw debris particles
    for (const p of particles) {
      if (p.type === 'debris') {
        ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
        ctx.fillStyle = p.color;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation || 0);
        ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
        ctx.restore();
      }
    }
    ctx.globalAlpha = 1;

    // Draw countdown number
    if (animationType === 'countdown' && countdownNumber > 0) {
      ctx.fillStyle = COLORS.textPrimary;
      ctx.font = "bold 72px 'Belanosima', sans-serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const countScale = 1 + (animationTime % 1) * 0.2;
      ctx.save();
      ctx.translate(W / 2, H / 2 + 50);
      if (!prefersReducedMotion) ctx.scale(countScale, countScale);
      ctx.globalAlpha = 1 - (animationTime % 1) * 0.5;
      ctx.fillText(countdownNumber.toString(), 0, 0);
      ctx.restore();
      ctx.globalAlpha = 1;
    }

    // Draw buttons (only if not animating)
    if (!animating) {
      for (let i = 0; i < buttons.length; i++) {
        const btn = buttons[i];
        const btnScale = btn.scale || 1;

        ctx.save();
        ctx.translate(btn.x + btn.width / 2, btn.y + btn.height / 2);
        ctx.scale(btnScale, btnScale);
        ctx.translate(-(btn.x + btn.width / 2), -(btn.y + btn.height / 2));

        // Button glow
        if (btn.glowIntensity > 0) {
          ctx.shadowColor = COLORS.cyan;
          ctx.shadowBlur = 20 * btn.glowIntensity;
        }

        // Button shadow
        ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
        ctx.beginPath();
        ctx.roundRect(btn.x + 4, btn.y + 4, btn.width, btn.height, 12);
        ctx.fill();

        // Button background gradient
        const btnGrad = ctx.createLinearGradient(0, btn.y, 0, btn.y + btn.height);
        const baseColor = btn.color;
        btnGrad.addColorStop(0, baseColor);
        btnGrad.addColorStop(1, btn.text === 'True' ? '#5AAF4A' : '#D04A3A');
        ctx.fillStyle = btnGrad;
        ctx.beginPath();
        ctx.roundRect(btn.x, btn.y, btn.width, btn.height, 12);
        ctx.fill();

        ctx.shadowBlur = 0;

        // Button border
        ctx.strokeStyle = hoveredButton === i ? COLORS.cyan : 'rgba(255, 255, 255, 0.3)';
        ctx.lineWidth = hoveredButton === i ? 3 : 2;
        ctx.beginPath();
        ctx.roundRect(btn.x, btn.y, btn.width, btn.height, 12);
        ctx.stroke();

        // Button text
        ctx.fillStyle = '#FFFFFF';
        ctx.font = "bold 24px 'Nunito Sans', sans-serif";
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(btn.text, btn.x + btn.width / 2, btn.y + btn.height / 2);

        ctx.restore();
      }
    }

    ctx.restore(); // End screen shake transform
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;
    // No keyboard controls for this game
  }

  // Mouse move handler for button hover
  canvas.addEventListener('mousemove', (ev) => {
    if (gameState !== 'playing' || animating) return;

    const { x, y } = screenToLogical(ev.clientX, ev.clientY);

    // Check button hover
    const prevHovered = hoveredButton;
    hoveredButton = null;
    for (let i = 0; i < buttons.length; i++) {
      const btn = buttons[i];
      if (x >= btn.x && x <= btn.x + btn.width &&
          y >= btn.y && y <= btn.y + btn.height) {
        hoveredButton = i;
        canvas.style.cursor = 'pointer';
        return;
      }
    }
    canvas.style.cursor = 'default';
  });

  // Mouse click handler for button selection
  canvas.addEventListener('click', (ev) => {
    if (gameState !== 'playing' || animating) return;

    const { x, y } = screenToLogical(ev.clientX, ev.clientY);

    // Check button click
    for (const btn of buttons) {
      if (x >= btn.x && x <= btn.x + btn.width &&
          y >= btn.y && y <= btn.y + btn.height) {
        // Button clicked!
        playSound('click');
        animating = true;
        animationTime = 0;
        pendingResult = { isCorrect: btn.isCorrect, explanation: btn.explanation };

        if (btn.isCorrect) {
          // Start countdown sequence
          animationType = 'countdown';
          countdownNumber = 3;
        } else {
          // Immediate explosion
          animationType = 'explode';
          playSound('explosion');
          spawnDebris(rocket.x, rocket.y + rocket.height / 2);
          screenShake.intensity = 1.0;
        }

        break;
      }
    }
  });

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });


  // Cursor change handler for end screen buttons
  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'ended') {
      canvas.style.cursor = 'default';
      return;
    }
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    if (gameResult) {
      if (pointInRect(x, y, restartButton) || pointInRect(x, y, nextButton)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    } else {
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    }
    canvas.style.cursor = 'default';
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
