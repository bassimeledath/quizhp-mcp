<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Answer Pump</title>
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "true_false",
    prompt: "Lightning never strikes the same place twice.",
    choices: [
      { text: "True", is_correct: false, explanation: "Lightning frequently strikes the same tall objects multiple times." },
      { text: "False", is_correct: true, explanation: "Landmarks like skyscrapers are struck repeatedly." }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  Answer Pump - True/False quiz game with pressure pumps                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === AUDIO SETUP ===
  let audioCtx = null;

  function getAudioContext() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
  }

  function playPumpSound() {
    const ctx = getAudioContext();
    if (ctx.state === 'suspended') ctx.resume();

    // Create a satisfying "whoosh/pump" sound
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const filter = ctx.createBiquadFilter();

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);

    // Low frequency sweep for pump effect
    osc.type = 'sine';
    osc.frequency.setValueAtTime(120, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(60, ctx.currentTime + 0.15);

    // Bandpass filter for whoosh character
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(400, ctx.currentTime);
    filter.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.15);

    // Quick attack and decay
    gain.gain.setValueAtTime(0.4, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);

    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.15);

    // Add a subtle click/thump at the start
    const clickOsc = ctx.createOscillator();
    const clickGain = ctx.createGain();
    clickOsc.connect(clickGain);
    clickGain.connect(ctx.destination);

    clickOsc.type = 'sine';
    clickOsc.frequency.setValueAtTime(200, ctx.currentTime);
    clickOsc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.05);

    clickGain.gain.setValueAtTime(0.3, ctx.currentTime);
    clickGain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.05);

    clickOsc.start(ctx.currentTime);
    clickOsc.stop(ctx.currentTime + 0.05);
  }

  function playExplosionSound() {
    const ctx = getAudioContext();
    if (ctx.state === 'suspended') ctx.resume();

    // Create noise for explosion
    const bufferSize = ctx.sampleRate * 0.4;
    const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const output = noiseBuffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      output[i] = Math.random() * 2 - 1;
    }

    const noise = ctx.createBufferSource();
    noise.buffer = noiseBuffer;

    const noiseFilter = ctx.createBiquadFilter();
    noiseFilter.type = 'lowpass';
    noiseFilter.frequency.setValueAtTime(2000, ctx.currentTime);
    noiseFilter.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.3);

    const noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(0.5, ctx.currentTime);
    noiseGain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);

    noise.connect(noiseFilter);
    noiseFilter.connect(noiseGain);
    noiseGain.connect(ctx.destination);

    noise.start(ctx.currentTime);
    noise.stop(ctx.currentTime + 0.4);

    // Add a low boom/thump
    const boom = ctx.createOscillator();
    const boomGain = ctx.createGain();
    boom.connect(boomGain);
    boomGain.connect(ctx.destination);

    boom.type = 'sine';
    boom.frequency.setValueAtTime(150, ctx.currentTime);
    boom.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + 0.3);

    boomGain.gain.setValueAtTime(0.6, ctx.currentTime);
    boomGain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);

    boom.start(ctx.currentTime);
    boom.stop(ctx.currentTime + 0.3);

    // Add a pop/crack at the start
    const pop = ctx.createOscillator();
    const popGain = ctx.createGain();
    pop.connect(popGain);
    popGain.connect(ctx.destination);

    pop.type = 'square';
    pop.frequency.setValueAtTime(800, ctx.currentTime);
    pop.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.05);

    popGain.gain.setValueAtTime(0.3, ctx.currentTime);
    popGain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.08);

    pop.start(ctx.currentTime);
    pop.stop(ctx.currentTime + 0.08);
  }

  // === GAME STATE ===
  let pumps = [];
  let particles = [];
  let animationPhase = 'playing'; // 'playing' | 'exploding'
  let explosionTimer = 0;
  let selectedIndex = -1;

  // Pump configuration
  const PUMP_WIDTH = 120;
  const PUMP_HEIGHT = 220;
  const PUMP_SPACING = 140;
  const PUMP_Y = 160;
  const BUTTON_RADIUS = 35;
  const CLICKS_TO_FILL = 6;
  const PRESSURE_PER_CLICK = 100 / CLICKS_TO_FILL;

  function initGame() {
    pumps = [];
    particles = [];
    animationPhase = 'playing';
    explosionTimer = 0;
    selectedIndex = -1;

    // Create pumps for True/False choices
    const totalWidth = PUMP_WIDTH * 2 + PUMP_SPACING;
    const startX = (W - totalWidth) / 2;

    QUESTION.choices.forEach((choice, i) => {
      pumps.push({
        x: startX + i * (PUMP_WIDTH + PUMP_SPACING),
        y: PUMP_Y,
        pressure: 0,
        bounceScale: 1,
        bounceTimer: 0,
        label: choice.text,
        choice: choice
      });
    });
  }

  function pumpAction(index) {
    if (animationPhase !== 'playing' || gameState !== 'playing') return;

    const pump = pumps[index];
    pump.pressure = Math.min(100, pump.pressure + PRESSURE_PER_CLICK);
    pump.bounceScale = 0.8;
    pump.bounceTimer = 0.12;

    // Check if fully pumped
    if (pump.pressure >= 100) {
      selectedIndex = index;
      animationPhase = 'exploding';
      explosionTimer = 0.5;
      createExplosion(pump);
      playExplosionSound();
    } else {
      // Play pump sound for each pump action
      playPumpSound();
    }
  }

  function createExplosion(pump) {
    const cx = pump.x + PUMP_WIDTH / 2;
    const cy = pump.y + PUMP_HEIGHT / 2;
    const color = pump.choice.is_correct ? '#4ADE80' : '#F87171';

    // Create 12 particles radiating outward
    for (let i = 0; i < 12; i++) {
      const angle = (i / 12) * Math.PI * 2;
      const speed = 180 + Math.random() * 80;
      particles.push({
        x: cx,
        y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        color: color,
        size: 10 + Math.random() * 8
      });
    }
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    // Update pump bounce animations
    pumps.forEach(pump => {
      if (pump.bounceTimer > 0) {
        pump.bounceTimer -= dt;
        const t = 1 - (pump.bounceTimer / 0.12);
        pump.bounceScale = 0.8 + 0.2 * t;
        if (pump.bounceTimer <= 0) {
          pump.bounceScale = 1;
        }
      }
    });

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 300 * dt; // gravity
      p.life -= dt * 1.8;
      if (p.life <= 0) {
        particles.splice(i, 1);
      }
    }

    // Handle explosion phase
    if (animationPhase === 'exploding') {
      explosionTimer -= dt;
      if (explosionTimer <= 0) {
        const choice = pumps[selectedIndex].choice;
        engine.end(choice.is_correct, choice.explanation);
      }
    }
  }

  function drawGame() {
    // Clear canvas with dark background
    ctx.fillStyle = '#16213e';
    ctx.fillRect(0, 0, W, H);

    // Draw pumps
    pumps.forEach((pump, i) => {
      const cx = pump.x + PUMP_WIDTH / 2;

      // Draw answer label above pump
      ctx.fillStyle = '#E0E0E0';
      ctx.font = 'bold 28px system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText(pump.label, cx, pump.y - 15);

      // Draw pump body
      ctx.fillStyle = '#2a3f5f';
      ctx.strokeStyle = '#4a6fa5';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.roundRect(pump.x, pump.y, PUMP_WIDTH, PUMP_HEIGHT, 8);
      ctx.fill();
      ctx.stroke();

      // Draw pressure meter (fills from bottom)
      const meterPadding = 12;
      const meterWidth = PUMP_WIDTH - meterPadding * 2;
      const meterHeight = PUMP_HEIGHT - meterPadding * 2;
      const fillHeight = (pump.pressure / 100) * meterHeight;

      // Meter background
      ctx.fillStyle = '#1a2a3e';
      ctx.fillRect(pump.x + meterPadding, pump.y + meterPadding, meterWidth, meterHeight);

      // Meter fill (gradient effect)
      if (fillHeight > 0) {
        const gradient = ctx.createLinearGradient(
          pump.x + meterPadding, pump.y + PUMP_HEIGHT - meterPadding - fillHeight,
          pump.x + meterPadding, pump.y + PUMP_HEIGHT - meterPadding
        );
        gradient.addColorStop(0, '#E87A3E');
        gradient.addColorStop(1, '#c15f3c');
        ctx.fillStyle = gradient;
        ctx.fillRect(
          pump.x + meterPadding,
          pump.y + meterPadding + (meterHeight - fillHeight),
          meterWidth,
          fillHeight
        );
      }

      // Meter border
      ctx.strokeStyle = '#4a6fa5';
      ctx.lineWidth = 2;
      ctx.strokeRect(pump.x + meterPadding, pump.y + meterPadding, meterWidth, meterHeight);

      // Draw pressure marks
      ctx.strokeStyle = '#5a7fb5';
      ctx.lineWidth = 1;
      for (let j = 1; j < 5; j++) {
        const markY = pump.y + meterPadding + (meterHeight * j / 5);
        ctx.beginPath();
        ctx.moveTo(pump.x + meterPadding, markY);
        ctx.lineTo(pump.x + meterPadding + 8, markY);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(pump.x + PUMP_WIDTH - meterPadding - 8, markY);
        ctx.lineTo(pump.x + PUMP_WIDTH - meterPadding, markY);
        ctx.stroke();
      }

      // Draw percentage below pump
      ctx.fillStyle = '#B0B0B0';
      ctx.font = '20px system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(Math.round(pump.pressure) + '%', cx, pump.y + PUMP_HEIGHT + 12);

      // Draw pump button
      const btnY = pump.y + PUMP_HEIGHT + 60;
      const btnRadius = BUTTON_RADIUS * pump.bounceScale;

      // Button shadow
      ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
      ctx.beginPath();
      ctx.arc(cx + 3, btnY + 3, btnRadius, 0, Math.PI * 2);
      ctx.fill();

      // Button background
      ctx.fillStyle = '#E87A3E';
      ctx.beginPath();
      ctx.arc(cx, btnY, btnRadius, 0, Math.PI * 2);
      ctx.fill();

      // Button border
      ctx.strokeStyle = '#c15f3c';
      ctx.lineWidth = 3;
      ctx.stroke();

      // Triangle icon
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      const triSize = 16 * pump.bounceScale;
      ctx.moveTo(cx, btnY - triSize);
      ctx.lineTo(cx - triSize, btnY + triSize * 0.6);
      ctx.lineTo(cx + triSize, btnY + triSize * 0.6);
      ctx.closePath();
      ctx.fill();
    });

    // Draw particles
    particles.forEach(p => {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;

    // T key pumps first answer (True), F key pumps second answer (False)
    if (e.code === 'KeyT') {
      pumpAction(0);
    } else if (e.code === 'KeyF') {
      pumpAction(1);
    }
  }

  // Click handler for pump buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'playing' || animationPhase !== 'playing') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    pumps.forEach((pump, i) => {
      const cx = pump.x + PUMP_WIDTH / 2;
      const btnY = pump.y + PUMP_HEIGHT + 60;
      const dist = Math.sqrt((x - cx) ** 2 + (y - btnY) ** 2);

      if (dist <= BUTTON_RADIUS) {
        pumpAction(i);
      }
    });
  });

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });


  // Cursor change handler for end screen buttons
  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'ended') {
      canvas.style.cursor = 'default';
      return;
    }
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    if (gameResult) {
      if (pointInRect(x, y, restartButton) || pointInRect(x, y, nextButton)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    } else {
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    }
    canvas.style.cursor = 'default';
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
