<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Switchboard Lever Pull</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    bgSurfaceSecondary: '#F5F5F0',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    textTertiary: '#8C8C84',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    cyanHover: '#45B8B0',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC',
    panelDark: '#3A3A38',
    panelMid: '#4A4A47',
    panelLight: '#5A5A56',
    metalDark: '#6E6E68',
    metalMid: '#8C8C84',
    metalLight: '#A8A89E',
    rivetColor: '#555550',
    warningYellow: '#FFD700',
  };

  // === SOUND SYSTEM ===
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playClickSound() {
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'square';
      osc.frequency.setValueAtTime(220, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(110, ctx.currentTime + 0.08);
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.12);
    } catch (e) {}
  }

  function playLeverPullSound() {
    try {
      const ctx = getAudioCtx();
      // Mechanical clunk
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(80, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.2, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.2);
      // Metal clang
      const osc2 = ctx.createOscillator();
      const gain2 = ctx.createGain();
      osc2.connect(gain2);
      gain2.connect(ctx.destination);
      osc2.type = 'triangle';
      osc2.frequency.setValueAtTime(600, ctx.currentTime + 0.05);
      osc2.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.3);
      gain2.gain.setValueAtTime(0.1, ctx.currentTime + 0.05);
      gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
      osc2.start(ctx.currentTime + 0.05);
      osc2.stop(ctx.currentTime + 0.35);
    } catch (e) {}
  }

  function playCorrectSound() {
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, ctx.currentTime);
      osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.2, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.4);
    } catch (e) {}
  }

  function playWrongSound() {
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.35);
    } catch (e) {}
  }

  // === GAME STATE ===
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  let levers = [];
  let hoveredLever = -1;
  let selectedLever = -1;
  let leverPullProgress = 0; // 0 = up, 1 = fully pulled
  let pullAnimating = false;
  let answerResolved = false;
  let feedbackTimer = 0;
  let sparkParticles = [];
  let entranceProgress = 0;
  let panelScrews = [];
  let indicatorLights = [];
  let ambientTime = 0;

  // Word wrap helper for answer text
  function wrapText(text, maxWidth, font) {
    ctx.font = font;
    const words = text.split(' ');
    const lines = [];
    let currentLine = words[0];
    for (let i = 1; i < words.length; i++) {
      const testLine = currentLine + ' ' + words[i];
      if (ctx.measureText(testLine).width <= maxWidth) {
        currentLine = testLine;
      } else {
        lines.push(currentLine);
        currentLine = words[i];
      }
    }
    lines.push(currentLine);
    return lines;
  }

  function initGame() {
    const choices = QUESTION.choices.slice(0, 2);

    // Lever dimensions and positions
    const leverW = 260;
    const leverH = 320;
    const gap = 60;
    const startX = (W - leverW * 2 - gap) / 2;
    const startY = 120;

    levers = choices.map((choice, i) => ({
      x: startX + i * (leverW + gap),
      y: startY,
      w: leverW,
      h: leverH,
      choice: choice,
      index: i,
      pullProgress: 0,
      hovered: false,
      scale: prefersReducedMotion ? 1 : 0,
      alpha: prefersReducedMotion ? 1 : 0,
      shakeX: 0,
      glowIntensity: 0,
    }));

    hoveredLever = -1;
    selectedLever = -1;
    leverPullProgress = 0;
    pullAnimating = false;
    answerResolved = false;
    feedbackTimer = 0;
    sparkParticles = [];
    entranceProgress = 0;
    ambientTime = 0;

    // Create panel screws
    panelScrews = [
      { x: 30, y: 30 }, { x: W - 30, y: 30 },
      { x: 30, y: H - 30 }, { x: W - 30, y: H - 30 },
      { x: W / 2, y: 25 }, { x: W / 2, y: H - 25 },
    ];

    // Indicator lights along the top
    indicatorLights = [];
    for (let i = 0; i < 8; i++) {
      indicatorLights.push({
        x: 100 + i * 75,
        y: 60,
        on: Math.random() > 0.5,
        blinkRate: 1 + Math.random() * 3,
      });
    }

    // Entrance animation
    if (!prefersReducedMotion) {
      levers.forEach((lever, i) => {
        const delay = i * 80;
        const duration = 400;
        const startTime = performance.now() + delay;
        function animateEntrance(now) {
          const t = Math.min((now - startTime) / duration, 1);
          if (t < 0) { requestAnimationFrame(animateEntrance); return; }
          const spring = 1 + Math.sin(t * Math.PI * 2) * 0.15 * (1 - t);
          lever.scale = t * spring;
          lever.alpha = Math.min(t * 1.5, 1);
          if (t < 1) requestAnimationFrame(animateEntrance);
          else { lever.scale = 1; lever.alpha = 1; }
        }
        requestAnimationFrame(animateEntrance);
      });
    }
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    ambientTime += dt;

    // Update indicator lights
    indicatorLights.forEach(light => {
      if (Math.sin(ambientTime * light.blinkRate * Math.PI * 2) > 0.7) {
        light.on = !light.on;
      }
    });

    // Animate lever pull
    if (pullAnimating && selectedLever >= 0) {
      const lever = levers[selectedLever];
      lever.pullProgress += dt * 3.5;
      if (lever.pullProgress >= 1) {
        lever.pullProgress = 1;
        pullAnimating = false;
        answerResolved = true;
        feedbackTimer = 0;

        // Spawn sparks at the lever position
        const sparkX = lever.x + lever.w / 2;
        const sparkY = lever.y + lever.h * 0.7;
        for (let i = 0; i < 20; i++) {
          sparkParticles.push({
            x: sparkX,
            y: sparkY,
            vx: (Math.random() - 0.5) * 300,
            vy: -Math.random() * 200 - 50,
            size: 2 + Math.random() * 4,
            color: [COLORS.orange, COLORS.amber, COLORS.cyan, COLORS.warningYellow][Math.floor(Math.random() * 4)],
            life: 1,
            gravity: 400,
          });
        }

        // Play feedback sound
        if (lever.choice.is_correct) {
          playCorrectSound();
        } else {
          playWrongSound();
        }
      }
    }

    // Feedback phase after lever is pulled
    if (answerResolved) {
      feedbackTimer += dt;
      const lever = levers[selectedLever];

      // Correct: scale pulse
      if (lever.choice.is_correct && !prefersReducedMotion) {
        lever.glowIntensity = Math.sin(feedbackTimer * 8) * 0.3 + 0.7;
      }

      // Wrong: shake
      if (!lever.choice.is_correct && !prefersReducedMotion && feedbackTimer < 0.5) {
        const decay = 1 - feedbackTimer / 0.5;
        lever.shakeX = Math.sin(feedbackTimer * Math.PI * 20) * 8 * decay;
      } else if (!lever.choice.is_correct) {
        lever.shakeX = 0;
      }

      if (feedbackTimer > 0.8) {
        engine.end(lever.choice.is_correct, lever.choice.explanation);
      }
    }

    // Update spark particles
    sparkParticles.forEach(p => {
      p.vy += p.gravity * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt * 2;
    });
    sparkParticles = sparkParticles.filter(p => p.life > 0);

    // Hover glow
    levers.forEach((lever, i) => {
      if (i === hoveredLever && selectedLever < 0) {
        lever.glowIntensity = Math.min(lever.glowIntensity + dt * 4, 1);
      } else if (selectedLever < 0) {
        lever.glowIntensity = Math.max(lever.glowIntensity - dt * 4, 0);
      }
    });
  }

  function drawGame() {
    // === BACKGROUND: Industrial metal panel ===
    // Main panel gradient
    const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
    bgGrad.addColorStop(0, '#4A4A47');
    bgGrad.addColorStop(0.3, '#3A3A38');
    bgGrad.addColorStop(0.7, '#333331');
    bgGrad.addColorStop(1, '#2A2A27');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    // Metal texture lines
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    for (let y = 0; y < H; y += 4) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }

    // Panel border (riveted edges)
    ctx.strokeStyle = '#5A5A56';
    ctx.lineWidth = 3;
    ctx.strokeRect(8, 8, W - 16, H - 16);
    ctx.strokeStyle = '#2A2A27';
    ctx.lineWidth = 2;
    ctx.strokeRect(12, 12, W - 24, H - 24);

    // Draw panel screws
    panelScrews.forEach(screw => {
      ctx.beginPath();
      ctx.arc(screw.x, screw.y, 8, 0, Math.PI * 2);
      ctx.fillStyle = '#5A5A56';
      ctx.fill();
      ctx.strokeStyle = '#3A3A38';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // Cross pattern on screw
      ctx.strokeStyle = '#4A4A47';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(screw.x - 4, screw.y);
      ctx.lineTo(screw.x + 4, screw.y);
      ctx.moveTo(screw.x, screw.y - 4);
      ctx.lineTo(screw.x, screw.y + 4);
      ctx.stroke();
    });

    // Indicator lights across top
    indicatorLights.forEach(light => {
      // Light housing
      ctx.beginPath();
      ctx.arc(light.x, light.y, 10, 0, Math.PI * 2);
      ctx.fillStyle = '#2A2A27';
      ctx.fill();
      ctx.strokeStyle = '#5A5A56';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Light itself
      const isOn = Math.sin(ambientTime * light.blinkRate) > 0;
      if (isOn) {
        ctx.beginPath();
        ctx.arc(light.x, light.y, 6, 0, Math.PI * 2);
        const lightGrad = ctx.createRadialGradient(light.x, light.y, 0, light.x, light.y, 6);
        lightGrad.addColorStop(0, '#FFE080');
        lightGrad.addColorStop(1, '#AA8020');
        ctx.fillStyle = lightGrad;
        ctx.fill();
        // Glow
        ctx.beginPath();
        ctx.arc(light.x, light.y, 14, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 220, 100, 0.15)';
        ctx.fill();
      } else {
        ctx.beginPath();
        ctx.arc(light.x, light.y, 6, 0, Math.PI * 2);
        ctx.fillStyle = '#3A3520';
        ctx.fill();
      }
    });

    // === TITLE PLATE ===
    const plateW = 340;
    const plateH = 36;
    const plateX = (W - plateW) / 2;
    const plateY = 80;
    // Metal plate
    const plateGrad = ctx.createLinearGradient(plateX, plateY, plateX, plateY + plateH);
    plateGrad.addColorStop(0, '#8C8C84');
    plateGrad.addColorStop(0.5, '#A8A89E');
    plateGrad.addColorStop(1, '#8C8C84');
    ctx.fillStyle = plateGrad;
    ctx.beginPath();
    ctx.roundRect(plateX, plateY, plateW, plateH, 4);
    ctx.fill();
    ctx.strokeStyle = '#6E6E68';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Stamped text
    ctx.font = "700 18px 'Belanosima', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#2B2B28';
    ctx.fillText('SWITCHBOARD CONTROL PANEL', W / 2, plateY + plateH / 2 + 1);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillText('SWITCHBOARD CONTROL PANEL', W / 2, plateY + plateH / 2);

    // === DRAW LEVERS ===
    levers.forEach((lever, i) => {
      ctx.save();
      const cx = lever.x + lever.w / 2;
      const cy = lever.y + lever.h / 2;

      // Apply entrance animation
      ctx.globalAlpha = lever.alpha;
      ctx.translate(cx, cy);
      ctx.scale(lever.scale, lever.scale);
      ctx.translate(-cx, -cy);

      // Apply shake
      ctx.translate(lever.shakeX, 0);

      // === Lever housing (recessed metal box) ===
      const housingPad = 10;
      const hx = lever.x - housingPad;
      const hy = lever.y - housingPad;
      const hw = lever.w + housingPad * 2;
      const hh = lever.h + housingPad * 2;

      // Shadow/recess
      ctx.fillStyle = '#1C1C1A';
      ctx.beginPath();
      ctx.roundRect(hx + 3, hy + 3, hw, hh, 8);
      ctx.fill();

      // Housing
      const housingGrad = ctx.createLinearGradient(hx, hy, hx, hy + hh);
      housingGrad.addColorStop(0, '#555550');
      housingGrad.addColorStop(0.5, '#4A4A47');
      housingGrad.addColorStop(1, '#3A3A38');
      ctx.fillStyle = housingGrad;
      ctx.beginPath();
      ctx.roundRect(hx, hy, hw, hh, 8);
      ctx.fill();
      ctx.strokeStyle = '#6E6E68';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Hover / feedback glow
      if (lever.glowIntensity > 0) {
        let glowColor;
        if (answerResolved && lever.choice.is_correct) {
          glowColor = `rgba(107, 191, 89, ${lever.glowIntensity * 0.3})`;
        } else if (answerResolved && !lever.choice.is_correct) {
          glowColor = `rgba(232, 93, 74, 0.3)`;
        } else {
          glowColor = `rgba(78, 205, 196, ${lever.glowIntensity * 0.2})`;
        }
        ctx.shadowColor = glowColor;
        ctx.shadowBlur = 20;
        ctx.beginPath();
        ctx.roundRect(hx, hy, hw, hh, 8);
        ctx.stroke();
        ctx.shadowBlur = 0;
      }

      // === Label plate at top ===
      const labelPlateW = lever.w - 20;
      const labelPlateH = 30;
      const labelPlateX = lever.x + 10;
      const labelPlateY = lever.y + 5;
      const lpGrad = ctx.createLinearGradient(labelPlateX, labelPlateY, labelPlateX, labelPlateY + labelPlateH);
      lpGrad.addColorStop(0, '#7A7A74');
      lpGrad.addColorStop(0.5, '#8C8C84');
      lpGrad.addColorStop(1, '#7A7A74');
      ctx.fillStyle = lpGrad;
      ctx.beginPath();
      ctx.roundRect(labelPlateX, labelPlateY, labelPlateW, labelPlateH, 4);
      ctx.fill();
      ctx.strokeStyle = '#5A5A54';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Label text (True or False)
      const labelText = i === 0 ? 'TRUE' : 'FALSE';
      ctx.font = "700 16px 'Belanosima', sans-serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#2B2B28';
      ctx.fillText(labelText, labelPlateX + labelPlateW / 2, labelPlateY + labelPlateH / 2 + 1);
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillText(labelText, labelPlateX + labelPlateW / 2, labelPlateY + labelPlateH / 2);

      // === Lever track (slot) ===
      const trackX = lever.x + lever.w / 2 - 16;
      const trackY = lever.y + 50;
      const trackW = 32;
      const trackH = 180;
      ctx.fillStyle = '#1C1C1A';
      ctx.beginPath();
      ctx.roundRect(trackX, trackY, trackW, trackH, 8);
      ctx.fill();
      ctx.strokeStyle = '#333331';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Track markings
      const markCount = 5;
      for (let m = 0; m <= markCount; m++) {
        const my = trackY + 10 + (trackH - 20) * (m / markCount);
        ctx.strokeStyle = '#3A3A38';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(trackX + 4, my);
        ctx.lineTo(trackX + trackW - 4, my);
        ctx.stroke();
      }

      // UP/DOWN indicators
      ctx.font = "500 14px 'Nunito Sans', sans-serif";
      ctx.textAlign = 'center';
      ctx.fillStyle = '#8C8C84';
      ctx.fillText('OFF', lever.x + lever.w / 2, trackY - 8);
      ctx.fillStyle = lever.pullProgress > 0.8 ? COLORS.orange : '#8C8C84';
      ctx.fillText('ON', lever.x + lever.w / 2, trackY + trackH + 18);

      // === LEVER HANDLE ===
      const pullAmount = lever.pullProgress;
      const handleY = trackY + 10 + (trackH - 50) * pullAmount;

      // Handle shaft
      const shaftGrad = ctx.createLinearGradient(lever.x + lever.w / 2 - 12, 0, lever.x + lever.w / 2 + 12, 0);
      shaftGrad.addColorStop(0, '#A8A89E');
      shaftGrad.addColorStop(0.3, '#D4D4CC');
      shaftGrad.addColorStop(0.7, '#D4D4CC');
      shaftGrad.addColorStop(1, '#8C8C84');
      ctx.fillStyle = shaftGrad;
      ctx.beginPath();
      ctx.roundRect(lever.x + lever.w / 2 - 12, handleY, 24, 40, 6);
      ctx.fill();
      ctx.strokeStyle = '#6E6E68';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Handle grip ball
      const ballY = handleY + 6;
      const ballR = 18;
      const ballGrad = ctx.createRadialGradient(
        lever.x + lever.w / 2 - 4, ballY - 4, 2,
        lever.x + lever.w / 2, ballY, ballR
      );

      let ballBaseColor;
      if (answerResolved && i === selectedLever) {
        ballBaseColor = lever.choice.is_correct ? COLORS.success : COLORS.error;
      } else if (i === hoveredLever && selectedLever < 0) {
        ballBaseColor = COLORS.cyan;
      } else {
        ballBaseColor = COLORS.orange;
      }

      ballGrad.addColorStop(0, '#FFFFFF');
      ballGrad.addColorStop(0.3, ballBaseColor);
      ballGrad.addColorStop(1, COLORS.orangeHover);
      ctx.beginPath();
      ctx.arc(lever.x + lever.w / 2, ballY, ballR, 0, Math.PI * 2);
      ctx.fillStyle = ballGrad;
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Ball highlight
      ctx.beginPath();
      ctx.arc(lever.x + lever.w / 2 - 5, ballY - 5, 6, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fill();

      // === Answer text plate at bottom ===
      const textPlateW = lever.w - 16;
      const textPlateH = 70;
      const textPlateX = lever.x + 8;
      const textPlateY = lever.y + lever.h - textPlateH - 15;

      // Plate background
      const tpGrad = ctx.createLinearGradient(textPlateX, textPlateY, textPlateX, textPlateY + textPlateH);
      tpGrad.addColorStop(0, '#FAFAF7');
      tpGrad.addColorStop(1, '#F0F0EA');
      ctx.fillStyle = tpGrad;
      ctx.beginPath();
      ctx.roundRect(textPlateX, textPlateY, textPlateW, textPlateH, 6);
      ctx.fill();
      ctx.strokeStyle = COLORS.borderSubtle;
      ctx.lineWidth = 1;
      ctx.stroke();

      // Answer text (wrapped)
      const textFont = "400 16px 'Nunito', sans-serif";
      const textPad = 10;
      const maxTextW = textPlateW - textPad * 2;
      const lines = wrapText(lever.choice.text, maxTextW, textFont);
      ctx.font = textFont;
      ctx.fillStyle = COLORS.textPrimary;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';

      const lineHeight = 20;
      const totalTextH = lines.length * lineHeight;
      const textStartY = textPlateY + (textPlateH - totalTextH) / 2;
      lines.forEach((line, li) => {
        ctx.fillText(line, textPlateX + textPlateW / 2, textStartY + li * lineHeight);
      });

      // === Status indicator light on housing ===
      const statusX = lever.x + lever.w - 20;
      const statusY = lever.y + 15;
      ctx.beginPath();
      ctx.arc(statusX, statusY, 6, 0, Math.PI * 2);
      ctx.fillStyle = '#2A2A27';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(statusX, statusY, 4, 0, Math.PI * 2);
      if (answerResolved && i === selectedLever) {
        ctx.fillStyle = lever.choice.is_correct ? COLORS.success : COLORS.error;
        // Glow
        ctx.shadowColor = lever.choice.is_correct ? COLORS.success : COLORS.error;
        ctx.shadowBlur = 10;
      } else if (lever.pullProgress > 0) {
        ctx.fillStyle = COLORS.amber;
      } else {
        ctx.fillStyle = '#4A4520';
      }
      ctx.fill();
      ctx.shadowBlur = 0;

      ctx.restore();
    });

    // === Draw spark particles ===
    sparkParticles.forEach(p => {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
      // Glow
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life * 2, 0, Math.PI * 2);
      ctx.fillStyle = p.color.replace(')', ', 0.3)').replace('rgb', 'rgba');
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // === Bottom info plate ===
    const infoW = 260;
    const infoH = 24;
    const infoX = (W - infoW) / 2;
    const infoY = H - 42;
    const infoGrad = ctx.createLinearGradient(infoX, infoY, infoX, infoY + infoH);
    infoGrad.addColorStop(0, '#6E6E68');
    infoGrad.addColorStop(0.5, '#7A7A74');
    infoGrad.addColorStop(1, '#6E6E68');
    ctx.fillStyle = infoGrad;
    ctx.beginPath();
    ctx.roundRect(infoX, infoY, infoW, infoH, 3);
    ctx.fill();
    ctx.strokeStyle = '#5A5A54';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    ctx.font = "400 12px 'Nunito', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#C2C2B8';
    ctx.fillText('MODEL QHP-2025 \u2022 SELECT YOUR ANSWER', W / 2, infoY + infoH / 2);

    // === Cable details along sides ===
    ctx.strokeStyle = '#333331';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(50, H - 60);
    ctx.quadraticCurveTo(30, H - 30, 60, H - 15);
    ctx.stroke();
    ctx.strokeStyle = '#444440';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(W - 50, H - 60);
    ctx.quadraticCurveTo(W - 30, H - 30, W - 60, H - 15);
    ctx.stroke();
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;
    // No keyboard input needed - pure click interaction
  }

  // === MOUSE INTERACTION ===
  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'playing' || selectedLever >= 0) return;
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    hoveredLever = -1;
    levers.forEach((lever, i) => {
      if (x >= lever.x - 10 && x <= lever.x + lever.w + 10 &&
          y >= lever.y - 10 && y <= lever.y + lever.h + 10) {
        hoveredLever = i;
      }
    });
    canvas.style.cursor = hoveredLever >= 0 ? 'pointer' : 'default';
  });

  canvas.addEventListener('click', (e) => {
    if (gameState !== 'playing' || selectedLever >= 0) return;
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    levers.forEach((lever, i) => {
      if (x >= lever.x - 10 && x <= lever.x + lever.w + 10 &&
          y >= lever.y - 10 && y <= lever.y + lever.h + 10) {
        selectedLever = i;
        pullAnimating = true;
        playLeverPullSound();
        playClickSound();
      }
    });
  });

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
