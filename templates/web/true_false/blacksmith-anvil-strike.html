<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blacksmith Anvil Strike</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "true_false",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgDark: '#1C1C1A',
    forgeBg: '#2A1A0A',
    forgeGlow: '#E87A3E',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    textLight: '#F5F5F0',
    textDark: '#2B2B28',
    anvilDark: '#3A3A38',
    anvilMid: '#5A5A54',
    anvilLight: '#8C8C84',
    emberOrange: '#E87A3E',
    emberYellow: '#F5A742',
    emberRed: '#E85D4A',
    metalHot: '#FF6B3E',
    metalWarm: '#CC4422'
  };

  // === AUDIO ENGINE ===
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;

  function ensureAudio() {
    if (!audioCtx) audioCtx = new AudioCtx();
  }

  function playSound(type) {
    ensureAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;

    if (type === 'strike') {
      // Metallic anvil strike sound
      osc.type = 'square';
      osc.frequency.setValueAtTime(220, now);
      osc.frequency.exponentialRampToValueAtTime(80, now + 0.15);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
      osc.start(now);
      osc.stop(now + 0.2);
      // Add noise burst for impact
      const noise = audioCtx.createOscillator();
      const ng = audioCtx.createGain();
      noise.connect(ng);
      ng.connect(audioCtx.destination);
      noise.type = 'sawtooth';
      noise.frequency.setValueAtTime(800, now);
      noise.frequency.exponentialRampToValueAtTime(100, now + 0.1);
      ng.gain.setValueAtTime(0.15, now);
      ng.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
      noise.start(now);
      noise.stop(now + 0.12);
    } else if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, now);
      osc.frequency.setValueAtTime(659, now + 0.1);
      osc.frequency.setValueAtTime(784, now + 0.2);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      osc.start(now);
      osc.stop(now + 0.4);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.exponentialRampToValueAtTime(100, now + 0.3);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
      osc.start(now);
      osc.stop(now + 0.35);
    } else if (type === 'move') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(440, now);
      osc.frequency.exponentialRampToValueAtTime(500, now + 0.05);
      gain.gain.setValueAtTime(0.08, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
      osc.start(now);
      osc.stop(now + 0.06);
    }
  }

  // === GAME STATE ===
  let hammer = { x: W / 2, side: -1, swingAngle: 0, isStriking: false, strikeProgress: 0 };
  // side: 0 = left (True), 1 = right (False), -1 = center/no selection
  let anvilZones = [];
  let embers = [];
  let sparks = [];
  let forgeGlowTime = 0;
  let entranceAnim = 0;
  let strikeFlash = 0;
  let hammerBob = 0;
  let selectedIndex = -1;
  let strikeAnimDone = false;

  function initGame() {
    hammer = {
      x: W / 2,
      side: -1,
      swingAngle: 0,
      isStriking: false,
      strikeProgress: 0
    };

    // Two anvil zones: left = choice 0, right = choice 1
    // Zones sit on the anvil face (top surface at y=280)
    anvilZones = [
      {
        x: 135, y: 280, w: 220, h: 90,
        choice: QUESTION.choices[0],
        index: 0,
        glowIntensity: 0,
        scale: 0,
        alpha: 0,
        shakeX: 0
      },
      {
        x: 365, y: 280, w: 220, h: 90,
        choice: QUESTION.choices[1],
        index: 1,
        glowIntensity: 0,
        scale: 0,
        alpha: 0,
        shakeX: 0
      }
    ];

    embers = [];
    sparks = [];
    forgeGlowTime = 0;
    entranceAnim = 0;
    strikeFlash = 0;
    hammerBob = 0;
    selectedIndex = -1;
    strikeAnimDone = false;

    // Spawn initial embers
    for (let i = 0; i < 20; i++) {
      embers.push(createEmber());
    }
  }

  function createEmber() {
    return {
      x: 100 + Math.random() * 520,
      y: 490 + Math.random() * 50,
      vx: (Math.random() - 0.5) * 30,
      vy: -Math.random() * 80 - 20,
      size: 1.5 + Math.random() * 3,
      life: 1.0,
      decay: 0.3 + Math.random() * 0.5,
      color: Math.random() > 0.5 ? COLORS.emberOrange : (Math.random() > 0.5 ? COLORS.emberYellow : COLORS.emberRed)
    };
  }

  function createSpark(x, y) {
    return {
      x: x,
      y: y,
      vx: (Math.random() - 0.5) * 400,
      vy: -Math.random() * 300 - 50,
      size: 2 + Math.random() * 3,
      life: 1.0,
      decay: 1.5 + Math.random() * 1.0,
      color: Math.random() > 0.3 ? COLORS.emberYellow : '#FFFFFF'
    };
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    forgeGlowTime += dt;
    hammerBob += dt;

    // Entrance animation
    if (entranceAnim < 1) {
      entranceAnim = Math.min(1, entranceAnim + dt * 2.5);
      anvilZones.forEach((zone, i) => {
        const t = Math.max(0, Math.min(1, (entranceAnim - i * 0.15) / 0.6));
        // Spring easing
        const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
        zone.scale = t * spring;
        zone.alpha = t;
      });
    }

    // Update ember particles
    embers.forEach(e => {
      e.x += e.vx * dt;
      e.y += e.vy * dt;
      e.vy -= 10 * dt; // slight upward drift
      e.life -= e.decay * dt;
    });
    embers = embers.filter(e => e.life > 0);

    // Spawn new embers
    if (Math.random() < dt * 15) {
      embers.push(createEmber());
    }

    // Update sparks
    sparks.forEach(s => {
      s.x += s.vx * dt;
      s.y += s.vy * dt;
      s.vy += 500 * dt; // gravity
      s.life -= s.decay * dt;
    });
    sparks = sparks.filter(s => s.life > 0);

    // Glow intensity on selected zone
    anvilZones.forEach((zone, i) => {
      const targetGlow = (hammer.side === i) ? 1 : 0;
      zone.glowIntensity += (targetGlow - zone.glowIntensity) * dt * 8;

      // Shake decay
      if (zone.shakeX !== 0) {
        zone.shakeX *= Math.pow(0.01, dt);
        if (Math.abs(zone.shakeX) < 0.5) zone.shakeX = 0;
      }
    });

    // Strike flash decay
    if (strikeFlash > 0) {
      strikeFlash -= dt * 4;
    }

    // Strike animation
    if (hammer.isStriking) {
      hammer.strikeProgress += dt * 5;
      if (hammer.strikeProgress >= 1 && !strikeAnimDone) {
        strikeAnimDone = true;
        // Strike landed - create sparks
        const zone = anvilZones[hammer.side];
        for (let i = 0; i < 25; i++) {
          sparks.push(createSpark(zone.x + zone.w / 2, zone.y));
        }
        strikeFlash = 1;
        playSound('strike');

        // Determine answer after short delay
        setTimeout(() => {
          const choice = zone.choice;
          if (choice.is_correct) {
            playSound('correct');
          } else {
            playSound('wrong');
            zone.shakeX = 12;
          }
          engine.end(choice.is_correct, choice.explanation);
        }, 300);
      }
    }

    // Hammer position interpolation based on side
    let targetX;
    if (hammer.side === 0) targetX = anvilZones[0].x + anvilZones[0].w / 2;
    else if (hammer.side === 1) targetX = anvilZones[1].x + anvilZones[1].w / 2;
    else targetX = W / 2;

    hammer.x += (targetX - hammer.x) * dt * 12;
  }

  function drawGame() {
    // === Background: dark forge ===
    const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
    bgGrad.addColorStop(0, '#1A0F08');
    bgGrad.addColorStop(0.5, '#2A1A0A');
    bgGrad.addColorStop(1, '#1A0A04');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    // === Forge glow at bottom ===
    const glowPulse = 0.7 + Math.sin(forgeGlowTime * 2) * 0.15 + Math.sin(forgeGlowTime * 3.7) * 0.1;
    const forgeGrad = ctx.createRadialGradient(W / 2, H + 30, 50, W / 2, H + 30, 400);
    forgeGrad.addColorStop(0, `rgba(232, 122, 62, ${0.6 * glowPulse})`);
    forgeGrad.addColorStop(0.4, `rgba(245, 167, 66, ${0.25 * glowPulse})`);
    forgeGrad.addColorStop(1, 'rgba(245, 167, 66, 0)');
    ctx.fillStyle = forgeGrad;
    ctx.fillRect(0, 200, W, H - 200);

    // === Draw embers ===
    embers.forEach(e => {
      ctx.globalAlpha = e.life * 0.8;
      ctx.fillStyle = e.color;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // === Draw anvil base ===
    // Anvil top surface at y=370 (zones hover above at y=280)
    const anvilTopY = 370;

    // Anvil stand (wooden block)
    ctx.fillStyle = '#3A2A1A';
    ctx.beginPath();
    ctx.roundRect(250, anvilTopY + 30, 220, 110, 4);
    ctx.fill();

    // Wood grain detail
    ctx.strokeStyle = '#4A3A2A';
    ctx.lineWidth = 1;
    for (let gy = anvilTopY + 40; gy < anvilTopY + 130; gy += 15) {
      ctx.beginPath();
      ctx.moveTo(255, gy);
      ctx.lineTo(465, gy);
      ctx.stroke();
    }

    // Main anvil body
    const anvilGrad = ctx.createLinearGradient(100, anvilTopY - 80, 100, anvilTopY + 30);
    anvilGrad.addColorStop(0, '#8A8A84');
    anvilGrad.addColorStop(0.3, '#6A6A64');
    anvilGrad.addColorStop(0.7, '#5A5A54');
    anvilGrad.addColorStop(1, '#4A4A44');
    ctx.fillStyle = anvilGrad;

    // Draw anvil shape - horn on left, heel on right
    ctx.beginPath();
    ctx.moveTo(120, anvilTopY + 30);  // bottom left
    ctx.lineTo(70, anvilTopY);         // left horn base
    ctx.lineTo(90, anvilTopY - 40);    // left horn top
    ctx.lineTo(130, anvilTopY - 60);   // top left
    ctx.lineTo(590, anvilTopY - 60);   // top right
    ctx.lineTo(630, anvilTopY - 40);   // right heel top
    ctx.lineTo(650, anvilTopY);        // right heel base
    ctx.lineTo(600, anvilTopY + 30);   // bottom right
    ctx.closePath();
    ctx.fill();

    // Anvil top highlight (flat striking surface)
    ctx.fillStyle = '#9A9A94';
    ctx.beginPath();
    ctx.moveTo(130, anvilTopY - 60);
    ctx.lineTo(590, anvilTopY - 60);
    ctx.lineTo(580, anvilTopY - 54);
    ctx.lineTo(140, anvilTopY - 54);
    ctx.closePath();
    ctx.fill();

    // Anvil edge shadow
    ctx.fillStyle = '#3A3A38';
    ctx.beginPath();
    ctx.moveTo(120, anvilTopY + 30);
    ctx.lineTo(600, anvilTopY + 30);
    ctx.lineTo(600, anvilTopY + 34);
    ctx.lineTo(120, anvilTopY + 34);
    ctx.closePath();
    ctx.fill();

    // === Draw the two glowing strike zones on anvil ===
    anvilZones.forEach((zone, i) => {
      ctx.save();

      const centerX = zone.x + zone.w / 2;
      const centerY = zone.y + zone.h / 2;

      // Apply entrance animation
      ctx.translate(centerX + zone.shakeX, centerY);
      ctx.scale(Math.max(0.01, zone.scale), Math.max(0.01, zone.scale));
      ctx.translate(-centerX, -centerY);

      ctx.globalAlpha = zone.alpha;

      // Glow beneath zone
      const zoneGlow = zone.glowIntensity;
      if (zoneGlow > 0.05) {
        const glowColor = i === 0 ? COLORS.forgeGlow : COLORS.cyan;
        const r = parseInt(glowColor.slice(1, 3), 16);
        const g = parseInt(glowColor.slice(3, 5), 16);
        const b = parseInt(glowColor.slice(5, 7), 16);
        const glowGrad = ctx.createRadialGradient(centerX, centerY, 10, centerX, centerY, 80);
        glowGrad.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${0.4 * zoneGlow})`);
        glowGrad.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);
        ctx.fillStyle = glowGrad;
        ctx.fillRect(zone.x - 30, zone.y - 30, zone.w + 60, zone.h + 60);
      }

      // Zone background - hot metal look
      const zoneBaseColor = i === 0 ? '#8B3A1A' : '#1A5A5A';
      const zoneActiveColor = i === 0 ? COLORS.forgeGlow : COLORS.cyan;
      const zoneMidColor = i === 0 ? '#CC5522' : '#3AADA5';

      const zoneGrad = ctx.createLinearGradient(zone.x, zone.y, zone.x, zone.y + zone.h);
      zoneGrad.addColorStop(0, lerpColor(zoneBaseColor, zoneActiveColor, zoneGlow * 0.5));
      zoneGrad.addColorStop(0.5, lerpColor(zoneMidColor, zoneActiveColor, zoneGlow * 0.6));
      zoneGrad.addColorStop(1, lerpColor(zoneBaseColor, zoneActiveColor, zoneGlow * 0.3));

      ctx.fillStyle = zoneGrad;
      ctx.beginPath();
      ctx.roundRect(zone.x, zone.y, zone.w, zone.h, 8);
      ctx.fill();

      // Zone border
      ctx.strokeStyle = lerpColor('#5A3A2A', zoneActiveColor, zoneGlow);
      ctx.lineWidth = 2 + zoneGlow * 2;
      ctx.beginPath();
      ctx.roundRect(zone.x, zone.y, zone.w, zone.h, 8);
      ctx.stroke();

      // Zone label
      ctx.fillStyle = COLORS.textLight;
      ctx.font = "600 20px 'Nunito Sans', sans-serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(i === 0 ? 'TRUE' : 'FALSE', centerX, zone.y + 8);

      // Answer text - wrap if needed
      ctx.font = "400 16px 'Nunito', sans-serif";
      ctx.textBaseline = 'top';
      const textY = zone.y + 34;
      const maxTextW = zone.w - 20;
      wrapText(ctx, zone.choice.text, centerX, textY, maxTextW, 18, 3);

      ctx.globalAlpha = 1;
      ctx.restore();
    });

    // === Draw sparks ===
    sparks.forEach(s => {
      ctx.globalAlpha = s.life;
      ctx.fillStyle = s.color;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * s.life, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // === Strike flash ===
    if (strikeFlash > 0) {
      ctx.globalAlpha = strikeFlash * 0.3;
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = 1;
    }

    // === Draw hammer ===
    // Hammer hovers at y=100, strikes down to y=250 (above zones at y=280)
    const hammerRestY = 100;
    const hammerStrikeY = 240;
    const hammerBobOffset = Math.sin(hammerBob * 2) * 5;
    const hammerCenterX = hammer.x;

    let hammerAngle = 0;
    let hammerCurrentY = hammerRestY + hammerBobOffset;
    if (hammer.isStriking) {
      const t = Math.min(hammer.strikeProgress, 1);
      if (t < 0.3) {
        // Wind up - raise and tilt back
        const t1 = t / 0.3;
        hammerAngle = -0.4 * t1;
        hammerCurrentY = hammerRestY - 40 * t1;
      } else if (t < 0.7) {
        // Slam down
        const t2 = (t - 0.3) / 0.4;
        const eased = t2 * t2; // accelerate into strike
        hammerAngle = -0.4 + 0.4 * eased;
        hammerCurrentY = (hammerRestY - 40) + (hammerStrikeY - hammerRestY + 40) * eased;
      } else {
        // Bounce back slightly
        const t3 = (t - 0.7) / 0.3;
        hammerAngle = 0;
        hammerCurrentY = hammerStrikeY - 20 * Math.sin(t3 * Math.PI);
      }
    }

    ctx.save();
    ctx.translate(hammerCenterX, hammerCurrentY);
    ctx.rotate(hammerAngle);

    // Hammer handle
    const handleGrad = ctx.createLinearGradient(-5, -60, 5, -60);
    handleGrad.addColorStop(0, '#5A3418');
    handleGrad.addColorStop(0.5, '#7B5230');
    handleGrad.addColorStop(1, '#5A3418');
    ctx.fillStyle = handleGrad;
    ctx.beginPath();
    ctx.roundRect(-6, -60, 12, 140, 3);
    ctx.fill();

    // Handle leather wraps
    ctx.fillStyle = '#4A2A10';
    for (let wy = 40; wy < 75; wy += 10) {
      ctx.fillRect(-7, wy, 14, 5);
    }

    // Hammer head
    const headGrad = ctx.createLinearGradient(-38, -80, -38, -45);
    headGrad.addColorStop(0, '#9A9A94');
    headGrad.addColorStop(0.4, '#6A6A64');
    headGrad.addColorStop(1, '#4A4A44');
    ctx.fillStyle = headGrad;
    ctx.beginPath();
    ctx.roundRect(-38, -82, 76, 42, 5);
    ctx.fill();

    // Hammer head top highlight
    ctx.fillStyle = '#B0B0A8';
    ctx.beginPath();
    ctx.roundRect(-35, -80, 70, 5, 2);
    ctx.fill();

    // Hammer face (bottom, the striking surface)
    ctx.fillStyle = '#7A7A74';
    ctx.beginPath();
    ctx.roundRect(-30, -44, 60, 6, 2);
    ctx.fill();

    ctx.restore();

    // === Selection indicator arrow ===
    if (hammer.side >= 0 && !hammer.isStriking) {
      const zone = anvilZones[hammer.side];
      const arrowX = zone.x + zone.w / 2;
      const arrowY = zone.y - 20;
      const bob = Math.sin(forgeGlowTime * 4) * 4;

      ctx.fillStyle = COLORS.amber;
      ctx.beginPath();
      ctx.moveTo(arrowX, arrowY + bob);
      ctx.lineTo(arrowX - 10, arrowY - 14 + bob);
      ctx.lineTo(arrowX + 10, arrowY - 14 + bob);
      ctx.closePath();
      ctx.fill();
    }
  }

  // Helper: wrap text to fit width
  function wrapText(ctx, text, x, y, maxWidth, lineHeight, maxLines) {
    const words = text.split(' ');
    let line = '';
    let lineNum = 0;

    for (let i = 0; i < words.length; i++) {
      const testLine = line + (line ? ' ' : '') + words[i];
      const metrics = ctx.measureText(testLine);

      if (metrics.width > maxWidth && line !== '') {
        if (lineNum >= maxLines - 1) {
          // Last allowed line - just draw what fits
          ctx.fillText(line, x, y + lineNum * lineHeight);
          // Draw remaining on last line
          const remaining = words.slice(i).join(' ');
          ctx.fillText(remaining, x, y + (lineNum + 1) * lineHeight);
          return;
        }
        ctx.fillText(line, x, y + lineNum * lineHeight);
        line = words[i];
        lineNum++;
      } else {
        line = testLine;
      }
    }
    ctx.fillText(line, x, y + lineNum * lineHeight);
  }

  // Helper: lerp between hex colors
  function lerpColor(a, b, t) {
    const ar = parseInt(a.slice(1, 3), 16);
    const ag = parseInt(a.slice(3, 5), 16);
    const ab = parseInt(a.slice(5, 7), 16);
    const br = parseInt(b.slice(1, 3), 16);
    const bg = parseInt(b.slice(3, 5), 16);
    const bb = parseInt(b.slice(5, 7), 16);
    const rr = Math.round(ar + (br - ar) * t);
    const rg = Math.round(ag + (bg - ag) * t);
    const rb = Math.round(ab + (bb - ab) * t);
    return `rgb(${rr}, ${rg}, ${rb})`;
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;
    if (hammer.isStriking) return;

    if (e.code === 'ArrowLeft') {
      e.preventDefault();
      if (hammer.side !== 0) playSound('move');
      hammer.side = 0;
    } else if (e.code === 'ArrowRight') {
      e.preventDefault();
      if (hammer.side !== 1) playSound('move');
      hammer.side = 1;
    } else if (e.code === 'Space') {
      e.preventDefault();
      if (hammer.side >= 0) {
        hammer.isStriking = true;
        hammer.strikeProgress = 0;
        strikeAnimDone = false;
      }
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
