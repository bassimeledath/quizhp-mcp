<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kraken Salle Demolition</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1C1C1A;
      font-family: 'Nunito', sans-serif;
    }
    #gameCanvas {
      background: #0a1628;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "true_false",
    prompt: "Sample question text",
    choices: [
      { text: "True", is_correct: true, explanation: "This statement is true" },
      { text: "False", is_correct: false, explanation: "This statement is actually true" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = "bold 18px 'Nunito Sans', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = "bold 36px 'Nunito Sans', sans-serif";
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgOcean: '#0a1628',
    deepOcean: '#051020',
    storm: '#1a2a3e',
    pier: '#3d2817',
    pierDark: '#2a1c10',
    coral: '#E87A3E',
    coralLight: '#F5A742',
    iron: '#5A5A54',
    ironDark: '#363633',
    chain: '#8C8C84',
    kraken: '#2a1a40',
    krakenLight: '#4a2a60',
    water: '#4ECDC4',
    waterDark: '#2a8a85',
    success: '#6BBF59',
    error: '#E85D4A',
    text: '#F5F5F0',
    textSecondary: '#C2C2B8'
  };

  // === AUDIO ===
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playSound(type) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'swing') {
      osc.frequency.value = 150;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialDecayTo && gain.gain.exponentialDecayTo(0.01, audioCtx.currentTime + 0.1);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'correct') {
      osc.frequency.value = 523;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
      osc.start();
      setTimeout(() => {
        const osc2 = audioCtx.createOscillator();
        const gain2 = audioCtx.createGain();
        osc2.connect(gain2);
        gain2.connect(audioCtx.destination);
        osc2.frequency.value = 659;
        osc2.type = 'sine';
        gain2.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain2.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
        osc2.start();
        osc2.stop(audioCtx.currentTime + 0.3);
      }, 100);
      osc.stop(audioCtx.currentTime + 0.2);
    } else if (type === 'wrong') {
      osc.frequency.value = 200;
      osc.type = 'sawtooth';
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'crash') {
      osc.frequency.value = 80;
      osc.type = 'square';
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.2);
    }
  }

  // === GAME STATE ===
  let crane = {
    pivotX: W / 2,
    pivotY: 60,
    armLength: 180,
    angle: 0,
    angularVelocity: 0,
    direction: 1, // 1 = swinging right, -1 = swinging left
    swingSpeed: 2.5, // Radians per second
    maxAngle: Math.PI / 3 // 60 degrees
  };

  let ball = {
    x: 0,
    y: 0,
    radius: 25,
    released: false,
    vx: 0,
    vy: 0
  };

  let targets = {
    trueTarget: { x: 80, y: 280, width: 180, height: 160, hit: false, scale: 1, alpha: 1 },
    falseTarget: { x: 460, y: 280, width: 180, height: 160, hit: false, scale: 1, alpha: 1 }
  };

  let waterLevel = H;
  let wrongAnswers = 0;
  let tentacles = [];
  let particles = [];
  let debris = [];
  let lightning = { active: false, timer: 0, x1: 0, y1: 0, x2: 0, y2: 0 };
  let gameTime = 0;
  let inputDirection = 0; // -1 left, 0 none, 1 right
  let entranceAnim = { timer: 0, complete: false };

  function initGame() {
    crane = {
      pivotX: W / 2,
      pivotY: 60,
      armLength: 180,
      angle: 0,
      angularVelocity: 0,
      direction: 1,
      swingSpeed: 2.5,
      maxAngle: Math.PI / 3
    };

    ball = {
      x: crane.pivotX + Math.sin(crane.angle) * crane.armLength,
      y: crane.pivotY + Math.cos(crane.angle) * crane.armLength,
      radius: 25,
      released: false,
      vx: 0,
      vy: 0
    };

    targets = {
      trueTarget: { x: 80, y: 280, width: 180, height: 160, hit: false, scale: 0, alpha: 0 },
      falseTarget: { x: 460, y: 280, width: 180, height: 160, hit: false, scale: 0, alpha: 0 }
    };

    waterLevel = H;
    wrongAnswers = 0;
    tentacles = [];
    particles = [];
    debris = [];
    gameTime = 0;
    inputDirection = 0;
    entranceAnim = { timer: 0, complete: false };

    // Create tentacles
    for (let i = 0; i < 4; i++) {
      tentacles.push({
        baseX: 60 + i * 200,
        baseY: H + 30,
        segments: 6,
        phase: Math.random() * Math.PI * 2,
        amplitude: 15 + Math.random() * 10
      });
    }
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Entrance animation
    if (!entranceAnim.complete) {
      entranceAnim.timer += dt;
      const t = Math.min(entranceAnim.timer / 0.5, 1);
      const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
      targets.trueTarget.scale = t * spring;
      targets.trueTarget.alpha = t;

      const t2 = Math.min((entranceAnim.timer - 0.1) / 0.5, 1);
      if (t2 > 0) {
        const spring2 = 1 + Math.sin(t2 * Math.PI * 2) * 0.2 * (1 - t2);
        targets.falseTarget.scale = t2 * spring2;
        targets.falseTarget.alpha = t2;
      }

      if (entranceAnim.timer > 0.6) {
        entranceAnim.complete = true;
        targets.trueTarget.scale = 1;
        targets.trueTarget.alpha = 1;
        targets.falseTarget.scale = 1;
        targets.falseTarget.alpha = 1;
      }
    }

    // Lightning effect
    if (Math.random() < 0.002) {
      lightning.active = true;
      lightning.timer = 0.15;
      lightning.x1 = Math.random() * W;
      lightning.y1 = 0;
      lightning.x2 = lightning.x1 + (Math.random() - 0.5) * 100;
      lightning.y2 = 100 + Math.random() * 100;
    }
    if (lightning.active) {
      lightning.timer -= dt;
      if (lightning.timer <= 0) lightning.active = false;
    }

    if (!ball.released) {
      // Swing the crane with player input influence
      const baseSwing = Math.sin(gameTime * crane.swingSpeed) * crane.maxAngle;
      const playerInfluence = inputDirection * 0.3;
      crane.angle = baseSwing + playerInfluence;

      // Update ball position on chain
      ball.x = crane.pivotX + Math.sin(crane.angle) * crane.armLength;
      ball.y = crane.pivotY + Math.cos(crane.angle) * crane.armLength;
    } else {
      // Ball physics when released
      ball.vy += 600 * dt; // gravity
      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;

      // Check collision with targets
      checkTargetCollision();

      // Check if ball fell into water
      if (ball.y > waterLevel - 20) {
        // Reset ball
        ball.released = false;
        ball.vx = 0;
        ball.vy = 0;
      }
    }

    // Update particles
    particles = particles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 300 * dt;
      p.life -= dt;
      p.rotation += p.rotationSpeed * dt;
      return p.life > 0;
    });

    // Update debris
    debris = debris.filter(d => {
      d.x += d.vx * dt;
      d.y += d.vy * dt;
      d.vy += 400 * dt;
      d.rotation += d.rotationSpeed * dt;
      d.alpha -= dt * 0.5;
      return d.alpha > 0 && d.y < H + 50;
    });
  }

  function checkTargetCollision() {
    const trueT = targets.trueTarget;
    const falseT = targets.falseTarget;

    // Check TRUE target (coral watchtower on left)
    if (!trueT.hit &&
        ball.x > trueT.x && ball.x < trueT.x + trueT.width &&
        ball.y > trueT.y && ball.y < trueT.y + trueT.height) {
      trueT.hit = true;
      playSound('crash');
      spawnDebris(ball.x, ball.y, COLORS.coral);
      selectAnswer(0); // TRUE is first choice
    }

    // Check FALSE target (iron salle on right)
    if (!falseT.hit &&
        ball.x > falseT.x && ball.x < falseT.x + falseT.width &&
        ball.y > falseT.y && ball.y < falseT.y + falseT.height) {
      falseT.hit = true;
      playSound('crash');
      spawnDebris(ball.x, ball.y, COLORS.iron);
      selectAnswer(1); // FALSE is second choice
    }
  }

  function selectAnswer(choiceIndex) {
    const choice = QUESTION.choices[choiceIndex];
    if (choice.is_correct) {
      playSound('correct');
    } else {
      playSound('wrong');
      wrongAnswers++;
      waterLevel -= 40; // Water rises
    }
    setTimeout(() => {
      engine.end(choice.is_correct, choice.explanation);
    }, 500);
  }

  function spawnDebris(x, y, color) {
    for (let i = 0; i < 15; i++) {
      debris.push({
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 300,
        vy: -Math.random() * 200 - 100,
        size: 5 + Math.random() * 15,
        color: color,
        rotation: Math.random() * Math.PI * 2,
        rotationSpeed: (Math.random() - 0.5) * 8,
        alpha: 1
      });
    }
  }

  function spawnParticles(x, y, color, count = 10) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 150,
        vy: -Math.random() * 100 - 50,
        size: 3 + Math.random() * 5,
        color: color,
        life: 0.5 + Math.random() * 0.5,
        rotation: 0,
        rotationSpeed: (Math.random() - 0.5) * 5
      });
    }
  }

  function drawGame() {
    // Storm sky gradient
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, '#0a0a15');
    skyGrad.addColorStop(0.3, '#1a2a3e');
    skyGrad.addColorStop(1, COLORS.deepOcean);
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    // Lightning flash
    if (lightning.active) {
      ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
      ctx.fillRect(0, 0, W, H);

      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(lightning.x1, lightning.y1);
      let x = lightning.x1;
      let y = lightning.y1;
      while (y < lightning.y2) {
        x += (Math.random() - 0.5) * 30;
        y += 20 + Math.random() * 20;
        ctx.lineTo(x, y);
      }
      ctx.stroke();
    }

    // Rain
    ctx.strokeStyle = 'rgba(100, 150, 200, 0.3)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 50; i++) {
      const rx = (i * 17 + gameTime * 200) % W;
      const ry = (i * 23 + gameTime * 400) % H;
      ctx.beginPath();
      ctx.moveTo(rx, ry);
      ctx.lineTo(rx - 5, ry + 20);
      ctx.stroke();
    }

    // Draw pier planks at top
    ctx.fillStyle = COLORS.pier;
    ctx.fillRect(0, 0, W, 40);
    ctx.fillStyle = COLORS.pierDark;
    for (let i = 0; i < W; i += 40) {
      ctx.fillRect(i, 0, 2, 40);
    }

    // Draw chain hoist structure
    ctx.fillStyle = COLORS.iron;
    ctx.fillRect(crane.pivotX - 30, 20, 60, 30);
    ctx.fillStyle = COLORS.ironDark;
    ctx.fillRect(crane.pivotX - 5, 40, 10, 20);

    // Draw targets with entrance animation
    drawCoralWatchtower(targets.trueTarget);
    drawIronSalle(targets.falseTarget);

    // Draw tentacles
    tentacles.forEach((t, i) => {
      drawTentacle(t, i);
    });

    // Draw chain
    if (!ball.released) {
      ctx.strokeStyle = COLORS.chain;
      ctx.lineWidth = 4;
      ctx.setLineDash([8, 4]);
      ctx.beginPath();
      ctx.moveTo(crane.pivotX, crane.pivotY);
      ctx.lineTo(ball.x, ball.y);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Draw wrecking ball
    const ballGrad = ctx.createRadialGradient(ball.x - 8, ball.y - 8, 0, ball.x, ball.y, ball.radius);
    ballGrad.addColorStop(0, '#4a4a4a');
    ballGrad.addColorStop(1, '#1a1a1a');
    ctx.fillStyle = ballGrad;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
    ctx.fill();

    // Ball highlight
    ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
    ctx.beginPath();
    ctx.arc(ball.x - 8, ball.y - 8, 8, 0, Math.PI * 2);
    ctx.fill();

    // Draw water
    const waterGrad = ctx.createLinearGradient(0, waterLevel - 30, 0, H);
    waterGrad.addColorStop(0, 'rgba(78, 205, 196, 0.3)');
    waterGrad.addColorStop(0.5, 'rgba(42, 138, 133, 0.6)');
    waterGrad.addColorStop(1, 'rgba(10, 50, 60, 0.9)');
    ctx.fillStyle = waterGrad;

    // Wavy water surface
    ctx.beginPath();
    ctx.moveTo(0, waterLevel);
    for (let x = 0; x <= W; x += 20) {
      const wave = Math.sin(x * 0.02 + gameTime * 3) * 8 + Math.sin(x * 0.05 + gameTime * 2) * 4;
      ctx.lineTo(x, waterLevel + wave);
    }
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.closePath();
    ctx.fill();

    // Draw particles
    particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
      ctx.restore();
    });

    // Draw debris
    debris.forEach(d => {
      ctx.save();
      ctx.globalAlpha = d.alpha;
      ctx.translate(d.x, d.y);
      ctx.rotate(d.rotation);
      ctx.fillStyle = d.color;
      ctx.fillRect(-d.size / 2, -d.size / 2, d.size, d.size);
      ctx.restore();
    });

    // Direction indicator arrows
    if (!ball.released) {
      ctx.globalAlpha = 0.6 + Math.sin(gameTime * 4) * 0.3;

      // Left arrow (TRUE)
      ctx.fillStyle = COLORS.coral;
      ctx.beginPath();
      ctx.moveTo(60, 200);
      ctx.lineTo(90, 180);
      ctx.lineTo(90, 220);
      ctx.closePath();
      ctx.fill();

      // Right arrow (FALSE)
      ctx.fillStyle = COLORS.iron;
      ctx.beginPath();
      ctx.moveTo(660, 200);
      ctx.lineTo(630, 180);
      ctx.lineTo(630, 220);
      ctx.closePath();
      ctx.fill();

      ctx.globalAlpha = 1;
    }
  }

  function drawCoralWatchtower(target) {
    if (target.alpha <= 0) return;

    ctx.save();
    ctx.globalAlpha = target.alpha;
    ctx.translate(target.x + target.width / 2, target.y + target.height);
    ctx.scale(target.scale, target.scale);
    ctx.translate(-(target.x + target.width / 2), -(target.y + target.height));

    // Base coral structure
    const coralGrad = ctx.createLinearGradient(target.x, target.y, target.x, target.y + target.height);
    coralGrad.addColorStop(0, COLORS.coralLight);
    coralGrad.addColorStop(1, COLORS.coral);
    ctx.fillStyle = coralGrad;

    // Main tower
    ctx.beginPath();
    ctx.moveTo(target.x + 30, target.y + target.height);
    ctx.lineTo(target.x + 40, target.y + 20);
    ctx.lineTo(target.x + target.width / 2, target.y);
    ctx.lineTo(target.x + target.width - 40, target.y + 20);
    ctx.lineTo(target.x + target.width - 30, target.y + target.height);
    ctx.closePath();
    ctx.fill();

    // Barnacles
    ctx.fillStyle = '#5a4a3a';
    for (let i = 0; i < 8; i++) {
      const bx = target.x + 40 + Math.random() * (target.width - 80);
      const by = target.y + 30 + Math.random() * (target.height - 50);
      ctx.beginPath();
      ctx.arc(bx, by, 4 + Math.random() * 4, 0, Math.PI * 2);
      ctx.fill();
    }

    // Victory pennants
    const pennantColors = ['#E87A3E', '#F5A742', '#4ECDC4'];
    for (let i = 0; i < 3; i++) {
      ctx.fillStyle = pennantColors[i];
      ctx.beginPath();
      ctx.moveTo(target.x + 50 + i * 30, target.y + 10);
      ctx.lineTo(target.x + 50 + i * 30 + 15, target.y + 25);
      ctx.lineTo(target.x + 50 + i * 30, target.y + 40);
      ctx.closePath();
      ctx.fill();
    }

    // Label
    ctx.fillStyle = COLORS.text;
    ctx.font = "bold 24px 'Belanosima', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('TRUE', target.x + target.width / 2, target.y + target.height / 2 + 20);

    ctx.restore();
  }

  function drawIronSalle(target) {
    if (target.alpha <= 0) return;

    ctx.save();
    ctx.globalAlpha = target.alpha;
    ctx.translate(target.x + target.width / 2, target.y + target.height);
    ctx.scale(target.scale, target.scale);
    ctx.translate(-(target.x + target.width / 2), -(target.y + target.height));

    // Iron structure
    const ironGrad = ctx.createLinearGradient(target.x, target.y, target.x, target.y + target.height);
    ironGrad.addColorStop(0, COLORS.iron);
    ironGrad.addColorStop(1, COLORS.ironDark);
    ctx.fillStyle = ironGrad;

    // Main building
    ctx.fillRect(target.x + 20, target.y + 20, target.width - 40, target.height - 20);

    // Peaked roof
    ctx.beginPath();
    ctx.moveTo(target.x + 10, target.y + 20);
    ctx.lineTo(target.x + target.width / 2, target.y);
    ctx.lineTo(target.x + target.width - 10, target.y + 20);
    ctx.closePath();
    ctx.fill();

    // Razor rails
    ctx.strokeStyle = '#8a8a84';
    ctx.lineWidth = 2;
    for (let i = 0; i < 5; i++) {
      const rx = target.x + 30 + i * 25;
      ctx.beginPath();
      ctx.moveTo(rx, target.y + 30);
      ctx.lineTo(rx, target.y + target.height - 10);
      ctx.stroke();
    }

    // Mask rack silhouettes
    ctx.fillStyle = '#2a2a27';
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.ellipse(target.x + 45 + i * 35, target.y + 50, 10, 15, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Label
    ctx.fillStyle = COLORS.text;
    ctx.font = "bold 24px 'Belanosima', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('FALSE', target.x + target.width / 2, target.y + target.height / 2 + 20);

    ctx.restore();
  }

  function drawTentacle(t, index) {
    const time = gameTime + t.phase;
    ctx.strokeStyle = COLORS.krakenLight;
    ctx.lineWidth = 12;
    ctx.lineCap = 'round';

    ctx.beginPath();
    let x = t.baseX;
    let y = t.baseY;
    ctx.moveTo(x, y);

    for (let i = 0; i < t.segments; i++) {
      const segAngle = Math.sin(time * 2 + i * 0.5) * 0.3;
      const segLength = 25 - i * 2;
      x += Math.sin(segAngle) * segLength;
      y -= Math.cos(segAngle) * segLength - Math.sin(time * 1.5 + i) * 5;
      ctx.lineTo(x, y);
    }
    ctx.stroke();

    // Darker core
    ctx.strokeStyle = COLORS.kraken;
    ctx.lineWidth = 6;
    ctx.stroke();

    // Suckers
    ctx.fillStyle = '#1a0a30';
    x = t.baseX;
    y = t.baseY;
    for (let i = 0; i < t.segments - 1; i++) {
      const segAngle = Math.sin(time * 2 + i * 0.5) * 0.3;
      const segLength = 25 - i * 2;
      x += Math.sin(segAngle) * segLength;
      y -= Math.cos(segAngle) * segLength - Math.sin(time * 1.5 + i) * 5;
      if (i % 2 === 0) {
        ctx.beginPath();
        ctx.arc(x, y, 4, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;

    // Direction control
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
      inputDirection = -1;
    } else if (e.code === 'ArrowRight' || e.code === 'KeyD') {
      inputDirection = 1;
    }

    // Release ball
    if ((e.code === 'Space' || e.code === 'Enter') && !ball.released) {
      playSound('swing');
      ball.released = true;
      // Calculate release velocity based on pendulum physics
      // The ball's velocity is perpendicular to the chain (tangent to swing arc)
      // When swinging right (angle increasing), velocity points right-down
      // When swinging left (angle decreasing), velocity points left-down
      const angularVel = Math.cos(gameTime * crane.swingSpeed) * crane.swingSpeed;
      const tangentSpeed = angularVel * crane.armLength;
      // Tangent direction is perpendicular to radial: (cos(angle), sin(angle)) rotated 90deg
      ball.vx = tangentSpeed * Math.cos(crane.angle) * 1.2;
      ball.vy = tangentSpeed * Math.sin(crane.angle) * 0.5 + 100;
    }
  }

  // Handle key release
  document.addEventListener('keyup', (e) => {
    if (e.code === 'ArrowLeft' || e.code === 'KeyA' || e.code === 'ArrowRight' || e.code === 'KeyD') {
      inputDirection = 0;
    }
  });

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
