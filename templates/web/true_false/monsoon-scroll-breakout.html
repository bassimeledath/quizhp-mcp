<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monsoon Scroll Breakout</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1C1C1A;
      font-family: 'Nunito', sans-serif;
    }
    #gameCanvas {
      background: #2A2A27;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "true_false",
    prompt: "Sample question text",
    choices: [
      { text: "True", is_correct: true, explanation: "This is the correct answer because it is true" },
      { text: "False", is_correct: false, explanation: "This is incorrect because the statement is true" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // Colors
  const COLORS = {
    bgPrimary: '#1C1C1A',
    bgSurface: '#2A2A27',
    textPrimary: '#F5F5F0',
    textSecondary: '#C2C2B8',
    orange: '#E87A3E',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#424240',
    borderStrong: '#5A5A56',
    crimson: '#8B1538',
    wax: '#1a1a1a',
    brass: '#B8860B',
    brassLight: '#DAA520',
    stone: '#4A4A45',
    stoneLight: '#6A6A64',
    scroll: '#D4C4A8',
    scrollDark: '#B8A888',
    lampGlow: '#FFE4B5',
    rain: '#6BB3D9'
  };

  // Audio context for sound effects
  let audioCtx = null;
  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'bounce') {
      osc.frequency.value = 300 + Math.random() * 200;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialDecayTo && gain.gain.exponentialDecayTo(0.01, audioCtx.currentTime + 0.1);
      gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'correct') {
      osc.frequency.value = 523;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    } else if (type === 'wrong') {
      osc.frequency.value = 180;
      osc.type = 'sawtooth';
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    } else if (type === 'splash') {
      osc.frequency.value = 150;
      osc.type = 'triangle';
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.2);
    }
  }

  // Game state
  let paddle = { x: 0, y: 0, w: 120, h: 20, vx: 0 };
  let ball = { x: 0, y: 0, r: 10, vx: 0, vy: 0 };
  let shelves = [];
  let scrollStacks = [];
  let raindrops = [];
  let particles = [];
  let gameTime = 0;
  let keys = { left: false, right: false };
  let hitAnimation = { active: false, target: null, time: 0 };
  let entranceTime = 0;
  let ballLaunched = false;

  function initGame() {
    initAudio();

    // Paddle (brass gutter-tray) at bottom
    paddle = {
      x: W / 2,
      y: H - 60,
      w: 120,
      h: 18,
      vx: 0
    };

    // Ball (raindrop) starts on paddle
    ball = {
      x: W / 2,
      y: paddle.y - 15,
      r: 12,
      vx: 0,
      vy: 0,
      active: true
    };
    ballLaunched = false;

    // Create shelves for ball to bounce off
    shelves = [
      { x: 180, y: 200, w: 140, h: 12 },
      { x: 400, y: 200, w: 140, h: 12 },
      { x: 280, y: 280, w: 160, h: 12 },
      { x: 120, y: 350, w: 120, h: 12 },
      { x: 480, y: 350, w: 120, h: 12 }
    ];

    // Scroll stacks at top - TRUE on left (index 0), FALSE on right (index 1)
    scrollStacks = [
      {
        x: 80,
        y: 40,
        w: 150,
        h: 100,
        label: QUESTION.choices[0].text,
        choice: QUESTION.choices[0],
        ribbonProgress: 0,
        hit: false,
        inkBleed: 0
      },
      {
        x: 490,
        y: 40,
        w: 150,
        h: 100,
        label: QUESTION.choices[1].text,
        choice: QUESTION.choices[1],
        ribbonProgress: 0,
        hit: false,
        inkBleed: 0
      }
    ];

    // Background rain
    raindrops = [];
    for (let i = 0; i < 50; i++) {
      raindrops.push({
        x: Math.random() * W,
        y: Math.random() * H,
        speed: 200 + Math.random() * 150,
        length: 10 + Math.random() * 15
      });
    }

    particles = [];
    gameTime = 0;
    entranceTime = 0;
    hitAnimation = { active: false, target: null, time: 0 };
    keys = { left: false, right: false };
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;
    entranceTime += dt;

    // Update rain
    raindrops.forEach(drop => {
      drop.y += drop.speed * dt;
      if (drop.y > H) {
        drop.y = -drop.length;
        drop.x = Math.random() * W;
      }
    });

    // Move paddle
    const PADDLE_SPEED = 450;
    if (keys.left) paddle.vx = -PADDLE_SPEED;
    else if (keys.right) paddle.vx = PADDLE_SPEED;
    else paddle.vx = 0;

    paddle.x += paddle.vx * dt;
    paddle.x = Math.max(paddle.w / 2 + 20, Math.min(W - paddle.w / 2 - 20, paddle.x));

    // Ball follows paddle if not launched
    if (!ballLaunched) {
      ball.x = paddle.x;
      ball.y = paddle.y - ball.r - paddle.h / 2;
      return;
    }

    // Update ball physics
    if (ball.active) {
      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;

      // Wall collisions
      if (ball.x - ball.r < 20) {
        ball.x = 20 + ball.r;
        ball.vx = Math.abs(ball.vx);
        playSound('bounce');
      }
      if (ball.x + ball.r > W - 20) {
        ball.x = W - 20 - ball.r;
        ball.vx = -Math.abs(ball.vx);
        playSound('bounce');
      }

      // Top collision
      if (ball.y - ball.r < 20) {
        ball.y = 20 + ball.r;
        ball.vy = Math.abs(ball.vy);
        playSound('bounce');
      }

      // Bottom - ball lost, reset
      if (ball.y > H + ball.r) {
        ball.x = paddle.x;
        ball.y = paddle.y - ball.r - paddle.h / 2;
        ball.vx = 0;
        ball.vy = 0;
        ballLaunched = false;
        playSound('splash');
      }

      // Paddle collision
      if (ball.vy > 0 &&
          ball.y + ball.r > paddle.y - paddle.h / 2 &&
          ball.y - ball.r < paddle.y + paddle.h / 2 &&
          ball.x > paddle.x - paddle.w / 2 &&
          ball.x < paddle.x + paddle.w / 2) {

        ball.y = paddle.y - paddle.h / 2 - ball.r;

        // Angle based on where ball hits paddle
        const hitPos = (ball.x - paddle.x) / (paddle.w / 2);
        const angle = hitPos * Math.PI / 3; // Max 60 degrees
        const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);

        ball.vx = Math.sin(angle) * speed;
        ball.vy = -Math.cos(angle) * speed;

        // Spawn water splash particles
        for (let i = 0; i < 5; i++) {
          particles.push({
            x: ball.x,
            y: ball.y,
            vx: (Math.random() - 0.5) * 100,
            vy: -Math.random() * 80 - 20,
            life: 0.4,
            maxLife: 0.4,
            size: 3 + Math.random() * 3,
            color: COLORS.rain
          });
        }

        playSound('bounce');
      }

      // Shelf collisions
      shelves.forEach(shelf => {
        if (ball.x + ball.r > shelf.x &&
            ball.x - ball.r < shelf.x + shelf.w &&
            ball.y + ball.r > shelf.y &&
            ball.y - ball.r < shelf.y + shelf.h) {

          // Determine collision side
          const overlapLeft = (ball.x + ball.r) - shelf.x;
          const overlapRight = (shelf.x + shelf.w) - (ball.x - ball.r);
          const overlapTop = (ball.y + ball.r) - shelf.y;
          const overlapBottom = (shelf.y + shelf.h) - (ball.y - ball.r);

          const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);

          if (minOverlap === overlapTop) {
            ball.y = shelf.y - ball.r;
            ball.vy = -Math.abs(ball.vy);
          } else if (minOverlap === overlapBottom) {
            ball.y = shelf.y + shelf.h + ball.r;
            ball.vy = Math.abs(ball.vy);
          } else if (minOverlap === overlapLeft) {
            ball.x = shelf.x - ball.r;
            ball.vx = -Math.abs(ball.vx);
          } else {
            ball.x = shelf.x + shelf.w + ball.r;
            ball.vx = Math.abs(ball.vx);
          }

          playSound('bounce');
        }
      });

      // Scroll stack collision (answer selection)
      scrollStacks.forEach(stack => {
        if (!stack.hit &&
            ball.x + ball.r > stack.x &&
            ball.x - ball.r < stack.x + stack.w &&
            ball.y + ball.r > stack.y &&
            ball.y - ball.r < stack.y + stack.h) {

          stack.hit = true;
          ball.active = false;

          hitAnimation = {
            active: true,
            target: stack,
            time: 0,
            isCorrect: stack.choice.is_correct
          };

          // Spawn particles
          const particleColor = stack.choice.is_correct ? COLORS.success : COLORS.error;
          for (let i = 0; i < 20; i++) {
            particles.push({
              x: ball.x,
              y: ball.y,
              vx: (Math.random() - 0.5) * 200,
              vy: (Math.random() - 0.5) * 200,
              life: 0.6 + Math.random() * 0.3,
              maxLife: 0.6 + Math.random() * 0.3,
              size: 4 + Math.random() * 4,
              color: stack.choice.is_correct ? COLORS.amber : '#1a1a3a'
            });
          }

          playSound(stack.choice.is_correct ? 'correct' : 'wrong');
        }
      });
    }

    // Update hit animation
    if (hitAnimation.active) {
      hitAnimation.time += dt;

      if (hitAnimation.isCorrect) {
        // Dissolve ribbon animation
        hitAnimation.target.ribbonProgress = Math.min(1, hitAnimation.time / 0.8);
      } else {
        // Ink bleed animation
        hitAnimation.target.inkBleed = Math.min(1, hitAnimation.time / 0.8);
      }

      if (hitAnimation.time > 1.2) {
        engine.end(hitAnimation.isCorrect, hitAnimation.target.choice.explanation);
      }
    }

    // Update particles
    particles = particles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 200 * dt; // gravity
      p.life -= dt;
      return p.life > 0;
    });
  }

  function drawGame() {
    // Background - dark stone archive
    ctx.fillStyle = COLORS.bgPrimary;
    ctx.fillRect(0, 0, W, H);

    // Stone wall texture
    ctx.fillStyle = COLORS.stone;
    for (let y = 0; y < H; y += 40) {
      for (let x = 0; x < W; x += 80) {
        const offset = (Math.floor(y / 40) % 2) * 40;
        ctx.fillRect(x + offset, y, 78, 38);
      }
    }

    // Lamp glow effects at top corners
    const gradient1 = ctx.createRadialGradient(60, 60, 0, 60, 60, 180);
    gradient1.addColorStop(0, 'rgba(255, 228, 181, 0.3)');
    gradient1.addColorStop(1, 'rgba(255, 228, 181, 0)');
    ctx.fillStyle = gradient1;
    ctx.fillRect(0, 0, 250, 250);

    const gradient2 = ctx.createRadialGradient(W - 60, 60, 0, W - 60, 60, 180);
    gradient2.addColorStop(0, 'rgba(255, 228, 181, 0.3)');
    gradient2.addColorStop(1, 'rgba(255, 228, 181, 0)');
    ctx.fillStyle = gradient2;
    ctx.fillRect(W - 250, 0, 250, 250);

    // Draw rain
    ctx.strokeStyle = 'rgba(107, 179, 217, 0.4)';
    ctx.lineWidth = 1.5;
    raindrops.forEach(drop => {
      ctx.beginPath();
      ctx.moveTo(drop.x, drop.y);
      ctx.lineTo(drop.x - 2, drop.y + drop.length);
      ctx.stroke();
    });

    // Draw shelves (archive shelves)
    shelves.forEach((shelf, i) => {
      const entranceDelay = 0.1 + i * 0.05;
      const entranceProgress = Math.min(1, Math.max(0, (entranceTime - entranceDelay) / 0.3));
      const bounce = 1 + Math.sin(entranceProgress * Math.PI) * 0.1;

      ctx.save();
      ctx.translate(shelf.x + shelf.w / 2, shelf.y + shelf.h / 2);
      ctx.scale(entranceProgress * bounce, entranceProgress);
      ctx.translate(-(shelf.x + shelf.w / 2), -(shelf.y + shelf.h / 2));

      // Shelf shadow
      ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
      ctx.fillRect(shelf.x + 3, shelf.y + 3, shelf.w, shelf.h);

      // Shelf main
      ctx.fillStyle = COLORS.stoneLight;
      ctx.fillRect(shelf.x, shelf.y, shelf.w, shelf.h);

      // Shelf highlight
      ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
      ctx.fillRect(shelf.x, shelf.y, shelf.w, 3);

      ctx.restore();
    });

    // Draw scroll stacks
    scrollStacks.forEach((stack, index) => {
      const entranceDelay = 0.2;
      const entranceProgress = Math.min(1, Math.max(0, (entranceTime - entranceDelay) / 0.4));
      const bounce = 1 + Math.sin(entranceProgress * Math.PI) * 0.15;

      ctx.save();
      ctx.translate(stack.x + stack.w / 2, stack.y + stack.h / 2);
      ctx.scale(entranceProgress * bounce, entranceProgress);
      ctx.translate(-(stack.x + stack.w / 2), -(stack.y + stack.h / 2));

      // Pedestal
      ctx.fillStyle = COLORS.stone;
      ctx.fillRect(stack.x + 20, stack.y + stack.h - 10, stack.w - 40, 15);

      // Scroll stack (multiple scrolls)
      for (let i = 0; i < 3; i++) {
        const scrollY = stack.y + stack.h - 25 - i * 22;
        const scrollW = stack.w - 30 - i * 10;
        const scrollX = stack.x + 15 + i * 5;

        // Ink bleed effect on wrong answer
        if (stack.inkBleed > 0 && stack.hit) {
          ctx.fillStyle = `rgba(26, 26, 58, ${stack.inkBleed * 0.8})`;
          ctx.fillRect(scrollX - 2, scrollY - 2, scrollW + 4, 24);
        }

        // Scroll paper
        ctx.fillStyle = stack.inkBleed > 0.5 && stack.hit ? '#666680' : COLORS.scroll;
        ctx.beginPath();
        ctx.roundRect(scrollX, scrollY, scrollW, 20, 3);
        ctx.fill();

        // Scroll rolled edges
        ctx.fillStyle = stack.inkBleed > 0.5 && stack.hit ? '#555568' : COLORS.scrollDark;
        ctx.beginPath();
        ctx.ellipse(scrollX, scrollY + 10, 4, 10, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(scrollX + scrollW, scrollY + 10, 4, 10, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // Binding - TRUE has crimson ribbon, FALSE has black wax
      if (index === 0) {
        // Crimson ribbon
        const ribbonAlpha = 1 - stack.ribbonProgress;
        if (ribbonAlpha > 0) {
          ctx.fillStyle = `rgba(139, 21, 56, ${ribbonAlpha})`;
          ctx.fillRect(stack.x + stack.w / 2 - 8, stack.y + 20, 16, stack.h - 30);
          // Ribbon bow
          ctx.beginPath();
          ctx.ellipse(stack.x + stack.w / 2 - 12, stack.y + 25, 10, 6, -0.3, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(stack.x + stack.w / 2 + 12, stack.y + 25, 10, 6, 0.3, 0, Math.PI * 2);
          ctx.fill();
        }

        // Revealed text on correct hit
        if (stack.ribbonProgress > 0.5) {
          ctx.fillStyle = COLORS.amber;
          ctx.font = "600 14px 'Nunito Sans', sans-serif";
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.globalAlpha = (stack.ribbonProgress - 0.5) * 2;
          ctx.fillText('CORRECT', stack.x + stack.w / 2, stack.y + stack.h / 2 + 10);
          ctx.globalAlpha = 1;
        }
      } else {
        // Black wax seal
        const sealAlpha = 1 - stack.ribbonProgress;
        if (sealAlpha > 0) {
          ctx.fillStyle = `rgba(26, 26, 26, ${sealAlpha})`;
          ctx.beginPath();
          ctx.arc(stack.x + stack.w / 2, stack.y + stack.h / 2 - 5, 20, 0, Math.PI * 2);
          ctx.fill();
          // Wax seal pattern
          ctx.strokeStyle = `rgba(60, 60, 60, ${sealAlpha})`;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(stack.x + stack.w / 2, stack.y + stack.h / 2 - 5, 12, 0, Math.PI * 2);
          ctx.stroke();
        }
      }

      // Label
      ctx.font = "700 20px 'Belanosima', sans-serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillStyle = index === 0 ? COLORS.crimson : COLORS.textPrimary;
      ctx.fillText(stack.label, stack.x + stack.w / 2, stack.y - 5);

      ctx.restore();
    });

    // Draw paddle (brass gutter-tray)
    const paddleEntranceProgress = Math.min(1, entranceTime / 0.3);
    ctx.save();
    ctx.globalAlpha = paddleEntranceProgress;

    // Paddle shadow
    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
    ctx.beginPath();
    ctx.roundRect(paddle.x - paddle.w / 2 + 3, paddle.y - paddle.h / 2 + 3, paddle.w, paddle.h, 4);
    ctx.fill();

    // Paddle main (brass)
    const paddleGradient = ctx.createLinearGradient(
      paddle.x - paddle.w / 2, paddle.y - paddle.h / 2,
      paddle.x - paddle.w / 2, paddle.y + paddle.h / 2
    );
    paddleGradient.addColorStop(0, COLORS.brassLight);
    paddleGradient.addColorStop(0.5, COLORS.brass);
    paddleGradient.addColorStop(1, '#8B6914');
    ctx.fillStyle = paddleGradient;
    ctx.beginPath();
    ctx.roundRect(paddle.x - paddle.w / 2, paddle.y - paddle.h / 2, paddle.w, paddle.h, 4);
    ctx.fill();

    // Paddle highlight
    ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
    ctx.fillRect(paddle.x - paddle.w / 2 + 5, paddle.y - paddle.h / 2 + 2, paddle.w - 10, 3);

    // Gutter edges
    ctx.fillStyle = COLORS.brass;
    ctx.fillRect(paddle.x - paddle.w / 2, paddle.y - paddle.h / 2 - 5, 8, paddle.h + 5);
    ctx.fillRect(paddle.x + paddle.w / 2 - 8, paddle.y - paddle.h / 2 - 5, 8, paddle.h + 5);

    ctx.restore();

    // Draw ball (raindrop)
    if (ball.active || !ballLaunched) {
      const ballEntranceProgress = Math.min(1, (entranceTime - 0.3) / 0.3);
      ctx.save();
      ctx.globalAlpha = ballEntranceProgress;

      // Ball glow
      const ballGlow = ctx.createRadialGradient(ball.x, ball.y, 0, ball.x, ball.y, ball.r * 2);
      ballGlow.addColorStop(0, 'rgba(107, 179, 217, 0.4)');
      ballGlow.addColorStop(1, 'rgba(107, 179, 217, 0)');
      ctx.fillStyle = ballGlow;
      ctx.fillRect(ball.x - ball.r * 2, ball.y - ball.r * 2, ball.r * 4, ball.r * 4);

      // Ball (raindrop shape)
      ctx.fillStyle = COLORS.rain;
      ctx.beginPath();
      ctx.moveTo(ball.x, ball.y - ball.r * 1.3);
      ctx.quadraticCurveTo(ball.x + ball.r, ball.y, ball.x, ball.y + ball.r);
      ctx.quadraticCurveTo(ball.x - ball.r, ball.y, ball.x, ball.y - ball.r * 1.3);
      ctx.fill();

      // Ball highlight
      ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
      ctx.beginPath();
      ctx.ellipse(ball.x - 3, ball.y - 3, 3, 2, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    // Draw particles
    particles.forEach(p => {
      ctx.globalAlpha = p.life / p.maxLife;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * (p.life / p.maxLife), 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Draw border frame
    ctx.strokeStyle = COLORS.borderStrong;
    ctx.lineWidth = 4;
    ctx.strokeRect(10, 10, W - 20, H - 20);

    // Corner ornaments
    const cornerSize = 20;
    ctx.fillStyle = COLORS.brass;
    // Top-left
    ctx.fillRect(10, 10, cornerSize, 4);
    ctx.fillRect(10, 10, 4, cornerSize);
    // Top-right
    ctx.fillRect(W - 10 - cornerSize, 10, cornerSize, 4);
    ctx.fillRect(W - 14, 10, 4, cornerSize);
    // Bottom-left
    ctx.fillRect(10, H - 14, cornerSize, 4);
    ctx.fillRect(10, H - 10 - cornerSize, 4, cornerSize);
    // Bottom-right
    ctx.fillRect(W - 10 - cornerSize, H - 14, cornerSize, 4);
    ctx.fillRect(W - 14, H - 10 - cornerSize, 4, cornerSize);
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;

    if (e.type === 'keydown') {
      if (e.code === 'ArrowLeft') keys.left = true;
      if (e.code === 'ArrowRight') keys.right = true;
      if (e.code === 'Space' && !ballLaunched) {
        ballLaunched = true;
        ball.vx = (Math.random() - 0.5) * 100;
        ball.vy = -350;
        playSound('bounce');
      }
    } else if (e.type === 'keyup') {
      if (e.code === 'ArrowLeft') keys.left = false;
      if (e.code === 'ArrowRight') keys.right = false;
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    handleInput(e);
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
