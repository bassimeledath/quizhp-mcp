<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arrow UFO Hunter</title>
  <!--
  =====================================================================================
  GAME FACTORY TEMPLATE
  This template enforces critical invariants. Follow the section markers.
  =====================================================================================
  -->
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ===============================================================================
       BASE STYLES - Can be extended, not removed
       =============================================================================== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ===============================================================================
       CANVAS - Sized dynamically to fill available space
       =============================================================================== -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // =====================================================================================
  // SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT
  // Platform replaces this at runtime. Use these exact 60-char answers.
  // =====================================================================================
  const QUESTION = {
    type: "true_false",
    prompt: "The Earth is the third planet from the Sun in our solar system.",
    choices: [
      { text: "TRUE", is_correct: true, explanation: "Earth is indeed the third planet from the Sun." },
      { text: "FALSE", is_correct: false, explanation: "This statement is actually true - Earth is the third planet." }
    ],
    isLastQuestion: false
  };

  // =====================================================================================
  // SECTION 2: ENGINE CORE - DO NOT MODIFY
  // Standard engine interface and end screen. This is sacred.
  // =====================================================================================
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = "bold 18px 'Nunito Sans', system-ui, sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720x540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720x540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720x540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = "bold 36px 'Nunito Sans', system-ui, sans-serif";
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // =====================================================================================
  // SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS
  // This is where your game logic goes. See requirements below.
  // =====================================================================================

  // === GAME STATE ===
  const COLORS = {
    bgPrimary: '#0B1026',
    bgGradientTop: '#0B1026',
    bgGradientBottom: '#1a1a3e',
    textPrimary: '#F5F5F0',
    textSecondary: '#C2C2B8',
    orange: '#E87A3E',
    cyan: '#4ECDC4',
    amber: '#F5A742',
    success: '#6BBF59',
    error: '#E85D4A'
  };

  // === SOUND EFFECTS (Web Audio API) ===
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    const now = audioCtx.currentTime;

    if (type === 'shoot') {
      // Bow release - twangy sound
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(220, now);
      osc.frequency.exponentialRampToValueAtTime(110, now + 0.1);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
      osc.start(now);
      osc.stop(now + 0.15);
    } else if (type === 'hit_correct') {
      // Success - ascending arpeggio
      osc.type = 'sine';
      osc.frequency.setValueAtTime(440, now);
      osc.frequency.setValueAtTime(554, now + 0.1);
      osc.frequency.setValueAtTime(659, now + 0.2);
      gain.gain.setValueAtTime(0.25, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
      osc.start(now);
      osc.stop(now + 0.4);
    } else if (type === 'hit_wrong') {
      // Error - descending buzz
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.exponentialRampToValueAtTime(80, now + 0.3);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
      osc.start(now);
      osc.stop(now + 0.3);
    } else if (type === 'miss') {
      // Whoosh/miss
      osc.type = 'sine';
      osc.frequency.setValueAtTime(400, now);
      osc.frequency.exponentialRampToValueAtTime(100, now + 0.2);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
      osc.start(now);
      osc.stop(now + 0.2);
    }
  }

  // === ENTRANCE ANIMATION STATE ===
  let entranceTime = 0;
  const ENTRANCE_DURATION = 1.0; // seconds

  // Bow configuration
  let bow = {
    x: 100,
    y: H / 2,
    angle: 0,
    drawStrength: 0,
    maxDrawStrength: 150,
    isDrawing: false,
    entranceOffset: -150,
    entranceAlpha: 0
  };

  // Drag state
  let isDragging = false;
  let dragStartX = 0;
  let dragStartY = 0;

  // Arrow configuration
  let arrow = null;
  const ARROW_SPEED = 800;
  const ARROW_GRAVITY = 350; // pixels per second squared

  // UFO configuration
  let ufos = [];

  // Mouse position
  let mouseX = W / 2;
  let mouseY = H / 2;

  // Stars for background
  let stars = [];

  // Hit particles
  let hitParticles = [];

  // Trail particles for arrow
  let trailParticles = [];

  function initGame() {
    // Reset state
    arrow = null;
    bow.drawStrength = 0;
    bow.isDrawing = false;
    bow.entranceOffset = -150;
    bow.entranceAlpha = 0;
    bow.angle = 0;
    isDragging = false;
    hitParticles = [];
    trailParticles = [];
    entranceTime = 0;

    // Initialize stars
    stars = [];
    for (let i = 0; i < 100; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        size: Math.random() * 2 + 0.5,
        twinkle: Math.random() * Math.PI * 2,
        twinkleSpeed: Math.random() * 2 + 1
      });
    }

    // Initialize UFOs - one TRUE, one FALSE
    const trueChoice = QUESTION.choices.find(c => c.text === "TRUE") || QUESTION.choices[0];
    const falseChoice = QUESTION.choices.find(c => c.text === "FALSE") || QUESTION.choices[1];

    ufos = [
      {
        x: 400,
        y: 150,
        width: 90,
        height: 45,
        label: "TRUE",
        choice: trueChoice,
        vx: 0,
        vy: 0,
        targetX: 400,
        targetY: 150,
        bobPhase: 0,
        glowPhase: 0,
        scale: 1,
        hitTime: 0,
        entranceScale: 0,
        entranceAlpha: 0,
        entranceDelay: 0.3
      },
      {
        x: 550,
        y: 350,
        width: 90,
        height: 45,
        label: "FALSE",
        choice: falseChoice,
        vx: 0,
        vy: 0,
        targetX: 550,
        targetY: 350,
        bobPhase: Math.PI,
        glowPhase: Math.PI,
        scale: 1,
        hitTime: 0,
        entranceScale: 0,
        entranceAlpha: 0,
        entranceDelay: 0.5
      }
    ];
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    // Update entrance animation
    entranceTime += dt;

    // Animate bow entrance (slide in from left with spring)
    const bowProgress = Math.min(1, entranceTime / 0.5);
    const bowSpring = 1 + Math.sin(bowProgress * Math.PI * 2) * 0.2 * (1 - bowProgress);
    bow.entranceOffset = -150 * (1 - bowProgress) * bowSpring;
    bow.entranceAlpha = Math.min(1, entranceTime / 0.3);

    // Animate UFO entrances (pop in with spring)
    ufos.forEach(ufo => {
      const ufoTime = Math.max(0, entranceTime - ufo.entranceDelay);
      const ufoProgress = Math.min(1, ufoTime / 0.4);
      const spring = 1 + Math.sin(ufoProgress * Math.PI * 2) * 0.3 * (1 - ufoProgress);
      ufo.entranceScale = ufoProgress * spring;
      ufo.entranceAlpha = Math.min(1, ufoTime / 0.3);
    });

    // Update stars twinkling
    stars.forEach(star => {
      star.twinkle += star.twinkleSpeed * dt;
    });

    // Update bow angle and draw strength based on drag (only after entrance)
    if (entranceTime > 0.5 && isDragging) {
      const bowX = bow.x + bow.entranceOffset;

      // Angle points from mouse to bow (opposite of drag direction)
      const dx = bowX - mouseX;
      const dy = bow.y - mouseY;
      bow.angle = Math.atan2(dy, dx);

      // Clamp bow angle to reasonable range (don't shoot backwards)
      if (bow.angle < -Math.PI / 2.5) bow.angle = -Math.PI / 2.5;
      if (bow.angle > Math.PI / 2.5) bow.angle = Math.PI / 2.5;

      // Draw strength based on drag distance
      const dragDist = Math.sqrt(dx * dx + dy * dy);
      bow.drawStrength = Math.min(dragDist, bow.maxDrawStrength);
    }

    // Update UFO positions (wandering movement) - only after entrance
    ufos.forEach(ufo => {
      if (ufo.entranceScale < 0.9) return; // Wait for entrance

      // Randomly pick new target occasionally
      if (Math.random() < 0.01) {
        // Keep UFOs in the right portion of screen
        ufo.targetX = 200 + Math.random() * (W - 300);
        ufo.targetY = 50 + Math.random() * (H - 150);
      }

      // Move towards target with smooth easing
      const toTargetX = ufo.targetX - ufo.x;
      const toTargetY = ufo.targetY - ufo.y;
      ufo.vx += toTargetX * 0.015 * dt;
      ufo.vy += toTargetY * 0.015 * dt;

      // Apply velocity with damping
      ufo.vx *= 0.95;
      ufo.vy *= 0.95;

      ufo.x += ufo.vx;
      ufo.y += ufo.vy;

      // Bob up and down
      ufo.bobPhase += dt * 2;

      // Glow animation
      ufo.glowPhase += dt * 3;

      // Keep in bounds
      if (ufo.x < 180) ufo.x = 180;
      if (ufo.x > W - 80) ufo.x = W - 80;
      if (ufo.y < 50) ufo.y = 50;
      if (ufo.y > H - 80) ufo.y = H - 80;

      // Update hit animation
      if (ufo.hitTime > 0) {
        ufo.hitTime -= dt;
        ufo.scale = 1 + Math.sin(ufo.hitTime * 20) * 0.1;
      } else {
        ufo.scale = 1;
      }
    });

    // Update arrow
    if (arrow) {
      // Apply gravity to vertical velocity
      arrow.vy += ARROW_GRAVITY * dt;

      arrow.x += arrow.vx * dt;
      arrow.y += arrow.vy * dt;

      // Update arrow angle to match velocity direction
      arrow.angle = Math.atan2(arrow.vy, arrow.vx);

      // Create trail particles
      if (Math.random() < 0.5) {
        trailParticles.push({
          x: arrow.x - Math.cos(arrow.angle) * 20,
          y: arrow.y - Math.sin(arrow.angle) * 20,
          size: Math.random() * 3 + 1,
          life: 0.3,
          color: COLORS.amber
        });
      }

      // Check collision with UFOs
      ufos.forEach(ufo => {
        if (!arrow) return; // Arrow may have been nulled
        const bobOffset = Math.sin(ufo.bobPhase) * 8;
        const ufoY = ufo.y + bobOffset;

        // Simple box collision
        if (arrow.x > ufo.x - ufo.width / 2 &&
            arrow.x < ufo.x + ufo.width / 2 &&
            arrow.y > ufoY - ufo.height / 2 &&
            arrow.y < ufoY + ufo.height / 2) {

          // Hit! Create burst of particles
          const particleCount = 30;
          const isCorrect = ufo.choice.is_correct;
          for (let i = 0; i < particleCount; i++) {
            const angle = (i / particleCount) * Math.PI * 2;
            const speed = 150 + Math.random() * 200;
            hitParticles.push({
              x: arrow.x,
              y: arrow.y,
              vx: Math.cos(angle) * speed + (Math.random() - 0.5) * 100,
              vy: Math.sin(angle) * speed + (Math.random() - 0.5) * 100,
              size: Math.random() * 8 + 3,
              color: isCorrect ?
                ['#6BBF59', '#4ECDC4', '#F5A742'][Math.floor(Math.random() * 3)] :
                ['#E85D4A', '#E87A3E', '#FF6B6B'][Math.floor(Math.random() * 3)],
              life: 1,
              rotation: Math.random() * Math.PI * 2,
              rotationSpeed: (Math.random() - 0.5) * 10
            });
          }

          // Play sound
          playSound(isCorrect ? 'hit_correct' : 'hit_wrong');

          ufo.hitTime = 0.5;
          arrow = null;

          // End game
          engine.end(ufo.choice.is_correct, ufo.choice.explanation);
        }
      });

      // Remove arrow if out of bounds
      if (arrow && (arrow.x < 0 || arrow.x > W || arrow.y < 0 || arrow.y > H)) {
        playSound('miss');
        arrow = null;
      }
    }

    // Update hit particles
    hitParticles = hitParticles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 400 * dt; // gravity
      p.life -= dt * 1.5;
      if (p.rotation !== undefined) {
        p.rotation += p.rotationSpeed * dt;
      }
      return p.life > 0;
    });

    // Update trail particles
    trailParticles = trailParticles.filter(p => {
      p.life -= dt * 3;
      p.size *= 0.95;
      return p.life > 0;
    });
  }

  function drawGame() {
    // Draw gradient background (space theme)
    const gradient = ctx.createLinearGradient(0, 0, 0, H);
    gradient.addColorStop(0, COLORS.bgGradientTop);
    gradient.addColorStop(1, COLORS.bgGradientBottom);
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, W, H);

    // Draw stars
    stars.forEach(star => {
      const alpha = 0.3 + Math.sin(star.twinkle) * 0.3 + 0.4;
      ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
      ctx.beginPath();
      ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
      ctx.fill();
    });

    // Draw UFOs
    ufos.forEach(ufo => {
      if (ufo.entranceAlpha <= 0) return; // Skip if not visible yet

      const bobOffset = Math.sin(ufo.bobPhase) * 8;
      const ufoY = ufo.y + bobOffset;

      ctx.save();
      ctx.globalAlpha = ufo.entranceAlpha;
      ctx.translate(ufo.x, ufoY);
      ctx.scale(ufo.scale * ufo.entranceScale, ufo.scale * ufo.entranceScale);

      // UFO glow
      const glowIntensity = 0.3 + Math.sin(ufo.glowPhase) * 0.2;
      const glowGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, ufo.width);
      glowGradient.addColorStop(0, `rgba(78, 205, 196, ${glowIntensity})`);
      glowGradient.addColorStop(1, 'rgba(78, 205, 196, 0)');
      ctx.fillStyle = glowGradient;
      ctx.beginPath();
      ctx.ellipse(0, 0, ufo.width * 0.8, ufo.height * 0.8, 0, 0, Math.PI * 2);
      ctx.fill();

      // UFO dome (top)
      ctx.fillStyle = '#6BE5FF';
      ctx.beginPath();
      ctx.ellipse(0, -15, 30, 25, 0, Math.PI, 0);
      ctx.fill();

      // Dome highlight
      ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
      ctx.beginPath();
      ctx.ellipse(-8, -22, 10, 8, 0, 0, Math.PI * 2);
      ctx.fill();

      // UFO body (saucer)
      const bodyGradient = ctx.createLinearGradient(0, -10, 0, 20);
      bodyGradient.addColorStop(0, '#A8A8A8');
      bodyGradient.addColorStop(0.5, '#707070');
      bodyGradient.addColorStop(1, '#505050');
      ctx.fillStyle = bodyGradient;
      ctx.beginPath();
      ctx.ellipse(0, 5, ufo.width / 2, 20, 0, 0, Math.PI * 2);
      ctx.fill();

      // UFO lights
      const lightColors = ['#FF6B6B', '#FFD93D', '#6BCB77', '#4D96FF'];
      for (let i = 0; i < 4; i++) {
        const lightAngle = (i / 4) * Math.PI * 2 + ufo.glowPhase;
        const lx = Math.cos(lightAngle) * 35;
        const ly = Math.sin(lightAngle) * 8 + 5;
        ctx.fillStyle = lightColors[i];
        ctx.beginPath();
        ctx.arc(lx, ly, 5, 0, Math.PI * 2);
        ctx.fill();
      }

      // UFO beam (subtle)
      ctx.fillStyle = 'rgba(78, 205, 196, 0.1)';
      ctx.beginPath();
      ctx.moveTo(-25, 20);
      ctx.lineTo(25, 20);
      ctx.lineTo(40, 80);
      ctx.lineTo(-40, 80);
      ctx.closePath();
      ctx.fill();

      // Label background
      const labelWidth = 80;
      const labelHeight = 28;
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.beginPath();
      ctx.roundRect(-labelWidth / 2, -55, labelWidth, labelHeight, 6);
      ctx.fill();

      // Label text
      ctx.fillStyle = ufo.label === "TRUE" ? COLORS.success : COLORS.error;
      ctx.font = "bold 18px 'Nunito Sans', sans-serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(ufo.label, 0, -41);

      ctx.restore();
      ctx.globalAlpha = 1;
    });

    // Draw trail particles (behind arrow)
    trailParticles.forEach(p => {
      ctx.globalAlpha = p.life * 0.6;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Draw bow with entrance animation
    ctx.save();
    ctx.globalAlpha = bow.entranceAlpha;
    ctx.translate(bow.x + bow.entranceOffset, bow.y);
    ctx.rotate(bow.angle);

    const drawRatio = bow.drawStrength / bow.maxDrawStrength;
    const stringPull = drawRatio * 40; // How far back the string is pulled

    // Bow limbs (curved wooden bow shape)
    const bowLength = 70;
    const bowCurve = 25 + drawRatio * 10; // Bow bends more when drawn

    // Draw bow wood grain effect (outer edge)
    ctx.strokeStyle = '#5D3A1A';
    ctx.lineWidth = 10;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, -bowLength);
    ctx.quadraticCurveTo(bowCurve, 0, 0, bowLength);
    ctx.stroke();

    // Main bow body
    ctx.strokeStyle = '#8B5A2B';
    ctx.lineWidth = 7;
    ctx.beginPath();
    ctx.moveTo(0, -bowLength);
    ctx.quadraticCurveTo(bowCurve, 0, 0, bowLength);
    ctx.stroke();

    // Bow highlight (inner edge)
    ctx.strokeStyle = '#A0724D';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0, -bowLength + 5);
    ctx.quadraticCurveTo(bowCurve - 3, 0, 0, bowLength - 5);
    ctx.stroke();

    // Grip wrap
    ctx.fillStyle = '#3D2817';
    ctx.beginPath();
    ctx.ellipse(bowCurve / 2 - 2, 0, 8, 12, 0, 0, Math.PI * 2);
    ctx.fill();

    // Grip wrap lines
    ctx.strokeStyle = '#2A1A0F';
    ctx.lineWidth = 1;
    for (let i = -8; i <= 8; i += 4) {
      ctx.beginPath();
      ctx.moveTo(bowCurve / 2 - 8, i);
      ctx.lineTo(bowCurve / 2 + 4, i);
      ctx.stroke();
    }

    // Bowstring
    ctx.strokeStyle = '#E8E4D9';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, -bowLength);
    ctx.lineTo(-stringPull, 0); // String pulled back
    ctx.lineTo(0, bowLength);
    ctx.stroke();

    // Nock points on string (small knots)
    ctx.fillStyle = '#C4B998';
    ctx.beginPath();
    ctx.arc(0, -bowLength, 3, 0, Math.PI * 2);
    ctx.arc(0, bowLength, 3, 0, Math.PI * 2);
    ctx.fill();

    // Arrow on bow (when not fired and drawing)
    if (!arrow) {
      const arrowPullBack = stringPull;

      // Arrow shaft
      const shaftGradient = ctx.createLinearGradient(-arrowPullBack, -2, -arrowPullBack + 55, 2);
      shaftGradient.addColorStop(0, '#D4B896');
      shaftGradient.addColorStop(0.5, '#C4A476');
      shaftGradient.addColorStop(1, '#B89456');
      ctx.fillStyle = shaftGradient;
      ctx.fillRect(-arrowPullBack, -2, 55, 4);

      // Arrow head (broadhead style)
      ctx.fillStyle = '#607080';
      ctx.beginPath();
      ctx.moveTo(-arrowPullBack + 55, 0);
      ctx.lineTo(-arrowPullBack + 70, -7);
      ctx.lineTo(-arrowPullBack + 65, 0);
      ctx.lineTo(-arrowPullBack + 70, 7);
      ctx.closePath();
      ctx.fill();

      // Arrow head shine
      ctx.fillStyle = '#8090A0';
      ctx.beginPath();
      ctx.moveTo(-arrowPullBack + 55, 0);
      ctx.lineTo(-arrowPullBack + 67, -4);
      ctx.lineTo(-arrowPullBack + 63, 0);
      ctx.closePath();
      ctx.fill();

      // Arrow fletching (feathers)
      // Top feather
      ctx.fillStyle = '#C0392B';
      ctx.beginPath();
      ctx.moveTo(-arrowPullBack + 5, -2);
      ctx.quadraticCurveTo(-arrowPullBack - 5, -12, -arrowPullBack - 12, -6);
      ctx.lineTo(-arrowPullBack, -2);
      ctx.closePath();
      ctx.fill();

      // Bottom feather
      ctx.beginPath();
      ctx.moveTo(-arrowPullBack + 5, 2);
      ctx.quadraticCurveTo(-arrowPullBack - 5, 12, -arrowPullBack - 12, 6);
      ctx.lineTo(-arrowPullBack, 2);
      ctx.closePath();
      ctx.fill();

      // Feather details
      ctx.strokeStyle = '#922B21';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(-arrowPullBack + 3, -3);
      ctx.lineTo(-arrowPullBack - 8, -8);
      ctx.moveTo(-arrowPullBack + 3, 3);
      ctx.lineTo(-arrowPullBack - 8, 8);
      ctx.stroke();

      // Nock (end of arrow)
      ctx.fillStyle = '#F5F0E6';
      ctx.fillRect(-arrowPullBack - 2, -3, 4, 6);
    }

    ctx.restore();

    // Draw flying arrow
    if (arrow) {
      ctx.save();
      ctx.translate(arrow.x, arrow.y);
      ctx.rotate(arrow.angle);

      // Arrow shaft
      ctx.fillStyle = '#C4A484';
      ctx.fillRect(-30, -2, 60, 4);

      // Arrow head
      ctx.fillStyle = '#707070';
      ctx.beginPath();
      ctx.moveTo(30, 0);
      ctx.lineTo(40, -6);
      ctx.lineTo(40, 6);
      ctx.closePath();
      ctx.fill();

      // Arrow fletching
      ctx.fillStyle = COLORS.error;
      ctx.beginPath();
      ctx.moveTo(-30, -2);
      ctx.lineTo(-45, -8);
      ctx.lineTo(-35, -2);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(-30, 2);
      ctx.lineTo(-45, 8);
      ctx.lineTo(-35, 2);
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }

    // Draw hit particles with rotation
    hitParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.translate(p.x, p.y);
      if (p.rotation !== undefined) {
        ctx.rotate(p.rotation);
      }
      ctx.fillStyle = p.color;
      // Draw as rectangles for more confetti-like appearance
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });
    ctx.globalAlpha = 1;

    // Draw aiming line (curved trajectory preview) - only when drawing
    const bowX = bow.x + bow.entranceOffset;
    if (!arrow && isDragging && bow.drawStrength > 20) {
      const powerRatio = bow.drawStrength / bow.maxDrawStrength;
      const previewSpeed = ARROW_SPEED * (0.3 + powerRatio * 0.7);

      // Line opacity based on draw strength
      ctx.strokeStyle = `rgba(255, 255, 255, ${0.15 + powerRatio * 0.25})`;
      ctx.lineWidth = 1 + powerRatio;
      ctx.setLineDash([5, 10]);
      ctx.beginPath();

      // Simulate trajectory with gravity - start from arrow tip position
      let simX = bowX + Math.cos(bow.angle) * 50;
      let simY = bow.y + Math.sin(bow.angle) * 50;
      let simVx = Math.cos(bow.angle) * previewSpeed;
      let simVy = Math.sin(bow.angle) * previewSpeed;
      const simDt = 0.016; // ~60fps simulation step
      const simSteps = 50;

      ctx.moveTo(simX, simY);
      for (let i = 0; i < simSteps; i++) {
        simVy += ARROW_GRAVITY * simDt;
        simX += simVx * simDt;
        simY += simVy * simDt;

        // Stop if out of bounds
        if (simX > W || simY > H || simY < 0) break;

        ctx.lineTo(simX, simY);
      }
      ctx.stroke();
      ctx.setLineDash([]);

      // Draw power indicator near bow
      const indicatorX = bowX - 30;
      const indicatorY = bow.y - 50;
      const indicatorHeight = 60;

      // Background bar
      ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
      ctx.beginPath();
      ctx.roundRect(indicatorX - 6, indicatorY, 12, indicatorHeight, 4);
      ctx.fill();

      // Power fill
      const fillHeight = indicatorHeight * powerRatio;
      const powerColor = powerRatio < 0.5 ?
        `rgb(${Math.floor(245 * powerRatio * 2)}, ${Math.floor(167)}, 66)` :
        `rgb(232, ${Math.floor(122 - (powerRatio - 0.5) * 60)}, 62)`;
      ctx.fillStyle = powerColor;
      ctx.beginPath();
      ctx.roundRect(indicatorX - 4, indicatorY + indicatorHeight - fillHeight + 2, 8, fillHeight - 4, 3);
      ctx.fill();
    }
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;
    // Keyboard input not used - mouse/click based game
  }

  // Mouse/touch move handler for aiming while dragging
  function handlePointerMove(clientX, clientY) {
    if (gameState !== 'playing') return;
    const pos = screenToLogical(clientX, clientY);
    mouseX = pos.x;
    mouseY = pos.y;
  }

  canvas.addEventListener('mousemove', (e) => handlePointerMove(e.clientX, e.clientY));
  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    handlePointerMove(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: false });

  // Mouse/touch down handler - start drawing the bow
  function handlePointerDown(clientX, clientY) {
    if (gameState !== 'playing') return;
    if (arrow) return; // Only one arrow at a time
    if (entranceTime < 0.8) return; // Wait for entrance animation

    // Initialize audio on first interaction
    initAudio();

    const pos = screenToLogical(clientX, clientY);
    mouseX = pos.x;
    mouseY = pos.y;

    isDragging = true;
    dragStartX = pos.x;
    dragStartY = pos.y;
    bow.drawStrength = 0;
  }

  canvas.addEventListener('mousedown', (e) => handlePointerDown(e.clientX, e.clientY));
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    handlePointerDown(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: false });

  // Mouse/touch up handler - release the arrow
  function handlePointerUp() {
    if (gameState !== 'playing') return;
    if (!isDragging) return;

    isDragging = false;

    // Only fire if there's enough draw strength
    if (bow.drawStrength > 20) {
      // Play shoot sound
      playSound('shoot');

      // Calculate arrow speed based on draw strength
      const powerRatio = bow.drawStrength / bow.maxDrawStrength;
      const arrowSpeed = ARROW_SPEED * (0.3 + powerRatio * 0.7); // 30% to 100% speed

      // Fire arrow from bow position
      const bowX = bow.x + bow.entranceOffset;
      arrow = {
        x: bowX + Math.cos(bow.angle) * 50,
        y: bow.y + Math.sin(bow.angle) * 50,
        angle: bow.angle,
        vx: Math.cos(bow.angle) * arrowSpeed,
        vy: Math.sin(bow.angle) * arrowSpeed
      };
    }

    // Reset draw strength
    bow.drawStrength = 0;
  }

  canvas.addEventListener('mouseup', handlePointerUp);
  canvas.addEventListener('mouseleave', handlePointerUp);
  canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    handlePointerUp();
  });
  canvas.addEventListener('touchcancel', handlePointerUp);

  // =====================================================================================
  // SECTION 4: GAME LOOP - DO NOT MODIFY
  // Standard loop with responsive scaling and DPR support.
  // =====================================================================================
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });


  // Cursor change handler for end screen buttons
  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'ended') {
      canvas.style.cursor = 'default';
      return;
    }
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    if (gameResult) {
      if (pointInRect(x, y, restartButton) || pointInRect(x, y, nextButton)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    } else {
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    }
    canvas.style.cursor = 'default';
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
