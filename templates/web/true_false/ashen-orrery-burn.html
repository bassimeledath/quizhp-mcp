<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ashen Orrery Burn</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "true_false",
    prompt: "Sample question text",
    choices: [
      { text: "True", is_correct: true, explanation: "This is the correct answer" },
      { text: "False", is_correct: false, explanation: "This is incorrect" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS (QuizHP Palette) ===
  const COLORS = {
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    bgPrimary: '#FAFAF7',
    borderSubtle: '#E6E6E0'
  };

  // === AUDIO ===
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) audioCtx = new AudioCtx();
  }

  function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'fire') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(150, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.15);
    } else if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'wrong') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(180, audioCtx.currentTime);
      osc.frequency.setValueAtTime(140, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.25);
    } else if (type === 'deflect') {
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(600, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.05);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    }
  }

  // === GAME STATE ===
  let laser = {
    x: W / 2,
    y: H - 80,
    angle: -Math.PI / 2, // pointing up
    width: 20,
    height: 40
  };

  let laserBeam = null;
  let beamParticles = [];
  let cinderParticles = [];
  let orreryRings = [];
  let emberDust = [];
  let hitAnimation = null;
  let entranceAnim = 0;
  let targetAnimations = { astrolabe: { scale: 1, shake: 0 }, eclipse: { scale: 1, shake: 0 } };

  // Targets
  const astrolabe = { x: W / 2 - 150, y: 150, radius: 60 }; // TRUE - crystal astrolabe
  const deflector = { x: W / 2, y: 280, width: 80, height: 15, angle: Math.PI / 4 }; // brass deflector
  const eclipsePlate = { x: W / 2 + 150, y: 150, radius: 50 }; // FALSE - slate eclipse plate

  // Input state
  let keys = { left: false, right: false };

  function initGame() {
    initAudio();

    laser = {
      x: W / 2,
      y: H - 80,
      angle: -Math.PI / 2,
      width: 20,
      height: 40
    };
    laserBeam = null;
    beamParticles = [];
    hitAnimation = null;
    emberDust = [];
    entranceAnim = 0;
    targetAnimations = { astrolabe: { scale: 0, shake: 0 }, eclipse: { scale: 0, shake: 0 } };

    // Initialize cinder particles floating past slit windows
    cinderParticles = [];
    for (let i = 0; i < 15; i++) {
      cinderParticles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: 20 + Math.random() * 30,
        vy: -10 - Math.random() * 20,
        size: 2 + Math.random() * 3,
        alpha: 0.3 + Math.random() * 0.5
      });
    }

    // Initialize orrery rings
    orreryRings = [];
    const orreryCenter = { x: W / 2, y: H / 2 - 30 };
    for (let i = 0; i < 4; i++) {
      orreryRings.push({
        cx: orreryCenter.x,
        cy: orreryCenter.y,
        radius: 80 + i * 35,
        rotation: Math.random() * Math.PI * 2,
        speed: (0.2 + Math.random() * 0.3) * (i % 2 === 0 ? 1 : -1),
        fused: false
      });
    }

    keys = { left: false, right: false };
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    // Update entrance animation
    if (entranceAnim < 1) {
      entranceAnim += dt * 2;
      if (entranceAnim > 1) entranceAnim = 1;

      // Bounce-in effect for targets
      const t = Math.min(entranceAnim * 2, 1);
      const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
      targetAnimations.astrolabe.scale = t * spring;

      const t2 = Math.min((entranceAnim - 0.15) * 2, 1);
      if (t2 > 0) {
        const spring2 = 1 + Math.sin(t2 * Math.PI * 2) * 0.2 * (1 - t2);
        targetAnimations.eclipse.scale = t2 * spring2;
      }
    }

    // Update cinder particles
    cinderParticles.forEach(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      if (p.x > W + 10) p.x = -10;
      if (p.y < -10) p.y = H + 10;
    });

    // Update orrery rotation
    orreryRings.forEach(ring => {
      if (!ring.fused) {
        ring.rotation += ring.speed * dt;
      }
    });

    // Update ember dust
    emberDust = emberDust.filter(p => {
      p.y += p.vy * dt;
      p.x += p.vx * dt;
      p.alpha -= dt * 0.5;
      return p.alpha > 0;
    });

    // Update target shake animations
    if (targetAnimations.astrolabe.shake > 0) {
      targetAnimations.astrolabe.shake -= dt * 3;
    }
    if (targetAnimations.eclipse.shake > 0) {
      targetAnimations.eclipse.shake -= dt * 3;
    }

    // Rotate laser based on input
    const rotateSpeed = 2.0;
    if (keys.left) {
      laser.angle -= rotateSpeed * dt;
    }
    if (keys.right) {
      laser.angle += rotateSpeed * dt;
    }
    // Clamp angle
    laser.angle = Math.max(-Math.PI + 0.3, Math.min(-0.3, laser.angle));

    // Update beam particles
    beamParticles = beamParticles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      return p.life > 0;
    });

    // Update hit animation
    if (hitAnimation) {
      hitAnimation.time += dt;
      if (hitAnimation.time > 0.5) {
        hitAnimation = null;
      }
    }

    // Update laser beam if fired
    if (laserBeam) {
      const beamSpeed = 800;
      laserBeam.x += Math.cos(laserBeam.angle) * beamSpeed * dt;
      laserBeam.y += Math.sin(laserBeam.angle) * beamSpeed * dt;

      // Add trail particles
      if (Math.random() < 0.5) {
        beamParticles.push({
          x: laserBeam.x,
          y: laserBeam.y,
          vx: (Math.random() - 0.5) * 50,
          vy: (Math.random() - 0.5) * 50,
          life: 0.3
        });
      }

      // Check collision with astrolabe (TRUE - direct hit)
      const distToAstrolabe = Math.sqrt(
        Math.pow(laserBeam.x - astrolabe.x, 2) +
        Math.pow(laserBeam.y - astrolabe.y, 2)
      );
      if (distToAstrolabe < astrolabe.radius) {
        const trueChoice = QUESTION.choices.find(c => c.text === "True") || QUESTION.choices[0];
        hitAnimation = { target: 'astrolabe', time: 0, isCorrect: trueChoice.is_correct };
        if (trueChoice.is_correct) {
          playSound('correct');
          targetAnimations.astrolabe.scale = 1.2;
        } else {
          playSound('wrong');
          targetAnimations.astrolabe.shake = 1;
          // Spawn ember dust for wrong answer
          for (let i = 0; i < 20; i++) {
            emberDust.push({
              x: astrolabe.x + (Math.random() - 0.5) * 40,
              y: astrolabe.y,
              vx: (Math.random() - 0.5) * 100,
              vy: 50 + Math.random() * 100,
              size: 2 + Math.random() * 3,
              alpha: 1
            });
          }
        }
        engine.end(trueChoice.is_correct, trueChoice.explanation);
        laserBeam = null;
        return;
      }

      // Check collision with deflector
      const deflectorCenterX = deflector.x;
      const deflectorCenterY = deflector.y;
      const deflectorDist = Math.abs(
        (laserBeam.y - deflectorCenterY) * Math.cos(deflector.angle) -
        (laserBeam.x - deflectorCenterX) * Math.sin(deflector.angle)
      );
      const alongDeflector =
        (laserBeam.x - deflectorCenterX) * Math.cos(deflector.angle) +
        (laserBeam.y - deflectorCenterY) * Math.sin(deflector.angle);

      if (deflectorDist < 10 && Math.abs(alongDeflector) < deflector.width / 2 && !laserBeam.deflected) {
        // Reflect beam towards eclipse plate
        playSound('deflect');
        laserBeam.angle = -Math.PI / 4; // Redirect toward eclipse plate
        laserBeam.x = deflector.x + 20;
        laserBeam.y = deflector.y - 20;
        laserBeam.deflected = true;
      }

      // Check collision with eclipse plate (FALSE)
      const distToEclipse = Math.sqrt(
        Math.pow(laserBeam.x - eclipsePlate.x, 2) +
        Math.pow(laserBeam.y - eclipsePlate.y, 2)
      );
      if (distToEclipse < eclipsePlate.radius) {
        const falseChoice = QUESTION.choices.find(c => c.text === "False") || QUESTION.choices[1];
        hitAnimation = { target: 'eclipse', time: 0, isCorrect: falseChoice.is_correct };
        if (falseChoice.is_correct) {
          playSound('correct');
          targetAnimations.eclipse.scale = 1.2;
        } else {
          playSound('wrong');
          targetAnimations.eclipse.shake = 1;
          // Spawn ember dust for wrong answer
          for (let i = 0; i < 20; i++) {
            emberDust.push({
              x: eclipsePlate.x + (Math.random() - 0.5) * 40,
              y: eclipsePlate.y,
              vx: (Math.random() - 0.5) * 100,
              vy: 50 + Math.random() * 100,
              size: 2 + Math.random() * 3,
              alpha: 1
            });
          }
        }
        engine.end(falseChoice.is_correct, falseChoice.explanation);
        laserBeam = null;
        return;
      }

      // Remove beam if off screen
      if (laserBeam && (laserBeam.x < 0 || laserBeam.x > W || laserBeam.y < 0 || laserBeam.y > H)) {
        laserBeam = null;
      }
    }
  }

  function drawGame() {
    // Background - soot-stained observatory with brutalist charcoal walls
    ctx.fillStyle = '#1C1C1A';
    ctx.fillRect(0, 0, W, H);

    // Charcoal sketch walls - brutalist texture
    ctx.strokeStyle = '#2A2A27';
    ctx.lineWidth = 2;
    for (let i = 0; i < 20; i++) {
      const y = i * 30 + 10;
      ctx.beginPath();
      ctx.moveTo(0, y);
      for (let x = 0; x < W; x += 20) {
        ctx.lineTo(x, y + (Math.random() - 0.5) * 4);
      }
      ctx.stroke();
    }

    // Slit windows on sides
    ctx.fillStyle = '#363633';
    ctx.fillRect(10, 100, 15, 200);
    ctx.fillRect(W - 25, 100, 15, 200);
    ctx.fillRect(10, 350, 15, 150);
    ctx.fillRect(W - 25, 350, 15, 150);

    // Draw cinders drifting past windows (orange accent color)
    cinderParticles.forEach(p => {
      ctx.fillStyle = `rgba(232, 122, 62, ${p.alpha})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    });

    // Draw orrery rings (dying orrery)
    orreryRings.forEach((ring, i) => {
      ctx.save();
      ctx.translate(ring.cx, ring.cy);
      ctx.rotate(ring.rotation);

      if (ring.fused) {
        ctx.strokeStyle = '#5A5A56';
        ctx.lineWidth = 4;
      } else {
        ctx.strokeStyle = `rgba(140, 140, 132, ${0.6 - i * 0.1})`;
        ctx.lineWidth = 2;
      }

      ctx.beginPath();
      ctx.arc(0, 0, ring.radius, 0, Math.PI * 2);
      ctx.stroke();

      // Draw orbital bodies
      if (!ring.fused) {
        ctx.fillStyle = '#8C8C84';
        ctx.beginPath();
        ctx.arc(ring.radius, 0, 5, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    });

    // Draw TRUE target - crystal astrolabe (faceted, pale crystal)
    ctx.save();
    const astroShake = targetAnimations.astrolabe.shake;
    const astroScale = targetAnimations.astrolabe.scale;
    ctx.translate(astrolabe.x + Math.sin(astroShake * Math.PI * 10) * 8 * astroShake, astrolabe.y);
    ctx.scale(astroScale, astroScale);

    // Hanging chain
    ctx.strokeStyle = '#C2C2B8';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, -astrolabe.radius - 30);
    ctx.lineTo(0, -astrolabe.radius);
    ctx.stroke();

    // Crystal facets - pale crystal with cyan accent
    const facets = 8;
    for (let i = 0; i < facets; i++) {
      const angle = (i / facets) * Math.PI * 2;
      const nextAngle = ((i + 1) / facets) * Math.PI * 2;

      // Use cyan tint for crystal
      const alpha = 0.3 + (i % 2) * 0.2;
      ctx.fillStyle = i % 2 === 0 ? `rgba(78, 205, 196, ${alpha})` : `rgba(200, 220, 230, ${alpha})`;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(Math.cos(angle) * astrolabe.radius, Math.sin(angle) * astrolabe.radius);
      ctx.lineTo(Math.cos(nextAngle) * astrolabe.radius, Math.sin(nextAngle) * astrolabe.radius);
      ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = 'rgba(78, 205, 196, 0.6)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Inner ring detail
    ctx.strokeStyle = COLORS.cyan;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, 0, astrolabe.radius * 0.5, 0, Math.PI * 2);
    ctx.stroke();

    // TRUE label
    ctx.fillStyle = COLORS.cyan;
    ctx.font = "bold 18px 'Nunito Sans', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('TRUE', 0, astrolabe.radius + 25);

    ctx.restore();

    // Draw brass deflector (amber accent)
    ctx.save();
    ctx.translate(deflector.x, deflector.y);
    ctx.rotate(deflector.angle);

    // Brass gradient using amber colors
    const brassGrad = ctx.createLinearGradient(-deflector.width/2, 0, deflector.width/2, 0);
    brassGrad.addColorStop(0, '#C9872F');
    brassGrad.addColorStop(0.5, COLORS.amber);
    brassGrad.addColorStop(1, '#C9872F');
    ctx.fillStyle = brassGrad;
    ctx.fillRect(-deflector.width/2, -deflector.height/2, deflector.width, deflector.height);

    // Brass edge
    ctx.strokeStyle = COLORS.orangeHover;
    ctx.lineWidth = 2;
    ctx.strokeRect(-deflector.width/2, -deflector.height/2, deflector.width, deflector.height);

    ctx.restore();

    // Draw FALSE target - slate eclipse plate (crescent, black slate with brass teeth)
    ctx.save();
    const eclipseShake = targetAnimations.eclipse.shake;
    const eclipseScale = targetAnimations.eclipse.scale;
    ctx.translate(eclipsePlate.x + Math.sin(eclipseShake * Math.PI * 10) * 8 * eclipseShake, eclipsePlate.y);
    ctx.scale(eclipseScale, eclipseScale);

    // Slate crescent
    ctx.fillStyle = '#2A2A27';
    ctx.beginPath();
    ctx.arc(0, 0, eclipsePlate.radius, 0, Math.PI * 2);
    ctx.fill();

    // Inner cutout for crescent effect
    ctx.fillStyle = '#1C1C1A';
    ctx.beginPath();
    ctx.arc(15, -10, eclipsePlate.radius * 0.7, 0, Math.PI * 2);
    ctx.fill();

    // Brass teeth rim (amber color)
    const teethCount = 16;
    ctx.fillStyle = COLORS.amber;
    for (let i = 0; i < teethCount; i++) {
      const angle = (i / teethCount) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(
        Math.cos(angle) * (eclipsePlate.radius - 5),
        Math.sin(angle) * (eclipsePlate.radius - 5)
      );
      ctx.lineTo(
        Math.cos(angle - 0.1) * (eclipsePlate.radius + 8),
        Math.sin(angle - 0.1) * (eclipsePlate.radius + 8)
      );
      ctx.lineTo(
        Math.cos(angle + 0.1) * (eclipsePlate.radius + 8),
        Math.sin(angle + 0.1) * (eclipsePlate.radius + 8)
      );
      ctx.closePath();
      ctx.fill();
    }

    // FALSE label
    ctx.fillStyle = COLORS.amber;
    ctx.font = "bold 18px 'Nunito Sans', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('FALSE', 0, eclipsePlate.radius + 25);

    ctx.restore();

    // Draw ember dust (from wrong answers - error red)
    emberDust.forEach(p => {
      ctx.fillStyle = `rgba(232, 93, 74, ${p.alpha})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    });

    // Draw furnace laser
    ctx.save();
    ctx.translate(laser.x, laser.y);
    ctx.rotate(laser.angle + Math.PI / 2);

    // Furnace body
    const furnaceGrad = ctx.createLinearGradient(-laser.width/2, 0, laser.width/2, 0);
    furnaceGrad.addColorStop(0, '#363633');
    furnaceGrad.addColorStop(0.5, '#5A5A56');
    furnaceGrad.addColorStop(1, '#363633');
    ctx.fillStyle = furnaceGrad;
    ctx.fillRect(-laser.width/2, -laser.height/2, laser.width, laser.height);

    // Glow at emission point (orange primary)
    ctx.fillStyle = COLORS.orange;
    ctx.beginPath();
    ctx.arc(0, -laser.height/2, 8, 0, Math.PI * 2);
    ctx.fill();

    // Inner glow (amber)
    ctx.fillStyle = COLORS.amber;
    ctx.beginPath();
    ctx.arc(0, -laser.height/2, 4, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();

    // Draw aim line (faint orange)
    ctx.strokeStyle = 'rgba(232, 122, 62, 0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([5, 5]);
    ctx.beginPath();
    ctx.moveTo(laser.x, laser.y);
    ctx.lineTo(
      laser.x + Math.cos(laser.angle) * 400,
      laser.y + Math.sin(laser.angle) * 400
    );
    ctx.stroke();
    ctx.setLineDash([]);

    // Draw laser beam
    if (laserBeam) {
      // Beam glow (orange)
      ctx.strokeStyle = 'rgba(232, 122, 62, 0.5)';
      ctx.lineWidth = 12;
      ctx.beginPath();
      ctx.moveTo(laser.x, laser.y);
      ctx.lineTo(laserBeam.x, laserBeam.y);
      ctx.stroke();

      // Core beam
      ctx.strokeStyle = COLORS.orange;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(laser.x, laser.y);
      ctx.lineTo(laserBeam.x, laserBeam.y);
      ctx.stroke();

      // Bright core (amber)
      ctx.strokeStyle = COLORS.amber;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(laser.x, laser.y);
      ctx.lineTo(laserBeam.x, laserBeam.y);
      ctx.stroke();
    }

    // Draw beam particles
    beamParticles.forEach(p => {
      ctx.fillStyle = `rgba(245, 167, 66, ${p.life})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
      ctx.fill();
    });

    // Draw hit animation
    if (hitAnimation) {
      const progress = hitAnimation.time / 0.5;
      const alpha = 1 - progress;
      const radius = 30 + progress * 50;

      if (hitAnimation.isCorrect) {
        ctx.strokeStyle = `rgba(107, 191, 89, ${alpha})`;
      } else {
        ctx.strokeStyle = `rgba(232, 93, 74, ${alpha})`;
      }
      ctx.lineWidth = 3;
      ctx.beginPath();
      const targetX = hitAnimation.target === 'astrolabe' ? astrolabe.x : eclipsePlate.x;
      const targetY = hitAnimation.target === 'astrolabe' ? astrolabe.y : eclipsePlate.y;
      ctx.arc(targetX, targetY, radius, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;

    // Movement keys
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
      if (e.type === 'keydown') keys.left = true;
    }
    if (e.code === 'ArrowRight' || e.code === 'KeyD') {
      if (e.type === 'keydown') keys.right = true;
    }

    // Fire beam
    if ((e.code === 'Space' || e.code === 'Enter') && e.type === 'keydown' && !laserBeam) {
      playSound('fire');
      laserBeam = {
        x: laser.x + Math.cos(laser.angle) * laser.height,
        y: laser.y + Math.sin(laser.angle) * laser.height,
        angle: laser.angle,
        deflected: false
      };
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Handle key release
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
      keys.left = false;
    }
    if (e.code === 'ArrowRight' || e.code === 'KeyD') {
      keys.right = false;
    }
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
