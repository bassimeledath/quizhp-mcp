<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brass Pulsar Lure</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1C1C1A;
      font-family: 'Nunito', sans-serif;
    }
    #gameCanvas {
      background: #2A2A27;
      border-radius: 12px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "true_false",
    prompt: "Sample question text",
    choices: [
      { text: "True", is_correct: true, explanation: "Why True is correct" },
      { text: "False", is_correct: false, explanation: "Why False is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = "bold 18px 'Nunito Sans', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = "bold 36px 'Nunito Sans', sans-serif";
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // Color palette
  const COLORS = {
    bgPrimary: '#1C1C1A',
    bgSurface: '#2A2A27',
    bgDome: '#363633',
    orange: '#E87A3E',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    textPrimary: '#F5F5F0',
    textSecondary: '#C2C2B8',
    brass: '#B5884C',
    brassLight: '#D4A85A',
    brassDark: '#8B6914',
    rust: '#8B4513',
    pulsar: '#4A90D9'
  };

  // Audio context for sounds
  let audioCtx = null;
  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'correct') {
      osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialDecayTo && gain.gain.exponentialDecayTo(0.01, audioCtx.currentTime + 0.4);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    } else if (type === 'pull') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(220, audioCtx.currentTime);
      osc.frequency.linearRampToValueAtTime(440, audioCtx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.15);
    } else if (type === 'spark') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(800, audioCtx.currentTime);
      osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    }
  }

  // Game state
  let magnet = { x: W / 2, y: H / 2, vx: 0, vy: 0, pulling: false, pullTarget: null };
  let trueKey = { x: 0, y: 0, baseX: 0, baseY: 0, wobble: 0, scale: 1, alpha: 1 };
  let falseFork = { x: 0, y: 0, baseX: 0, baseY: 0, wobble: 0, scale: 1, alpha: 1 };
  let receiver = { x: 0, y: 0 };
  let gears = [];
  let rustBlooms = [];
  let sparks = [];
  let gameParticles = [];
  let pullField = { active: false, targetX: 0, targetY: 0, progress: 0 };
  let selectedAnswer = null;
  let entranceTime = 0;
  let shakeAmount = 0;

  const MAGNET_SPEED = 250;
  const PULL_SPEED = 400;

  function initGame() {
    // Reset state
    magnet = { x: W / 2, y: H / 2 + 50, vx: 0, vy: 0, pulling: false, pullTarget: null };

    // Receiver in center-top area
    receiver = { x: W / 2, y: 120 };

    // True key (balance-spring key) - left side near receiver
    trueKey = {
      x: receiver.x - 180, y: receiver.y + 60,
      baseX: receiver.x - 180, baseY: receiver.y + 60,
      wobble: 0, scale: 0, alpha: 0, pulled: false
    };

    // False fork (pulsar tuning fork) - right side
    falseFork = {
      x: receiver.x + 180, y: receiver.y + 100,
      baseX: receiver.x + 180, baseY: receiver.y + 100,
      wobble: 0, scale: 0, alpha: 0, pulled: false
    };

    // Background gears
    gears = [];
    for (let i = 0; i < 8; i++) {
      gears.push({
        x: 100 + Math.random() * (W - 200),
        y: 200 + Math.random() * (H - 300),
        radius: 30 + Math.random() * 50,
        teeth: Math.floor(8 + Math.random() * 12),
        rotation: Math.random() * Math.PI * 2,
        rotationSpeed: (Math.random() - 0.5) * 0.3,
        frozen: false,
        alpha: 0.3 + Math.random() * 0.3
      });
    }

    // Initial rust blooms
    rustBlooms = [];
    for (let i = 0; i < 3; i++) {
      rustBlooms.push({
        x: 150 + Math.random() * (W - 300),
        y: 250 + Math.random() * (H - 350),
        radius: 10 + Math.random() * 20,
        alpha: 0.2 + Math.random() * 0.3
      });
    }

    sparks = [];
    gameParticles = [];
    pullField = { active: false, targetX: 0, targetY: 0, progress: 0 };
    selectedAnswer = null;
    entranceTime = 0;
    shakeAmount = 0;

    initAudio();
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    entranceTime += dt;

    // Entrance animation
    const entranceProgress = Math.min(entranceTime / 0.5, 1);
    const easeOut = 1 - Math.pow(1 - entranceProgress, 3);
    trueKey.scale = easeOut;
    trueKey.alpha = easeOut;
    falseFork.scale = Math.min((entranceTime - 0.1) / 0.5, 1);
    falseFork.alpha = Math.min((entranceTime - 0.1) / 0.5, 1);
    if (falseFork.scale < 0) falseFork.scale = 0;
    if (falseFork.alpha < 0) falseFork.alpha = 0;

    // Magnet movement
    magnet.x += magnet.vx * dt;
    magnet.y += magnet.vy * dt;

    // Keep magnet in bounds
    magnet.x = Math.max(60, Math.min(W - 60, magnet.x));
    magnet.y = Math.max(60, Math.min(H - 60, magnet.y));

    // Wobble animations for answer pieces (only when not being pulled)
    trueKey.wobble += dt * 2;
    falseFork.wobble += dt * 3;

    // Determine which piece is being pulled (if any)
    const pullingTrue = pullField.active && pullField.targetX < W / 2;
    const pullingFalse = pullField.active && pullField.targetX >= W / 2;

    if (!trueKey.pulled && !pullingTrue) {
      trueKey.x = trueKey.baseX + Math.sin(trueKey.wobble) * 3;
      trueKey.y = trueKey.baseY + Math.cos(trueKey.wobble * 0.7) * 2;
    }

    if (!falseFork.pulled && !pullingFalse) {
      falseFork.x = falseFork.baseX + Math.sin(falseFork.wobble * 1.5) * 5;
      falseFork.y = falseFork.baseY + Math.cos(falseFork.wobble) * 3;
    }

    // Pull field logic
    if (pullField.active) {
      pullField.progress += dt * 3;

      const target = pullingTrue ? trueKey : falseFork;

      if (!target.pulled) {
        // Move target toward receiver
        const dx = receiver.x - target.x;
        const dy = receiver.y - target.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist > 20) {
          target.x += (dx / dist) * PULL_SPEED * dt;
          target.y += (dy / dist) * PULL_SPEED * dt;
        } else {
          // Reached receiver
          target.pulled = true;

          // Determine which choice was selected
          const choiceIndex = target === trueKey ? 0 : 1;
          const choice = QUESTION.choices[choiceIndex];

          if (choice.is_correct) {
            playSound('correct');
            // Spawn celebration particles
            for (let i = 0; i < 20; i++) {
              gameParticles.push({
                x: receiver.x,
                y: receiver.y,
                vx: (Math.random() - 0.5) * 300,
                vy: -Math.random() * 200 - 50,
                color: [COLORS.amber, COLORS.orange, COLORS.success][Math.floor(Math.random() * 3)],
                size: 3 + Math.random() * 4,
                life: 1
              });
            }
            setTimeout(() => {
              engine.end(true, choice.explanation);
            }, 300);
          } else {
            playSound('wrong');
            playSound('spark');
            shakeAmount = 15;
            // Wrong answer - spray sparks
            for (let i = 0; i < 30; i++) {
              sparks.push({
                x: receiver.x,
                y: receiver.y,
                vx: (Math.random() - 0.5) * 400,
                vy: (Math.random() - 0.5) * 400,
                life: 0.5 + Math.random() * 0.5
              });
            }
            // Freeze a gear
            const unfrozen = gears.filter(g => !g.frozen);
            if (unfrozen.length > 0) {
              unfrozen[Math.floor(Math.random() * unfrozen.length)].frozen = true;
            }
            // Add rust bloom
            rustBlooms.push({
              x: receiver.x + (Math.random() - 0.5) * 100,
              y: receiver.y + 50 + Math.random() * 100,
              radius: 15 + Math.random() * 25,
              alpha: 0.4 + Math.random() * 0.3
            });
            setTimeout(() => {
              engine.end(false, choice.explanation);
            }, 500);
          }

          pullField.active = false;
        }
      }
    }

    // Update gears
    gears.forEach(gear => {
      if (!gear.frozen) {
        gear.rotation += gear.rotationSpeed * dt;
      }
    });

    // Update sparks
    sparks = sparks.filter(spark => {
      spark.x += spark.vx * dt;
      spark.y += spark.vy * dt;
      spark.vy += 300 * dt;
      spark.life -= dt;
      return spark.life > 0;
    });

    // Update particles
    gameParticles = gameParticles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 400 * dt;
      p.life -= dt;
      return p.life > 0;
    });

    // Decay shake
    shakeAmount *= 0.9;
  }

  function drawGear(x, y, radius, teeth, rotation, frozen, alpha) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rotation);
    ctx.globalAlpha = alpha;

    ctx.fillStyle = frozen ? '#555555' : COLORS.brass;
    ctx.strokeStyle = frozen ? '#444444' : COLORS.brassDark;
    ctx.lineWidth = 2;

    ctx.beginPath();
    const innerRadius = radius * 0.7;
    const toothDepth = radius * 0.15;

    for (let i = 0; i < teeth * 2; i++) {
      const angle = (i / (teeth * 2)) * Math.PI * 2;
      const r = i % 2 === 0 ? radius : radius - toothDepth;
      const px = Math.cos(angle) * r;
      const py = Math.sin(angle) * r;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Center hole
    ctx.beginPath();
    ctx.arc(0, 0, radius * 0.2, 0, Math.PI * 2);
    ctx.fillStyle = COLORS.bgSurface;
    ctx.fill();

    ctx.restore();
  }

  function drawDome() {
    // Dome background - watchmaker's dome
    const gradient = ctx.createRadialGradient(W / 2, 0, 50, W / 2, H, 600);
    gradient.addColorStop(0, '#3A3A35');
    gradient.addColorStop(0.5, '#2A2A27');
    gradient.addColorStop(1, '#1C1C1A');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, W, H);

    // Dome arc
    ctx.strokeStyle = COLORS.brass;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(W / 2, -200, 500, 0.3, Math.PI - 0.3);
    ctx.stroke();

    // Gear engravings on dome
    ctx.strokeStyle = COLORS.brassDark;
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.3;
    for (let i = 0; i < 5; i++) {
      const angle = 0.5 + i * 0.4;
      const x = W / 2 + Math.cos(angle) * 450;
      const y = -200 + Math.sin(angle) * 450;
      drawGear(x, y, 20 + i * 5, 6 + i, entranceTime * 0.2 + i, false, 0.3);
    }
    ctx.globalAlpha = 1;

    // Pulsar flashes in background
    const pulsarTime = entranceTime * 2;
    for (let i = 0; i < 3; i++) {
      const flash = Math.sin(pulsarTime + i * 2) * 0.5 + 0.5;
      const px = 100 + i * 260;
      const py = 60 + Math.sin(i) * 20;

      ctx.beginPath();
      ctx.arc(px, py, 2 + flash * 3, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(74, 144, 217, ${flash * 0.8})`;
      ctx.fill();

      // Pulsar beam
      if (flash > 0.7) {
        ctx.strokeStyle = `rgba(74, 144, 217, ${(flash - 0.7) * 2})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(px - 20, py);
        ctx.lineTo(px + 20, py);
        ctx.stroke();
      }
    }
  }

  function drawWorkbench() {
    // Work surface
    ctx.fillStyle = '#4A4540';
    ctx.fillRect(50, H - 150, W - 100, 130);

    // Wood grain
    ctx.strokeStyle = '#3A3530';
    ctx.lineWidth = 1;
    for (let i = 0; i < 6; i++) {
      ctx.beginPath();
      ctx.moveTo(50, H - 140 + i * 20);
      ctx.lineTo(W - 50, H - 145 + i * 20 + Math.sin(i) * 5);
      ctx.stroke();
    }

    // Bench edge
    ctx.fillStyle = COLORS.brassDark;
    ctx.fillRect(50, H - 155, W - 100, 8);
  }

  function drawReceiver() {
    const rx = receiver.x;
    const ry = receiver.y;

    // Receiver housing
    ctx.fillStyle = COLORS.brass;
    ctx.strokeStyle = COLORS.brassDark;
    ctx.lineWidth = 3;

    ctx.beginPath();
    ctx.roundRect(rx - 40, ry - 30, 80, 60, 8);
    ctx.fill();
    ctx.stroke();

    // Opening slot
    ctx.fillStyle = '#1C1C1A';
    ctx.fillRect(rx - 25, ry - 15, 50, 30);

    // Glow effect when pulling
    if (pullField.active) {
      ctx.shadowColor = COLORS.amber;
      ctx.shadowBlur = 20;
      ctx.beginPath();
      ctx.arc(rx, ry, 30, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(245, 167, 66, ${0.3 + Math.sin(entranceTime * 10) * 0.2})`;
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }

  function drawTrueKey() {
    if (trueKey.pulled) return;

    const kx = trueKey.x;
    const ky = trueKey.y;
    const s = trueKey.scale;

    ctx.save();
    ctx.translate(kx, ky);
    ctx.scale(s, s);
    ctx.globalAlpha = trueKey.alpha;

    // Balance-spring key - bright golden
    ctx.fillStyle = COLORS.brassLight;
    ctx.strokeStyle = COLORS.amber;
    ctx.lineWidth = 2;

    // Key head (circular with spiral)
    ctx.beginPath();
    ctx.arc(0, -15, 25, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Spiral spring inside
    ctx.strokeStyle = COLORS.amber;
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i < 20; i++) {
      const angle = i * 0.6 + trueKey.wobble * 0.5;
      const r = 5 + i * 0.8;
      const px = Math.cos(angle) * r;
      const py = -15 + Math.sin(angle) * r;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.stroke();

    // Key shaft
    ctx.fillStyle = COLORS.brassLight;
    ctx.fillRect(-8, 5, 16, 40);
    ctx.strokeRect(-8, 5, 16, 40);

    // Key teeth
    ctx.fillRect(-8, 35, 6, 15);
    ctx.fillRect(2, 40, 6, 10);

    // Label
    ctx.fillStyle = COLORS.textPrimary;
    ctx.font = "bold 18px 'Nunito Sans', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText('TRUE', 0, 60);

    ctx.restore();
  }

  function drawFalseFork() {
    if (falseFork.pulled) return;

    const fx = falseFork.x;
    const fy = falseFork.y;
    const s = falseFork.scale;

    ctx.save();
    ctx.translate(fx, fy);
    ctx.scale(s, s);
    ctx.globalAlpha = falseFork.alpha;

    // Tuning fork - dark pulsar blue
    ctx.fillStyle = '#2A4A6A';
    ctx.strokeStyle = COLORS.pulsar;
    ctx.lineWidth = 2;

    // Fork handle
    ctx.fillRect(-8, 0, 16, 50);
    ctx.strokeRect(-8, 0, 16, 50);

    // Fork prongs with wobble
    const wobble = Math.sin(falseFork.wobble * 3) * 3;

    ctx.beginPath();
    ctx.moveTo(-25 + wobble, -50);
    ctx.lineTo(-20 + wobble * 0.5, 0);
    ctx.lineTo(-12, 0);
    ctx.lineTo(-12, -45);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(25 - wobble, -50);
    ctx.lineTo(20 - wobble * 0.5, 0);
    ctx.lineTo(12, 0);
    ctx.lineTo(12, -45);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Pulsar glow between prongs
    const glowIntensity = Math.sin(entranceTime * 5) * 0.3 + 0.5;
    ctx.beginPath();
    ctx.arc(0, -30, 8, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(74, 144, 217, ${glowIntensity})`;
    ctx.fill();

    // Cracked chronometer plate beneath
    ctx.fillStyle = '#444';
    ctx.beginPath();
    ctx.ellipse(0, 60, 35, 15, 0, 0, Math.PI * 2);
    ctx.fill();

    // Cracks
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-15, 55);
    ctx.lineTo(5, 65);
    ctx.moveTo(10, 55);
    ctx.lineTo(-5, 62);
    ctx.stroke();

    // Label
    ctx.fillStyle = COLORS.textPrimary;
    ctx.font = "bold 18px 'Nunito Sans', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText('FALSE', 0, 85);

    ctx.restore();
  }

  function drawMagnet() {
    const mx = magnet.x;
    const my = magnet.y;

    ctx.save();
    ctx.translate(mx, my);

    // Horseshoe magnet
    ctx.strokeStyle = COLORS.error;
    ctx.fillStyle = COLORS.error;
    ctx.lineWidth = 15;
    ctx.lineCap = 'round';

    // Horseshoe arc
    ctx.beginPath();
    ctx.arc(0, 0, 30, Math.PI, 0, false);
    ctx.stroke();

    // Legs
    ctx.fillRect(-37, 0, 15, 35);
    ctx.fillRect(22, 0, 15, 35);

    // Pole tips (silver)
    ctx.fillStyle = '#C0C0C0';
    ctx.fillRect(-37, 30, 15, 10);
    ctx.fillRect(22, 30, 15, 10);

    // N and S labels
    ctx.fillStyle = '#FFFFFF';
    ctx.font = "bold 12px 'Nunito Sans', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('N', -29, 20);
    ctx.fillText('S', 29, 20);

    // Pull field visualization
    if (pullField.active) {
      ctx.strokeStyle = `rgba(232, 122, 62, ${0.5 + Math.sin(entranceTime * 15) * 0.3})`;
      ctx.lineWidth = 2;

      for (let i = 0; i < 5; i++) {
        const progress = (entranceTime * 3 + i * 0.2) % 1;
        const targetX = pullField.targetX - mx;
        const targetY = pullField.targetY - my;

        ctx.beginPath();
        ctx.moveTo(0, 40);
        ctx.quadraticCurveTo(
          targetX * progress * 0.5,
          40 + (targetY - 40) * progress * 0.5,
          targetX * progress,
          40 + (targetY - 40) * progress
        );
        ctx.stroke();
      }
    }

    ctx.restore();
  }

  function drawRustBlooms() {
    rustBlooms.forEach(bloom => {
      ctx.beginPath();
      ctx.arc(bloom.x, bloom.y, bloom.radius, 0, Math.PI * 2);
      const gradient = ctx.createRadialGradient(
        bloom.x, bloom.y, 0,
        bloom.x, bloom.y, bloom.radius
      );
      gradient.addColorStop(0, `rgba(139, 69, 19, ${bloom.alpha})`);
      gradient.addColorStop(1, 'rgba(139, 69, 19, 0)');
      ctx.fillStyle = gradient;
      ctx.fill();
    });
  }

  function drawSparks() {
    sparks.forEach(spark => {
      ctx.beginPath();
      ctx.arc(spark.x, spark.y, 3, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(74, 144, 217, ${spark.life})`;
      ctx.fill();

      // Trail
      ctx.beginPath();
      ctx.moveTo(spark.x, spark.y);
      ctx.lineTo(spark.x - spark.vx * 0.02, spark.y - spark.vy * 0.02);
      ctx.strokeStyle = `rgba(74, 144, 217, ${spark.life * 0.5})`;
      ctx.lineWidth = 2;
      ctx.stroke();
    });
  }

  function drawParticles() {
    gameParticles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.life;
      ctx.fill();
      ctx.globalAlpha = 1;
    });
  }

  function drawGame() {
    // Apply screen shake
    ctx.save();
    if (shakeAmount > 0.5) {
      ctx.translate(
        (Math.random() - 0.5) * shakeAmount,
        (Math.random() - 0.5) * shakeAmount
      );
    }

    // Background
    drawDome();

    // Background gears
    gears.forEach(gear => {
      drawGear(gear.x, gear.y, gear.radius, gear.teeth, gear.rotation, gear.frozen, gear.alpha);
    });

    // Rust blooms
    drawRustBlooms();

    // Workbench
    drawWorkbench();

    // Receiver
    drawReceiver();

    // Answer pieces
    drawTrueKey();
    drawFalseFork();

    // Magnet
    drawMagnet();

    // Sparks
    drawSparks();

    // Particles
    drawParticles();

    ctx.restore();
  }

  function firePull() {
    if (pullField.active || gameState !== 'playing') return;

    initAudio();
    playSound('pull');

    // Determine which answer piece is closer to magnet
    const distToTrue = Math.sqrt(
      Math.pow(magnet.x - trueKey.x, 2) + Math.pow(magnet.y - trueKey.y, 2)
    );
    const distToFalse = Math.sqrt(
      Math.pow(magnet.x - falseFork.x, 2) + Math.pow(magnet.y - falseFork.y, 2)
    );

    pullField.active = true;

    if (distToTrue < distToFalse) {
      pullField.targetX = trueKey.x;
      pullField.targetY = trueKey.y;
    } else {
      pullField.targetX = falseFork.x;
      pullField.targetY = falseFork.y;
    }

    pullField.progress = 0;
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;

    initAudio();

    // Movement
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
      magnet.vx = -MAGNET_SPEED;
    } else if (e.code === 'ArrowRight' || e.code === 'KeyD') {
      magnet.vx = MAGNET_SPEED;
    } else if (e.code === 'ArrowUp' || e.code === 'KeyW') {
      magnet.vy = -MAGNET_SPEED;
    } else if (e.code === 'ArrowDown' || e.code === 'KeyS') {
      magnet.vy = MAGNET_SPEED;
    }

    // Fire pull field
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      firePull();
    }
  }

  // Handle key release
  document.addEventListener('keyup', (e) => {
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
      if (magnet.vx < 0) magnet.vx = 0;
    } else if (e.code === 'ArrowRight' || e.code === 'KeyD') {
      if (magnet.vx > 0) magnet.vx = 0;
    } else if (e.code === 'ArrowUp' || e.code === 'KeyW') {
      if (magnet.vy < 0) magnet.vy = 0;
    } else if (e.code === 'ArrowDown' || e.code === 'KeyS') {
      if (magnet.vy > 0) magnet.vy = 0;
    }
  });

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
