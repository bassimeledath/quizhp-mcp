<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cathedral Arch Pendulum</title>
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "true_false",
    prompt: "Sample question text",
    choices: [
      { text: "True", is_correct: true, explanation: "Why True is correct" },
      { text: "False", is_correct: false, explanation: "Why False is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === GAME STATE ===
  const PENDULUM_LENGTH = 220;
  const PENDULUM_ANCHOR = { x: W / 2, y: 50 };
  const ARCH_WIDTH = 140;
  const ARCH_HEIGHT = 220;
  const TRUE_ARCH = { x: 80, y: 180 }; // Left - Gothic pointed arch
  const FALSE_ARCH = { x: 500, y: 180 }; // Right - Romanesque rounded arch

  let pendulum = {
    angle: 0,           // Current angle (radians, 0 = straight down)
    angularVel: 0,      // Angular velocity
    charging: false,    // Is spacebar held
    chargeTime: 0,      // How long charging
    maxCharge: 1.5,     // Max charge time for full power
    baseSwingSpeed: 2.5,
    swingMultiplier: 1.0
  };

  let candles = [];
  let waterLevel = 0;
  let targetWaterLevel = 50;
  let roseWindowCracks = 0;
  let waterParticles = [];
  let glowIntensity = { left: 0, right: 0 };
  let selectedAnswer = null;
  let answerLocked = false;
  let gameTime = 0;
  let stainedGlassHue = 0;

  // Audio context for sound effects
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialDecayTo && gain.gain.exponentialDecayTo(0.01, audioCtx.currentTime + 0.4);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.5);
    } else if (type === 'swing') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(80 + Math.random() * 40, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'charge') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(100 + pendulum.chargeTime * 200, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.05);
    }
  }

  function initGame() {
    pendulum = {
      angle: 0,
      angularVel: 0,
      charging: false,
      chargeTime: 0,
      maxCharge: 1.5,
      baseSwingSpeed: 2.5,
      swingMultiplier: 1.0
    };

    // Initialize candles
    candles = [];
    for (let i = 0; i < 12; i++) {
      candles.push({
        x: 50 + (i % 6) * 120 + (Math.floor(i / 6) * 30),
        y: 450 + Math.floor(i / 6) * 40,
        brightness: 0.8 + Math.random() * 0.2,
        flicker: Math.random() * Math.PI * 2
      });
    }

    waterLevel = 0;
    targetWaterLevel = 50;
    roseWindowCracks = 0;
    waterParticles = [];
    glowIntensity = { left: 0, right: 0 };
    selectedAnswer = null;
    answerLocked = false;
    gameTime = 0;
    stainedGlassHue = 0;
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;
    stainedGlassHue = (stainedGlassHue + dt * 10) % 360;

    // Physics constants
    const gravity = 9.8;
    const damping = 0.995;

    // Pendulum physics
    if (pendulum.charging) {
      pendulum.chargeTime = Math.min(pendulum.chargeTime + dt, pendulum.maxCharge);
      if (gameTime % 0.1 < dt) playSound('charge');
    } else {
      // Apply gravity torque
      const torque = -gravity * Math.sin(pendulum.angle) * pendulum.swingMultiplier * 0.01;
      pendulum.angularVel += torque * dt * 60;
      pendulum.angularVel *= damping;
      pendulum.angle += pendulum.angularVel * dt;

      // Subtle swing sound
      if (Math.abs(pendulum.angularVel) > 0.5 && gameTime % 0.3 < dt) {
        playSound('swing');
      }
    }

    // Calculate pendulum bob position
    const bobX = PENDULUM_ANCHOR.x + Math.sin(pendulum.angle) * PENDULUM_LENGTH;
    const bobY = PENDULUM_ANCHOR.y + Math.cos(pendulum.angle) * PENDULUM_LENGTH;

    // Update glow intensity based on pendulum position
    const leftDist = Math.abs(bobX - (TRUE_ARCH.x + ARCH_WIDTH / 2));
    const rightDist = Math.abs(bobX - (FALSE_ARCH.x + ARCH_WIDTH / 2));
    glowIntensity.left = Math.max(0, 1 - leftDist / 200);
    glowIntensity.right = Math.max(0, 1 - rightDist / 200);

    // Check if pendulum passes through arches
    if (!answerLocked && Math.abs(pendulum.angularVel) > 0.3) {
      const inTrueArch = bobX > TRUE_ARCH.x && bobX < TRUE_ARCH.x + ARCH_WIDTH &&
                         bobY > TRUE_ARCH.y && bobY < TRUE_ARCH.y + ARCH_HEIGHT;
      const inFalseArch = bobX > FALSE_ARCH.x && bobX < FALSE_ARCH.x + ARCH_WIDTH &&
                          bobY > FALSE_ARCH.y && bobY < FALSE_ARCH.y + ARCH_HEIGHT;

      if (inTrueArch) {
        selectedAnswer = 0; // True
        answerLocked = true;
        handleAnswer(0);
      } else if (inFalseArch) {
        selectedAnswer = 1; // False
        answerLocked = true;
        handleAnswer(1);
      }
    }

    // Update water
    waterLevel += (targetWaterLevel - waterLevel) * dt * 2;

    // Update water particles
    waterParticles = waterParticles.filter(p => {
      p.y += p.vy * dt;
      p.x += p.vx * dt;
      p.vy += 100 * dt;
      p.life -= dt;
      return p.life > 0;
    });

    // Add ambient water particles
    if (Math.random() < 0.1) {
      waterParticles.push({
        x: Math.random() * W,
        y: H - waterLevel + Math.random() * 10,
        vx: (Math.random() - 0.5) * 20,
        vy: -Math.random() * 30,
        life: 1 + Math.random()
      });
    }

    // Update candle flicker
    candles.forEach(c => {
      c.flicker += dt * (5 + Math.random() * 3);
      c.brightness = 0.6 + Math.sin(c.flicker) * 0.2 + Math.random() * 0.1;
    });
  }

  function handleAnswer(answerIndex) {
    const choice = QUESTION.choices[answerIndex];
    const isCorrect = choice.is_correct;

    initAudio();

    if (isCorrect) {
      playSound('correct');
      // Speed up for next question
      pendulum.swingMultiplier += 0.2;
    } else {
      playSound('wrong');
      // Crack rose window
      roseWindowCracks = Math.min(roseWindowCracks + 3, 8);
      // Surge water
      targetWaterLevel = Math.min(targetWaterLevel + 80, 300);
      // Add splash particles
      for (let i = 0; i < 20; i++) {
        waterParticles.push({
          x: Math.random() * W,
          y: H - waterLevel,
          vx: (Math.random() - 0.5) * 100,
          vy: -Math.random() * 150 - 50,
          life: 1.5
        });
      }
      // Dim candles
      candles.forEach(c => c.brightness *= 0.5);
    }

    // Delay to show visual feedback
    setTimeout(() => {
      engine.end(isCorrect, choice.explanation);
    }, 800);
  }

  function drawGame() {
    // Cathedral background - dark stone
    const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
    bgGrad.addColorStop(0, '#1a1520');
    bgGrad.addColorStop(1, '#0d0a10');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    // Rose window at top center
    drawRoseWindow();

    // Stone columns
    drawColumns();

    // Draw arches
    drawArch(TRUE_ARCH.x, TRUE_ARCH.y, 'gothic', 'TRUE', glowIntensity.left);
    drawArch(FALSE_ARCH.x, FALSE_ARCH.y, 'romanesque', 'FALSE', glowIntensity.right);

    // Draw pendulum
    drawPendulum();

    // Draw candles
    drawCandles();

    // Draw water
    drawWater();

    // Draw charge indicator
    if (pendulum.charging) {
      drawChargeIndicator();
    }
  }

  function drawRoseWindow() {
    const cx = W / 2;
    const cy = 45;
    const radius = 40;

    // Window frame
    ctx.beginPath();
    ctx.arc(cx, cy, radius + 5, 0, Math.PI * 2);
    ctx.strokeStyle = '#3d3040';
    ctx.lineWidth = 8;
    ctx.stroke();

    // Stained glass segments
    const segments = 8;
    for (let i = 0; i < segments; i++) {
      const angle = (i / segments) * Math.PI * 2;
      const nextAngle = ((i + 1) / segments) * Math.PI * 2;

      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, radius, angle, nextAngle);
      ctx.closePath();

      const hue = (stainedGlassHue + i * 45) % 360;
      ctx.fillStyle = `hsla(${hue}, 70%, 40%, 0.8)`;
      ctx.fill();
      ctx.strokeStyle = '#2a2030';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Draw cracks
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    for (let i = 0; i < roseWindowCracks; i++) {
      const startAngle = (i / roseWindowCracks) * Math.PI * 2;
      const crackLength = radius * (0.5 + Math.random() * 0.5);
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(
        cx + Math.cos(startAngle) * crackLength,
        cy + Math.sin(startAngle) * crackLength
      );
      // Branch
      if (Math.random() > 0.5) {
        const branchAngle = startAngle + (Math.random() - 0.5) * 0.5;
        ctx.lineTo(
          cx + Math.cos(branchAngle) * (crackLength * 0.7),
          cy + Math.sin(branchAngle) * (crackLength * 0.7) + 10
        );
      }
      ctx.stroke();
    }

    // Center glow
    const glowGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
    glowGrad.addColorStop(0, 'rgba(255, 200, 100, 0.3)');
    glowGrad.addColorStop(1, 'rgba(255, 200, 100, 0)');
    ctx.fillStyle = glowGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawColumns() {
    // Draw stone columns on sides
    const columnWidth = 40;
    const positions = [20, 660];

    positions.forEach(x => {
      // Column base gradient
      const colGrad = ctx.createLinearGradient(x, 0, x + columnWidth, 0);
      colGrad.addColorStop(0, '#2a2530');
      colGrad.addColorStop(0.5, '#3d3540');
      colGrad.addColorStop(1, '#2a2530');

      ctx.fillStyle = colGrad;
      ctx.fillRect(x, 0, columnWidth, H);

      // Column details
      ctx.strokeStyle = '#1a1520';
      ctx.lineWidth = 1;
      for (let y = 0; y < H; y += 60) {
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + columnWidth, y);
        ctx.stroke();
      }
    });
  }

  function drawArch(x, y, type, label, glow) {
    const w = ARCH_WIDTH;
    const h = ARCH_HEIGHT;

    // Arch glow
    if (glow > 0) {
      const glowColor = type === 'gothic' ? '#E87A3E' : '#4ECDC4';
      ctx.shadowColor = glowColor;
      ctx.shadowBlur = 30 * glow;
    }

    // Arch background (stained glass effect)
    ctx.beginPath();
    if (type === 'gothic') {
      // Pointed Gothic arch
      ctx.moveTo(x, y + h);
      ctx.lineTo(x, y + h * 0.4);
      ctx.quadraticCurveTo(x, y, x + w / 2, y - 20);
      ctx.quadraticCurveTo(x + w, y, x + w, y + h * 0.4);
      ctx.lineTo(x + w, y + h);
    } else {
      // Rounded Romanesque arch
      ctx.moveTo(x, y + h);
      ctx.lineTo(x, y + h * 0.3);
      ctx.arc(x + w / 2, y + h * 0.3, w / 2, Math.PI, 0, false);
      ctx.lineTo(x + w, y + h);
    }
    ctx.closePath();

    // Stained glass gradient
    const archGrad = ctx.createLinearGradient(x, y, x, y + h);
    if (type === 'gothic') {
      archGrad.addColorStop(0, `rgba(232, 122, 62, ${0.3 + glow * 0.4})`);
      archGrad.addColorStop(0.5, `rgba(245, 167, 66, ${0.4 + glow * 0.3})`);
      archGrad.addColorStop(1, `rgba(232, 122, 62, ${0.2 + glow * 0.2})`);
    } else {
      archGrad.addColorStop(0, `rgba(78, 205, 196, ${0.2 + glow * 0.3})`);
      archGrad.addColorStop(0.5, `rgba(78, 205, 196, ${0.3 + glow * 0.4})`);
      archGrad.addColorStop(1, `rgba(78, 205, 196, ${0.15 + glow * 0.2})`);
    }
    ctx.fillStyle = archGrad;
    ctx.fill();

    // Arch frame
    ctx.strokeStyle = type === 'gothic' ? '#8B4513' : '#4a4a5a';
    ctx.lineWidth = 6;
    ctx.stroke();

    ctx.shadowBlur = 0;

    // Label
    ctx.font = "bold 24px 'Belanosima', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = type === 'gothic' ? '#E87A3E' : '#4ECDC4';
    ctx.fillText(label, x + w / 2, y + h + 30);
  }

  function drawPendulum() {
    const bobX = PENDULUM_ANCHOR.x + Math.sin(pendulum.angle) * PENDULUM_LENGTH;
    const bobY = PENDULUM_ANCHOR.y + Math.cos(pendulum.angle) * PENDULUM_LENGTH;

    // Pendulum rope
    ctx.beginPath();
    ctx.moveTo(PENDULUM_ANCHOR.x, PENDULUM_ANCHOR.y);
    ctx.lineTo(bobX, bobY);
    ctx.strokeStyle = '#5a4a40';
    ctx.lineWidth = 4;
    ctx.stroke();

    // Anchor point
    ctx.beginPath();
    ctx.arc(PENDULUM_ANCHOR.x, PENDULUM_ANCHOR.y, 8, 0, Math.PI * 2);
    ctx.fillStyle = '#3d3040';
    ctx.fill();
    ctx.strokeStyle = '#5a4a50';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Bronze pendulum bob
    const bobRadius = 25;
    const bobGrad = ctx.createRadialGradient(
      bobX - 5, bobY - 5, 0,
      bobX, bobY, bobRadius
    );
    bobGrad.addColorStop(0, '#CD7F32');
    bobGrad.addColorStop(0.5, '#B87333');
    bobGrad.addColorStop(1, '#8B5A2B');

    ctx.beginPath();
    ctx.arc(bobX, bobY, bobRadius, 0, Math.PI * 2);
    ctx.fillStyle = bobGrad;
    ctx.fill();

    // Highlight on bob
    ctx.beginPath();
    ctx.arc(bobX - 8, bobY - 8, 8, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255, 220, 180, 0.4)';
    ctx.fill();

    // Motion trail
    if (Math.abs(pendulum.angularVel) > 0.5) {
      ctx.globalAlpha = 0.3;
      for (let i = 1; i <= 3; i++) {
        const trailAngle = pendulum.angle - pendulum.angularVel * 0.02 * i;
        const trailX = PENDULUM_ANCHOR.x + Math.sin(trailAngle) * PENDULUM_LENGTH;
        const trailY = PENDULUM_ANCHOR.y + Math.cos(trailAngle) * PENDULUM_LENGTH;
        ctx.beginPath();
        ctx.arc(trailX, trailY, bobRadius - i * 3, 0, Math.PI * 2);
        ctx.fillStyle = '#B87333';
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }
  }

  function drawCandles() {
    candles.forEach(candle => {
      // Only draw if above water
      if (candle.y < H - waterLevel - 20) {
        // Candle body
        ctx.fillStyle = '#F5F5DC';
        ctx.fillRect(candle.x - 4, candle.y, 8, 25);

        // Flame
        const flameHeight = 15 + Math.sin(candle.flicker) * 3;
        const flameGrad = ctx.createRadialGradient(
          candle.x, candle.y - flameHeight / 2, 0,
          candle.x, candle.y - flameHeight / 2, flameHeight
        );
        flameGrad.addColorStop(0, `rgba(255, 255, 200, ${candle.brightness})`);
        flameGrad.addColorStop(0.3, `rgba(255, 200, 100, ${candle.brightness * 0.8})`);
        flameGrad.addColorStop(1, 'rgba(255, 100, 50, 0)');

        ctx.beginPath();
        ctx.ellipse(candle.x, candle.y - flameHeight / 2, 6, flameHeight / 2, 0, 0, Math.PI * 2);
        ctx.fillStyle = flameGrad;
        ctx.fill();

        // Glow
        const glowGrad = ctx.createRadialGradient(candle.x, candle.y, 0, candle.x, candle.y, 60);
        glowGrad.addColorStop(0, `rgba(255, 180, 80, ${candle.brightness * 0.15})`);
        glowGrad.addColorStop(1, 'rgba(255, 180, 80, 0)');
        ctx.fillStyle = glowGrad;
        ctx.beginPath();
        ctx.arc(candle.x, candle.y, 60, 0, Math.PI * 2);
        ctx.fill();
      }
    });
  }

  function drawWater() {
    if (waterLevel <= 0) return;

    // Water gradient
    const waterGrad = ctx.createLinearGradient(0, H - waterLevel, 0, H);
    waterGrad.addColorStop(0, 'rgba(20, 60, 80, 0.7)');
    waterGrad.addColorStop(0.5, 'rgba(30, 80, 100, 0.8)');
    waterGrad.addColorStop(1, 'rgba(10, 40, 60, 0.9)');

    // Wave effect
    ctx.beginPath();
    ctx.moveTo(0, H);
    for (let x = 0; x <= W; x += 20) {
      const waveY = H - waterLevel + Math.sin(x * 0.02 + gameTime * 2) * 5;
      ctx.lineTo(x, waveY);
    }
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fillStyle = waterGrad;
    ctx.fill();

    // Water particles (splashes)
    waterParticles.forEach(p => {
      ctx.globalAlpha = p.life;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
      ctx.fillStyle = '#5090B0';
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Water surface highlights
    ctx.strokeStyle = 'rgba(100, 180, 220, 0.3)';
    ctx.lineWidth = 2;
    for (let i = 0; i < 5; i++) {
      const startX = (gameTime * 30 + i * 150) % (W + 100) - 50;
      ctx.beginPath();
      ctx.moveTo(startX, H - waterLevel + 3);
      ctx.lineTo(startX + 40, H - waterLevel + 3);
      ctx.stroke();
    }
  }

  function drawChargeIndicator() {
    const chargePercent = pendulum.chargeTime / pendulum.maxCharge;
    const barWidth = 200;
    const barHeight = 20;
    const barX = W / 2 - barWidth / 2;
    const barY = H - 50;

    // Background
    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
    ctx.beginPath();
    ctx.roundRect(barX - 5, barY - 5, barWidth + 10, barHeight + 10, 8);
    ctx.fill();

    // Charge bar
    const chargeGrad = ctx.createLinearGradient(barX, barY, barX + barWidth * chargePercent, barY);
    chargeGrad.addColorStop(0, '#F5A742');
    chargeGrad.addColorStop(1, '#E87A3E');

    ctx.fillStyle = chargeGrad;
    ctx.beginPath();
    ctx.roundRect(barX, barY, barWidth * chargePercent, barHeight, 5);
    ctx.fill();

    // Border
    ctx.strokeStyle = '#FAFAF7';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(barX, barY, barWidth, barHeight, 5);
    ctx.stroke();

    // Glow effect when fully charged
    if (chargePercent >= 1) {
      ctx.shadowColor = '#E87A3E';
      ctx.shadowBlur = 15 + Math.sin(gameTime * 10) * 5;
      ctx.strokeStyle = '#E87A3E';
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;

    if (e.code === 'Space') {
      e.preventDefault();
      initAudio();

      if (e.type === 'keydown' && !pendulum.charging) {
        pendulum.charging = true;
        pendulum.chargeTime = 0;
      }
    }
  }

  // Handle keyup for space release
  document.addEventListener('keyup', (e) => {
    if (gameState !== 'playing') return;

    if (e.code === 'Space' && pendulum.charging) {
      e.preventDefault();

      // Apply momentum based on charge
      const chargePower = pendulum.chargeTime / pendulum.maxCharge;
      const direction = pendulum.angle >= 0 ? -1 : 1; // Push opposite to current side
      pendulum.angularVel += direction * chargePower * pendulum.baseSwingSpeed * 2;

      pendulum.charging = false;
      pendulum.chargeTime = 0;
    }
  });

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
