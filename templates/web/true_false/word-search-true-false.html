<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Search True/False</title>
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
      touch-action: none;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "true_false",
    prompt: "Sample question text",
    choices: [
      { text: "True", is_correct: true, explanation: "This statement is true because of the evidence provided" },
      { text: "False", is_correct: false, explanation: "This statement is actually true, not false" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // Color palette from styleguide
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC'
  };

  // === AUDIO SYSTEM ===
  let audioCtx = null;
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function getAudioContext() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
  }

  function playSound(type) {
    if (prefersReducedMotion) return;
    try {
      const ctx = getAudioContext();
      const oscillator = ctx.createOscillator();
      const gainNode = ctx.createGain();
      oscillator.connect(gainNode);
      gainNode.connect(ctx.destination);

      if (type === 'select') {
        // Short click sound
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(600, ctx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.05);
        gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.05);
        oscillator.start(ctx.currentTime);
        oscillator.stop(ctx.currentTime + 0.05);
      } else if (type === 'drag') {
        // Soft tick
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(400 + Math.random() * 200, ctx.currentTime);
        gainNode.gain.setValueAtTime(0.05, ctx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.03);
        oscillator.start(ctx.currentTime);
        oscillator.stop(ctx.currentTime + 0.03);
      } else if (type === 'correct') {
        // Happy ascending chord
        [523.25, 659.25, 783.99].forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.1);
          gain.gain.setValueAtTime(0.15, ctx.currentTime + i * 0.1);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.1 + 0.3);
          osc.start(ctx.currentTime + i * 0.1);
          osc.stop(ctx.currentTime + i * 0.1 + 0.3);
        });
      } else if (type === 'wrong') {
        // Descending buzz
        oscillator.type = 'sawtooth';
        oscillator.frequency.setValueAtTime(200, ctx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.3);
        gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
        oscillator.start(ctx.currentTime);
        oscillator.stop(ctx.currentTime + 0.3);
      } else if (type === 'invalid') {
        // Quick buzz
        oscillator.type = 'square';
        oscillator.frequency.setValueAtTime(150, ctx.currentTime);
        gainNode.gain.setValueAtTime(0.08, ctx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
        oscillator.start(ctx.currentTime);
        oscillator.stop(ctx.currentTime + 0.15);
      }
    } catch (e) {
      // Audio not supported
    }
  }

  // === PARTICLE SYSTEM ===
  let gameParticles = [];

  function spawnParticles(x, y, type) {
    if (prefersReducedMotion) return;
    const colors = type === 'correct'
      ? [COLORS.success, COLORS.cyan, COLORS.amber]
      : type === 'wrong'
      ? [COLORS.error, '#FF6B6B', '#D04A3A']
      : [COLORS.cyan, COLORS.amber, COLORS.orange];

    const count = type === 'correct' ? 25 : type === 'wrong' ? 15 : 8;

    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
      const speed = 100 + Math.random() * 200;
      gameParticles.push({
        x,
        y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - (type === 'correct' ? 150 : 0),
        size: 4 + Math.random() * 6,
        color: colors[Math.floor(Math.random() * colors.length)],
        life: 1,
        decay: 0.8 + Math.random() * 0.4,
        gravity: type === 'correct' ? 400 : 200
      });
    }
  }

  function updateParticles(dt) {
    gameParticles = gameParticles.filter(p => {
      p.vy += p.gravity * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vx *= 0.98;
      p.life -= p.decay * dt;
      return p.life > 0;
    });
  }

  function drawParticles() {
    gameParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
  }

  // Game state
  const GRID_SIZE = 5;
  const CELL_SIZE = 70;
  let grid = [];
  let gridOffsetX = 0;
  let gridOffsetY = 0;

  // Selection state
  let isDragging = false;
  let selectionStart = null;
  let selectionEnd = null;
  let selectedCells = [];
  let selectedWord = '';
  let feedbackMessage = '';
  let feedbackTime = 0;

  // Animation state
  let cellAnimations = [];
  let entranceProgress = 0;
  let titleBounce = 0;
  let gridPulse = 0;
  let lastSelectedCount = 0;
  let selectionHighlight = 0;

  // Direction vectors for 8 directions
  const DIRECTIONS = [
    { dx: 1, dy: 0 },   // right
    { dx: -1, dy: 0 },  // left
    { dx: 0, dy: 1 },   // down
    { dx: 0, dy: -1 },  // up
    { dx: 1, dy: 1 },   // down-right
    { dx: -1, dy: -1 }, // up-left
    { dx: 1, dy: -1 },  // up-right
    { dx: -1, dy: 1 }   // down-left
  ];

  function initGame() {
    grid = [];
    selectedCells = [];
    selectedWord = '';
    feedbackMessage = '';
    feedbackTime = 0;
    isDragging = false;
    selectionStart = null;
    selectionEnd = null;
    entranceProgress = 0;
    cellAnimations = [];
    gameParticles = [];
    titleBounce = 0;
    gridPulse = 0;
    lastSelectedCount = 0;
    selectionHighlight = 0;

    // Calculate grid position (centered)
    gridOffsetX = (W - GRID_SIZE * CELL_SIZE) / 2;
    gridOffsetY = (H - GRID_SIZE * CELL_SIZE) / 2 - 20;

    // Initialize empty grid
    for (let row = 0; row < GRID_SIZE; row++) {
      grid[row] = [];
      for (let col = 0; col < GRID_SIZE; col++) {
        grid[row][col] = { letter: '', isTrue: false, isFalse: false };
      }
    }

    // Place TRUE and FALSE words
    placeWords();

    // Fill remaining cells with random letters
    fillRandomLetters();

    // Initialize cell animations
    for (let row = 0; row < GRID_SIZE; row++) {
      cellAnimations[row] = [];
      for (let col = 0; col < GRID_SIZE; col++) {
        cellAnimations[row][col] = {
          scale: 0,
          delay: (row + col) * 0.05
        };
      }
    }
  }

  function placeWords() {
    // Try to place TRUE first
    let truePlaced = false;
    let attempts = 0;

    while (!truePlaced && attempts < 100) {
      attempts++;
      const dir = DIRECTIONS[Math.floor(Math.random() * DIRECTIONS.length)];
      const startRow = Math.floor(Math.random() * GRID_SIZE);
      const startCol = Math.floor(Math.random() * GRID_SIZE);

      if (canPlaceWord('TRUE', startRow, startCol, dir.dx, dir.dy)) {
        placeWord('TRUE', startRow, startCol, dir.dx, dir.dy, 'isTrue');
        truePlaced = true;
      }
    }

    // Try to place FALSE
    let falsePlaced = false;
    attempts = 0;

    while (!falsePlaced && attempts < 100) {
      attempts++;
      const dir = DIRECTIONS[Math.floor(Math.random() * DIRECTIONS.length)];
      const startRow = Math.floor(Math.random() * GRID_SIZE);
      const startCol = Math.floor(Math.random() * GRID_SIZE);

      if (canPlaceWord('FALSE', startRow, startCol, dir.dx, dir.dy, true)) {
        placeWord('FALSE', startRow, startCol, dir.dx, dir.dy, 'isFalse');
        falsePlaced = true;
      }
    }
  }

  function canPlaceWord(word, startRow, startCol, dx, dy, checkOverlap = false) {
    for (let i = 0; i < word.length; i++) {
      const row = startRow + i * dy;
      const col = startCol + i * dx;

      // Check bounds
      if (row < 0 || row >= GRID_SIZE || col < 0 || col >= GRID_SIZE) {
        return false;
      }

      // Check overlap with existing words
      if (checkOverlap && grid[row][col].letter !== '') {
        return false;
      }

      // Check if cell is already occupied with a different letter
      if (grid[row][col].letter !== '' && grid[row][col].letter !== word[i]) {
        return false;
      }
    }
    return true;
  }

  function placeWord(word, startRow, startCol, dx, dy, flagName) {
    for (let i = 0; i < word.length; i++) {
      const row = startRow + i * dy;
      const col = startCol + i * dx;
      grid[row][col].letter = word[i];
      grid[row][col][flagName] = true;
    }
  }

  function fillRandomLetters() {
    const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    for (let row = 0; row < GRID_SIZE; row++) {
      for (let col = 0; col < GRID_SIZE; col++) {
        if (grid[row][col].letter === '') {
          grid[row][col].letter = letters[Math.floor(Math.random() * letters.length)];
        }
      }
    }
  }

  function getCellFromPosition(x, y) {
    const col = Math.floor((x - gridOffsetX) / CELL_SIZE);
    const row = Math.floor((y - gridOffsetY) / CELL_SIZE);

    if (row >= 0 && row < GRID_SIZE && col >= 0 && col < GRID_SIZE) {
      return { row, col };
    }
    return null;
  }

  function getSelectedCells(start, end) {
    if (!start || !end) return [];

    const cells = [];
    const dr = end.row - start.row;
    const dc = end.col - start.col;

    // Must be in a straight line
    const isHorizontal = dr === 0;
    const isVertical = dc === 0;
    const isDiagonal = Math.abs(dr) === Math.abs(dc);

    if (!isHorizontal && !isVertical && !isDiagonal) {
      return [];
    }

    const steps = Math.max(Math.abs(dr), Math.abs(dc));
    const stepR = steps === 0 ? 0 : dr / steps;
    const stepC = steps === 0 ? 0 : dc / steps;

    for (let i = 0; i <= steps; i++) {
      const row = start.row + Math.round(i * stepR);
      const col = start.col + Math.round(i * stepC);
      cells.push({ row, col });
    }

    return cells;
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    // Update entrance animation
    if (entranceProgress < 1) {
      entranceProgress += dt * 2;
      if (entranceProgress > 1) entranceProgress = 1;
    }

    // Update title bounce
    titleBounce += dt * 3;

    // Update grid pulse
    gridPulse += dt * 2;

    // Update selection highlight
    if (isDragging) {
      selectionHighlight += dt * 8;
    }

    // Play sound when selection changes
    if (selectedCells.length !== lastSelectedCount && selectedCells.length > 0) {
      playSound('drag');
      lastSelectedCount = selectedCells.length;
    }

    // Update cell animations
    for (let row = 0; row < GRID_SIZE; row++) {
      for (let col = 0; col < GRID_SIZE; col++) {
        const anim = cellAnimations[row][col];
        const elapsed = entranceProgress - anim.delay;
        if (elapsed > 0) {
          // Spring animation
          const t = Math.min(elapsed / 0.3, 1);
          const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
          anim.scale = t * spring;
          if (anim.scale > 1) anim.scale = 1;
        }
      }
    }

    // Update particles
    updateParticles(dt);

    // Update feedback message timer
    if (feedbackTime > 0) {
      feedbackTime -= dt;
      if (feedbackTime < 0) feedbackTime = 0;
    }
  }

  function drawGame() {
    // Clear canvas with background
    ctx.fillStyle = COLORS.bgPrimary;
    ctx.fillRect(0, 0, W, H);

    // Draw animated title
    ctx.save();
    const titleY = 40 + Math.sin(titleBounce) * 2;
    ctx.fillStyle = COLORS.textPrimary;
    ctx.font = 'bold 24px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Find TRUE or FALSE', W / 2, titleY);
    ctx.restore();

    // Draw grid background with subtle pulse
    const pulseScale = 1 + Math.sin(gridPulse) * 0.003;
    ctx.save();
    ctx.translate(gridOffsetX + GRID_SIZE * CELL_SIZE / 2, gridOffsetY + GRID_SIZE * CELL_SIZE / 2);
    ctx.scale(pulseScale, pulseScale);
    ctx.translate(-(gridOffsetX + GRID_SIZE * CELL_SIZE / 2), -(gridOffsetY + GRID_SIZE * CELL_SIZE / 2));

    // Grid shadow
    ctx.shadowColor = 'rgba(0, 0, 0, 0.1)';
    ctx.shadowBlur = 20;
    ctx.shadowOffsetY = 5;
    ctx.fillStyle = COLORS.bgSurface;
    ctx.beginPath();
    ctx.roundRect(gridOffsetX - 10, gridOffsetY - 10, GRID_SIZE * CELL_SIZE + 20, GRID_SIZE * CELL_SIZE + 20, 12);
    ctx.fill();
    ctx.shadowColor = 'transparent';
    ctx.strokeStyle = COLORS.borderStrong;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();

    // Draw selection line if dragging with animated glow
    if (isDragging && selectedCells.length > 1) {
      const firstCell = selectedCells[0];
      const lastCell = selectedCells[selectedCells.length - 1];
      const startX = gridOffsetX + firstCell.col * CELL_SIZE + CELL_SIZE / 2;
      const startY = gridOffsetY + firstCell.row * CELL_SIZE + CELL_SIZE / 2;
      const endX = gridOffsetX + lastCell.col * CELL_SIZE + CELL_SIZE / 2;
      const endY = gridOffsetY + lastCell.row * CELL_SIZE + CELL_SIZE / 2;

      // Animated glow
      const glowAlpha = 0.3 + Math.sin(selectionHighlight) * 0.1;

      // Outer glow
      ctx.strokeStyle = COLORS.cyan + '30';
      ctx.lineWidth = CELL_SIZE * 0.9;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(startX, startY);
      ctx.lineTo(endX, endY);
      ctx.stroke();

      // Inner selection
      ctx.strokeStyle = `rgba(78, 205, 196, ${glowAlpha})`;
      ctx.lineWidth = CELL_SIZE * 0.75;
      ctx.beginPath();
      ctx.moveTo(startX, startY);
      ctx.lineTo(endX, endY);
      ctx.stroke();
    }

    // Draw cells
    for (let row = 0; row < GRID_SIZE; row++) {
      for (let col = 0; col < GRID_SIZE; col++) {
        const cell = grid[row][col];
        const anim = cellAnimations[row][col];
        const x = gridOffsetX + col * CELL_SIZE;
        const y = gridOffsetY + row * CELL_SIZE;
        const isSelected = selectedCells.some(c => c.row === row && c.col === col);

        ctx.save();
        ctx.translate(x + CELL_SIZE / 2, y + CELL_SIZE / 2);
        ctx.scale(anim.scale, anim.scale);
        ctx.translate(-CELL_SIZE / 2, -CELL_SIZE / 2);

        // Cell background
        if (isSelected) {
          ctx.fillStyle = COLORS.cyan;
        } else {
          ctx.fillStyle = COLORS.bgSurface;
        }
        ctx.beginPath();
        ctx.roundRect(4, 4, CELL_SIZE - 8, CELL_SIZE - 8, 8);
        ctx.fill();

        // Cell border
        ctx.strokeStyle = isSelected ? COLORS.cyan : COLORS.borderSubtle;
        ctx.lineWidth = 2;
        ctx.stroke();

        // Letter
        ctx.fillStyle = isSelected ? '#FFFFFF' : COLORS.textPrimary;
        ctx.font = 'bold 32px system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(cell.letter, CELL_SIZE / 2, CELL_SIZE / 2);

        ctx.restore();
      }
    }

    // Draw selected word display
    const displayY = gridOffsetY + GRID_SIZE * CELL_SIZE + 40;

    ctx.fillStyle = COLORS.textSecondary;
    ctx.font = '18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Selected:', W / 2, displayY);

    ctx.fillStyle = COLORS.textPrimary;
    ctx.font = 'bold 28px system-ui, sans-serif';
    ctx.fillText(selectedWord || '-', W / 2, displayY + 35);

    // Draw feedback message with shake animation
    if (feedbackTime > 0) {
      const alpha = Math.min(feedbackTime, 1);
      const shake = feedbackTime > 1.5 ? Math.sin(feedbackTime * 30) * 3 : 0;
      ctx.fillStyle = `rgba(232, 93, 74, ${alpha})`;
      ctx.font = '16px system-ui, sans-serif';
      ctx.fillText(feedbackMessage, W / 2 + shake, displayY + 70);
    }

    // Draw particles on top
    drawParticles();
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;
    // Keyboard input not used for this game
  }

  // Mouse/touch handling
  function handlePointerDown(x, y) {
    if (gameState !== 'playing') return;

    const cell = getCellFromPosition(x, y);
    if (cell) {
      isDragging = true;
      selectionStart = cell;
      selectionEnd = cell;
      selectedCells = [cell];
      selectedWord = grid[cell.row][cell.col].letter;
      lastSelectedCount = 1;
      selectionHighlight = 0;
      playSound('select');
    }
  }

  function handlePointerMove(x, y) {
    if (!isDragging || gameState !== 'playing') return;

    const cell = getCellFromPosition(x, y);
    if (cell) {
      selectionEnd = cell;
      selectedCells = getSelectedCells(selectionStart, selectionEnd);
      selectedWord = selectedCells.map(c => grid[c.row][c.col].letter).join('');
    }
  }

  function handlePointerUp() {
    if (!isDragging || gameState !== 'playing') return;
    isDragging = false;

    // Calculate center of selection for particles
    let centerX = W / 2;
    let centerY = H / 2;
    if (selectedCells.length > 0) {
      const midIndex = Math.floor(selectedCells.length / 2);
      const midCell = selectedCells[midIndex];
      centerX = gridOffsetX + midCell.col * CELL_SIZE + CELL_SIZE / 2;
      centerY = gridOffsetY + midCell.row * CELL_SIZE + CELL_SIZE / 2;
    }

    // Check if selected word is TRUE or FALSE
    if (selectedWord === 'TRUE') {
      // Find the TRUE choice
      const trueChoice = QUESTION.choices.find(c => c.text.toLowerCase() === 'true');
      if (trueChoice) {
        if (trueChoice.is_correct) {
          playSound('correct');
          spawnParticles(centerX, centerY, 'correct');
        } else {
          playSound('wrong');
          spawnParticles(centerX, centerY, 'wrong');
        }
        engine.end(trueChoice.is_correct, trueChoice.explanation);
      }
    } else if (selectedWord === 'FALSE') {
      // Find the FALSE choice
      const falseChoice = QUESTION.choices.find(c => c.text.toLowerCase() === 'false');
      if (falseChoice) {
        if (falseChoice.is_correct) {
          playSound('correct');
          spawnParticles(centerX, centerY, 'correct');
        } else {
          playSound('wrong');
          spawnParticles(centerX, centerY, 'wrong');
        }
        engine.end(falseChoice.is_correct, falseChoice.explanation);
      }
    } else {
      // Invalid selection
      playSound('invalid');
      spawnParticles(centerX, centerY, 'invalid');
      feedbackMessage = "That doesn't spell TRUE or FALSE. Try again!";
      feedbackTime = 2;
      selectedCells = [];
      selectedWord = '';
    }

    selectionStart = null;
    selectionEnd = null;
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Mouse event handlers
  canvas.addEventListener('mousedown', (e) => {
    if (gameState !== 'playing') return;
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    handlePointerDown(x, y);
  });

  canvas.addEventListener('mousemove', (e) => {
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    handlePointerMove(x, y);
  });

  canvas.addEventListener('mouseup', (e) => {
    handlePointerUp();
  });

  canvas.addEventListener('mouseleave', (e) => {
    if (isDragging) {
      handlePointerUp();
    }
  });

  // Touch event handlers
  canvas.addEventListener('touchstart', (e) => {
    if (gameState !== 'playing') return;
    e.preventDefault();
    const touch = e.touches[0];
    const { x, y } = screenToLogical(touch.clientX, touch.clientY);
    handlePointerDown(x, y);
  });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    const { x, y } = screenToLogical(touch.clientX, touch.clientY);
    handlePointerMove(x, y);
  });

  canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    handlePointerUp();
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });


  // Cursor change handler for end screen buttons
  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'ended') {
      canvas.style.cursor = 'default';
      return;
    }
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    if (gameResult) {
      if (pointInRect(x, y, restartButton) || pointInRect(x, y, nextButton)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    } else {
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    }
    canvas.style.cursor = 'default';
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
