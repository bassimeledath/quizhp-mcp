<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jetstream Slice</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === QUIZHP COLOR PALETTE ===
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC'
  };

  // === SOUND EFFECTS ===
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playSound(type) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'correct') {
      osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
      osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); // E5
      osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2); // G5
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialDecayTo = 0.01;
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialDecayTo(0.01, audioCtx.currentTime + 0.4);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'wrong') {
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.setValueAtTime(150, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialDecayTo(0.01, audioCtx.currentTime + 0.3);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    } else if (type === 'deflect') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialDecayTo(0.01, audioCtx.currentTime + 0.1);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    }
  }

  // Workaround for exponentialDecayTo not existing
  GainNode.prototype.exponentialDecayTo = function(value, endTime) {
    this.gain.exponentialRampToValueAtTime(Math.max(value, 0.0001), endTime);
  };

  // === GAME STATE ===
  let glider = { x: 100, y: H / 2, vx: 0, vy: 0, angle: 0 };
  let spoiler = { x: W / 2, y: H / 2, angle: 0 }; // controlled by mouse + A/D
  let windBands = [];
  let hangars = [];
  let mouseX = W / 2;
  let mouseY = H / 2;
  let keysDown = { a: false, d: false };
  let gameTime = 0;
  let gliderParticles = [];
  let hangarAnimTime = 0;
  let entranceAnimTime = 0;
  let deflectCooldown = 0;

  function initGame() {
    // Reset glider - starts on the left side
    glider = {
      x: 80,
      y: H / 2,
      vx: 120, // moves right
      vy: 0,
      angle: 0
    };

    // Reset spoiler
    spoiler = {
      x: W / 2,
      y: H / 2,
      angle: 0
    };

    mouseX = W / 2;
    mouseY = H / 2;
    keysDown = { a: false, d: false };
    gameTime = 0;
    gliderParticles = [];
    hangarAnimTime = 0;
    entranceAnimTime = 0;
    deflectCooldown = 0;

    // Create wind bands (horizontal layers with different wind speeds)
    windBands = [
      { y: 0, height: 90, windSpeed: 80, color: 'rgba(78, 205, 196, 0.15)' },      // Cyan - slow
      { y: 90, height: 90, windSpeed: -120, color: 'rgba(232, 122, 62, 0.15)' },   // Orange - medium reverse
      { y: 180, height: 90, windSpeed: 150, color: 'rgba(245, 167, 66, 0.15)' },   // Amber - fast
      { y: 270, height: 90, windSpeed: -100, color: 'rgba(78, 205, 196, 0.15)' },  // Cyan - reverse
      { y: 360, height: 90, windSpeed: 180, color: 'rgba(232, 122, 62, 0.15)' },   // Orange - fast
      { y: 450, height: 90, windSpeed: -60, color: 'rgba(245, 167, 66, 0.15)' }    // Amber - slow reverse
    ];

    // Create four hangars on the right side at different heights
    const hangarCount = QUESTION.choices.length;
    const hangarH = 112;
    const totalGap = H - hangarCount * hangarH;
    const gap = totalGap / (hangarCount + 1);
    hangars = QUESTION.choices.map((choice, i) => ({
      x: W - 140,
      y: gap + i * (hangarH + gap),
      width: 140,
      height: hangarH,
      choice: choice,
      index: i,
      scale: 0,
      alpha: 0
    }));
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;
    entranceAnimTime += dt;
    hangarAnimTime += dt;
    deflectCooldown = Math.max(0, deflectCooldown - dt);

    // Animate hangar entrance
    hangars.forEach((hangar, i) => {
      const delay = i * 0.15;
      const t = Math.max(0, Math.min(1, (entranceAnimTime - delay) / 0.35));
      const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
      hangar.scale = t * spring;
      hangar.alpha = t;
    });

    // Update spoiler position (follows mouse)
    spoiler.x = mouseX;
    spoiler.y = mouseY;

    // Update spoiler angle based on A/D keys
    const tiltSpeed = 3;
    if (keysDown.a) {
      spoiler.angle -= tiltSpeed * dt;
    }
    if (keysDown.d) {
      spoiler.angle += tiltSpeed * dt;
    }
    // Clamp angle
    spoiler.angle = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, spoiler.angle));
    // Decay angle slightly when no keys pressed
    if (!keysDown.a && !keysDown.d) {
      spoiler.angle *= 0.95;
    }

    // Find which wind band the glider is in
    let windEffect = 0;
    for (const band of windBands) {
      if (glider.y >= band.y && glider.y < band.y + band.height) {
        windEffect = band.windSpeed;
        break;
      }
    }

    // Apply wind to glider horizontal velocity (carries glider with the band)
    glider.vx += windEffect * dt * 0.5;

    // Gravity pulls glider down slightly
    glider.vy += 30 * dt;

    // Air resistance
    glider.vx *= 0.995;
    glider.vy *= 0.98;

    // Base forward velocity
    glider.vx = Math.max(glider.vx, 60);

    // Check if glider hits the spoiler
    const dx = glider.x - spoiler.x;
    const dy = glider.y - spoiler.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < 50) {
      // Deflect glider based on spoiler angle
      const deflectionForce = 400;
      const deflectX = Math.cos(spoiler.angle - Math.PI / 2);
      const deflectY = Math.sin(spoiler.angle - Math.PI / 2);

      glider.vx += deflectX * deflectionForce * dt;
      glider.vy += deflectY * deflectionForce * dt;

      // Push glider away from spoiler
      if (dist > 0) {
        glider.x += (dx / dist) * 5;
        glider.y += (dy / dist) * 5;
      }

      // Play deflect sound and spawn particles
      if (deflectCooldown <= 0) {
        try { playSound('deflect'); } catch(e) {}
        deflectCooldown = 0.2;
        // Spawn particles on deflection
        for (let i = 0; i < 8; i++) {
          gliderParticles.push({
            x: glider.x,
            y: glider.y,
            vx: (Math.random() - 0.5) * 200 + deflectX * 100,
            vy: (Math.random() - 0.5) * 200 + deflectY * 100,
            life: 0.5,
            maxLife: 0.5,
            color: [COLORS.cyan, COLORS.amber, COLORS.orange][Math.floor(Math.random() * 3)]
          });
        }
      }
    }

    // Update glider position
    glider.x += glider.vx * dt;
    glider.y += glider.vy * dt;

    // Update glider angle based on velocity
    glider.angle = Math.atan2(glider.vy, glider.vx);

    // Clamp glider to screen vertically
    glider.y = Math.max(20, Math.min(H - 20, glider.y));

    // Update particles
    gliderParticles = gliderParticles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      p.vx *= 0.95;
      p.vy *= 0.95;
      return p.life > 0;
    });

    // Spawn trail particles
    if (Math.random() < 0.3) {
      gliderParticles.push({
        x: glider.x - Math.cos(glider.angle) * 20,
        y: glider.y - Math.sin(glider.angle) * 20,
        vx: -glider.vx * 0.1 + (Math.random() - 0.5) * 30,
        vy: -glider.vy * 0.1 + (Math.random() - 0.5) * 30,
        life: 0.3,
        maxLife: 0.3,
        color: 'rgba(255, 255, 255, 0.5)'
      });
    }

    // Check if glider enters a hangar
    for (const hangar of hangars) {
      if (glider.x >= hangar.x &&
          glider.x <= hangar.x + hangar.width &&
          glider.y >= hangar.y &&
          glider.y <= hangar.y + hangar.height) {
        // Glider entered this hangar
        try { playSound(hangar.choice.is_correct ? 'correct' : 'wrong'); } catch(e) {}
        engine.end(hangar.choice.is_correct, hangar.choice.explanation);
        return;
      }
    }

    // Reset if glider goes off screen
    if (glider.x > W + 50 || glider.x < -50) {
      // Reset glider position
      glider.x = 80;
      glider.y = H / 2;
      glider.vx = 120;
      glider.vy = 0;
    }
  }

  function drawGame() {
    // Sky gradient background
    const gradient = ctx.createLinearGradient(0, 0, 0, H);
    gradient.addColorStop(0, '#1C1C1A');
    gradient.addColorStop(0.5, '#2A2A27');
    gradient.addColorStop(1, '#1C1C1A');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, W, H);

    // Draw wind bands
    for (const band of windBands) {
      ctx.fillStyle = band.color;
      ctx.fillRect(0, band.y, W, band.height);

      // Draw wind arrows
      const arrowSpacing = 60;
      const arrowOffset = (gameTime * Math.abs(band.windSpeed) * 0.5) % arrowSpacing;
      const direction = band.windSpeed > 0 ? 1 : -1;

      ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
      ctx.lineWidth = 2;

      for (let x = direction > 0 ? arrowOffset : W - arrowOffset;
           direction > 0 ? x < W : x > 0;
           x += direction * arrowSpacing) {
        const cy = band.y + band.height / 2;
        ctx.beginPath();
        ctx.moveTo(x - direction * 15, cy);
        ctx.lineTo(x + direction * 15, cy);
        ctx.lineTo(x + direction * 5, cy - 8);
        ctx.moveTo(x + direction * 15, cy);
        ctx.lineTo(x + direction * 5, cy + 8);
        ctx.stroke();
      }
    }

    // Draw particles
    for (const p of gliderParticles) {
      const alpha = p.life / p.maxLife;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Draw hangars with entrance animation
    for (const hangar of hangars) {
      ctx.save();
      ctx.globalAlpha = hangar.alpha;
      const centerX = hangar.x + hangar.width / 2;
      const centerY = hangar.y + hangar.height / 2;
      ctx.translate(centerX, centerY);
      ctx.scale(hangar.scale, hangar.scale);
      ctx.translate(-centerX, -centerY);

      // Hangar glow
      const glowIntensity = 0.3 + Math.sin(hangarAnimTime * 2 + hangar.index) * 0.1;
      const hangarColors = [COLORS.cyan, COLORS.amber, COLORS.success, COLORS.error];
      const glowColor = hangarColors[hangar.index % hangarColors.length];
      ctx.shadowColor = glowColor;
      ctx.shadowBlur = 20 * glowIntensity;

      // Hangar structure
      ctx.fillStyle = glowColor;
      ctx.beginPath();
      ctx.roundRect(hangar.x, hangar.y, hangar.width, hangar.height, 8);
      ctx.fill();

      ctx.shadowBlur = 0;

      // Hangar opening
      ctx.fillStyle = '#1C1C1A';
      ctx.fillRect(hangar.x, hangar.y + 15, 16, hangar.height - 30);

      // Hangar roof
      const roofColors = ['#3DBDB5', '#D4922F', '#5AAF4A', '#D04A3A'];
      ctx.fillStyle = roofColors[hangar.index % roofColors.length];
      ctx.beginPath();
      ctx.moveTo(hangar.x - 10, hangar.y);
      ctx.lineTo(hangar.x + hangar.width / 2, hangar.y - 25);
      ctx.lineTo(hangar.x + hangar.width + 10, hangar.y);
      ctx.closePath();
      ctx.fill();

      // Answer text - wrap text to fit with padding
      ctx.fillStyle = COLORS.bgPrimary;
      ctx.font = "500 14px 'Nunito', sans-serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';

      // Word wrap the text with more breathing room
      const maxWidth = hangar.width - 24;
      const words = hangar.choice.text.split(' ');
      let lines = [];
      let currentLine = '';

      for (const word of words) {
        const testLine = currentLine ? currentLine + ' ' + word : word;
        const metrics = ctx.measureText(testLine);
        if (metrics.width > maxWidth && currentLine) {
          lines.push(currentLine);
          currentLine = word;
        } else {
          currentLine = testLine;
        }
      }
      if (currentLine) lines.push(currentLine);

      // Draw wrapped text with padding
      const lineHeight = 17;
      const textStartY = hangar.y + 28;
      for (let i = 0; i < lines.length && i < 5; i++) {
        ctx.fillText(lines[i], hangar.x + hangar.width / 2, textStartY + i * lineHeight);
      }

      ctx.restore();
    }

    // Draw spoiler with glow
    ctx.save();
    ctx.translate(spoiler.x, spoiler.y);
    ctx.rotate(spoiler.angle);

    // Spoiler glow
    ctx.shadowColor = COLORS.orange;
    ctx.shadowBlur = 15;

    // Spoiler body (wing-like shape)
    ctx.fillStyle = COLORS.orange;
    ctx.beginPath();
    ctx.moveTo(-40, 0);
    ctx.lineTo(-30, -8);
    ctx.lineTo(30, -8);
    ctx.lineTo(40, 0);
    ctx.lineTo(30, 8);
    ctx.lineTo(-30, 8);
    ctx.closePath();
    ctx.fill();

    ctx.shadowBlur = 0;

    // Spoiler highlight
    ctx.fillStyle = COLORS.amber;
    ctx.beginPath();
    ctx.moveTo(-35, -2);
    ctx.lineTo(35, -2);
    ctx.lineTo(30, -6);
    ctx.lineTo(-30, -6);
    ctx.closePath();
    ctx.fill();

    ctx.restore();

    // Draw glider with glow
    ctx.save();
    ctx.translate(glider.x, glider.y);
    ctx.rotate(glider.angle);

    // Glider glow
    ctx.shadowColor = COLORS.cyan;
    ctx.shadowBlur = 10;

    // Glider body
    ctx.fillStyle = COLORS.bgPrimary;
    ctx.beginPath();
    ctx.moveTo(25, 0);      // Nose
    ctx.lineTo(-15, -5);    // Top body
    ctx.lineTo(-20, 0);     // Tail
    ctx.lineTo(-15, 5);     // Bottom body
    ctx.closePath();
    ctx.fill();

    ctx.shadowBlur = 0;

    // Wings
    ctx.fillStyle = COLORS.cyan;
    ctx.beginPath();
    ctx.moveTo(5, -3);
    ctx.lineTo(-10, -20);
    ctx.lineTo(-15, -18);
    ctx.lineTo(-5, -3);
    ctx.closePath();
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(5, 3);
    ctx.lineTo(-10, 20);
    ctx.lineTo(-15, 18);
    ctx.lineTo(-5, 3);
    ctx.closePath();
    ctx.fill();

    // Tail fin
    ctx.fillStyle = COLORS.amber;
    ctx.beginPath();
    ctx.moveTo(-15, 0);
    ctx.lineTo(-22, -10);
    ctx.lineTo(-20, 0);
    ctx.lineTo(-22, 10);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;

    if (e.type === 'keydown') {
      if (e.code === 'KeyA') keysDown.a = true;
      if (e.code === 'KeyD') keysDown.d = true;
    } else if (e.type === 'keyup') {
      if (e.code === 'KeyA') keysDown.a = false;
      if (e.code === 'KeyD') keysDown.d = false;
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    handleInput(e);
  });

  // Mouse movement handler
  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'playing') return;
    const pos = screenToLogical(e.clientX, e.clientY);
    mouseX = pos.x;
    mouseY = pos.y;
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
