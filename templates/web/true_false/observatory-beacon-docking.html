<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Observatory Beacon Docking</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1C1C1A;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #1C1C1A;
      border-radius: 12px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "true_false",
    prompt: "Sample question text",
    choices: [
      { text: "True", is_correct: true, explanation: "This statement is true because of the given facts" },
      { text: "False", is_correct: false, explanation: "This statement is actually true, not false" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === QUIZHP COLORS ===
  const COLORS = {
    bgPrimary: '#1C1C1A',
    surface: '#2A2A27',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    textPrimary: '#F5F5F0',
    textSecondary: '#C2C2B8',
    borderSubtle: '#424240'
  };

  // === AUDIO SYSTEM ===
  let audioCtx = null;
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function getAudioContext() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
  }

  function playSound(type) {
    if (prefersReducedMotion) return;
    try {
      const ctx = getAudioContext();
      const oscillator = ctx.createOscillator();
      const gainNode = ctx.createGain();
      oscillator.connect(gainNode);
      gainNode.connect(ctx.destination);

      if (type === 'correct') {
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(523.25, ctx.currentTime); // C5
        oscillator.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1); // E5
        oscillator.frequency.setValueAtTime(783.99, ctx.currentTime + 0.2); // G5
        gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
        gainNode.gain.exponentialDecayTo && gainNode.gain.exponentialDecayTo(0.01, ctx.currentTime + 0.4);
        gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.4);
        oscillator.start(ctx.currentTime);
        oscillator.stop(ctx.currentTime + 0.4);
      } else if (type === 'wrong') {
        oscillator.type = 'sawtooth';
        oscillator.frequency.setValueAtTime(200, ctx.currentTime);
        oscillator.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.3);
        gainNode.gain.setValueAtTime(0.2, ctx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.3);
        oscillator.start(ctx.currentTime);
        oscillator.stop(ctx.currentTime + 0.3);
      } else if (type === 'dock') {
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(440, ctx.currentTime);
        gainNode.gain.setValueAtTime(0.15, ctx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.15);
        oscillator.start(ctx.currentTime);
        oscillator.stop(ctx.currentTime + 0.15);
      } else if (type === 'thrust') {
        oscillator.type = 'triangle';
        oscillator.frequency.setValueAtTime(80 + Math.random() * 40, ctx.currentTime);
        gainNode.gain.setValueAtTime(0.05, ctx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.05);
        oscillator.start(ctx.currentTime);
        oscillator.stop(ctx.currentTime + 0.05);
      }
    } catch (e) {}
  }

  // === GAME STATE ===
  let ship = { x: 0, y: 0, vx: 0, vy: 0, angle: 0 };
  let trueStation = { x: 0, y: 0, pulseTime: 0, rings: [] };
  let falseStation = { x: 0, y: 0, debrisAngle: 0, jagged: [] };
  let stars = [];
  let pulsarTicks = [];
  let calibrationArcs = [];
  let gameTime = 0;
  let dockingTarget = null; // null, 'true', or 'false'
  let dockingProgress = 0;
  let wrongDockEffect = { active: false, time: 0, plates: [] };
  let shipEntrance = { active: true, progress: 0 };
  let stationEntrance = { active: true, progress: 0 };
  let labelEntrance = { active: true, progress: 0 };
  let dockSuccessEffect = { active: false, time: 0 };

  const SHIP_SPEED = 180;
  const SHIP_FRICTION = 0.96;
  const DOCK_DISTANCE = 60;
  const DOCK_TIME = 0.8;

  function initGame() {
    // Ship starts at bottom center
    ship = { x: W / 2, y: H - 80, vx: 0, vy: 0, angle: -Math.PI / 2 };

    // TRUE station - left side, ringed beacon with white pulses
    trueStation = {
      x: 160,
      y: 180,
      pulseTime: 0,
      rings: [40, 55, 70]
    };

    // FALSE station - right side, jagged red anomaly
    falseStation = {
      x: W - 160,
      y: 180,
      debrisAngle: 0,
      jagged: []
    };

    // Generate jagged points for FALSE station
    for (let i = 0; i < 12; i++) {
      const angle = (i / 12) * Math.PI * 2;
      const radius = 30 + Math.random() * 25;
      falseStation.jagged.push({ angle, radius });
    }

    // Generate starfield
    stars = [];
    for (let i = 0; i < 80; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        size: 0.5 + Math.random() * 1.5,
        brightness: 0.3 + Math.random() * 0.7,
        twinkleOffset: Math.random() * Math.PI * 2
      });
    }

    // Pulsar ticks - vertical lines that pulse
    pulsarTicks = [];
    for (let i = 0; i < 6; i++) {
      pulsarTicks.push({
        x: 100 + i * 100,
        phase: Math.random() * Math.PI * 2
      });
    }

    // Calibration arcs - curved brass lines
    calibrationArcs = [];
    for (let i = 0; i < 3; i++) {
      calibrationArcs.push({
        y: 80 + i * 120,
        startAngle: Math.PI * 0.1,
        endAngle: Math.PI * 0.9,
        radius: 600 + i * 100
      });
    }

    gameTime = 0;
    dockingTarget = null;
    dockingProgress = 0;
    wrongDockEffect = { active: false, time: 0, plates: [] };
    shipEntrance = { active: true, progress: 0 };
    stationEntrance = { active: true, progress: 0 };
    labelEntrance = { active: true, progress: 0 };
    dockSuccessEffect = { active: false, time: 0 };
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Entrance animations with stagger
    if (stationEntrance.active) {
      stationEntrance.progress += dt * 3;
      if (stationEntrance.progress >= 1) {
        stationEntrance.active = false;
        stationEntrance.progress = 1;
      }
    }

    if (labelEntrance.active && stationEntrance.progress > 0.5) {
      labelEntrance.progress += dt * 3;
      if (labelEntrance.progress >= 1) {
        labelEntrance.active = false;
        labelEntrance.progress = 1;
      }
    }

    if (shipEntrance.active && labelEntrance.progress > 0.3) {
      shipEntrance.progress += dt * 2;
      if (shipEntrance.progress >= 1) {
        shipEntrance.active = false;
        shipEntrance.progress = 1;
      }
    }

    // Dock success effect
    if (dockSuccessEffect.active) {
      dockSuccessEffect.time += dt;
      if (dockSuccessEffect.time > 0.5) {
        dockSuccessEffect.active = false;
      }
    }

    // Apply friction
    ship.vx *= Math.pow(SHIP_FRICTION, dt * 60);
    ship.vy *= Math.pow(SHIP_FRICTION, dt * 60);

    // Move ship
    ship.x += ship.vx * dt;
    ship.y += ship.vy * dt;

    // Boundary constraints
    ship.x = Math.max(40, Math.min(W - 40, ship.x));
    ship.y = Math.max(40, Math.min(H - 40, ship.y));

    // Update ship angle based on velocity
    if (Math.abs(ship.vx) > 5 || Math.abs(ship.vy) > 5) {
      const targetAngle = Math.atan2(ship.vy, ship.vx);
      let diff = targetAngle - ship.angle;
      while (diff > Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      ship.angle += diff * dt * 5;
    }

    // Update station animations
    trueStation.pulseTime += dt;
    falseStation.debrisAngle += dt * 0.3;

    // Check proximity to stations
    const distTrue = Math.hypot(ship.x - trueStation.x, ship.y - trueStation.y);
    const distFalse = Math.hypot(ship.x - falseStation.x, ship.y - falseStation.y);

    // Determine if in docking range
    if (distTrue < DOCK_DISTANCE) {
      dockingTarget = 'true';
    } else if (distFalse < DOCK_DISTANCE) {
      dockingTarget = 'false';
    } else {
      dockingTarget = null;
      dockingProgress = 0;
    }

    // Update wrong dock effect
    if (wrongDockEffect.active) {
      wrongDockEffect.time += dt;

      // Update flying plates
      wrongDockEffect.plates.forEach(plate => {
        plate.x += plate.vx * dt;
        plate.y += plate.vy * dt;
        plate.vy += 100 * dt; // gravity
        plate.rotation += plate.rotSpeed * dt;
        plate.alpha -= dt * 0.5;
      });
      wrongDockEffect.plates = wrongDockEffect.plates.filter(p => p.alpha > 0);

      if (wrongDockEffect.time > 1.5) {
        wrongDockEffect.active = false;
      }
    }
  }

  function drawGame() {
    // Deep space background - velvet darkness with QuizHP dark palette
    ctx.fillStyle = COLORS.bgPrimary;
    ctx.fillRect(0, 0, W, H);

    // Draw calibration arcs (brass/amber tinted)
    ctx.strokeStyle = COLORS.amber;
    ctx.globalAlpha = 0.3;
    ctx.lineWidth = 1;
    calibrationArcs.forEach(arc => {
      ctx.beginPath();
      ctx.arc(W / 2, arc.y + arc.radius, arc.radius, arc.startAngle, arc.endAngle);
      ctx.stroke();

      // Tick marks on arc
      for (let i = 0; i <= 8; i++) {
        const a = arc.startAngle + (arc.endAngle - arc.startAngle) * (i / 8);
        const x1 = W / 2 + Math.cos(a) * arc.radius;
        const y1 = arc.y + arc.radius + Math.sin(a) * arc.radius;
        const x2 = W / 2 + Math.cos(a) * (arc.radius - 10);
        const y2 = arc.y + arc.radius + Math.sin(a) * (arc.radius - 10);
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      }
    });
    ctx.globalAlpha = 1;

    // Draw pulsar ticks with amber glow
    pulsarTicks.forEach(tick => {
      const intensity = 0.2 + 0.3 * Math.sin(gameTime * 3 + tick.phase);
      ctx.strokeStyle = `rgba(245, 167, 66, ${intensity})`; // COLORS.amber with alpha
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 8]);
      ctx.beginPath();
      ctx.moveTo(tick.x, 0);
      ctx.lineTo(tick.x, H);
      ctx.stroke();
      ctx.setLineDash([]);
    });

    // Draw stars
    stars.forEach(star => {
      const twinkle = 0.5 + 0.5 * Math.sin(gameTime * 2 + star.twinkleOffset);
      ctx.fillStyle = `rgba(255, 255, 240, ${star.brightness * twinkle})`;
      ctx.beginPath();
      ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
      ctx.fill();
    });

    // Draw TRUE station (left) - Ringed beacon with white timing pulses
    drawTrueStation();

    // Draw FALSE station (right) - Jagged red anomaly with debris
    drawFalseStation();

    // Draw answer labels
    drawStationLabels();

    // Draw ship
    drawShip();

    // Draw docking indicator
    if (dockingTarget) {
      drawDockingIndicator();
    }

    // Draw wrong dock effect
    if (wrongDockEffect.active) {
      drawWrongDockEffect();
    }
  }

  function drawTrueStation() {
    const x = trueStation.x;
    const y = trueStation.y;

    // Entrance animation with spring
    let stationScale = 1;
    let stationAlpha = 1;
    if (stationEntrance.active || stationEntrance.progress < 1) {
      const t = stationEntrance.progress;
      const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
      stationScale = t * spring;
      stationAlpha = t;
    }

    ctx.save();
    ctx.globalAlpha = stationAlpha;
    ctx.translate(x, y);
    ctx.scale(stationScale, stationScale);
    ctx.translate(-x, -y);

    // Pulse effect
    const pulsePhase = trueStation.pulseTime * 2;
    const pulseIntensity = 0.5 + 0.5 * Math.sin(pulsePhase);

    // Outer rings with success green tint
    trueStation.rings.forEach((radius, i) => {
      const ringPulse = 0.3 + 0.4 * Math.sin(pulsePhase - i * 0.5);
      ctx.strokeStyle = `rgba(107, 191, 89, ${ringPulse})`; // COLORS.success with alpha
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.stroke();
    });

    // Central beacon - amber/orange core (QuizHP branded)
    const gradient = ctx.createRadialGradient(x, y, 0, x, y, 25);
    gradient.addColorStop(0, COLORS.amber);
    gradient.addColorStop(0.5, COLORS.orange);
    gradient.addColorStop(1, COLORS.orangeHover);
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(x, y, 25, 0, Math.PI * 2);
    ctx.fill();

    // White timing pulse (flashing)
    if (pulseIntensity > 0.7) {
      ctx.fillStyle = `rgba(255, 255, 255, ${(pulseIntensity - 0.7) * 3})`;
      ctx.beginPath();
      ctx.arc(x, y, 15, 0, Math.PI * 2);
      ctx.fill();
    }

    // Timing marks around beacon with amber
    ctx.strokeStyle = COLORS.amber;
    ctx.lineWidth = 2;
    for (let i = 0; i < 12; i++) {
      const angle = (i / 12) * Math.PI * 2 - Math.PI / 2;
      const inner = 28;
      const outer = i % 3 === 0 ? 38 : 33;
      ctx.beginPath();
      ctx.moveTo(x + Math.cos(angle) * inner, y + Math.sin(angle) * inner);
      ctx.lineTo(x + Math.cos(angle) * outer, y + Math.sin(angle) * outer);
      ctx.stroke();
    }

    ctx.restore();
  }

  function drawFalseStation() {
    const x = falseStation.x;
    const y = falseStation.y;

    // Entrance animation with spring
    let stationScale = 1;
    let stationAlpha = 1;
    if (stationEntrance.active || stationEntrance.progress < 1) {
      const t = stationEntrance.progress;
      const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
      stationScale = t * spring;
      stationAlpha = t;
    }

    ctx.save();
    ctx.globalAlpha = stationAlpha;
    ctx.translate(x, y);
    ctx.scale(stationScale, stationScale);
    ctx.translate(-x, -y);

    // Draw broken hour-mark debris orbiting
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(falseStation.debrisAngle);

    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2;
      const dist = 55 + Math.sin(gameTime * 2 + i) * 5;
      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist;

      ctx.fillStyle = COLORS.orangeHover;
      ctx.save();
      ctx.translate(dx, dy);
      ctx.rotate(angle + gameTime);
      ctx.fillRect(-6, -2, 12, 4);
      ctx.restore();
    }
    ctx.restore();

    // Jagged red anomaly core with error color
    ctx.fillStyle = COLORS.error;
    ctx.beginPath();
    const firstPoint = falseStation.jagged[0];
    ctx.moveTo(
      x + Math.cos(firstPoint.angle) * firstPoint.radius,
      y + Math.sin(firstPoint.angle) * firstPoint.radius
    );
    falseStation.jagged.forEach((point, i) => {
      const wobble = Math.sin(gameTime * 3 + i) * 3;
      ctx.lineTo(
        x + Math.cos(point.angle) * (point.radius + wobble),
        y + Math.sin(point.angle) * (point.radius + wobble)
      );
    });
    ctx.closePath();
    ctx.fill();

    // Red glow with error color
    const glowGradient = ctx.createRadialGradient(x, y, 0, x, y, 60);
    glowGradient.addColorStop(0, 'rgba(232, 93, 74, 0.4)'); // COLORS.error
    glowGradient.addColorStop(0.5, 'rgba(232, 93, 74, 0.15)');
    glowGradient.addColorStop(1, 'rgba(232, 93, 74, 0)');
    ctx.fillStyle = glowGradient;
    ctx.beginPath();
    ctx.arc(x, y, 60, 0, Math.PI * 2);
    ctx.fill();

    // Broken hour marks (static debris)
    ctx.strokeStyle = '#CD5C5C';
    ctx.lineWidth = 2;
    for (let i = 0; i < 6; i++) {
      const angle = (i / 6) * Math.PI * 2 + Math.sin(gameTime + i) * 0.1;
      const inner = 25;
      const outer = 35;
      ctx.beginPath();
      ctx.moveTo(x + Math.cos(angle) * inner, y + Math.sin(angle) * inner);
      ctx.lineTo(x + Math.cos(angle) * outer, y + Math.sin(angle) * outer);
      ctx.stroke();
    }

    ctx.restore();
  }

  function drawStationLabels() {
    // Label entrance animation
    let labelScale = 1;
    let labelAlpha = 1;
    if (labelEntrance.active || labelEntrance.progress < 1) {
      const t = labelEntrance.progress;
      const spring = 1 + Math.sin(t * Math.PI * 2) * 0.15 * (1 - t);
      labelScale = t * spring;
      labelAlpha = t;
    }

    const trueChoice = QUESTION.choices.find(c => c.text.toLowerCase().includes('true')) || QUESTION.choices[0];
    const falseChoice = QUESTION.choices.find(c => c.text.toLowerCase().includes('false')) || QUESTION.choices[1];

    // TRUE label box
    ctx.save();
    ctx.globalAlpha = labelAlpha;
    ctx.translate(trueStation.x, trueStation.y + 110);
    ctx.scale(labelScale, labelScale);
    ctx.translate(-trueStation.x, -(trueStation.y + 110));

    ctx.fillStyle = COLORS.surface;
    ctx.beginPath();
    ctx.roundRect(trueStation.x - 80, trueStation.y + 90, 160, 40, 12);
    ctx.fill();

    ctx.strokeStyle = COLORS.success;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(trueStation.x - 80, trueStation.y + 90, 160, 40, 12);
    ctx.stroke();

    ctx.fillStyle = COLORS.textPrimary;
    ctx.font = "600 18px 'Nunito Sans', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(trueChoice.text, trueStation.x, trueStation.y + 110);
    ctx.restore();

    // FALSE label box
    ctx.save();
    ctx.globalAlpha = labelAlpha;
    ctx.translate(falseStation.x, falseStation.y + 110);
    ctx.scale(labelScale, labelScale);
    ctx.translate(-falseStation.x, -(falseStation.y + 110));

    ctx.fillStyle = COLORS.surface;
    ctx.beginPath();
    ctx.roundRect(falseStation.x - 80, falseStation.y + 90, 160, 40, 12);
    ctx.fill();

    ctx.strokeStyle = COLORS.error;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(falseStation.x - 80, falseStation.y + 90, 160, 40, 12);
    ctx.stroke();

    ctx.fillStyle = COLORS.textPrimary;
    ctx.fillText(falseChoice.text, falseStation.x, falseStation.y + 110);
    ctx.restore();
  }

  function drawShip() {
    // Entrance animation offset with spring bounce
    let yOffset = 0;
    let alpha = 1;
    let shipScale = 1;
    if (shipEntrance.active || shipEntrance.progress < 1) {
      const t = shipEntrance.progress;
      yOffset = (1 - t) * 100;
      alpha = t;
      const spring = 1 + Math.sin(t * Math.PI * 2) * 0.15 * (1 - t);
      shipScale = t * spring;
    }

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(ship.x, ship.y + yOffset);
    ctx.scale(shipScale, shipScale);
    ctx.rotate(ship.angle + Math.PI / 2);

    // Engine glow with orange QuizHP color
    if (Math.abs(ship.vx) > 10 || Math.abs(ship.vy) > 10) {
      const glowGradient = ctx.createRadialGradient(0, 20, 0, 0, 20, 25);
      glowGradient.addColorStop(0, 'rgba(232, 122, 62, 0.9)'); // COLORS.orange
      glowGradient.addColorStop(0.5, 'rgba(245, 167, 66, 0.5)'); // COLORS.amber
      glowGradient.addColorStop(1, 'rgba(232, 122, 62, 0)');
      ctx.fillStyle = glowGradient;
      ctx.beginPath();
      ctx.arc(0, 20, 25, 0, Math.PI * 2);
      ctx.fill();
    }

    // Brass hull with amber/orange gradient
    const hullGradient = ctx.createLinearGradient(-15, 0, 15, 0);
    hullGradient.addColorStop(0, COLORS.orangeHover);
    hullGradient.addColorStop(0.3, COLORS.amber);
    hullGradient.addColorStop(0.7, COLORS.amber);
    hullGradient.addColorStop(1, COLORS.orangeHover);
    ctx.fillStyle = hullGradient;

    // Ship body
    ctx.beginPath();
    ctx.moveTo(0, -25);
    ctx.lineTo(15, 15);
    ctx.lineTo(8, 20);
    ctx.lineTo(-8, 20);
    ctx.lineTo(-15, 15);
    ctx.closePath();
    ctx.fill();

    // Cockpit window with cyan
    ctx.fillStyle = COLORS.cyan;
    ctx.beginPath();
    ctx.ellipse(0, -8, 5, 8, 0, 0, Math.PI * 2);
    ctx.fill();

    // Detail lines
    ctx.strokeStyle = COLORS.orangeHover;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-10, 5);
    ctx.lineTo(10, 5);
    ctx.stroke();

    ctx.restore();
  }

  function drawDockingIndicator() {
    const target = dockingTarget === 'true' ? trueStation : falseStation;
    const color = dockingTarget === 'true' ? COLORS.success : COLORS.error;

    // Pulsing ring around target
    const pulseSize = 1 + Math.sin(gameTime * 5) * 0.1;
    ctx.strokeStyle = color;
    ctx.lineWidth = 3;
    ctx.setLineDash([5, 5]);
    ctx.beginPath();
    ctx.arc(target.x, target.y, DOCK_DISTANCE * pulseSize, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);

    // "DOCK" prompt with styled box
    const promptY = H - 45;
    ctx.fillStyle = COLORS.surface;
    ctx.beginPath();
    ctx.roundRect(W / 2 - 120, promptY - 15, 240, 36, 8);
    ctx.fill();

    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(W / 2 - 120, promptY - 15, 240, 36, 8);
    ctx.stroke();

    ctx.fillStyle = color;
    ctx.font = "600 16px 'Nunito Sans', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('SPACE/ENTER TO DOCK', W / 2, promptY + 3);
  }

  function drawWrongDockEffect() {
    // Static discharge effect with error color
    const flashIntensity = Math.max(0, 1 - wrongDockEffect.time * 2);
    if (flashIntensity > 0) {
      ctx.fillStyle = `rgba(232, 93, 74, ${flashIntensity * 0.3})`; // COLORS.error
      ctx.fillRect(0, 0, W, H);

      // Lightning bolts with cyan
      ctx.strokeStyle = `rgba(78, 205, 196, ${flashIntensity})`; // COLORS.cyan
      ctx.lineWidth = 2;
      for (let i = 0; i < 5; i++) {
        ctx.beginPath();
        let bx = ship.x;
        let by = ship.y;
        ctx.moveTo(bx, by);
        for (let j = 0; j < 4; j++) {
          bx += (Math.random() - 0.5) * 60;
          by += (Math.random() - 0.5) * 60;
          ctx.lineTo(bx, by);
        }
        ctx.stroke();
      }
    }

    // Flying numbered plates with QuizHP colors
    wrongDockEffect.plates.forEach(plate => {
      if (plate.alpha <= 0) return;
      ctx.save();
      ctx.globalAlpha = plate.alpha;
      ctx.translate(plate.x, plate.y);
      ctx.rotate(plate.rotation);

      ctx.fillStyle = COLORS.orangeHover;
      ctx.fillRect(-12, -6, 24, 12);
      ctx.fillStyle = COLORS.textPrimary;
      ctx.font = "bold 10px 'Nunito Sans', sans-serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(plate.number, 0, 0);

      ctx.restore();
    });
  }

  function triggerWrongDock() {
    playSound('wrong');
    wrongDockEffect.active = true;
    wrongDockEffect.time = 0;
    wrongDockEffect.plates = [];

    // Spawn numbered plates with QuizHP colors
    const plateColors = [COLORS.orange, COLORS.amber, COLORS.error, COLORS.orangeHover];
    for (let i = 0; i < 12; i++) {
      wrongDockEffect.plates.push({
        x: ship.x,
        y: ship.y,
        vx: (Math.random() - 0.5) * 300,
        vy: -Math.random() * 200 - 50,
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 10,
        alpha: 1,
        number: Math.floor(Math.random() * 12) + 1,
        color: plateColors[Math.floor(Math.random() * plateColors.length)]
      });
    }

    // Push ship back
    const target = dockingTarget === 'true' ? trueStation : falseStation;
    const dx = ship.x - target.x;
    const dy = ship.y - target.y;
    const dist = Math.hypot(dx, dy) || 1;
    ship.vx = (dx / dist) * 200;
    ship.vy = (dy / dist) * 200;
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;

    const accel = SHIP_SPEED;

    // Movement with thrust sound
    let moved = false;
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
      ship.vx -= accel * 0.1;
      moved = true;
    }
    if (e.code === 'ArrowRight' || e.code === 'KeyD') {
      ship.vx += accel * 0.1;
      moved = true;
    }
    if (e.code === 'ArrowUp' || e.code === 'KeyW') {
      ship.vy -= accel * 0.1;
      moved = true;
    }
    if (e.code === 'ArrowDown' || e.code === 'KeyS') {
      ship.vy += accel * 0.1;
      moved = true;
    }
    if (moved) {
      playSound('thrust');
    }

    // Docking
    if ((e.code === 'Space' || e.code === 'Enter') && dockingTarget) {
      e.preventDefault();
      playSound('dock');

      // Determine which choice was selected
      const trueChoice = QUESTION.choices.find(c => c.text.toLowerCase().includes('true')) || QUESTION.choices[0];
      const falseChoice = QUESTION.choices.find(c => c.text.toLowerCase().includes('false')) || QUESTION.choices[1];

      const selectedChoice = dockingTarget === 'true' ? trueChoice : falseChoice;

      if (selectedChoice.is_correct) {
        playSound('correct');
        dockSuccessEffect.active = true;
        dockSuccessEffect.time = 0;
        engine.end(true, selectedChoice.explanation);
      } else {
        triggerWrongDock();
        setTimeout(() => {
          engine.end(false, selectedChoice.explanation);
        }, 1000);
      }
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
