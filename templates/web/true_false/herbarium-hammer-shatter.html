<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Herbarium Hammer Shatter</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "true_false",
    prompt: "Sample question text",
    choices: [
      { text: "True", is_correct: true, explanation: "This statement is true because of the facts presented" },
      { text: "False", is_correct: false, explanation: "This statement is not false, it is actually true" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 36px system-ui, sans-serif';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === QUIZHP COLOR PALETTE ===
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC'
  };

  // === WEB AUDIO API SOUND EFFECTS ===
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  function playSound(type) {
    if (!audioCtx) return;

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    const now = audioCtx.currentTime;

    if (type === 'swing') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(150, now);
      osc.frequency.exponentialRampToValueAtTime(80, now + 0.1);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
      osc.start(now);
      osc.stop(now + 0.1);
    } else if (type === 'release') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.exponentialRampToValueAtTime(100, now + 0.2);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
      osc.start(now);
      osc.stop(now + 0.2);
    } else if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523.25, now); // C5
      osc.frequency.setValueAtTime(659.25, now + 0.1); // E5
      osc.frequency.setValueAtTime(783.99, now + 0.2); // G5
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
      osc.start(now);
      osc.stop(now + 0.4);
    } else if (type === 'wrong') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.exponentialRampToValueAtTime(100, now + 0.3);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
      osc.start(now);
      osc.stop(now + 0.3);
    } else if (type === 'shatter') {
      // Glass shatter sound with multiple oscillators
      for (let i = 0; i < 5; i++) {
        const shatterOsc = audioCtx.createOscillator();
        const shatterGain = audioCtx.createGain();
        shatterOsc.connect(shatterGain);
        shatterGain.connect(audioCtx.destination);

        shatterOsc.type = 'triangle';
        const baseFreq = 1000 + Math.random() * 2000;
        shatterOsc.frequency.setValueAtTime(baseFreq, now + i * 0.02);
        shatterOsc.frequency.exponentialRampToValueAtTime(baseFreq * 0.5, now + 0.1 + i * 0.02);
        shatterGain.gain.setValueAtTime(0.1, now + i * 0.02);
        shatterGain.gain.exponentialRampToValueAtTime(0.001, now + 0.15 + i * 0.02);
        shatterOsc.start(now + i * 0.02);
        shatterOsc.stop(now + 0.2 + i * 0.02);
      }
    }
  }

  // === GAME STATE ===
  let pendulum = {
    pivotX: W / 2,
    pivotY: 80,
    length: 200,
    angle: 0,           // Current angle (radians, 0 = straight down)
    angularVelocity: 0, // Angular velocity
    swinging: false,    // Is it swinging freely?
    released: false     // Has the hammer been released?
  };

  let hammer = {
    x: 0,
    y: 0,
    vx: 0,
    vy: 0,
    released: false,
    rotation: 0
  };

  let keysDown = {
    left: false,
    right: false
  };

  // Cabinet positions
  const leftCabinet = { x: 60, y: 160, w: 200, h: 320, label: 'TRUE' };
  const rightCabinet = { x: 460, y: 160, w: 200, h: 320, label: 'FALSE' };

  // Botanical specimens (added on correct answers)
  let specimens = [];
  const specimenTypes = ['fern', 'leaf', 'flower', 'branch', 'moss'];

  // Floor cracks (added on wrong answers)
  let floorCracks = [];

  // Animation time
  let gameTime = 0;

  // Impact animation
  let impactFlash = 0;
  let selectedCabinet = null;

  // Entrance animation
  let entranceTime = 0;
  const ENTRANCE_DURATION = 0.6;

  // Game particles (glass shards)
  let glassParticles = [];

  // Cabinet shake animation
  let cabinetShake = { left: 0, right: 0 };

  function initGame() {
    initAudio();

    pendulum = {
      pivotX: W / 2,
      pivotY: 80,
      length: 200,
      angle: 0,
      angularVelocity: 0,
      swinging: false,
      released: false
    };

    hammer = {
      x: W / 2,
      y: pendulum.pivotY + pendulum.length,
      vx: 0,
      vy: 0,
      released: false,
      rotation: 0
    };

    keysDown = { left: false, right: false };
    gameTime = 0;
    impactFlash = 0;
    selectedCabinet = null;
    entranceTime = 0;
    glassParticles = [];
    cabinetShake = { left: 0, right: 0 };
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;
    entranceTime += dt;

    // Update impact flash
    if (impactFlash > 0) {
      impactFlash -= dt * 3;
    }

    // Update cabinet shake
    if (cabinetShake.left > 0) cabinetShake.left -= dt * 5;
    if (cabinetShake.right > 0) cabinetShake.right -= dt * 5;

    // Update glass particles
    glassParticles = glassParticles.filter(p => {
      p.vy += 800 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.alpha -= dt * 1.5;
      return p.alpha > 0 && p.y < H + 50;
    });

    if (!hammer.released) {
      // Apply force based on keys held
      const force = 3.5;
      if (keysDown.left) {
        pendulum.angularVelocity -= force * dt;
      }
      if (keysDown.right) {
        pendulum.angularVelocity += force * dt;
      }

      // Pendulum physics with gravity
      const gravity = 9.8;
      const damping = 0.98;
      pendulum.angularVelocity += (-gravity / pendulum.length) * Math.sin(pendulum.angle) * dt;
      pendulum.angularVelocity *= damping;
      pendulum.angle += pendulum.angularVelocity * dt;

      // Clamp angle
      pendulum.angle = Math.max(-Math.PI * 0.7, Math.min(Math.PI * 0.7, pendulum.angle));

      // Update hammer position based on pendulum
      hammer.x = pendulum.pivotX + Math.sin(pendulum.angle) * pendulum.length;
      hammer.y = pendulum.pivotY + Math.cos(pendulum.angle) * pendulum.length;
      hammer.rotation = pendulum.angle;
    } else {
      // Free-flying hammer physics
      const gravity = 600;
      hammer.vy += gravity * dt;
      hammer.x += hammer.vx * dt;
      hammer.y += hammer.vy * dt;
      hammer.rotation += hammer.vx * 0.002 * dt;

      // Check collision with cabinets
      const hammerRadius = 25;

      // Left cabinet (TRUE)
      if (hammer.x > leftCabinet.x && hammer.x < leftCabinet.x + leftCabinet.w &&
          hammer.y > leftCabinet.y && hammer.y < leftCabinet.y + leftCabinet.h) {
        selectedCabinet = 'left';
        impactFlash = 1;
        cabinetShake.left = 1;
        spawnGlassParticles(hammer.x, hammer.y);
        playSound('shatter');

        // Find the TRUE choice
        const trueChoice = QUESTION.choices.find(c => c.text === 'True') || QUESTION.choices[0];
        if (trueChoice.is_correct) {
          playSound('correct');
        } else {
          playSound('wrong');
        }
        engine.end(trueChoice.is_correct, trueChoice.explanation);
        return;
      }

      // Right cabinet (FALSE)
      if (hammer.x > rightCabinet.x && hammer.x < rightCabinet.x + rightCabinet.w &&
          hammer.y > rightCabinet.y && hammer.y < rightCabinet.y + rightCabinet.h) {
        selectedCabinet = 'right';
        impactFlash = 1;
        cabinetShake.right = 1;
        spawnGlassParticles(hammer.x, hammer.y);
        playSound('shatter');

        // Find the FALSE choice
        const falseChoice = QUESTION.choices.find(c => c.text === 'False') || QUESTION.choices[1];
        if (falseChoice.is_correct) {
          playSound('correct');
        } else {
          playSound('wrong');
        }
        engine.end(falseChoice.is_correct, falseChoice.explanation);
        return;
      }

      // Check if hammer went off screen or hit floor
      if (hammer.y > H - 40) {
        // Missed both cabinets - wrong by default
        impactFlash = 1;
        playSound('wrong');
        floorCracks.push({
          x: hammer.x,
          y: H - 20,
          size: 30 + Math.random() * 20
        });

        // Pick the first wrong choice as explanation
        const wrongChoice = QUESTION.choices.find(c => !c.is_correct) || QUESTION.choices[0];
        engine.end(false, "The hammer missed both cabinets!");
        return;
      }

      // Off sides
      if (hammer.x < -50 || hammer.x > W + 50) {
        playSound('wrong');
        engine.end(false, "The hammer flew off screen!");
        return;
      }
    }
  }

  function spawnGlassParticles(x, y) {
    const glassColors = ['rgba(200, 220, 255, 0.8)', 'rgba(180, 200, 240, 0.7)', 'rgba(220, 240, 255, 0.9)', 'rgba(150, 180, 220, 0.6)'];
    for (let i = 0; i < 25; i++) {
      glassParticles.push({
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 400,
        vy: (Math.random() - 0.5) * 300 - 100,
        size: 3 + Math.random() * 8,
        color: glassColors[Math.floor(Math.random() * glassColors.length)],
        rotation: Math.random() * Math.PI * 2,
        rotationSpeed: (Math.random() - 0.5) * 15,
        alpha: 1
      });
    }
  }

  function drawGame() {
    // Entrance animation progress
    const entranceProgress = Math.min(entranceTime / ENTRANCE_DURATION, 1);
    const easeOut = 1 - Math.pow(1 - entranceProgress, 3);

    // Draw Victorian conservatory background
    ctx.fillStyle = COLORS.textPrimary;
    ctx.fillRect(0, 0, W, H);

    // Warm wood paneling background
    const woodGradient = ctx.createLinearGradient(0, 0, 0, H);
    woodGradient.addColorStop(0, '#3D2B1F');
    woodGradient.addColorStop(0.5, '#4A3728');
    woodGradient.addColorStop(1, '#2D1F15');
    ctx.fillStyle = woodGradient;
    ctx.fillRect(0, 0, W, H);

    // Draw decorative brass trim at top with orange accent
    ctx.fillStyle = COLORS.orangeHover;
    ctx.fillRect(0, 0, W, 15);
    ctx.fillStyle = COLORS.amber;
    ctx.fillRect(0, 5, W, 5);

    // Draw floor tiles
    drawFloor();

    // Draw cabinets with entrance animation
    ctx.save();
    const leftScale = 0.5 + easeOut * 0.5;
    const leftAlpha = easeOut;
    ctx.globalAlpha = leftAlpha;
    ctx.translate(leftCabinet.x + leftCabinet.w / 2, leftCabinet.y + leftCabinet.h / 2);
    ctx.scale(leftScale, leftScale);
    ctx.translate(-(leftCabinet.x + leftCabinet.w / 2), -(leftCabinet.y + leftCabinet.h / 2));
    if (cabinetShake.left > 0) {
      ctx.translate(Math.sin(gameTime * 50) * cabinetShake.left * 8, 0);
    }
    drawCabinet(leftCabinet, true);
    ctx.restore();

    ctx.save();
    const rightDelay = 0.1;
    const rightProgress = Math.min(Math.max((entranceTime - rightDelay) / ENTRANCE_DURATION, 0), 1);
    const rightEaseOut = 1 - Math.pow(1 - rightProgress, 3);
    const rightScale = 0.5 + rightEaseOut * 0.5;
    const rightAlpha = rightEaseOut;
    ctx.globalAlpha = rightAlpha;
    ctx.translate(rightCabinet.x + rightCabinet.w / 2, rightCabinet.y + rightCabinet.h / 2);
    ctx.scale(rightScale, rightScale);
    ctx.translate(-(rightCabinet.x + rightCabinet.w / 2), -(rightCabinet.y + rightCabinet.h / 2));
    if (cabinetShake.right > 0) {
      ctx.translate(Math.sin(gameTime * 50) * cabinetShake.right * 8, 0);
    }
    drawCabinet(rightCabinet, false);
    ctx.restore();

    // Draw floor cracks
    drawCracks();

    // Draw glass particles
    drawGlassParticles();

    // Draw chain from pivot to hammer
    if (!hammer.released) {
      drawChain(pendulum.pivotX, pendulum.pivotY, hammer.x, hammer.y);
    }

    // Draw pivot mechanism with entrance animation
    const pivotDelay = 0.2;
    const pivotProgress = Math.min(Math.max((entranceTime - pivotDelay) / ENTRANCE_DURATION, 0), 1);
    const pivotEaseOut = 1 - Math.pow(1 - pivotProgress, 3);

    ctx.save();
    ctx.globalAlpha = pivotEaseOut;
    const pivotScale = 0.3 + pivotEaseOut * 0.7;
    ctx.translate(pendulum.pivotX, pendulum.pivotY);
    ctx.scale(pivotScale, pivotScale);
    ctx.translate(-pendulum.pivotX, -pendulum.pivotY);

    ctx.fillStyle = '#8B4513';
    ctx.beginPath();
    ctx.arc(pendulum.pivotX, pendulum.pivotY, 20, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = COLORS.amber;
    ctx.lineWidth = 4;
    ctx.stroke();
    ctx.restore();

    // Draw hammer with entrance animation
    ctx.save();
    ctx.globalAlpha = pivotEaseOut;
    drawHammer(hammer.x, hammer.y, hammer.rotation);
    ctx.restore();

    // Impact flash effect
    if (impactFlash > 0) {
      ctx.fillStyle = `rgba(255, 255, 200, ${impactFlash * 0.5})`;
      ctx.fillRect(0, 0, W, H);
    }

    // Draw momentum indicator
    if (!hammer.released) {
      drawMomentumIndicator();
    }
  }

  function drawGlassParticles() {
    glassParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      // Draw irregular glass shard shape
      ctx.beginPath();
      ctx.moveTo(0, -p.size / 2);
      ctx.lineTo(p.size / 3, p.size / 4);
      ctx.lineTo(-p.size / 4, p.size / 2);
      ctx.lineTo(-p.size / 3, 0);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    });
  }

  function drawFloor() {
    // Victorian tile pattern
    const tileSize = 40;
    for (let x = 0; x < W; x += tileSize) {
      for (let y = H - 80; y < H; y += tileSize) {
        const isDark = ((x / tileSize) + (y / tileSize)) % 2 === 0;
        ctx.fillStyle = isDark ? '#4A3728' : '#5D4A3A';
        ctx.fillRect(x, y, tileSize, tileSize);
        ctx.strokeStyle = '#3D2B1F';
        ctx.lineWidth = 1;
        ctx.strokeRect(x, y, tileSize, tileSize);
      }
    }
  }

  function drawCracks() {
    ctx.strokeStyle = '#1A1512';
    ctx.lineWidth = 2;

    floorCracks.forEach(crack => {
      ctx.beginPath();
      ctx.moveTo(crack.x, crack.y);

      // Draw jagged crack lines
      for (let i = 0; i < 5; i++) {
        const angle = (Math.random() - 0.5) * Math.PI;
        const length = crack.size * (0.3 + Math.random() * 0.4);
        ctx.lineTo(
          crack.x + Math.cos(angle) * length,
          crack.y + Math.sin(angle) * length * 0.5
        );
        ctx.moveTo(crack.x, crack.y);
      }
      ctx.stroke();
    });
  }

  function drawCabinet(cabinet, isTrue) {
    const ambientColor = isTrue ? 'rgba(232, 122, 62, 0.3)' : 'rgba(78, 205, 196, 0.2)';
    const glassColor = isTrue ? 'rgba(245, 167, 66, 0.15)' : 'rgba(78, 205, 196, 0.15)';
    const frameColor = '#8B4513';
    const brassColor = COLORS.amber;

    // Cabinet glow
    const glowGradient = ctx.createRadialGradient(
      cabinet.x + cabinet.w / 2, cabinet.y + cabinet.h / 2, 0,
      cabinet.x + cabinet.w / 2, cabinet.y + cabinet.h / 2, cabinet.w
    );
    glowGradient.addColorStop(0, ambientColor);
    glowGradient.addColorStop(1, 'transparent');
    ctx.fillStyle = glowGradient;
    ctx.fillRect(cabinet.x - 30, cabinet.y - 30, cabinet.w + 60, cabinet.h + 60);

    // Cabinet frame (oak)
    ctx.fillStyle = frameColor;
    ctx.fillRect(cabinet.x - 8, cabinet.y - 8, cabinet.w + 16, cabinet.h + 16);

    // Brass corners
    ctx.fillStyle = brassColor;
    const cornerSize = 20;
    // Top left
    ctx.fillRect(cabinet.x - 8, cabinet.y - 8, cornerSize, 6);
    ctx.fillRect(cabinet.x - 8, cabinet.y - 8, 6, cornerSize);
    // Top right
    ctx.fillRect(cabinet.x + cabinet.w - cornerSize + 8, cabinet.y - 8, cornerSize, 6);
    ctx.fillRect(cabinet.x + cabinet.w + 2, cabinet.y - 8, 6, cornerSize);
    // Bottom left
    ctx.fillRect(cabinet.x - 8, cabinet.y + cabinet.h + 2, cornerSize, 6);
    ctx.fillRect(cabinet.x - 8, cabinet.y + cabinet.h - cornerSize + 8, 6, cornerSize);
    // Bottom right
    ctx.fillRect(cabinet.x + cabinet.w - cornerSize + 8, cabinet.y + cabinet.h + 2, cornerSize, 6);
    ctx.fillRect(cabinet.x + cabinet.w + 2, cabinet.y + cabinet.h - cornerSize + 8, 6, cornerSize);

    // Glass panel
    ctx.fillStyle = glassColor;
    ctx.fillRect(cabinet.x, cabinet.y, cabinet.w, cabinet.h);

    // Glass reflection
    ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
    ctx.beginPath();
    ctx.moveTo(cabinet.x, cabinet.y);
    ctx.lineTo(cabinet.x + cabinet.w * 0.3, cabinet.y);
    ctx.lineTo(cabinet.x, cabinet.y + cabinet.h * 0.4);
    ctx.closePath();
    ctx.fill();

    // Draw shelves
    const shelfCount = 4;
    const shelfSpacing = cabinet.h / shelfCount;
    ctx.fillStyle = frameColor;
    for (let i = 1; i < shelfCount; i++) {
      ctx.fillRect(cabinet.x, cabinet.y + i * shelfSpacing - 3, cabinet.w, 6);
    }

    // Draw specimens based on type
    if (isTrue) {
      drawLivingFerns(cabinet);
    } else {
      drawPressedSpecimens(cabinet);
    }

    // Label at bottom with QuizHP styling
    const labelColor = isTrue ? COLORS.success : COLORS.error;
    ctx.fillStyle = labelColor;
    ctx.beginPath();
    ctx.roundRect(cabinet.x + cabinet.w / 2 - 45, cabinet.y + cabinet.h - 38, 90, 30, 6);
    ctx.fill();
    ctx.fillStyle = '#FFFFFF';
    ctx.font = "bold 16px 'Nunito Sans', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(cabinet.label, cabinet.x + cabinet.w / 2, cabinet.y + cabinet.h - 22);
  }

  function drawLivingFerns(cabinet) {
    // Draw animated living ferns with amber glow
    const fernColor = COLORS.success;
    const glowColor = 'rgba(245, 167, 66, 0.6)';

    const shelfSpacing = cabinet.h / 4;

    for (let shelf = 0; shelf < 3; shelf++) {
      const baseY = cabinet.y + (shelf + 1) * shelfSpacing - 10;
      const centerX = cabinet.x + cabinet.w / 2;

      // Draw 2-3 fern fronds per shelf
      for (let f = 0; f < 3; f++) {
        const offsetX = (f - 1) * 50;
        const sway = Math.sin(gameTime * 2 + shelf + f) * 5;

        ctx.strokeStyle = fernColor;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(centerX + offsetX, baseY);

        // Draw frond with leaves
        for (let i = 0; i < 8; i++) {
          const t = i / 8;
          const x = centerX + offsetX + sway * t;
          const y = baseY - t * 60;
          ctx.lineTo(x, y);

          // Draw small leaves
          if (i > 1 && i < 7) {
            ctx.save();
            ctx.fillStyle = fernColor;
            ctx.translate(x, y);
            ctx.rotate(Math.PI / 4);
            ctx.beginPath();
            ctx.ellipse(8, 0, 6, 3, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.rotate(-Math.PI / 2);
            ctx.beginPath();
            ctx.ellipse(8, 0, 6, 3, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          }
        }
        ctx.stroke();
      }

      // Amber light glow from above
      const lightGradient = ctx.createRadialGradient(
        centerX, baseY - 40, 0,
        centerX, baseY - 40, 60
      );
      lightGradient.addColorStop(0, glowColor);
      lightGradient.addColorStop(1, 'transparent');
      ctx.fillStyle = lightGradient;
      ctx.fillRect(cabinet.x, baseY - 70, cabinet.w, 80);
    }
  }

  function drawPressedSpecimens(cabinet) {
    // Draw pressed, dried specimens with cold blue shadow using cyan palette
    const driedColor = '#8B7355';
    const shadowColor = 'rgba(78, 205, 196, 0.3)';

    const shelfSpacing = cabinet.h / 4;

    for (let shelf = 0; shelf < 3; shelf++) {
      const baseY = cabinet.y + (shelf + 1) * shelfSpacing - 15;
      const centerX = cabinet.x + cabinet.w / 2;

      // Blue shadow
      ctx.fillStyle = shadowColor;
      ctx.fillRect(cabinet.x + 10, baseY - 50, cabinet.w - 20, 50);

      // Pressed specimen cards
      for (let s = 0; s < 2; s++) {
        const offsetX = (s - 0.5) * 70;

        // Card background
        ctx.fillStyle = '#F5F0E6';
        ctx.fillRect(centerX + offsetX - 25, baseY - 45, 50, 40);
        ctx.strokeStyle = '#A0917A';
        ctx.lineWidth = 1;
        ctx.strokeRect(centerX + offsetX - 25, baseY - 45, 50, 40);

        // Dried leaf/flower
        ctx.fillStyle = driedColor;
        ctx.beginPath();
        ctx.ellipse(centerX + offsetX, baseY - 30, 15, 8, 0.2 * (s + 1), 0, Math.PI * 2);
        ctx.fill();

        // Stem
        ctx.strokeStyle = driedColor;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(centerX + offsetX, baseY - 30);
        ctx.lineTo(centerX + offsetX, baseY - 10);
        ctx.stroke();
      }
    }
  }

  function drawChain(x1, y1, x2, y2) {
    const segments = 12;
    const linkSize = 8;

    // Chain with metallic gradient colors
    for (let i = 0; i < segments; i++) {
      const t1 = i / segments;
      const t2 = (i + 1) / segments;

      // Add slight curve to chain with subtle animation
      const sag = Math.sin(t1 * Math.PI) * 10;
      const sag2 = Math.sin(t2 * Math.PI) * 10;

      const px1 = x1 + (x2 - x1) * t1;
      const py1 = y1 + (y2 - y1) * t1 + sag;
      const px2 = x1 + (x2 - x1) * t2;
      const py2 = y1 + (y2 - y1) * t2 + sag2;

      // Draw chain link with alternating colors
      ctx.strokeStyle = i % 2 === 0 ? COLORS.textSecondary : '#6B6B6B';
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(px1, py1);
      ctx.lineTo(px2, py2);
      ctx.stroke();
    }
  }

  function drawHammer(x, y, rotation) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rotation);

    // Subtle wobble animation when swinging
    if (!hammer.released && Math.abs(pendulum.angularVelocity) > 0.5) {
      const wobble = Math.sin(gameTime * 20) * 0.02;
      ctx.rotate(wobble);
    }

    // Handle (oak)
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(-8, -60, 16, 70);

    // Handle grip with orange accent
    ctx.fillStyle = COLORS.orangeHover;
    for (let i = 0; i < 4; i++) {
      ctx.fillRect(-10, 0 + i * 12, 20, 4);
    }

    // Hammer head (brass with amber tones)
    const headGradient = ctx.createLinearGradient(-30, -70, 30, -50);
    headGradient.addColorStop(0, COLORS.orangeHover);
    headGradient.addColorStop(0.5, COLORS.amber);
    headGradient.addColorStop(1, COLORS.orangeHover);
    ctx.fillStyle = headGradient;
    ctx.fillRect(-35, -75, 70, 35);

    // Brass detail lines
    ctx.strokeStyle = '#CD853F';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-30, -70);
    ctx.lineTo(30, -70);
    ctx.moveTo(-30, -50);
    ctx.lineTo(30, -50);
    ctx.stroke();

    // Impact face with orange accent
    ctx.fillStyle = COLORS.orange;
    ctx.fillRect(-35, -75, 8, 35);
    ctx.fillRect(27, -75, 8, 35);

    ctx.restore();
  }

  function drawMomentumIndicator() {
    // Show current swing momentum with QuizHP orange
    const momentumWidth = Math.abs(pendulum.angularVelocity) * 30;
    const direction = pendulum.angularVelocity > 0 ? 1 : -1;

    // Pulsing glow effect
    const pulse = 0.7 + Math.sin(gameTime * 6) * 0.15;
    ctx.fillStyle = COLORS.orange;
    ctx.globalAlpha = pulse;

    if (momentumWidth > 5) {
      const indicatorY = 35;
      const indicatorX = W / 2 + direction * 50;

      // Draw arrow with rounded style
      ctx.beginPath();
      if (direction > 0) {
        ctx.moveTo(indicatorX, indicatorY - 6);
        ctx.lineTo(indicatorX + momentumWidth, indicatorY - 6);
        ctx.lineTo(indicatorX + momentumWidth, indicatorY - 12);
        ctx.lineTo(indicatorX + momentumWidth + 20, indicatorY);
        ctx.lineTo(indicatorX + momentumWidth, indicatorY + 12);
        ctx.lineTo(indicatorX + momentumWidth, indicatorY + 6);
        ctx.lineTo(indicatorX, indicatorY + 6);
      } else {
        ctx.moveTo(indicatorX, indicatorY - 6);
        ctx.lineTo(indicatorX - momentumWidth, indicatorY - 6);
        ctx.lineTo(indicatorX - momentumWidth, indicatorY - 12);
        ctx.lineTo(indicatorX - momentumWidth - 20, indicatorY);
        ctx.lineTo(indicatorX - momentumWidth, indicatorY + 12);
        ctx.lineTo(indicatorX - momentumWidth, indicatorY + 6);
        ctx.lineTo(indicatorX, indicatorY + 6);
      }
      ctx.closePath();
      ctx.fill();

      // Add glow
      ctx.shadowColor = COLORS.orange;
      ctx.shadowBlur = 10;
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    ctx.globalAlpha = 1;
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;

    if (e.type === 'keydown') {
      if (e.code === 'ArrowLeft') {
        keysDown.left = true;
        initAudio();
        e.preventDefault();
      } else if (e.code === 'ArrowRight') {
        keysDown.right = true;
        initAudio();
        e.preventDefault();
      } else if (e.code === 'Space' && !hammer.released) {
        // Release the hammer
        hammer.released = true;
        playSound('release');

        // Calculate velocity based on pendulum state
        const tangentialSpeed = pendulum.angularVelocity * pendulum.length;
        hammer.vx = Math.cos(pendulum.angle) * tangentialSpeed;
        hammer.vy = -Math.sin(pendulum.angle) * tangentialSpeed;

        // Add some forward momentum
        hammer.vx += Math.sin(pendulum.angle) * 150;
        hammer.vy += Math.cos(pendulum.angle) * 100;

        e.preventDefault();
      }
    } else if (e.type === 'keyup') {
      if (e.code === 'ArrowLeft') {
        keysDown.left = false;
      } else if (e.code === 'ArrowRight') {
        keysDown.right = false;
      }
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Handle key release in handleInput
    handleInput(e);
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
