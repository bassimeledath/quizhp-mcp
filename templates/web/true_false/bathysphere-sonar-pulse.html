<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bathysphere Sonar Pulse</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE                                                        ║
  ║  This template enforces critical invariants. Follow the section markers.      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a1628;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #051020;
      border-radius: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill available space
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "true_false",
    prompt: "Sample question text",
    choices: [
      { text: "True", is_correct: true, explanation: "This statement is correct" },
      { text: "False", is_correct: false, explanation: "This statement is not correct" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE - DO NOT MODIFY                                    ║
  // ║  Standard engine interface and end screen. This is sacred.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 720, H = 540;

  // Scaling state (computed on resize)
  let scale = 1;
  let dpr = 1;

  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: W / 2 - 170, y: H / 2 + 60, w: 150, h: 48 };
  const nextButton = { x: W / 2 + 20, y: H / 2 + 60, w: 150, h: 48 };

  /** Check if point is inside rectangle */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  /** Draw a styled button */
  function drawButton(rect, label, color, pulse) {
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = "bold 18px 'Nunito Sans', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);

    ctx.restore();
  }

  /**
   * Resize canvas to fill available space with proper DPR scaling.
   * Maintains logical coordinate system (720×540).
   */
  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;

    // Get available space
    const availW = window.innerWidth;
    const availH = window.innerHeight;

    // Calculate scale to fit logical space (720×540) in available space
    const scaleX = availW / W;
    const scaleY = availH / H;
    scale = Math.min(scaleX, scaleY);

    // Physical canvas buffer (DPR-scaled for crisp rendering)
    canvas.width = W * scale * dpr;
    canvas.height = H * scale * dpr;

    // CSS display size
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this for mouse/click events to get positions in 720×540 space.
   */
  function screenToLogical(screenX, screenY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (screenX - rect.left) * (W / rect.width),
      y: (screenY - rect.top) * (H / rect.height)
    };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 600,
            vy: -Math.random() * 400 - 100,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 800 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    ctx.font = '72px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', W / 2, H / 2 - 50);

    // Result text
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = "bold 36px 'Nunito Sans', sans-serif";
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', W / 2, H / 2 + 20);

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      drawButton(centeredRestart, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgDeep: '#051020',
    bgMid: '#0a1830',
    water: '#0d2040',
    brass: '#c4a35a',
    brassLight: '#e8c872',
    brassDark: '#8c6d2a',
    coral: '#4ECDC4',
    coralGlow: '#6BEEE5',
    bleached: '#a8a89a',
    bleachedDark: '#686860',
    sonar: '#F5A742',
    sonarGlow: '#FFD700',
    spotlight: 'rgba(255, 240, 200, 0.15)',
    debris: 'rgba(120, 110, 90, 0.6)',
    success: '#6BBF59',
    error: '#E85D4A',
    textLight: '#F5F5F0',
    orange: '#E87A3E'
  };

  // === AUDIO ===
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playSound(type) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'fire') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(220, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
      osc.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.4);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.5);
    } else if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'aim') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(440, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.05);
    }
  }

  // === GAME STATE ===
  let bathysphere = {
    x: W / 2,
    y: H - 120,
    spotlightAngle: -Math.PI / 2,
    wobble: 0
  };

  let formations = {
    trueCoral: {
      x: 150,
      y: 180,
      width: 120,
      height: 160,
      glowPhase: 0,
      branches: []
    },
    falseFormation: {
      x: 570,
      y: 220,
      width: 100,
      height: 140,
      barnacles: []
    }
  };

  let sonarPulse = null;
  let debrisParticles = [];
  let debrisOpacity = 0;
  let entranceTime = 0;
  let gameParticles = [];

  // Current drift direction
  let currentDrift = 0.3;

  function initGame() {
    bathysphere = {
      x: W / 2,
      y: H - 120,
      spotlightAngle: -Math.PI / 2,
      wobble: 0
    };

    // TRUE coral (left, living staghorn with bioluminescence)
    formations.trueCoral = {
      x: 150,
      y: 180,
      width: 120,
      height: 160,
      glowPhase: 0,
      branches: []
    };

    // Generate coral branches
    for (let i = 0; i < 8; i++) {
      formations.trueCoral.branches.push({
        startX: (Math.random() - 0.5) * 60,
        startY: Math.random() * 40 - 20,
        angle: -Math.PI / 2 + (Math.random() - 0.5) * 0.8,
        length: 40 + Math.random() * 50,
        thickness: 4 + Math.random() * 6,
        subBranches: Math.floor(Math.random() * 3) + 1
      });
    }

    // FALSE formation (right, bleached pillar)
    formations.falseFormation = {
      x: 570,
      y: 220,
      width: 100,
      height: 140,
      barnacles: []
    };

    // Generate barnacles on the dead pillar
    for (let i = 0; i < 15; i++) {
      formations.falseFormation.barnacles.push({
        offsetX: (Math.random() - 0.5) * 80,
        offsetY: (Math.random() - 0.5) * 120,
        size: 3 + Math.random() * 5
      });
    }

    sonarPulse = null;
    debrisParticles = [];
    debrisOpacity = 0;
    entranceTime = 0;
    gameParticles = [];
    currentDrift = (Math.random() - 0.5) * 0.6;
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    entranceTime += dt;
    bathysphere.wobble += dt * 2;
    formations.trueCoral.glowPhase += dt * 3;

    // Update sonar pulse
    if (sonarPulse) {
      // Apply current drift
      sonarPulse.x += sonarPulse.vx * dt;
      sonarPulse.y += sonarPulse.vy * dt;
      sonarPulse.x += currentDrift * 50 * dt;
      sonarPulse.life -= dt;

      // Spawn trail particles
      if (Math.random() < 0.5) {
        gameParticles.push({
          x: sonarPulse.x,
          y: sonarPulse.y,
          vx: (Math.random() - 0.5) * 20,
          vy: (Math.random() - 0.5) * 20,
          life: 0.3,
          maxLife: 0.3,
          size: 3 + Math.random() * 3,
          color: COLORS.sonarGlow
        });
      }

      // Check collision with TRUE coral
      const trueDist = Math.hypot(
        sonarPulse.x - formations.trueCoral.x,
        sonarPulse.y - formations.trueCoral.y
      );
      if (trueDist < 70) {
        const trueChoice = QUESTION.choices.find(c => c.text === 'True') || QUESTION.choices[0];
        if (trueChoice.is_correct) {
          playSound('correct');
          spawnCelebrationParticles(formations.trueCoral.x, formations.trueCoral.y);
        } else {
          playSound('wrong');
          spawnDebris(formations.trueCoral.x, formations.trueCoral.y);
        }
        engine.end(trueChoice.is_correct, trueChoice.explanation);
        sonarPulse = null;
        return;
      }

      // Check collision with FALSE formation
      const falseDist = Math.hypot(
        sonarPulse.x - formations.falseFormation.x,
        sonarPulse.y - formations.falseFormation.y
      );
      if (falseDist < 60) {
        const falseChoice = QUESTION.choices.find(c => c.text === 'False') || QUESTION.choices[1];
        if (falseChoice.is_correct) {
          playSound('correct');
          spawnCelebrationParticles(formations.falseFormation.x, formations.falseFormation.y);
        } else {
          playSound('wrong');
          spawnDebris(formations.falseFormation.x, formations.falseFormation.y);
        }
        engine.end(falseChoice.is_correct, falseChoice.explanation);
        sonarPulse = null;
        return;
      }

      // Check if pulse left the screen
      if (sonarPulse.life <= 0 || sonarPulse.x < -20 || sonarPulse.x > W + 20 || sonarPulse.y < -20) {
        sonarPulse = null;
      }
    }

    // Update particles
    gameParticles = gameParticles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      return p.life > 0;
    });

    // Update debris
    debrisParticles = debrisParticles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 20 * dt;
      p.rotation += p.rotationSpeed * dt;
      p.life -= dt;
      return p.life > 0;
    });

    if (debrisOpacity > 0) {
      debrisOpacity -= dt * 0.3;
    }
  }

  function spawnDebris(x, y) {
    debrisOpacity = 0.6;
    for (let i = 0; i < 25; i++) {
      debrisParticles.push({
        x: x + (Math.random() - 0.5) * 60,
        y: y + (Math.random() - 0.5) * 60,
        vx: (Math.random() - 0.5) * 80,
        vy: (Math.random() - 0.5) * 60 - 20,
        rotation: Math.random() * Math.PI * 2,
        rotationSpeed: (Math.random() - 0.5) * 4,
        size: 5 + Math.random() * 10,
        life: 2 + Math.random(),
        color: COLORS.bleached
      });
    }
  }

  function spawnCelebrationParticles(x, y) {
    for (let i = 0; i < 30; i++) {
      gameParticles.push({
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 200,
        vy: (Math.random() - 0.5) * 200,
        life: 0.8 + Math.random() * 0.4,
        maxLife: 1.2,
        size: 4 + Math.random() * 6,
        color: [COLORS.coral, COLORS.coralGlow, COLORS.sonar, COLORS.success][Math.floor(Math.random() * 4)]
      });
    }
  }

  function drawGame() {
    // Deep ocean background gradient
    const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
    bgGrad.addColorStop(0, '#020810');
    bgGrad.addColorStop(0.5, '#0a1830');
    bgGrad.addColorStop(1, '#051525');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    // Draw underwater particles (ambient)
    drawAmbientParticles();

    // Draw debris cloud overlay
    if (debrisOpacity > 0) {
      ctx.fillStyle = `rgba(80, 75, 60, ${debrisOpacity * 0.4})`;
      ctx.fillRect(0, 0, W, H);
    }

    // Draw debris particles
    debrisParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.globalAlpha = Math.min(1, p.life / 0.5);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
      ctx.restore();
    });

    // Entrance animation factor
    const entranceFactor = Math.min(1, entranceTime / 0.5);

    // Draw spotlight beam
    drawSpotlight();

    // Draw TRUE coral (living staghorn)
    drawTrueCoral(entranceFactor);

    // Draw FALSE formation (bleached pillar)
    drawFalseFormation(entranceFactor);

    // Draw labels for the formations
    drawFormationLabels();

    // Draw sonar pulse
    if (sonarPulse) {
      drawSonarPulse();
    }

    // Draw game particles
    gameParticles.forEach(p => {
      ctx.globalAlpha = p.life / p.maxLife;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * (p.life / p.maxLife), 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Draw bathysphere
    drawBathysphere(entranceFactor);

    // Draw aim indicator
    drawAimIndicator();
  }

  function drawAmbientParticles() {
    ctx.fillStyle = 'rgba(100, 180, 200, 0.3)';
    for (let i = 0; i < 30; i++) {
      const x = (i * 73 + entranceTime * 10) % W;
      const y = (i * 47 + Math.sin(entranceTime + i) * 20) % H;
      ctx.beginPath();
      ctx.arc(x, y, 1 + Math.sin(entranceTime * 2 + i) * 0.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawSpotlight() {
    const spotX = bathysphere.x;
    const spotY = bathysphere.y - 40;
    const beamLength = 400;
    const beamWidth = 0.25;

    ctx.save();
    ctx.translate(spotX, spotY);
    ctx.rotate(bathysphere.spotlightAngle);

    // Create spotlight gradient
    const grad = ctx.createRadialGradient(0, 0, 0, beamLength * 0.7, 0, beamLength);
    grad.addColorStop(0, 'rgba(255, 245, 220, 0.25)');
    grad.addColorStop(0.5, 'rgba(255, 240, 200, 0.1)');
    grad.addColorStop(1, 'rgba(255, 240, 200, 0)');

    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(beamLength * Math.cos(-beamWidth), beamLength * Math.sin(-beamWidth));
    ctx.lineTo(beamLength * Math.cos(beamWidth), beamLength * Math.sin(beamWidth));
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  function drawTrueCoral(entranceFactor) {
    const coral = formations.trueCoral;
    const glowIntensity = 0.5 + Math.sin(coral.glowPhase) * 0.3;

    ctx.save();
    ctx.translate(coral.x, coral.y);
    ctx.scale(entranceFactor, entranceFactor);

    // Glow effect
    ctx.shadowColor = COLORS.coralGlow;
    ctx.shadowBlur = 20 + glowIntensity * 15;

    // Draw coral branches
    coral.branches.forEach((branch, i) => {
      const phaseOffset = i * 0.5;
      const sway = Math.sin(coral.glowPhase * 0.5 + phaseOffset) * 3;

      ctx.save();
      ctx.translate(branch.startX + sway, branch.startY);
      ctx.rotate(branch.angle + sway * 0.02);

      // Main branch
      const branchGrad = ctx.createLinearGradient(0, 0, 0, -branch.length);
      branchGrad.addColorStop(0, COLORS.coral);
      branchGrad.addColorStop(1, COLORS.coralGlow);

      ctx.strokeStyle = branchGrad;
      ctx.lineWidth = branch.thickness;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(0, -branch.length);
      ctx.stroke();

      // Sub-branches
      for (let j = 0; j < branch.subBranches; j++) {
        const subY = -branch.length * (0.4 + j * 0.25);
        const subAngle = (j % 2 === 0 ? 1 : -1) * (0.4 + Math.random() * 0.3);
        const subLength = branch.length * 0.4;

        ctx.strokeStyle = COLORS.coralGlow;
        ctx.lineWidth = branch.thickness * 0.5;
        ctx.beginPath();
        ctx.moveTo(0, subY);
        ctx.lineTo(Math.sin(subAngle) * subLength, subY - Math.cos(subAngle) * subLength);
        ctx.stroke();
      }

      ctx.restore();
    });

    // Bioluminescent spots
    for (let i = 0; i < 12; i++) {
      const spotPhase = coral.glowPhase + i * 0.8;
      const spotAlpha = 0.3 + Math.sin(spotPhase) * 0.3;
      const spotX = (Math.sin(i * 2.3) * 50);
      const spotY = (Math.cos(i * 1.7) * 60 - 30);

      ctx.fillStyle = `rgba(110, 238, 229, ${spotAlpha})`;
      ctx.beginPath();
      ctx.arc(spotX, spotY, 4 + Math.sin(spotPhase * 2) * 2, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.shadowBlur = 0;
    ctx.restore();
  }

  function drawFalseFormation(entranceFactor) {
    const formation = formations.falseFormation;

    ctx.save();
    ctx.translate(formation.x, formation.y);
    ctx.scale(entranceFactor, entranceFactor);

    // Main bleached pillar
    const pillarGrad = ctx.createLinearGradient(-30, -70, 30, 70);
    pillarGrad.addColorStop(0, '#c8c8b8');
    pillarGrad.addColorStop(0.5, COLORS.bleached);
    pillarGrad.addColorStop(1, COLORS.bleachedDark);

    ctx.fillStyle = pillarGrad;
    ctx.beginPath();
    ctx.moveTo(-25, 70);
    ctx.lineTo(-35, -30);
    ctx.quadraticCurveTo(-30, -70, 0, -75);
    ctx.quadraticCurveTo(30, -70, 35, -30);
    ctx.lineTo(25, 70);
    ctx.closePath();
    ctx.fill();

    // Cracks and texture
    ctx.strokeStyle = COLORS.bleachedDark;
    ctx.lineWidth = 1;
    for (let i = 0; i < 5; i++) {
      const crackX = -15 + i * 8;
      const crackY1 = -50 + i * 15;
      const crackY2 = crackY1 + 20 + Math.random() * 30;
      ctx.beginPath();
      ctx.moveTo(crackX, crackY1);
      ctx.lineTo(crackX + (Math.random() - 0.5) * 10, crackY2);
      ctx.stroke();
    }

    // Dead barnacles
    formation.barnacles.forEach(b => {
      ctx.fillStyle = '#5a5a52';
      ctx.beginPath();
      ctx.ellipse(b.offsetX, b.offsetY, b.size, b.size * 0.6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#3a3a35';
      ctx.beginPath();
      ctx.arc(b.offsetX, b.offsetY, b.size * 0.3, 0, Math.PI * 2);
      ctx.fill();
    });

    ctx.restore();
  }

  function drawFormationLabels() {
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // TRUE label
    ctx.fillStyle = COLORS.coral;
    ctx.font = "bold 24px 'Belanosima', sans-serif";
    ctx.fillText('TRUE', formations.trueCoral.x, formations.trueCoral.y + 100);

    // FALSE label
    ctx.fillStyle = COLORS.bleached;
    ctx.font = "bold 24px 'Belanosima', sans-serif";
    ctx.fillText('FALSE', formations.falseFormation.x, formations.falseFormation.y + 95);
  }

  function drawSonarPulse() {
    const pulse = sonarPulse;
    const lifeRatio = pulse.life / pulse.maxLife;

    // Outer glow
    ctx.shadowColor = COLORS.sonarGlow;
    ctx.shadowBlur = 15;

    // Sonar wave rings
    for (let i = 0; i < 3; i++) {
      const ringPhase = (1 - lifeRatio + i * 0.15) % 1;
      const ringSize = 8 + ringPhase * 20;
      const ringAlpha = (1 - ringPhase) * 0.5;

      ctx.strokeStyle = `rgba(245, 167, 66, ${ringAlpha})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(pulse.x, pulse.y, ringSize, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Central pulse
    ctx.fillStyle = COLORS.sonar;
    ctx.beginPath();
    ctx.arc(pulse.x, pulse.y, 8, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = COLORS.sonarGlow;
    ctx.beginPath();
    ctx.arc(pulse.x, pulse.y, 4, 0, Math.PI * 2);
    ctx.fill();

    ctx.shadowBlur = 0;
  }

  function drawBathysphere(entranceFactor) {
    const bathy = bathysphere;
    const wobbleOffset = Math.sin(bathy.wobble) * 2;

    ctx.save();
    ctx.translate(bathy.x, bathy.y + wobbleOffset);
    ctx.scale(entranceFactor, entranceFactor);

    // Main sphere body
    const sphereGrad = ctx.createRadialGradient(-10, -15, 5, 0, 0, 45);
    sphereGrad.addColorStop(0, COLORS.brassLight);
    sphereGrad.addColorStop(0.5, COLORS.brass);
    sphereGrad.addColorStop(1, COLORS.brassDark);

    ctx.fillStyle = sphereGrad;
    ctx.beginPath();
    ctx.arc(0, 0, 45, 0, Math.PI * 2);
    ctx.fill();

    // Rivets around edge
    ctx.fillStyle = COLORS.brassDark;
    for (let i = 0; i < 12; i++) {
      const angle = (i / 12) * Math.PI * 2;
      const rivetX = Math.cos(angle) * 40;
      const rivetY = Math.sin(angle) * 40;
      ctx.beginPath();
      ctx.arc(rivetX, rivetY, 3, 0, Math.PI * 2);
      ctx.fill();
    }

    // Viewport window
    ctx.fillStyle = '#1a3050';
    ctx.beginPath();
    ctx.arc(0, -5, 22, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = COLORS.brassDark;
    ctx.lineWidth = 4;
    ctx.stroke();

    // Viewport glass reflection
    ctx.fillStyle = 'rgba(100, 150, 200, 0.3)';
    ctx.beginPath();
    ctx.arc(-6, -10, 8, 0, Math.PI * 2);
    ctx.fill();

    // Spotlight housing
    ctx.save();
    ctx.translate(0, -40);
    ctx.rotate(bathysphere.spotlightAngle + Math.PI / 2);

    ctx.fillStyle = COLORS.brass;
    ctx.beginPath();
    ctx.ellipse(0, 0, 12, 8, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#fffacc';
    ctx.beginPath();
    ctx.arc(0, -4, 5, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
    ctx.restore();
  }

  function drawAimIndicator() {
    // Draw small aim dot where spotlight is pointing
    const spotX = bathysphere.x;
    const spotY = bathysphere.y - 40;
    const aimDist = 80;
    const aimX = spotX + Math.cos(bathysphere.spotlightAngle) * aimDist;
    const aimY = spotY + Math.sin(bathysphere.spotlightAngle) * aimDist;

    ctx.fillStyle = COLORS.sonar;
    ctx.globalAlpha = 0.5 + Math.sin(entranceTime * 5) * 0.3;
    ctx.beginPath();
    ctx.arc(aimX, aimY, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  function handleInput(e) {
    if (gameState !== 'playing') return;

    const aimSpeed = 0.04;

    if (e.code === 'ArrowLeft') {
      bathysphere.spotlightAngle -= aimSpeed;
      playSound('aim');
      e.preventDefault();
    } else if (e.code === 'ArrowRight') {
      bathysphere.spotlightAngle += aimSpeed;
      playSound('aim');
      e.preventDefault();
    } else if (e.code === 'ArrowUp') {
      bathysphere.spotlightAngle -= aimSpeed;
      playSound('aim');
      e.preventDefault();
    } else if (e.code === 'ArrowDown') {
      bathysphere.spotlightAngle += aimSpeed;
      playSound('aim');
      e.preventDefault();
    } else if (e.code === 'Space' && !sonarPulse) {
      fireSonarPulse();
      e.preventDefault();
    }

    // Clamp spotlight angle
    bathysphere.spotlightAngle = Math.max(-Math.PI + 0.2, Math.min(-0.2, bathysphere.spotlightAngle));
  }

  function fireSonarPulse() {
    playSound('fire');
    const spotX = bathysphere.x;
    const spotY = bathysphere.y - 40;
    const speed = 250;

    sonarPulse = {
      x: spotX,
      y: spotY,
      vx: Math.cos(bathysphere.spotlightAngle) * speed,
      vy: Math.sin(bathysphere.spotlightAngle) * speed,
      life: 3,
      maxLife: 3
    };
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and DPR support.                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system
    ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', (e) => {
    if (gameState === 'ended' && (e.code === 'KeyR')) {
      // Restart game
      gameState = 'playing';
      gameResult = null;
      gameExplanation = '';
      confettiParticles = [];
      initGame();
      return;
    }
    handleInput(e);
  });

  document.addEventListener('keyup', (e) => {
    // Optional: handle key release in your handleInput
  });

  // Canvas click handler for end screen buttons
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'ended') return;

    const { x, y } = screenToLogical(e.clientX, e.clientY);

    if (gameResult) {
      // Correct answer: check both buttons
      if (pointInRect(x, y, restartButton)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
      if (pointInRect(x, y, nextButton)) {
        // Notify parent to go to next question
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'quiz-next' }, '*');
        }
        return;
      }
    } else {
      // Wrong answer: check centered restart button
      const centeredRestart = { x: W / 2 - 75, y: H / 2 + 60, w: 150, h: 48 };
      if (pointInRect(x, y, centeredRestart)) {
        gameState = 'playing';
        gameResult = null;
        gameExplanation = '';
        confettiParticles = [];
        initGame();
        return;
      }
    }
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
