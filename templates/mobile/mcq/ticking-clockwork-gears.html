<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <title>Ticking Clockwork Gears</title>
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE - MOBILE                                              ║
  ║  Fills 100% of container, non-uniform scaling, touch input.                  ║
  ║  Logical dimensions: 360×640 (use aspectRatio for proportional shapes)       ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none; /* Prevent default touch behaviors */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #1C1C1A;
      /* Canvas fills viewport via JS, these are fallbacks */
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill viewport
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  Ticking Clockwork Gears - MCQ Mobile Game                                ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgPrimary: '#1C1C1A',
    bgSurface: '#2A2A27',
    textPrimary: '#F5F5F0',
    textSecondary: '#C2C2B8',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#424240',
    borderStrong: '#5A5A56',
    gearBronze: '#B87333',
    gearDarkBronze: '#8B5A2B',
    gearGold: '#DAA520',
    gearCopper: '#CD7F32',
    gearSteel: '#71797E'
  };

  // === AUDIO ===
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playClickSound() {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(800, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(200, ac.currentTime + 0.08);
      gain.gain.setValueAtTime(0.15, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.1);
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.1);
    } catch (e) {}
  }

  function playCorrectSound() {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, ac.currentTime);
      osc.frequency.setValueAtTime(659, ac.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, ac.currentTime + 0.2);
      gain.gain.setValueAtTime(0.2, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.4);
    } catch (e) {}
  }

  function playWrongSound() {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(300, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(150, ac.currentTime + 0.3);
      gain.gain.setValueAtTime(0.15, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.3);
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.3);
    } catch (e) {}
  }

  function playTickSound() {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(1200, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(600, ac.currentTime + 0.03);
      gain.gain.setValueAtTime(0.08, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.05);
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.05);
    } catch (e) {}
  }

  // === GAME STATE ===
  let gears = [];
  let bgGears = []; // Small decorative background gears
  let selectedGear = null;
  let gameTime = 0;
  let particles = [];
  let tickTimer = 0;

  // Gear positions: 2x2 grid layout
  const GEAR_POSITIONS = [
    { cx: 105, cy: 190 },  // Top-left
    { cx: 255, cy: 190 },  // Top-right
    { cx: 105, cy: 430 },  // Bottom-left
    { cx: 255, cy: 430 }   // Bottom-right
  ];

  const GEAR_RADIUS = 62;
  const GEAR_TEETH = 12;
  const TOOTH_DEPTH = 14;

  function initGame() {
    gameTime = 0;
    selectedGear = null;
    particles = [];
    tickTimer = 0;

    const gearColors = [COLORS.gearBronze, COLORS.gearGold, COLORS.gearCopper, COLORS.gearSteel];

    gears = QUESTION.choices.map((choice, i) => ({
      cx: GEAR_POSITIONS[i].cx,
      cy: GEAR_POSITIONS[i].cy,
      radius: GEAR_RADIUS,
      teeth: GEAR_TEETH,
      toothDepth: TOOTH_DEPTH,
      angle: (i % 2 === 0 ? 1 : -1) * Math.random() * Math.PI,
      spinSpeed: (i % 2 === 0 ? 1 : -1) * 0.3,
      color: gearColors[i],
      choice: choice,
      index: i,
      // Animation state
      scale: 0,
      alpha: 0,
      entranceDelay: i * 0.12,
      entranceDone: false,
      // Interaction state
      pressed: false,
      activeSpin: 0,
      shakeX: 0,
      pulseScale: 1,
      feedbackColor: null,
      feedbackTimer: 0,
      // Bounding rect for touch
      hitRect: {
        x: GEAR_POSITIONS[i].cx - GEAR_RADIUS - TOOTH_DEPTH,
        y: GEAR_POSITIONS[i].cy - GEAR_RADIUS - TOOTH_DEPTH,
        w: (GEAR_RADIUS + TOOTH_DEPTH) * 2,
        h: (GEAR_RADIUS + TOOTH_DEPTH) * 2
      },
      wrappedText: null,
      fontSize: 16
    }));

    // Create small decorative background gears
    bgGears = [];
    for (let i = 0; i < 8; i++) {
      bgGears.push({
        cx: Math.random() * W,
        cy: Math.random() * H,
        radius: 8 + Math.random() * 16,
        teeth: 6 + Math.floor(Math.random() * 4),
        angle: Math.random() * Math.PI * 2,
        spinSpeed: (Math.random() - 0.5) * 0.5,
        alpha: 0.08 + Math.random() * 0.07
      });
    }

    recalculateTextSizing();
  }

  function recalculateTextSizing() {
    if (!gears || gears.length === 0) return;

    // Each gear has inner circle area for text
    const innerRadius = GEAR_RADIUS - 8;
    const textWidth = innerRadius * 1.4;

    // Each gear gets its own text sizing
    gears.forEach((gear, i) => {
      let bestSize = 11;
      let bestLines = [gear.choice.text];

      for (let fs = 14; fs >= 10; fs -= 0.5) {
        const font = `${fs}px 'Nunito', sans-serif`;
        const lines = wrapText(gear.choice.text, textWidth, font, 7);
        const lineH = fs + 1.5;
        const totalH = lines.length * lineH;

        if (totalH <= innerRadius * 1.6) {
          bestSize = fs;
          bestLines = lines;
          break;
        }
        bestSize = fs;
        bestLines = lines;
      }

      gear.wrappedText = bestLines;
      gear.fontSize = bestSize;
    });
  }

  function spawnGearParticles(cx, cy, color, count) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 40 + Math.random() * 80;
      particles.push({
        x: cx,
        y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        size: 2 + Math.random() * 3,
        color: color,
        alpha: 1,
        life: 0.5 + Math.random() * 0.5
      });
    }
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;
    tickTimer += dt;

    // Tick sound every 2 seconds
    if (tickTimer >= 2.0) {
      tickTimer -= 2.0;
      playTickSound();
    }

    // Update entrance animations
    gears.forEach(gear => {
      if (!gear.entranceDone) {
        const t = Math.max(0, gameTime - gear.entranceDelay);
        if (t > 0) {
          const progress = Math.min(t / 0.4, 1);
          // Spring easing
          const spring = 1 + Math.sin(progress * Math.PI * 2) * 0.2 * (1 - progress);
          gear.scale = progress * spring;
          gear.alpha = Math.min(progress * 2, 1);
          if (progress >= 1) {
            gear.scale = 1;
            gear.alpha = 1;
            gear.entranceDone = true;
          }
        }
      }
    });

    // Update gear rotations
    gears.forEach(gear => {
      gear.angle += (gear.spinSpeed + gear.activeSpin) * dt;

      // Decay active spin
      if (gear.activeSpin !== 0) {
        gear.activeSpin *= Math.pow(0.05, dt);
        if (Math.abs(gear.activeSpin) < 0.01) gear.activeSpin = 0;
      }

      // Update shake
      if (gear.shakeX !== 0) {
        gear.shakeX *= Math.pow(0.01, dt);
        if (Math.abs(gear.shakeX) < 0.3) gear.shakeX = 0;
      }

      // Update pulse
      if (gear.pulseScale !== 1) {
        gear.pulseScale += (1 - gear.pulseScale) * dt * 8;
        if (Math.abs(gear.pulseScale - 1) < 0.005) gear.pulseScale = 1;
      }

      // Update feedback timer
      if (gear.feedbackTimer > 0) {
        gear.feedbackTimer -= dt;
        if (gear.feedbackTimer <= 0) {
          gear.feedbackColor = null;
        }
      }
    });

    // Update background gears
    bgGears.forEach(bg => {
      bg.angle += bg.spinSpeed * dt;
    });

    // Update particles
    particles.forEach(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 80 * dt;
      p.alpha -= dt / p.life;
    });
    particles = particles.filter(p => p.alpha > 0);
  }

  function drawGearShape(cx, cy, outerR, innerR, teeth, angle) {
    ctx.beginPath();
    const toothAngle = (Math.PI * 2) / teeth;
    const halfTooth = toothAngle * 0.3;

    for (let i = 0; i < teeth; i++) {
      const a = angle + i * toothAngle;

      // Inner point before tooth
      const a1 = a - halfTooth;
      ctx.lineTo(cx + Math.cos(a1) * innerR, cy + Math.sin(a1) * innerR * aspectRatio);

      // Outer tooth start
      const a2 = a - halfTooth * 0.7;
      ctx.lineTo(cx + Math.cos(a2) * outerR, cy + Math.sin(a2) * outerR * aspectRatio);

      // Outer tooth end
      const a3 = a + halfTooth * 0.7;
      ctx.lineTo(cx + Math.cos(a3) * outerR, cy + Math.sin(a3) * outerR * aspectRatio);

      // Inner point after tooth
      const a4 = a + halfTooth;
      ctx.lineTo(cx + Math.cos(a4) * innerR, cy + Math.sin(a4) * innerR * aspectRatio);
    }
    ctx.closePath();
  }

  function drawGame() {
    // Background gradient
    ctx.fillStyle = COLORS.bgPrimary;
    ctx.fillRect(0, 0, W, H);

    // Subtle radial gradient overlay
    const grad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, 320);
    grad.addColorStop(0, 'rgba(184, 115, 51, 0.06)');
    grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Draw background gears
    bgGears.forEach(bg => {
      ctx.save();
      ctx.globalAlpha = bg.alpha;
      ctx.strokeStyle = COLORS.borderSubtle;
      ctx.lineWidth = 1;
      drawGearShape(bg.cx, bg.cy, bg.radius + 3, bg.radius, bg.teeth, bg.angle);
      ctx.stroke();
      ctx.restore();
    });

    // Draw connecting lines between gears (chain links)
    ctx.save();
    ctx.strokeStyle = COLORS.borderSubtle;
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 4]);
    // Top pair
    drawConnectionLine(gears[0], gears[1]);
    // Left column
    drawConnectionLine(gears[0], gears[2]);
    // Right column
    drawConnectionLine(gears[1], gears[3]);
    // Bottom pair
    drawConnectionLine(gears[2], gears[3]);
    ctx.setLineDash([]);
    ctx.restore();

    // Draw each gear
    gears.forEach((gear, i) => {
      if (gear.alpha <= 0) return;

      ctx.save();
      ctx.globalAlpha = gear.alpha;

      const shakeOffset = gear.shakeX ? Math.sin(gameTime * 40) * gear.shakeX : 0;
      const drawCx = gear.cx + shakeOffset;
      const drawCy = gear.cy;
      const s = gear.scale * gear.pulseScale;

      ctx.translate(drawCx, drawCy);
      ctx.scale(s, s);
      ctx.translate(-drawCx, -drawCy);

      const outerR = gear.radius + gear.toothDepth;
      const innerR = gear.radius;

      // Gear shadow
      ctx.save();
      ctx.globalAlpha = 0.3 * gear.alpha;
      ctx.fillStyle = '#000';
      drawGearShape(drawCx + 2, drawCy + 2, outerR, innerR, gear.teeth, gear.angle);
      ctx.fill();
      ctx.restore();

      // Gear body (teeth)
      const toothColor = gear.feedbackColor || gear.color;
      ctx.fillStyle = toothColor;
      drawGearShape(drawCx, drawCy, outerR, innerR, gear.teeth, gear.angle);
      ctx.fill();

      // Gear body outline
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Inner circle (face)
      const faceR = gear.radius - 6;
      ctx.beginPath();
      ctx.ellipse(drawCx, drawCy, faceR, faceR * aspectRatio, 0, 0, Math.PI * 2);
      const faceColor = gear.feedbackColor
        ? (gear.feedbackColor === COLORS.success ? '#3a6b30' : '#8b2a1a')
        : COLORS.bgSurface;
      ctx.fillStyle = faceColor;
      ctx.fill();

      // Inner circle border
      ctx.strokeStyle = gear.feedbackColor || 'rgba(255,255,255,0.1)';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Center hub (decorative small circle)
      ctx.beginPath();
      ctx.ellipse(drawCx, drawCy, 6, 6 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fillStyle = toothColor;
      ctx.fill();

      // Small hub dot
      ctx.beginPath();
      ctx.ellipse(drawCx, drawCy, 2.5, 2.5 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fillStyle = COLORS.bgSurface;
      ctx.fill();

      // Draw answer text inside gear face
      const lines = gear.wrappedText || [gear.choice.text];
      const fontSize = gear.fontSize || 14;
      const lineHeight = fontSize + 2;
      const totalTextHeight = lines.length * lineHeight;
      const textStartY = drawCy - totalTextHeight / 2 + lineHeight / 2;

      lines.forEach((line, li) => {
        drawText(line, drawCx, textStartY + li * lineHeight, {
          font: `500 ${fontSize}px 'Nunito', sans-serif`,
          color: gear.feedbackColor
            ? '#FFFFFF'
            : COLORS.textPrimary,
          align: 'center',
          baseline: 'middle'
        });
      });

      // Pressed indicator ring
      if (gear.pressed) {
        ctx.beginPath();
        ctx.ellipse(drawCx, drawCy, outerR + 4, (outerR + 4) * aspectRatio, 0, 0, Math.PI * 2);
        ctx.strokeStyle = COLORS.cyan;
        ctx.lineWidth = 2.5;
        ctx.stroke();
      }

      ctx.restore();
    });

    // Draw particles
    particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.alpha);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.size, p.size * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
  }

  function drawConnectionLine(g1, g2) {
    ctx.beginPath();
    ctx.moveTo(g1.cx, g1.cy);
    ctx.lineTo(g2.cx, g2.cy);
    ctx.stroke();
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;

    const touch = e.touches[0] || e.changedTouches[0];
    if (!touch) return;
    const { x, y } = screenToLogical(touch.clientX, touch.clientY);

    if (type === 'start') {
      // Check which gear was tapped
      gears.forEach(gear => {
        if (!gear.entranceDone) return;
        // Use distance check for circular hit area
        const dx = x - gear.cx;
        const dy = (y - gear.cy) / aspectRatio;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist <= gear.radius + gear.toothDepth) {
          gear.pressed = true;
          playClickSound();
        }
      });
    }

    if (type === 'end') {
      gears.forEach(gear => {
        if (gear.pressed) {
          gear.pressed = false;

          // Check if finger is still on gear
          const dx = x - gear.cx;
          const dy = (y - gear.cy) / aspectRatio;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist <= gear.radius + gear.toothDepth + 10) {
            // Activate this gear
            selectedGear = gear.index;
            gear.activeSpin = gear.spinSpeed > 0 ? 12 : -12;
            gear.pulseScale = 1.12;

            const isCorrect = gear.choice.is_correct;

            if (isCorrect) {
              gear.feedbackColor = COLORS.success;
              gear.feedbackTimer = 0.8;
              spawnGearParticles(gear.cx, gear.cy, COLORS.success, 20);
              spawnGearParticles(gear.cx, gear.cy, COLORS.amber, 15);
              playCorrectSound();
            } else {
              gear.feedbackColor = COLORS.error;
              gear.feedbackTimer = 0.8;
              gear.shakeX = 8;
              spawnGearParticles(gear.cx, gear.cy, COLORS.error, 12);
              playWrongSound();
            }

            // Delay end slightly for visual feedback
            setTimeout(() => {
              engine.end(isCorrect, gear.choice.explanation);
            }, 500);
          }
        }
      });
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
