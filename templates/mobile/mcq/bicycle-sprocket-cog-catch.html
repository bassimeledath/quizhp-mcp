<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Bicycle Sprocket Cog Catch</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE - MOBILE                                              ║
  ║  Fills 100% of container, non-uniform scaling, touch input.                  ║
  ║  Logical dimensions: 360×640 (use aspectRatio for proportional shapes)       ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none; /* Prevent default touch behaviors */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      /* Canvas fills viewport via JS, these are fallbacks */
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill viewport
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  Bicycle Sprocket Cog Catch - Victorian bicycle factory theme             ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const C = {
    bgDark: '#1C1C1A',
    bgFactory: '#2A2A27',
    steel: '#5A5A56',
    steelLight: '#8C8C84',
    rust: '#8B4513',
    rustLight: '#A0522D',
    copper: '#B87333',
    copperLight: '#D4956B',
    copperDark: '#8B5E3C',
    grease: '#363633',
    chain: '#424240',
    orange: '#E87A3E',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    textPrimary: '#F5F5F0',
    textSecondary: '#C2C2B8',
    spark: '#FFD700'
  };

  // === SOUND ENGINE ===
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playSound(type) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;

    if (type === 'catch') {
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(520, now);
      osc.frequency.exponentialRampToValueAtTime(780, now + 0.08);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      osc.start(now);
      osc.stop(now + 0.15);
    } else if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, now);
      osc.frequency.setValueAtTime(659, now + 0.1);
      osc.frequency.setValueAtTime(784, now + 0.2);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      osc.start(now);
      osc.stop(now + 0.4);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.exponentialRampToValueAtTime(80, now + 0.3);
      gain.gain.setValueAtTime(0.12, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
      osc.start(now);
      osc.stop(now + 0.35);
    } else if (type === 'clank') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(120, now);
      osc.frequency.exponentialRampToValueAtTime(60, now + 0.1);
      gain.gain.setValueAtTime(0.08, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
      osc.start(now);
      osc.stop(now + 0.12);
    }
  }

  // === GAME STATE ===
  let sieve = { x: 60, y: 380, w: 90, h: 16 };
  let tokens = [];
  let caughtToken = null;
  let answerButtons = [];
  let gears = [];
  let chainLinks = [];
  let sparkParticles = [];
  let smokeParticles = [];
  let shatterFragments = [];
  let gameTime = 0;
  let tokenSpawnTimer = 0;
  let selectedAnswer = null;
  let feedbackTimer = 0;
  let feedbackType = '';
  let entranceProgress = 0;
  let isDragging = false;
  let dragOffsetX = 0;
  let conveyorOffset = 0;

  // Assign tokens to choices - each token carries an answer
  let tokenChoiceIndex = 0;

  function initGame() {
    sieve = { x: 60, y: 380, w: 90, h: 14 };
    tokens = [];
    caughtToken = null;
    answerButtons = [];
    gears = [];
    chainLinks = [];
    sparkParticles = [];
    smokeParticles = [];
    shatterFragments = [];
    gameTime = 0;
    tokenSpawnTimer = 0;
    selectedAnswer = null;
    feedbackTimer = 0;
    feedbackType = '';
    entranceProgress = 0;
    isDragging = false;
    conveyorOffset = 0;
    tokenChoiceIndex = 0;

    // Create decorative gears
    gears = [
      { x: 40, y: 80, r: 30, speed: 0.8, teeth: 10, phase: 0 },
      { x: 320, y: 60, r: 22, speed: -1.2, teeth: 8, phase: 0.5 },
      { x: 180, y: 45, r: 18, speed: 1.5, teeth: 6, phase: 1.0 },
      { x: 90, y: 40, r: 14, speed: -2.0, teeth: 5, phase: 2.0 },
      { x: 270, y: 85, r: 25, speed: 0.6, teeth: 9, phase: 1.5 }
    ];

    // Create chain drive links across top
    for (let i = 0; i < 20; i++) {
      chainLinks.push({ x: i * 20, baseY: 110 });
    }

    // Create answer buttons (vertical stack at bottom)
    const btnW = 320;
    const btnH = 50;
    const btnGap = 5;
    const startX = (W - btnW) / 2;
    const startY = H - (btnH * 4 + btnGap * 3) - 12;

    QUESTION.choices.forEach((choice, i) => {
      answerButtons.push({
        x: startX,
        y: startY + i * (btnH + btnGap),
        w: btnW,
        h: btnH,
        choice: choice,
        index: i,
        scale: 0,
        alpha: 0,
        shakeX: 0,
        glowAlpha: 0,
        wrappedText: null,
        fontSize: 16
      });
    });

    // Spawn initial tokens
    spawnToken();
    spawnToken();
    spawnToken();

    recalculateTextSizing();
  }

  function recalculateTextSizing() {
    if (!answerButtons || answerButtons.length === 0) return;

    const { fontSize, wrappedTexts } = findOptimalFontSize({
      texts: QUESTION.choices.map(c => c.text),
      maxWidth: 290,
      availableHeight: 200,
      minFont: 14,
      maxFont: 16,
      fontFamily: "'Nunito', sans-serif"
    });

    answerButtons.forEach((btn, i) => {
      btn.wrappedText = wrappedTexts[i];
      btn.fontSize = fontSize;
    });
  }

  function spawnToken() {
    const choiceIdx = tokenChoiceIndex % QUESTION.choices.length;
    tokenChoiceIndex++;
    tokens.push({
      x: 100 + Math.random() * 200,
      y: 100 + Math.random() * 20,
      vy: 50 + Math.random() * 40,
      vx: (Math.random() - 0.5) * 20,
      r: 16,
      choiceIndex: choiceIdx,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 3,
      wobble: Math.random() * Math.PI * 2,
      caught: false,
      alpha: 1
    });
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;
    gameTime += dt;
    entranceProgress = Math.min(1, entranceProgress + dt * 2.5);

    // Animate button entrance
    answerButtons.forEach((btn, i) => {
      const delay = i * 0.1;
      const t = Math.max(0, Math.min(1, (entranceProgress - delay) / 0.4));
      const spring = 1 + Math.sin(t * Math.PI * 2) * 0.15 * (1 - t);
      btn.scale = t * spring;
      btn.alpha = t;
    });

    // Feedback animation
    if (selectedAnswer !== null) {
      feedbackTimer += dt;
      if (feedbackTimer > 0.6) {
        const choice = QUESTION.choices[selectedAnswer];
        if (feedbackType === 'correct') {
          playSound('correct');
        } else {
          playSound('wrong');
        }
        engine.end(choice.is_correct, choice.explanation);
        return;
      }
      // Shake wrong answers
      if (feedbackType === 'wrong') {
        const decay = 1 - feedbackTimer / 0.6;
        answerButtons.forEach(btn => {
          if (btn.index === selectedAnswer) {
            btn.shakeX = Math.sin(feedbackTimer * 40) * 6 * decay;
          }
        });
      }
      // Pulse correct answer
      if (feedbackType === 'correct') {
        answerButtons.forEach(btn => {
          if (btn.index === selectedAnswer) {
            btn.glowAlpha = 0.5 + Math.sin(feedbackTimer * 12) * 0.3;
          }
        });
      }
      return;
    }

    // Conveyor belt
    conveyorOffset = (conveyorOffset + dt * 40) % 20;

    // Token spawning
    tokenSpawnTimer += dt;
    if (tokenSpawnTimer > 1.5 && tokens.length < 6) {
      spawnToken();
      tokenSpawnTimer = 0;
    }

    // Update tokens
    tokens.forEach(token => {
      if (!token.caught) {
        token.y += token.vy * dt;
        token.x += token.vx * dt;
        token.rotation += token.rotSpeed * dt;
        token.wobble += dt * 3;
        token.x += Math.sin(token.wobble) * 0.3;

        // Bounce off walls
        if (token.x < 20) { token.x = 20; token.vx = Math.abs(token.vx); }
        if (token.x > 340) { token.x = 340; token.vx = -Math.abs(token.vx); }
      }
    });

    // Check sieve catch
    tokens = tokens.filter(token => {
      if (token.caught) return false;
      if (token.y > 600) return false; // fell off screen

      // Catch check - only active while player is dragging the sieve
      if (!caughtToken && isDragging &&
          token.y > sieve.y - 12 && token.y < sieve.y + 12 &&
          token.x > sieve.x - sieve.w / 2 && token.x < sieve.x + sieve.w / 2) {
        caughtToken = token;
        token.caught = true;
        playSound('catch');

        // Immediately select the answer
        selectedAnswer = token.choiceIndex;
        const choice = QUESTION.choices[token.choiceIndex];
        feedbackTimer = 0;
        feedbackType = choice.is_correct ? 'correct' : 'wrong';

        if (!choice.is_correct) {
          // Shatter into fragments
          for (let i = 0; i < 12; i++) {
            const angle = (Math.PI * 2 * i) / 12;
            shatterFragments.push({
              x: token.x,
              y: token.y,
              vx: Math.cos(angle) * (100 + Math.random() * 150),
              vy: Math.sin(angle) * (100 + Math.random() * 100) - 50,
              r: 3 + Math.random() * 5,
              rotation: Math.random() * Math.PI * 2,
              rotSpeed: (Math.random() - 0.5) * 10,
              alpha: 1,
              color: Math.random() > 0.5 ? C.steel : C.copperDark
            });
          }
          // Spark particles
          for (let i = 0; i < 15; i++) {
            sparkParticles.push({
              x: token.x,
              y: token.y,
              vx: (Math.random() - 0.5) * 300,
              vy: -Math.random() * 200 - 50,
              life: 0.3 + Math.random() * 0.4,
              maxLife: 0.3 + Math.random() * 0.4,
              size: 1 + Math.random() * 3
            });
          }
          // Smoke
          for (let i = 0; i < 8; i++) {
            smokeParticles.push({
              x: token.x + (Math.random() - 0.5) * 20,
              y: token.y,
              vx: (Math.random() - 0.5) * 30,
              vy: -20 - Math.random() * 40,
              r: 5 + Math.random() * 10,
              alpha: 0.6,
              life: 0.8 + Math.random() * 0.5
            });
          }
          playSound('clank');
        }

        return false;
      }
      return true;
    });

    // Update shatter fragments
    shatterFragments = shatterFragments.filter(f => {
      f.x += f.vx * dt;
      f.y += f.vy * dt;
      f.vy += 400 * dt;
      f.rotation += f.rotSpeed * dt;
      f.alpha -= dt * 1.5;
      return f.alpha > 0;
    });

    // Update sparks
    sparkParticles = sparkParticles.filter(s => {
      s.x += s.vx * dt;
      s.y += s.vy * dt;
      s.vy += 500 * dt;
      s.life -= dt;
      return s.life > 0;
    });

    // Update smoke
    smokeParticles = smokeParticles.filter(s => {
      s.x += s.vx * dt;
      s.y += s.vy * dt;
      s.r += dt * 15;
      s.alpha -= dt * 0.8;
      s.life -= dt;
      return s.life > 0 && s.alpha > 0;
    });

    // Rotate gears
    gears.forEach(g => {
      g.phase += g.speed * dt;
    });
  }

  function drawGame() {
    // Dark factory background
    ctx.fillStyle = C.bgDark;
    ctx.fillRect(0, 0, W, H);

    // Factory wall texture - subtle vertical lines
    ctx.strokeStyle = C.grease;
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 30) {
      ctx.globalAlpha = 0.15;
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, H);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Horizontal beams
    ctx.fillStyle = C.steel;
    ctx.fillRect(0, 95, W, 6);
    ctx.fillStyle = C.chain;
    ctx.fillRect(0, 125, W, 4);

    // Draw gears
    gears.forEach(g => {
      drawGear(g.x, g.y, g.r, g.teeth, g.phase);
    });

    // Draw chain drive
    drawChainDrive();

    // Draw conveyor belt at bottom area
    drawConveyor();

    // Draw falling tokens
    tokens.forEach(token => {
      if (!token.caught) {
        drawToken(token);
      }
    });

    // Draw caught token (on sieve)
    if (caughtToken && selectedAnswer !== null && feedbackType === 'correct') {
      drawToken({ ...caughtToken, x: sieve.x, y: sieve.y - 16, rotation: caughtToken.rotation });
    }

    // Draw shatter fragments
    shatterFragments.forEach(f => {
      ctx.save();
      ctx.globalAlpha = f.alpha;
      ctx.translate(f.x, f.y);
      ctx.scale(1, aspectRatio);
      ctx.rotate(f.rotation);
      ctx.fillStyle = f.color;
      ctx.fillRect(-f.r / 2, -f.r / 2, f.r, f.r);
      ctx.restore();
    });

    // Draw sparks
    sparkParticles.forEach(s => {
      const t = s.life / s.maxLife;
      ctx.globalAlpha = t;
      ctx.fillStyle = t > 0.5 ? C.spark : C.orange;
      ctx.beginPath();
      ctx.ellipse(s.x, s.y, s.size, s.size * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Draw smoke
    smokeParticles.forEach(s => {
      ctx.globalAlpha = s.alpha * 0.5;
      ctx.fillStyle = C.steelLight;
      ctx.beginPath();
      ctx.ellipse(s.x, s.y, s.r, s.r * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Draw sieve
    drawSieve();

    // Grease drip effects on sides
    drawGreaseDrips();

    // Draw answer buttons
    drawAnswerButtons();
  }

  function drawGear(cx, cy, r, teeth, phase) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(1, aspectRatio);
    ctx.rotate(phase);

    // Gear body
    ctx.fillStyle = C.steel;
    ctx.beginPath();
    for (let i = 0; i < teeth; i++) {
      const angle = (Math.PI * 2 * i) / teeth;
      const outerR = r;
      const innerR = r * 0.75;
      const toothWidth = Math.PI / teeth * 0.6;

      ctx.lineTo(Math.cos(angle - toothWidth) * outerR, Math.sin(angle - toothWidth) * outerR);
      ctx.lineTo(Math.cos(angle + toothWidth) * outerR, Math.sin(angle + toothWidth) * outerR);
      ctx.lineTo(Math.cos(angle + Math.PI / teeth - toothWidth) * innerR, Math.sin(angle + Math.PI / teeth - toothWidth) * innerR);
      ctx.lineTo(Math.cos(angle + Math.PI / teeth + toothWidth) * innerR, Math.sin(angle + Math.PI / teeth + toothWidth) * innerR);
    }
    ctx.closePath();
    ctx.fill();

    // Center hole
    ctx.fillStyle = C.bgDark;
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.25, 0, Math.PI * 2);
    ctx.fill();

    // Highlight
    ctx.strokeStyle = C.steelLight;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.5, 0, Math.PI * 0.8);
    ctx.stroke();

    ctx.restore();
  }

  function drawChainDrive() {
    const y = 110;
    const linkW = 12;
    const linkH = 8;
    const wave = gameTime * 2;

    for (let i = 0; i < 22; i++) {
      const x = (i * 18 + conveyorOffset * 0.5) % (W + 18) - 9;
      const wobble = Math.sin(wave + i * 0.4) * 2;

      ctx.fillStyle = i % 2 === 0 ? C.chain : C.steel;
      ctx.save();
      ctx.translate(x, y + wobble);
      ctx.scale(1, aspectRatio);
      ctx.fillRect(-linkW / 2, -linkH / 2, linkW, linkH);
      // Link pin
      ctx.fillStyle = C.steelLight;
      ctx.beginPath();
      ctx.arc(0, 0, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawConveyor() {
    const y = 415;
    const h = 10;
    // Belt
    ctx.fillStyle = C.grease;
    ctx.fillRect(0, y, W, h);

    // Belt segments
    for (let x = -conveyorOffset; x < W; x += 20) {
      ctx.fillStyle = C.chain;
      ctx.fillRect(x, y, 10, h);
    }

    // Rollers
    ctx.fillStyle = C.steel;
    ctx.beginPath();
    ctx.ellipse(30, y + h / 2, 8, 8 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(W - 30, y + h / 2, 8, 8 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawToken(token) {
    ctx.save();
    ctx.translate(token.x, token.y);
    ctx.scale(1, aspectRatio);
    ctx.rotate(token.rotation);

    const r = token.r;

    // Copper base
    const grad = ctx.createRadialGradient(-r * 0.3, -r * 0.3, 0, 0, 0, r);
    grad.addColorStop(0, C.copperLight);
    grad.addColorStop(0.7, C.copper);
    grad.addColorStop(1, C.copperDark);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();

    // Inner ring
    ctx.strokeStyle = C.copperDark;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.7, 0, Math.PI * 2);
    ctx.stroke();

    // Center sprocket hole
    ctx.fillStyle = C.bgDark;
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.2, 0, Math.PI * 2);
    ctx.fill();

    // Choice letter
    const letters = ['A', 'B', 'C', 'D'];
    ctx.fillStyle = C.bgDark;
    ctx.font = "bold 14px 'Nunito Sans', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(letters[token.choiceIndex], 0, -r * 0.45);

    // Metallic highlight
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath();
    ctx.ellipse(-r * 0.2, -r * 0.3, r * 0.4, r * 0.15, -0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    ctx.restore();
  }

  function drawSieve() {
    const sx = sieve.x;
    const sy = sieve.y;
    const sw = sieve.w;

    // Handle (vertical pole)
    ctx.fillStyle = C.rustLight;
    ctx.fillRect(sx - 3, sy - 50, 6, 55);

    // Handle grip
    ctx.fillStyle = C.rust;
    ctx.beginPath();
    ctx.ellipse(sx, sy - 50, 8, 8 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Sieve basket
    ctx.fillStyle = C.steel;
    ctx.beginPath();
    ctx.moveTo(sx - sw / 2, sy);
    ctx.quadraticCurveTo(sx - sw / 2 - 5, sy + 20, sx - sw / 3, sy + 25);
    ctx.lineTo(sx + sw / 3, sy + 25);
    ctx.quadraticCurveTo(sx + sw / 2 + 5, sy + 20, sx + sw / 2, sy);
    ctx.closePath();
    ctx.fill();

    // Mesh lines
    ctx.strokeStyle = C.steelLight;
    ctx.lineWidth = 0.5;
    for (let i = -3; i <= 3; i++) {
      ctx.beginPath();
      ctx.moveTo(sx + i * 10, sy);
      ctx.lineTo(sx + i * 8, sy + 22);
      ctx.stroke();
    }
    for (let j = 0; j < 3; j++) {
      ctx.beginPath();
      ctx.moveTo(sx - sw / 3 + j * 5, sy + 8 + j * 6);
      ctx.lineTo(sx + sw / 3 - j * 5, sy + 8 + j * 6);
      ctx.stroke();
    }

    // Rim highlight
    ctx.strokeStyle = C.steelLight;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(sx - sw / 2, sy);
    ctx.lineTo(sx + sw / 2, sy);
    ctx.stroke();
  }

  function drawGreaseDrips() {
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = C.grease;

    const drips = [15, 85, 145, 230, 310, 350];
    drips.forEach((dx, i) => {
      const dripLen = 30 + Math.sin(gameTime * 0.5 + i) * 10;
      ctx.beginPath();
      ctx.moveTo(dx - 2, 130);
      ctx.quadraticCurveTo(dx, 130 + dripLen, dx + 2, 130);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  function drawAnswerButtons() {
    answerButtons.forEach((btn, i) => {
      if (btn.alpha <= 0) return;

      ctx.save();
      ctx.globalAlpha = btn.alpha;

      const bx = btn.x + btn.shakeX;
      const by = btn.y;
      const bw = btn.w;
      const bh = btn.h;

      // Scale from center
      if (btn.scale !== 1) {
        ctx.translate(bx + bw / 2, by + bh / 2);
        ctx.scale(btn.scale, btn.scale);
        ctx.translate(-(bx + bw / 2), -(by + bh / 2));
      }

      // Determine color
      let bgColor = C.bgFactory;
      let borderColor = C.steel;
      let textColor = C.textPrimary;

      if (selectedAnswer === i) {
        if (feedbackType === 'correct') {
          bgColor = '#2D4A28';
          borderColor = C.success;
        } else {
          bgColor = '#4A2828';
          borderColor = C.error;
        }
      }

      // Glow effect on correct
      if (selectedAnswer === i && feedbackType === 'correct') {
        ctx.shadowColor = C.success;
        ctx.shadowBlur = btn.glowAlpha * 15;
      }

      // Button background
      ctx.fillStyle = bgColor;
      ctx.beginPath();
      ctx.roundRect(bx, by, bw, bh, 10);
      ctx.fill();

      // Border
      ctx.strokeStyle = borderColor;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.roundRect(bx, by, bw, bh, 10);
      ctx.stroke();

      ctx.shadowBlur = 0;

      // Letter badge
      const letters = ['A', 'B', 'C', 'D'];
      const badgeX = bx + 22;
      const badgeY = by + bh / 2;
      ctx.fillStyle = C.copper;
      ctx.beginPath();
      ctx.ellipse(badgeX, badgeY, 12, 12 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
      drawText(letters[i], badgeX, badgeY, {
        font: "700 14px 'Nunito Sans', sans-serif",
        color: C.bgDark
      });

      // Answer text
      const lines = btn.wrappedText || [btn.choice.text];
      const fontSize = btn.fontSize || 16;
      const lineHeight = fontSize + 3;
      const textStartY = by + bh / 2 - ((lines.length - 1) * lineHeight) / 2;

      lines.forEach((line, li) => {
        drawText(line, bx + bw / 2 + 10, textStartY + li * lineHeight, {
          font: `500 ${fontSize}px 'Nunito', sans-serif`,
          color: textColor
        });
      });

      ctx.restore();
    });
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;
    if (selectedAnswer !== null) return;

    const touch = e.touches[0] || e.changedTouches[0];
    if (!touch) return;
    const { x, y } = screenToLogical(touch.clientX, touch.clientY);

    if (type === 'start') {
      // Check if touching sieve area (wider touch target)
      if (y > sieve.y - 60 && y < sieve.y + 40 &&
          x > sieve.x - sieve.w / 2 - 20 && x < sieve.x + sieve.w / 2 + 20) {
        isDragging = true;
        dragOffsetX = sieve.x - x;
      }

      // Check answer buttons
      answerButtons.forEach(btn => {
        if (pointInRect(x, y, btn)) {
          selectedAnswer = btn.index;
          feedbackTimer = 0;
          feedbackType = btn.choice.is_correct ? 'correct' : 'wrong';
          playSound('catch');

          if (!btn.choice.is_correct) {
            // Sparks on the button
            for (let i = 0; i < 8; i++) {
              sparkParticles.push({
                x: btn.x + btn.w * Math.random(),
                y: btn.y + btn.h * Math.random(),
                vx: (Math.random() - 0.5) * 200,
                vy: -Math.random() * 150,
                life: 0.3 + Math.random() * 0.3,
                maxLife: 0.3 + Math.random() * 0.3,
                size: 1 + Math.random() * 2
              });
            }
          }
        }
      });
    }

    if (type === 'move' && isDragging) {
      sieve.x = Math.max(sieve.w / 2, Math.min(W - sieve.w / 2, x + dragOffsetX));
    }

    if (type === 'end') {
      isDragging = false;
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
