<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Desert Cactus Blooms</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE - MOBILE                                              ║
  ║  Fills 100% of container, non-uniform scaling, touch input.                  ║
  ║  Logical dimensions: 360×640 (use aspectRatio for proportional shapes)       ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none; /* Prevent default touch behaviors */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      /* Canvas fills viewport via JS, these are fallbacks */
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill viewport
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  Desert Cactus Blooms - Touch a blooming cactus to select an answer       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgSky: '#F5DEB3',
    bgSkyTop: '#87CEEB',
    sand: '#EDC9AF',
    sandDark: '#D4A574',
    cactusGreen: '#2D7A3A',
    cactusDark: '#1B5E20',
    cactusLight: '#4CAF50',
    bloomColors: ['#E87A3E', '#F5A742', '#4ECDC4', '#E85D4A'],
    textPrimary: '#2B2B28',
    textLight: '#FAFAF7',
    success: '#6BBF59',
    error: '#E85D4A',
    orange: '#E87A3E',
  };

  // === GAME STATE ===
  let cacti = [];
  let gameTime = 0;
  let selectedIndex = -1;
  let selectionAnim = 0;
  let gameParticles = [];
  let entranceProgress = 0;

  // Audio context for sound effects
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playSound(type) {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);

      if (type === 'click') {
        osc.frequency.setValueAtTime(600, ac.currentTime);
        osc.frequency.exponentialRampToValueAtTime(800, ac.currentTime + 0.08);
        gain.gain.setValueAtTime(0.15, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.12);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.12);
      } else if (type === 'correct') {
        osc.frequency.setValueAtTime(523, ac.currentTime);
        osc.frequency.setValueAtTime(659, ac.currentTime + 0.1);
        osc.frequency.setValueAtTime(784, ac.currentTime + 0.2);
        gain.gain.setValueAtTime(0.2, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.4);
      } else if (type === 'wrong') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(300, ac.currentTime);
        osc.frequency.exponentialRampToValueAtTime(150, ac.currentTime + 0.3);
        gain.gain.setValueAtTime(0.15, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.3);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.3);
      }
    } catch (e) {}
  }

  function initGame() {
    gameTime = 0;
    selectedIndex = -1;
    selectionAnim = 0;
    gameParticles = [];
    entranceProgress = 0;

    // Position 4 cacti in a 2x2 grid
    // Each cactus is a saguaro with a bloom on top containing answer text
    const colW = W / 2;
    const rowH = 220;
    const startY = 90;

    cacti = QUESTION.choices.map((choice, i) => {
      const col = i % 2;
      const row = Math.floor(i / 2);
      return {
        x: colW * col + colW / 2,
        y: startY + row * rowH + rowH / 2,
        choice: choice,
        index: i,
        bloomColor: COLORS.bloomColors[i % 4],
        scale: 0,
        alpha: 0,
        shakeX: 0,
        pulseScale: 1,
        pressed: false,
        swayOffset: Math.random() * Math.PI * 2,
        wrappedText: [choice.text],
        fontSize: 16,
        // Hit area
        hitRect: {
          x: colW * col + 10,
          y: startY + row * rowH + 10,
          w: colW - 20,
          h: rowH - 20,
        }
      };
    });

    recalculateTextSizing();
  }

  function recalculateTextSizing() {
    if (!cacti || cacti.length === 0) return;

    const colW = W / 2;
    const textMaxWidth = colW - 65;

    const { fontSize, wrappedTexts } = findOptimalFontSize({
      texts: QUESTION.choices.map(c => c.text),
      maxWidth: textMaxWidth,
      availableHeight: 70,
      minFont: 12,
      maxFont: 16,
      itemPadding: 2,
      fontFamily: "'Nunito', sans-serif"
    });

    cacti.forEach((cactus, i) => {
      cactus.wrappedText = wrappedTexts[i];
      cactus.fontSize = fontSize;
    });
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Entrance animation
    if (entranceProgress < 1) {
      entranceProgress = Math.min(1, entranceProgress + dt * 2.5);
      cacti.forEach((c, i) => {
        const delay = i * 0.12;
        const t = Math.max(0, Math.min(1, (entranceProgress - delay) / 0.4));
        // Spring easing
        const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
        c.scale = t * spring;
        c.alpha = Math.min(1, t * 1.5);
      });
    }

    // Selection animation
    if (selectedIndex >= 0) {
      selectionAnim += dt;
      const sel = cacti[selectedIndex];

      if (sel.choice.is_correct) {
        // Correct: pulse and celebrate
        sel.pulseScale = 1 + Math.sin(selectionAnim * 10) * 0.05;

        // Spawn celebration particles
        if (selectionAnim < 0.5 && Math.random() < 0.3) {
          gameParticles.push({
            x: sel.x + (Math.random() - 0.5) * 40,
            y: sel.y - 50,
            vx: (Math.random() - 0.5) * 100,
            vy: -Math.random() * 120 - 40,
            size: 3 + Math.random() * 5,
            color: COLORS.bloomColors[Math.floor(Math.random() * 4)],
            life: 1,
            rotation: Math.random() * Math.PI * 2,
            rotSpeed: (Math.random() - 0.5) * 8,
          });
        }
      } else {
        // Wrong: shake
        const decay = Math.max(0, 1 - selectionAnim * 3);
        sel.shakeX = Math.sin(selectionAnim * 40) * 8 * decay;
      }

      if (selectionAnim > 0.6) {
        const choice = sel.choice;
        if (choice.is_correct) {
          playSound('correct');
        } else {
          playSound('wrong');
        }
        engine.end(choice.is_correct, choice.explanation);
      }
    }

    // Update particles
    gameParticles.forEach(p => {
      p.vy += 200 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotSpeed * dt;
      p.life -= dt * 1.5;
    });
    gameParticles = gameParticles.filter(p => p.life > 0);
  }

  function drawGame() {
    // === SKY GRADIENT ===
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, '#87CEEB');
    skyGrad.addColorStop(0.35, '#F5DEB3');
    skyGrad.addColorStop(0.5, '#FAEBD7');
    skyGrad.addColorStop(1, '#EDC9AF');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    // === SAND DUNES ===
    ctx.fillStyle = '#D4A574';
    ctx.beginPath();
    ctx.moveTo(0, H * 0.65);
    ctx.quadraticCurveTo(W * 0.25, H * 0.58, W * 0.5, H * 0.63);
    ctx.quadraticCurveTo(W * 0.75, H * 0.68, W, H * 0.6);
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#C4956A';
    ctx.beginPath();
    ctx.moveTo(0, H * 0.72);
    ctx.quadraticCurveTo(W * 0.35, H * 0.67, W * 0.6, H * 0.73);
    ctx.quadraticCurveTo(W * 0.85, H * 0.78, W, H * 0.7);
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.closePath();
    ctx.fill();

    // === SMALL BACKGROUND CACTI (decorative) ===
    drawSmallCactus(30, H * 0.6, 0.4);
    drawSmallCactus(W - 25, H * 0.58, 0.35);
    drawSmallCactus(W * 0.15, H * 0.68, 0.3);
    drawSmallCactus(W * 0.85, H * 0.66, 0.28);

    // === DRAW MAIN CACTI ===
    cacti.forEach((cactus, i) => {
      if (cactus.alpha <= 0) return;
      drawCactus(cactus, i);
    });

    // === DRAW PARTICLES ===
    gameParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // === SUN ===
    const sunX = W * 0.8;
    const sunY = 45;
    const sunPulse = 1 + Math.sin(gameTime * 1.5) * 0.03;
    ctx.save();
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#F5A742';
    ctx.beginPath();
    ctx.ellipse(sunX, sunY, 35 * sunPulse, 35 * sunPulse * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    ctx.fillStyle = '#F5A742';
    ctx.beginPath();
    ctx.ellipse(sunX, sunY, 22, 22 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawSmallCactus(x, y, s) {
    ctx.save();
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = '#2D7A3A';

    // Trunk
    const tw = 4 * s;
    const th = 30 * s;
    ctx.beginPath();
    ctx.roundRect(x - tw / 2, y - th, tw, th, 2);
    ctx.fill();

    // Arms
    ctx.beginPath();
    ctx.roundRect(x - tw / 2 - 6 * s, y - th * 0.7, 3 * s, 14 * s, 1.5);
    ctx.fill();
    ctx.beginPath();
    ctx.roundRect(x + tw / 2 + 3 * s, y - th * 0.5, 3 * s, 12 * s, 1.5);
    ctx.fill();

    ctx.restore();
  }

  function drawCactus(cactus, index) {
    const { x, y, scale, alpha, shakeX, pulseScale, bloomColor, pressed } = cactus;
    const sway = Math.sin(gameTime * 1.2 + cactus.swayOffset) * 2;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(x + shakeX, y);
    ctx.scale(scale * pulseScale, scale * pulseScale);

    const isSelected = index === selectedIndex;
    const isCorrect = isSelected && cactus.choice.is_correct;
    const isWrong = isSelected && !cactus.choice.is_correct;

    // === CACTUS BODY ===
    const trunkW = 22;
    const trunkH = 80;
    const trunkX = -trunkW / 2 + sway * 0.3;
    const trunkY = -10;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.beginPath();
    ctx.ellipse(sway * 0.5, trunkY + trunkH - 2, trunkW * 1.2, 6 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Main trunk
    const trunkGrad = ctx.createLinearGradient(trunkX, 0, trunkX + trunkW, 0);
    trunkGrad.addColorStop(0, '#1B5E20');
    trunkGrad.addColorStop(0.3, '#2D7A3A');
    trunkGrad.addColorStop(0.7, '#4CAF50');
    trunkGrad.addColorStop(1, '#2D7A3A');
    ctx.fillStyle = trunkGrad;
    ctx.beginPath();
    ctx.roundRect(trunkX, trunkY - trunkH, trunkW, trunkH, [8, 8, 2, 2]);
    ctx.fill();

    // Trunk ridges (vertical lines)
    ctx.strokeStyle = 'rgba(27, 94, 32, 0.3)';
    ctx.lineWidth = 0.8;
    for (let r = 0; r < 3; r++) {
      const rx = trunkX + 5 + r * 6;
      ctx.beginPath();
      ctx.moveTo(rx, trunkY - trunkH + 8);
      ctx.lineTo(rx, trunkY - 4);
      ctx.stroke();
    }

    // Left arm
    const armLX = trunkX - 10;
    const armLY = trunkY - trunkH * 0.55;
    ctx.fillStyle = '#2D7A3A';
    ctx.beginPath();
    ctx.roundRect(armLX, armLY, 12, 6, 3);
    ctx.fill();
    ctx.beginPath();
    ctx.roundRect(armLX - 2, armLY - 22, 8, 24, [4, 4, 1, 1]);
    ctx.fill();

    // Right arm
    const armRX = trunkX + trunkW - 2;
    const armRY = trunkY - trunkH * 0.4;
    ctx.fillStyle = '#2D7A3A';
    ctx.beginPath();
    ctx.roundRect(armRX, armRY, 12, 6, 3);
    ctx.fill();
    ctx.beginPath();
    ctx.roundRect(armRX + 6, armRY - 18, 8, 20, [4, 4, 1, 1]);
    ctx.fill();

    // === BLOOM ===
    const bloomY = trunkY - trunkH - 10;
    const bloomRadius = 18;
    let currentBloomColor = bloomColor;

    if (isCorrect) {
      currentBloomColor = COLORS.success;
    } else if (isWrong) {
      currentBloomColor = COLORS.error;
    }

    // Bloom glow
    ctx.save();
    ctx.globalAlpha = 0.3 + Math.sin(gameTime * 3 + cactus.swayOffset) * 0.1;
    ctx.fillStyle = currentBloomColor;
    ctx.beginPath();
    ctx.ellipse(sway * 0.5, bloomY, bloomRadius + 6, (bloomRadius + 6) * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Bloom petals
    const petalCount = 6;
    for (let p = 0; p < petalCount; p++) {
      const angle = (p / petalCount) * Math.PI * 2 + gameTime * 0.3;
      const petalX = sway * 0.5 + Math.cos(angle) * (bloomRadius * 0.6);
      const petalY = bloomY + Math.sin(angle) * (bloomRadius * 0.6) * aspectRatio;
      ctx.fillStyle = currentBloomColor;
      ctx.beginPath();
      ctx.ellipse(petalX, petalY, 8, 6 * aspectRatio, angle, 0, Math.PI * 2);
      ctx.fill();
    }

    // Bloom center
    ctx.fillStyle = pressed ? '#FFFFFF' : '#F5A742';
    ctx.beginPath();
    ctx.ellipse(sway * 0.5, bloomY, 7, 7 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // === ANSWER TEXT BOX ===
    const boxW = (W / 2) - 30;
    const boxH = 60;
    const boxX = -boxW / 2;
    const boxY = trunkY + 8;

    // Box background
    let boxBg = 'rgba(255, 255, 255, 0.92)';
    let boxBorder = '#E6E6E0';
    if (isCorrect) {
      boxBg = 'rgba(107, 191, 89, 0.15)';
      boxBorder = COLORS.success;
    } else if (isWrong) {
      boxBg = 'rgba(232, 93, 74, 0.15)';
      boxBorder = COLORS.error;
    } else if (pressed) {
      boxBg = 'rgba(78, 205, 196, 0.15)';
      boxBorder = '#4ECDC4';
    }

    ctx.fillStyle = boxBg;
    ctx.strokeStyle = boxBorder;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(boxX, boxY, boxW, boxH, 8);
    ctx.fill();
    ctx.stroke();

    // Answer text (wrapped) with label prefix on first line
    const labels = ['A', 'B', 'C', 'D'];
    const lines = cactus.wrappedText || [cactus.choice.text];
    const fontSize = cactus.fontSize || 14;
    const lineHeight = fontSize + 3;
    const textStartY = boxY + boxH / 2 - ((lines.length - 1) * lineHeight) / 2;

    // Draw label badge to the left
    const labelX = boxX + 16;
    const labelY = textStartY;
    ctx.fillStyle = currentBloomColor;
    ctx.beginPath();
    ctx.ellipse(labelX, labelY, 9, 9 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
    drawText(labels[index], labelX, labelY, {
      font: "700 14px 'Nunito Sans', sans-serif",
      color: '#FFFFFF',
      align: 'center',
      baseline: 'middle'
    });

    // Draw text lines offset to the right of the label
    const textX = boxX + 32 + (boxW - 32) / 2;
    lines.forEach((line, li) => {
      drawText(line, textX, textStartY + li * lineHeight, {
        font: `500 ${fontSize}px 'Nunito', sans-serif`,
        color: COLORS.textPrimary,
        align: 'center',
        baseline: 'middle'
      });
    });

    ctx.restore();
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;
    if (selectedIndex >= 0) return;

    const touch = e.touches[0] || e.changedTouches[0];
    if (!touch) return;
    const { x, y } = screenToLogical(touch.clientX, touch.clientY);

    if (type === 'start') {
      cacti.forEach((cactus) => {
        if (pointInRect(x, y, cactus.hitRect)) {
          cactus.pressed = true;
        }
      });
    }

    if (type === 'end') {
      cacti.forEach((cactus) => {
        if (cactus.pressed && pointInRect(x, y, cactus.hitRect)) {
          playSound('click');
          selectedIndex = cactus.index;
          selectionAnim = 0;
        }
        cactus.pressed = false;
      });
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
