<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>City Rooftop Hot Air Balloons</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE - MOBILE                                              ║
  ║  Fills 100% of container, non-uniform scaling, touch input.                  ║
  ║  Logical dimensions: 360×640 (use aspectRatio for proportional shapes)       ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none; /* Prevent default touch behaviors */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      /* Canvas fills viewport via JS, these are fallbacks */
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill viewport
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  City Rooftop Hot Air Balloons - MCQ game                                  ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    skyTop: '#1B2A4A',
    skyBottom: '#3A5A8C',
    buildingDark: '#1C1C1A',
    buildingMed: '#2A2A27',
    buildingLight: '#363633',
    windowGlow: '#F5A742',
    orange: '#E87A3E',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    textPrimary: '#2B2B28',
    textLight: '#F5F5F0',
    basketBrown: '#8B6B3D',
    ropeColor: '#A09080'
  };

  const BALLOON_COLORS = ['#E87A3E', '#4ECDC4', '#F5A742', '#6BBF59'];
  const BALLOON_STRIPE_COLORS = ['#D66B31', '#45B8B0', '#E89A35', '#5AAF4A'];

  // === GAME STATE ===
  let balloons = [];
  let buildings = [];
  let stars = [];
  let clouds = [];
  let bgBalloons = []; // Decorative background balloons
  let gameTime = 0;
  let selectedBalloon = null;
  let answerAnimTimer = 0;
  let answerAnimType = null; // 'correct' | 'wrong'
  let gameParticles = [];

  // Audio context for sounds
  let audioCtx = null;

  function getAudioCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
  }

  function playSound(type) {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);

      if (type === 'click') {
        osc.frequency.value = 600;
        gain.gain.setValueAtTime(0.15, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.1);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.1);
      } else if (type === 'correct') {
        osc.frequency.value = 523;
        gain.gain.setValueAtTime(0.2, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.5);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.5);
        const osc2 = ac.createOscillator();
        const gain2 = ac.createGain();
        osc2.connect(gain2);
        gain2.connect(ac.destination);
        osc2.frequency.value = 659;
        gain2.gain.setValueAtTime(0.2, ac.currentTime + 0.12);
        gain2.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.6);
        osc2.start(ac.currentTime + 0.12);
        osc2.stop(ac.currentTime + 0.6);
        const osc3 = ac.createOscillator();
        const gain3 = ac.createGain();
        osc3.connect(gain3);
        gain3.connect(ac.destination);
        osc3.frequency.value = 784;
        gain3.gain.setValueAtTime(0.2, ac.currentTime + 0.24);
        gain3.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.7);
        osc3.start(ac.currentTime + 0.24);
        osc3.stop(ac.currentTime + 0.7);
      } else if (type === 'wrong') {
        osc.type = 'sawtooth';
        osc.frequency.value = 200;
        gain.gain.setValueAtTime(0.15, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.4);
      }
    } catch (e) {}
  }

  function initGame() {
    gameTime = 0;
    selectedBalloon = null;
    answerAnimTimer = 0;
    answerAnimType = null;
    gameParticles = [];

    // Generate city skyline buildings
    buildings = [];
    let bx = -5;
    while (bx < W + 10) {
      const bw = 25 + Math.random() * 35;
      const bh = 80 + Math.random() * 160;
      const shade = Math.random();
      const color = shade < 0.33 ? COLORS.buildingDark : shade < 0.66 ? COLORS.buildingMed : COLORS.buildingLight;
      const windows = [];
      const winCols = Math.floor(bw / 12);
      const winRows = Math.floor(bh / 18);
      for (let row = 0; row < winRows; row++) {
        for (let col = 0; col < winCols; col++) {
          if (Math.random() > 0.35) {
            windows.push({
              x: 4 + col * (bw / winCols),
              y: 8 + row * (bh / winRows),
              lit: Math.random() > 0.3
            });
          }
        }
      }
      buildings.push({ x: bx, w: bw, h: bh, color, windows });
      bx += bw + 2 + Math.random() * 6;
    }

    // Generate stars
    stars = [];
    for (let i = 0; i < 60; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * (H * 0.45),
        size: 0.5 + Math.random() * 1.5,
        twinkle: Math.random() * Math.PI * 2,
        speed: 0.5 + Math.random() * 2
      });
    }

    // Generate clouds
    clouds = [];
    for (let i = 0; i < 4; i++) {
      clouds.push({
        x: Math.random() * W,
        y: 60 + Math.random() * 120,
        w: 40 + Math.random() * 50,
        speed: 5 + Math.random() * 10,
        alpha: 0.08 + Math.random() * 0.1
      });
    }

    // Generate decorative background balloons (floating in the sky)
    const bgColors = ['#E87A3E', '#4ECDC4', '#F5A742', '#6BBF59', '#FFB89D', '#E85D4A'];
    bgBalloons = [];
    for (let i = 0; i < 6; i++) {
      bgBalloons.push({
        x: 20 + Math.random() * (W - 40),
        y: 50 + Math.random() * (H * 0.6),
        size: 8 + Math.random() * 12,
        color: bgColors[i % bgColors.length],
        bobOffset: Math.random() * Math.PI * 2,
        bobSpeed: 0.4 + Math.random() * 0.4,
        driftSpeed: 3 + Math.random() * 5,
        alpha: 0.15 + Math.random() * 0.2
      });
    }

    // Create balloons with answer text
    balloons = QUESTION.choices.map((choice, i) => ({
      choice,
      // Full-width vertical stack layout
      x: W / 2,
      baseY: 100 + i * 130,
      y: 100 + i * 130,
      bobOffset: Math.random() * Math.PI * 2,
      bobSpeed: 0.6 + Math.random() * 0.4,
      bobAmp: 3 + Math.random() * 2,
      driftOffset: Math.random() * Math.PI * 2,
      driftSpeed: 0.3 + Math.random() * 0.2,
      driftAmp: 2 + Math.random() * 1.5,
      color: BALLOON_COLORS[i],
      stripeColor: BALLOON_STRIPE_COLORS[i],
      // Balloon envelope dimensions (small, decorative)
      envW: 30,
      envH: 36,
      // Basket dimensions (full-width card)
      basketW: 320,
      basketH: 50,
      // Hit rect
      hitRect: { x: 20, y: 0, w: 320, h: 50 },
      // Animation
      scale: 0,
      alpha: 0,
      entranceDelay: i * 80,
      entranceTime: 0,
      shakeX: 0,
      pulseScale: 1,
      wrappedText: null,
      fontSize: 16
    }));

    recalculateTextSizing();
  }

  function recalculateTextSizing() {
    if (!balloons || balloons.length === 0) return;

    const maxTextWidth = 260;
    const { fontSize, wrappedTexts } = findOptimalFontSize({
      texts: QUESTION.choices.map(c => c.text),
      maxWidth: maxTextWidth,
      availableHeight: 200,
      minFont: 14,
      maxFont: 18,
      fontFamily: "'Nunito', sans-serif"
    });

    balloons.forEach((b, i) => {
      b.wrappedText = wrappedTexts[i];
      b.fontSize = fontSize;
      // Adjust basket height based on lines
      const lineCount = wrappedTexts[i].length;
      b.basketH = Math.max(50, lineCount * (fontSize + 4) + 16);
    });

    // Reposition balloons vertically with proper spacing
    let currentY = 20;
    balloons.forEach((b, i) => {
      b.baseY = currentY;
      b.y = currentY;
      currentY += b.basketH + 16;
    });
  }

  function spawnGameParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      gameParticles.push({
        x, y,
        vx: (Math.random() - 0.5) * 200,
        vy: (Math.random() - 0.5) * 200 - 50,
        size: 3 + Math.random() * 4,
        color,
        alpha: 1,
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 8
      });
    }
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Update stars twinkle
    stars.forEach(s => {
      s.twinkle += s.speed * dt;
    });

    // Update clouds
    clouds.forEach(c => {
      c.x += c.speed * dt;
      if (c.x > W + c.w) c.x = -c.w;
    });

    // Update background balloons
    bgBalloons.forEach(bg => {
      bg.y -= bg.driftSpeed * dt;
      bg.x += Math.sin(gameTime * bg.bobSpeed + bg.bobOffset) * 0.3;
      if (bg.y < -bg.size * 3) {
        bg.y = H + bg.size * 2;
        bg.x = 20 + Math.random() * (W - 40);
      }
    });

    // Update balloons
    balloons.forEach((b, i) => {
      // Entrance animation
      if (b.scale < 1) {
        b.entranceTime += dt;
        const delay = b.entranceDelay / 1000;
        if (b.entranceTime > delay) {
          const t = Math.min((b.entranceTime - delay) / 0.4, 1);
          const spring = 1 + Math.sin(t * Math.PI * 2) * 0.15 * (1 - t);
          b.scale = t * spring;
          b.alpha = Math.min(t * 1.5, 1);
        }
      } else {
        b.scale = 1;
        b.alpha = 1;
      }

      // Bobbing
      b.y = b.baseY + Math.sin(gameTime * b.bobSpeed + b.bobOffset) * b.bobAmp;

      // Horizontal drift
      b.x = W / 2 + Math.sin(gameTime * b.driftSpeed + b.driftOffset) * b.driftAmp;

      // Shake animation
      if (b.shakeX !== 0) {
        b.shakeX *= 0.85;
        if (Math.abs(b.shakeX) < 0.3) b.shakeX = 0;
      }

      // Pulse animation
      if (b.pulseScale !== 1) {
        b.pulseScale += (1 - b.pulseScale) * 0.08;
        if (Math.abs(b.pulseScale - 1) < 0.005) b.pulseScale = 1;
      }
    });

    // Update game particles
    gameParticles = gameParticles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 200 * dt;
      p.rotation += p.rotSpeed * dt;
      p.alpha -= dt * 1.5;
      return p.alpha > 0;
    });

    // Handle answer selection animation
    if (selectedBalloon !== null) {
      answerAnimTimer += dt;
      if (answerAnimTimer > 0.6) {
        const b = balloons[selectedBalloon];
        if (answerAnimType === 'correct') {
          playSound('correct');
        } else {
          playSound('wrong');
        }
        engine.end(b.choice.is_correct, b.choice.explanation);
      }
    }
  }

  function drawGame() {
    // === SKY GRADIENT ===
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, COLORS.skyTop);
    skyGrad.addColorStop(0.5, COLORS.skyBottom);
    skyGrad.addColorStop(1, '#2A4060');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    // === STARS ===
    stars.forEach(s => {
      const alpha = 0.4 + 0.6 * Math.abs(Math.sin(s.twinkle));
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      ctx.ellipse(s.x, s.y, s.size, s.size * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // === CLOUDS ===
    clouds.forEach(c => {
      ctx.globalAlpha = c.alpha;
      ctx.fillStyle = '#FFFFFF';
      // Draw cloud as overlapping ellipses
      ctx.beginPath();
      ctx.ellipse(c.x, c.y, c.w * 0.4, c.w * 0.22 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(c.x + c.w * 0.25, c.y - c.w * 0.08, c.w * 0.3, c.w * 0.18 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(c.x - c.w * 0.2, c.y + c.w * 0.03, c.w * 0.25, c.w * 0.15 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // === BACKGROUND BALLOONS (floating in sky) ===
    bgBalloons.forEach(bg => {
      ctx.globalAlpha = bg.alpha;
      const s = bg.size;

      // Balloon body
      ctx.fillStyle = bg.color;
      ctx.beginPath();
      ctx.ellipse(bg.x, bg.y, s, s * 1.3 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();

      // Highlight
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.ellipse(bg.x - s * 0.25, bg.y - s * 0.3, s * 0.2, s * 0.3 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();

      // Basket (tiny rectangle)
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      const basketY = bg.y + s * 1.3 * aspectRatio + 3;
      ctx.fillRect(bg.x - s * 0.3, basketY, s * 0.6, s * 0.35);

      // String
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(bg.x, bg.y + s * 1.3 * aspectRatio);
      ctx.lineTo(bg.x, basketY);
      ctx.stroke();
    });
    ctx.globalAlpha = 1;

    // === CITY SKYLINE (bottom) ===
    const skylineBaseY = H - 30;
    buildings.forEach(b => {
      const by = skylineBaseY - b.h;
      ctx.fillStyle = b.color;
      ctx.fillRect(b.x, by, b.w, b.h + 30);

      // Windows
      b.windows.forEach(win => {
        ctx.fillStyle = win.lit ? COLORS.windowGlow : 'rgba(255,255,255,0.05)';
        ctx.globalAlpha = win.lit ? (0.5 + Math.sin(gameTime * 0.5 + win.x * 3) * 0.2) : 0.3;
        ctx.fillRect(b.x + win.x, by + win.y, 5, 7);
      });
      ctx.globalAlpha = 1;
    });

    // Ground strip
    ctx.fillStyle = '#151513';
    ctx.fillRect(0, skylineBaseY, W, H - skylineBaseY);

    // === BALLOONS ===
    balloons.forEach((b, i) => {
      if (b.alpha <= 0) return;

      ctx.save();
      ctx.globalAlpha = b.alpha;

      const bx = b.x + b.shakeX;
      const by = b.y;
      const sc = b.scale * b.pulseScale;

      // Card position (drawn first, behind balloon)
      const cardX = bx - b.basketW / 2;
      const cardY = by + 4;
      const cardW = b.basketW;
      const cardH = b.basketH;

      // Apply scale from card center
      const centerY = cardY + cardH / 2;
      ctx.translate(bx, centerY);
      ctx.scale(sc, sc);
      ctx.translate(-bx, -centerY);

      // Selected state highlight
      let cardBg = '#FFFFFF';
      let cardBorder = '#E6E6E0';
      if (selectedBalloon === i) {
        if (answerAnimType === 'correct') {
          cardBg = '#E8F8E5';
          cardBorder = COLORS.success;
        } else if (answerAnimType === 'wrong') {
          cardBg = '#FDECEB';
          cardBorder = COLORS.error;
        }
      }

      // Card shadow
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.beginPath();
      ctx.roundRect(cardX + 2, cardY + 3, cardW, cardH, 12);
      ctx.fill();

      // Card background
      ctx.fillStyle = cardBg;
      ctx.beginPath();
      ctx.roundRect(cardX, cardY, cardW, cardH, 12);
      ctx.fill();

      // Card border
      ctx.strokeStyle = cardBorder;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.roundRect(cardX, cardY, cardW, cardH, 12);
      ctx.stroke();

      // === Balloon icon (small, left side of card) ===
      const balloonCX = cardX + 22;
      const balloonCY = cardY + cardH / 2;
      const bRX = 11;
      const bRY = 14;

      // Balloon body
      ctx.fillStyle = b.color;
      ctx.beginPath();
      ctx.ellipse(balloonCX, balloonCY - 4, bRX, bRY * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();

      // Stripe
      ctx.fillStyle = b.stripeColor;
      ctx.beginPath();
      ctx.ellipse(balloonCX, balloonCY - 4, bRX * 0.55, bRY * aspectRatio, 0, -0.2, Math.PI + 0.2);
      ctx.fill();

      // Highlight
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.ellipse(balloonCX - bRX * 0.3, balloonCY - 4 - bRY * 0.25, bRX * 0.2, bRY * 0.3 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();

      // Balloon neck
      ctx.fillStyle = b.color;
      ctx.beginPath();
      const neckY = balloonCY - 4 + bRY * aspectRatio;
      ctx.moveTo(balloonCX - 3, neckY - 1);
      ctx.lineTo(balloonCX + 3, neckY - 1);
      ctx.lineTo(balloonCX, neckY + 4);
      ctx.closePath();
      ctx.fill();

      // String
      ctx.strokeStyle = COLORS.ropeColor;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(balloonCX, neckY + 4);
      ctx.lineTo(balloonCX, balloonCY + bRY * aspectRatio + 6);
      ctx.stroke();

      // Choice label (A, B, C, D)
      const labels = ['A', 'B', 'C', 'D'];
      drawText(labels[i], balloonCX, balloonCY - 4, {
        font: "700 14px 'Nunito Sans', sans-serif",
        color: '#FFFFFF',
        align: 'center',
        baseline: 'middle'
      });

      // Answer text (wrapped, positioned after balloon icon)
      const lines = b.wrappedText || [b.choice.text];
      const fs = b.fontSize || 16;
      const lineH = fs + 4;
      const textStartY = cardY + cardH / 2 - ((lines.length - 1) * lineH) / 2;

      lines.forEach((line, li) => {
        drawText(line, cardX + 44, textStartY + li * lineH, {
          font: `500 ${fs}px 'Nunito', sans-serif`,
          color: COLORS.textPrimary,
          align: 'left',
          baseline: 'middle'
        });
      });

      ctx.restore();
    });

    // === GAME PARTICLES ===
    gameParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;
    if (selectedBalloon !== null) return; // Already selected

    if (type === 'start') {
      const touch = e.touches[0] || e.changedTouches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      balloons.forEach((b, i) => {
        if (b.alpha < 0.5) return;
        // Check if touch is within the card area
        const cardX = b.x + b.shakeX - b.basketW / 2;
        const cardY = b.y + 4;
        const rect = { x: cardX, y: cardY, w: b.basketW, h: b.basketH };

        if (pointInRect(x, y, rect)) {
          playSound('click');
          selectedBalloon = i;
          answerAnimTimer = 0;

          if (b.choice.is_correct) {
            answerAnimType = 'correct';
            b.pulseScale = 1.08;
            spawnGameParticles(b.x, b.y + b.envH / 2, b.color, 20);
          } else {
            answerAnimType = 'wrong';
            b.shakeX = 12;
          }
        }
      });
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
