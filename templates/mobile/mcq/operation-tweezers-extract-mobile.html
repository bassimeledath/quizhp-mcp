<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Operation Tweezers Extract</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE - MOBILE                                              ║
  ║  Fills 100% of container, non-uniform scaling, touch input.                  ║
  ║  Logical dimensions: 360×640 (use aspectRatio for proportional shapes)       ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none; /* Prevent default touch behaviors */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1C1C1A;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #2A2A27;
      /* Canvas fills viewport via JS, these are fallbacks */
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill viewport
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = "bold 18px 'Nunito Sans', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px 'Nunito', sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle', maxWidth } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    if (maxWidth) {
      ctx.fillText(text, 0, 0, maxWidth * aspectRatio / adj);
    } else {
      ctx.fillText(text, 0, 0);
    }
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   *
   * @param {string} text - The text to wrap
   * @param {number} maxWidth - Maximum width in logical coordinates
   * @param {string} font - CSS font string (e.g., "16px 'Nunito', sans-serif")
   * @param {number} maxLines - Maximum number of lines (default 3)
   * @returns {string[]} Array of text lines
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   * Tries font sizes from max to min until content fits.
   *
   * @param {Object} options
   * @param {string[]} options.texts - Array of text strings to fit
   * @param {number} options.maxWidth - Maximum width for text wrapping
   * @param {number} options.availableHeight - Total height available for all texts
   * @param {number} options.minFont - Minimum font size (default 12)
   * @param {number} options.maxFont - Maximum font size (default 18)
   * @param {number} options.itemPadding - Vertical padding per text item (default 4)
   * @param {string} options.fontFamily - Font family (default "'Nunito Sans', sans-serif")
   * @returns {{ fontSize: number, wrappedTexts: string[][] }} Optimal font size and pre-wrapped texts
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = "bold 32px 'Nunito Sans', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  Operation Tweezers Extract - Mobile                                       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // Colors
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC',
    patientBody: '#FFE4C9',
    patientOutline: '#D4A574',
    cavityBg: '#8B4513',
    cavityEdge: '#E85D4A',
    tweezers: '#C0C0C0',
    tweezersHighlight: '#E8E8E8',
    noseRed: '#E85D4A'
  };

  // Audio context for sound effects
  let audioCtx = null;
  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'buzz') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(100, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialDecayTo && gain.gain.exponentialDecayTo(0.01, audioCtx.currentTime + 0.3);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    } else if (type === 'extract') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(440, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.2);
    } else if (type === 'click') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.05);
    }
  }

  // Game state
  let tweezers = { x: W / 2, y: 100, targetX: W / 2, targetY: 100, holding: null, extracting: false };
  let cavities = [];
  let buzzing = false;
  let buzzTime = 0;
  let noseGlow = 0;
  let gameTime = 0;
  let entranceAnim = 0;
  let extractionProgress = 0;
  let selectedCavity = null;
  let gameParticles = [];
  let isDragging = false;
  let dragStartCavity = null;

  // Layout for cavities (2x2 grid on patient body)
  const CAVITY_W = 140;
  const CAVITY_H = 90;
  const CAVITY_PADDING = 20;
  const BODY_TOP = 180;
  const BODY_CENTER_X = W / 2;

  function initGame() {
    tweezers = { x: W / 2, y: 80, targetX: W / 2, targetY: 80, holding: null, extracting: false };
    buzzing = false;
    buzzTime = 0;
    noseGlow = 0;
    gameTime = 0;
    entranceAnim = 0;
    extractionProgress = 0;
    selectedCavity = null;
    gameParticles = [];
    isDragging = false;
    dragStartCavity = null;

    // Create 4 cavities in a 2x2 grid on the patient body
    const positions = [
      { x: BODY_CENTER_X - CAVITY_W - CAVITY_PADDING / 2, y: BODY_TOP + 40 },              // Top-left (chest area)
      { x: BODY_CENTER_X + CAVITY_PADDING / 2, y: BODY_TOP + 40 },                         // Top-right (chest area)
      { x: BODY_CENTER_X - CAVITY_W - CAVITY_PADDING / 2, y: BODY_TOP + 40 + CAVITY_H + 30 }, // Bottom-left (stomach)
      { x: BODY_CENTER_X + CAVITY_PADDING / 2, y: BODY_TOP + 40 + CAVITY_H + 30 }          // Bottom-right (stomach)
    ];

    cavities = QUESTION.choices.map((choice, i) => ({
      x: positions[i].x,
      y: positions[i].y,
      w: CAVITY_W,
      h: CAVITY_H,
      choice: choice,
      scale: 0,
      pieceY: 0,
      hovered: false
    }));

    recalculateTextSizing();
  }

  function recalculateTextSizing() {
    if (!cavities || cavities.length === 0) return;

    // Each cavity has limited space for text
    const maxTextWidth = CAVITY_W - 16;

    cavities.forEach((cavity, i) => {
      const { fontSize, wrappedTexts } = findOptimalFontSize({
        texts: [cavity.choice.text],
        maxWidth: maxTextWidth,
        availableHeight: CAVITY_H - 20,
        minFont: 12,
        maxFont: 14,
        fontFamily: "'Nunito', sans-serif"
      });
      cavity.wrappedText = wrappedTexts[0];
      cavity.fontSize = fontSize;
    });
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;
    entranceAnim = Math.min(1, entranceAnim + dt * 2);

    // Animate cavity entrance
    cavities.forEach((cavity, i) => {
      const delay = i * 0.1;
      const t = Math.max(0, Math.min(1, (entranceAnim - delay) * 2));
      const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
      cavity.scale = t * spring;
    });

    // Move tweezers toward target smoothly
    const speed = 8;
    tweezers.x += (tweezers.targetX - tweezers.x) * speed * dt;
    tweezers.y += (tweezers.targetY - tweezers.y) * speed * dt;

    // Check if tweezers are inside any cavity
    let insideCavity = null;
    cavities.forEach(cavity => {
      const innerMargin = 12;
      const inside = tweezers.x > cavity.x + innerMargin &&
                     tweezers.x < cavity.x + cavity.w - innerMargin &&
                     tweezers.y > cavity.y + innerMargin &&
                     tweezers.y < cavity.y + cavity.h - innerMargin;

      const inCavityArea = tweezers.x >= cavity.x && tweezers.x <= cavity.x + cavity.w &&
                           tweezers.y >= cavity.y && tweezers.y <= cavity.y + cavity.h;

      cavity.hovered = inCavityArea;

      if (inside) {
        insideCavity = cavity;
      } else if (inCavityArea && !inside && selectedCavity === cavity) {
        // Touching edge - trigger buzz
        if (!buzzing) {
          buzzing = true;
          buzzTime = 0;
          noseGlow = 1;
          playSound('buzz');
          selectedCavity = null;
          extractionProgress = 0;
        }
      }
    });

    // Handle extraction
    if (tweezers.extracting && insideCavity) {
      selectedCavity = insideCavity;
      extractionProgress += dt * 2;

      if (extractionProgress >= 1) {
        // Successfully extracted!
        playSound('extract');
        spawnExtractParticles(insideCavity.x + insideCavity.w / 2, insideCavity.y + insideCavity.h / 2);
        engine.end(insideCavity.choice.is_correct, insideCavity.choice.explanation);
      }
    } else {
      extractionProgress = Math.max(0, extractionProgress - dt * 4);
    }

    // Update buzz animation
    if (buzzing) {
      buzzTime += dt;
      noseGlow = Math.max(0, 1 - buzzTime * 2);
      if (buzzTime > 0.5) {
        buzzing = false;
      }
    }

    // Update particles
    gameParticles = gameParticles.filter(p => {
      p.vy += 300 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      return p.life > 0;
    });
  }

  function spawnExtractParticles(x, y) {
    for (let i = 0; i < 15; i++) {
      gameParticles.push({
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 200,
        vy: -Math.random() * 150 - 50,
        color: [COLORS.amber, COLORS.cyan, COLORS.success][Math.floor(Math.random() * 3)],
        size: 4 + Math.random() * 4,
        life: 1
      });
    }
  }

  function drawGame() {
    // Clear canvas
    ctx.fillStyle = COLORS.bgPrimary;
    ctx.fillRect(0, 0, W, H);

    // Draw patient body (simplified operation board)
    drawPatient();

    // Draw cavities with answer pieces
    cavities.forEach((cavity, i) => {
      drawCavity(cavity, i);
    });

    // Draw tweezers
    drawTweezers();

    // Draw particles
    gameParticles.forEach(p => {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.size, p.size * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Draw extraction progress indicator
    if (extractionProgress > 0 && selectedCavity) {
      drawExtractionProgress(selectedCavity);
    }
  }

  function drawPatient() {
    const bodyX = 40;
    const bodyY = BODY_TOP;
    const bodyW = W - 80;
    const bodyH = 380;

    // Board background
    ctx.fillStyle = '#4A90A4';
    ctx.beginPath();
    ctx.roundRect(bodyX - 15, bodyY - 50, bodyW + 30, bodyH + 80, 20);
    ctx.fill();

    // Patient body shape (rounded rectangle for torso)
    ctx.fillStyle = COLORS.patientBody;
    ctx.beginPath();
    ctx.roundRect(bodyX, bodyY, bodyW, bodyH, 30);
    ctx.fill();

    // Body outline
    ctx.strokeStyle = COLORS.patientOutline;
    ctx.lineWidth = 3;
    ctx.stroke();

    // Draw head (circle at top)
    const headX = W / 2;
    const headY = bodyY - 10;
    const headR = 35;

    ctx.fillStyle = COLORS.patientBody;
    ctx.beginPath();
    ctx.ellipse(headX, headY, headR, headR * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = COLORS.patientOutline;
    ctx.stroke();

    // Eyes
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.ellipse(headX - 12, headY - 5, 4, 4 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(headX + 12, headY - 5, 4, 4 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Nose (the famous red buzzer nose!)
    const noseR = 8;
    ctx.fillStyle = buzzing || noseGlow > 0 ?
      `rgba(232, 93, 74, ${0.5 + noseGlow * 0.5})` :
      COLORS.noseRed;
    ctx.beginPath();
    ctx.ellipse(headX, headY + 5, noseR, noseR * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Nose glow effect
    if (noseGlow > 0) {
      ctx.strokeStyle = `rgba(232, 93, 74, ${noseGlow})`;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.ellipse(headX, headY + 5, noseR + 4, (noseR + 4) * aspectRatio, 0, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Smile
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(headX, headY + 8, 10, 0.1 * Math.PI, 0.9 * Math.PI);
    ctx.stroke();
  }

  function drawCavity(cavity, index) {
    ctx.save();
    ctx.translate(cavity.x + cavity.w / 2, cavity.y + cavity.h / 2);
    ctx.scale(cavity.scale, cavity.scale);
    ctx.translate(-(cavity.x + cavity.w / 2), -(cavity.y + cavity.h / 2));

    // Cavity hole (dark background)
    ctx.fillStyle = COLORS.cavityBg;
    ctx.beginPath();
    ctx.roundRect(cavity.x, cavity.y, cavity.w, cavity.h, 12);
    ctx.fill();

    // Cavity edge (danger zone - red)
    const edgeGlow = cavity.hovered ? 0.8 : 0.4;
    ctx.strokeStyle = `rgba(232, 93, 74, ${edgeGlow})`;
    ctx.lineWidth = 6;
    ctx.stroke();

    // Inner safe zone indicator
    ctx.strokeStyle = COLORS.success;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(cavity.x + 10, cavity.y + 10, cavity.w - 20, cavity.h - 20, 8);
    ctx.stroke();

    // Draw the answer piece inside
    const pieceY = selectedCavity === cavity ? -extractionProgress * 20 : 0;
    ctx.save();
    ctx.translate(0, pieceY);

    // Piece background
    ctx.fillStyle = cavity.hovered ? COLORS.amber : '#F5E6D3';
    ctx.beginPath();
    ctx.roundRect(cavity.x + 8, cavity.y + 8, cavity.w - 16, cavity.h - 16, 8);
    ctx.fill();

    // Draw wrapped text on the piece
    const lines = cavity.wrappedText || [cavity.choice.text];
    const fontSize = cavity.fontSize || 14;
    const lineHeight = fontSize + 2;
    const totalHeight = lines.length * lineHeight;
    const startY = cavity.y + cavity.h / 2 - totalHeight / 2 + fontSize / 2;

    lines.forEach((line, i) => {
      drawText(line, cavity.x + cavity.w / 2, startY + i * lineHeight, {
        font: `500 ${fontSize}px 'Nunito', sans-serif`,
        color: COLORS.textPrimary,
        align: 'center'
      });
    });

    ctx.restore();
    ctx.restore();
  }

  function drawTweezers() {
    const tx = tweezers.x;
    const ty = tweezers.y;
    const size = 30;
    const wobble = buzzing ? Math.sin(gameTime * 50) * 3 : 0;

    ctx.save();
    ctx.translate(tx + wobble, ty);

    // Tweezers handle
    ctx.fillStyle = COLORS.tweezers;
    ctx.beginPath();
    ctx.roundRect(-8, -size - 20, 16, 30, 4);
    ctx.fill();

    // Handle highlight
    ctx.fillStyle = COLORS.tweezersHighlight;
    ctx.fillRect(-4, -size - 18, 4, 26);

    // Left arm
    ctx.fillStyle = COLORS.tweezers;
    ctx.beginPath();
    ctx.moveTo(-6, -size + 8);
    ctx.lineTo(-12, size - 10);
    ctx.lineTo(-8, size);
    ctx.lineTo(-2, -size + 8);
    ctx.closePath();
    ctx.fill();

    // Right arm
    ctx.beginPath();
    ctx.moveTo(6, -size + 8);
    ctx.lineTo(12, size - 10);
    ctx.lineTo(8, size);
    ctx.lineTo(2, -size + 8);
    ctx.closePath();
    ctx.fill();

    // Tips (slightly open or closed based on extraction)
    const openAmount = tweezers.extracting ? 2 : 6;
    ctx.fillStyle = '#888';
    ctx.beginPath();
    ctx.ellipse(-8 - openAmount, size - 5, 4, 6 * aspectRatio, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(8 + openAmount, size - 5, 4, 6 * aspectRatio, 0.3, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawExtractionProgress(cavity) {
    // Progress ring around the cavity
    const cx = cavity.x + cavity.w / 2;
    const cy = cavity.y + cavity.h / 2;
    const radius = Math.max(cavity.w, cavity.h) / 2 + 15;

    ctx.strokeStyle = COLORS.success;
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.ellipse(cx, cy, radius, radius * aspectRatio, 0, -Math.PI / 2, -Math.PI / 2 + extractionProgress * Math.PI * 2);
    ctx.stroke();

    // Glowing effect
    ctx.strokeStyle = `rgba(107, 191, 89, ${0.3 + Math.sin(gameTime * 8) * 0.2})`;
    ctx.lineWidth = 8;
    ctx.beginPath();
    ctx.ellipse(cx, cy, radius, radius * aspectRatio, 0, -Math.PI / 2, -Math.PI / 2 + extractionProgress * Math.PI * 2);
    ctx.stroke();
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;

    const touch = e.touches[0] || e.changedTouches[0];
    if (!touch) return;

    const { x, y } = screenToLogical(touch.clientX, touch.clientY);

    if (type === 'start') {
      initAudio();
      playSound('click');
      tweezers.targetX = x;
      tweezers.targetY = y;
      tweezers.extracting = true;
      isDragging = true;

      // Check if starting drag inside a cavity
      dragStartCavity = null;
      cavities.forEach(cavity => {
        const innerMargin = 12;
        const inside = x > cavity.x + innerMargin &&
                       x < cavity.x + cavity.w - innerMargin &&
                       y > cavity.y + innerMargin &&
                       y < cavity.y + cavity.h - innerMargin;
        if (inside) {
          dragStartCavity = cavity;
          selectedCavity = cavity;
        }
      });
    } else if (type === 'move') {
      tweezers.targetX = x;
      tweezers.targetY = y;

      // If we started in a cavity and moved to edge, trigger buzz
      if (isDragging && dragStartCavity) {
        const cavity = dragStartCavity;
        const innerMargin = 12;
        const inCavityArea = x >= cavity.x && x <= cavity.x + cavity.w &&
                             y >= cavity.y && y <= cavity.y + cavity.h;
        const inside = x > cavity.x + innerMargin &&
                       x < cavity.x + cavity.w - innerMargin &&
                       y > cavity.y + innerMargin &&
                       y < cavity.y + cavity.h - innerMargin;

        if (inCavityArea && !inside && !buzzing) {
          // Touched edge while in cavity - BUZZ!
          buzzing = true;
          buzzTime = 0;
          noseGlow = 1;
          playSound('buzz');
          dragStartCavity = null;
          selectedCavity = null;
          extractionProgress = 0;
        }
      }
    } else if (type === 'end') {
      tweezers.extracting = false;

      // If we ended inside the same cavity we started in (successful extraction)
      if (isDragging && dragStartCavity && !buzzing) {
        const cavity = dragStartCavity;
        const innerMargin = 12;
        const inside = x > cavity.x + innerMargin &&
                       x < cavity.x + cavity.w - innerMargin &&
                       y > cavity.y + innerMargin &&
                       y < cavity.y + cavity.h - innerMargin;

        if (inside) {
          // Successfully extracted!
          playSound('extract');
          spawnExtractParticles(cavity.x + cavity.w / 2, cavity.y + cavity.h / 2);
          engine.end(cavity.choice.is_correct, cavity.choice.explanation);
        }
      }

      isDragging = false;
      dragStartCavity = null;
      selectedCavity = null;
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mousemove', (e) => {
    if (e.buttons === 1) {
      const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
      handleTouch(fakeTouch, 'move');
    }
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
