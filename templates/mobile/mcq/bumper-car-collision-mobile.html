<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Bumper Car Collision</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE - MOBILE                                              ║
  ║  Fills 100% of container, non-uniform scaling, touch input.                  ║
  ║  Logical dimensions: 360×640 (use aspectRatio for proportional shapes)       ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none; /* Prevent default touch behaviors */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      /* Canvas fills viewport via JS, these are fallbacks */
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill viewport
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   *
   * @param {string} text - The text to wrap
   * @param {number} maxWidth - Maximum width in logical coordinates
   * @param {string} font - CSS font string (e.g., "16px 'Nunito', sans-serif")
   * @param {number} maxLines - Maximum number of lines (default 3)
   * @returns {string[]} Array of text lines
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   * Tries font sizes from max to min until content fits.
   *
   * @param {Object} options
   * @param {string[]} options.texts - Array of text strings to fit
   * @param {number} options.maxWidth - Maximum width for text wrapping
   * @param {number} options.availableHeight - Total height available for all texts
   * @param {number} options.minFont - Minimum font size (default 12)
   * @param {number} options.maxFont - Maximum font size (default 18)
   * @param {number} options.itemPadding - Vertical padding per text item (default 4)
   * @param {string} options.fontFamily - Font family (default "'Nunito Sans', sans-serif")
   * @returns {{ fontSize: number, wrappedTexts: string[][] }} Optimal font size and pre-wrapped texts
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === QUIZHP COLORS ===
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    bgDark: '#1C1C1A',
    surfaceDark: '#2A2A27',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    textLight: '#F5F5F0',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC'
  };

  // === SOUND EFFECTS (Web Audio API) ===
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'collision') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.15);
    } else if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.35);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    }
  }

  // === GAME STATE ===
  let player = null;
  let answerCars = [];
  let sparks = [];
  let collisionEffect = null;
  let touchActive = false;
  let touchTarget = { x: 0, y: 0 };
  let gameStartTime = 0;
  let carsAnimatedIn = false;

  // Arena boundaries
  const ARENA = {
    x: 20,
    y: 80,
    w: 320,
    h: 400
  };

  // Car dimensions
  const CAR_WIDTH = 70;
  const CAR_HEIGHT = 50;

  // Colors for answer cars (QuizHP palette)
  const CAR_COLORS = [COLORS.orange, COLORS.cyan, COLORS.amber, COLORS.success];

  function initGame() {
    // Initialize player car in center-bottom of arena
    player = {
      x: ARENA.x + ARENA.w / 2,
      y: ARENA.y + ARENA.h - 60,
      vx: 0,
      vy: 0,
      angle: -Math.PI / 2, // Pointing up
      color: '#2B2B28',
      speed: 0,
      maxSpeed: 180,
      accel: 300,
      friction: 0.96
    };

    // Initialize answer cars in corners/positions
    const positions = [
      { x: ARENA.x + 60, y: ARENA.y + 80, angle: Math.PI / 4 },
      { x: ARENA.x + ARENA.w - 60, y: ARENA.y + 80, angle: -Math.PI / 4 },
      { x: ARENA.x + 60, y: ARENA.y + ARENA.h / 2, angle: 0 },
      { x: ARENA.x + ARENA.w - 60, y: ARENA.y + ARENA.h / 2, angle: Math.PI }
    ];

    answerCars = QUESTION.choices.map((choice, i) => ({
      x: positions[i].x,
      y: positions[i].y,
      vx: 0,
      vy: 0,
      angle: positions[i].angle,
      color: CAR_COLORS[i],
      choice: choice,
      patternTime: Math.random() * Math.PI * 2,
      patternSpeed: 0.8 + Math.random() * 0.4,
      moveRadius: 30 + Math.random() * 20,
      baseX: positions[i].x,
      baseY: positions[i].y,
      fontSize: 14,
      wrappedText: [choice.text]
    }));

    sparks = [];
    collisionEffect = null;
    touchActive = false;
    touchTarget = { x: player.x, y: player.y };
    gameStartTime = performance.now();
    carsAnimatedIn = false;

    // Initialize audio on first interaction
    initAudio();

    recalculateTextSizing();
  }

  function recalculateTextSizing() {
    if (!answerCars || answerCars.length === 0) return;

    // Calculate text for each car - need to fit in limited space above car
    answerCars.forEach((car, i) => {
      const { fontSize, wrappedTexts } = findOptimalFontSize({
        texts: [car.choice.text],
        maxWidth: 80,
        availableHeight: 50,
        minFont: 12,
        maxFont: 14,
        fontFamily: "'Nunito', sans-serif"
      });
      car.fontSize = fontSize;
      car.wrappedText = wrappedTexts[0];
    });
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    // Update answer cars - they move in patterns
    answerCars.forEach(car => {
      car.patternTime += dt * car.patternSpeed;

      // Circular/figure-8 movement pattern
      const targetX = car.baseX + Math.sin(car.patternTime) * car.moveRadius;
      const targetY = car.baseY + Math.cos(car.patternTime * 0.7) * car.moveRadius * 0.6;

      // Smooth movement towards target
      car.vx = (targetX - car.x) * 2;
      car.vy = (targetY - car.y) * 2;

      car.x += car.vx * dt;
      car.y += car.vy * dt;

      // Update angle based on velocity
      if (Math.abs(car.vx) > 0.1 || Math.abs(car.vy) > 0.1) {
        car.angle = Math.atan2(car.vy, car.vx);
      }

      // Keep in arena
      car.x = Math.max(ARENA.x + CAR_WIDTH / 2, Math.min(ARENA.x + ARENA.w - CAR_WIDTH / 2, car.x));
      car.y = Math.max(ARENA.y + CAR_HEIGHT / 2, Math.min(ARENA.y + ARENA.h - CAR_HEIGHT / 2, car.y));
    });

    // Update player movement towards touch target
    if (touchActive) {
      const dx = touchTarget.x - player.x;
      const dy = touchTarget.y - player.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist > 10) {
        player.angle = Math.atan2(dy, dx);
        player.speed = Math.min(player.speed + player.accel * dt, player.maxSpeed);
      } else {
        player.speed *= 0.9;
      }
    } else {
      player.speed *= player.friction;
    }

    // Apply velocity
    player.vx = Math.cos(player.angle) * player.speed;
    player.vy = Math.sin(player.angle) * player.speed;
    player.x += player.vx * dt;
    player.y += player.vy * dt;

    // Keep player in arena
    if (player.x < ARENA.x + CAR_WIDTH / 2) {
      player.x = ARENA.x + CAR_WIDTH / 2;
      player.vx *= -0.5;
    }
    if (player.x > ARENA.x + ARENA.w - CAR_WIDTH / 2) {
      player.x = ARENA.x + ARENA.w - CAR_WIDTH / 2;
      player.vx *= -0.5;
    }
    if (player.y < ARENA.y + CAR_HEIGHT / 2) {
      player.y = ARENA.y + CAR_HEIGHT / 2;
      player.vy *= -0.5;
    }
    if (player.y > ARENA.y + ARENA.h - CAR_HEIGHT / 2) {
      player.y = ARENA.y + ARENA.h - CAR_HEIGHT / 2;
      player.vy *= -0.5;
    }

    // Check collisions with answer cars
    answerCars.forEach(car => {
      const dx = player.x - car.x;
      const dy = player.y - car.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const minDist = CAR_WIDTH * 0.8;

      if (dist < minDist && player.speed > 30) {
        // Collision! Create spark effect
        const collisionX = (player.x + car.x) / 2;
        const collisionY = (player.y + car.y) / 2;

        createSparks(collisionX, collisionY, 20);
        collisionEffect = {
          x: collisionX,
          y: collisionY,
          time: 0.4
        };

        // Play sound and trigger shake animation
        playSound('collision');
        car.shakeTime = 0.3;
        player.shakeTime = 0.3;

        // Delay end to show effect
        setTimeout(() => {
          if (car.choice.is_correct) {
            playSound('correct');
          } else {
            playSound('wrong');
          }
          engine.end(car.choice.is_correct, car.choice.explanation);
        }, 150);
      }
    });

    // Update sparks
    sparks = sparks.filter(spark => {
      spark.x += spark.vx * dt;
      spark.y += spark.vy * dt;
      spark.vy += 300 * dt; // gravity
      spark.life -= dt;
      return spark.life > 0;
    });

    // Update collision effect
    if (collisionEffect) {
      collisionEffect.time -= dt;
      if (collisionEffect.time <= 0) {
        collisionEffect = null;
      }
    }
  }

  function createSparks(x, y, count) {
    const sparkColors = [COLORS.orange, COLORS.amber, '#FFD700', COLORS.cyan];
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 100 + Math.random() * 250;
      sparks.push({
        x: x,
        y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 100,
        life: 0.4 + Math.random() * 0.3,
        color: sparkColors[Math.floor(Math.random() * sparkColors.length)],
        size: 2 + Math.random() * 4
      });
    }
  }

  function drawBumperCar(car, isPlayer) {
    ctx.save();

    // Calculate entrance animation
    const timeSinceStart = (performance.now() - gameStartTime) / 1000;
    let entranceScale = 1;
    let entranceAlpha = 1;

    if (!isPlayer && timeSinceStart < 0.8) {
      const carIndex = answerCars.indexOf(car);
      const delay = carIndex * 0.12;
      const animTime = Math.max(0, timeSinceStart - delay);
      const t = Math.min(animTime / 0.35, 1);
      // Spring easing for bounce-in
      const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
      entranceScale = t * spring;
      entranceAlpha = t;
    }

    // Apply shake effect if present
    let shakeOffsetX = 0;
    if (car.shakeTime && car.shakeTime > 0) {
      const shakeIntensity = car.shakeTime * 30;
      shakeOffsetX = Math.sin(car.shakeTime * 50) * shakeIntensity;
    }

    ctx.globalAlpha = entranceAlpha;
    ctx.translate(car.x + shakeOffsetX, car.y);
    ctx.scale(entranceScale, entranceScale * aspectRatio);
    ctx.rotate(car.angle);

    // Car body shadow
    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
    ctx.beginPath();
    ctx.roundRect(-CAR_WIDTH / 2 + 3, -CAR_HEIGHT / 2 + 3, CAR_WIDTH, CAR_HEIGHT, 12);
    ctx.fill();

    // Car body
    ctx.fillStyle = car.color;
    ctx.beginPath();
    ctx.roundRect(-CAR_WIDTH / 2, -CAR_HEIGHT / 2, CAR_WIDTH, CAR_HEIGHT, 12);
    ctx.fill();

    // Bumper ring around car
    ctx.strokeStyle = isPlayer ? COLORS.textLight : COLORS.borderStrong;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.roundRect(-CAR_WIDTH / 2 - 4, -CAR_HEIGHT / 2 - 4, CAR_WIDTH + 8, CAR_HEIGHT + 8, 16);
    ctx.stroke();

    // Metallic bumper shine
    const gradient = ctx.createLinearGradient(-CAR_WIDTH / 2 - 4, 0, CAR_WIDTH / 2 + 4, 0);
    gradient.addColorStop(0, 'rgba(255, 255, 255, 0.1)');
    gradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.3)');
    gradient.addColorStop(1, 'rgba(255, 255, 255, 0.1)');
    ctx.strokeStyle = gradient;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Highlight
    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
    ctx.beginPath();
    ctx.ellipse(0, -CAR_HEIGHT / 4, CAR_WIDTH / 3, CAR_HEIGHT / 6, 0, 0, Math.PI * 2);
    ctx.fill();

    // Direction indicator for player
    if (isPlayer) {
      ctx.fillStyle = COLORS.textLight;
      ctx.beginPath();
      ctx.moveTo(CAR_WIDTH / 2 - 5, 0);
      ctx.lineTo(CAR_WIDTH / 2 - 15, -8);
      ctx.lineTo(CAR_WIDTH / 2 - 15, 8);
      ctx.closePath();
      ctx.fill();
    }

    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function drawGame() {
    // Update shake timers
    if (player && player.shakeTime > 0) {
      player.shakeTime -= 0.016;
    }
    answerCars.forEach(car => {
      if (car.shakeTime > 0) car.shakeTime -= 0.016;
    });

    // Clear canvas with arena background
    ctx.fillStyle = COLORS.bgDark;
    ctx.fillRect(0, 0, W, H);

    // Draw arena floor with gradient
    const floorGradient = ctx.createRadialGradient(
      ARENA.x + ARENA.w / 2, (ARENA.y + ARENA.h / 2) * aspectRatio, 0,
      ARENA.x + ARENA.w / 2, (ARENA.y + ARENA.h / 2) * aspectRatio, 200
    );
    floorGradient.addColorStop(0, COLORS.surfaceDark);
    floorGradient.addColorStop(1, '#1a1a1a');
    ctx.fillStyle = floorGradient;
    ctx.beginPath();
    ctx.roundRect(ARENA.x, ARENA.y, ARENA.w, ARENA.h * aspectRatio, 20);
    ctx.fill();

    // Arena border with glow
    ctx.shadowColor = COLORS.orange;
    ctx.shadowBlur = 15;
    ctx.strokeStyle = COLORS.orange;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.roundRect(ARENA.x, ARENA.y, ARENA.w, ARENA.h * aspectRatio, 20);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Draw floor pattern (concentric circles)
    ctx.strokeStyle = 'rgba(232, 122, 62, 0.15)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      ctx.arc(ARENA.x + ARENA.w / 2, (ARENA.y + ARENA.h / 2) * aspectRatio, 30 + i * 40, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Draw answer cars with labels
    answerCars.forEach((car, index) => {
      drawBumperCar(car, false);

      // Draw answer label above car
      const labelY = car.y * aspectRatio - CAR_HEIGHT * aspectRatio / 2 - 10;
      const lines = car.wrappedText || [car.choice.text];
      const fontSize = car.fontSize || 14;
      const lineHeight = fontSize + 2;
      const totalHeight = lines.length * lineHeight;

      // Background for text
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.beginPath();
      ctx.roundRect(car.x - 50, labelY / aspectRatio - totalHeight - 5, 100, totalHeight + 10, 6);
      ctx.fill();

      // Draw each line
      lines.forEach((line, lineIndex) => {
        const y = labelY / aspectRatio - totalHeight + lineIndex * lineHeight + lineHeight / 2;
        drawText(line, car.x, y, {
          font: `500 ${fontSize}px 'Nunito', sans-serif`,
          color: COLORS.textLight,
          align: 'center'
        });
      });

      // Answer letter badge
      ctx.fillStyle = car.color;
      ctx.shadowColor = car.color;
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.ellipse(car.x - 40, (labelY / aspectRatio - totalHeight / 2), 12, 12 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      drawText(String.fromCharCode(65 + index), car.x - 40, labelY / aspectRatio - totalHeight / 2, {
        font: "bold 14px 'Nunito Sans', sans-serif",
        color: COLORS.textLight
      });
    });

    // Draw player car
    drawBumperCar(player, true);

    // Draw sparks with glow
    sparks.forEach(spark => {
      ctx.save();
      ctx.fillStyle = spark.color;
      ctx.globalAlpha = Math.min(spark.life * 2, 1);
      ctx.shadowColor = spark.color;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      const size = spark.size || 3;
      ctx.ellipse(spark.x, spark.y * aspectRatio, size, size * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });

    // Draw collision effect (impact ring)
    if (collisionEffect) {
      const alpha = collisionEffect.time / 0.4;
      const radius = (0.4 - collisionEffect.time) * 120;

      ctx.save();
      ctx.strokeStyle = COLORS.amber;
      ctx.globalAlpha = alpha;
      ctx.shadowColor = COLORS.amber;
      ctx.shadowBlur = 20;
      ctx.lineWidth = 4 * alpha;
      ctx.beginPath();
      ctx.ellipse(collisionEffect.x, collisionEffect.y * aspectRatio, radius, radius * aspectRatio, 0, 0, Math.PI * 2);
      ctx.stroke();

      // Inner ring
      ctx.strokeStyle = COLORS.orange;
      ctx.lineWidth = 2 * alpha;
      ctx.beginPath();
      ctx.ellipse(collisionEffect.x, collisionEffect.y * aspectRatio, radius * 0.6, radius * 0.6 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    // Draw touch target indicator when active
    if (touchActive) {
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
      ctx.lineWidth = 2;
      ctx.setLineDash([5, 5]);
      ctx.beginPath();
      ctx.moveTo(player.x, player.y * aspectRatio);
      ctx.lineTo(touchTarget.x, touchTarget.y * aspectRatio);
      ctx.stroke();
      ctx.setLineDash([]);

      // Target circle
      ctx.beginPath();
      ctx.ellipse(touchTarget.x, touchTarget.y * aspectRatio, 15, 15 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Title at top with glow
    ctx.save();
    ctx.shadowColor = COLORS.orange;
    ctx.shadowBlur = 10;
    drawText('BUMPER CARS', W / 2, 35, {
      font: "700 26px 'Belanosima', sans-serif",
      color: COLORS.orange
    });
    ctx.restore();

    // Hint text at bottom
    drawText('Crash into the correct answer!', W / 2, ARENA.y + ARENA.h * aspectRatio + 40, {
      font: "500 16px 'Nunito Sans', sans-serif",
      color: COLORS.textSecondary
    });
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;

    const touch = e.touches[0] || e.changedTouches[0];
    if (!touch) return;

    const { x, y } = screenToLogical(touch.clientX, touch.clientY);

    if (type === 'start' || type === 'move') {
      touchActive = true;
      // Clamp target to arena
      touchTarget.x = Math.max(ARENA.x + CAR_WIDTH / 2, Math.min(ARENA.x + ARENA.w - CAR_WIDTH / 2, x));
      touchTarget.y = Math.max(ARENA.y + CAR_HEIGHT / 2, Math.min(ARENA.y + ARENA.h - CAR_HEIGHT / 2, y));
    } else if (type === 'end') {
      touchActive = false;
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
