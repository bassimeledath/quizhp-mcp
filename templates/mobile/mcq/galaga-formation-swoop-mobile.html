<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Galaga Formation Swoop</title>
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE - MOBILE                                              ║
  ║  Fills 100% of container, non-uniform scaling, touch input.                  ║
  ║  Logical dimensions: 360×640 (use aspectRatio for proportional shapes)       ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none; /* Prevent default touch behaviors */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      /* Canvas fills viewport via JS, these are fallbacks */
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill viewport
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   *
   * @param {string} text - The text to wrap
   * @param {number} maxWidth - Maximum width in logical coordinates
   * @param {string} font - CSS font string (e.g., "16px 'Nunito', sans-serif")
   * @param {number} maxLines - Maximum number of lines (default 3)
   * @returns {string[]} Array of text lines
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   * Tries font sizes from max to min until content fits.
   *
   * @param {Object} options
   * @param {string[]} options.texts - Array of text strings to fit
   * @param {number} options.maxWidth - Maximum width for text wrapping
   * @param {number} options.availableHeight - Total height available for all texts
   * @param {number} options.minFont - Minimum font size (default 12)
   * @param {number} options.maxFont - Maximum font size (default 18)
   * @param {number} options.itemPadding - Vertical padding per text item (default 4)
   * @param {string} options.fontFamily - Font family (default "'Nunito Sans', sans-serif")
   * @returns {{ fontSize: number, wrappedTexts: string[][] }} Optimal font size and pre-wrapped texts
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === GAME STATE ===
  let player = null;
  let bullets = [];
  let enemies = [];
  let bossAliens = [];
  let stars = [];
  let particles = [];
  let explosions = [];
  let swoopingBoss = null;
  let swoopTimer = 0;
  let gameTime = 0;

  // Audio context for sound effects
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'shoot') {
      osc.frequency.setValueAtTime(800, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'hit') {
      osc.frequency.setValueAtTime(150, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.2);
    } else if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    }
  }

  function initGame() {
    // Player ship at bottom center
    player = {
      x: W / 2,
      y: H - 60,
      targetX: W / 2,
      size: 20,
      shootCooldown: 0
    };

    bullets = [];
    enemies = [];
    explosions = [];
    particles = [];
    swoopingBoss = null;
    swoopTimer = 2; // Start swooping after 2 seconds
    gameTime = 0;

    // Create starfield
    stars = [];
    for (let i = 0; i < 50; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        size: Math.random() * 2 + 0.5,
        speed: Math.random() * 30 + 20,
        alpha: Math.random() * 0.5 + 0.3
      });
    }

    // Create regular enemy formation (decorative) - smaller and at top
    for (let row = 0; row < 2; row++) {
      for (let col = 0; col < 5; col++) {
        enemies.push({
          x: 60 + col * 60,
          y: 40 + row * 28,
          baseX: 60 + col * 60,
          baseY: 40 + row * 28,
          size: 10,
          phase: (row + col) * 0.5,
          type: row === 0 ? 'bee' : 'butterfly'
        });
      }
    }

    // Create 4 boss aliens with answer labels in 2x2 grid
    const bossPositions = [
      { x: W * 0.25, y: 130 },  // Top-left
      { x: W * 0.75, y: 130 },  // Top-right
      { x: W * 0.25, y: 270 },  // Bottom-left
      { x: W * 0.75, y: 270 }   // Bottom-right
    ];

    bossAliens = QUESTION.choices.map((choice, i) => ({
      x: bossPositions[i].x,
      y: bossPositions[i].y,
      baseX: bossPositions[i].x,
      baseY: bossPositions[i].y,
      size: 24,
      choice: choice,
      index: i,
      phase: i * 0.7,
      hitbox: { x: 0, y: 0, w: 80, h: 100 },
      entranceDelay: i * 0.15,
      scale: 0
    }));

    recalculateTextSizing();
  }

  function recalculateTextSizing() {
    if (!bossAliens || bossAliens.length === 0) return;

    // Boss aliens are in 2x2 grid, each gets about half the width minus margins
    const textWidth = 140;

    bossAliens.forEach((boss, i) => {
      const { wrappedTexts, fontSize } = findOptimalFontSize({
        texts: [QUESTION.choices[i].text],
        maxWidth: textWidth,
        availableHeight: 70,
        minFont: 12,
        maxFont: 16,
        fontFamily: "'Nunito', sans-serif"
      });
      boss.wrappedText = wrappedTexts[0];
      boss.fontSize = fontSize;
    });
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Update stars (parallax scrolling)
    stars.forEach(star => {
      star.y += star.speed * dt;
      if (star.y > H) {
        star.y = 0;
        star.x = Math.random() * W;
      }
    });

    // Update player position (smooth follow)
    const dx = player.targetX - player.x;
    player.x += dx * 8 * dt;
    player.x = Math.max(20, Math.min(W - 20, player.x));

    // Update shoot cooldown
    if (player.shootCooldown > 0) {
      player.shootCooldown -= dt;
    }

    // Update bullets
    bullets.forEach(bullet => {
      bullet.y -= bullet.speed * dt;
      bullet.trail.push({ x: bullet.x, y: bullet.y, alpha: 1 });
      if (bullet.trail.length > 8) bullet.trail.shift();
      bullet.trail.forEach(t => t.alpha -= dt * 4);
    });
    bullets = bullets.filter(b => b.y > -20);

    // Update enemy formation (gentle wobble)
    enemies.forEach(enemy => {
      enemy.x = enemy.baseX + Math.sin(gameTime * 2 + enemy.phase) * 8;
      enemy.y = enemy.baseY + Math.sin(gameTime * 1.5 + enemy.phase) * 4;
    });

    // Update boss aliens
    bossAliens.forEach(boss => {
      // Entrance animation
      if (boss.scale < 1) {
        const entranceTime = Math.max(0, gameTime - boss.entranceDelay);
        boss.scale = Math.min(1, entranceTime * 3);
      }

      if (boss !== swoopingBoss) {
        boss.x = boss.baseX + Math.sin(gameTime * 1.8 + boss.phase) * 12;
        boss.y = boss.baseY + Math.sin(gameTime * 1.2 + boss.phase) * 6;
      }

      // Update hitbox position
      boss.hitbox.x = boss.x - 40;
      boss.hitbox.y = boss.y - 15;
      boss.hitbox.w = 80;
      boss.hitbox.h = 100;
    });

    // Swooping logic
    swoopTimer -= dt;
    if (swoopTimer <= 0 && !swoopingBoss && bossAliens.length > 0) {
      // Pick a random boss to swoop
      const idx = Math.floor(Math.random() * bossAliens.length);
      swoopingBoss = bossAliens[idx];
      swoopingBoss.swoopPhase = 0;
      swoopingBoss.swoopStartX = swoopingBoss.x;
      swoopingBoss.swoopStartY = swoopingBoss.y;
      swoopTimer = 3 + Math.random() * 2;
    }

    // Update swooping boss
    if (swoopingBoss) {
      swoopingBoss.swoopPhase += dt * 0.9;
      const t = swoopingBoss.swoopPhase;

      // Calculate how far down the boss can go based on its position
      const maxSwoopDist = H - 120 - swoopingBoss.swoopStartY;

      if (t < 1) {
        // Swoop down in a curve toward player
        const targetX = player ? player.x : W / 2;
        const dx = targetX - swoopingBoss.swoopStartX;
        swoopingBoss.x = swoopingBoss.swoopStartX + dx * t * 0.5 + Math.sin(t * Math.PI) * 40;
        swoopingBoss.y = swoopingBoss.swoopStartY + t * maxSwoopDist;
      } else if (t < 2) {
        // Return up in reverse curve
        const rt = t - 1;
        swoopingBoss.x = swoopingBoss.baseX + Math.sin((1 - rt) * Math.PI) * 40;
        swoopingBoss.y = swoopingBoss.swoopStartY + maxSwoopDist - rt * maxSwoopDist;
      } else {
        // Back to formation
        swoopingBoss.x = swoopingBoss.baseX;
        swoopingBoss.y = swoopingBoss.baseY;
        swoopingBoss = null;
      }
    }

    // Check bullet-boss collisions
    bullets.forEach(bullet => {
      bossAliens.forEach(boss => {
        if (!bullet.hit && boss.scale >= 1) {
          const dx = bullet.x - boss.x;
          const dy = bullet.y - boss.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < boss.size + 10) {
            bullet.hit = true;

            // Create explosion
            for (let i = 0; i < 15; i++) {
              particles.push({
                x: boss.x,
                y: boss.y,
                vx: (Math.random() - 0.5) * 200,
                vy: (Math.random() - 0.5) * 200,
                life: 1,
                color: boss.choice.is_correct ? '#6BBF59' : '#E85D4A',
                size: Math.random() * 4 + 2
              });
            }

            // Play sound
            playSound(boss.choice.is_correct ? 'correct' : 'wrong');
            playSound('hit');

            // End game
            engine.end(boss.choice.is_correct, boss.choice.explanation);
          }
        }
      });
    });
    bullets = bullets.filter(b => !b.hit);

    // Update particles
    particles.forEach(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt * 1.5;
      p.vy += 100 * dt;
    });
    particles = particles.filter(p => p.life > 0);
  }

  function drawGame() {
    // Clear canvas with space background
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, W, H);

    // Draw stars
    stars.forEach(star => {
      ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`;
      ctx.beginPath();
      ctx.ellipse(star.x, star.y, star.size, star.size * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    });

    // Draw regular enemies
    enemies.forEach(enemy => {
      drawEnemy(enemy);
    });

    // Draw boss aliens
    bossAliens.forEach(boss => {
      drawBossAlien(boss);
    });

    // Draw bullets with trail
    bullets.forEach(bullet => {
      // Draw trail
      bullet.trail.forEach((t, i) => {
        if (t.alpha > 0) {
          ctx.fillStyle = `rgba(78, 205, 196, ${t.alpha * 0.5})`;
          const trailSize = 2 + i * 0.3;
          ctx.beginPath();
          ctx.ellipse(t.x, t.y, trailSize, trailSize * aspectRatio * 2, 0, 0, Math.PI * 2);
          ctx.fill();
        }
      });

      // Draw bullet
      ctx.fillStyle = '#4ECDC4';
      ctx.shadowColor = '#4ECDC4';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.ellipse(bullet.x, bullet.y, 3, 8, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    });

    // Draw particles
    particles.forEach(p => {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.life;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.size, p.size * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Draw player ship
    drawPlayerShip();
  }

  function drawEnemy(enemy) {
    ctx.save();
    ctx.translate(enemy.x, enemy.y);
    ctx.scale(1, aspectRatio);

    if (enemy.type === 'bee') {
      // Yellow bee-like enemy
      ctx.fillStyle = '#F5A742';
      ctx.beginPath();
      ctx.arc(0, 0, enemy.size * 0.8, 0, Math.PI * 2);
      ctx.fill();

      // Wings
      ctx.fillStyle = '#4ECDC4';
      ctx.beginPath();
      ctx.ellipse(-enemy.size * 0.7, 0, 5, 3, -0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(enemy.size * 0.7, 0, 5, 3, 0.3, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // Purple butterfly-like enemy
      ctx.fillStyle = '#9B59B6';
      ctx.beginPath();
      ctx.arc(0, 0, enemy.size * 0.7, 0, Math.PI * 2);
      ctx.fill();

      // Wings
      ctx.fillStyle = '#E87A3E';
      ctx.beginPath();
      ctx.ellipse(-enemy.size * 0.8, 0, 6, 4, -0.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(enemy.size * 0.8, 0, 6, 4, 0.2, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }

  function drawBossAlien(boss) {
    const scale = boss.scale;
    if (scale <= 0) return;

    ctx.save();
    ctx.translate(boss.x, boss.y);

    // Scale for entrance animation
    ctx.scale(scale, scale);

    // Glow effect
    ctx.shadowColor = boss.choice.is_correct ? '#6BBF59' : '#E87A3E';
    ctx.shadowBlur = 15 + Math.sin(gameTime * 4 + boss.phase) * 5;

    // Boss body (Galaga boss style)
    ctx.save();
    ctx.scale(1, aspectRatio);

    // Main body
    const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, boss.size);
    gradient.addColorStop(0, '#4ECDC4');
    gradient.addColorStop(0.5, '#2B8B8B');
    gradient.addColorStop(1, '#1a5555');
    ctx.fillStyle = gradient;

    ctx.beginPath();
    ctx.arc(0, 0, boss.size, 0, Math.PI * 2);
    ctx.fill();

    // Boss markings
    ctx.fillStyle = '#E87A3E';
    ctx.beginPath();
    ctx.arc(0, -5, boss.size * 0.4, 0, Math.PI * 2);
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#FAFAF7';
    ctx.beginPath();
    ctx.arc(-8, -3, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(8, -3, 4, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#2B2B28';
    ctx.beginPath();
    ctx.arc(-8, -3, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(8, -3, 2, 0, Math.PI * 2);
    ctx.fill();

    // Antenna
    ctx.strokeStyle = '#4ECDC4';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-6, -boss.size + 5);
    ctx.lineTo(-10, -boss.size - 8);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(6, -boss.size + 5);
    ctx.lineTo(10, -boss.size - 8);
    ctx.stroke();

    ctx.fillStyle = '#F5A742';
    ctx.beginPath();
    ctx.arc(-10, -boss.size - 8, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(10, -boss.size - 8, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
    ctx.shadowBlur = 0;

    // Draw answer label below boss
    ctx.restore();

    // Answer text (positioned below the boss)
    const lines = boss.wrappedText || [boss.choice.text];
    const fontSize = boss.fontSize || 12;
    const lineHeight = fontSize + 2;
    const textY = boss.y + boss.size * aspectRatio + 12;

    lines.forEach((line, i) => {
      drawText(line, boss.x, textY + i * lineHeight, {
        font: `500 ${fontSize}px 'Nunito', sans-serif`,
        color: '#F5F5F0',
        align: 'center'
      });
    });
  }

  function drawPlayerShip() {
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.scale(1, aspectRatio);

    // Ship body
    ctx.fillStyle = '#E87A3E';
    ctx.beginPath();
    ctx.moveTo(0, -player.size);
    ctx.lineTo(-player.size * 0.7, player.size * 0.6);
    ctx.lineTo(-player.size * 0.3, player.size * 0.3);
    ctx.lineTo(0, player.size * 0.5);
    ctx.lineTo(player.size * 0.3, player.size * 0.3);
    ctx.lineTo(player.size * 0.7, player.size * 0.6);
    ctx.closePath();
    ctx.fill();

    // Ship accent
    ctx.fillStyle = '#4ECDC4';
    ctx.beginPath();
    ctx.moveTo(0, -player.size * 0.6);
    ctx.lineTo(-player.size * 0.2, player.size * 0.1);
    ctx.lineTo(player.size * 0.2, player.size * 0.1);
    ctx.closePath();
    ctx.fill();

    // Engine glow
    ctx.fillStyle = '#F5A742';
    ctx.shadowColor = '#F5A742';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.ellipse(0, player.size * 0.7, 4, 6 + Math.sin(gameTime * 15) * 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    ctx.restore();
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;

    const touch = e.touches[0] || e.changedTouches[0];
    if (!touch) return;

    const { x, y } = screenToLogical(touch.clientX, touch.clientY);

    if (type === 'start' || type === 'move') {
      // Initialize audio on first touch
      initAudio();

      // Move player horizontally toward touch
      player.targetX = x;

      // Auto-fire when touching
      if (player.shootCooldown <= 0) {
        bullets.push({
          x: player.x,
          y: player.y - player.size,
          speed: 500,
          trail: []
        });
        player.shootCooldown = 0.25;
        playSound('shoot');
      }
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
