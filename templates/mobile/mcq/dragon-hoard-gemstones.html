<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Dragon Hoard Gemstones</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE - MOBILE                                              ║
  ║  Fills 100% of container, non-uniform scaling, touch input.                  ║
  ║  Logical dimensions: 360×640 (use aspectRatio for proportional shapes)       ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none; /* Prevent default touch behaviors */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      /* Canvas fills viewport via JS, these are fallbacks */
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill viewport
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  Dragon Hoard Gemstones - MCQ Mobile Game                                  ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgDark: '#1C1C1A',
    bgHoard: '#2A2017',
    orange: '#E87A3E',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    textPrimary: '#F5F5F0',
    textSecondary: '#C2C2B8',
    gold: '#FFD700',
    goldDark: '#B8860B',
  };

  // Gemstone colors - each gem gets a unique color
  const GEM_COLORS = [
    { fill: '#E85D75', glow: '#FF7B93', highlight: '#FFB0C0', name: 'ruby' },     // Ruby red
    { fill: '#4ECDC4', glow: '#6EEEE5', highlight: '#A0FFF7', name: 'emerald' },   // Emerald teal
    { fill: '#7B68EE', glow: '#9B88FF', highlight: '#C4B8FF', name: 'amethyst' },  // Amethyst purple
    { fill: '#F5A742', glow: '#FFD080', highlight: '#FFE5B0', name: 'topaz' },     // Topaz amber
  ];

  // === SOUND ENGINE ===
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playClickSound() {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.frequency.setValueAtTime(880, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1320, ac.currentTime + 0.05);
      gain.gain.setValueAtTime(0.15, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.15);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.15);
    } catch(e) {}
  }

  function playCorrectSound() {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, ac.currentTime);
      osc.frequency.setValueAtTime(659, ac.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, ac.currentTime + 0.2);
      gain.gain.setValueAtTime(0.2, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.4);
    } catch(e) {}
  }

  function playWrongSound() {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, ac.currentTime + 0.3);
      gain.gain.setValueAtTime(0.12, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.3);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.3);
    } catch(e) {}
  }

  // === GAME STATE ===
  let gems = [];
  let goldCoins = [];
  let sparkles = [];
  let gameParticles = [];
  let gameTime = 0;
  let selectedGemIndex = -1;
  let animationPhase = 'entrance'; // 'entrance' | 'idle' | 'selected' | 'feedback'
  let feedbackTimer = 0;
  let pressedGemIndex = -1;

  // Gemstone hit areas (for vertical stack layout)
  const GEM_LAYOUT = {
    startY: 50,
    gemHeight: 120,
    gap: 16,
    padX: 16,
    gemWidth: 328, // W - padX*2
  };

  function initGame() {
    gems = [];
    goldCoins = [];
    sparkles = [];
    gameParticles = [];
    gameTime = 0;
    selectedGemIndex = -1;
    animationPhase = 'entrance';
    feedbackTimer = 0;
    pressedGemIndex = -1;

    const totalGemArea = H - GEM_LAYOUT.startY - 40;
    const gemH = Math.min(120, (totalGemArea - GEM_LAYOUT.gap * 3) / 4);
    const startY = GEM_LAYOUT.startY + (totalGemArea - (gemH * 4 + GEM_LAYOUT.gap * 3)) / 2;

    QUESTION.choices.forEach((choice, i) => {
      gems.push({
        x: GEM_LAYOUT.padX,
        y: startY + i * (gemH + GEM_LAYOUT.gap),
        w: GEM_LAYOUT.gemWidth,
        h: gemH,
        choice: choice,
        color: GEM_COLORS[i],
        scale: 0,
        alpha: 0,
        offsetX: 0,
        glowIntensity: 0,
        breathePhase: Math.random() * Math.PI * 2,
        wrappedText: [],
        fontSize: 16,
      });
    });

    // Background gold coins scattered
    for (let i = 0; i < 12; i++) {
      goldCoins.push({
        x: Math.random() * W,
        y: Math.random() * H,
        size: 4 + Math.random() * 8,
        alpha: 0.15 + Math.random() * 0.2,
        rotation: Math.random() * Math.PI * 2,
      });
    }

    // Background sparkles
    for (let i = 0; i < 20; i++) {
      sparkles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        size: 1 + Math.random() * 2,
        alpha: 0,
        maxAlpha: 0.3 + Math.random() * 0.5,
        phase: Math.random() * Math.PI * 2,
        speed: 0.5 + Math.random() * 1.5,
      });
    }

    recalculateTextSizing();
  }

  function recalculateTextSizing() {
    if (!gems || gems.length === 0) return;

    const textMaxWidth = GEM_LAYOUT.gemWidth - 60; // padding for gem facet edges
    const availPerGem = gems[0].h - 16;

    const { fontSize, wrappedTexts } = findOptimalFontSize({
      texts: QUESTION.choices.map(c => c.text),
      maxWidth: textMaxWidth,
      availableHeight: availPerGem * 4,
      minFont: 14,
      maxFont: 18,
      itemPadding: 8,
      fontFamily: "'Nunito', sans-serif"
    });

    gems.forEach((gem, i) => {
      gem.wrappedText = wrappedTexts[i];
      gem.fontSize = fontSize;
    });
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Entrance animation
    if (animationPhase === 'entrance') {
      let allDone = true;
      gems.forEach((gem, i) => {
        const delay = i * 0.12;
        const t = Math.max(0, Math.min(1, (gameTime - delay) / 0.4));
        if (t < 1) allDone = false;
        // Spring easing
        const spring = 1 + Math.sin(t * Math.PI * 2) * 0.15 * (1 - t);
        gem.scale = t * spring;
        gem.alpha = t;
      });
      if (allDone) animationPhase = 'idle';
    }

    // Idle breathing
    if (animationPhase === 'idle' || animationPhase === 'entrance') {
      gems.forEach((gem, i) => {
        gem.breathePhase += dt * (1.2 + i * 0.15);
        gem.glowIntensity = 0.3 + Math.sin(gem.breathePhase) * 0.15;
      });
    }

    // Feedback animation after selection
    if (animationPhase === 'feedback') {
      feedbackTimer += dt;
      const selected = gems[selectedGemIndex];
      if (selected) {
        if (selected.choice.is_correct) {
          // Celebration pulse
          selected.scale = 1 + Math.sin(feedbackTimer * 8) * 0.05;
          selected.glowIntensity = 0.8 + Math.sin(feedbackTimer * 6) * 0.2;
        } else {
          // Shake
          const decay = Math.max(0, 1 - feedbackTimer / 0.4);
          selected.offsetX = Math.sin(feedbackTimer * Math.PI * 14) * 8 * decay;
        }
      }

      if (feedbackTimer > 0.6) {
        const choice = gems[selectedGemIndex].choice;
        engine.end(choice.is_correct, choice.explanation);
      }
    }

    // Update sparkles
    sparkles.forEach(s => {
      s.phase += dt * s.speed;
      s.alpha = s.maxAlpha * (0.5 + 0.5 * Math.sin(s.phase));
    });

    // Update game particles (gem claim sparkles)
    gameParticles = gameParticles.filter(p => {
      p.vy += 200 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.alpha -= dt * 2;
      p.rotation += p.rotationSpeed * dt;
      return p.alpha > 0;
    });
  }

  function drawGame() {
    // Dark cave background with warm tones
    const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
    bgGrad.addColorStop(0, '#1A1510');
    bgGrad.addColorStop(0.3, '#2A2017');
    bgGrad.addColorStop(0.7, '#1E1812');
    bgGrad.addColorStop(1, '#151010');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    // Draw scattered gold coins in background
    goldCoins.forEach(coin => {
      ctx.save();
      ctx.globalAlpha = coin.alpha;
      ctx.translate(coin.x, coin.y);
      ctx.scale(1, aspectRatio);
      ctx.rotate(coin.rotation);
      ctx.beginPath();
      ctx.arc(0, 0, coin.size, 0, Math.PI * 2);
      ctx.fillStyle = COLORS.goldDark;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(-coin.size * 0.15, -coin.size * 0.15, coin.size * 0.6, 0, Math.PI * 2);
      ctx.fillStyle = COLORS.gold;
      ctx.globalAlpha = coin.alpha * 0.5;
      ctx.fill();
      ctx.restore();
    });

    // Draw sparkles
    sparkles.forEach(s => {
      if (s.alpha <= 0) return;
      ctx.save();
      ctx.globalAlpha = s.alpha;
      ctx.fillStyle = COLORS.gold;
      // 4-point star
      ctx.translate(s.x, s.y);
      ctx.beginPath();
      for (let j = 0; j < 4; j++) {
        const angle = (j / 4) * Math.PI * 2 - Math.PI / 4;
        const outerR = s.size;
        const innerR = s.size * 0.3;
        ctx.lineTo(Math.cos(angle) * outerR, Math.sin(angle) * outerR * aspectRatio);
        const midAngle = angle + Math.PI / 4;
        ctx.lineTo(Math.cos(midAngle) * innerR, Math.sin(midAngle) * innerR * aspectRatio);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    });

    // Draw gemstones
    gems.forEach((gem, i) => {
      if (gem.alpha <= 0) return;

      ctx.save();
      ctx.globalAlpha = gem.alpha;

      const cx = gem.x + gem.w / 2 + gem.offsetX;
      const cy = gem.y + gem.h / 2;

      ctx.translate(cx, cy);
      ctx.scale(gem.scale, gem.scale);
      ctx.translate(-cx, -cy);

      const gx = gem.x + gem.offsetX;
      const gy = gem.y;

      // Outer glow
      if (gem.glowIntensity > 0) {
        ctx.save();
        ctx.globalAlpha = gem.glowIntensity * gem.alpha * 0.4;
        ctx.shadowColor = gem.color.glow;
        ctx.shadowBlur = 20;
        ctx.fillStyle = gem.color.glow;
        ctx.beginPath();
        ctx.roundRect(gx - 3, gy - 3, gem.w + 6, gem.h + 6, 16);
        ctx.fill();
        ctx.restore();
      }

      // Gem body - faceted look with gradient
      const gemGrad = ctx.createLinearGradient(gx, gy, gx + gem.w, gy + gem.h);
      gemGrad.addColorStop(0, gem.color.fill);
      gemGrad.addColorStop(0.5, gem.color.glow);
      gemGrad.addColorStop(1, gem.color.fill);

      // Selected/pressed state
      let bodyColor = gemGrad;
      let borderColor = gem.color.glow;
      if (animationPhase === 'feedback' && i === selectedGemIndex) {
        if (gem.choice.is_correct) {
          borderColor = COLORS.success;
        } else {
          borderColor = COLORS.error;
        }
      }
      if (pressedGemIndex === i && animationPhase !== 'feedback') {
        borderColor = '#FFFFFF';
      }

      // Main gem shape
      ctx.fillStyle = bodyColor;
      ctx.beginPath();
      ctx.roundRect(gx, gy, gem.w, gem.h, 14);
      ctx.fill();

      // Border
      ctx.strokeStyle = borderColor;
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.roundRect(gx, gy, gem.w, gem.h, 14);
      ctx.stroke();

      // Inner facet highlight (top-left shine)
      ctx.save();
      ctx.globalAlpha = 0.25;
      const hlGrad = ctx.createLinearGradient(gx, gy, gx + gem.w * 0.6, gy + gem.h * 0.5);
      hlGrad.addColorStop(0, gem.color.highlight);
      hlGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = hlGrad;
      ctx.beginPath();
      ctx.roundRect(gx + 4, gy + 4, gem.w - 8, gem.h / 2 - 4, [12, 12, 4, 4]);
      ctx.fill();
      ctx.restore();

      // Diagonal facet line
      ctx.save();
      ctx.globalAlpha = 0.15;
      ctx.strokeStyle = gem.color.highlight;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(gx + 20, gy + gem.h - 10);
      ctx.lineTo(gx + gem.w - 20, gy + 10);
      ctx.stroke();
      ctx.restore();

      // Small gem icon on the left
      const iconSize = 14;
      const iconX = gx + 18;
      const iconY = cy;
      ctx.save();
      ctx.globalAlpha = 0.8;
      ctx.translate(iconX, iconY);
      ctx.scale(1, aspectRatio);
      // Diamond shape
      ctx.beginPath();
      ctx.moveTo(0, -iconSize);
      ctx.lineTo(iconSize * 0.7, 0);
      ctx.lineTo(0, iconSize);
      ctx.lineTo(-iconSize * 0.7, 0);
      ctx.closePath();
      ctx.fillStyle = gem.color.highlight;
      ctx.fill();
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.restore();

      // Answer text (wrapped, no truncation)
      const lines = gem.wrappedText || [gem.choice.text];
      const fs = gem.fontSize || 16;
      const lineH = fs + 3;
      const textStartY = cy - ((lines.length - 1) * lineH) / 2;

      lines.forEach((line, li) => {
        drawText(line, cx + 8, textStartY + li * lineH, {
          font: `500 ${fs}px 'Nunito', sans-serif`,
          color: COLORS.textPrimary,
          align: 'center',
          baseline: 'middle'
        });
      });

      ctx.restore();
    });

    // Draw game particles (sparkles on gem select)
    gameParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
      ctx.restore();
    });
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;
    if (animationPhase === 'feedback') return;

    const touch = e.touches[0] || e.changedTouches[0];
    if (!touch) return;
    const { x, y } = screenToLogical(touch.clientX, touch.clientY);

    if (type === 'start') {
      gems.forEach((gem, i) => {
        const rect = { x: gem.x, y: gem.y, w: gem.w, h: gem.h };
        if (pointInRect(x, y, rect)) {
          pressedGemIndex = i;
          playClickSound();
        }
      });
    }

    if (type === 'end') {
      if (pressedGemIndex >= 0) {
        const gem = gems[pressedGemIndex];
        const rect = { x: gem.x, y: gem.y, w: gem.w, h: gem.h };
        if (pointInRect(x, y, rect)) {
          // Select this gem
          selectedGemIndex = pressedGemIndex;
          animationPhase = 'feedback';
          feedbackTimer = 0;

          // Spawn claim particles
          const cx = gem.x + gem.w / 2;
          const cy = gem.y + gem.h / 2;
          for (let p = 0; p < 15; p++) {
            gameParticles.push({
              x: cx + (Math.random() - 0.5) * gem.w * 0.5,
              y: cy + (Math.random() - 0.5) * gem.h * 0.3,
              vx: (Math.random() - 0.5) * 150,
              vy: -Math.random() * 100 - 30,
              size: 2 + Math.random() * 4,
              color: gem.color.highlight,
              alpha: 1,
              rotation: Math.random() * Math.PI * 2,
              rotationSpeed: (Math.random() - 0.5) * 6,
            });
          }

          if (gem.choice.is_correct) {
            playCorrectSound();
          } else {
            playWrongSound();
          }
        }
        pressedGemIndex = -1;
      }
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
