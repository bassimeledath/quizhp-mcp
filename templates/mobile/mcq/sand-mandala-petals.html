<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Sand Mandala Petals</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE - MOBILE                                              ║
  ║  Fills 100% of container, non-uniform scaling, touch input.                  ║
  ║  Logical dimensions: 360×640 (use aspectRatio for proportional shapes)       ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none; /* Prevent default touch behaviors */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      /* Canvas fills viewport via JS, these are fallbacks */
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill viewport
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  Sand Mandala Petals - Intricate mandala with four answer petals           ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgWarm: '#FFF4ED',
    surface: '#FFFFFF',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    peach: '#FFB89D',
    sandLight: '#F5E6D0',
    sandMid: '#E8D4B8',
    sandDark: '#C4A882',
    sandDeep: '#A0896C',
  };

  // Petal colors for each quadrant
  const PETAL_COLORS = [
    { fill: '#E87A3E', light: '#FFF4ED', border: '#D66B31' },
    { fill: '#4ECDC4', light: '#E8F9F8', border: '#45B8B0' },
    { fill: '#F5A742', light: '#FFF8E8', border: '#D99235' },
    { fill: '#FFB89D', light: '#FFF0EB', border: '#E8A087' },
  ];

  // Sound effects
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playSound(type) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'click') {
      osc.frequency.setValueAtTime(600, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.08);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.12);
    } else if (type === 'correct') {
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(300, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.35);
    }
  }

  // === GAME STATE ===
  let petals = [];
  let mandalaRotation = 0;
  let sandParticles = [];
  let selectedPetal = -1;
  let selectionTime = 0;
  let entranceProgress = 0;

  // Mandala center and sizing
  const CX = W / 2;
  const CY = 160;
  const MANDALA_R = 90;

  function recalculateTextSizing() {
    if (!petals || petals.length === 0) return;

    const textMaxWidth = 280;
    const availableHeight = 300;

    const { fontSize, wrappedTexts } = findOptimalFontSize({
      texts: QUESTION.choices.map(c => c.text),
      maxWidth: textMaxWidth,
      availableHeight: availableHeight,
      minFont: 14,
      maxFont: 18,
      itemPadding: 12,
      fontFamily: "'Nunito', sans-serif"
    });

    petals.forEach((petal, i) => {
      petal.wrappedText = wrappedTexts[i];
      petal.fontSize = fontSize;
    });
  }

  function initGame() {
    selectedPetal = -1;
    selectionTime = 0;
    entranceProgress = 0;
    mandalaRotation = 0;
    sandParticles = [];

    // Create answer petals as stacked buttons below the mandala
    const petalW = 330;
    const petalH = 58;
    const petalGap = 8;
    const petalX = (W - petalW) / 2;
    const petalStartY = 310;

    petals = QUESTION.choices.map((choice, i) => ({
      x: petalX,
      y: petalStartY + i * (petalH + petalGap),
      w: petalW,
      h: petalH,
      choice: choice,
      color: PETAL_COLORS[i],
      scale: 0,
      alpha: 0,
      offsetX: 0,
      wrappedText: [choice.text],
      fontSize: 16,
    }));

    // Sand particles orbiting mandala
    for (let i = 0; i < 60; i++) {
      sandParticles.push(createSandParticle());
    }

    recalculateTextSizing();
  }

  function createSandParticle() {
    const angle = Math.random() * Math.PI * 2;
    const dist = 20 + Math.random() * 80;
    return {
      x: CX + Math.cos(angle) * dist,
      y: CY + Math.sin(angle) * dist,
      size: 1 + Math.random() * 2,
      alpha: 0.3 + Math.random() * 0.4,
      speed: 0.15 + Math.random() * 0.35,
      angle: angle,
      dist: dist,
      color: ['#E8D4B8', '#C4A882', '#F5E6D0', '#A0896C'][Math.floor(Math.random() * 4)],
    };
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    // Entrance animation
    if (entranceProgress < 1) {
      entranceProgress = Math.min(1, entranceProgress + dt * 2.0);
      petals.forEach((petal, i) => {
        const delay = i * 0.1;
        const t = Math.max(0, Math.min(1, (entranceProgress - delay) / 0.35));
        const spring = 1 + Math.sin(t * Math.PI * 2) * 0.12 * (1 - t);
        petal.scale = t * spring;
        petal.alpha = Math.min(1, t * 1.5);
      });
    }

    // Slow mandala rotation
    mandalaRotation += dt * 0.2;

    // Orbit sand particles
    sandParticles.forEach(p => {
      p.angle += p.speed * dt;
      p.x = CX + Math.cos(p.angle) * p.dist;
      p.y = CY + Math.sin(p.angle) * p.dist;
    });

    // Selection delay before ending
    if (selectedPetal >= 0) {
      selectionTime += dt;
      if (selectionTime > 0.6) {
        const choice = petals[selectedPetal].choice;
        playSound(choice.is_correct ? 'correct' : 'wrong');
        engine.end(choice.is_correct, choice.explanation);
      }
    }
  }

  function drawGame() {
    // Fill entire background warm sand color
    ctx.fillStyle = COLORS.bgPrimary;
    ctx.fillRect(0, 0, W, H);

    // Warm glow behind mandala
    const grad = ctx.createRadialGradient(CX, CY, 10, CX, CY, MANDALA_R + 30);
    grad.addColorStop(0, '#FFF4ED');
    grad.addColorStop(0.7, '#FAFAF7');
    grad.addColorStop(1, COLORS.bgPrimary);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, CY + MANDALA_R + 40);

    // Draw sand particles
    sandParticles.forEach(p => {
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.size, p.size * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Draw mandala
    drawMandala();

    // Draw answer petals
    drawPetals();
  }

  function drawMandala() {
    ctx.save();
    ctx.translate(CX, CY);

    // Filled concentric rings
    const ringData = [
      { r: 88, color: '#F5E6D0', width: 3 },
      { r: 75, color: '#E8D4B8', width: 2.5 },
      { r: 62, color: '#E87A3E40', width: 2 },
      { r: 48, color: '#F5A74250', width: 2 },
      { r: 34, color: '#4ECDC440', width: 2 },
      { r: 20, color: '#FFB89D60', width: 1.5 },
    ];

    ringData.forEach(ring => {
      ctx.beginPath();
      ctx.ellipse(0, 0, ring.r, ring.r * aspectRatio, 0, 0, Math.PI * 2);
      ctx.strokeStyle = ring.color;
      ctx.lineWidth = ring.width;
      ctx.stroke();
    });

    // Outer layer: 10 petals
    drawPetalRing(80, 10, 18, 6, mandalaRotation, 0.5);

    // Middle layer: 8 petals
    drawPetalRing(55, 8, 14, 5, -mandalaRotation * 0.8, 0.6);

    // Inner layer: 6 petals
    drawPetalRing(30, 6, 10, 4, mandalaRotation * 1.2, 0.7);

    // Diamond accents between rings
    for (let i = 0; i < 12; i++) {
      const a = (i / 12) * Math.PI * 2 + mandalaRotation * 0.5;
      const dx = Math.cos(a) * 68;
      const dy = Math.sin(a) * 68;
      ctx.save();
      ctx.translate(dx, dy * aspectRatio);
      ctx.scale(1, aspectRatio);
      ctx.rotate(a);
      ctx.beginPath();
      ctx.moveTo(0, -3);
      ctx.lineTo(2, 0);
      ctx.lineTo(0, 3);
      ctx.lineTo(-2, 0);
      ctx.closePath();
      ctx.fillStyle = PETAL_COLORS[i % 4].fill + '90';
      ctx.fill();
      ctx.restore();
    }

    // Center ornament
    ctx.beginPath();
    ctx.ellipse(0, 0, 10, 10 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#FFF4ED';
    ctx.fill();
    ctx.strokeStyle = COLORS.orange;
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.beginPath();
    ctx.ellipse(0, 0, 5, 5 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fillStyle = COLORS.orange;
    ctx.fill();

    // Dot ring around center
    for (let i = 0; i < 8; i++) {
      const a = mandalaRotation * 0.6 + (i / 8) * Math.PI * 2;
      ctx.beginPath();
      ctx.ellipse(Math.cos(a) * 16, Math.sin(a) * 16 * aspectRatio, 2.5, 2.5 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fillStyle = PETAL_COLORS[i % 4].fill;
      ctx.fill();
    }

    ctx.restore();
  }

  function drawPetalRing(radius, count, petalLen, petalWid, rotation, opacity) {
    for (let i = 0; i < count; i++) {
      const angle = rotation + (i / count) * Math.PI * 2;
      const colorIdx = i % 4;

      ctx.save();
      ctx.scale(1, aspectRatio);
      ctx.rotate(angle);
      ctx.translate(radius, 0);

      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(petalWid, -petalLen * 0.4, 0, -petalLen);
      ctx.quadraticCurveTo(-petalWid, -petalLen * 0.4, 0, 0);
      ctx.closePath();

      ctx.globalAlpha = opacity;
      ctx.fillStyle = PETAL_COLORS[colorIdx].fill;
      ctx.fill();
      ctx.globalAlpha = opacity + 0.2;
      ctx.strokeStyle = PETAL_COLORS[colorIdx].border;
      ctx.lineWidth = 0.8;
      ctx.stroke();
      ctx.globalAlpha = 1;

      ctx.restore();
    }
  }

  function drawPetals() {
    petals.forEach((petal, i) => {
      if (petal.alpha <= 0) return;

      ctx.save();
      ctx.globalAlpha = petal.alpha;

      const isSelected = selectedPetal === i;
      const px = petal.x + petal.offsetX;
      const py = petal.y;

      // Scale animation from center of petal
      ctx.translate(px + petal.w / 2, py + petal.h / 2);
      ctx.scale(petal.scale, petal.scale);
      ctx.translate(-(px + petal.w / 2), -(py + petal.h / 2));

      // Determine fill and border colors
      let fillColor = COLORS.surface;
      let borderColor = COLORS.borderSubtle;
      let borderWidth = 1.5;

      if (isSelected && selectionTime > 0.3) {
        fillColor = petal.choice.is_correct ? '#E8F8E5' : '#FDECEB';
        borderColor = petal.choice.is_correct ? COLORS.success : COLORS.error;
        borderWidth = 2.5;
      } else if (isSelected) {
        fillColor = petal.color.light;
        borderColor = petal.color.fill;
        borderWidth = 2.5;
      }

      // Draw shadow manually (separate rect behind)
      ctx.fillStyle = 'rgba(0,0,0,0.06)';
      ctx.beginPath();
      ctx.roundRect(px + 1, py + 2, petal.w, petal.h, 14);
      ctx.fill();

      // Petal background fill
      ctx.fillStyle = fillColor;
      ctx.beginPath();
      ctx.roundRect(px, py, petal.w, petal.h, 14);
      ctx.fill();

      // Border
      ctx.strokeStyle = borderColor;
      ctx.lineWidth = borderWidth;
      ctx.beginPath();
      ctx.roundRect(px, py, petal.w, petal.h, 14);
      ctx.stroke();

      // Left color accent bar
      ctx.fillStyle = petal.color.fill;
      ctx.beginPath();
      ctx.roundRect(px + 3, py + 3, 6, petal.h - 6, [4, 0, 0, 4]);
      ctx.fill();

      // Answer text (wrapped)
      const lines = petal.wrappedText || [petal.choice.text];
      const fontSize = petal.fontSize || 16;
      const lineHeight = fontSize + 3;
      const textStartY = py + petal.h / 2 - ((lines.length - 1) * lineHeight) / 2;

      lines.forEach((line, li) => {
        drawText(line, px + 20, textStartY + li * lineHeight, {
          font: `500 ${fontSize}px 'Nunito', sans-serif`,
          color: COLORS.textPrimary,
          align: 'left',
          baseline: 'middle',
        });
      });

      ctx.globalAlpha = 1;
      ctx.restore();
    });
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;
    if (selectedPetal >= 0) return;

    const touch = e.touches[0] || e.changedTouches[0];
    if (!touch) return;
    const { x, y } = screenToLogical(touch.clientX, touch.clientY);

    if (type === 'start') {
      if (audioCtx.state === 'suspended') audioCtx.resume();

      petals.forEach((petal, i) => {
        if (pointInRect(x, y, petal)) {
          playSound('click');
          selectedPetal = i;
          selectionTime = 0;

          // Pop animation
          petal.scale = 1.04;
          setTimeout(() => { if (petal) petal.scale = 1.0; }, 150);

          // Shake wrong answers after delay
          setTimeout(() => {
            if (!petal.choice.is_correct) {
              const shakeIntensity = 6;
              const shakeDuration = 300;
              const start = performance.now();
              const shakeAnim = (now) => {
                const t = Math.min((now - start) / shakeDuration, 1);
                const decay = 1 - t;
                petal.offsetX = Math.sin(t * Math.PI * 8) * shakeIntensity * decay;
                if (t < 1) requestAnimationFrame(shakeAnim);
                else petal.offsetX = 0;
              };
              requestAnimationFrame(shakeAnim);
            }
          }, 300);
        }
      });
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
