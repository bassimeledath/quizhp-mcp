<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Steampunk Gear Turn</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  const W = 360, H = 640;

  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;

  let gameState = 'playing';
  let gameResult = null;
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    aspectRatio = scaleX / scaleY;

    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  function drawText(text, x, y, options = {}) {
    const { font = "500 16px 'Nunito', sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  function drawEndScreen(dt) {
    endScreenTime += dt;

    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    if (gameResult) {
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - STEAMPUNK GEAR TURN                          ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgDark: '#1C1C1A',
    bgMid: '#2A2A27',
    bgWarm: '#2E2820',
    gearBronze: '#B87333',
    gearCopper: '#CD7F32',
    gearBrass: '#C9A84C',
    gearDark: '#6B4226',
    gearHighlight: '#DEB887',
    orange: '#E87A3E',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    textLight: '#F5F5F0',
    textDark: '#2B2B28',
    steam: 'rgba(200, 200, 190, 0.6)',
    rivet: '#8B7355',
    pipe: '#5A4A3A',
    pipeHighlight: '#8B7355'
  };

  // === SOUND ENGINE ===
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playClickSound() {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.type = 'square';
      osc.frequency.setValueAtTime(220, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(110, ac.currentTime + 0.08);
      gain.gain.setValueAtTime(0.15, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.12);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.12);

      // Metallic click
      const osc2 = ac.createOscillator();
      const gain2 = ac.createGain();
      osc2.connect(gain2);
      gain2.connect(ac.destination);
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(1800, ac.currentTime);
      osc2.frequency.exponentialRampToValueAtTime(600, ac.currentTime + 0.05);
      gain2.gain.setValueAtTime(0.1, ac.currentTime);
      gain2.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.08);
      osc2.start(ac.currentTime);
      osc2.stop(ac.currentTime + 0.08);
    } catch(e) {}
  }

  function playCorrectSound() {
    try {
      const ac = getAudioCtx();
      const notes = [523, 659, 784];
      notes.forEach((freq, i) => {
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, ac.currentTime + i * 0.12);
        gain.gain.setValueAtTime(0.12, ac.currentTime + i * 0.12);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + i * 0.12 + 0.3);
        osc.start(ac.currentTime + i * 0.12);
        osc.stop(ac.currentTime + i * 0.12 + 0.3);
      });
    } catch(e) {}
  }

  function playWrongSound() {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(80, ac.currentTime + 0.3);
      gain.gain.setValueAtTime(0.12, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.35);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.35);
    } catch(e) {}
  }

  function playSteamSound() {
    try {
      const ac = getAudioCtx();
      const bufferSize = ac.sampleRate * 0.3;
      const buffer = ac.createBuffer(1, bufferSize, ac.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ac.sampleRate * 0.08));
      }
      const source = ac.createBufferSource();
      source.buffer = buffer;
      const filter = ac.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 3000;
      filter.Q.value = 0.5;
      const gain = ac.createGain();
      gain.gain.setValueAtTime(0.08, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.3);
      source.connect(filter);
      filter.connect(gain);
      gain.connect(ac.destination);
      source.start(ac.currentTime);
    } catch(e) {}
  }

  // === GAME STATE ===
  let gears = [];
  let steamParticles = [];
  let backgroundGears = [];
  let selectedGearIndex = -1;
  let animTime = 0;
  let answered = false;
  let answerDelay = 0;

  // Gear layout: 2x2 grid - compact for mobile
  const GEAR_POSITIONS = [
    { cx: 95, cy: 130 },   // top-left
    { cx: 265, cy: 130 },  // top-right
    { cx: 95, cy: 395 },   // bottom-left
    { cx: 265, cy: 395 }   // bottom-right
  ];
  const GEAR_RADIUS = 52;
  const GEAR_TEETH = 12;

  // Text box below each gear
  const TEXT_BOX_W = 155;
  const TEXT_BOX_H = 88;

  function initGame() {
    gears = [];
    steamParticles = [];
    selectedGearIndex = -1;
    answered = false;
    answerDelay = 0;
    animTime = 0;

    const gearColors = [COLORS.gearBronze, COLORS.gearCopper, COLORS.gearBrass, COLORS.gearDark];
    const rotSpeeds = [0.3, -0.25, 0.35, -0.3];

    QUESTION.choices.forEach((choice, i) => {
      const pos = GEAR_POSITIONS[i];
      gears.push({
        cx: pos.cx,
        cy: pos.cy,
        radius: GEAR_RADIUS,
        teeth: GEAR_TEETH,
        rotation: Math.random() * Math.PI * 2,
        rotationSpeed: rotSpeeds[i],
        color: gearColors[i],
        choice: choice,
        locked: false,
        lockAnim: 0,
        scale: 0,
        alpha: 0,
        entranceDelay: i * 0.12,
        entranceTime: 0,
        shakeX: 0,
        shakeTime: 0,
        pulseScale: 1,
        // Text box for answer text
        textBox: {
          x: pos.cx - TEXT_BOX_W / 2,
          y: pos.cy + GEAR_RADIUS + 12,
          w: TEXT_BOX_W,
          h: TEXT_BOX_H
        },
        wrappedText: [],
        fontSize: 16
      });
    });

    // Background decorative small gears
    backgroundGears = [];
    for (let i = 0; i < 6; i++) {
      backgroundGears.push({
        cx: Math.random() * W,
        cy: Math.random() * H,
        radius: 10 + Math.random() * 18,
        teeth: 6 + Math.floor(Math.random() * 4),
        rotation: Math.random() * Math.PI * 2,
        rotationSpeed: (Math.random() - 0.5) * 0.5,
        alpha: 0.08 + Math.random() * 0.07
      });
    }

    recalculateTextSizing();
  }

  function recalculateTextSizing() {
    if (!gears || gears.length === 0) return;

    // Custom sizing that allows 4 lines for longer text
    gears.forEach((gear) => {
      const maxW = TEXT_BOX_W - 12;
      const maxH = TEXT_BOX_H - 6;
      let bestSize = 12;
      let bestLines = [];

      for (let fs = 16; fs >= 12; fs -= 0.5) {
        const font = `${fs}px 'Nunito', sans-serif`;
        const lines = wrapText(gear.choice.text, maxW, font, 4);
        const lineH = fs + 3;
        const totalH = lines.length * lineH;
        if (totalH <= maxH) {
          bestSize = fs;
          bestLines = lines;
          break;
        }
        bestLines = lines;
      }
      gear.wrappedText = bestLines;
      gear.fontSize = bestSize;
    });
  }

  function spawnSteam(x, y, count) {
    for (let i = 0; i < count; i++) {
      steamParticles.push({
        x: x + (Math.random() - 0.5) * 20,
        y: y + (Math.random() - 0.5) * 10,
        vx: (Math.random() - 0.5) * 40,
        vy: -30 - Math.random() * 60,
        size: 6 + Math.random() * 12,
        alpha: 0.5 + Math.random() * 0.3,
        life: 0.8 + Math.random() * 0.6
      });
    }
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    animTime += dt;

    // Entrance animations
    gears.forEach((gear) => {
      gear.entranceTime += dt;
      const t = Math.max(0, gear.entranceTime - gear.entranceDelay);
      if (t < 0.4) {
        const p = t / 0.4;
        const spring = 1 + Math.sin(p * Math.PI * 2) * 0.2 * (1 - p);
        gear.scale = p * spring;
        gear.alpha = Math.min(1, p * 2);
      } else {
        gear.scale = 1;
        gear.alpha = 1;
      }
    });

    // Rotate gears that aren't locked
    gears.forEach((gear) => {
      if (!gear.locked) {
        gear.rotation += gear.rotationSpeed * dt;
      } else {
        // Lock animation
        gear.lockAnim = Math.min(1, gear.lockAnim + dt * 4);
      }

      // Shake animation
      if (gear.shakeTime > 0) {
        gear.shakeTime -= dt;
        const decay = gear.shakeTime / 0.4;
        gear.shakeX = Math.sin(gear.shakeTime * Math.PI * 20) * 6 * decay;
      } else {
        gear.shakeX = 0;
      }

      // Pulse animation
      if (gear.pulseScale !== 1) {
        gear.pulseScale += (1 - gear.pulseScale) * dt * 8;
        if (Math.abs(gear.pulseScale - 1) < 0.01) gear.pulseScale = 1;
      }
    });

    // Update steam particles
    steamParticles = steamParticles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy -= 20 * dt;
      p.size += dt * 8;
      p.alpha -= dt * 0.8;
      p.life -= dt;
      return p.life > 0 && p.alpha > 0;
    });

    // Background gear rotation
    backgroundGears.forEach(g => {
      g.rotation += g.rotationSpeed * dt;
    });

    // Answer delay after selection
    if (answered && answerDelay > 0) {
      answerDelay -= dt;
      if (answerDelay <= 0) {
        const gear = gears[selectedGearIndex];
        if (gear.choice.is_correct) {
          playCorrectSound();
        } else {
          playWrongSound();
        }
        engine.end(gear.choice.is_correct, gear.choice.explanation);
      }
    }
  }

  function drawGear(cx, cy, radius, teeth, rotation, color, locked, lockAnim) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(1, aspectRatio);
    ctx.rotate(rotation);

    const innerR = radius * 0.7;
    const toothDepth = radius * 0.2;
    const toothWidth = Math.PI / teeth;

    // Gear shadow
    ctx.save();
    ctx.translate(2, 2);
    ctx.beginPath();
    for (let i = 0; i < teeth; i++) {
      const angle = (i / teeth) * Math.PI * 2;
      const nextAngle = ((i + 1) / teeth) * Math.PI * 2;
      const midAngle = angle + toothWidth;

      if (i === 0) {
        ctx.moveTo(Math.cos(angle) * innerR, Math.sin(angle) * innerR);
      }
      ctx.lineTo(Math.cos(angle) * (radius + toothDepth), Math.sin(angle) * (radius + toothDepth));
      ctx.lineTo(Math.cos(midAngle) * (radius + toothDepth), Math.sin(midAngle) * (radius + toothDepth));
      ctx.lineTo(Math.cos(midAngle) * innerR, Math.sin(midAngle) * innerR);
      ctx.lineTo(Math.cos(nextAngle) * innerR, Math.sin(nextAngle) * innerR);
    }
    ctx.closePath();
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fill();
    ctx.restore();

    // Main gear body
    ctx.beginPath();
    for (let i = 0; i < teeth; i++) {
      const angle = (i / teeth) * Math.PI * 2;
      const nextAngle = ((i + 1) / teeth) * Math.PI * 2;
      const midAngle = angle + toothWidth;

      if (i === 0) {
        ctx.moveTo(Math.cos(angle) * innerR, Math.sin(angle) * innerR);
      }
      ctx.lineTo(Math.cos(angle) * (radius + toothDepth), Math.sin(angle) * (radius + toothDepth));
      ctx.lineTo(Math.cos(midAngle) * (radius + toothDepth), Math.sin(midAngle) * (radius + toothDepth));
      ctx.lineTo(Math.cos(midAngle) * innerR, Math.sin(midAngle) * innerR);
      ctx.lineTo(Math.cos(nextAngle) * innerR, Math.sin(nextAngle) * innerR);
    }
    ctx.closePath();

    // Gradient fill
    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, radius + toothDepth);
    grad.addColorStop(0, COLORS.gearHighlight);
    grad.addColorStop(0.5, color);
    grad.addColorStop(1, locked ? '#5A3A1A' : color);
    ctx.fillStyle = grad;
    ctx.fill();

    // Gear outline
    ctx.strokeStyle = locked ? COLORS.success : '#4A3020';
    ctx.lineWidth = locked ? 2.5 : 1.5;
    ctx.stroke();

    // Center hub
    ctx.beginPath();
    ctx.arc(0, 0, radius * 0.25, 0, Math.PI * 2);
    ctx.fillStyle = locked ? '#4A6B3A' : '#4A3020';
    ctx.fill();
    ctx.strokeStyle = locked ? COLORS.success : '#6B5030';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Center hole
    ctx.beginPath();
    ctx.arc(0, 0, radius * 0.1, 0, Math.PI * 2);
    ctx.fillStyle = '#1C1C1A';
    ctx.fill();

    // Rivets on gear face
    for (let i = 0; i < 4; i++) {
      const ra = (i / 4) * Math.PI * 2;
      const rx = Math.cos(ra) * radius * 0.5;
      const ry = Math.sin(ra) * radius * 0.5;
      ctx.beginPath();
      ctx.arc(rx, ry, 3, 0, Math.PI * 2);
      ctx.fillStyle = COLORS.rivet;
      ctx.fill();
      ctx.strokeStyle = '#3A2A1A';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }

    // Lock indicator glow
    if (locked && lockAnim > 0) {
      ctx.beginPath();
      ctx.arc(0, 0, radius * 1.15, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(107, 191, 89, ${0.5 * (1 - lockAnim * 0.5)})`;
      ctx.lineWidth = 3;
      ctx.stroke();
    }

    ctx.restore();
  }

  function drawSteamParticle(p) {
    ctx.save();
    ctx.globalAlpha = p.alpha * 0.7;
    ctx.beginPath();
    ctx.ellipse(p.x, p.y, p.size, p.size * aspectRatio * 0.6, 0, 0, Math.PI * 2);
    ctx.fillStyle = COLORS.steam;
    ctx.fill();
    ctx.restore();
  }

  function drawBackground() {
    // Dark steampunk background gradient
    const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
    bgGrad.addColorStop(0, '#1C1C1A');
    bgGrad.addColorStop(0.5, '#2E2820');
    bgGrad.addColorStop(1, '#1C1C1A');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    // Subtle riveted plate pattern
    ctx.strokeStyle = 'rgba(90, 74, 58, 0.15)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 8; i++) {
      const y = i * 80 + 20;
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }

    // Decorative pipes at edges
    ctx.fillStyle = COLORS.pipe;
    ctx.fillRect(0, 0, 8, H);
    ctx.fillRect(W - 8, 0, 8, H);
    ctx.fillStyle = COLORS.pipeHighlight;
    ctx.fillRect(2, 0, 2, H);
    ctx.fillRect(W - 4, 0, 2, H);

    // Corner rivets
    const corners = [[20, 20], [W - 20, 20], [20, H - 20], [W - 20, H - 20]];
    corners.forEach(([rx, ry]) => {
      ctx.beginPath();
      ctx.ellipse(rx, ry, 4, 4 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fillStyle = COLORS.rivet;
      ctx.fill();
      ctx.strokeStyle = '#3A2A1A';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    });

    // Background gears (decorative, faded)
    backgroundGears.forEach(g => {
      ctx.save();
      ctx.globalAlpha = g.alpha;
      drawGear(g.cx, g.cy, g.radius, g.teeth, g.rotation, '#5A4A3A', false, 0);
      ctx.restore();
    });
  }

  function drawGame() {
    drawBackground();

    // Draw steam particles behind gears
    steamParticles.forEach(drawSteamParticle);

    // Draw gears and text boxes
    gears.forEach((gear, i) => {
      if (gear.alpha <= 0) return;

      ctx.save();
      ctx.globalAlpha = gear.alpha;

      const drawX = gear.cx + gear.shakeX;
      const drawScale = gear.scale * gear.pulseScale;

      ctx.save();
      ctx.translate(drawX, gear.cy);
      ctx.scale(drawScale, drawScale);
      ctx.translate(-drawX, -gear.cy);

      // Highlight if this gear is the selected one
      if (gear.locked) {
        // Locked glow
        ctx.save();
        ctx.shadowColor = COLORS.success;
        ctx.shadowBlur = 15;
        drawGear(drawX, gear.cy, gear.radius, gear.teeth, gear.rotation, gear.color, true, gear.lockAnim);
        ctx.restore();
      } else {
        drawGear(drawX, gear.cy, gear.radius, gear.teeth, gear.rotation, gear.color, false, 0);
      }

      ctx.restore();

      // Label letter on gear (A, B, C, D)
      const label = String.fromCharCode(65 + i);
      drawText(label, drawX, gear.cy, {
        font: "700 22px 'Belanosima', sans-serif",
        color: gear.locked ? COLORS.success : COLORS.textLight,
        align: 'center',
        baseline: 'middle'
      });

      // Text box under gear
      const tb = gear.textBox;
      const tbX = tb.x + gear.shakeX;

      // Box background
      ctx.save();
      ctx.globalAlpha = gear.alpha * 0.85;
      ctx.beginPath();
      ctx.roundRect(tbX, tb.y, tb.w, tb.h, 8);
      if (gear.locked) {
        ctx.fillStyle = gear.choice.is_correct ? 'rgba(107, 191, 89, 0.15)' : 'rgba(232, 93, 74, 0.15)';
      } else {
        ctx.fillStyle = 'rgba(42, 42, 39, 0.7)';
      }
      ctx.fill();
      ctx.strokeStyle = gear.locked
        ? (gear.choice.is_correct ? COLORS.success : COLORS.error)
        : 'rgba(139, 115, 85, 0.4)';
      ctx.lineWidth = gear.locked ? 1.5 : 0.8;
      ctx.stroke();
      ctx.restore();

      // Wrapped answer text
      const lines = gear.wrappedText || [gear.choice.text];
      const fs = gear.fontSize || 16;
      const lineH = fs + 3;
      const totalTextH = lines.length * lineH;
      const textStartY = tb.y + (tb.h - totalTextH) / 2 + fs / 2;

      lines.forEach((line, li) => {
        drawText(line, tbX + tb.w / 2, textStartY + li * lineH, {
          font: `500 ${fs}px 'Nunito', sans-serif`,
          color: gear.locked
            ? (gear.choice.is_correct ? COLORS.success : COLORS.error)
            : COLORS.textLight,
          align: 'center',
          baseline: 'middle'
        });
      });

      ctx.restore();
    });
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;
    if (answered) return;

    if (type === 'start') {
      const touch = e.touches ? e.touches[0] : e.changedTouches[0];
      if (!touch) return;
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      gears.forEach((gear, i) => {
        if (gear.locked) return;

        // Check if tap is on gear or its text box
        const dx = x - gear.cx;
        const dy = y - gear.cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const hitGear = dist < gear.radius + 15;
        const hitTextBox = pointInRect(x, y, gear.textBox);

        if (hitGear || hitTextBox) {
          // Lock this gear
          gear.locked = true;
          gear.pulseScale = 1.15;
          selectedGearIndex = i;
          answered = true;
          answerDelay = 0.7;

          playClickSound();
          setTimeout(() => playSteamSound(), 100);

          // Spawn steam puffs around the gear
          spawnSteam(gear.cx, gear.cy - gear.radius, 15);
          spawnSteam(gear.cx - gear.radius, gear.cy, 10);
          spawnSteam(gear.cx + gear.radius, gear.cy, 10);
        }
      });
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;

    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame();
      drawEndScreen(dt);
    }

    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100);
  });

  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
