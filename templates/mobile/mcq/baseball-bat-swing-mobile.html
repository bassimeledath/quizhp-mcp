<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Baseball Bat Swing</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE - MOBILE                                              ║
  ║  Fills 100% of container, non-uniform scaling, touch input.                  ║
  ║  Logical dimensions: 360×640 (use aspectRatio for proportional shapes)       ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none; /* Prevent default touch behaviors */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      /* Canvas fills viewport via JS, these are fallbacks */
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill viewport
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   *
   * @param {string} text - The text to wrap
   * @param {number} maxWidth - Maximum width in logical coordinates
   * @param {string} font - CSS font string (e.g., "16px 'Nunito', sans-serif")
   * @param {number} maxLines - Maximum number of lines (default 3)
   * @returns {string[]} Array of text lines
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   * Tries font sizes from max to min until content fits.
   *
   * @param {Object} options
   * @param {string[]} options.texts - Array of text strings to fit
   * @param {number} options.maxWidth - Maximum width for text wrapping
   * @param {number} options.availableHeight - Total height available for all texts
   * @param {number} options.minFont - Minimum font size (default 12)
   * @param {number} options.maxFont - Maximum font size (default 18)
   * @param {number} options.itemPadding - Vertical padding per text item (default 4)
   * @param {string} options.fontFamily - Font family (default "'Nunito Sans', sans-serif")
   * @returns {{ fontSize: number, wrappedTexts: string[][] }} Optimal font size and pre-wrapped texts
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === QUIZHP COLOR PALETTE ===
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC'
  };

  // === SOUND EFFECTS (Web Audio API) ===
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'swing') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(150, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.15);
    } else if (type === 'hit') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(300, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.08);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.2);
    } else if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    }
  }

  // === GAME PARTICLES ===
  let gameParticles = [];

  function spawnHitParticles(x, y) {
    const colors = [COLORS.orange, COLORS.amber, COLORS.cyan, '#FFFFFF'];
    for (let i = 0; i < 15; i++) {
      gameParticles.push({
        x, y,
        vx: (Math.random() - 0.5) * 200,
        vy: (Math.random() - 0.5) * 200 - 100,
        size: 3 + Math.random() * 4,
        color: colors[Math.floor(Math.random() * colors.length)],
        alpha: 1,
        life: 0.6
      });
    }
  }

  function updateGameParticles(dt) {
    gameParticles = gameParticles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 300 * dt;
      p.life -= dt;
      p.alpha = Math.max(0, p.life / 0.6);
      return p.life > 0;
    });
  }

  function drawGameParticles() {
    gameParticles.forEach(p => {
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.size, p.size * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  // === ANIMATION HELPERS ===
  let zoneAnimations = [];

  function animateZoneEntrance() {
    outfieldZones.forEach((zone, i) => {
      zone.scale = 0;
      zone.alpha = 0;
      const delay = i * 80;
      setTimeout(() => {
        const startTime = performance.now();
        const duration = 350;
        function animate() {
          const elapsed = performance.now() - startTime;
          const t = Math.min(elapsed / duration, 1);
          const spring = 1 + Math.sin(t * Math.PI * 2) * 0.15 * (1 - t);
          zone.scale = t * spring;
          zone.alpha = t;
          if (t < 1) requestAnimationFrame(animate);
          else { zone.scale = 1; zone.alpha = 1; }
        }
        animate();
      }, delay);
    });
  }

  function shakeZone(zone, intensity = 6) {
    const originalX = zone.x;
    const startTime = performance.now();
    const duration = 400;
    function animate() {
      const elapsed = performance.now() - startTime;
      const t = Math.min(elapsed / duration, 1);
      const decay = 1 - t;
      zone.x = originalX + Math.sin(t * Math.PI * 10) * intensity * decay;
      if (t < 1) requestAnimationFrame(animate);
      else zone.x = originalX;
    }
    animate();
  }

  function celebrateZone(zone) {
    const startTime = performance.now();
    const duration = 500;
    function animate() {
      const elapsed = performance.now() - startTime;
      const t = Math.min(elapsed / duration, 1);
      zone.scale = 1 + 0.15 * Math.sin(t * Math.PI);
      zone.wobble = Math.sin(t * Math.PI * 6) * (1 - t) * 0.05;
      if (t < 1) requestAnimationFrame(animate);
      else { zone.scale = 1; zone.wobble = 0; }
    }
    animate();
  }

  // === GAME STATE ===
  let ball = { x: 0, y: 0, vx: 0, vy: 0, active: false, hit: false };
  let pitcher = { x: W / 2, y: 120, animPhase: 0 };
  let batter = { x: W / 2, y: 520, swingPhase: 0, isSwinging: false };
  let outfieldZones = [];
  let pitchTimer = 0;
  let pitchSpeed = 280;
  let strikeZoneY = 500;
  let swingWindowStart = 0;
  let ballLanded = false;
  let selectedZone = -1;
  let fontSize = 16;

  function initGame() {
    initAudio();
    gameParticles = [];

    // Reset state
    ball = { x: W / 2, y: 120, vx: 0, vy: 0, active: false, hit: false };
    pitcher = { x: W / 2, y: 120, animPhase: 0 };
    batter = { x: W / 2, y: 520, swingPhase: 0, isSwinging: false };
    pitchTimer = 0;
    ballLanded = false;
    selectedZone = -1;

    // Create four outfield zones - arranged in arc at top
    // Zones from left to right: 0=left field, 1=center-left, 2=center-right, 3=right field
    const zoneWidth = 80;
    const zoneHeight = 70;
    const startX = 10;
    const zoneY = 30;

    outfieldZones = QUESTION.choices.map((choice, i) => ({
      x: startX + i * (zoneWidth + 6),
      y: zoneY,
      w: zoneWidth,
      h: zoneHeight,
      choice: choice,
      index: i,
      wrappedText: [],
      highlight: 0,
      scale: 0,
      alpha: 0,
      wobble: 0
    }));

    recalculateTextSizing();
    animateZoneEntrance();

    // Start pitch after short delay
    setTimeout(() => {
      if (gameState === 'playing' && !ball.active) {
        ball.active = true;
        ball.x = W / 2;
        ball.y = 150;
        ball.vy = pitchSpeed;
        ball.vx = 0;
      }
    }, 800);
  }

  function recalculateTextSizing() {
    if (!outfieldZones || outfieldZones.length === 0) return;

    const zoneWidth = 70; // text area within zone
    const zoneTextHeight = 55;

    const { fontSize: fs, wrappedTexts } = findOptimalFontSize({
      texts: QUESTION.choices.map(c => c.text),
      maxWidth: zoneWidth,
      availableHeight: zoneTextHeight,
      minFont: 10,
      maxFont: 14,
      itemPadding: 2,
      fontFamily: "'Nunito', sans-serif"
    });

    fontSize = fs;
    outfieldZones.forEach((zone, i) => {
      zone.wrappedText = wrappedTexts[i];
    });
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    // Update particles
    updateGameParticles(dt);

    // Pitcher wind-up animation
    pitcher.animPhase += dt * 3;

    // Update ball
    if (ball.active && !ball.hit) {
      ball.y += ball.vy * dt;
      ball.x += ball.vx * dt;

      // Check if ball reached strike zone without swing
      if (ball.y >= strikeZoneY && !batter.isSwinging) {
        // Ball passed - missed opportunity, reset
        ball.active = false;
        setTimeout(() => {
          if (gameState === 'playing') {
            ball.active = true;
            ball.x = W / 2;
            ball.y = 150;
            ball.vy = pitchSpeed;
            ball.vx = 0;
          }
        }, 500);
      }
    }

    // Handle swing
    if (batter.isSwinging) {
      batter.swingPhase += dt * 12;

      // Check hit timing when swing is at contact point
      if (batter.swingPhase >= 0.5 && batter.swingPhase < 0.6 && ball.active && !ball.hit) {
        const ballDistToStrike = Math.abs(ball.y - strikeZoneY);

        if (ballDistToStrike < 60) {
          // Hit! Determine direction based on timing
          ball.hit = true;
          playSound('hit');
          spawnHitParticles(ball.x, ball.y);

          // Calculate timing: early swing = pull left, late swing = push right
          const timingOffset = ball.y - strikeZoneY; // negative = early, positive = late

          // Map timing to zone (0-3)
          let targetZone;
          if (timingOffset < -30) {
            targetZone = 0; // Very early = far left
          } else if (timingOffset < -10) {
            targetZone = 1; // Early = center-left
          } else if (timingOffset < 10) {
            targetZone = 2; // Perfect = center-right
          } else {
            targetZone = 3; // Late = far right
          }

          selectedZone = targetZone;
          const zone = outfieldZones[targetZone];

          // Calculate ball trajectory to that zone
          const targetX = zone.x + zone.w / 2;
          const targetY = zone.y + zone.h / 2;

          ball.vy = -350;
          ball.vx = (targetX - ball.x) * 2;
        }
      }

      // End swing animation
      if (batter.swingPhase >= 1.2) {
        batter.isSwinging = false;
        batter.swingPhase = 0;
      }
    }

    // Ball flying to outfield
    if (ball.hit && !ballLanded) {
      ball.y += ball.vy * dt;
      ball.x += ball.vx * dt;
      ball.vy += 200 * dt; // gravity pulls it down

      // Check if ball landed in a zone
      if (ball.y < 120) {
        ballLanded = true;

        // Find which zone the ball is in
        const zone = outfieldZones[selectedZone];
        zone.highlight = 1;

        if (zone.choice.is_correct) {
          playSound('correct');
          celebrateZone(zone);
        } else {
          playSound('wrong');
          shakeZone(zone);
        }

        setTimeout(() => {
          if (gameState === 'playing') {
            engine.end(zone.choice.is_correct, zone.choice.explanation);
          }
        }, 400);
      }
    }

    // Animate zone highlights
    outfieldZones.forEach(zone => {
      if (zone.highlight > 0) {
        zone.highlight = Math.min(zone.highlight + dt * 3, 1);
      }
    });
  }

  function drawGame() {
    // Sky gradient background (baseball field)
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, '#87CEEB');
    skyGrad.addColorStop(0.4, COLORS.cyan);
    skyGrad.addColorStop(1, COLORS.success);
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    // Draw outfield grass pattern
    ctx.fillStyle = '#2E8B57';
    ctx.beginPath();
    ctx.moveTo(0, 200);
    ctx.lineTo(W / 2, 450);
    ctx.lineTo(W, 200);
    ctx.lineTo(W, 0);
    ctx.lineTo(0, 0);
    ctx.closePath();
    ctx.fill();

    // Draw infield diamond
    ctx.fillStyle = '#DEB887';
    ctx.beginPath();
    ctx.moveTo(W / 2, 450); // Home
    ctx.lineTo(W / 2 + 80, 380); // First
    ctx.lineTo(W / 2, 310); // Second
    ctx.lineTo(W / 2 - 80, 380); // Third
    ctx.closePath();
    ctx.fill();

    // Draw outfield zones (answer areas)
    outfieldZones.forEach((zone, i) => {
      ctx.save();

      // Apply animations
      const scale = zone.scale !== undefined ? zone.scale : 1;
      const alpha = zone.alpha !== undefined ? zone.alpha : 1;
      const wobble = zone.wobble || 0;

      ctx.globalAlpha = alpha;
      ctx.translate(zone.x + zone.w / 2, zone.y + zone.h / 2);
      ctx.scale(scale, scale);
      ctx.rotate(wobble);
      ctx.translate(-(zone.x + zone.w / 2), -(zone.y + zone.h / 2));

      // Zone background
      const isSelected = selectedZone === i;
      let bgColor = COLORS.bgSurface;
      let borderColor = COLORS.borderSubtle;

      if (isSelected && zone.highlight > 0) {
        if (zone.choice.is_correct) {
          bgColor = '#E8F8E5';
          borderColor = COLORS.success;
        } else {
          bgColor = '#FDECEB';
          borderColor = COLORS.error;
        }
      }

      ctx.fillStyle = bgColor;
      ctx.beginPath();
      ctx.roundRect(zone.x, zone.y, zone.w, zone.h, 8);
      ctx.fill();

      // Zone border
      ctx.strokeStyle = borderColor;
      ctx.lineWidth = isSelected ? 3 : 2;
      ctx.stroke();

      // Zone label (A, B, C, D)
      const label = String.fromCharCode(65 + i);
      drawText(label, zone.x + zone.w / 2, zone.y + 12, {
        font: `bold 14px 'Nunito Sans', sans-serif`,
        color: COLORS.orange
      });

      // Answer text (wrapped)
      const lines = zone.wrappedText || [zone.choice.text];
      const lineHeight = fontSize + 2;
      const startY = zone.y + 26;

      lines.forEach((line, lineIdx) => {
        drawText(line, zone.x + zone.w / 2, startY + lineIdx * lineHeight, {
          font: `${fontSize}px 'Nunito', sans-serif`,
          color: COLORS.textPrimary
        });
      });

      ctx.restore();
    });

    // Draw pitcher mound
    ctx.fillStyle = '#DEB887';
    ctx.beginPath();
    ctx.ellipse(pitcher.x, pitcher.y + 40, 25, 15 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Draw pitcher (simple stick figure)
    ctx.fillStyle = COLORS.textPrimary;
    ctx.beginPath();
    ctx.ellipse(pitcher.x, pitcher.y, 12, 12 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Pitcher body
    ctx.strokeStyle = COLORS.textPrimary;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(pitcher.x, pitcher.y + 12);
    ctx.lineTo(pitcher.x, pitcher.y + 45);
    ctx.stroke();

    // Pitcher arm (animated)
    const armAngle = Math.sin(pitcher.animPhase) * 0.3 - 0.5;
    ctx.beginPath();
    ctx.moveTo(pitcher.x, pitcher.y + 20);
    ctx.lineTo(pitcher.x + Math.cos(armAngle) * 20, pitcher.y + 20 + Math.sin(armAngle) * 20);
    ctx.stroke();

    // Draw home plate
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath();
    ctx.moveTo(W / 2, 540);
    ctx.lineTo(W / 2 + 15, 550);
    ctx.lineTo(W / 2 + 15, 560);
    ctx.lineTo(W / 2 - 15, 560);
    ctx.lineTo(W / 2 - 15, 550);
    ctx.closePath();
    ctx.fill();

    // Draw batter
    ctx.fillStyle = COLORS.orange;
    ctx.beginPath();
    ctx.ellipse(batter.x - 30, batter.y, 10, 10 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Batter body
    ctx.strokeStyle = COLORS.orange;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(batter.x - 30, batter.y + 10);
    ctx.lineTo(batter.x - 30, batter.y + 45);
    ctx.stroke();

    // Batter bat
    ctx.strokeStyle = COLORS.amber;
    ctx.lineWidth = 5;
    ctx.beginPath();

    if (batter.isSwinging) {
      // Swing animation
      const swingAngle = -Math.PI / 2 + batter.swingPhase * Math.PI * 1.5;
      ctx.moveTo(batter.x - 30, batter.y + 15);
      ctx.lineTo(
        batter.x - 30 + Math.cos(swingAngle) * 40,
        batter.y + 15 + Math.sin(swingAngle) * 40
      );
    } else {
      // Ready position
      ctx.moveTo(batter.x - 30, batter.y + 15);
      ctx.lineTo(batter.x - 50, batter.y - 10);
    }
    ctx.stroke();

    // Draw ball
    if (ball.active) {
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      ctx.ellipse(ball.x, ball.y, 8, 8 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();

      // Ball stitching
      ctx.strokeStyle = COLORS.error;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.ellipse(ball.x, ball.y, 6, 4 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Draw game particles
    drawGameParticles();

    // Draw strike zone indicator
    if (ball.active && !ball.hit) {
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
      ctx.lineWidth = 2;
      ctx.setLineDash([5, 5]);
      ctx.strokeRect(W / 2 - 30, strikeZoneY - 30, 60, 60);
      ctx.setLineDash([]);
    }

    // Swing prompt
    if (ball.active && !ball.hit && ball.y > 200 && ball.y < 450) {
      const pulseScale = 1 + Math.sin(Date.now() / 100) * 0.05;
      ctx.save();
      ctx.translate(W / 2, H - 50);
      ctx.scale(pulseScale, pulseScale);
      ctx.translate(-W / 2, -(H - 50));
      drawText('TAP TO SWING!', W / 2, H - 50, {
        font: `bold 20px 'Belanosima', sans-serif`,
        color: '#FFFFFF'
      });
      ctx.restore();
    }
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;

    if (type === 'start') {
      initAudio();
      // Swing the bat
      if (ball.active && !ball.hit && !batter.isSwinging) {
        batter.isSwinging = true;
        batter.swingPhase = 0;
        playSound('swing');
      }
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
