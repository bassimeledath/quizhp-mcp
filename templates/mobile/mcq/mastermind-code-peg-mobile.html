<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Mastermind Code Peg</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = "bold 18px 'Nunito Sans', system-ui, sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px 'Nunito', sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   *
   * @param {string} text - The text to wrap
   * @param {number} maxWidth - Maximum width in logical coordinates
   * @param {string} font - CSS font string (e.g., "16px 'Nunito', sans-serif")
   * @param {number} maxLines - Maximum number of lines (default 3)
   * @returns {string[]} Array of text lines
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   * Tries font sizes from max to min until content fits.
   *
   * @param {Object} options
   * @param {string[]} options.texts - Array of text strings to fit
   * @param {number} options.maxWidth - Maximum width for text wrapping
   * @param {number} options.availableHeight - Total height available for all texts
   * @param {number} options.minFont - Minimum font size (default 12)
   * @param {number} options.maxFont - Maximum font size (default 18)
   * @param {number} options.itemPadding - Vertical padding per text item (default 4)
   * @param {string} options.fontFamily - Font family (default "'Nunito Sans', sans-serif")
   * @returns {{ fontSize: number, wrappedTexts: string[][] }} Optimal font size and pre-wrapped texts
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = "bold 32px 'Belanosima', system-ui, sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === GAME STATE ===
  // Mastermind board colors
  const PEG_COLORS = ['#E85D4A', '#4ECDC4', '#F5A742', '#6BBF59']; // Red, Cyan, Amber, Green
  const BOARD_COLOR = '#5D4E37'; // Brown board
  const SLOT_COLOR = '#3D3529'; // Darker slot holes
  const FEEDBACK_BLACK = '#2B2B28';
  const FEEDBACK_WHITE = '#F5F5F0';

  // Game state
  let board = [];       // Previous "guesses" (simulated history)
  let currentRow = 0;   // Current row player is guessing on
  let pegs = [];        // Selectable pegs at bottom (answer choices)
  let selectedPeg = -1; // Currently dragging peg
  let dragPos = null;   // Current drag position
  let animTime = 0;     // Animation timer
  let gameParticles = []; // Celebration particles

  // Board layout - more compact to fit 2x2 answer grid below
  const BOARD_X = 50;
  const BOARD_Y = 20;
  const BOARD_WIDTH = 260;
  const BOARD_HEIGHT = 300;
  const ROW_COUNT = 5;
  const SLOT_COUNT = 4;
  const PEG_RADIUS = 14;
  const SLOT_RADIUS = 16;

  // Feedback peg layout
  const FEEDBACK_RADIUS = 6;

  // Sound effects
  let audioCtx = null;

  function playSound(type) {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'click') {
      osc.frequency.value = 440;
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialDecayTo && gain.gain.exponentialDecayTo(0.01, audioCtx.currentTime + 0.1);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'correct') {
      osc.frequency.value = 523;
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      osc.start();
      setTimeout(() => { osc.frequency.value = 659; }, 100);
      setTimeout(() => { osc.frequency.value = 784; }, 200);
      osc.stop(audioCtx.currentTime + 0.3);
    } else if (type === 'wrong') {
      osc.frequency.value = 200;
      osc.type = 'sawtooth';
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.2);
    }
  }

  // Generate random feedback for history rows (visual decoration)
  function generateFeedback() {
    const blacks = Math.floor(Math.random() * 3);
    const whites = Math.floor(Math.random() * (4 - blacks));
    return { blacks, whites };
  }

  function initGame() {
    animTime = 0;
    selectedPeg = -1;
    dragPos = null;

    // Generate simulated history (previous "guesses")
    board = [];
    currentRow = Math.floor(Math.random() * 3) + 2; // 2-4 previous guesses shown

    for (let i = 0; i < currentRow; i++) {
      const rowPegs = [];
      for (let j = 0; j < SLOT_COUNT; j++) {
        rowPegs.push(Math.floor(Math.random() * 4));
      }
      board.push({
        pegs: rowPegs,
        feedback: generateFeedback()
      });
    }

    // Setup selectable pegs (answer choices) at bottom - 2x2 grid layout
    // Place pegs at the outer edges with text flowing toward center
    const pegStartY = BOARD_Y + BOARD_HEIGHT + 60;
    const pegSpacingY = 95;

    pegs = QUESTION.choices.map((choice, i) => {
      const col = i % 2;
      const row = Math.floor(i / 2);
      // Pegs on far left and far right
      const x = col === 0 ? 32 : W - 32;
      const y = pegStartY + row * pegSpacingY;

      return {
        choice: choice,
        colorIndex: i,
        baseX: x,
        baseY: y,
        x: x,
        y: y,
        radius: 24,
        bounceOffset: 0,
        bouncePhase: i * 0.5,
        wrappedText: null,
        fontSize: 14,
        col: col,
        // Entrance animation
        entranceProgress: 0,
        entranceDelay: i * 0.1,
        scale: 0
      };
    });

    gameParticles = [];

    // Recalculate text sizing
    recalculateTextSizing();
  }

  function recalculateTextSizing() {
    if (!pegs || pegs.length === 0) return;

    // For the peg labels next to each peg
    // Each column gets ~120px width, with proper spacing to center
    const { fontSize, wrappedTexts } = findOptimalFontSize({
      texts: QUESTION.choices.map(c => c.text),
      maxWidth: 120,
      availableHeight: 85,
      minFont: 12,
      maxFont: 14,
      fontFamily: "'Nunito', sans-serif"
    });

    pegs.forEach((peg, i) => {
      peg.wrappedText = wrappedTexts[i];
      peg.fontSize = fontSize;
    });
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    animTime += dt;

    // Animate pegs with entrance animation and subtle bounce
    pegs.forEach((peg, i) => {
      // Entrance animation with spring easing
      if (peg.entranceProgress < 1) {
        const elapsed = animTime - peg.entranceDelay;
        if (elapsed > 0) {
          peg.entranceProgress = Math.min(1, elapsed / 0.4);
          // Spring easing
          const t = peg.entranceProgress;
          const spring = 1 + Math.sin(t * Math.PI * 2) * 0.3 * (1 - t);
          peg.scale = t * spring;
        }
      } else {
        peg.scale = 1;
      }

      // Subtle bounce after entrance complete
      if (peg.entranceProgress >= 1) {
        peg.bounceOffset = Math.sin(animTime * 2 + peg.bouncePhase) * 3;
      }
    });

    // Update celebration particles
    gameParticles = gameParticles.filter(p => {
      p.vy += 400 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.alpha -= dt * 0.8;
      return p.alpha > 0 && p.y < H + 50;
    });
  }

  function drawPeg(x, y, radius, colorIndex, shadow = true) {
    const color = PEG_COLORS[colorIndex];

    // Shadow
    if (shadow) {
      ctx.beginPath();
      ctx.ellipse(x + 3, y + 3, radius, radius * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fill();
    }

    // Main peg
    ctx.beginPath();
    ctx.ellipse(x, y, radius, radius * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();

    // Highlight
    ctx.beginPath();
    ctx.ellipse(x - radius * 0.3, y - radius * 0.3 * aspectRatio, radius * 0.4, radius * 0.4 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fill();
  }

  function drawSlot(x, y, radius) {
    ctx.beginPath();
    ctx.ellipse(x, y, radius, radius * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fillStyle = SLOT_COLOR;
    ctx.fill();

    // Inner shadow
    ctx.beginPath();
    ctx.ellipse(x, y, radius * 0.8, radius * 0.8 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fill();
  }

  function drawFeedbackPegs(x, y, feedback) {
    const positions = [
      { dx: -8, dy: -8 },
      { dx: 8, dy: -8 },
      { dx: -8, dy: 8 },
      { dx: 8, dy: 8 }
    ];

    let pegIndex = 0;

    // Draw black pegs (right color, right position)
    for (let i = 0; i < feedback.blacks; i++) {
      const pos = positions[pegIndex++];
      ctx.beginPath();
      ctx.ellipse(x + pos.dx, y + pos.dy * aspectRatio, FEEDBACK_RADIUS, FEEDBACK_RADIUS * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fillStyle = FEEDBACK_BLACK;
      ctx.fill();
    }

    // Draw white pegs (right color, wrong position)
    for (let i = 0; i < feedback.whites; i++) {
      const pos = positions[pegIndex++];
      ctx.beginPath();
      ctx.ellipse(x + pos.dx, y + pos.dy * aspectRatio, FEEDBACK_RADIUS, FEEDBACK_RADIUS * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fillStyle = FEEDBACK_WHITE;
      ctx.fill();
    }

    // Draw empty holes for remaining
    for (let i = pegIndex; i < 4; i++) {
      const pos = positions[i];
      ctx.beginPath();
      ctx.ellipse(x + pos.dx, y + pos.dy * aspectRatio, FEEDBACK_RADIUS * 0.7, FEEDBACK_RADIUS * 0.7 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.fill();
    }
  }

  function drawGame() {
    // Background
    ctx.fillStyle = '#FAFAF7';
    ctx.fillRect(0, 0, W, H);

    // Board background
    ctx.fillStyle = BOARD_COLOR;
    ctx.beginPath();
    ctx.roundRect(BOARD_X, BOARD_Y, BOARD_WIDTH, BOARD_HEIGHT, 12);
    ctx.fill();

    // Board border/shadow
    ctx.strokeStyle = '#4A3D2A';
    ctx.lineWidth = 3;
    ctx.stroke();

    // Draw rows from bottom to top
    const rowHeight = (BOARD_HEIGHT - 40) / ROW_COUNT;
    const slotSpacing = (BOARD_WIDTH - 80) / (SLOT_COUNT - 1);

    for (let row = 0; row < ROW_COUNT; row++) {
      const rowY = BOARD_Y + BOARD_HEIGHT - 30 - row * rowHeight;
      const isCurrentRow = row === currentRow;
      const isHistoryRow = row < currentRow;

      // Row indicator for current row
      if (isCurrentRow) {
        ctx.fillStyle = 'rgba(232, 122, 62, 0.2)';
        ctx.beginPath();
        ctx.roundRect(BOARD_X + 5, rowY - rowHeight/2 + 5, BOARD_WIDTH - 10, rowHeight - 10, 8);
        ctx.fill();

        // Arrow indicator
        ctx.fillStyle = '#E87A3E';
        ctx.beginPath();
        ctx.moveTo(BOARD_X - 15, rowY);
        ctx.lineTo(BOARD_X - 5, rowY - 8);
        ctx.lineTo(BOARD_X - 5, rowY + 8);
        ctx.closePath();
        ctx.fill();
      }

      // Draw slots
      for (let slot = 0; slot < SLOT_COUNT; slot++) {
        const slotX = BOARD_X + 50 + slot * slotSpacing;

        drawSlot(slotX, rowY, SLOT_RADIUS);

        // Draw history pegs
        if (isHistoryRow && board[row]) {
          drawPeg(slotX, rowY, PEG_RADIUS, board[row].pegs[slot]);
        }
      }

      // Draw feedback area for history rows
      if (isHistoryRow && board[row]) {
        const feedbackX = BOARD_X + BOARD_WIDTH - 35;
        drawFeedbackPegs(feedbackX, rowY, board[row].feedback);
      }
    }

    // Draw divider line
    ctx.strokeStyle = '#4A3D2A';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(BOARD_X, BOARD_Y + BOARD_HEIGHT + 15);
    ctx.lineTo(BOARD_X + BOARD_WIDTH, BOARD_Y + BOARD_HEIGHT + 15);
    ctx.stroke();

    // Draw "Tap a peg to answer" text - above the pegs, centered
    drawText('Tap a peg to answer', W / 2, BOARD_Y + BOARD_HEIGHT + 35, {
      font: "600 14px 'Nunito Sans', sans-serif",
      color: '#5A5A54'
    });

    // Draw selectable pegs at bottom in 2x2 grid
    pegs.forEach((peg, i) => {
      if (peg.scale <= 0) return; // Don't draw if not visible yet

      const y = peg.baseY + peg.bounceOffset;
      const col = peg.col;

      // Apply scale for entrance animation
      ctx.save();
      ctx.translate(peg.x, y);
      ctx.scale(peg.scale, peg.scale);
      ctx.translate(-peg.x, -y);

      // Draw peg
      drawPeg(peg.x, y, peg.radius, peg.colorIndex);

      // Draw answer text next to peg
      // Left column: text to the right of peg, left-aligned
      // Right column: text to the left of peg, right-aligned
      const lines = peg.wrappedText || [peg.choice.text];
      const lineHeight = peg.fontSize + 2;
      const textX = col === 0 ? peg.x + peg.radius + 10 : peg.x - peg.radius - 10;
      const textAlign = col === 0 ? 'left' : 'right';
      const startY = y - (lines.length - 1) * lineHeight / 2;

      lines.forEach((line, lineIndex) => {
        drawText(line, textX, startY + lineIndex * lineHeight, {
          font: `500 ${peg.fontSize}px 'Nunito', sans-serif`,
          color: '#2B2B28',
          align: textAlign
        });
      });

      ctx.restore();
    });

    // Draw celebration particles
    gameParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Draw dragging peg if active
    if (selectedPeg >= 0 && dragPos) {
      drawPeg(dragPos.x, dragPos.y, pegs[selectedPeg].radius * 1.2, selectedPeg);
    }
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;

    const touch = e.touches[0] || e.changedTouches[0];
    if (!touch) return;

    const { x, y } = screenToLogical(touch.clientX, touch.clientY);

    if (type === 'start') {
      // Check if touching a peg
      pegs.forEach((peg, i) => {
        const pegY = peg.baseY + peg.bounceOffset;
        const dx = x - peg.x;
        const dy = (y - pegY) / aspectRatio;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < peg.radius + 10) {
          playSound('click');

          // Spawn mini celebration at peg location
          const pegY = peg.baseY + peg.bounceOffset;
          for (let j = 0; j < 12; j++) {
            gameParticles.push({
              x: peg.x,
              y: pegY,
              vx: (Math.random() - 0.5) * 200,
              vy: -Math.random() * 150 - 50,
              size: 4 + Math.random() * 4,
              color: PEG_COLORS[peg.colorIndex],
              rotation: Math.random() * Math.PI * 2,
              rotationSpeed: (Math.random() - 0.5) * 8,
              alpha: 1
            });
          }

          // Immediately select this answer
          const choice = peg.choice;
          if (choice.is_correct) {
            playSound('correct');
          } else {
            playSound('wrong');
          }
          engine.end(choice.is_correct, choice.explanation);
        }
      });
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
