<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Mousetrap Chain Reaction</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE - MOBILE                                              ║
  ║  Fills 100% of container, non-uniform scaling, touch input.                  ║
  ║  Logical dimensions: 360×640 (use aspectRatio for proportional shapes)       ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none; /* Prevent default touch behaviors */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1C1C1A;
      font-family: 'Nunito', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #2A2A27;
      /* Canvas fills viewport via JS, these are fallbacks */
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill viewport
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   *
   * @param {string} text - The text to wrap
   * @param {number} maxWidth - Maximum width in logical coordinates
   * @param {string} font - CSS font string (e.g., "16px 'Nunito', sans-serif")
   * @param {number} maxLines - Maximum number of lines (default 3)
   * @returns {string[]} Array of text lines
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   * Tries font sizes from max to min until content fits.
   *
   * @param {Object} options
   * @param {string[]} options.texts - Array of text strings to fit
   * @param {number} options.maxWidth - Maximum width for text wrapping
   * @param {number} options.availableHeight - Total height available for all texts
   * @param {number} options.minFont - Minimum font size (default 12)
   * @param {number} options.maxFont - Maximum font size (default 18)
   * @param {number} options.itemPadding - Vertical padding per text item (default 4)
   * @param {string} options.fontFamily - Font family (default "'Nunito Sans', sans-serif")
   * @returns {{ fontSize: number, wrappedTexts: string[][] }} Optimal font size and pre-wrapped texts
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === GAME CONSTANTS ===
  const COLORS = {
    bgPrimary: '#1C1C1A',
    bgSurface: '#2A2A27',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    textPrimary: '#F5F5F0',
    textSecondary: '#C2C2B8',
    borderSubtle: '#424240',
    borderStrong: '#5A5A56',
    woodBrown: '#8B6914',
    woodLight: '#A67C2E',
    woodDark: '#5C4A0A',
    metalGray: '#7A7A78',
    metalLight: '#9A9A98',
    cageColor: '#5A5A56'
  };

  // === GAME STATE ===
  let ball = null;
  let ramp = null;
  let cages = [];
  let tracks = [];
  let dominoes = [];
  let gameParticles = [];
  let animationPhase = 'aiming'; // 'aiming', 'rolling', 'chain', 'done'
  let chainProgress = 0;
  let selectedCage = -1;
  let entranceTime = 0;
  let audioCtx = null;

  // Sound effects
  function playSound(type) {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'click') {
      osc.frequency.value = 400;
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialDecayTo && gain.gain.exponentialDecayTo(0.01, audioCtx.currentTime + 0.1);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'roll') {
      osc.frequency.value = 200 + Math.random() * 100;
      osc.type = 'triangle';
      gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.05);
    } else if (type === 'cage') {
      osc.frequency.value = 150;
      osc.type = 'square';
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    } else if (type === 'correct') {
      const notes = [523, 659, 784];
      notes.forEach((freq, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g);
        g.connect(audioCtx.destination);
        o.frequency.value = freq;
        g.gain.setValueAtTime(0.15, audioCtx.currentTime + i * 0.1);
        g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + i * 0.1 + 0.2);
        o.start(audioCtx.currentTime + i * 0.1);
        o.stop(audioCtx.currentTime + i * 0.1 + 0.2);
      });
    } else if (type === 'wrong') {
      osc.frequency.value = 200;
      osc.type = 'sawtooth';
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    }
  }

  function initGame() {
    entranceTime = 0;
    animationPhase = 'aiming';
    chainProgress = 0;
    selectedCage = -1;
    gameParticles = [];

    // Pivoting ramp in middle - player adjusts angle
    ramp = {
      x: W / 2,
      y: 200,
      length: 80,
      angle: 0, // -Math.PI/4 to Math.PI/4 (left to right)
      pivotRadius: 8,
      isDragging: false
    };

    // Ball starts at top
    ball = {
      x: W / 2,
      y: 50,
      radius: 10,
      vx: 0,
      vy: 0,
      active: false,
      trail: []
    };

    // Four cages at bottom - 2x2 grid layout for answer display
    const cageW = 150;
    const cageH = 100;
    const gapX = 20;
    const gapY = 15;
    const startX = (W - cageW * 2 - gapX) / 2;
    const startY = 420;

    cages = QUESTION.choices.map((choice, i) => {
      const col = i % 2;
      const row = Math.floor(i / 2);
      return {
        x: startX + col * (cageW + gapX),
        y: startY + row * (cageH + gapY),
        w: cageW,
        h: cageH,
        choice: choice,
        dropped: false,
        dropProgress: 0,
        highlight: false,
        entranceDelay: i * 0.1,
        scale: 0,
        wrappedText: [],
        fontSize: 14
      };
    });

    // Define tracks leading to each cage
    tracks = [
      { startX: W/2 - 60, startY: 230, endX: cages[0].x + cages[0].w/2, endY: cages[0].y - 10 },
      { startX: W/2 + 60, startY: 230, endX: cages[1].x + cages[1].w/2, endY: cages[1].y - 10 },
      { startX: W/2 - 40, startY: 250, endX: cages[2].x + cages[2].w/2, endY: cages[2].y - 10 },
      { startX: W/2 + 40, startY: 250, endX: cages[3].x + cages[3].w/2, endY: cages[3].y - 10 }
    ];

    // Dominoes along each track
    dominoes = tracks.map((track, trackIdx) => {
      const count = 4;
      return Array.from({length: count}, (_, i) => {
        const t = (i + 1) / (count + 1);
        return {
          x: track.startX + (track.endX - track.startX) * t,
          y: track.startY + (track.endY - track.startY) * t,
          rotation: 0,
          fallen: false,
          trackIdx: trackIdx
        };
      });
    }).flat();

    recalculateTextSizing();
  }

  function recalculateTextSizing() {
    if (!cages || cages.length === 0) return;

    // Calculate text for each cage individually - max width is cage width minus padding
    const maxTextWidth = 130; // cage width 150 - 20 padding

    cages.forEach((cage, i) => {
      const { fontSize, wrappedTexts } = findOptimalFontSize({
        texts: [cage.choice.text],
        maxWidth: maxTextWidth,
        availableHeight: 70, // Available height in cage for text
        minFont: 14,
        maxFont: 16,
        fontFamily: "'Nunito', sans-serif"
      });
      cage.wrappedText = wrappedTexts[0];
      cage.fontSize = fontSize;
    });
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    entranceTime += dt;

    // Entrance animations for cages
    cages.forEach((cage, i) => {
      const delay = cage.entranceDelay;
      if (entranceTime > delay && cage.scale < 1) {
        cage.scale = Math.min(1, cage.scale + dt * 4);
      }
    });

    // Update particles
    gameParticles = gameParticles.filter(p => {
      p.vy += 400 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      p.rotation += p.rotationSpeed * dt;
      return p.life > 0;
    });

    if (animationPhase === 'rolling') {
      // Ball physics
      ball.vy += 400 * dt; // gravity
      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;

      // Add trail
      ball.trail.push({ x: ball.x, y: ball.y, alpha: 1 });
      if (ball.trail.length > 15) ball.trail.shift();
      ball.trail.forEach(t => t.alpha -= dt * 2);

      // Check ramp collision
      const rampEndX1 = ramp.x - Math.cos(ramp.angle) * ramp.length / 2;
      const rampEndY1 = ramp.y - Math.sin(ramp.angle) * ramp.length / 2;
      const rampEndX2 = ramp.x + Math.cos(ramp.angle) * ramp.length / 2;
      const rampEndY2 = ramp.y + Math.sin(ramp.angle) * ramp.length / 2;

      // Simple line-circle collision
      const dx = rampEndX2 - rampEndX1;
      const dy = rampEndY2 - rampEndY1;
      const len = Math.sqrt(dx*dx + dy*dy);
      const nx = -dy / len;
      const ny = dx / len;

      const bx = ball.x - rampEndX1;
      const by = ball.y - rampEndY1;
      const dist = bx * nx + by * ny;

      // Project ball onto line
      const proj = (bx * dx + by * dy) / (len * len);

      if (proj >= 0 && proj <= 1 && Math.abs(dist) < ball.radius + 3 && ball.y > ramp.y - 20) {
        // Bounce off ramp
        const bounce = 0.7;
        const dot = ball.vx * nx + ball.vy * ny;
        ball.vx -= 2 * dot * nx * bounce;
        ball.vy -= 2 * dot * ny * bounce;

        // Add rolling direction based on ramp angle
        ball.vx += Math.cos(ramp.angle) * 150;

        playSound('roll');

        // Determine which track based on ball direction
        animationPhase = 'chain';

        // Select cage based on ball's x position relative to ramp angle
        if (ramp.angle < -Math.PI/8) {
          selectedCage = ball.vy > 0 ? 2 : 0; // Left cages
        } else if (ramp.angle > Math.PI/8) {
          selectedCage = ball.vy > 0 ? 3 : 1; // Right cages
        } else {
          selectedCage = ball.x < W/2 ? (Math.random() > 0.5 ? 0 : 2) : (Math.random() > 0.5 ? 1 : 3);
        }
      }

      // Ball went off screen - force selection
      if (ball.y > H + 50) {
        animationPhase = 'chain';
        if (selectedCage < 0) {
          selectedCage = ramp.angle < 0 ? (Math.random() > 0.5 ? 0 : 2) : (Math.random() > 0.5 ? 1 : 3);
        }
      }
    }

    if (animationPhase === 'chain') {
      chainProgress += dt * 2;

      // Animate dominoes falling for selected track
      const relevantDominoes = dominoes.filter(d => d.trackIdx === selectedCage);
      relevantDominoes.forEach((d, i) => {
        const fallTime = i * 0.15;
        if (chainProgress > fallTime && !d.fallen) {
          d.fallen = true;
          playSound('roll');
          // Spawn sparks
          for (let j = 0; j < 5; j++) {
            gameParticles.push({
              x: d.x,
              y: d.y,
              vx: (Math.random() - 0.5) * 100,
              vy: -Math.random() * 80,
              life: 0.5,
              color: COLORS.amber,
              size: 3,
              rotation: 0,
              rotationSpeed: Math.random() * 5
            });
          }
        }
        if (d.fallen && d.rotation < Math.PI / 3) {
          d.rotation += dt * 8;
        }
      });

      // Move ball toward selected cage
      const targetCage = cages[selectedCage];
      const targetX = targetCage.x + targetCage.w / 2;
      const targetY = targetCage.y - 10;

      ball.x += (targetX - ball.x) * dt * 3;
      ball.y += (targetY - ball.y) * dt * 3;

      // Drop cage when chain complete
      if (chainProgress > 0.8 && !cages[selectedCage].dropped) {
        cages[selectedCage].dropped = true;
        playSound('cage');

        // Spawn cage particles
        for (let i = 0; i < 20; i++) {
          gameParticles.push({
            x: targetCage.x + targetCage.w / 2,
            y: targetCage.y,
            vx: (Math.random() - 0.5) * 150,
            vy: -Math.random() * 100 - 50,
            life: 1,
            color: [COLORS.orange, COLORS.amber, COLORS.cyan][Math.floor(Math.random() * 3)],
            size: 4 + Math.random() * 4,
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Animate cage drop
      if (cages[selectedCage].dropped) {
        cages[selectedCage].dropProgress = Math.min(1, cages[selectedCage].dropProgress + dt * 3);
      }

      // End game after cage fully dropped
      if (cages[selectedCage].dropProgress >= 1 && animationPhase === 'chain') {
        animationPhase = 'done';
        const choice = cages[selectedCage].choice;

        if (choice.is_correct) {
          playSound('correct');
        } else {
          playSound('wrong');
        }

        setTimeout(() => {
          engine.end(choice.is_correct, choice.explanation);
        }, 500);
      }
    }
  }

  function drawGame() {
    // Clear canvas with background
    ctx.fillStyle = COLORS.bgPrimary;
    ctx.fillRect(0, 0, W, H);

    // Draw machine frame/background
    ctx.fillStyle = COLORS.bgSurface;
    ctx.beginPath();
    ctx.roundRect(10, 10, W - 20, H - 20, 16);
    ctx.fill();

    // Draw wooden border
    ctx.strokeStyle = COLORS.woodBrown;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.roundRect(10, 10, W - 20, H - 20, 16);
    ctx.stroke();

    // Draw tracks (curved metal rails)
    tracks.forEach((track, i) => {
      ctx.strokeStyle = COLORS.metalGray;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(track.startX, track.startY);

      // Curved path
      const midX = (track.startX + track.endX) / 2;
      const midY = (track.startY + track.endY) / 2 + 30;
      ctx.quadraticCurveTo(midX, midY, track.endX, track.endY);
      ctx.stroke();

      // Highlight for 3D effect
      ctx.strokeStyle = COLORS.metalLight;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(track.startX + 1, track.startY - 1);
      ctx.quadraticCurveTo(midX + 1, midY - 1, track.endX + 1, track.endY - 1);
      ctx.stroke();
    });

    // Draw dominoes
    dominoes.forEach(d => {
      ctx.save();
      ctx.translate(d.x, d.y);
      ctx.scale(1, aspectRatio);
      ctx.rotate(d.rotation);

      // Domino body
      ctx.fillStyle = d.fallen ? COLORS.woodDark : COLORS.woodLight;
      ctx.fillRect(-4, -15, 8, 30);

      // Domino dots
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      ctx.arc(0, -8, 2, 0, Math.PI * 2);
      ctx.arc(0, 8, 2, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    });

    // Draw ball start platform
    ctx.fillStyle = COLORS.woodBrown;
    ctx.beginPath();
    ctx.roundRect(W/2 - 30, 30, 60, 15, 4);
    ctx.fill();

    // Draw pivoting ramp
    ctx.save();
    ctx.translate(ramp.x, ramp.y);

    // Ramp shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(0, 5, ramp.pivotRadius + 2, (ramp.pivotRadius + 2) * aspectRatio * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();

    // Pivot point (metal circle)
    ctx.fillStyle = COLORS.metalGray;
    ctx.beginPath();
    ctx.ellipse(0, 0, ramp.pivotRadius, ramp.pivotRadius * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = COLORS.metalLight;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(0, 0, ramp.pivotRadius - 2, (ramp.pivotRadius - 2) * aspectRatio, 0, 0, Math.PI * 2);
    ctx.stroke();

    // Ramp plank
    ctx.rotate(ramp.angle);
    ctx.fillStyle = COLORS.woodLight;
    ctx.fillRect(-ramp.length / 2, -5, ramp.length, 10);

    // Wood grain lines
    ctx.strokeStyle = COLORS.woodDark;
    ctx.lineWidth = 1;
    for (let i = -3; i <= 3; i++) {
      ctx.beginPath();
      ctx.moveTo(-ramp.length / 2 + 5, i * 2);
      ctx.lineTo(ramp.length / 2 - 5, i * 2);
      ctx.stroke();
    }

    // Angle indicator arrows
    ctx.fillStyle = COLORS.cyan;
    ctx.beginPath();
    ctx.moveTo(-ramp.length / 2, 0);
    ctx.lineTo(-ramp.length / 2 - 10, -5);
    ctx.lineTo(-ramp.length / 2 - 10, 5);
    ctx.closePath();
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(ramp.length / 2, 0);
    ctx.lineTo(ramp.length / 2 + 10, -5);
    ctx.lineTo(ramp.length / 2 + 10, 5);
    ctx.closePath();
    ctx.fill();

    ctx.restore();

    // Draw cages with answers
    cages.forEach((cage, i) => {
      if (cage.scale <= 0) return;

      ctx.save();
      ctx.translate(cage.x + cage.w / 2, cage.y + cage.h / 2);

      // Entrance animation
      const bounceScale = cage.scale < 1
        ? cage.scale * (1 + Math.sin(cage.scale * Math.PI) * 0.2)
        : 1;
      ctx.scale(bounceScale, bounceScale);

      // Drop animation
      const dropOffset = cage.dropped ? cage.dropProgress * 20 : 0;
      ctx.translate(0, dropOffset);

      // Cage body
      const isHighlighted = cage.highlight || (animationPhase !== 'aiming' && selectedCage === i);
      const cageColor = cage.dropped
        ? (cage.choice.is_correct ? COLORS.success : COLORS.error)
        : (isHighlighted ? COLORS.cyan : COLORS.borderSubtle);

      // Cage background
      ctx.fillStyle = cage.dropped
        ? (cage.choice.is_correct ? 'rgba(107, 191, 89, 0.2)' : 'rgba(232, 93, 74, 0.2)')
        : 'rgba(42, 42, 39, 0.9)';
      ctx.beginPath();
      ctx.roundRect(-cage.w/2, -cage.h/2, cage.w, cage.h, 8);
      ctx.fill();

      // Cage bars (vertical)
      ctx.strokeStyle = cageColor;
      ctx.lineWidth = 2;
      for (let b = -cage.w/2 + 15; b < cage.w/2; b += 15) {
        ctx.beginPath();
        ctx.moveTo(b, -cage.h/2);
        ctx.lineTo(b, -cage.h/2 + 15);
        ctx.stroke();
      }

      // Top bar
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(-cage.w/2 + 5, -cage.h/2 + 15);
      ctx.lineTo(cage.w/2 - 5, -cage.h/2 + 15);
      ctx.stroke();

      // Border
      ctx.strokeStyle = cageColor;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.roundRect(-cage.w/2, -cage.h/2, cage.w, cage.h, 8);
      ctx.stroke();

      ctx.restore();

      // Draw answer text (outside the transform for proper text scaling)
      if (cage.scale > 0.5) {
        const textY = cage.y + cage.h / 2 + 10 + (cage.dropped ? cage.dropProgress * 20 : 0);
        const lines = cage.wrappedText || [cage.choice.text];
        const fontSize = cage.fontSize || 14;
        const lineHeight = fontSize + 4;
        const totalHeight = lines.length * lineHeight;
        const startY = textY - totalHeight / 2;

        lines.forEach((line, lineIdx) => {
          drawText(line, cage.x + cage.w / 2, startY + lineIdx * lineHeight, {
            font: `500 ${fontSize}px 'Nunito', sans-serif`,
            color: cage.dropped
              ? (cage.choice.is_correct ? COLORS.success : COLORS.error)
              : COLORS.textPrimary
          });
        });
      }
    });

    // Draw ball trail
    ball.trail.forEach((t, i) => {
      if (t.alpha <= 0) return;
      ctx.fillStyle = `rgba(232, 122, 62, ${t.alpha * 0.5})`;
      ctx.beginPath();
      ctx.ellipse(t.x, t.y, ball.radius * 0.6 * t.alpha, ball.radius * 0.6 * t.alpha * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    });

    // Draw ball
    if (animationPhase !== 'done') {
      ctx.save();
      ctx.translate(ball.x, ball.y);
      ctx.scale(1, aspectRatio);

      // Ball shadow
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.beginPath();
      ctx.ellipse(3, 3, ball.radius, ball.radius, 0, 0, Math.PI * 2);
      ctx.fill();

      // Ball body (metallic gradient)
      const gradient = ctx.createRadialGradient(-3, -3, 0, 0, 0, ball.radius);
      gradient.addColorStop(0, '#FFFFFF');
      gradient.addColorStop(0.3, COLORS.metalLight);
      gradient.addColorStop(1, COLORS.metalGray);
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(0, 0, ball.radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    // Draw particles
    gameParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.life;
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
      ctx.restore();
    });
    ctx.globalAlpha = 1;

    // Draw aiming indicator
    if (animationPhase === 'aiming') {
      drawText('Drag to aim the ramp', W / 2, 380, {
        font: "500 16px 'Nunito Sans', sans-serif",
        color: COLORS.textSecondary
      });

      // Pulsing release prompt
      const pulse = 0.7 + Math.sin(entranceTime * 4) * 0.3;
      drawText('Release to drop the ball', W / 2, 400, {
        font: "600 16px 'Nunito Sans', sans-serif",
        color: `rgba(78, 205, 196, ${pulse})`
      });
    }
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;

    const touch = e.touches[0] || e.changedTouches[0];
    if (!touch) return;

    const { x, y } = screenToLogical(touch.clientX, touch.clientY);

    if (animationPhase === 'aiming') {
      if (type === 'start') {
        // Check if touching near ramp
        const dist = Math.sqrt((x - ramp.x) ** 2 + (y - ramp.y) ** 2);
        if (dist < 80) {
          ramp.isDragging = true;
          playSound('click');
        }
      } else if (type === 'move' && ramp.isDragging) {
        // Adjust ramp angle based on touch position
        const dx = x - ramp.x;
        ramp.angle = Math.atan2(0, dx) + (dx > 0 ? Math.PI/6 : -Math.PI/6);
        ramp.angle = Math.max(-Math.PI/4, Math.min(Math.PI/4, (x - W/2) / 100));

        // Highlight cages based on ramp angle
        cages.forEach((cage, i) => {
          if (ramp.angle < -Math.PI/12) {
            cage.highlight = (i === 0 || i === 2);
          } else if (ramp.angle > Math.PI/12) {
            cage.highlight = (i === 1 || i === 3);
          } else {
            cage.highlight = false;
          }
        });
      } else if (type === 'end' && ramp.isDragging) {
        ramp.isDragging = false;

        // Release ball
        ball.active = true;
        ball.vy = 100;
        animationPhase = 'rolling';
        playSound('roll');

        // Clear highlights
        cages.forEach(c => c.highlight = false);
      }
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mousemove', (e) => {
    if (ramp && ramp.isDragging) {
      const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
      handleTouch(fakeTouch, 'move');
    }
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
