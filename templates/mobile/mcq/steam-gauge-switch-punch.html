<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Steam Gauge Switch Punch</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  +==============================================================================+
  |  GAME FACTORY TEMPLATE - MOBILE                                              |
  |  Fills 100% of container, non-uniform scaling, touch input.                  |
  |  Logical dimensions: 360x640 (use aspectRatio for proportional shapes)       |
  +==============================================================================+
  -->
  <style>
    /* =========================================================================
       BASE STYLES - Can be extended, not removed
       ========================================================================= */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <script>
  // +=========================================================================+
  // |  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                  |
  // |  Platform replaces this at runtime. Use these exact 60-char answers.     |
  // +=========================================================================+
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // +=========================================================================+
  // |  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                         |
  // |  Non-uniform scaling (fills container), touch input, tap-to-restart.     |
  // +=========================================================================+
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;
    aspectRatio = scaleX / scaleY;
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // =========================================================================
  // TEXT UTILITIES
  // =========================================================================

  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // +=========================================================================+
  // |  SECTION 3: YOUR GAME CODE                                               |
  // +=========================================================================+

  // === COLORS ===
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC',
    peach: '#FFB89D'
  };

  // === GAME STATE ===
  let switches = [];
  let steamParticles = [];
  let gameParticles = [];
  let gravelStones = [];
  let sootClouds = [];
  let gameTime = 0;
  let selectedSwitch = -1;
  let animPhase = 'entrance'; // 'entrance' | 'idle' | 'selected' | 'feedback'
  let feedbackTimer = 0;
  let pressedSwitch = -1;

  // Audio context
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playSound(type) {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);

      if (type === 'correct') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, ac.currentTime);
        osc.frequency.setValueAtTime(659, ac.currentTime + 0.1);
        osc.frequency.setValueAtTime(784, ac.currentTime + 0.2);
        gain.gain.setValueAtTime(0.2, ac.currentTime);
        gain.gain.exponentialDecayTo && gain.gain.exponentialDecayTo;
        gain.gain.setValueAtTime(0.2, ac.currentTime + 0.25);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.5);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.5);
      } else if (type === 'wrong') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, ac.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, ac.currentTime + 0.3);
        gain.gain.setValueAtTime(0.15, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.4);
      } else if (type === 'click') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(800, ac.currentTime);
        osc.frequency.exponentialRampToValueAtTime(400, ac.currentTime + 0.05);
        gain.gain.setValueAtTime(0.1, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.08);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.08);
      } else if (type === 'steam') {
        // White noise burst for steam
        const bufferSize = ac.sampleRate * 0.3;
        const buffer = ac.createBuffer(1, bufferSize, ac.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = (Math.random() * 2 - 1) * 0.3;
        }
        const noise = ac.createBufferSource();
        noise.buffer = buffer;
        const noiseGain = ac.createGain();
        noise.connect(noiseGain);
        noiseGain.connect(ac.destination);
        noiseGain.gain.setValueAtTime(0.15, ac.currentTime);
        noiseGain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.3);
        noise.start(ac.currentTime);
        noise.stop(ac.currentTime + 0.3);
        return;
      }
    } catch (e) {}
  }

  // Diamond formation positions for 4 switches
  // Top, Right, Bottom, Left in diamond shape
  const SWITCH_POSITIONS = [
    { x: W / 2, y: 200 },      // Top
    { x: W / 2 + 90, y: 340 }, // Right
    { x: W / 2, y: 480 },      // Bottom
    { x: W / 2 - 90, y: 340 }  // Left
  ];

  const LEVER_W = 24;
  const LEVER_H = 100;
  const BASE_W = 60;
  const BASE_H = 30;
  const TEXT_BOX_W = 140;
  const TEXT_BOX_H = 80;

  function initGame() {
    switches = QUESTION.choices.map((choice, i) => {
      const pos = SWITCH_POSITIONS[i];
      return {
        x: pos.x,
        y: pos.y,
        choice: choice,
        leverAngle: -0.4, // tilted down initially
        targetAngle: 0,
        scale: 0,
        alpha: 0,
        entranceDelay: i * 0.12,
        shakeX: 0,
        shakeTimer: 0,
        pulseScale: 1,
        pulseTimer: 0,
        highlighted: false,
        hitRect: {
          x: pos.x - 75,
          y: pos.y - 60,
          w: 150,
          h: TEXT_BOX_H + 80
        },
        wrappedText: [],
        fontSize: 16,
        rustColor: ['#8B4513', '#A0522D', '#6B3410', '#7B4C2A'][i]
      };
    });

    // Generate gravel stones
    gravelStones = [];
    for (let i = 0; i < 60; i++) {
      gravelStones.push({
        x: Math.random() * W,
        y: Math.random() * H,
        size: 2 + Math.random() * 4,
        color: `hsl(30, ${5 + Math.random() * 15}%, ${30 + Math.random() * 25}%)`,
        wobble: Math.random() * Math.PI * 2
      });
    }

    // Generate soot clouds
    sootClouds = [];
    for (let i = 0; i < 8; i++) {
      sootClouds.push({
        x: Math.random() * W,
        y: 20 + Math.random() * 80,
        size: 40 + Math.random() * 60,
        speed: 8 + Math.random() * 15,
        alpha: 0.15 + Math.random() * 0.2
      });
    }

    steamParticles = [];
    gameParticles = [];
    gameTime = 0;
    selectedSwitch = -1;
    animPhase = 'entrance';
    feedbackTimer = 0;
    pressedSwitch = -1;

    recalculateTextSizing();
  }

  function recalculateTextSizing() {
    if (!switches || switches.length === 0) return;

    const maxTextW = TEXT_BOX_W - 12;

    switches.forEach((sw, i) => {
      // Try to fit text, allowing up to 4 lines for long text
      let bestFs = 12;
      let bestLines = [sw.choice.text];
      for (let fs = 16; fs >= 12; fs -= 0.5) {
        const font = `${fs}px 'Nunito', sans-serif`;
        const lines = wrapText(sw.choice.text, maxTextW, font, 5);
        const lineH = fs + 2;
        const totalH = lines.length * lineH;
        if (totalH <= TEXT_BOX_H - 8) {
          bestFs = fs;
          bestLines = lines;
          break;
        }
        bestFs = fs;
        bestLines = lines;
      }
      sw.wrappedText = bestLines;
      sw.fontSize = bestFs;
    });
  }

  function spawnSteam(x, y) {
    playSound('steam');
    for (let i = 0; i < 25; i++) {
      steamParticles.push({
        x: x + (Math.random() - 0.5) * 30,
        y: y,
        vx: (Math.random() - 0.5) * 80,
        vy: -40 - Math.random() * 120,
        size: 8 + Math.random() * 20,
        alpha: 0.7 + Math.random() * 0.3,
        life: 0.8 + Math.random() * 0.5
      });
    }
  }

  function spawnCorrectParticles(x, y) {
    const sparkColors = [COLORS.orange, COLORS.amber, COLORS.cyan, COLORS.success];
    for (let i = 0; i < 20; i++) {
      gameParticles.push({
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 200,
        vy: -Math.random() * 200 - 50,
        size: 3 + Math.random() * 5,
        color: sparkColors[Math.floor(Math.random() * sparkColors.length)],
        alpha: 1,
        life: 0.5 + Math.random() * 0.5,
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 8
      });
    }
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Update soot clouds
    sootClouds.forEach(cloud => {
      cloud.x += cloud.speed * dt;
      if (cloud.x > W + cloud.size) cloud.x = -cloud.size;
    });

    // Entrance animation
    if (animPhase === 'entrance') {
      let allDone = true;
      switches.forEach((sw, i) => {
        const elapsed = gameTime - sw.entranceDelay;
        if (elapsed < 0) {
          allDone = false;
          return;
        }
        const t = Math.min(elapsed / 0.4, 1);
        // Spring easing
        const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
        sw.scale = t * spring;
        sw.alpha = Math.min(t * 2, 1);
        // Lever tilts up during entrance
        sw.leverAngle = -0.4 + t * 0.4;
        if (t < 1) allDone = false;
      });
      if (allDone) {
        animPhase = 'idle';
        switches.forEach(sw => {
          sw.scale = 1;
          sw.alpha = 1;
          sw.leverAngle = 0;
        });
      }
    }

    // Idle breathing
    if (animPhase === 'idle' || animPhase === 'selected') {
      switches.forEach((sw, i) => {
        if (sw.shakeTimer > 0) {
          sw.shakeTimer -= dt;
          const decay = sw.shakeTimer / 0.4;
          sw.shakeX = Math.sin(sw.shakeTimer * 30) * 6 * decay;
        } else {
          sw.shakeX = 0;
        }

        if (sw.pulseTimer > 0) {
          sw.pulseTimer -= dt;
          const t = 1 - sw.pulseTimer / 0.3;
          sw.pulseScale = 1 + 0.15 * Math.sin(t * Math.PI);
        } else {
          sw.pulseScale = 1;
        }

        // Subtle lever wobble
        if (animPhase === 'idle') {
          sw.leverAngle = Math.sin(gameTime * 1.5 + i * 1.2) * 0.03;
        }
      });
    }

    // Steam particles
    steamParticles.forEach(p => {
      p.vy -= 30 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.size += 15 * dt;
      p.life -= dt;
      p.alpha = Math.max(0, p.life * 0.8);
    });
    steamParticles = steamParticles.filter(p => p.life > 0);

    // Game particles
    gameParticles.forEach(p => {
      p.vy += 300 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotSpeed * dt;
      p.life -= dt;
      p.alpha = Math.max(0, p.life);
    });
    gameParticles = gameParticles.filter(p => p.life > 0);

    // Feedback phase
    if (animPhase === 'feedback') {
      feedbackTimer -= dt;
      if (feedbackTimer <= 0) {
        const sw = switches[selectedSwitch];
        engine.end(sw.choice.is_correct, sw.choice.explanation);
      }
    }
  }

  function drawGame() {
    // === SKY BACKGROUND (soot-filled) ===
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, '#3D3530');
    skyGrad.addColorStop(0.3, '#4A403A');
    skyGrad.addColorStop(0.6, '#554A42');
    skyGrad.addColorStop(1, '#6B5E54');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    // === SOOT CLOUDS ===
    sootClouds.forEach(cloud => {
      ctx.save();
      ctx.globalAlpha = cloud.alpha;
      ctx.beginPath();
      ctx.ellipse(cloud.x, cloud.y, cloud.size, cloud.size * 0.5 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#2A2420';
      ctx.fill();
      ctx.restore();
    });

    // === RAILROAD TRACKS ===
    // Track bed
    ctx.fillStyle = '#4A4038';
    ctx.fillRect(0, H * 0.15, W, H * 0.75);

    // Gravel
    gravelStones.forEach(stone => {
      ctx.fillStyle = stone.color;
      ctx.beginPath();
      const wobble = Math.sin(gameTime * 0.3 + stone.wobble) * 0.5;
      ctx.ellipse(stone.x, stone.y, stone.size + wobble, (stone.size + wobble) * 0.7 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    });

    // Rail lines (two parallel rails going into perspective)
    ctx.strokeStyle = '#8A8078';
    ctx.lineWidth = 4;

    // Left rail
    ctx.beginPath();
    ctx.moveTo(W * 0.3, H);
    ctx.lineTo(W * 0.45, 0);
    ctx.stroke();

    // Right rail
    ctx.beginPath();
    ctx.moveTo(W * 0.7, H);
    ctx.lineTo(W * 0.55, 0);
    ctx.stroke();

    // Cross ties
    ctx.strokeStyle = '#5A4A3A';
    ctx.lineWidth = 6;
    for (let i = 0; i < 12; i++) {
      const t = i / 11;
      const y = 50 + t * (H - 100);
      const leftX = W * 0.3 + (W * 0.45 - W * 0.3) * (1 - t);
      const rightX = W * 0.7 + (W * 0.55 - W * 0.7) * (1 - t);
      ctx.beginPath();
      ctx.moveTo(leftX - 25, y);
      ctx.lineTo(rightX + 25, y);
      ctx.stroke();
    }

    // === DRAW SWITCHES ===
    switches.forEach((sw, i) => {
      if (sw.alpha <= 0) return;

      ctx.save();
      ctx.globalAlpha = sw.alpha;
      ctx.translate(sw.x + sw.shakeX, sw.y);
      ctx.scale(sw.scale * sw.pulseScale, sw.scale * sw.pulseScale);

      // Switch base plate (iron)
      const baseGrad = ctx.createLinearGradient(-BASE_W / 2, 0, BASE_W / 2, 0);
      baseGrad.addColorStop(0, '#5A5048');
      baseGrad.addColorStop(0.5, '#7A7068');
      baseGrad.addColorStop(1, '#5A5048');
      ctx.fillStyle = baseGrad;
      ctx.beginPath();
      ctx.roundRect(-BASE_W / 2, -BASE_H / 2, BASE_W, BASE_H * aspectRatio, 4);
      ctx.fill();

      // Base rivets
      ctx.fillStyle = '#3A3430';
      for (let r = -1; r <= 1; r += 2) {
        ctx.beginPath();
        ctx.ellipse(r * 20, 0, 3, 3 * aspectRatio, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // Lever
      ctx.save();
      ctx.rotate(sw.leverAngle);

      // Lever shaft (rusted iron)
      const leverGrad = ctx.createLinearGradient(-LEVER_W / 2, 0, LEVER_W / 2, 0);
      leverGrad.addColorStop(0, sw.rustColor);
      leverGrad.addColorStop(0.3, '#A06840');
      leverGrad.addColorStop(0.7, sw.rustColor);
      leverGrad.addColorStop(1, '#6B4020');
      ctx.fillStyle = leverGrad;
      ctx.beginPath();
      ctx.roundRect(-LEVER_W / 2, -LEVER_H, LEVER_W, LEVER_H, 3);
      ctx.fill();

      // Lever handle (top knob)
      const knobColor = sw.highlighted ? COLORS.amber :
                         (selectedSwitch === i && sw.choice.is_correct) ? COLORS.success :
                         (selectedSwitch === i && !sw.choice.is_correct) ? COLORS.error : '#8A7868';
      ctx.fillStyle = knobColor;
      ctx.beginPath();
      ctx.ellipse(0, -LEVER_H - 8, 14, 14 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();

      // Knob highlight
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.ellipse(-3, -LEVER_H - 11, 5, 5 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();

      // Number label on lever
      const labels = ['A', 'B', 'C', 'D'];
      drawText(labels[i], 0, -LEVER_H / 2, {
        font: "700 16px 'Belanosima', sans-serif",
        color: '#F5F5F0',
        align: 'center'
      });

      ctx.restore(); // End lever rotation

      // Text box below the base
      const textBoxY = BASE_H / 2 * aspectRatio + 6;
      const tbx = -TEXT_BOX_W / 2;
      const tby = textBoxY;

      // Text box background
      const bgColor = selectedSwitch === i ?
        (sw.choice.is_correct ? 'rgba(107,191,89,0.25)' : 'rgba(232,93,74,0.25)') :
        'rgba(42,36,32,0.85)';
      ctx.fillStyle = bgColor;
      ctx.beginPath();
      ctx.roundRect(tbx, tby, TEXT_BOX_W, TEXT_BOX_H, 8);
      ctx.fill();

      // Text box border
      const borderColor = selectedSwitch === i ?
        (sw.choice.is_correct ? COLORS.success : COLORS.error) :
        sw.highlighted ? COLORS.cyan : '#5A5048';
      ctx.strokeStyle = borderColor;
      ctx.lineWidth = sw.highlighted ? 2.5 : 1.5;
      ctx.beginPath();
      ctx.roundRect(tbx, tby, TEXT_BOX_W, TEXT_BOX_H, 8);
      ctx.stroke();

      // Draw wrapped text
      const lines = sw.wrappedText || [sw.choice.text];
      const fs = sw.fontSize || 14;
      const lineH = fs + 2;
      const totalTextH = lines.length * lineH;
      const startTextY = tby + (TEXT_BOX_H - totalTextH) / 2 + lineH / 2;

      lines.forEach((line, li) => {
        drawText(line, 0, startTextY + li * lineH, {
          font: `500 ${fs}px 'Nunito', sans-serif`,
          color: '#F5F5F0',
          align: 'center'
        });
      });

      ctx.restore(); // End switch transform
    });

    // === STEAM PARTICLES ===
    steamParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha * 0.6;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.size, p.size * 0.7 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#E8E0D8';
      ctx.fill();
      ctx.restore();
    });

    // === GAME PARTICLES (sparks) ===
    gameParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // === AMBIENT STEAM WISPS ===
    for (let i = 0; i < 3; i++) {
      const wx = 60 + i * 140;
      const wy = H - 40 + Math.sin(gameTime + i * 2) * 10;
      ctx.save();
      ctx.globalAlpha = 0.08 + Math.sin(gameTime * 0.8 + i) * 0.04;
      ctx.beginPath();
      ctx.ellipse(wx, wy, 25, 15 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#C8C0B8';
      ctx.fill();
      ctx.restore();
    }
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;
    if (animPhase === 'feedback' || animPhase === 'entrance') return;

    const touch = e.touches[0] || e.changedTouches[0];
    if (!touch) return;
    const { x, y } = screenToLogical(touch.clientX, touch.clientY);

    if (type === 'start') {
      // Check which switch was tapped
      switches.forEach((sw, i) => {
        // Compute hit area in world space
        const hitX = sw.x - 75;
        const hitY = sw.y - LEVER_H - 14;
        const hitW = 150;
        const hitH = LEVER_H + BASE_H + TEXT_BOX_H + 30;
        const hit = { x: hitX, y: hitY, w: hitW, h: hitH };

        if (pointInRect(x, y, hit)) {
          pressedSwitch = i;
          sw.highlighted = true;
          playSound('click');
        }
      });
    }

    if (type === 'end' && pressedSwitch >= 0) {
      const sw = switches[pressedSwitch];
      // Check if finger is still over the switch
      const hitX = sw.x - 75;
      const hitY = sw.y - LEVER_H - 14;
      const hitW = 150;
      const hitH = LEVER_H + BASE_H * aspectRatio + TEXT_BOX_H + 30;
      const hit = { x: hitX, y: hitY, w: hitW, h: hitH };

      if (pointInRect(x, y, hit)) {
        selectedSwitch = pressedSwitch;
        animPhase = 'feedback';
        feedbackTimer = 0.6;

        // Lever jolts upright
        sw.leverAngle = -0.3;
        sw.targetAngle = 0;

        if (sw.choice.is_correct) {
          playSound('correct');
          sw.pulseTimer = 0.3;
          spawnCorrectParticles(sw.x, sw.y - LEVER_H);
        } else {
          playSound('wrong');
          sw.shakeTimer = 0.4;
          spawnSteam(sw.x, sw.y);
        }
      }

      // Reset highlight
      switches.forEach(s => s.highlighted = false);
      pressedSwitch = -1;
    }
  }

  // +=========================================================================+
  // |  SECTION 4: GAME LOOP - DO NOT MODIFY                                    |
  // |  Standard loop with responsive scaling and touch handling.               |
  // +=========================================================================+
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100);
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
