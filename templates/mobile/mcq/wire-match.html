<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Wire Match</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  WIRE MATCH GAME - MOBILE                                                    ║
  ║  Drag wires from answers to matching color holes                             ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1C1C1A;
      font-family: 'Nunito', 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #1C1C1A;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   *
   * @param {string} text - The text to wrap
   * @param {number} maxWidth - Maximum width in logical coordinates
   * @param {string} font - CSS font string (e.g., "16px 'Nunito', sans-serif")
   * @param {number} maxLines - Maximum number of lines (default 3)
   * @returns {string[]} Array of text lines
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   * Tries font sizes from max to min until content fits.
   *
   * @param {Object} options
   * @param {string[]} options.texts - Array of text strings to fit
   * @param {number} options.maxWidth - Maximum width for text wrapping
   * @param {number} options.availableHeight - Total height available for all texts
   * @param {number} options.minFont - Minimum font size (default 12)
   * @param {number} options.maxFont - Maximum font size (default 18)
   * @param {number} options.itemPadding - Vertical padding per text item (default 4)
   * @param {string} options.fontFamily - Font family (default "'Nunito Sans', sans-serif")
   * @returns {{ fontSize: number, wrappedTexts: string[][] }} Optimal font size and pre-wrapped texts
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: WIRE MATCH GAME CODE                                           ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // Reduced motion preference
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // Wire colors (QuizHP styleguide)
  const WIRE_COLORS = [
    { name: 'red', color: '#E85D4A', light: '#FF7A6A' },
    { name: 'green', color: '#6BBF59', light: '#8AD67A' },
    { name: 'blue', color: '#4ECDC4', light: '#7EEAE3' },
    { name: 'yellow', color: '#F5A742', light: '#FFD080' }
  ];

  // Shuffled order for holes on right side
  const HOLE_ORDER = [1, 0, 3, 2]; // green, red, yellow, blue

  let answers = [];
  let holes = [];
  let draggingIndex = -1;
  let dragPos = { x: 0, y: 0 };
  let connectedWires = []; // Track which wires are connected

  // Animation state
  let animationTime = 0;
  let entranceComplete = false;
  let sparkParticles = [];

  // ═══════════════════════════════════════════════════════════════════════════
  // WEB AUDIO API - Sound Effects
  // ═══════════════════════════════════════════════════════════════════════════
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }

  function playSound(type) {
    if (!audioCtx) return;
    try {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      const now = audioCtx.currentTime;

      if (type === 'pickup') {
        // Quick rising blip when grabbing wire
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.linearRampToValueAtTime(600, now + 0.08);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialDecayTo && gain.gain.exponentialDecayTo(0.01, now + 0.1);
        gain.gain.linearRampToValueAtTime(0.01, now + 0.1);
        osc.start(now);
        osc.stop(now + 0.1);
      } else if (type === 'plug') {
        // Satisfying click/plug sound when connecting
        osc.type = 'square';
        osc.frequency.setValueAtTime(220, now);
        osc.frequency.setValueAtTime(330, now + 0.05);
        osc.frequency.setValueAtTime(440, now + 0.1);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.linearRampToValueAtTime(0.15, now + 0.05);
        gain.gain.linearRampToValueAtTime(0.01, now + 0.2);
        osc.start(now);
        osc.stop(now + 0.2);
      } else if (type === 'buzz') {
        // Soft error buzz when releasing over nothing
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(80, now);
        gain.gain.setValueAtTime(0.08, now);
        gain.gain.linearRampToValueAtTime(0.01, now + 0.15);
        osc.start(now);
        osc.stop(now + 0.15);
      }
    } catch (e) {
      // Silently fail if audio not available
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // ENTRANCE ANIMATIONS
  // ═══════════════════════════════════════════════════════════════════════════
  function initEntranceAnimation() {
    if (prefersReducedMotion) {
      // Skip animations
      answers.forEach(ans => {
        ans.entranceAlpha = 1;
        ans.entranceX = 0;
      });
      holes.forEach(hole => {
        hole.entranceAlpha = 1;
        hole.entranceScale = 1;
      });
      entranceComplete = true;
      return;
    }

    // Answers slide in from left
    answers.forEach((ans, i) => {
      ans.entranceAlpha = 0;
      ans.entranceX = -60;
      ans.entranceDelay = i * 80;
      ans.entranceDuration = 400;
      ans.entranceStarted = false;
    });

    // Holes fade/scale in from right
    holes.forEach((hole, i) => {
      hole.entranceAlpha = 0;
      hole.entranceScale = 0.5;
      hole.entranceDelay = 150 + i * 80;
      hole.entranceDuration = 350;
      hole.entranceStarted = false;
    });
  }

  function updateEntranceAnimations(dt) {
    if (entranceComplete) return;

    animationTime += dt * 1000;
    let allDone = true;

    // Update answers
    answers.forEach(ans => {
      if (animationTime >= ans.entranceDelay) {
        if (!ans.entranceStarted) {
          ans.entranceStarted = true;
          ans.entranceElapsed = 0;
        }
        ans.entranceElapsed += dt * 1000;
        const t = Math.min(ans.entranceElapsed / ans.entranceDuration, 1);
        // Ease out cubic
        const ease = 1 - Math.pow(1 - t, 3);
        ans.entranceAlpha = ease;
        ans.entranceX = -60 * (1 - ease);
        if (t < 1) allDone = false;
      } else {
        allDone = false;
      }
    });

    // Update holes
    holes.forEach(hole => {
      if (animationTime >= hole.entranceDelay) {
        if (!hole.entranceStarted) {
          hole.entranceStarted = true;
          hole.entranceElapsed = 0;
        }
        hole.entranceElapsed += dt * 1000;
        const t = Math.min(hole.entranceElapsed / hole.entranceDuration, 1);
        // Spring easing
        const spring = 1 + Math.sin(t * Math.PI * 2) * 0.15 * (1 - t);
        hole.entranceAlpha = t;
        hole.entranceScale = (0.5 + t * 0.5) * spring;
        if (t < 1) allDone = false;
      } else {
        allDone = false;
      }
    });

    if (allDone) {
      entranceComplete = true;
      answers.forEach(ans => { ans.entranceAlpha = 1; ans.entranceX = 0; });
      holes.forEach(hole => { hole.entranceAlpha = 1; hole.entranceScale = 1; });
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // SPARK PARTICLES (for successful connection)
  // ═══════════════════════════════════════════════════════════════════════════
  function spawnSparks(x, y, color) {
    if (prefersReducedMotion) return;

    const sparkColors = [color, '#FFFFFF', '#F5A742', '#FFD080'];
    for (let i = 0; i < 20; i++) {
      const angle = (Math.PI * 2 * i / 20) + Math.random() * 0.3;
      const speed = 80 + Math.random() * 120;
      sparkParticles.push({
        x: x,
        y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        size: 2 + Math.random() * 4,
        color: sparkColors[Math.floor(Math.random() * sparkColors.length)],
        alpha: 1,
        life: 0.4 + Math.random() * 0.3
      });
    }
  }

  function updateSparks(dt) {
    sparkParticles = sparkParticles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vx *= 0.95;
      p.vy *= 0.95;
      p.life -= dt;
      p.alpha = Math.max(0, p.life / 0.5);
      return p.life > 0;
    });
  }

  function drawSparks() {
    sparkParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.size, p.size * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();

      // Glow effect
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.size * 0.5, p.size * 0.5 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // CONNECTOR PULSE ANIMATION
  // ═══════════════════════════════════════════════════════════════════════════
  function getConnectorPulse(index) {
    if (prefersReducedMotion) return 1;
    // Subtle pulse to indicate draggability
    const phase = animationTime / 1000 + index * 0.5;
    return 1 + Math.sin(phase * 2) * 0.08;
  }

  function initGame() {
    // Answer boxes on left side
    const ANSWER_HEIGHT = 100;
    const ANSWER_GAP = 20;
    const START_Y = 80;
    const ANSWER_WIDTH = 220;

    answers = QUESTION.choices.map((choice, i) => ({
      x: 10,
      y: START_Y + i * (ANSWER_HEIGHT + ANSWER_GAP),
      w: ANSWER_WIDTH,
      h: ANSWER_HEIGHT,
      choice: choice,
      wireColor: WIRE_COLORS[i],
      // Wire connector position (right edge of answer)
      connectorX: 10 + ANSWER_WIDTH,
      connectorY: START_Y + i * (ANSWER_HEIGHT + ANSWER_GAP) + ANSWER_HEIGHT / 2
    }));

    // Holes on right side (shuffled order)
    const HOLE_X = 320;
    const HOLE_RADIUS = 22;

    holes = HOLE_ORDER.map((colorIndex, i) => ({
      x: HOLE_X,
      y: START_Y + i * (ANSWER_HEIGHT + ANSWER_GAP) + ANSWER_HEIGHT / 2,
      radius: HOLE_RADIUS,
      wireColor: WIRE_COLORS[colorIndex],
      colorIndex: colorIndex
    }));

    draggingIndex = -1;
    connectedWires = [];
    sparkParticles = [];
    animationTime = 0;
    entranceComplete = false;

    // Initialize entrance animations
    initEntranceAnimation();

    // Calculate optimal text sizing
    recalculateTextSizing();
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    // Update animation time (for pulse effects)
    if (entranceComplete) {
      animationTime += dt * 1000;
    }

    // Update entrance animations
    updateEntranceAnimations(dt);

    // Update spark particles
    updateSparks(dt);
  }

  // Recalculate text sizing on resize (called by engine)
  // Each answer box is independent - find largest font where tallest answer fits
  function recalculateTextSizing() {
    if (!answers || answers.length === 0) return;

    const ANSWER_WIDTH = 220;
    const ANSWER_HEIGHT = 100;
    const textMaxWidth = ANSWER_WIDTH - 40;
    const availableHeight = ANSWER_HEIGHT - 20; // padding top/bottom

    let bestFontSize = 12;
    let bestWrappedTexts = [];

    // Find largest font size where the tallest answer still fits in one box
    for (let fontSize = 24; fontSize >= 12; fontSize -= 0.5) {
      const font = `500 ${fontSize}px 'Nunito', system-ui, sans-serif`;
      const lineHeight = fontSize * 1.3;

      let maxTextHeight = 0;
      const wrappedTexts = [];

      for (const choice of QUESTION.choices) {
        const lines = wrapText(choice.text, textMaxWidth, font, 4);
        wrappedTexts.push(lines);
        const textHeight = lines.length * lineHeight;
        maxTextHeight = Math.max(maxTextHeight, textHeight);
      }

      // Check if tallest answer fits in the box
      if (maxTextHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    answers.forEach((ans, i) => {
      ans.wrappedText = bestWrappedTexts[i];
      ans.fontSize = bestFontSize;
    });
  }

  function drawGame() {
    // Background gradient
    const gradient = ctx.createLinearGradient(0, 0, 0, H);
    gradient.addColorStop(0, '#1C1C1A');
    gradient.addColorStop(1, '#2A2A27');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, W, H);

    // Draw connected wires first (behind everything)
    connectedWires.forEach(conn => {
      drawWire(
        answers[conn.answerIndex].connectorX + (answers[conn.answerIndex].entranceX || 0),
        answers[conn.answerIndex].connectorY,
        holes[conn.holeIndex].x,
        holes[conn.holeIndex].y,
        answers[conn.answerIndex].wireColor,
        true
      );
    });

    // Draw dragging wire
    if (draggingIndex >= 0) {
      drawWire(
        answers[draggingIndex].connectorX + (answers[draggingIndex].entranceX || 0),
        answers[draggingIndex].connectorY,
        dragPos.x,
        dragPos.y,
        answers[draggingIndex].wireColor,
        false
      );
    }

    // Draw answer boxes
    answers.forEach((ans, i) => {
      const isConnected = connectedWires.some(c => c.answerIndex === i);
      const isDragging = draggingIndex === i;
      const entranceAlpha = ans.entranceAlpha !== undefined ? ans.entranceAlpha : 1;
      const entranceX = ans.entranceX || 0;

      ctx.save();
      ctx.globalAlpha = entranceAlpha;

      // Answer box background
      ctx.fillStyle = isDragging ? '#3A3A37' : '#2A2A27';
      ctx.beginPath();
      ctx.roundRect(ans.x + entranceX, ans.y, ans.w, ans.h, 12);
      ctx.fill();

      // Answer box border
      ctx.strokeStyle = isConnected ? ans.wireColor.color : '#424240';
      ctx.lineWidth = isConnected ? 3 : 2;
      ctx.stroke();

      // Wire connector circle on right edge with pulse animation
      const pulse = isConnected ? 1 : getConnectorPulse(i);
      const connR = 14 * pulse;
      ctx.beginPath();
      ctx.ellipse(ans.connectorX + entranceX, ans.connectorY, connR, connR * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fillStyle = ans.wireColor.color;
      ctx.fill();

      // Subtle glow on connector when not connected (hint it's interactive)
      if (!isConnected && entranceComplete) {
        ctx.save();
        ctx.shadowColor = ans.wireColor.color;
        ctx.shadowBlur = 6 + Math.sin(animationTime / 500 + i) * 3;
        ctx.beginPath();
        ctx.ellipse(ans.connectorX + entranceX, ans.connectorY, connR, connR * aspectRatio, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      // Inner connector detail
      ctx.beginPath();
      ctx.ellipse(ans.connectorX + entranceX, ans.connectorY, connR * 0.5, connR * 0.5 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fillStyle = ans.wireColor.light;
      ctx.fill();

      // Answer text (wrapped) - use cached sizing from recalculateTextSizing
      const fontSize = ans.fontSize || 16;
      const lines = ans.wrappedText || wrapText(ans.choice.text, ans.w - 40, fontSize);
      const lineHeight = fontSize * 1.3;
      const totalHeight = lines.length * lineHeight;
      const startTextY = ans.y + (ans.h - totalHeight) / 2 + lineHeight / 2;

      lines.forEach((line, lineIndex) => {
        drawText(line, ans.x + 12 + entranceX, startTextY + lineIndex * lineHeight, {
          font: `500 ${fontSize}px 'Nunito', system-ui, sans-serif`,
          color: '#F5F5F0',
          align: 'left',
          baseline: 'middle'
        });
      });

      ctx.restore();
    });

    // Draw holes on right side
    holes.forEach((hole, i) => {
      const isConnected = connectedWires.some(c => c.holeIndex === i);
      const entranceAlpha = hole.entranceAlpha !== undefined ? hole.entranceAlpha : 1;
      const entranceScale = hole.entranceScale !== undefined ? hole.entranceScale : 1;

      ctx.save();
      ctx.globalAlpha = entranceAlpha;

      const scaledRadius = hole.radius * entranceScale;

      // Outer ring
      ctx.beginPath();
      ctx.ellipse(hole.x, hole.y, (scaledRadius + 4), (scaledRadius + 4) * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#1C1C1A';
      ctx.fill();
      ctx.strokeStyle = hole.wireColor.color;
      ctx.lineWidth = 3;
      ctx.stroke();

      // Inner hole
      ctx.beginPath();
      ctx.ellipse(hole.x, hole.y, (scaledRadius - 4), (scaledRadius - 4) * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fillStyle = isConnected ? hole.wireColor.color : '#363633';
      ctx.fill();

      // Glow effect when connected
      if (isConnected) {
        ctx.save();
        ctx.shadowColor = hole.wireColor.color;
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.ellipse(hole.x, hole.y, (scaledRadius - 4), (scaledRadius - 4) * aspectRatio, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      ctx.restore();
    });

    // Draw spark particles on top
    drawSparks();
  }

  function drawWire(x1, y1, x2, y2, wireColor, isConnected) {
    // Calculate control points for bezier curve
    const midX = (x1 + x2) / 2;
    const dx = Math.abs(x2 - x1);
    const curveAmount = Math.min(dx * 0.5, 60);

    // Draw wire shadow
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.bezierCurveTo(
      x1 + curveAmount, y1,
      x2 - curveAmount, y2,
      x2, y2
    );
    ctx.strokeStyle = 'rgba(0, 0, 0, 0.4)';
    ctx.lineWidth = 10;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Draw main wire
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.bezierCurveTo(
      x1 + curveAmount, y1,
      x2 - curveAmount, y2,
      x2, y2
    );
    ctx.strokeStyle = wireColor.color;
    ctx.lineWidth = 7;
    ctx.stroke();

    // Wire highlight
    ctx.beginPath();
    ctx.moveTo(x1, y1 - 2);
    ctx.bezierCurveTo(
      x1 + curveAmount, y1 - 2,
      x2 - curveAmount, y2 - 2,
      x2, y2 - 2
    );
    ctx.strokeStyle = wireColor.light;
    ctx.lineWidth = 2;
    ctx.stroke();

    // End connector (plug)
    if (!isConnected) {
      ctx.beginPath();
      ctx.ellipse(x2, y2, 10, 10 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fillStyle = wireColor.color;
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(x2, y2, 5, 5 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fillStyle = wireColor.light;
      ctx.fill();
    }
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;

    // Don't allow interaction until entrance is complete
    if (!entranceComplete) return;

    const touch = e.touches[0] || e.changedTouches[0];
    if (!touch) return;

    const { x, y } = screenToLogical(touch.clientX, touch.clientY);

    if (type === 'start') {
      // Initialize audio on first interaction
      initAudio();

      // Check if touching a wire connector
      for (let i = 0; i < answers.length; i++) {
        // Skip if already connected
        if (connectedWires.some(c => c.answerIndex === i)) continue;

        const ans = answers[i];
        const dist = Math.sqrt(
          Math.pow(x - ans.connectorX, 2) +
          Math.pow((y - ans.connectorY) / aspectRatio, 2)
        );
        if (dist < 30) {
          draggingIndex = i;
          dragPos = { x, y };
          playSound('pickup');
          return;
        }
      }
    } else if (type === 'move') {
      if (draggingIndex >= 0) {
        dragPos = { x, y };
      }
    } else if (type === 'end') {
      if (draggingIndex >= 0) {
        // Check if released over a matching hole
        const answerWireColor = answers[draggingIndex].wireColor;
        let connected = false;

        for (let i = 0; i < holes.length; i++) {
          // Skip if hole already has a connection
          if (connectedWires.some(c => c.holeIndex === i)) continue;

          const hole = holes[i];
          const dist = Math.sqrt(
            Math.pow(x - hole.x, 2) +
            Math.pow((y - hole.y) / aspectRatio, 2)
          );

          if (dist < hole.radius + 15) {
            // Check if colors match
            if (answerWireColor.name === hole.wireColor.name) {
              // Connect the wire!
              connectedWires.push({
                answerIndex: draggingIndex,
                holeIndex: i
              });

              // Play plug sound and spawn sparks
              playSound('plug');
              spawnSparks(hole.x, hole.y, hole.wireColor.color);
              connected = true;

              // End the game with this answer after a short delay for visual feedback
              const choice = answers[draggingIndex].choice;
              setTimeout(() => {
                engine.end(choice.is_correct, choice.explanation);
              }, 300);
            }
            break;
          }
        }

        // Play soft buzz if released over nothing
        if (!connected) {
          playSound('buzz');
        }

        draggingIndex = -1;
      }
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  let mouseDown = false;
  canvas.addEventListener('mousedown', (e) => {
    mouseDown = true;
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mousemove', (e) => {
    if (mouseDown) {
      const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
      handleTouch(fakeTouch, 'move');
    }
  });

  canvas.addEventListener('mouseup', (e) => {
    mouseDown = false;
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });


  // Cursor change handler for end screen buttons
  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'ended') {
      canvas.style.cursor = 'default';
      return;
    }
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    if (gameResult) {
      if (pointInRect(x, y, restartButton) || pointInRect(x, y, nextButton)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    } else {
      if (pointInRect(x, y, centeredRestartButton)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    }
    canvas.style.cursor = 'default';
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
