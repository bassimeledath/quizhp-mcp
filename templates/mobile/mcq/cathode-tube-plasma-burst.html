<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Cathode Tube Plasma Burst</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE - MOBILE                                              ║
  ║  Fills 100% of container, non-uniform scaling, touch input.                  ║
  ║  Logical dimensions: 360×640 (use aspectRatio for proportional shapes)       ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none; /* Prevent default touch behaviors */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      /* Canvas fills viewport via JS, these are fallbacks */
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill viewport
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  Cathode Tube Plasma Burst - Glowing vacuum tubes float upward             ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const C = {
    bgDark: '#1C1C1A',
    woodDark: '#4A3728',
    woodMid: '#6B4F3A',
    woodLight: '#8B6C4E',
    tubeGlass: 'rgba(255, 200, 150, 0.12)',
    tubeGlassEdge: 'rgba(255, 180, 120, 0.25)',
    filamentOrange: '#E87A3E',
    filamentAmber: '#F5A742',
    filamentHot: '#FFD4A8',
    circuitGreen: '#2A4A3A',
    circuitCopper: '#B87333',
    circuitDark: '#1A2F24',
    sparkWhite: '#FFF8E8',
    sparkOrange: '#FFB89D',
    plasmaCore: '#4ECDC4',
    plasmaBurst: '#E87A3E',
    success: '#6BBF59',
    error: '#E85D4A',
    textLight: '#F5F5F0',
    textMuted: '#8C8C84',
  };

  // === GAME STATE ===
  let tubes = [];
  let sparks = [];
  let plasmaParticles = [];
  let circuitLayers = [];
  let gameTime = 0;
  let selectedTube = null;
  let animPhase = 'floating'; // 'floating' | 'selected' | 'feedback'
  let feedbackTimer = 0;
  let entranceProgress = 0;

  // Audio context for sounds
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playSound(type) {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);

      if (type === 'correct') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(520, ac.currentTime);
        osc.frequency.exponentialRampToValueAtTime(880, ac.currentTime + 0.15);
        gain.gain.setValueAtTime(0.2, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + 0.4);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.4);
      } else if (type === 'wrong') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, ac.currentTime);
        osc.frequency.exponentialRampToValueAtTime(80, ac.currentTime + 0.3);
        gain.gain.setValueAtTime(0.15, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + 0.4);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.4);
      } else if (type === 'tap') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(660, ac.currentTime);
        gain.gain.setValueAtTime(0.08, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + 0.1);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.1);
      } else if (type === 'plasma') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(300, ac.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1200, ac.currentTime + 0.2);
        osc.frequency.exponentialRampToValueAtTime(600, ac.currentTime + 0.5);
        gain.gain.setValueAtTime(0.12, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + 0.5);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.5);
      }
    } catch (e) {}
  }

  function initCircuitLayers() {
    circuitLayers = [];
    for (let layer = 0; layer < 3; layer++) {
      const traces = [];
      const count = 6 + layer * 3;
      for (let i = 0; i < count; i++) {
        const startX = Math.random() * W;
        const startY = Math.random() * H;
        const segments = [];
        let cx = startX, cy = startY;
        const segCount = 3 + Math.floor(Math.random() * 4);
        for (let s = 0; s < segCount; s++) {
          const horizontal = Math.random() > 0.5;
          const len = 20 + Math.random() * 60;
          const ex = horizontal ? cx + (Math.random() > 0.5 ? len : -len) : cx;
          const ey = horizontal ? cy : cy + (Math.random() > 0.5 ? len : -len);
          segments.push({ x1: cx, y1: cy, x2: ex, y2: ey });
          cx = ex;
          cy = ey;
        }
        traces.push({
          segments,
          alpha: 0.08 + layer * 0.04,
          speed: 0.3 + layer * 0.15,
          pulseOffset: Math.random() * Math.PI * 2,
        });
      }
      circuitLayers.push({ traces, depth: layer });
    }
  }

  function initTubes() {
    tubes = [];
    // Vertical stack: tube icon on left, text on right
    const tubeW = 50;
    const tubeH = 80;
    const rowH = 120;
    const gap = 16;
    const totalH = rowH * 4 + gap * 3;
    const startY = (H - totalH) / 2 + 10;
    const tubeX = 20;

    QUESTION.choices.forEach((choice, i) => {
      const rowY = startY + i * (rowH + gap);
      tubes.push({
        x: tubeX,
        y: rowY + (rowH - tubeH) / 2,
        w: tubeW,
        h: tubeH,
        baseY: rowY + (rowH - tubeH) / 2,
        rowY: rowY,
        rowH: rowH,
        choice: choice,
        index: i,
        filamentGlow: 0.5 + Math.random() * 0.5,
        filamentPhase: Math.random() * Math.PI * 2,
        floatOffset: Math.random() * Math.PI * 2,
        floatSpeed: 0.6 + Math.random() * 0.4,
        scale: 0,
        alpha: 0,
        shakeX: 0,
        broken: false,
        breakTimer: 0,
        glowPulse: 0,
        wrappedText: null,
        fontSize: 16,
        hitRect: { x: 0, y: 0, w: 0, h: 0 },
      });
    });
  }

  function recalculateTextSizing() {
    if (!tubes || tubes.length === 0) return;

    // Text area is right of tube: from x=80 to x=350 = 270 logical px
    const maxTextWidth = 260;
    const availableH = tubes[0].rowH * 4 + 16 * 3;

    const { fontSize, wrappedTexts } = findOptimalFontSize({
      texts: QUESTION.choices.map(c => c.text),
      maxWidth: maxTextWidth,
      availableHeight: availableH,
      minFont: 14,
      maxFont: 18,
      fontFamily: "'Nunito', sans-serif"
    });

    tubes.forEach((tube, i) => {
      tube.wrappedText = wrappedTexts[i];
      tube.fontSize = fontSize;
    });
  }

  function initGame() {
    gameTime = 0;
    selectedTube = null;
    animPhase = 'floating';
    feedbackTimer = 0;
    entranceProgress = 0;
    sparks = [];
    plasmaParticles = [];

    initCircuitLayers();
    initTubes();
    recalculateTextSizing();
  }

  function spawnSparks(x, y, count) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 80 + Math.random() * 200;
      sparks.push({
        x: x,
        y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 60,
        life: 0.5 + Math.random() * 0.8,
        maxLife: 0.5 + Math.random() * 0.8,
        size: 1.5 + Math.random() * 3,
        color: Math.random() > 0.3 ? C.sparkWhite : C.sparkOrange,
      });
    }
  }

  function spawnPlasma(x, y, count) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 40 + Math.random() * 120;
      plasmaParticles.push({
        x: x,
        y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 80,
        life: 0.6 + Math.random() * 0.6,
        maxLife: 0.6 + Math.random() * 0.6,
        size: 3 + Math.random() * 5,
        color: Math.random() > 0.5 ? C.plasmaCore : C.plasmaBurst,
      });
    }
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Entrance animation
    if (entranceProgress < 1) {
      entranceProgress = Math.min(1, entranceProgress + dt * 1.8);
      tubes.forEach((tube, i) => {
        const delay = i * 0.12;
        const t = Math.max(0, Math.min(1, (entranceProgress - delay) / 0.5));
        const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
        tube.scale = t * spring;
        tube.alpha = t;
      });
    } else {
      tubes.forEach(t => { t.scale = 1; t.alpha = 1; });
    }

    // Float tubes upward gently
    tubes.forEach(tube => {
      if (!tube.broken) {
        const floatAmt = Math.sin(gameTime * tube.floatSpeed + tube.floatOffset) * 6;
        tube.y = tube.baseY + floatAmt;
        tube.filamentGlow = 0.6 + 0.4 * Math.sin(gameTime * 2 + tube.filamentPhase);
      }

      // Update hit rect - covers full row (tube + text area)
      tube.hitRect = {
        x: 10,
        y: tube.rowY,
        w: W - 20,
        h: tube.rowH,
      };
    });

    // Feedback phase
    if (animPhase === 'feedback') {
      feedbackTimer += dt;

      if (selectedTube) {
        if (selectedTube.choice.is_correct) {
          selectedTube.glowPulse = Math.min(1, feedbackTimer * 3);
          if (feedbackTimer > 0.15 && feedbackTimer < 0.2) {
            spawnPlasma(selectedTube.x + selectedTube.w / 2, selectedTube.y + selectedTube.h / 2, 8);
          }
        } else {
          // Shake animation
          const decay = Math.max(0, 1 - feedbackTimer * 2.5);
          selectedTube.shakeX = Math.sin(feedbackTimer * Math.PI * 14) * 8 * decay;
          if (feedbackTimer > 0.05 && feedbackTimer < 0.35) {
            if (Math.random() < 0.3) {
              spawnSparks(selectedTube.x + selectedTube.w / 2 + selectedTube.shakeX,
                selectedTube.y + selectedTube.h * 0.4, 3);
            }
          }
        }
      }

      if (feedbackTimer > 0.7) {
        const choice = selectedTube.choice;
        engine.end(choice.is_correct, choice.explanation);
      }
    }

    // Update sparks
    sparks = sparks.filter(s => {
      s.x += s.vx * dt;
      s.y += s.vy * dt;
      s.vy += 300 * dt;
      s.life -= dt;
      return s.life > 0;
    });

    // Update plasma particles
    plasmaParticles = plasmaParticles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 100 * dt;
      p.life -= dt;
      return p.life > 0;
    });
  }

  function drawCircuitBackground() {
    circuitLayers.forEach(layer => {
      layer.traces.forEach(trace => {
        const pulse = 0.5 + 0.5 * Math.sin(gameTime * trace.speed + trace.pulseOffset);
        trace.segments.forEach(seg => {
          ctx.strokeStyle = `rgba(43, 115, 51, ${trace.alpha * (0.5 + pulse * 0.5)})`;
          ctx.lineWidth = 1 + layer.depth * 0.3;
          ctx.beginPath();
          ctx.moveTo(seg.x1, seg.y1);
          ctx.lineTo(seg.x2, seg.y2);
          ctx.stroke();

          // Solder points
          if (Math.random() < 0.05) {
            ctx.fillStyle = `rgba(184, 115, 51, ${trace.alpha * 0.6})`;
            ctx.beginPath();
            ctx.ellipse(seg.x2, seg.y2, 2, 2 * aspectRatio, 0, 0, Math.PI * 2);
            ctx.fill();
          }
        });
      });
    });
  }

  function drawWoodChassis() {
    // Top wood bar
    const grad = ctx.createLinearGradient(0, 0, 0, 30);
    grad.addColorStop(0, C.woodDark);
    grad.addColorStop(0.5, C.woodMid);
    grad.addColorStop(1, C.woodDark);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, 30);

    // Bottom wood bar
    const grad2 = ctx.createLinearGradient(0, H - 30, 0, H);
    grad2.addColorStop(0, C.woodDark);
    grad2.addColorStop(0.5, C.woodMid);
    grad2.addColorStop(1, C.woodDark);
    ctx.fillStyle = grad2;
    ctx.fillRect(0, H - 30, W, 30);

    // Wood grain lines on top
    ctx.strokeStyle = `rgba(139, 108, 78, 0.3)`;
    ctx.lineWidth = 0.5;
    for (let i = 0; i < 8; i++) {
      const y = 5 + i * 3;
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.bezierCurveTo(W * 0.3, y + 1, W * 0.7, y - 1, W, y);
      ctx.stroke();
    }
    // Wood grain on bottom
    for (let i = 0; i < 8; i++) {
      const y = H - 25 + i * 3;
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.bezierCurveTo(W * 0.3, y + 1, W * 0.7, y - 1, W, y);
      ctx.stroke();
    }
  }

  function drawTube(tube) {
    // Draw row background
    ctx.fillStyle = 'rgba(255, 200, 150, 0.04)';
    ctx.beginPath();
    ctx.roundRect(12, tube.rowY + 2, W - 24, tube.rowH - 4, 10);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255, 200, 150, 0.08)';
    ctx.lineWidth = 1;
    ctx.stroke();

    const cx = tube.x + tube.w / 2 + tube.shakeX;
    const cy = tube.y + tube.h / 2;
    const halfW = tube.w / 2;
    const halfH = tube.h / 2;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(tube.scale, tube.scale);
    ctx.globalAlpha = tube.alpha;

    // Outer glow (filament warmth)
    if (!tube.broken) {
      const glowGrad = ctx.createRadialGradient(0, 0, halfW * 0.3, 0, 0, halfW * 1.5);
      const glowAlpha = tube.filamentGlow * 0.2;
      glowGrad.addColorStop(0, `rgba(232, 122, 62, ${glowAlpha})`);
      glowGrad.addColorStop(1, 'rgba(232, 122, 62, 0)');
      ctx.fillStyle = glowGrad;
      ctx.beginPath();
      ctx.ellipse(0, 0, halfW * 1.5, halfH * 1.2 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Plasma glow for correct selection
    if (tube.glowPulse > 0) {
      const plasmaGrad = ctx.createRadialGradient(0, 0, halfW * 0.2, 0, 0, halfW * 2);
      plasmaGrad.addColorStop(0, `rgba(78, 205, 196, ${tube.glowPulse * 0.5})`);
      plasmaGrad.addColorStop(0.5, `rgba(78, 205, 196, ${tube.glowPulse * 0.2})`);
      plasmaGrad.addColorStop(1, 'rgba(78, 205, 196, 0)');
      ctx.fillStyle = plasmaGrad;
      ctx.beginPath();
      ctx.ellipse(0, 0, halfW * 2, halfH * 1.6 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Glass tube body
    ctx.beginPath();
    ctx.moveTo(-halfW + 8, -halfH);
    ctx.lineTo(halfW - 8, -halfH);
    ctx.quadraticCurveTo(halfW, -halfH, halfW, -halfH + 8);
    ctx.lineTo(halfW, halfH - 12);
    ctx.quadraticCurveTo(halfW, halfH, halfW - 12, halfH);
    ctx.lineTo(-halfW + 12, halfH);
    ctx.quadraticCurveTo(-halfW, halfH, -halfW, halfH - 12);
    ctx.lineTo(-halfW, -halfH + 8);
    ctx.quadraticCurveTo(-halfW, -halfH, -halfW + 8, -halfH);
    ctx.closePath();

    if (tube.broken) {
      ctx.fillStyle = 'rgba(100, 100, 90, 0.5)';
    } else {
      const glassGrad = ctx.createLinearGradient(-halfW, 0, halfW, 0);
      glassGrad.addColorStop(0, C.tubeGlassEdge);
      glassGrad.addColorStop(0.3, C.tubeGlass);
      glassGrad.addColorStop(0.7, C.tubeGlass);
      glassGrad.addColorStop(1, C.tubeGlassEdge);
      ctx.fillStyle = glassGrad;
    }
    ctx.fill();

    // Glass highlight
    if (!tube.broken) {
      ctx.strokeStyle = 'rgba(255, 220, 180, 0.15)';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Specular highlight
      ctx.beginPath();
      ctx.moveTo(-halfW + 12, -halfH + 10);
      ctx.lineTo(-halfW + 14, halfH - 20);
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.12)';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Filament inside tube
    if (!tube.broken) {
      const filGlow = tube.filamentGlow;
      // Filament wire - zigzag
      ctx.beginPath();
      ctx.moveTo(-12, halfH - 20);
      for (let i = 0; i < 5; i++) {
        const fx = (i % 2 === 0 ? 8 : -8);
        const fy = halfH - 25 - i * 14;
        ctx.lineTo(fx, fy);
      }
      ctx.strokeStyle = `rgba(255, 212, 168, ${0.4 + filGlow * 0.6})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Glow around filament
      ctx.beginPath();
      ctx.moveTo(-12, halfH - 20);
      for (let i = 0; i < 5; i++) {
        const fx = (i % 2 === 0 ? 8 : -8);
        const fy = halfH - 25 - i * 14;
        ctx.lineTo(fx, fy);
      }
      ctx.strokeStyle = `rgba(232, 122, 62, ${filGlow * 0.5})`;
      ctx.lineWidth = 4;
      ctx.stroke();
    } else {
      // Broken filament - snapped in middle
      ctx.beginPath();
      ctx.moveTo(-12, halfH - 20);
      ctx.lineTo(8, halfH - 39);
      ctx.lineTo(-8, halfH - 53);
      ctx.strokeStyle = 'rgba(100, 100, 90, 0.4)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Tube base (metal pin base)
    ctx.fillStyle = tube.broken ? '#555550' : '#8B7355';
    ctx.beginPath();
    ctx.roundRect(-halfW + 5, halfH - 5, tube.w - 10, 14, 3);
    ctx.fill();

    // Pin connectors
    ctx.fillStyle = tube.broken ? '#444440' : C.circuitCopper;
    const pinY = halfH + 6;
    for (let p = 0; p < 3; p++) {
      const px = -10 + p * 10;
      ctx.fillRect(px - 1.5, pinY, 3, 6);
    }

    ctx.restore();

    // Draw text label to the right of tube
    const textX = tube.x + tube.w + 16;
    const rowCenterY = tube.rowY + tube.rowH / 2;
    const lines = tube.wrappedText || [tube.choice.text];
    const fs = tube.fontSize || 16;
    const lineH = fs + 3;
    const totalTextH = lines.length * lineH;
    const startTextY = rowCenterY - totalTextH / 2 + lineH / 2;

    lines.forEach((line, li) => {
      const ly = startTextY + li * lineH;
      let textColor = C.textLight;
      if (tube.broken) textColor = C.textMuted;
      if (tube.glowPulse > 0) textColor = C.success;

      drawText(line, textX, ly, {
        font: `500 ${fs}px 'Nunito', sans-serif`,
        color: textColor,
        align: 'left',
      });
    });
  }

  function drawSparks() {
    sparks.forEach(s => {
      const alpha = s.life / s.maxLife;
      ctx.fillStyle = s.color;
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.ellipse(s.x, s.y, s.size, s.size * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  function drawPlasmaParticles() {
    plasmaParticles.forEach(p => {
      const alpha = p.life / p.maxLife;
      ctx.globalAlpha = alpha;
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 2);
      grad.addColorStop(0, p.color);
      grad.addColorStop(1, 'rgba(78, 205, 196, 0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.size * 2, p.size * 2 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  function drawGame() {
    // Background - deep radio chassis interior
    const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
    bgGrad.addColorStop(0, '#0F1B14');
    bgGrad.addColorStop(0.5, '#1A2F24');
    bgGrad.addColorStop(1, '#0F1B14');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    // Parallax circuit layers (back)
    drawCircuitBackground();

    // Wood chassis frame
    drawWoodChassis();

    // Draw tubes
    tubes.forEach(tube => drawTube(tube));

    // Particles on top
    drawSparks();
    drawPlasmaParticles();
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;
    if (animPhase !== 'floating') return;

    if (type === 'start') {
      const touch = e.touches[0] || e.changedTouches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      tubes.forEach(tube => {
        if (pointInRect(x, y, tube.hitRect)) {
          playSound('tap');
          selectedTube = tube;
          animPhase = 'feedback';
          feedbackTimer = 0;

          if (tube.choice.is_correct) {
            playSound('plasma');
            spawnPlasma(tube.x + tube.w / 2, tube.y + tube.h / 2, 25);
          } else {
            tube.broken = true;
            playSound('wrong');
            spawnSparks(tube.x + tube.w / 2, tube.y + tube.h * 0.4, 30);
          }
        }
      });
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
