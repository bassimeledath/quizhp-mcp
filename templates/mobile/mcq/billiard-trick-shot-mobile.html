<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Billiard Trick Shot</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE - MOBILE                                              ║
  ║  Fills 100% of container, non-uniform scaling, touch input.                  ║
  ║  Logical dimensions: 360×640 (use aspectRatio for proportional shapes)       ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none; /* Prevent default touch behaviors */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1C1C1A;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #1C1C1A;
      /* Canvas fills viewport via JS, these are fallbacks */
      width: 100vw;
      height: 100vh;
    }
  </style>

</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill viewport
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   *
   * @param {string} text - The text to wrap
   * @param {number} maxWidth - Maximum width in logical coordinates
   * @param {string} font - CSS font string (e.g., "16px 'Nunito', sans-serif")
   * @param {number} maxLines - Maximum number of lines (default 3)
   * @returns {string[]} Array of text lines
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   * Tries font sizes from max to min until content fits.
   *
   * @param {Object} options
   * @param {string[]} options.texts - Array of text strings to fit
   * @param {number} options.maxWidth - Maximum width for text wrapping
   * @param {number} options.availableHeight - Total height available for all texts
   * @param {number} options.minFont - Minimum font size (default 12)
   * @param {number} options.maxFont - Maximum font size (default 18)
   * @param {number} options.itemPadding - Vertical padding per text item (default 4)
   * @param {string} options.fontFamily - Font family (default "'Nunito Sans', sans-serif")
   * @returns {{ fontSize: number, wrappedTexts: string[][] }} Optimal font size and pre-wrapped texts
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === GAME STATE ===
  const TABLE_MARGIN = 20;
  const TABLE_X = TABLE_MARGIN;
  const TABLE_Y = 60;
  const TABLE_W = W - TABLE_MARGIN * 2;
  const TABLE_H = 320;
  const RAIL_WIDTH = 12;
  const BALL_RADIUS = 12;
  const CUE_BALL_RADIUS = 10;

  // QuizHP Color Palette
  const COLORS = {
    bgPrimary: '#1C1C1A',
    bgSurface: '#2A2A27',
    textPrimary: '#F5F5F0',
    textSecondary: '#C2C2B8',
    orange: '#E87A3E',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#424240'
  };

  // Ball colors mapped to answer indices
  const BALL_COLORS = [COLORS.error, COLORS.cyan, COLORS.success, COLORS.amber];

  let cueBall = null;
  let targetBalls = [];
  let cueStick = null;
  let isDragging = false;
  let dragStart = null;
  let aimAngle = 0;
  let power = 0;
  let shotInProgress = false;
  let answerPanels = [];
  let selectedBallIndex = -1;
  let gamePhase = 'aiming'; // 'aiming' | 'shooting' | 'rolling' | 'result'
  let resultTimer = 0;

  // Animation state
  let entranceAnimTime = 0;
  let ballParticles = [];
  let hitEffects = [];
  let shakeOffset = { x: 0, y: 0 };
  let celebrationScale = 1;

  // Physics constants
  const FRICTION = 0.985;
  const MIN_VELOCITY = 0.5;
  const COLLISION_ELASTICITY = 0.9;
  const MAX_POWER = 400;

  // Web Audio API for sound effects
  let audioCtx = null;
  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'hit') {
      osc.frequency.setValueAtTime(150, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'rail') {
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.05);
    } else if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    } else if (type === 'shoot') {
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(100, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.15);
    }
  }

  // Particle system for ball hits
  function spawnHitParticles(x, y, color) {
    for (let i = 0; i < 8; i++) {
      ballParticles.push({
        x, y,
        vx: (Math.random() - 0.5) * 100,
        vy: (Math.random() - 0.5) * 100,
        color: color,
        size: 3 + Math.random() * 4,
        life: 1
      });
    }
  }

  function spawnHitEffect(x, y) {
    hitEffects.push({
      x, y,
      scale: 0.5,
      alpha: 1,
      life: 1
    });
  }

  function initGame() {
    initAudio();

    // Place cue ball near bottom center
    cueBall = {
      x: W / 2,
      y: TABLE_Y + TABLE_H - 50,
      vx: 0,
      vy: 0,
      radius: CUE_BALL_RADIUS,
      scale: 0,
      alpha: 0
    };

    // Place four target balls in strategic positions
    targetBalls = [
      { x: TABLE_X + RAIL_WIDTH + 60, y: TABLE_Y + RAIL_WIDTH + 50, vx: 0, vy: 0, radius: BALL_RADIUS, index: 0, scale: 0, alpha: 0 },
      { x: TABLE_X + TABLE_W - RAIL_WIDTH - 60, y: TABLE_Y + RAIL_WIDTH + 50, vx: 0, vy: 0, radius: BALL_RADIUS, index: 1, scale: 0, alpha: 0 },
      { x: TABLE_X + RAIL_WIDTH + 80, y: TABLE_Y + TABLE_H / 2, vx: 0, vy: 0, radius: BALL_RADIUS, index: 2, scale: 0, alpha: 0 },
      { x: TABLE_X + TABLE_W - RAIL_WIDTH - 80, y: TABLE_Y + TABLE_H / 2, vx: 0, vy: 0, radius: BALL_RADIUS, index: 3, scale: 0, alpha: 0 }
    ];

    // Initialize answer panels below table
    const panelStartY = TABLE_Y + TABLE_H + 20;
    const panelHeight = 50;
    const panelGap = 8;

    answerPanels = QUESTION.choices.map((choice, i) => ({
      x: TABLE_MARGIN,
      y: panelStartY + i * (panelHeight + panelGap),
      w: TABLE_W,
      h: panelHeight,
      choice: choice,
      index: i,
      highlighted: false,
      scale: 0,
      alpha: 0
    }));

    // Reset game state
    isDragging = false;
    dragStart = null;
    aimAngle = -Math.PI / 2;
    power = 0;
    shotInProgress = false;
    selectedBallIndex = -1;
    gamePhase = 'aiming';
    resultTimer = 0;
    entranceAnimTime = 0;
    ballParticles = [];
    hitEffects = [];
    shakeOffset = { x: 0, y: 0 };
    celebrationScale = 1;

    recalculateTextSizing();

    // Trigger entrance animations
    animateEntrance();
  }

  function animateEntrance() {
    // Animate balls bouncing in
    const allBalls = [...targetBalls, cueBall];
    allBalls.forEach((ball, i) => {
      const delay = i * 60;
      setTimeout(() => {
        animateBounceIn(ball, 350);
      }, delay);
    });

    // Animate panels sliding in
    answerPanels.forEach((panel, i) => {
      const delay = 300 + i * 80;
      setTimeout(() => {
        animateBounceIn(panel, 300);
      }, delay);
    });
  }

  function animateBounceIn(target, duration) {
    const start = performance.now();
    const animate = (now) => {
      const t = Math.min((now - start) / duration, 1);
      // Spring easing
      const spring = 1 + Math.sin(t * Math.PI * 2) * 0.15 * (1 - t);
      target.scale = t * spring;
      target.alpha = t;
      if (t < 1) requestAnimationFrame(animate);
      else { target.scale = 1; target.alpha = 1; }
    };
    requestAnimationFrame(animate);
  }

  function recalculateTextSizing() {
    if (!answerPanels || answerPanels.length === 0) return;

    const { fontSize, wrappedTexts } = findOptimalFontSize({
      texts: QUESTION.choices.map(c => c.text),
      maxWidth: TABLE_W - 50,
      availableHeight: 180,
      minFont: 14,
      maxFont: 16,
      itemPadding: 8
    });

    answerPanels.forEach((panel, i) => {
      panel.wrappedText = wrappedTexts[i];
      panel.fontSize = fontSize;
    });
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    // Update entrance animation time
    entranceAnimTime += dt;

    // Update particles
    ballParticles = ballParticles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vx *= 0.95;
      p.vy *= 0.95;
      p.life -= dt * 2;
      p.size *= 0.98;
      return p.life > 0;
    });

    // Update hit effects
    hitEffects = hitEffects.filter(e => {
      e.scale += dt * 4;
      e.alpha -= dt * 3;
      e.life -= dt * 2;
      return e.life > 0;
    });

    // Update shake decay
    shakeOffset.x *= 0.9;
    shakeOffset.y *= 0.9;

    // Update celebration scale
    if (celebrationScale > 1) {
      celebrationScale = 1 + (celebrationScale - 1) * 0.95;
      if (celebrationScale < 1.01) celebrationScale = 1;
    }

    if (gamePhase === 'rolling') {
      // Update ball physics
      updateBallPhysics(cueBall, dt);
      targetBalls.forEach(ball => updateBallPhysics(ball, dt));

      // Check ball-to-ball collisions
      checkBallCollisions();

      // Check rail collisions
      checkRailCollisions(cueBall);
      targetBalls.forEach(ball => checkRailCollisions(ball));

      // Check if cue ball hit a target ball
      if (selectedBallIndex < 0) {
        for (let i = 0; i < targetBalls.length; i++) {
          const ball = targetBalls[i];
          const dx = cueBall.x - ball.x;
          const dy = cueBall.y - ball.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < cueBall.radius + ball.radius + 2) {
            selectedBallIndex = i;
            answerPanels[i].highlighted = true;
            // Spawn hit particles
            const midX = (cueBall.x + ball.x) / 2;
            const midY = (cueBall.y + ball.y) / 2;
            spawnHitParticles(midX, midY, BALL_COLORS[i]);
            spawnHitEffect(midX, midY);
            playSound('hit');
            break;
          }
        }
      }

      // Check if all balls stopped
      const allStopped =
        Math.abs(cueBall.vx) < MIN_VELOCITY && Math.abs(cueBall.vy) < MIN_VELOCITY &&
        targetBalls.every(b => Math.abs(b.vx) < MIN_VELOCITY && Math.abs(b.vy) < MIN_VELOCITY);

      if (allStopped) {
        cueBall.vx = 0;
        cueBall.vy = 0;
        targetBalls.forEach(b => { b.vx = 0; b.vy = 0; });

        if (selectedBallIndex >= 0) {
          gamePhase = 'result';
          resultTimer = 0;
          // Trigger celebration or shake based on answer
          const choice = QUESTION.choices[selectedBallIndex];
          if (choice.is_correct) {
            celebrationScale = 1.2;
            playSound('correct');
          } else {
            shakeOffset = { x: 8, y: 0 };
            playSound('wrong');
          }
        } else {
          // Missed - reset to aiming
          gamePhase = 'aiming';
        }
      }
    }

    if (gamePhase === 'result') {
      resultTimer += dt;
      if (resultTimer > 0.8) {
        const choice = QUESTION.choices[selectedBallIndex];
        engine.end(choice.is_correct, choice.explanation);
      }
    }
  }

  function updateBallPhysics(ball, dt) {
    ball.x += ball.vx * dt;
    ball.y += ball.vy * dt;
    ball.vx *= FRICTION;
    ball.vy *= FRICTION;
  }

  function checkBallCollisions() {
    // Cue ball vs target balls
    for (const ball of targetBalls) {
      resolveBallCollision(cueBall, ball);
    }

    // Target balls vs each other
    for (let i = 0; i < targetBalls.length; i++) {
      for (let j = i + 1; j < targetBalls.length; j++) {
        resolveBallCollision(targetBalls[i], targetBalls[j]);
      }
    }
  }

  function resolveBallCollision(ball1, ball2) {
    const dx = ball2.x - ball1.x;
    const dy = ball2.y - ball1.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const minDist = ball1.radius + ball2.radius;

    if (dist < minDist && dist > 0) {
      // Normalize collision vector
      const nx = dx / dist;
      const ny = dy / dist;

      // Relative velocity
      const dvx = ball1.vx - ball2.vx;
      const dvy = ball1.vy - ball2.vy;

      // Relative velocity along collision normal
      const dvn = dvx * nx + dvy * ny;

      // Only resolve if balls are approaching
      if (dvn > 0) {
        // Update velocities (equal mass collision)
        ball1.vx -= dvn * nx * COLLISION_ELASTICITY;
        ball1.vy -= dvn * ny * COLLISION_ELASTICITY;
        ball2.vx += dvn * nx * COLLISION_ELASTICITY;
        ball2.vy += dvn * ny * COLLISION_ELASTICITY;
      }

      // Separate balls
      const overlap = minDist - dist;
      ball1.x -= overlap * nx * 0.5;
      ball1.y -= overlap * ny * 0.5;
      ball2.x += overlap * nx * 0.5;
      ball2.y += overlap * ny * 0.5;
    }
  }

  function checkRailCollisions(ball) {
    const left = TABLE_X + RAIL_WIDTH + ball.radius;
    const right = TABLE_X + TABLE_W - RAIL_WIDTH - ball.radius;
    const top = TABLE_Y + RAIL_WIDTH + ball.radius;
    const bottom = TABLE_Y + TABLE_H - RAIL_WIDTH - ball.radius;

    let hitRail = false;

    if (ball.x < left) {
      ball.x = left;
      ball.vx = -ball.vx * COLLISION_ELASTICITY;
      hitRail = true;
    }
    if (ball.x > right) {
      ball.x = right;
      ball.vx = -ball.vx * COLLISION_ELASTICITY;
      hitRail = true;
    }
    if (ball.y < top) {
      ball.y = top;
      ball.vy = -ball.vy * COLLISION_ELASTICITY;
      hitRail = true;
    }
    if (ball.y > bottom) {
      ball.y = bottom;
      ball.vy = -ball.vy * COLLISION_ELASTICITY;
      hitRail = true;
    }

    if (hitRail && (Math.abs(ball.vx) > 20 || Math.abs(ball.vy) > 20)) {
      playSound('rail');
    }
  }

  function drawGame() {
    // Apply shake offset
    ctx.save();
    ctx.translate(shakeOffset.x * Math.sin(performance.now() * 0.05), shakeOffset.y);

    // Background
    ctx.fillStyle = COLORS.bgPrimary;
    ctx.fillRect(0, 0, W, H);

    // Draw pool table
    drawPoolTable();

    // Draw hit effects (before balls)
    hitEffects.forEach(e => {
      ctx.save();
      ctx.globalAlpha = e.alpha * 0.5;
      ctx.strokeStyle = COLORS.amber;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.ellipse(e.x, e.y, e.scale * 20, e.scale * 20 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    });

    // Draw target balls
    targetBalls.forEach((ball, i) => {
      if (ball.alpha > 0) {
        drawBall(ball.x, ball.y, ball.radius * (ball.scale || 1), BALL_COLORS[i], i + 1, ball.alpha || 1);
      }
    });

    // Draw cue ball
    if (cueBall.alpha > 0) {
      drawBall(cueBall.x, cueBall.y, cueBall.radius * (cueBall.scale || 1), '#FFFFFF', null, cueBall.alpha || 1);
    }

    // Draw particles
    ballParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.size, p.size * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });

    // Draw aiming line and cue stick when aiming
    if (gamePhase === 'aiming' && isDragging) {
      drawAimingGuide();
    }

    // Draw answer panels
    drawAnswerPanels();

    ctx.restore();
  }

  function drawPoolTable() {
    // Table shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.roundRect(TABLE_X - 2 + 4, TABLE_Y - 2 + 4, TABLE_W + 4, TABLE_H + 4, 10);
    ctx.fill();

    // Table outer frame (rich wood)
    const woodGradient = ctx.createLinearGradient(TABLE_X, TABLE_Y, TABLE_X, TABLE_Y + TABLE_H);
    woodGradient.addColorStop(0, '#6D4C41');
    woodGradient.addColorStop(0.5, '#5D4037');
    woodGradient.addColorStop(1, '#4E342E');
    ctx.fillStyle = woodGradient;
    ctx.beginPath();
    ctx.roundRect(TABLE_X - 4, TABLE_Y - 4, TABLE_W + 8, TABLE_H + 8, 10);
    ctx.fill();

    // Table felt (green gradient)
    const feltGradient = ctx.createRadialGradient(
      TABLE_X + TABLE_W / 2, TABLE_Y + TABLE_H / 2, 0,
      TABLE_X + TABLE_W / 2, TABLE_Y + TABLE_H / 2, TABLE_W / 2
    );
    feltGradient.addColorStop(0, '#2E7D32');
    feltGradient.addColorStop(1, '#1B5E20');
    ctx.fillStyle = feltGradient;
    ctx.fillRect(TABLE_X, TABLE_Y, TABLE_W, TABLE_H);

    // Rails with subtle gradient
    const railGradient = ctx.createLinearGradient(TABLE_X, TABLE_Y, TABLE_X + RAIL_WIDTH, TABLE_Y);
    railGradient.addColorStop(0, '#388E3C');
    railGradient.addColorStop(1, '#2E7D32');
    ctx.fillStyle = railGradient;
    // Top rail
    ctx.fillRect(TABLE_X, TABLE_Y, TABLE_W, RAIL_WIDTH);
    // Bottom rail
    ctx.fillRect(TABLE_X, TABLE_Y + TABLE_H - RAIL_WIDTH, TABLE_W, RAIL_WIDTH);
    // Left rail
    ctx.fillRect(TABLE_X, TABLE_Y, RAIL_WIDTH, TABLE_H);
    // Right rail
    ctx.fillRect(TABLE_X + TABLE_W - RAIL_WIDTH, TABLE_Y, RAIL_WIDTH, TABLE_H);

    // Corner pockets (decorative)
    ctx.fillStyle = '#1C1C1A';
    const pocketR = 10;
    [[TABLE_X, TABLE_Y], [TABLE_X + TABLE_W, TABLE_Y],
     [TABLE_X, TABLE_Y + TABLE_H], [TABLE_X + TABLE_W, TABLE_Y + TABLE_H]].forEach(([px, py]) => {
      ctx.beginPath();
      ctx.ellipse(px, py, pocketR, pocketR * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
      // Inner glow
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 2;
      ctx.stroke();
    });
  }

  function drawBall(x, y, radius, color, number, alpha = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;

    // Ball shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.ellipse(x + 2, y + 2, radius, radius * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Ball body with gradient
    const ballGradient = ctx.createRadialGradient(
      x - radius * 0.3, y - radius * aspectRatio * 0.3, 0,
      x, y, radius
    );
    ballGradient.addColorStop(0, lightenColor(color, 30));
    ballGradient.addColorStop(0.7, color);
    ballGradient.addColorStop(1, darkenColor(color, 20));
    ctx.fillStyle = ballGradient;
    ctx.beginPath();
    ctx.ellipse(x, y, radius, radius * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.ellipse(x - radius * 0.3, y - radius * aspectRatio * 0.3, radius * 0.35, radius * aspectRatio * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalAlpha = 1;

    // Number on colored balls
    if (number !== null && alpha > 0.5) {
      drawText(String(number), x, y, {
        font: "bold 14px 'Nunito Sans', sans-serif",
        color: '#FFFFFF'
      });
    }

    ctx.restore();
  }

  // Color utility functions
  function lightenColor(hex, percent) {
    const num = parseInt(hex.replace('#', ''), 16);
    const amt = Math.round(2.55 * percent);
    const R = Math.min(255, (num >> 16) + amt);
    const G = Math.min(255, ((num >> 8) & 0x00FF) + amt);
    const B = Math.min(255, (num & 0x0000FF) + amt);
    return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
  }

  function darkenColor(hex, percent) {
    const num = parseInt(hex.replace('#', ''), 16);
    const amt = Math.round(2.55 * percent);
    const R = Math.max(0, (num >> 16) - amt);
    const G = Math.max(0, ((num >> 8) & 0x00FF) - amt);
    const B = Math.max(0, (num & 0x0000FF) - amt);
    return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
  }

  function drawAimingGuide() {
    const lineLength = 60 + power * 0.3;
    const endX = cueBall.x + Math.cos(aimAngle) * lineLength;
    const endY = cueBall.y + Math.sin(aimAngle) * lineLength;

    // Aiming line (dotted with glow)
    ctx.save();
    ctx.shadowColor = COLORS.cyan;
    ctx.shadowBlur = 6;
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 5]);
    ctx.beginPath();
    ctx.moveTo(cueBall.x, cueBall.y);
    ctx.lineTo(endX, endY);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    // Cue stick
    const stickStart = 20 + power * 0.5;
    const stickLength = 100;
    const stickStartX = cueBall.x - Math.cos(aimAngle) * stickStart;
    const stickStartY = cueBall.y - Math.sin(aimAngle) * stickStart;
    const stickEndX = stickStartX - Math.cos(aimAngle) * stickLength;
    const stickEndY = stickStartY - Math.sin(aimAngle) * stickLength;

    // Stick shadow
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 9;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(stickStartX + 2, stickStartY + 2);
    ctx.lineTo(stickEndX + 2, stickEndY + 2);
    ctx.stroke();

    // Stick body with gradient
    const gradient = ctx.createLinearGradient(stickStartX, stickStartY, stickEndX, stickEndY);
    gradient.addColorStop(0, COLORS.amber);
    gradient.addColorStop(0.15, '#D4A574');
    gradient.addColorStop(0.5, '#A0522D');
    gradient.addColorStop(1, '#654321');
    ctx.strokeStyle = gradient;
    ctx.lineWidth = 7;
    ctx.beginPath();
    ctx.moveTo(stickStartX, stickStartY);
    ctx.lineTo(stickEndX, stickEndY);
    ctx.stroke();

    // Cue tip with glow
    ctx.save();
    ctx.shadowColor = COLORS.cyan;
    ctx.shadowBlur = 8;
    ctx.fillStyle = COLORS.cyan;
    ctx.beginPath();
    ctx.ellipse(stickStartX, stickStartY, 5, 5 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Power indicator
    const powerBarX = TABLE_X + TABLE_W - 25;
    const powerBarY = TABLE_Y + 20;
    const powerBarH = TABLE_H - 40;
    const powerFill = power / MAX_POWER;

    // Bar background
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.beginPath();
    ctx.roundRect(powerBarX, powerBarY, 15, powerBarH, 6);
    ctx.fill();

    // Power fill with gradient
    const powerColor = powerFill < 0.5 ? COLORS.success : powerFill < 0.8 ? COLORS.amber : COLORS.error;
    const fillHeight = powerBarH * powerFill;
    ctx.fillStyle = powerColor;
    ctx.beginPath();
    ctx.roundRect(powerBarX + 2, powerBarY + powerBarH - fillHeight, 11, fillHeight, 4);
    ctx.fill();

    // Power bar glow
    if (power > 10) {
      ctx.save();
      ctx.shadowColor = powerColor;
      ctx.shadowBlur = 8;
      ctx.fillStyle = 'transparent';
      ctx.beginPath();
      ctx.roundRect(powerBarX + 2, powerBarY + powerBarH - fillHeight, 11, fillHeight, 4);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawAnswerPanels() {
    answerPanels.forEach((panel, i) => {
      if (panel.alpha <= 0) return;

      ctx.save();
      ctx.globalAlpha = panel.alpha || 1;

      const scale = panel.scale || 1;
      const isHighlighted = panel.highlighted;
      const baseColor = BALL_COLORS[i];

      // Apply scale transform from center
      ctx.translate(panel.x + panel.w / 2, panel.y + panel.h / 2);
      ctx.scale(scale, scale);
      ctx.translate(-(panel.x + panel.w / 2), -(panel.y + panel.h / 2));

      // Panel shadow
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.beginPath();
      ctx.roundRect(panel.x + 2, panel.y + 2, panel.w, panel.h, 10);
      ctx.fill();

      // Panel background with gradient
      if (isHighlighted) {
        const highlightGrad = ctx.createLinearGradient(panel.x, panel.y, panel.x, panel.y + panel.h);
        highlightGrad.addColorStop(0, lightenColor(baseColor, 10));
        highlightGrad.addColorStop(1, baseColor);
        ctx.fillStyle = highlightGrad;
      } else {
        ctx.fillStyle = COLORS.bgSurface;
      }
      ctx.beginPath();
      ctx.roundRect(panel.x, panel.y, panel.w, panel.h, 10);
      ctx.fill();

      // Border with ball color
      ctx.strokeStyle = isHighlighted ? lightenColor(baseColor, 20) : baseColor;
      ctx.lineWidth = isHighlighted ? 3 : 2;
      ctx.beginPath();
      ctx.roundRect(panel.x, panel.y, panel.w, panel.h, 10);
      ctx.stroke();

      // Ball number indicator with gradient
      const ballGrad = ctx.createRadialGradient(
        panel.x + 18, panel.y + panel.h / 2 - 2, 0,
        panel.x + 20, panel.y + panel.h / 2, 12
      );
      ballGrad.addColorStop(0, lightenColor(baseColor, 20));
      ballGrad.addColorStop(1, baseColor);
      ctx.fillStyle = ballGrad;
      ctx.beginPath();
      ctx.ellipse(panel.x + 20, panel.y + panel.h / 2, 12, 12 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();

      // Ball highlight
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.ellipse(panel.x + 17, panel.y + panel.h / 2 - 3, 4, 4 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.globalAlpha = 1;

      drawText(String(i + 1), panel.x + 20, panel.y + panel.h / 2, {
        font: "bold 14px 'Nunito Sans', sans-serif",
        color: '#FFFFFF'
      });

      // Answer text
      const lines = panel.wrappedText || [panel.choice.text];
      const fontSize = panel.fontSize || 14;
      const lineHeight = fontSize + 2;
      const textStartY = panel.y + panel.h / 2 - ((lines.length - 1) * lineHeight) / 2;

      lines.forEach((line, lineIndex) => {
        drawText(line, panel.x + 40, textStartY + lineIndex * lineHeight, {
          font: `${fontSize}px 'Nunito', sans-serif`,
          color: isHighlighted ? '#FFFFFF' : COLORS.textPrimary,
          align: 'left'
        });
      });

      ctx.restore();
    });
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;
    if (gamePhase !== 'aiming') return;

    const touch = e.touches[0] || e.changedTouches[0];
    const { x, y } = screenToLogical(touch.clientX, touch.clientY);

    if (type === 'start') {
      // Check if touching cue ball area
      const dx = x - cueBall.x;
      const dy = y - cueBall.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < 60) {
        isDragging = true;
        dragStart = { x, y };
      }
    } else if (type === 'move' && isDragging) {
      // Calculate aim angle and power based on drag
      const dx = dragStart.x - x;
      const dy = dragStart.y - y;
      aimAngle = Math.atan2(dy, dx);
      power = Math.min(Math.sqrt(dx * dx + dy * dy) * 3, MAX_POWER);
    } else if (type === 'end' && isDragging) {
      isDragging = false;

      if (power > 20) {
        // Shoot!
        cueBall.vx = Math.cos(aimAngle) * power;
        cueBall.vy = Math.sin(aimAngle) * power;
        gamePhase = 'rolling';
        playSound('shoot');
      }

      power = 0;
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mousemove', (e) => {
    if (isDragging) {
      const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
      handleTouch(fakeTouch, 'move');
    }
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
