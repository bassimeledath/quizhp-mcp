<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Deep Sea Diver Helmets</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE - MOBILE                                              ║
  ║  Fills 100% of container, non-uniform scaling, touch input.                  ║
  ║  Logical dimensions: 360×640 (use aspectRatio for proportional shapes)       ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none; /* Prevent default touch behaviors */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a1628;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #0c1e3a;
      /* Canvas fills viewport via JS, these are fallbacks */
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill viewport
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  Deep Sea Diver Helmets - MCQ game                                         ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    oceanDeep: '#0a1628',
    oceanMid: '#0c2244',
    oceanLight: '#143860',
    sand: '#c4a76c',
    sandDark: '#8a7040',
    helmetBrass: '#c4953a',
    helmetBrassLight: '#e8c36e',
    helmetBrassDark: '#8a6a28',
    helmetGlass: '#1a4a6e',
    helmetGlassHighlight: '#3a8abe',
    orange: '#E87A3E',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    textLight: '#F5F5F0',
    textDark: '#2B2B28',
    bubble: 'rgba(140, 200, 240, 0.35)',
  };

  // === GAME STATE ===
  let helmets = [];
  let bubbles = [];
  let seaweed = [];
  let gameTime = 0;
  let selectedHelmet = null;
  let selectionTime = 0;
  let particles = [];

  // Audio context for sound effects
  let audioCtx = null;

  function getAudioCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
  }

  function playSound(type) {
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);

      if (type === 'click') {
        osc.frequency.value = 600;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.15, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.12);
      } else if (type === 'correct') {
        osc.frequency.value = 523;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.2, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.5);
        // Second note
        const osc2 = ctx.createOscillator();
        const gain2 = ctx.createGain();
        osc2.connect(gain2);
        gain2.connect(ctx.destination);
        osc2.frequency.value = 784;
        osc2.type = 'sine';
        gain2.gain.setValueAtTime(0.2, ctx.currentTime + 0.12);
        gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
        osc2.start(ctx.currentTime + 0.12);
        osc2.stop(ctx.currentTime + 0.6);
      } else if (type === 'wrong') {
        osc.frequency.value = 250;
        osc.type = 'sawtooth';
        gain.gain.setValueAtTime(0.15, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.35);
      }
    } catch (e) { /* ignore audio errors */ }
  }

  function initGame() {
    gameTime = 0;
    selectedHelmet = null;
    selectionTime = 0;
    particles = [];
    bubbles = [];

    // Create 4 helmets in vertical stack layout
    const sidePadding = 16;
    const helmetW = W - sidePadding * 2; // ~328
    const helmetH = 105;
    const startY = 20;
    const gap = 10;

    helmets = QUESTION.choices.map((choice, i) => {
      const x = sidePadding;
      const y = startY + i * (helmetH + gap);

      return {
        x: x,
        y: y,
        w: helmetW,
        h: helmetH,
        choice: choice,
        index: i,
        // Animation state
        scale: 0,
        alpha: 0,
        entranceDelay: i * 120,
        entranceStarted: false,
        entranceProgress: 0,
        bobOffset: Math.random() * Math.PI * 2,
        bobSpeed: 0.8 + Math.random() * 0.4,
        glowPhase: Math.random() * Math.PI * 2,
        pressed: false,
        shakeX: 0,
        // Text
        wrappedText: [choice.text],
        fontSize: 16,
      };
    });

    // Create seaweed
    seaweed = [];
    for (let i = 0; i < 8; i++) {
      seaweed.push({
        x: 15 + Math.random() * (W - 30),
        baseY: H - 10,
        height: 40 + Math.random() * 60,
        width: 6 + Math.random() * 8,
        phase: Math.random() * Math.PI * 2,
        speed: 0.6 + Math.random() * 0.6,
        color: i % 2 === 0 ? '#1a5c3a' : '#226644',
      });
    }

    // Spawn initial bubbles
    for (let i = 0; i < 12; i++) {
      spawnBubble(true);
    }

    recalculateTextSizing();
  }

  function recalculateTextSizing() {
    if (!helmets || helmets.length === 0) return;

    // Text area: right of viewport circle to right edge of helmet, minus padding
    // hw=164, vpRadius≈32.5, vpCenterX≈-119.5, textAreaX≈-77, textAreaEnd≈154
    // textAreaW ≈ 231 but drawText centers, so maxWidth should be textAreaW - some margin
    const textMaxWidth = 140;

    helmets.forEach((helmet) => {
      const { fontSize, wrappedTexts } = findOptimalFontSize({
        texts: [helmet.choice.text],
        maxWidth: textMaxWidth,
        availableHeight: 70,
        minFont: 14,
        maxFont: 16,
        itemPadding: 2,
        fontFamily: "'Nunito', sans-serif"
      });

      helmet.wrappedText = wrappedTexts[0];
      helmet.fontSize = fontSize;
    });
  }

  function spawnBubble(initial) {
    bubbles.push({
      x: 10 + Math.random() * (W - 20),
      y: initial ? Math.random() * H : H + 10,
      radius: 2 + Math.random() * 5,
      speed: 20 + Math.random() * 40,
      wobble: Math.random() * Math.PI * 2,
      wobbleSpeed: 1 + Math.random() * 2,
      alpha: 0.15 + Math.random() * 0.25,
    });
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Update helmet entrance animations
    helmets.forEach(h => {
      const elapsed = gameTime * 1000 - h.entranceDelay;
      if (elapsed > 0 && h.entranceProgress < 1) {
        h.entranceStarted = true;
        h.entranceProgress = Math.min(1, elapsed / 400);
        // Spring easing
        const t = h.entranceProgress;
        const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
        h.scale = t * spring;
        h.alpha = Math.min(1, t * 1.5);
      } else if (h.entranceProgress >= 1) {
        h.scale = 1;
        h.alpha = 1;
      }
    });

    // Handle selection animation
    if (selectedHelmet !== null) {
      selectionTime += dt;
      const sel = helmets[selectedHelmet];
      const isCorrect = sel.choice.is_correct;

      if (isCorrect) {
        // Pulse scale for correct
        sel.scale = 1 + Math.sin(selectionTime * 8) * 0.05;
      } else {
        // Shake for wrong
        const decay = Math.max(0, 1 - selectionTime * 2.5);
        sel.shakeX = Math.sin(selectionTime * 40) * 8 * decay;
      }

      if (selectionTime > 0.6) {
        if (isCorrect) {
          playSound('correct');
          // Spawn celebration bubbles
          for (let i = 0; i < 20; i++) {
            particles.push({
              x: sel.x + sel.w / 2,
              y: sel.y + sel.h / 2,
              vx: (Math.random() - 0.5) * 200,
              vy: -Math.random() * 150 - 50,
              radius: 3 + Math.random() * 5,
              color: [COLORS.orange, COLORS.amber, COLORS.cyan, COLORS.success][Math.floor(Math.random() * 4)],
              alpha: 1,
              life: 1,
            });
          }
        } else {
          playSound('wrong');
        }
        engine.end(isCorrect, sel.choice.explanation);
      }
    }

    // Update bubbles
    bubbles.forEach(b => {
      b.y -= b.speed * dt;
      b.wobble += b.wobbleSpeed * dt;
      b.x += Math.sin(b.wobble) * 0.3;
    });
    bubbles = bubbles.filter(b => b.y + b.radius > -10);
    if (bubbles.length < 12 && Math.random() < dt * 3) {
      spawnBubble(false);
    }

    // Update particles
    particles.forEach(p => {
      p.vy += 120 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt * 1.5;
      p.alpha = Math.max(0, p.life);
    });
    particles = particles.filter(p => p.life > 0);
  }

  function drawGame() {
    // === OCEAN BACKGROUND ===
    // Gradient from deep to mid ocean
    const grd = ctx.createLinearGradient(0, 0, 0, H);
    grd.addColorStop(0, '#051020');
    grd.addColorStop(0.3, '#0c2244');
    grd.addColorStop(0.7, '#143860');
    grd.addColorStop(1, '#1a4a6e');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);

    // Light rays from above
    ctx.save();
    ctx.globalAlpha = 0.04;
    for (let i = 0; i < 5; i++) {
      const x = 40 + i * 75;
      const sway = Math.sin(gameTime * 0.3 + i) * 15;
      ctx.fillStyle = '#88ccff';
      ctx.beginPath();
      ctx.moveTo(x + sway - 8, 0);
      ctx.lineTo(x + sway + 8, 0);
      ctx.lineTo(x + sway + 40, H);
      ctx.lineTo(x + sway - 40, H);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();

    // === SANDY OCEAN FLOOR ===
    const sandGrd = ctx.createLinearGradient(0, H - 50, 0, H);
    sandGrd.addColorStop(0, '#8a7040');
    sandGrd.addColorStop(1, '#6a5230');
    ctx.fillStyle = sandGrd;
    ctx.beginPath();
    ctx.moveTo(0, H - 30);
    // Undulating sand
    for (let x = 0; x <= W; x += 10) {
      const sandY = H - 30 + Math.sin(x * 0.05 + 1) * 6 + Math.sin(x * 0.12) * 3;
      ctx.lineTo(x, sandY);
    }
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.closePath();
    ctx.fill();

    // Sand specks
    ctx.fillStyle = '#b89060';
    for (let i = 0; i < 30; i++) {
      const sx = (i * 37 + 5) % W;
      const sy = H - 20 + Math.sin(sx * 0.1) * 5 + (i % 3) * 4;
      ctx.beginPath();
      ctx.ellipse(sx, sy, 1.5, 1 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // === SEAWEED ===
    seaweed.forEach(sw => {
      ctx.strokeStyle = sw.color;
      ctx.lineWidth = sw.width;
      ctx.lineCap = 'round';
      ctx.beginPath();
      const segments = 5;
      for (let s = 0; s <= segments; s++) {
        const t = s / segments;
        const swayAmount = t * 12 * Math.sin(gameTime * sw.speed + sw.phase + t * 2);
        const sx = sw.x + swayAmount;
        const sy = sw.baseY - t * sw.height;
        if (s === 0) ctx.moveTo(sx, sy);
        else ctx.lineTo(sx, sy);
      }
      ctx.stroke();
    });

    // === BUBBLES (background) ===
    bubbles.forEach(b => {
      ctx.beginPath();
      ctx.ellipse(b.x, b.y, b.radius, b.radius * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(140, 200, 240, ${b.alpha * 0.3})`;
      ctx.fill();
      ctx.strokeStyle = `rgba(180, 220, 255, ${b.alpha * 0.5})`;
      ctx.lineWidth = 0.5;
      ctx.stroke();
      // Highlight
      ctx.beginPath();
      ctx.ellipse(b.x - b.radius * 0.3, b.y - b.radius * 0.3 * aspectRatio, b.radius * 0.25, b.radius * 0.25 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(220, 240, 255, ${b.alpha * 0.6})`;
      ctx.fill();
    });

    // === HELMETS ===
    helmets.forEach((h, i) => {
      if (!h.entranceStarted && h.entranceProgress === 0) return;

      ctx.save();

      const centerX = h.x + h.w / 2;
      const centerY = h.y + h.h / 2;
      const bob = Math.sin(gameTime * h.bobSpeed + h.bobOffset) * 3;
      const glow = 0.5 + Math.sin(gameTime * 1.2 + h.glowPhase) * 0.2;

      ctx.translate(centerX + h.shakeX, centerY + bob);
      ctx.scale(h.scale, h.scale);
      ctx.globalAlpha = h.alpha;

      const hw = h.w / 2;
      const hh = h.h / 2;

      // Determine helmet state colors
      let glassColor = COLORS.helmetGlass;
      let brassColor = COLORS.helmetBrass;
      let glassHighlight = COLORS.helmetGlassHighlight;
      let borderGlow = 'transparent';

      if (selectedHelmet === i) {
        if (h.choice.is_correct) {
          glassColor = '#1a5e3a';
          brassColor = COLORS.success;
          borderGlow = COLORS.success;
        } else {
          glassColor = '#5e1a1a';
          brassColor = COLORS.error;
          borderGlow = COLORS.error;
        }
      } else if (h.pressed) {
        brassColor = COLORS.helmetBrassLight;
        borderGlow = COLORS.cyan;
      }

      // Helmet glow (underwater light)
      if (borderGlow !== 'transparent') {
        ctx.shadowColor = borderGlow;
        ctx.shadowBlur = 12;
      }

      // === MAIN HELMET BODY (rounded rectangle) ===
      ctx.fillStyle = brassColor;
      ctx.beginPath();
      ctx.roundRect(-hw, -hh, hw * 2, hh * 2, 16);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Brass border
      ctx.strokeStyle = COLORS.helmetBrassDark;
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.roundRect(-hw, -hh, hw * 2, hh * 2, 16);
      ctx.stroke();

      // Highlight strip at top
      ctx.fillStyle = COLORS.helmetBrassLight;
      ctx.globalAlpha = h.alpha * 0.25 * glow;
      ctx.beginPath();
      ctx.roundRect(-hw + 6, -hh + 3, hw * 2 - 12, 10, 5);
      ctx.fill();
      ctx.globalAlpha = h.alpha;

      // === CIRCULAR VIEWPORT (left side) ===
      const vpRadius = hh * 0.62;
      const vpCenterX = -hw + 8 + vpRadius + 4;

      // Viewport brass ring
      ctx.fillStyle = COLORS.helmetBrassDark;
      ctx.beginPath();
      ctx.ellipse(vpCenterX, 0, vpRadius + 4, (vpRadius + 4) * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();

      // Glass
      const glassGrd = ctx.createRadialGradient(vpCenterX - vpRadius * 0.2, -vpRadius * 0.2, 0, vpCenterX, 0, vpRadius);
      glassGrd.addColorStop(0, glassHighlight);
      glassGrd.addColorStop(0.6, glassColor);
      glassGrd.addColorStop(1, '#0a2a44');
      ctx.fillStyle = glassGrd;
      ctx.beginPath();
      ctx.ellipse(vpCenterX, 0, vpRadius, vpRadius * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();

      // Glass reflection
      ctx.fillStyle = 'rgba(255, 255, 255, 0.12)';
      ctx.beginPath();
      ctx.ellipse(vpCenterX - vpRadius * 0.25, -vpRadius * 0.25 * aspectRatio, vpRadius * 0.35, vpRadius * 0.2 * aspectRatio, -0.4, 0, Math.PI * 2);
      ctx.fill();

      // Rivets around viewport
      const rivetCount = 6;
      for (let r = 0; r < rivetCount; r++) {
        const angle = (r / rivetCount) * Math.PI * 2 - Math.PI / 2;
        const rx = vpCenterX + Math.cos(angle) * (vpRadius + 2);
        const ry = Math.sin(angle) * (vpRadius + 2) * aspectRatio;
        ctx.fillStyle = COLORS.helmetBrassLight;
        ctx.beginPath();
        ctx.ellipse(rx, ry, 2.5, 2.5 * aspectRatio, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // === ANSWER TEXT (right side of helmet) ===
      const textAreaX = vpCenterX + vpRadius + 10;
      const textAreaEnd = hw - 10;
      const textAreaW = textAreaEnd - textAreaX;
      const textCenterX = textAreaX + textAreaW / 2;

      const lines = h.wrappedText || [h.choice.text];
      const fontSize = h.fontSize || 14;
      const lineHeight = fontSize + 3;
      const textStartY = -((lines.length - 1) * lineHeight) / 2;

      lines.forEach((line, li) => {
        drawText(line, textCenterX, textStartY + li * lineHeight, {
          font: `500 ${fontSize}px 'Nunito', sans-serif`,
          color: COLORS.textLight,
          align: 'center',
          baseline: 'middle',
        });
      });

      // === DECORATIVE BOLTS (corners) ===
      const boltPositions = [
        [-hw + 8, -hh + 8], [hw - 8, -hh + 8],
        [-hw + 8, hh - 8], [hw - 8, hh - 8]
      ];
      boltPositions.forEach(([bx, by]) => {
        ctx.fillStyle = COLORS.helmetBrassDark;
        ctx.beginPath();
        ctx.ellipse(bx, by, 3, 3 * aspectRatio, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = COLORS.helmetBrassLight;
        ctx.beginPath();
        ctx.ellipse(bx - 0.5, by - 0.5 * aspectRatio, 1.2, 1.2 * aspectRatio, 0, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.restore();
    });

    // === PARTICLES ===
    particles.forEach(p => {
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.radius, p.radius * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // === FOREGROUND BUBBLES ===
    // A few larger bubbles in foreground
    bubbles.slice(0, 3).forEach(b => {
      ctx.beginPath();
      ctx.ellipse(b.x, b.y, b.radius * 1.5, b.radius * 1.5 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(160, 210, 255, ${b.alpha * 0.15})`;
      ctx.fill();
    });
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;
    if (selectedHelmet !== null) return;

    if (type === 'start') {
      const touch = e.touches[0] || e.changedTouches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      helmets.forEach((h, i) => {
        if (h.entranceProgress < 1) return;
        if (pointInRect(x, y, h)) {
          playSound('click');
          selectedHelmet = i;
          selectionTime = 0;
          h.pressed = true;
        }
      });
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
