<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <title>Alchemist Vials Shatter</title>
  <!--
  +==============================================================================+
  |  GAME FACTORY TEMPLATE - MOBILE                                              |
  |  Fills 100% of container, non-uniform scaling, touch input.                  |
  |  Logical dimensions: 360x640 (use aspectRatio for proportional shapes)       |
  +==============================================================================+
  -->
  <style>
    /* === BASE STYLES - Can be extended, not removed === */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <script>
  // +============================================================================+
  // |  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    |
  // |  Platform replaces this at runtime. Use these exact 60-char answers.       |
  // +============================================================================+
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // +============================================================================+
  // |  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           |
  // |  Non-uniform scaling (fills container), touch input, tap-to-restart.       |
  // +============================================================================+
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360x640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // === TEXT UTILITIES ===
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // +============================================================================+
  // |  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     |
  // +============================================================================+

  // === COLORS ===
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC'
  };

  // Potion colors for each vial
  const POTION_COLORS = [
    { body: '#6B4E9B', glow: '#9B7ED8', liquid: 'rgba(107,78,155,0.6)' },   // Purple
    { body: '#2E8B7A', glow: '#5CC4B0', liquid: 'rgba(46,139,122,0.6)' },   // Teal
    { body: '#C45E3E', glow: '#E8945A', liquid: 'rgba(196,94,62,0.6)' },    // Amber-red
    { body: '#3A6BAE', glow: '#6A9FDB', liquid: 'rgba(58,107,174,0.6)' }    // Blue
  ];

  // === GAME STATE ===
  let vials = [];
  let shatterParticles = [];
  let gameParticles = [];  // ambient sparkles
  let selectedVial = null;
  let shatterTime = 0;
  let entranceProgress = 0;
  let shelfWobble = 0;

  // Audio context for sound effects
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playShatterSound() {
    try {
      const ac = getAudioCtx();
      // Glass shatter: white noise burst + high freq ring
      const bufferSize = ac.sampleRate * 0.3;
      const buffer = ac.createBuffer(1, bufferSize, ac.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.1));
      }
      const noise = ac.createBufferSource();
      noise.buffer = buffer;
      const filter = ac.createBiquadFilter();
      filter.type = 'highpass';
      filter.frequency.value = 2000;
      const gain = ac.createGain();
      gain.gain.setValueAtTime(0.15, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.3);
      noise.connect(filter);
      filter.connect(gain);
      gain.connect(ac.destination);
      noise.start();

      // Ring tone
      const osc = ac.createOscillator();
      osc.frequency.value = 3200;
      osc.type = 'sine';
      const oscGain = ac.createGain();
      oscGain.gain.setValueAtTime(0.06, ac.currentTime);
      oscGain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
      osc.connect(oscGain);
      oscGain.connect(ac.destination);
      osc.start();
      osc.stop(ac.currentTime + 0.4);
    } catch(e) {}
  }

  function playCorrectSound() {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, ac.currentTime);
      osc.frequency.setValueAtTime(659, ac.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, ac.currentTime + 0.2);
      const gain = ac.createGain();
      gain.gain.setValueAtTime(0.12, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start();
      osc.stop(ac.currentTime + 0.4);
    } catch(e) {}
  }

  function playWrongSound() {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, ac.currentTime + 0.3);
      const gain = ac.createGain();
      gain.gain.setValueAtTime(0.08, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.3);
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start();
      osc.stop(ac.currentTime + 0.3);
    } catch(e) {}
  }

  function initGame() {
    vials = [];
    shatterParticles = [];
    gameParticles = [];
    selectedVial = null;
    shatterTime = 0;
    entranceProgress = 0;
    shelfWobble = 0;

    const vialW = 150;
    const vialH = 120;
    const gapX = 16;
    const gapY = 24;

    // 2x2 grid layout for 4 vials
    const gridW = vialW * 2 + gapX;
    const gridH = vialH * 2 + gapY;
    const startX = (W - gridW) / 2;
    const startY = (H - gridH) / 2 - 30;

    QUESTION.choices.forEach((choice, i) => {
      const col = i % 2;
      const row = Math.floor(i / 2);
      const x = startX + col * (vialW + gapX);
      const y = startY + row * (vialH + gapY);

      vials.push({
        x: x,
        y: y,
        w: vialW,
        h: vialH,
        choice: choice,
        index: i,
        potionColor: POTION_COLORS[i],
        scale: 0,
        alpha: 0,
        shakeX: 0,
        bobPhase: Math.random() * Math.PI * 2,
        glowIntensity: 0.3 + Math.random() * 0.2,
        bubbleTime: Math.random() * 10,
        shattered: false,
        wrappedText: [],
        fontSize: 16
      });
    });

    recalculateTextSizing();
  }

  function recalculateTextSizing() {
    if (!vials || vials.length === 0) return;

    const { fontSize, wrappedTexts } = findOptimalFontSize({
      texts: QUESTION.choices.map(c => c.text),
      maxWidth: 130,
      availableHeight: 55,
      minFont: 14,
      maxFont: 16,
      fontFamily: "'Nunito', sans-serif"
    });

    vials.forEach((v, i) => {
      v.wrappedText = wrappedTexts[i];
      v.fontSize = fontSize;
    });
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    // Entrance animation
    if (entranceProgress < 1) {
      entranceProgress += dt * 2.5;
      if (entranceProgress > 1) entranceProgress = 1;

      vials.forEach((v, i) => {
        const stagger = i * 0.12;
        const t = Math.max(0, Math.min(1, (entranceProgress - stagger) / (1 - stagger * 0.5)));
        // Spring easing
        const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
        v.scale = t * spring;
        v.alpha = t;
      });
    }

    // Ambient vial bobbing
    vials.forEach(v => {
      if (!v.shattered) {
        v.bobPhase += dt * 1.5;
        v.bubbleTime += dt;
      }
    });

    // Shatter animation for selected vial
    if (selectedVial !== null) {
      shatterTime += dt;

      // Update shatter particles
      shatterParticles.forEach(p => {
        p.vy += 500 * dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.rotation += p.rotationSpeed * dt;
        p.alpha -= dt * 1.2;
      });
      shatterParticles = shatterParticles.filter(p => p.alpha > 0);

      // Shake shelf
      if (shatterTime < 0.4) {
        shelfWobble = Math.sin(shatterTime * 40) * (1 - shatterTime / 0.4) * 3;
      } else {
        shelfWobble *= 0.9;
      }

      // End game after shatter animation
      if (shatterTime > 0.8) {
        const choice = vials[selectedVial].choice;
        if (choice.is_correct) {
          playCorrectSound();
        } else {
          playWrongSound();
        }
        engine.end(choice.is_correct, choice.explanation);
      }
    }

    // Update ambient sparkle particles
    gameParticles.forEach(p => {
      p.y -= p.speed * dt;
      p.alpha = 0.3 + 0.3 * Math.sin(p.phase + performance.now() * 0.003);
      p.phase += dt;
    });
    gameParticles = gameParticles.filter(p => p.y > 0 && p.alpha > 0);

    // Spawn new sparkles occasionally
    if (Math.random() < dt * 3 && selectedVial === null) {
      gameParticles.push({
        x: Math.random() * W,
        y: H + 5,
        speed: 20 + Math.random() * 30,
        alpha: 0.5,
        size: 1.5 + Math.random() * 2,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  function drawGame() {
    // Background - dark alchemist lab
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, '#1a1425');
    bg.addColorStop(0.5, '#201830');
    bg.addColorStop(1, '#15101e');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // Ambient sparkle particles
    gameParticles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(245, 167, 66, ${p.alpha * 0.4})`;
      ctx.fill();
    });

    // Draw shelf behind vials
    drawShelf();

    // Draw vials
    vials.forEach((v, i) => {
      if (!v.shattered) {
        drawVial(v, i);
      }
    });

    // Draw shatter particles
    shatterParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.globalAlpha = Math.max(0, p.alpha);
      ctx.fillStyle = p.color;
      if (p.isGlass) {
        // Glass shard - triangular
        ctx.beginPath();
        ctx.moveTo(-p.size, -p.size * 0.5);
        ctx.lineTo(p.size, 0);
        ctx.lineTo(-p.size * 0.3, p.size);
        ctx.closePath();
        ctx.fill();
        // Add shimmer
        ctx.fillStyle = `rgba(255,255,255,${p.alpha * 0.3})`;
        ctx.fill();
      } else {
        // Liquid drop - circular
        ctx.beginPath();
        ctx.ellipse(0, 0, p.size, p.size * aspectRatio, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.restore();
    });
  }

  function drawShelf() {
    ctx.save();
    ctx.translate(shelfWobble, 0);

    // Wooden shelf planks - two rows (aligned with vial grid)
    const shelfY1 = H / 2 - 40;
    const shelfY2 = H / 2 + 105;

    for (const sy of [shelfY1, shelfY2]) {
      // Shelf shadow
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.beginPath();
      ctx.roundRect(15, sy + 4, W - 30, 10, 3);
      ctx.fill();

      // Main shelf plank
      const shelfGrad = ctx.createLinearGradient(0, sy, 0, sy + 10);
      shelfGrad.addColorStop(0, '#5A3E28');
      shelfGrad.addColorStop(0.5, '#6B4E35');
      shelfGrad.addColorStop(1, '#4A3020');
      ctx.fillStyle = shelfGrad;
      ctx.beginPath();
      ctx.roundRect(15, sy, W - 30, 10, 3);
      ctx.fill();

      // Wood grain highlight
      ctx.strokeStyle = 'rgba(255,220,180,0.15)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(25, sy + 3);
      ctx.lineTo(W - 35, sy + 3);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(30, sy + 7);
      ctx.lineTo(W - 40, sy + 7);
      ctx.stroke();
    }

    ctx.restore();
  }

  function drawVial(v, index) {
    ctx.save();

    const centerX = v.x + v.w / 2;
    const bobOffset = Math.sin(v.bobPhase) * 2;
    const centerY = v.y + v.h / 2 + bobOffset;

    // Apply entrance scale
    ctx.translate(centerX, centerY);
    ctx.scale(v.scale, v.scale);
    ctx.translate(-centerX, -centerY);

    ctx.globalAlpha = v.alpha;

    // Vial dimensions (in logical coords, relative to center)
    const vialCX = centerX;
    const vialTop = v.y + 5 + bobOffset;
    const vialBot = v.y + v.h - 28 + bobOffset;
    const bodyW = 28;
    const neckW = 12;
    const neckTop = vialTop;
    const neckBot = vialTop + 18;

    // Glow behind vial
    const glowPulse = 0.5 + 0.3 * Math.sin(v.bubbleTime * 2);
    ctx.save();
    ctx.translate(vialCX, (neckBot + vialBot) / 2);
    ctx.scale(1, aspectRatio);
    const glow = ctx.createRadialGradient(0, 0, 5, 0, 0, 35);
    glow.addColorStop(0, v.potionColor.liquid.replace('0.6', String(0.3 * glowPulse)));
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(0, 0, 35, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Vial body (flask shape)
    ctx.beginPath();
    // Start at neck top left
    ctx.moveTo(vialCX - neckW, neckTop);
    // Neck left side
    ctx.lineTo(vialCX - neckW, neckBot);
    // Curve out to body
    ctx.quadraticCurveTo(vialCX - bodyW - 5, neckBot + 5, vialCX - bodyW, (neckBot + vialBot) / 2);
    // Body left
    ctx.lineTo(vialCX - bodyW, vialBot - 8);
    // Bottom curve
    ctx.quadraticCurveTo(vialCX - bodyW, vialBot, vialCX - bodyW + 8, vialBot);
    ctx.lineTo(vialCX + bodyW - 8, vialBot);
    ctx.quadraticCurveTo(vialCX + bodyW, vialBot, vialCX + bodyW, vialBot - 8);
    // Body right
    ctx.lineTo(vialCX + bodyW, (neckBot + vialBot) / 2);
    // Curve in to neck
    ctx.quadraticCurveTo(vialCX + bodyW + 5, neckBot + 5, vialCX + neckW, neckBot);
    // Neck right side
    ctx.lineTo(vialCX + neckW, neckTop);
    ctx.closePath();

    // Glass fill - translucent
    ctx.fillStyle = 'rgba(200, 220, 240, 0.12)';
    ctx.fill();

    // Liquid fill (lower portion)
    ctx.save();
    ctx.clip();
    const liquidLevel = neckBot + 8;
    const liquidGrad = ctx.createLinearGradient(0, liquidLevel, 0, vialBot);
    liquidGrad.addColorStop(0, v.potionColor.liquid);
    liquidGrad.addColorStop(0.7, v.potionColor.body);
    liquidGrad.addColorStop(1, v.potionColor.glow);
    ctx.fillStyle = liquidGrad;
    ctx.fillRect(vialCX - bodyW - 5, liquidLevel, (bodyW + 5) * 2, vialBot - liquidLevel + 5);

    // Bubbles
    const bubCount = 3;
    for (let b = 0; b < bubCount; b++) {
      const bTime = v.bubbleTime + b * 2.1;
      const bx = vialCX + Math.sin(bTime * 1.5 + b) * (bodyW - 8);
      const by = vialBot - ((bTime * 15 + b * 10) % (vialBot - liquidLevel));
      const br = 2 + Math.sin(bTime) * 1;
      ctx.beginPath();
      ctx.ellipse(bx, by, br, br * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${0.15 + 0.1 * Math.sin(bTime * 3)})`;
      ctx.fill();
    }
    ctx.restore();

    // Glass outline
    ctx.strokeStyle = 'rgba(200, 220, 240, 0.35)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Glass highlight (left side)
    ctx.beginPath();
    ctx.moveTo(vialCX - bodyW + 5, (neckBot + vialBot) / 2 + 5);
    ctx.lineTo(vialCX - bodyW + 5, vialBot - 12);
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Cork at top
    ctx.fillStyle = '#8B6E4E';
    ctx.beginPath();
    ctx.roundRect(vialCX - neckW - 2, neckTop - 6, neckW * 2 + 4, 8, 3);
    ctx.fill();
    ctx.strokeStyle = '#6B5040';
    ctx.lineWidth = 0.5;
    ctx.stroke();

    ctx.globalAlpha = 1;
    ctx.restore();

    // Draw answer text below vial
    const textY = v.y + v.h - 12 + bobOffset;
    const lines = v.wrappedText || [v.choice.text];
    const fontSize = v.fontSize || 14;
    const lineH = fontSize + 2;
    const totalTextH = lines.length * lineH;
    const textStartY = textY - totalTextH / 2 + lineH / 2;

    lines.forEach((line, li) => {
      drawText(line, centerX, textStartY + li * lineH, {
        font: `500 ${fontSize}px 'Nunito', sans-serif`,
        color: '#E6E6E0',
        align: 'center'
      });
    });
  }

  function spawnShatterParticles(v) {
    const cx = v.x + v.w / 2;
    const cy = v.y + v.h / 2;

    // Glass shards
    for (let i = 0; i < 18; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 80 + Math.random() * 200;
      shatterParticles.push({
        x: cx + (Math.random() - 0.5) * 30,
        y: cy + (Math.random() - 0.5) * 20,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 100,
        size: 3 + Math.random() * 6,
        color: `rgba(200, 220, 240, ${0.4 + Math.random() * 0.3})`,
        rotation: Math.random() * Math.PI * 2,
        rotationSpeed: (Math.random() - 0.5) * 15,
        alpha: 1,
        isGlass: true
      });
    }

    // Liquid droplets
    for (let i = 0; i < 14; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 50 + Math.random() * 150;
      shatterParticles.push({
        x: cx + (Math.random() - 0.5) * 20,
        y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 80,
        size: 2 + Math.random() * 4,
        color: v.potionColor.glow,
        rotation: 0,
        rotationSpeed: 0,
        alpha: 1,
        isGlass: false
      });
    }

    // Sparkles
    for (let i = 0; i < 10; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 60 + Math.random() * 120;
      shatterParticles.push({
        x: cx,
        y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 120,
        size: 1.5 + Math.random() * 2.5,
        color: COLORS.amber,
        rotation: 0,
        rotationSpeed: (Math.random() - 0.5) * 8,
        alpha: 1,
        isGlass: false
      });
    }
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;
    if (selectedVial !== null) return; // Already shattering

    if (type === 'start') {
      const touch = e.touches[0] || e.changedTouches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      for (let i = 0; i < vials.length; i++) {
        const v = vials[i];
        if (pointInRect(x, y, v)) {
          selectedVial = i;
          v.shattered = true;
          playShatterSound();
          spawnShatterParticles(v);

          // Shake other vials
          vials.forEach((ov, oi) => {
            if (oi !== i && !ov.shattered) {
              ov.shakeX = (Math.random() - 0.5) * 8;
            }
          });
          break;
        }
      }
    }
  }

  // +============================================================================+
  // |  SECTION 4: GAME LOOP - DO NOT MODIFY                                      |
  // |  Standard loop with responsive scaling and touch handling.                 |
  // +============================================================================+
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100);
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
