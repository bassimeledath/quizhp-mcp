<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Desert Oasis Wells</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE - MOBILE                                              ║
  ║  Fills 100% of container, non-uniform scaling, touch input.                  ║
  ║  Logical dimensions: 360×640 (use aspectRatio for proportional shapes)       ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none; /* Prevent default touch behaviors */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      /* Canvas fills viewport via JS, these are fallbacks */
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill viewport
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  Desert Oasis Wells - Tap a well to draw your chosen truth                ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgSky: '#F5DEB3',
    bgSkyTop: '#87CEEB',
    sand: '#E8C87A',
    sandDark: '#D4A94E',
    sandLight: '#F5DEB3',
    wellStone: '#8B7355',
    wellStoneDark: '#6B5340',
    wellStoneLight: '#A08B6B',
    waterDeep: '#4ECDC4',
    waterLight: '#7EDCD6',
    waterSurface: '#A8EAE5',
    roofWood: '#A0522D',
    roofDark: '#7B3F1E',
    rope: '#D2B48C',
    orange: '#E87A3E',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    textPrimary: '#2B2B28',
    textLight: '#F5F5F0',
    palmGreen: '#2E8B57',
    palmDark: '#1B5E3A',
    cactusDark: '#3A7D44',
    oasisWater: '#5BB8B0',
  };

  // === GAME STATE ===
  let wells = [];
  let gameTime = 0;
  let selectedWell = null;
  let bucketAnim = { active: false, wellIndex: -1, progress: 0, rising: false };
  let sandParticles = [];
  let waterDroplets = [];
  let palmTrees = [];
  let cacti = [];

  // Sound
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playSound(type) {
    try {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      if (type === 'click') {
        osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.08);
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.12);
      } else if (type === 'splash') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(300, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.35);
      } else if (type === 'correct') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, audioCtx.currentTime);
        osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.12);
        osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.24);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.5);
      } else if (type === 'wrong') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(250, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.35);
      }
    } catch (e) {}
  }

  function initGame() {
    gameTime = 0;
    selectedWell = null;
    bucketAnim = { active: false, wellIndex: -1, progress: 0, rising: false };
    sandParticles = [];
    waterDroplets = [];

    // 4 wells in vertical stack - each is a row with well icon + text
    const rowH = 100;
    const gap = 10;
    const totalH = rowH * 4 + gap * 3;
    const startY = (H - totalH) / 2 + 40;

    wells = QUESTION.choices.map((choice, i) => {
      return {
        x: 15,
        y: startY + i * (rowH + gap),
        w: W - 30,
        h: rowH,
        choice: choice,
        scale: 0,
        alpha: 0,
        shakeX: 0,
        hovered: false,
        selected: false,
        waterLevel: 0,
        wrappedText: null,
        fontSize: 16,
        wellCx: 55,  // well icon center x offset within row
      };
    });

    // Palm trees for decoration
    palmTrees = [
      { x: 25, y: 120, height: 60 },
      { x: 330, y: 130, height: 50 },
    ];

    // Cacti decoration
    cacti = [
      { x: 320, y: 600, size: 16 },
    ];

    // Entrance animation stagger
    wells.forEach((well, i) => {
      const delay = i * 80;
      const startTime = performance.now() + delay;
      function animateIn(now) {
        const elapsed = now - startTime;
        if (elapsed < 0) { requestAnimationFrame(animateIn); return; }
        const t = Math.min(elapsed / 350, 1);
        const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
        well.scale = t * spring;
        well.alpha = t;
        if (t < 1) requestAnimationFrame(animateIn);
        else { well.scale = 1; well.alpha = 1; }
      }
      requestAnimationFrame(animateIn);
    });

    recalculateTextSizing();
  }

  function recalculateTextSizing() {
    if (!wells || wells.length === 0) return;

    // Text area is to the right of the well icon (55px icon area + 15px gap = 70px offset)
    // Available width: row width (330) - 70px icon - 10px right padding = 250px
    const maxTextWidth = 245;
    const availablePerWell = 80;

    wells.forEach((well, i) => {
      const { fontSize, wrappedTexts } = findOptimalFontSize({
        texts: [well.choice.text],
        maxWidth: maxTextWidth,
        availableHeight: availablePerWell,
        minFont: 13,
        maxFont: 16,
        fontFamily: "'Nunito', sans-serif"
      });
      well.wrappedText = wrappedTexts[0];
      well.fontSize = fontSize;
    });
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;
    gameTime += dt;

    // Animate bucket if active
    if (bucketAnim.active) {
      bucketAnim.progress += dt * 2.5;
      if (bucketAnim.progress >= 1 && !bucketAnim.rising) {
        bucketAnim.rising = true;
        bucketAnim.progress = 0;
        playSound('splash');
        // Spawn water droplets
        const w = wells[bucketAnim.wellIndex];
        for (let i = 0; i < 8; i++) {
          waterDroplets.push({
            x: w.x + 45 + (Math.random() - 0.5) * 30,
            y: w.y + w.h / 2,
            vx: (Math.random() - 0.5) * 60,
            vy: -Math.random() * 100 - 30,
            size: 2 + Math.random() * 3,
            alpha: 1,
          });
        }
      }
      if (bucketAnim.rising && bucketAnim.progress >= 1) {
        // Bucket retrieved, end game
        const well = wells[bucketAnim.wellIndex];
        if (well.choice.is_correct) {
          playSound('correct');
        } else {
          playSound('wrong');
          well.shakeX = 10;
        }
        engine.end(well.choice.is_correct, well.choice.explanation);
        bucketAnim.active = false;
      }
    }

    // Update water droplets
    waterDroplets.forEach(d => {
      d.vy += 200 * dt;
      d.x += d.vx * dt;
      d.y += d.vy * dt;
      d.alpha -= dt * 1.5;
    });
    waterDroplets = waterDroplets.filter(d => d.alpha > 0);

    // Ambient sand particles
    if (Math.random() < dt * 2) {
      sandParticles.push({
        x: Math.random() * W,
        y: H + 5,
        vx: (Math.random() - 0.5) * 20 + 10,
        vy: -Math.random() * 30 - 10,
        size: 1 + Math.random() * 2,
        alpha: 0.3 + Math.random() * 0.3,
      });
    }
    sandParticles.forEach(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.alpha -= dt * 0.3;
    });
    sandParticles = sandParticles.filter(p => p.alpha > 0);

    // Shake decay
    wells.forEach(w => {
      if (w.shakeX !== 0) {
        w.shakeX *= 0.85;
        if (Math.abs(w.shakeX) < 0.5) w.shakeX = 0;
      }
    });
  }

  function drawGame() {
    // Sky gradient
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.4);
    skyGrad.addColorStop(0, '#87CEEB');
    skyGrad.addColorStop(0.6, '#C8E6F0');
    skyGrad.addColorStop(1, '#F5DEB3');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    // Desert sand ground
    const sandGrad = ctx.createLinearGradient(0, H * 0.3, 0, H);
    sandGrad.addColorStop(0, '#F5DEB3');
    sandGrad.addColorStop(0.3, '#E8C87A');
    sandGrad.addColorStop(1, '#D4A94E');
    ctx.fillStyle = sandGrad;
    ctx.fillRect(0, H * 0.28, W, H * 0.72);

    // Sand dunes
    ctx.fillStyle = '#E8C87A';
    ctx.beginPath();
    ctx.moveTo(0, H * 0.32);
    ctx.quadraticCurveTo(W * 0.25, H * 0.27, W * 0.5, H * 0.31);
    ctx.quadraticCurveTo(W * 0.75, H * 0.35, W, H * 0.29);
    ctx.lineTo(W, H * 0.35);
    ctx.lineTo(0, H * 0.35);
    ctx.closePath();
    ctx.fill();

    // Sun
    const sunX = W * 0.82;
    const sunY = H * 0.08;
    const sunR = 25;
    const sunGlow = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, sunR * 3);
    sunGlow.addColorStop(0, 'rgba(245, 167, 66, 0.6)');
    sunGlow.addColorStop(0.5, 'rgba(245, 167, 66, 0.15)');
    sunGlow.addColorStop(1, 'rgba(245, 167, 66, 0)');
    ctx.fillStyle = sunGlow;
    ctx.fillRect(sunX - sunR * 3, sunY - sunR * 3, sunR * 6, sunR * 6);

    ctx.fillStyle = COLORS.amber;
    ctx.beginPath();
    ctx.ellipse(sunX, sunY, sunR, sunR * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Oasis water pool
    ctx.fillStyle = COLORS.oasisWater;
    ctx.globalAlpha = 0.4;
    ctx.beginPath();
    ctx.ellipse(W / 2, H * 0.29, 120, 20 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Draw palm trees
    palmTrees.forEach(tree => {
      drawPalmTree(tree.x, tree.y, tree.height);
    });

    // Draw cacti
    cacti.forEach(c => {
      drawCactus(c.x, c.y, c.size);
    });

    // Draw sand particles
    sandParticles.forEach(p => {
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = '#D4A94E';
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.size, p.size * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Title area
    drawText('Choose Your Well', W / 2, 70, {
      font: "700 24px 'Belanosima', sans-serif",
      color: COLORS.textPrimary,
    });

    // Draw wells
    wells.forEach((well, i) => {
      drawWell(well, i);
    });

    // Draw water droplets
    waterDroplets.forEach(d => {
      ctx.globalAlpha = d.alpha;
      ctx.fillStyle = COLORS.waterDeep;
      ctx.beginPath();
      ctx.ellipse(d.x, d.y, d.size, d.size * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Draw bucket animation
    if (bucketAnim.active) {
      drawBucketAnimation();
    }
  }

  function drawPalmTree(x, y, h) {
    // Trunk
    ctx.strokeStyle = '#8B6914';
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.quadraticCurveTo(x + 5, y - h * 0.5, x + 3, y - h);
    ctx.stroke();

    // Fronds
    const topX = x + 3;
    const topY = y - h;
    for (let i = 0; i < 5; i++) {
      const angle = -Math.PI * 0.8 + (i / 4) * Math.PI * 0.6 + Math.sin(gameTime * 1.5 + i) * 0.05;
      const fLen = 30 + Math.random() * 5;
      ctx.strokeStyle = i % 2 === 0 ? COLORS.palmGreen : COLORS.palmDark;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(topX, topY);
      ctx.quadraticCurveTo(
        topX + Math.cos(angle) * fLen * 0.6,
        topY + Math.sin(angle) * fLen * 0.3,
        topX + Math.cos(angle) * fLen,
        topY + Math.sin(angle) * fLen
      );
      ctx.stroke();
    }
  }

  function drawCactus(x, y, size) {
    ctx.fillStyle = COLORS.cactusDark;
    // Main body
    ctx.beginPath();
    ctx.roundRect(x - size * 0.25, y - size, size * 0.5, size, 4);
    ctx.fill();
    // Left arm
    ctx.beginPath();
    ctx.roundRect(x - size * 0.6, y - size * 0.7, size * 0.35, size * 0.3, 3);
    ctx.fill();
    ctx.beginPath();
    ctx.roundRect(x - size * 0.55, y - size * 0.9, size * 0.25, size * 0.3, 3);
    ctx.fill();
    // Right arm
    ctx.beginPath();
    ctx.roundRect(x + size * 0.25, y - size * 0.5, size * 0.35, size * 0.3, 3);
    ctx.fill();
    ctx.beginPath();
    ctx.roundRect(x + size * 0.35, y - size * 0.75, size * 0.25, size * 0.35, 3);
    ctx.fill();
  }

  function drawWell(well, index) {
    ctx.save();
    ctx.translate(well.x + well.w / 2 + well.shakeX, well.y + well.h / 2);
    ctx.scale(well.scale, well.scale);
    ctx.translate(-(well.x + well.w / 2), -(well.y + well.h / 2));
    ctx.globalAlpha = well.alpha;

    // Row background card
    ctx.fillStyle = well.hovered ? 'rgba(232, 122, 62, 0.12)' : 'rgba(255, 255, 255, 0.55)';
    ctx.beginPath();
    ctx.roundRect(well.x, well.y, well.w, well.h, 12);
    ctx.fill();

    // Card border
    ctx.strokeStyle = well.hovered ? COLORS.orange : 'rgba(139, 115, 85, 0.3)';
    ctx.lineWidth = well.hovered ? 2 : 1;
    ctx.beginPath();
    ctx.roundRect(well.x, well.y, well.w, well.h, 12);
    ctx.stroke();

    // Well icon on the left side
    const iconCx = well.x + 45;
    const iconCy = well.y + well.h / 2;
    const wellRad = 22;
    const wellInnerRad = 16;

    // Well body (stone cylinder)
    ctx.fillStyle = well.hovered ? '#9A8468' : COLORS.wellStone;
    ctx.beginPath();
    ctx.moveTo(iconCx - wellRad, iconCy - 5);
    ctx.lineTo(iconCx - wellRad, iconCy + 15);
    ctx.ellipse(iconCx, iconCy + 15, wellRad, 6 * aspectRatio, 0, Math.PI, 0);
    ctx.lineTo(iconCx + wellRad, iconCy - 5);
    ctx.ellipse(iconCx, iconCy - 5, wellRad, 6 * aspectRatio, 0, 0, Math.PI);
    ctx.closePath();
    ctx.fill();

    // Well top rim
    ctx.fillStyle = COLORS.wellStoneLight;
    ctx.beginPath();
    ctx.ellipse(iconCx, iconCy - 5, wellRad, 6 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = COLORS.wellStoneDark;
    ctx.lineWidth = 1;
    ctx.stroke();

    // Water inside well
    const waterWobble = Math.sin(gameTime * 2 + index) * 1;
    ctx.fillStyle = COLORS.waterDeep;
    ctx.beginPath();
    ctx.ellipse(iconCx, iconCy + waterWobble, wellInnerRad, 4 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Water shimmer
    ctx.fillStyle = COLORS.waterSurface;
    ctx.globalAlpha = well.alpha * (0.3 + Math.sin(gameTime * 3 + index * 1.5) * 0.2);
    ctx.beginPath();
    ctx.ellipse(iconCx - 5, iconCy - 1 + waterWobble, 8, 2 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = well.alpha;

    // Roof structure
    const postLeft = iconCx - wellRad + 4;
    const postRight = iconCx + wellRad - 4;
    const roofTop = iconCy - 28;

    // Posts
    ctx.fillStyle = COLORS.roofWood;
    ctx.fillRect(postLeft - 1.5, roofTop, 3, iconCy - 5 - roofTop);
    ctx.fillRect(postRight - 1.5, roofTop, 3, iconCy - 5 - roofTop);

    // Crossbar
    ctx.fillStyle = COLORS.roofDark;
    ctx.fillRect(postLeft - 2, roofTop, postRight - postLeft + 4, 3);

    // Small roof
    ctx.fillStyle = COLORS.roofWood;
    ctx.beginPath();
    ctx.moveTo(iconCx, roofTop - 10);
    ctx.lineTo(postLeft - 7, roofTop);
    ctx.lineTo(postRight + 7, roofTop);
    ctx.closePath();
    ctx.fill();

    // Rope and bucket
    ctx.strokeStyle = COLORS.rope;
    ctx.lineWidth = 1;
    const ropeSwing = Math.sin(gameTime * 1.2 + index * 0.8) * 1.5;
    ctx.beginPath();
    ctx.moveTo(iconCx, roofTop + 3);
    ctx.quadraticCurveTo(iconCx + ropeSwing, iconCy - 12, iconCx + ropeSwing * 0.5, iconCy - 6);
    ctx.stroke();

    // Bucket on rope
    const bucketX = iconCx + ropeSwing * 0.5;
    const bucketY = iconCy - 8;
    ctx.fillStyle = '#7B6B4E';
    ctx.beginPath();
    ctx.moveTo(bucketX - 4, bucketY);
    ctx.lineTo(bucketX - 5, bucketY + 7);
    ctx.lineTo(bucketX + 5, bucketY + 7);
    ctx.lineTo(bucketX + 4, bucketY);
    ctx.closePath();
    ctx.fill();

    // Label letter badge
    const labels = ['A', 'B', 'C', 'D'];
    const badgeColors = [COLORS.orange, COLORS.cyan, COLORS.amber, '#8B7355'];
    ctx.fillStyle = badgeColors[index];
    ctx.beginPath();
    ctx.ellipse(iconCx, iconCy + 28, 11, 11 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
    drawText(labels[index], iconCx, iconCy + 28, {
      font: "700 14px 'Belanosima', sans-serif",
      color: '#FFFFFF',
    });

    // Answer text to the right of the well icon
    const textX = well.x + 85;
    const lines = well.wrappedText || [well.choice.text];
    const fontSize = well.fontSize || 14;
    const lineHeight = fontSize + 3;
    const totalTextH = lines.length * lineHeight;
    const textStartY = well.y + (well.h - totalTextH) / 2 + lineHeight / 2;

    lines.forEach((line, li) => {
      drawText(line, textX, textStartY + li * lineHeight, {
        font: `500 ${fontSize}px 'Nunito', sans-serif`,
        color: COLORS.textPrimary,
        align: 'left',
      });
    });

    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function drawBucketAnimation() {
    const well = wells[bucketAnim.wellIndex];
    const iconCx = well.x + 45;
    const iconCy = well.y + well.h / 2;

    if (!bucketAnim.rising) {
      // Bucket going down
      const bucketY = iconCy - 6 + bucketAnim.progress * 12;
      ctx.fillStyle = '#7B6B4E';
      ctx.beginPath();
      ctx.moveTo(iconCx - 5, bucketY);
      ctx.lineTo(iconCx - 6, bucketY + 8);
      ctx.lineTo(iconCx + 6, bucketY + 8);
      ctx.lineTo(iconCx + 5, bucketY);
      ctx.closePath();
      ctx.fill();
    } else {
      // Bucket rising with water
      const bucketY = iconCy + 6 - bucketAnim.progress * 18;
      ctx.fillStyle = '#7B6B4E';
      ctx.beginPath();
      ctx.moveTo(iconCx - 5, bucketY);
      ctx.lineTo(iconCx - 6, bucketY + 8);
      ctx.lineTo(iconCx + 6, bucketY + 8);
      ctx.lineTo(iconCx + 5, bucketY);
      ctx.closePath();
      ctx.fill();

      // Water in bucket
      ctx.fillStyle = COLORS.waterDeep;
      ctx.beginPath();
      ctx.moveTo(iconCx - 4, bucketY + 2);
      ctx.lineTo(iconCx - 5, bucketY + 7);
      ctx.lineTo(iconCx + 5, bucketY + 7);
      ctx.lineTo(iconCx + 4, bucketY + 2);
      ctx.closePath();
      ctx.fill();
    }
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;
    if (bucketAnim.active) return;

    const touch = e.touches[0] || e.changedTouches[0];
    if (!touch) return;
    const { x, y } = screenToLogical(touch.clientX, touch.clientY);

    if (type === 'start') {
      // Check each well row
      wells.forEach((well, i) => {
        if (pointInRect(x, y, well)) {
          well.selected = true;
          well.hovered = true;
          playSound('click');
          // Start bucket animation
          bucketAnim = { active: true, wellIndex: i, progress: 0, rising: false };
        }
      });
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
