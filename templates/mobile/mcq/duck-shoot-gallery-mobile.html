<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Duck Shoot Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE - MOBILE                                              ║
  ║  Fills 100% of container, non-uniform scaling, touch input.                  ║
  ║  Logical dimensions: 360×640 (use aspectRatio for proportional shapes)       ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none; /* Prevent default touch behaviors */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      /* Canvas fills viewport via JS, these are fallbacks */
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill viewport
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = "bold 18px 'Nunito Sans', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px 'Nunito', sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle', maxWidth } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    if (maxWidth) {
      ctx.fillText(text, 0, 0, maxWidth * aspectRatio / adj);
    } else {
      ctx.fillText(text, 0, 0);
    }
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   *
   * @param {string} text - The text to wrap
   * @param {number} maxWidth - Maximum width in logical coordinates
   * @param {string} font - CSS font string (e.g., "16px 'Nunito', sans-serif")
   * @param {number} maxLines - Maximum number of lines (default 3)
   * @returns {string[]} Array of text lines
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   * Tries font sizes from max to min until content fits.
   *
   * @param {Object} options
   * @param {string[]} options.texts - Array of text strings to fit
   * @param {number} options.maxWidth - Maximum width for text wrapping
   * @param {number} options.availableHeight - Total height available for all texts
   * @param {number} options.minFont - Minimum font size (default 12)
   * @param {number} options.maxFont - Maximum font size (default 18)
   * @param {number} options.itemPadding - Vertical padding per text item (default 4)
   * @param {string} options.fontFamily - Font family (default "'Nunito Sans', sans-serif")
   * @returns {{ fontSize: number, wrappedTexts: string[][] }} Optimal font size and pre-wrapped texts
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = "bold 32px 'Nunito Sans', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC'
  };

  // Answer duck colors - distinct for each answer
  const ANSWER_DUCK_COLORS = [
    '#E87A3E', // Orange - Answer A
    '#4ECDC4', // Cyan - Answer B
    '#F5A742', // Amber - Answer C
    '#6BBF59'  // Green - Answer D
  ];

  const DECOY_COLOR = '#8B7355'; // Brown decoy ducks

  // === GAME STATE ===
  let ducks = [];
  let answerDucks = [];
  let crosshair = { x: W / 2, y: H / 2 };
  let shotParticles = [];
  let hitEffects = [];
  let gameTime = 0;
  let answerLabels = [];

  // Sound effects
  let audioCtx = null;

  function playSound(type) {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'shot') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(150, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.2);
    }
  }

  // Tier configuration - y positions and speeds
  const TIERS = [
    { y: 80, speed: 60, direction: 1 },    // Top tier - slowest
    { y: 150, speed: 90, direction: -1 },   // Middle tier - medium
    { y: 220, speed: 120, direction: 1 }    // Bottom tier - fastest
  ];

  function createDuck(tier, isAnswer, answerIndex = -1) {
    const tierConfig = TIERS[tier];
    const startX = tierConfig.direction > 0 ? -40 : W + 40;

    return {
      x: startX,
      y: tierConfig.y,
      tier: tier,
      speed: tierConfig.speed * tierConfig.direction,
      isAnswer: isAnswer,
      answerIndex: answerIndex,
      color: isAnswer ? ANSWER_DUCK_COLORS[answerIndex] : DECOY_COLOR,
      scale: 1,
      bobOffset: Math.random() * Math.PI * 2,
      hit: false,
      hitTime: 0
    };
  }

  function spawnDucks() {
    // Spawn answer ducks on random tiers
    const usedTiers = [];
    QUESTION.choices.forEach((choice, i) => {
      let tier;
      do {
        tier = Math.floor(Math.random() * 3);
      } while (usedTiers.filter(t => t === tier).length >= 2);
      usedTiers.push(tier);

      const duck = createDuck(tier, true, i);
      duck.x = 50 + Math.random() * (W - 100); // Start somewhere on screen
      answerDucks.push(duck);
    });

    // Spawn some decoy ducks
    for (let i = 0; i < 6; i++) {
      const tier = Math.floor(Math.random() * 3);
      const duck = createDuck(tier, false);
      duck.x = Math.random() * W;
      ducks.push(duck);
    }
  }

  function initGame() {
    ducks = [];
    answerDucks = [];
    shotParticles = [];
    hitEffects = [];
    crosshair = { x: W / 2, y: 180 };
    gameTime = 0;

    // Initialize answer labels for the bottom panel
    answerLabels = QUESTION.choices.map((choice, i) => ({
      choice: choice,
      index: i,
      color: ANSWER_DUCK_COLORS[i],
      scale: 0,
      alpha: 0
    }));

    spawnDucks();
    recalculateTextSizing();

    // Entrance animation for answer labels
    answerLabels.forEach((label, i) => {
      setTimeout(() => {
        animateLabelEntrance(label);
      }, i * 80);
    });
  }

  function animateLabelEntrance(label) {
    const startTime = performance.now();
    const duration = 350;

    function animate() {
      const elapsed = performance.now() - startTime;
      const t = Math.min(elapsed / duration, 1);
      const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
      label.scale = t * spring;
      label.alpha = t;
      if (t < 1) requestAnimationFrame(animate);
      else { label.scale = 1; label.alpha = 1; }
    }
    requestAnimationFrame(animate);
  }

  function recalculateTextSizing() {
    if (!answerLabels || answerLabels.length === 0) return;

    // Calculate text sizing for answer panels
    const panelWidth = 160; // Each panel is roughly 160 logical px wide
    const { fontSize, wrappedTexts } = findOptimalFontSize({
      texts: QUESTION.choices.map(c => c.text),
      maxWidth: panelWidth - 16,
      availableHeight: 120,
      minFont: 12,
      maxFont: 16,
      fontFamily: "'Nunito', sans-serif"
    });

    answerLabels.forEach((label, i) => {
      label.wrappedText = wrappedTexts[i];
      label.fontSize = fontSize;
    });
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Update all ducks
    const allDucks = [...ducks, ...answerDucks];
    allDucks.forEach(duck => {
      if (!duck.hit) {
        duck.x += duck.speed * dt;

        // Wrap around screen
        const tierConfig = TIERS[duck.tier];
        if (tierConfig.direction > 0 && duck.x > W + 50) {
          duck.x = -40;
        } else if (tierConfig.direction < 0 && duck.x < -50) {
          duck.x = W + 40;
        }
      } else {
        duck.hitTime += dt;
      }
    });

    // Spawn new decoy ducks occasionally
    if (Math.random() < dt * 0.5 && ducks.length < 10) {
      const tier = Math.floor(Math.random() * 3);
      ducks.push(createDuck(tier, false));
    }

    // Update shot particles
    shotParticles = shotParticles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      return p.life > 0;
    });

    // Update hit effects
    hitEffects = hitEffects.filter(e => {
      e.time += dt;
      return e.time < 0.5;
    });
  }

  function drawDuck(duck) {
    const bobY = Math.sin(gameTime * 3 + duck.bobOffset) * 3;
    const x = duck.x;
    const y = duck.y + bobY;
    const size = duck.isAnswer ? 28 : 22;

    ctx.save();
    ctx.translate(x, y);

    if (duck.hit) {
      // Hit animation - fade out and fall
      const alpha = Math.max(0, 1 - duck.hitTime * 2);
      ctx.globalAlpha = alpha;
      ctx.translate(0, duck.hitTime * 100);
      ctx.rotate(duck.hitTime * 3);
    }

    ctx.scale(duck.scale, duck.scale * aspectRatio);

    // Duck body (oval)
    ctx.fillStyle = duck.color;
    ctx.beginPath();
    ctx.ellipse(0, 0, size, size * 0.7, 0, 0, Math.PI * 2);
    ctx.fill();

    // Duck head
    ctx.beginPath();
    ctx.ellipse(size * 0.6, -size * 0.3, size * 0.45, size * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Duck beak
    ctx.fillStyle = '#F5A742';
    ctx.beginPath();
    ctx.moveTo(size * 0.9, -size * 0.3);
    ctx.lineTo(size * 1.2, -size * 0.25);
    ctx.lineTo(size * 0.9, -size * 0.15);
    ctx.closePath();
    ctx.fill();

    // Duck eye
    ctx.fillStyle = '#2B2B28';
    ctx.beginPath();
    ctx.arc(size * 0.7, -size * 0.4, 3, 0, Math.PI * 2);
    ctx.fill();

    // Letter label for answer ducks
    if (duck.isAnswer && !duck.hit) {
      const letter = String.fromCharCode(65 + duck.answerIndex); // A, B, C, D
      ctx.fillStyle = '#FFFFFF';
      ctx.font = "bold 14px 'Nunito Sans', sans-serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(letter, 0, 2);
    }

    ctx.restore();
  }

  function drawCrosshair() {
    const x = crosshair.x;
    const y = crosshair.y;
    const size = 20;

    ctx.save();
    ctx.translate(x, y);
    ctx.scale(1, aspectRatio);

    ctx.strokeStyle = '#E85D4A';
    ctx.lineWidth = 2;

    // Outer circle
    ctx.beginPath();
    ctx.arc(0, 0, size, 0, Math.PI * 2);
    ctx.stroke();

    // Inner circle
    ctx.beginPath();
    ctx.arc(0, 0, size * 0.3, 0, Math.PI * 2);
    ctx.stroke();

    // Crosshairs
    ctx.beginPath();
    ctx.moveTo(-size * 1.3, 0);
    ctx.lineTo(-size * 0.5, 0);
    ctx.moveTo(size * 0.5, 0);
    ctx.lineTo(size * 1.3, 0);
    ctx.moveTo(0, -size * 1.3);
    ctx.lineTo(0, -size * 0.5);
    ctx.moveTo(0, size * 0.5);
    ctx.lineTo(0, size * 1.3);
    ctx.stroke();

    ctx.restore();
  }

  function drawAnswerPanel() {
    const panelY = 340;
    const panelHeight = H - panelY;

    // Panel background
    ctx.fillStyle = 'rgba(250, 250, 247, 0.95)';
    ctx.fillRect(0, panelY, W, panelHeight);

    // Panel border
    ctx.strokeStyle = COLORS.borderSubtle;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, panelY);
    ctx.lineTo(W, panelY);
    ctx.stroke();

    // Draw answer boxes in 2x2 grid
    const boxW = 170;
    const boxH = 130;
    const startX = 10;
    const startY = panelY + 15;
    const gapX = 10;
    const gapY = 10;

    answerLabels.forEach((label, i) => {
      const col = i % 2;
      const row = Math.floor(i / 2);
      const x = startX + col * (boxW + gapX);
      const y = startY + row * (boxH + gapY);

      ctx.save();
      ctx.globalAlpha = label.alpha;

      // Scale animation
      const centerX = x + boxW / 2;
      const centerY = y + boxH / 2;
      ctx.translate(centerX, centerY);
      ctx.scale(label.scale, label.scale);
      ctx.translate(-centerX, -centerY);

      // Box background
      ctx.fillStyle = COLORS.bgSurface;
      ctx.beginPath();
      ctx.roundRect(x, y, boxW, boxH, 8);
      ctx.fill();

      // Colored left border
      ctx.fillStyle = label.color;
      ctx.beginPath();
      ctx.roundRect(x, y, 6, boxH, [8, 0, 0, 8]);
      ctx.fill();

      // Box border
      ctx.strokeStyle = COLORS.borderSubtle;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(x, y, boxW, boxH, 8);
      ctx.stroke();

      // Letter badge
      const letter = String.fromCharCode(65 + i);
      ctx.fillStyle = label.color;
      ctx.beginPath();
      ctx.arc(x + 22, y + 18, 12, 0, Math.PI * 2);
      ctx.fill();

      drawText(letter, x + 22, y + 18, {
        font: "bold 14px 'Nunito Sans', sans-serif",
        color: '#FFFFFF'
      });

      // Answer text - wrapped
      const lines = label.wrappedText || [label.choice.text];
      const fontSize = label.fontSize || 14;
      const lineHeight = fontSize + 4;
      const textStartY = y + 42;

      lines.forEach((line, lineIndex) => {
        drawText(line, x + 14, textStartY + lineIndex * lineHeight, {
          font: `500 ${fontSize}px 'Nunito', sans-serif`,
          color: COLORS.textPrimary,
          align: 'left',
          maxWidth: boxW - 24
        });
      });

      ctx.restore();
    });
  }

  function drawShotParticles() {
    shotParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.life / p.maxLife;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
  }

  function drawHitEffects() {
    hitEffects.forEach(e => {
      const progress = e.time / 0.5;
      const size = 30 + progress * 40;
      const alpha = 1 - progress;

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = e.correct ? COLORS.success : COLORS.error;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.translate(e.x, e.y);
      ctx.scale(1, aspectRatio);
      ctx.arc(0, 0, size, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    });
  }

  function drawGame() {
    // Sky gradient background
    const gradient = ctx.createLinearGradient(0, 0, 0, 340);
    gradient.addColorStop(0, '#87CEEB');
    gradient.addColorStop(0.5, '#B0E0E6');
    gradient.addColorStop(1, '#98D8C8');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, W, 340);

    // Draw tier lines (shooting gallery rails)
    TIERS.forEach((tier, i) => {
      ctx.strokeStyle = 'rgba(139, 115, 85, 0.4)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(0, tier.y + 15);
      ctx.lineTo(W, tier.y + 15);
      ctx.stroke();

      // Tier label
      drawText(`Tier ${i + 1}`, 30, tier.y - 12, {
        font: "500 12px 'Nunito Sans', sans-serif",
        color: 'rgba(43, 43, 40, 0.5)',
        align: 'left'
      });
    });

    // Draw decoy ducks (behind answer ducks)
    ducks.forEach(duck => drawDuck(duck));

    // Draw answer ducks
    answerDucks.forEach(duck => drawDuck(duck));

    // Draw hit effects
    drawHitEffects();

    // Draw shot particles
    drawShotParticles();

    // Draw crosshair
    drawCrosshair();

    // Draw answer panel at bottom
    drawAnswerPanel();
  }

  function shoot(x, y) {
    playSound('shot');

    // Create shot particles
    for (let i = 0; i < 8; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 50 + Math.random() * 100;
      shotParticles.push({
        x: x,
        y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        size: 2 + Math.random() * 3,
        color: '#F5A742',
        life: 0.3,
        maxLife: 0.3
      });
    }

    // Check for duck hits - only in the shooting gallery area (y < 340)
    if (y > 300) return; // Don't shoot in answer panel area

    const allAnswerDucks = answerDucks.filter(d => !d.hit);

    for (let duck of allAnswerDucks) {
      const bobY = Math.sin(gameTime * 3 + duck.bobOffset) * 3;
      const duckY = duck.y + bobY;
      const size = duck.isAnswer ? 28 : 22;

      // Check hit (circular hitbox)
      const dx = x - duck.x;
      const dy = (y - duckY) / aspectRatio;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < size + 10) {
        // Hit!
        duck.hit = true;

        const choice = QUESTION.choices[duck.answerIndex];

        hitEffects.push({
          x: duck.x,
          y: duckY,
          time: 0,
          correct: choice.is_correct
        });

        if (choice.is_correct) {
          playSound('correct');
        } else {
          playSound('wrong');
        }

        // End game after short delay for hit animation
        setTimeout(() => {
          engine.end(choice.is_correct, choice.explanation);
        }, 300);

        return;
      }
    }

    // Check decoy hits
    for (let duck of ducks.filter(d => !d.hit)) {
      const bobY = Math.sin(gameTime * 3 + duck.bobOffset) * 3;
      const duckY = duck.y + bobY;
      const size = 22;

      const dx = x - duck.x;
      const dy = (y - duckY) / aspectRatio;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < size + 5) {
        // Hit decoy - just make it fall
        duck.hit = true;
        hitEffects.push({
          x: duck.x,
          y: duckY,
          time: 0,
          correct: false
        });
      }
    }
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;

    const touch = e.touches[0] || e.changedTouches[0];
    const { x, y } = screenToLogical(touch.clientX, touch.clientY);

    if (type === 'start') {
      crosshair.x = x;
      crosshair.y = Math.min(y, 300); // Keep crosshair in shooting area
      shoot(x, y);
    } else if (type === 'move') {
      crosshair.x = x;
      crosshair.y = Math.min(y, 300);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
