<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Jetpack Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  JETPACK QUIZ - Mobile MCQ Platformer                                        ║
  ║  Fly to the correct answer platform using your jetpack!                      ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   *
   * @param {string} text - The text to wrap
   * @param {number} maxWidth - Maximum width in logical coordinates
   * @param {string} font - CSS font string (e.g., "16px 'Nunito', sans-serif")
   * @param {number} maxLines - Maximum number of lines (default 3)
   * @returns {string[]} Array of text lines
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   * Tries font sizes from max to min until content fits.
   *
   * @param {Object} options
   * @param {string[]} options.texts - Array of text strings to fit
   * @param {number} options.maxWidth - Maximum width for text wrapping
   * @param {number} options.availableHeight - Total height available for all texts
   * @param {number} options.minFont - Minimum font size (default 12)
   * @param {number} options.maxFont - Maximum font size (default 18)
   * @param {number} options.itemPadding - Vertical padding per text item (default 4)
   * @param {string} options.fontFamily - Font family (default "'Nunito Sans', sans-serif")
   * @returns {{ fontSize: number, wrappedTexts: string[][] }} Optimal font size and pre-wrapped texts
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: JETPACK QUIZ GAME CODE                                         ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === GAME CONSTANTS ===
  const GRAVITY = 450;
  const THRUST_ACCEL = 700;
  const MAX_UP_VELOCITY = -280;
  const MAX_FALL_VELOCITY = 400;
  const HORIZONTAL_SPEED = 150;
  const FUEL_MAX = 100;
  const FUEL_CONSUMPTION = 40; // per second when thrusting
  const FUEL_REGEN = 25; // per second when not thrusting
  const PLAYER_WIDTH = 28;
  const PLAYER_HEIGHT = 36;

  // Arena boundaries
  const WALL_THICKNESS = 12;
  const ARENA_TOP = 50;
  const ARENA_BOTTOM = 520;
  const ARENA_LEFT = 10;
  const ARENA_RIGHT = W - 10;
  const EXIT_HEIGHT = 70;

  // === GAME STATE ===
  let player = {};
  let exits = [];
  let helperPlatforms = [];
  let fuel = FUEL_MAX;
  let isThrusting = false;
  let tiltX = 0; // -1 to 1 for horizontal movement
  let jetpackButton = {};
  let leftButton = {};
  let rightButton = {};
  let cachedTextSizing = null;
  let thrustParticles = [];
  let showThrustEffects = false; // Track if jetpack visuals/sound should show

  // === POLISH: Animation state ===
  let entranceAnimProgress = 0; // 0 to 1
  let entranceComplete = false;
  let exitGlows = [0, 0, 0, 0]; // Glow intensity for each exit (0-1)
  let landingParticles = [];

  // === POLISH: Audio system ===
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  let audioCtx = null;
  let thrustOsc = null;
  let thrustGain = null;
  let thrustActive = false;

  function initAudio() {
    if (audioCtx) return;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) {
      console.warn('Web Audio API not supported');
    }
  }

  function playSound(type) {
    if (!audioCtx || prefersReducedMotion) return;
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'wrong') {
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(180, audioCtx.currentTime);
      osc.frequency.linearRampToValueAtTime(120, audioCtx.currentTime + 0.25);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.25);
    } else if (type === 'landing') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(150, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.15);
    }
  }

  // Jetpack sound - completely disabled until airborne
  let thrustNodes = null; // Store all nodes for complete cleanup

  function startThrustSound() {
    // Triple-check we should actually play sound
    if (!audioCtx || thrustActive || prefersReducedMotion || !showThrustEffects) return;
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }

    // Create all nodes
    const bufferSize = audioCtx.sampleRate;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = Math.random() * 2 - 1;
    }

    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    source.loop = true;

    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 1500;
    filter.Q.value = 0.3;

    const gain = audioCtx.createGain();
    gain.gain.value = 0;
    gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.02);

    source.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);

    source.start();

    // Store all references for cleanup
    thrustNodes = { source, filter, gain };
    thrustActive = true;
  }

  function stopThrustSound() {
    thrustActive = false;

    if (thrustNodes) {
      try {
        // Immediately silence
        thrustNodes.gain.gain.cancelScheduledValues(audioCtx.currentTime);
        thrustNodes.gain.gain.value = 0;
        // Stop and disconnect everything
        thrustNodes.source.stop();
        thrustNodes.source.disconnect();
        thrustNodes.filter.disconnect();
        thrustNodes.gain.disconnect();
      } catch (e) {}
      thrustNodes = null;
    }
  }

  function updateThrustSound() {
    // No modulation needed
  }

  function initGame() {
    // Player starts at center of arena
    player = {
      x: W / 2,
      y: (ARENA_TOP + ARENA_BOTTOM) / 2 + 100,
      vx: 0,
      vy: 0,
      onGround: false
    };

    fuel = FUEL_MAX;
    isThrusting = false;
    tiltX = 0;
    thrustParticles = [];
    showThrustEffects = false;

    // Reset animation state
    entranceAnimProgress = 0;
    entranceComplete = false;
    exitGlows = [0, 0, 0, 0];
    landingParticles = [];

    // Stop any playing thrust sound
    stopThrustSound();

    // Calculate exit positions - 2 on left wall, 2 on right wall
    const leftExitX = ARENA_LEFT - WALL_THICKNESS;
    const rightExitX = ARENA_RIGHT;
    const upperExitY = ARENA_TOP + 60;
    const lowerExitY = ARENA_TOP + 220;
    const textAreaW = 140; // Wider to fit more text

    // Exits (gaps in walls) - player flies through to select answer
    exits = [
      // Option A - Upper Left
      { x: leftExitX, y: upperExitY, w: WALL_THICKNESS + 5, h: EXIT_HEIGHT,
        side: 'left', textW: textAreaW, choice: QUESTION.choices[0], label: 'A' },
      // Option B - Upper Right
      { x: rightExitX - 5, y: upperExitY, w: WALL_THICKNESS + 5, h: EXIT_HEIGHT,
        side: 'right', textW: textAreaW, choice: QUESTION.choices[1], label: 'B' },
      // Option C - Lower Left
      { x: leftExitX, y: lowerExitY, w: WALL_THICKNESS + 5, h: EXIT_HEIGHT,
        side: 'left', textW: textAreaW, choice: QUESTION.choices[2], label: 'C' },
      // Option D - Lower Right
      { x: rightExitX - 5, y: lowerExitY, w: WALL_THICKNESS + 5, h: EXIT_HEIGHT,
        side: 'right', textW: textAreaW, choice: QUESTION.choices[3], label: 'D' }
    ];

    // Platforms under each exit for the player to walk out from
    const platH = 14;
    const upperPlatY = upperExitY + EXIT_HEIGHT + 10; // Just below upper exits
    const lowerPlatY = lowerExitY + EXIT_HEIGHT + 10; // Just below lower exits

    helperPlatforms = [
      // Upper left platform (Option A)
      { x: ARENA_LEFT + WALL_THICKNESS, y: upperPlatY, w: 80, h: platH },
      // Upper right platform (Option B)
      { x: ARENA_RIGHT - WALL_THICKNESS - 80, y: upperPlatY, w: 80, h: platH },
      // Lower left platform (Option C)
      { x: ARENA_LEFT + WALL_THICKNESS, y: lowerPlatY, w: 80, h: platH },
      // Lower right platform (Option D)
      { x: ARENA_RIGHT - WALL_THICKNESS - 80, y: lowerPlatY, w: 80, h: platH },
    ];

    // Floor platform at bottom of arena
    helperPlatforms.push({ x: ARENA_LEFT + WALL_THICKNESS, y: ARENA_BOTTOM - 14, w: ARENA_RIGHT - ARENA_LEFT - WALL_THICKNESS * 2, h: 14, isFloor: true });

    // Jetpack button at bottom center
    jetpackButton = {
      x: W / 2 - 50,
      y: H - 90,
      w: 100,
      h: 60
    };

    // Left/Right control buttons
    leftButton = {
      x: 15,
      y: H - 90,
      w: 60,
      h: 60
    };

    rightButton = {
      x: W - 75,
      y: H - 90,
      w: 60,
      h: 60
    };

    recalculateTextSizing();
  }

  function recalculateTextSizing() {
    if (!exits || exits.length === 0) return;

    cachedTextSizing = exits.map((exit, i) => {
      const maxWidth = exit.textW + 30; // Wider text area
      const font = "600 16px 'Nunito Sans', sans-serif";
      const lines = wrapText(exit.choice.text, maxWidth, font, 5); // More lines to show full text
      return { lines, fontSize: 16 };
    });
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    // === POLISH: Update entrance animation ===
    // Keep counting for text delay (needs to go beyond 1.0)
    entranceAnimProgress += dt * 1.5;
    if (entranceAnimProgress >= 1 && !entranceComplete) {
      entranceComplete = true;
    }

    // === POLISH: Update proximity glow for exits ===
    const GLOW_DISTANCE = 60;
    exits.forEach((exit, i) => {
      const exitCenterX = exit.side === 'left' ? exit.x + exit.w : exit.x;
      const exitCenterY = exit.y + exit.h / 2;
      const dx = player.x - exitCenterX;
      const dy = player.y - exitCenterY;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < GLOW_DISTANCE) {
        exitGlows[i] = Math.min(1, exitGlows[i] + dt * 4);
      } else {
        exitGlows[i] = Math.max(0, exitGlows[i] - dt * 3);
      }
    });

    // === POLISH: Update landing particles ===
    landingParticles = landingParticles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 200 * dt;
      p.life -= dt;
      p.alpha = p.life / p.maxLife;
      return p.life > 0;
    });

    // Capture ground state BEFORE any modifications (from previous frame's collision detection)
    const wasOnGround = player.onGround;

    // Apply thrust if button held and fuel available
    if (isThrusting && fuel > 0) {
      // Apply thrust physics (allows lifting off from ground)
      player.vy -= THRUST_ACCEL * dt;
      if (player.vy < MAX_UP_VELOCITY) player.vy = MAX_UP_VELOCITY;
      fuel -= FUEL_CONSUMPTION * dt;
      if (fuel < 0) fuel = 0;

      // Only show thrust effects (sound/particles/flames) when NOT on ground
      showThrustEffects = !wasOnGround;

      if (showThrustEffects) {
        startThrustSound();
        updateThrustSound();

        // Spawn thrust particles only when airborne
        if (Math.random() < 0.5) {
          thrustParticles.push({
            x: player.x,
            y: player.y + PLAYER_HEIGHT / 2,
            vx: (Math.random() - 0.5) * 40,
            vy: 100 + Math.random() * 50,
            life: 0.4,
            size: 3 + Math.random() * 3
          });
        }
      } else {
        stopThrustSound();
      }

      player.onGround = false;
    } else {
      showThrustEffects = false;
      stopThrustSound();
      player.vy += GRAVITY * dt;
      if (player.vy > MAX_FALL_VELOCITY) player.vy = MAX_FALL_VELOCITY;

      if (!isThrusting) {
        fuel += FUEL_REGEN * dt;
        if (fuel > FUEL_MAX) fuel = FUEL_MAX;
      }
    }

    // Apply horizontal movement
    player.vx = tiltX * HORIZONTAL_SPEED;

    // Update position
    player.x += player.vx * dt;
    player.y += player.vy * dt;

    // Check if player exits through any exit (answer selection)
    for (const exit of exits) {
      if (checkExitCollision(exit)) {
        stopThrustSound();
        playSound(exit.choice.is_correct ? 'correct' : 'wrong');
        spawnLandingParticles(player.x, player.y, exit.choice.is_correct ? '#6BBF59' : '#E85D4A');
        engine.end(exit.choice.is_correct, exit.choice.explanation);
        return;
      }
    }

    // Wall collisions (with gaps for exits)
    // Left wall
    const leftWallX = ARENA_LEFT + WALL_THICKNESS;
    if (player.x - PLAYER_WIDTH / 2 < leftWallX) {
      if (!isInExitGap(player.y, 'left')) {
        player.x = leftWallX + PLAYER_WIDTH / 2;
        player.vx = 0;
      }
    }

    // Right wall
    const rightWallX = ARENA_RIGHT - WALL_THICKNESS;
    if (player.x + PLAYER_WIDTH / 2 > rightWallX) {
      if (!isInExitGap(player.y, 'right')) {
        player.x = rightWallX - PLAYER_WIDTH / 2;
        player.vx = 0;
      }
    }

    // Top wall
    if (player.y - PLAYER_HEIGHT / 2 < ARENA_TOP + WALL_THICKNESS) {
      player.y = ARENA_TOP + WALL_THICKNESS + PLAYER_HEIGHT / 2;
      player.vy = 0;
    }

    // Bottom wall
    if (player.y + PLAYER_HEIGHT / 2 > ARENA_BOTTOM - WALL_THICKNESS) {
      player.y = ARENA_BOTTOM - WALL_THICKNESS - PLAYER_HEIGHT / 2;
      player.vy = 0;
      player.onGround = true;
    }

    // Check helper platform landings (only when falling with significant velocity)
    if (player.vy > 0) {
      for (const plat of helperPlatforms) {
        if (checkPlatformLanding(plat)) {
          // Only play sound/particles if actually falling fast (not micro-gravity)
          if (player.vy > 50) {
            playSound('landing');
            spawnLandingParticles(player.x, plat.y, '#8C8C84');
          }
          player.y = plat.y - PLAYER_HEIGHT / 2;
          player.vy = 0;
          player.onGround = true;
        }
      }
    }

    // Update thrust particles
    thrustParticles = thrustParticles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      p.size *= 0.95;
      return p.life > 0;
    });
  }

  // Check if player Y position is within an exit gap
  function isInExitGap(playerY, side) {
    const playerTop = playerY - PLAYER_HEIGHT / 2;
    const playerBottom = playerY + PLAYER_HEIGHT / 2;

    for (const exit of exits) {
      if (exit.side === side) {
        // Player center must be within exit gap
        if (playerY > exit.y && playerY < exit.y + exit.h) {
          return true;
        }
      }
    }
    return false;
  }

  // Check if player has flown through an exit
  function checkExitCollision(exit) {
    const playerCenterY = player.y;

    // Check if player Y is within exit gap
    if (playerCenterY < exit.y || playerCenterY > exit.y + exit.h) {
      return false;
    }

    // Check if player has crossed the exit threshold
    if (exit.side === 'left') {
      return player.x - PLAYER_WIDTH / 2 < ARENA_LEFT;
    } else {
      return player.x + PLAYER_WIDTH / 2 > ARENA_RIGHT;
    }
  }

  // === POLISH: Spawn landing dust particles ===
  function spawnLandingParticles(x, y, color) {
    if (prefersReducedMotion) return;
    for (let i = 0; i < 8; i++) {
      const angle = (Math.PI / 6) + Math.random() * (Math.PI * 2 / 3); // Upward arc
      const speed = 40 + Math.random() * 60;
      landingParticles.push({
        x: x + (Math.random() - 0.5) * 20,
        y: y,
        vx: Math.cos(angle) * speed * (Math.random() < 0.5 ? 1 : -1),
        vy: -Math.sin(angle) * speed,
        color: color,
        size: 2 + Math.random() * 3,
        life: 0.3 + Math.random() * 0.2,
        maxLife: 0.5,
        alpha: 1
      });
    }
  }

  function checkPlatformLanding(plat) {
    const playerBottom = player.y + PLAYER_HEIGHT / 2;
    const playerLeft = player.x - PLAYER_WIDTH / 2;
    const playerRight = player.x + PLAYER_WIDTH / 2;

    // Check if player is above platform and feet are near platform top
    return playerBottom >= plat.y - 5 &&
           playerBottom <= plat.y + plat.h / 2 &&
           playerRight > plat.x &&
           playerLeft < plat.x + plat.w;
  }

  function drawArenaWalls() {
    const wallColor = '#4a4a6a';
    const wallHighlight = '#6a6a8a';

    // Get exit positions for creating gaps
    const leftExits = exits.filter(e => e.side === 'left').sort((a, b) => a.y - b.y);
    const rightExits = exits.filter(e => e.side === 'right').sort((a, b) => a.y - b.y);

    ctx.fillStyle = wallColor;
    ctx.strokeStyle = wallHighlight;
    ctx.lineWidth = 2;

    // Top wall
    ctx.fillRect(ARENA_LEFT, ARENA_TOP, ARENA_RIGHT - ARENA_LEFT, WALL_THICKNESS);
    ctx.strokeRect(ARENA_LEFT, ARENA_TOP, ARENA_RIGHT - ARENA_LEFT, WALL_THICKNESS);

    // Bottom wall
    ctx.fillRect(ARENA_LEFT, ARENA_BOTTOM - WALL_THICKNESS, ARENA_RIGHT - ARENA_LEFT, WALL_THICKNESS);
    ctx.strokeRect(ARENA_LEFT, ARENA_BOTTOM - WALL_THICKNESS, ARENA_RIGHT - ARENA_LEFT, WALL_THICKNESS);

    // Left wall with gaps for exits
    let leftY = ARENA_TOP + WALL_THICKNESS;
    for (const exit of leftExits) {
      if (exit.y > leftY) {
        ctx.fillRect(ARENA_LEFT, leftY, WALL_THICKNESS, exit.y - leftY);
        ctx.strokeRect(ARENA_LEFT, leftY, WALL_THICKNESS, exit.y - leftY);
      }
      leftY = exit.y + exit.h;
    }
    if (leftY < ARENA_BOTTOM - WALL_THICKNESS) {
      ctx.fillRect(ARENA_LEFT, leftY, WALL_THICKNESS, ARENA_BOTTOM - WALL_THICKNESS - leftY);
      ctx.strokeRect(ARENA_LEFT, leftY, WALL_THICKNESS, ARENA_BOTTOM - WALL_THICKNESS - leftY);
    }

    // Right wall with gaps for exits
    let rightY = ARENA_TOP + WALL_THICKNESS;
    for (const exit of rightExits) {
      if (exit.y > rightY) {
        ctx.fillRect(ARENA_RIGHT - WALL_THICKNESS, rightY, WALL_THICKNESS, exit.y - rightY);
        ctx.strokeRect(ARENA_RIGHT - WALL_THICKNESS, rightY, WALL_THICKNESS, exit.y - rightY);
      }
      rightY = exit.y + exit.h;
    }
    if (rightY < ARENA_BOTTOM - WALL_THICKNESS) {
      ctx.fillRect(ARENA_RIGHT - WALL_THICKNESS, rightY, WALL_THICKNESS, ARENA_BOTTOM - WALL_THICKNESS - rightY);
      ctx.strokeRect(ARENA_RIGHT - WALL_THICKNESS, rightY, WALL_THICKNESS, ARENA_BOTTOM - WALL_THICKNESS - rightY);
    }

    // Inner glow effect for arena
    const innerGlow = ctx.createLinearGradient(ARENA_LEFT, 0, ARENA_LEFT + 30, 0);
    innerGlow.addColorStop(0, 'rgba(74, 74, 106, 0.3)');
    innerGlow.addColorStop(1, 'transparent');
    ctx.fillStyle = innerGlow;
    ctx.fillRect(ARENA_LEFT + WALL_THICKNESS, ARENA_TOP + WALL_THICKNESS, 30, ARENA_BOTTOM - ARENA_TOP - WALL_THICKNESS * 2);

    const innerGlowRight = ctx.createLinearGradient(ARENA_RIGHT, 0, ARENA_RIGHT - 30, 0);
    innerGlowRight.addColorStop(0, 'rgba(74, 74, 106, 0.3)');
    innerGlowRight.addColorStop(1, 'transparent');
    ctx.fillStyle = innerGlowRight;
    ctx.fillRect(ARENA_RIGHT - WALL_THICKNESS - 30, ARENA_TOP + WALL_THICKNESS, 30, ARENA_BOTTOM - ARENA_TOP - WALL_THICKNESS * 2);
  }

  function drawGame() {
    // Sky gradient background
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, '#1a1a3e');
    skyGrad.addColorStop(0.5, '#2d2d5a');
    skyGrad.addColorStop(1, '#16213e');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    // Draw stars
    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
    for (let i = 0; i < 30; i++) {
      const sx = (i * 47) % W;
      const sy = (i * 31) % (H - 150);
      ctx.beginPath();
      ctx.ellipse(sx, sy, 1, 1 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Draw arena walls
    drawArenaWalls();

    // Draw helper platforms (bright and visible)
    helperPlatforms.forEach((plat, i) => {
      if (plat.isFloor) return; // Floor is part of arena
      const staggerDelay = 0.5 + i * 0.1;
      const localProgress = Math.max(0, Math.min(1, (entranceAnimProgress - staggerDelay) / 0.3));
      if (localProgress <= 0 && !entranceComplete) return;
      const effectiveProgress = entranceComplete ? 1 : localProgress;

      ctx.save();
      ctx.globalAlpha = effectiveProgress;

      // Bright platform with glow
      ctx.shadowColor = '#E87A3E';
      ctx.shadowBlur = 8;
      ctx.fillStyle = '#8B7355';
      ctx.beginPath();
      ctx.roundRect(plat.x, plat.y, plat.w, plat.h, 4);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Top highlight
      ctx.fillStyle = '#A89078';
      ctx.fillRect(plat.x + 2, plat.y, plat.w - 4, 4);

      ctx.strokeStyle = '#E87A3E';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.restore();
    });

    // Draw exits with labels and text
    exits.forEach((exit, i) => {
      const staggerDelay = i * 0.1;
      const localProgress = Math.max(0, Math.min(1, (entranceAnimProgress - staggerDelay) / 0.4));
      if (localProgress <= 0 && !entranceComplete) return;
      const effectiveProgress = entranceComplete ? 1 : localProgress;
      const glowIntensity = exitGlows[i];

      ctx.save();
      ctx.globalAlpha = effectiveProgress;

      // Exit glow effect
      if (glowIntensity > 0 && !prefersReducedMotion) {
        ctx.shadowColor = '#4ECDC4';
        ctx.shadowBlur = 8 + glowIntensity * 15;
      }

      // Exit opening - bright and obvious
      const exitX = exit.side === 'left' ? ARENA_LEFT : ARENA_RIGHT - WALL_THICKNESS;

      // Glowing exit background
      ctx.fillStyle = glowIntensity > 0 ? '#4ECDC4' : '#E87A3E';
      ctx.globalAlpha = 0.6 + glowIntensity * 0.4;
      ctx.fillRect(exitX, exit.y, WALL_THICKNESS, exit.h);
      ctx.globalAlpha = 1;

      // Exit border
      ctx.strokeStyle = glowIntensity > 0 ? '#4ECDC4' : '#FFB88C';
      ctx.lineWidth = 3;
      ctx.strokeRect(exitX, exit.y, WALL_THICKNESS, exit.h);

      // Draw arrow pointing into the exit
      const arrowX = exit.side === 'left' ? ARENA_LEFT + WALL_THICKNESS + 15 : ARENA_RIGHT - WALL_THICKNESS - 15;
      const arrowY = exit.y + exit.h / 2;
      ctx.fillStyle = glowIntensity > 0 ? '#4ECDC4' : '#E87A3E';

      ctx.beginPath();
      if (exit.side === 'left') {
        // Arrow pointing left
        ctx.moveTo(arrowX, arrowY);
        ctx.lineTo(arrowX + 12, arrowY - 8);
        ctx.lineTo(arrowX + 12, arrowY + 8);
      } else {
        // Arrow pointing right
        ctx.moveTo(arrowX, arrowY);
        ctx.lineTo(arrowX - 12, arrowY - 8);
        ctx.lineTo(arrowX - 12, arrowY + 8);
      }
      ctx.closePath();
      ctx.fill();

      ctx.shadowColor = 'transparent';
      ctx.restore();

      // Draw label and text (fades in later than exits)
      const textDelay = 1.5; // Additional delay for text boxes after exits
      const textStartTime = staggerDelay + textDelay;
      const textProgress = Math.max(0, Math.min(1, (entranceAnimProgress - textStartTime) / 0.4));
      const textComplete = entranceAnimProgress >= textStartTime + 0.4;
      if (textProgress > 0 || textComplete) {
        const textAlpha = textComplete ? 1 : textProgress;
        const sizing = cachedTextSizing?.[i];
        const lineHeight = sizing ? sizing.fontSize + 4 : 20;
        const totalTextHeight = sizing ? sizing.lines.length * lineHeight : 60;

        // Position text box overlapping the exit area
        const textBoxW = exit.textW + 30;
        const textBoxX = exit.side === 'left' ? 2 : W - textBoxW - 2;
        const textBoxY = exit.y - 5;
        const textBoxH = Math.max(exit.h + 10, totalTextHeight + 40);

        // Text background
        ctx.save();
        ctx.globalAlpha = textAlpha;
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.beginPath();
        ctx.roundRect(textBoxX, textBoxY, textBoxW, textBoxH, 8);
        ctx.fill();

        // Border with glow effect
        ctx.strokeStyle = glowIntensity > 0 ? '#4ECDC4' : 'rgba(232, 122, 62, 0.6)';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.restore();

        // Draw answer text centered in box
        const labelX = textBoxX + textBoxW / 2;
        if (sizing && sizing.lines) {
          const textStartY = textBoxY + 25;
          sizing.lines.forEach((line, j) => {
            drawText(line, labelX, textStartY + j * lineHeight, {
              font: `600 ${sizing.fontSize}px 'Nunito Sans', sans-serif`,
              color: '#F5F5F0'
            });
          });
        }
      }
    });

    // Draw thrust particles - using styleguide orange/amber
    thrustParticles.forEach(p => {
      const alpha = p.life / 0.4;
      // Interpolate between orange (#E87A3E) and amber (#F5A742)
      ctx.fillStyle = `rgba(${232 + Math.random() * 13}, ${122 + Math.random() * 45}, ${62 - Math.random() * 30}, ${alpha})`;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.size, p.size * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    });

    // === POLISH: Draw landing particles ===
    landingParticles.forEach(p => {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.alpha;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.size, p.size * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Draw player
    drawPlayer();

    // Draw UI (fuel meter, controls)
    drawUI();
  }

  function drawPlayer() {
    const px = player.x;
    const py = player.y;

    // Jetpack flames when thrusting AND airborne - using styleguide orange/amber
    if (showThrustEffects) {
      const flameHeight = 15 + Math.random() * 8;
      const flameGrad = ctx.createLinearGradient(px, py + PLAYER_HEIGHT / 2, px, py + PLAYER_HEIGHT / 2 + flameHeight);
      flameGrad.addColorStop(0, '#E87A3E'); // orange primary
      flameGrad.addColorStop(0.5, '#F5A742'); // amber
      flameGrad.addColorStop(1, 'rgba(232, 122, 62, 0)');
      ctx.fillStyle = flameGrad;
      ctx.beginPath();
      ctx.moveTo(px - 8, py + PLAYER_HEIGHT / 2);
      ctx.lineTo(px + 8, py + PLAYER_HEIGHT / 2);
      ctx.lineTo(px, py + PLAYER_HEIGHT / 2 + flameHeight);
      ctx.closePath();
      ctx.fill();
    }

    // Body (suit)
    ctx.fillStyle = '#4A90D9';
    ctx.beginPath();
    ctx.ellipse(px, py + 5, 10, 14 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Helmet
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath();
    ctx.ellipse(px, py - 12, 9, 9 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Visor
    ctx.fillStyle = '#2196F3';
    ctx.beginPath();
    ctx.ellipse(px, py - 12, 6, 5 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Jetpack
    ctx.fillStyle = '#666666';
    ctx.fillRect(px - 14, py - 5, 6, 20 * aspectRatio);
    ctx.fillRect(px + 8, py - 5, 6, 20 * aspectRatio);
    ctx.fillStyle = '#E87A3E';
    ctx.fillRect(px - 13, py - 3, 4, 8 * aspectRatio);
    ctx.fillRect(px + 9, py - 3, 4, 8 * aspectRatio);

    // Legs
    ctx.strokeStyle = '#4A90D9';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(px - 5, py + 12);
    ctx.lineTo(px - 7, py + PLAYER_HEIGHT / 2 - 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(px + 5, py + 12);
    ctx.lineTo(px + 7, py + PLAYER_HEIGHT / 2 - 2);
    ctx.stroke();

    // Boots
    ctx.fillStyle = '#333333';
    ctx.beginPath();
    ctx.ellipse(px - 7, py + PLAYER_HEIGHT / 2, 5, 4 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(px + 7, py + PLAYER_HEIGHT / 2, 5, 4 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawUI() {
    // Fuel meter background - positioned below arena, above controls
    const fuelX = 15;
    const fuelY = H - 105; // Moved down to avoid hiding player
    const fuelW = W - 30;
    const fuelH = 10;

    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
    ctx.beginPath();
    ctx.roundRect(fuelX - 3, fuelY - 3, fuelW + 6, fuelH + 6, 8);
    ctx.fill();

    // Fuel bar background
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.roundRect(fuelX, fuelY, fuelW, fuelH, 5);
    ctx.fill();

    // Fuel bar fill - using styleguide colors
    const fuelPercent = fuel / FUEL_MAX;
    const fuelColor = fuelPercent > 0.3 ? '#6BBF59' : '#E85D4A'; // success / error
    ctx.fillStyle = fuelColor;
    ctx.beginPath();
    ctx.roundRect(fuelX, fuelY, fuelW * fuelPercent, fuelH, 5);
    ctx.fill();

    // Fuel label - small indicator to the left
    drawText('FUEL', fuelX + 25, fuelY + fuelH / 2, {
      font: "bold 10px 'Nunito Sans', sans-serif",
      color: '#888888'
    });

    // Left button
    ctx.fillStyle = tiltX < 0 ? 'rgba(232, 122, 62, 0.8)' : 'rgba(100, 100, 120, 0.6)';
    ctx.beginPath();
    ctx.roundRect(leftButton.x, leftButton.y, leftButton.w, leftButton.h, 12);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();
    drawText('◀', leftButton.x + leftButton.w / 2, leftButton.y + leftButton.h / 2, {
      font: "bold 24px sans-serif",
      color: '#FFFFFF'
    });

    // Jetpack button
    const jetpackActive = isThrusting && fuel > 0;
    ctx.fillStyle = jetpackActive ? '#E87A3E' : 'rgba(232, 122, 62, 0.7)';
    ctx.beginPath();
    ctx.roundRect(jetpackButton.x, jetpackButton.y, jetpackButton.w, jetpackButton.h, 16);
    ctx.fill();
    ctx.strokeStyle = jetpackActive ? '#FFB88C' : 'rgba(255, 255, 255, 0.3)';
    ctx.lineWidth = 3;
    ctx.stroke();

    // Jetpack icon
    drawText('🚀', jetpackButton.x + jetpackButton.w / 2, jetpackButton.y + jetpackButton.h / 2, {
      font: "28px sans-serif",
      color: '#FFFFFF'
    });

    // Right button
    ctx.fillStyle = tiltX > 0 ? 'rgba(232, 122, 62, 0.8)' : 'rgba(100, 100, 120, 0.6)';
    ctx.beginPath();
    ctx.roundRect(rightButton.x, rightButton.y, rightButton.w, rightButton.h, 12);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();
    drawText('▶', rightButton.x + rightButton.w / 2, rightButton.y + rightButton.h / 2, {
      font: "bold 24px sans-serif",
      color: '#FFFFFF'
    });
  }

  // Track active touches
  let activeTouches = new Map();

  function handleTouch(e, type) {
    // Initialize audio on first interaction (required by browsers)
    initAudio();

    if (gameState !== 'playing') return;

    if (type === 'start') {
      for (const touch of e.changedTouches) {
        const { x, y } = screenToLogical(touch.clientX, touch.clientY);

        // Check jetpack button
        if (pointInRect(x, y, jetpackButton)) {
          activeTouches.set(touch.identifier, 'jetpack');
          isThrusting = true;
        }
        // Check left button
        else if (pointInRect(x, y, leftButton)) {
          activeTouches.set(touch.identifier, 'left');
          tiltX = -1;
        }
        // Check right button
        else if (pointInRect(x, y, rightButton)) {
          activeTouches.set(touch.identifier, 'right');
          tiltX = 1;
        }
      }
    } else if (type === 'end') {
      for (const touch of e.changedTouches) {
        const touchType = activeTouches.get(touch.identifier);
        activeTouches.delete(touch.identifier);

        if (touchType === 'jetpack') {
          // Check if any other touch is on jetpack
          let stillThrusting = false;
          for (const [id, t] of activeTouches) {
            if (t === 'jetpack') stillThrusting = true;
          }
          if (!stillThrusting) isThrusting = false;
        } else if (touchType === 'left' || touchType === 'right') {
          // Check if still holding a direction
          let newTilt = 0;
          for (const [id, t] of activeTouches) {
            if (t === 'left') newTilt = -1;
            if (t === 'right') newTilt = 1;
          }
          tiltX = newTilt;
        }
      }
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });


  // Cursor change handler for end screen buttons
  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'ended') {
      canvas.style.cursor = 'default';
      return;
    }
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    if (gameResult) {
      if (pointInRect(x, y, restartButton) || pointInRect(x, y, nextButton)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    } else {
      if (pointInRect(x, y, centeredRestartButton)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    }
    canvas.style.cursor = 'default';
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
