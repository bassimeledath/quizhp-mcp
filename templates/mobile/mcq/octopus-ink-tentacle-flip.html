<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Octopus Ink Tentacle Flip</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE - MOBILE                                              ║
  ║  Fills 100% of container, non-uniform scaling, touch input.                  ║
  ║  Logical dimensions: 360×640 (use aspectRatio for proportional shapes)       ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none; /* Prevent default touch behaviors */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #0a1628;
      /* Canvas fills viewport via JS, these are fallbacks */
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill viewport
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   *
   * @param {string} text - The text to wrap
   * @param {number} maxWidth - Maximum width in logical coordinates
   * @param {string} font - CSS font string (e.g., "16px 'Nunito', sans-serif")
   * @param {number} maxLines - Maximum number of lines (default 3)
   * @returns {string[]} Array of text lines
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   * Tries font sizes from max to min until content fits.
   *
   * @param {Object} options
   * @param {string[]} options.texts - Array of text strings to fit
   * @param {number} options.maxWidth - Maximum width for text wrapping
   * @param {number} options.availableHeight - Total height available for all texts
   * @param {number} options.minFont - Minimum font size (default 12)
   * @param {number} options.maxFont - Maximum font size (default 18)
   * @param {number} options.itemPadding - Vertical padding per text item (default 4)
   * @param {string} options.fontFamily - Font family (default "'Nunito Sans', sans-serif")
   * @returns {{ fontSize: number, wrappedTexts: string[][] }} Optimal font size and pre-wrapped texts
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS (QuizHP Palette) ===
  const COLORS = {
    bgDeep: '#0a1628',
    bgTrench: '#0d1f3c',
    coral1: '#E87A3E',
    coral2: '#D66B31',
    coral3: '#F5A742',
    coral4: '#4ECDC4',
    cyan: '#4ECDC4',
    cyanDark: '#45B8B0',
    success: '#6BBF59',
    error: '#E85D4A',
    textPrimary: '#F5F5F0',
    textSecondary: '#C2C2B8',
    amber: '#F5A742',
    orange: '#E87A3E',
    peach: '#FFB89D',
    surface: '#1C1C1A',
    surfaceLight: '#2A2A27'
  };

  // Octopus color palettes (camouflaged vs revealed)
  const OCTO_CAMO_COLORS = [
    { body: '#1a3050', spots: '#162840' },
    { body: '#1e2a48', spots: '#152038' },
    { body: '#1f3555', spots: '#182a42' },
    { body: '#1b2d4a', spots: '#14243c' }
  ];
  const OCTO_REVEAL_COLORS = [
    { body: '#E87A3E', spots: '#D66B31', glow: '#E87A3E' },
    { body: '#4ECDC4', spots: '#45B8B0', glow: '#4ECDC4' },
    { body: '#F5A742', spots: '#D99235', glow: '#F5A742' },
    { body: '#FFB89D', spots: '#E8A08A', glow: '#FFB89D' }
  ];

  // === GAME STATE ===
  let octopuses = [];
  let coralClusters = [];
  let bubbles = [];
  let inkClouds = [];
  let gameParticles = [];
  let gameTime = 0;
  let selectedOctopus = null;
  let answerLocked = false;
  let revealTimer = 0;
  let entranceProgress = 0;

  // === SOUND ENGINE (Web Audio API) ===
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
  }

  function playSound(type) {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);

      if (type === 'tap') {
        osc.frequency.setValueAtTime(520, ac.currentTime);
        osc.frequency.exponentialRampToValueAtTime(780, ac.currentTime + 0.08);
        gain.gain.setValueAtTime(0.12, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.15);
        osc.type = 'sine';
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.15);
      } else if (type === 'reveal') {
        osc.frequency.setValueAtTime(400, ac.currentTime);
        osc.frequency.exponentialRampToValueAtTime(900, ac.currentTime + 0.3);
        gain.gain.setValueAtTime(0.1, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.35);
        osc.type = 'triangle';
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.35);
      } else if (type === 'correct') {
        osc.frequency.setValueAtTime(523, ac.currentTime);
        osc.frequency.setValueAtTime(659, ac.currentTime + 0.12);
        osc.frequency.setValueAtTime(784, ac.currentTime + 0.24);
        gain.gain.setValueAtTime(0.15, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.5);
        osc.type = 'sine';
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.5);
      } else if (type === 'wrong') {
        osc.frequency.setValueAtTime(300, ac.currentTime);
        osc.frequency.exponentialRampToValueAtTime(150, ac.currentTime + 0.3);
        gain.gain.setValueAtTime(0.15, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
        osc.type = 'sawtooth';
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.4);
      } else if (type === 'ink') {
        // Noise-like burst for ink
        const bufferSize = ac.sampleRate * 0.2;
        const buffer = ac.createBuffer(1, bufferSize, ac.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = (Math.random() * 2 - 1) * 0.3;
        }
        const noise = ac.createBufferSource();
        noise.buffer = buffer;
        const noiseGain = ac.createGain();
        noise.connect(noiseGain);
        noiseGain.connect(ac.destination);
        noiseGain.gain.setValueAtTime(0.08, ac.currentTime);
        noiseGain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.25);
        noise.start(ac.currentTime);
        noise.stop(ac.currentTime + 0.25);
        // Also disconnect the unused oscillator
        osc.disconnect();
        return;
      }
    } catch (e) {
      // Audio not available, silently ignore
    }
  }

  // === CORAL CLUSTER GENERATION ===
  function createCoralClusters() {
    coralClusters = [];
    const clusterColors = [COLORS.coral1, COLORS.coral2, COLORS.coral3, COLORS.coral4, COLORS.cyanDark];
    // Background coral scattered around
    for (let i = 0; i < 12; i++) {
      coralClusters.push({
        x: Math.random() * W,
        y: 80 + Math.random() * (H - 120),
        size: 12 + Math.random() * 25,
        color: clusterColors[Math.floor(Math.random() * clusterColors.length)],
        type: Math.floor(Math.random() * 3), // branch, fan, round
        alpha: 0.15 + Math.random() * 0.2,
        sway: Math.random() * Math.PI * 2
      });
    }
  }

  // === BUBBLE GENERATION ===
  function createBubble() {
    return {
      x: Math.random() * W,
      y: H + 10,
      r: 1.5 + Math.random() * 3,
      speed: 20 + Math.random() * 40,
      wobble: Math.random() * Math.PI * 2,
      wobbleSpeed: 1 + Math.random() * 2,
      alpha: 0.2 + Math.random() * 0.3
    };
  }

  // === OCTOPUS CREATION ===
  function createOctopuses() {
    octopuses = [];
    const positions = [
      { x: 90, y: 120 },
      { x: 270, y: 120 },
      { x: 90, y: 400 },
      { x: 270, y: 400 }
    ];

    QUESTION.choices.forEach((choice, i) => {
      const pos = positions[i];
      const camo = OCTO_CAMO_COLORS[i];
      const reveal = OCTO_REVEAL_COLORS[i];
      octopuses.push({
        x: pos.x,
        y: pos.y,
        baseX: pos.x,
        baseY: pos.y,
        bodyRadius: 32,
        choice: choice,
        index: i,
        // State
        revealed: false,
        revealProgress: 0,
        selected: false,
        shakeOffset: 0,
        scaleAnim: 0,
        alpha: 0, // for entrance animation
        entranceDelay: i * 0.12,
        // Colors
        camoBody: camo.body,
        camoSpots: camo.spots,
        revealBody: reveal.body,
        revealSpots: reveal.spots,
        revealGlow: reveal.glow,
        // Animation
        breathPhase: Math.random() * Math.PI * 2,
        tentaclePhase: Math.random() * Math.PI * 2,
        pulsePhase: Math.random() * Math.PI * 2,
        // Text
        wrappedText: [choice.text],
        fontSize: 16,
        // Hit area (rectangular for easier tapping)
        hitBox: { x: pos.x - 70, y: pos.y - 50, w: 140, h: 170 }
      });
    });
  }

  // === INK CLOUD ===
  function spawnInkCloud(x, y) {
    playSound('ink');
    for (let i = 0; i < 20; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 30 + Math.random() * 80;
      inkClouds.push({
        x: x,
        y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 20,
        radius: 15 + Math.random() * 30,
        alpha: 0.7 + Math.random() * 0.3,
        life: 2.0 + Math.random() * 1.5,
        maxLife: 2.0 + Math.random() * 1.5
      });
    }
  }

  // === GAME PARTICLES ===
  function spawnRevealParticles(x, y, color) {
    for (let i = 0; i < 15; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 40 + Math.random() * 80;
      gameParticles.push({
        x: x,
        y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        radius: 2 + Math.random() * 4,
        color: color,
        alpha: 1,
        life: 0.5 + Math.random() * 0.5
      });
    }
  }

  function spawnCorrectConfetti(x, y) {
    const confettiColors = [COLORS.orange, COLORS.amber, COLORS.cyan, COLORS.success, COLORS.peach];
    for (let i = 0; i < 25; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 50 + Math.random() * 120;
      gameParticles.push({
        x: x,
        y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 60,
        radius: 3 + Math.random() * 5,
        color: confettiColors[Math.floor(Math.random() * confettiColors.length)],
        alpha: 1,
        life: 0.8 + Math.random() * 0.8,
        isConfetti: true,
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 10
      });
    }
  }

  // === TEXT SIZING ===
  function recalculateTextSizing() {
    if (!octopuses || octopuses.length === 0) return;

    // Try sizes from large to small, wrapping up to 5 lines per answer
    const texts = QUESTION.choices.map(c => c.text);
    const maxWidth = 130;
    const fontFamily = "'Nunito', sans-serif";
    let bestFontSize = 14;
    let bestWrapped = texts.map(t => [t]);

    for (let fs = 18; fs >= 14; fs -= 0.5) {
      const font = `${fs}px ${fontFamily}`;
      const wrapped = texts.map(t => wrapText(t, maxWidth, font, 5));
      const maxLines = Math.max(...wrapped.map(w => w.length));
      // Each text block has maxLines * (fs+3) height; must fit under octopus
      // Available vertical space below octopus to bottom of logical space
      if (maxLines <= 5) {
        bestFontSize = fs;
        bestWrapped = wrapped;
        break;
      }
    }

    octopuses.forEach((octo, i) => {
      octo.wrappedText = bestWrapped[i];
      octo.fontSize = bestFontSize;
    });
  }

  // === INIT ===
  function initGame() {
    gameTime = 0;
    selectedOctopus = null;
    answerLocked = false;
    revealTimer = 0;
    entranceProgress = 0;
    inkClouds = [];
    gameParticles = [];
    bubbles = [];

    // Create initial bubbles
    for (let i = 0; i < 8; i++) {
      const b = createBubble();
      b.y = Math.random() * H;
      bubbles.push(b);
    }

    createCoralClusters();
    createOctopuses();
    recalculateTextSizing();
  }

  // === UPDATE ===
  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;
    entranceProgress = Math.min(entranceProgress + dt * 1.5, 1);

    // Update octopus animations
    octopuses.forEach(octo => {
      // Entrance animation
      const entranceT = Math.max(0, Math.min(1, (entranceProgress - octo.entranceDelay) / 0.4));
      const spring = entranceT < 1 ? entranceT * (1 + Math.sin(entranceT * Math.PI * 2) * 0.15 * (1 - entranceT)) : 1;
      octo.alpha = spring;

      // Breathing animation
      octo.breathPhase += dt * 1.5;
      octo.tentaclePhase += dt * 2.0;
      octo.pulsePhase += dt * 3.0;

      // Gentle sway
      octo.x = octo.baseX + Math.sin(gameTime * 0.8 + octo.index * 1.3) * 3;
      octo.y = octo.baseY + Math.sin(gameTime * 0.6 + octo.index * 0.9) * 2;

      // Reveal animation progress
      if (octo.revealed && octo.revealProgress < 1) {
        octo.revealProgress = Math.min(1, octo.revealProgress + dt * 3);
      }

      // Scale animation (pop on tap)
      if (octo.scaleAnim > 0) {
        octo.scaleAnim = Math.max(0, octo.scaleAnim - dt * 4);
      }

      // Shake animation (wrong answer)
      if (octo.shakeOffset !== 0) {
        octo.shakeOffset *= 0.85;
        if (Math.abs(octo.shakeOffset) < 0.3) octo.shakeOffset = 0;
      }
    });

    // Update bubbles
    bubbles.forEach(b => {
      b.y -= b.speed * dt;
      b.x += Math.sin(b.wobble) * 0.3;
      b.wobble += b.wobbleSpeed * dt;
    });
    bubbles = bubbles.filter(b => b.y > -10);
    if (bubbles.length < 8 && Math.random() < dt * 2) {
      bubbles.push(createBubble());
    }

    // Update ink clouds
    inkClouds.forEach(cloud => {
      cloud.x += cloud.vx * dt;
      cloud.y += cloud.vy * dt;
      cloud.vx *= 0.97;
      cloud.vy *= 0.97;
      cloud.life -= dt;
      cloud.alpha = Math.max(0, (cloud.life / cloud.maxLife) * 0.8);
      cloud.radius += dt * 8;
    });
    inkClouds = inkClouds.filter(c => c.life > 0);

    // Update game particles
    gameParticles.forEach(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      if (p.isConfetti) {
        p.vy += 200 * dt; // gravity
        p.rotation += p.rotSpeed * dt;
      }
      p.life -= dt;
      p.alpha = Math.max(0, p.life / 0.8);
    });
    gameParticles = gameParticles.filter(p => p.life > 0);

    // Handle answer reveal timer
    if (answerLocked && revealTimer > 0) {
      revealTimer -= dt;
      if (revealTimer <= 0) {
        const octo = selectedOctopus;
        if (octo) {
          if (octo.choice.is_correct) {
            playSound('correct');
            spawnCorrectConfetti(octo.x, octo.y);
          } else {
            playSound('wrong');
            // Shake incorrect
            octo.shakeOffset = 15;
            spawnInkCloud(octo.x, octo.y);
          }
          // Delay engine.end slightly for visual feedback
          setTimeout(() => {
            engine.end(octo.choice.is_correct, octo.choice.explanation);
          }, octo.choice.is_correct ? 600 : 1200);
        }
      }
    }
  }

  // === DRAW ===
  function drawGame() {
    // Deep sea background gradient (simulated)
    ctx.fillStyle = COLORS.bgDeep;
    ctx.fillRect(0, 0, W, H);

    // Subtle gradient layers
    const grd = ctx.createLinearGradient(0, 0, 0, H);
    grd.addColorStop(0, 'rgba(13, 31, 60, 0.6)');
    grd.addColorStop(0.4, 'rgba(10, 22, 40, 0.3)');
    grd.addColorStop(1, 'rgba(5, 10, 20, 0.8)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);

    // Murky light rays from above
    ctx.save();
    ctx.globalAlpha = 0.04;
    for (let i = 0; i < 5; i++) {
      const rx = 40 + i * 75 + Math.sin(gameTime * 0.3 + i) * 15;
      const rayGrd = ctx.createLinearGradient(rx, 0, rx + 20, H * 0.7);
      rayGrd.addColorStop(0, '#4ECDC4');
      rayGrd.addColorStop(1, 'transparent');
      ctx.fillStyle = rayGrd;
      ctx.fillRect(rx - 8, 0, 16, H * 0.7);
    }
    ctx.restore();

    // Draw coral clusters (background)
    drawCoral();

    // Draw bubbles (behind octopuses)
    drawBubbles();

    // Draw octopuses
    octopuses.forEach(octo => drawOctopus(octo));

    // Draw game particles
    drawGameParticles();

    // Draw ink clouds (on top of everything)
    drawInkClouds();
  }

  function drawCoral() {
    coralClusters.forEach(c => {
      ctx.save();
      ctx.globalAlpha = c.alpha;
      const sway = Math.sin(gameTime * 0.5 + c.sway) * 3;

      if (c.type === 0) {
        // Branch coral
        ctx.strokeStyle = c.color;
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        for (let b = 0; b < 3; b++) {
          const angle = -Math.PI / 2 + (b - 1) * 0.5 + sway * 0.02;
          ctx.beginPath();
          ctx.moveTo(c.x, c.y);
          ctx.lineTo(c.x + Math.cos(angle) * c.size, c.y + Math.sin(angle) * c.size);
          ctx.stroke();
        }
      } else if (c.type === 1) {
        // Fan coral
        ctx.fillStyle = c.color;
        ctx.beginPath();
        ctx.ellipse(c.x + sway, c.y, c.size * 0.6, c.size * aspectRatio, 0, Math.PI, 0);
        ctx.fill();
      } else {
        // Round coral
        ctx.fillStyle = c.color;
        ctx.beginPath();
        ctx.ellipse(c.x + sway * 0.5, c.y, c.size * 0.5, c.size * 0.5 * aspectRatio, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    });
  }

  function drawBubbles() {
    bubbles.forEach(b => {
      ctx.save();
      ctx.globalAlpha = b.alpha;
      ctx.strokeStyle = 'rgba(120, 200, 220, 0.5)';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.ellipse(b.x, b.y, b.r, b.r * aspectRatio, 0, 0, Math.PI * 2);
      ctx.stroke();
      // Tiny highlight
      ctx.fillStyle = 'rgba(200, 240, 255, 0.3)';
      ctx.beginPath();
      ctx.ellipse(b.x - b.r * 0.3, b.y - b.r * 0.3 * aspectRatio, b.r * 0.25, b.r * 0.25 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
  }

  function drawOctopus(octo) {
    if (octo.alpha <= 0) return;

    ctx.save();
    ctx.globalAlpha = octo.alpha;

    const cx = octo.x + octo.shakeOffset;
    const cy = octo.y;
    const r = octo.bodyRadius;
    const breathScale = 1 + Math.sin(octo.breathPhase) * 0.03;
    const popScale = 1 + octo.scaleAnim * 0.15;
    const totalScale = breathScale * popScale;

    // Interpolate colors based on reveal progress
    const rp = octo.revealProgress;
    const bodyColor = lerpColor(octo.camoBody, octo.revealBody, rp);
    const spotColor = lerpColor(octo.camoSpots, octo.revealSpots, rp);

    // Glow effect when revealed
    if (rp > 0) {
      ctx.save();
      ctx.globalAlpha = rp * 0.25 * octo.alpha;
      ctx.fillStyle = octo.revealGlow;
      ctx.beginPath();
      ctx.ellipse(cx, cy, (r + 15) * totalScale, (r + 15) * totalScale * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // Draw tentacles
    ctx.save();
    ctx.strokeStyle = bodyColor;
    ctx.lineWidth = 4 * totalScale;
    ctx.lineCap = 'round';
    for (let t = 0; t < 6; t++) {
      const baseAngle = Math.PI * 0.3 + (t / 5) * Math.PI * 0.4 + Math.PI * 0.15;
      const tentLen = r * 1.3 * totalScale;
      const wave = Math.sin(octo.tentaclePhase + t * 0.8) * 8;

      ctx.beginPath();
      const sx = cx + Math.cos(baseAngle) * r * 0.6 * totalScale;
      const sy = cy + Math.sin(baseAngle) * r * 0.6 * totalScale * aspectRatio;
      ctx.moveTo(sx, sy);

      const mx = sx + Math.cos(baseAngle) * tentLen * 0.5 + wave;
      const my = sy + Math.sin(baseAngle) * tentLen * 0.5 * aspectRatio + wave * 0.3 * aspectRatio;
      const ex = sx + Math.cos(baseAngle) * tentLen - wave * 0.5;
      const ey = sy + Math.sin(baseAngle) * tentLen * aspectRatio;

      ctx.quadraticCurveTo(mx, my, ex, ey);
      ctx.stroke();
    }
    ctx.restore();

    // Draw body (mantle) - egg/oval shape
    ctx.save();
    ctx.fillStyle = bodyColor;
    ctx.beginPath();
    ctx.ellipse(cx, cy - r * 0.15 * totalScale, r * 0.85 * totalScale, r * totalScale * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Spots on body
    ctx.fillStyle = spotColor;
    for (let s = 0; s < 5; s++) {
      const sa = (s / 5) * Math.PI * 2 + octo.index;
      const sd = r * 0.4 * totalScale;
      const sx = cx + Math.cos(sa) * sd;
      const sy = cy - r * 0.15 * totalScale + Math.sin(sa) * sd * 0.6 * aspectRatio;
      ctx.beginPath();
      ctx.ellipse(sx, sy, 3 * totalScale, 3 * totalScale * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    // Eyes
    ctx.save();
    const eyeY = cy - r * 0.25 * totalScale;
    const eyeSpacing = r * 0.35 * totalScale;

    // Eye whites
    ctx.fillStyle = rp > 0.5 ? '#F5F5F0' : '#8899aa';
    ctx.beginPath();
    ctx.ellipse(cx - eyeSpacing, eyeY, 6 * totalScale, 7 * totalScale * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + eyeSpacing, eyeY, 6 * totalScale, 7 * totalScale * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Pupils
    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath();
    ctx.ellipse(cx - eyeSpacing + 1, eyeY + 1, 3 * totalScale, 4 * totalScale * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + eyeSpacing + 1, eyeY + 1, 3 * totalScale, 4 * totalScale * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Draw answer text below octopus when revealed
    if (octo.revealProgress > 0.3) {
      ctx.save();
      ctx.globalAlpha = Math.min(1, (octo.revealProgress - 0.3) / 0.5) * octo.alpha;
      const lines = octo.wrappedText || [octo.choice.text];
      const fSize = octo.fontSize || 16;
      const lineHeight = fSize + 3;
      const textStartY = cy + r * totalScale * aspectRatio + 18;

      // Text background
      const textBlockH = lines.length * lineHeight + 10;
      ctx.fillStyle = 'rgba(10, 22, 40, 0.85)';
      ctx.beginPath();
      ctx.roundRect(cx - 68, textStartY - 8, 136, textBlockH, 8);
      ctx.fill();

      // Border
      ctx.strokeStyle = bodyColor;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.roundRect(cx - 68, textStartY - 8, 136, textBlockH, 8);
      ctx.stroke();

      lines.forEach((line, li) => {
        drawText(line, cx, textStartY + li * lineHeight + 4, {
          font: `500 ${fSize}px 'Nunito', sans-serif`,
          color: COLORS.textPrimary,
          align: 'center',
          baseline: 'top'
        });
      });
      ctx.restore();
    }

    // Label letter (A, B, C, D) if not yet revealed
    if (octo.revealProgress < 0.3) {
      const label = String.fromCharCode(65 + octo.index);
      drawText(label, cx, cy + r * totalScale * aspectRatio + 14, {
        font: `700 16px 'Belanosima', sans-serif`,
        color: 'rgba(200, 210, 220, 0.5)',
        align: 'center',
        baseline: 'top'
      });
    }

    ctx.restore();
  }

  function drawGameParticles() {
    gameParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      if (p.isConfetti) {
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.radius, -p.radius * 0.4, p.radius * 2, p.radius * 0.8);
      } else {
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.ellipse(p.x, p.y, p.radius, p.radius * aspectRatio, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    });
  }

  function drawInkClouds() {
    inkClouds.forEach(cloud => {
      ctx.save();
      ctx.globalAlpha = cloud.alpha;
      ctx.fillStyle = '#0a0a12';
      ctx.beginPath();
      ctx.ellipse(cloud.x, cloud.y, cloud.radius, cloud.radius * 0.7 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
  }

  // === COLOR LERP UTILITY ===
  function lerpColor(c1, c2, t) {
    const r1 = parseInt(c1.slice(1, 3), 16);
    const g1 = parseInt(c1.slice(3, 5), 16);
    const b1 = parseInt(c1.slice(5, 7), 16);
    const r2 = parseInt(c2.slice(1, 3), 16);
    const g2 = parseInt(c2.slice(3, 5), 16);
    const b2 = parseInt(c2.slice(5, 7), 16);
    const r = Math.round(r1 + (r2 - r1) * t);
    const g = Math.round(g1 + (g2 - g1) * t);
    const b = Math.round(b1 + (b2 - b1) * t);
    return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
  }

  // === TOUCH HANDLER ===
  function handleTouch(e, type) {
    if (gameState !== 'playing') return;
    if (answerLocked) return;

    if (type === 'start') {
      const touch = e.touches ? e.touches[0] : e.changedTouches[0];
      if (!touch) return;
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      // Check which octopus was tapped
      for (let i = 0; i < octopuses.length; i++) {
        const octo = octopuses[i];
        if (octo.alpha < 0.5) continue; // Not yet visible

        if (pointInRect(x, y, octo.hitBox)) {
          playSound('tap');

          if (!octo.revealed) {
            // First tap: reveal the octopus
            octo.revealed = true;
            octo.scaleAnim = 1;
            playSound('reveal');
            spawnRevealParticles(octo.x, octo.y, octo.revealGlow);
          } else {
            // Second tap: select this answer
            octo.selected = true;
            octo.scaleAnim = 1;
            selectedOctopus = octo;
            answerLocked = true;
            revealTimer = 0.4; // Brief delay for visual feedback
          }
          break;
        }
      }
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
