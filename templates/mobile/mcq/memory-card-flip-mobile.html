<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Memory Card Flip</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #FAFAF7;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #FAFAF7;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  const W = 360, H = 640;

  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;

  let gameState = 'playing';
  let gameResult = null;
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = "bold 18px 'Nunito Sans', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;
    aspectRatio = scaleX / scaleY;
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  function drawText(text, x, y, options = {}) {
    const { font = "500 16px 'Nunito Sans', sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#E87A3E', '#F5A742', '#4ECDC4', '#6BBF59', '#FFB89D'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  function drawEndScreen(dt) {
    endScreenTime += dt;

    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = "bold 32px 'Nunito Sans', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    if (gameResult) {
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // Colors from styleguide
  const COLORS = {
    bgPrimary: '#FAFAF7',
    surface: '#FFFFFF',
    orange: '#E87A3E',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC',
    cardBack: '#4ECDC4',
    cardBackPattern: '#45B8B0'
  };

  // Game state
  let cards = [];
  let flippedCards = [];
  let selectedAnswer = null;
  let animationTime = 0;
  let entranceProgress = 0;
  let flipAnimations = {};
  let shakeAnimation = { active: false, x: 0, time: 0 };
  let gameParticles = [];

  // Audio context for sounds
  let audioCtx = null;

  function playSound(type) {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'flip') {
      osc.frequency.setValueAtTime(600, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'correct') {
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'wrong') {
      osc.frequency.setValueAtTime(300, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.2);
    } else if (type === 'select') {
      osc.frequency.setValueAtTime(440, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.08);
    }
  }

  function shuffleArray(array) {
    const arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function initGame() {
    cards = [];
    flippedCards = [];
    selectedAnswer = null;
    animationTime = 0;
    entranceProgress = 0;
    flipAnimations = {};
    shakeAnimation = { active: false, x: 0, time: 0 };
    gameParticles = [];

    // Card layout: 2 columns x 4 rows
    const cardW = 140;
    const cardH = 100;
    const gapX = 20;
    const gapY = 16;
    const startX = (W - cardW * 2 - gapX) / 2;
    const startY = 80;

    // Create 8 card slots: 4 with answers, 4 decoys (empty backs)
    const cardData = [];

    // Add 4 answer cards
    QUESTION.choices.forEach((choice, i) => {
      cardData.push({
        type: 'answer',
        choice: choice,
        choiceIndex: i
      });
    });

    // Add 4 decoy cards (no answer)
    for (let i = 0; i < 4; i++) {
      cardData.push({
        type: 'decoy',
        choice: null,
        choiceIndex: -1
      });
    }

    // Shuffle cards
    const shuffled = shuffleArray(cardData);

    // Create card objects in grid positions
    for (let row = 0; row < 4; row++) {
      for (let col = 0; col < 2; col++) {
        const index = row * 2 + col;
        const data = shuffled[index];
        cards.push({
          x: startX + col * (cardW + gapX),
          y: startY + row * (cardH + gapY),
          w: cardW,
          h: cardH,
          flipped: false,
          type: data.type,
          choice: data.choice,
          choiceIndex: data.choiceIndex,
          entranceDelay: index * 0.06,
          scale: 0,
          alpha: 0
        });
      }
    }

    recalculateTextSizing();
  }

  function recalculateTextSizing() {
    if (!cards || cards.length === 0) return;

    // Calculate text for answer cards
    const answerCards = cards.filter(c => c.type === 'answer');
    if (answerCards.length === 0) return;

    const texts = answerCards.map(c => c.choice.text);
    const { fontSize, wrappedTexts } = findOptimalFontSize({
      texts: texts,
      maxWidth: 120,  // Card width minus padding
      availableHeight: 70,  // Card height minus padding
      minFont: 12,
      maxFont: 16,
      itemPadding: 2,
      fontFamily: "'Nunito', sans-serif"
    });

    answerCards.forEach((card, i) => {
      card.wrappedText = wrappedTexts[i];
      card.fontSize = fontSize;
    });
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    animationTime += dt;

    // Entrance animation
    if (entranceProgress < 1) {
      entranceProgress = Math.min(1, entranceProgress + dt * 2);
      cards.forEach(card => {
        const t = Math.max(0, Math.min(1, (entranceProgress - card.entranceDelay) / 0.3));
        const spring = 1 + Math.sin(t * Math.PI * 2) * 0.15 * (1 - t);
        card.scale = t * spring;
        card.alpha = t;
      });
    }

    // Update flip animations
    for (const cardIndex in flipAnimations) {
      flipAnimations[cardIndex].progress += dt * 4;
      if (flipAnimations[cardIndex].progress >= 1) {
        delete flipAnimations[cardIndex];
      }
    }

    // Shake animation
    if (shakeAnimation.active) {
      shakeAnimation.time += dt;
      const decay = 1 - Math.min(1, shakeAnimation.time / 0.4);
      shakeAnimation.x = Math.sin(shakeAnimation.time * Math.PI * 15) * 8 * decay;
      if (shakeAnimation.time >= 0.4) {
        shakeAnimation.active = false;
        shakeAnimation.x = 0;
      }
    }

    // Update particles
    gameParticles = gameParticles.filter(p => {
      p.vy += 400 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.life -= dt;
      return p.life > 0;
    });
  }

  function drawCard(card, index) {
    const flipAnim = flipAnimations[index];
    let flipProgress = 0;
    if (flipAnim) {
      flipProgress = flipAnim.progress;
    }

    // Calculate flip scale (0 to 1 to 0 for X scale during flip)
    let scaleXVal = card.scale;
    if (flipProgress > 0) {
      if (flipProgress < 0.5) {
        scaleXVal *= 1 - flipProgress * 2;
      } else {
        scaleXVal *= (flipProgress - 0.5) * 2;
      }
    }

    const cx = card.x + card.w / 2 + shakeAnimation.x;
    const cy = card.y + card.h / 2;

    ctx.save();
    ctx.globalAlpha = card.alpha;
    ctx.translate(cx, cy);
    ctx.scale(scaleXVal, card.scale * aspectRatio);

    // Determine if showing front (flipped) or back
    const showFront = card.flipped && flipProgress >= 0.5 || card.flipped && flipProgress === 0;

    if (showFront) {
      // Card front (content visible)
      if (card.type === 'answer') {
        // Answer card - show choice text
        ctx.fillStyle = COLORS.surface;
        ctx.beginPath();
        ctx.roundRect(-card.w / 2, -card.h / 2 / aspectRatio, card.w, card.h / aspectRatio, 12);
        ctx.fill();

        // Border
        ctx.strokeStyle = COLORS.borderStrong;
        ctx.lineWidth = 2;
        ctx.stroke();

        // Choice letter badge
        const letters = ['A', 'B', 'C', 'D'];
        ctx.fillStyle = COLORS.orange;
        ctx.beginPath();
        ctx.arc(-card.w / 2 + 18, -card.h / 2 / aspectRatio + 18, 12, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
        ctx.save();
        ctx.globalAlpha = card.alpha;

        // Draw letter
        drawText(letters[card.choiceIndex], cx - card.w / 2 + 18, cy - card.h / 2 + 18, {
          font: "700 14px 'Nunito Sans', sans-serif",
          color: '#FFFFFF'
        });

        // Draw answer text
        const lines = card.wrappedText || [card.choice.text];
        const fontSize = card.fontSize || 14;
        const lineHeight = fontSize + 3;
        const totalTextHeight = lines.length * lineHeight;
        const textStartY = cy - totalTextHeight / 2 + lineHeight / 2 + 5;

        lines.forEach((line, i) => {
          drawText(line, cx, textStartY + i * lineHeight, {
            font: `500 ${fontSize}px 'Nunito', sans-serif`,
            color: COLORS.textPrimary
          });
        });

      } else {
        // Decoy card - show empty/crossed pattern
        ctx.fillStyle = '#F5F5F0';
        ctx.beginPath();
        ctx.roundRect(-card.w / 2, -card.h / 2 / aspectRatio, card.w, card.h / aspectRatio, 12);
        ctx.fill();

        ctx.strokeStyle = COLORS.borderSubtle;
        ctx.lineWidth = 2;
        ctx.stroke();

        // Draw X pattern
        ctx.strokeStyle = COLORS.borderStrong;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(-20, -20 / aspectRatio);
        ctx.lineTo(20, 20 / aspectRatio);
        ctx.moveTo(20, -20 / aspectRatio);
        ctx.lineTo(-20, 20 / aspectRatio);
        ctx.stroke();

        ctx.restore();
        ctx.save();
        ctx.globalAlpha = card.alpha;

        drawText('Empty', cx, cy + 25, {
          font: "500 14px 'Nunito Sans', sans-serif",
          color: COLORS.textSecondary
        });
      }
    } else {
      // Card back (face down)
      ctx.fillStyle = COLORS.cardBack;
      ctx.beginPath();
      ctx.roundRect(-card.w / 2, -card.h / 2 / aspectRatio, card.w, card.h / aspectRatio, 12);
      ctx.fill();

      // Pattern on back
      ctx.strokeStyle = COLORS.cardBackPattern;
      ctx.lineWidth = 2;

      // Diamond pattern
      ctx.beginPath();
      ctx.moveTo(0, -25 / aspectRatio);
      ctx.lineTo(25, 0);
      ctx.lineTo(0, 25 / aspectRatio);
      ctx.lineTo(-25, 0);
      ctx.closePath();
      ctx.stroke();

      // Inner diamond
      ctx.beginPath();
      ctx.moveTo(0, -12 / aspectRatio);
      ctx.lineTo(12, 0);
      ctx.lineTo(0, 12 / aspectRatio);
      ctx.lineTo(-12, 0);
      ctx.closePath();
      ctx.stroke();

      // Question mark
      ctx.restore();
      ctx.save();
      ctx.globalAlpha = card.alpha;

      const qmX = cx;
      const qmY = cy;
      drawText('?', qmX, qmY, {
        font: "700 28px 'Belanosima', sans-serif",
        color: '#FFFFFF'
      });
    }

    ctx.restore();
  }

  function drawGame() {
    // Clear canvas
    ctx.fillStyle = COLORS.bgPrimary;
    ctx.fillRect(0, 0, W, H);

    // Draw particles
    gameParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Draw title
    drawText('Find the correct answer!', W / 2, 40, {
      font: "600 20px 'Nunito Sans', sans-serif",
      color: COLORS.textPrimary
    });

    // Draw hint
    drawText('Tap cards to flip them', W / 2, 60, {
      font: "400 14px 'Nunito', sans-serif",
      color: COLORS.textSecondary
    });

    // Draw cards
    cards.forEach((card, index) => {
      drawCard(card, index);
    });

    // Draw instruction at bottom
    const flippedAnswerCards = cards.filter(c => c.flipped && c.type === 'answer');
    if (flippedAnswerCards.length > 0) {
      drawText('Tap an answer card to select it', W / 2, H - 40, {
        font: "500 16px 'Nunito Sans', sans-serif",
        color: COLORS.orange
      });
    }
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;
    if (entranceProgress < 0.8) return; // Wait for entrance

    if (type === 'start') {
      const touch = e.touches[0] || e.changedTouches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      // Check which card was tapped
      for (let i = 0; i < cards.length; i++) {
        const card = cards[i];
        if (pointInRect(x, y, card)) {
          if (!card.flipped) {
            // Flip the card
            card.flipped = true;
            flipAnimations[i] = { progress: 0 };
            playSound('flip');
          } else if (card.type === 'answer') {
            // Card is already flipped and is an answer - select it
            playSound('select');
            selectedAnswer = card;

            if (card.choice.is_correct) {
              // Spawn celebration particles
              for (let j = 0; j < 20; j++) {
                gameParticles.push({
                  x: card.x + card.w / 2,
                  y: card.y + card.h / 2,
                  vx: (Math.random() - 0.5) * 200,
                  vy: -Math.random() * 150 - 50,
                  size: 4 + Math.random() * 4,
                  color: [COLORS.orange, COLORS.amber, COLORS.cyan, COLORS.success][Math.floor(Math.random() * 4)],
                  rotation: Math.random() * Math.PI * 2,
                  rotationSpeed: (Math.random() - 0.5) * 8,
                  life: 1
                });
              }
              playSound('correct');
              setTimeout(() => {
                engine.end(true, card.choice.explanation);
              }, 300);
            } else {
              // Wrong answer - shake and end
              shakeAnimation = { active: true, x: 0, time: 0 };
              playSound('wrong');
              setTimeout(() => {
                engine.end(false, card.choice.explanation);
              }, 400);
            }
          }
          break;
        }
      }
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;

    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame();
      drawEndScreen(dt);
    }

    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100);
  });

  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
