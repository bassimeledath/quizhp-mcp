<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Molten Glass Drip Form</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE - MOBILE                                              ║
  ║  Fills 100% of container, non-uniform scaling, touch input.                  ║
  ║  Logical dimensions: 360×640 (use aspectRatio for proportional shapes)       ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none; /* Prevent default touch behaviors */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      /* Canvas fills viewport via JS, these are fallbacks */
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill viewport
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  Molten Glass Drip Form - Tap a glass form to solidify it                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgDark: '#1C1C1A',
    bgWarm: '#2A2A27',
    surface: '#363633',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    textPrimary: '#F5F5F0',
    textSecondary: '#C2C2B8',
    textTertiary: '#8C8C84',
    borderSubtle: '#424240',
    peach: '#FFB89D'
  };

  // Glass shape types for variety
  const GLASS_SHAPES = ['vase', 'bottle', 'goblet', 'bowl'];

  // Glass colors (molten → cooled)
  const GLASS_MOLTEN_COLORS = [
    { hot: '#FF6B35', warm: '#E87A3E', cool: '#B8D4E3' },  // Orange → Blue glass
    { hot: '#FF4500', warm: '#F5A742', cool: '#98E8C1' },   // Red → Green glass
    { hot: '#FF8C00', warm: '#FFB89D', cool: '#D4B8E8' },   // Gold → Purple glass
    { hot: '#FF3333', warm: '#E85D4A', cool: '#E8D4B8' }    // Crimson → Amber glass
  ];

  // Audio context for sound effects
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playDripSound() {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.frequency.setValueAtTime(800, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(200, ac.currentTime + 0.3);
      gain.gain.setValueAtTime(0.15, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.3);
      osc.type = 'sine';
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.3);
    } catch(e) {}
  }

  function playSolidifySound() {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.frequency.setValueAtTime(1200, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(2400, ac.currentTime + 0.2);
      gain.gain.setValueAtTime(0.12, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
      osc.type = 'triangle';
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.4);
    } catch(e) {}
  }

  function playCorrectSound() {
    try {
      const ac = getAudioCtx();
      [523, 659, 784].forEach((freq, i) => {
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.1, ac.currentTime + i * 0.1);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + i * 0.1 + 0.3);
        osc.type = 'sine';
        osc.start(ac.currentTime + i * 0.1);
        osc.stop(ac.currentTime + i * 0.1 + 0.3);
      });
    } catch(e) {}
  }

  function playWrongSound() {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.frequency.setValueAtTime(300, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(150, ac.currentTime + 0.4);
      gain.gain.setValueAtTime(0.12, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
      osc.type = 'sawtooth';
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.4);
    } catch(e) {}
  }

  // === GAME STATE ===
  let glassForms = [];
  let furnaceGlow = 0;
  let furnaceGlowDir = 1;
  let drips = [];
  let sparkles = [];
  let gameTime = 0;
  let selectedIndex = -1;
  let solidifyAnim = 0;
  let shakeOffset = 0;
  let shakeDecay = 0;

  // Entrance animation
  let entranceProgress = [];

  function initGame() {
    gameTime = 0;
    selectedIndex = -1;
    solidifyAnim = 0;
    shakeOffset = 0;
    shakeDecay = 0;
    furnaceGlow = 0;
    furnaceGlowDir = 1;
    drips = [];
    sparkles = [];
    entranceProgress = [];

    // Layout: vertical stack of glass form cards
    const cardW = 320;
    const cardH = 80;
    const gap = 10;
    const totalH = cardH * 4 + gap * 3;
    const startX = (W - cardW) / 2;
    const startY = 200;

    glassForms = QUESTION.choices.map((choice, i) => {
      return {
        x: startX,
        y: startY + i * (cardH + gap),
        w: cardW,
        h: cardH,
        choice: choice,
        shape: GLASS_SHAPES[i],
        colors: GLASS_MOLTEN_COLORS[i],
        cooling: 0,       // 0 = molten, 1 = fully cooled
        solidified: false,
        scale: 0,          // entrance animation
        alpha: 0,          // entrance animation
        pulsePhase: Math.random() * Math.PI * 2,
        wrappedText: null,
        fontSize: 16
      };
    });

    // Stagger entrance
    glassForms.forEach((gf, i) => {
      entranceProgress.push({ delay: i * 0.12, elapsed: 0, done: false });
    });

    recalculateTextSizing();
  }

  function recalculateTextSizing() {
    if (!glassForms || glassForms.length === 0) return;

    // Glass shape takes ~60px on left, text gets remaining width
    const maxTextWidth = 240;
    const availableHeight = 320; // 4 cards at 80px

    const { fontSize, wrappedTexts } = findOptimalFontSize({
      texts: QUESTION.choices.map(c => c.text),
      maxWidth: maxTextWidth,
      availableHeight: availableHeight,
      minFont: 14,
      maxFont: 18,
      itemPadding: 8,
      fontFamily: "'Nunito', sans-serif"
    });

    glassForms.forEach((gf, i) => {
      gf.wrappedText = wrappedTexts[i];
      gf.fontSize = fontSize;
    });
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Furnace glow pulse
    furnaceGlow += furnaceGlowDir * dt * 2;
    if (furnaceGlow > 1) { furnaceGlow = 1; furnaceGlowDir = -1; }
    if (furnaceGlow < 0) { furnaceGlow = 0; furnaceGlowDir = 1; }

    // Entrance animations
    entranceProgress.forEach((ep, i) => {
      if (ep.done) return;
      ep.elapsed += dt;
      if (ep.elapsed < ep.delay) return;
      const t = Math.min((ep.elapsed - ep.delay) / 0.35, 1);
      const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
      glassForms[i].scale = t * spring;
      glassForms[i].alpha = t;
      if (t >= 1) {
        glassForms[i].scale = 1;
        glassForms[i].alpha = 1;
        ep.done = true;
      }
    });

    // Cooling animation (all forms gradually cool visually)
    glassForms.forEach(gf => {
      if (!gf.solidified && gf.cooling < 0.6) {
        gf.cooling += dt * 0.08;
      }
    });

    // Solidify animation
    if (selectedIndex >= 0) {
      solidifyAnim += dt;
      const sel = glassForms[selectedIndex];
      if (!sel.solidified) {
        sel.cooling = Math.min(sel.cooling + dt * 3, 1);
        if (sel.cooling >= 1) {
          sel.solidified = true;
          // Spawn sparkles
          for (let i = 0; i < 15; i++) {
            sparkles.push({
              x: sel.x + sel.w / 2 + (Math.random() - 0.5) * sel.w,
              y: sel.y + sel.h / 2 + (Math.random() - 0.5) * sel.h,
              vx: (Math.random() - 0.5) * 60,
              vy: (Math.random() - 0.5) * 60,
              life: 1,
              size: 2 + Math.random() * 3
            });
          }

          // End game after brief sparkle display
          const choice = sel.choice;
          if (choice.is_correct) {
            playCorrectSound();
          } else {
            playWrongSound();
          }
          setTimeout(() => {
            engine.end(choice.is_correct, choice.explanation);
          }, 500);
        }
      }
    }

    // Shake decay
    if (shakeDecay > 0) {
      shakeDecay -= dt * 5;
      shakeOffset = Math.sin(gameTime * 50) * 3 * Math.max(0, shakeDecay);
    }

    // Ambient drips from furnace
    if (Math.random() < dt * 2 && drips.length < 8) {
      drips.push({
        x: 120 + Math.random() * 120,
        y: 108,
        vy: 50 + Math.random() * 80,
        size: 2 + Math.random() * 3,
        alpha: 0.8
      });
    }

    // Update drips
    drips.forEach(d => {
      d.y += d.vy * dt;
      d.alpha -= dt * 0.5;
    });
    drips = drips.filter(d => d.alpha > 0 && d.y < H);

    // Update sparkles
    sparkles.forEach(s => {
      s.x += s.vx * dt;
      s.y += s.vy * dt;
      s.life -= dt * 1.5;
    });
    sparkles = sparkles.filter(s => s.life > 0);
  }

  function drawGame() {
    // Background - dark workshop
    const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
    bgGrad.addColorStop(0, '#1C1410');
    bgGrad.addColorStop(0.3, '#1C1C1A');
    bgGrad.addColorStop(1, '#141210');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    // Furnace at top
    drawFurnace();

    // Drips
    drips.forEach(d => {
      ctx.globalAlpha = d.alpha;
      const dripGrad = ctx.createRadialGradient(d.x, d.y, 0, d.x, d.y, d.size * 2);
      dripGrad.addColorStop(0, '#FF8C00');
      dripGrad.addColorStop(1, 'rgba(255, 100, 0, 0)');
      ctx.fillStyle = dripGrad;
      ctx.beginPath();
      ctx.ellipse(d.x, d.y, d.size, d.size * aspectRatio * 1.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    });

    // Draw glass forms
    glassForms.forEach((gf, i) => {
      if (gf.alpha <= 0) return;
      ctx.save();

      // Apply entrance scale
      const cx = gf.x + gf.w / 2;
      const cy = gf.y + gf.h / 2;
      ctx.translate(cx, cy);
      ctx.scale(gf.scale, gf.scale);
      ctx.translate(-cx, -cy);
      ctx.globalAlpha = gf.alpha;

      // Apply shake on wrong selection
      if (selectedIndex === i && !glassForms[i].choice.is_correct && solidifyAnim > 0) {
        ctx.translate(shakeOffset, 0);
      }

      drawGlassForm(gf, i);
      ctx.globalAlpha = 1;
      ctx.restore();
    });

    // Sparkles
    sparkles.forEach(s => {
      ctx.globalAlpha = s.life;
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      // 4-pointed star
      const sx = s.x, sy = s.y, sz = s.size;
      ctx.moveTo(sx, sy - sz);
      ctx.lineTo(sx + sz * 0.3, sy - sz * 0.3);
      ctx.lineTo(sx + sz, sy);
      ctx.lineTo(sx + sz * 0.3, sy + sz * 0.3);
      ctx.lineTo(sx, sy + sz);
      ctx.lineTo(sx - sz * 0.3, sy + sz * 0.3);
      ctx.lineTo(sx - sz, sy);
      ctx.lineTo(sx - sz * 0.3, sy - sz * 0.3);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;
    });
  }

  function drawFurnace() {
    // Furnace body
    const furnaceY = 15;
    const furnaceH = 70;
    ctx.fillStyle = '#3A3028';
    ctx.beginPath();
    ctx.roundRect(50, furnaceY, W - 100, furnaceH, 12);
    ctx.fill();

    // Furnace opening (glowing)
    const glowIntensity = 0.5 + furnaceGlow * 0.5;
    const openGrad = ctx.createRadialGradient(W / 2, furnaceY + furnaceH * 0.55, 8, W / 2, furnaceY + furnaceH * 0.55, 80);
    openGrad.addColorStop(0, `rgba(255, 140, 0, ${glowIntensity})`);
    openGrad.addColorStop(0.5, `rgba(255, 80, 0, ${glowIntensity * 0.5})`);
    openGrad.addColorStop(1, 'rgba(255, 60, 0, 0)');
    ctx.fillStyle = openGrad;
    ctx.beginPath();
    ctx.ellipse(W / 2, furnaceY + furnaceH * 0.55, 70, 20 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Inner glow
    ctx.fillStyle = `rgba(255, 200, 50, ${glowIntensity * 0.8})`;
    ctx.beginPath();
    ctx.ellipse(W / 2, furnaceY + furnaceH * 0.55, 35, 10 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Furnace rim highlight
    ctx.strokeStyle = '#5A4A3A';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(50, furnaceY, W - 100, furnaceH, 12);
    ctx.stroke();

    // Pipe drip points
    for (let i = 0; i < 3; i++) {
      const px = 120 + i * 60;
      ctx.fillStyle = '#4A3A2A';
      ctx.fillRect(px - 3, furnaceY + furnaceH - 2, 6, 25);
      // Molten glow at tip
      const tipGlow = ctx.createRadialGradient(px, furnaceY + furnaceH + 23, 0, px, furnaceY + furnaceH + 23, 7);
      tipGlow.addColorStop(0, `rgba(255, 120, 0, ${0.4 + furnaceGlow * 0.3})`);
      tipGlow.addColorStop(1, 'rgba(255, 120, 0, 0)');
      ctx.fillStyle = tipGlow;
      ctx.beginPath();
      ctx.ellipse(px, furnaceY + furnaceH + 23, 7, 7 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Subtitle
    drawText('Tap a glass form to solidify', W / 2, furnaceY + furnaceH + 48, {
      font: "600 14px 'Nunito Sans', sans-serif",
      color: COLORS.textTertiary
    });
  }

  function drawGlassForm(gf, index) {
    const cx = gf.x + gf.w / 2;
    const cy = gf.y + gf.h / 2;

    // Color interpolation based on cooling
    const t = gf.cooling;
    const r1 = parseInt(gf.colors.hot.slice(1, 3), 16);
    const g1 = parseInt(gf.colors.hot.slice(3, 5), 16);
    const b1 = parseInt(gf.colors.hot.slice(5, 7), 16);
    const r2 = parseInt(gf.colors.cool.slice(1, 3), 16);
    const g2 = parseInt(gf.colors.cool.slice(3, 5), 16);
    const b2 = parseInt(gf.colors.cool.slice(5, 7), 16);
    const r = Math.round(r1 + (r2 - r1) * t);
    const g = Math.round(g1 + (g2 - g1) * t);
    const b = Math.round(b1 + (b2 - b1) * t);
    const glassColor = `rgb(${r}, ${g}, ${b})`;
    const glassColorLight = `rgba(${Math.min(255, r + 60)}, ${Math.min(255, g + 60)}, ${Math.min(255, b + 60)}, 0.7)`;

    // Pulse when still molten
    const pulse = gf.solidified ? 0 : Math.sin(gameTime * 3 + gf.pulsePhase) * 0.02;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(1 + pulse, 1 + pulse);
    ctx.translate(-cx, -cy);

    // Container card background
    ctx.fillStyle = 'rgba(40, 36, 32, 0.9)';
    ctx.beginPath();
    ctx.roundRect(gf.x, gf.y, gf.w, gf.h, 12);
    ctx.fill();

    // Border
    const borderColor = gf.solidified
      ? (gf.choice.is_correct ? COLORS.success : COLORS.error)
      : `rgba(${r}, ${g}, ${b}, 0.5)`;
    ctx.strokeStyle = borderColor;
    ctx.lineWidth = gf.solidified ? 2.5 : 1.5;
    ctx.beginPath();
    ctx.roundRect(gf.x, gf.y, gf.w, gf.h, 12);
    ctx.stroke();

    // Glass shape on the left side of the card
    const shapeCx = gf.x + 40;
    const shapeCy = cy;
    drawGlassShape(gf, glassColor, glassColorLight, shapeCx, shapeCy);

    // Solidified sparkle overlay on glass shape
    if (gf.solidified) {
      const sparkleAlpha = 0.3 + Math.sin(gameTime * 5) * 0.2;
      ctx.globalAlpha = sparkleAlpha;
      ctx.fillStyle = '#FFFFFF';
      for (let s = 0; s < 2; s++) {
        const sx = shapeCx - 10 + s * 20 + Math.sin(gameTime * 3 + s) * 3;
        const sy = shapeCy - 10 + Math.cos(gameTime * 2 + s * 2) * 3;
        drawStar4(sx, sy, 3);
      }
      ctx.globalAlpha = 1;
    }

    // Molten glow effect around glass shape
    if (!gf.solidified && t < 0.8) {
      const glowAlpha = (1 - t) * 0.15;
      const glowGrad = ctx.createRadialGradient(shapeCx, shapeCy, 3, shapeCx, shapeCy, 30);
      glowGrad.addColorStop(0, `rgba(255, 140, 0, ${glowAlpha})`);
      glowGrad.addColorStop(1, 'rgba(255, 140, 0, 0)');
      ctx.fillStyle = glowGrad;
      ctx.beginPath();
      ctx.ellipse(shapeCx, shapeCy, 30, 25 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();

    // Answer text to the right of the glass shape
    const textX = gf.x + 75;
    const lines = gf.wrappedText || [gf.choice.text];
    const fontSize = gf.fontSize || 16;
    const lineHeight = fontSize + 3;
    const totalTextH = lines.length * lineHeight;
    const textStartY = cy - totalTextH / 2 + lineHeight / 2;

    lines.forEach((line, li) => {
      drawText(line, textX, textStartY + li * lineHeight, {
        font: `500 ${fontSize}px 'Nunito', sans-serif`,
        color: gf.solidified
          ? (gf.choice.is_correct ? COLORS.success : '#F87171')
          : COLORS.textPrimary,
        align: 'left'
      });
    });
  }

  function drawGlassShape(gf, color, lightColor, cx, cy) {
    const s = 0.85; // scale factor for inline shapes
    ctx.save();
    switch (gf.shape) {
      case 'vase':
        ctx.beginPath();
        ctx.moveTo(cx - 12*s, cy + 16*s);
        ctx.bezierCurveTo(cx - 20*s, cy + 4*s, cx - 16*s, cy - 12*s, cx - 6*s, cy - 20*s);
        ctx.bezierCurveTo(cx - 3*s, cy - 23*s, cx + 3*s, cy - 23*s, cx + 6*s, cy - 20*s);
        ctx.bezierCurveTo(cx + 16*s, cy - 12*s, cx + 20*s, cy + 4*s, cx + 12*s, cy + 16*s);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(cx - 4*s, cy - 16*s);
        ctx.bezierCurveTo(cx - 8*s, cy - 8*s, cx - 10*s, cy, cx - 6*s, cy + 8*s);
        ctx.strokeStyle = lightColor;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        break;

      case 'bottle':
        ctx.beginPath();
        ctx.moveTo(cx - 2*s, cy - 22*s);
        ctx.lineTo(cx - 2*s, cy - 14*s);
        ctx.bezierCurveTo(cx - 14*s, cy - 10*s, cx - 14*s, cy + 12*s, cx - 10*s, cy + 18*s);
        ctx.lineTo(cx + 10*s, cy + 18*s);
        ctx.bezierCurveTo(cx + 14*s, cy + 12*s, cx + 14*s, cy - 10*s, cx + 2*s, cy - 14*s);
        ctx.lineTo(cx + 2*s, cy - 22*s);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(cx - 6*s, cy - 8*s);
        ctx.lineTo(cx - 8*s, cy + 10*s);
        ctx.strokeStyle = lightColor;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        break;

      case 'goblet':
        ctx.beginPath();
        ctx.moveTo(cx - 14*s, cy - 16*s);
        ctx.bezierCurveTo(cx - 18*s, cy - 4*s, cx - 12*s, cy + 4*s, cx - 2*s, cy + 6*s);
        ctx.lineTo(cx - 2*s, cy + 14*s);
        ctx.lineTo(cx - 11*s, cy + 18*s);
        ctx.lineTo(cx + 11*s, cy + 18*s);
        ctx.lineTo(cx + 2*s, cy + 14*s);
        ctx.lineTo(cx + 2*s, cy + 6*s);
        ctx.bezierCurveTo(cx + 12*s, cy + 4*s, cx + 18*s, cy - 4*s, cx + 14*s, cy - 16*s);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(cx - 5*s, cy - 8*s, 2.5*s, 6*s * aspectRatio, 0, 0, Math.PI * 2);
        ctx.fillStyle = lightColor;
        ctx.fill();
        break;

      case 'bowl':
        ctx.beginPath();
        ctx.moveTo(cx - 20*s, cy - 6*s);
        ctx.bezierCurveTo(cx - 22*s, cy + 4*s, cx - 16*s, cy + 14*s, cx - 6*s, cy + 18*s);
        ctx.lineTo(cx + 6*s, cy + 18*s);
        ctx.bezierCurveTo(cx + 16*s, cy + 14*s, cx + 22*s, cy + 4*s, cx + 20*s, cy - 6*s);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(cx - 8*s, cy, 3*s, 8*s * aspectRatio, -0.3, 0, Math.PI * 2);
        ctx.fillStyle = lightColor;
        ctx.fill();
        break;
    }
    ctx.restore();
  }

  function drawStar4(x, y, size) {
    ctx.beginPath();
    ctx.moveTo(x, y - size);
    ctx.lineTo(x + size * 0.3, y - size * 0.3);
    ctx.lineTo(x + size, y);
    ctx.lineTo(x + size * 0.3, y + size * 0.3);
    ctx.lineTo(x, y + size);
    ctx.lineTo(x - size * 0.3, y + size * 0.3);
    ctx.lineTo(x - size, y);
    ctx.lineTo(x - size * 0.3, y - size * 0.3);
    ctx.closePath();
    ctx.fill();
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;
    if (type !== 'start') return;
    if (selectedIndex >= 0) return; // Already selected

    const touch = e.touches[0] || e.changedTouches[0];
    const { x, y } = screenToLogical(touch.clientX, touch.clientY);

    glassForms.forEach((gf, i) => {
      if (pointInRect(x, y, gf)) {
        selectedIndex = i;
        solidifyAnim = 0;
        playSolidifySound();

        // Start shake for wrong answers
        if (!gf.choice.is_correct) {
          shakeDecay = 1;
        }
      }
    });
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
