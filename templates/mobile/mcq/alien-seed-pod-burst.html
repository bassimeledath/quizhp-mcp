<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Alien Seed Pod Burst</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE - MOBILE                                              ║
  ║  Fills 100% of container, non-uniform scaling, touch input.                  ║
  ║  Logical dimensions: 360×640 (use aspectRatio for proportional shapes)       ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none; /* Prevent default touch behaviors */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      /* Canvas fills viewport via JS, these are fallbacks */
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill viewport
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgDeep: '#0A0E1A',
    bgMid: '#111830',
    vineGlow: '#4ECDC4',
    vineBase: '#1A3A35',
    podColors: ['#E87A3E', '#F5A742', '#4ECDC4', '#6BBF59'],
    podGlow: ['rgba(232,122,62,0.4)', 'rgba(245,167,66,0.4)', 'rgba(78,205,196,0.4)', 'rgba(107,191,89,0.4)'],
    sporeColors: ['#E87A3E', '#F5A742', '#4ECDC4', '#6BBF59', '#FFB89D'],
    textPrimary: '#F5F5F0',
    textSecondary: '#C2C2B8',
    success: '#6BBF59',
    error: '#E85D4A',
  };

  // === GAME STATE ===
  let pods = [];
  let vine = { segments: [] };
  let sporeParticles = [];
  let ambientParticles = [];
  let gameTime = 0;
  let selectedPod = null;
  let burstAnimTime = 0;
  let shakeTarget = null;
  let shakeTime = 0;

  // Audio context for sound effects
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
  }

  function playSound(type) {
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);

      if (type === 'burst') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.15, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.3);
      } else if (type === 'correct') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, ctx.currentTime);
        osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
        osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.15, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.4);
      } else if (type === 'wrong') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.3);
      }
    } catch (e) { /* ignore audio errors */ }
  }

  function initGame() {
    gameTime = 0;
    selectedPod = null;
    burstAnimTime = 0;
    shakeTarget = null;
    shakeTime = 0;
    sporeParticles = [];

    // Create vine path - a curvy vertical vine
    vine.segments = [];
    for (let i = 0; i <= 20; i++) {
      vine.segments.push({
        x: W / 2 + Math.sin(i * 0.6) * 30,
        y: i * (H / 20)
      });
    }

    // Create pods - vertically stacked, full width
    const podH = 90;
    const podGap = 12;
    const totalH = pods.length > 0 ? pods.length * (podH + podGap) - podGap : QUESTION.choices.length * (podH + podGap) - podGap;
    const startY = (H - totalH) / 2 + 20;

    pods = QUESTION.choices.map((choice, i) => ({
      x: W / 2,
      y: startY + i * (podH + podGap) + podH / 2,
      w: 320,
      h: podH,
      choice: choice,
      color: COLORS.podColors[i % 4],
      glowColor: COLORS.podGlow[i % 4],
      burst: false,
      burstTime: 0,
      scale: 0,
      alpha: 0,
      entranceDelay: i * 0.1,
      entranceDone: false,
      pulsePhase: Math.random() * Math.PI * 2,
      bobPhase: Math.random() * Math.PI * 2,
      wrappedText: [],
      fontSize: 16,
      hitRect: { x: 0, y: 0, w: 0, h: 0 },
    }));

    // Ambient floating spore particles
    ambientParticles = [];
    for (let i = 0; i < 15; i++) {
      ambientParticles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        size: 1.5 + Math.random() * 2.5,
        speed: 10 + Math.random() * 20,
        alpha: 0.2 + Math.random() * 0.4,
        phase: Math.random() * Math.PI * 2,
        color: COLORS.sporeColors[Math.floor(Math.random() * COLORS.sporeColors.length)],
      });
    }

    recalculateTextSizing();
  }

  function recalculateTextSizing() {
    if (!pods || pods.length === 0) return;

    const textMaxWidth = 280;
    const availableH = pods[0].h * pods.length;

    const { fontSize, wrappedTexts } = findOptimalFontSize({
      texts: QUESTION.choices.map(c => c.text),
      maxWidth: textMaxWidth,
      availableHeight: availableH,
      minFont: 14,
      maxFont: 18,
      itemPadding: 8,
      fontFamily: "'Nunito', sans-serif"
    });

    pods.forEach((pod, i) => {
      pod.wrappedText = wrappedTexts[i];
      pod.fontSize = fontSize;
      // Update hit rect
      pod.hitRect = {
        x: pod.x - pod.w / 2,
        y: pod.y - pod.h / 2,
        w: pod.w,
        h: pod.h
      };
    });
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Entrance animations
    pods.forEach(pod => {
      if (!pod.entranceDone) {
        const t = Math.max(0, gameTime - pod.entranceDelay);
        if (t > 0) {
          const progress = Math.min(t / 0.4, 1);
          // Spring easing
          const spring = 1 + Math.sin(progress * Math.PI * 2) * 0.2 * (1 - progress);
          pod.scale = progress * spring;
          pod.alpha = Math.min(progress * 2, 1);
          if (progress >= 1) {
            pod.entranceDone = true;
            pod.scale = 1;
            pod.alpha = 1;
          }
        }
      }
    });

    // Pod pulse and bob
    pods.forEach(pod => {
      if (pod.entranceDone && !pod.burst) {
        pod.pulsePhase += dt * 2;
        pod.bobPhase += dt * 1.5;
      }
    });

    // Burst animation
    if (selectedPod !== null) {
      burstAnimTime += dt;
      const pod = pods[selectedPod];

      if (pod.burst && burstAnimTime > 0.5) {
        const choice = pod.choice;
        if (choice.is_correct) {
          playSound('correct');
        } else {
          playSound('wrong');
        }
        engine.end(choice.is_correct, choice.explanation);
      }
    }

    // Shake animation for wrong answer
    if (shakeTarget !== null) {
      shakeTime += dt;
      if (shakeTime > 0.4) {
        shakeTarget = null;
        shakeTime = 0;
      }
    }

    // Update spore particles
    sporeParticles = sporeParticles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 30 * dt;
      p.alpha -= dt * 1.2;
      p.rotation += p.rotSpeed * dt;
      p.size *= (1 - dt * 0.3);
      return p.alpha > 0;
    });

    // Update ambient particles
    ambientParticles.forEach(p => {
      p.y -= p.speed * dt;
      p.x += Math.sin(p.phase + gameTime * 0.5) * 0.3;
      p.phase += dt * 0.5;
      if (p.y < -10) {
        p.y = H + 10;
        p.x = Math.random() * W;
      }
    });
  }

  function spawnSpores(x, y, color) {
    for (let i = 0; i < 25; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 40 + Math.random() * 120;
      sporeParticles.push({
        x: x,
        y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 30,
        size: 3 + Math.random() * 6,
        alpha: 0.8 + Math.random() * 0.2,
        color: COLORS.sporeColors[Math.floor(Math.random() * COLORS.sporeColors.length)],
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 8,
      });
    }
  }

  function drawGame() {
    // Background - deep space-alien gradient
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, COLORS.bgDeep);
    grad.addColorStop(0.5, COLORS.bgMid);
    grad.addColorStop(1, COLORS.bgDeep);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Ambient particles (behind everything)
    ambientParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha * (0.5 + Math.sin(gameTime + p.phase) * 0.3);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.size, p.size * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });

    // Draw bioluminescent vine
    drawVine();

    // Draw pods
    pods.forEach((pod, i) => {
      if (pod.alpha <= 0) return;
      drawPod(pod, i);
    });

    // Draw spore particles
    sporeParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.ellipse(0, 0, p.size, p.size * aspectRatio * 0.6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
  }

  function drawVine() {
    if (vine.segments.length < 2) return;

    // Vine glow
    ctx.save();
    ctx.strokeStyle = COLORS.vineGlow;
    ctx.lineWidth = 8;
    ctx.globalAlpha = 0.15 + Math.sin(gameTime * 1.5) * 0.08;
    ctx.shadowColor = COLORS.vineGlow;
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.moveTo(vine.segments[0].x, vine.segments[0].y);
    for (let i = 1; i < vine.segments.length; i++) {
      const prev = vine.segments[i - 1];
      const cur = vine.segments[i];
      const cpx = (prev.x + cur.x) / 2 + Math.sin(gameTime + i) * 3;
      const cpy = (prev.y + cur.y) / 2;
      ctx.quadraticCurveTo(prev.x + Math.sin(gameTime * 0.8 + i) * 2, prev.y, cpx, cpy);
    }
    ctx.stroke();
    ctx.restore();

    // Vine body
    ctx.save();
    ctx.strokeStyle = COLORS.vineBase;
    ctx.lineWidth = 4;
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    ctx.moveTo(vine.segments[0].x, vine.segments[0].y);
    for (let i = 1; i < vine.segments.length; i++) {
      const prev = vine.segments[i - 1];
      const cur = vine.segments[i];
      const cpx = (prev.x + cur.x) / 2;
      const cpy = (prev.y + cur.y) / 2;
      ctx.quadraticCurveTo(prev.x, prev.y, cpx, cpy);
    }
    ctx.stroke();
    ctx.restore();

    // Small glow nodes on vine
    for (let i = 0; i < vine.segments.length; i += 3) {
      const seg = vine.segments[i];
      const glowAlpha = 0.3 + Math.sin(gameTime * 2 + i) * 0.2;
      ctx.save();
      ctx.globalAlpha = glowAlpha;
      ctx.fillStyle = COLORS.vineGlow;
      ctx.shadowColor = COLORS.vineGlow;
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.ellipse(seg.x, seg.y, 3, 3 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawPod(pod, index) {
    ctx.save();

    const pulse = pod.entranceDone ? Math.sin(pod.pulsePhase) * 0.02 : 0;
    const bob = pod.entranceDone ? Math.sin(pod.bobPhase) * 2 : 0;
    const scale = pod.scale + pulse;

    ctx.globalAlpha = pod.alpha;
    ctx.translate(pod.x, pod.y + bob);

    // Shake for wrong answer feedback
    let shakeOffsetX = 0;
    if (shakeTarget === index && shakeTime > 0) {
      const decay = 1 - (shakeTime / 0.4);
      shakeOffsetX = Math.sin(shakeTime * Math.PI * 10) * 8 * decay;
      ctx.translate(shakeOffsetX, 0);
    }

    ctx.scale(scale, scale);

    if (pod.burst) {
      // Burst animation - pod splits open
      const bt = Math.min(burstAnimTime / 0.4, 1);
      ctx.globalAlpha = pod.alpha * (1 - bt * 0.5);
      ctx.scale(1 + bt * 0.3, 1 + bt * 0.3);
    }

    const halfW = pod.w / 2;
    const halfH = pod.h / 2;

    // Pod outer glow
    ctx.save();
    ctx.shadowColor = pod.glowColor;
    ctx.shadowBlur = 15 + Math.sin(pod.pulsePhase) * 5;
    ctx.fillStyle = 'rgba(0,0,0,0)';
    ctx.beginPath();
    ctx.roundRect(-halfW, -halfH, pod.w, pod.h, 16);
    ctx.fill();
    ctx.restore();

    // Pod background - organic shape with gradient
    const podGrad = ctx.createLinearGradient(-halfW, -halfH, -halfW, halfH);
    podGrad.addColorStop(0, pod.color + '30');
    podGrad.addColorStop(0.5, pod.color + '18');
    podGrad.addColorStop(1, pod.color + '08');
    ctx.fillStyle = podGrad;
    ctx.beginPath();
    ctx.roundRect(-halfW, -halfH, pod.w, pod.h, 16);
    ctx.fill();

    // Pod border with glow
    ctx.strokeStyle = pod.color + '80';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(-halfW, -halfH, pod.w, pod.h, 16);
    ctx.stroke();

    // Bioluminescent veins on the pod
    ctx.save();
    ctx.globalAlpha = 0.15 + Math.sin(pod.pulsePhase + 1) * 0.1;
    ctx.strokeStyle = pod.color;
    ctx.lineWidth = 1;
    // Draw a few organic vein lines
    for (let v = 0; v < 3; v++) {
      ctx.beginPath();
      const startX = -halfW + 20 + v * 50;
      ctx.moveTo(startX, -halfH + 5);
      ctx.quadraticCurveTo(
        startX + Math.sin(v * 2) * 15, 0,
        startX + 10, halfH - 5
      );
      ctx.stroke();
    }
    ctx.restore();

    // Small glowing seed dots inside pod
    ctx.save();
    ctx.globalAlpha = 0.4 + Math.sin(gameTime * 3 + index) * 0.2;
    for (let s = 0; s < 3; s++) {
      const sx = -halfW + 30 + s * 45 + Math.sin(gameTime + s + index) * 3;
      const sy = -10 + Math.sin(gameTime * 1.2 + s * 2 + index) * 5;
      ctx.fillStyle = pod.color;
      ctx.shadowColor = pod.color;
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.ellipse(sx, sy, 2.5, 2.5 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    // Answer text
    ctx.restore(); // Restore before drawing text to get clean transform

    ctx.save();
    ctx.globalAlpha = pod.alpha;
    const textY = pod.y + bob;
    const lines = pod.wrappedText || [pod.choice.text];
    const fs = pod.fontSize || 16;
    const lineH = fs + 3;
    const totalTextH = lines.length * lineH;
    const textStartY = textY - totalTextH / 2 + lineH / 2;

    lines.forEach((line, li) => {
      drawText(line, pod.x + shakeOffsetX, textStartY + li * lineH, {
        font: `500 ${fs}px 'Nunito', sans-serif`,
        color: COLORS.textPrimary,
        align: 'center',
        baseline: 'middle'
      });
    });
    ctx.restore();
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;
    if (type !== 'start') return;
    if (selectedPod !== null) return; // Already animating

    const touch = e.touches ? e.touches[0] : e.changedTouches[0];
    if (!touch) return;
    const { x, y } = screenToLogical(touch.clientX, touch.clientY);

    pods.forEach((pod, i) => {
      if (pod.burst) return;
      if (!pod.entranceDone) return;

      const bob = Math.sin(pod.bobPhase) * 2;
      const hitRect = {
        x: pod.x - pod.w / 2,
        y: pod.y - pod.h / 2 + bob,
        w: pod.w,
        h: pod.h
      };

      if (pointInRect(x, y, hitRect)) {
        selectedPod = i;
        pod.burst = true;
        burstAnimTime = 0;
        playSound('burst');
        spawnSpores(pod.x, pod.y, pod.color);
      }
    });
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
