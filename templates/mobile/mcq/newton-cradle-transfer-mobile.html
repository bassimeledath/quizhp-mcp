<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Newton's Cradle Transfer</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #FAFAF7;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = "bold 18px 'Nunito Sans', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px 'Nunito', sans-serif", color = '#2B2B28', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   *
   * @param {string} text - The text to wrap
   * @param {number} maxWidth - Maximum width in logical coordinates
   * @param {string} font - CSS font string (e.g., "16px 'Nunito', sans-serif")
   * @param {number} maxLines - Maximum number of lines (default 3)
   * @returns {string[]} Array of text lines
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   * Tries font sizes from max to min until content fits.
   *
   * @param {Object} options
   * @param {string[]} options.texts - Array of text strings to fit
   * @param {number} options.maxWidth - Maximum width for text wrapping
   * @param {number} options.availableHeight - Total height available for all texts
   * @param {number} options.minFont - Minimum font size (default 12)
   * @param {number} options.maxFont - Maximum font size (default 18)
   * @param {number} options.itemPadding - Vertical padding per text item (default 4)
   * @param {string} options.fontFamily - Font family (default "'Nunito Sans', sans-serif")
   * @returns {{ fontSize: number, wrappedTexts: string[][] }} Optimal font size and pre-wrapped texts
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = "bold 32px 'Belanosima', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === AUDIO CONTEXT FOR SOUND EFFECTS ===
  let audioCtx = null;
  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
  }

  function playClickSound() {
    try {
      const ctx = initAudio();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 800;
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialDecayTo ? gain.gain.exponentialDecayTo(0.01, ctx.currentTime + 0.1) : gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.1);
    } catch(e) {}
  }

  function playBallClackSound() {
    try {
      const ctx = initAudio();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = 1200;
      gain.gain.setValueAtTime(0.25, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.08);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.08);
    } catch(e) {}
  }

  function playPegHitSound(pegIndex) {
    try {
      const ctx = initAudio();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'triangle';
      osc.frequency.value = 400 + pegIndex * 100;
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.2);
    } catch(e) {}
  }

  function playCorrectSound() {
    try {
      const ctx = initAudio();
      [523.25, 659.25, 783.99].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.15, ctx.currentTime + i * 0.1);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.1 + 0.2);
        osc.start(ctx.currentTime + i * 0.1);
        osc.stop(ctx.currentTime + i * 0.1 + 0.2);
      });
    } catch(e) {}
  }

  function playWrongSound() {
    try {
      const ctx = initAudio();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sawtooth';
      osc.frequency.value = 200;
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.3);
    } catch(e) {}
  }

  // === GAME STATE ===
  const BALL_RADIUS = 18;
  const STRING_LENGTH = 100;
  const FRAME_TOP = 50;
  const NUM_BALLS = 5;
  const GRAVITY = 400;
  const DAMPING = 0.995;

  let balls = [];
  let answers = [];
  let gamePhase = 'select'; // 'select' | 'pulling' | 'swinging' | 'result'
  let selectedBallCount = 1;
  let pullAngle = 0;
  let maxPullAngle = Math.PI / 3;
  let animationTime = 0;
  let entranceProgress = 0;
  let hitPegIndex = -1;
  let resultTimer = 0;
  let gameParticles = [];

  // Cached text sizing
  let answerFontSize = 14;
  let answerWrappedTexts = [];

  function recalculateTextSizing() {
    if (!answers || answers.length === 0) return;

    // For 2x2 grid, each answer card has about 150px width for text
    const { fontSize, wrappedTexts } = findOptimalFontSize({
      texts: QUESTION.choices.map(c => c.text),
      maxWidth: 140,
      availableHeight: 300,
      minFont: 12,
      maxFont: 15,
      itemPadding: 4,
      fontFamily: "'Nunito', sans-serif"
    });

    answerFontSize = fontSize;
    answerWrappedTexts = wrappedTexts;

    answers.forEach((ans, i) => {
      ans.wrappedText = wrappedTexts[i];
      ans.fontSize = fontSize;
    });
  }

  function initGame() {
    // Reset state
    gamePhase = 'select';
    selectedBallCount = 1;
    pullAngle = 0;
    animationTime = 0;
    entranceProgress = 0;
    hitPegIndex = -1;
    resultTimer = 0;
    gameParticles = [];

    // Initialize balls - centered at top
    const cradleWidth = NUM_BALLS * (BALL_RADIUS * 2 + 2);
    const ballStartX = W / 2 - cradleWidth / 2 + BALL_RADIUS;
    const ballSpacing = BALL_RADIUS * 2 + 2;
    balls = [];
    for (let i = 0; i < NUM_BALLS; i++) {
      balls.push({
        x: ballStartX + i * ballSpacing,
        anchorX: ballStartX + i * ballSpacing,
        anchorY: FRAME_TOP,
        angle: 0,
        angularVelocity: 0,
        isLeft: i < Math.floor(NUM_BALLS / 2) + 1
      });
    }

    // Initialize answer cards in 2x2 grid below the cradle
    const cardW = 160;
    const cardH = 100;
    const gridGap = 12;
    const gridStartX = (W - cardW * 2 - gridGap) / 2;
    const gridStartY = 310;

    answers = [];
    for (let i = 0; i < QUESTION.choices.length; i++) {
      const col = i % 2;
      const row = Math.floor(i / 2);
      answers.push({
        x: gridStartX + col * (cardW + gridGap),
        y: gridStartY + row * (cardH + gridGap),
        w: cardW,
        h: cardH,
        choice: QUESTION.choices[i],
        index: i,
        scale: 0,
        highlight: false,
        wrappedText: [],
        fontSize: 14
      });
    }

    recalculateTextSizing();
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    animationTime += dt;

    // Entrance animation
    if (entranceProgress < 1) {
      entranceProgress = Math.min(1, entranceProgress + dt * 2);
      answers.forEach((ans, i) => {
        const delay = i * 0.1;
        const progress = Math.max(0, (entranceProgress - delay) / (1 - delay * (answers.length - 1) / answers.length));
        ans.scale = easeOutBack(Math.min(1, progress));
      });
    }

    // Update particles
    gameParticles = gameParticles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 300 * dt;
      p.life -= dt;
      p.rotation += p.rotationSpeed * dt;
      return p.life > 0;
    });

    if (gamePhase === 'swinging') {
      // Physics simulation for Newton's cradle
      let collision = false;

      balls.forEach((ball, i) => {
        // Apply gravity
        const gravityTorque = -GRAVITY / STRING_LENGTH * Math.sin(ball.angle);
        ball.angularVelocity += gravityTorque * dt;
        ball.angularVelocity *= DAMPING;
        ball.angle += ball.angularVelocity * dt;
      });

      // Collision detection between adjacent balls
      for (let i = 0; i < balls.length - 1; i++) {
        const ball1 = balls[i];
        const ball2 = balls[i + 1];

        // Calculate ball positions
        const x1 = ball1.anchorX + Math.sin(ball1.angle) * STRING_LENGTH;
        const x2 = ball2.anchorX + Math.sin(ball2.angle) * STRING_LENGTH;

        const dist = x2 - x1;
        const minDist = BALL_RADIUS * 2 + 2;

        if (dist < minDist && (ball1.angularVelocity > 0.1 || ball2.angularVelocity < -0.1)) {
          // Elastic collision - transfer momentum
          const temp = ball1.angularVelocity;
          ball1.angularVelocity = ball2.angularVelocity * 0.98;
          ball2.angularVelocity = temp * 0.98;
          collision = true;
        }
      }

      if (collision) {
        playBallClackSound();
      }

      // Check if rightmost balls hit any peg
      const rightBall = balls[balls.length - 1];
      const ballX = rightBall.anchorX + Math.sin(rightBall.angle) * STRING_LENGTH;
      const ballY = rightBall.anchorY + Math.cos(rightBall.angle) * STRING_LENGTH;

      if (rightBall.angularVelocity > 0.5) {
        // Check collision with pegs based on ball count
        const targetPegIndex = selectedBallCount - 1;
        if (hitPegIndex === -1) {
          // Map ball count to peg: 1 ball = peg 0, 2 balls = peg 1, etc.
          hitPegIndex = Math.min(targetPegIndex, 3);
          answers[hitPegIndex].highlight = true;
          gamePhase = 'result';
          resultTimer = 0;

          playPegHitSound(hitPegIndex);

          // Spawn impact particles
          const peg = answers[hitPegIndex];
          for (let i = 0; i < 15; i++) {
            gameParticles.push({
              x: peg.x,
              y: peg.y + peg.h / 2,
              vx: (Math.random() - 0.5) * 200,
              vy: (Math.random() - 0.5) * 200,
              size: 3 + Math.random() * 4,
              color: ['#E87A3E', '#F5A742', '#4ECDC4'][Math.floor(Math.random() * 3)],
              life: 0.5 + Math.random() * 0.5,
              rotation: Math.random() * Math.PI * 2,
              rotationSpeed: (Math.random() - 0.5) * 10
            });
          }
        }
      }

      // Check if simulation has settled
      const totalEnergy = balls.reduce((sum, b) => sum + Math.abs(b.angularVelocity), 0);
      if (totalEnergy < 0.05 && hitPegIndex === -1) {
        // No peg hit, reset
        gamePhase = 'select';
        selectedBallCount = 1;
      }
    }

    if (gamePhase === 'result') {
      resultTimer += dt;
      if (resultTimer > 1.0) {
        const choice = answers[hitPegIndex].choice;
        if (choice.is_correct) {
          playCorrectSound();
        } else {
          playWrongSound();
        }
        engine.end(choice.is_correct, choice.explanation);
      }
    }
  }

  function easeOutBack(t) {
    const c1 = 1.70158;
    const c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  }

  function easeOutElastic(t) {
    if (t === 0 || t === 1) return t;
    return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * (2 * Math.PI) / 3) + 1;
  }

  function drawGame() {
    // Clear canvas with background
    ctx.fillStyle = '#FAFAF7';
    ctx.fillRect(0, 0, W, H);

    // Calculate cradle frame bounds
    const cradleWidth = NUM_BALLS * (BALL_RADIUS * 2 + 2);
    const frameLeft = W / 2 - cradleWidth / 2 - 20;
    const frameRight = W / 2 + cradleWidth / 2 + 20;

    // Draw frame
    ctx.strokeStyle = '#5C5C52';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(frameLeft, FRAME_TOP);
    ctx.lineTo(frameRight, FRAME_TOP);
    ctx.stroke();

    // Frame legs
    ctx.beginPath();
    ctx.moveTo(frameLeft + 10, FRAME_TOP);
    ctx.lineTo(frameLeft, FRAME_TOP + STRING_LENGTH + BALL_RADIUS + 30);
    ctx.moveTo(frameRight - 10, FRAME_TOP);
    ctx.lineTo(frameRight, FRAME_TOP + STRING_LENGTH + BALL_RADIUS + 30);
    ctx.stroke();

    // Draw strings and balls
    balls.forEach((ball, i) => {
      const displayAngle = gamePhase === 'pulling' && i < selectedBallCount ? -pullAngle : ball.angle;
      const ballX = ball.anchorX + Math.sin(displayAngle) * STRING_LENGTH;
      const ballY = ball.anchorY + Math.cos(displayAngle) * STRING_LENGTH;

      // String
      ctx.strokeStyle = '#8B8B7A';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(ball.anchorX, ball.anchorY);
      ctx.lineTo(ballX, ballY);
      ctx.stroke();

      // Ball shadow
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.beginPath();
      ctx.ellipse(ballX + 3, ballY + 3, BALL_RADIUS, BALL_RADIUS * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();

      // Ball
      const isSelected = gamePhase === 'select' && i < selectedBallCount;
      const gradient = ctx.createRadialGradient(ballX - 5, ballY - 5, 0, ballX, ballY, BALL_RADIUS);
      if (isSelected) {
        gradient.addColorStop(0, '#FFC078');
        gradient.addColorStop(1, '#E87A3E');
      } else {
        gradient.addColorStop(0, '#B8B8A8');
        gradient.addColorStop(1, '#6B6B5A');
      }
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.ellipse(ballX, ballY, BALL_RADIUS, BALL_RADIUS * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();

      // Highlight
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.beginPath();
      ctx.ellipse(ballX - 5, ballY - 5, 5, 5 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    });

    // Draw ball count selector UI
    const uiY = FRAME_TOP + STRING_LENGTH + BALL_RADIUS + 45;
    if (gamePhase === 'select') {
      drawText('Tap balls to select', W / 2, uiY, {
        font: "500 14px 'Nunito Sans', sans-serif",
        color: '#5C5C52'
      });
      drawText(`${selectedBallCount} ball${selectedBallCount > 1 ? 's' : ''} → Answer ${['A', 'B', 'C', 'D'][Math.min(selectedBallCount - 1, 3)]}`, W / 2, uiY + 20, {
        font: "600 16px 'Nunito Sans', sans-serif",
        color: '#E87A3E'
      });
    }

    // Draw release button
    if (gamePhase === 'select') {
      const pullBtnW = 140;
      const pullBtnH = 44;
      const pullBtnX = (W - pullBtnW) / 2;
      const pullBtnY = uiY + 40;

      ctx.fillStyle = '#E87A3E';
      ctx.beginPath();
      ctx.roundRect(pullBtnX, pullBtnY, pullBtnW, pullBtnH, 10);
      ctx.fill();

      drawText('RELEASE', pullBtnX + pullBtnW / 2, pullBtnY + pullBtnH / 2, {
        font: "700 18px 'Belanosima', sans-serif",
        color: '#FFFFFF'
      });
    }

    // Draw answer cards in 2x2 grid
    answers.forEach((ans, i) => {
      if (ans.scale <= 0) return;

      const centerX = ans.x + ans.w / 2;
      const centerY = ans.y + ans.h / 2;

      ctx.save();
      ctx.translate(centerX, centerY);

      let scale = ans.scale;
      if (ans.highlight) {
        scale *= 1 + Math.sin(animationTime * 8) * 0.05;
      }
      ctx.scale(scale, scale);

      // Card background
      const bgColor = ans.highlight ?
        (ans.choice.is_correct ? '#6BBF59' : '#E85D4A') :
        '#FFFFFF';
      const borderColor = ans.highlight ?
        (ans.choice.is_correct ? '#5AAF4A' : '#D04A3A') :
        '#E6E6E0';

      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.1)';
      ctx.beginPath();
      ctx.roundRect(-ans.w / 2 + 2, -ans.h / 2 + 2, ans.w, ans.h, 12);
      ctx.fill();

      // Card
      ctx.fillStyle = bgColor;
      ctx.strokeStyle = borderColor;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.roundRect(-ans.w / 2, -ans.h / 2, ans.w, ans.h, 12);
      ctx.fill();
      ctx.stroke();

      ctx.restore();

      // Draw label badge
      const labels = ['A', 'B', 'C', 'D'];
      const badgeX = ans.x + 20;
      const badgeY = ans.y + 18;
      const badgeR = 14;

      ctx.fillStyle = '#4ECDC4';
      ctx.beginPath();
      ctx.ellipse(badgeX, badgeY, badgeR, badgeR * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();

      drawText(labels[i], badgeX, badgeY, {
        font: "700 14px 'Belanosima', sans-serif",
        color: '#FFFFFF'
      });

      // Draw answer text inside card
      const lines = ans.wrappedText || [ans.choice.text];
      const fontSize = ans.fontSize || 14;
      const lineHeight = fontSize + 3;
      const textX = ans.x + ans.w / 2;
      const textStartY = ans.y + 38;

      lines.forEach((line, lineIdx) => {
        drawText(line, textX, textStartY + lineIdx * lineHeight, {
          font: `500 ${fontSize}px 'Nunito', sans-serif`,
          color: ans.highlight ? '#FFFFFF' : '#2B2B28',
          align: 'center'
        });
      });
    });

    // Draw particles
    gameParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
      ctx.restore();
    });
    ctx.globalAlpha = 1;

  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;

    const touch = e.touches[0] || e.changedTouches[0];
    if (!touch) return;
    const { x, y } = screenToLogical(touch.clientX, touch.clientY);

    if (type === 'start') {
      playClickSound();

      if (gamePhase === 'select') {
        // Check if tapping on balls to change count
        let tappedBall = false;
        balls.forEach((ball, i) => {
          const ballX = ball.anchorX;
          const ballY = ball.anchorY + STRING_LENGTH;
          const dist = Math.sqrt((x - ballX) ** 2 + ((y - ballY) / aspectRatio) ** 2);
          if (dist < BALL_RADIUS + 15) {
            selectedBallCount = Math.min(4, Math.max(1, i + 1));
            tappedBall = true;
          }
        });

        // Check if tapping release button (centered)
        const uiY = FRAME_TOP + STRING_LENGTH + BALL_RADIUS + 45;
        const pullBtnW = 140;
        const pullBtnH = 44;
        const pullBtnX = (W - pullBtnW) / 2;
        const pullBtnY = uiY + 40;

        if (!tappedBall && x >= pullBtnX && x <= pullBtnX + pullBtnW &&
            y >= pullBtnY && y <= pullBtnY + pullBtnH) {
          // Start the swing
          gamePhase = 'swinging';

          // Set initial velocity for selected balls
          for (let i = 0; i < selectedBallCount; i++) {
            balls[i].angle = -maxPullAngle;
            balls[i].angularVelocity = 0;
          }
        }
      }
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
