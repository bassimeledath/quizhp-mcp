<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Connect Four Drop</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE - MOBILE                                              ║
  ║  Fills 100% of container, non-uniform scaling, touch input.                  ║
  ║  Logical dimensions: 360×640 (use aspectRatio for proportional shapes)       ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none; /* Prevent default touch behaviors */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1C1C1A;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #1C1C1A;
      /* Canvas fills viewport via JS, these are fallbacks */
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill viewport
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = "bold 18px 'Nunito Sans', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px 'Nunito Sans', sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   *
   * @param {string} text - The text to wrap
   * @param {number} maxWidth - Maximum width in logical coordinates
   * @param {string} font - CSS font string (e.g., "16px 'Nunito', sans-serif")
   * @param {number} maxLines - Maximum number of lines (default 3)
   * @returns {string[]} Array of text lines
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   * Tries font sizes from max to min until content fits.
   *
   * @param {Object} options
   * @param {string[]} options.texts - Array of text strings to fit
   * @param {number} options.maxWidth - Maximum width for text wrapping
   * @param {number} options.availableHeight - Total height available for all texts
   * @param {number} options.minFont - Minimum font size (default 12)
   * @param {number} options.maxFont - Maximum font size (default 18)
   * @param {number} options.itemPadding - Vertical padding per text item (default 4)
   * @param {string} options.fontFamily - Font family (default "'Nunito Sans', sans-serif")
   * @returns {{ fontSize: number, wrappedTexts: string[][] }} Optimal font size and pre-wrapped texts
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = "bold 32px 'Nunito Sans', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgPrimary: '#1C1C1A',
    boardBlue: '#2A5DB0',
    boardBlueDark: '#1E4488',
    slotEmpty: '#1C1C1A',
    orange: '#E87A3E',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    textPrimary: '#F5F5F0',
    textSecondary: '#C2C2B8',
    discYellow: '#F5A742'
  };

  // === GAME STATE ===
  // Compact board: 4 columns x 4 rows
  const BOARD_COLS = 4;
  const BOARD_ROWS = 4;
  const SLOT_SIZE = 38;
  const SLOT_GAP = 4;
  const BOARD_PADDING = 8;

  let board = [];
  let answerButtons = [];
  let fallingDisc = null;
  let gameTime = 0;
  let entranceAnimProgress = 0;
  let selectedAnswer = -1;
  let answerFontSize = 14;
  let answerWrappedTexts = [];

  // Audio context for sound effects
  let audioCtx = null;

  function playSound(type) {
    if (!audioCtx) {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      } catch (e) {
        return;
      }
    }

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'click') {
      osc.frequency.value = 600;
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'drop') {
      osc.frequency.value = 200;
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.2);
    } else if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.value = 150;
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    }
  }

  function recalculateTextSizing() {
    if (!answerButtons || answerButtons.length === 0) return;

    const buttonWidth = 320;
    const buttonHeight = 56;
    const availableTextWidth = buttonWidth - 50; // Account for letter badge

    const result = findOptimalFontSize({
      texts: QUESTION.choices.map(c => c.text),
      maxWidth: availableTextWidth,
      availableHeight: buttonHeight * 4,
      minFont: 14,
      maxFont: 16,
      itemPadding: 8,
      fontFamily: "'Nunito', sans-serif"
    });

    answerFontSize = result.fontSize;
    answerWrappedTexts = result.wrappedTexts;
  }

  function initGame() {
    // Reset board
    board = [];
    for (let row = 0; row < BOARD_ROWS; row++) {
      board[row] = [];
      for (let col = 0; col < BOARD_COLS; col++) {
        board[row][col] = null;
      }
    }

    fallingDisc = null;
    gameTime = 0;
    entranceAnimProgress = 0;
    selectedAnswer = -1;

    // Calculate board position (centered, upper portion of screen)
    const boardWidth = BOARD_COLS * (SLOT_SIZE + SLOT_GAP) - SLOT_GAP + BOARD_PADDING * 2;
    const boardHeight = BOARD_ROWS * (SLOT_SIZE + SLOT_GAP) - SLOT_GAP + BOARD_PADDING * 2;
    const boardX = (W - boardWidth) / 2;
    const boardY = 30;

    // Create answer buttons below the board
    const buttonWidth = 320;
    const buttonHeight = 56;
    const buttonGap = 10;
    const buttonsStartY = boardY + boardHeight + 40;
    const buttonsX = (W - buttonWidth) / 2;

    answerButtons = QUESTION.choices.map((choice, i) => ({
      choice: choice,
      colIndex: i,
      x: buttonsX,
      y: buttonsStartY + i * (buttonHeight + buttonGap),
      w: buttonWidth,
      h: buttonHeight,
      scale: 0,
      alpha: 0,
      entranceDelay: i * 0.08,
      shakeOffset: 0
    }));

    recalculateTextSizing();
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Entrance animation
    if (entranceAnimProgress < 1) {
      entranceAnimProgress = Math.min(1, entranceAnimProgress + dt * 2.5);

      answerButtons.forEach((btn, i) => {
        const t = Math.max(0, Math.min(1, (entranceAnimProgress - btn.entranceDelay) / 0.25));
        const spring = 1 + Math.sin(t * Math.PI * 2) * 0.12 * (1 - t);
        btn.scale = t * spring;
        btn.alpha = t;
      });
    } else {
      answerButtons.forEach(btn => {
        btn.scale = 1;
        btn.alpha = 1;
      });
    }

    // Update falling disc
    if (fallingDisc) {
      fallingDisc.vy += 1800 * dt;
      fallingDisc.y += fallingDisc.vy * dt;

      if (fallingDisc.y >= fallingDisc.targetY) {
        fallingDisc.y = fallingDisc.targetY;

        // Place disc on board
        board[fallingDisc.row][fallingDisc.col] = fallingDisc.color;

        playSound('drop');

        // End game after short delay
        const choice = answerButtons[fallingDisc.answerIndex].choice;
        setTimeout(() => {
          if (choice.is_correct) {
            playSound('correct');
          } else {
            playSound('wrong');
          }
          engine.end(choice.is_correct, choice.explanation);
        }, 150);

        fallingDisc = null;
      }
    }
  }

  function drawGame() {
    // Clear canvas
    ctx.fillStyle = COLORS.bgPrimary;
    ctx.fillRect(0, 0, W, H);

    // Calculate board dimensions
    const boardWidth = BOARD_COLS * (SLOT_SIZE + SLOT_GAP) - SLOT_GAP + BOARD_PADDING * 2;
    const boardHeight = BOARD_ROWS * (SLOT_SIZE + SLOT_GAP) - SLOT_GAP + BOARD_PADDING * 2;
    const boardX = (W - boardWidth) / 2;
    const boardY = 30;

    // Draw board background
    ctx.fillStyle = COLORS.boardBlue;
    ctx.beginPath();
    ctx.roundRect(boardX, boardY, boardWidth, boardHeight, 12);
    ctx.fill();

    // Draw board border
    ctx.strokeStyle = COLORS.boardBlueDark;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.roundRect(boardX, boardY, boardWidth, boardHeight, 12);
    ctx.stroke();

    // Draw column labels (A, B, C, D) above the board
    for (let col = 0; col < BOARD_COLS; col++) {
      const slotX = boardX + BOARD_PADDING + col * (SLOT_SIZE + SLOT_GAP);
      const letter = String.fromCharCode(65 + col);
      const arrowBob = Math.sin(gameTime * 4 + col * 0.5) * 2;

      // Letter label
      drawText(letter, slotX + SLOT_SIZE / 2, boardY - 12 + arrowBob, {
        font: "700 16px 'Belanosima', sans-serif",
        color: COLORS.orange
      });
    }

    // Draw slots and discs
    for (let row = 0; row < BOARD_ROWS; row++) {
      for (let col = 0; col < BOARD_COLS; col++) {
        const slotX = boardX + BOARD_PADDING + col * (SLOT_SIZE + SLOT_GAP);
        const slotY = boardY + BOARD_PADDING + row * (SLOT_SIZE + SLOT_GAP);

        // Slot hole
        ctx.fillStyle = COLORS.slotEmpty;
        ctx.beginPath();
        ctx.ellipse(
          slotX + SLOT_SIZE / 2,
          slotY + SLOT_SIZE / 2,
          SLOT_SIZE / 2 - 2,
          (SLOT_SIZE / 2 - 2) * aspectRatio,
          0, 0, Math.PI * 2
        );
        ctx.fill();

        // Draw disc if present
        if (board[row][col]) {
          ctx.fillStyle = board[row][col];
          ctx.beginPath();
          ctx.ellipse(
            slotX + SLOT_SIZE / 2,
            slotY + SLOT_SIZE / 2,
            SLOT_SIZE / 2 - 4,
            (SLOT_SIZE / 2 - 4) * aspectRatio,
            0, 0, Math.PI * 2
          );
          ctx.fill();

          // Disc highlight
          ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
          ctx.beginPath();
          ctx.ellipse(
            slotX + SLOT_SIZE / 2 - 5,
            slotY + SLOT_SIZE / 2 - 5 * aspectRatio,
            6,
            6 * aspectRatio,
            0, 0, Math.PI * 2
          );
          ctx.fill();
        }
      }
    }

    // Draw falling disc
    if (fallingDisc) {
      ctx.fillStyle = fallingDisc.color;
      ctx.beginPath();
      ctx.ellipse(
        fallingDisc.x,
        fallingDisc.y,
        SLOT_SIZE / 2 - 4,
        (SLOT_SIZE / 2 - 4) * aspectRatio,
        0, 0, Math.PI * 2
      );
      ctx.fill();

      // Highlight
      ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
      ctx.beginPath();
      ctx.ellipse(
        fallingDisc.x - 5,
        fallingDisc.y - 5 * aspectRatio,
        6,
        6 * aspectRatio,
        0, 0, Math.PI * 2
      );
      ctx.fill();
    }

    // Draw answer buttons
    answerButtons.forEach((btn, i) => {
      if (btn.alpha <= 0) return;

      ctx.globalAlpha = btn.alpha;

      const isSelected = selectedAnswer === i;
      const btnX = btn.x + btn.shakeOffset;

      // Button background
      ctx.save();
      ctx.translate(btnX + btn.w / 2, btn.y + btn.h / 2);
      ctx.scale(btn.scale, btn.scale);
      ctx.translate(-(btnX + btn.w / 2), -(btn.y + btn.h / 2));

      // Background
      ctx.fillStyle = isSelected ? '#2A4080' : '#2A2A27';
      ctx.beginPath();
      ctx.roundRect(btnX, btn.y, btn.w, btn.h, 12);
      ctx.fill();

      // Border
      ctx.strokeStyle = isSelected ? COLORS.cyan : '#424240';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.roundRect(btnX, btn.y, btn.w, btn.h, 12);
      ctx.stroke();

      // Letter badge
      const badgeX = btnX + 24;
      const badgeY = btn.y + btn.h / 2;
      const letter = String.fromCharCode(65 + i);

      ctx.fillStyle = COLORS.orange;
      ctx.beginPath();
      ctx.ellipse(badgeX, badgeY, 14, 14 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();

      drawText(letter, badgeX, badgeY, {
        font: "700 14px 'Belanosima', sans-serif",
        color: '#FFFFFF'
      });

      // Answer text
      const textX = btnX + 50;
      const lines = answerWrappedTexts[i] || [btn.choice.text];
      const lineHeight = answerFontSize + 2;
      const totalTextHeight = lines.length * lineHeight;
      const textStartY = btn.y + (btn.h - totalTextHeight) / 2 + lineHeight / 2;

      lines.forEach((line, lineIndex) => {
        drawText(line, textX, textStartY + lineIndex * lineHeight, {
          font: `500 ${answerFontSize}px 'Nunito', sans-serif`,
          color: COLORS.textPrimary,
          align: 'left'
        });
      });

      ctx.restore();
      ctx.globalAlpha = 1;
    });
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;
    if (fallingDisc) return;

    const touch = e.touches[0] || e.changedTouches[0];
    const { x, y } = screenToLogical(touch.clientX, touch.clientY);

    if (type === 'start' || type === 'move') {
      selectedAnswer = -1;
      answerButtons.forEach((btn, i) => {
        if (pointInRect(x, y, btn)) {
          selectedAnswer = i;
        }
      });
    }

    if (type === 'end') {
      if (selectedAnswer >= 0 && entranceAnimProgress >= 1) {
        const btn = answerButtons[selectedAnswer];

        // Find empty row in this column
        let targetRow = -1;
        for (let row = BOARD_ROWS - 1; row >= 0; row--) {
          if (!board[row][btn.colIndex]) {
            targetRow = row;
            break;
          }
        }

        if (targetRow >= 0) {
          playSound('click');

          const boardWidth = BOARD_COLS * (SLOT_SIZE + SLOT_GAP) - SLOT_GAP + BOARD_PADDING * 2;
          const boardX = (W - boardWidth) / 2;
          const boardY = 30;

          const slotX = boardX + BOARD_PADDING + btn.colIndex * (SLOT_SIZE + SLOT_GAP) + SLOT_SIZE / 2;

          fallingDisc = {
            x: slotX,
            y: boardY - SLOT_SIZE,
            vy: 0,
            col: btn.colIndex,
            row: targetRow,
            targetY: boardY + BOARD_PADDING + targetRow * (SLOT_SIZE + SLOT_GAP) + SLOT_SIZE / 2,
            color: COLORS.discYellow,
            answerIndex: selectedAnswer
          };
        }
      }
      selectedAnswer = -1;
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
