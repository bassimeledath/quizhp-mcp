<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Milk Bottle Pyramid</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   *
   * @param {string} text - The text to wrap
   * @param {number} maxWidth - Maximum width in logical coordinates
   * @param {string} font - CSS font string (e.g., "16px 'Nunito', sans-serif")
   * @param {number} maxLines - Maximum number of lines (default 3)
   * @returns {string[]} Array of text lines
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   * Tries font sizes from max to min until content fits.
   *
   * @param {Object} options
   * @param {string[]} options.texts - Array of text strings to fit
   * @param {number} options.maxWidth - Maximum width for text wrapping
   * @param {number} options.availableHeight - Total height available for all texts
   * @param {number} options.minFont - Minimum font size (default 12)
   * @param {number} options.maxFont - Maximum font size (default 18)
   * @param {number} options.itemPadding - Vertical padding per text item (default 4)
   * @param {string} options.fontFamily - Font family (default "'Nunito Sans', sans-serif")
   * @returns {{ fontSize: number, wrappedTexts: string[][] }} Optimal font size and pre-wrapped texts
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === GAME STATE ===
  let pyramids = [];
  let ball = null;
  let bottles = [];
  let fallingBottles = [];
  let gamePhase = 'aiming'; // 'aiming' | 'throwing' | 'hitting' | 'selecting'
  let aimAngle = -Math.PI / 2;
  let aimPower = 0;
  let aimDirection = 1;
  let touchStartY = 0;
  let touchStartX = 0;
  let isTouching = false;
  let selectedPyramid = null;
  let animationTime = 0;
  let entranceProgress = 0;
  let particleEffects = [];

  // Audio context for sound effects
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'throw') {
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.15);
    } else if (type === 'crash') {
      // Glass crash sound - multiple quick oscillators
      for (let i = 0; i < 5; i++) {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g);
        g.connect(audioCtx.destination);
        o.type = 'square';
        o.frequency.setValueAtTime(800 + Math.random() * 1200, audioCtx.currentTime + i * 0.02);
        o.frequency.exponentialRampToValueAtTime(200 + Math.random() * 200, audioCtx.currentTime + i * 0.02 + 0.1);
        g.gain.setValueAtTime(0.15, audioCtx.currentTime + i * 0.02);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.02 + 0.15);
        o.start(audioCtx.currentTime + i * 0.02);
        o.stop(audioCtx.currentTime + i * 0.02 + 0.15);
      }
    } else if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.3);
    }
  }

  function initGame() {
    // Reset state
    gamePhase = 'aiming';
    aimAngle = -Math.PI / 2;
    aimPower = 0;
    aimDirection = 1;
    selectedPyramid = null;
    animationTime = 0;
    entranceProgress = 0;
    fallingBottles = [];
    particleEffects = [];

    // Create ball at bottom center
    ball = {
      x: W / 2,
      y: H - 60,
      vx: 0,
      vy: 0,
      radius: 12,
      visible: true
    };

    // Create 4 pyramids in a 2x2 grid
    // Top row: pyramids 0, 1 | Bottom row: pyramids 2, 3
    const pyramidWidth = 70;
    const pyramidHeight = 65;
    const gridStartY = 80;
    const gridSpacingY = 150;
    const gridStartX = 55;
    const gridSpacingX = 125;

    pyramids = QUESTION.choices.map((choice, i) => {
      const col = i % 2;
      const row = Math.floor(i / 2);
      const x = gridStartX + col * gridSpacingX + pyramidWidth / 2;
      const y = gridStartY + row * gridSpacingY;

      return {
        x: x,
        y: y,
        width: pyramidWidth,
        height: pyramidHeight,
        choice: choice,
        index: i,
        knocked: false,
        bottles: createPyramidBottles(x, y, pyramidWidth),
        hitbox: {
          x: x - pyramidWidth / 2 - 10,
          y: y - 10,
          w: pyramidWidth + 20,
          h: pyramidHeight + 30
        }
      };
    });

    recalculateTextSizing();
  }

  function createPyramidBottles(cx, y, width) {
    // Create a 3-2-1 pyramid of bottles
    const bottleWidth = 14;
    const bottleHeight = 22;
    const bottles = [];

    // Bottom row (3 bottles)
    for (let i = 0; i < 3; i++) {
      bottles.push({
        x: cx - bottleWidth + i * bottleWidth,
        y: y + bottleHeight * 2,
        w: bottleWidth,
        h: bottleHeight,
        rotation: 0,
        vx: 0,
        vy: 0,
        vr: 0
      });
    }

    // Middle row (2 bottles)
    for (let i = 0; i < 2; i++) {
      bottles.push({
        x: cx - bottleWidth / 2 + i * bottleWidth,
        y: y + bottleHeight,
        w: bottleWidth,
        h: bottleHeight,
        rotation: 0,
        vx: 0,
        vy: 0,
        vr: 0
      });
    }

    // Top row (1 bottle)
    bottles.push({
      x: cx,
      y: y,
      w: bottleWidth,
      h: bottleHeight,
      rotation: 0,
      vx: 0,
      vy: 0,
      vr: 0
    });

    return bottles;
  }

  function recalculateTextSizing() {
    if (!pyramids || pyramids.length === 0) return;

    // Each answer area is about 70px wide, use slightly less for text
    const maxWidth = 65;
    const availableHeight = 50;

    const { fontSize, wrappedTexts } = findOptimalFontSize({
      texts: QUESTION.choices.map(c => c.text),
      maxWidth: maxWidth,
      availableHeight: availableHeight,
      minFont: 14,
      maxFont: 16,
      itemPadding: 2,
      fontFamily: "'Nunito', sans-serif"
    });

    pyramids.forEach((p, i) => {
      p.wrappedText = wrappedTexts[i];
      p.fontSize = fontSize;
    });
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    animationTime += dt;
    entranceProgress = Math.min(1, entranceProgress + dt * 2);

    // Update aim oscillation
    if (gamePhase === 'aiming') {
      aimPower += aimDirection * dt * 80;
      if (aimPower > 100) {
        aimPower = 100;
        aimDirection = -1;
      } else if (aimPower < 30) {
        aimPower = 30;
        aimDirection = 1;
      }
    }

    // Update ball physics
    if (gamePhase === 'throwing' && ball.visible) {
      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;
      ball.vy += 400 * dt; // gravity

      // Check collision with pyramids
      for (const pyramid of pyramids) {
        if (!pyramid.knocked && pointInRect(ball.x, ball.y, pyramid.hitbox)) {
          // Hit this pyramid!
          pyramid.knocked = true;
          selectedPyramid = pyramid;
          gamePhase = 'hitting';
          playSound('crash');

          // Scatter the bottles
          pyramid.bottles.forEach(bottle => {
            const angle = Math.atan2(bottle.y - ball.y, bottle.x - ball.x);
            const force = 150 + Math.random() * 100;
            fallingBottles.push({
              ...bottle,
              vx: Math.cos(angle) * force + (Math.random() - 0.5) * 100,
              vy: Math.sin(angle) * force - 100 - Math.random() * 100,
              vr: (Math.random() - 0.5) * 15
            });
          });

          // Create glass particle effects
          for (let i = 0; i < 20; i++) {
            particleEffects.push({
              x: ball.x,
              y: ball.y,
              vx: (Math.random() - 0.5) * 300,
              vy: -Math.random() * 200 - 50,
              life: 1,
              size: 2 + Math.random() * 4,
              color: ['#FFFFFF', '#E0E0E0', '#87CEEB', '#4ECDC4'][Math.floor(Math.random() * 4)]
            });
          }

          ball.visible = false;

          // Delay before showing result
          setTimeout(() => {
            if (selectedPyramid.choice.is_correct) {
              playSound('correct');
            } else {
              playSound('wrong');
            }
            engine.end(selectedPyramid.choice.is_correct, selectedPyramid.choice.explanation);
          }, 600);

          break;
        }
      }

      // Ball out of bounds
      if (ball.y > H + 50 || ball.x < -50 || ball.x > W + 50) {
        ball.visible = true;
        ball.x = W / 2;
        ball.y = H - 60;
        ball.vx = 0;
        ball.vy = 0;
        gamePhase = 'aiming';
      }
    }

    // Update falling bottles
    fallingBottles.forEach(bottle => {
      bottle.x += bottle.vx * dt;
      bottle.y += bottle.vy * dt;
      bottle.vy += 500 * dt;
      bottle.rotation += bottle.vr * dt;
    });
    fallingBottles = fallingBottles.filter(b => b.y < H + 100);

    // Update particle effects
    particleEffects.forEach(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 400 * dt;
      p.life -= dt * 2;
    });
    particleEffects = particleEffects.filter(p => p.life > 0);
  }

  function drawGame() {
    // Carnival background
    ctx.fillStyle = '#2B1B4E'; // Dark purple carnival night
    ctx.fillRect(0, 0, W, H);

    // Draw carnival tent stripes at top
    const stripeColors = ['#E85D4A', '#F5A742'];
    for (let i = 0; i < 12; i++) {
      ctx.fillStyle = stripeColors[i % 2];
      ctx.beginPath();
      ctx.moveTo(i * 35 - 20, 0);
      ctx.lineTo(i * 35 + 15, 0);
      ctx.lineTo(i * 35 - 5, 50);
      ctx.lineTo(i * 35 - 40, 50);
      ctx.closePath();
      ctx.fill();
    }

    // Counter/shelf
    const counterY = H - 150;
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(0, counterY, W, 20);
    ctx.fillStyle = '#654321';
    ctx.fillRect(0, counterY + 20, W, 130);

    // Draw wood grain
    ctx.strokeStyle = '#5D3A1A';
    ctx.lineWidth = 1;
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      ctx.moveTo(0, counterY + 40 + i * 25);
      ctx.lineTo(W, counterY + 40 + i * 25);
      ctx.stroke();
    }

    // Draw pyramids with entrance animation
    pyramids.forEach((pyramid, index) => {
      const delay = index * 0.15;
      const progress = Math.max(0, Math.min(1, (entranceProgress - delay) * 2));
      const bounceProgress = easeOutBounce(progress);

      if (progress <= 0) return;

      ctx.save();
      ctx.translate(pyramid.x, pyramid.y + pyramid.height / 2);
      ctx.scale(bounceProgress, bounceProgress);
      ctx.translate(-pyramid.x, -(pyramid.y + pyramid.height / 2));

      if (!pyramid.knocked) {
        // Draw standing bottles
        pyramid.bottles.forEach(bottle => {
          drawBottle(bottle.x, bottle.y, bottle.w, bottle.h, 0);
        });
      }

      // Draw answer label below pyramid
      const labelY = pyramid.y + pyramid.height + 25;

      // Label background
      ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
      ctx.beginPath();
      ctx.roundRect(pyramid.x - 35, labelY - 8, 70, pyramid.wrappedText ? pyramid.wrappedText.length * (pyramid.fontSize + 2) + 12 : 30, 4);
      ctx.fill();

      // Letter indicator
      const letters = ['A', 'B', 'C', 'D'];
      drawText(letters[index], pyramid.x, labelY, {
        font: `bold 14px 'Belanosima', sans-serif`,
        color: '#E87A3E'
      });

      // Answer text (wrapped)
      if (pyramid.wrappedText && pyramid.fontSize) {
        const lineHeight = pyramid.fontSize + 2;
        pyramid.wrappedText.forEach((line, lineIndex) => {
          drawText(line, pyramid.x, labelY + 14 + lineIndex * lineHeight, {
            font: `${pyramid.fontSize}px 'Nunito', sans-serif`,
            color: '#FAFAF7'
          });
        });
      }

      ctx.restore();
    });

    // Draw falling bottles
    fallingBottles.forEach(bottle => {
      drawBottle(bottle.x, bottle.y, bottle.w, bottle.h, bottle.rotation);
    });

    // Draw particle effects
    particleEffects.forEach(p => {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.size, p.size * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Draw ball
    if (ball && ball.visible) {
      ctx.save();
      ctx.translate(ball.x, ball.y);
      ctx.scale(1, aspectRatio);

      // Ball shadow
      ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
      ctx.beginPath();
      ctx.arc(3, 3, ball.radius, 0, Math.PI * 2);
      ctx.fill();

      // Ball
      const gradient = ctx.createRadialGradient(-3, -3, 0, 0, 0, ball.radius);
      gradient.addColorStop(0, '#FF6B6B');
      gradient.addColorStop(0.7, '#E85D4A');
      gradient.addColorStop(1, '#C94838');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(0, 0, ball.radius, 0, Math.PI * 2);
      ctx.fill();

      // Highlight
      ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
      ctx.beginPath();
      ctx.arc(-4, -4, ball.radius * 0.3, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    // Draw aim indicator when aiming
    if (gamePhase === 'aiming' && ball.visible) {
      const aimLength = 40 + aimPower * 0.5;
      const endX = ball.x + Math.cos(aimAngle) * aimLength;
      const endY = ball.y + Math.sin(aimAngle) * aimLength;

      // Dashed aim line
      ctx.strokeStyle = '#F5A742';
      ctx.lineWidth = 3;
      ctx.setLineDash([8, 4]);
      ctx.beginPath();
      ctx.moveTo(ball.x, ball.y);
      ctx.lineTo(endX, endY);
      ctx.stroke();
      ctx.setLineDash([]);

      // Arrow head
      const arrowAngle = 0.4;
      ctx.fillStyle = '#F5A742';
      ctx.beginPath();
      ctx.moveTo(endX, endY);
      ctx.lineTo(endX - 12 * Math.cos(aimAngle - arrowAngle), endY - 12 * Math.sin(aimAngle - arrowAngle));
      ctx.lineTo(endX - 12 * Math.cos(aimAngle + arrowAngle), endY - 12 * Math.sin(aimAngle + arrowAngle));
      ctx.closePath();
      ctx.fill();

      // Power indicator bar
      const barWidth = 100;
      const barHeight = 8;
      const barX = W / 2 - barWidth / 2;
      const barY = H - 25;

      ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
      ctx.beginPath();
      ctx.roundRect(barX - 2, barY - 2, barWidth + 4, barHeight + 4, 4);
      ctx.fill();

      const powerPercent = (aimPower - 30) / 70;
      const gradient = ctx.createLinearGradient(barX, 0, barX + barWidth, 0);
      gradient.addColorStop(0, '#4ECDC4');
      gradient.addColorStop(0.5, '#F5A742');
      gradient.addColorStop(1, '#E85D4A');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.roundRect(barX, barY, barWidth * powerPercent, barHeight, 3);
      ctx.fill();
    }
  }

  function drawBottle(x, y, w, h, rotation) {
    ctx.save();
    ctx.translate(x, y + h / 2);
    ctx.scale(1, aspectRatio);
    ctx.rotate(rotation);

    // Bottle body
    const gradient = ctx.createLinearGradient(-w / 2, 0, w / 2, 0);
    gradient.addColorStop(0, '#FFFFFF');
    gradient.addColorStop(0.3, '#E8F4F8');
    gradient.addColorStop(0.7, '#D0E8EF');
    gradient.addColorStop(1, '#B8D8E0');
    ctx.fillStyle = gradient;

    // Main body
    ctx.beginPath();
    ctx.roundRect(-w / 2 + 1, -h / 2 + 6, w - 2, h - 8, 2);
    ctx.fill();

    // Neck
    ctx.fillRect(-w / 4, -h / 2, w / 2, 8);

    // Cap
    ctx.fillStyle = '#E87A3E';
    ctx.beginPath();
    ctx.roundRect(-w / 4 - 1, -h / 2 - 3, w / 2 + 2, 5, 2);
    ctx.fill();

    // Milk inside
    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
    ctx.beginPath();
    ctx.roundRect(-w / 2 + 3, -h / 2 + 10, w - 6, h - 16, 1);
    ctx.fill();

    // Glass shine
    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
    ctx.fillRect(-w / 2 + 2, -h / 2 + 8, 3, h - 12);

    ctx.restore();
  }

  function easeOutBounce(x) {
    const n1 = 7.5625;
    const d1 = 2.75;
    if (x < 1 / d1) {
      return n1 * x * x;
    } else if (x < 2 / d1) {
      return n1 * (x -= 1.5 / d1) * x + 0.75;
    } else if (x < 2.5 / d1) {
      return n1 * (x -= 2.25 / d1) * x + 0.9375;
    } else {
      return n1 * (x -= 2.625 / d1) * x + 0.984375;
    }
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;

    const touch = e.touches[0] || e.changedTouches[0];
    if (!touch) return;

    const { x, y } = screenToLogical(touch.clientX, touch.clientY);

    if (type === 'start') {
      initAudio();
      touchStartX = x;
      touchStartY = y;
      isTouching = true;
    } else if (type === 'move' && isTouching && gamePhase === 'aiming') {
      // Adjust aim angle based on horizontal drag
      const dx = x - touchStartX;
      aimAngle = -Math.PI / 2 + (dx / 100) * (Math.PI / 4);
      aimAngle = Math.max(-Math.PI * 0.85, Math.min(-Math.PI * 0.15, aimAngle));
    } else if (type === 'end' && isTouching) {
      isTouching = false;

      if (gamePhase === 'aiming') {
        // Launch ball
        const power = 4 + aimPower * 0.04;
        ball.vx = Math.cos(aimAngle) * power * 100;
        ball.vy = Math.sin(aimAngle) * power * 100;
        gamePhase = 'throwing';
        playSound('throw');
      }
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mousemove', (e) => {
    if (isTouching) {
      const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
      handleTouch(fakeTouch, 'move');
    }
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
