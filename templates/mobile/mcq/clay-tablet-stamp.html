<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Clay Tablet Stamp</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE - MOBILE                                              ║
  ║  Fills 100% of container, non-uniform scaling, touch input.                  ║
  ║  Logical dimensions: 360×640 (use aspectRatio for proportional shapes)       ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none; /* Prevent default touch behaviors */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      /* Canvas fills viewport via JS, these are fallbacks */
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill viewport
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  Clay Tablet Stamp - Tap clay tablets to stamp your answer                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC',
    // Clay-specific colors
    clayBase: '#C4A882',
    clayDark: '#A08060',
    clayLight: '#D8C4A8',
    clayShadow: '#8A6A48',
    clayHighlight: '#E8D8C0',
    dirtBg: '#8B7355',
    dirtDark: '#6B5540',
    tableTop: '#D2B48C',
  };

  // === SOUND EFFECTS ===
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;

  function getAudioCtx() {
    if (!audioCtx) audioCtx = new AudioCtx();
    return audioCtx;
  }

  function playStampSound() {
    try {
      const ac = getAudioCtx();
      // Deep thud
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(80, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(40, ac.currentTime + 0.15);
      gain.gain.setValueAtTime(0.5, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + 0.2);
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.2);
      // Clay crunch noise
      const noise = ac.createBufferSource();
      const buf = ac.createBuffer(1, ac.sampleRate * 0.1, ac.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
      noise.buffer = buf;
      const noiseGain = ac.createGain();
      noiseGain.gain.setValueAtTime(0.3, ac.currentTime);
      noiseGain.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + 0.1);
      const filter = ac.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 800;
      noise.connect(filter);
      filter.connect(noiseGain);
      noiseGain.connect(ac.destination);
      noise.start(ac.currentTime);
    } catch(e) {}
  }

  function playCorrectSound() {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(440, ac.currentTime);
      osc.frequency.setValueAtTime(554, ac.currentTime + 0.1);
      osc.frequency.setValueAtTime(660, ac.currentTime + 0.2);
      gain.gain.setValueAtTime(0.3, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + 0.4);
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.4);
    } catch(e) {}
  }

  function playWrongSound() {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, ac.currentTime + 0.3);
      gain.gain.setValueAtTime(0.2, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + 0.3);
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.3);
    } catch(e) {}
  }

  // === GAME STATE ===
  let tablets = [];
  let dustParticles = [];
  let gameTime = 0;
  let selectedTablet = null;
  let stampAnimTime = 0;
  let stampAnimDuration = 0.4;
  let stampDone = false;

  function recalculateTextSizing() {
    if (!tablets || tablets.length === 0) return;

    const textMaxWidth = 300;
    const availH = 400;

    const { fontSize, wrappedTexts } = findOptimalFontSize({
      texts: QUESTION.choices.map(c => c.text),
      maxWidth: textMaxWidth,
      availableHeight: availH,
      minFont: 14,
      maxFont: 17,
      itemPadding: 8,
      fontFamily: "'Nunito', sans-serif"
    });

    tablets.forEach((tab, i) => {
      tab.wrappedText = wrappedTexts[i];
      tab.fontSize = fontSize;
    });
  }

  function initGame() {
    tablets = [];
    dustParticles = [];
    gameTime = 0;
    selectedTablet = null;
    stampAnimTime = 0;
    stampDone = false;

    const tabletW = 320;
    const tabletH = 110;
    const gap = 12;
    const totalH = QUESTION.choices.length * tabletH + (QUESTION.choices.length - 1) * gap;
    const startY = (H - totalH) / 2 + 20;
    const startX = (W - tabletW) / 2;

    QUESTION.choices.forEach((choice, i) => {
      tablets.push({
        x: startX,
        y: startY + i * (tabletH + gap),
        w: tabletW,
        h: tabletH,
        choice: choice,
        stamped: false,
        scale: 0,
        alpha: 0,
        entranceDelay: i * 0.08,
        entranceDone: false,
        pressScale: 1,
        shakeX: 0,
        wrappedText: [choice.text],
        fontSize: 16,
        // Clay texture seeds
        cracks: Array.from({ length: 5 }, () => ({
          x1: Math.random() * tabletW,
          y1: Math.random() * tabletH,
          x2: Math.random() * tabletW,
          y2: Math.random() * tabletH,
          width: 0.5 + Math.random() * 1
        })),
        bumps: Array.from({ length: 8 }, () => ({
          x: Math.random() * tabletW,
          y: Math.random() * tabletH,
          r: 2 + Math.random() * 4
        }))
      });
    });

    recalculateTextSizing();
  }

  function spawnDust(x, y) {
    for (let i = 0; i < 15; i++) {
      dustParticles.push({
        x: x + (Math.random() - 0.5) * 60,
        y: y + (Math.random() - 0.5) * 20,
        vx: (Math.random() - 0.5) * 120,
        vy: -Math.random() * 80 - 20,
        size: 2 + Math.random() * 4,
        alpha: 0.7 + Math.random() * 0.3,
        color: Math.random() > 0.5 ? COLORS.clayLight : COLORS.clayBase,
        life: 0.6 + Math.random() * 0.4
      });
    }
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Entrance animations
    tablets.forEach(tab => {
      if (!tab.entranceDone) {
        const elapsed = gameTime - tab.entranceDelay;
        if (elapsed > 0) {
          const t = Math.min(elapsed / 0.35, 1);
          const spring = 1 + Math.sin(t * Math.PI * 2) * 0.15 * (1 - t);
          tab.scale = t * spring;
          tab.alpha = Math.min(t * 1.5, 1);
          if (t >= 1) {
            tab.scale = 1;
            tab.alpha = 1;
            tab.entranceDone = true;
          }
        }
      }
    });

    // Stamp animation
    if (selectedTablet !== null) {
      stampAnimTime += dt;
      const tab = tablets[selectedTablet];
      const t = Math.min(stampAnimTime / stampAnimDuration, 1);

      if (t < 0.3) {
        // Press down
        tab.pressScale = 1 - 0.08 * (t / 0.3);
      } else if (t < 0.5) {
        // Impact bounce
        const bt = (t - 0.3) / 0.2;
        tab.pressScale = 0.92 + 0.12 * bt;
      } else {
        tab.pressScale = 1.0 + 0.04 * Math.sin((t - 0.5) * Math.PI * 4) * (1 - t);
      }

      if (t >= 0.3 && !tab.stamped) {
        tab.stamped = true;
        spawnDust(tab.x + tab.w / 2, tab.y + tab.h / 2);
      }

      if (t >= 1 && !stampDone) {
        stampDone = true;
        const choice = tab.choice;

        // Shake wrong answers
        if (!choice.is_correct) {
          playWrongSound();
          const shakeStart = performance.now();
          const animateShake = (now) => {
            const st = Math.min((now - shakeStart) / 400, 1);
            const decay = 1 - st;
            tab.shakeX = Math.sin(st * Math.PI * 10) * 8 * decay;
            if (st < 1) requestAnimationFrame(animateShake);
            else {
              tab.shakeX = 0;
              setTimeout(() => engine.end(false, choice.explanation), 200);
            }
          };
          requestAnimationFrame(animateShake);
        } else {
          playCorrectSound();
          setTimeout(() => engine.end(true, choice.explanation), 300);
        }
      }
    }

    // Update dust particles
    dustParticles.forEach(p => {
      p.vy += 120 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.alpha -= dt * 1.2;
      p.life -= dt;
    });
    dustParticles = dustParticles.filter(p => p.life > 0 && p.alpha > 0);
  }

  function drawTablet(tab, index) {
    const { x, y, w, h, scale, alpha, pressScale, shakeX, stamped } = tab;

    if (alpha <= 0) return;

    ctx.save();
    ctx.globalAlpha = alpha;

    const cx = x + w / 2 + shakeX;
    const cy = y + h / 2;

    ctx.translate(cx, cy);
    ctx.scale(scale * pressScale, scale * pressScale * aspectRatio);
    ctx.translate(-w / 2, -h / 2);

    // Drop shadow
    ctx.fillStyle = 'rgba(80, 60, 40, 0.3)';
    ctx.beginPath();
    ctx.roundRect(3, 4, w, h, 8);
    ctx.fill();

    // Clay base
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, COLORS.clayHighlight);
    grad.addColorStop(0.3, COLORS.clayBase);
    grad.addColorStop(0.7, COLORS.clayBase);
    grad.addColorStop(1, COLORS.clayDark);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(0, 0, w, h, 8);
    ctx.fill();

    // Clay edge bevel
    ctx.strokeStyle = COLORS.clayLight;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(8, 1);
    ctx.lineTo(w - 8, 1);
    ctx.stroke();

    ctx.strokeStyle = COLORS.clayShadow;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(8, h - 1);
    ctx.lineTo(w - 8, h - 1);
    ctx.stroke();

    // Surface texture - subtle cracks
    ctx.strokeStyle = 'rgba(120, 90, 60, 0.15)';
    tab.cracks.forEach(crack => {
      ctx.lineWidth = crack.width;
      ctx.beginPath();
      ctx.moveTo(crack.x1, crack.y1);
      ctx.lineTo(crack.x2, crack.y2);
      ctx.stroke();
    });

    // Surface bumps
    tab.bumps.forEach(bump => {
      ctx.fillStyle = 'rgba(200, 180, 150, 0.2)';
      ctx.beginPath();
      ctx.arc(bump.x, bump.y, bump.r, 0, Math.PI * 2);
      ctx.fill();
    });

    // Stamp impression effect when stamped
    if (stamped) {
      // Pressed-in indent
      ctx.fillStyle = 'rgba(100, 75, 50, 0.2)';
      ctx.beginPath();
      ctx.roundRect(15, 12, w - 30, h - 24, 4);
      ctx.fill();

      // Inner shadow for impression
      ctx.strokeStyle = 'rgba(80, 60, 40, 0.3)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.roundRect(15, 12, w - 30, h - 24, 4);
      ctx.stroke();

      // Color the stamped tablet based on correctness
      if (tab.choice.is_correct) {
        ctx.fillStyle = 'rgba(107, 191, 89, 0.25)';
        ctx.beginPath();
        ctx.roundRect(0, 0, w, h, 8);
        ctx.fill();
      } else {
        ctx.fillStyle = 'rgba(232, 93, 74, 0.25)';
        ctx.beginPath();
        ctx.roundRect(0, 0, w, h, 8);
        ctx.fill();
      }
    }

    // Letter label (A, B, C, D)
    const label = String.fromCharCode(65 + index);
    ctx.save();
    ctx.translate(22, h / 2);
    const adj = getTextScaleAdjustment();
    // Undo the aspectRatio from the parent transform for text
    ctx.scale(adj / aspectRatio * (1 / pressScale), adj / aspectRatio * (1 / (pressScale * aspectRatio)));
    ctx.font = "700 20px 'Belanosima', sans-serif";
    ctx.fillStyle = stamped ? COLORS.clayShadow : COLORS.orangeHover;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    // Answer text
    const lines = tab.wrappedText || [tab.choice.text];
    const fontSize = tab.fontSize || 16;
    const lineHeight = fontSize + 3;
    const textStartY = h / 2 - ((lines.length - 1) * lineHeight) / 2;

    lines.forEach((line, li) => {
      ctx.save();
      ctx.translate(w / 2 + 10, textStartY + li * lineHeight);
      ctx.scale(adj / aspectRatio * (1 / pressScale), adj / aspectRatio * (1 / (pressScale * aspectRatio)));
      ctx.font = `500 ${fontSize}px 'Nunito', sans-serif`;
      ctx.fillStyle = stamped ? COLORS.clayShadow : COLORS.textPrimary;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(line, 0, 0);
      ctx.restore();
    });

    ctx.restore();
  }

  function drawGame() {
    // Background - warm earth tone
    const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
    bgGrad.addColorStop(0, '#C4A46C');
    bgGrad.addColorStop(0.3, '#B89860');
    bgGrad.addColorStop(0.7, '#A88B55');
    bgGrad.addColorStop(1, '#8B7345');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    // Subtle grain/dirt texture
    ctx.fillStyle = 'rgba(120, 90, 50, 0.08)';
    for (let i = 0; i < 40; i++) {
      const gx = ((i * 97 + 31) % W);
      const gy = ((i * 73 + 17) % H);
      ctx.beginPath();
      ctx.ellipse(gx, gy, 3 + (i % 5), (3 + (i % 4)) * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Work surface line
    ctx.strokeStyle = 'rgba(100, 75, 45, 0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(20, 60);
    ctx.lineTo(W - 20, 60);
    ctx.stroke();

    // Draw tablets
    tablets.forEach((tab, i) => drawTablet(tab, i));

    // Draw dust particles
    dustParticles.forEach(p => {
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.size, p.size * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;
    if (selectedTablet !== null) return; // Already stamping

    if (type === 'start') {
      const touch = e.touches[0] || e.changedTouches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      for (let i = 0; i < tablets.length; i++) {
        const tab = tablets[i];
        if (!tab.entranceDone) continue;
        if (pointInRect(x, y, tab)) {
          selectedTablet = i;
          stampAnimTime = 0;
          stampDone = false;
          playStampSound();
          break;
        }
      }
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
