<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Old Film Strip Develop</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE - MOBILE                                              ║
  ║  Fills 100% of container, non-uniform scaling, touch input.                  ║
  ║  Logical dimensions: 360×640 (use aspectRatio for proportional shapes)       ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none; /* Prevent default touch behaviors */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      /* Canvas fills viewport via JS, these are fallbacks */
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill viewport
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  Old Film Strip Develop - Scroll horizontal film strip, tap to develop     ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgDark: '#1C1C1A',
    filmStrip: '#2A2A27',
    filmEdge: '#363633',
    sprocketHole: '#1C1C1A',
    negativeBase: '#1a1510',
    negativeTint: '#c4a050',
    sepiaBg: '#f0e6d0',
    sepiaText: '#3a2a15',
    sepiaAccent: '#8B6914',
    developed: '#e8d8b8',
    orange: '#E87A3E',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    textLight: '#F5F5F0',
    textDim: '#8C8C84',
    success: '#6BBF59',
    error: '#E85D4A',
  };

  // === AUDIO ===
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playClickSound() {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.frequency.value = 600;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.15, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.1);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.1);
    } catch(e) {}
  }

  function playDevelopSound() {
    try {
      const ac = getAudioCtx();
      // Camera shutter / film develop sound
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      const osc2 = ac.createOscillator();
      const gain2 = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);
      osc2.connect(gain2);
      gain2.connect(ac.destination);
      osc.frequency.setValueAtTime(800, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(200, ac.currentTime + 0.15);
      osc.type = 'triangle';
      gain.gain.setValueAtTime(0.2, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.2);
      osc2.frequency.value = 120;
      osc2.type = 'square';
      gain2.gain.setValueAtTime(0.08, ac.currentTime + 0.05);
      gain2.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.15);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.2);
      osc2.start(ac.currentTime + 0.05);
      osc2.stop(ac.currentTime + 0.15);
    } catch(e) {}
  }

  function playCorrectSound() {
    try {
      const ac = getAudioCtx();
      [0, 0.1, 0.2].forEach((delay, i) => {
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.frequency.value = [523, 659, 784][i];
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.15, ac.currentTime + delay);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + delay + 0.3);
        osc.start(ac.currentTime + delay);
        osc.stop(ac.currentTime + delay + 0.3);
      });
    } catch(e) {}
  }

  function playWrongSound() {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.frequency.setValueAtTime(300, ac.currentTime);
      osc.frequency.linearRampToValueAtTime(150, ac.currentTime + 0.3);
      osc.type = 'sawtooth';
      gain.gain.setValueAtTime(0.12, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.3);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.3);
    } catch(e) {}
  }

  // === GAME STATE ===
  let frames = [];
  let scrollOffset = 0;
  let scrollVelocity = 0;
  let selectedFrame = null;
  let developProgress = 0;
  let developingFrame = null;
  let gameTime = 0;
  let entranceProgress = 0;
  let answered = false;
  let shakeTime = 0;
  let shakeIntensity = 0;
  let particles = [];

  // Film strip layout constants
  const FILM_EDGE_HEIGHT = 20;
  const SPROCKET_SIZE = 10;
  const SPROCKET_SPACING = 40;
  const FRAME_WIDTH = 280;
  const FRAME_HEIGHT = 340;
  const FRAME_GAP = 24;
  const FRAME_Y = (H - FRAME_HEIGHT) / 2 - 10;
  const STRIP_Y = FRAME_Y - FILM_EDGE_HEIGHT - 8;
  const STRIP_HEIGHT = FRAME_HEIGHT + FILM_EDGE_HEIGHT * 2 + 16;

  function recalculateTextSizing() {
    if (!frames || frames.length === 0) return;
    const textWidth = FRAME_WIDTH - 40;
    const { fontSize, wrappedTexts } = findOptimalFontSize({
      texts: QUESTION.choices.map(c => c.text),
      maxWidth: textWidth,
      availableHeight: FRAME_HEIGHT - 60,
      minFont: 14,
      maxFont: 18,
      fontFamily: "'Nunito', sans-serif"
    });
    frames.forEach((f, i) => {
      f.wrappedText = wrappedTexts[i];
      f.fontSize = fontSize;
    });
  }

  function initGame() {
    frames = QUESTION.choices.map((choice, i) => ({
      choice: choice,
      index: i,
      x: i * (FRAME_WIDTH + FRAME_GAP),
      developed: false,
      developProgress: 0,
      scale: 0,
      alpha: 0,
      shakeX: 0,
      wrappedText: null,
      fontSize: 16,
      glowAlpha: 0,
    }));

    scrollOffset = 0;
    scrollVelocity = 0;
    selectedFrame = null;
    developProgress = 0;
    developingFrame = null;
    gameTime = 0;
    entranceProgress = 0;
    answered = false;
    shakeTime = 0;
    shakeIntensity = 0;
    particles = [];

    // Center the strip so first frame is roughly centered
    const totalWidth = frames.length * (FRAME_WIDTH + FRAME_GAP) - FRAME_GAP;
    scrollOffset = -(totalWidth - W) / 2;

    recalculateTextSizing();
  }

  function spawnDevelopParticles(x, y) {
    const colors = [COLORS.amber, COLORS.orange, '#d4a040', '#c89030', COLORS.sepiaBg];
    for (let i = 0; i < 20; i++) {
      particles.push({
        x: x + (Math.random() - 0.5) * FRAME_WIDTH * 0.6,
        y: y + (Math.random() - 0.5) * FRAME_HEIGHT * 0.3,
        vx: (Math.random() - 0.5) * 80,
        vy: -Math.random() * 60 - 20,
        size: 2 + Math.random() * 4,
        color: colors[Math.floor(Math.random() * colors.length)],
        alpha: 1,
        life: 0.6 + Math.random() * 0.4,
      });
    }
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Entrance animation
    if (entranceProgress < 1) {
      entranceProgress = Math.min(1, entranceProgress + dt * 2.5);
      frames.forEach((f, i) => {
        const staggerT = Math.max(0, Math.min(1, (entranceProgress - i * 0.08) * 2));
        const spring = 1 + Math.sin(staggerT * Math.PI * 2) * 0.2 * (1 - staggerT);
        f.scale = staggerT * spring;
        f.alpha = staggerT;
      });
    }

    // Scroll momentum
    scrollOffset += scrollVelocity * dt;
    scrollVelocity *= 0.92;

    // Clamp scroll bounds
    const totalWidth = frames.length * (FRAME_WIDTH + FRAME_GAP) - FRAME_GAP;
    const minScroll = -(totalWidth - W) - 60;
    const maxScroll = 60;
    if (scrollOffset < minScroll) {
      scrollOffset = minScroll;
      scrollVelocity = 0;
    }
    if (scrollOffset > maxScroll) {
      scrollOffset = maxScroll;
      scrollVelocity = 0;
    }

    // Developing animation
    if (developingFrame !== null && !answered) {
      developProgress += dt * 2.0;
      frames[developingFrame].developProgress = Math.min(1, developProgress);

      if (developProgress >= 1) {
        frames[developingFrame].developed = true;
        answered = true;
        const choice = frames[developingFrame].choice;

        // Center on the selected frame
        const targetX = -(frames[developingFrame].x - (W - FRAME_WIDTH) / 2);
        scrollOffset = targetX;

        spawnDevelopParticles(
          frames[developingFrame].x + scrollOffset + FRAME_WIDTH / 2,
          FRAME_Y + FRAME_HEIGHT / 2
        );

        if (choice.is_correct) {
          playCorrectSound();
          frames[developingFrame].glowAlpha = 1;
        } else {
          playWrongSound();
          shakeTime = 0.4;
          shakeIntensity = 8;
        }

        setTimeout(() => {
          engine.end(choice.is_correct, choice.explanation);
        }, 600);
      }
    }

    // Shake effect
    if (shakeTime > 0) {
      shakeTime -= dt;
      const decay = shakeTime / 0.4;
      if (developingFrame !== null) {
        frames[developingFrame].shakeX = Math.sin(gameTime * 60) * shakeIntensity * decay;
      }
    } else {
      frames.forEach(f => f.shakeX = 0);
    }

    // Glow pulse
    frames.forEach(f => {
      if (f.glowAlpha > 0) {
        f.glowAlpha = 0.5 + 0.5 * Math.sin(gameTime * 6);
      }
    });

    // Update particles
    particles.forEach(p => {
      p.vy += 80 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.alpha -= dt * 1.2;
    });
    particles = particles.filter(p => p.alpha > 0);
  }

  function drawSprocketHoles(stripX, stripY, stripWidth, stripH) {
    // Top edge sprocket holes
    const topY = stripY + FILM_EDGE_HEIGHT / 2;
    const bottomY = stripY + stripH - FILM_EDGE_HEIGHT / 2;
    const holeW = SPROCKET_SIZE * 0.7;
    const holeH = SPROCKET_SIZE * 0.5 * aspectRatio;

    for (let sx = stripX + 15; sx < stripX + stripWidth; sx += SPROCKET_SPACING) {
      // Top holes
      ctx.fillStyle = COLORS.sprocketHole;
      ctx.beginPath();
      ctx.roundRect(sx - holeW / 2, topY - holeH / 2, holeW, holeH, 2);
      ctx.fill();

      // Bottom holes
      ctx.beginPath();
      ctx.roundRect(sx - holeW / 2, bottomY - holeH / 2, holeW, holeH, 2);
      ctx.fill();
    }
  }

  function drawNegativeFrame(frame, fx, fy) {
    // Negative image: inverted / dark with amber tint text
    ctx.fillStyle = COLORS.negativeBase;
    ctx.fillRect(fx + 4, fy + 4, FRAME_WIDTH - 8, FRAME_HEIGHT - 8);

    // Negative grain overlay
    ctx.fillStyle = 'rgba(180, 150, 80, 0.06)';
    for (let gx = fx + 8; gx < fx + FRAME_WIDTH - 8; gx += 6) {
      for (let gy = fy + 8; gy < fy + FRAME_HEIGHT - 8; gy += 6) {
        if (Math.random() > 0.5) {
          ctx.fillRect(gx, gy, 3, 3 * aspectRatio);
        }
      }
    }

    // Draw text as "negative" (light amber on dark)
    const lines = frame.wrappedText || [frame.choice.text];
    const fontSize = frame.fontSize || 16;
    const lineHeight = fontSize + 4;
    const totalTextHeight = lines.length * lineHeight;
    const startY = fy + (FRAME_HEIGHT - totalTextHeight) / 2 + fontSize / 2;

    lines.forEach((line, i) => {
      drawText(line, fx + FRAME_WIDTH / 2, startY + i * lineHeight, {
        font: `500 ${fontSize}px 'Nunito', sans-serif`,
        color: COLORS.negativeTint,
        align: 'center',
        baseline: 'middle'
      });
    });

    // Negative border marks
    ctx.strokeStyle = 'rgba(200, 170, 80, 0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(fx + 8, fy + 8, FRAME_WIDTH - 16, FRAME_HEIGHT - 16);
  }

  function drawDevelopingFrame(frame, fx, fy) {
    const p = frame.developProgress;

    // Reveal wipe effect: sepia washes down from top
    ctx.save();
    ctx.beginPath();
    ctx.rect(fx + 4, fy + 4, FRAME_WIDTH - 8, (FRAME_HEIGHT - 8) * p);
    ctx.clip();

    // Sepia developed background
    ctx.fillStyle = COLORS.sepiaBg;
    ctx.fillRect(fx + 4, fy + 4, FRAME_WIDTH - 8, FRAME_HEIGHT - 8);

    // Light vignette
    const vigGrd = ctx.createRadialGradient(
      fx + FRAME_WIDTH / 2, fy + FRAME_HEIGHT / 2, FRAME_WIDTH * 0.2,
      fx + FRAME_WIDTH / 2, fy + FRAME_HEIGHT / 2, FRAME_WIDTH * 0.6
    );
    vigGrd.addColorStop(0, 'rgba(240, 230, 208, 0)');
    vigGrd.addColorStop(1, 'rgba(140, 120, 80, 0.15)');
    ctx.fillStyle = vigGrd;
    ctx.fillRect(fx + 4, fy + 4, FRAME_WIDTH - 8, FRAME_HEIGHT - 8);

    // Draw text in sepia
    const lines = frame.wrappedText || [frame.choice.text];
    const fontSize = frame.fontSize || 16;
    const lineHeight = fontSize + 4;
    const totalTextHeight = lines.length * lineHeight;
    const startY = fy + (FRAME_HEIGHT - totalTextHeight) / 2 + fontSize / 2;

    lines.forEach((line, i) => {
      drawText(line, fx + FRAME_WIDTH / 2, startY + i * lineHeight, {
        font: `600 ${fontSize}px 'Nunito', sans-serif`,
        color: COLORS.sepiaText,
        align: 'center',
        baseline: 'middle'
      });
    });

    ctx.restore();

    // Remaining negative portion below the wipe
    if (p < 1) {
      ctx.save();
      ctx.beginPath();
      ctx.rect(fx + 4, fy + 4 + (FRAME_HEIGHT - 8) * p, FRAME_WIDTH - 8, (FRAME_HEIGHT - 8) * (1 - p));
      ctx.clip();
      drawNegativeFrame(frame, fx, fy);
      ctx.restore();
    }

    // Sepia border
    ctx.strokeStyle = COLORS.sepiaAccent;
    ctx.lineWidth = 2;
    ctx.strokeRect(fx + 6, fy + 6, FRAME_WIDTH - 12, FRAME_HEIGHT - 12);
  }

  function drawDevelopedFrame(frame, fx, fy) {
    // Full sepia frame
    ctx.fillStyle = COLORS.sepiaBg;
    ctx.fillRect(fx + 4, fy + 4, FRAME_WIDTH - 8, FRAME_HEIGHT - 8);

    // Vignette
    const vigGrd = ctx.createRadialGradient(
      fx + FRAME_WIDTH / 2, fy + FRAME_HEIGHT / 2, FRAME_WIDTH * 0.2,
      fx + FRAME_WIDTH / 2, fy + FRAME_HEIGHT / 2, FRAME_WIDTH * 0.6
    );
    vigGrd.addColorStop(0, 'rgba(240, 230, 208, 0)');
    vigGrd.addColorStop(1, 'rgba(140, 120, 80, 0.15)');
    ctx.fillStyle = vigGrd;
    ctx.fillRect(fx + 4, fy + 4, FRAME_WIDTH - 8, FRAME_HEIGHT - 8);

    // Text in sepia
    const lines = frame.wrappedText || [frame.choice.text];
    const fontSize = frame.fontSize || 16;
    const lineHeight = fontSize + 4;
    const totalTextHeight = lines.length * lineHeight;
    const startY = fy + (FRAME_HEIGHT - totalTextHeight) / 2 + fontSize / 2;

    lines.forEach((line, i) => {
      drawText(line, fx + FRAME_WIDTH / 2, startY + i * lineHeight, {
        font: `600 ${fontSize}px 'Nunito', sans-serif`,
        color: COLORS.sepiaText,
        align: 'center',
        baseline: 'middle'
      });
    });

    // Glow for correct answer
    if (frame.glowAlpha > 0) {
      ctx.fillStyle = `rgba(107, 191, 89, ${frame.glowAlpha * 0.2})`;
      ctx.fillRect(fx + 4, fy + 4, FRAME_WIDTH - 8, FRAME_HEIGHT - 8);
      ctx.strokeStyle = `rgba(107, 191, 89, ${frame.glowAlpha * 0.8})`;
      ctx.lineWidth = 3;
      ctx.strokeRect(fx + 6, fy + 6, FRAME_WIDTH - 12, FRAME_HEIGHT - 12);
    }

    // Sepia border
    ctx.strokeStyle = COLORS.sepiaAccent;
    ctx.lineWidth = 2;
    ctx.strokeRect(fx + 6, fy + 6, FRAME_WIDTH - 12, FRAME_HEIGHT - 12);
  }

  function drawGame() {
    // Dark background
    ctx.fillStyle = COLORS.bgDark;
    ctx.fillRect(0, 0, W, H);

    // Film grain overlay
    ctx.fillStyle = 'rgba(255, 255, 255, 0.01)';
    for (let i = 0; i < 40; i++) {
      const gx = Math.random() * W;
      const gy = Math.random() * H;
      ctx.fillRect(gx, gy, 1, 1);
    }

    // Film strip background
    const stripStartX = scrollOffset - 40;
    const totalWidth = frames.length * (FRAME_WIDTH + FRAME_GAP) + 80;

    // Film strip body
    ctx.fillStyle = COLORS.filmStrip;
    ctx.fillRect(stripStartX, STRIP_Y, totalWidth, STRIP_HEIGHT);

    // Film strip top/bottom edges
    ctx.fillStyle = COLORS.filmEdge;
    ctx.fillRect(stripStartX, STRIP_Y, totalWidth, FILM_EDGE_HEIGHT);
    ctx.fillRect(stripStartX, STRIP_Y + STRIP_HEIGHT - FILM_EDGE_HEIGHT, totalWidth, FILM_EDGE_HEIGHT);

    // Sprocket holes
    drawSprocketHoles(stripStartX, STRIP_Y, totalWidth, STRIP_HEIGHT);

    // Frame number labels on top edge
    frames.forEach((frame, i) => {
      const fx = frame.x + scrollOffset;
      if (fx > -FRAME_WIDTH && fx < W + FRAME_WIDTH) {
        drawText(`${i + 1}A`, fx + FRAME_WIDTH / 2, STRIP_Y + FILM_EDGE_HEIGHT / 2, {
          font: "400 14px 'Nunito Sans', sans-serif",
          color: 'rgba(200, 180, 120, 0.5)',
          align: 'center',
          baseline: 'middle'
        });
      }
    });

    // Draw frames
    frames.forEach((frame) => {
      const fx = frame.x + scrollOffset + frame.shakeX;
      const fy = FRAME_Y;

      // Skip off-screen frames
      if (fx > W + FRAME_WIDTH || fx < -FRAME_WIDTH * 2) return;

      ctx.save();

      // Entrance scale animation
      if (frame.scale < 1) {
        ctx.translate(fx + FRAME_WIDTH / 2, fy + FRAME_HEIGHT / 2);
        ctx.scale(frame.scale, frame.scale);
        ctx.translate(-(fx + FRAME_WIDTH / 2), -(fy + FRAME_HEIGHT / 2));
        ctx.globalAlpha = frame.alpha;
      }

      // Frame outer border
      ctx.fillStyle = '#3a3a35';
      ctx.fillRect(fx, fy, FRAME_WIDTH, FRAME_HEIGHT);

      // Inner frame border
      ctx.strokeStyle = '#555550';
      ctx.lineWidth = 1;
      ctx.strokeRect(fx + 2, fy + 2, FRAME_WIDTH - 4, FRAME_HEIGHT - 4);

      if (frame.developed) {
        drawDevelopedFrame(frame, fx, fy);
      } else if (frame.developProgress > 0) {
        drawDevelopingFrame(frame, fx, fy);
      } else {
        drawNegativeFrame(frame, fx, fy);
      }

      ctx.restore();
    });

    // Draw particles
    particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.alpha);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.size, p.size * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });

    // Darkroom ambient light effect - subtle red glow at edges
    const edgeGrd = ctx.createLinearGradient(0, 0, 0, H);
    edgeGrd.addColorStop(0, 'rgba(180, 40, 20, 0.06)');
    edgeGrd.addColorStop(0.3, 'rgba(180, 40, 20, 0)');
    edgeGrd.addColorStop(0.7, 'rgba(180, 40, 20, 0)');
    edgeGrd.addColorStop(1, 'rgba(180, 40, 20, 0.06)');
    ctx.fillStyle = edgeGrd;
    ctx.fillRect(0, 0, W, H);

    // Scroll indicator arrows at edges when scrollable
    const totalW = frames.length * (FRAME_WIDTH + FRAME_GAP) - FRAME_GAP;
    if (scrollOffset < 40) {
      // Right arrow
      ctx.save();
      ctx.globalAlpha = 0.3 + 0.15 * Math.sin(gameTime * 3);
      const arrowY = H / 2;
      ctx.fillStyle = COLORS.amber;
      ctx.beginPath();
      ctx.moveTo(W - 12, arrowY - 12 * aspectRatio);
      ctx.lineTo(W - 4, arrowY);
      ctx.lineTo(W - 12, arrowY + 12 * aspectRatio);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
    if (scrollOffset > -(totalW - W) + 10) {
      // Left arrow
      ctx.save();
      ctx.globalAlpha = 0.3 + 0.15 * Math.sin(gameTime * 3);
      const arrowY = H / 2;
      ctx.fillStyle = COLORS.amber;
      ctx.beginPath();
      ctx.moveTo(12, arrowY - 12 * aspectRatio);
      ctx.lineTo(4, arrowY);
      ctx.lineTo(12, arrowY + 12 * aspectRatio);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
  }

  // === TOUCH HANDLING ===
  let touchStartX = 0;
  let touchStartY = 0;
  let touchStartTime = 0;
  let touchStartOffset = 0;
  let isDragging = false;
  let dragDistance = 0;

  function handleTouch(e, type) {
    if (gameState !== 'playing' || answered) return;

    const touch = e.touches[0] || e.changedTouches[0];
    if (!touch) return;
    const { x, y } = screenToLogical(touch.clientX, touch.clientY);

    if (type === 'start') {
      touchStartX = x;
      touchStartY = y;
      touchStartTime = performance.now();
      touchStartOffset = scrollOffset;
      isDragging = false;
      dragDistance = 0;
      scrollVelocity = 0;
    }

    if (type === 'move') {
      const dx = x - touchStartX;
      dragDistance = Math.abs(dx);

      if (dragDistance > 8) {
        isDragging = true;
        scrollOffset = touchStartOffset + dx;
      }
    }

    if (type === 'end') {
      if (isDragging) {
        // Apply fling velocity
        const elapsed = (performance.now() - touchStartTime) / 1000;
        if (elapsed < 0.3 && dragDistance > 20) {
          const dx = x - touchStartX;
          scrollVelocity = dx / elapsed * 0.3;
        }
      } else {
        // Tap - check if tapped on a frame
        frames.forEach((frame, i) => {
          const fx = frame.x + scrollOffset;
          const fy = FRAME_Y;
          if (x >= fx && x <= fx + FRAME_WIDTH && y >= fy && y <= fy + FRAME_HEIGHT) {
            if (!frame.developed && developingFrame === null) {
              playDevelopSound();
              developingFrame = i;
              developProgress = 0;
            }
          }
        });
      }
      isDragging = false;
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
