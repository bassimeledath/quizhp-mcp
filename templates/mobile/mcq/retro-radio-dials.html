<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Retro Radio Dials</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE - MOBILE                                              ║
  ║  Fills 100% of container, non-uniform scaling, touch input.                  ║
  ║  Logical dimensions: 360×640 (use aspectRatio for proportional shapes)       ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none; /* Prevent default touch behaviors */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      /* Canvas fills viewport via JS, these are fallbacks */
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill viewport
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgDark: '#1C1C1A',
    bgPanel: '#2A2A27',
    bgSurface: '#363633',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    textPrimary: '#F5F5F0',
    textSecondary: '#C2C2B8',
    textTertiary: '#8C8C84',
    borderSubtle: '#424240',
    borderStrong: '#5A5A56',
    screenGlow: '#D4F0A0',
    screenBg: '#2A3A1A',
    dialMetal: '#8C8C84',
    dialDark: '#5A5A54',
    dialHighlight: '#C2C2B8',
  };

  // === AUDIO ===
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playClickSound() {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.frequency.setValueAtTime(800, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(400, ac.currentTime + 0.08);
      gain.gain.setValueAtTime(0.15, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.1);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.1);
    } catch(e) {}
  }

  function playCorrectSound() {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, ac.currentTime);
      osc.frequency.setValueAtTime(659, ac.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, ac.currentTime + 0.2);
      gain.gain.setValueAtTime(0.2, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.4);
    } catch(e) {}
  }

  function playWrongSound() {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, ac.currentTime + 0.3);
      gain.gain.setValueAtTime(0.15, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.3);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.3);
    } catch(e) {}
  }

  function playTuneSound(freq) {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ac.currentTime);
      gain.gain.setValueAtTime(0.08, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.15);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.15);
    } catch(e) {}
  }

  // === GAME STATE ===
  let dials = [];
  let gameTime = 0;
  let selectedIndex = -1;
  let selectionTime = 0;
  let feedbackPhase = ''; // '', 'selected', 'revealing'
  let staticNoise = []; // radio static particles

  // Dial layout: 2x2 grid
  const DIAL_COLS = 2;
  const DIAL_ROWS = 2;
  const DIAL_MARGIN_X = 16;
  const DIAL_MARGIN_Y = 12;
  const DIAL_TOP_Y = 50;
  const DIAL_AREA_W = W - DIAL_MARGIN_X * 2;
  const DIAL_AREA_H = H - DIAL_TOP_Y - 20;
  const DIAL_W = (DIAL_AREA_W - DIAL_MARGIN_X) / 2;
  const DIAL_H = (DIAL_AREA_H - DIAL_MARGIN_Y) / 2;

  function initGame() {
    gameTime = 0;
    selectedIndex = -1;
    selectionTime = 0;
    feedbackPhase = '';
    staticNoise = [];

    // Generate static particles
    for (let i = 0; i < 40; i++) {
      staticNoise.push({
        x: Math.random() * W,
        y: Math.random() * H,
        size: 1 + Math.random() * 2,
        alpha: Math.random() * 0.3,
        speed: 20 + Math.random() * 60
      });
    }

    dials = QUESTION.choices.map((choice, i) => {
      const col = i % DIAL_COLS;
      const row = Math.floor(i / DIAL_COLS);
      const x = DIAL_MARGIN_X + col * (DIAL_W + DIAL_MARGIN_X);
      const y = DIAL_TOP_Y + row * (DIAL_H + DIAL_MARGIN_Y);

      return {
        x: x,
        y: y,
        w: DIAL_W,
        h: DIAL_H,
        choice: choice,
        index: i,
        // Animation state
        scale: 0,
        alpha: 0,
        entranceDelay: i * 80,
        entranceStarted: false,
        entranceDone: false,
        // Interaction state
        pressed: false,
        glowIntensity: 0,
        dialAngle: -0.8 + Math.random() * 0.3, // Start at random "tuned" position
        targetDialAngle: 0,
        // Feedback
        shakeOffset: 0,
        pulseScale: 1,
        // Radio frequency label
        frequency: (88 + Math.random() * 20).toFixed(1),
        // Wrapped text (calculated in recalculateTextSizing)
        wrappedText: [choice.text],
        fontSize: 14,
      };
    });

    recalculateTextSizing();
  }

  function recalculateTextSizing() {
    if (!dials || dials.length === 0) return;

    // Screen area within each dial for text
    const screenW = DIAL_W - 20;
    const screenTextW = screenW - 12;
    const screenH = DIAL_H * 0.38;

    const { fontSize, wrappedTexts } = findOptimalFontSize({
      texts: QUESTION.choices.map(c => c.text),
      maxWidth: screenTextW,
      availableHeight: screenH,
      minFont: 12,
      maxFont: 16,
      itemPadding: 2,
      fontFamily: "'Nunito', sans-serif"
    });

    dials.forEach((dial, i) => {
      dial.wrappedText = wrappedTexts[i];
      dial.fontSize = fontSize;
    });
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Update static noise
    staticNoise.forEach(p => {
      p.y += p.speed * dt;
      if (p.y > H) {
        p.y = -5;
        p.x = Math.random() * W;
      }
      p.alpha = 0.05 + Math.sin(gameTime * 10 + p.x) * 0.1;
    });

    // Update dial entrance animations
    dials.forEach((dial, i) => {
      if (!dial.entranceDone) {
        if (gameTime * 1000 >= dial.entranceDelay && !dial.entranceStarted) {
          dial.entranceStarted = true;
          dial.entranceTime = 0;
        }
        if (dial.entranceStarted) {
          dial.entranceTime += dt;
          const t = Math.min(dial.entranceTime / 0.35, 1);
          // Spring easing
          const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
          dial.scale = t * spring;
          dial.alpha = Math.min(t * 1.5, 1);
          if (t >= 1) {
            dial.entranceDone = true;
            dial.scale = 1;
            dial.alpha = 1;
          }
        }
      }

      // Glow pulsing (ambient)
      if (dial.entranceDone && feedbackPhase === '') {
        dial.glowIntensity = 0.4 + Math.sin(gameTime * 2 + i * 1.2) * 0.2;
      }

      // Dial needle wobble (ambient)
      if (feedbackPhase === '' && dial.entranceDone) {
        dial.dialAngle = -0.6 + Math.sin(gameTime * 1.5 + i * 0.8) * 0.15;
      }
    });

    // Handle selection feedback
    if (feedbackPhase === 'selected') {
      selectionTime += dt;
      const selected = dials[selectedIndex];
      if (selected) {
        // Animate dial needle to center (tuned in)
        selected.dialAngle += (0.0 - selected.dialAngle) * dt * 8;
        selected.glowIntensity = 0.8 + Math.sin(selectionTime * 12) * 0.2;
        selected.pulseScale = 1 + Math.sin(selectionTime * 8) * 0.03;

        // After short delay, end the game
        if (selectionTime > 0.6) {
          const choice = selected.choice;
          if (choice.is_correct) {
            playCorrectSound();
          } else {
            playWrongSound();
            // Shake wrong answers
            dials.forEach((d, idx) => {
              if (idx === selectedIndex) {
                d.shakeOffset = Math.sin(selectionTime * 40) * 6 * Math.max(0, 1 - (selectionTime - 0.6) * 3);
              }
            });
          }
          feedbackPhase = 'revealing';
        }
      }
    }

    if (feedbackPhase === 'revealing') {
      selectionTime += dt;
      const selected = dials[selectedIndex];
      if (selected && selectionTime > 0.9) {
        engine.end(selected.choice.is_correct, selected.choice.explanation);
      }
      // Continue shake for wrong
      if (selected && !selected.choice.is_correct) {
        selected.shakeOffset = Math.sin(selectionTime * 40) * 6 * Math.max(0, 1 - (selectionTime - 0.6) * 3);
      }
    }
  }

  function drawGame() {
    // Background: dark wood-tone surface
    ctx.fillStyle = COLORS.bgDark;
    ctx.fillRect(0, 0, W, H);

    // Subtle wood grain pattern
    ctx.save();
    ctx.globalAlpha = 0.04;
    for (let i = 0; i < 20; i++) {
      ctx.strokeStyle = '#8C7A60';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      const yBase = i * 35 + 10;
      ctx.moveTo(0, yBase);
      for (let x = 0; x < W; x += 10) {
        ctx.lineTo(x, yBase + Math.sin(x * 0.02 + i) * 4);
      }
      ctx.stroke();
    }
    ctx.restore();

    // Draw static noise
    ctx.save();
    staticNoise.forEach(p => {
      ctx.globalAlpha = Math.max(0, p.alpha);
      ctx.fillStyle = COLORS.textTertiary;
      ctx.fillRect(p.x, p.y, p.size, p.size);
    });
    ctx.restore();

    // Draw each radio dial
    dials.forEach((dial, i) => {
      if (dial.alpha <= 0) return;

      ctx.save();

      const cx = dial.x + dial.w / 2;
      const cy = dial.y + dial.h / 2;

      // Apply entrance animation
      ctx.globalAlpha = dial.alpha;
      ctx.translate(cx, cy);
      ctx.scale(dial.scale, dial.scale);
      ctx.translate(-cx, -cy);

      // Apply shake
      const shakeX = dial.shakeOffset || 0;

      const dx = dial.x + shakeX;
      const dy = dial.y;
      const dw = dial.w;
      const dh = dial.h;

      // === RADIO CABINET ===
      // Outer wood cabinet
      const cabinetGrad = ctx.createLinearGradient(dx, dy, dx, dy + dh);
      cabinetGrad.addColorStop(0, '#4A3A2A');
      cabinetGrad.addColorStop(0.3, '#3D3028');
      cabinetGrad.addColorStop(1, '#2A2018');
      ctx.fillStyle = cabinetGrad;
      ctx.beginPath();
      ctx.roundRect(dx, dy, dw, dh, 10);
      ctx.fill();

      // Cabinet border (beveled edge)
      ctx.strokeStyle = '#5A4A38';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.roundRect(dx + 1, dy + 1, dw - 2, dh - 2, 9);
      ctx.stroke();

      // Inner highlight line
      ctx.strokeStyle = 'rgba(180, 150, 100, 0.15)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.roundRect(dx + 3, dy + 3, dw - 6, dh - 6, 7);
      ctx.stroke();

      // === ILLUMINATED SCREEN (answer text area) ===
      const screenX = dx + 10;
      const screenY = dy + 8;
      const screenW = dw - 20;
      const screenH = dh * 0.42;

      // Screen glow behind
      const isSelected = (i === selectedIndex);
      const glowColor = isSelected
        ? (feedbackPhase === 'revealing' && dial.choice.is_correct ? COLORS.success : (feedbackPhase === 'revealing' ? COLORS.error : COLORS.amber))
        : COLORS.screenGlow;
      const glowAmount = dial.glowIntensity || 0.3;

      ctx.save();
      ctx.shadowColor = glowColor;
      ctx.shadowBlur = 8 + glowAmount * 12;
      ctx.fillStyle = COLORS.screenBg;
      ctx.beginPath();
      ctx.roundRect(screenX, screenY, screenW, screenH, 4);
      ctx.fill();
      ctx.restore();

      // Screen background gradient
      const screenGrad = ctx.createLinearGradient(screenX, screenY, screenX, screenY + screenH);
      if (isSelected && feedbackPhase === 'revealing') {
        if (dial.choice.is_correct) {
          screenGrad.addColorStop(0, '#1A3A1A');
          screenGrad.addColorStop(1, '#0D2A0D');
        } else {
          screenGrad.addColorStop(0, '#3A1A1A');
          screenGrad.addColorStop(1, '#2A0D0D');
        }
      } else {
        screenGrad.addColorStop(0, '#2A3A1A');
        screenGrad.addColorStop(1, '#1A2A10');
      }
      ctx.fillStyle = screenGrad;
      ctx.beginPath();
      ctx.roundRect(screenX, screenY, screenW, screenH, 4);
      ctx.fill();

      // Screen scan lines effect
      ctx.save();
      ctx.globalAlpha = 0.08;
      for (let sl = 0; sl < screenH; sl += 2) {
        ctx.fillStyle = '#000';
        ctx.fillRect(screenX, screenY + sl, screenW, 1);
      }
      ctx.restore();

      // Screen border
      ctx.strokeStyle = '#1A1A18';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.roundRect(screenX, screenY, screenW, screenH, 4);
      ctx.stroke();

      // === ANSWER TEXT ON SCREEN ===
      const textColor = isSelected && feedbackPhase === 'revealing'
        ? (dial.choice.is_correct ? '#90EE90' : '#FF9090')
        : COLORS.screenGlow;

      const lines = dial.wrappedText || [dial.choice.text];
      const fontSize = dial.fontSize || 14;
      const lineHeight = fontSize + 3;
      const totalTextH = lines.length * lineHeight;
      const textStartY = screenY + (screenH - totalTextH) / 2 + fontSize / 2;

      lines.forEach((line, li) => {
        drawText(line, screenX + screenW / 2, textStartY + li * lineHeight, {
          font: `500 ${fontSize}px 'Nunito', sans-serif`,
          color: textColor,
          align: 'center',
          baseline: 'middle'
        });
      });

      // === FREQUENCY LABEL ===
      const freqY = screenY + screenH + 6;
      drawText(dial.frequency + ' MHz', dx + dw / 2, freqY + 6, {
        font: "600 14px 'Nunito Sans', sans-serif",
        color: COLORS.amber,
        align: 'center',
        baseline: 'middle'
      });

      // === TUNING DIAL (large circular knob) ===
      const dialCx = dx + dw / 2;
      const dialRegionTop = freqY + 16;
      const dialRegionH = dy + dh - dialRegionTop - 8;
      const dialCy = dialRegionTop + dialRegionH / 2;
      const dialR = Math.min(dw * 0.22, dialRegionH * 0.42);

      // Dial shadow
      ctx.save();
      ctx.beginPath();
      ctx.ellipse(dialCx, dialCy + 2, dialR + 2, (dialR + 2) * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fill();
      ctx.restore();

      // Dial base ring
      const ringGrad = ctx.createRadialGradient(dialCx - dialR * 0.3, dialCy - dialR * 0.3 * aspectRatio, 0, dialCx, dialCy, dialR * 1.2);
      ringGrad.addColorStop(0, '#A0A098');
      ringGrad.addColorStop(0.5, '#6A6A64');
      ringGrad.addColorStop(1, '#3A3A34');
      ctx.beginPath();
      ctx.ellipse(dialCx, dialCy, dialR, dialR * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fillStyle = ringGrad;
      ctx.fill();

      // Dial inner circle (knurled surface)
      const innerR = dialR * 0.8;
      const innerGrad = ctx.createRadialGradient(dialCx - innerR * 0.2, dialCy - innerR * 0.2 * aspectRatio, 0, dialCx, dialCy, innerR * 1.1);
      innerGrad.addColorStop(0, '#7A7A74');
      innerGrad.addColorStop(0.7, '#5A5A54');
      innerGrad.addColorStop(1, '#4A4A44');
      ctx.beginPath();
      ctx.ellipse(dialCx, dialCy, innerR, innerR * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fillStyle = innerGrad;
      ctx.fill();

      // Knurled edge lines around dial
      ctx.save();
      ctx.translate(dialCx, dialCy);
      ctx.scale(1, aspectRatio);
      const knurlCount = 24;
      for (let k = 0; k < knurlCount; k++) {
        const angle = (k / knurlCount) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(Math.cos(angle) * innerR * 0.85, Math.sin(angle) * innerR * 0.85);
        ctx.lineTo(Math.cos(angle) * dialR * 0.95, Math.sin(angle) * dialR * 0.95);
        ctx.strokeStyle = 'rgba(200,200,190,0.2)';
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
      ctx.restore();

      // Dial pointer/indicator line
      const pointerAngle = dial.dialAngle;
      ctx.save();
      ctx.translate(dialCx, dialCy);
      ctx.scale(1, aspectRatio);
      ctx.rotate(pointerAngle);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(0, -innerR * 0.7);
      ctx.strokeStyle = COLORS.orange;
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.stroke();
      // Pointer dot at tip
      ctx.beginPath();
      ctx.arc(0, -innerR * 0.7, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = COLORS.orange;
      ctx.fill();
      ctx.restore();

      // Center cap
      ctx.beginPath();
      ctx.ellipse(dialCx, dialCy, dialR * 0.15, dialR * 0.15 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#8A8A84';
      ctx.fill();
      ctx.strokeStyle = '#5A5A54';
      ctx.lineWidth = 0.5;
      ctx.stroke();

      // Tick marks around dial
      ctx.save();
      ctx.translate(dialCx, dialCy);
      ctx.scale(1, aspectRatio);
      for (let t = 0; t < 11; t++) {
        const tAngle = -1.2 + (t / 10) * 2.4;
        const isCenter = t === 5;
        ctx.beginPath();
        ctx.moveTo(Math.cos(tAngle - Math.PI/2) * (dialR + 3), Math.sin(tAngle - Math.PI/2) * (dialR + 3));
        ctx.lineTo(Math.cos(tAngle - Math.PI/2) * (dialR + (isCenter ? 8 : 6)), Math.sin(tAngle - Math.PI/2) * (dialR + (isCenter ? 8 : 6)));
        ctx.strokeStyle = isCenter ? COLORS.amber : COLORS.textTertiary;
        ctx.lineWidth = isCenter ? 1.5 : 0.8;
        ctx.stroke();
      }
      ctx.restore();

      // === LETTER LABEL (A, B, C, D) ===
      const letterLabels = ['A', 'B', 'C', 'D'];
      drawText(letterLabels[i], dx + 14, dy + dh - 10, {
        font: "700 14px 'Belanosima', sans-serif",
        color: COLORS.amber,
        align: 'center',
        baseline: 'middle'
      });

      // Selection highlight ring
      if (isSelected) {
        ctx.save();
        ctx.strokeStyle = dial.choice.is_correct && feedbackPhase === 'revealing' ? COLORS.success : COLORS.orange;
        ctx.lineWidth = 2.5;
        ctx.shadowColor = dial.choice.is_correct && feedbackPhase === 'revealing' ? COLORS.success : COLORS.orange;
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.roundRect(dx + 1, dy + 1, dw - 2, dh - 2, 9);
        ctx.stroke();
        ctx.restore();
      }

      ctx.restore(); // End dial save
    });
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;
    if (feedbackPhase !== '') return; // Already selected

    if (type === 'start') {
      const touch = e.touches[0] || e.changedTouches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      dials.forEach((dial, i) => {
        if (!dial.entranceDone) return;
        if (pointInRect(x, y, { x: dial.x, y: dial.y, w: dial.w, h: dial.h })) {
          selectedIndex = i;
          feedbackPhase = 'selected';
          selectionTime = 0;
          playClickSound();
          playTuneSound(300 + i * 100);
        }
      });
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
