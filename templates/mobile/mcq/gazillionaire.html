<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Who Wants to Be a Gazillionaire</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a0a1a;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #0a0a1a;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   *
   * @param {string} text - The text to wrap
   * @param {number} maxWidth - Maximum width in logical coordinates
   * @param {string} font - CSS font string (e.g., "16px 'Nunito', sans-serif")
   * @param {number} maxLines - Maximum number of lines (default 3)
   * @returns {string[]} Array of text lines
   */
  function wrapTextUtil(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   * Tries font sizes from max to min until content fits.
   *
   * @param {Object} options
   * @param {string[]} options.texts - Array of text strings to fit
   * @param {number} options.maxWidth - Maximum width for text wrapping
   * @param {number} options.availableHeight - Total height available for all texts
   * @param {number} options.minFont - Minimum font size (default 12)
   * @param {number} options.maxFont - Maximum font size (default 18)
   * @param {number} options.itemPadding - Vertical padding per text item (default 4)
   * @param {string} options.fontFamily - Font family (default "'Nunito Sans', sans-serif")
   * @returns {{ fontSize: number, wrappedTexts: string[][] }} Optimal font size and pre-wrapped texts
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapTextUtil(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - GAZILLIONAIRE                                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // Reduced motion check
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ═══════════════════════════════════════════════════════════════════════════════
  // SOUND SYSTEM - Web Audio API
  // ═══════════════════════════════════════════════════════════════════════════════
  let audioCtx = null;

  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  function playSelectionSound() {
    if (!audioCtx) return;

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.type = 'sine';
    osc.frequency.setValueAtTime(600, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);

    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.15);
  }

  function playLockInSound() {
    if (!audioCtx) return;

    // Dramatic rising tone
    const osc1 = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc1.connect(gain);
    osc2.connect(gain);
    gain.connect(audioCtx.destination);

    osc1.type = 'sine';
    osc2.type = 'triangle';

    osc1.frequency.setValueAtTime(400, audioCtx.currentTime);
    osc1.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.2);

    osc2.frequency.setValueAtTime(200, audioCtx.currentTime);
    osc2.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.2);

    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime + 0.15);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);

    osc1.start();
    osc2.start();
    osc1.stop(audioCtx.currentTime + 0.3);
    osc2.stop(audioCtx.currentTime + 0.3);
  }

  function playCorrectSound() {
    if (!audioCtx) return;

    // Triumphant ascending fanfare
    const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
    const duration = 0.15;

    notes.forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.type = 'triangle';
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * duration);

      gain.gain.setValueAtTime(0, audioCtx.currentTime + i * duration);
      gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + i * duration + 0.02);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime + i * duration + duration * 0.7);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * duration + duration);

      osc.start(audioCtx.currentTime + i * duration);
      osc.stop(audioCtx.currentTime + i * duration + duration + 0.1);
    });

    // Add a shimmering high note at the end
    setTimeout(() => {
      const shimmer = audioCtx.createOscillator();
      const shimmerGain = audioCtx.createGain();
      shimmer.connect(shimmerGain);
      shimmerGain.connect(audioCtx.destination);

      shimmer.type = 'sine';
      shimmer.frequency.setValueAtTime(1567.98, audioCtx.currentTime); // G6
      shimmer.frequency.exponentialRampToValueAtTime(2093, audioCtx.currentTime + 0.3); // C7

      shimmerGain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      shimmerGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);

      shimmer.start();
      shimmer.stop(audioCtx.currentTime + 0.4);
    }, notes.length * duration * 1000);
  }

  function playWrongSound() {
    if (!audioCtx) return;

    // Descending "wah-wah" disappointed sound
    const osc1 = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc1.connect(gain);
    osc2.connect(gain);
    gain.connect(audioCtx.destination);

    osc1.type = 'sawtooth';
    osc2.type = 'sawtooth';

    // Descending tones
    osc1.frequency.setValueAtTime(350, audioCtx.currentTime);
    osc1.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.3);
    osc1.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.6);

    osc2.frequency.setValueAtTime(347, audioCtx.currentTime); // Slight detune for thickness
    osc2.frequency.exponentialRampToValueAtTime(198, audioCtx.currentTime + 0.3);
    osc2.frequency.exponentialRampToValueAtTime(148, audioCtx.currentTime + 0.6);

    // Volume envelope
    gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.12, audioCtx.currentTime + 0.25);
    gain.gain.exponentialRampToValueAtTime(0.08, audioCtx.currentTime + 0.35);
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime + 0.45);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.7);

    osc1.start();
    osc2.start();
    osc1.stop(audioCtx.currentTime + 0.7);
    osc2.stop(audioCtx.currentTime + 0.7);
  }

  // ═══════════════════════════════════════════════════════════════════════════════
  // PARTICLE SYSTEM - Sparkles around prize
  // ═══════════════════════════════════════════════════════════════════════════════
  let sparkleParticles = [];

  function spawnSparkle() {
    if (prefersReducedMotion) return;
    // Spawn sparkles around the prize text area
    const centerX = W/2 + 20;
    const centerY = 70;
    const radius = 80 + Math.random() * 40;
    const angle = Math.random() * Math.PI * 2;

    sparkleParticles.push({
      x: centerX + Math.cos(angle) * radius,
      y: centerY + Math.sin(angle) * (radius * 0.4),
      size: 2 + Math.random() * 3,
      alpha: 0,
      maxAlpha: 0.6 + Math.random() * 0.4,
      phase: Math.random() * Math.PI * 2,
      speed: 1 + Math.random() * 2,
      life: 0,
      maxLife: 1.5 + Math.random() * 1
    });
  }

  function updateSparkles(dt) {
    // Spawn new sparkles periodically
    if (Math.random() < dt * 3 && sparkleParticles.length < 20) {
      spawnSparkle();
    }

    sparkleParticles = sparkleParticles.filter(p => {
      p.life += dt;
      const lifeRatio = p.life / p.maxLife;

      // Fade in, hold, fade out
      if (lifeRatio < 0.2) {
        p.alpha = (lifeRatio / 0.2) * p.maxAlpha;
      } else if (lifeRatio > 0.7) {
        p.alpha = ((1 - lifeRatio) / 0.3) * p.maxAlpha;
      } else {
        p.alpha = p.maxAlpha;
      }

      // Twinkle
      p.size = (2 + Math.random() * 2) * (0.8 + 0.2 * Math.sin(p.phase + p.life * p.speed * 5));

      return p.life < p.maxLife;
    });
  }

  function drawSparkles() {
    sparkleParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;

      // Draw star shape
      ctx.fillStyle = '#FFD700';
      ctx.shadowColor = '#FFD700';
      ctx.shadowBlur = 8;

      ctx.beginPath();
      for (let i = 0; i < 4; i++) {
        const angle = (i / 4) * Math.PI * 2 - Math.PI / 4;
        const len = i % 2 === 0 ? p.size : p.size * 0.4;
        const px = p.x + Math.cos(angle) * len;
        const py = p.y + Math.sin(angle) * len;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    });
  }

  // ═══════════════════════════════════════════════════════════════════════════════
  // ANIMATION SYSTEM
  // ═══════════════════════════════════════════════════════════════════════════════
  let entranceAnimationTime = 0;
  let answersAnimated = false;

  function animateEntrance(dt) {
    if (prefersReducedMotion || answersAnimated) {
      answers.forEach(ans => {
        ans.animOffset = 0;
        ans.animScale = 1;
        ans.animAlpha = 1;
      });
      return;
    }

    entranceAnimationTime += dt;

    answers.forEach((ans, i) => {
      const delay = 0.3 + i * 0.12; // Staggered delay
      const elapsed = entranceAnimationTime - delay;

      if (elapsed < 0) {
        // Not started yet
        ans.animOffset = (i % 2 === 0 ? -1 : 1) * 100; // Alternate sides
        ans.animScale = 0.8;
        ans.animAlpha = 0;
      } else if (elapsed < 0.4) {
        // Animating in
        const t = elapsed / 0.4;
        // Ease out cubic
        const eased = 1 - Math.pow(1 - t, 3);
        ans.animOffset = (i % 2 === 0 ? -1 : 1) * 100 * (1 - eased);
        ans.animScale = 0.8 + 0.2 * eased;
        ans.animAlpha = eased;
      } else {
        // Finished
        ans.animOffset = 0;
        ans.animScale = 1;
        ans.animAlpha = 1;
      }
    });

    // Check if all animations complete
    if (entranceAnimationTime > 0.3 + answers.length * 0.12 + 0.5) {
      answersAnimated = true;
    }
  }

  // Button press animation state
  let buttonPressAnim = null;

  function animateButtonPress(index) {
    if (prefersReducedMotion) return;
    buttonPressAnim = {
      index: index,
      time: 0,
      duration: 0.15
    };
  }

  function updateButtonPress(dt) {
    if (!buttonPressAnim) return;
    buttonPressAnim.time += dt;
    if (buttonPressAnim.time >= buttonPressAnim.duration) {
      buttonPressAnim = null;
    }
  }

  function getButtonPressScale(index) {
    if (!buttonPressAnim || buttonPressAnim.index !== index) return 1;
    const t = buttonPressAnim.time / buttonPressAnim.duration;
    // Quick scale down then back
    return 1 - 0.05 * Math.sin(t * Math.PI);
  }

  // Game state
  let answers = [];
  let selectedAnswer = null;
  let spotlightAngle = 0;
  let prizeGlow = 0;
  let lockInPhase = false;
  let lockInTime = 0;

  // Money ladder amounts (classic WWTBAM style, but with Gazillion at top)
  const moneyLadder = [
    '$100', '$200', '$300', '$500', '$1,000',
    '$2,000', '$4,000', '$8,000', '$16,000', '$32,000',
    '$64,000', '$125,000', '$250,000', '$500,000', '$1 GAZILLION'
  ];

  // Answer labels
  const answerLabels = ['A', 'B', 'C', 'D'];

  function initGame() {
    selectedAnswer = null;
    lockInPhase = false;
    lockInTime = 0;
    entranceAnimationTime = 0;
    answersAnimated = false;
    sparkleParticles = [];

    // Create answer buttons - WWTBAM style vertical stack
    const buttonHeight = 70;
    const buttonGap = 8;
    const startY = 320;
    const buttonWidth = 320;
    const buttonX = (W - buttonWidth) / 2;

    answers = QUESTION.choices.map((choice, i) => ({
      x: buttonX,
      y: startY + i * (buttonHeight + buttonGap),
      w: buttonWidth,
      h: buttonHeight,
      choice: choice,
      label: answerLabels[i],
      hover: false,
      // Animation properties
      animOffset: prefersReducedMotion ? 0 : ((i % 2 === 0 ? -1 : 1) * 100),
      animScale: prefersReducedMotion ? 1 : 0.8,
      animAlpha: prefersReducedMotion ? 1 : 0
    }));

  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    // Animate spotlight
    spotlightAngle += dt * 0.5;

    // Animate prize glow (pulsing effect)
    prizeGlow = (Math.sin(Date.now() / 300) + 1) / 2;

    // Update entrance animations
    animateEntrance(dt);

    // Update sparkle particles
    updateSparkles(dt);

    // Update button press animation
    updateButtonPress(dt);

    // Handle lock-in phase
    if (lockInPhase) {
      lockInTime += dt;
    }
  }

  function drawGame() {
    // Draw dramatic dark blue background with gradient
    const bgGrad = ctx.createRadialGradient(W/2, 0, 0, W/2, H/2, H);
    bgGrad.addColorStop(0, '#1a2a4a');
    bgGrad.addColorStop(0.5, '#0d1a30');
    bgGrad.addColorStop(1, '#050a15');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    // Draw spotlight beams from top
    ctx.save();
    ctx.globalAlpha = 0.15;
    const spotGrad = ctx.createRadialGradient(W/2, -50, 0, W/2, 200, 300);
    spotGrad.addColorStop(0, '#FFD700');
    spotGrad.addColorStop(0.5, '#4a90d9');
    spotGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = spotGrad;
    ctx.beginPath();
    ctx.moveTo(W/2, -50);
    ctx.lineTo(W/2 - 200, 300);
    ctx.lineTo(W/2 + 200, 300);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // Draw money ladder on the left side
    drawMoneyLadder();

    // Draw "THE FINAL QUESTION" header with dramatic styling
    drawFinalQuestionHeader();

    // Draw sparkle particles around prize
    drawSparkles();

    // Draw answer buttons
    drawAnswerButtons();
  }

  function drawMoneyLadder() {
    const ladderX = 8;
    const ladderWidth = 75;
    const startY = 85;
    const rowHeight = 14;

    // Semi-transparent background for ladder
    ctx.fillStyle = 'rgba(0, 20, 50, 0.7)';
    ctx.beginPath();
    ctx.roundRect(ladderX, startY - 5, ladderWidth, moneyLadder.length * rowHeight + 10, 6);
    ctx.fill();

    // Draw border
    ctx.strokeStyle = '#2a4a7a';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Draw each prize level
    for (let i = moneyLadder.length - 1; i >= 0; i--) {
      const y = startY + (moneyLadder.length - 1 - i) * rowHeight;
      const isTop = i === moneyLadder.length - 1;
      const isSafeHaven = i === 4 || i === 9; // $1,000 and $32,000

      if (isTop) {
        // Highlight the top prize with golden glow
        const glowIntensity = 0.3 + prizeGlow * 0.4;
        ctx.save();
        ctx.shadowColor = '#FFD700';
        ctx.shadowBlur = 10 * glowIntensity;
        ctx.fillStyle = '#FFD700';
        ctx.restore();

        drawText(moneyLadder[i], ladderX + ladderWidth/2, y + rowHeight/2, {
          font: "bold 9px 'Nunito Sans', system-ui",
          color: '#F5A742',
          align: 'center'
        });
      } else if (isSafeHaven) {
        // Safe haven levels in white
        drawText(moneyLadder[i], ladderX + ladderWidth/2, y + rowHeight/2, {
          font: "bold 8px 'Nunito Sans', system-ui",
          color: '#FFFFFF',
          align: 'center'
        });
      } else {
        // Other levels in dim blue
        drawText(moneyLadder[i], ladderX + ladderWidth/2, y + rowHeight/2, {
          font: "8px 'Nunito Sans', system-ui",
          color: '#5a8abf',
          align: 'center'
        });
      }
    }

    // Arrow pointing to current (top) level
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.moveTo(ladderX + ladderWidth + 5, startY + rowHeight/2 - 4);
    ctx.lineTo(ladderX + ladderWidth + 12, startY + rowHeight/2);
    ctx.lineTo(ladderX + ladderWidth + 5, startY + rowHeight/2 + 4);
    ctx.closePath();
    ctx.fill();
  }

  function drawFinalQuestionHeader() {
    // "THE FINAL QUESTION" text
    drawText('THE FINAL QUESTION', W/2 + 20, 40, {
      font: "bold 16px 'Nunito Sans', system-ui",
      color: '#FFFFFF',
      align: 'center'
    });

    // Draw the big prize with pulsing glow effect
    const glowIntensity = 15 + prizeGlow * 20;
    const textAdj = getTextScaleAdjustment();

    ctx.save();
    ctx.translate(W/2 + 20, 70);
    ctx.scale(textAdj / aspectRatio, textAdj);

    // Pulsing outer glow layers
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur = glowIntensity;
    ctx.fillStyle = '#FFD700';
    ctx.font = "bold 28px 'Belanosima', system-ui";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Draw multiple times for stronger glow
    ctx.globalAlpha = 0.3 + prizeGlow * 0.2;
    ctx.shadowBlur = glowIntensity * 1.5;
    ctx.fillText('$1 GAZILLION', 0, 0);

    ctx.globalAlpha = 1;
    ctx.shadowBlur = glowIntensity * 0.5;
    ctx.fillText('$1 GAZILLION', 0, 0);

    ctx.restore();

    // Decorative line under prize with glow
    const lineY = 95;
    ctx.save();
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur = 8 + prizeGlow * 6;
    const lineGrad = ctx.createLinearGradient(W/2 - 100, lineY, W/2 + 140, lineY);
    lineGrad.addColorStop(0, 'transparent');
    lineGrad.addColorStop(0.3, '#FFD700');
    lineGrad.addColorStop(0.7, '#FFD700');
    lineGrad.addColorStop(1, 'transparent');
    ctx.strokeStyle = lineGrad;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(W/2 - 80, lineY);
    ctx.lineTo(W/2 + 120, lineY);
    ctx.stroke();
    ctx.restore();
  }

  function drawAnswerButtons() {
    answers.forEach((ans, i) => {
      const isHovered = ans.hover;
      const isSelected = selectedAnswer === i;

      // Get animation values
      const animOffset = ans.animOffset || 0;
      const animScale = ans.animScale || 1;
      const animAlpha = ans.animAlpha !== undefined ? ans.animAlpha : 1;
      const pressScale = getButtonPressScale(i);
      const finalScale = animScale * pressScale;

      // Skip drawing if fully transparent
      if (animAlpha <= 0) return;

      ctx.save();
      ctx.globalAlpha = animAlpha;

      // Apply animation transforms
      const centerX = ans.x + ans.w / 2 + animOffset;
      const centerY = ans.y + ans.h / 2;

      ctx.translate(centerX, centerY);
      ctx.scale(finalScale, finalScale);
      ctx.translate(-ans.w / 2, -ans.h / 2);

      // Button background - classic WWTBAM blue hexagonal style with cyan hover
      const grad = ctx.createLinearGradient(0, 0, 0, ans.h);
      if (isSelected) {
        // Selected: Golden orange from styleguide
        grad.addColorStop(0, '#F5A742');
        grad.addColorStop(0.5, '#E87A3E');
        grad.addColorStop(1, '#D66B31');
      } else if (isHovered) {
        // Hover: Cyan accent from styleguide
        grad.addColorStop(0, '#4ECDC4');
        grad.addColorStop(0.5, '#45B8B0');
        grad.addColorStop(1, '#3AA8A0');
      } else {
        grad.addColorStop(0, '#1a3a6a');
        grad.addColorStop(0.5, '#0d2850');
        grad.addColorStop(1, '#061830');
      }

      // Draw hexagonal-ish button shape
      ctx.fillStyle = grad;
      ctx.beginPath();
      const hexInset = 15;
      ctx.moveTo(hexInset, 0);
      ctx.lineTo(ans.w - hexInset, 0);
      ctx.lineTo(ans.w, ans.h/2);
      ctx.lineTo(ans.w - hexInset, ans.h);
      ctx.lineTo(hexInset, ans.h);
      ctx.lineTo(0, ans.h/2);
      ctx.closePath();
      ctx.fill();

      // Border with glow effect for hover
      if (isHovered && !isSelected) {
        ctx.save();
        ctx.shadowColor = '#4ECDC4';
        ctx.shadowBlur = 12;
        ctx.strokeStyle = '#4ECDC4';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.restore();
      } else {
        ctx.strokeStyle = isSelected ? '#FFFFFF' : '#3a6aa0';
        ctx.lineWidth = isSelected ? 3 : 2;
        ctx.stroke();
      }

      // Inner glow for selected
      if (isSelected) {
        ctx.save();
        ctx.shadowColor = '#F5A742';
        ctx.shadowBlur = 20;
        ctx.strokeStyle = '#FFD700';
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.restore();
      }

      // Answer label (A, B, C, D) in orange diamond
      const labelX = 35;
      const labelY = ans.h/2;

      // Diamond background for label
      ctx.fillStyle = isSelected ? '#FFFFFF' : '#E87A3E';
      ctx.beginPath();
      ctx.moveTo(labelX, labelY - 12);
      ctx.lineTo(labelX + 12, labelY);
      ctx.lineTo(labelX, labelY + 12);
      ctx.lineTo(labelX - 12, labelY);
      ctx.closePath();
      ctx.fill();

      ctx.restore();

      // Draw text without the button transform (using actual positions)
      const actualCenterX = ans.x + ans.w / 2 + animOffset;
      const actualCenterY = ans.y + ans.h / 2;

      ctx.save();
      ctx.globalAlpha = animAlpha;

      // Label letter
      drawText(ans.label, actualCenterX - ans.w/2 + 35, actualCenterY, {
        font: "bold 14px 'Nunito Sans', system-ui",
        color: isSelected ? '#E87A3E' : '#FFFFFF',
        align: 'center'
      });

      // Answer text - wrap if needed
      const textX = actualCenterX - ans.w/2 + 60;
      const maxWidth = ans.w - 80;
      const textColor = isSelected ? '#1a1a1a' : '#FFFFFF';

      // Simple text wrapping
      wrapText(ans.choice.text, textX, actualCenterY, maxWidth, 16, textColor);

      ctx.restore();
    });
  }

  function wrapText(text, x, y, maxWidth, lineHeight, color) {
    const words = text.split(' ');
    let line = '';
    let lines = [];

    // Measure using canvas
    ctx.save();
    const adj = getTextScaleAdjustment();
    ctx.font = "500 16px 'Nunito', sans-serif";

    for (let word of words) {
      const testLine = line + (line ? ' ' : '') + word;
      const metrics = ctx.measureText(testLine);
      // Adjust for our text scaling
      const testWidth = metrics.width * (adj / aspectRatio);

      if (testWidth > maxWidth && line) {
        lines.push(line);
        line = word;
      } else {
        line = testLine;
      }
    }
    lines.push(line);
    ctx.restore();

    // Draw lines centered vertically
    const totalHeight = lines.length * lineHeight;
    const startY = y - totalHeight/2 + lineHeight/2;

    lines.forEach((l, i) => {
      drawText(l, x, startY + i * lineHeight, {
        font: "500 16px 'Nunito', sans-serif",
        color: color,
        align: 'left'
      });
    });
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;

    // Initialize audio on first interaction
    if (!audioCtx) {
      initAudio();
    }

    const touch = e.touches[0] || e.changedTouches[0];
    if (!touch) return;

    const { x, y } = screenToLogical(touch.clientX, touch.clientY);

    if (type === 'start' && !lockInPhase) {
      // Check if touching an answer button
      answers.forEach((ans, i) => {
        // Adjust hit detection for animation offset
        const animOffset = ans.animOffset || 0;
        const hitRect = {
          x: ans.x + animOffset,
          y: ans.y,
          w: ans.w,
          h: ans.h
        };

        if (pointInRect(x, y, hitRect) && ans.animAlpha > 0.5) {
          selectedAnswer = i;
          lockInPhase = true;
          lockInTime = 0;

          // Play selection sound
          playSelectionSound();
          animateButtonPress(i);

          // After selection, play lock-in sound
          setTimeout(() => {
            playLockInSound();
          }, 150);

          // End game after suspenseful delay
          setTimeout(() => {
            if (ans.choice.is_correct) {
              playCorrectSound();
            } else {
              playWrongSound();
            }
            engine.end(ans.choice.is_correct, ans.choice.explanation);
          }, 500);
        }
      });
    }

    // Update hover states (only if not in lock-in phase)
    if (!lockInPhase) {
      if (type === 'start' || type === 'move') {
        answers.forEach((ans, i) => {
          const animOffset = ans.animOffset || 0;
          const hitRect = {
            x: ans.x + animOffset,
            y: ans.y,
            w: ans.w,
            h: ans.h
          };
          ans.hover = pointInRect(x, y, hitRect) && ans.animAlpha > 0.5;
        });
      } else if (type === 'end') {
        answers.forEach(ans => ans.hover = false);
      }
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });


  // Cursor change handler for end screen buttons
  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'ended') {
      canvas.style.cursor = 'default';
      return;
    }
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    if (gameResult) {
      if (pointInRect(x, y, restartButton) || pointInRect(x, y, nextButton)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    } else {
      if (pointInRect(x, y, centeredRestartButton)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    }
    canvas.style.cursor = 'default';
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
