<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Crystal Cluster Shimmer</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE - MOBILE                                              ║
  ║  Fills 100% of container, non-uniform scaling, touch input.                  ║
  ║  Logical dimensions: 360×640 (use aspectRatio for proportional shapes)       ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none; /* Prevent default touch behaviors */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      /* Canvas fills viewport via JS, these are fallbacks */
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill viewport
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  Crystal Cluster Shimmer - MCQ Mobile Game                                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    bgPrimary: '#1C1C1A',
    bgSurface: '#2A2A27',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    textPrimary: '#F5F5F0',
    textSecondary: '#C2C2B8',
    borderSubtle: '#424240',
    peach: '#FFB89D'
  };

  // Crystal palette - each crystal gets a unique luminous color
  const CRYSTAL_COLORS = [
    { base: '#8B5CF6', glow: '#C4B5FD', highlight: '#EDE9FE' },  // Purple
    { base: '#4ECDC4', glow: '#99F6E4', highlight: '#CCFBF1' },  // Cyan
    { base: '#E87A3E', glow: '#FDBA74', highlight: '#FFF7ED' },  // Orange
    { base: '#F5A742', glow: '#FDE68A', highlight: '#FFFBEB' }   // Amber
  ];

  // === GAME STATE ===
  let crystals = [];
  let bgParticles = [];
  let ripples = [];
  let gameTime = 0;
  let selectedCrystal = -1;
  let answerLocked = false;

  // Audio context for sound effects
  let audioCtx = null;

  function getAudioCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
  }

  function playClickSound() {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.frequency.setValueAtTime(800, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1200, ac.currentTime + 0.08);
      gain.gain.setValueAtTime(0.15, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.15);
      osc.type = 'sine';
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.15);
    } catch (e) {}
  }

  function playCorrectSound() {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.frequency.setValueAtTime(523, ac.currentTime);
      osc.frequency.setValueAtTime(659, ac.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, ac.currentTime + 0.2);
      gain.gain.setValueAtTime(0.2, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
      osc.type = 'sine';
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.4);
    } catch (e) {}
  }

  function playWrongSound() {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.frequency.setValueAtTime(300, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(150, ac.currentTime + 0.3);
      gain.gain.setValueAtTime(0.2, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.35);
      osc.type = 'sawtooth';
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.35);
    } catch (e) {}
  }

  function recalculateTextSizing() {
    if (!crystals || crystals.length === 0) return;

    const textMaxWidth = 240;
    const { fontSize, wrappedTexts } = findOptimalFontSize({
      texts: QUESTION.choices.map(c => c.text),
      maxWidth: textMaxWidth,
      availableHeight: 350,
      minFont: 14,
      maxFont: 16,
      fontFamily: "'Nunito', sans-serif"
    });

    crystals.forEach((crystal, i) => {
      crystal.wrappedText = wrappedTexts[i];
      crystal.fontSize = fontSize;
    });
  }

  function initGame() {
    crystals = [];
    bgParticles = [];
    ripples = [];
    gameTime = 0;
    selectedCrystal = -1;
    answerLocked = false;

    // Vertical stack: crystal on left, text on right, full width rows
    const crystalSize = 80;
    const rowH = 120;
    const startY = 50;
    const gap = 16;

    QUESTION.choices.forEach((choice, i) => {
      crystals.push({
        x: 20,
        y: startY + i * (rowH + gap),
        w: crystalSize,
        h: rowH,
        choice: choice,
        color: CRYSTAL_COLORS[i],
        glowIntensity: 0,
        scale: 0,          // For entrance animation
        alpha: 0,          // For entrance animation
        entranceDelay: i * 0.12,
        entranceTime: 0,
        shakeX: 0,
        pulsePhase: Math.random() * Math.PI * 2,
        wrappedText: null,
        fontSize: 16
      });
    });

    // Background floating particles
    for (let i = 0; i < 25; i++) {
      bgParticles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        size: Math.random() * 3 + 1,
        speed: Math.random() * 20 + 10,
        alpha: Math.random() * 0.4 + 0.1,
        phase: Math.random() * Math.PI * 2
      });
    }

    recalculateTextSizing();
  }

  function spawnRipple(originIdx) {
    crystals.forEach((crystal, i) => {
      if (i !== originIdx) {
        const dx = crystal.x - crystals[originIdx].x;
        const dy = crystal.y - crystals[originIdx].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const delay = dist / 400;
        ripples.push({
          targetIdx: i,
          delay: delay,
          time: 0,
          duration: 0.5,
          intensity: 0.6
        });
      }
    });
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Update entrance animations
    crystals.forEach(crystal => {
      crystal.entranceTime += dt;
      const t = Math.max(0, crystal.entranceTime - crystal.entranceDelay);
      if (t < 0.4) {
        const progress = t / 0.4;
        const spring = 1 + Math.sin(progress * Math.PI * 2) * 0.2 * (1 - progress);
        crystal.scale = progress * spring;
        crystal.alpha = Math.min(1, progress * 1.5);
      } else {
        crystal.scale = 1;
        crystal.alpha = 1;
      }
    });

    // Update ripple effects
    ripples = ripples.filter(ripple => {
      ripple.time += dt;
      if (ripple.time >= ripple.delay && ripple.time < ripple.delay + ripple.duration) {
        const t = (ripple.time - ripple.delay) / ripple.duration;
        crystals[ripple.targetIdx].glowIntensity = ripple.intensity * Math.sin(t * Math.PI);
      }
      return ripple.time < ripple.delay + ripple.duration;
    });

    // Decay glow
    crystals.forEach(crystal => {
      crystal.glowIntensity *= 0.95;
      // Shake decay
      crystal.shakeX *= 0.9;
    });

    // Ambient pulse
    crystals.forEach(crystal => {
      crystal.pulsePhase += dt * 1.5;
    });

    // Background particles float upward
    bgParticles.forEach(p => {
      p.y -= p.speed * dt;
      p.x += Math.sin(gameTime * 2 + p.phase) * 8 * dt;
      if (p.y < -10) {
        p.y = H + 10;
        p.x = Math.random() * W;
      }
    });
  }

  function drawCrystalShape(x, y, w, h, color, glow, scale, alpha, pulse) {
    if (alpha <= 0 || scale <= 0) return;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(x + w / 2, y + h / 2);
    ctx.scale(scale, scale);

    // Glow effect
    const glowAmount = glow + Math.sin(pulse) * 0.15 + 0.15;
    if (glowAmount > 0.05) {
      const glowRadius = 40 + glowAmount * 30;
      const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, glowRadius);
      gradient.addColorStop(0, color.glow + Math.floor(glowAmount * 80).toString(16).padStart(2, '0'));
      gradient.addColorStop(1, color.glow + '00');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.ellipse(0, 0, glowRadius, glowRadius * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Crystal body - hexagonal gem shape
    const hw = w * 0.45;
    const hh = h * 0.45;

    ctx.beginPath();
    ctx.moveTo(0, -hh);                    // Top point
    ctx.lineTo(hw, -hh * 0.4);            // Upper right
    ctx.lineTo(hw, hh * 0.4);             // Lower right
    ctx.lineTo(0, hh);                     // Bottom point
    ctx.lineTo(-hw, hh * 0.4);            // Lower left
    ctx.lineTo(-hw, -hh * 0.4);           // Upper left
    ctx.closePath();

    // Crystal gradient fill
    const bodyGrad = ctx.createLinearGradient(-hw, -hh, hw, hh);
    bodyGrad.addColorStop(0, color.highlight);
    bodyGrad.addColorStop(0.3, color.glow);
    bodyGrad.addColorStop(0.6, color.base);
    bodyGrad.addColorStop(1, color.base + 'CC');
    ctx.fillStyle = bodyGrad;
    ctx.fill();

    // Crystal edge highlight
    ctx.strokeStyle = color.highlight + 'AA';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Inner facet lines for crystal detail
    ctx.beginPath();
    ctx.moveTo(0, -hh);
    ctx.lineTo(hw * 0.2, 0);
    ctx.lineTo(0, hh);
    ctx.strokeStyle = color.highlight + '44';
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(-hw, -hh * 0.4);
    ctx.lineTo(hw * 0.2, 0);
    ctx.lineTo(hw, -hh * 0.4);
    ctx.strokeStyle = color.highlight + '33';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // Shimmer highlight on upper facet
    ctx.beginPath();
    ctx.moveTo(0, -hh);
    ctx.lineTo(hw * 0.6, -hh * 0.25);
    ctx.lineTo(hw * 0.2, 0);
    ctx.lineTo(-hw * 0.3, -hh * 0.3);
    ctx.closePath();
    ctx.fillStyle = 'rgba(255, 255, 255, ' + (0.12 + glowAmount * 0.15) + ')';
    ctx.fill();

    ctx.restore();
  }

  function drawGame() {
    // Dark background with subtle gradient
    const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
    bgGrad.addColorStop(0, '#0F0A1E');
    bgGrad.addColorStop(0.5, '#1A1230');
    bgGrad.addColorStop(1, '#0D0816');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    // Draw floating particles
    bgParticles.forEach(p => {
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = '#C4B5FD';
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.size, p.size * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Draw connecting light threads between crystals
    if (crystals.length >= 4 && crystals[0].alpha > 0.5) {
      ctx.save();
      ctx.globalAlpha = 0.12;
      ctx.strokeStyle = '#C4B5FD';
      ctx.lineWidth = 1;
      for (let i = 0; i < crystals.length; i++) {
        const next = (i + 1) % crystals.length;
        const a = crystals[i];
        const b = crystals[next];
        const ax = a.x + a.w / 2 + a.shakeX;
        const ay = a.y + a.h / 2;
        const bx = b.x + b.w / 2 + b.shakeX;
        const by = b.y + b.h / 2;
        ctx.beginPath();
        ctx.moveTo(ax, ay);
        const mx = ax + 20 + Math.sin(gameTime * 2 + i) * 8;
        const my = (ay + by) / 2;
        ctx.quadraticCurveTo(mx, my, bx, by);
        ctx.stroke();
      }
      ctx.restore();
    }

    // Draw crystals with text to the right
    crystals.forEach((crystal, i) => {
      const cx = crystal.x + crystal.shakeX;

      // Draw a subtle row background
      if (crystal.alpha > 0.3) {
        ctx.save();
        ctx.globalAlpha = crystal.alpha * 0.15;
        ctx.fillStyle = crystal.color.base;
        ctx.beginPath();
        ctx.roundRect(12, crystal.y + 4, W - 24, crystal.h - 8, 12);
        ctx.fill();
        ctx.restore();
      }

      // Draw the crystal gem on the left
      drawCrystalShape(
        cx, crystal.y + 10,
        crystal.w, crystal.h - 20,
        crystal.color,
        crystal.glowIntensity,
        crystal.scale,
        crystal.alpha,
        crystal.pulsePhase
      );

      // Draw answer text to the right of crystal
      if (crystal.alpha > 0.3) {
        const lines = crystal.wrappedText || [crystal.choice.text];
        const fontSize = crystal.fontSize || 16;
        const lineHeight = fontSize + 4;
        const textX = crystal.x + crystal.w + 12;
        const totalTextH = lines.length * lineHeight;
        const textStartY = crystal.y + (crystal.h - totalTextH) / 2 + lineHeight / 2;

        ctx.globalAlpha = crystal.alpha;
        lines.forEach((line, li) => {
          drawText(line, textX, textStartY + li * lineHeight, {
            font: `500 ${fontSize}px 'Nunito', sans-serif`,
            color: COLORS.textPrimary,
            align: 'left',
            baseline: 'middle'
          });
        });
        ctx.globalAlpha = 1;
      }
    });

    // Draw selection highlight
    if (selectedCrystal >= 0) {
      const sel = crystals[selectedCrystal];
      ctx.save();
      ctx.globalAlpha = 0.4 + Math.sin(gameTime * 6) * 0.15;
      ctx.strokeStyle = sel.color.glow;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.roundRect(12, sel.y + 4, W - 24, sel.h - 8, 12);
      ctx.stroke();
      ctx.restore();
    }
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;
    if (answerLocked) return;

    const touch = e.touches[0] || e.changedTouches[0];
    if (!touch) return;
    const { x, y } = screenToLogical(touch.clientX, touch.clientY);

    if (type === 'start') {
      // Check if any crystal row was tapped
      crystals.forEach((crystal, i) => {
        if (crystal.alpha < 0.5) return;
        // Full-width row hit area
        const hitRect = {
          x: 10,
          y: crystal.y,
          w: W - 20,
          h: crystal.h
        };
        if (pointInRect(x, y, hitRect)) {
          playClickSound();

          // Make tapped crystal glow brighter
          crystal.glowIntensity = 1.0;

          // Send ripple to other crystals
          spawnRipple(i);

          // Lock answer after a brief delay to show effects
          selectedCrystal = i;
          answerLocked = true;

          setTimeout(() => {
            if (gameState !== 'playing') return;
            const choice = crystal.choice;
            if (choice.is_correct) {
              playCorrectSound();
            } else {
              playWrongSound();
              // Shake wrong answer
              crystal.shakeX = 12;
            }
            engine.end(choice.is_correct, choice.explanation);
          }, 400);
        }
      });
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
