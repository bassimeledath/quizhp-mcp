<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Goldfish Scoop Festival</title>
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GOLDFISH SCOOP FESTIVAL - MOBILE                                            ║
  ║  Japanese festival goldfish scooping game with fragile paper scoop (poi)     ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none; /* Prevent default touch behaviors */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      /* Canvas fills viewport via JS, these are fallbacks */
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill viewport
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   *
   * @param {string} text - The text to wrap
   * @param {number} maxWidth - Maximum width in logical coordinates
   * @param {string} font - CSS font string (e.g., "16px 'Nunito', sans-serif")
   * @param {number} maxLines - Maximum number of lines (default 3)
   * @returns {string[]} Array of text lines
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   * Tries font sizes from max to min until content fits.
   *
   * @param {Object} options
   * @param {string[]} options.texts - Array of text strings to fit
   * @param {number} options.maxWidth - Maximum width for text wrapping
   * @param {number} options.availableHeight - Total height available for all texts
   * @param {number} options.minFont - Minimum font size (default 12)
   * @param {number} options.maxFont - Maximum font size (default 18)
   * @param {number} options.itemPadding - Vertical padding per text item (default 4)
   * @param {string} options.fontFamily - Font family (default "'Nunito Sans', sans-serif")
   * @returns {{ fontSize: number, wrappedTexts: string[][] }} Optimal font size and pre-wrapped texts
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === GAME STATE ===
  const POOL_Y = 80;
  const POOL_HEIGHT = 320;
  const POOL_BOTTOM = POOL_Y + POOL_HEIGHT;

  // Goldfish colors - distinct and vibrant
  const FISH_COLORS = ['#E87A3E', '#4ECDC4', '#F5A742', '#E85D4A'];
  const FISH_SECONDARY = ['#D15A20', '#3ABAB2', '#D89030', '#D04838'];

  let fish = [];
  let scoop = { x: W / 2, y: POOL_BOTTOM + 60, angle: 0, health: 100, isScooping: false, scoopY: 0, scoopSpeed: 0 };
  let touchStartY = 0;
  let touchActive = false;
  let selectedFish = null;
  let gameTime = 0;
  let answerFontSize = 14;
  let answerWrappedTexts = [];

  // Ripple effects
  let ripples = [];

  // Sound effects
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'splash') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.15);
    } else if (type === 'catch') {
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(400, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.2);
    } else if (type === 'tear') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(150, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    }
  }

  function initGame() {
    gameTime = 0;
    selectedFish = null;
    scoop = { x: W / 2, y: POOL_BOTTOM + 60, angle: 0, health: 100, isScooping: false, scoopY: 0, scoopSpeed: 0 };
    ripples = [];
    touchActive = false;

    // Create 4 fish swimming in circular patterns
    fish = QUESTION.choices.map((choice, i) => {
      // Position fish in different areas of the pool
      const centerX = 90 + (i % 2) * 180;
      const centerY = POOL_Y + 80 + Math.floor(i / 2) * 120;
      const radius = 40 + Math.random() * 20;

      return {
        choice: choice,
        centerX: centerX,
        centerY: centerY,
        radius: radius,
        angle: (i * Math.PI / 2) + Math.random() * 0.5,
        speed: 0.8 + Math.random() * 0.4,
        size: 22,
        color: FISH_COLORS[i],
        secondaryColor: FISH_SECONDARY[i],
        x: centerX,
        y: centerY,
        tailWag: 0,
        // Bounce animation state
        bouncePhase: i * 0.5,
        scale: 0,
        targetScale: 1
      };
    });

    recalculateTextSizing();
  }

  function recalculateTextSizing() {
    if (!fish || fish.length === 0) return;

    // Each fish label area is about 70px wide
    const { fontSize, wrappedTexts } = findOptimalFontSize({
      texts: QUESTION.choices.map(c => c.text),
      maxWidth: 70,
      availableHeight: 60,
      minFont: 12,
      maxFont: 16,
      fontFamily: "'Nunito', sans-serif"
    });

    answerFontSize = fontSize;
    answerWrappedTexts = wrappedTexts;

    fish.forEach((f, i) => {
      f.wrappedText = wrappedTexts[i];
    });
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Update fish positions (circular swimming)
    fish.forEach((f, i) => {
      f.angle += f.speed * dt;
      f.x = f.centerX + Math.cos(f.angle) * f.radius;
      f.y = f.centerY + Math.sin(f.angle) * f.radius * 0.5;
      f.tailWag += dt * 10;

      // Entrance animation
      f.bouncePhase += dt * 3;
      if (f.scale < f.targetScale) {
        f.scale = Math.min(f.targetScale, f.scale + dt * 4);
      }
    });

    // Update scoop position if scooping
    if (scoop.isScooping) {
      scoop.scoopY += scoop.scoopSpeed * dt;

      // Check if scoop is in the water
      if (scoop.scoopY > 0) {
        // Damage scoop based on speed (faster = more damage)
        const damage = Math.abs(scoop.scoopSpeed) * dt * 0.3;
        scoop.health -= damage;

        // Add ripple effect
        if (Math.random() < 0.3) {
          ripples.push({
            x: scoop.x,
            y: POOL_Y + Math.min(scoop.scoopY, POOL_HEIGHT - 20),
            radius: 5,
            maxRadius: 30,
            alpha: 0.6
          });
        }

        // Check collision with fish (gentle scoop catches fish)
        const scoopTipY = POOL_Y + scoop.scoopY;
        fish.forEach(f => {
          const dx = f.x - scoop.x;
          const dy = f.y - scoopTipY;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < f.size + 15 && Math.abs(scoop.scoopSpeed) < 200) {
            // Caught a fish!
            selectedFish = f;
            playSound('catch');
            engine.end(f.choice.is_correct, f.choice.explanation);
          }
        });

        // Check if scoop is torn
        if (scoop.health <= 0) {
          playSound('tear');
          scoop.health = 100;
          scoop.isScooping = false;
          scoop.scoopY = 0;
        }
      }

      // Slow down scoop naturally
      scoop.scoopSpeed *= 0.95;

      // Return scoop if too slow or too deep
      if (Math.abs(scoop.scoopSpeed) < 10 || scoop.scoopY > POOL_HEIGHT - 30) {
        scoop.isScooping = false;
        scoop.scoopY = 0;
        scoop.scoopSpeed = 0;
      }
    }

    // Update ripples
    ripples = ripples.filter(r => {
      r.radius += dt * 60;
      r.alpha -= dt * 1.5;
      return r.alpha > 0;
    });
  }

  function drawGame() {
    // Background - festival night sky
    const gradient = ctx.createLinearGradient(0, 0, 0, H);
    gradient.addColorStop(0, '#1a1a3e');
    gradient.addColorStop(1, '#2B2B28');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, W, H);

    // Draw lantern decorations at top
    drawLanterns();

    // Draw the pool
    drawPool();

    // Draw ripples
    ripples.forEach(r => {
      ctx.strokeStyle = `rgba(255, 255, 255, ${r.alpha})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(r.x, r.y, r.radius, r.radius * 0.3 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.stroke();
    });

    // Draw fish
    fish.forEach((f, i) => {
      if (selectedFish === f) return; // Draw selected fish last
      drawFish(f, i);
    });

    // Draw selected fish on top if any
    if (selectedFish) {
      drawFish(selectedFish, fish.indexOf(selectedFish));
    }

    // Draw scoop
    drawScoop();

    // Draw health bar for scoop
    drawHealthBar();

    // Draw answer labels below pool
    drawAnswerLabels();
  }

  function drawLanterns() {
    const lanternColors = ['#E87A3E', '#E85D4A', '#F5A742'];
    for (let i = 0; i < 5; i++) {
      const x = 40 + i * 75;
      const swing = Math.sin(gameTime * 2 + i) * 5;

      // String
      ctx.strokeStyle = '#2B2B28';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x + swing, 35);
      ctx.stroke();

      // Lantern body
      const color = lanternColors[i % 3];
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.ellipse(x + swing, 45, 12, 18 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();

      // Lantern glow
      ctx.fillStyle = `${color}40`;
      ctx.beginPath();
      ctx.ellipse(x + swing, 45, 18, 24 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawPool() {
    // Pool rim
    ctx.fillStyle = '#8B4513';
    ctx.beginPath();
    ctx.roundRect(15, POOL_Y - 8, W - 30, POOL_HEIGHT + 16, 20);
    ctx.fill();

    // Water
    const waterGradient = ctx.createLinearGradient(0, POOL_Y, 0, POOL_BOTTOM);
    waterGradient.addColorStop(0, '#4ECDC4');
    waterGradient.addColorStop(0.5, '#3ABAB2');
    waterGradient.addColorStop(1, '#2A9A92');
    ctx.fillStyle = waterGradient;
    ctx.beginPath();
    ctx.roundRect(20, POOL_Y, W - 40, POOL_HEIGHT, 15);
    ctx.fill();

    // Water surface shimmer
    ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
    for (let i = 0; i < 8; i++) {
      const shimmerX = 30 + i * 40 + Math.sin(gameTime * 2 + i) * 10;
      ctx.beginPath();
      ctx.ellipse(shimmerX, POOL_Y + 15, 15, 4 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawFish(f, index) {
    const bounceY = Math.sin(f.bouncePhase) * 3;
    const scale = f.scale;

    ctx.save();
    ctx.translate(f.x, f.y + bounceY);
    ctx.scale(scale, scale * aspectRatio);

    // Determine facing direction based on movement
    const facingRight = Math.cos(f.angle + Math.PI/2) > 0;
    if (!facingRight) {
      ctx.scale(-1, 1);
    }

    // Tail
    const tailAngle = Math.sin(f.tailWag) * 0.3;
    ctx.save();
    ctx.translate(-f.size * 0.7, 0);
    ctx.rotate(tailAngle);
    ctx.fillStyle = f.secondaryColor;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(-f.size * 0.5, -f.size * 0.4);
    ctx.lineTo(-f.size * 0.5, f.size * 0.4);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // Body
    ctx.fillStyle = f.color;
    ctx.beginPath();
    ctx.ellipse(0, 0, f.size, f.size * 0.6, 0, 0, Math.PI * 2);
    ctx.fill();

    // Dorsal fin
    ctx.fillStyle = f.secondaryColor;
    ctx.beginPath();
    ctx.moveTo(-f.size * 0.3, -f.size * 0.5);
    ctx.quadraticCurveTo(0, -f.size * 0.9, f.size * 0.3, -f.size * 0.5);
    ctx.closePath();
    ctx.fill();

    // Eye
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath();
    ctx.arc(f.size * 0.4, -f.size * 0.1, f.size * 0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#2B2B28';
    ctx.beginPath();
    ctx.arc(f.size * 0.45, -f.size * 0.1, f.size * 0.1, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();

    // Draw letter label on fish
    const letter = String.fromCharCode(65 + index);
    drawText(letter, f.x, f.y + bounceY, {
      font: `bold 14px 'Belanosima', sans-serif`,
      color: '#FFFFFF'
    });
  }

  function drawScoop() {
    const scoopBaseY = scoop.isScooping ? POOL_Y + scoop.scoopY : scoop.y;

    ctx.save();
    ctx.translate(scoop.x, scoopBaseY);

    // Handle
    ctx.strokeStyle = '#8B4513';
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, 50);
    ctx.stroke();

    // Scoop frame (circular)
    ctx.strokeStyle = '#654321';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.ellipse(0, -8, 25, 20 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.stroke();

    // Paper (semi-transparent, shows damage)
    const paperAlpha = scoop.health / 100;
    ctx.fillStyle = `rgba(255, 250, 240, ${paperAlpha * 0.8})`;
    ctx.beginPath();
    ctx.ellipse(0, -8, 23, 18 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Paper pattern (grid)
    if (scoop.health > 30) {
      ctx.strokeStyle = `rgba(200, 180, 160, ${paperAlpha * 0.5})`;
      ctx.lineWidth = 0.5;
      for (let i = -15; i <= 15; i += 8) {
        ctx.beginPath();
        ctx.moveTo(i, -25 * aspectRatio);
        ctx.lineTo(i, 10 * aspectRatio);
        ctx.stroke();
      }
    }

    // Damage tears
    if (scoop.health < 70) {
      ctx.fillStyle = '#4ECDC480';
      const tearCount = Math.floor((100 - scoop.health) / 20);
      for (let i = 0; i < tearCount; i++) {
        const tearX = (Math.sin(i * 2.5) * 15);
        const tearY = (Math.cos(i * 3.7) * 12) - 8;
        ctx.beginPath();
        ctx.ellipse(tearX, tearY * aspectRatio, 4 + i, (3 + i) * aspectRatio, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    ctx.restore();
  }

  function drawHealthBar() {
    const barWidth = 100;
    const barHeight = 8;
    const barX = W / 2 - barWidth / 2;
    const barY = POOL_BOTTOM + 30;

    // Background
    ctx.fillStyle = '#2B2B2840';
    ctx.beginPath();
    ctx.roundRect(barX, barY, barWidth, barHeight, 4);
    ctx.fill();

    // Health fill
    const healthColor = scoop.health > 50 ? '#6BBF59' : scoop.health > 25 ? '#F5A742' : '#E85D4A';
    ctx.fillStyle = healthColor;
    ctx.beginPath();
    ctx.roundRect(barX, barY, barWidth * (scoop.health / 100), barHeight, 4);
    ctx.fill();

    // Label
    drawText('Scoop Strength', W / 2, barY - 10, {
      font: `500 12px 'Nunito Sans', sans-serif`,
      color: '#F5F5F0'
    });
  }

  function drawAnswerLabels() {
    const labelY = POOL_BOTTOM + 70;
    const labelHeight = H - labelY - 20;
    const labelWidth = (W - 40) / 2;

    fish.forEach((f, i) => {
      const col = i % 2;
      const row = Math.floor(i / 2);
      const x = 20 + col * labelWidth + labelWidth / 2;
      const y = labelY + row * (labelHeight / 2) + 20;

      // Label background
      ctx.fillStyle = f.color + '30';
      ctx.beginPath();
      ctx.roundRect(20 + col * labelWidth + 5, labelY + row * (labelHeight / 2) + 5, labelWidth - 10, labelHeight / 2 - 10, 8);
      ctx.fill();

      // Fish color indicator
      ctx.fillStyle = f.color;
      ctx.beginPath();
      ctx.ellipse(x - labelWidth / 2 + 20, y + 10, 8, 8 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();

      // Letter
      const letter = String.fromCharCode(65 + i);
      drawText(letter, x - labelWidth / 2 + 20, y + 10, {
        font: `bold 12px 'Belanosima', sans-serif`,
        color: '#FFFFFF'
      });

      // Answer text (wrapped)
      const lines = f.wrappedText || [f.choice.text];
      const lineHeight = answerFontSize + 2;
      const textStartY = y - (lines.length - 1) * lineHeight / 2 + 10;

      lines.forEach((line, lineIndex) => {
        drawText(line, x + 10, textStartY + lineIndex * lineHeight, {
          font: `500 ${answerFontSize}px 'Nunito', sans-serif`,
          color: '#F5F5F0',
          align: 'center'
        });
      });
    });
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;

    const touch = e.touches[0] || e.changedTouches[0];
    const { x, y } = screenToLogical(touch.clientX, touch.clientY);

    if (type === 'start') {
      initAudio();
      touchStartY = y;
      touchActive = true;
      scoop.x = Math.max(45, Math.min(W - 45, x));
    } else if (type === 'move' && touchActive) {
      scoop.x = Math.max(45, Math.min(W - 45, x));

      // Check for downward swipe to start scooping
      if (!scoop.isScooping && y > touchStartY + 20) {
        scoop.isScooping = true;
        scoop.scoopSpeed = (y - touchStartY) * 3;
        playSound('splash');

        // Add splash ripples
        for (let i = 0; i < 3; i++) {
          ripples.push({
            x: scoop.x + (Math.random() - 0.5) * 30,
            y: POOL_Y + 10,
            radius: 5,
            maxRadius: 40,
            alpha: 0.8
          });
        }
      }
    } else if (type === 'end') {
      touchActive = false;
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
