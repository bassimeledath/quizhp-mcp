<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <title>Pendulum Clock Swing</title>
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE - MOBILE                                              ║
  ║  Fills 100% of container, non-uniform scaling, touch input.                  ║
  ║  Logical dimensions: 360×640 (use aspectRatio for proportional shapes)       ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none; /* Prevent default touch behaviors */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      /* Canvas fills viewport via JS, these are fallbacks */
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill viewport
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  This is where your game logic goes. See requirements below.               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === GAME STATE ===
  const COLORS = {
    bgPrimary: '#FAFAF7',
    surface: '#FFFFFF',
    surfaceSecondary: '#F5F5F0',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC',
    clockBody: '#3A2E25',
    clockFace: '#F5F0E8',
    clockRim: '#8B7355',
    clockGold: '#C4A265',
    pendulumRod: '#5A4A38',
    pendulumWeight: '#8B7355'
  };

  let pendulum = {};
  let answers = [];
  let clockFaceY = 0;
  let pivotX = 0;
  let pivotY = 0;
  let rodLength = 0;
  let weightRadius = 0;
  let answered = false;
  let answerFlash = 0;
  let selectedAnswer = null;
  let entranceAnim = 0;
  let tickSound = null;
  let tickTimer = 0;

  // Audio context for sound effects
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
  }

  function playTick() {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = 'sine';
      osc.frequency.value = 800;
      gain.gain.setValueAtTime(0.08, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.05);
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start();
      osc.stop(ac.currentTime + 0.05);
    } catch(e) {}
  }

  function playCorrectSound() {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, ac.currentTime);
      osc.frequency.setValueAtTime(659, ac.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, ac.currentTime + 0.2);
      gain.gain.setValueAtTime(0.15, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start();
      osc.stop(ac.currentTime + 0.4);
    } catch(e) {}
  }

  function playWrongSound() {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(300, ac.currentTime);
      osc.frequency.setValueAtTime(200, ac.currentTime + 0.2);
      gain.gain.setValueAtTime(0.12, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.35);
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start();
      osc.stop(ac.currentTime + 0.35);
    } catch(e) {}
  }

  function playClickSound() {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = 'sine';
      osc.frequency.value = 600;
      gain.gain.setValueAtTime(0.1, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.06);
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start();
      osc.stop(ac.currentTime + 0.06);
    } catch(e) {}
  }

  // Particles
  let particles = [];
  function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x, y,
        vx: (Math.random() - 0.5) * 200,
        vy: -Math.random() * 150 - 50,
        size: 3 + Math.random() * 5,
        color: color,
        life: 1.0,
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 8
      });
    }
  }

  function recalculateTextSizing() {
    if (!answers || answers.length === 0) return;
    const { fontSize, wrappedTexts } = findOptimalFontSize({
      texts: answers.map(a => a.choice.text),
      maxWidth: 150,
      availableHeight: 70,
      minFont: 14,
      maxFont: 16,
      fontFamily: "'Nunito', sans-serif"
    });
    answers.forEach((ans, i) => {
      ans.wrappedText = wrappedTexts[i];
      ans.fontSize = fontSize;
    });
  }

  function initGame() {
    // Pendulum physics
    pivotX = W / 2;
    pivotY = 180;
    rodLength = 180;
    weightRadius = 28;

    pendulum = {
      angle: Math.PI / 3, // start from right side, wide swing
      angularVelocity: 0,
      gravity: 4.0,
      damping: 0.9998,   // very low damping to keep swinging
      time: 0
    };

    answered = false;
    answerFlash = 0;
    selectedAnswer = null;
    entranceAnim = 0;
    tickTimer = 0;
    particles = [];

    // Two answer zones at bottom — True on left, False on right
    const trueChoice = QUESTION.choices[0];
    const falseChoice = QUESTION.choices[1];

    answers = [
      {
        choice: trueChoice,
        rect: { x: 10, y: 490, w: 165, h: 120 },
        label: 'TRUE',
        scale: 1,
        alpha: 0,
        shakeX: 0,
        wrappedText: [trueChoice.text],
        fontSize: 16
      },
      {
        choice: falseChoice,
        rect: { x: 185, y: 490, w: 165, h: 120 },
        label: 'FALSE',
        scale: 1,
        alpha: 0,
        shakeX: 0,
        wrappedText: [falseChoice.text],
        fontSize: 16
      }
    ];

    recalculateTextSizing();
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    // Entrance animation
    if (entranceAnim < 1) {
      entranceAnim = Math.min(1, entranceAnim + dt * 2.5);
      answers.forEach((ans, i) => {
        const delay = i * 0.15;
        const t = Math.max(0, Math.min(1, (entranceAnim - delay) / 0.6));
        const spring = 1 + Math.sin(t * Math.PI * 2) * 0.15 * (1 - t);
        ans.scale = t * spring;
        ans.alpha = t;
      });
    }

    // Update pendulum physics (simple pendulum equation)
    if (!answered) {
      const angularAcceleration = -pendulum.gravity * Math.sin(pendulum.angle);
      pendulum.angularVelocity += angularAcceleration * dt;
      pendulum.angularVelocity *= pendulum.damping;
      pendulum.angle += pendulum.angularVelocity * dt;
      pendulum.time += dt;

      // Tick sound at extremes
      tickTimer += dt;
      if (tickTimer > 0.3 && Math.abs(pendulum.angularVelocity) < 0.3 && Math.abs(pendulum.angle) > 0.2) {
        playTick();
        tickTimer = 0;
      }
    }

    // Answer flash animation
    if (answered && answerFlash < 1) {
      answerFlash += dt * 3;
    }

    // Shake animation for wrong answer
    if (selectedAnswer !== null && !selectedAnswer.choice.is_correct) {
      const decay = Math.max(0, 1 - answerFlash);
      selectedAnswer.shakeX = Math.sin(answerFlash * Math.PI * 12) * 8 * decay;
    }

    // Update particles
    particles = particles.filter(p => {
      p.vy += 300 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotSpeed * dt;
      p.life -= dt * 1.5;
      return p.life > 0;
    });

    // End game after flash animation
    if (answered && answerFlash >= 1) {
      engine.end(selectedAnswer.choice.is_correct, selectedAnswer.choice.explanation);
    }
  }

  function drawGame() {
    // Background — warm cream
    ctx.fillStyle = COLORS.bgPrimary;
    ctx.fillRect(0, 0, W, H);

    // Subtle background pattern (wallpaper feel)
    ctx.globalAlpha = 0.03;
    for (let i = 0; i < 20; i++) {
      for (let j = 0; j < 35; j++) {
        if ((i + j) % 2 === 0) {
          ctx.fillStyle = COLORS.textPrimary;
          ctx.fillRect(i * 20, j * 20, 18, 18);
        }
      }
    }
    ctx.globalAlpha = 1;

    const easeIn = Math.min(1, entranceAnim * 1.5);

    // === CLOCK BODY (ornate grandfather clock top) ===
    // Clock case background
    ctx.save();
    ctx.translate(W / 2, 0);
    ctx.scale(easeIn, easeIn);
    ctx.translate(-W / 2, 0);

    // Main clock case
    const caseX = W / 2 - 100;
    const caseY = 20;
    const caseW = 200;
    const caseH = 160;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.beginPath();
    ctx.roundRect(caseX + 4, caseY + 4, caseW, caseH, 16);
    ctx.fill();

    // Case body
    const caseGrad = ctx.createLinearGradient(caseX, caseY, caseX + caseW, caseY + caseH);
    caseGrad.addColorStop(0, '#5A4A38');
    caseGrad.addColorStop(0.5, '#3A2E25');
    caseGrad.addColorStop(1, '#4A3C2E');
    ctx.fillStyle = caseGrad;
    ctx.beginPath();
    ctx.roundRect(caseX, caseY, caseW, caseH, 16);
    ctx.fill();

    // Gold trim
    ctx.strokeStyle = COLORS.clockGold;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.roundRect(caseX + 6, caseY + 6, caseW - 12, caseH - 12, 12);
    ctx.stroke();

    // Clock face
    const faceCX = W / 2;
    const faceCY = 100;
    const faceR = 52;

    // Face background
    const faceGrad = ctx.createRadialGradient(faceCX, faceCY, 0, faceCX, faceCY, faceR);
    faceGrad.addColorStop(0, '#FFFFF5');
    faceGrad.addColorStop(0.8, '#F5F0E8');
    faceGrad.addColorStop(1, '#E8E0D0');
    ctx.fillStyle = faceGrad;
    ctx.beginPath();
    ctx.ellipse(faceCX, faceCY, faceR, faceR * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Face rim
    ctx.strokeStyle = COLORS.clockGold;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.ellipse(faceCX, faceCY, faceR, faceR * aspectRatio, 0, 0, Math.PI * 2);
    ctx.stroke();

    // Hour markers
    for (let i = 0; i < 12; i++) {
      const markerAngle = (i / 12) * Math.PI * 2 - Math.PI / 2;
      const innerR = faceR - 10;
      const outerR = faceR - 4;
      ctx.strokeStyle = COLORS.textPrimary;
      ctx.lineWidth = i % 3 === 0 ? 2.5 : 1.2;
      ctx.beginPath();
      ctx.moveTo(faceCX + Math.cos(markerAngle) * innerR, faceCY + Math.sin(markerAngle) * innerR * aspectRatio);
      ctx.lineTo(faceCX + Math.cos(markerAngle) * outerR, faceCY + Math.sin(markerAngle) * outerR * aspectRatio);
      ctx.stroke();
    }

    // Clock hands (decorative, slowly moving)
    const hourAngle = pendulum.time * 0.02 - Math.PI / 2;
    const minuteAngle = pendulum.time * 0.2 - Math.PI / 2;

    // Hour hand
    ctx.strokeStyle = COLORS.textPrimary;
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(faceCX, faceCY);
    ctx.lineTo(faceCX + Math.cos(hourAngle) * 25, faceCY + Math.sin(hourAngle) * 25 * aspectRatio);
    ctx.stroke();

    // Minute hand
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(faceCX, faceCY);
    ctx.lineTo(faceCX + Math.cos(minuteAngle) * 38, faceCY + Math.sin(minuteAngle) * 38 * aspectRatio);
    ctx.stroke();

    // Center pin
    ctx.fillStyle = COLORS.clockGold;
    ctx.beginPath();
    ctx.ellipse(faceCX, faceCY, 3, 3 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();

    // === PENDULUM ===
    const weightX = pivotX + Math.sin(pendulum.angle) * rodLength;
    const weightY = pivotY + Math.cos(pendulum.angle) * rodLength;

    // Rod
    ctx.strokeStyle = COLORS.pendulumRod;
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(pivotX, pivotY);
    ctx.lineTo(weightX, weightY);
    ctx.stroke();

    // Pivot point decoration
    ctx.fillStyle = COLORS.clockGold;
    ctx.beginPath();
    ctx.ellipse(pivotX, pivotY, 5, 5 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Weight (bob) — golden disc
    const weightGrad = ctx.createRadialGradient(weightX - 5, weightY - 5, 0, weightX, weightY, weightRadius);
    weightGrad.addColorStop(0, '#D4B57A');
    weightGrad.addColorStop(0.6, COLORS.clockGold);
    weightGrad.addColorStop(1, '#8B7355');
    ctx.fillStyle = weightGrad;
    ctx.beginPath();
    ctx.ellipse(weightX, weightY, weightRadius, weightRadius * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Weight rim
    ctx.strokeStyle = '#A08550';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(weightX, weightY, weightRadius, weightRadius * aspectRatio, 0, 0, Math.PI * 2);
    ctx.stroke();

    // Label on weight — show which side it's on
    const normalizedAngle = pendulum.angle;
    let weightLabel = '';
    let labelColor = COLORS.textPrimary;
    if (normalizedAngle > 0.05) {
      weightLabel = 'FALSE';
      labelColor = COLORS.error;
    } else if (normalizedAngle < -0.05) {
      weightLabel = 'TRUE';
      labelColor = COLORS.success;
    } else {
      weightLabel = '?';
      labelColor = COLORS.textSecondary;
    }
    drawText(weightLabel, weightX, weightY, {
      font: "700 14px 'Nunito Sans', sans-serif",
      color: labelColor
    });

    // Zone indicators — left = TRUE, right = FALSE
    const zoneY = 430;

    // Left zone glow (TRUE side)
    if (normalizedAngle < -0.1) {
      ctx.globalAlpha = Math.min(0.2, Math.abs(normalizedAngle) * 0.3);
      ctx.fillStyle = COLORS.success;
      ctx.fillRect(0, zoneY - 30, W / 2, 60);
      ctx.globalAlpha = 1;
    }

    // Right zone glow (FALSE side)
    if (normalizedAngle > 0.1) {
      ctx.globalAlpha = Math.min(0.2, Math.abs(normalizedAngle) * 0.3);
      ctx.fillStyle = COLORS.error;
      ctx.fillRect(W / 2, zoneY - 30, W / 2, 60);
      ctx.globalAlpha = 1;
    }

    // Divider line
    ctx.strokeStyle = COLORS.borderSubtle;
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(W / 2, pivotY + 20);
    ctx.lineTo(W / 2, 470);
    ctx.stroke();
    ctx.setLineDash([]);

    // Zone labels
    drawText('TRUE', W / 4, zoneY, {
      font: "700 20px 'Belanosima', sans-serif",
      color: COLORS.success
    });
    drawText('FALSE', W * 3 / 4, zoneY, {
      font: "700 20px 'Belanosima', sans-serif",
      color: COLORS.error
    });

    // Small arrow indicators
    const arrowPulse = Math.sin(pendulum.time * 3) * 3;
    drawText('\u25BC', W / 4, zoneY + 22 + arrowPulse, {
      font: "16px sans-serif",
      color: COLORS.success
    });
    drawText('\u25BC', W * 3 / 4, zoneY + 22 + arrowPulse, {
      font: "16px sans-serif",
      color: COLORS.error
    });

    // === ANSWER CARDS ===
    answers.forEach((ans, i) => {
      if (ans.alpha <= 0) return;

      ctx.globalAlpha = ans.alpha;
      ctx.save();
      const cx = ans.rect.x + ans.rect.w / 2;
      const cy = ans.rect.y + ans.rect.h / 2;
      ctx.translate(cx + ans.shakeX, cy);
      ctx.scale(ans.scale, ans.scale);
      ctx.translate(-cx, -cy);

      // Card background
      let bgColor = COLORS.surface;
      let borderColor = COLORS.borderSubtle;
      let labelBg = i === 0 ? COLORS.success : COLORS.error;

      if (selectedAnswer === ans) {
        if (ans.choice.is_correct) {
          bgColor = '#E8F8E5';
          borderColor = COLORS.success;
        } else {
          bgColor = '#FDECEB';
          borderColor = COLORS.error;
        }
      }

      // Card shadow
      ctx.fillStyle = 'rgba(0,0,0,0.06)';
      ctx.beginPath();
      ctx.roundRect(ans.rect.x + 2, ans.rect.y + 2, ans.rect.w, ans.rect.h, 12);
      ctx.fill();

      // Card body
      ctx.fillStyle = bgColor;
      ctx.beginPath();
      ctx.roundRect(ans.rect.x, ans.rect.y, ans.rect.w, ans.rect.h, 12);
      ctx.fill();

      // Border
      ctx.strokeStyle = borderColor;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.roundRect(ans.rect.x, ans.rect.y, ans.rect.w, ans.rect.h, 12);
      ctx.stroke();

      // Label badge at top of card
      const badgeW = 70;
      const badgeH = 22;
      const badgeX = ans.rect.x + ans.rect.w / 2 - badgeW / 2;
      const badgeY = ans.rect.y + 8;
      ctx.fillStyle = labelBg;
      ctx.beginPath();
      ctx.roundRect(badgeX, badgeY, badgeW, badgeH, 6);
      ctx.fill();

      drawText(ans.label, ans.rect.x + ans.rect.w / 2, badgeY + badgeH / 2, {
        font: "700 14px 'Nunito Sans', sans-serif",
        color: '#FFFFFF'
      });

      // Answer text (wrapped)
      const lines = ans.wrappedText || [ans.choice.text];
      const fontSize = ans.fontSize || 16;
      const lineHeight = fontSize + 4;
      const textStartY = ans.rect.y + 40 + ((ans.rect.h - 40) / 2) - ((lines.length - 1) * lineHeight) / 2;

      lines.forEach((line, li) => {
        drawText(line, ans.rect.x + ans.rect.w / 2, textStartY + li * lineHeight, {
          font: `500 ${fontSize}px 'Nunito', sans-serif`,
          color: COLORS.textPrimary
        });
      });

      ctx.restore();
      ctx.globalAlpha = 1;
    });

    // === PARTICLES ===
    particles.forEach(p => {
      ctx.globalAlpha = p.life;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });
    ctx.globalAlpha = 1;

    // Hint text at bottom
    if (!answered) {
      const hintPulse = 0.5 + Math.sin(pendulum.time * 2) * 0.3;
      ctx.globalAlpha = hintPulse;
      drawText('Tap when the pendulum swings to your answer!', W / 2, H - 16, {
        font: "500 14px 'Nunito Sans', sans-serif",
        color: COLORS.textSecondary
      });
      ctx.globalAlpha = 1;
    }
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;
    if (answered) return;

    if (type === 'start') {
      const touch = e.touches[0] || e.changedTouches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      playClickSound();

      // Determine which side the pendulum is on
      const currentAngle = pendulum.angle;

      // Tap determines answer based on pendulum position
      // Left side (angle < 0) = TRUE (choice 0)
      // Right side (angle > 0) = FALSE (choice 1)
      let chosenIndex;
      if (currentAngle < -0.05) {
        chosenIndex = 0; // TRUE
      } else if (currentAngle > 0.05) {
        chosenIndex = 1; // FALSE
      } else {
        // Pendulum is in the middle — no valid selection, ignore
        return;
      }

      answered = true;
      selectedAnswer = answers[chosenIndex];

      if (selectedAnswer.choice.is_correct) {
        playCorrectSound();
        const confettiColors = ['#E87A3E', '#F5A742', '#4ECDC4', '#6BBF59'];
        confettiColors.forEach(c => {
          spawnParticles(
            selectedAnswer.rect.x + selectedAnswer.rect.w / 2,
            selectedAnswer.rect.y,
            c, 6
          );
        });
      } else {
        playWrongSound();
      }
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
