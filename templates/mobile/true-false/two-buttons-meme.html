<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Two Buttons Meme - True/False Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1C1C1A;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #2A2A27;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "true_false",
    prompt: "Sample true/false question text for testing layout and display",
    choices: [
      { text: "True", is_correct: true, explanation: "This statement is true because..." },
      { text: "False", is_correct: false, explanation: "This statement is actually true..." }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  const W = 360, H = 640;

  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;

  let gameState = 'playing';
  let gameResult = null;
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;
    aspectRatio = scaleX / scaleY;
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  function drawEndScreen(dt) {
    endScreenTime += dt;

    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    if (gameResult) {
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - TWO BUTTONS MEME TRUE/FALSE                   ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // Meme-accurate color palette (matching the Jake Clark comic)
  const COLORS = {
    // Panel backgrounds
    panelBg: '#B8C5D6',        // Light blue-gray panel background
    panelBgDark: '#A8B5C6',    // Slightly darker for bottom panel

    // Console/machine
    consoleMetal: '#7B8794',    // Gray metal console
    consoleMetalDark: '#5A6570', // Darker metal accent

    // Button panels
    buttonPanel: '#FFFFFF',     // White button panel
    buttonPanelBorder: '#2C3E50', // Dark border

    // Red button
    buttonRed: '#CC0000',       // Main red
    buttonRedLight: '#FF4444',  // Highlight red
    buttonRedDark: '#8B0000',   // Shadow red

    // Character
    skin: '#F5CBA7',            // Skin tone
    skinShadow: '#E5B897',      // Skin shadow
    skinOutline: '#C4956A',     // Skin outline
    hair: '#8B4513',            // Brown hair
    shirt: '#A83232',           // Burgundy/maroon shirt
    shirtDark: '#8B2828',       // Shirt shadow

    // Comic styling
    outline: '#2C3E50',         // Dark outline color
    sweat: '#87CEEB',           // Sweat drop blue
    blush: '#E8A0A0',           // Blush pink

    // For game feedback
    success: '#6BBF59',
    error: '#E85D4A',
    cyan: '#4ECDC4',
    amber: '#F5A742'
  };

  // Reduced motion preference
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // Web Audio API Setup
  let audioCtx = null;
  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }

  function playSound(type) {
    if (!audioCtx || prefersReducedMotion) return;

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'correct') {
      // Ascending cheerful ding
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, audioCtx.currentTime); // C5
      osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1); // E5
      osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2); // G5
      gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'wrong') {
      // Sympathetic buzz
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(180, audioCtx.currentTime);
      osc.frequency.linearRampToValueAtTime(120, audioCtx.currentTime + 0.25);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.25);
    } else if (type === 'click') {
      // Button click
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.05);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.08);
    } else if (type === 'tick') {
      // Timer tick
      osc.type = 'sine';
      osc.frequency.setValueAtTime(800, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.03);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.03);
    } else if (type === 'tickUrgent') {
      // Urgent timer tick
      osc.type = 'square';
      osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.05);
    }
  }

  // Game state
  let gameTime = 0;
  let sweatDrops = [];
  let buttons = [];
  let hoverButton = null;
  let characterState = 'nervous'; // 'nervous', 'relieved', 'despair'
  let characterReactionTime = 0;

  // Animation state
  let panelAnimations = { top: { scale: 0, y: -50 }, bottom: { scale: 0, y: 50 } };
  let buttonParticles = [];
  let entranceComplete = false;

  // Comic panel layout
  const PANEL_GAP = 8;
  const TOP_PANEL = { x: 10, y: 10, w: W - 20, h: 220 };
  const BOTTOM_PANEL = { x: 10, y: TOP_PANEL.y + TOP_PANEL.h + PANEL_GAP, h: H - TOP_PANEL.h - PANEL_GAP - 20 };
  BOTTOM_PANEL.w = W - 20;

  // Spawn button press particles
  function spawnButtonParticles(x, y, isCorrect) {
    const colors = isCorrect
      ? [COLORS.success, COLORS.cyan, COLORS.amber, '#FFFFFF']
      : [COLORS.error, COLORS.buttonRed, '#8B0000', '#FFFFFF'];

    for (let i = 0; i < 20; i++) {
      const angle = (Math.PI * 2 * i) / 20 + Math.random() * 0.3;
      const speed = 150 + Math.random() * 100;
      buttonParticles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        color: colors[Math.floor(Math.random() * colors.length)],
        size: 4 + Math.random() * 6,
        alpha: 1,
        gravity: 300
      });
    }
  }

  // Entrance animation for panels
  function animateEntrance(dt) {
    if (prefersReducedMotion) {
      panelAnimations.top = { scale: 1, y: 0 };
      panelAnimations.bottom = { scale: 1, y: 0 };
      entranceComplete = true;
      return;
    }

    const speed = 4;
    // Top panel slides down
    panelAnimations.top.scale += (1 - panelAnimations.top.scale) * speed * dt;
    panelAnimations.top.y += (0 - panelAnimations.top.y) * speed * dt;
    // Bottom panel slides up (with delay)
    if (panelAnimations.top.scale > 0.5) {
      panelAnimations.bottom.scale += (1 - panelAnimations.bottom.scale) * speed * dt;
      panelAnimations.bottom.y += (0 - panelAnimations.bottom.y) * speed * dt;
    }

    if (panelAnimations.top.scale > 0.99 && panelAnimations.bottom.scale > 0.99) {
      panelAnimations.top = { scale: 1, y: 0 };
      panelAnimations.bottom = { scale: 1, y: 0 };
      entranceComplete = true;
    }
  }

  function initGame() {
    gameTime = 0;
    characterState = 'nervous';
    characterReactionTime = 0;
    hoverButton = null;
    buttonParticles = [];

    // Reset entrance animations
    if (!prefersReducedMotion) {
      panelAnimations = { top: { scale: 0, y: -50 }, bottom: { scale: 0, y: 50 } };
      entranceComplete = false;
    } else {
      panelAnimations = { top: { scale: 1, y: 0 }, bottom: { scale: 1, y: 0 } };
      entranceComplete = true;
    }

    // Initialize sweat drops
    sweatDrops = [];
    for (let i = 0; i < 5; i++) {
      sweatDrops.push({
        x: 0,
        y: 0,
        vy: 30 + Math.random() * 20,
        delay: Math.random() * 2,
        active: false
      });
    }

    // Two big red buttons - TRUE on left, FALSE on right
    const buttonW = 120;
    const buttonH = 100;
    const buttonY = TOP_PANEL.y + 60;
    const gap = 30;

    buttons = [
      {
        x: TOP_PANEL.x + (TOP_PANEL.w / 2) - buttonW - gap / 2,
        y: buttonY,
        w: buttonW,
        h: buttonH,
        label: 'TRUE',
        choice: QUESTION.choices[0],
        pressed: false,
        hoverScale: 1,
        pulsePhase: 0
      },
      {
        x: TOP_PANEL.x + (TOP_PANEL.w / 2) + gap / 2,
        y: buttonY,
        w: buttonW,
        h: buttonH,
        label: 'FALSE',
        choice: QUESTION.choices[1],
        pressed: false,
        hoverScale: 1,
        pulsePhase: Math.PI // Offset pulse for visual interest
      }
    ];
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Animate entrance
    if (!entranceComplete) {
      animateEntrance(dt);
    }

    // Update sweat drops (constant nervous intensity)
    const sweatIntensity = 0.5;
    sweatDrops.forEach((drop, i) => {
      drop.delay -= dt;
      if (drop.delay <= 0 && !drop.active) {
        drop.active = true;
        // Position around character's forehead
        drop.x = W / 2 - 30 + Math.random() * 60;
        drop.y = BOTTOM_PANEL.y + 60;
      }
      if (drop.active) {
        drop.y += drop.vy * dt * (1 + sweatIntensity);
        if (drop.y > BOTTOM_PANEL.y + BOTTOM_PANEL.h - 20) {
          drop.active = false;
          drop.delay = 0.5 + Math.random() * (1 - sweatIntensity);
          drop.y = BOTTOM_PANEL.y + 60;
        }
      }
    });

    // Button hover and pulse animation
    buttons.forEach(btn => {
      const targetScale = btn === hoverButton ? 1.08 : 1;
      btn.hoverScale += (targetScale - btn.hoverScale) * 10 * dt;

      // Pulsing glow effect
      if (!prefersReducedMotion) {
        btn.pulsePhase += dt * 3;
      }
    });

    // Update button particles
    buttonParticles = buttonParticles.filter(p => {
      p.vy += p.gravity * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.alpha -= dt * 2;
      return p.alpha > 0;
    });
  }

  function drawGame() {
    // Light blue-gray background (matching the meme)
    ctx.fillStyle = COLORS.panelBg;
    ctx.fillRect(0, 0, W, H);

    // Draw comic panels with entrance animation
    ctx.save();
    const topAnim = panelAnimations.top;
    ctx.translate(W / 2, TOP_PANEL.y + TOP_PANEL.h / 2 + topAnim.y);
    ctx.scale(topAnim.scale, topAnim.scale);
    ctx.translate(-W / 2, -(TOP_PANEL.y + TOP_PANEL.h / 2));
    drawComicPanel(TOP_PANEL);
    drawButtonsPanel();
    ctx.restore();

    ctx.save();
    const bottomAnim = panelAnimations.bottom;
    ctx.translate(W / 2, BOTTOM_PANEL.y + BOTTOM_PANEL.h / 2 + bottomAnim.y);
    ctx.scale(bottomAnim.scale, bottomAnim.scale);
    ctx.translate(-W / 2, -(BOTTOM_PANEL.y + BOTTOM_PANEL.h / 2));
    drawComicPanel(BOTTOM_PANEL, true);
    drawCharacterPanel();
    ctx.restore();

    // Draw button particles
    buttonParticles.forEach(p => {
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.size / 2, (p.size / 2) * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  function drawComicPanel(panel, isBottom = false) {
    // Panel background (light blue-gray like the meme)
    ctx.fillStyle = isBottom ? COLORS.panelBgDark : COLORS.panelBg;
    ctx.fillRect(panel.x, panel.y, panel.w, panel.h);

    // Thick black comic panel border
    ctx.strokeStyle = COLORS.outline;
    ctx.lineWidth = 4;
    ctx.strokeRect(panel.x, panel.y, panel.w, panel.h);
  }

  function drawButtonsPanel() {
    // Draw the console/machine background (gray metal like the meme)
    const machineY = TOP_PANEL.y + 25;
    const machineH = TOP_PANEL.h - 35;
    const machineX = TOP_PANEL.x + 15;
    const machineW = TOP_PANEL.w - 30;

    // Metal console base
    ctx.fillStyle = COLORS.consoleMetal;
    ctx.fillRect(machineX, machineY, machineW, machineH);

    // Darker metal accent at bottom
    ctx.fillStyle = COLORS.consoleMetalDark;
    ctx.fillRect(machineX, machineY + machineH - 20, machineW, 20);

    // Console border
    ctx.strokeStyle = COLORS.outline;
    ctx.lineWidth = 2;
    ctx.strokeRect(machineX, machineY, machineW, machineH);

    // Draw each button
    buttons.forEach(btn => {
      drawBigRedButton(btn);
    });

    // Draw pointing hand (coming from bottom right toward buttons)
    drawPointingHand();
  }

  function drawBigRedButton(btn) {
    const cx = btn.x + btn.w / 2;
    const cy = btn.y + btn.h / 2;
    const scale = btn.hoverScale;

    // Add subtle breathing for hovered button
    const breathe = btn === hoverButton && !prefersReducedMotion
      ? Math.sin(gameTime * 8) * 0.01
      : 0;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(scale + breathe, scale + breathe);

    // White button panel (like the meme)
    ctx.fillStyle = COLORS.buttonPanel;
    ctx.fillRect(-btn.w / 2, -btn.h / 2, btn.w, btn.h);

    // Panel border
    ctx.strokeStyle = COLORS.outline;
    ctx.lineWidth = 2;
    ctx.strokeRect(-btn.w / 2, -btn.h / 2, btn.w, btn.h);

    // Small screws in corners (like the meme)
    const screwOffset = 8;
    const screwSize = 4;
    ctx.fillStyle = '#555';
    [[-1, -1], [1, -1], [-1, 1], [1, 1]].forEach(([sx, sy]) => {
      ctx.beginPath();
      ctx.ellipse(
        sx * (btn.w / 2 - screwOffset),
        sy * (btn.h / 2 - screwOffset),
        screwSize,
        screwSize * aspectRatio,
        0, 0, Math.PI * 2
      );
      ctx.fill();
    });

    // The big red button (circular) - matching the meme's bright red
    const btnRadius = 38;

    // Button shadow/base (dark red)
    ctx.beginPath();
    ctx.ellipse(2, 4, btnRadius, btnRadius * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fillStyle = COLORS.buttonRedDark;
    ctx.fill();

    // Button main body - bright red with gradient
    ctx.beginPath();
    ctx.ellipse(0, 0, btnRadius, btnRadius * aspectRatio, 0, 0, Math.PI * 2);
    const gradient = ctx.createRadialGradient(
      -btnRadius * 0.3, -btnRadius * 0.3 * aspectRatio, 0,
      0, 0, btnRadius
    );
    gradient.addColorStop(0, COLORS.buttonRedLight);
    gradient.addColorStop(0.5, COLORS.buttonRed);
    gradient.addColorStop(1, COLORS.buttonRedDark);
    ctx.fillStyle = gradient;
    ctx.fill();

    // Glossy highlight (bright spot like the meme)
    ctx.beginPath();
    ctx.ellipse(-12, -14 * aspectRatio, 14, 10 * aspectRatio, -0.4, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
    ctx.fill();

    // Secondary smaller highlight
    ctx.beginPath();
    ctx.ellipse(-6, -8 * aspectRatio, 6, 4 * aspectRatio, -0.3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
    ctx.fill();

    ctx.restore();

    // Label below button
    drawText(btn.label, cx, btn.y + btn.h + 20, {
      font: "bold 18px 'Nunito Sans', sans-serif",
      color: COLORS.outline
    });
  }

  function drawPointingHand() {
    // Pointing hand from bottom-right toward buttons (like the meme)
    const handX = TOP_PANEL.x + TOP_PANEL.w - 60;
    const handY = TOP_PANEL.y + TOP_PANEL.h - 50;

    ctx.save();
    ctx.translate(handX, handY);

    // Arm coming from bottom right
    ctx.fillStyle = COLORS.skin;
    ctx.strokeStyle = COLORS.skinOutline;
    ctx.lineWidth = 1.5;

    // Forearm
    ctx.beginPath();
    ctx.moveTo(80, 60);
    ctx.lineTo(20, 10);
    ctx.lineTo(10, 25);
    ctx.lineTo(70, 75);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Hand base
    ctx.beginPath();
    ctx.ellipse(15, 15, 18, 14 * aspectRatio, -0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Pointing finger (index)
    ctx.beginPath();
    ctx.moveTo(5, 5);
    ctx.lineTo(-50, -15);
    ctx.lineTo(-55, -8);
    ctx.lineTo(-5, 12);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Fingernail
    ctx.fillStyle = '#FFE4D6';
    ctx.beginPath();
    ctx.ellipse(-50, -11, 5, 3 * aspectRatio, -0.3, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawCharacterPanel() {
    const cx = W / 2;
    const cy = BOTTOM_PANEL.y + BOTTOM_PANEL.h / 2 + 30;

    // Character's body/shirt (burgundy/maroon like the meme)
    ctx.fillStyle = COLORS.shirt;
    ctx.beginPath();
    ctx.moveTo(cx - 80, cy + 120);
    ctx.quadraticCurveTo(cx - 90, cy + 60, cx - 50, cy + 30);
    ctx.lineTo(cx + 50, cy + 30);
    ctx.quadraticCurveTo(cx + 90, cy + 60, cx + 80, cy + 120);
    ctx.closePath();
    ctx.fill();

    // Shirt collar/neckline
    ctx.strokeStyle = COLORS.shirtDark;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx - 25, cy + 30);
    ctx.quadraticCurveTo(cx, cy + 45, cx + 25, cy + 30);
    ctx.stroke();

    // Neck
    ctx.fillStyle = COLORS.skin;
    ctx.beginPath();
    ctx.moveTo(cx - 18, cy + 30);
    ctx.lineTo(cx - 15, cy + 5);
    ctx.lineTo(cx + 15, cy + 5);
    ctx.lineTo(cx + 18, cy + 30);
    ctx.closePath();
    ctx.fill();

    // Head (larger, more like the meme)
    ctx.beginPath();
    ctx.ellipse(cx, cy - 25, 55, 60 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fillStyle = COLORS.skin;
    ctx.fill();
    ctx.strokeStyle = COLORS.skinOutline;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Ear (right side visible)
    ctx.beginPath();
    ctx.ellipse(cx + 52, cy - 20, 8, 12 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fillStyle = COLORS.skin;
    ctx.fill();
    ctx.stroke();

    // Hair (reddish-brown, short like the meme)
    ctx.fillStyle = COLORS.hair;
    ctx.beginPath();
    ctx.moveTo(cx - 45, cy - 55);
    ctx.quadraticCurveTo(cx - 50, cy - 90, cx, cy - 85);
    ctx.quadraticCurveTo(cx + 50, cy - 90, cx + 45, cy - 55);
    ctx.quadraticCurveTo(cx + 30, cy - 65, cx, cy - 60);
    ctx.quadraticCurveTo(cx - 30, cy - 65, cx - 45, cy - 55);
    ctx.fill();

    // Face expression based on state
    if (characterState === 'nervous') {
      drawNervousFace(cx, cy - 25);
    } else if (characterState === 'relieved') {
      drawRelievedFace(cx, cy - 25);
    } else {
      drawDespairFace(cx, cy - 25);
    }

    // Hand with cloth wiping forehead (always visible when nervous)
    if (characterState === 'nervous') {
      drawWipingHand(cx, cy - 25);
    }

    // Floating sweat drops around head (like the meme)
    drawSweatDrops(cx, cy - 25);
  }

  function drawSweatDrops(cx, cy) {
    // Fixed sweat drop positions around face (matching the meme)
    const dropPositions = [
      { x: cx + 45, y: cy - 30 },
      { x: cx + 55, y: cy - 10 },
      { x: cx + 50, y: cy + 10 },
      { x: cx + 40, y: cy + 25 },
      { x: cx - 20, y: cy - 45 },
      { x: cx + 10, y: cy - 50 },
    ];

    ctx.fillStyle = COLORS.sweat;
    ctx.strokeStyle = '#5BA3C0';
    ctx.lineWidth = 1;

    dropPositions.forEach((pos, i) => {
      const wobble = prefersReducedMotion ? 0 : Math.sin(gameTime * 4 + i * 1.5) * 2;

      ctx.beginPath();
      // Teardrop shape
      ctx.moveTo(pos.x + wobble, pos.y - 4);
      ctx.quadraticCurveTo(pos.x + 5 + wobble, pos.y + 4, pos.x + wobble, pos.y + 8);
      ctx.quadraticCurveTo(pos.x - 5 + wobble, pos.y + 4, pos.x + wobble, pos.y - 4);
      ctx.fill();
      ctx.stroke();
    });
  }

  function drawNervousFace(cx, cy) {
    // Worried eyebrows (angled up in worry like the meme)
    ctx.strokeStyle = COLORS.hair;
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';

    // Left eyebrow
    ctx.beginPath();
    ctx.moveTo(cx - 32, cy - 12);
    ctx.lineTo(cx - 15, cy - 22);
    ctx.stroke();

    // Right eyebrow
    ctx.beginPath();
    ctx.moveTo(cx + 32, cy - 12);
    ctx.lineTo(cx + 15, cy - 22);
    ctx.stroke();

    // Eyes (wide, worried) - white with dark outline
    ctx.fillStyle = '#FFFFFF';
    ctx.strokeStyle = COLORS.outline;
    ctx.lineWidth = 1.5;

    ctx.beginPath();
    ctx.ellipse(cx - 20, cy - 5, 12, 14 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    ctx.beginPath();
    ctx.ellipse(cx + 20, cy - 5, 12, 14 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Pupils (small, looking up nervously)
    ctx.fillStyle = COLORS.outline;
    ctx.beginPath();
    ctx.ellipse(cx - 20, cy - 8, 5, 6 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + 20, cy - 8, 5, 6 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Worried mouth (wavy anxious line like the meme)
    ctx.strokeStyle = COLORS.outline;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(cx - 20, cy + 28);
    ctx.quadraticCurveTo(cx - 10, cy + 35, cx, cy + 28);
    ctx.quadraticCurveTo(cx + 10, cy + 22, cx + 20, cy + 28);
    ctx.stroke();

    // Blush marks (stress/embarrassment like the meme)
    ctx.fillStyle = COLORS.blush;
    ctx.beginPath();
    ctx.ellipse(cx - 38, cy + 8, 12, 6 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + 38, cy + 8, 12, 6 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawRelievedFace(cx, cy) {
    // Happy eyebrows
    ctx.strokeStyle = COLORS.hair;
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx - 30, cy - 18);
    ctx.lineTo(cx - 15, cy - 18);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx + 30, cy - 18);
    ctx.lineTo(cx + 15, cy - 18);
    ctx.stroke();

    // Closed happy eyes (^ ^)
    ctx.strokeStyle = COLORS.outline;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(cx - 28, cy);
    ctx.lineTo(cx - 20, cy - 10);
    ctx.lineTo(cx - 12, cy);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx + 12, cy);
    ctx.lineTo(cx + 20, cy - 10);
    ctx.lineTo(cx + 28, cy);
    ctx.stroke();

    // Big smile
    ctx.strokeStyle = COLORS.outline;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(cx, cy + 22, 18, 0.1, Math.PI - 0.1);
    ctx.stroke();

    // Rosy cheeks (happy)
    ctx.fillStyle = 'rgba(255, 180, 180, 0.5)';
    ctx.beginPath();
    ctx.ellipse(cx - 38, cy + 8, 12, 6 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + 38, cy + 8, 12, 6 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawDespairFace(cx, cy) {
    // Sad eyebrows (angled down)
    ctx.strokeStyle = COLORS.hair;
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx - 32, cy - 20);
    ctx.lineTo(cx - 15, cy - 12);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx + 32, cy - 20);
    ctx.lineTo(cx + 15, cy - 12);
    ctx.stroke();

    // Sad eyes
    ctx.fillStyle = '#FFFFFF';
    ctx.strokeStyle = COLORS.outline;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(cx - 20, cy - 5, 12, 14 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(cx + 20, cy - 5, 12, 14 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Pupils looking down
    ctx.fillStyle = COLORS.outline;
    ctx.beginPath();
    ctx.ellipse(cx - 20, cy + 2, 5, 6 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + 20, cy + 2, 5, 6 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Sad frown
    ctx.strokeStyle = COLORS.outline;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(cx, cy + 40, 15, Math.PI + 0.3, -0.3);
    ctx.stroke();

    // Sad blush
    ctx.fillStyle = COLORS.blush;
    ctx.beginPath();
    ctx.ellipse(cx - 38, cy + 8, 12, 6 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + 38, cy + 8, 12, 6 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawWipingHand(cx, cy) {
    // Hand with white cloth wiping forehead (like the meme)
    const handX = cx - 35;
    const handY = cy - 50;
    const wipeOffset = prefersReducedMotion ? 0 : Math.sin(gameTime * 4) * 3;

    ctx.save();
    ctx.translate(handX + wipeOffset, handY);

    // White cloth/towel (large, draped over hand like the meme)
    ctx.fillStyle = '#FFFFFF';
    ctx.strokeStyle = '#DDDDDD';
    ctx.lineWidth = 1.5;

    // Main cloth shape
    ctx.beginPath();
    ctx.moveTo(-30, -20);
    ctx.quadraticCurveTo(-45, 0, -40, 30);
    ctx.lineTo(-20, 45);
    ctx.quadraticCurveTo(0, 35, 10, 20);
    ctx.lineTo(15, -10);
    ctx.quadraticCurveTo(5, -25, -30, -20);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Cloth fold lines
    ctx.strokeStyle = '#CCCCCC';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-25, -10);
    ctx.quadraticCurveTo(-30, 10, -25, 30);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-10, -5);
    ctx.quadraticCurveTo(-5, 15, 0, 25);
    ctx.stroke();

    // Arm coming from right side
    ctx.fillStyle = COLORS.skin;
    ctx.strokeStyle = COLORS.skinOutline;
    ctx.lineWidth = 1.5;

    // Forearm
    ctx.beginPath();
    ctx.moveTo(20, 10);
    ctx.lineTo(70, 50);
    ctx.lineTo(80, 40);
    ctx.lineTo(35, 0);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Hand holding cloth
    ctx.beginPath();
    ctx.ellipse(10, 15, 18, 14 * aspectRatio, 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Fingers wrapped around cloth
    ctx.beginPath();
    ctx.ellipse(-5, 20, 8, 6 * aspectRatio, 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    ctx.restore();
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;

    // Initialize audio on first touch
    initAudio();

    const touch = e.touches[0] || e.changedTouches[0];
    const { x, y } = screenToLogical(touch.clientX, touch.clientY);

    if (type === 'start') {
      // Check button presses
      buttons.forEach(btn => {
        if (pointInRect(x, y, btn)) {
          btn.pressed = true;
          const isCorrect = btn.choice.is_correct;
          characterState = isCorrect ? 'relieved' : 'despair';

          // Play sound and spawn particles
          playSound('click');
          spawnButtonParticles(btn.x + btn.w / 2, btn.y + btn.h / 2, isCorrect);

          // Small delay to show feedback before ending
          setTimeout(() => {
            playSound(isCorrect ? 'correct' : 'wrong');
          }, 100);

          setTimeout(() => {
            engine.end(isCorrect, btn.choice.explanation);
          }, 300);
        }
      });
    }

    if (type === 'move' || type === 'start') {
      // Update hover state
      hoverButton = null;
      buttons.forEach(btn => {
        if (pointInRect(x, y, btn)) {
          hoverButton = btn;
        }
      });
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;

    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame();
      drawEndScreen(dt);
    }

    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'playing') return;
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    hoverButton = null;
    buttons.forEach(btn => {
      if (pointInRect(x, y, btn)) {
        hoverButton = btn;
      }
    });
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100);
  });

  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
