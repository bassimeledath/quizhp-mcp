<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Cliff Rock Climbing Grab</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  =====================================================================================
    GAME FACTORY TEMPLATE - MOBILE
    Fills 100% of container, non-uniform scaling, touch input.
    Logical dimensions: 360x640 (use aspectRatio for proportional shapes)
  =====================================================================================
  -->
  <style>
    /* === BASE STYLES - Can be extended, not removed === */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <script>
  // =====================================================================================
  //   SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT
  //   Platform replaces this at runtime. Use these exact 60-char answers.
  // =====================================================================================
  const QUESTION = {
    type: "true_false",
    prompt: "Sample question text",
    choices: [
      { text: "True -- This statement is verified and confirmed to be correct", is_correct: true, explanation: "This is indeed true based on the evidence" },
      { text: "False - This statement is not accurate and should be rejected", is_correct: false, explanation: "This is false because the evidence shows otherwise" }
    ],
    isLastQuestion: false
  };

  // =====================================================================================
  //   SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY
  //   Non-uniform scaling (fills container), touch input, tap-to-restart.
  // =====================================================================================
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    aspectRatio = scaleX / scaleY;

    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px 'Nunito', sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // === TEXT UTILITIES ===
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // =====================================================================================
  //   SECTION 3: GAME CODE - Cliff Rock Climbing Grab
  //   Climber hangs on cliff face. Swipe up-left or up-right to grab True/False holds.
  // =====================================================================================

  // --- QuizHP Colors ---
  const COLORS = {
    bgPrimary: '#FAFAF7',
    bgSurface: '#FFFFFF',
    textPrimary: '#2B2B28',
    textSecondary: '#5A5A54',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    borderSubtle: '#E6E6E0',
    borderStrong: '#D4D4CC',
    peach: '#FFB89D',
    orangeLight: '#FFF4ED',
    cyanLight: '#E8F9F8'
  };

  // --- Sound Engine ---
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
  }

  function playSound(type) {
    try {
      const ac = getAudioCtx();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);

      if (type === 'click') {
        osc.frequency.value = 600;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.15, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.1);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.1);
      } else if (type === 'grab') {
        osc.frequency.value = 440;
        osc.type = 'triangle';
        gain.gain.setValueAtTime(0.2, ac.currentTime);
        osc.frequency.exponentialRampToValueAtTime(880, ac.currentTime + 0.15);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.25);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.25);
      } else if (type === 'correct') {
        osc.frequency.value = 523;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.2, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.5);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.5);
        // Second note
        const osc2 = ac.createOscillator();
        const gain2 = ac.createGain();
        osc2.connect(gain2);
        gain2.connect(ac.destination);
        osc2.frequency.value = 659;
        osc2.type = 'sine';
        gain2.gain.setValueAtTime(0.2, ac.currentTime + 0.12);
        gain2.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.6);
        osc2.start(ac.currentTime + 0.12);
        osc2.stop(ac.currentTime + 0.6);
      } else if (type === 'wrong') {
        osc.frequency.value = 200;
        osc.type = 'sawtooth';
        gain.gain.setValueAtTime(0.15, ac.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
        osc.start(ac.currentTime);
        osc.stop(ac.currentTime + 0.4);
      }
    } catch (e) {}
  }

  // --- Game Particles ---
  let gameParticles = [];

  function spawnGameParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      gameParticles.push({
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 200,
        vy: (Math.random() - 0.5) * 200 - 50,
        size: 2 + Math.random() * 4,
        color: color,
        alpha: 1,
        life: 0.6 + Math.random() * 0.4
      });
    }
  }

  function updateParticles(dt) {
    gameParticles = gameParticles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 300 * dt;
      p.life -= dt;
      p.alpha = Math.max(0, p.life / 0.8);
      return p.life > 0;
    });
  }

  function drawParticles() {
    gameParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.size, p.size * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
  }

  // --- Game State Variables ---
  let climber = null;
  let holds = [];
  let cliffLedges = [];
  let touchStartPos = null;
  let swipeDirection = null; // 'left' or 'right'
  let animating = false;
  let animTarget = null;
  let animProgress = 0;
  let animStartPos = null;
  let selectedChoice = null;
  let entranceTimer = 0;
  let breatheTimer = 0;
  let holdTextData = [];
  let swipeIndicatorAlpha = 0.6;
  let swipeIndicatorDir = -1;

  function recalculateTextSizing() {
    if (!holds || holds.length === 0) return;
    const texts = QUESTION.choices.map(c => c.text);
    const holdW = holds[0].w;
    const holdH = holds[0].h;

    // Try to find optimal font that fits all text in the hold
    let bestFontSize = 14;
    let bestWrapped = [];

    for (let fs = 18; fs >= 14; fs -= 0.5) {
      const font = `${fs}px 'Nunito', sans-serif`;
      const lineH = fs + 3;
      const maxLines = Math.floor((holdH - 12) / lineH);
      let allFit = true;
      const wrapped = [];

      for (const text of texts) {
        const lines = wrapText(text, holdW - 20, font, Math.max(maxLines, 5));
        wrapped.push(lines);
        if (lines.length * lineH > holdH - 10) {
          allFit = false;
        }
      }

      if (allFit) {
        bestFontSize = fs;
        bestWrapped = wrapped;
        break;
      }
      bestWrapped = wrapped;
    }

    holdTextData = bestWrapped.map((lines, i) => ({
      lines: lines,
      fontSize: bestFontSize
    }));
  }

  function initGame() {
    // Climber starts at bottom center of cliff
    climber = {
      x: W / 2,
      y: 460,
      targetX: W / 2,
      targetY: 460,
      armAngle: 0,
      scale: 0, // entrance animation
      breatheOffset: 0
    };

    // Two rock holds: left=choice[0], right=choice[1]
    // Each hold is 150 wide with 10px gap, centered in 360-wide canvas
    const holdW = 150;
    const holdH = 140;
    const gap = 10;
    const totalW = holdW * 2 + gap;
    const startX = (W - totalW) / 2;
    holds = QUESTION.choices.map((choice, i) => ({
      x: startX + i * (holdW + gap),
      y: 100,
      w: holdW,
      h: holdH,
      choice: choice,
      scale: 0, // entrance animation
      alpha: 0,
      glowTimer: 0,
      shakeX: 0
    }));

    // Generate cliff ledges for background decoration
    cliffLedges = [];
    for (let i = 0; i < 12; i++) {
      cliffLedges.push({
        x: Math.random() * W,
        y: 80 + Math.random() * 500,
        w: 20 + Math.random() * 50,
        h: 6 + Math.random() * 10,
        shade: 0.2 + Math.random() * 0.15
      });
    }

    touchStartPos = null;
    swipeDirection = null;
    animating = false;
    animTarget = null;
    animProgress = 0;
    animStartPos = null;
    selectedChoice = null;
    entranceTimer = 0;
    breatheTimer = 0;
    gameParticles = [];
    holdTextData = [];

    recalculateTextSizing();
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    entranceTimer += dt;
    breatheTimer += dt;

    // Entrance animation for holds
    holds.forEach((hold, i) => {
      const delay = 0.15 + i * 0.15;
      if (entranceTimer > delay) {
        const t = Math.min((entranceTimer - delay) / 0.4, 1);
        const spring = 1 + Math.sin(t * Math.PI * 2) * 0.2 * (1 - t);
        hold.scale = t * spring;
        hold.alpha = Math.min(t * 1.5, 1);
      }
      hold.glowTimer += dt;
    });

    // Entrance animation for climber
    if (entranceTimer > 0.4) {
      const t = Math.min((entranceTimer - 0.4) / 0.35, 1);
      const spring = 1 + Math.sin(t * Math.PI * 2) * 0.15 * (1 - t);
      climber.scale = t * spring;
    }

    // Breathing animation for climber
    climber.breatheOffset = Math.sin(breatheTimer * 2) * 2;

    // Swipe indicator pulsing
    swipeIndicatorAlpha += swipeIndicatorDir * dt * 0.8;
    if (swipeIndicatorAlpha <= 0.2) { swipeIndicatorAlpha = 0.2; swipeIndicatorDir = 1; }
    if (swipeIndicatorAlpha >= 0.7) { swipeIndicatorAlpha = 0.7; swipeIndicatorDir = -1; }

    // Climbing animation
    if (animating && animTarget !== null) {
      animProgress += dt * 2.2; // ~0.45s to reach hold
      const t = Math.min(animProgress, 1);
      // Ease out cubic
      const ease = 1 - Math.pow(1 - t, 3);

      climber.x = animStartPos.x + (animTarget.x + animTarget.w / 2 - animStartPos.x) * ease;
      climber.y = animStartPos.y + (animTarget.y + animTarget.h / 2 - animStartPos.y) * ease;

      // Arm reaching animation
      climber.armAngle = Math.sin(t * Math.PI) * 0.5;

      // Spawn dust particles during climb
      if (Math.random() < 0.3) {
        spawnGameParticles(climber.x, climber.y + 15, '#D4D4CC', 1);
      }

      if (t >= 1) {
        animating = false;
        // Play grab sound
        playSound('grab');
        // Dust burst at hold
        spawnGameParticles(animTarget.x + animTarget.w / 2, animTarget.y + animTarget.h / 2, COLORS.amber, 8);

        // Small delay then end
        const choice = selectedChoice;
        setTimeout(() => {
          if (choice.is_correct) {
            playSound('correct');
          } else {
            playSound('wrong');
          }
          engine.end(choice.is_correct, choice.explanation);
        }, 300);
      }
    }

    updateParticles(dt);
  }

  function drawGame() {
    // Sky gradient background
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, '#4A7EC4');
    skyGrad.addColorStop(0.4, '#7BABE0');
    skyGrad.addColorStop(0.7, '#B8D8F0');
    skyGrad.addColorStop(1, '#D6EAF5');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    // Cliff face (left and right rock walls)
    drawCliffFace();

    // Decorative cliff ledges
    cliffLedges.forEach(ledge => {
      ctx.fillStyle = `rgba(120, 100, 80, ${ledge.shade})`;
      ctx.beginPath();
      ctx.roundRect(ledge.x - ledge.w / 2, ledge.y, ledge.w, ledge.h, 3);
      ctx.fill();
    });

    // Draw rope from climber to anchor
    drawRope();

    // Draw the two rock holds with answer text
    holds.forEach((hold, i) => {
      if (hold.scale <= 0) return;
      ctx.save();
      ctx.translate(hold.x + hold.w / 2, hold.y + hold.h / 2);
      ctx.scale(hold.scale, hold.scale);
      ctx.translate(-(hold.x + hold.w / 2), -(hold.y + hold.h / 2));
      ctx.globalAlpha = hold.alpha;

      drawRockHold(hold, i);

      ctx.restore();
    });

    // Draw climber
    if (climber.scale > 0) {
      drawClimber();
    }

    // Draw swipe indicator arrows (before answer selected)
    if (!animating && !selectedChoice) {
      drawSwipeIndicators();
    }

    // Draw particles on top
    drawParticles();
  }

  function drawCliffFace() {
    // Left cliff wall
    const leftGrad = ctx.createLinearGradient(0, 0, 60, 0);
    leftGrad.addColorStop(0, '#8B7355');
    leftGrad.addColorStop(0.5, '#9C8468');
    leftGrad.addColorStop(1, 'rgba(156, 132, 104, 0)');
    ctx.fillStyle = leftGrad;
    ctx.fillRect(0, 0, 60, H);

    // Right cliff wall
    const rightGrad = ctx.createLinearGradient(W, 0, W - 60, 0);
    rightGrad.addColorStop(0, '#8B7355');
    rightGrad.addColorStop(0.5, '#9C8468');
    rightGrad.addColorStop(1, 'rgba(156, 132, 104, 0)');
    ctx.fillStyle = rightGrad;
    ctx.fillRect(W - 60, 0, 60, H);

    // Rock texture details on walls
    ctx.fillStyle = 'rgba(80, 60, 40, 0.15)';
    for (let wy = 0; wy < H; wy += 40) {
      ctx.fillRect(0, wy, 30 + Math.sin(wy * 0.1) * 10, 2);
      ctx.fillRect(W - 30 - Math.sin(wy * 0.15) * 10, wy, 30 + Math.sin(wy * 0.15) * 10, 2);
    }
  }

  function drawRope() {
    // Anchor point at top center
    const anchorX = W / 2;
    const anchorY = 60;

    ctx.strokeStyle = '#C8A86E';
    ctx.lineWidth = 2.5;
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(anchorX, anchorY);
    // Curved rope to climber
    const cx1 = anchorX + (climber.x - anchorX) * 0.3;
    const cy1 = anchorY + (climber.y - anchorY) * 0.4 + 20;
    ctx.quadraticCurveTo(cx1, cy1, climber.x, climber.y - 12);
    ctx.stroke();

    // Anchor carabiner
    ctx.fillStyle = '#A0A090';
    ctx.beginPath();
    ctx.ellipse(anchorX, anchorY, 5, 5 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#707060';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  function drawRockHold(hold, index) {
    const cx = hold.x + hold.w / 2;
    const cy = hold.y + hold.h / 2;

    // Glow behind hold
    const glowIntensity = 0.15 + Math.sin(hold.glowTimer * 2 + index) * 0.08;
    ctx.save();
    ctx.globalAlpha = glowIntensity * hold.alpha;
    const holdColor = index === 0 ? COLORS.cyan : COLORS.orange;
    ctx.fillStyle = holdColor;
    ctx.beginPath();
    ctx.ellipse(cx, cy, hold.w / 2 + 10, (hold.h / 2 + 10) * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Rock hold body - rounded rectangle
    const rockGrad = ctx.createRadialGradient(cx, cy - 5, 5, cx, cy, hold.w / 2);
    rockGrad.addColorStop(0, '#B8A88A');
    rockGrad.addColorStop(0.6, '#9C8A6E');
    rockGrad.addColorStop(1, '#7A6A50');
    ctx.fillStyle = rockGrad;
    ctx.beginPath();
    ctx.roundRect(hold.x, hold.y, hold.w, hold.h, 16);
    ctx.fill();

    // Border highlight
    ctx.strokeStyle = holdColor;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.roundRect(hold.x, hold.y, hold.w, hold.h, 16);
    ctx.stroke();

    // Light reflection on top edge
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.roundRect(hold.x + 4, hold.y + 2, hold.w - 8, hold.h / 3, 10);
    ctx.stroke();

    // Draw the answer text inside the hold
    const textInfo = holdTextData[index];
    if (textInfo && textInfo.lines) {
      const lines = textInfo.lines;
      const fs = textInfo.fontSize;
      const lineH = fs + 3;
      const totalTextH = lines.length * lineH;
      const startY = cy - totalTextH / 2 + lineH / 2;

      lines.forEach((line, li) => {
        drawText(line, cx, startY + li * lineH, {
          font: `500 ${fs}px 'Nunito', sans-serif`,
          color: '#FFFFFF',
          align: 'center',
          baseline: 'middle'
        });
      });
    }
  }

  function drawClimber() {
    const cx = climber.x;
    const cy = climber.y + climber.breatheOffset;
    const s = climber.scale;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(s, s);

    // Body (jacket) - orange color
    ctx.fillStyle = COLORS.orange;
    ctx.beginPath();
    ctx.ellipse(0, 0, 14, 18 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Head
    ctx.fillStyle = '#FFDAB9';
    ctx.beginPath();
    ctx.ellipse(0, -22, 10, 10 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Helmet
    ctx.fillStyle = COLORS.amber;
    ctx.beginPath();
    ctx.ellipse(0, -26, 11, 7 * aspectRatio, 0, -Math.PI, 0);
    ctx.fill();

    // Eyes
    ctx.fillStyle = COLORS.textPrimary;
    ctx.beginPath();
    ctx.ellipse(-3.5, -22, 1.5, 1.5 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(3.5, -22, 1.5, 1.5 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Arms reaching up
    ctx.strokeStyle = COLORS.orange;
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    // Left arm
    ctx.beginPath();
    ctx.moveTo(-10, -8);
    ctx.lineTo(-18 - climber.armAngle * 8, -20);
    ctx.stroke();
    // Right arm
    ctx.beginPath();
    ctx.moveTo(10, -8);
    ctx.lineTo(18 + climber.armAngle * 8, -20);
    ctx.stroke();

    // Hands
    ctx.fillStyle = '#FFDAB9';
    ctx.beginPath();
    ctx.ellipse(-18 - climber.armAngle * 8, -20, 3, 3 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(18 + climber.armAngle * 8, -20, 3, 3 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Legs
    ctx.strokeStyle = '#5A5040';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(-5, 14);
    ctx.lineTo(-8, 30);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(5, 14);
    ctx.lineTo(8, 30);
    ctx.stroke();

    // Boots
    ctx.fillStyle = '#5A5040';
    ctx.beginPath();
    ctx.ellipse(-8, 32, 5, 3 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(8, 32, 5, 3 * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawSwipeIndicators() {
    // Arrow indicating swipe-up-left and swipe-up-right
    ctx.save();
    ctx.globalAlpha = swipeIndicatorAlpha;

    // Calculate positions based on hold centers
    const leftHoldCx = holds[0].x + holds[0].w / 2;
    const rightHoldCx = holds[1].x + holds[1].w / 2;
    const arrowY = 330;

    // Left arrow (up and to the left)
    ctx.strokeStyle = COLORS.cyan;
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(leftHoldCx + 15, arrowY + 30);
    ctx.lineTo(leftHoldCx, arrowY);
    ctx.lineTo(leftHoldCx + 10, arrowY + 8);
    ctx.moveTo(leftHoldCx, arrowY);
    ctx.lineTo(leftHoldCx - 7, arrowY + 12);
    ctx.stroke();

    // Right arrow (up and to the right)
    ctx.strokeStyle = COLORS.orange;
    ctx.beginPath();
    ctx.moveTo(rightHoldCx - 15, arrowY + 30);
    ctx.lineTo(rightHoldCx, arrowY);
    ctx.lineTo(rightHoldCx - 10, arrowY + 8);
    ctx.moveTo(rightHoldCx, arrowY);
    ctx.lineTo(rightHoldCx + 7, arrowY + 12);
    ctx.stroke();

    ctx.restore();
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;
    if (animating) return;

    const touch = e.touches[0] || e.changedTouches[0];
    if (!touch) return;
    const pos = screenToLogical(touch.clientX, touch.clientY);

    if (type === 'start') {
      touchStartPos = { x: pos.x, y: pos.y };
      playSound('click');
    } else if (type === 'end' && touchStartPos) {
      const dx = pos.x - touchStartPos.x;
      const dy = pos.y - touchStartPos.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      // Need at least 30px swipe distance and upward movement
      if (dist > 30 && dy < -15) {
        // Determine left or right based on horizontal component
        let targetIndex;
        if (dx < 0) {
          // Swiped up-left -> left hold (choice 0)
          targetIndex = 0;
        } else {
          // Swiped up-right -> right hold (choice 1)
          targetIndex = 1;
        }

        selectedChoice = holds[targetIndex].choice;
        animTarget = holds[targetIndex];
        animStartPos = { x: climber.x, y: climber.y };
        animProgress = 0;
        animating = true;
      } else if (dist < 15) {
        // Tap directly on a hold
        holds.forEach((hold, i) => {
          if (pointInRect(pos.x, pos.y, hold)) {
            selectedChoice = hold.choice;
            animTarget = hold;
            animStartPos = { x: climber.x, y: climber.y };
            animProgress = 0;
            animating = true;
          }
        });
      }

      touchStartPos = null;
    }
  }

  // =====================================================================================
  //   SECTION 4: GAME LOOP - DO NOT MODIFY
  //   Standard loop with responsive scaling and touch handling.
  // =====================================================================================
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100);
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
