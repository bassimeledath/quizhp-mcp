<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Matrix Pill Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  MATRIX PILL QUIZ - TRUE/FALSE MOBILE GAME                                   ║
  ║  Choose the red pill (TRUE) or blue pill (FALSE)                             ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #000;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. TRUE/FALSE question type.              ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "true_false",
    prompt: "Sample true/false question text for testing the Matrix pill game",
    choices: [
      { text: "True", is_correct: true, explanation: "This is the correct answer explanation" },
      { text: "False", is_correct: false, explanation: "This is why false is incorrect" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: MATRIX PILL GAME CODE                                          ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // Reduced motion preference
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // Matrix digital rain - multiple layers for depth
  let rainDrops = [];
  let rainDropsBack = [];  // Background layer (slower, dimmer)
  let rainDropsFront = []; // Foreground layer (faster, brighter)
  const RAIN_COLUMNS = 25;
  const RAIN_COLUMNS_BACK = 15;
  const RAIN_COLUMNS_FRONT = 10;
  const MATRIX_CHARS = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF';

  // Morpheus character
  let morpheus = { x: W / 2, y: H / 2 - 30 };

  // Pills
  let pills = [];
  let pillHovered = null;
  let gameTime = 0;
  let selectedPill = null;
  let selectionTime = 0;

  // Entrance animation state
  let entranceTime = 0;
  let pillsEntered = false;

  // Particle effects
  let particles = [];

  // ═══════════════════════════════════════════════════════════════════════════
  // AUDIO SYSTEM - Web Audio API
  // ═══════════════════════════════════════════════════════════════════════════
  let audioCtx = null;
  let ambientOsc = null;
  let ambientGain = null;
  let ambientStarted = false;

  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  function resumeAudio() {
    if (audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }

  // Ambient Matrix hum - low frequency drone
  function startAmbientHum() {
    if (!audioCtx || ambientStarted || prefersReducedMotion) return;
    ambientStarted = true;

    // Base drone
    ambientOsc = audioCtx.createOscillator();
    ambientGain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();

    ambientOsc.type = 'sawtooth';
    ambientOsc.frequency.setValueAtTime(55, audioCtx.currentTime); // Low A

    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(200, audioCtx.currentTime);
    filter.Q.setValueAtTime(5, audioCtx.currentTime);

    ambientGain.gain.setValueAtTime(0, audioCtx.currentTime);
    ambientGain.gain.linearRampToValueAtTime(0.03, audioCtx.currentTime + 2);

    ambientOsc.connect(filter);
    filter.connect(ambientGain);
    ambientGain.connect(audioCtx.destination);
    ambientOsc.start();

    // Add subtle modulation
    const lfo = audioCtx.createOscillator();
    const lfoGain = audioCtx.createGain();
    lfo.frequency.setValueAtTime(0.5, audioCtx.currentTime);
    lfoGain.gain.setValueAtTime(10, audioCtx.currentTime);
    lfo.connect(lfoGain);
    lfoGain.connect(ambientOsc.frequency);
    lfo.start();
  }

  function stopAmbientHum() {
    if (ambientGain && ambientOsc) {
      ambientGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
      setTimeout(() => {
        ambientOsc.stop();
        ambientStarted = false;
      }, 600);
    }
  }

  // Whoosh sound when pill is selected
  function playWhoosh() {
    if (!audioCtx || prefersReducedMotion) return;
    resumeAudio();

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();

    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);

    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(2000, audioCtx.currentTime);
    filter.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.3);

    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.35);
  }

  // Success sound - ascending digital chime
  function playSuccess() {
    if (!audioCtx || prefersReducedMotion) return;
    resumeAudio();

    const freqs = [523, 659, 784, 1047]; // C5 E5 G5 C6
    freqs.forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

      gain.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.08);
      gain.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + i * 0.08 + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.08 + 0.4);

      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(audioCtx.currentTime + i * 0.08);
      osc.stop(audioCtx.currentTime + i * 0.08 + 0.5);
    });
  }

  // Failure sound - descending glitch
  function playFailure() {
    if (!audioCtx || prefersReducedMotion) return;
    resumeAudio();

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const distortion = audioCtx.createWaveShaper();

    // Create distortion curve
    const curve = new Float32Array(256);
    for (let i = 0; i < 256; i++) {
      const x = (i * 2 / 256) - 1;
      curve[i] = Math.tanh(x * 3);
    }
    distortion.curve = curve;

    osc.type = 'square';
    osc.frequency.setValueAtTime(300, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.3);

    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);

    osc.connect(distortion);
    distortion.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.35);
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // PARTICLE SYSTEM
  // ═══════════════════════════════════════════════════════════════════════════

  // Green Matrix sparks for correct answer
  function spawnMatrixSparks(x, y) {
    if (prefersReducedMotion) return;
    const colors = ['#00FF00', '#00CC00', '#33FF33', '#4ECDC4', '#6BBF59'];
    for (let i = 0; i < 40; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 100 + Math.random() * 200;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 100,
        color: colors[Math.floor(Math.random() * colors.length)],
        size: 2 + Math.random() * 4,
        life: 1,
        decay: 0.8 + Math.random() * 0.5,
        type: 'spark',
        char: MATRIX_CHARS[Math.floor(Math.random() * MATRIX_CHARS.length)]
      });
    }
  }

  // Red glitch effect for wrong answer
  function spawnGlitchParticles(x, y) {
    if (prefersReducedMotion) return;
    const colors = ['#FF0000', '#E85D4A', '#FF3333', '#CC0000'];
    for (let i = 0; i < 30; i++) {
      particles.push({
        x: x + (Math.random() - 0.5) * 100,
        y: y + (Math.random() - 0.5) * 80,
        vx: (Math.random() - 0.5) * 50,
        vy: (Math.random() - 0.5) * 50,
        color: colors[Math.floor(Math.random() * colors.length)],
        w: 10 + Math.random() * 40,
        h: 2 + Math.random() * 6,
        life: 1,
        decay: 1.5 + Math.random(),
        type: 'glitch'
      });
    }
  }

  function updateParticles(dt) {
    particles = particles.filter(p => {
      p.life -= p.decay * dt;
      if (p.type === 'spark') {
        p.vy += 400 * dt; // gravity
        p.x += p.vx * dt;
        p.y += p.vy * dt;
      } else if (p.type === 'glitch') {
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        // Random jitter
        p.x += (Math.random() - 0.5) * 5;
        p.y += (Math.random() - 0.5) * 3;
      }
      return p.life > 0;
    });
  }

  function drawParticles() {
    const adj = getTextScaleAdjustment();
    particles.forEach(p => {
      ctx.globalAlpha = Math.max(0, p.life);
      if (p.type === 'spark') {
        // Draw as Matrix character
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.scale(adj / aspectRatio, adj);
        ctx.font = `${p.size * 3}px monospace`;
        ctx.fillStyle = p.color;
        ctx.textAlign = 'center';
        ctx.fillText(p.char, 0, 0);
        ctx.restore();
      } else if (p.type === 'glitch') {
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.w / 2, p.y - p.h / 2, p.w, p.h);
      }
    });
    ctx.globalAlpha = 1;
  }

  // Find True and False choices
  function getTrueChoice() {
    return QUESTION.choices.find(c => c.text.toLowerCase() === 'true') || QUESTION.choices[0];
  }

  function getFalseChoice() {
    return QUESTION.choices.find(c => c.text.toLowerCase() === 'false') || QUESTION.choices[1];
  }

  function initRainLayer(columns, speedMin, speedMax, lengthMin, lengthMax) {
    const drops = [];
    for (let i = 0; i < columns; i++) {
      drops.push({
        x: (i / columns) * W + Math.random() * (W / columns),
        y: Math.random() * H * 2 - H,
        speed: speedMin + Math.random() * (speedMax - speedMin),
        chars: [],
        length: lengthMin + Math.floor(Math.random() * (lengthMax - lengthMin)),
        charChangeTimer: 0
      });
      // Initialize character trail
      for (let j = 0; j < drops[i].length; j++) {
        drops[i].chars.push(MATRIX_CHARS[Math.floor(Math.random() * MATRIX_CHARS.length)]);
      }
    }
    return drops;
  }

  function initGame() {
    gameTime = 0;
    entranceTime = 0;
    pillsEntered = false;
    selectedPill = null;
    selectionTime = 0;
    pillHovered = null;
    particles = [];

    // Initialize audio
    initAudio();

    // Initialize rain drops - three layers for depth
    rainDropsBack = initRainLayer(RAIN_COLUMNS_BACK, 40, 70, 5, 10);   // Slow, short (far)
    rainDrops = initRainLayer(RAIN_COLUMNS, 80, 140, 8, 15);          // Medium (middle)
    rainDropsFront = initRainLayer(RAIN_COLUMNS_FRONT, 150, 220, 10, 18); // Fast, long (near)

    // Initialize pills - RED (True) on left, BLUE (False) on right
    const pillY = H / 2 + 120;
    const pillSpacing = 100;

    pills = [
      {
        x: W / 2 - pillSpacing,
        y: pillY,
        w: 70,
        h: 100,
        color: '#E85D4A',  // QuizHP error red for "truth is harsh"
        glowColor: 'rgba(232, 93, 74, 0.6)',
        label: 'TRUE',
        choice: getTrueChoice(),
        baseY: pillY,
        phase: 0,
        scale: 0,
        alpha: 0,
        targetY: pillY
      },
      {
        x: W / 2 + pillSpacing,
        y: pillY,
        w: 70,
        h: 100,
        color: '#4ECDC4',  // QuizHP cyan for "blissful ignorance"
        glowColor: 'rgba(78, 205, 196, 0.6)',
        label: 'FALSE',
        choice: getFalseChoice(),
        baseY: pillY,
        phase: Math.PI,
        scale: 0,
        alpha: 0,
        targetY: pillY
      }
    ];
  }

  function updateRainLayer(drops, dt) {
    drops.forEach(drop => {
      drop.y += drop.speed * dt;
      drop.charChangeTimer += dt;

      // Randomly change characters for digital effect
      if (drop.charChangeTimer > 0.1) {
        drop.charChangeTimer = 0;
        const changeIdx = Math.floor(Math.random() * drop.chars.length);
        if (Math.random() < 0.3) {
          drop.chars[changeIdx] = MATRIX_CHARS[Math.floor(Math.random() * MATRIX_CHARS.length)];
        }
      }

      if (drop.y > H + drop.length * 16) {
        drop.y = -drop.length * 16;
        drop.x = Math.random() * W;
      }
    });
  }

  // Entrance animation for pills (fade in + float up)
  function updatePillEntrance(dt) {
    if (pillsEntered || prefersReducedMotion) {
      pills.forEach(p => { p.scale = 1; p.alpha = 1; });
      pillsEntered = true;
      return;
    }

    entranceTime += dt;

    pills.forEach((pill, i) => {
      const delay = 0.3 + i * 0.15; // Stagger
      const t = Math.max(0, (entranceTime - delay) / 0.5);

      if (t > 0 && t <= 1) {
        // Spring easing
        const spring = 1 + Math.sin(t * Math.PI * 1.5) * 0.2 * (1 - t);
        pill.scale = Math.min(t * spring, 1);
        pill.alpha = Math.min(t * 1.5, 1);
        // Float up from below
        pill.baseY = pill.targetY + (1 - t) * 60;
      } else if (t > 1) {
        pill.scale = 1;
        pill.alpha = 1;
        pill.baseY = pill.targetY;
      }
    });

    if (entranceTime > 1) {
      pillsEntered = true;
      // Start ambient sound after entrance
      startAmbientHum();
    }
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    gameTime += dt;

    // Update rain drops - all three layers
    updateRainLayer(rainDropsBack, dt);
    updateRainLayer(rainDrops, dt);
    updateRainLayer(rainDropsFront, dt);

    // Update pill entrance animation
    updatePillEntrance(dt);

    // Update particles
    updateParticles(dt);

    // Update pill bobbing animation + idle pulse
    pills.forEach(pill => {
      if (pillsEntered && selectedPill === null) {
        // Gentle bobbing
        pill.y = pill.baseY + Math.sin(gameTime * 2 + pill.phase) * 8;
      }
    });

    // Handle selection animation
    if (selectedPill !== null) {
      selectionTime += dt;

      const pill = pills[selectedPill];
      const isCorrect = pill.choice.is_correct;

      // Selection animation - pill moves toward center and scales
      if (selectionTime < 0.4) {
        const t = selectionTime / 0.4;
        pill.scale = 1.2 + Math.sin(t * Math.PI * 6) * 0.1 * (1 - t);
      }

      if (selectionTime > 0.5) {
        stopAmbientHum();
        engine.end(isCorrect, pill.choice.explanation);
      }
    }
  }

  function drawGame() {
    // Deep black background with subtle gradient
    const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
    bgGrad.addColorStop(0, '#000000');
    bgGrad.addColorStop(0.5, '#050808');
    bgGrad.addColorStop(1, '#000000');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    // Draw matrix rain - back layer first (depth)
    drawMatrixRainLayer(rainDropsBack, 0.3, 10);

    // Draw Morpheus character (behind middle rain)
    drawMorpheus();

    // Draw matrix rain - middle layer
    drawMatrixRainLayer(rainDrops, 0.7, 14);

    // Draw pills
    drawPills();

    // Draw particles on top
    drawParticles();

    // Draw matrix rain - front layer (closest, brightest)
    drawMatrixRainLayer(rainDropsFront, 1.0, 18);
  }

  function drawMatrixRainLayer(drops, intensityMult, fontSize) {
    const adj = getTextScaleAdjustment();

    drops.forEach(drop => {
      for (let i = 0; i < drop.chars.length; i++) {
        const charY = drop.y - i * (fontSize + 2);
        if (charY < -20 || charY > H + 20) continue;

        // Fade based on position in trail
        const trailAlpha = 1 - (i / drop.chars.length);
        const alpha = trailAlpha * intensityMult;

        ctx.save();
        ctx.translate(drop.x, charY);
        ctx.scale(adj / aspectRatio, adj);
        ctx.font = `${fontSize}px 'Courier New', monospace`;

        if (i === 0) {
          // Leading character - bright white-green
          ctx.fillStyle = `rgba(200, 255, 200, ${alpha})`;
          // Add glow effect for lead character
          ctx.shadowColor = '#00FF00';
          ctx.shadowBlur = 8 * intensityMult;
        } else {
          // Trail - green fade
          const brightness = Math.floor(180 * trailAlpha);
          ctx.fillStyle = `rgba(0, ${brightness}, ${Math.floor(brightness * 0.3)}, ${alpha * 0.8})`;
        }

        ctx.textAlign = 'center';
        ctx.fillText(drop.chars[i], 0, 0);
        ctx.restore();
      }
    });

    // Reset shadow
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
  }

  function drawMorpheus() {
    const cx = morpheus.x;
    const cy = morpheus.y;

    // Subtle breathing animation
    const breathe = prefersReducedMotion ? 0 : Math.sin(gameTime * 1.5) * 0.01;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(1 + breathe, (1 + breathe) * aspectRatio);

    // Coat shadow (depth)
    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
    ctx.beginPath();
    ctx.moveTo(-33, -38);
    ctx.lineTo(-43, 82);
    ctx.lineTo(43, 82);
    ctx.lineTo(33, -38);
    ctx.closePath();
    ctx.fill();

    // Long coat - leather texture effect
    const coatGrad = ctx.createLinearGradient(-45, -40, 45, 80);
    coatGrad.addColorStop(0, '#151515');
    coatGrad.addColorStop(0.3, '#0a0a0a');
    coatGrad.addColorStop(0.6, '#121212');
    coatGrad.addColorStop(1, '#080808');
    ctx.fillStyle = coatGrad;

    ctx.beginPath();
    // Coat body with more detail
    ctx.moveTo(-35, -40);
    ctx.lineTo(-38, 0);
    ctx.lineTo(-45, 80);
    ctx.lineTo(-30, 85);
    ctx.lineTo(-20, 50);
    ctx.lineTo(0, 55);
    ctx.lineTo(20, 50);
    ctx.lineTo(30, 85);
    ctx.lineTo(45, 80);
    ctx.lineTo(38, 0);
    ctx.lineTo(35, -40);
    ctx.closePath();
    ctx.fill();

    // Coat lapels
    ctx.fillStyle = '#181818';
    ctx.beginPath();
    ctx.moveTo(-20, -40);
    ctx.lineTo(-25, 10);
    ctx.lineTo(-15, 15);
    ctx.lineTo(-10, -38);
    ctx.closePath();
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(20, -40);
    ctx.lineTo(25, 10);
    ctx.lineTo(15, 15);
    ctx.lineTo(10, -38);
    ctx.closePath();
    ctx.fill();

    // Vest underneath
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.moveTo(-18, -35);
    ctx.lineTo(-15, 20);
    ctx.lineTo(15, 20);
    ctx.lineTo(18, -35);
    ctx.closePath();
    ctx.fill();

    // Shoulders - more defined
    const shoulderGrad = ctx.createLinearGradient(-50, -35, -30, -15);
    shoulderGrad.addColorStop(0, '#1a1a1a');
    shoulderGrad.addColorStop(1, '#0a0a0a');
    ctx.fillStyle = shoulderGrad;

    ctx.beginPath();
    ctx.moveTo(-40, -35);
    ctx.quadraticCurveTo(-55, -30, -50, -10);
    ctx.lineTo(-30, -15);
    ctx.lineTo(-30, -40);
    ctx.closePath();
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(40, -35);
    ctx.quadraticCurveTo(55, -30, 50, -10);
    ctx.lineTo(30, -15);
    ctx.lineTo(30, -40);
    ctx.closePath();
    ctx.fill();

    // Neck
    ctx.fillStyle = '#2a2218';
    ctx.beginPath();
    ctx.moveTo(-8, -42);
    ctx.lineTo(-6, -50);
    ctx.lineTo(6, -50);
    ctx.lineTo(8, -42);
    ctx.closePath();
    ctx.fill();

    // Head silhouette with better shading
    const headGrad = ctx.createRadialGradient(0, -65, 5, 0, -60, 30);
    headGrad.addColorStop(0, '#2a2218');
    headGrad.addColorStop(0.5, '#1f1a12');
    headGrad.addColorStop(1, '#151210');
    ctx.fillStyle = headGrad;
    ctx.beginPath();
    ctx.ellipse(0, -60, 22, 28, 0, 0, Math.PI * 2);
    ctx.fill();

    // Bald head highlight
    ctx.fillStyle = '#2f2820';
    ctx.beginPath();
    ctx.ellipse(-3, -75, 12, 8, -0.2, Math.PI, Math.PI * 2);
    ctx.fill();

    // Ears
    ctx.fillStyle = '#1f1a12';
    ctx.beginPath();
    ctx.ellipse(-22, -55, 4, 8, 0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(22, -55, 4, 8, -0.2, 0, Math.PI * 2);
    ctx.fill();

    // Nose
    ctx.fillStyle = '#252015';
    ctx.beginPath();
    ctx.moveTo(-3, -50);
    ctx.lineTo(0, -42);
    ctx.lineTo(3, -50);
    ctx.closePath();
    ctx.fill();

    // Mouth (subtle line)
    ctx.strokeStyle = '#151210';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-6, -38);
    ctx.quadraticCurveTo(0, -36, 6, -38);
    ctx.stroke();

    // Goatee
    ctx.fillStyle = '#0a0805';
    ctx.beginPath();
    ctx.moveTo(-4, -37);
    ctx.quadraticCurveTo(0, -30, 4, -37);
    ctx.lineTo(2, -35);
    ctx.lineTo(-2, -35);
    ctx.closePath();
    ctx.fill();

    // Sunglasses - iconic pince-nez style
    ctx.fillStyle = '#000000';
    ctx.strokeStyle = '#4a4a4a';
    ctx.lineWidth = 2;

    // Left lens - slightly larger, more angular
    ctx.beginPath();
    ctx.ellipse(-12, -55, 11, 7, 0.05, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#3a3a3a';
    ctx.stroke();

    // Right lens
    ctx.beginPath();
    ctx.ellipse(12, -55, 11, 7, -0.05, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Bridge with nose piece
    ctx.strokeStyle = '#4a4a4a';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-1, -55);
    ctx.quadraticCurveTo(0, -52, 1, -55);
    ctx.stroke();

    // Lens reflections - Matrix green
    const pulseIntensity = 0.1 + Math.sin(gameTime * 2) * 0.05;
    ctx.fillStyle = `rgba(100, 255, 100, ${pulseIntensity})`;
    ctx.beginPath();
    ctx.ellipse(-14, -57, 5, 2.5, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(10, -57, 5, 2.5, -0.3, 0, Math.PI * 2);
    ctx.fill();

    // Secondary reflection
    ctx.fillStyle = `rgba(150, 255, 150, ${pulseIntensity * 0.5})`;
    ctx.beginPath();
    ctx.ellipse(-8, -53, 2, 1, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(16, -53, 2, 1, 0, 0, Math.PI * 2);
    ctx.fill();

    // Arms extended presenting pills
    const armGrad = ctx.createLinearGradient(-70, -20, -60, 50);
    armGrad.addColorStop(0, '#151515');
    armGrad.addColorStop(1, '#080808');
    ctx.fillStyle = armGrad;

    // Left arm with sleeve detail
    ctx.beginPath();
    ctx.moveTo(-35, -20);
    ctx.quadraticCurveTo(-55, -5, -65, 25);
    ctx.quadraticCurveTo(-70, 35, -72, 45);
    ctx.lineTo(-62, 48);
    ctx.quadraticCurveTo(-58, 35, -55, 20);
    ctx.quadraticCurveTo(-45, 5, -28, -10);
    ctx.closePath();
    ctx.fill();

    // Right arm
    ctx.beginPath();
    ctx.moveTo(35, -20);
    ctx.quadraticCurveTo(55, -5, 65, 25);
    ctx.quadraticCurveTo(70, 35, 72, 45);
    ctx.lineTo(62, 48);
    ctx.quadraticCurveTo(58, 35, 55, 20);
    ctx.quadraticCurveTo(45, 5, 28, -10);
    ctx.closePath();
    ctx.fill();

    // Hands (open palms with fingers)
    const skinTone = '#3a3025';
    ctx.fillStyle = skinTone;

    // Left hand - palm
    ctx.beginPath();
    ctx.ellipse(-70, 52, 9, 11, 0.15, 0, Math.PI * 2);
    ctx.fill();

    // Left fingers
    ctx.fillStyle = skinTone;
    for (let i = 0; i < 4; i++) {
      ctx.beginPath();
      ctx.ellipse(-75 + i * 4, 64, 2, 5, 0.1, 0, Math.PI * 2);
      ctx.fill();
    }
    // Thumb
    ctx.beginPath();
    ctx.ellipse(-60, 55, 3, 5, 0.8, 0, Math.PI * 2);
    ctx.fill();

    // Right hand - palm
    ctx.beginPath();
    ctx.ellipse(70, 52, 9, 11, -0.15, 0, Math.PI * 2);
    ctx.fill();

    // Right fingers
    for (let i = 0; i < 4; i++) {
      ctx.beginPath();
      ctx.ellipse(63 + i * 4, 64, 2, 5, -0.1, 0, Math.PI * 2);
      ctx.fill();
    }
    // Thumb
    ctx.beginPath();
    ctx.ellipse(60, 55, 3, 5, -0.8, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawPills() {
    pills.forEach((pill, index) => {
      const isHovered = pillHovered === index;
      const isSelected = selectedPill === index;
      const notSelected = selectedPill !== null && selectedPill !== index;

      // Entrance + interaction scaling
      let baseScale = pill.scale;
      if (isHovered && !isSelected && selectedPill === null) baseScale *= 1.1;
      if (isSelected) baseScale = pill.scale * (1.2 + Math.sin(selectionTime * 20) * 0.1);
      if (notSelected) baseScale *= Math.max(0, 1 - selectionTime * 2); // Fade out other pill

      // Idle pulse glow
      const pulsePhase = gameTime * 3 + pill.phase;
      const glowIntensity = 0.3 + Math.sin(pulsePhase) * 0.15;
      const pulseScale = prefersReducedMotion ? 1 : (1 + Math.sin(pulsePhase * 0.5) * 0.02);

      // Skip drawing if faded out
      if (baseScale < 0.01) return;

      ctx.save();
      ctx.globalAlpha = pill.alpha * (notSelected ? Math.max(0, 1 - selectionTime * 3) : 1);
      ctx.translate(pill.x, pill.y);
      ctx.scale(baseScale * pulseScale, baseScale * pulseScale * aspectRatio);

      // Outer glow - pulsing
      const glowSize = 55 + Math.sin(pulsePhase) * 5;
      const gradient = ctx.createRadialGradient(0, 0, 10, 0, 0, glowSize);
      gradient.addColorStop(0, pill.glowColor);
      gradient.addColorStop(0.5, pill.glowColor.replace('0.6', '0.2'));
      gradient.addColorStop(1, 'transparent');
      ctx.fillStyle = gradient;
      ctx.globalAlpha = (glowIntensity + (isHovered ? 0.3 : 0)) * pill.alpha;
      ctx.beginPath();
      ctx.ellipse(0, 0, glowSize, glowSize * 0.7, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = pill.alpha * (notSelected ? Math.max(0, 1 - selectionTime * 3) : 1);

      // Pill capsule shape
      const pillW = 25;
      const pillH = 40;

      // Pill shadow
      ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
      ctx.beginPath();
      ctx.ellipse(4, 5, pillW, pillH, 0, 0, Math.PI * 2);
      ctx.fill();

      // Main pill body - using QuizHP colors
      const pillGrad = ctx.createLinearGradient(-pillW, -pillH, pillW, pillH);
      if (pill.color === '#E85D4A') {
        // Red pill - error/truth red
        pillGrad.addColorStop(0, '#FF7A6B');
        pillGrad.addColorStop(0.3, '#E85D4A');
        pillGrad.addColorStop(0.7, '#C94A3A');
        pillGrad.addColorStop(1, '#A33A2D');
      } else {
        // Blue pill - cyan
        pillGrad.addColorStop(0, '#7EEEE6');
        pillGrad.addColorStop(0.3, '#4ECDC4');
        pillGrad.addColorStop(0.7, '#3BADA6');
        pillGrad.addColorStop(1, '#2A9088');
      }

      ctx.fillStyle = pillGrad;
      ctx.beginPath();
      ctx.ellipse(0, 0, pillW, pillH, 0, 0, Math.PI * 2);
      ctx.fill();

      // Pill highlight - top left shine
      ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
      ctx.beginPath();
      ctx.ellipse(-8, -18, 10, 14, -0.3, 0, Math.PI * 2);
      ctx.fill();

      // Secondary highlight
      ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
      ctx.beginPath();
      ctx.ellipse(-4, -8, 4, 6, -0.2, 0, Math.PI * 2);
      ctx.fill();

      // Pill band (center divider) - gel capsule look
      ctx.strokeStyle = 'rgba(0, 0, 0, 0.25)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.ellipse(0, 0, pillW, 4, 0, 0, Math.PI * 2);
      ctx.stroke();

      // Inner edge highlight on band
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.ellipse(0, -1, pillW - 2, 3, 0, 0, Math.PI);
      ctx.stroke();

      ctx.restore();

      // Label below pill
      if (pill.alpha > 0.5) {
        const labelY = pill.y + 70 * pill.scale;
        const labelAlpha = Math.min(1, (pill.alpha - 0.5) * 2);
        ctx.globalAlpha = labelAlpha * (notSelected ? Math.max(0, 1 - selectionTime * 3) : 1);
        drawText(pill.label, pill.x, labelY, {
          font: "bold 18px 'Nunito Sans', 'Courier New', monospace",
          color: pill.color === '#E85D4A' ? '#FF8A7D' : '#7EEEE6'
        });
        ctx.globalAlpha = 1;
      }
    });
  }

  function pointInPill(px, py, pill) {
    // Elliptical hit test accounting for aspect ratio
    const dx = (px - pill.x) / 45;
    const dy = (py - pill.y) / (55 * aspectRatio);
    return (dx * dx + dy * dy) <= 1;
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;
    if (selectedPill !== null) return; // Already selected

    // Resume audio on user interaction (iOS requirement)
    resumeAudio();

    const touch = e.touches[0] || e.changedTouches[0];
    const { x, y } = screenToLogical(touch.clientX, touch.clientY);

    if (type === 'start' || type === 'move') {
      // Check hover state
      pillHovered = null;
      pills.forEach((pill, index) => {
        if (pointInPill(x, y, pill)) {
          pillHovered = index;
        }
      });
    }

    if (type === 'start') {
      // Check for pill selection
      pills.forEach((pill, index) => {
        if (pointInPill(x, y, pill)) {
          selectedPill = index;
          selectionTime = 0;

          // Play whoosh sound
          playWhoosh();

          // Spawn particles based on correct/incorrect
          const isCorrect = pill.choice.is_correct;
          if (isCorrect) {
            spawnMatrixSparks(pill.x, pill.y);
            setTimeout(playSuccess, 200);
          } else {
            spawnGlitchParticles(pill.x, pill.y);
            setTimeout(playFailure, 150);
          }
        }
      });
    }
  }

  function recalculateTextSizing() {
    // Not needed for this game - text is minimal
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'playing' || selectedPill !== null) return;
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    pillHovered = null;
    pills.forEach((pill, index) => {
      if (pointInPill(x, y, pill)) {
        pillHovered = index;
      }
    });
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
