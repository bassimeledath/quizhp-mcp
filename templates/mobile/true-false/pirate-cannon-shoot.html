<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Pirate Cannon Shoot</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  GAME FACTORY TEMPLATE - MOBILE                                              ║
  ║  Fills 100% of container, non-uniform scaling, touch input.                  ║
  ║  Logical dimensions: 360×640 (use aspectRatio for proportional shapes)       ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none; /* Prevent default touch behaviors */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      /* Canvas fills viewport via JS, these are fallbacks */
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill viewport
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "mcq",
    prompt: "Sample question text",
    choices: [
      { text: "This is sample answer A which is long enough to test text overflow", is_correct: true, explanation: "Why A is correct" },
      { text: "This is sample answer B which is long enough to test text overflow", is_correct: false, explanation: "Why B is wrong" },
      { text: "This is sample answer C which is long enough to test text overflow", is_correct: false, explanation: "Why C is wrong" },
      { text: "This is sample answer D which is long enough to test text overflow", is_correct: false, explanation: "Why D is wrong" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  Pirate Cannon Shoot - true/false                                          ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // === COLORS ===
  const COLORS = {
    ocean: '#1B3A4B',
    oceanDeep: '#0F2B3C',
    oceanWave: '#2A5568',
    sky: '#1C2E4A',
    skyTop: '#0E1B30',
    ship: '#5C3A1E',
    shipDark: '#3E2712',
    shipLight: '#7A4F2D',
    cannon: '#3A3A3A',
    cannonDark: '#2A2A2A',
    cannonHighlight: '#5A5A5A',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    text: '#F5F5F0',
    textDark: '#2B2B28',
    targetTrue: '#4ECDC4',
    targetFalse: '#E87A3E',
    cannonball: '#2B2B28',
    fire: '#F5A742',
    smoke: '#8C8C84'
  };

  // === GAME STATE ===
  let cannonAngle = 0; // -1 = full left (True), +1 = full right (False)
  let ship = null;
  let targets = [];
  let cannonball = null;
  let fireButton = null;
  let firing = false;
  let waveOffset = 0;
  let smokeParticles = [];
  let splashParticles = [];
  let targetHitAnim = { active: false, target: -1, time: 0 };
  let entranceAnim = 0;
  let answers = [];

  // Audio context for sound effects
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playSound(type) {
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);

      if (type === 'fire') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(120, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.3);
      } else if (type === 'correct') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, ctx.currentTime);
        osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
        osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.2, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.4);
      } else if (type === 'wrong') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(200, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.2, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.3);
      } else if (type === 'click') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.05);
        gain.gain.setValueAtTime(0.15, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.05);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.05);
      } else if (type === 'splash') {
        // White noise burst for splash
        const bufferSize = ctx.sampleRate * 0.2;
        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
        }
        const noise = ctx.createBufferSource();
        noise.buffer = buffer;
        const noiseGain = ctx.createGain();
        noiseGain.gain.setValueAtTime(0.15, ctx.currentTime);
        noiseGain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
        noise.connect(noiseGain);
        noiseGain.connect(ctx.destination);
        noise.start(ctx.currentTime);
        return; // Early return since we used buffer source, not osc
      }
    } catch (e) { /* Audio not available */ }
  }

  function recalculateTextSizing() {
    if (!answers || answers.length === 0) return;
    const { fontSize, wrappedTexts } = findOptimalFontSize({
      texts: QUESTION.choices.slice(0, 2).map(c => c.text),
      maxWidth: 140,
      availableHeight: 80,
      minFont: 14,
      maxFont: 18,
      fontFamily: "'Nunito', sans-serif"
    });
    answers.forEach((ans, i) => {
      if (wrappedTexts[i]) {
        ans.wrappedText = wrappedTexts[i];
        ans.fontSize = fontSize;
      }
    });
  }

  function initGame() {
    // Ship at bottom center
    ship = {
      x: W / 2,
      y: H - 110,
      w: 160,
      h: 60,
      cannonLen: 50,
      cannonBaseY: -30,
      scale: 0,
      alpha: 0
    };

    // Two floating targets: True (left) and False (right)
    const trueChoice = QUESTION.choices[0];
    const falseChoice = QUESTION.choices[1];

    targets = [
      {
        x: 80,
        y: 200,
        radius: 50,
        choice: trueChoice,
        label: 'TRUE',
        color: COLORS.targetTrue,
        bobOffset: 0,
        bobSpeed: 1.5,
        scale: 0,
        alpha: 0,
        hitScale: 1
      },
      {
        x: 280,
        y: 200,
        radius: 50,
        choice: falseChoice,
        label: 'FALSE',
        color: COLORS.targetFalse,
        bobOffset: Math.PI,
        bobSpeed: 1.8,
        scale: 0,
        alpha: 0,
        hitScale: 1
      }
    ];

    // Answers array for text sizing
    answers = targets.map(t => ({
      choice: t.choice,
      wrappedText: [t.choice.text],
      fontSize: 16
    }));

    // Fire button at bottom
    fireButton = {
      x: W / 2 - 60,
      y: H - 50,
      w: 120,
      h: 48,
      pressed: false,
      scale: 0,
      alpha: 0
    };

    cannonAngle = 0;
    cannonball = null;
    firing = false;
    smokeParticles = [];
    splashParticles = [];
    targetHitAnim = { active: false, target: -1, time: 0 };
    entranceAnim = 0;

    recalculateTextSizing();
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    // Entrance animation
    if (entranceAnim < 1.2) {
      entranceAnim += dt;

      // Stagger entrance: ship first, targets next, fire button last
      const shipT = Math.min(Math.max((entranceAnim - 0) / 0.4, 0), 1);
      const spring1 = 1 + Math.sin(shipT * Math.PI * 2) * 0.2 * (1 - shipT);
      ship.scale = shipT * spring1;
      ship.alpha = shipT;

      targets.forEach((t, i) => {
        const tT = Math.min(Math.max((entranceAnim - 0.2 - i * 0.15) / 0.4, 0), 1);
        const spring2 = 1 + Math.sin(tT * Math.PI * 2) * 0.2 * (1 - tT);
        t.scale = tT * spring2;
        t.alpha = tT;
      });

      const btnT = Math.min(Math.max((entranceAnim - 0.6) / 0.3, 0), 1);
      const spring3 = 1 + Math.sin(btnT * Math.PI * 2) * 0.15 * (1 - btnT);
      fireButton.scale = btnT * spring3;
      fireButton.alpha = btnT;
    } else {
      ship.scale = 1; ship.alpha = 1;
      targets.forEach(t => { t.scale = 1; t.alpha = 1; });
      fireButton.scale = 1; fireButton.alpha = 1;
    }

    // Wave animation
    waveOffset += dt * 0.8;

    // Target bobbing
    targets.forEach(t => {
      t.bobOffset += t.bobSpeed * dt;
    });

    // Update cannonball flight
    if (cannonball && cannonball.active) {
      cannonball.x += cannonball.vx * dt;
      cannonball.y += cannonball.vy * dt;
      cannonball.vy += 120 * dt; // Slight gravity arc
      cannonball.time += dt;

      // Trail smoke
      if (Math.random() < 0.5) {
        smokeParticles.push({
          x: cannonball.x,
          y: cannonball.y,
          radius: 3 + Math.random() * 4,
          alpha: 0.6,
          life: 0.5
        });
      }

      // Check collision with targets
      targets.forEach((t, idx) => {
        const ty = t.y + Math.sin(t.bobOffset) * 8;
        const dx = cannonball.x - t.x;
        const dy = cannonball.y - ty;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < t.radius + 8) {
          cannonball.active = false;
          firing = false;

          // Spawn splash
          for (let i = 0; i < 15; i++) {
            splashParticles.push({
              x: t.x,
              y: ty,
              vx: (Math.random() - 0.5) * 200,
              vy: -Math.random() * 150 - 50,
              radius: 2 + Math.random() * 3,
              alpha: 1,
              color: t.color,
              life: 0.6
            });
          }

          targetHitAnim = { active: true, target: idx, time: 0 };
          playSound('splash');

          // Delay end call slightly for visual feedback
          const choice = t.choice;
          setTimeout(() => {
            if (choice.is_correct) {
              playSound('correct');
            } else {
              playSound('wrong');
            }
            engine.end(choice.is_correct, choice.explanation);
          }, 400);
        }
      });

      // Out of bounds
      if (cannonball.y < -50 || cannonball.x < -50 || cannonball.x > W + 50 || cannonball.y > H + 50) {
        cannonball.active = false;
        firing = false;
      }
    }

    // Update smoke
    smokeParticles.forEach(p => {
      p.alpha -= dt * 2;
      p.radius += dt * 8;
      p.life -= dt;
    });
    smokeParticles = smokeParticles.filter(p => p.life > 0);

    // Update splash
    splashParticles.forEach(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 300 * dt;
      p.alpha -= dt * 1.5;
      p.life -= dt;
    });
    splashParticles = splashParticles.filter(p => p.life > 0);

    // Target hit animation
    if (targetHitAnim.active) {
      targetHitAnim.time += dt;
      const t = targets[targetHitAnim.target];
      if (t) {
        const ht = targetHitAnim.time;
        t.hitScale = 1 + Math.sin(ht * Math.PI * 6) * 0.15 * Math.max(0, 1 - ht * 2);
      }
    }
  }

  function drawGame() {
    // === SKY GRADIENT ===
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.55);
    skyGrad.addColorStop(0, COLORS.skyTop);
    skyGrad.addColorStop(1, COLORS.sky);
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H * 0.55);

    // Stars
    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
    const stars = [[30, 40], [120, 20], [200, 55], [280, 30], [340, 50], [60, 80], [180, 90], [320, 75], [150, 35], [250, 15]];
    stars.forEach(([sx, sy]) => {
      const twinkle = 0.3 + 0.7 * Math.abs(Math.sin(waveOffset * 2 + sx));
      ctx.globalAlpha = twinkle * 0.5;
      ctx.beginPath();
      ctx.ellipse(sx, sy, 1.2, 1.2 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // === OCEAN ===
    const oceanGrad = ctx.createLinearGradient(0, H * 0.35, 0, H);
    oceanGrad.addColorStop(0, COLORS.oceanWave);
    oceanGrad.addColorStop(0.3, COLORS.ocean);
    oceanGrad.addColorStop(1, COLORS.oceanDeep);
    ctx.fillStyle = oceanGrad;
    ctx.fillRect(0, H * 0.35, W, H * 0.65);

    // Wave lines
    ctx.strokeStyle = 'rgba(78, 205, 196, 0.15)';
    ctx.lineWidth = 1.5;
    for (let wl = 0; wl < 5; wl++) {
      ctx.beginPath();
      const wy = H * 0.38 + wl * 35;
      for (let wx = 0; wx <= W; wx += 5) {
        const wvy = wy + Math.sin(wx * 0.03 + waveOffset + wl * 0.8) * 5;
        if (wx === 0) ctx.moveTo(wx, wvy);
        else ctx.lineTo(wx, wvy);
      }
      ctx.stroke();
    }

    // === TARGETS (floating in ocean) ===
    targets.forEach((t, idx) => {
      if (t.alpha <= 0) return;
      const bobY = t.y + Math.sin(t.bobOffset) * 8;

      ctx.save();
      ctx.globalAlpha = t.alpha;
      ctx.translate(t.x, bobY);
      ctx.scale(t.scale * t.hitScale, t.scale * t.hitScale);

      // Water splash ring around target
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.ellipse(0, t.radius * 0.6 * aspectRatio, t.radius * 1.2, 8 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.stroke();

      // Target base (dark circle)
      ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
      ctx.beginPath();
      ctx.ellipse(0, 0, t.radius + 4, (t.radius + 4) * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();

      // Target body
      ctx.fillStyle = t.color;
      ctx.beginPath();
      ctx.ellipse(0, 0, t.radius, t.radius * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();

      // Inner ring
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(0, 0, t.radius * 0.7, t.radius * 0.7 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.stroke();

      // Inner dot
      ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
      ctx.beginPath();
      ctx.ellipse(0, 0, t.radius * 0.3, t.radius * 0.3 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();

      // Target label
      if (t.alpha > 0.5) {
        drawText(t.label, t.x, bobY, {
          font: "700 20px 'Belanosima', sans-serif",
          color: '#FFFFFF',
          align: 'center'
        });
      }

      // Answer text below target
      if (t.alpha > 0.5) {
        const lines = answers[idx] ? answers[idx].wrappedText : [t.choice.text];
        const fontSize = answers[idx] ? answers[idx].fontSize : 16;
        const lineH = fontSize + 3;
        const textStartY = bobY + t.radius * aspectRatio + 18;
        lines.forEach((line, li) => {
          drawText(line, t.x, textStartY + li * lineH, {
            font: `500 ${fontSize}px 'Nunito', sans-serif`,
            color: '#F5F5F0',
            align: 'center'
          });
        });
      }
    });

    // === SPLASH PARTICLES ===
    splashParticles.forEach(p => {
      ctx.globalAlpha = Math.max(0, p.alpha);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.radius, p.radius * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // === SMOKE PARTICLES ===
    smokeParticles.forEach(p => {
      ctx.globalAlpha = Math.max(0, p.alpha);
      ctx.fillStyle = COLORS.smoke;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.radius, p.radius * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // === CANNONBALL ===
    if (cannonball && cannonball.active) {
      ctx.fillStyle = COLORS.cannonball;
      ctx.beginPath();
      ctx.ellipse(cannonball.x, cannonball.y, 6, 6 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();

      // Glow
      ctx.fillStyle = 'rgba(245, 167, 66, 0.3)';
      ctx.beginPath();
      ctx.ellipse(cannonball.x, cannonball.y, 10, 10 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // === SHIP ===
    if (ship.alpha > 0) {
      ctx.save();
      ctx.globalAlpha = ship.alpha;
      ctx.translate(ship.x, ship.y);
      ctx.scale(ship.scale, ship.scale);

      // Ship hull
      ctx.fillStyle = COLORS.ship;
      ctx.beginPath();
      ctx.moveTo(-ship.w / 2, 0);
      ctx.lineTo(-ship.w / 2 - 15, ship.h * 0.6);
      ctx.lineTo(ship.w / 2 + 15, ship.h * 0.6);
      ctx.lineTo(ship.w / 2, 0);
      ctx.closePath();
      ctx.fill();

      // Hull stripe
      ctx.fillStyle = COLORS.shipDark;
      ctx.beginPath();
      ctx.moveTo(-ship.w / 2 - 5, ship.h * 0.3);
      ctx.lineTo(-ship.w / 2 - 15, ship.h * 0.6);
      ctx.lineTo(ship.w / 2 + 15, ship.h * 0.6);
      ctx.lineTo(ship.w / 2 + 5, ship.h * 0.3);
      ctx.closePath();
      ctx.fill();

      // Deck
      ctx.fillStyle = COLORS.shipLight;
      ctx.fillRect(-ship.w / 2 + 10, -8, ship.w - 20, 12);

      // Railing posts
      ctx.strokeStyle = COLORS.shipDark;
      ctx.lineWidth = 2;
      for (let rp = -ship.w / 2 + 15; rp <= ship.w / 2 - 15; rp += 20) {
        ctx.beginPath();
        ctx.moveTo(rp, -8);
        ctx.lineTo(rp, -20);
        ctx.stroke();
      }
      // Railing top bar
      ctx.beginPath();
      ctx.moveTo(-ship.w / 2 + 15, -20);
      ctx.lineTo(ship.w / 2 - 15, -20);
      ctx.stroke();

      // === CANNON (rotates based on cannonAngle) ===
      const cannonPivotX = 0;
      const cannonPivotY = ship.cannonBaseY;
      const aimAngle = -Math.PI / 2 + cannonAngle * (Math.PI / 4); // -90deg +/- 45deg

      ctx.save();
      ctx.translate(cannonPivotX, cannonPivotY);

      // Cannon barrel
      ctx.save();
      ctx.rotate(aimAngle);
      ctx.fillStyle = COLORS.cannon;
      ctx.fillRect(-5, -ship.cannonLen, 10, ship.cannonLen);
      // Barrel highlight
      ctx.fillStyle = COLORS.cannonHighlight;
      ctx.fillRect(-5, -ship.cannonLen, 3, ship.cannonLen);
      // Muzzle
      ctx.fillStyle = COLORS.cannonDark;
      ctx.fillRect(-7, -ship.cannonLen - 4, 14, 6);
      ctx.restore();

      // Cannon base wheel
      ctx.fillStyle = COLORS.cannonDark;
      ctx.beginPath();
      ctx.ellipse(0, 0, 12, 12 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = COLORS.cannonHighlight;
      ctx.beginPath();
      ctx.ellipse(0, 0, 6, 6 * aspectRatio, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore(); // cannon pivot

      // Skull and crossbones on hull (small decorative)
      drawText('\u2620', 0, ship.h * 0.35, {
        font: "20px sans-serif",
        color: 'rgba(255,255,255,0.4)',
        align: 'center'
      });

      ctx.restore(); // ship
    }

    // === LEFT/RIGHT AIM INDICATORS ===
    if (!firing && ship.alpha > 0.8) {
      // Left arrow for True
      const leftArrowX = ship.x - ship.w / 2 - 25;
      const leftArrowY = ship.y - 20;
      const leftHighlight = cannonAngle < -0.3;
      ctx.globalAlpha = leftHighlight ? 0.9 : 0.4;
      ctx.fillStyle = COLORS.targetTrue;
      ctx.beginPath();
      ctx.moveTo(leftArrowX - 8, leftArrowY);
      ctx.lineTo(leftArrowX + 4, leftArrowY - 8);
      ctx.lineTo(leftArrowX + 4, leftArrowY + 8);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;

      // Right arrow for False
      const rightArrowX = ship.x + ship.w / 2 + 25;
      const rightArrowY = ship.y - 20;
      const rightHighlight = cannonAngle > 0.3;
      ctx.globalAlpha = rightHighlight ? 0.9 : 0.4;
      ctx.fillStyle = COLORS.targetFalse;
      ctx.beginPath();
      ctx.moveTo(rightArrowX + 8, rightArrowY);
      ctx.lineTo(rightArrowX - 4, rightArrowY - 8);
      ctx.lineTo(rightArrowX - 4, rightArrowY + 8);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // === FIRE BUTTON ===
    if (fireButton.alpha > 0) {
      ctx.save();
      ctx.globalAlpha = fireButton.alpha;
      ctx.translate(fireButton.x + fireButton.w / 2, fireButton.y + fireButton.h / 2);
      ctx.scale(fireButton.scale, fireButton.scale);
      ctx.translate(-(fireButton.w / 2), -(fireButton.h / 2));

      // Button shadow
      ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
      ctx.beginPath();
      ctx.roundRect(2, 3, fireButton.w, fireButton.h, 12);
      ctx.fill();

      // Button body
      const btnColor = firing ? COLORS.cannonDark : (fireButton.pressed ? COLORS.orangeHover : COLORS.orange);
      ctx.fillStyle = btnColor;
      ctx.beginPath();
      ctx.roundRect(0, 0, fireButton.w, fireButton.h, 12);
      ctx.fill();

      // Button border
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.roundRect(0, 0, fireButton.w, fireButton.h, 12);
      ctx.stroke();

      ctx.restore();

      // Fire button text
      const fireLabel = firing ? 'FIRING...' : 'FIRE!';
      drawText(fireLabel, fireButton.x + fireButton.w / 2, fireButton.y + fireButton.h / 2, {
        font: "700 20px 'Belanosima', sans-serif",
        color: '#FFFFFF',
        align: 'center'
      });
    }

    // === AIM INDICATOR LINE (dotted) ===
    if (!firing && ship.alpha > 0.8 && entranceAnim >= 1.0) {
      const aimAngle = -Math.PI / 2 + cannonAngle * (Math.PI / 4);
      const startX = ship.x + Math.cos(aimAngle) * (ship.cannonLen + 5);
      const startY = ship.y + ship.cannonBaseY + Math.sin(aimAngle) * (ship.cannonLen + 5);

      ctx.strokeStyle = 'rgba(245, 167, 66, 0.35)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 6]);
      ctx.beginPath();
      ctx.moveTo(startX, startY);
      ctx.lineTo(startX + Math.cos(aimAngle) * 150, startY + Math.sin(aimAngle) * 150);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;
    if (entranceAnim < 0.8) return;

    const touch = e.touches[0] || e.changedTouches[0];
    if (!touch) return;
    const { x, y } = screenToLogical(touch.clientX, touch.clientY);

    if (type === 'start') {
      // Check fire button
      if (pointInRect(x, y, fireButton) && !firing) {
        fireButton.pressed = true;
        fireCannon();
        playSound('click');
        return;
      }

      // Start aiming - track initial touch for swipe
      ship._touchStartX = x;
      ship._touchStartAngle = cannonAngle;
      ship._isTouching = true;
    }

    if (type === 'move' && ship._isTouching && !firing) {
      // Aim cannon by dragging left/right
      const dx = x - ship._touchStartX;
      const sensitivity = 0.008;
      cannonAngle = Math.max(-1, Math.min(1, ship._touchStartAngle + dx * sensitivity));
    }

    if (type === 'end') {
      fireButton.pressed = false;
      ship._isTouching = false;
    }
  }

  function fireCannon() {
    if (firing) return;
    firing = true;

    const aimAngle = -Math.PI / 2 + cannonAngle * (Math.PI / 4);

    const muzzleX = ship.x + Math.cos(aimAngle) * (ship.cannonLen + 10);
    const muzzleY = ship.y + ship.cannonBaseY + Math.sin(aimAngle) * (ship.cannonLen + 10);

    // Determine which target we're aiming at based on cannon angle
    const targetIdx = cannonAngle <= 0 ? 0 : 1;
    const target = targets[targetIdx];
    const targetY = target.y;

    // Calculate velocity to arc toward the target zone
    // Use projectile physics: given gravity, aim to reach target in ~0.7s
    const flightTime = 0.7;
    const gravity = 120;
    const dx = target.x - muzzleX;
    const dy = targetY - muzzleY;

    const vx = dx / flightTime;
    const vy = (dy - 0.5 * gravity * flightTime * flightTime) / flightTime;

    cannonball = {
      x: muzzleX,
      y: muzzleY,
      vx: vx,
      vy: vy,
      active: true,
      time: 0
    };

    // Muzzle smoke
    for (let i = 0; i < 8; i++) {
      smokeParticles.push({
        x: muzzleX + (Math.random() - 0.5) * 10,
        y: muzzleY + (Math.random() - 0.5) * 10,
        radius: 4 + Math.random() * 6,
        alpha: 0.7,
        life: 0.4 + Math.random() * 0.3
      });
    }

    playSound('fire');
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mousemove', (e) => {
    if (e.buttons === 1) {
      const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
      handleTouch(fakeTouch, 'move');
    }
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
