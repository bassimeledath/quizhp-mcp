<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Terms of Service Agreement</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "true_false",
    prompt: "Do you agree with the following statement?",
    choices: [
      { text: "True", is_correct: true, explanation: "The terms clearly state (multiple times) that the statement is true!" },
      { text: "False", is_correct: false, explanation: "Did you read the terms? They say the statement is true... over and over again!" }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   *
   * @param {string} text - The text to wrap
   * @param {number} maxWidth - Maximum width in logical coordinates
   * @param {string} font - CSS font string (e.g., "16px 'Nunito', sans-serif")
   * @param {number} maxLines - Maximum number of lines (default 3)
   * @returns {string[]} Array of text lines
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   * Tries font sizes from max to min until content fits.
   *
   * @param {Object} options
   * @param {string[]} options.texts - Array of text strings to fit
   * @param {number} options.maxWidth - Maximum width for text wrapping
   * @param {number} options.availableHeight - Total height available for all texts
   * @param {number} options.minFont - Minimum font size (default 12)
   * @param {number} options.maxFont - Maximum font size (default 18)
   * @param {number} options.itemPadding - Vertical padding per text item (default 4)
   * @param {string} options.fontFamily - Font family (default "'Nunito Sans', sans-serif")
   * @returns {{ fontSize: number, wrappedTexts: string[][] }} Optimal font size and pre-wrapped texts
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // ═══════════════════════════════════════════════════════════════════════════
  // AUDIO SYSTEM - Web Audio API for sound effects
  // ═══════════════════════════════════════════════════════════════════════════
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }

  function playSound(type) {
    if (!audioCtx) return;

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    const now = audioCtx.currentTime;

    if (type === 'correct') {
      // Ascending cheerful tone
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, now);
      osc.frequency.setValueAtTime(659, now + 0.1);
      osc.frequency.setValueAtTime(784, now + 0.2);
      gain.gain.setValueAtTime(0.25, now);
      gain.gain.exponentialDecayTo = gain.gain.exponentialRampToValueAtTime.bind(gain.gain);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
      osc.start(now);
      osc.stop(now + 0.4);
    } else if (type === 'wrong') {
      // Sympathetic low buzz
      osc.type = 'sine';
      osc.frequency.setValueAtTime(180, now);
      osc.frequency.setValueAtTime(150, now + 0.15);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
      osc.start(now);
      osc.stop(now + 0.25);
    } else if (type === 'click') {
      // Soft button click
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, now);
      osc.frequency.exponentialRampToValueAtTime(400, now + 0.05);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.06);
      osc.start(now);
      osc.stop(now + 0.06);
    } else if (type === 'scroll') {
      // Soft paper rustle - very subtle
      const noise = audioCtx.createOscillator();
      const noiseGain = audioCtx.createGain();
      noise.type = 'triangle';
      noise.frequency.setValueAtTime(80 + Math.random() * 40, now);
      noise.connect(noiseGain);
      noiseGain.connect(audioCtx.destination);
      noiseGain.gain.setValueAtTime(0.03, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      noise.start(now);
      noise.stop(now + 0.08);
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // ANIMATION SYSTEM
  // ═══════════════════════════════════════════════════════════════════════════
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // Animation state
  let entranceProgress = 0;
  let headerAlpha = 0;
  let headerY = 0;
  let tosBoxAlpha = 0;
  let tosBoxY = 0;
  let buttonsAlpha = 0;
  let buttonsY = 0;

  // Button press animation state
  let trueButtonScale = 1;
  let falseButtonScale = 1;
  let trueButtonPressed = false;
  let falseButtonPressed = false;

  // Scroll glow state
  let scrollGlowIntensity = 0;
  let lastScrollY = 0;

  function animateEntrance(dt) {
    if (prefersReducedMotion) {
      headerAlpha = 1;
      headerY = 0;
      tosBoxAlpha = 1;
      tosBoxY = 0;
      buttonsAlpha = 1;
      buttonsY = 0;
      return;
    }

    entranceProgress += dt;

    // Header: fade in and slide up (0-0.4s)
    const headerT = Math.min(Math.max((entranceProgress - 0) / 0.35, 0), 1);
    const headerEase = 1 - Math.pow(1 - headerT, 3); // ease-out cubic
    headerAlpha = headerEase;
    headerY = (1 - headerEase) * 15;

    // ToS box: fade in and slide up (0.15-0.5s)
    const tosT = Math.min(Math.max((entranceProgress - 0.15) / 0.4, 0), 1);
    const tosEase = 1 - Math.pow(1 - tosT, 3);
    tosBoxAlpha = tosEase;
    tosBoxY = (1 - tosEase) * 20;

    // Buttons: fade in and slide up (0.3-0.6s)
    const btnT = Math.min(Math.max((entranceProgress - 0.3) / 0.35, 0), 1);
    const btnEase = 1 - Math.pow(1 - btnT, 3);
    buttonsAlpha = btnEase;
    buttonsY = (1 - btnEase) * 15;
  }

  function updateButtonAnimations(dt) {
    // Animate button scales back to 1
    if (!trueButtonPressed && trueButtonScale < 1) {
      trueButtonScale = Math.min(1, trueButtonScale + dt * 8);
    }
    if (!falseButtonPressed && falseButtonScale < 1) {
      falseButtonScale = Math.min(1, falseButtonScale + dt * 8);
    }
  }

  function updateScrollGlow(dt) {
    // Detect scrolling and create glow effect
    if (Math.abs(scrollY - lastScrollY) > 0.5) {
      scrollGlowIntensity = Math.min(1, scrollGlowIntensity + dt * 8);
      // Play subtle scroll sound occasionally
      if (Math.abs(scrollY - lastScrollY) > 5 && Math.random() < 0.15) {
        playSound('scroll');
      }
    } else {
      scrollGlowIntensity = Math.max(0, scrollGlowIntensity - dt * 3);
    }
    lastScrollY = scrollY;
  }

  // Terms of Service paragraphs - all saying "the statement is true" in legalese
  const tosParagraphs = [
    "SECTION 1. GENERAL PROVISIONS",
    "",
    "1.1 By proceeding to read these terms, you acknowledge and agree that the statement presented above is, in fact, true. This truth is self-evident and shall not be contested.",
    "",
    "1.2 The veracity of the aforementioned statement has been verified by our legal team and is hereby confirmed to be accurate, correct, and true in all respects.",
    "",
    "SECTION 2. DEFINITIONS",
    "",
    "2.1 \"The Statement\" refers to the proposition presented above, which, for the avoidance of doubt, is true.",
    "",
    "2.2 \"True\" means corresponding to reality or fact; not false. The Statement, as defined herein, meets this definition.",
    "",
    "SECTION 3. TERMS OF TRUTHFULNESS",
    "",
    "3.1 Without limiting the generality of the foregoing, we hereby declare that the statement above is true. Furthermore, said statement shall remain true for the duration of this agreement.",
    "",
    "3.2 In the event that any party questions the truthfulness of the statement, such party is directed to re-read Section 1.1, which clearly establishes that the statement is, indeed, true.",
    "",
    "SECTION 4. WARRANTIES AND REPRESENTATIONS",
    "",
    "4.1 We warrant and represent that the statement is true. This warranty is made without reservation and shall survive the termination of this agreement.",
    "",
    "4.2 The User acknowledges that by scrolling through these terms, they implicitly agree that the statement above is true, notwithstanding any prior beliefs to the contrary.",
    "",
    "SECTION 5. MISCELLANEOUS PROVISIONS",
    "",
    "5.1 It is important to note (and we cannot stress this enough) that the statement above is true.",
    "",
    "5.2 Any interpretation of these terms that would suggest the statement is not true shall be deemed null and void.",
    "",
    "5.3 The preceding sections, taken together, form a comprehensive legal framework establishing beyond reasonable doubt that the statement is true.",
    "",
    "SECTION 6. FINAL PROVISIONS",
    "",
    "6.1 In conclusion, having carefully considered all relevant factors, we confirm one final time: the statement above is true.",
    "",
    "6.2 This document contains 1,247 words, all of which, when properly analyzed, support the conclusion that the statement is true.",
    "",
    "[END OF TERMS]"
  ];

  // Scroll state
  let scrollY = 0;
  let maxScroll = 0;
  let isDragging = false;
  let lastTouchY = 0;
  let scrollVelocity = 0;

  // Layout
  const headerBox = { x: 20, y: 20, w: 320, h: 50 };
  const tosBox = { x: 20, y: 80, w: 320, h: 400 };
  const trueButton = { x: 20, y: 500, w: 155, h: 60 };
  const falseButton = { x: 185, y: 500, w: 155, h: 60 };

  // Text layout cache
  let wrappedLines = [];
  const lineHeight = 20;
  const tosFont = "400 14px 'Georgia', serif";
  const tosHeaderFont = "700 14px 'Georgia', serif";

  /**
   * Wrap text to fit within a maximum width using actual text measurement.
   * Accounts for canvas scaling and aspect ratio.
   */
  function wrapTosText(text, maxWidth, font = tosFont) {
    if (!text) return [''];

    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;

    // Account for aspect ratio compensation used in drawText
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;

    const words = text.split(' ');
    const lines = [];
    let currentLine = '';

    for (const word of words) {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      const testWidth = ctx.measureText(testLine).width;

      if (testWidth > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    }
    if (currentLine) {
      lines.push(currentLine);
    }

    ctx.restore();
    return lines;
  }

  /**
   * Recalculate text wrapping when viewport changes.
   * Called automatically by resizeCanvas().
   */
  function recalculateTextSizing() {
    if (tosParagraphs.length === 0) return;

    // Re-wrap all text with current scaling
    wrappedLines = [];
    const textWidth = tosBox.w - 30; // Account for padding and scrollbar

    for (const para of tosParagraphs) {
      if (para === '') {
        wrappedLines.push({ text: '', isHeader: false });
      } else if (para.startsWith('SECTION') || para.startsWith('[')) {
        // Headers might also need wrapping on very narrow screens
        const wrapped = wrapTosText(para, textWidth, tosHeaderFont);
        for (const line of wrapped) {
          wrappedLines.push({ text: line, isHeader: true });
        }
      } else {
        const wrapped = wrapTosText(para, textWidth, tosFont);
        for (const line of wrapped) {
          wrappedLines.push({ text: line, isHeader: false });
        }
      }
    }

    // Recalculate max scroll based on new line count
    const contentHeight = wrappedLines.length * lineHeight + 40;
    maxScroll = Math.max(0, contentHeight - tosBox.h);

    // Clamp current scroll position if needed
    scrollY = Math.max(0, Math.min(maxScroll, scrollY));
  }

  function initGame() {
    scrollY = 0;
    scrollVelocity = 0;
    isDragging = false;

    // Reset animation state
    entranceProgress = 0;
    headerAlpha = prefersReducedMotion ? 1 : 0;
    headerY = prefersReducedMotion ? 0 : 15;
    tosBoxAlpha = prefersReducedMotion ? 1 : 0;
    tosBoxY = prefersReducedMotion ? 0 : 20;
    buttonsAlpha = prefersReducedMotion ? 1 : 0;
    buttonsY = prefersReducedMotion ? 0 : 15;
    trueButtonScale = 1;
    falseButtonScale = 1;
    trueButtonPressed = false;
    falseButtonPressed = false;
    scrollGlowIntensity = 0;
    lastScrollY = 0;

    // Calculate text wrapping based on current viewport
    recalculateTextSizing();
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    // Update entrance animations
    animateEntrance(dt);

    // Update button press animations
    updateButtonAnimations(dt);

    // Update scroll glow effect
    updateScrollGlow(dt);

    // Apply scroll velocity (momentum)
    if (!isDragging && Math.abs(scrollVelocity) > 0.5) {
      scrollY += scrollVelocity * dt;
      scrollVelocity *= 0.92; // Friction

      // Clamp scroll
      scrollY = Math.max(0, Math.min(maxScroll, scrollY));
    }
  }

  function drawGame() {
    // Background - paper-like with subtle texture
    ctx.fillStyle = '#F5F5F0';
    ctx.fillRect(0, 0, W, H);

    // Subtle paper texture (very light noise pattern)
    ctx.fillStyle = 'rgba(0,0,0,0.008)';
    for (let i = 0; i < 40; i++) {
      const tx = (i * 37) % W;
      const ty = (i * 23) % H;
      ctx.fillRect(tx, ty, 2, 1);
    }

    // Header area with entrance animation
    ctx.save();
    ctx.globalAlpha = headerAlpha;
    ctx.translate(0, headerY);

    // Header shadow
    ctx.fillStyle = 'rgba(0,0,0,0.06)';
    ctx.fillRect(headerBox.x + 2, headerBox.y + 3, headerBox.w, headerBox.h);

    ctx.fillStyle = '#E8E8E0';
    ctx.fillRect(headerBox.x, headerBox.y, headerBox.w, headerBox.h);
    ctx.strokeStyle = '#D4D4CC';
    ctx.lineWidth = 1;
    ctx.strokeRect(headerBox.x, headerBox.y, headerBox.w, headerBox.h);

    // Header text
    drawText('Do you agree with the statement?', W / 2, headerBox.y + headerBox.h / 2, {
      font: "600 16px 'Nunito Sans', sans-serif",
      color: '#2B2B28',
      align: 'center',
      baseline: 'middle'
    });
    ctx.restore();

    // TOS Box with entrance animation
    ctx.save();
    ctx.globalAlpha = tosBoxAlpha;
    ctx.translate(0, tosBoxY);

    // Paper shadow (multiple layers for depth)
    ctx.fillStyle = 'rgba(0,0,0,0.04)';
    ctx.fillRect(tosBox.x + 4, tosBox.y + 5, tosBox.w, tosBox.h);
    ctx.fillStyle = 'rgba(0,0,0,0.06)';
    ctx.fillRect(tosBox.x + 2, tosBox.y + 3, tosBox.w, tosBox.h);

    // Scroll glow effect (subtle highlight when scrolling)
    if (scrollGlowIntensity > 0) {
      ctx.fillStyle = `rgba(78, 205, 196, ${scrollGlowIntensity * 0.08})`;
      ctx.fillRect(tosBox.x - 2, tosBox.y - 2, tosBox.w + 4, tosBox.h + 4);
    }

    // TOS Box - looks like a scrollable text field
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(tosBox.x, tosBox.y, tosBox.w, tosBox.h);
    ctx.strokeStyle = scrollGlowIntensity > 0 ? `rgba(78, 205, 196, ${0.3 + scrollGlowIntensity * 0.5})` : '#AAAAAA';
    ctx.lineWidth = scrollGlowIntensity > 0 ? 2 : 1.5;
    ctx.strokeRect(tosBox.x, tosBox.y, tosBox.w, tosBox.h);

    // Inner shadow effect (top edge)
    const gradient = ctx.createLinearGradient(tosBox.x, tosBox.y, tosBox.x, tosBox.y + 8);
    gradient.addColorStop(0, 'rgba(0,0,0,0.06)');
    gradient.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = gradient;
    ctx.fillRect(tosBox.x, tosBox.y, tosBox.w, 8);

    // Draw TOS text with clipping
    ctx.save();
    ctx.beginPath();
    ctx.rect(tosBox.x, tosBox.y, tosBox.w, tosBox.h);
    ctx.clip();

    const textAdj = getTextScaleAdjustment();
    let yPos = tosBox.y + 15 - scrollY;

    for (const line of wrappedLines) {
      if (yPos > tosBox.y - lineHeight && yPos < tosBox.y + tosBox.h + lineHeight) {
        ctx.save();
        ctx.translate(tosBox.x + 15, yPos);
        ctx.scale(textAdj / aspectRatio, textAdj);

        if (line.isHeader) {
          ctx.font = "700 14px 'Georgia', serif";
          ctx.fillStyle = '#2B2B28';
        } else {
          ctx.font = tosFont;
          ctx.fillStyle = '#5A5A54';
        }
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        ctx.fillText(line.text, 0, 0);
        ctx.restore();
      }
      yPos += lineHeight;
    }

    ctx.restore();

    // Scrollbar track
    const trackX = tosBox.x + tosBox.w - 10;
    const trackY = tosBox.y + 5;
    const trackH = tosBox.h - 10;
    ctx.fillStyle = '#E6E6E0';
    ctx.fillRect(trackX, trackY, 6, trackH);

    // Scrollbar thumb
    if (maxScroll > 0) {
      const thumbH = Math.max(30, (tosBox.h / (tosBox.h + maxScroll)) * trackH);
      const thumbY = trackY + (scrollY / maxScroll) * (trackH - thumbH);
      ctx.fillStyle = scrollGlowIntensity > 0 ? '#4ECDC4' : '#C2C2B8';
      ctx.beginPath();
      ctx.roundRect(trackX, thumbY, 6, thumbH, 3);
      ctx.fill();
    }

    // Scroll indicator text with translucent background
    if (scrollY < maxScroll - 10) {
      const indicatorText = 'Scroll to read more';
      const indicatorX = W / 2;
      const indicatorY = tosBox.y + tosBox.h - 15;
      const indicatorPadX = 12;
      const indicatorPadY = 4;
      const indicatorW = 140;
      const indicatorH = 22;

      // Translucent background pill
      ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
      ctx.beginPath();
      ctx.roundRect(indicatorX - indicatorW / 2, indicatorY - indicatorH / 2, indicatorW, indicatorH, 11);
      ctx.fill();

      drawText(indicatorText, indicatorX, indicatorY, {
        font: "500 14px 'Nunito Sans', sans-serif",
        color: '#8C8C84',
        align: 'center',
        baseline: 'middle'
      });
    }

    ctx.restore(); // Close tosBox entrance animation

    // Buttons with entrance animation
    ctx.save();
    ctx.globalAlpha = buttonsAlpha;
    ctx.translate(0, buttonsY);

    // True button (success green) with scale animation
    ctx.save();
    const trueCenterX = trueButton.x + trueButton.w / 2;
    const trueCenterY = trueButton.y + trueButton.h / 2;
    ctx.translate(trueCenterX, trueCenterY);
    ctx.scale(trueButtonScale, trueButtonScale);
    ctx.translate(-trueCenterX, -trueCenterY);

    // Button shadow
    ctx.fillStyle = 'rgba(107, 191, 89, 0.3)';
    ctx.beginPath();
    ctx.roundRect(trueButton.x + 2, trueButton.y + 4, trueButton.w, trueButton.h, 8);
    ctx.fill();

    ctx.fillStyle = '#6BBF59';
    ctx.beginPath();
    ctx.roundRect(trueButton.x, trueButton.y, trueButton.w, trueButton.h, 8);
    ctx.fill();

    // Button bottom edge (3D effect)
    ctx.fillStyle = '#5AAF4A';
    ctx.beginPath();
    ctx.roundRect(trueButton.x, trueButton.y + trueButton.h - 5, trueButton.w, 5, [0, 0, 8, 8]);
    ctx.fill();

    drawText('True (Agree)', trueCenterX, trueCenterY - 2, {
      font: "600 16px 'Nunito Sans', sans-serif",
      color: '#FFFFFF',
      align: 'center',
      baseline: 'middle'
    });
    ctx.restore();

    // False button (error red) with scale animation
    ctx.save();
    const falseCenterX = falseButton.x + falseButton.w / 2;
    const falseCenterY = falseButton.y + falseButton.h / 2;
    ctx.translate(falseCenterX, falseCenterY);
    ctx.scale(falseButtonScale, falseButtonScale);
    ctx.translate(-falseCenterX, -falseCenterY);

    // Button shadow
    ctx.fillStyle = 'rgba(232, 93, 74, 0.3)';
    ctx.beginPath();
    ctx.roundRect(falseButton.x + 2, falseButton.y + 4, falseButton.w, falseButton.h, 8);
    ctx.fill();

    ctx.fillStyle = '#E85D4A';
    ctx.beginPath();
    ctx.roundRect(falseButton.x, falseButton.y, falseButton.w, falseButton.h, 8);
    ctx.fill();

    // Button bottom edge (3D effect)
    ctx.fillStyle = '#D04A3A';
    ctx.beginPath();
    ctx.roundRect(falseButton.x, falseButton.y + falseButton.h - 5, falseButton.w, 5, [0, 0, 8, 8]);
    ctx.fill();

    drawText('False (Disagree)', falseCenterX, falseCenterY - 2, {
      font: "600 16px 'Nunito Sans', sans-serif",
      color: '#FFFFFF',
      align: 'center',
      baseline: 'middle'
    });
    ctx.restore();

    ctx.restore(); // Close buttons entrance animation

    // Footer text
    drawText('Please pretend you read the terms before answering.', W / 2, 580, {
      font: "400 14px 'Nunito', sans-serif",
      color: '#8C8C84',
      align: 'center',
      baseline: 'middle'
    });
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;

    // Initialize audio on first touch (required by browsers)
    initAudio();

    const touch = e.touches[0] || e.changedTouches[0];
    const { x, y } = screenToLogical(touch.clientX, touch.clientY);

    if (type === 'start') {
      // Check if in TOS box for scrolling
      if (pointInRect(x, y, tosBox)) {
        isDragging = true;
        lastTouchY = y;
        scrollVelocity = 0;
        return;
      }

      // Check buttons - apply press animation
      if (pointInRect(x, y, trueButton)) {
        trueButtonPressed = true;
        trueButtonScale = 0.92;
        playSound('click');
        return;
      }

      if (pointInRect(x, y, falseButton)) {
        falseButtonPressed = true;
        falseButtonScale = 0.92;
        playSound('click');
        return;
      }
    }

    if (type === 'move' && isDragging) {
      const deltaY = lastTouchY - y;
      scrollY += deltaY;
      scrollY = Math.max(0, Math.min(maxScroll, scrollY));
      scrollVelocity = deltaY / 0.016; // Approximate velocity
      lastTouchY = y;
    }

    if (type === 'end') {
      isDragging = false;

      // Handle button release
      if (trueButtonPressed) {
        trueButtonPressed = false;
        // Check if still over the button
        if (pointInRect(x, y, trueButton)) {
          const choice = QUESTION.choices[0];
          if (choice.is_correct) {
            playSound('correct');
          } else {
            playSound('wrong');
          }
          // Small delay to show the release animation
          setTimeout(() => {
            engine.end(choice.is_correct, choice.explanation);
          }, 150);
        }
        return;
      }

      if (falseButtonPressed) {
        falseButtonPressed = false;
        // Check if still over the button
        if (pointInRect(x, y, falseButton)) {
          const choice = QUESTION.choices[1];
          if (choice.is_correct) {
            playSound('correct');
          } else {
            playSound('wrong');
          }
          // Small delay to show the release animation
          setTimeout(() => {
            engine.end(choice.is_correct, choice.explanation);
          }, 150);
        }
        return;
      }
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });


  // Cursor change handler for end screen buttons
  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'ended') {
      canvas.style.cursor = 'default';
      return;
    }
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    if (gameResult) {
      if (pointInRect(x, y, restartButton) || pointInRect(x, y, nextButton)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    } else {
      if (pointInRect(x, y, centeredRestartButton)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    }
    canvas.style.cursor = 'default';
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
