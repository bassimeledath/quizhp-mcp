<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Basketball True/False</title>
  <link href="https://fonts.googleapis.com/css2?family=Belanosima:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  BASKETBALL TRUE/FALSE - MOBILE                                              ║
  ║  Swipe to shoot the basketball into the TRUE or FALSE hoop!                  ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. True/False question format.            ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "true_false",
    prompt: "The Earth is the third planet from the Sun.",
    choices: [
      { text: "True", is_correct: true, explanation: "Earth is indeed the third planet from the Sun, after Mercury and Venus." },
      { text: "False", is_correct: false, explanation: "Earth is indeed the third planet from the Sun, after Mercury and Venus." }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   *
   * @param {string} text - The text to wrap
   * @param {number} maxWidth - Maximum width in logical coordinates
   * @param {string} font - CSS font string (e.g., "16px 'Nunito', sans-serif")
   * @param {number} maxLines - Maximum number of lines (default 3)
   * @returns {string[]} Array of text lines
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   * Tries font sizes from max to min until content fits.
   *
   * @param {Object} options
   * @param {string[]} options.texts - Array of text strings to fit
   * @param {number} options.maxWidth - Maximum width for text wrapping
   * @param {number} options.availableHeight - Total height available for all texts
   * @param {number} options.minFont - Minimum font size (default 12)
   * @param {number} options.maxFont - Maximum font size (default 18)
   * @param {number} options.itemPadding - Vertical padding per text item (default 4)
   * @param {string} options.fontFamily - Font family (default "'Nunito Sans', sans-serif")
   * @returns {{ fontSize: number, wrappedTexts: string[][] }} Optimal font size and pre-wrapped texts
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - BASKETBALL TRUE/FALSE                         ║
  // ║  Swipe to shoot the basketball into the correct hoop!                      ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // Game constants
  const BALL_RADIUS = 28;
  const GRAVITY = 600;  // Reduced for floatier arc
  const BALL_START_X = W / 2;
  const BALL_START_Y = H - 100;
  const SWIPE_POWER_MULTIPLIER = 5;  // Increased for easier shooting
  const MAX_VELOCITY = 900;  // Increased to reach hoops

  // QuizHP Color Palette
  const COLORS = {
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A',
    textPrimary: '#2B2B28',
    textLight: '#F5F5F0',
    bgDark: '#1C1C1A',
    surface: '#2A2A27',
    borderSubtle: '#E6E6E0'
  };

  // Reduced motion preference
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ═══════════════════════════════════════════════════════════════════════════
  // SOUND SYSTEM (Web Audio API)
  // ═══════════════════════════════════════════════════════════════════════════
  let audioCtx = null;
  function getAudioContext() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
  }

  function playSound(type) {
    if (prefersReducedMotion) return;
    try {
      const ctx = getAudioContext();
      if (ctx.state === 'suspended') ctx.resume();

      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);

      if (type === 'bounce') {
        // Quick thump for ball bounce
        osc.type = 'sine';
        osc.frequency.setValueAtTime(150, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
        osc.start();
        osc.stop(ctx.currentTime + 0.15);
      } else if (type === 'swoosh') {
        // Swoosh for throwing
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
        osc.start();
        osc.stop(ctx.currentTime + 0.2);
      } else if (type === 'score') {
        // Cheerful ascending chime for score
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, ctx.currentTime);
        osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
        osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.25, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
        osc.start();
        osc.stop(ctx.currentTime + 0.4);
      } else if (type === 'miss') {
        // Sympathetic low tone for miss
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(180, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.25);
        gain.gain.setValueAtTime(0.2, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
        osc.start();
        osc.stop(ctx.currentTime + 0.3);
      }
    } catch (e) {
      // Audio not supported
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // PARTICLE SYSTEM
  // ═══════════════════════════════════════════════════════════════════════════
  let hoopParticles = [];

  function spawnHoopParticles(x, y, isCorrect) {
    const colors = isCorrect
      ? [COLORS.success, COLORS.amber, COLORS.cyan, COLORS.orange]
      : [COLORS.error, COLORS.orangeHover];
    const count = isCorrect ? 25 : 12;

    for (let i = 0; i < count; i++) {
      hoopParticles.push({
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 300,
        vy: -Math.random() * 200 - 50,
        color: colors[Math.floor(Math.random() * colors.length)],
        size: Math.random() * 6 + 3,
        gravity: 400,
        alpha: 1,
        type: isCorrect ? 'spark' : 'puff'
      });
    }
  }

  function updateHoopParticles(dt) {
    hoopParticles = hoopParticles.filter(p => {
      p.vy += p.gravity * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.alpha -= dt * 1.5;
      p.size *= 0.98;
      return p.alpha > 0 && p.y < H + 50;
    });
  }

  function drawHoopParticles() {
    hoopParticles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      if (p.type === 'spark') {
        // Draw spark as small line
        ctx.translate(p.x, p.y);
        const angle = Math.atan2(p.vy, p.vx);
        ctx.rotate(angle);
        ctx.fillRect(-p.size, -1, p.size * 2, 2);
      } else {
        // Draw puff as circle
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    });
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // ENTRANCE ANIMATION SYSTEM
  // ═══════════════════════════════════════════════════════════════════════════
  let entranceAnimTime = 0;
  let entranceComplete = false;
  const ENTRANCE_DURATION = 0.8;

  // Hoop entrance state (slide in from sides)
  let hoopEntrance = [
    { offsetX: -150, targetX: 0, scale: 0.5 },  // TRUE hoop from left
    { offsetX: 150, targetX: 0, scale: 0.5 }    // FALSE hoop from right
  ];

  // Ball entrance state (bounce in from below)
  let ballEntrance = { offsetY: 200, scale: 0.3, bouncePhase: 0 };

  function updateEntranceAnimation(dt) {
    if (entranceComplete || prefersReducedMotion) {
      entranceComplete = true;
      hoopEntrance[0].offsetX = 0;
      hoopEntrance[0].scale = 1;
      hoopEntrance[1].offsetX = 0;
      hoopEntrance[1].scale = 1;
      ballEntrance.offsetY = 0;
      ballEntrance.scale = 1;
      return;
    }

    entranceAnimTime += dt;
    const t = Math.min(entranceAnimTime / ENTRANCE_DURATION, 1);

    // Easing function (ease-out spring)
    const easeOutSpring = (x) => {
      return 1 - Math.pow(1 - x, 3) * Math.cos(x * Math.PI * 2) * (1 - x);
    };

    // Hoops slide in with spring
    const hoopT = easeOutSpring(Math.min(t * 1.2, 1));
    hoopEntrance[0].offsetX = -150 * (1 - hoopT);
    hoopEntrance[0].scale = 0.5 + 0.5 * hoopT;
    hoopEntrance[1].offsetX = 150 * (1 - hoopT);
    hoopEntrance[1].scale = 0.5 + 0.5 * hoopT;

    // Ball bounces in (starts slightly delayed)
    const ballT = Math.max(0, (t - 0.2) / 0.8);
    const ballEase = easeOutSpring(ballT);
    ballEntrance.offsetY = 200 * (1 - ballEase);
    ballEntrance.scale = 0.3 + 0.7 * ballEase;

    // Bounce sound when ball lands
    if (ballT > 0.5 && ballEntrance.bouncePhase === 0) {
      playSound('bounce');
      ballEntrance.bouncePhase = 1;
    }

    if (t >= 1) {
      entranceComplete = true;
    }
  }

  // Hoop positions
  const HOOPS = [
    { x: 75, y: 140, label: 'TRUE', choice: null },
    { x: 285, y: 140, label: 'FALSE', choice: null }
  ];
  const HOOP_WIDTH = 70;
  const HOOP_HEIGHT = 50;
  const RIM_THICKNESS = 6;
  const BASKET_DEPTH = 25;

  // Ball state
  let ball = {
    x: BALL_START_X,
    y: BALL_START_Y,
    vx: 0,
    vy: 0,
    rotation: 0,
    isFlying: false,
    squishX: 1,  // For drag squish effect
    squishY: 1
  };

  // Touch state
  let touchStart = null;
  let touchCurrent = null;
  let isDragging = false;

  function initGame() {
    // Reset ball
    ball = {
      x: BALL_START_X,
      y: BALL_START_Y,
      vx: 0,
      vy: 0,
      rotation: 0,
      isFlying: false,
      squishX: 1,
      squishY: 1
    };
    touchStart = null;
    touchCurrent = null;
    isDragging = false;

    // Reset entrance animation
    entranceAnimTime = 0;
    entranceComplete = false;
    hoopEntrance = [
      { offsetX: -150, targetX: 0, scale: 0.5 },
      { offsetX: 150, targetX: 0, scale: 0.5 }
    ];
    ballEntrance = { offsetY: 200, scale: 0.3, bouncePhase: 0 };

    // Clear particles
    hoopParticles = [];

    // Map choices to hoops
    QUESTION.choices.forEach(choice => {
      if (choice.text.toLowerCase() === 'true') {
        HOOPS[0].choice = choice;
      } else {
        HOOPS[1].choice = choice;
      }
    });
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    // Update entrance animation
    updateEntranceAnimation(dt);

    // Update particles
    updateHoopParticles(dt);

    // Update ball squish when dragging
    if (isDragging && touchStart && touchCurrent) {
      const dx = touchStart.x - touchCurrent.x;
      const dy = touchStart.y - touchCurrent.y;
      const pullDist = Math.sqrt(dx * dx + dy * dy);
      const squishAmount = Math.min(pullDist / 150, 0.3);
      // Stretch in pull direction, squish perpendicular
      ball.squishX = 1 - squishAmount * 0.5;
      ball.squishY = 1 + squishAmount * 0.3;
    } else if (!ball.isFlying) {
      // Smoothly return to normal
      ball.squishX += (1 - ball.squishX) * 0.2;
      ball.squishY += (1 - ball.squishY) * 0.2;
    }

    if (ball.isFlying) {
      // Squish based on velocity for flying ball
      const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
      const flySquish = Math.min(speed / 500, 0.15);
      ball.squishX = 1 + flySquish * 0.5;
      ball.squishY = 1 - flySquish * 0.3;

      // Apply gravity
      ball.vy += GRAVITY * dt;

      // Update position
      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;

      // Rotate ball based on horizontal velocity
      ball.rotation += ball.vx * 0.003 * dt * 60;

      // Check hoop collisions
      for (const hoop of HOOPS) {
        const hoopLeft = hoop.x - HOOP_WIDTH / 2;
        const hoopRight = hoop.x + HOOP_WIDTH / 2;
        const hoopTop = hoop.y;
        const hoopBottom = hoop.y + BASKET_DEPTH;

        // Check if ball center is within the basket zone
        if (ball.x > hoopLeft + 10 && ball.x < hoopRight - 10 &&
            ball.y > hoopTop && ball.y < hoopBottom + 20 &&
            ball.vy > 0) { // Ball going downward
          // Score! Spawn particles and play sound
          const isCorrect = hoop.choice.is_correct;
          spawnHoopParticles(hoop.x, hoop.y + BASKET_DEPTH / 2, isCorrect);
          playSound(isCorrect ? 'score' : 'miss');

          // Delay end slightly to show particles
          setTimeout(() => {
            engine.end(isCorrect, hoop.choice.explanation);
          }, 300);
          ball.isFlying = false; // Stop ball movement
          return;
        }
      }

      // Check if ball went off screen
      if (ball.y > H + 50 || ball.x < -50 || ball.x > W + 50) {
        // Reset ball with bounce sound
        playSound('bounce');
        ball.x = BALL_START_X;
        ball.y = BALL_START_Y;
        ball.vx = 0;
        ball.vy = 0;
        ball.rotation = 0;
        ball.isFlying = false;
        ball.squishX = 1;
        ball.squishY = 1;
      }
    }
  }

  function drawGame() {
    // Draw court background (QuizHP dark)
    ctx.fillStyle = COLORS.bgDark;
    ctx.fillRect(0, 0, W, H);

    // Draw wood floor pattern (warmer amber tones)
    const woodGradient = ctx.createLinearGradient(0, H - 180, 0, H);
    woodGradient.addColorStop(0, '#9A7B2C');
    woodGradient.addColorStop(0.5, '#8B6914');
    woodGradient.addColorStop(1, '#7A5A10');
    ctx.fillStyle = woodGradient;
    ctx.fillRect(0, H - 180, W, 180);

    // Floor lines
    ctx.strokeStyle = '#6B5010';
    ctx.lineWidth = 2;
    for (let i = 0; i < 6; i++) {
      const y = H - 180 + i * 30;
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }

    // Draw hoops with entrance animation
    for (let i = 0; i < HOOPS.length; i++) {
      const hoop = HOOPS[i];
      const entrance = hoopEntrance[i];
      drawHoop(hoop, entrance.offsetX, entrance.scale);
    }

    // Draw trajectory preview when dragging
    if (isDragging && touchStart && touchCurrent && entranceComplete) {
      drawTrajectoryPreview();
    }

    // Draw basketball with entrance animation
    drawBall();

    // Draw particles on top
    drawHoopParticles();
  }

  function drawHoop(hoop, offsetX = 0, scale = 1) {
    const x = hoop.x + offsetX;
    const y = hoop.y;

    ctx.save();

    // Apply entrance scale animation
    if (scale !== 1) {
      ctx.translate(x, y);
      ctx.scale(scale, scale);
      ctx.translate(-x, -y);
    }

    // Backboard with subtle shadow
    ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
    ctx.shadowBlur = 8;
    ctx.shadowOffsetY = 4;
    ctx.fillStyle = COLORS.textLight;
    ctx.fillRect(x - HOOP_WIDTH / 2 - 5, y - 60, HOOP_WIDTH + 10, 55);
    ctx.shadowColor = 'transparent';

    ctx.strokeStyle = COLORS.borderSubtle;
    ctx.lineWidth = 2;
    ctx.strokeRect(x - HOOP_WIDTH / 2 - 5, y - 60, HOOP_WIDTH + 10, 55);

    // Backboard square target (QuizHP orange)
    ctx.strokeStyle = COLORS.orange;
    ctx.lineWidth = 3;
    ctx.strokeRect(x - 18, y - 45, 36, 30);

    // Rim (orange ring)
    ctx.strokeStyle = COLORS.orange;
    ctx.lineWidth = RIM_THICKNESS;
    ctx.beginPath();
    ctx.moveTo(x - HOOP_WIDTH / 2, y);
    ctx.lineTo(x + HOOP_WIDTH / 2, y);
    ctx.stroke();

    // Rim front caps - draw as aspect-ratio-aware ellipses
    ctx.fillStyle = COLORS.orange;
    ctx.beginPath();
    ctx.ellipse(x - HOOP_WIDTH / 2, y, RIM_THICKNESS / 2, (RIM_THICKNESS / 2) * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + HOOP_WIDTH / 2, y, RIM_THICKNESS / 2, (RIM_THICKNESS / 2) * aspectRatio, 0, 0, Math.PI * 2);
    ctx.fill();

    // Net (simple lines)
    ctx.strokeStyle = COLORS.textLight;
    ctx.lineWidth = 1.5;
    const netBottom = y + BASKET_DEPTH;
    const netWidth = HOOP_WIDTH - 10;
    for (let i = 0; i <= 4; i++) {
      const topX = x - netWidth / 2 + (netWidth / 4) * i;
      const bottomX = x - netWidth / 3 + (netWidth / 3 / 2) * i;
      ctx.beginPath();
      ctx.moveTo(topX, y + 3);
      ctx.quadraticCurveTo(
        (topX + bottomX) / 2 + (Math.random() - 0.5) * 5,
        y + BASKET_DEPTH * 0.6,
        bottomX,
        netBottom
      );
      ctx.stroke();
    }

    // Label above backboard (QuizHP success/error colors)
    const labelColor = hoop.label === 'TRUE' ? COLORS.success : COLORS.error;

    // Label background with shadow
    ctx.shadowColor = labelColor + '40';
    ctx.shadowBlur = 12;
    ctx.fillStyle = labelColor;
    ctx.beginPath();
    ctx.roundRect(x - 40, y - 95, 80, 30, 8);
    ctx.fill();
    ctx.shadowColor = 'transparent';

    ctx.restore();

    // Label text (drawn outside save/restore to avoid scale issues)
    const labelX = x; // Already includes offsetX
    drawText(hoop.label, labelX, y - 80, {
      font: "bold 18px 'Nunito Sans', sans-serif",
      color: '#FFFFFF'
    });
  }

  function drawBall() {
    // Apply entrance animation offset
    const drawX = ball.x;
    const drawY = ball.y + ballEntrance.offsetY;
    const entranceScale = ballEntrance.scale;

    ctx.save();
    ctx.translate(drawX, drawY);

    // Apply entrance scale
    ctx.scale(entranceScale, entranceScale);

    // Apply squish effect (for drag and flight)
    ctx.scale(ball.squishX, ball.squishY);

    ctx.scale(1, aspectRatio); // Apply BEFORE rotation
    ctx.rotate(ball.rotation);

    // Ball shadow (offset and larger when ball is higher)
    const shadowOffset = 3 + ballEntrance.offsetY * 0.05;
    ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
    ctx.beginPath();
    ctx.arc(shadowOffset, shadowOffset, BALL_RADIUS, 0, Math.PI * 2);
    ctx.fill();

    // Ball base (QuizHP amber/orange gradient)
    const gradient = ctx.createRadialGradient(-8, -8, 0, 0, 0, BALL_RADIUS);
    gradient.addColorStop(0, COLORS.amber);
    gradient.addColorStop(0.7, COLORS.orange);
    gradient.addColorStop(1, COLORS.orangeHover);
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(0, 0, BALL_RADIUS, 0, Math.PI * 2);
    ctx.fill();

    // Ball lines
    ctx.strokeStyle = COLORS.textPrimary;
    ctx.lineWidth = 2;

    // Horizontal line
    ctx.beginPath();
    ctx.moveTo(-BALL_RADIUS + 3, 0);
    ctx.lineTo(BALL_RADIUS - 3, 0);
    ctx.stroke();

    // Vertical line
    ctx.beginPath();
    ctx.moveTo(0, -BALL_RADIUS + 3);
    ctx.lineTo(0, BALL_RADIUS - 3);
    ctx.stroke();

    // Curved lines
    ctx.beginPath();
    ctx.arc(0, 0, BALL_RADIUS * 0.7, -0.4, 0.4);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(0, 0, BALL_RADIUS * 0.7, Math.PI - 0.4, Math.PI + 0.4);
    ctx.stroke();

    ctx.restore();

    // Draw aim indicator when dragging (pulsing glow around ball)
    if (isDragging && entranceComplete) {
      const pulse = 0.5 + Math.sin(performance.now() * 0.01) * 0.3;
      ctx.save();
      ctx.translate(drawX, drawY);
      ctx.scale(1, aspectRatio);
      ctx.beginPath();
      ctx.arc(0, 0, BALL_RADIUS + 8, 0, Math.PI * 2);
      ctx.strokeStyle = COLORS.cyan + Math.floor(pulse * 255).toString(16).padStart(2, '0');
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.restore();
    }
  }

  function drawTrajectoryPreview() {
    // Match the flick direction from handleTouch
    const dx = touchCurrent.x - touchStart.x;  // Swipe right = ball goes right
    const dy = touchStart.y - touchCurrent.y;   // Swipe up = positive

    // Calculate initial velocity
    let vx = dx * SWIPE_POWER_MULTIPLIER;
    let vy = dy * SWIPE_POWER_MULTIPLIER;

    // Clamp velocity
    const speed = Math.sqrt(vx * vx + vy * vy);
    if (speed > MAX_VELOCITY) {
      vx = (vx / speed) * MAX_VELOCITY;
      vy = (vy / speed) * MAX_VELOCITY;
    }

    // Only show if swiping upward
    if (dy <= 0) return;

    // Draw dotted trajectory arc (QuizHP cyan)
    ctx.strokeStyle = COLORS.cyan + '80';
    ctx.lineWidth = 3;
    ctx.setLineDash([8, 8]);
    ctx.beginPath();

    let px = ball.x;
    let py = ball.y;
    let pvx = vx;
    let pvy = -vy;  // Negative because canvas Y is inverted (matches ball.vy = -vy)
    const dt = 0.02;

    ctx.moveTo(px, py);

    for (let t = 0; t < 1.5; t += dt) {
      pvy += GRAVITY * dt;
      px += pvx * dt;
      py += pvy * dt;

      if (py > H || px < 0 || px > W) break;
      ctx.lineTo(px, py);
    }

    ctx.stroke();
    ctx.setLineDash([]);

    // Draw arrow pointing in swipe direction
    const arrowLen = Math.min(speed * 0.15, 50);
    const angle = Math.atan2(-vy, vx);  // Points toward swipe direction (up and toward hoop)

    ctx.strokeStyle = COLORS.cyan + 'AA';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(
      ball.x + Math.cos(angle) * (BALL_RADIUS + 10),
      ball.y + Math.sin(angle) * (BALL_RADIUS + 10)
    );
    ctx.lineTo(
      ball.x + Math.cos(angle) * (BALL_RADIUS + 10 + arrowLen),
      ball.y + Math.sin(angle) * (BALL_RADIUS + 10 + arrowLen)
    );
    ctx.lineTo(
      ball.x + Math.cos(angle + 0.3) * (BALL_RADIUS + arrowLen),
      ball.y + Math.sin(angle + 0.3) * (BALL_RADIUS + arrowLen)
    );
    ctx.moveTo(
      ball.x + Math.cos(angle) * (BALL_RADIUS + 10 + arrowLen),
      ball.y + Math.sin(angle) * (BALL_RADIUS + 10 + arrowLen)
    );
    ctx.lineTo(
      ball.x + Math.cos(angle - 0.3) * (BALL_RADIUS + arrowLen),
      ball.y + Math.sin(angle - 0.3) * (BALL_RADIUS + arrowLen)
    );
    ctx.stroke();
  }

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;
    if (ball.isFlying) return;
    if (!entranceComplete) return; // Wait for entrance animation

    const touch = e.touches[0] || e.changedTouches[0];
    const { x, y } = screenToLogical(touch.clientX, touch.clientY);

    if (type === 'start') {
      // Allow touch anywhere in bottom half of screen (more forgiving)
      if (y > H * 0.4) {
        isDragging = true;
        touchStart = { x, y };
        touchCurrent = { x, y };
      }
    } else if (type === 'move' && isDragging) {
      touchCurrent = { x, y };
    } else if (type === 'end' && isDragging) {
      isDragging = false;

      if (touchStart && touchCurrent) {
        // Flick direction: swipe TOWARD where you want the ball to go
        const dx = touchCurrent.x - touchStart.x;  // Swipe right = ball goes right
        const dy = touchStart.y - touchCurrent.y;   // Swipe up = positive (ball goes up)

        // Only shoot if swiping upward with enough force
        if (dy > 20) {
          let vx = dx * SWIPE_POWER_MULTIPLIER;
          let vy = dy * SWIPE_POWER_MULTIPLIER;

          // Clamp velocity
          const speed = Math.sqrt(vx * vx + vy * vy);
          if (speed > MAX_VELOCITY) {
            vx = (vx / speed) * MAX_VELOCITY;
            vy = (vy / speed) * MAX_VELOCITY;
          }

          ball.vx = vx;
          ball.vy = -vy; // Negative because canvas Y is inverted
          ball.isFlying = true;

          // Play swoosh sound
          playSound('swoosh');
        }
      }

      touchStart = null;
      touchCurrent = null;
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  let mouseDown = false;
  canvas.addEventListener('mousedown', (e) => {
    mouseDown = true;
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mousemove', (e) => {
    if (mouseDown) {
      const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
      handleTouch(fakeTouch, 'move');
    }
  });

  canvas.addEventListener('mouseup', (e) => {
    mouseDown = false;
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });


  // Cursor change handler for end screen buttons
  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'ended') {
      canvas.style.cursor = 'default';
      return;
    }
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    if (gameResult) {
      if (pointInRect(x, y, restartButton) || pointInRect(x, y, nextButton)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    } else {
      if (pointInRect(x, y, centeredRestartButton)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    }
    canvas.style.cursor = 'default';
  });

  // Handle resize
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => {
    setTimeout(resizeCanvas, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
