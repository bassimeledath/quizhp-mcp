<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Word Find True False</title>
  <!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  WORD FIND TRUE FALSE - Mobile Game                                          ║
  ║  Find TRUE or FALSE hidden in a letter grid to answer                        ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
  -->
  <style>
    /* ═══════════════════════════════════════════════════════════════════════════
       BASE STYLES - Can be extended, not removed
       ═══════════════════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none; /* Prevent default touch behaviors */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #gameCanvas {
      background: #16213e;
      /* Canvas fills viewport via JS, these are fallbacks */
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════════════
       CANVAS - Sized dynamically to fill viewport
       ═══════════════════════════════════════════════════════════════════════════ -->
  <canvas id="gameCanvas"></canvas>

  <script>
  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 1: QUESTION PLACEHOLDER - DO NOT MODIFY FORMAT                    ║
  // ║  Platform replaces this at runtime. Use these exact 60-char answers.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const QUESTION = {
    type: "truefalse",
    prompt: "The capital of France is Paris.",
    choices: [
      { text: "True", is_correct: true, explanation: "Paris is indeed the capital of France." },
      { text: "False", is_correct: false, explanation: "Paris is the capital of France, so True is correct." }
    ],
    isLastQuestion: false
  };

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 2: ENGINE CORE (MOBILE) - DO NOT MODIFY                           ║
  // ║  Non-uniform scaling (fills container), touch input, tap-to-restart.       ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical dimensions (game code works in this coordinate space)
  const W = 360, H = 640;

  // Scaling state (computed on resize)
  let scaleX = 1;
  let scaleY = 1;
  let aspectRatio = 1;  // scaleX/scaleY - use for proportional shapes

  // Game state
  let gameState = 'playing'; // 'playing' | 'ended'
  let gameResult = null;     // true (correct) | false (wrong)
  let gameExplanation = '';
  let endScreenTime = 0;
  let confettiParticles = [];

  // End screen button bounds (logical coordinates)
  const restartButton = { x: 20, y: H / 2 + 50, w: 155, h: 56 };
  const nextButton = { x: 185, y: H / 2 + 50, w: 155, h: 56 };
  // Centered restart button for wrong answers
  const centeredRestartButton = { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 56 };

  /** Draw a styled button with aspect-ratio aware text */
  function drawMobileButton(rect, label, color, pulse) {
    const textAdj = getTextScaleAdjustment();
    const p = pulse ? 1 + Math.sin(endScreenTime * 4) * 0.03 : 1;

    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(p, p);
    ctx.translate(-(rect.x + rect.w / 2), -(rect.y + rect.h / 2));

    // Button background
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 12);
    ctx.fill();

    // Button text (aspect-ratio aware)
    ctx.save();
    ctx.translate(rect.x + rect.w / 2, rect.y + rect.h / 2);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 18px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();

    ctx.restore();
  }

  /**
   * Resize canvas to fill viewport completely (no letterboxing).
   * Uses non-uniform scaling - game code works in 360×640 logical space.
   * Use aspectRatio to draw proportionally correct shapes.
   */
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;

    // Physical canvas size (actual pixels)
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // CSS size (fills viewport)
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    // Non-uniform scaling to fill entire canvas
    scaleX = canvas.width / W;
    scaleY = canvas.height / H;

    // Aspect ratio for proportional shape drawing
    // >1 means container is wider than logical space
    // <1 means container is taller than logical space
    aspectRatio = scaleX / scaleY;

    // Recalculate text sizing on resize (implement this in SECTION 3)
    if (typeof recalculateTextSizing === 'function') {
      recalculateTextSizing();
    }
  }

  // === ASPECT-RATIO-AWARE TEXT WITH CLAMPED SCALING ===
  // Text gets stretched by non-uniform scaling, so we compensate.
  // Also clamp the effective scale to keep text legible at all sizes.
  const TEXT_SCALE_MIN = 0.75;
  const TEXT_SCALE_MAX = 1.4;

  function getTextScaleAdjustment() {
    const baseScale = window.innerHeight / H;
    const clampedScale = Math.min(TEXT_SCALE_MAX, Math.max(TEXT_SCALE_MIN, baseScale));
    return clampedScale / baseScale;
  }

  /**
   * Draw text with aspect-ratio compensation and clamped scaling.
   * Use this instead of raw ctx.fillText() to prevent text stretching.
   * Default font is 16px (minimum for answer text). Use 18-20px for better readability.
   */
  function drawText(text, x, y, options = {}) {
    const { font = "500 16px system-ui, sans-serif", color = '#F5F5F0', align = 'center', baseline = 'middle' } = options;
    ctx.save();
    ctx.translate(x, y);
    const adj = getTextScaleAdjustment();
    ctx.scale(adj / aspectRatio, adj);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = baseline;
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  /**
   * Convert screen coordinates to logical coordinates.
   * Use this in handleTouch to get positions in 360×640 space.
   */
  function screenToLogical(screenX, screenY) {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const canvasX = (screenX - rect.left) * dpr;
    const canvasY = (screenY - rect.top) * dpr;
    return {
      x: canvasX / scaleX,
      y: canvasY / scaleY
    };
  }

  /**
   * Check if a point is inside a rectangle (logical coordinates).
   */
  function pointInRect(px, py, rect) {
    return px >= rect.x && px <= rect.x + rect.w &&
           py >= rect.y && py <= rect.y + rect.h;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TEXT UTILITIES - Dynamic wrapping and font sizing
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Wrap text to fit within a maximum width (in logical coordinates).
   * Accounts for canvas transforms applied by drawText().
   *
   * @param {string} text - The text to wrap
   * @param {number} maxWidth - Maximum width in logical coordinates
   * @param {string} font - CSS font string (e.g., "16px 'Nunito', sans-serif")
   * @param {number} maxLines - Maximum number of lines (default 3)
   * @returns {string[]} Array of text lines
   */
  function wrapText(text, maxWidth, font, maxLines = 3) {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.font = font;
    const adj = getTextScaleAdjustment();
    const maxRawWidth = maxWidth * aspectRatio / adj;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxRawWidth && currentLine) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    ctx.restore();
    return lines.slice(0, maxLines);
  }

  /**
   * Find the optimal font size to fit content in available space.
   * Tries font sizes from max to min until content fits.
   *
   * @param {Object} options
   * @param {string[]} options.texts - Array of text strings to fit
   * @param {number} options.maxWidth - Maximum width for text wrapping
   * @param {number} options.availableHeight - Total height available for all texts
   * @param {number} options.minFont - Minimum font size (default 12)
   * @param {number} options.maxFont - Maximum font size (default 18)
   * @param {number} options.itemPadding - Vertical padding per text item (default 4)
   * @param {string} options.fontFamily - Font family (default "'Nunito Sans', sans-serif")
   * @returns {{ fontSize: number, wrappedTexts: string[][] }} Optimal font size and pre-wrapped texts
   */
  function findOptimalFontSize(options) {
    const {
      texts,
      maxWidth,
      availableHeight,
      minFont = 12,
      maxFont = 18,
      itemPadding = 4,
      fontFamily = "'Nunito Sans', sans-serif"
    } = options;

    let bestFontSize = minFont;
    let bestWrappedTexts = [];

    for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 0.5) {
      const font = `${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize + 2;

      let totalHeight = 0;
      const wrappedTexts = [];

      for (const text of texts) {
        const lines = wrapText(text, maxWidth, font);
        wrappedTexts.push(lines);
        totalHeight += itemPadding + lines.length * lineHeight;
      }

      if (totalHeight <= availableHeight) {
        bestFontSize = fontSize;
        bestWrappedTexts = wrappedTexts;
        break;
      }

      bestWrappedTexts = wrappedTexts;
    }

    return { fontSize: bestFontSize, wrappedTexts: bestWrappedTexts };
  }

  const engine = {
    /** Call this to end the game. DO NOT draw your own end screen. */
    end(isCorrect, explanation) {
      if (gameState === 'ended') return;
      gameState = 'ended';
      gameResult = isCorrect;
      gameExplanation = explanation || '';
      endScreenTime = 0;

      // Spawn confetti for correct answers
      if (isCorrect) {
        for (let i = 0; i < 50; i++) {
          confettiParticles.push({
            x: W / 2,
            y: H / 2,
            vx: (Math.random() - 0.5) * 400,
            vy: -Math.random() * 300 - 80,
            size: 4 + Math.random() * 6,
            color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#95E1D3', '#F38181'][Math.floor(Math.random() * 5)],
            rotation: Math.random() * Math.PI * 2,
            rotationSpeed: (Math.random() - 0.5) * 10
          });
        }
      }

      // Notify parent frame
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'quiz-end',
          isCorrect: isCorrect,
          explanation: explanation || ''
        }, '*');
      }
    }
  };

  /** STANDARD END SCREEN (MOBILE) - DO NOT MODIFY */
  function drawEndScreen(dt) {
    endScreenTime += dt;

    // Update confetti
    confettiParticles = confettiParticles.filter(p => {
      p.vy += 600 * dt; // gravity
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.rotation += p.rotationSpeed * dt;
      p.vx *= 0.99;
      return p.y < H + 50;
    });

    // Dark overlay
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Draw confetti
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    // Result emoji (aspect-ratio aware)
    const textAdj = getTextScaleAdjustment();
    ctx.save();
    ctx.translate(W / 2, H / 2 - 80);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.font = '64px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? '🎉' : '😢', 0, 0);
    ctx.restore();

    // Result text (aspect-ratio aware)
    ctx.save();
    ctx.translate(W / 2, H / 2 - 10);
    ctx.scale(textAdj / aspectRatio, textAdj);
    ctx.fillStyle = gameResult ? '#4ADE80' : '#F87171';
    ctx.font = 'bold 32px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(gameResult ? 'Correct!' : 'Wrong!', 0, 0);
    ctx.restore();

    // Buttons
    if (gameResult) {
      // Correct: show both Restart and Next/Finish
      drawMobileButton(restartButton, 'Restart', '#E87A3E', true);
      const nextLabel = QUESTION.isLastQuestion ? 'Finish' : 'Next';
      drawMobileButton(nextButton, nextLabel, '#4ECDC4', true);
    } else {
      // Wrong: show only centered Restart button
      drawMobileButton(centeredRestartButton, 'Restart', '#E87A3E', true);
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 3: YOUR GAME CODE - IMPLEMENT THESE FUNCTIONS                     ║
  // ║  Word Find True False - Find TRUE or FALSE in a letter grid               ║
  // ╚════════════════════════════════════════════════════════════════════════════╝

  // Colors from styleguide
  const COLORS = {
    bgPrimary: '#1C1C1A',
    bgSurface: '#2A2A27',
    bgSurfaceSecondary: '#363633',
    borderSubtle: '#424240',
    borderStrong: '#5A5A56',
    textPrimary: '#F5F5F0',
    textSecondary: '#C2C2B8',
    textTertiary: '#8C8C84',
    orange: '#E87A3E',
    orangeHover: '#D66B31',
    amber: '#F5A742',
    cyan: '#4ECDC4',
    success: '#6BBF59',
    error: '#E85D4A'
  };

  // ═══════════════════════════════════════════════════════════════════════════
  // AUDIO SYSTEM - Web Audio API sound effects
  // ═══════════════════════════════════════════════════════════════════════════
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }

  function playTone(frequency, duration, type = 'sine', volume = 0.15) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = frequency;
    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  }

  function playClickSound() {
    playTone(800, 0.05, 'sine', 0.1);
  }

  function playSuccessSound() {
    if (!audioCtx) return;
    setTimeout(() => playTone(523, 0.1, 'sine', 0.2), 0);
    setTimeout(() => playTone(659, 0.1, 'sine', 0.2), 100);
    setTimeout(() => playTone(784, 0.15, 'sine', 0.2), 200);
  }

  function playErrorSound() {
    playTone(200, 0.2, 'square', 0.1);
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // PARTICLE SYSTEM - Visual feedback effects
  // ═══════════════════════════════════════════════════════════════════════════
  let particles = [];

  function spawnParticles(x, y, color, count = 8) {
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
      particles.push({
        x,
        y,
        vx: Math.cos(angle) * (60 + Math.random() * 40),
        vy: Math.sin(angle) * (60 + Math.random() * 40),
        size: 4 + Math.random() * 4,
        color,
        alpha: 1,
        life: 0.6 + Math.random() * 0.3
      });
    }
  }

  function spawnSelectionTrail(x, y) {
    particles.push({
      x,
      y,
      vx: (Math.random() - 0.5) * 20,
      vy: (Math.random() - 0.5) * 20,
      size: 3 + Math.random() * 3,
      color: COLORS.cyan,
      alpha: 0.8,
      life: 0.3
    });
  }

  function updateParticles(dt) {
    particles = particles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 100 * dt; // light gravity
      p.alpha -= dt / p.life;
      p.size *= 0.98;
      return p.alpha > 0;
    });
  }

  function drawParticles() {
    particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
  }

  // Grid configuration
  const GRID_SIZE = 5;
  const GRID_PADDING = 20;
  const GRID_TOP = 120;

  // Game state
  let grid = [];
  let truePosition = null;  // {startRow, startCol, direction, length}
  let falsePosition = null;
  let selectedCells = [];
  let isDragging = false;
  let dragStartCell = null;
  let currentWord = '';
  let toastMessage = '';
  let toastTimer = 0;
  let cellSize = 0;
  let gridStartX = 0;
  let gridStartY = 0;
  let entranceProgress = 0;
  let cellAnimations = [];

  // Direction vectors: 0=right, 1=down, 2=diagonal-down-right, 3=diagonal-down-left
  // Also include reverse: 4=left, 5=up, 6=diagonal-up-left, 7=diagonal-up-right
  const DIRECTIONS = [
    { dx: 1, dy: 0 },   // right
    { dx: 0, dy: 1 },   // down
    { dx: 1, dy: 1 },   // diagonal down-right
    { dx: -1, dy: 1 },  // diagonal down-left
    { dx: -1, dy: 0 },  // left
    { dx: 0, dy: -1 },  // up
    { dx: -1, dy: -1 }, // diagonal up-left
    { dx: 1, dy: -1 }   // diagonal up-right
  ];

  function getRandomLetter() {
    return String.fromCharCode(65 + Math.floor(Math.random() * 26));
  }

  function canPlaceWord(word, startRow, startCol, direction, existingPlacements = []) {
    const dir = DIRECTIONS[direction];
    const len = word.length;

    // Check bounds
    const endRow = startRow + dir.dy * (len - 1);
    const endCol = startCol + dir.dx * (len - 1);

    if (endRow < 0 || endRow >= GRID_SIZE || endCol < 0 || endCol >= GRID_SIZE) {
      return false;
    }
    if (startRow < 0 || startRow >= GRID_SIZE || startCol < 0 || startCol >= GRID_SIZE) {
      return false;
    }

    // Check for overlaps with existing placements
    for (let i = 0; i < len; i++) {
      const row = startRow + dir.dy * i;
      const col = startCol + dir.dx * i;

      for (const placement of existingPlacements) {
        const pDir = DIRECTIONS[placement.direction];
        for (let j = 0; j < placement.word.length; j++) {
          const pRow = placement.startRow + pDir.dy * j;
          const pCol = placement.startCol + pDir.dx * j;
          if (row === pRow && col === pCol) {
            // Overlap - only allow if same letter
            if (word[i] !== placement.word[j]) {
              return false;
            }
          }
        }
      }
    }

    return true;
  }

  function placeWord(word, startRow, startCol, direction) {
    const dir = DIRECTIONS[direction];
    for (let i = 0; i < word.length; i++) {
      const row = startRow + dir.dy * i;
      const col = startCol + dir.dx * i;
      grid[row][col] = word[i];
    }
    return { word, startRow, startCol, direction, length: word.length };
  }

  function generateGrid() {
    // Initialize grid with random letters
    grid = [];
    for (let row = 0; row < GRID_SIZE; row++) {
      grid[row] = [];
      for (let col = 0; col < GRID_SIZE; col++) {
        grid[row][col] = getRandomLetter();
      }
    }

    // Place TRUE
    let placed = false;
    let attempts = 0;
    while (!placed && attempts < 100) {
      const direction = Math.floor(Math.random() * 8);
      const startRow = Math.floor(Math.random() * GRID_SIZE);
      const startCol = Math.floor(Math.random() * GRID_SIZE);

      if (canPlaceWord('TRUE', startRow, startCol, direction)) {
        truePosition = placeWord('TRUE', startRow, startCol, direction);
        placed = true;
      }
      attempts++;
    }

    // Place FALSE
    placed = false;
    attempts = 0;
    while (!placed && attempts < 100) {
      const direction = Math.floor(Math.random() * 8);
      const startRow = Math.floor(Math.random() * GRID_SIZE);
      const startCol = Math.floor(Math.random() * GRID_SIZE);

      if (canPlaceWord('FALSE', startRow, startCol, direction, [truePosition])) {
        falsePosition = placeWord('FALSE', startRow, startCol, direction);
        placed = true;
      }
      attempts++;
    }

    // If FALSE couldn't be placed, regenerate
    if (!falsePosition) {
      generateGrid();
    }
  }

  function calculateGridDimensions() {
    // Adjust layout based on aspect ratio
    const isWideViewport = aspectRatio > 1.2;

    const availableWidth = W - GRID_PADDING * 2;
    const availableHeight = isWideViewport
      ? H - 100 - 80  // Less top/bottom padding for wide viewports
      : H - GRID_TOP - 180; // Portrait: leave room for message area below

    cellSize = Math.min(availableWidth / GRID_SIZE, availableHeight / GRID_SIZE);
    cellSize = Math.min(cellSize, isWideViewport ? 80 : 60); // Allow larger cells on wide viewports

    const gridWidth = cellSize * GRID_SIZE;
    const gridHeight = cellSize * GRID_SIZE;

    gridStartX = (W - gridWidth) / 2;
    gridStartY = isWideViewport
      ? (H - gridHeight) / 2 + 20  // Center vertically with slight offset for title
      : GRID_TOP;
  }

  function getCellFromPosition(x, y) {
    const col = Math.floor((x - gridStartX) / cellSize);
    const row = Math.floor((y - gridStartY) / cellSize);

    if (row >= 0 && row < GRID_SIZE && col >= 0 && col < GRID_SIZE) {
      return { row, col };
    }
    return null;
  }

  function getCellsInLine(startCell, endCell) {
    if (!startCell || !endCell) return [];

    const cells = [];
    const dr = endCell.row - startCell.row;
    const dc = endCell.col - startCell.col;

    // Determine if it's a valid line (horizontal, vertical, or diagonal)
    const absDr = Math.abs(dr);
    const absDc = Math.abs(dc);

    // Must be a straight line
    if (absDr !== 0 && absDc !== 0 && absDr !== absDc) {
      return [];
    }

    const steps = Math.max(absDr, absDc);
    if (steps === 0) {
      return [{ row: startCell.row, col: startCell.col }];
    }

    const stepR = dr === 0 ? 0 : dr / absDr;
    const stepC = dc === 0 ? 0 : dc / absDc;

    for (let i = 0; i <= steps; i++) {
      cells.push({
        row: startCell.row + stepR * i,
        col: startCell.col + stepC * i
      });
    }

    return cells;
  }

  function getSelectedWord() {
    return selectedCells.map(cell => grid[cell.row][cell.col]).join('');
  }

  function showToast(message) {
    toastMessage = message;
    toastTimer = 1.5;
  }

  function initGame() {
    generateGrid();
    calculateGridDimensions();
    selectedCells = [];
    isDragging = false;
    dragStartCell = null;
    currentWord = '';
    toastMessage = '';
    toastTimer = 0;
    entranceProgress = 0;

    // Initialize cell animations
    cellAnimations = [];
    for (let row = 0; row < GRID_SIZE; row++) {
      cellAnimations[row] = [];
      for (let col = 0; col < GRID_SIZE; col++) {
        cellAnimations[row][col] = {
          scale: 0,
          delay: (row + col) * 0.05,
          started: false
        };
      }
    }
  }

  function updateGame(dt) {
    if (gameState !== 'playing') return;

    // Update entrance animations
    entranceProgress += dt;
    for (let row = 0; row < GRID_SIZE; row++) {
      for (let col = 0; col < GRID_SIZE; col++) {
        const anim = cellAnimations[row][col];
        if (entranceProgress > anim.delay && !anim.started) {
          anim.started = true;
        }
        if (anim.started && anim.scale < 1) {
          anim.scale = Math.min(1, anim.scale + dt * 5);
        }
      }
    }

    // Update toast timer
    if (toastTimer > 0) {
      toastTimer -= dt;
      if (toastTimer <= 0) {
        toastMessage = '';
      }
    }

    // Update particles
    updateParticles(dt);
  }

  function drawGame() {
    // Clear canvas
    ctx.fillStyle = COLORS.bgPrimary;
    ctx.fillRect(0, 0, W, H);

    const isWideViewport = aspectRatio > 1.2;
    const titleY = isWideViewport ? 30 : 50;
    const instructionY = isWideViewport ? 55 : 85;

    // Draw title
    drawText('Find TRUE or FALSE', W / 2, titleY, {
      font: 'bold 24px system-ui, sans-serif',
      color: COLORS.textPrimary
    });

    // Draw instruction
    drawText('Drag across letters to select', W / 2, instructionY, {
      font: '16px system-ui, sans-serif',
      color: COLORS.textSecondary
    });

    // Draw grid background
    const gridWidth = cellSize * GRID_SIZE;
    const gridHeight = cellSize * GRID_SIZE;

    ctx.fillStyle = COLORS.bgSurface;
    ctx.beginPath();
    ctx.roundRect(gridStartX - 8, gridStartY - 8, gridWidth + 16, gridHeight + 16, 12);
    ctx.fill();

    // Draw cells
    for (let row = 0; row < GRID_SIZE; row++) {
      for (let col = 0; col < GRID_SIZE; col++) {
        const x = gridStartX + col * cellSize;
        const y = gridStartY + row * cellSize;
        const anim = cellAnimations[row][col];

        // Check if cell is selected
        const isSelected = selectedCells.some(c => c.row === row && c.col === col);

        // Draw cell background with animation
        ctx.save();
        const centerX = x + cellSize / 2;
        const centerY = y + cellSize / 2;
        ctx.translate(centerX, centerY);
        ctx.scale(anim.scale, anim.scale);
        ctx.translate(-centerX, -centerY);

        // Cell background with glow for selected
        const cellPadding = 3;

        if (isSelected) {
          // Draw glow effect
          ctx.save();
          ctx.shadowColor = COLORS.cyan;
          ctx.shadowBlur = 15;
          ctx.fillStyle = COLORS.cyan;
          ctx.beginPath();
          ctx.roundRect(
            x + cellPadding,
            y + cellPadding,
            cellSize - cellPadding * 2,
            (cellSize - cellPadding * 2),
            8
          );
          ctx.fill();
          ctx.restore();
        } else {
          ctx.fillStyle = COLORS.bgSurfaceSecondary;
          ctx.beginPath();
          ctx.roundRect(
            x + cellPadding,
            y + cellPadding,
            cellSize - cellPadding * 2,
            (cellSize - cellPadding * 2),
            8
          );
          ctx.fill();
        }

        // Cell border
        ctx.strokeStyle = isSelected ? COLORS.cyan : COLORS.borderSubtle;
        ctx.lineWidth = isSelected ? 2 : 1;
        ctx.beginPath();
        ctx.roundRect(
          x + cellPadding,
          y + cellPadding,
          cellSize - cellPadding * 2,
          (cellSize - cellPadding * 2),
          8
        );
        ctx.stroke();

        ctx.restore();

        // Draw letter
        if (anim.scale > 0.5) {
          const letter = grid[row][col];
          drawText(letter, centerX, centerY, {
            font: 'bold 28px system-ui, sans-serif',
            color: isSelected ? COLORS.bgPrimary : COLORS.textPrimary
          });
        }
      }
    }

    // Draw current selection word
    const bottomSpacing = isWideViewport ? 25 : 40;
    const selectionY = gridStartY + gridHeight + bottomSpacing;

    if (currentWord) {
      // Background for selected word
      ctx.fillStyle = COLORS.bgSurface;
      ctx.beginPath();
      ctx.roundRect(W / 2 - 100, selectionY - 25, 200, 50, 10);
      ctx.fill();

      drawText(currentWord, W / 2, selectionY, {
        font: 'bold 24px system-ui, sans-serif',
        color: COLORS.amber
      });
    } else {
      drawText('Drag to select letters', W / 2, selectionY, {
        font: '18px system-ui, sans-serif',
        color: COLORS.textTertiary
      });
    }

    // Draw hint showing what to look for
    const hintSpacing = isWideViewport ? 35 : 60;
    const hintY = selectionY + hintSpacing;
    drawText('Look for: TRUE or FALSE', W / 2, hintY, {
      font: '16px system-ui, sans-serif',
      color: COLORS.textSecondary
    });

    // Draw toast message
    if (toastMessage && toastTimer > 0) {
      const toastAlpha = Math.min(1, toastTimer * 2);
      ctx.fillStyle = `rgba(232, 93, 74, ${toastAlpha * 0.9})`;
      ctx.beginPath();
      const toastY = isWideViewport ? H - 60 : H - 120;
      ctx.roundRect(W / 2 - 80, toastY, 160, 44, 22);
      ctx.fill();

      drawText(toastMessage, W / 2, toastY + 22, {
        font: 'bold 18px system-ui, sans-serif',
        color: '#FFFFFF'
      });
    }

    // Draw particles on top
    drawParticles();
  }

  let lastSelectedCount = 0;

  function handleTouch(e, type) {
    if (gameState !== 'playing') return;

    const touch = e.touches[0] || e.changedTouches[0];
    if (!touch) return;

    const { x, y } = screenToLogical(touch.clientX, touch.clientY);
    const cell = getCellFromPosition(x, y);

    if (type === 'start') {
      initAudio();
      if (cell) {
        isDragging = true;
        dragStartCell = cell;
        selectedCells = [cell];
        currentWord = grid[cell.row][cell.col];
        lastSelectedCount = 1;
        playClickSound();

        // Spawn trail particles at cell center
        const cx = gridStartX + cell.col * cellSize + cellSize / 2;
        const cy = gridStartY + cell.row * cellSize + cellSize / 2;
        spawnSelectionTrail(cx, cy);
      }
    } else if (type === 'move') {
      if (isDragging && dragStartCell && cell) {
        // Get all cells in a line from start to current
        const lineCells = getCellsInLine(dragStartCell, cell);
        if (lineCells.length > 0) {
          selectedCells = lineCells;
          currentWord = getSelectedWord();

          // Play click when selection length changes
          if (lineCells.length !== lastSelectedCount) {
            playClickSound();
            lastSelectedCount = lineCells.length;

            // Spawn trail at newest cell
            const newest = lineCells[lineCells.length - 1];
            const cx = gridStartX + newest.col * cellSize + cellSize / 2;
            const cy = gridStartY + newest.row * cellSize + cellSize / 2;
            spawnSelectionTrail(cx, cy);
          }
        }
      }
    } else if (type === 'end') {
      if (isDragging) {
        isDragging = false;

        // Check if selected word is TRUE or FALSE
        const word = currentWord.toUpperCase();

        if (word === 'TRUE') {
          // Spawn success particles for each selected cell
          selectedCells.forEach(c => {
            const cx = gridStartX + c.col * cellSize + cellSize / 2;
            const cy = gridStartY + c.row * cellSize + cellSize / 2;
            spawnParticles(cx, cy, COLORS.success, 6);
          });
          playSuccessSound();

          // Find the TRUE choice
          const trueChoice = QUESTION.choices.find(c => c.text.toLowerCase() === 'true');
          if (trueChoice) {
            engine.end(trueChoice.is_correct, trueChoice.explanation);
          }
        } else if (word === 'FALSE') {
          // Spawn success particles for each selected cell
          selectedCells.forEach(c => {
            const cx = gridStartX + c.col * cellSize + cellSize / 2;
            const cy = gridStartY + c.row * cellSize + cellSize / 2;
            spawnParticles(cx, cy, COLORS.success, 6);
          });
          playSuccessSound();

          // Find the FALSE choice
          const falseChoice = QUESTION.choices.find(c => c.text.toLowerCase() === 'false');
          if (falseChoice) {
            engine.end(falseChoice.is_correct, falseChoice.explanation);
          }
        } else if (word.length > 0) {
          // Spawn error particles
          selectedCells.forEach(c => {
            const cx = gridStartX + c.col * cellSize + cellSize / 2;
            const cy = gridStartY + c.row * cellSize + cellSize / 2;
            spawnParticles(cx, cy, COLORS.error, 4);
          });
          playErrorSound();

          showToast('Try again!');
          selectedCells = [];
          currentWord = '';
        }

        dragStartCell = null;
        lastSelectedCount = 0;
      }
    }
  }

  // ╔════════════════════════════════════════════════════════════════════════════╗
  // ║  SECTION 4: GAME LOOP - DO NOT MODIFY                                      ║
  // ║  Standard loop with responsive scaling and touch handling.                 ║
  // ╚════════════════════════════════════════════════════════════════════════════╝
  let lastTime = performance.now();

  function gameLoop(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.05); // Cap at 50ms
    lastTime = now;

    // Apply transform for logical coordinate system (non-uniform scaling)
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    if (gameState === 'playing') {
      updateGame(dt);
      drawGame();
    } else {
      drawGame(); // Draw game state behind overlay
      drawEndScreen(dt);
    }

    // Reset transform for next frame
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    requestAnimationFrame(gameLoop);
  }

  // Touch handlers
  function onTouchStart(e) {
    e.preventDefault();
    if (gameState === 'ended') {
      const touch = e.touches[0];
      const { x, y } = screenToLogical(touch.clientX, touch.clientY);

      if (gameResult) {
        // Correct answer: check both buttons
        if (pointInRect(x, y, restartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
        if (pointInRect(x, y, nextButton)) {
          // Notify parent to go to next question
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'quiz-next' }, '*');
          }
          return;
        }
      } else {
        // Wrong answer: check centered restart button
        if (pointInRect(x, y, centeredRestartButton)) {
          gameState = 'playing';
          gameResult = null;
          gameExplanation = '';
          confettiParticles = [];
          initGame();
          return;
        }
      }
    }
    handleTouch(e, 'start');
  }

  function onTouchMove(e) {
    e.preventDefault();
    handleTouch(e, 'move');
  }

  function onTouchEnd(e) {
    e.preventDefault();
    handleTouch(e, 'end');
  }

  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Also support mouse for testing in browser
  canvas.addEventListener('mousedown', (e) => {
    const fakeTouch = { touches: [{ clientX: e.clientX, clientY: e.clientY }], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchStart(fakeTouch);
  });

  canvas.addEventListener('mouseup', (e) => {
    const fakeTouch = { touches: [], changedTouches: [{ clientX: e.clientX, clientY: e.clientY }] };
    onTouchEnd(fakeTouch);
  });


  // Cursor change handler for end screen buttons
  canvas.addEventListener('mousemove', (e) => {
    if (gameState !== 'ended') {
      canvas.style.cursor = 'default';
      return;
    }
    const { x, y } = screenToLogical(e.clientX, e.clientY);
    if (gameResult) {
      if (pointInRect(x, y, restartButton) || pointInRect(x, y, nextButton)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    } else {
      if (pointInRect(x, y, centeredRestartButton)) {
        canvas.style.cursor = 'pointer';
        return;
      }
    }
    canvas.style.cursor = 'default';
  });

  // Handle resize
  window.addEventListener('resize', () => {
    resizeCanvas();
    calculateGridDimensions();
  });
  window.addEventListener('orientationchange', () => {
    setTimeout(() => {
      resizeCanvas();
      calculateGridDimensions();
    }, 100); // Delay for orientation change to complete
  });

  // Prevent pull-to-refresh and overscroll
  document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // Initialize
  resizeCanvas();
  initGame();
  requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
